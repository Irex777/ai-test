<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Editor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-deep: #0b0d10;
    --bg-editor: #11141a;
    --bg-preview: #141820;
    --bg-toolbar: #161b24;
    --bg-btn: #1e2430;
    --bg-btn-hover: #283040;
    --bg-btn-active: #323e52;
    --accent: #e0943a;
    --accent-dim: #c07a28;
    --accent-glow: rgba(224, 148, 58, 0.12);
    --text: #cdd1d9;
    --text-bright: #eef0f4;
    --text-muted: #5e6678;
    --border: #222838;
    --border-light: #2c3448;
    --code-bg: #1a2030;
    --blockquote-border: #e0943a;
    --scrollbar-track: #11141a;
    --scrollbar-thumb: #2a3248;
    --scrollbar-thumb-hover: #3a4a60;
  }

  html, body {
    height: 100%;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg-deep);
    color: var(--text);
    overflow: hidden;
  }

  /* Scrollbar styling */
  ::-webkit-scrollbar { width: 7px; height: 7px; }
  ::-webkit-scrollbar-track { background: var(--scrollbar-track); }
  ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-thumb-hover); }

  /* ---- TOP BAR ---- */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: var(--bg-toolbar);
    border-bottom: 1px solid var(--border);
    min-height: 52px;
    position: relative;
    z-index: 10;
  }

  .top-bar::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.3;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--text-bright);
    letter-spacing: -0.02em;
  }

  .logo-icon {
    width: 28px;
    height: 28px;
    background: linear-gradient(135deg, var(--accent), #d4782a);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: #fff;
    font-weight: 800;
    box-shadow: 0 2px 10px rgba(224, 148, 58, 0.25);
  }

  .top-bar-right {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .word-count {
    font-size: 0.78rem;
    color: var(--text-muted);
    padding: 4px 10px;
    background: var(--bg-btn);
    border-radius: 6px;
    border: 1px solid var(--border);
    white-space: nowrap;
  }

  .word-count span { color: var(--accent); font-weight: 600; }

  .copy-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: var(--bg-btn);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.2s ease;
    font-weight: 500;
  }

  .copy-btn:hover {
    background: var(--bg-btn-hover);
    border-color: var(--accent);
    color: var(--text-bright);
  }

  .copy-btn:active { transform: scale(0.96); }

  .copy-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

  .copy-btn.copied {
    border-color: #34d399;
    color: #34d399;
    background: rgba(52, 211, 153, 0.08);
  }

  /* ---- TOOLBAR ---- */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 3px;
    padding: 8px 16px;
    background: var(--bg-toolbar);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    position: relative;
  }

  .toolbar::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 5%, var(--border-light) 50%, transparent 95%);
  }

  .tb-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 34px;
    height: 32px;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 5px;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 600;
    transition: all 0.15s ease;
    position: relative;
  }

  .tb-btn:hover {
    background: var(--bg-btn-hover);
    border-color: var(--border);
    color: var(--text-bright);
  }

  .tb-btn:active {
    background: var(--bg-btn-active);
    transform: scale(0.94);
  }

  .tb-btn svg { width: 16px; height: 16px; }

  .tb-sep {
    width: 1px;
    height: 20px;
    background: var(--border);
    margin: 0 5px;
    flex-shrink: 0;
  }

  .tb-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-left: 6px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* ---- MAIN LAYOUT ---- */
  .main-wrap {
    display: flex;
    height: calc(100vh - 52px - 49px);
    overflow: hidden;
  }

  .pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    position: relative;
  }

  .pane-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: var(--bg-toolbar);
    border-bottom: 1px solid var(--border);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    font-weight: 600;
  }

  .pane-header .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
  }

  .dot-editor { background: #3b82f6; box-shadow: 0 0 6px rgba(59, 130, 246, 0.4); }
  .dot-preview { background: var(--accent); box-shadow: 0 0 6px rgba(224, 148, 58, 0.4); }

  .divider {
    width: 3px;
    background: var(--border);
    cursor: col-resize;
    position: relative;
    flex-shrink: 0;
    transition: background 0.2s;
    z-index: 5;
  }

  .divider:hover, .divider.active {
    background: var(--accent);
    box-shadow: 0 0 8px rgba(224, 148, 58, 0.3);
  }

  .divider::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 3px;
    height: 30px;
    border-radius: 2px;
    background: var(--text-muted);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .divider:hover::after { opacity: 0.5; }

  /* ---- EDITOR ---- */
  .editor-pane { background: var(--bg-editor); }

  #editor {
    flex: 1;
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
    font-size: 0.88rem;
    line-height: 1.75;
    padding: 20px 24px;
    resize: none;
    tab-size: 2;
    overflow-y: auto;
    caret-color: var(--accent);
  }

  #editor::placeholder {
    color: var(--text-muted);
    opacity: 0.6;
  }

  #editor::selection {
    background: rgba(224, 148, 58, 0.2);
    color: var(--text-bright);
  }

  /* ---- PREVIEW ---- */
  .preview-pane { background: var(--bg-preview); }

  #preview {
    flex: 1;
    padding: 24px 28px;
    overflow-y: auto;
    line-height: 1.7;
    font-size: 0.95rem;
  }

  #preview h1, #preview h2, #preview h3,
  #preview h4, #preview h5, #preview h6 {
    color: var(--text-bright);
    font-weight: 700;
    margin-top: 1.5em;
    margin-bottom: 0.5em;
    line-height: 1.3;
  }

  #preview h1 { font-size: 2rem; border-bottom: 2px solid var(--border); padding-bottom: 0.3em; }
  #preview h2 { font-size: 1.55rem; border-bottom: 1px solid var(--border); padding-bottom: 0.25em; }
  #preview h3 { font-size: 1.3rem; }
  #preview h4 { font-size: 1.1rem; }
  #preview h5 { font-size: 1rem; }
  #preview h6 { font-size: 0.9rem; color: var(--text-muted); }

  #preview h1:first-child, #preview h2:first-child, #preview h3:first-child { margin-top: 0; }

  #preview p { margin-bottom: 0.9em; }

  #preview strong { color: var(--text-bright); font-weight: 700; }
  #preview em { font-style: italic; color: #d4b896; }

  #preview a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid rgba(224, 148, 58, 0.3);
    transition: border-color 0.2s;
  }
  #preview a:hover { border-color: var(--accent); }

  #preview code {
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    background: var(--code-bg);
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 0.85em;
    color: #e8b87a;
    border: 1px solid var(--border);
  }

  #preview pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    overflow-x: auto;
    margin: 1em 0;
    position: relative;
  }

  #preview pre code {
    background: transparent;
    padding: 0;
    border: none;
    color: var(--text);
    font-size: 0.84rem;
    line-height: 1.6;
  }

  #preview blockquote {
    border-left: 3px solid var(--blockquote-border);
    margin: 1em 0;
    padding: 10px 20px;
    background: var(--accent-glow);
    border-radius: 0 6px 6px 0;
    color: var(--text);
  }

  #preview blockquote p { margin-bottom: 0.4em; }
  #preview blockquote p:last-child { margin-bottom: 0; }

  #preview ul, #preview ol {
    margin: 0.8em 0;
    padding-left: 1.8em;
  }

  #preview li { margin-bottom: 0.35em; }

  #preview ul li::marker { color: var(--accent); }
  #preview ol li::marker { color: var(--accent); font-weight: 600; }

  #preview hr {
    border: none;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border-light), transparent);
    margin: 1.5em 0;
  }

  #preview img {
    max-width: 100%;
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  #preview table {
    width: 100%;
    border-collapse: collapse;
    margin: 1em 0;
  }

  #preview th, #preview td {
    border: 1px solid var(--border);
    padding: 8px 12px;
    text-align: left;
  }

  #preview th {
    background: var(--bg-toolbar);
    color: var(--text-bright);
    font-weight: 600;
  }

  #preview input[type="checkbox"] {
    accent-color: var(--accent);
    margin-right: 6px;
  }

  /* Empty state */
  .preview-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
    font-size: 0.9rem;
    opacity: 0.6;
  }

  /* ---- TOAST ---- */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg-btn-active);
    color: var(--text-bright);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 0.85rem;
    border: 1px solid var(--accent);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 12px rgba(224, 148, 58, 0.15);
    opacity: 0;
    pointer-events: none;
    transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    z-index: 100;
  }

  .toast.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ---- AMBIENT GLOW ---- */
  .ambient-glow {
    position: fixed;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
    opacity: 0.06;
  }

  .glow-1 {
    top: -100px;
    right: -50px;
    background: var(--accent);
    animation: glowDrift 12s ease-in-out infinite alternate;
  }

  .glow-2 {
    bottom: -150px;
    left: -100px;
    background: #3b82f6;
    animation: glowDrift 15s ease-in-out infinite alternate-reverse;
  }

  @keyframes glowDrift {
    0% { transform: translate(0, 0); }
    100% { transform: translate(30px, -20px); }
  }

  /* ---- RESPONSIVE ---- */
  @media (max-width: 768px) {
    .main-wrap {
      flex-direction: column;
      height: calc(100vh - 52px - 49px);
    }

    .divider {
      width: 100%;
      height: 3px;
      cursor: row-resize;
    }

    .pane { flex: none; height: 50%; }

    .toolbar { padding: 6px 10px; }

    .tb-label { display: none; }

    #editor { font-size: 0.82rem; padding: 14px 16px; }

    #preview { padding: 16px 18px; font-size: 0.88rem; }

    .logo span { display: none; }

    .word-count { font-size: 0.7rem; padding: 3px 8px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .ambient-glow { animation: none; }
    * { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
  }
</style>
</head>
<body>

<!-- Ambient background glows -->
<div class="ambient-glow glow-1"></div>
<div class="ambient-glow glow-2"></div>

<!-- Top bar -->
<header class="top-bar">
  <div class="logo">
    <div class="logo-icon">M</div>
    <span>Markdown Studio</span>
  </div>
  <div class="top-bar-right">
    <div class="word-count" id="wordCount">Words: <span>0</span> &middot; Chars: <span>0</span></div>
    <button class="copy-btn" id="copyBtn" aria-label="Copy markdown to clipboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      <span class="copy-text">Copy</span>
    </button>
  </div>
</header>

<!-- Toolbar -->
<nav class="toolbar" role="toolbar" aria-label="Formatting tools">
  <span class="tb-label">Format</span>
  <button class="tb-btn" data-action="bold" title="Bold (Ctrl+B)" aria-label="Bold">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/></svg>
  </button>
  <button class="tb-btn" data-action="italic" title="Italic (Ctrl+I)" aria-label="Italic">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg>
  </button>
  <button class="tb-btn" data-action="strikethrough" title="Strikethrough" aria-label="Strikethrough">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.3 4.9c-2.3-.6-4.4-1-6.2-.9-2.7 0-5.3.7-5.3 3.6 0 1.5 1.8 3.3 7.2 3.3"/><line x1="4" y1="12" x2="20" y2="12"/><path d="M17.3 12c1.5.7 2.7 1.8 2.7 3.5 0 3.6-3.5 4.5-6.5 4.5-2.2 0-4.7-.4-7.5-1.2"/></svg>
  </button>
  <div class="tb-sep"></div>
  <button class="tb-btn" data-action="h1" title="Heading 1" aria-label="Heading 1" style="font-size:0.78rem;">H1</button>
  <button class="tb-btn" data-action="h2" title="Heading 2" aria-label="Heading 2" style="font-size:0.78rem;">H2</button>
  <button class="tb-btn" data-action="h3" title="Heading 3" aria-label="Heading 3" style="font-size:0.78rem;">H3</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" data-action="ul" title="Unordered List" aria-label="Unordered list">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3.5" cy="6" r="1.5" fill="currentColor"/><circle cx="3.5" cy="12" r="1.5" fill="currentColor"/><circle cx="3.5" cy="18" r="1.5" fill="currentColor"/></svg>
  </button>
  <button class="tb-btn" data-action="ol" title="Ordered List" aria-label="Ordered list">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><text x="2" y="8" font-size="7" fill="currentColor" stroke="none" font-weight="700">1</text><text x="2" y="14" font-size="7" fill="currentColor" stroke="none" font-weight="700">2</text><text x="2" y="20" font-size="7" fill="currentColor" stroke="none" font-weight="700">3</text></svg>
  </button>
  <button class="tb-btn" data-action="checklist" title="Checklist" aria-label="Checklist">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="4" height="4" rx="0.5"/><path d="M4 7l1.2 1.2L7.5 5.5"/><line x1="12" y1="7" x2="21" y2="7"/><rect x="3" y="13" width="4" height="4" rx="0.5"/><line x1="12" y1="15" x2="21" y2="15"/></svg>
  </button>
  <div class="tb-sep"></div>
  <button class="tb-btn" data-action="link" title="Link (Ctrl+K)" aria-label="Insert link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
  </button>
  <button class="tb-btn" data-action="image" title="Image" aria-label="Insert image">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
  </button>
  <button class="tb-btn" data-action="code" title="Inline Code" aria-label="Inline code">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
  </button>
  <button class="tb-btn" data-action="codeblock" title="Code Block" aria-label="Code block">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="8 10 6 12 8 14"/><polyline points="16 10 18 12 16 14"/><line x1="13" y1="9" x2="11" y2="15"/></svg>
  </button>
  <button class="tb-btn" data-action="quote" title="Blockquote" aria-label="Blockquote">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V21z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3z"/></svg>
  </button>
  <button class="tb-btn" data-action="hr" title="Horizontal Rule" aria-label="Horizontal rule">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="2" y1="12" x2="22" y2="12"/></svg>
  </button>
</nav>

<!-- Main editor area -->
<main class="main-wrap" id="mainWrap">
  <section class="pane editor-pane" id="editorPane">
    <div class="pane-header">
      <span><span class="dot dot-editor"></span>Editor</span>
    </div>
    <textarea id="editor" placeholder="Start writing markdown..." spellcheck="false" aria-label="Markdown editor"></textarea>
  </section>

  <div class="divider" id="divider" role="separator" aria-label="Resize panes"></div>

  <section class="pane preview-pane" id="previewPane">
    <div class="pane-header">
      <span><span class="dot dot-preview"></span>Preview</span>
    </div>
    <div id="preview" role="document" aria-label="Markdown preview"></div>
  </section>
</main>

<!-- Toast notification -->
<div class="toast" id="toast" role="status" aria-live="polite"></div>

  const defaultContent = `# Welcome to Markdown Studio

A fast, elegant markdown editor with **live preview** right in your browser. Start typing on the left and watch your formatted content appear on the right.

## Features

- **Live preview** — see changes as you type
- Rich formatting toolbar with keyboard shortcuts
- Word and character count in real time
- One-click copy to clipboard
- Responsive split-pane layout
- Dark theme optimized for writing

## Formatting Examples

### Code Blocks

Here's a JavaScript example:

\`\`\`javascript
function fibonacci(n) {
  if (n <= 1) return n;
  let a = 0, b = 1;
  for (let i = 2; i <= n; i++) {
    [a, b] = [b, a + b];
  }
  return b;
}

console.log(fibonacci(10)); // 55
\`\`\`

And a Python snippet:

\`\`\`python
def quicksort(arr):
    if len(arr) <= 1:
        return arr
    pivot = arr[len(arr) // 2]
    left = [x for x in arr if x < pivot]
    mid = [x for x in arr if x == pivot]
    right = [x for x in arr if x > pivot]
    return quicksort(left) + mid + quicksort(right)

  // ---- DOM references ----
  const editor = document.getElementById('editor');
  const preview = document.getElementById('preview');
  const wordCountEl = document.getElementById('wordCount');
  const copyBtn = document.getElementById('copyBtn');
  const toastEl = document.getElementById('toast');
  const divider = document.getElementById('divider');
  const mainWrap = document.getElementById('mainWrap');
  const editorPane = document.getElementById('editorPane');
  const previewPane = document.getElementById('previewPane');

  // ---- Markdown Parser ----
  function parseMarkdown(md) {
    // Store code blocks to protect from processing
    const codeBlocks = [];
    const inlineCodes = [];

    // Extract fenced code blocks
    md = md.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
      const idx = codeBlocks.length;
      codeBlocks.push({ lang, code: escapeHtml(code.trimEnd()) });
      return `\n%%CODEBLOCK_${idx}%%\n`;
    });

    // Extract inline code
    md = md.replace(/`([^`\n]+?)`/g, (match, code) => {
      const idx = inlineCodes.length;
      inlineCodes.push(escapeHtml(code));
      return `%%INLINECODE_${idx}%%`;
    });

    // Process lines
    const lines = md.split('\n');
    let html = '';
    let inList = false;
    let listType = '';
    let inParagraph = false;

    for (let i = 0; i < lines.length; i++) {
      let line = lines[i];

      // Skip codeblock placeholders handling (will be inline)
      const codeBlockMatch = line.match(/^%%CODEBLOCK_(\d+)%%$/);
      if (codeBlockMatch) {
        if (inParagraph) { html += '</p>'; inParagraph = false; }
        if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; inList = false; }
        const block = codeBlocks[parseInt(codeBlockMatch[1])];
        const langLabel = block.lang ? `<div style="font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;font-weight:600;">${block.lang}</div>` : '';
        html += `<pre>${langLabel}<code>${block.code}</code></pre>`;
        continue;
      }

      // Horizontal rule
      if (/^(\*{3,}|-{3,}|_{3,})\s*$/.test(line.trim())) {
        if (inParagraph) { html += '</p>'; inParagraph = false; }
        if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; inList = false; }
        html += '<hr>';
        continue;
      }

      // Headings
      const headingMatch = line.match(/^(#{1,6})\s+(.+)$/);
      if (headingMatch) {
        if (inParagraph) { html += '</p>'; inParagraph = false; }
        if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; inList = false; }
        const level = headingMatch[1].length;
        const text = processInline(headingMatch[2], inlineCodes);
        html += `<h${level}>${text}</h${level}>`;
        continue;
      }

      // Blockquote
      if (line.startsWith('> ')) {
        if (inParagraph) { html += '</p>'; inParagraph = false; }
        if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; inList = false; }
        let quoteContent = '';
        while (i < lines.length && (lines[i].startsWith('> ') || lines[i] === '>')) {
          quoteContent += (lines[i] === '>' ? '' : lines[i].substring(2)) + '\n';
          i++;
        }
        i--;
        html += `<blockquote>${parseMarkdown(quoteContent.trim())}</blockquote>`;
        continue;
      }

      // Unordered list
      const ulMatch = line.match(/^(\s*)[-*+]\s+(.*)$/);
      if (ulMatch) {
        if (inParagraph) { html += '</p>'; inParagraph = false; }
        if (!inList || listType !== 'ul') {
          if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; }
          html += '<ul>';
          inList = true;
          listType = 'ul';
        }
        const text = processInline(ulMatch[2], inlineCodes);
        html += `<li>${text}</li>`;
        continue;
      }

      // Ordered list
      const olMatch = line.match(/^(\s*)\d+\.\s+(.*)$/);
      if (olMatch) {
        if (inParagraph) { html += '</p>'; inParagraph = false; }
        if (!inList || listType !== 'ol') {
          if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; }
          html += '<ol>';
          inList = true;
          listType = 'ol';
        }
        const text = processInline(olMatch[2], inlineCodes);
        html += `<li>${text}</li>`;
        continue;
      }

      // Checklist
      const checkMatch = line.match(/^[-*+]\s+\[([ xX])\]\s+(.*)$/);
      if (checkMatch) {
        if (inParagraph) { html += '</p>'; inParagraph = false; }
        if (!inList) {
          html += '<ul style="list-style:none;padding-left:0.5em;">';
          inList = true;
          listType = 'ul';
        }
        const checked = checkMatch[1] !== ' ';
        const text = processInline(checkMatch[2], inlineCodes);
        html += `<li><input type="checkbox" ${checked ? 'checked' : ''} disabled>${text}</li>`;
        continue;
      }

      // Close list if we reach a non-list line
      if (inList) {
        html += listType === 'ul' ? '</ul>' : '</ol>';
        inList = false;
      }

      // Empty line
      if (line.trim() === '') {
        if (inParagraph) { html += '</p>'; inParagraph = false; }
        continue;
      }

      // Paragraph content
      const processedLine = processInline(line, inlineCodes);
      if (inParagraph) {
        html += '<br>' + processedLine;
      } else {
        html += '<p>' + processedLine;
        inParagraph = true;
      }
    }

    if (inParagraph) html += '</p>';
    if (inList) html += listType === 'ul' ? '</ul>' : '</ol>';

    // Restore inline code
    html = html.replace(/%%INLINECODE_(\d+)%%/g, (match, idx) => {
      return `<code>${inlineCodes[parseInt(idx)]}</code>`;
    });

    return html;
  }

  function processInline(text, inlineCodes) {
    // Images
    text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
    // Links
    text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    // Bold + Italic
    text = text.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    text = text.replace(/___(.+?)___/g, '<strong><em>$1</em></strong>');
    // Bold
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/__(.+?)__/g, '<strong>$1</strong>');
    // Italic
    text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
    text = text.replace(/_(.+?)_/g, '<em>$1</em>');
    // Strikethrough
    text = text.replace(/~~(.+?)~~/g, '<del>$1</del>');
    return text;
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ---- Update preview and word count ----
  function updatePreview() {
    const md = editor.value;
    if (md.trim() === '') {
      preview.innerHTML = '<div class="preview-empty">Start typing to see a live preview...</div>';
    } else {
      preview.innerHTML = parseMarkdown(md);
    }
    updateWordCount(md);
  }

  function updateWordCount(text) {
    const trimmed = text.trim();
    if (trimmed === '') {
      wordCountEl.innerHTML = 'Words: <span>0</span> &middot; Chars: <span>0</span>';
      return;
    }
    const words = trimmed.split(/\s+/).length;
    const chars = trimmed.length;
    wordCountEl.innerHTML = `Words: <span>${words.toLocaleString()}</span> &middot; Chars: <span>${chars.toLocaleString()}</span>`;
  }

  // ---- Toolbar actions ----
  function insertAround(before, after, placeholder) {
    const start = editor.selectionStart;
    const end = editor.selectionEnd;
    const selected = editor.value.substring(start, end);
    const text = selected || placeholder;
    const replacement = before + text + after;

    editor.focus();
    // Use execCommand for undo support
    document.execCommand('insertText', false, replacement);

    // Select the placeholder if nothing was selected
    if (!selected) {
      editor.selectionStart = start + before.length;
      editor.selectionEnd = start + before.length + text.length;
    }

    updatePreview();
  }

  function insertAtLineStart(prefix) {
    const start = editor.selectionStart;
    const val = editor.value;

    // Find the beginning of the current line
    let lineStart = val.lastIndexOf('\n', start - 1) + 1;
    const lineEnd = val.indexOf('\n', start);
    const end = lineEnd === -1 ? val.length : lineEnd;
    const currentLine = val.substring(lineStart, end);

    editor.selectionStart = lineStart;
    editor.selectionEnd = end;
    editor.focus();

    const newLine = prefix + currentLine;
    document.execCommand('insertText', false, newLine);

    updatePreview();
  }

  function handleToolbarAction(action) {
    switch (action) {
      case 'bold':
        insertAround('**', '**', 'bold text');
        break;
      case 'italic':
        insertAround('*', '*', 'italic text');
        break;
      case 'strikethrough':
        insertAround('~~', '~~', 'strikethrough');
        break;
      case 'h1':
        insertAtLineStart('# ');
        break;
      case 'h2':
        insertAtLineStart('## ');
        break;
      case 'h3':
        insertAtLineStart('### ');
        break;
      case 'ul':
        insertAtLineStart('- ');
        break;
      case 'ol':
        insertAtLineStart('1. ');
        break;
      case 'checklist':
        insertAtLineStart('- [ ] ');
        break;
      case 'link':
        insertAround('[', '](https://example.com)', 'link text');
        break;
      case 'image':
        insertAround('![', '](https://picsum.photos/seed/demo/600/300.jpg)', 'alt text');
        break;
      case 'code':
        insertAround('`', '`', 'code');
        break;
      case 'codeblock':
        insertAround('\n```\n', '\n```\n', 'code here');
        break;
      case 'quote':
        insertAtLineStart('> ');
        break;
      case 'hr':
        const pos = editor.selectionStart;
        editor.selectionEnd = pos;
        editor.focus();
        document.execCommand('insertText', false, '\n---\n');
        updatePreview();
        break;
    }
  }

  // Toolbar click handler
  document.querySelector('.toolbar').addEventListener('click', (e) => {
    const btn = e.target.closest('.tb-btn');
    if (!btn) return;
    const action = btn.dataset.action;
    if (action) handleToolbarAction(action);
  });

  // ---- Keyboard shortcuts ----
  editor.addEventListener('keydown', (e) => {
    if (e.ctrlKey || e.metaKey) {
      switch (e.key.toLowerCase()) {
        case 'b':
          e.preventDefault();
          handleToolbarAction('bold');
          break;
        case 'i':
          e.preventDefault();
          handleToolbarAction('italic');
          break;
        case 'k':
          e.preventDefault();
          handleToolbarAction('link');
          break;
      }
    }

    // Tab support
    if (e.key === 'Tab') {
      e.preventDefault();
      document.execCommand('insertText', false, '  ');
      updatePreview();
    }
  });

  // ---- Copy button ----
  copyBtn.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(editor.value);
      showToast('Markdown copied to clipboard');
      copyBtn.classList.add('copied');
      copyBtn.querySelector('.copy-text').textContent = 'Copied';
      setTimeout(() => {
        copyBtn.classList.remove('copied');
        copyBtn.querySelector('.copy-text').textContent = 'Copy';
      }, 2000);
    } catch {
      // Fallback
      editor.select();
      document.execCommand('copy');
      showToast('Markdown copied to clipboard');
    }
  });

  // ---- Toast ----
  let toastTimeout;
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('visible');
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => {
      toastEl.classList.remove('visible');
    }, 2500);
  }

  // ---- Draggable divider ----
  let isDragging = false;

  divider.addEventListener('mousedown', (e) => {
    isDragging = true;
    divider.classList.add('active');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const rect = mainWrap.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const total = rect.width;
    const pct = Math.max(20, Math.min(80, (x / total) * 100));
    editorPane.style.flex = 'none';
    editorPane.style.width = pct + '%';
    previewPane.style.flex = 'none';
    previewPane.style.width = (100 - pct) + '%';
  });

  document.addEventListener('mouseup', () => {
    if (isDragging) {
      isDragging = false;
      divider.classList.remove('active');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }
  });

  // Touch support for divider
  divider.addEventListener('touchstart', (e) => {
    isDragging = true;
    divider.classList.add('active');
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchmove', (e) => {
    if (!isDragging) return;
    const touch = e.touches[0];
    const rect = mainWrap.getBoundingClientRect();
    const x = touch.clientX - rect.left;
    const total = rect.width;
    const pct = Math.max(20, Math.min(80, (x / total) * 100));
    editorPane.style.flex = 'none';
    editorPane.style.width = pct + '%';
    previewPane.style.flex = 'none';
    previewPane.style.width = (100 - pct) + '%';
  }, { passive: false });

  document.addEventListener('touchend', () => {
    if (isDragging) {
      isDragging = false;
      divider.classList.remove('active');
    }
  });

  // ---- Initialize ----
  editor.value = defaultContent;
  updatePreview();

  // Live update on input
  editor.addEventListener('input', updatePreview);
</script>
