<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Editor</title>
<style>
  /* ── CSS Variables / Dark Theme ── */
  :root {
    --bg-deep: #0f0f0f;
    --bg-surface: #1a1a1e;
    --bg-elevated: #232328;
    --bg-input: #18181c;
    --border: #2e2e35;
    --border-focus: #d4a04e;
    --fg: #e4e4e8;
    --fg-muted: #8a8a96;
    --fg-dim: #5c5c68;
    --accent: #d4a04e;
    --accent-glow: rgba(212, 160, 78, 0.15);
    --accent-hover: #e0b566;
    --danger: #e05555;
    --success: #4ecf7a;
    --code-bg: #141418;
    --scrollbar-thumb: #3a3a44;
    --radius: 8px;
    --radius-sm: 5px;
    --transition: 0.2s ease;
  }

  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  @font-face {
    font-family: 'SystemStack';
    src: local('Segoe UI'), local('Helvetica Neue'), local('Helvetica'), local('sans-serif');
  }

  body {
    font-family: 'SystemStack', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-deep);
    color: var(--fg);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 7px; height: 7px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--fg-dim); }

  /* ── Background Texture ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 10% 20%, rgba(212,160,78,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 90% 80%, rgba(212,160,78,0.03) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Header ── */
  .app-header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .app-logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .app-logo-icon {
    width: 28px;
    height: 28px;
    background: linear-gradient(135deg, var(--accent), #b8842e);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 14px;
    color: #0f0f0f;
    letter-spacing: -1px;
  }

  .app-logo-text {
    font-size: 16px;
    font-weight: 700;
    color: var(--fg);
    letter-spacing: -0.3px;
  }

  .app-logo-text span {
    color: var(--fg-muted);
    font-weight: 400;
    margin-left: 6px;
    font-size: 13px;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── Toolbar ── */
  .toolbar {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 8px 16px;
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .toolbar-group {
    display: flex;
    align-items: center;
    gap: 2px;
  }

  .toolbar-divider {
    width: 1px;
    height: 22px;
    background: var(--border);
    margin: 0 8px;
  }

  .toolbar-btn {
    background: transparent;
    border: 1px solid transparent;
    color: var(--fg-muted);
    padding: 6px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all var(--transition);
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
    font-family: inherit;
  }

  .toolbar-btn:hover {
    background: var(--accent-glow);
    color: var(--accent);
    border-color: rgba(212,160,78,0.2);
  }

  .toolbar-btn:active {
    transform: scale(0.96);
  }

  .toolbar-btn svg {
    width: 16px;
    height: 16px;
    stroke-width: 2;
    flex-shrink: 0;
  }

  .toolbar-btn .btn-label {
    font-size: 12px;
  }

  /* ── Main Content ── */
  .main-content {
    position: relative;
    z-index: 5;
    flex: 1;
    display: flex;
    overflow: hidden;
    min-height: 0;
  }

  /* ── Panes ── */
  .pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
  }

  .pane-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .pane-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--fg-dim);
  }

  .pane-title .dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    margin-right: 8px;
    position: relative;
    top: -0.5px;
  }

  .editor-pane .pane-title .dot {
    background: var(--accent);
    box-shadow: 0 0 6px rgba(212,160,78,0.4);
  }

  .preview-pane .pane-title .dot {
    background: var(--success);
    box-shadow: 0 0 6px rgba(78,207,122,0.3);
  }

  .pane-body {
    flex: 1;
    overflow: auto;
    min-height: 0;
  }

  /* ── Divider ── */
  .pane-divider {
    width: 1px;
    background: var(--border);
    cursor: col-resize;
    position: relative;
    flex-shrink: 0;
    transition: background var(--transition);
  }

  .pane-divider::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 3px;
    height: 40px;
    border-radius: 3px;
    background: var(--fg-dim);
    opacity: 0;
    transition: opacity var(--transition);
  }

  .pane-divider:hover {
    background: var(--accent);
  }

  .pane-divider:hover::after {
    opacity: 0.5;
  }

  /* ── Editor ── */
  #editor {
    width: 100%;
    height: 100%;
    background: var(--bg-input);
    color: var(--fg);
    border: none;
    outline: none;
    resize: none;
    padding: 20px;
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 14px;
    line-height: 1.75;
    tab-size: 2;
    letter-spacing: 0.2px;
  }

  #editor::placeholder {
    color: var(--fg-dim);
  }

  #editor::selection {
    background: rgba(212,160,78,0.25);
  }

  /* ── Preview ── */
  .preview-body {
    padding: 24px 28px;
    line-height: 1.75;
    font-size: 15px;
    color: var(--fg);
  }

  .preview-body h1 {
    font-size: 2em;
    font-weight: 800;
    margin: 0.6em 0 0.4em;
    padding-bottom: 0.3em;
    border-bottom: 2px solid var(--border);
    color: #fff;
    letter-spacing: -0.5px;
  }

  .preview-body h1:first-child { margin-top: 0; }

  .preview-body h2 {
    font-size: 1.5em;
    font-weight: 700;
    margin: 1.2em 0 0.4em;
    padding-bottom: 0.25em;
    border-bottom: 1px solid var(--border);
    color: #f0f0f4;
    letter-spacing: -0.3px;
  }

  .preview-body h3 {
    font-size: 1.25em;
    font-weight: 600;
    margin: 1em 0 0.3em;
    color: #e0e0e6;
  }

  .preview-body h4 {
    font-size: 1.1em;
    font-weight: 600;
    margin: 0.8em 0 0.3em;
    color: #d0d0d8;
  }

  .preview-body p {
    margin: 0.6em 0;
    color: var(--fg);
  }

  .preview-body strong {
    color: #fff;
    font-weight: 700;
  }

  .preview-body em {
    color: var(--accent-hover);
    font-style: italic;
  }

  .preview-body a {
    color: var(--accent);
    text-decoration: underline;
    text-underline-offset: 3px;
    transition: color var(--transition);
  }

  .preview-body a:hover {
    color: var(--accent-hover);
  }

  .preview-body code {
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    background: var(--code-bg);
    border: 1px solid var(--border);
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 0.88em;
    color: var(--accent);
  }

  .preview-body pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    overflow-x: auto;
    margin: 1em 0;
    position: relative;
  }

  .preview-body pre code {
    background: none;
    border: none;
    padding: 0;
    font-size: 13px;
    line-height: 1.7;
    color: var(--fg);
  }

  .preview-body blockquote {
    border-left: 4px solid var(--accent);
    margin: 1em 0;
    padding: 10px 20px;
    background: var(--accent-glow);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    color: var(--fg-muted);
  }

  .preview-body blockquote p {
    margin: 0.3em 0;
    color: var(--fg-muted);
  }

  .preview-body ul, .preview-body ol {
    margin: 0.6em 0;
    padding-left: 1.8em;
  }

  .preview-body li {
    margin: 0.35em 0;
  }

  .preview-body ul li::marker {
    color: var(--accent);
  }

  .preview-body ol li::marker {
    color: var(--accent);
    font-weight: 600;
  }

  .preview-body hr {
    border: none;
    height: 1px;
    background: var(--border);
    margin: 1.5em 0;
  }

  .preview-body img {
    max-width: 100%;
    border-radius: var(--radius);
  }

  .preview-body del {
    color: var(--fg-dim);
    text-decoration: line-through;
  }

  /* ── Status Bar ── */
  .status-bar {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 16px;
    background: var(--bg-surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .status-left, .status-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .status-item {
    font-size: 11px;
    color: var(--fg-dim);
    display: flex;
    align-items: center;
    gap: 5px;
    letter-spacing: 0.3px;
  }

  .status-item strong {
    color: var(--fg-muted);
    font-weight: 600;
  }

  /* ── Buttons ── */
  .btn {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    color: var(--fg-muted);
    padding: 6px 14px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    transition: all var(--transition);
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: inherit;
  }

  .btn:hover {
    background: var(--accent-glow);
    color: var(--accent);
    border-color: rgba(212,160,78,0.3);
  }

  .btn:active {
    transform: scale(0.97);
  }

  .btn svg {
    width: 14px;
    height: 14px;
  }

  .btn-accent {
    background: var(--accent);
    color: #0f0f0f;
    border-color: var(--accent);
    font-weight: 600;
  }

  .btn-accent:hover {
    background: var(--accent-hover);
    color: #0f0f0f;
    border-color: var(--accent-hover);
  }

  /* ── Toast Notification ── */
  .toast {
    position: fixed;
    bottom: 60px;
    right: 24px;
    background: var(--bg-elevated);
    border: 1px solid var(--accent);
    color: var(--fg);
    padding: 10px 20px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    z-index: 1000;
    opacity: 0;
    transform: translateY(12px);
    transition: all 0.3s ease;
    pointer-events: none;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .toast.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .toast-icon {
    color: var(--success);
    font-size: 15px;
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .main-content {
      flex-direction: column;
    }

    .pane-divider {
      width: 100%;
      height: 1px;
      cursor: row-resize;
    }

    .pane-divider::after {
      width: 40px;
      height: 3px;
    }

    .pane {
      flex: 1;
      min-height: 0;
    }

    .toolbar {
      padding: 6px 10px;
      gap: 1px;
    }

    .toolbar-btn .btn-label {
      display: none;
    }

    .toolbar-divider {
      margin: 0 4px;
    }

    .app-logo-text span {
      display: none;
    }

    .preview-body {
      padding: 16px;
    }

    #editor {
      padding: 14px;
      font-size: 13px;
    }

    .status-item .status-label {
      display: none;
    }
  }

  /* ── Animations ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .preview-body > *:first-child {
    animation: fadeIn 0.3s ease;
  }

  /* ── Focus States ── */
  .toolbar-btn:focus-visible,
  .btn:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  #editor:focus {
    box-shadow: inset 0 0 0 1px rgba(212,160,78,0.15);
  }

  /* ── Reduced Motion ── */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

<!-- Header -->
<header class="app-header">
  <div class="app-logo">
    <div class="app-logo-icon">M</div>
    <div class="app-logo-text">Markdown Editor<span>Live Preview</span></div>
  </div>
  <div class="header-actions">
    <button class="btn" id="btnCopy" aria-label="Copy markdown to clipboard" title="Copy Markdown">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
        <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
      </svg>
      Copy
    </button>
    <button class="btn btn-accent" id="btnClear" aria-label="Clear editor" title="Clear Editor">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
        <path d="M3 6h18"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
        <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
      </svg>
      Clear
    </button>
  </div>
</header>

<!-- Toolbar -->
<nav class="toolbar" role="toolbar" aria-label="Formatting toolbar">
  <div class="toolbar-group">
    <button class="toolbar-btn" data-action="bold" title="Bold (Ctrl+B)" aria-label="Bold">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 4h8a4 4 0 014 4 4 4 0 01-4 4H6z"/><path d="M6 12h9a4 4 0 014 4 4 4 0 01-4 4H6z"/>
      </svg>
      <span class="btn-label">Bold</span>
    </button>
    <button class="toolbar-btn" data-action="italic" title="Italic (Ctrl+I)" aria-label="Italic">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/>
      </svg>
      <span class="btn-label">Italic</span>
    </button>
    <button class="toolbar-btn" data-action="strikethrough" title="Strikethrough" aria-label="Strikethrough">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 4H9a3 3 0 00-3 3v0a3 3 0 003 3h6"/>
        <line x1="4" y1="12" x2="20" y2="12"/>
        <path d="M15 12a3 3 0 013 3v0a3 3 0 01-3 3H8"/>
      </svg>
      <span class="btn-label">Strike</span>
    </button>
  </div>

  <div class="toolbar-divider"></div>

  <div class="toolbar-group">
    <button class="toolbar-btn" data-action="h1" title="Heading 1" aria-label="Heading 1">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 12h8"/><path d="M4 4v16"/><path d="M12 4v16"/><path d="M17 16l3-4 2 2-3 5h-2z"/>
      </svg>
      <span class="btn-label">H1</span>
    </button>
    <button class="toolbar-btn" data-action="h2" title="Heading 2" aria-label="Heading 2">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 12h8"/><path d="M4 4v16"/><path d="M12 4v16"/><path d="M18 14h3l-1.5 3h1.5a1.5 1.5 0 010 3h-3"/>
      </svg>
      <span class="btn-label">H2</span>
    </button>
    <button class="toolbar-btn" data-action="h3" title="Heading 3" aria-label="Heading 3">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 12h8"/><path d="M4 4v16"/><path d="M12 4v16"/><path d="M16.5 17h4a.5.5 0 010 1h-4a.5.5 0 010-1"/><path d="M18.5 14a2 2 0 012 2v2a2 2 0 01-2 2h-2v-4a2 2 0 012-2z"/>
      </svg>
      <span class="btn-label">H3</span>
    </button>
  </div>

  <div class="toolbar-divider"></div>

  <div class="toolbar-group">
    <button class="toolbar-btn" data-action="ul" title="Unordered List" aria-label="Unordered List">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
        <circle cx="4" cy="6" r="1" fill="currentColor"/><circle cx="4" cy="12" r="1" fill="currentColor"/><circle cx="4" cy="18" r="1" fill="currentColor"/>
      </svg>
      <span class="btn-label">List</span>
    </button>
    <button class="toolbar-btn" data-action="ol" title="Ordered List" aria-label="Ordered List">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/>
        <path d="M4 5h2"/><path d="M5 3v4"/><path d="M3 17l1.5-2H4a1 1 0 010-2h1a1 1 0 011 1"/><path d="M4 11l1.5 2H4a1 1 0 010 2h1a1 1 0 01-1-1"/>
      </svg>
      <span class="btn-label">Numbered</span>
    </button>
    <button class="toolbar-btn" data-action="checklist" title="Checklist" aria-label="Checklist">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
      </svg>
      <span class="btn-label">Check</span>
    </button>
  </div>

  <div class="toolbar-divider"></div>

  <div class="toolbar-group">
    <button class="toolbar-btn" data-action="link" title="Insert Link (Ctrl+K)" aria-label="Insert Link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
      </svg>
      <span class="btn-label">Link</span>
    </button>
    <button class="toolbar-btn" data-action="code" title="Inline Code" aria-label="Inline Code">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
      </svg>
      <span class="btn-label">Code</span>
    </button>
    <button class="toolbar-btn" data-action="codeblock" title="Code Block" aria-label="Code Block">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <polyline points="9 15 6 12 9 9"/><polyline points="15 9 18 12 15 15"/>
      </svg>
      <span class="btn-label">Block</span>
    </button>
    <button class="toolbar-btn" data-action="quote" title="Blockquote" aria-label="Blockquote">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H5c-1.25 0-2 .75-2 2v4c0 1.25.75 2 2 2h1c0 3-1.5 4.5-3 5"/>
        <path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-3c-1.25 0-2 .75-2 2v4c0 1.25.75 2 2 2h1c0 3-1.5 4.5-3 5"/>
      </svg>
      <span class="btn-label">Quote</span>
    </button>
    <button class="toolbar-btn" data-action="hr" title="Horizontal Rule" aria-label="Horizontal Rule">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <line x1="2" y1="12" x2="22" y2="12"/>
      </svg>
    </button>
  </div>
</nav>

<!-- Main Content -->
<main class="main-content">
  <!-- Editor Pane -->
  <section class="pane editor-pane" aria-label="Markdown editor">
    <div class="pane-header">
      <div class="pane-title"><span class="dot"></span>Editor</div>
      <span class="pane-title" id="cursorPos" style="font-weight:400; letter-spacing:0; text-transform:none;">Ln 1, Col 1</span>
    </div>
    <div class="pane-body">
      <textarea id="editor" spellcheck="false" placeholder="Start writing markdown..."></textarea>
    </div>
  </section>

  <!-- Resizable Divider -->
  <div class="pane-divider" id="divider" role="separator" aria-label="Resize panes"></div>

  <!-- Preview Pane -->
  <section class="pane preview-pane" aria-label="Markdown preview">
    <div class="pane-header">
      <div class="pane-title"><span class="dot"></span>Preview</div>
    </div>
    <div class="pane-body">
      <div class="preview-body" id="preview"></div>
    </div>
  </section>
</main>

<!-- Status Bar -->
<footer class="status-bar">
  <div class="status-left">
    <span class="status-item">
      <span class="status-label">Words: </span><strong id="wordCount">0</strong>
    </span>
    <span class="status-item">
      <span class="status-label">Chars: </span><strong id="charCount">0</strong>
    </span>
    <span class="status-item">
      <span class="status-label">Lines: </span><strong id="lineCount">0</strong>
    </span>
  </div>
  <div class="status-right">
    <span class="status-item" id="autoSaveStatus">
      <span style="color: var(--success);">●</span> Ready
    </span>
  </div>
</footer>

<!-- Toast -->
<div class="toast" id="toast" role="alert" aria-live="polite">
  <span class="toast-icon">&#10003;</span>
  <span id="toastMsg">Copied to clipboard</span>
</div>

<script>
  /* ── DOM References ── */
  const editor = document.getElementById('editor');
  const preview = document.getElementById('preview');
  const wordCountEl = document.getElementById('wordCount');
  const charCountEl = document.getElementById('charCount');
  const lineCountEl = document.getElementById('lineCount');
  const cursorPosEl = document.getElementById('cursorPos');
  const toast = document.getElementById('toast');
  const toastMsg = document.getElementById('toastMsg');
  const divider = document.getElementById('divider');

  /* ── Default Sample Content ── */
  const defaultContent = `# Welcome to Markdown Editor

A powerful, real-time markdown editor with **live preview** and a beautiful dark theme. Start typing on the left and watch your formatted content appear on the right.

## Features

This editor supports all the markdown syntax you need for everyday writing:

- **Live preview** with instant rendering
- **Formatting toolbar** for quick access
- **Keyboard shortcuts** for efficient editing
- **Word count** and character statistics
- **Responsive design** that works on any device

## Formatting Examples

### Text Styles

You can write in **bold**, *italic*, or ***both***. Use ~~strikethrough~~ to cross things out. Need \`inline code\`? That works too.

### Links & Images

Create [hyperlinks](https://example.com) easily, or embed images:

### Code Blocks

Here's a JavaScript example:

\`\`\`javascript
function fibonacci(n) {
  if (n <= 1) return n;
  return fibonacci(n - 1) + fibonacci(n - 2);
}

// Generate first 10 numbers
const sequence = Array.from(
  { length: 10 },
  (_, i) => fibonacci(i)
);
console.log(sequence);
\`\`\`

And a Python one:

\`\`\`python
class MarkdownParser:
    def __init__(self, text):
        self.text = text
        self.tokens = []

    def parse(self):
        for line in self.text.split("\\n"):
            self.tokenize(line)
        return self.render()
\`\`\`

### Blockquotes

> "The best way to predict the future is to invent it."
> — Alan Kay

> **Note:** This editor processes markdown in real-time. All parsing happens locally in your browser — no data is sent anywhere.

### Lists

Unordered list:

- First item with some detail
- Second item with **emphasis**
- Third item with a [link](https://example.com)

Ordered list:

1. Open the editor
2. Start writing markdown
3. See the live preview instantly
4. Export or copy your work

### Horizontal Rule

---

## Keyboard Shortcuts

| Shortcut | Action |
|----------|--------|
| Ctrl + B | Bold |
| Ctrl + I | Italic |
| Ctrl + K | Insert link |

---

*Start editing to see the magic happen!*
`;

  /* ── Initialize Editor ── */
  editor.value = defaultContent;

  /* ── Markdown Parser ── */
  function parseMarkdown(md) {
    /* Store code blocks to prevent internal processing */
    const codeBlocks = [];
    const inlineCodes = [];

    /* Extract fenced code blocks */
    let html = md.replace(/```(\w*)\n([\s\S]*?)```/g, function(match, lang, code) {
      const idx = codeBlocks.length;
      codeBlocks.push('<pre><code class="lang-' + (lang || 'text') + '">' + escapeHtml(code.trimEnd()) + '</code></pre>');
      return '%%CODEBLOCK_' + idx + '%%';
    });

    /* Extract inline code */
    html = html.replace(/`([^`\n]+)`/g, function(match, code) {
      const idx = inlineCodes.length;
      inlineCodes.push('<code>' + escapeHtml(code) + '</code>');
      return '%%INLINECODE_' + idx + '%%';
    });

    /* Process lines */
    const lines = html.split('\n');
    let result = [];
    let inUl = false;
    let inOl = false;
    let inBlockquote = false;

    for (let i = 0; i < lines.length; i++) {
      let line = lines[i];

      /* Close lists/blockquote if empty or non-matching */
      const trimmed = line.trim();

      if (trimmed === '') {
        if (inUl) { result.push('</ul>'); inUl = false; }
        if (inOl) { result.push('</ol>'); inOl = false; }
        if (inBlockquote) { result.push('</blockquote>'); inBlockquote = false; }
        result.push('');
        continue;
      }

      /* Check for code block placeholders */
      if (/^%%CODEBLOCK_\d+%%$/.test(trimmed)) {
        if (inUl) { result.push('</ul>'); inUl = false; }
        if (inOl) { result.push('</ol>'); inOl = false; }
        if (inBlockquote) { result.push('</blockquote>'); inBlockquote = false; }
        result.push(trimmed);
        continue;
      }

      /* Horizontal rule */
      if (/^(-{3,}|\*{3,}|_{3,})$/.test(trimmed)) {
        if (inUl) { result.push('</ul>'); inUl = false; }
        if (inOl) { result.push('</ol>'); inOl = false; }
        if (inBlockquote) { result.push('</blockquote>'); inBlockquote = false; }
        result.push('<hr>');
        continue;
      }

      /* Headings */
      const headingMatch = trimmed.match(/^(#{1,6})\s+(.+)$/);
      if (headingMatch) {
        if (inUl) { result.push('</ul>'); inUl = false; }
        if (inOl) { result.push('</ol>'); inOl = false; }
        if (inBlockquote) { result.push('</blockquote>'); inBlockquote = false; }
        const level = headingMatch[1].length;
        const text = processInline(headingMatch[2]);
        result.push('<h' + level + '>' + text + '</h' + level + '>');
        continue;
      }

      /* Blockquote */
      const quoteMatch = trimmed.match(/^>\s?(.*)$/);
      if (quoteMatch) {
        if (inUl) { result.push('</ul>'); inUl = false; }
        if (inOl) { result.push('</ol>'); inOl = false; }
        if (!inBlockquote) {
          result.push('<blockquote>');
          inBlockquote = true;
        }
        result.push('<p>' + processInline(quoteMatch[1]) + '</p>');
        continue;
      }

      /* Unordered list */
      const ulMatch = trimmed.match(/^[-*+]\s+(.+)$/);
      if (ulMatch) {
        if (inOl) { result.push('</ol>'); inOl = false; }
        if (inBlockquote) { result.push('</blockquote>'); inBlockquote = false; }
        if (!inUl) {
          result.push('<ul>');
          inUl = true;
        }
        result.push('<li>' + processInline(ulMatch[1]) + '</li>');
        continue;
      }

      /* Ordered list */
      const olMatch = trimmed.match(/^\d+\.\s+(.+)$/);
      if (olMatch) {
        if (inUl) { result.push('</ul>'); inUl = false; }
        if (inBlockquote) { result.push('</blockquote>'); inBlockquote = false; }
        if (!inOl) {
          result.push('<ol>');
          inOl = true;
        }
        result.push('<li>' + processInline(olMatch[1]) + '</li>');
        continue;
      }

      /* Paragraph */
      if (inUl) { result.push('</ul>'); inUl = false; }
      if (inOl) { result.push('</ol>'); inOl = false; }
      if (inBlockquote) { result.push('</blockquote>'); inBlockquote = false; }
      result.push('<p>' + processInline(trimmed) + '</p>');
    }

    /* Close any remaining open tags */
    if (inUl) result.push('</ul>');
    if (inOl) result.push('</ol>');
    if (inBlockquote) result.push('</blockquote>');

    let output = result.join('\n');

    /* Restore code blocks */
    output = output.replace(/%%CODEBLOCK_(\d+)%%/g, function(m, idx) {
      return codeBlocks[parseInt(idx)];
    });

    /* Restore inline code */
    output = output.replace(/%%INLINECODE_(\d+)%%/g, function(m, idx) {
      return inlineCodes[parseInt(idx)];
    });

    /* Clean up empty paragraphs */
    output = output.replace(/<p>\s*<\/p>/g, '');

    return output;
  }

  /* Process inline markdown: bold, italic, strikethrough, links, images */
  function processInline(text) {
    /* Images */
    text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
    /* Links */
    text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
    /* Bold + Italic */
    text = text.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    text = text.replace(/___(.+?)___/g, '<strong><em>$1</em></strong>');
    /* Bold */
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/__(.+?)__/g, '<strong>$1</strong>');
    /* Italic */
    text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
    text = text.replace(/_(.+?)_/g, '<em>$1</em>');
    /* Strikethrough */
    text = text.replace(/~~(.+?)~~/g, '<del>$1</del>');
    return text;
  }

  /* Escape HTML entities */
  function escapeHtml(text) {
    const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
    return text.replace(/[&<>"']/g, function(m) { return map[m]; });
  }

  /* ── Update Preview ── */
  function updatePreview() {
    const md = editor.value;
    preview.innerHTML = parseMarkdown(md);
    updateStats(md);
  }

  /* ── Update Stats ── */
  function updateStats(text) {
    /* Words: split by whitespace, filter empty */
    const words = text.trim() ? text.trim().split(/\s+/).length : 0;
    const chars = text.length;
    const lines = text ? text.split('\n').length : 0;

    wordCountEl.textContent = words;
    charCountEl.textContent = chars;
    lineCountEl.textContent = lines;
  }

  /* ── Update Cursor Position ── */
  function updateCursorPosition() {
    const text = editor.value;
    const pos = editor.selectionStart;
    const lines = text.substring(0, pos).split('\n');
    const ln = lines.length;
    const col = lines[lines.length - 1].length + 1;
    cursorPosEl.textContent = 'Ln ' + ln + ', Col ' + col;
  }

  /* ── Toolbar Actions ── */
  const actions = {
    bold: function() { wrapSelection('**', '**'); },
    italic: function() { wrapSelection('*', '*'); },
    strikethrough: function() { wrapSelection('~~', '~~'); },
    h1: function() { prependLine('# '); },
    h2: function() { prependLine('## '); },
    h3: function() { prependLine('### '); },
    ul: function() { prependLine('- '); },
    ol: function() { prependLine('1. '); },
    checklist: function() { prependLine('- [ ] '); },
    link: function() { wrapSelection('[', '](https://example.com)'); },
    code: function() { wrapSelection('`', '`'); },
    codeblock: function() { wrapSelection('\n```\n', '\n```\n'); },
    quote: function() { prependLine('> '); },
    hr: function() { insertAtCursor('\n---\n'); }
  };

  function wrapSelection(before, after) {
    const start = editor.selectionStart;
    const end = editor.selectionEnd;
    const selected = editor.value.substring(start, end);
    const text = selected || 'text';
    const replacement = before + text + after;

    editor.focus();
    /* Use execCommand for undo support */
    document.execCommand('insertText', false, replacement);

    /* Select the inserted text (not the markers) */
    editor.selectionStart = start + before.length;
    editor.selectionEnd = start + before.length + text.length;

    updatePreview();
  }

  function prependLine(prefix) {
    const start = editor.selectionStart;
    const val = editor.value;

    /* Find start of current line */
    let lineStart = val.lastIndexOf('\n', start - 1) + 1;

    editor.selectionStart = lineStart;
    editor.selectionEnd = lineStart;
    editor.focus();
    document.execCommand('insertText', false, prefix);

    updatePreview();
  }

  function insertAtCursor(text) {
    editor.focus();
    const start = editor.selectionStart;
    document.execCommand('insertText', false, text);
    updatePreview();
  }

  /* ── Toolbar Click Handler ── */
  document.querySelectorAll('.toolbar-btn[data-action]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      const action = this.getAttribute('data-action');
      if (actions[action]) actions[action]();
    });
  });

  /* ── Copy Button ── */
  document.getElementById('btnCopy').addEventListener('click', function() {
    navigator.clipboard.writeText(editor.value).then(function() {
      showToast('Markdown copied to clipboard');
    }).catch(function() {
      /* Fallback */
      editor.select();
      document.execCommand('copy');
      showToast('Markdown copied to clipboard');
    });
  });

  /* ── Clear Button ── */
  document.getElementById('btnClear').addEventListener('click', function() {
    if (editor.value.trim() === '') return;
    editor.value = '';
    editor.focus();
    updatePreview();
    showToast('Editor cleared');
  });

  /* ── Toast Notification ── */
  let toastTimer = null;
  function showToast(msg) {
    toastMsg.textContent = msg;
    toast.classList.add('visible');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function() {
      toast.classList.remove('visible');
    }, 2500);
  }

  /* ── Keyboard Shortcuts ── */
  editor.addEventListener('keydown', function(e) {
    /* Tab support */
    if (e.key === 'Tab') {
      e.preventDefault();
      document.execCommand('insertText', false, '  ');
      updatePreview();
      return;
    }

    if (e.ctrlKey || e.metaKey) {
      switch (e.key.toLowerCase()) {
        case 'b':
          e.preventDefault();
          actions.bold();
          break;
        case 'i':
          e.preventDefault();
          actions.italic();
          break;
        case 'k':
          e.preventDefault();
          actions.link();
          break;
      }
    }
  });

  /* ── Input Events ── */
  editor.addEventListener('input', updatePreview);
  editor.addEventListener('click', updateCursorPosition);
  editor.addEventListener('keyup', updateCursorPosition);

  /* ── Resizable Divider ── */
  let isDragging = false;
  const editorPane = document.querySelector('.editor-pane');
  const previewPane = document.querySelector('.preview-pane');

  divider.addEventListener('mousedown', function(e) {
    isDragging = true;
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', function(e) {
    if (!isDragging) return;
    const container = document.querySelector('.main-content');
    const rect = container.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const total = rect.width;
    const pct = Math.max(20, Math.min(80, (x / total) * 100));
    editorPane.style.flex = 'none';
    editorPane.style.width = pct + '%';
    previewPane.style.flex = '1';
  });

  document.addEventListener('mouseup', function() {
    if (isDragging) {
      isDragging = false;
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }
  });

  /* Touch support for divider */
  divider.addEventListener('touchstart', function(e) {
    isDragging = true;
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchmove', function(e) {
    if (!isDragging) return;
    const touch = e.touches[0];
    const container = document.querySelector('.main-content');
    const rect = container.getBoundingClientRect();
    const x = touch.clientX - rect.left;
    const total = rect.width;
    const pct = Math.max(20, Math.min(80, (x / total) * 100));
    editorPane.style.flex = 'none';
    editorPane.style.width = pct + '%';
    previewPane.style.flex = '1';
  }, { passive: false });

  document.addEventListener('touchend', function() {
    isDragging = false;
  });

  /* ── Initial Render ── */
  updatePreview();
  updateCursorPosition();

  /* ── Auto-save to localStorage ── */
  const STORAGE_KEY = 'md-editor-content';

  /* Restore saved content if exists */
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved !== null) {
    editor.value = saved;
    updatePreview();
  }

  /* Save on input */
  editor.addEventListener('input', function() {
    localStorage.setItem(STORAGE_KEY, editor.value);
    const statusEl = document.getElementById('autoSaveStatus');
    statusEl.innerHTML = '<span style="color: var(--accent);">&#9679;</span> Saving...';
    setTimeout(function() {
      statusEl.innerHTML = '<span style="color: var(--success);">&#9679;</span> Saved';
    }, 400);
  });
</script>
</body>
</html>
