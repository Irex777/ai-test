<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Studio — Live Editor</title>
<style>
  :root {
    --bg: #0a0b0f;
    --bg-elev: #12141c;
    --bg-elev-2: #181b25;
    --border: #252937;
    --border-strong: #353a4d;
    --fg: #e8e9ee;
    --fg-muted: #8b8fa3;
    --fg-dim: #5a5e72;
    --accent: #ff6b35;
    --accent-glow: rgba(255, 107, 53, 0.35);
    --accent-2: #ffd166;
    --success: #4ade80;
    --danger: #f43f5e;
    --mono: 'SF Mono', 'JetBrains Mono', Menlo, Monaco, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: var(--sans);
    background: var(--bg);
    color: var(--fg);
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(900px 600px at 12% 8%, rgba(255, 107, 53, 0.08), transparent 60%),
      radial-gradient(700px 500px at 92% 92%, rgba(255, 209, 102, 0.06), transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ========== HEADER ========== */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 22px;
    background: rgba(18, 20, 28, 0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    gap: 16px;
    flex-shrink: 0;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 18px;
    color: #0a0b0f;
    box-shadow: 0 0 24px var(--accent-glow);
    position: relative;
    overflow: hidden;
  }
  .logo::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.3) 50%, transparent 60%);
    animation: shine 3s infinite;
  }
  @keyframes shine {
    0% { transform: translateX(-100%); }
    50%, 100% { transform: translateX(100%); }
  }

  .brand-text h1 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .brand-text p {
    font-size: 11px;
    color: var(--fg-muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .stats {
    display: flex;
    gap: 18px;
    align-items: center;
    font-size: 12px;
    color: var(--fg-muted);
  }
  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 1.2;
  }
  .stat-value {
    color: var(--fg);
    font-weight: 700;
    font-size: 15px;
    font-variant-numeric: tabular-nums;
  }
  .stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--fg-dim);
  }

  .actions {
    display: flex;
    gap: 8px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    color: var(--fg);
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s ease;
    font-family: inherit;
  }
  .btn:hover {
    background: var(--border);
    border-color: var(--border-strong);
    transform: translateY(-1px);
  }
  .btn:active { transform: translateY(0); }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #ff8559);
    border-color: transparent;
    color: #0a0b0f;
    font-weight: 600;
  }
  .btn-primary:hover {
    box-shadow: 0 4px 16px var(--accent-glow);
  }
  .btn svg { width: 14px; height: 14px; }

  /* ========== TOOLBAR ========== */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 8px 16px;
    background: var(--bg-elev);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    flex-shrink: 0;
  }
  .toolbar::-webkit-scrollbar { height: 4px; }
  .toolbar::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

  .tool-btn {
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: 1px solid transparent;
    color: var(--fg-muted);
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.15s ease;
    flex-shrink: 0;
    font-family: inherit;
  }
  .tool-btn:hover {
    background: var(--bg-elev-2);
    color: var(--accent);
    border-color: var(--border);
  }
  .tool-btn:active { transform: scale(0.94); }
  .tool-btn svg { width: 16px; height: 16px; }
  .tool-divider {
    width: 1px;
    height: 20px;
    background: var(--border);
    margin: 0 4px;
    flex-shrink: 0;
  }

  /* ========== WORKSPACE ========== */
  .workspace {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
    min-height: 0;
  }

  .pane {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
    min-height: 0;
  }

  .pane-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: var(--bg-elev);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--fg-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .pane-header .dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    margin-right: 8px;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent-glow);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .pane-header .right { display: flex; gap: 10px; align-items: center; }
  .pane-tag {
    background: var(--bg-elev-2);
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 10px;
    color: var(--fg-dim);
  }

  .editor-pane { border-right: 1px solid var(--border); }

  .editor-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .editor {
    width: 100%;
    height: 100%;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    padding: 24px 28px;
    color: var(--fg);
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.75;
    tab-size: 2;
    caret-color: var(--accent);
  }
  .editor::-webkit-scrollbar { width: 10px; }
  .editor::-webkit-scrollbar-track { background: transparent; }
  .editor::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 5px;
    border: 2px solid var(--bg);
  }
  .editor::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

  /* Preview */
  .preview-pane { background: var(--bg); }
  .preview {
    flex: 1;
    overflow-y: auto;
    padding: 32px 40px 80px;
    line-height: 1.7;
  }
  .preview::-webkit-scrollbar { width: 10px; }
  .preview::-webkit-scrollbar-track { background: transparent; }
  .preview::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 5px;
    border: 2px solid var(--bg);
  }

  /* ========== PREVIEW STYLES ========== */
  .preview h1, .preview h2, .preview h3, .preview h4 {
    color: var(--fg);
    font-weight: 700;
    line-height: 1.25;
    margin: 28px 0 14px;
    scroll-margin-top: 20px;
  }
  .preview h1:first-child, .preview h2:first-child, .preview h3:first-child { margin-top: 0; }

  .preview h1 {
    font-size: 32px;
    letter-spacing: -0.8px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--border);
    position: relative;
  }
  .preview h1::before {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
  }
  .preview h2 {
    font-size: 24px;
    letter-spacing: -0.4px;
    padding-left: 14px;
    border-left: 4px solid var(--accent);
  }
  .preview h3 {
    font-size: 19px;
    color: var(--accent-2);
  }
  .preview h4 {
    font-size: 16px;
    color: var(--fg-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .preview p {
    margin: 12px 0;
    color: #d4d6e0;
  }

  .preview strong {
    color: var(--fg);
    font-weight: 700;
  }
  .preview em {
    color: var(--accent-2);
    font-style: italic;
  }

  .preview a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px dashed var(--accent);
    transition: all 0.15s;
  }
  .preview a:hover {
    color: var(--accent-2);
    border-bottom-color: var(--accent-2);
    border-bottom-style: solid;
  }

  .preview code {
    font-family: var(--mono);
    font-size: 0.88em;
    background: var(--bg-elev-2);
    color: var(--accent-2);
    padding: 2px 7px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  .preview pre {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    overflow-x: auto;
    margin: 16px 0;
    position: relative;
  }
  .preview pre::before {
    content: '';
    position: absolute;
    top: 0;
    left: 18px;
    right: 18px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.4;
  }
  .preview pre code {
    background: transparent;
    border: none;
    padding: 0;
    color: #d4d6e0;
    font-size: 13px;
    line-height: 1.6;
    display: block;
  }

  .preview blockquote {
    margin: 16px 0;
    padding: 12px 18px;
    background: linear-gradient(90deg, rgba(255, 107, 53, 0.08), transparent);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    color: var(--fg-muted);
    font-style: italic;
  }
  .preview blockquote p { margin: 4px 0; }

  .preview ul, .preview ol {
    margin: 12px 0;
    padding-left: 24px;
    color: #d4d6e0;
  }
  .preview li { margin: 5px 0; }
  .preview ul li::marker { color: var(--accent); }
  .preview ol li::marker { color: var(--accent-2); font-weight: 700; }

  .preview hr {
    border: none;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border-strong), transparent);
    margin: 24px 0;
  }

  .preview table {
    border-collapse: collapse;
    width: 100%;
    margin: 16px 0;
    font-size: 14px;
  }
  .preview th, .preview td {
    border: 1px solid var(--border);
    padding: 8px 12px;
    text-align: left;
  }
  .preview th {
    background: var(--bg-elev-2);
    color: var(--accent-2);
    font-weight: 600;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg-elev-2);
    border: 1px solid var(--border-strong);
    color: var(--fg);
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    box-shadow: 0 12px 32px rgba(0,0,0,0.5);
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast .toast-icon {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--success);
    color: #0a0b0f;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
  }

  /* Mobile */
  .mobile-tabs {
    display: none;
    background: var(--bg-elev);
    border-bottom: 1px solid var(--border);
    padding: 6px;
    gap: 4px;
    flex-shrink: 0;
  }
  .mobile-tab {
    flex: 1;
    padding: 8px;
    text-align: center;
    background: transparent;
    border: none;
    color: var(--fg-muted);
    font-size: 12px;
    font-weight: 600;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .mobile-tab.active {
    background: var(--bg-elev-2);
    color: var(--accent);
  }

  @media (max-width: 820px) {
    .stats { display: none; }
    .brand-text p { display: none; }
    header { padding: 12px 16px; }
    .mobile-tabs { display: flex; }
    .workspace {
      grid-template-columns: 1fr;
    }
    .editor-pane {
      display: none;
    }
    .preview-pane {
      display: none;
    }
    .workspace[data-view="edit"] .editor-pane { display: flex; }
    .workspace[data-view="preview"] .preview-pane { display: flex; }
    .preview { padding: 22px; }
    .editor { padding: 18px; font-size: 13px; }
  }

  /* Empty state subtle hint */
  .scroll-fade {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 40px;
    background: linear-gradient(to top, var(--bg), transparent);
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="brand">
      <div class="logo">M</div>
      <div class="brand-text">
        <h1>Markdown Studio</h1>
        <p>Live Editor · Pure HTML</p>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <span class="stat-value" id="wordCount">0</span>
        <span class="stat-label">Words</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="charCount">0</span>
        <span class="stat-label">Chars</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="lineCount">0</span>
        <span class="stat-label">Lines</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="readTime">0</span>
        <span class="stat-label">Min read</span>
      </div>
    </div>

    <div class="actions">
      <button class="btn" id="clearBtn" title="Clear content">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        Clear
      </button>
      <button class="btn btn-primary" id="copyBtn" title="Copy markdown">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy Markdown
      </button>
    </div>
  </header>

  <div class="toolbar" id="toolbar">
    <button class="tool-btn" data-md="heading1" title="Heading 1">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h8M4 18V6M12 18V6M17 12l3-2v8"/></svg>
    </button>
    <button class="tool-btn" data-md="heading2" title="Heading 2">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h8M4 18V6M12 18V6M21 18h-4c0-4 4-3 4-6 0-1.5-2-2.5-4-1"/></svg>
    </button>
    <div class="tool-divider"></div>
    <button class="tool-btn" data-md="bold" title="Bold (Ctrl+B)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/></svg>
    </button>
    <button class="tool-btn" data-md="italic" title="Italic (Ctrl+I)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg>
    </button>
    <button class="tool-btn" data-md="code" title="Inline code">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
    </button>
    <div class="tool-divider"></div>
    <button class="tool-btn" data-md="link" title="Link (Ctrl+K)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
    </button>
    <button class="tool-btn" data-md="quote" title="Blockquote">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2-2-2H4c-1.25 0-2 .75-2 2v8c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2zm12 0c3 0 7-1 7-8V5c0-1.25-.757-2-2-2h-4c-1.25 0-2 .75-2 2v8c0 1.25.75 2 2 2h.75c0 2 .25 2-1.75 2v1c0 1-1 2-2 2z"/></svg>
    </button>
    <div class="tool-divider"></div>
    <button class="tool-btn" data-md="ul" title="Bullet list">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    </button>
    <button class="tool-btn" data-md="ol" title="Numbered list">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4M4 10h2M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/></svg>
    </button>
    <button class="tool-btn" data-md="codeblock" title="Code block">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="18" rx="2"/><path d="M9 9l-2 3 2 3M15 9l2 3-2 3"/></svg>
    </button>
    <div class="tool-divider"></div>
    <button class="tool-btn" data-md="hr" title="Divider">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="6" x2="20" y2="6" opacity="0.4"/><line x1="4" y1="18" x2="20" y2="18" opacity="0.4"/></svg>
    </button>
  </div>

  <div class="mobile-tabs">
    <button class="mobile-tab active" data-tab="edit">Editor</button>
    <button class="mobile-tab" data-tab="preview">Preview</button>
  </div>

  <div class="workspace" id="workspace" data-view="edit">

    <div class="pane editor-pane">
      <div class="pane-header">
        <span><span class="dot"></span>Markdown Input</span>
        <div class="right">
          <span class="pane-tag">.md</span>
        </div>
      </div>
      <div class="editor-wrap">
        <textarea class="editor" id="editor" spellcheck="false" placeholder="Start writing markdown..."></textarea>
      </div>
    </div>

    <div class="pane preview-pane">
      <div class="pane-header">
        <span><span class="dot" style="background:var(--accent-2); box-shadow:0 0 8px rgba(255,209,102,0.4);"></span>Live Preview</span>
        <div class="right">
          <span class="pane-tag" id="syncTag">synced</span>
        </div>
      </div>
      <div class="preview" id="preview"></div>
    </div>

  </div>
</div>

<div class="toast" id="toast">
  <span class="toast-icon">✓</span>
  <span id="toastMsg">Copied to clipboard</span>
</div>

<script>
(function() {
  'use strict';

  const editor = document.getElementById('editor');
  const preview = document.getElementById('preview');
  const wordCountEl = document.getElementById('wordCount');
  const charCountEl = document.getElementById('charCount');
  const lineCountEl = document.getElementById('lineCount');
  const readTimeEl = document.getElementById('readTime');
  const copyBtn = document.getElementById('copyBtn');
  const clearBtn = document.getElementById('clearBtn');
  const toast = document.getElementById('toast');
  const toastMsg = document.getElementById('toastMsg');
  const syncTag = document.getElementById('syncTag');

  // ============== DEFAULT CONTENT ==============
  const defaultContent = `# Welcome to Markdown Studio

A **distraction-free** markdown editor with *live preview*, built as a single HTML file — no frameworks, no build step, no dependencies.

> Great writing tools disappear, leaving you alone with your thoughts.

## Why you'll love it

- **Real-time rendering** — every keystroke is reflected instantly
- *Zero latency* — everything runs locally in your browser
- Works completely \`offline\`
- Thoughtful keyboard shortcuts for power users

## Quick demo

Inline code looks like \`const hello = "world"\`. You can also create [clickable links](https://example.com) that respect your theme.

### A code block

\`\`\`javascript
function greet(name) {
  // Greet the user warmly
  return \`Hello, \${name}! Welcome.\`;
}

console.log(greet('developer'));
\`\`\`

### A numbered checklist

1. Write your first heading
2. Add some **bold** and *italic* text
3. Drop in a blockquote for emphasis
4. Share your masterpiece

---

## Keyboard shortcuts

| Action | Shortcut |
| --- | --- |
| Bold | Ctrl/Cmd + B |
| Italic | Ctrl/Cmd + I |
| Link | Ctrl/Cmd + K |

Press the toolbar buttons or use shortcuts — then hit **Copy Markdown** when you're done. Happy writing!`;

  // ============== MARKDOWN PARSER ==============
  function escapeHtml(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function parseInline(text) {
    // Inline code first to protect content
    const codeStash = [];
    text = text.replace(/`([^`]+)`/g, (m, c) => {
      codeStash.push(c);
      return `\u0000CODE${codeStash.length - 1}\u0000`;
    });

    // Escape remaining HTML
    text = escapeHtml(text);

    // Images
    text = text.replace(/!\[([^\]]*)\]\(([^)\s]+)(?:\s+"([^"]*)")?\)/g,
      (m, alt, url, title) => `<img src="${url}" alt="${alt}"${title ? ` title="${title}"` : ''}>`);

    // Links
    text = text.replace(/\[([^\]]+)\]\(([^)\s]+)(?:\s+"([^"]*)")?\)/g,
      (m, label, url, title) => `<a href="${url}" target="_blank" rel="noopener noreferrer"${title ? ` title="${title}"` : ''}>${label}</a>`);

    // Bold (must come before italic)
    text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/__([^_]+)__/g, '<strong>$1</strong>');

    // Italic
    text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    text = text.replace(/(?<!\w)_([^_]+)_(?!\w)/g, '<em>$1</em>');

    // Strikethrough
    text = text.replace(/~~([^~]+)~~/g, '<del>$1</del>');

    // Restore code
    text = text.replace(/\u0000CODE(\d+)\u0000/g, (m, i) => `<code>${escapeHtml(codeStash[+i])}</code>`);

    return text;
  }

  function parseMarkdown(md) {
    if (!md.trim()) return '<p style="color:var(--fg-dim); text-align:center; padding:40px 0;">Nothing to preview yet. Start typing in the editor.</p>';

    const lines = md.split('\n');
    const html = [];
    let i = 0;
    let inList = null; // 'ul' | 'ol' | null
    let inBlockquote = false;

    function closeList() {
      if (inList) {
        html.push(`</${inList}>`);
        inList = null;
      }
    }
    function closeBlockquote() {
      if (inBlockquote) {
        html.push('</blockquote>');
        inBlockquote = false;
      }
    }

    while (i < lines.length) {
      let line = lines[i];

      // Code block
      const fence = line.match(/^```(\w*)/);
      if (fence) {
        closeList();
        closeBlockquote();
        const lang = fence[1] || '';
        const codeLines = [];
        i++;
        while (i < lines.length && !/^```/.test(lines[i])) {
          codeLines.push(lines[i]);
          i++;
        }
        i++; // skip closing fence
        const code = escapeHtml(codeLines.join('\n'));
        html.push(`<pre><code${lang ? ` class="language-${lang}"` : ''}>${code}</code></pre>`);
        continue;
      }

      // Horizontal rule
      if (/^(\s*[-*_]\s*){3,}$/.test(line) || /^---+$/.test(line.trim())) {
        closeList();
        closeBlockquote();
        html.push('<hr>');
        i++;
        continue;
      }

      // Heading
      const heading = line.match(/^(#{1,6})\s+(.+?)\s*#*\s*$/);
      if (heading) {
        closeList();
        closeBlockquote();
        const level = heading[1].length;
        html.push(`<h${level}>${parseInline(heading[2])}</h${level}>`);
        i++;
        continue;
      }

      // Blockquote
      const quote = line.match(/^>\s?(.*)/);
      if (quote) {
        closeList();
        if (!inBlockquote) {
          html.push('<blockquote>');
          inBlockquote = true;
        }
        html.push(`<p>${parseInline(quote[1])}</p>`);
        i++;
        continue;
      } else {
        closeBlockquote();
      }

      // Unordered list
      const ulItem = line.match(/^[\s]*[-*+]\s+(.+)$/);
      if (ulItem) {
        if (inList !== 'ul') {
          closeList();
          html.push('<ul>');
          inList = 'ul';
        }
        html.push(`<li>${parseInline(ulItem[1])}</li>`);
        i++;
        continue;
      }

      // Ordered list
      const olItem = line.match(/^[\s]*\d+\.\s+(.+)$/);
      if (olItem) {
        if (inList !== 'ol') {
          closeList();
          html.push('<ol>');
          inList = 'ol';
        }
        html.push(`<li>${parseInline(olItem[1])}</li>`);
        i++;
        continue;
      }

      // Table (basic support)
      if (line.includes('|') && i + 1 < lines.length && /^\s*\|?[\s\-:|]+\|?\s*$/.test(lines[i + 1])) {
        closeList();
        closeBlockquote();
        const headers = line.split('|').map(s => s.trim()).filter(s => s !== '' || true).slice(
          line.startsWith('|') ? 1 : 0,
          line.endsWith('|') ? -1 : undefined
        );
        i += 2; // skip header + separator
        const rows = [];
        while (i < lines.length && lines[i].includes('|') && lines[i].trim()) {
          const cells = lines[i].split('|').map(s => s.trim());
          if (lines[i].startsWith('|')) cells.shift();
          if (lines[i].endsWith('|')) cells.pop();
          rows.push(cells);
          i++;
        }
        let table = '<table><thead><tr>';
        headers.forEach(h => table += `<th>${parseInline(h)}</th>`);
        table += '</tr></thead><tbody>';
        rows.forEach(row => {
          table += '<tr>';
          row.forEach(cell => table += `<td>${parseInline(cell)}</td>`);
          table += '</tr>';
        });
        table += '</tbody></table>';
        html.push(table);
        continue;
      }

      // Empty line
      if (line.trim() === '') {
        closeList();
        i++;
        continue;
      }

      // Paragraph
      closeList();
      const paraLines = [line];
      i++;
      while (i < lines.length && lines[i].trim() !== '' &&
             !/^(#{1,6})\s/.test(lines[i]) &&
             !/^```/.test(lines[i]) &&
             !/^>\s?/.test(lines[i]) &&
             !/^[\s]*[-*+]\s/.test(lines[i]) &&
             !/^[\s]*\d+\.\s/.test(lines[i]) &&
             !/^(\s*[-*_]\s*){3,}$/.test(lines[i]) &&
             !/^---+$/.test(lines[i].trim())) {
        paraLines.push(lines[i]);
        i++;
      }
      html.push(`<p>${parseInline(paraLines.join(' '))}</p>`);
    }

    closeList();
    closeBlockquote();
    return html.join('\n');
  }

  // ============== RENDER ==============
  let syncTimer;
  function render() {
    const md = editor.value;
    preview.innerHTML = parseMarkdown(md);

    // Stats
    const text = md.trim();
    const words = text ? text.split(/\s+/).filter(w => w.length > 0).length : 0;
    const chars = md.length;
    const lines = md ? md.split('\n').length : 0;
    const readTime = Math.max(1, Math.ceil(words / 200));

    wordCountEl.textContent = words.toLocaleString();
    charCountEl.textContent = chars.toLocaleString();
    lineCountEl.textContent = lines.toLocaleString();
    readTimeEl.textContent = words === 0 ? 0 : readTime;

    // Sync indicator pulse
    syncTag.style.color = 'var(--success)';
    syncTag.textContent = 'synced';
    clearTimeout(syncTimer);
    syncTimer = setTimeout(() => { syncTag.style.color = ''; }, 600);
  }

  editor.addEventListener('input', render);

  // ============== TOOLBAR ACTIONS ==============
  function getSelection() {
    return {
      start: editor.selectionStart,
      end: editor.selectionEnd,
      selected: editor.value.substring(editor.selectionStart, editor.selectionEnd)
    };
  }

  function insertText(before, after = '', placeholder = '') {
    const { start, end, selected } = getSelection();
    const text = selected || placeholder;
    const newText = before + text + after;
    editor.setRangeText(newText, start, end, 'end');
    const cursorPos = selected ? start + newText.length : start + before.length + text.length + after.length;
    editor.setSelectionRange(selected ? start + before.length : start + before.length,
                              selected ? start + before.length + text.length : start + before.length + text.length);
    editor.focus();
    render();
  }

  function insertLinePrefix(prefix) {
    const { start } = getSelection();
    const lineStart = editor.value.lastIndexOf('\n', start - 1) + 1;
    const lineEndIndex = editor.value.indexOf('\n', start);
    const lineEnd = lineEndIndex === -1 ? editor.value.length : lineEndIndex;
    const currentLine = editor.value.substring(lineStart, lineEnd);

    // Toggle: if line already starts with prefix, remove it
    if (currentLine.startsWith(prefix)) {
      const newLine = currentLine.substring(prefix.length);
      editor.setRangeText(newLine, lineStart, lineEnd, 'end');
    } else {
      editor.setRangeText(prefix + currentLine, lineStart, lineEnd, 'end');
    }
    editor.setSelectionRange(lineStart + prefix.length, lineStart + prefix.length);
    editor.focus();
    render();
  }

  function insertBlock(template) {
    const { start } = getSelection();
    editor.setRangeText('\n' + template + '\n', start, start, 'end');
    const newPos = start + 1 + template.indexOf('\n\n') >= 0 ? start + template.indexOf('\n\n') + 1 : start + template.length;
    editor.setSelectionRange(newPos, newPos);
    editor.focus();
    render();
  }

  const actions = {
    heading1: () => insertLinePrefix('# '),
    heading2: () => insertLinePrefix('## '),
    bold: () => insertText('**', '**', 'bold text'),
    italic: () => insertText('*', '*', 'italic text'),
    code: () => insertText('`', '`', 'code'),
    link: () => insertText('[', '](https://)', 'link text'),
    quote: () => insertLinePrefix('> '),
    ul: () => insertLinePrefix('- '),
    ol: () => insertLinePrefix('1. '),
    codeblock: () => {
      const sel = getSelection();
      const inner = sel.selected || 'console.log("hello world");';
      const block = '```\n' + inner + '\n```';
      editor.setRangeText(block, sel.start, sel.end, 'end');
      editor.setSelectionRange(sel.start + 4, sel.start + 4 + inner.length);
      editor.focus();
      render();
    },
    hr: () => {
      const sel = getSelection();
      const block = '\n---\n';
      editor.setRangeText(block, sel.start, sel.end, 'end');
      editor.setSelectionRange(sel.start + block.length, sel.start + block.length);
      editor.focus();
      render();
    }
  };

  document.getElementById('toolbar').addEventListener('click', e => {
    const btn = e.target.closest('[data-md]');
    if (!btn) return;
    const action = btn.getAttribute('data-md');
    if (actions[action]) actions[action]();
  });

  // ============== KEYBOARD SHORTCUTS ==============
  editor.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && !e.altKey) {
      const key = e.key.toLowerCase();
      if (key === 'b') { e.preventDefault(); actions.bold(); }
      else if (key === 'i') { e.preventDefault(); actions.italic(); }
      else if (key === 'k') { e.preventDefault(); actions.link(); }
    }
    if (e.key === 'Tab') {
      e.preventDefault();
      const { start, end } = getSelection();
      editor.setRangeText('  ', start, end, 'end');
      render();
    }
  });

  // ============== COPY ==============
  function showToast(msg) {
    toastMsg.textContent = msg;
    toast.classList.add('show');
    clearTimeout(showToast.t);
    showToast.t = setTimeout(() => toast.classList.remove('show'), 2200);
  }

  copyBtn.addEventListener('click', async () => {
    const text = editor.value;
    try {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
      } else {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
      showToast('Markdown copied to clipboard');
    } catch (err) {
      showToast('Copy failed — select manually');
    }
  });

  // ============== CLEAR ==============
  clearBtn.addEventListener('click', () => {
    if (editor.value.trim() === '') return;
    editor.value = '';
    render();
    editor.focus();
    showToast('Editor cleared');
  });

  // ============== MOBILE TABS ==============
  const workspace = document.getElementById('workspace');
  document.querySelectorAll('.mobile-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.mobile-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      workspace.dataset.view = tab.dataset.tab;
    });
  });

  // ============== INIT ==============
  editor.value = defaultContent;
  render();

  // Smart sync scrolling on desktop
  let syncingScroll = false;
  editor.addEventListener('scroll', () => {
    if (window.innerWidth <= 820) return;
    if (syncingScroll) return;
    syncingScroll = true;
    const ratio = editor.scrollTop / (editor.scrollHeight - editor.clientHeight || 1);
    preview.scrollTop = ratio * (preview.scrollHeight - preview.clientHeight);
    requestAnimationFrame(() => { syncingScroll = false; });
  });

})();
</script>
</body>
</html>
