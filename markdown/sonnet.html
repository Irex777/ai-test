<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Editor with Live Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .toolbar {
            background: #2d2d2d;
            padding: 10px;
            border-bottom: 1px solid #404040;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            align-items: center;
        }

        .toolbar button {
            background: #3d3d3d;
            color: #e0e0e0;
            border: 1px solid #505050;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .toolbar button:hover {
            background: #4d4d4d;
        }

        .stats {
            margin-left: auto;
            color: #888;
            font-size: 12px;
            padding: 5px 10px;
            background: #3d3d3d;
            border-radius: 4px;
        }

        .editor-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .pane {
            flex: 1;
            overflow: auto;
            padding: 20px;
        }

        #editor {
            background: #1e1e1e;
            color: #e0e0e0;
            border: none;
            resize: none;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 14px;
            line-height: 1.6;
            outline: none;
        }

        #preview {
            background: #252525;
            border-left: 1px solid #404040;
        }

        #preview h1 {
            font-size: 2em;
            color: #61dafb;
            margin: 0.5em 0;
            border-bottom: 1px solid #404040;
            padding-bottom: 0.3em;
        }

        #preview h2 {
            font-size: 1.5em;
            color: #61dafb;
            margin: 0.5em 0;
            border-bottom: 1px solid #404040;
            padding-bottom: 0.3em;
        }

        #preview h3 {
            font-size: 1.25em;
            color: #61dafb;
            margin: 0.5em 0;
        }

        #preview p {
            margin: 1em 0;
            line-height: 1.6;
        }

        #preview strong {
            color: #fff;
            font-weight: 600;
        }

        #preview em {
            color: #c5c5c5;
            font-style: italic;
        }

        #preview a {
            color: #61dafb;
            text-decoration: none;
        }

        #preview a:hover {
            text-decoration: underline;
        }

        #preview ul, #preview ol {
            margin: 1em 0;
            padding-left: 2em;
        }

        #preview li {
            margin: 0.5em 0;
        }

        #preview code {
            background: #3d3d3d;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.9em;
            color: #f92672;
        }

        #preview pre {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            margin: 1em 0;
            border: 1px solid #404040;
        }

        #preview pre code {
            background: transparent;
            padding: 0;
            color: #f8f8f2;
        }

        #preview blockquote {
            border-left: 4px solid #61dafb;
            margin: 1em 0;
            padding-left: 15px;
            color: #a0a0a0;
            font-style: italic;
        }

        #preview hr {
            border: none;
            border-top: 1px solid #404040;
            margin: 2em 0;
        }

        #preview img {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
            margin: 1em 0;
        }

        #preview table {
            border-collapse: collapse;
            width: 100%;
            margin: 1em 0;
        }

        #preview th, #preview td {
            border: 1px solid #404040;
            padding: 8px 12px;
            text-align: left;
        }

        #preview th {
            background: #3d3d3d;
            font-weight: 600;
        }

        #preview tr:nth-child(even) {
            background: #2d2d2d;
        }

        @media (max-width: 768px) {
            .editor-container {
                flex-direction: column;
            }

            #preview {
                border-left: none;
                border-top: 1px solid #404040;
            }

            .pane {
                height: 50vh;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="toolbar">
            <button onclick="insertFormat('**', '**')">Bold</button>
            <button onclick="insertFormat('*', '*')">Italic</button>
            <button onclick="insertFormat('[', '](url)')">Link</button>
            <button onclick="insertFormat('![alt](', ')')">Image</button>
            <button onclick="insertLine('# ')">H1</button>
            <button onclick="insertLine('## ')">H2</button>
            <button onclick="insertLine('### ')">H3</button>
            <button onclick="insertLine('- ')" title="List item">• List</button>
            <button onclick="insertLine('1. ')" title="Numbered list">1. List</button>
            <button onclick="insertLine('> ')" title="Blockquote">Quote</button>
            <button onclick="insertFormat('`', '`')" title="Inline code">Code</button>
            <button onclick="insertBlock('``\n', '\n```')" title="Code block">Code Block</button>
            <button onclick="insertLine('---')" title="Horizontal rule">HR</button>
            <button onclick="insertTable()">Table</button>
            <div class="stats">
                <span id="wordCount">0 words</span> | 
                <span id="charCount">0 characters</span>
            </div>
        </div>

        <div class="editor-container">
            <div class="pane">
                <textarea id="editor" class="pane" placeholder="Start typing markdown..."></textarea>
            </div>
            <div id="preview" class="pane"></div>
        </div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        const wordCount = document.getElementById('wordCount');
        const charCount = document.getElementById('charCount');

        const sampleMarkdown = `# Welcome to the Markdown Editor!

This is a **live preview** markdown editor with *tons of features*.

## Features

- **Bold** and *italic* text
- [Links](https://example.com) and images
- Ordered and unordered lists
- \`Inline code\` and code blocks
- Blockquotes and horizontal rules
- Tables and more!

### Code Blocks

\`\`\`javascript
function greet(name) {
    console.log(\`Hello, \${name}!\`);
}
greet('World');
\`\`\`

### Blockquote

> This is a blockquote.
> It can span multiple lines.

### Horizontal Rule

---

### Table Example

| Feature | Status | Notes |
|---------|--------|-------|
| Bold | ✅ | **Working** |
| Italic | ✅ | *Working* |
| Links | ✅ | [Clickable](https://example.com) |
| Images | ✅ | See below |

### Images

![Sample Image](https://via.placeholder.com/400x200/61dafb/ffffff?text=Markdown+Editor)

### Lists

1. First item
2. Second item
3. Third item

Unordered nested list:
- Item 1
  - Nested item
  - Another nested item
- Item 2

### Combined Formatting

You can combine **bold and *italic*** formatting, and even include \`inline code\` in sentences.

---

Start typing to see the live preview in action!`;

        function parseMarkdown(markdown) {
            let html = markdown;

            // Escape HTML special characters
            html = html.replace(/&/g, '&amp;');
            html = html.replace(/</g, '&lt;');
            html = html.replace(/>/g, '&gt;');

            // Code blocks (must be before other parsing)
            html = html.replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');

            // Inline code
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

            // Headers
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

            // Bold and Italic
            html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

            // Links
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

            // Images
            html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');

            // Blockquotes
            html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
            html = html.replace(/<\/blockquote>\n<blockquote>/g, '\n');

            // Horizontal rules
            html = html.replace(/^---$/gm, '<hr>');
            html = html.replace(/^\*\*\*$/gm, '<hr>');

            // Tables
            html = html.replace(/\|(.+)\|\n\|[-|\s]+\|\n((?:\|.+\|\n?)+)/g, (match, header, body) => {
                const headers = header.split('|').filter(h => h.trim()).map(h => `<th>${h.trim()}</th>`).join('');
                const rows = body.trim().split('\n').map(row => {
                    const cells = row.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
                    return `<tr>${cells}</tr>`;
                }).join('');
                return `<table><thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table>`;
            });

            // Unordered lists
            html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');

            // Ordered lists
            html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ol>$&</ol>');

            // Paragraphs
            html = html.replace(/^(?!<[h|u|o|p|b|t|pre])(.+)$/gm, '<p>$1</p>');

            // Clean up empty paragraphs and extra whitespace
            html = html.replace(/<p>\s*<\/p>/g, '');
            html = html.replace(/<p>(<[^>]+>)<\/p>/g, '$1');
            html = html.replace(/\n+/g, '\n');

            return html;
        }

        function updatePreview() {
            const markdown = editor.value;
            preview.innerHTML = parseMarkdown(markdown);
            updateStats(markdown);
        }

        function updateStats(markdown) {
            const words = markdown.trim() ? markdown.trim().split(/\s+/).length : 0;
            const chars = markdown.length;
            wordCount.textContent = `${words} words`;
            charCount.textContent = `${chars} characters`;
        }

        function insertFormat(before, after) {
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            const text = editor.value;
            const selected = text.substring(start, end) || 'text';
            
            editor.value = text.substring(0, start) + before + selected + after + text.substring(end);
            editor.focus();
            editor.setSelectionRange(start + before.length, start + before.length + selected.length);
            updatePreview();
        }

        function insertLine(prefix) {
            const start = editor.selectionStart;
            const text = editor.value;
            const lineStart = text.lastIndexOf('\n', start - 1) + 1;
            
            editor.value = text.substring(0, lineStart) + prefix + text.substring(lineStart);
            editor.focus();
            editor.setSelectionRange(lineStart + prefix.length, lineStart + prefix.length);
            updatePreview();
        }

        function insertBlock(before, after) {
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            const text = editor.value;
            const selected = text.substring(start, end) || 'code here';
            
            const newline = start > 0 && text[start - 1] !== '\n' ? '\n' : '';
            editor.value = text.substring(0, start) + newline + before + selected + after + text.substring(end);
            editor.focus();
            updatePreview();
        }

        function insertTable() {
            const table = `| Header 1 | Header 2 | Header 3 |
|----------|----------|----------|
| Cell 1   | Cell 2   | Cell 3   |
| Cell 4   | Cell 5   | Cell 6   |`;
            
            const start = editor.selectionStart;
            const text = editor.value;
            const newline = start > 0 && text[start - 1] !== '\n' ? '\n\n' : '\n';
            
            editor.value = text.substring(0, start) + newline + table + text.substring(start);
            editor.focus();
            updatePreview();
        }

        // Sync scrolling
        let isScrolling = false;
        
        editor.addEventListener('scroll', () => {
            if (isScrolling) return;
            isScrolling = true;
            const percentage = editor.scrollTop / (editor.scrollHeight - editor.clientHeight);
            preview.scrollTop = percentage * (preview.scrollHeight - preview.clientHeight);
            setTimeout(() => isScrolling = false, 50);
        });

        preview.addEventListener('scroll', () => {
            if (isScrolling) return;
            isScrolling = true;
            const percentage = preview.scrollTop / (preview.scrollHeight - preview.clientHeight);
            editor.scrollTop = percentage * (editor.scrollHeight - editor.clientHeight);
            setTimeout(() => isScrolling = false, 50);
        });

        // Event listeners for live preview
        editor.addEventListener('input', updatePreview);

        // Tab key support for indentation
        editor.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = editor.selectionStart;
                const end = editor.selectionEnd;
                editor.value = editor.value.substring(0, start) + '    ' + editor.value.substring(end);
                editor.selectionStart = editor.selectionEnd = start + 4;
                updatePreview();
            }
        });

        // Initialize with sample content
        editor.value = sampleMarkdown;
        updatePreview();
    </script>
</body>
</html>
