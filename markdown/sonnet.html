<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Editor with Live Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1a1a2e;
            color: #e4e4e7;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            background: #16162a;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #27272a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #f4f4f5;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .word-count {
            font-size: 0.875rem;
            color: #a1a1aa;
        }

        .btn {
            background: #3f3f46;
            color: #f4f4f5;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #52525b;
        }

        .btn:active {
            background: #27272a;
        }

        .toolbar {
            background: #16162a;
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid #27272a;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .toolbar-btn {
            background: #27272a;
            color: #a1a1aa;
            border: 1px solid #3f3f46;
            padding: 0.5rem 0.75rem;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .toolbar-btn:hover {
            background: #3f3f46;
            color: #f4f4f5;
        }

        .toolbar-btn:active {
            background: #52525b;
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .editor-pane, .preview-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .editor-pane {
            border-right: 1px solid #27272a;
        }

        .pane-header {
            background: #16162a;
            padding: 0.75rem 1.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: #a1a1aa;
            border-bottom: 1px solid #27272a;
        }

        .editor-area {
            flex: 1;
            background: #1a1a2e;
            color: #e4e4e7;
            border: none;
            padding: 1.5rem;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.9375rem;
            line-height: 1.6;
            resize: none;
            outline: none;
        }

        .editor-area::placeholder {
            color: #52525b;
        }

        .preview-area {
            flex: 1;
            background: #1a1a2e;
            padding: 1.5rem;
            overflow-y: auto;
            line-height: 1.7;
        }

        .preview-content h1 {
            font-size: 2rem;
            font-weight: 700;
            margin: 1.5rem 0 1rem;
            color: #f4f4f5;
            border-bottom: 1px solid #27272a;
            padding-bottom: 0.5rem;
        }

        .preview-content h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 1.25rem 0 0.75rem;
            color: #f4f4f5;
            border-bottom: 1px solid #27272a;
            padding-bottom: 0.375rem;
        }

        .preview-content h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 1rem 0 0.5rem;
            color: #f4f4f5;
        }

        .preview-content h4, .preview-content h5, .preview-content h6 {
            font-size: 1rem;
            font-weight: 600;
            margin: 0.875rem 0 0.5rem;
            color: #f4f4f5;
        }

        .preview-content p {
            margin: 0.75rem 0;
            color: #d4d4d8;
        }

        .preview-content strong {
            font-weight: 700;
            color: #f4f4f5;
        }

        .preview-content em {
            font-style: italic;
        }

        .preview-content a {
            color: #7c3aed;
            text-decoration: underline;
        }

        .preview-content a:hover {
            color: #8b5cf6;
        }

        .preview-content ul, .preview-content ol {
            margin: 0.75rem 0;
            padding-left: 1.5rem;
        }

        .preview-content ul {
            list-style-type: disc;
        }

        .preview-content ol {
            list-style-type: decimal;
        }

        .preview-content li {
            margin: 0.375rem 0;
            color: #d4d4d8;
        }

        .preview-content code {
            background: #27272a;
            color: #f4f4f5;
            padding: 0.125rem 0.375rem;
            border-radius: 0.25rem;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.875rem;
        }

        .preview-content pre {
            background: #27272a;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin: 0.75rem 0;
        }

        .preview-content pre code {
            background: none;
            padding: 0;
            font-size: 0.875rem;
        }

        .preview-content blockquote {
            border-left: 4px solid #7c3aed;
            padding-left: 1rem;
            margin: 0.75rem 0;
            color: #a1a1aa;
            font-style: italic;
        }

        .preview-content hr {
            border: none;
            border-top: 1px solid #27272a;
            margin: 1.5rem 0;
        }

        .preview-content img {
            max-width: 100%;
            height: auto;
            border-radius: 0.5rem;
            margin: 0.75rem 0;
        }

        .notification {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #22c55e;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            opacity: 0;
            transform: translateY(1rem);
            transition: all 0.3s;
        }

        .notification.show {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }

            .editor-pane {
                border-right: none;
                border-bottom: 1px solid #27272a;
            }

            .editor-pane, .preview-pane {
                min-height: 50%;
            }

            .header {
                padding: 0.75rem 1rem;
            }

            .toolbar {
                padding: 0.5rem 1rem;
            }

            .editor-area, .preview-area {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Markdown Editor</h1>
            <div class="header-actions">
                <span class="word-count" id="wordCount">0 words</span>
                <button class="btn" id="copyBtn">Copy Markdown</button>
            </div>
        </div>

        <div class="toolbar">
            <button class="toolbar-btn" data-format="bold" title="Bold (Ctrl+B)"><strong>B</strong></button>
            <button class="toolbar-btn" data-format="italic" title="Italic (Ctrl+I)"><em>I</em></button>
            <button class="toolbar-btn" data-format="heading" title="Heading (Ctrl+H)">H</button>
            <button class="toolbar-btn" data-format="link" title="Link (Ctrl+L)">🔗</button>
            <button class="toolbar-btn" data-format="list" title="List (Ctrl+Shift+L)">•</button>
            <button class="toolbar-btn" data-format="code" title="Code (Ctrl+K)">&lt;/&gt;</button>
        </div>

        <div class="main-content">
            <div class="editor-pane">
                <div class="pane-header">Editor</div>
                <textarea class="editor-area" id="editor" placeholder="Start typing your markdown here..."></textarea>
            </div>
            <div class="preview-pane">
                <div class="pane-header">Preview</div>
                <div class="preview-area" id="preview">
                    <div class="preview-content" id="previewContent"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="notification" id="notification">Copied to clipboard!</div>

    <script>
        const editor = document.getElementById('editor');
        const previewContent = document.getElementById('previewContent');
        const wordCount = document.getElementById('wordCount');
        const copyBtn = document.getElementById('copyBtn');
        const notification = document.getElementById('notification');
        const toolbarBtns = document.querySelectorAll('.toolbar-btn');

        const defaultContent = `# Welcome to Markdown Editor

This is a **live preview** markdown editor with a clean, dark interface.

## Features

- **Bold** and *italic* text formatting
- Multiple heading levels
- [Links](https://example.com) and inline code
- Lists (ordered and unordered)
- Code blocks with syntax highlighting ready
- Blockquotes for emphasis

### Code Example

\`\`\`javascript
function greet(name) {
    console.log(\`Hello, \${name}!\`);
}
greet('World');
\`\`\`

### Blockquote

> "The best way to predict the future is to create it."
> — Peter Drucker

---

Start editing to see the live preview in action!`;

        editor.value = defaultContent;

        function parseMarkdown(markdown) {
            let html = markdown
                // Escape HTML
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                
                // Code blocks (must be before other processing)
                .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code class="language-$1">$2</code></pre>')
                
                // Inline code
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                
                // Headers
                .replace(/^###### (.*$)/gm, '<h6>$1</h6>')
                .replace(/^##### (.*$)/gm, '<h5>$1</h5>')
                .replace(/^#### (.*$)/gm, '<h4>$1</h4>')
                .replace(/^### (.*$)/gm, '<h3>$1</h3>')
                .replace(/^## (.*$)/gm, '<h2>$1</h2>')
                .replace(/^# (.*$)/gm, '<h1>$1</h1>')
                
                // Bold and Italic combinations
                .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
                .replace(/___(.+?)___/g, '<strong><em>$1</em></strong>')
                
                // Bold
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/__(.+?)__/g, '<strong>$1</strong>')
                
                // Italic
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/_(.+?)_/g, '<em>$1</em>')
                
                // Links
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
                
                // Images
                .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">')
                
                // Blockquotes
                .replace(/^&gt; (.*$)/gm, '<blockquote>$1</blockquote>')
                
                // Unordered lists
                .replace(/^\* (.*$)/gm, '<li>$1</li>')
                .replace(/^- (.*$)/gm, '<li>$1</li>')
                
                // Ordered lists
                .replace(/^\d+\. (.*$)/gm, '<li>$1</li>')
                
                // Horizontal rule
                .replace(/^---$/gm, '<hr>')
                .replace(/^\*\*\*$/gm, '<hr>')
                
                // Paragraphs (must be last)
                .replace(/^(?!<[h|l|p|b|u|o|h|pre])(.+)$/gm, '<p>$1</p>')
                
                // Fix consecutive list items
                .replace(/<\/li>\n<li>/g, '</li><li>')
                
                // Wrap lists
                .replace(/(<li>.*<\/li>)/g, '<ul>$1</ul>')
                .replace(/<\/ul>\n<ul>/g, '');

            // Clean up nested lists and multiple ul tags
            html = html.replace(/<\/ul>\s*<ul>/g, '');
            
            // Remove empty paragraphs
            html = html.replace(/<p><\/p>/g, '');
            
            return html;
        }

        function updatePreview() {
            const markdown = editor.value;
            previewContent.innerHTML = parseMarkdown(markdown);
            updateWordCount(markdown);
        }

        function updateWordCount(text) {
            const words = text.trim().split(/\s+/).filter(word => word.length > 0);
            const count = words.length;
            wordCount.textContent = `${count} word${count !== 1 ? 's' : ''}`;
        }

        function showNotification() {
            notification.classList.add('show');
            setTimeout(() => {
                notification.classList.remove('show');
            }, 2000);
        }

        function insertFormat(format) {
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            const text = editor.value;
            const selectedText = text.substring(start, end);
            
            let insertion = '';
            let cursorOffset = 0;

            switch(format) {
                case 'bold':
                    insertion = `**${selectedText || 'bold text'}**`;
                    cursorOffset = selectedText ? insertion.length : 2;
                    break;
                case 'italic':
                    insertion = `*${selectedText || 'italic text'}*`;
                    cursorOffset = selectedText ? insertion.length : 1;
                    break;
                case 'heading':
                    insertion = `## ${selectedText || 'Heading'}`;
                    cursorOffset = insertion.length;
                    break;
                case 'link':
                    insertion = `[${selectedText || 'link text'}](url)`;
                    cursorOffset = selectedText ? insertion.length - 4 : 1;
                    break;
                case 'list':
                    insertion = `- ${selectedText || 'list item'}`;
                    cursorOffset = insertion.length;
                    break;
                case 'code':
                    insertion = selectedText.includes('\n') 
                        ? `\`\`\`\n${selectedText || 'code'}\n\`\`\``
                        : `\`${selectedText || 'code'}\``;
                    cursorOffset = selectedText ? insertion.length : 1;
                    break;
            }

            editor.value = text.substring(0, start) + insertion + text.substring(end);
            editor.focus();
            
            const newPosition = start + cursorOffset;
            editor.setSelectionRange(newPosition, newPosition);
            
            updatePreview();
        }

        // Event listeners
        editor.addEventListener('input', updatePreview);

        toolbarBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                insertFormat(btn.dataset.format);
            });
        });

        copyBtn.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(editor.value);
                showNotification();
            } catch (err) {
                // Fallback for older browsers
                editor.select();
                document.execCommand('copy');
                showNotification();
            }
        });

        // Keyboard shortcuts
        editor.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                switch(e.key.toLowerCase()) {
                    case 'b':
                        e.preventDefault();
                        insertFormat('bold');
                        break;
                    case 'i':
                        e.preventDefault();
                        insertFormat('italic');
                        break;
                    case 'k':
                        e.preventDefault();
                        insertFormat('code');
                        break;
                    case 'l':
                        e.preventDefault();
                        insertFormat('link');
                        break;
                    case 'h':
                        e.preventDefault();
                        insertFormat('heading');
                        break;
                }
                
                if (e.shiftKey && e.key.toLowerCase() === 'l') {
                    e.preventDefault();
                    insertFormat('list');
                }
            }
            
            // Tab key support
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = editor.selectionStart;
                const end = editor.selectionEnd;
                editor.value = editor.value.substring(0, start) + '    ' + editor.value.substring(end);
                editor.selectionStart = editor.selectionEnd = start + 4;
                updatePreview();
            }
        });

        // Initial preview
        updatePreview();
    </script>
</body>
</html>
