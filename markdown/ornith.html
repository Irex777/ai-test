<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Editor</title>
</head>
<body>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-tertiary: #0f3460;
            --bg-editor: #1e1e3a;
            --bg-preview: #1a1a2e;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0b0;
            --text-muted: #6c6c80;
            --accent: #e94560;
            --accent-hover: #ff6b81;
            --accent-secondary: #533483;
            --border: #2a2a4a;
            --toolbar-bg: #16213e;
            --hover-bg: #2a2a4a;
            --scrollbar-thumb: #3a3a5a;
            --scrollbar-track: #1a1a2e;
            --code-bg: #0d1117;
            --blockquote-border: #e94560;
            --link-color: #6cb4ee;
            --heading-color: #f0f0f0;
            --shadow: rgba(0, 0, 0, 0.3);
            --font-mono: 'Courier New', Consolas, monospace;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        html, body {
            height: 100%;
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4a4a6a;
        }

        /* Header / Toolbar */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--toolbar-bg);
            border-bottom: 1px solid var(--border);
            padding: 0 16px;
            height: 48px;
            flex-shrink: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            font-size: 16px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .logo svg {
            width: 20px;
            height: 20px;
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .toolbar-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }

        .toolbar-btn:hover {
            background: var(--hover-bg);
            color: var(--text-primary);
        }

        .toolbar-btn:active {
            background: var(--bg-tertiary);
        }

        .toolbar-btn svg {
            width: 15px;
            height: 15px;
            fill: currentColor;
        }

        .toolbar-separator {
            width: 1px;
            height: 20px;
            background: var(--border);
            margin: 0 6px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .word-count {
            font-size: 12px;
            color: var(--text-muted);
            padding: 4px 10px;
            background: var(--bg-primary);
            border-radius: 12px;
            border: 1px solid var(--border);
            white-space: nowrap;
        }

        .action-btn {
            background: var(--accent);
            border: none;
            color: white;
            cursor: pointer;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }

        .action-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .action-btn:active {
            transform: translateY(0);
        }

        .action-btn svg {
            width: 13px;
            height: 13px;
            fill: currentColor;
        }

        .action-btn.copied {
            background: #2ecc71;
        }

        /* Main Layout */
        .main {
            display: flex;
            height: calc(100vh - 48px);
            overflow: hidden;
        }

        .pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        .pane-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .pane-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        .pane-icon {
            width: 16px;
            height: 16px;
            fill: var(--text-muted);
        }

        .divider {
            width: 4px;
            background: var(--border);
            cursor: col-resize;
            flex-shrink: 0;
            transition: background 0.15s ease;
        }

        .divider:hover {
            background: var(--accent);
        }

        /* Editor */
        .editor-container {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #editor {
            flex: 1;
            width: 100%;
            background: var(--bg-editor);
            color: var(--text-primary);
            border: none;
            outline: none;
            resize: none;
            padding: 20px;
            font-family: var(--font-mono);
            font-size: 14px;
            line-height: 1.7;
            tab-size: 4;
            overflow-y: auto;
        }

        #editor::placeholder {
            color: var(--text-muted);
        }

        /* Preview */
        .preview-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
        }

        #preview {
            line-height: 1.75;
            font-size: 14px;
        }

        /* Preview Typography */
        #preview h1, #preview h2, #preview h3,
        #preview h4, #preview h5, #preview h6 {
            color: var(--heading-color);
            margin: 1.2em 0 0.6em;
            font-weight: 700;
            line-height: 1.3;
        }

        #preview h1 { font-size: 2em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
        #preview h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: 0.25em; }
        #preview h3 { font-size: 1.25em; }
        #preview h4 { font-size: 1.1em; }
        #preview h5 { font-size: 1em; }
        #preview h6 { font-size: 0.9em; color: var(--text-secondary); }

        #preview p {
            margin: 0.8em 0;
            color: var(--text-primary);
        }

        #preview a {
            color: var(--link-color);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.15s;
        }

        #preview a:hover {
            border-bottom-color: var(--link-color);
        }

        #preview strong {
            font-weight: 700;
            color: #fff;
        }

        #preview em {
            font-style: italic;
        }

        #preview blockquote {
            margin: 1em 0;
            padding: 8px 16px;
            border-left: 4px solid var(--blockquote-border);
            background: rgba(233, 69, 96, 0.05);
            border-radius: 0 8px 8px 0;
            color: var(--text-secondary);
        }

        #preview blockquote p {
            margin: 0.4em 0;
        }

        #preview code {
            font-family: var(--font-mono);
            font-size: 0.88em;
            background: var(--code-bg);
            padding: 2px 6px;
            border-radius: 4px;
            color: #e06c75;
            border: 1px solid var(--border);
        }

        #preview pre {
            margin: 1em 0;
            padding: 16px;
            background: var(--code-bg);
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid var(--border);
        }

        #preview pre code {
            background: none;
            padding: 0;
            border: none;
            color: var(--text-primary);
            font-size: 13px;
            line-height: 1.6;
        }

        #preview ul, #preview ol {
            margin: 0.8em 0;
            padding-left: 2em;
        }

        #preview li {
            margin: 0.3em 0;
            color: var(--text-primary);
        }

        #preview li::marker {
            color: var(--accent);
        }

        #preview hr {
            border: none;
            height: 1px;
            background: var(--border);
            margin: 2em 0;
        }

        #preview table {
            border-collapse: collapse;
            width: 100%;
            margin: 1em 0;
        }

        #preview th, #preview td {
            border: 1px solid var(--border);
            padding: 8px 12px;
            text-align: left;
        }

        #preview th {
            background: var(--bg-tertiary);
            font-weight: 600;
        }

        #preview img {
            max-width: 100%;
            border-radius: 8px;
        }

        #preview input[type="checkbox"] {
            margin-right: 6px;
            accent-color: var(--accent);
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #2ecc71;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            box-shadow: 0 4px 12px var(--shadow);
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            z-index: 1000;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            .main {
                flex-direction: column;
            }

            .divider {
                width: 100%;
                height: 4px;
                cursor: row-resize;
            }

            .pane {
                flex: 1;
                min-height: 0;
            }

            .header {
                padding: 0 8px;
                height: auto;
                flex-wrap: wrap;
                padding: 6px 8px;
                gap: 4px;
            }

            .toolbar {
                overflow-x: auto;
                flex-wrap: nowrap;
                padding: 2px 0;
            }

            .toolbar-btn span {
                display: none;
            }

            .header-right {
                gap: 6px;
            }

            .word-count {
                font-size: 11px;
                padding: 3px 8px;
            }

            #editor {
                padding: 14px;
                font-size: 13px;
            }

            .preview-container {
                padding: 14px;
            }

            .logo span {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .action-btn span {
                display: none;
            }
        }
    </style>

    <!-- Header / Toolbar -->
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 20h9"/>
                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                </svg>
                <span>MD Editor</span>
            </div>
            <div class="toolbar">
                <button class="toolbar-btn" onclick="insertFormat('bold')" title="Bold (Ctrl+B)">
                    <svg viewBox="0 0 24 24"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/></svg>
                    <span>Bold</span>
                </button>
                <button class="toolbar-btn" onclick="insertFormat('italic')" title="Italic (Ctrl+I)">
                    <svg viewBox="0 0 24 24"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg>
                    <span>Italic</span>

                <button class="toolbar-btn" onclick="insertFormat('heading')" title="Heading">
                    <svg viewBox="0 0 24 24"><path d="M6 4v16M18 4v16M6 12h12"/></svg>

                </button>
                <div class="toolbar-separator"></div>
                <button class="toolbar-btn" onclick="insertFormat('link')" title="Link (Ctrl+K)">
                    <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                    <span>Link</span>
                </button>
                <button class="toolbar-btn" onclick="insertFormat('list')" title="Bullet List">
                    <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="4" cy="6" r="1" fill="currentColor"/><circle cx="4" cy="12" r="1" fill="currentColor"/><circle cx="4" cy="18" r="1" fill="currentColor"/></svg>
                    <span>List</span>
                </button>
                <button class="toolbar-btn" onclick="insertFormat('orderedlist')" title="Ordered List">
                    <svg viewBox="0 0 24 24"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><text x="3" y="8" font-size="7" fill="currentColor" font-weight="bold">1</text><text x="3" y="14" font-size="7" fill="currentColor" font-weight="bold">2</text><text x="3" y="20" font-size="7" fill="currentColor" font-weight="bold">3</text></svg>
                    <span>OL</span>
                </button>
                <div class="toolbar-separator"></div>
                <button class="toolbar-btn" onclick="insertFormat('code')" title="Inline Code">
                    <svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6" fill="none" stroke="currentColor" stroke-width="2"/><polyline points="8 6 2 12 8 18" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                    <span>Code</span>
                </button>
                <button class="toolbar-btn" onclick="insertFormat('codeblock')" title="Code Block">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><polyline points="9 8 5 12 9 16" fill="none" stroke="currentColor" stroke-width="2"/><polyline points="15 8 19 12 15 16" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                    <span>Block</span>
                </button>
                <button class="toolbar-btn" onclick="insertFormat('quote')" title="Blockquote">
                    <svg viewBox="0 0 24 24"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z" fill="currentColor" opacity="0.7"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z" fill="currentColor" opacity="0.7"/></svg>
                    <span>Quote</span>
                </button>
                <button class="toolbar-btn" onclick="insertFormat('hr')" title="Horizontal Rule">
                    <svg viewBox="0 0 24 24"><line x1="2" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="2"/></svg>
                    <span>HR</span>
                </button>
            </div>
        </div>
        <div class="header-right">
            <div class="word-count" id="wordCount">0 words · 0 chars</div>
            <button class="action-btn" id="copyBtn" onclick="copyMarkdown()">
                <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                <span>Copy Markdown</span>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <div class="main">
        <!-- Editor Pane -->
        <div class="pane" id="editorPane">
            <div class="pane-header">
                <span class="pane-title">
                    <svg class="pane-icon" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                    Editor
                </span>
            </div>
            <div class="editor-container">
                <textarea id="editor" placeholder="Start writing markdown..."></textarea>
            </div>
        </div>

        <!-- Divider -->
        <div class="divider" id="divider"></div>

        <!-- Preview Pane -->
        <div class="pane" id="previewPane">
            <div class="pane-header">
                <span class="pane-title">
                    <svg class="pane-icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    Preview
                </span>
            </div>
            <div class="preview-container">
                <div id="preview"></div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">✓ Copied to clipboard!</div>

    <script>
        // Default content
        const defaultContent = `# Welcome to Markdown Editor ✨

A **powerful** and *lightweight* markdown editor with live preview.

## Features

- 🎨 Dark theme with elegant design
- ⚡ Live preview as you type
- 📋 Formatting toolbar
- 📱 Fully responsive
- 🔤 Word & character count

## Getting Started

Simply start typing in the editor on the left. Your changes will appear in real-time on the right.

### Text Formatting

You can write **bold text**, *italic text*, or even ***bold and italic*** text. Use \`inline code\` for code snippets.

### Code Blocks

\`\`\`javascript
function greet(name) {
    console.log(\`Hello, \${name}!\`);
    return { message: "Welcome to MD Editor" };
}

greet("World");
\`\`\`

### Blockquotes

> "The best way to predict the future is to invent it."
> — Alan Kay

### Links & Images

Visit [GitHub](https://github.com) for more information.

### Lists

**Ordered List:**
1. First item
2. Second item
3. Third item

**Unordered List:**
- Apples
- Oranges
- Bananas

**Task List:**
- [x] Create the editor
- [x] Add live preview
- [ ] Take over the world

### Tables

| Feature | Status |
|---------|--------|
| Bold    | ✅ Done |
| Italic  | ✅ Done |
| Links   | ✅ Done |
| Code    | ✅ Done |

---

*Happy writing!* 🚀
`;

        // DOM elements
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        const wordCountEl = document.getElementById('wordCount');
        const copyBtn = document.getElementById('copyBtn');
        const toast = document.getElementById('toast');

        // Initialize
        editor.value = defaultContent;
        updatePreview();
        updateWordCount();

        // Live preview
        let debounceTimer;
        editor.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                updatePreview();
                updateWordCount();
            }, 50);
        });

        // Markdown parser
        function parseMarkdown(md) {
            // Escape HTML entities first (but preserve markdown)
            let html = md
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

            // Code blocks (fenced) - protect from further processing
            const codeBlocks = [];
            html = html.replace(/
