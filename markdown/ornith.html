<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Editor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg-primary:#1a1b26;--bg-secondary:#16161e;--bg-tertiary:#1f2335;
--text-primary:#c0caf5;--text-secondary:#565f89;--text-highlight:#7aa2f7;
--border:#292e42;--accent:#7aa2f7;--accent-hover:#89b4fa;
--green:#9ece6a;--purple:#bb9af7;--orange:#ff9e64;--red:#f7768e;
--yellow:#e0af68;--cyan:#7dcfff;--pink:#f7768e;
--toolbar-bg:#16161e;--editor-bg:#1a1b26;--preview-bg:#16161e;
--scrollbar:#292e42;--scrollbar-thumb:#414868;
--shadow:0 4px 24px rgba(0,0,0,0.3);
}
body{
font-family:'SF Mono',SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace;
background:var(--bg-primary);color:var(--text-primary);
min-height:100vh;overflow:hidden;
}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:var(--scrollbar)}
::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--text-secondary)}

.app{display:flex;flex-direction:column;height:100vh}

.toolbar{
background:var(--toolbar-bg);border-bottom:1px solid var(--border);
padding:8px 16px;display:flex;align-items:center;gap:4px;flex-shrink:0;
}
.toolbar-group{display:flex;align-items:center;gap:2px}
.toolbar-divider{width:1px;height:24px;background:var(--border);margin:0 8px}
.tool-btn{
background:none;border:1px solid transparent;color:var(--text-secondary);
padding:6px 10px;border-radius:6px;cursor:pointer;font-size:13px;
display:flex;align-items:center;gap:5px;transition:all 0.15s ease;
font-family:inherit;
}
.tool-btn:hover{background:var(--bg-tertiary);color:var(--text-primary);border-color:var(--border)}
.tool-btn:active{background:var(--border);transform:scale(0.96)}
.tool-btn svg{width:16px;height:16px;fill:currentColor}
.tool-btn.active{color:var(--accent);border-color:var(--accent);background:rgba(122,162,247,0.1)}

.toolbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.word-count{font-size:12px;color:var(--text-secondary);white-space:nowrap}
.copy-btn{
background:var(--accent);color:#1a1b26;border:none;padding:6px 12px;
border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;
font-family:inherit;transition:all 0.15s ease;display:flex;align-items:center;gap:4px;
}
.copy-btn:hover{background:var(--accent-hover);transform:translateY(-1px)}
.copy-btn:active{transform:scale(0.96)}
.copy-btn.copied{background:var(--green);color:#1a1b26}

.main{display:flex;flex:1;overflow:hidden}
.editor-pane,.preview-pane{
flex:1;display:flex;flex-direction:column;overflow:hidden;
}
.pane-header{
padding:8px 16px;background:var(--bg-secondary);border-bottom:1px solid var(--border);
font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;
color:var(--text-secondary);display:flex;align-items:center;gap:6px;flex-shrink:0;
}
.pane-header .dot{width:8px;height:8px;border-radius:50%}
.pane-header .dot-editor{background:var(--accent)}
.pane-header .dot-preview{background:var(--green)}

.editor-container{flex:1;position:relative;overflow:hidden}
#editor{
width:100%;height:100%;background:var(--editor-bg);color:var(--text-primary);
border:none;outline:none;resize:none;padding:24px;font-size:14px;
line-height:1.7;tab-size:2;font-family:inherit;
}
#editor::placeholder{color:var(--text-secondary)}

.preview-container{flex:1;overflow-y:auto;padding:24px}
#preview{
font-size:14px;line-height:1.75;color:var(--text-primary);word-wrap:break-word;
}

/* Markdown Preview Styles */
#preview h1{font-size:2em;margin:0.8em 0 0.4em;padding-bottom:0.3em;border-bottom:2px solid var(--border);color:var(--text-highlight)}
#preview h2{font-size:1.5em;margin:0.8em 0 0.4em;padding-bottom:0.2em;border-bottom:1px solid var(--border);color:var(--text-highlight)}
#preview h3{font-size:1.25em;margin:0.8em 0 0.4em;color:var(--text-highlight)}
#preview h4{font-size:1.1em;margin:0.8em 0 0.4em;color:var(--text-highlight)}
#preview h5{font-size:1em;margin:0.8em 0 0.4em;color:var(--text-highlight)}
#preview h6{font-size:0.9em;margin:0.8em 0 0.4em;color:var(--text-secondary)}

#preview p{margin:0.6em 0}
#preview strong{color:var(--orange);font-weight:700}
#preview em{color:var(--purple);font-style:italic}
#preview a{color:var(--accent);text-decoration:none;border-bottom:1px dashed var(--accent)}
#preview a:hover{border-bottom-style:solid}

#preview code{
background:var(--bg-tertiary);color:var(--cyan);padding:2px 6px;
border-radius:4px;font-size:0.9em;font-family:inherit;
}
#preview pre{
background:var(--bg-tertiary);border:1px solid var(--border);
border-radius:8px;padding:16px;margin:1em 0;overflow-x:auto;
}
#preview pre code{background:none;padding:0;color:var(--text-primary);font-size:13px;line-height:1.6}

#preview blockquote{
border-left:3px solid var(--yellow);padding:8px 16px;margin:1em 0;
background:rgba(224,175,104,0.05);border-radius:0 6px 6px 0;color:var(--text-secondary);
}
#preview blockquote p{margin:0.3em 0}

#preview ul,#preview ol{padding-left:2em;margin:0.6em 0}
#preview li{margin:0.3em 0}
#preview li::marker{color:var(--accent)}

#preview hr{border:none;height:2px;background:var(--border);margin:2em 0;border-radius:1px}

#preview img{max-width:100%;border-radius:8px}

#preview table{border-collapse:collapse;margin:1em 0;width:100%}
#preview th,#preview td{border:1px solid var(--border);padding:8px 12px;text-align:left}
#preview th{background:var(--bg-tertiary);color:var(--text-highlight);font-weight:600}
#preview tr:nth-child(even){background:rgba(255,255,255,0.02)}

#preview input[type="checkbox"]{margin-right:6px;accent-color:var(--accent)}

.resize-handle{
width:4px;cursor:col-resize;background:var(--border);flex-shrink:0;
transition:background 0.15s;
}
.resize-handle:hover,.resize-handle.active{background:var(--accent)}

/* Mobile responsive */
@media(max-width:768px){
.main{flex-direction:column}
.editor-pane,.preview-pane{flex:1;min-height:0}
.resize-handle{
width:100%;height:4px;cursor:row-resize;
}
.toolbar{flex-wrap:wrap;gap:2px;padding:6px 8px}
.toolbar-divider{display:none}
.toolbar-group{flex-wrap:wrap}
.tool-btn{padding:6px 8px;font-size:12px}
.tool-btn span.btn-label{display:none}
.toolbar-right{width:100%;justify-content:flex-end;margin-top:4px}
.word-count{display:none}
#editor{padding:16px}
.preview-container{padding:16px}
}

@media(max-width:480px){
.tool-btn span.btn-label{display:none}
.tool-btn{padding:6px 6px}
}

/* Toast notification */
.toast{
position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
background:var(--green);color:#1a1b26;padding:8px 20px;border-radius:8px;
font-size:13px;font-weight:600;opacity:0;transition:opacity 0.3s;
pointer-events:none;z-index:100;
}
.toast.show{opacity:1}
</style>
</head>
<body>

<script>
const editor = document.getElementById('editor');
const preview = document.getElementById('preview');
const wordCountEl = document.getElementById('wordCount');
const copyBtn = document.getElementById('copyBtn');
const toast = document.getElementById('toast');
const resizeHandle = document.getElementById('resizeHandle');

const sampleContent = `# Welcome to Markdown Editor ✨

A **powerful** and *elegant* markdown editor with live preview.

## Features

- 🎨 **Dark theme** with a beautiful color palette
- ⚡ **Live preview** as you type
- 🛠️ **Formatting toolbar** for quick formatting
- 📱 **Responsive** design for all devices
- 📋 **Copy markdown** with one click
- 📊 **Word count** and character count

## Quick Start

Start typing in the editor on the left. The preview on the right updates in real-time.

### Text Formatting

You can write **bold text**, *italic text*, and ~~strikethrough text~~.

### Code

Inline \`code\` looks great. Here's a code block:

\`\`\`javascript
function greet(name) {
  console.log(\`Hello, \${name}!\`);
}
greet('World');
\`\`\`

### Blockquotes

> "The best way to predict the future is to invent it."
> — Alan Kay

### Links

Check out [GitHub](https://github.com) for more awesome projects.

### Lists

1. Open the editor
2. Write your markdown
3. See the magic happen!

### Tables

| Feature | Status |
|---------|--------|
| Live Preview | ✅ Done |
| Dark Theme | ✅ Done |
| Toolbar | ✅ Done |
| Responsive | ✅ Done |

---

*Happy writing!* 🚀
`;

editor.value = sampleContent;

// Markdown Parser
function parseMarkdown(md) {
    let html = md;

    // Escape HTML (but preserve markdown)
    html = html.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    // Code blocks (fenced)
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
        return `<pre><code class="language-${lang}">${code.trim()}</code></pre>`;
    });

    // Inline code (must come after code blocks to avoid conflicts)
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

    // Headings
    html = html.replace(/^######\s+(.+)$/gm, '<h6>$1</h6>');
    html = html.replace(/^#####\s+(.+)$/gm, '<h5>$1</h5>');
    html = html.replace(/^####\s+(.+)$/gm, '<h4>$1</h4>');
    html = html.replace(/^###\s+(.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^##\s+(.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^#\s+(.+)$/gm, '<h1>$1</h1>');

    // Horizontal rules
    html = html.replace(/^(?:---|\*\*\*|___)\s*$/gm, '<hr>');

    // Images
    html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');

    // Links
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

    // Blockquotes
    html = html.replace(/^(?:>\s?(.*)(?:\n|$))+/gm, (match) => {
        const lines = match.trim().split('\n').map(l => l.replace(/^>\s?/, ''));
        return '<blockquote>' + lines.join('<br>') + '</blockquote>';
    });

    // Bold + Italic
    html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    html = html.replace(/___(.+?)___/g, '<strong><em>$1</em></strong>');

    // Bold
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/__(.+?)__/g, '<strong>$1</strong>');

    // Italic
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
    html = html.replace(/_(.+?)_/g, '<em>$1</em>');

    // Strikethrough
    html = html.replace(/~~(.+?)~~/g, '<del>$1</del>');

    // Checkbox lists
    html = html.replace(/^- \[x\]\s+(.+)$/gim, '<li><input type="checkbox" checked disabled> $1</li>');
    html = html.replace(/^- \[ \]\s+(.+)$/gim, '<li><input type="checkbox" disabled> $1</li>');

    // Unordered lists
    html = html.replace(/^[\-\*+]\s+(.+)$/gm, '<li>$1</li>');
    html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

    // Ordered lists
    html = html.replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>');

    // Paragraphs - wrap remaining lines
    html = html.replace(/^(?!<[hupobdl]|<hr|<pre|<blockquote|<img|<del)(.+)$/gm, '<p>$1</p>');

    // Clean up double-wrapped paragraphs
    html = html.replace(/<p><p>/g, '<p>');
    html = html.replace(/<\/p><\/p>/g, '</p>');

    // Clean up extra line breaks
    html = html.replace(/<br><br>/g, '<br>');

    // Fix empty paragraphs
    html = html.replace(/<p>\s*<\/p>/g, '');

    // Fix list items that weren't wrapped
    html = html.replace(/<li>([^<]+)<\/li>/g, (match, content) => {
        if (content.startsWith('<input')) return match;
        return `<li>${content}</li>`;
    });

    // Fix standalone list items to be wrapped in ul
    html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, (match) => {
        if (match.includes('<input')) return `<ul>${match}</ul>`;
        return `<ul>${match}</ul>`;
    });

    return html;
}

function updatePreview() {
    preview.innerHTML = parseMarkdown(editor.value);
    updateWordCount();
}

function updateWordCount() {
    const text = editor.value.trim();
    const chars = text.length;
    const words = text ? text.split(/\s+/).length : 0;
    wordCountEl.textContent = `${words} word${words !== 1 ? 's' : ''} · ${chars} character${chars !== 1 ? 's' : ''}`;
}

// Toolbar insert functions
function insertFormat(type) {
    const start = editor.selectionStart;
    const end = editor.selectionEnd;
    const selected = editor.value.substring(start, end);
    let replacement = '';
    let cursorOffset = 0;

    switch(type) {
        case 'bold':
            replacement = `**${selected || 'bold text'}**`;
            cursorOffset = selected ? 0 : -2;
            break;
        case 'italic':
            replacement = `*${selected || 'italic text'}*`;
            cursorOffset = selected ? 0 : -1;
            break;
        case 'strikethrough':
            replacement = `~~${selected || 'strikethrough text'}~~`;
            cursorOffset = selected ? 0 : -2;
            break;
        case 'h1':
            replacement = `# ${selected || 'Heading 1'}`;
            cursorOffset = selected ? 0 : -3;
            break;
        case 'h2':
            replacement = `## ${selected || 'Heading 2'}`;
            cursorOffset = selected ? 0 : -4;
            break;
        case 'h3':
            replacement = `### ${selected || 'Heading 3'}`;
            cursorOffset = selected ? 0 : -5;
            break;
        case 'link':
            if (!selected) {
                replacement = `[link text](url)`;
                cursorOffset = -1;
            } else {
                replacement = `[${selected}](url)`;
            }
            break;
        case 'image':
            replacement = `![alt text](image-url)`;
            cursorOffset = -1;
            break;
        case 'code':
            replacement = `\`${selected || 'code'}\``;
            cursorOffset = selected ? 0 : -1;
            break;
        case 'codeblock':
            replacement = `\`\`\`javascript\n${selected || '// code here'}\n\`\`\``;
            cursorOffset = -4;
            break;
        case 'ul':
            replacement = `- ${selected || 'list item'}`;
            cursorOffset = selected ? 0 : -3;
            break;
        case 'ol':
            replacement = `1. ${selected || 'list item'}`;
            cursorOffset = selected ? 0 : -4;
            break;
        case 'quote':
            replacement = `> ${selected || 'quote'}`;
            cursorOffset = selected ? 0 : -2;
            break;
        case 'hr':
            replacement = `\n---\n`;
            break;
    }

    editor.focus();
    document.execCommand('insertText', false, replacement);

    if (cursorOffset < 0 && !selected) {
        const newPos = start + replacement.length + cursorOffset;
        editor.setSelectionRange(newPos, newPos);
    }

    updatePreview();
}

// Copy markdown
async function copyMarkdown() {
    try {
        await navigator.clipboard.writeText(editor.value);
        copyBtn.classList.add('copied');
        copyBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> Copied!`;
        toast.classList.add('show');
        setTimeout(() => {
            copyBtn.classList.remove('copied');
            copyBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy`;
            toast.classList.remove('show');
        }, 2000);
    } catch(err) {
        // Fallback
        const textarea = document.createElement('textarea');
        textarea.value = editor.value;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        copyBtn.classList.add('copied');
        toast.classList.add('show');
        setTimeout(() => {
            copyBtn.classList.remove('copied');
            toast.classList.remove('show');
        }, 2000);
    }
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
    if (e.ctrlKey || e.metaKey) {
        switch(e.key.toLowerCase()) {
            case 'b':
                e.preventDefault();
                insertFormat('bold');
                break;
            case 'i':
                e.preventDefault();
                insertFormat('italic');
                break;
            case 'k':
                e.preventDefault();
                insertFormat('link');
                break;
        }
    }
});

// Tab key in editor
editor.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
        e.preventDefault();
        document.execCommand('insertText', false, '  ');
    }
});

// Live preview on input
editor.addEventListener('input', updatePreview);

// Resize handle
let isResizing = false;
resizeHandle.addEventListener('mousedown', (e) => {
    isResizing = true;
    resizeHandle.classList.add('active');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
});

document.addEventListener('mousemove', (e) => {
    if (!isResizing) return;
    const main = document.querySelector('.main');
    const rect = main.getBoundingClientRect();
    const percentage = ((e.clientX - rect.left) / rect.width) * 100;
    const clamped = Math.min(Math.max(percentage, 20), 80);
    const editorPane = document.querySelector('.editor-pane');
    const previewPane = document.querySelector('.preview-pane');
    editorPane.style.flex = 'none';
    editorPane.style.width = clamped + '%';
    previewPane.style.flex = '1';
});

document.addEventListener('mouseup', () => {
    if (isResizing) {
        isResizing = false;
        resizeHandle.classList.remove('active');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
    }
});

// Touch resize support
let isTouchResizing = false;
resizeHandle.addEventListener('touchstart', (e) => {
    isTouchResizing = true;
    resizeHandle.classList.add('active');
    e.preventDefault();
});

document.addEventListener('touchmove', (e) => {
    if (!isTouchResizing) return;
    const touch = e.touches[0];
    const main = document.querySelector('.main');
    const rect = main.getBoundingClientRect();
    const percentage = ((touch.clientX - rect.left) / rect.width) * 100;
    const clamped = Math.min(Math.max(percentage, 20), 80);
    const editorPane = document.querySelector('.editor-pane');
    editorPane.style.width = clamped + '%';
});

document.addEventListener('touchend', () => {
    if (isTouchResizing) {
        isTouchResizing = false;
        resizeHandle.classList.remove('active');
    }
});

// Initial render
updatePreview();
</script>
</body>
</html>
