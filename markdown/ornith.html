<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Editor</title>
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg-primary: #1a1a2e;
  --bg-secondary: #16213e;
  --bg-tertiary: #0f3460;
  --bg-editor: #1c1c3a;
  --bg-preview: #1a1a2e;
  --text-primary: #e0e0e0;
  --text-secondary: #a0a0b8;
  --text-muted: #6c6c8a;
  --accent: #e94560;
  --accent-hover: #ff6b81;
  --border: #2a2a4a;
  --toolbar-bg: #16213e;
  --scrollbar-thumb: #3a3a5a;
  --scrollbar-track: #1a1a2e;
  --code-bg: #0d1117;
  --quote-border: #e94560;
  --link-color: #58a6ff;
  --heading-color: #f0f6fc;
  --table-border: #30363d;
  --table-stripe: rgba(255,255,255,0.02);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

::-webkit-scrollbar {
  width: 8px;
  height: 8px;
}
::-webkit-scrollbar-track {
  background: var(--scrollbar-track);
}
::-webkit-scrollbar-thumb {
  background: var(--scrollbar-thumb);
  border-radius: 4px;
}
::-webkit-scrollbar-thumb:hover {
  background: #4a4a6a;
}

.toolbar {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 8px 12px;
  background: var(--toolbar-bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.toolbar-group {
  display: flex;
  align-items: center;
  gap: 2px;
}

.toolbar-separator {
  width: 1px;
  height: 28px;
  background: var(--border);
  margin: 0 8px;
}

.toolbar button {
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-secondary);
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.15s ease;
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
}

.toolbar button:hover {
  background: var(--bg-tertiary);
  color: var(--text-primary);
  border-color: var(--border);
}

.toolbar button:active {
  background: var(--accent);
  color: #fff;
}

.toolbar button .icon {
  font-size: 14px;
  line-height: 1;
}

.toolbar .spacer {
  flex: 1;
}

.toolbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.word-count {
  font-size: 12px;
  color: var(--text-muted);
  padding: 4px 8px;
  background: var(--bg-primary);
  border-radius: 4px;
  white-space: nowrap;
}

.btn-action {
  background: var(--accent) !important;
  color: #fff !important;
  border: none !important;
  font-weight: 600 !important;
}

.btn-action:hover {
  background: var(--accent-hover) !important;
}

.btn-copied {
  background: #238636 !important;
}

.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

.editor-pane, .preview-pane {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

.pane-header {
  padding: 6px 16px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.editor-pane textarea {
  flex: 1;
  width: 100%;
  padding: 20px;
  background: var(--bg-editor);
  color: var(--text-primary);
  border: none;
  outline: none;
  resize: none;
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', Consolas, monospace;
  font-size: 14px;
  line-height: 1.7;
  tab-size: 2;
}

.preview-pane .preview-content {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  background: var(--bg-preview);
}

.resize-handle {
  width: 4px;
  background: var(--border);
  cursor: col-resize;
  flex-shrink: 0;
  transition: background 0.2s;
}

.resize-handle:hover, .resize-handle.active {
  background: var(--accent);
}

/* Markdown Preview Styles */
.preview-content h1, .preview-content h2, .preview-content h3,
.preview-content h4, .preview-content h5, .preview-content h6 {
  color: var(--heading-color);
  margin: 1.2em 0 0.6em;
  font-weight: 700;
  line-height: 1.3;
}

.preview-content h1 { font-size: 2em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
.preview-content h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: 0.25em; }
.preview-content h3 { font-size: 1.25em; }
.preview-content h4 { font-size: 1.1em; }
.preview-content h5 { font-size: 1em; }
.preview-content h6 { font-size: 0.9em; color: var(--text-secondary); }

.preview-content p {
  margin: 0.8em 0;
  line-height: 1.8;
}

.preview-content a {
  color: var(--link-color);
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: border-color 0.15s;
}
.preview-content a:hover {
  border-bottom-color: var(--link-color);
}

.preview-content strong { color: #f0f6fc; font-weight: 700; }
.preview-content em { color: var(--text-secondary); }

.preview-content code {
  background: var(--code-bg);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
  font-size: 0.88em;
  color: #f0883e;
}

.preview-content pre {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  overflow-x: auto;
  margin: 1em 0;
}

.preview-content pre code {
  background: none;
  padding: 0;
  border-radius: 0;
  color: var(--text-primary);
  font-size: 13px;
  line-height: 1.6;
}

.preview-content blockquote {
  border-left: 4px solid var(--quote-border);
  margin: 1em 0;
  padding: 8px 16px;
  background: rgba(233, 69, 96, 0.05);
  border-radius: 0 8px 8px 0;
}

.preview-content blockquote p {
  margin: 0.4em 0;
  color: var(--text-secondary);
}

.preview-content ul, .preview-content ol {
  padding-left: 2em;
  margin: 0.8em 0;
}

.preview-content li {
  margin: 0.3em 0;
  line-height: 1.7;
}

.preview-content li::marker {
  color: var(--accent);
}

.preview-content hr {
  border: none;
  height: 1px;
  background: var(--border);
  margin: 2em 0;
}

.preview-content table {
  border-collapse: collapse;
  width: 100%;
  margin: 1em 0;
  font-size: 14px;
}

.preview-content th, .preview-content td {
  border: 1px solid var(--table-border);
  padding: 8px 12px;
  text-align: left;
}

.preview-content th {
  background: var(--bg-secondary);
  font-weight: 600;
  color: var(--heading-color);
}

.preview-content tr:nth-child(even) {
  background: var(--table-stripe);
}

.preview-content input[type="checkbox"] {
  margin-right: 6px;
  accent-color: var(--accent);
}

.preview-content img {
  max-width: 100%;
  border-radius: 8px;
  margin: 0.5em 0;
}

/* Mobile */
@media (max-width: 768px) {
  .main {
    flex-direction: column;
  }
  .editor-pane, .preview-pane {
    flex: 1;
    min-height: 0;
  }
  .resize-handle {
    width: 100%;
    height: 4px;
    cursor: row-resize;
  }
  .toolbar {
    padding: 6px 8px;
    gap: 2px;
  }
  .toolbar-separator {
    margin: 0 4px;
  }
  .toolbar button {
    padding: 5px 7px;
    font-size: 12px;
  }
  .word-count {
    font-size: 11px;
    padding: 3px 6px;
  }
}
</style>
</head>
<body>

<div class="toolbar">
  <div class="toolbar-group">
    <button onclick="insertFormat('bold')" title="Bold (Ctrl+B)"><span class="icon">B</span></button>
    <button onclick="insertFormat('italic')" title="Italic (Ctrl+I)"><span class="icon" style="font-style:italic;">I</span></button>
    <button onclick="insertFormat('strikethrough')" title="Strikethrough"><span class="icon" style="text-decoration:line-through;">S</span></button>
  </div>
  <div class="toolbar-separator"></div>
  <div class="toolbar-group">
    <button onclick="insertFormat('heading')" title="Heading"><span class="icon">H</span> <span style="font-size:10px;">1</span></button>
    <button onclick="insertFormat('link')" title="Link (Ctrl+K)"><span class="icon">🔗</span></button>
    <button onclick="insertFormat('image')" title="Image"><span class="icon">🖼</span></button>
  </div>
  <div class="toolbar-separator"></div>
  <div class="toolbar-group">
    <button onclick="insertFormat('ul')" title="Unordered List"><span class="icon">•≡</span></button>
    <button onclick="insertFormat('ol')" title="Ordered List"><span class="icon">1.</span></button>
    <button onclick="insertFormat('checklist')" title="Checklist"><span class="icon">☑</span></button>
  </div>
  <div class="toolbar-separator"></div>
  <div class="toolbar-group">
    <button onclick="insertFormat('code')" title="Inline Code"><span class="icon">&lt;/&gt;</span></button>
    <button onclick="insertFormat('codeblock')" title="Code Block"><span class="icon">▣</span></button>
    <button onclick="insertFormat('quote')" title="Blockquote"><span class="icon">❝</span></button>
    <button onclick="insertFormat('hr')" title="Horizontal Rule"><span class="icon">—</span></button>
  </div>
  <div class="spacer"></div>
  <div class="toolbar-right">
    <span class="word-count" id="wordCount">0 words · 0 chars</span>
    <button class="btn-action" id="copyBtn" onclick="copyMarkdown()">📋 Copy MD</button>
  </div>
</div>

<div class="main">
  <div class="editor-pane" id="editorPane">
    <div class="pane-header">Editor</div>
    <textarea id="editor" placeholder="Start writing markdown..."></textarea>
  </div>
  <div class="resize-handle" id="resizeHandle"></div>
  <div class="preview-pane" id="previewPane">
    <div class="pane-header">Preview</div>
    <div class="preview-content" id="preview"></div>
  </div>
</div>

<script>
const editor = document.getElementById('editor');
const preview = document.getElementById('preview');
const wordCountEl = document.getElementById('wordCount');
const copyBtn = document.getElementById('copyBtn');
const resizeHandle = document.getElementById('resizeHandle');

const sampleContent = `# Welcome to Markdown Editor ✨

A **powerful** and *elegant* markdown editor with live preview. Start editing and see your changes in real-time!

## Features

- 🚀 **Live Preview** — See changes as you type
- 🎨 **Dark Theme** — Easy on the eyes
- 📋 **Toolbar** — Quick formatting shortcuts
- 📱 **Responsive** — Works on all devices
- ⚡ **Zero Dependencies** — Pure HTML/CSS/JS

## Code Example

\`\`\`javascript
function greet(name) {
  console.log(\`Hello, \${name}! 🎉\`);
  return { message: "Welcome to the editor" };
}

greet("World");
\`\`\`

## Blockquote

> "The best way to predict the future is to invent it."
> — Alan Kay

## Table

| Feature | Status |
|---------|--------|
| Live Preview | ✅ Done |
| Dark Theme | ✅ Done |
| Mobile Support | ✅ Done |
| Export | ✅ Done |

## Checklist

- [x] Split-pane layout
- [x] Formatting toolbar
- [x] Live markdown preview
- [x] Dark theme
- [x] Word count
- [x] Copy markdown button
- [ ] World domination

## Keyboard Shortcuts

Press \`Ctrl+B\` for **bold**, \`Ctrl+I\` for *italic*, and \`Ctrl+K\` for *links*.

---

*Happy writing!* 🖊️
`;

editor.value = sampleContent;

// Markdown Parser
function parseMarkdown(md) {
  let html = md;

  // Normalize line endings
  html = html.replace(/\r\n/g, '\n');

  // Code blocks (must be first to avoid processing content inside)
  html = processCodeBlocks(html);

  // Inline code (protect from further processing)
  const inlineCodeBlocks = [];
  html = html.replace(/`([^`\n]+)`/g, (match, code) => {
    const idx = inlineCodeBlocks.length;
    inlineCodeBlocks.push(`<code>${escapeHtml(code)}</code>`);
    return `%%INLINE_CODE_${idx}%%`;
  });

  // Headings
  html = html.replace(/^######\s+(.+)$/gm, '<h6>$1</h6>');
  html = html.replace(/^#####\s+(.+)$/gm, '<h5>$1</h5>');
  html = html.replace(/^####\s+(.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^###\s+(.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^##\s+(.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^#\s+(.+)$/gm, '<h1>$1</h1>');

  // Horizontal rules
  html = html.replace(/^(?:---|\*\*\*|___)\s*$/gm, '<hr>');

  // Blockquotes
  html = processBlockquotes(html);

  // Tables
  html = processTables(html);

  // Task lists / checkboxes
  html = html.replace(/^- \[x\]\s+(.+)$/gm, '<li><input type="checkbox" checked disabled> $1</li>');
  html = html.replace(/^- \[ \]\s+(.+)$/gm, '<li><input type="checkbox" disabled> $1</li>');

  // Unordered lists
  html = processList(html, /^[\*\-\+]\s+(.+)$/gm, 'ul');

  // Ordered lists
  html = processList(html, /^\d+\.\s+(.+)$/gm, 'ol');

  // Images
  html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');

  // Links
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // Bold + Italic
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  html = html.replace(/___(.+?)___/g, '<strong><em>$1</em></strong>');

  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/__(.+?)__/g, '<strong>$1</strong>');

  // Italic
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/_(.+?)_/g, '<em>$1</em>');

  // Strikethrough
  html = html.replace(/~~(.+?)~~/g, '<del>$1</del>');

  // Paragraphs — wrap remaining non-empty lines that aren't already block elements
  html = processParagraphs(html);

  // Restore inline code
  html = html.replace(/%%INLINE_CODE_(\d+)%%/g, (_, idx) => inlineCodeBlocks[parseInt(idx)]);

  return html;
}

function processCodeBlocks(md) {
  return md.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
    const escaped = escapeHtml(code.trim());
    const langAttr = lang ? ` data-language="${lang}"` : '';
    return `<pre><code${langAttr}>${escaped}</code></pre>`;
  });
}

function processBlockquotes(md) {
  const lines = md.split('\n');
  const result = [];
  let inBlockquote = false;
  let bqContent = [];

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (line.startsWith('> ')) {
      inBlockquote = true;
      bqContent.push(line.substring(2));
    } else if (inBlockquote && line.trim() === '') {
      bqContent.push('');
    } else if (inBlockquote) {
      result.push('</blockquote>');
      inBlockquote = false;
      bqContent = [];
      result.push(line);
    } else {
      result.push(line);
    }
  }
  if (inBlockquote) {
    result.push('</blockquote>');
  }
  return result.join('\n');
}

function processTables(md) {
  const lines = md.split('\n');
  const result = [];
  let inTable = false;
  let tableRows = [];

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (line.includes('|') && line.trim().startsWith('|')) {
      inTable = true;
      tableRows.push(line);
    } else if (inTable) {
      if (tableRows.length > 1) {
        result.push(renderTable(tableRows));
      }
      inTable = false;
      tableRows = [];
      result.push(line);
    } else {
      result.push(line);
    }
  }
  if (inTable && tableRows.length > 1) {
    result.push(renderTable(tableRows));
  }
  return result.join('\n');
}

function renderTable(rows) {
  if (rows.length < 2) return rows.join('\n');

  const parseRow = (row) => row.split('|').map(c => c.trim()).filter((_, i, arr) => i > 0 && i < arr.length - 1);

  const headers = parseRow(rows[0].replace(/^\|/, '').replace(/\|$/, ''));
  const isAlignRow = /^\s*:?-+:?\s*$/.test(rows[1]);

  let html = '<table><thead><tr>';
  headers.forEach(h => { html += `<th>${processInline(h)}</th>`; });
  html += '</tr></thead><tbody>';

  const startIdx = isAlignRow ? 2 : 1;
  for (let i = startIdx; i < rows.length; i++) {
    const cells = parseRow(rows[i].replace(/^\|/, '').replace(/\|$/, ''));
    html += '<tr>';
    cells.forEach(c => { html += `<td>${processInline(c)}</td>`; });
    html += '</tr>';
  }
  html += '</tbody></table>';
  return html;
}

function processList(md, regex, tag) {
  const lines = md.split('\n');
  const result = [];
  let inList = false;
  let listContent = [];

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (regex.test(line) && !line.startsWith('<')) {
      if (!inList) {
        inList = true;
        listContent = [];
      }
      const content = line.replace(regex, '$1');
      listContent.push(content);
    } else {
      if (inList) {
        result.push(`<${tag}>${listContent.map(item => `<li>${processInline(item)}</li>`).join('\n')}</${tag}>`);
        inList = false;
        listContent = [];
      }
      result.push(line);
    }
  }
  if (inList) {
    result.push(`<${tag}>${listContent.map(item => `<li>${processInline(item)}</li>`).join('\n')}</${tag}>`);
  }
  return result.join('\n');
}

function processParagraphs(html) {
  const lines = html.split('\n');
  const result = [];
  let paraLines = [];

  const blockElements = /^<(h[1-6]|ul|ol|li|pre|blockquote|hr|table|thead|tbody|tr|th|td|div)/;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (line.trim() === '') {
      if (paraLines.length > 0) {
        const text = paraLines.join('\n');
        if (!blockElements.test(text)) {
          result.push(`<p>${processInline(text)}</p>`);
        } else {
          result.push(text);
        }
        paraLines = [];
      }
      result.push(line);
    } else if (blockElements.test(line)) {
      if (paraLines.length > 0) {
        result.push(`<p>${processInline(paraLines.join('\n'))}</p>`);
        paraLines = [];
      }
      result.push(line);
    } else {
      paraLines.push(line);
    }
  }
  if (paraLines.length > 0) {
    result.push(`<p>${processInline(paraLines.join('\n'))}</p>`);
  }

  return result.join('\n');
}

function processInline(text) {
  // Don't process if already HTML
  if (text.startsWith('<') && text.endsWith('>')) return text;
  return text;
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function updatePreview() {
  const md = editor.value;
  preview.innerHTML = parseMarkdown(md);
  updateWordCount(md);
}

function updateWordCount(text) {
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  const chars = text.length;
  wordCountEl.textContent = `${words} word${words !== 1 ? 's' : ''} · ${chars} char${chars !== 1 ? 's' : ''}`;
}

// Toolbar Insert Functions
function insertFormat(type) {
  const start = editor.selectionStart;
  const end = editor.selectionEnd;
  const selected = editor.value.substring(start, end);
  let insertion = '';
  let cursorOffset = 0;
  let selectStart = 0;
  let selectEnd = 0;

  switch (type) {
    case 'bold':
      insertion = `**${selected || 'bold text'}**`;
      cursorOffset = selected ? insertion.length : 2;
      break;
    case 'italic':
      insertion = `*${selected || 'italic text'}*`;
      cursorOffset = selected ? insertion.length : 1;
      break;
    case 'strikethrough':
      insertion = `~~${selected || 'strikethrough'}~~`;
      cursorOffset = selected ? insertion.length : 2;
      break;
    case 'heading':
      insertion = `# ${selected || 'Heading'}`;
      cursorOffset = insertion.length;
      break;
    case 'link':
      insertion = `[${selected || 'link text'}](url)`;
      selectStart = start + 1;
      selectEnd = start + (selected || 'link text').length + 1;
      break;
    case 'image':
      insertion = `![${selected || 'alt text'}](image-url)`;
      selectStart = start + 2;
      selectEnd = selectStart + (selected || 'alt text').length;
      break;
    case 'ul':
      if (selected) {
        insertion = selected.split('\n').map(l => `- ${l}`).join('\n');
      } else {
        insertion = `- List item`;
      }
      cursorOffset = insertion.length;
      break;
    case 'ol':
      if (selected) {
        const items = selected.split('\n');
        insertion = items.map((l, i) => `${i + 1}. ${l}`).join('\n');
      } else {
        insertion = `1. List item`;
      }
      cursorOffset = insertion.length;
      break;
    case 'checklist':
      if (selected) {
        insertion = selected.split('\n').map(l => `- [ ] ${l}`).join('\n');
      } else {
        insertion = `- [ ] Task item`;
      }
      cursorOffset = insertion.length;
      break;
    case 'code':
      insertion = `\`${selected || 'code'}\``;
      cursorOffset = selected ? insertion.length : 1;
      break;
    case 'codeblock':
      insertion = `\`\`\`javascript\n${selected || 'code here'}\n\`\`\``;
      cursorOffset = insertion.length;
      break;
    case 'quote':
      if (selected) {
        insertion = selected.split('\n').map(l => `> ${l}`).join('\n');
      } else {
        insertion = '> Blockquote';
      }
      cursorOffset = insertion.length;
      break;
    case 'hr':
      insertion = '\n---\n';
      cursorOffset = insertion.length;
      break;
  }

  editor.focus();
  document.execCommand('insertText', false, insertion);

  if (selectStart && selectEnd) {
    const newStart = start + selectStart - start;
    editor.setSelectionRange(newStart, newStart + (selectEnd - selectStart));
  }

  updatePreview();
}

// Copy Markdown
async function copyMarkdown() {
  try {
    await navigator.clipboard.writeText(editor.value);
    copyBtn.textContent = '✅ Copied!';
    copyBtn.classList.add('btn-copied');
    setTimeout(() => {
      copyBtn.textContent = '📋 Copy MD';
      copyBtn.classList.remove('btn-copied');
    }, 2000);
  } catch {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = editor.value;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    copyBtn.textContent = '✅ Copied!';
    copyBtn.classList.add('btn-copied');
    setTimeout(() => {
      copyBtn.textContent = '📋 Copy MD';
      copyBtn.classList.remove('btn-copied');
    }, 2000);
  }
}

// Keyboard Shortcuts
editor.addEventListener('keydown', (e) => {
  if (e.ctrlKey || e.metaKey) {
    switch (e.key.toLowerCase()) {
      case 'b':
        e.preventDefault();
        insertFormat('bold');
        break;
      case 'i':
        e.preventDefault();
        insertFormat('italic');
        break;
      case 'k':
        e.preventDefault();
        insertFormat('link');
        break;
    }
  }
  // Tab support
  if (e.key === 'Tab') {
    e.preventDefault();
    document.execCommand('insertText', false, '  ');
  }
});

// Live preview on input
editor.addEventListener('input', updatePreview);

// Resizable panes
let isResizing = false;
resizeHandle.addEventListener('mousedown', (e) => {
  isResizing = true;
  resizeHandle.classList.add('active');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
  e.preventDefault();
});

document.addEventListener('mousemove', (e) => {
  if (!isResizing) return;
  const main = document.querySelector('.main');
  const rect = main.getBoundingClientRect();
  const percentage = ((e.clientX - rect.left) / rect.width) * 100;
  const clamped = Math.min(Math.max(percentage, 20), 80);
  document.getElementById('editorPane').style.flex = `0 0 ${clamped}%`;
  document.getElementById('previewPane').style.flex = `0 0 ${100 - clamped}%`;
});

document.addEventListener('mouseup', () => {
  if (isResizing) {
    isResizing = false;
    resizeHandle.classList.remove('active');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }
});

// Initial render
updatePreview();
</script>
</body>
</html>
