</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>📝 Markdown Editor</h1>
            <div class="toolbar">
                <button class="toolbar-btn" onclick="insertFormat('heading')"><span class="icon">H</span> Heading</button>
                <button class="toolbar-btn" onclick="insertFormat('bold')"><span class="icon">B</span> Bold</button>
                <button class="toolbar-btn" onclick="insertFormat('italic')"><span class="icon">I</span> Italic</button>
                <button class="toolbar-btn" onclick="insertFormat('code')"><span class="icon">&lt;/&gt;</span> Code</button>
                <button class="toolbar-btn" onclick="insertFormat('codeblock')"><span class="icon">{ }</span> Code Block</button>
                <button class="toolbar-btn" onclick="insertFormat('link')"><span class="icon">🔗</span> Link</button>
                <button class="toolbar-btn" onclick="insertFormat('image')"><span class="icon">🖼</span> Image</button>
                <button class="toolbar-btn" onclick="insertFormat('ul')"><span class="icon">•</span> List</button>
                <button class="toolbar-btn" onclick="insertFormat('ol')"><span class="icon">1.</span> Num List</button>
                <button class="toolbar-btn" onclick="insertFormat('quote')"><span class="icon">"</span> Quote</button>
                <button class="toolbar-btn" onclick="insertFormat('hr')"><span class="icon">—</span> Divider</button>
                <button class="toolbar-btn" onclick="insertFormat('table')"><span class="icon">▦</span> Table</button>
            </div>
            <div class="stats">
                <span>Words: <strong id="wordCount">0</strong></span>
                <span>Characters: <strong id="charCount">0</strong></span>
            </div>
        </header>
        <div class="main-content">
            <div class="pane">
                <div class="pane-header">Editor</div>
                <div class="editor-container">
                    <textarea id="editor" placeholder="Write your markdown here..."></textarea>
                </div>
            </div>
            <div class="divider"></div>
            <div class="pane">
                <div class="pane-header">Preview</div>
                <div class="preview-container" id="previewContainer">
                    <div id="preview"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        const previewContainer = document.getElementById('previewContainer');
        const wordCountEl = document.getElementById('wordCount');
        const charCountEl = document.getElementById('charCount');

        const sampleMarkdown = `# Welcome to the Markdown Editor! 🎉

This is a **live preview** markdown editor with a beautiful dark theme.

## Features Overview

- 📝 **Real-time preview** as you type
- 🌙 **Dark theme** easy on the eyes
- 📱 **Responsive** design for mobile devices
- 🔧 **Formatting toolbar** for quick formatting
- 📊 **Word & character count**

## Text Formatting

You can make text **bold** or *italic*. You can even combine them to make text ***bold and italic***.

## Lists

### Unordered List
- First item
- Second item
  - Nested item
  - Another nested item
- Third item

### Ordered List
1. First step
2. Second step
3. Third step

## Code

Inline \`code\` looks like this.

Code blocks with syntax:

\`\`\`javascript
function greet(name) {
    console.log(\`Hello, \${name}!\`);
    return true;
}
\`\`\`

\`\`\`python
def fibonacci(n):
    if n <= 1:
        return n
    return fibonacci(n-1) + fibonacci(n-2)
\`\`\`

## Links & Images

Visit [GitHub](https://github.com) for more!

## Blockquotes

> "The best way to predict the future is to invent it."
> 
> — Alan Kay

## Horizontal Rule

---

## Tables

| Feature | Status | Priority |
|---------|--------|----------|
| Editor  | ✅ Done | High     |
| Preview | ✅ Done | High     |
| Export  | 🚧 WIP  | Medium   |

## Conclusion

Start editing the left panel to see your changes reflected in the preview!
`;

        editor.value = sampleMarkdown;

        function parseMarkdown(md) {
            let html = md
                // Escape HTML
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                
                // Code blocks (must be first to preserve other markdown inside)
                .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code class="language-$1">$2</code></pre>')
                
                // Inline code
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                
                // Headings
                .replace(/^### (.+)$/gm, '<h3>$1</h3>')
                .replace(/^## (.+)$/gm, '<h2>$1</h2>')
                .replace(/^# (.+)$/gm, '<h1>$1</h1>')
                
                // Bold and Italic combined
                .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
                
                // Bold
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                
                // Italic
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                
                // Images
                .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">')
                
                // Links
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
                
                // Horizontal rule
                .replace(/^---$/gm, '<hr>')
                .replace(/^\*\*\*$/gm, '<hr>')
                
                // Tables
                .replace(/^((?:\|.+?\|\n)+)/gm, (match) => {
                    const rows = match.trim().split('\n');
                    if (rows.length < 2) return match;
                    
                    let tableHtml = '<table>';
                    let isHeader = true;
                    
                    rows.forEach((row, index) => {
                        const cells = row.split('|').filter(cell => cell.trim() !== '');
                        
                        // Check for separator row
                        if (cells.every(cell => /^[\s\-:]+$/.test(cell))) {
                            isHeader = false;
                            return;
                        }
                        
                        if (isHeader && index === 0) {
                            tableHtml += '<thead><tr>';
                            cells.forEach(cell => {
                                tableHtml += `<th>${cell.trim()}</th>`;
                            });
                            tableHtml += '</tr></thead><tbody>';
                        } else {
                            tableHtml += '<tr>';
                            cells.forEach(cell => {
                                tableHtml += `<td>${cell.trim()}</td>`;
                            });
                            tableHtml += '</tr>';
                        }
                    });
                    
                    tableHtml += '</tbody></table>';
                    return tableHtml;
                })
                
                // Blockquotes
                .replace(/^&gt; (.+)$/gm, '<blockquote><p>$1</p></blockquote>')
                
                // Ordered lists
                .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
                .replace(/(<li>.*<\/li>\n?)+/g, '<ol>$&</ol>')
                
                // Unordered lists
                .replace(/^[\-\*] (.+)$/gm, '<li>$1</li>')
                .replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>')
                
                // Paragraphs
                .replace(/^(?!<[a-z]|$)(.+)$/gm, '<p>$1</p>')
                
                // Clean up empty paragraphs
                .replace(/<p><\/p>/g, '')
                .replace(/<p>(<h[1-6]>)/g, '$1')
                .replace(/(<\/h[1-6]>)<\/p>/g, '$1')
                .replace(/<p>(<ul>)/g, '$1')
                .replace(/(<\/ul>)<\/p>/g, '$1')
                .replace(/<p>(<ol>)/g, '$1')
                .replace(/(<\/ol>)<\/p>/g, '$1')
                .replace(/<p>(<pre>)/g, '$1')
                .replace(/(<\/pre>)<\/p>/g, '$1')
                .replace(/<p>(<blockquote>)/g, '$1')
                .replace(/(<\/blockquote>)<\/p>/g, '$1')
                .replace(/<p>(<hr>)<\/p>/g, '$1')
                .replace(/<p>(<table>)/g, '$1')
                .replace(/(<\/table>)<\/p>/g, '$1')
                
                // Fix nested lists
                .replace(/<\/ul>\n<ul>/g, '')
                .replace(/<\/ol>\n<ol>/g, '');

            return html;
        }

        function updatePreview() {
            const md = editor.value;
            preview.innerHTML = parseMarkdown(md);
            updateStats();
        }

        function updateStats() {
            const text = editor.value;
            const words = text.trim() ? text.trim().split(/\s+/).length : 0;
            const chars = text.length;
            
            wordCountEl.textContent = words.toLocaleString();
            charCountEl.textContent = chars.toLocaleString();
        }

        function insertFormat(type) {
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            const selectedText = editor.value.substring(start, end);
            let insertion = '';
            let cursorOffset = 0;

            switch(type) {
                case 'heading':
                    insertion = `### ${selectedText || 'Heading'}`;
                    cursorOffset = selectedText ? 0 : -8;
                    break;
                case 'bold':
                    insertion = `**${selectedText || 'bold text'}**`;
                    cursorOffset = selectedText ? 0 : -10;
                    break;
                case 'italic':
                    insertion = `*${selectedText || 'italic text'}*`;
                    cursorOffset = selectedText ? 0 : -11;
                    break;
                case 'code':
                    insertion = `\`${selectedText || 'code'}\``;
                    cursorOffset = selectedText ? 0 : -6;
                    break;
                case 'codeblock':
                    insertion = `\n\`\`\`javascript\n${selectedText || '// Your code here'}\n\`\`\`\n`;
                    cursorOffset = selectedText ? 0 : -20;
                    break;
                case 'link':
                    insertion = `[${selectedText || 'link text'}](url)`;
                    cursorOffset = selectedText ? -5 : -9;
                    break;
                case 'image':
                    insertion = `![${selectedText || 'alt text'}](image-url)`;
                    cursorOffset = selectedText ? -10 : -14;
                    break;
                case 'ul':
                    insertion = `\n- ${selectedText || 'List item'}\n`;
                    cursorOffset = selectedText ? 0 : -11;
                    break;
                case 'ol':
                    insertion = `\n1. ${selectedText || 'List item'}\n`;
                    cursorOffset = selectedText ? 0 : -11;
                    break;
                case 'quote':
                    insertion = `\n> ${selectedText || 'Quote'}\n`;
                    cursorOffset = selectedText ? 0 : -7;
                    break;
                case 'hr':
                    insertion = `\n\n---\n\n`;
                    break;
                case 'table':
                    insertion = `\n| Header 1 | Header 2 | Header 3 |\n|----------|----------|----------|\n| Cell 1   | Cell 2   | Cell 3   |\n| Cell 4   | Cell 5   | Cell 6   |\n`;
                    break;
            }

            editor.value = editor.value.substring(0, start) + insertion + editor.value.substring(end);
            
            const newPosition = start + insertion.length + cursorOffset;
            editor.setSelectionRange(newPosition, newPosition);
            editor.focus();
            
            updatePreview();
        }

        // Sync scrolling
        let isScrolling = false;
        let scrollTimeout;

        function syncScroll(source, target) {
            if (isScrolling) return;
            isScrolling = true;
            
            const sourceRatio = source.scrollTop / (source.scrollHeight - source.clientHeight);
            target.scrollTop = sourceRatio * (target.scrollHeight - target.clientHeight);
            
            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => {
                isScrolling = false;
            }, 100);
        }

        editor.addEventListener('scroll', () => syncScroll(editor, previewContainer));
        previewContainer.addEventListener('scroll', () => syncScroll(previewContainer, editor));

        editor.addEventListener('input', updatePreview);

        // Initialize
        updatePreview();

        // Keyboard shortcuts
        editor.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                switch(e.key.toLowerCase()) {
                    case 'b':
                        e.preventDefault();
                        insertFormat('bold');
                        break;
                    case 'i':
                        e.preventDefault();
                        insertFormat('italic');
                        break;
                    case 'k':
                        e.preventDefault();
                        insertFormat('link');
                        break;
                }
            }
            
            // Tab key support
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = editor.selectionStart;
                const end = editor.selectionEnd;
                editor.value = editor.value.substring(0, start) + '    ' + editor.value.substring(end);
                editor.selectionStart = editor.selectionEnd = start + 4;
                updatePreview();
            }
        });
    </script>
</body>
</html>
