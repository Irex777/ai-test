<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Markdown Editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #1e1e1e;
            --bg-secondary: #252526;
            --bg-tertiary: #2d2d30;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent: #007acc;
            --accent-hover: #1e90ff;
            --border: #3c3c3c;
            --toolbar-bg: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;

            gap: 10px;

            background: transparent;

            transition: all 0.2s;

        .toolbar-btn:hover {
            background: var(--bg-tertiary);

<body>
    <div class="app-container">
        <header class="header">
            <h1>📝 Markdown Editor</h1>
            <div class="header-actions">
                <span class="word-count" id="wordCount">0 words</span>
                <button class="btn" id="copyBtn">📋 Copy Markdown</button>
            </div>
        </header>

        <div class="toolbar">
            <button class="toolbar-btn" data-action="bold" title="Bold (Ctrl+B)"><b>B</b></button>
            <button class="toolbar-btn" data-action="italic" title="Italic (Ctrl+I)"><i>I</i></button>
            <button class="toolbar-btn" data-action="heading" title="Heading">H</button>
            <button class="toolbar-btn" data-action="link" title="Link">🔗</button>
            <button class="toolbar-btn" data-action="list" title="Bullet List">•</button>
            <button class="toolbar-btn" data-action="numberedList" title="Numbered List">1.</button>
            <button class="toolbar-btn" data-action="code" title="Code Inline">&lt;/&gt;</button>
            <button class="toolbar-btn" data-action="codeBlock" title="Code Block">{ }</button>
            <button class="toolbar-btn" data-action="blockquote" title="Blockquote">"</button>
            <button class="toolbar-btn" data-action="hr" title="Horizontal Rule">—</button>
        </div>

        <div class="main-content">
            <div class="editor-pane">
                <div class="pane-header">Editor</div>
                <textarea id="editor" placeholder="Write your markdown here..."></textarea>
            </div>
            <div class="preview-pane">
                <div class="pane-header">Preview</div>
                <div id="preview"></div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">Copied to clipboard!</div>

    <script>
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        const wordCount = document.getElementById('wordCount');
        const copyBtn = document.getElementById('copyBtn');
        const toast = document.getElementById('toast');

        const sampleMarkdown = `# Welcome to Markdown Editor

This is a **live preview** markdown editor with a *dark theme*.

## Features

- **Bold** and *italic* text
- [Links](https://example.com)
- Lists (ordered and unordered)
- \`Inline code\` and code blocks
- Blockquotes
- And more!

## Code Block Example

\`\`\`javascript
function greet(name) {
    console.log(\`Hello, \${name}!\`);
}
greet('World');
\`\`\`

## Blockquote

> "The best way to predict the future is to invent it."
> — Alan Kay

## Getting Started

Start typing markdown on the left and see the preview instantly!

---

Made with ❤️
`;

        editor.value = sampleMarkdown;

        // Markdown parser
        function parseMarkdown(text) {
            let html = text
                // Escape HTML
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                // Code blocks
                .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code class="language-$1">$2</code></pre>')
                // Inline code
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                // Headers
                .replace(/^###### (.+)$/gm, '<h6>$1</h6>')
                .replace(/^##### (.+)$/gm, '<h5>$1</h5>')
                .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
                .replace(/^### (.+)$/gm, '<h3>$1</h3>')
                .replace(/^## (.+)$/gm, '<h2>$1</h2>')
                .replace(/^# (.+)$/gm, '<h1>$1</h1>')
                // Bold and Italic
                .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/___(.+?)___/g, '<strong><em>$1</em></strong>')
                .replace(/__(.+?)__/g, '<strong>$1</strong>')
                .replace(/_(.+?)_/g, '<em>$1</em>')
                // Strikethrough
                .replace(/~~(.+?)~~/g, '<del>$1</del>')
                // Blockquotes
                .replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>')
                // Horizontal rule
                .replace(/^---$/gm, '<hr>')
                .replace(/^\*\*\*$/gm, '<hr>')
                // Links
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
                // Images
                .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">')
                // Unordered lists
                .replace(/^\* (.+)$/gm, '<li>$1</li>')
                .replace(/^- (.+)$/gm, '<li>$1</li>')
                // Ordered lists
                .replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

            // Wrap lists
            html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
            
            // Paragraphs
            html = html.split('\n\n').map(p => {
                if (!p.trim()) return '';
                if (p.startsWith('<')) return p;
                return '<p>' + p.trim() + '</p>';
            }).join('\n');

            // Fix blockquote nesting
            html = html.replace(/<\/blockquote>\n<blockquote>/g, '\n');

            return html;
        }

        // Update preview
        function updatePreview() {
            preview.innerHTML = parseMarkdown(editor.value);
            updateWordCount();
        }

        // Word count
        function updateWordCount() {
            const text = editor.value.trim();
            const words = text ? text.split(/\s+/).length : 0;
            const chars = text.length;
            wordCount.textContent = `${words} words • ${chars} characters`;
        }

        // Insert formatting
        function insertFormatting(before, after = '') {
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            const selected = editor.value.substring(start, end) || 'text';
            const replacement = before + selected + after;
            
            editor.value = editor.value.substring(0, start) + replacement + editor.value.substring(end);
            editor.focus();
            editor.setSelectionRange(start, start + replacement.length);
            updatePreview();
        }

        // Toolbar actions
        document.querySelectorAll('.toolbar-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const action = btn.dataset.action;
                switch(action) {
                    case 'bold': insertFormatting('**', '**'); break;
                    case 'italic': insertFormatting('*', '*'); break;
                    case 'heading': insertFormatting('## ', ''); break;
                    case 'link': insertFormatting('[', '](url)'); break;
                    case 'list': insertFormatting('- ', ''); break;
                    case 'numberedList': insertFormatting('1. ', ''); break;
                    case 'code': insertFormatting('`', '`'); break;
                    case 'codeBlock': insertFormatting('```\n', '\n```'); break;
                    case 'blockquote': insertFormatting('> ', ''); break;
                    case 'hr': insertFormatting('\n---\n', ''); break;
                }
            });
        });

        // Copy button
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(editor.value).then(() => {
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            });
        });

        // Keyboard shortcuts
        editor.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                switch(e.key.toLowerCase()) {
                    case 'b':
                        e.preventDefault();
                        insertFormatting('**', '**');
                        break;
                    case 'i':
                        e.preventDefault();
                        insertFormatting('*', '*');
                        break;
                }
            }
            // Tab key support
            if (e.key === 'Tab') {
                e.preventDefault();
                insertFormatting('  ');
            }
        });

        // Live preview
        editor.addEventListener('input', updatePreview);

        // Initial render
        updatePreview();
    </script>
</body>
</html>
