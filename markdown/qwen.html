<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Markdown Editor</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --panel-bg: #252526;
            --text-color: #d4d4d4;
            --accent-color: #007acc;
            --border-color: #3e3e42;
            --toolbar-bg: #333333;
            --hover-color: #3e3e42;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Toolbar Styling */
        .toolbar {
            background-color: var(--toolbar-bg);
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-color);
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover {
            background-color: var(--hover-color);
            border-color: var(--border-color);
        }

        .btn:active {
            background-color: var(--accent-color);
            color: white;
        }

        .spacer {
            flex-grow: 1;
        }

        /* Main Layout */
        .container {
            display: flex;
            flex: 1;
            height: calc(100vh - 50px); /* Subtract toolbar height */
        }

        .pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-right: 1px solid var(--border-color);
        }

        .pane:last-child {
            border-right: none;
        }

        .pane-header {
            padding: 8px 15px;
            background-color: var(--panel-bg);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            color: #888;
            border-bottom: 1px solid var(--border-color);
        }

        /* Editor Specifics */
        textarea {
            flex: 1;
            background-color: var(--bg-color);
            color: var(--text-color);
            border: none;
            resize: none;
            padding: 20px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 16px;
            line-height: 1.6;
            outline: none;
        }

        /* Preview Specifics */
        .preview-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background-color: var(--bg-color);
            line-height: 1.6;
        }

        /* Markdown Typography */
        .preview-content h1, .preview-content h2, .preview-content h3 {
            margin-top: 1em;
            margin-bottom: 0.5em;
            color: #fff;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.3em;
        }

        .preview-content p {
            margin-bottom: 1em;
        }

        .preview-content a {
            color: var(--accent-color);
            text-decoration: none;
        }

        .preview-content a:hover {
            text-decoration: underline;
        }

        .preview-content code {
            background-color: var(--panel-bg);
            padding: 2px 5px;
            border-radius: 3px;
            font-family: monospace;
            color: #ce9178;
        }

        .preview-content pre {
            background-color: var(--panel-bg);
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            margin-bottom: 1em;
            border: 1px solid var(--border-color);
        }

        .preview-content pre code {
            background-color: transparent;
            padding: 0;
            color: var(--text-color);
        }

        .preview-content blockquote {
            border-left: 4px solid var(--accent-color);
            padding-left: 15px;
            color: #888;
            margin-bottom: 1em;
        }

        .preview-content ul, .preview-content ol {
            margin-bottom: 1em;
            padding-left: 2em;
        }

        .preview-content li {
            margin-bottom: 5px;
        }

        /* Footer / Status Bar */
        .status-bar {
            background-color: var(--accent-color);
            color: white;
            padding: 4px 15px;
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            
            .pane {
                height: 50%;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }
            
            .pane:last-child {
                border-bottom: none;
            }
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <button class="btn" onclick="insertFormat('**', '**')" title="Bold"><b>B</b></button>
        <button class="btn" onclick="insertFormat('*', '*')" title="Italic"><i>I</i></button>
        <button class="btn" onclick="insertFormat('# ', '')" title="Heading">H1</button>
        <button class="btn" onclick="insertFormat('## ', '')" title="Heading">H2</button>
        <button class="btn" onclick="insertFormat('- ', '')" title="List">• List</button>
        <button class="btn" onclick="insertFormat('`', '`')" title="Inline Code">&lt;/&gt;</button>
        <button class="btn" onclick="insertFormat('\n```\n', '\n```\n')" title="Code Block">Block</button>
        <button class="btn" onclick="insertFormat('> ', '')" title="Quote">Quote</button>
        <button class="btn" onclick="insertFormat('[', '](url)')" title="Link">Link</button>
        
        <div class="spacer"></div>
        
        <button class="btn" onclick="copyMarkdown()" title="Copy Markdown">📋 Copy</button>
    </div>

    <div class="container">
        <div class="pane">
            <div class="pane-header">Markdown</div>
            <textarea id="editor" oninput="updatePreview()"></textarea>
        </div>
        <div class="pane">
            <div class="pane-header">Preview</div>
            <div id="preview" class="preview-content"></div>
        </div>
    </div>

    <div class="status-bar">
        <span id="word-count">0 Words</span>
        <span>Markdown Editor</span>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        const wordCountDisplay = document.getElementById('word-count');

        // Default Content
        const defaultText = `# Welcome to Markdown Editor

This is a **split-pane** markdown editor with live preview.

## Features
- Real-time preview
- Dark theme
- Simple formatting toolbar

### Formatting
You can use *italic*, **bold**, and \`inline code\`.

> "Design is not just what it looks like and feels like. Design is how it works." - Steve Jobs

### Code Block
\`\`\`javascript
function hello() {
    console.log("Hello World!");
}
\`\`\`

Check out [Markdown Guide](https://www.markdownguide.org).
`;

        // Initialize
        editor.value = defaultText;
        updatePreview();

        // Core Logic: Update Preview
        function updatePreview() {
            const markdownText = editor.value;
            
            // 1. Update Word Count
            const words = markdownText.trim().split(/\s+/).filter(word => word.length > 0).length;
            wordCountDisplay.textContent = `${words} Word${words !== 1 ? 's' : ''}`;

            // 2. Parse Markdown
            let html = markdownText
                // Escape HTML characters to prevent XSS/Rendering issues
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");

            // 3. Parse Code Blocks first (to protect content inside)
            // Using a temporary placeholder strategy could be cleaner, but simple regex replacement works for basic editors
            const codeBlocks = [];
            html = html.replace(/```([\s\S]*?)```/g, (match, code) => {
                codeBlocks.push(`<pre><code>${code.trim()}</code></pre>`);
                return `%%CODE_BLOCK_${codeBlocks.length - 1}%%`;
            });

            // 4. Parse Inline Elements (Links, Bold, Italic, Inline Code)
            html = html
                // Links [text](url)
                .replace(/\[([^\]]+)\]\(([^\)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
                // Bold **text**
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                // Italic *text*
                .replace(/\*([^*]+)\*/g, '<em>$1</em>')
                // Inline Code `text`
                .replace(/`([^`]+)`/g, '<code>$1</code>');

            // 5. Parse Block Elements (Headings, Blockquotes, Lists)
            // Headings
            html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
            html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
            html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');
            
            // Blockquotes
            html = html.replace(/^> (.*$)/gim, '<blockquote>$1</blockquote>');

            // Lists (Simple unordered list detection)
            // Note: A full parser is complex; this handles consecutive lines starting with -
            html = html.replace(/^- (.*$)/gim, '<li>$1</li>');
            // Wrap consecutive <li> in <ul>
            html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');

            // Paragraphs (Add <p> tags to remaining lines that aren't tags)
            // Split by newline, process, join
            html = html.split(/\n\n+/).map(line => {
                if (line.trim() === '') return '';
                // If line doesn't start with an HTML tag, wrap in paragraph
                if (!line.trim().startsWith('<')) {
                    return `<p>${line.trim()}</p>`;
                }
                return line;
            }).join('\n');

            // 6. Restore Code Blocks
            html = html.replace(/%%CODE_BLOCK_(\d+)%%/g, (match, index) => {
                return codeBlocks[index];
            });

            preview.innerHTML = html;
        }

        // Toolbar Helper: Insert formatting characters
        function insertFormat(before, after) {
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            const text = editor.value;
            const selection = text.substring(start, end);
            
            const newText = text.substring(0, start) + before + selection + after + text.substring(end);
            
            editor.value = newText;
            
            // Restore focus and cursor position (after the inserted text)
            editor.focus();
            editor.selectionStart = start + before.length;
            editor.selectionEnd = end + before.length;
            
            updatePreview();
        }

        // Copy to Clipboard
        function copyMarkdown() {
            editor.select();
            document.execCommand('copy');
            
            // Visual feedback
            const btn = document.querySelector('.btn[title="Copy Markdown"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = "✓ Copied";
            setTimeout(() => {
                btn.innerHTML = originalText;
            }, 1500);
        }
    </script>
</body>
</html>
