<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode Markdown Editor</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --editor-bg: #252526;
            --preview-bg: #1e1e1e;
            --text-color: #d4d4d4;
            --accent-color: #007acc;
            --border-color: #333333;
            --toolbar-bg: #333333;
            --hover-color: #444444;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header / Toolbar */
        header {
            background-color: var(--toolbar-bg);
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: space-between;
        }

        .toolbar-group {
            display: flex;
            gap: 5px;
        }

        button {
            background-color: var(--editor-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 3px;
            font-size: 14px;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--hover-color);
        }

        button:active {
            background-color: var(--accent-color);
        }

        .status-bar {
            font-size: 0.85rem;
            color: #888;
            min-width: 120px;
            text-align: right;
        }

        /* Main Layout */
        .container {
            display: flex;
            flex: 1;
            height: calc(100vh - 60px); /* Adjust based on header height */
        }

        .pane {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            border-right: 1px solid var(--border-color);
        }

        /* Editor Styles */
        #editor {
            background-color: var(--editor-bg);
            color: var(--text-color);
            border: none;
            resize: none;
            outline: none;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 16px;
            line-height: 1.6;
            width: 100%;
            height: 100%;
        }

        /* Preview Styles */
        #preview {
            background-color: var(--preview-bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
        }

        /* Markdown Content Styling */
        #preview h1, #preview h2, #preview h3 {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.3em;
            margin-top: 1.5em;
            color: #fff;
        }
        
        #preview p { margin-bottom: 1em; }

        #preview a { color: var(--accent-color); text-decoration: none; }
        #preview a:hover { text-decoration: underline; }

        #preview blockquote {
            border-left: 4px solid var(--accent-color);
            margin: 1em 0;
            padding: 0.5em 1em;
            background: var(--editor-bg);
            color: #aaa;
        }

        #preview code {
            background-color: #3c3c3c;
            padding: 2px 4px;
            border-radius: 3px;
            font-family: monospace;
            font-size: 0.9em;
        }

        #preview pre {
            background-color: #151515;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
            border: 1px solid var(--border-color);
        }

        #preview pre code {
            background-color: transparent;
            padding: 0;
        }

        #preview ul, #preview ol {
            padding-left: 2em;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                height: auto;
                overflow-y: auto;
            }
            
            .pane {
                height: 50vh;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }
            
            #editor {
                height: 100%;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="toolbar-group">
            <button onclick="insertMarkdown('**', '**')" title="Bold"><b>B</b></button>
            <button onclick="insertMarkdown('*', '*')" title="Italic"><i>I</i></button>
            <button onclick="insertMarkdown('# ', '')" title="Heading">H1</button>
            <button onclick="insertMarkdown('## ', '')" title="Heading">H2</button>
            <button onclick="insertMarkdown('[](', ')\n')" title="Link">🔗</button>
            <button onclick="insertMarkdown('- ', '')" title="List">• List</button>
            <button onclick="insertMarkdown('\`\`\`\n', '\n\`\`\`')" title="Code Block">Code</button>
        </div>
        
        <div class="status-bar">
            <span id="word-count">0 words</span> | 
            <button onclick="copyToClipboard()" style="padding: 2px 8px; font-size: 12px;">Copy MD</button>
        </div>
    </header>

    <div class="container">
        <div class="pane">
            <textarea id="editor" placeholder="Type your markdown here..."></textarea>
        </div>
        <div class="pane" id="preview">
            <!-- Preview renders here -->
        </div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        const wordCountDisplay = document.getElementById('word-count');

        // Default Content
        const defaultContent = `# Welcome to Markdown Editor

This is a **live preview** markdown editor. Type on the left, see results on the right.

## Features
- Live Rendering
- Dark Theme
- Copy to Clipboard
- No External Dependencies

### Formatting Examples

You can write *italic* or **bold** text.

> This is a blockquote. It's useful for notes.

Here is some code:
\`\`\`javascript
function hello() {
    console.log("Hello World!");
}
\`\`\`

And a link to [Google](https://google.com).

Happy writing!
`;

        // Initialize
        if (localStorage.getItem('md-content')) {
            editor.value = localStorage.getItem('md-content');
        } else {
            editor.value = defaultContent;
        }
        
        updatePreview();

        // Event Listeners
        editor.addEventListener('input', () => {
            updatePreview();
            saveToLocalStorage();
        });

        // Core Logic
        function updatePreview() {
            const rawMarkdown = editor.value;
            
            // Update Word Count
            const words = rawMarkdown.trim() === '' ? 0 : rawMarkdown.trim().split(/\s+/).length;
            wordCountDisplay.textContent = `${words} words`;

            // Parse Markdown
            let html = rawMarkdown
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                // Code Blocks (handle before paragraphs to avoid interference)
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                // Headings
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                // Bold and Italic
                .replace(/\*\*(.*)\*\*/gim, '<b>$1</b>')
                .replace(/\*(.*)\*/gim, '<i>$1</i>')
                // Blockquotes
                .replace(/^> (.*$)/gim, '<blockquote>$1</blockquote>')
                // Links
                .replace(/\[(.*?)\]\((.*?)\)/gim, '<a href="$2" target="_blank">$1</a>')
                // Inline Code
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                // Unordered Lists (Simple regex for - items)
                .replace(/^- (.*$)/gim, '<li>$1</li>')
                // Wrap consecutive <li> in <ul> (Simplified approach)
                .replace(/(<li>.*<\/li>\n?)+/gim, '<ul>$&</ul>')
                // Line Breaks / Paragraphs
                .replace(/\n/gim, '<br>');

            preview.innerHTML = html;
        }

        // Toolbar Insertion Logic
        function insertMarkdown(before, after) {
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            const text = editor.value;
            const selectedText = text.substring(start, end);
            
            const replacement = before + selectedText + after;
            
            editor.value = text.substring(0, start) + replacement + text.substring(end);
            
            editor.focus();
            
            // Move cursor after the insertion
            const newCursorPos = start + before.length + selectedText.length;
            editor.setSelectionRange(newCursorPos, newCursorPos);
            
            updatePreview();
        }

        // Utility Functions
        function copyToClipboard() {
            navigator.clipboard.writeText(editor.value).then(() => {
                const btn = document.querySelector('.status-bar button');
                const originalText = btn.textContent;
                btn.textContent = "Copied!";
                setTimeout(() => btn.textContent = originalText, 1500);
            });
        }

        function saveToLocalStorage() {
            localStorage.setItem('md-content', editor.value);
        }
    </script>
</body>
</html>
