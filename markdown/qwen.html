<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Editor</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --editor-bg: #2d2d2d;
            --text-color: #d4d4d4;
            --border-color: #444;
            --accent-color: #3700b3;
            --accent-hover: #6200ee;
            --toolbar-bg: #252526;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        header {
            background-color: var(--toolbar-bg);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            gap: 5px;
            background-color: var(--toolbar-bg);
            padding: 5px 20px;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
        }

        .btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-color);
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.9rem;
            transition: background 0.2s, color 0.2s;
        }

        .btn:hover {
            background-color: #3e3e42;
            border-color: #555;
        }

        .btn:active {
            background-color: var(--accent-color);
        }

        /* Main Layout */
        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .pane {
            flex: 1;
            overflow-y: auto;
            position: relative;
        }

        #editor {
            background-color: var(--editor-bg);
            color: #fff;
            border: none;
            padding: 20px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 16px;
            line-height: 1.6;
            resize: none;
            outline: none;
            width: 100%;
            height: 100%;
            border-right: 1px solid var(--border-color);
        }

        #preview {
            background-color: var(--bg-color);
            padding: 20px;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Markdown Styles in Preview */
        #preview h1, #preview h2, #preview h3 {
            margin-top: 1em;
            margin-bottom: 0.5em;
            border-bottom: 1px solid #333;
            padding-bottom: 0.3em;
        }
        
        #preview p { margin-bottom: 1em; }
        
        #preview a { color: #61afef; text-decoration: none; }
        #preview a:hover { text-decoration: underline; }
        
        #preview code {
            background-color: #3c3c3c;
            padding: 2px 4px;
            border-radius: 4px;
            font-family: monospace;
            color: #e06c75;
        }
        
        #preview pre {
            background-color: #252526;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            margin-bottom: 1em;
        }
        
        #preview pre code {
            background: none;
            color: #d4d4d4;
        }
        
        #preview blockquote {
            border-left: 4px solid var(--accent-color);
            margin: 1em 0;
            padding: 0.5em 1em;
            background-color: rgba(55, 0, 179, 0.1);
            color: #b0b0b0;
        }

        #preview ul, #preview ol {
            margin-left: 2em;
            margin-bottom: 1em;
        }

        /* Footer */
        footer {
            background-color: var(--toolbar-bg);
            padding: 5px 20px;
            font-size: 0.8rem;
            color: #888;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            flex-shrink: 0;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            #editor {
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                height: 50%;
            }
            #preview {
                height: 50%;
            }
            .toolbar {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>MD Editor</h1>
        <button class="btn" id="copyBtn">📋 Copy Markdown</button>
    </header>

    <div class="toolbar">
        <button class="btn" onclick="insertMd('**', '**')" title="Bold"><b>B</b></button>
        <button class="btn" onclick="insertMd('*', '*')" title="Italic"><i>I</i></button>
        <button class="btn" onclick="insertMd('\n# ', '')" title="Heading 1">H1</button>
        <button class="btn" onclick="insertMd('\n## ', '')" title="Heading 2">H2</button>
        <button class="btn" onclick="insertMd('[', '](url)')" title="Link">🔗</button>
        <button class="btn" onclick="insertMd('\n- ', '')" title="List">☰</button>
        <button class="btn" onclick="insertMd('\n```\n', '\n```\n')" title="Code Block">{ }</button>
        <button class="btn" onclick="insertMd('\n> ', '')" title="Quote">❝</button>
    </div>

    <div class="container">
        <div class="pane">
            <textarea id="editor" spellcheck="false"></textarea>
        </div>
        <div class="pane" id="preview">
            <!-- Preview content goes here -->
        </div>
    </div>

    <footer>
        <span id="wordCount">0 words</span>
        <span>Markdown Live Preview</span>
    </footer>

    <script>
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        const wordCountSpan = document.getElementById('wordCount');
        const copyBtn = document.getElementById('copyBtn');

        // Sample Content
        const defaultText = `# Welcome to Markdown Editor

This is a **simple** and *lightweight* markdown editor built in a single HTML file.

## Features
- Live Preview
- Dark Theme
- No External Dependencies
- Copy to Clipboard

## Code Example
\`\`\`javascript
function hello() {
    console.log("Hello, World!");
}
\`\`\`

## Blockquote
> "The best way to predict the future is to create it." - Peter Drucker

## Links
Check out [Markdown Guide](https://www.markdownguide.org/) for more syntax.

---
Start typing on the left to see magic happen on the right!
`;

        // Initialize
        editor.value = defaultText;
        updatePreview();

        // Event Listener for Live Preview
        editor.addEventListener('input', () => {
            updatePreview();
            updateWordCount();
        });

        // Function to parse Markdown to HTML
        function parseMarkdown(text) {
            let html = text;

            // Escape HTML characters to prevent XSS (basic)
            html = html.replace(/&/g, "&amp;");
            html = html.replace(/</g, "&lt;");
            html = html.replace(/>/g, "&gt;");

            // Code Blocks (```code```) - Must be done before other formatting
            html = html.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');

            // Headings (# to ######)
            html = html.replace(/^###### (.*$)/gim, '<h6>$1</h6>');
            html = html.replace(/^##### (.*$)/gim, '<h5>$1</h5>');
            html = html.replace(/^#### (.*$)/gim, '<h4>$1</h4>');
            html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
            html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
            html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');

            // Blockquotes
            html = html.replace(/^> (.*$)/gim, '<blockquote>$1</blockquote>');

            // Bold and Italic
            // Order matters: Bold/Italic combined first, then Bold, then Italic
            html = html.replace(/\*\*\*(.*?)\*\*\*/g, '<b><i>$1</i></b>'); // Bold & Italic
            html = html.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>'); // Bold
            html = html.replace(/\*(.*?)\*/g, '<i>$1</i>'); // Italic

            // Inline Code
            html = html.replace(/`(.*?)`/g, '<code>$1</code>');

            // Links
            html = html.replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank">$1</a>');

            // Unordered Lists
            // Simple regex for list items
            html = html.replace(/^\- (.*$)/gim, '<li>$1</li>');
            // Wrap consecutive <li> in <ul>
            html = html.replace(/(<li>.*<\/li>)/gim, '<ul>$1</ul>'); 
            // Clean up multiple UL tags if list is broken by newlines (simplified)
            html = html.replace(/<\/ul>\s*<ul>/g, ''); 

            // Horizontal Rule
            html = html.replace(/^---$/gim, '<hr>');

            // Paragraphs (Double newline)
            html = html.replace(/\n\n/g, '</p><p>');
            html = '<p>' + html + '</p>';

            // Clean up empty paragraphs
            html = html.replace(/<p><\/p>/g, '');
            html = html.replace(/<p>(<h[1-6]>)/g, '$1'); // Don't wrap headings in p
            html = html.replace(/(<\/h[1-6]>)<\/p>/g, '$1');
            html = html.replace(/<p>(<ul>)/g, '$1'); // Don't wrap lists in p
            html = html.replace(/(<\/ul>)<\/p>/g, '$1');
            html = html.replace(/<p>(<pre>)/g, '$1'); // Don't wrap pre in p
            html = html.replace(/(<\/pre>)<\/p>/g, '$1');
            html = html.replace(/<p>(<blockquote>)/g, '$1');
            html = html.replace(/(<\/blockquote>)<\/p>/g, '$1');
            html = html.replace(/<p>(<hr>)/g, '$1');

            return html;
        }

        function updatePreview() {
            const content = editor.value;
            preview.innerHTML = parseMarkdown(content);
        }

        function updateWordCount() {
            const text = editor.value.trim();
            const words = text === '' ? 0 : text.split(/\s+/).length;
            wordCountSpan.innerText = `${words} word${words !== 1 ? 's' : ''}`;
        }

        // Toolbar Helper Function
        function insertMd(before, after) {
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            const text = editor.value;
            const selectedText = text.substring(start, end);
            
            // Insert text
            const newText = text.substring(0, start) + before + selectedText + after + text.substring(end);
            editor.value = newText;
            
            // Restore focus and select the new selection area
            editor.focus();
            editor.selectionStart = start + before.length;
            editor.selectionEnd = end + before.length;
            
            updatePreview();
        }

        // Copy Button
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(editor.value).then(() => {
                const originalText = copyBtn.innerText;
                copyBtn.innerText = "Copied!";
                setTimeout(() => {
                    copyBtn.innerText = originalText;
                }, 2000);
            });
        });

    </script>
</body>
</html>
