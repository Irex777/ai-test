<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prague Weather Dashboard</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --accent-color: #4facfe;
            --accent-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --danger-color: #ff5252;
            --warning-color: #ffab40;
            --success-color: #69f0ae;
            --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* Responsive Layout */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
        }

        /* Header & Toggle */
        .header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 1px;
        }

        .unit-toggle {
            background: var(--card-bg);
            border: 1px solid #333;
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .unit-toggle:hover {
            background: #333;
        }

        /* Cards Generic Styles */
        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .card-title {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: block;
        }

        /* Current Weather Section */
        .current-weather {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--accent-gradient);
            color: white;
            position: relative;
            overflow: hidden;
        }

        .current-weather::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }

        .current-left h2 {
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        .current-left .location {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .current-temp {
            font-size: 5rem;
            font-weight: 700;
            line-height: 1;
        }

        .current-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            text-align: center;
            margin-top: 20px;
        }

        .detail-item span {
            display: block;
            font-size: 0.85rem;
            opacity: 0.8;
        }

        .detail-item strong {
            font-size: 1.1rem;
        }

        /* Forecast Row */
        .forecast-section {
            grid-column: 1 / -1;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
        }

        @media (max-width: 768px) {
            .forecast-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .forecast-grid > :last-child {
                grid-column: 1 / -1;
            }
        }

        .forecast-card {
            background: #252525;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100%;
        }

        .forecast-day {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .forecast-icon {
            width: 48px;
            height: 48px;
            margin: 10px 0;
        }

        .forecast-temps {
            font-size: 0.9rem;
            display: flex;
            gap: 10px;
        }

        .temp-high { color: var(--text-primary); }
        .temp-low { color: var(--text-secondary); }

        /* Charts & Data */
        .chart-container {
            width: 100%;
            height: 200px;
            position: relative;
        }

        svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .chart-line {
            fill: none;
            stroke: var(--accent-color);
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .chart-area {
            fill: rgba(79, 172, 254, 0.1);
        }

        .chart-dot {
            fill: var(--card-bg);
            stroke: var(--accent-color);
            stroke-width: 2;
        }

        .chart-label {
            fill: var(--text-secondary);
            font-size: 10px;
        }

        /* AQI & Sunrise */
        .info-grid {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .aqi-bar {
            height: 8px;
            background: #333;
            border-radius: 4px;
            margin: 15px 0;
            position: relative;
            overflow: hidden;
        }

        .aqi-fill {
            height: 100%;
            background: var(--success-color);
            width: 20%;
            border-radius: 4px;
        }

        .sun-times {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .sun-icon {
            width: 40px;
            height: 40px;
            color: #ffab40;
        }

        /* SVG Icons Utility */
        .icon-sun { fill: #ffab40; }
        .icon-cloud { fill: #b3b3b3; }
        .icon-rain { fill: #4facfe; }
        .icon-wind { fill: #fff; }
        .icon-humidity { fill: #fff; }
        
        /* Utility classes for icons */
        .weather-icon {
            width: 80px;
            height: 80px;
        }

    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div>
                <h1>Weather Dashboard</h1>
                <span style="color: var(--text-secondary);">Prague, Czech Republic</span>
            </div>
            <button id="unitToggle" class="unit-toggle">°C / °F</button>
        </header>

        <!-- Current Weather -->
        <section class="card current-weather">
            <div class="current-left">
                <div class="location">Prague, CZ</div>
                <h2>Partly Cloudy</h2>
                <div class="current-details">
                    <div class="detail-item">
                        <span>Wind</span>
                        <strong>12 km/h</strong>
                    </div>
                    <div class="detail-item">
                        <span>Humidity</span>
                        <strong>45%</strong>
                    </div>
                    <div class="detail-item">
                        <span>Pressure</span>
                        <strong>1012 hPa</strong>
                    </div>
                </div>
            </div>
            <div class="current-right">
                <div id="currentTemp" class="current-temp">18°</div>
                <!-- Simple SVG Sun Cloud Icon -->
                <svg class="weather-icon" viewBox="0 0 64 64">
                    <circle cx="24" cy="24" r="10" fill="#FFD700" />
                    <g stroke="#FFD700" stroke-width="2">
                        <line x1="24" y1="8" x2="24" y2="12" />
                        <line x1="24" y1="36" x2="24" y2="40" />
                        <line x1="8" y1="24" x2="12" y2="24" />
                        <line x1="36" y1="24" x2="40" y2="24" />
                        <line x1="12.7" y1="12.7" x2="15.5" y2="15.5" />
                        <line x1="32.5" y1="32.5" x2="35.3" y2="35.3" />
                        <line x1="12.7" y1="35.3" x2="15.5" y2="32.5" />
                        <line x1="32.5" y1="15.5" x2="35.3" y2="12.7" />
                    </g>
                    <path d="M46 48c6.6 0 12-5.4 12-12s-5.4-12-12-12c-1.2 0-2.3.2-3.4.5C43.7 21.1 38.6 17 32.5 17 24.5 17 18 23.5 18 31.5c0 .5 0 1 .1 1.5-3.6.6-6.3 3.8-6.3 7.5 0 4.1 3.4 7.5 7.5 7.5H46z" fill="#e0e0e0" />
                </svg>
            </div>
        </section>

        <!-- 5 Day Forecast -->
        <section class="forecast-section">
            <span class="card-title">5-Day Forecast</span>
            <div class="forecast-grid" id="forecastGrid">
                <!-- Injected via JS -->
            </div>
        </section>

        <!-- Info Grid: Chart, AQI, Sunrise -->
        <div class="info-grid">
            
            <!-- Temperature Chart -->
            <div class="card">
                <span class="card-title">Temperature Trend</span>
                <div class="chart-container">
                    <svg id="tempChart" viewBox="0 0 300 150" preserveAspectRatio="none">
                        <!-- Injected via JS -->
                    </svg>
                </div>
            </div>

            <!-- AQI & Sun -->
            <div class="card">
                <span class="card-title">Air Quality & Sun</span>
                <div>
                    <div style="display:flex; justify-content:space-between;">
                        <strong>Air Quality Index</strong>
                        <span style="color:var(--success-color)">Good</span>
                    </div>
                    <div class="aqi-bar">
                        <div class="aqi-fill"></div>
                    </div>
                    <div style="font-size: 0.8rem; color: #777;">AQI Value: 42 (US EPA)</div>
                </div>

                <hr style="border:0; border-top:1px solid #333; margin: 20px 0;">

                <div>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <strong>Sunrise / Sunset</strong>
                        <!-- Simple Sun SVG -->
                        <svg class="sun-icon" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="5" fill="#ffab40" />
                            <path stroke="#ffab40" stroke-width="2" d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
                        </svg>
                    </div>
                    <div class="sun-times">
                        <div>
                            <span style="display:block; font-size:0.8rem; color:#777;">Sunrise</span>
                            <span>05:42 AM</span>
                        </div>
                        <div style="text-align:right;">
                            <span style="display:block; font-size:0.8rem; color:#777;">Sunset</span>
                            <span>08:15 PM</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- Data ---
        const isCelsius = true; // Default state
        let unit = 'C';

        const weatherData = [
            { day: 'Mon', high: 18, low: 12, icon: 'sun' },
            { day: 'Tue', high: 20, low: 14, icon: 'cloud' },
            { day: 'Wed', high: 16, low: 11, icon: 'rain' },
            { day: 'Thu', high: 15, low: 10, icon: 'rain' },
            { day: 'Fri', high: 19, low: 13, icon: 'sun' }
        ];

        // --- SVG Icons Definitions ---
        const icons = {
            sun: `<svg viewBox="0 0 64 64" class="forecast-icon">
                    <circle cx="32" cy="32" r="14" fill="#FFD700" />
                    <g stroke="#FFD700" stroke-width="3" stroke-linecap="round">
                        <line x1="32" y1="8" x2="32" y2="14" />
                        <line x1="32" y1="50" x2="32" y2="56" />
                        <line x1="8" y1="32" x2="14" y2="32" />
                        <line x1="50" y1="32" x2="56" y2="32" />
                        <line x1="15" y1="15" x2="19.5" y2="19.5" />
                        <line x1="44.5" y1="44.5" x2="49" y2="49" />
                        <line x1="15" y1="49" x2="19.5" y2="44.5" />
                        <line x1="44.5" y1="19.5" x2="49" y2="15" />
                    </g>
                  </svg>`,
            cloud: `<svg viewBox="0 0 64 64" class="forecast-icon">
                    <path d="M46 54c6.6 0 12-5.4 12-12s-5.4-12-12-12c-1.2 0-2.3.2-3.4.5C43.7 25.1 38.6 21 32.5 21 24.5 21 18 27.5 18 35.5c0 .5 0 1 .1 1.5-3.6.6-6.3 3.8-6.3 7.5 0 4.1 3.4 7.5 7.5 7.5H46z" fill="#b3b3b3" />
                  </svg>`,
            rain: `<svg viewBox="0 0 64 64" class="forecast-icon">
                    <path d="M46 44c6.6 0 12-5.4 12-12s-5.4-12-12-12c-1.2 0-2.3.2-3.4.5C43.7 15.1 38.6 11 32.5 11 24.5 11 18 17.5 18 25.5c0 .5 0 1 .1 1.5-3.6.6-6.3 3.8-6.3 7.5 0 4.1 3.4 7.5 7.5 7.5H46z" fill="#78909c" />
                    <path d="M24 50l-4 8M32 50l0 8M40 50l4 8" stroke="#4facfe" stroke-width="3" stroke-linecap="round" />
                  </svg>`
        };

        // --- Helper Functions ---
        function cToF(c) {
            return Math.round((c * 9 / 5) + 32);
        }

        function formatTemp(temp) {
            return unit === 'C' ? `${temp}°` : `${cToF(temp)}°`;
        }

        // --- Render Functions ---

        function renderForecast() {
            const grid = document.getElementById('forecastGrid');
            grid.innerHTML = '';

            weatherData.forEach(day => {
                const card = document.createElement('div');
                card.className = 'forecast-card';
                card.innerHTML = `
                    <div class="forecast-day">${day.day}</div>
                    <div class="forecast-icon-wrapper">
                        ${icons[day.icon]}
                    </div>
                    <div class="forecast-temps">
                        <span class="temp-high">${formatTemp(day.high)}</span>
                        <span class="temp-low">${formatTemp(day.low)}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function renderChart() {
            const svg = document.getElementById('tempChart');
            svg.innerHTML = ''; // Clear

            // Chart dimensions
            const width = 300;
            const height = 150;
            const padding = 20;
            
            // Determine max/min for scaling
            const temps = weatherData.flatMap(d => [d.high, d.low]);
            const maxTemp = Math.max(...temps) + 2;
            const minTemp = Math.min(...temps) - 2;
            const range = maxTemp - minTemp;

            // Helper to map temp to Y coordinate
            const getY = (temp) => {
                return height - ((temp - minTemp) / range) * (height - (padding * 2)) - padding;
            };

            // Helper to map day index to X coordinate
            const getX = (index) => {
                return (index / (weatherData.length - 1)) * (width - (padding * 2)) + padding;
            };

            // Build High Path
            let highPath = `M ${getX(0)} ${getY(weatherData[0].high)}`;
            let lowPath = `M ${getX(0)} ${getY(weatherData[0].low)}`;
            
            // Area path (High line down to bottom, back along X axis)
            let areaPath = `M ${getX(0)} ${getY(weatherData[0].high)}`;

            for (let i = 1; i < weatherData.length; i++) {
                highPath += ` L ${getX(i)} ${getY(weatherData[i].high)}`;
                lowPath += ` L ${getX(i)} ${getY(weatherData[i].low)}`;
                areaPath += ` L ${getX(i)} ${getY(weatherData[i].high)}`;
            }

            // Create Area Path (closed)
            const closedArea = `${areaPath} L ${getX(weatherData.length - 1)} ${height} L ${getX(0)} ${height} Z`;

            // Draw Area
            const area = document.createElementNS("http://www.w3.org/2000/svg", "path");
            area.setAttribute("d", closedArea);
            area.setAttribute("class", "chart-area");
            svg.appendChild(area);

            // Draw High Line
            const highLine = document.createElementNS("http://www.w3.org/2000/svg", "path");
            highLine.setAttribute("d", highPath);
            highLine.setAttribute("class", "chart-line");
            svg.appendChild(highLine);

            // Draw Low Line (Dashed style)
            const lowLine = document.createElementNS("http://www.w3.org/2000/svg", "path");
            lowLine.setAttribute("d", lowPath);
            lowLine.setAttribute("class", "chart-line");
            lowLine.setAttribute("stroke-dasharray", "5,5");
            lowLine.setAttribute("opacity", "0.5");
            svg.appendChild(lowLine);

            // Draw Labels (Days)
            weatherData.forEach((d, i) => {
                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", getX(i));
                text.setAttribute("y", height);
                text.setAttribute("text-anchor", "middle");
                text.setAttribute("class", "chart-label");
                text.textContent = d.day;
                svg.appendChild(text);

                // Draw dots for highs
                const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                dot.setAttribute("cx", getX(i));
                dot.setAttribute("cy", getY(d.high));
                dot.setAttribute("r", "3");
                dot.setAttribute("class", "chart-dot");
                svg.appendChild(dot);
                
                // Tooltip-like text for exact temp on hover could go here, keeping it simple for now
            });
        }

        function updateCurrentTemp() {
            // Hardcoded current temp logic based on unit
            const cTemp = 18;
            const fTemp = cToF(cTemp);
            document.getElementById('currentTemp').textContent = unit === 'C' ? `${cTemp}°` : `${fTemp}°`;
        }

        // --- Event Listeners ---
        document.getElementById('unitToggle').addEventListener('click', () => {
            unit = unit === 'C' ? 'F' : 'C';
            renderForecast();
            renderChart();
            updateCurrentTemp();
        });

        // --- Initialization ---
        (function init() {
            renderForecast();
            renderChart();
            updateCurrentTemp();
        })();

    </script>
</body>
</html>
