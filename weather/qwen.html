<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prague Weather Dashboard</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --accent: #64b5f6;
            --accent-glow: rgba(100, 181, 246, 0.2);
            --danger: #ef5350;
            --warning: #ffb74d;
            --success: #66bb6a;
            --chart-line: #64b5f6;
            --chart-area: rgba(100, 181, 246, 0.1);
            --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .location-badge {
            background: var(--card-bg);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Toggle Switch */
        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }
        
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }
        
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #444;
            transition: .4s;
            border-radius: 34px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background-color: var(--accent);
        }
        
        input:checked + .slider:before {
            transform: translateX(20px);
        }

        /* Cards */
        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* Current Weather Section */
        .current-weather {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
        }

        .weather-icon-large {
            width: 120px;
            height: 120px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px var(--accent-glow));
        }

        .temp-large {
            font-size: 4.5rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 5px;
        }

        .condition-text {
            font-size: 1.5rem;
            color: var(--accent);
            text-transform: capitalize;
            margin-bottom: 20px;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .detail-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .detail-value {
            font-weight: 600;
            font-size: 1.1rem;
        }

        /* Chart Section */
        .chart-container {
            position: relative;
            height: 200px;
            width: 100%;
            margin-top: 20px;
        }

        .chart-svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        /* Forecast Row */
        .forecast-row {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .forecast-item {
            flex: 1;
            min-width: 80px;
            background: #252525;
            border-radius: 12px;
            padding: 15px 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s;
        }

        .forecast-item:hover {
            transform: translateY(-5px);
            background: #2a2a2a;
        }

        .forecast-day {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .forecast-icon {
            width: 40px;
            height: 40px;
        }

        .forecast-temp {
            font-weight: 600;
        }

        /* AQI & Sun Info */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .aqi-meter {
            height: 6px;
            width: 100%;
            background: linear-gradient(to right, var(--success), var(--warning), var(--danger));
            border-radius: 3px;
            margin-top: 10px;
            position: relative;
        }

        .aqi-indicator {
            position: absolute;
            top: -4px;
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
            transition: left 0.5s ease;
        }

        .sun-times {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }

        .sun-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Icons */
        .icon-sun circle { fill: #FFD54F; }
        .icon-cloud path { fill: #90A4AE; }
        .icon-rain path { fill: #90A4AE; }
        .icon-rain circle { fill: #4FC3F7; }

        /* Responsive */
        @media (min-width: 768px) {
            .container {
                grid-template-columns: 2fr 1fr;
            }
            .current-weather {
                align-items: flex-start;
                text-align: left;
                flex-direction: row;
                justify-content: space-between;
            }
            .weather-icon-large {
                margin-bottom: 0;
                width: 150px;
                height: 150px;
            }
            .details-grid {
                width: auto;
                grid-template-columns: repeat(3, 1fr);
                margin-top: 0;
                padding-top: 0;
                border-top: none;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <header>
        <div class="location-badge">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                <circle cx="12" cy="10" r="3"></circle>
            </svg>
            Prague, CZ
        </div>
        <div class="toggle-container">
            <span>°C</span>
            <label class="switch">
                <input type="checkbox" id="unitToggle">
                <span class="slider"></span>
            </label>
            <span>°F</span>
        </div>
    </header>

    <!-- Current Weather Main Card -->
    <section class="card current-weather">
        <div>
            <div class="temp-large" id="currentTemp">14°</div>
            <div class="condition-text" id="currentCondition">Partly Cloudy</div>
            
            <div class="details-grid">
                <div class="detail-item">
                    <span class="detail-label">Humidity</span>
                    <span class="detail-value">62%</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Wind</span>
                    <span class="detail-value">12 km/h</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Feels Like</span>
                    <span class="detail-value" id="feelsLike">12°</span>
                </div>
            </div>
        </div>

        <!-- Dynamic Weather Icon (Sun with Cloud) -->
        <svg class="weather-icon-large" viewBox="0 0 100 100">
            <defs>
                <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#FFD54F;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#FFA000;stop-opacity:1" />
                </linearGradient>
            </defs>
            <circle cx="45" cy="45" r="20" fill="url(#sunGrad)" />
            <!-- Rays -->
            <path d="M45 15 L45 5 M45 75 L45 85 M15 45 L5 45 M75 45 L85 45 M25 25 L18 18 M65 65 L72 72 M25 65 L18 72 M65 25 L72 18" stroke="#FFD54F" stroke-width="3" stroke-linecap="round"/>
            <!-- Cloud -->
            <path d="M35 65 Q30 65 30 60 Q25 60 25 55 Q25 48 35 48 Q35 40 45 40 Q55 40 55 48 Q65 48 65 55 Q65 60 60 60 Q55 60 55 65 Z" fill="#90A4AE" opacity="0.9"/>
        </svg>
    </section>

    <!-- Air Quality & Sun Times -->
    <div class="info-grid">
        <div class="card">
            <h3 style="font-size: 1rem; margin-bottom: 10px;">Air Quality</h3>
            <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                <span style="font-size: 2rem; font-weight: bold; color: var(--success);">42</span>
                <span style="font-size: 0.9rem; color: var(--success);">Good</span>
            </div>
            <div class="aqi-meter">
                <div class="aqi-indicator" style="left: 15%;"></div>
            </div>
            <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 8px;">Air quality is satisfactory.</p>
        </div>
        
        <div class="card">
            <h3 style="font-size: 1rem; margin-bottom: 5px;">Sunlight</h3>
            <div class="sun-times">
                <div class="sun-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FFD54F" stroke-width="2">
                        <path d="M17 18a5 5 0 0 0-10 0"></path>
                        <line x1="12" y1="9" x2="12" y2="2"></line>
                        <line x1="4.22" y1="10.22" x2="5.64" y2="8.8"></line>
                        <line x1="1" y1="18" x2="3" y2="18"></line>
                        <line x1="21" y1="18" x2="23" y2="18"></line>
                        <line x1="18.36" y1="8.8" x2="19.78" y2="10.22"></line>
                        <line x1="23" y1="22" x2="1" y2="22"></line>
                        <polyline points="8 6 12 2 16 6"></polyline>
                    </svg>
                    <div>
                        <div style="font-size: 0.8rem; color: var(--text-secondary);">Sunrise</div>
                        <div style="font-weight: 600;">06:12</div>
                    </div>
                </div>
                <div class="sun-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FFA000" stroke-width="2">
                        <path d="M17 18a5 5 0 0 0-10 0"></path>
                        <line x1="12" y1="9" x2="12" y2="2"></line>
                        <line x1="4.22" y1="10.22" x2="5.64" y2="8.8"></line>
                        <line x1="1" y1="18" x2="3" y2="18"></line>
                        <line x1="21" y1="18" x2="23" y2="18"></line>
                        <line x1="18.36" y1="8.8" x2="19.78" y2="10.22"></line>
                        <line x1="23" y1="22" x2="1" y2="22"></line>
                    </svg>
                    <div>
                        <div style="font-size: 0.8rem; color: var(--text-secondary);">Sunset</div>
                        <div style="font-weight: 600;">20:45</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Chart Section -->
    <div class="card">
        <h3 style="margin-bottom: 15px;">Temperature Trend</h3>
        <div class="chart-container">
            <svg class="chart-svg" id="tempChart">
                <!-- Chart content injected by JS -->
            </svg>
        </div>
    </div>

    <!-- 5-Day Forecast -->
    <div class="card">
        <h3 style="margin-bottom: 15px;">5-Day Forecast</h3>
        <div class="forecast-row" id="forecastContainer">
            <!-- Forecast items injected by JS -->
        </div>
    </div>
</div>

<script>
    // --- Data ---
    const weatherData = {
        current: {
            temp: 14,
            feelsLike: 12,
            condition: 'Partly Cloudy',
            humidity: 62,
            wind: 12
        },
        forecast: [
            { day: 'Mon', high: 15, low: 9, icon: 'sun' },
            { day: 'Tue', high: 17, low: 10, icon: 'cloud' },
            { day: 'Wed', high: 13, low: 8, icon: 'rain' },
            { day: 'Thu', high: 14, low: 9, icon: 'cloud' },
            { day: 'Fri', high: 16, low: 11, icon: 'sun' },
            { day: 'Sat', high: 18, low: 12, icon: 'sun' },
            { day: 'Sun', high: 15, low: 10, icon: 'rain' }
        ]
    };

    let isCelsius = true;

    // --- Icons (SVG Strings) ---
    const icons = {
        sun: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="icon-sun"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>`,
        cloud: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="icon-cloud"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path></svg>`,
        rain: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="icon-rain"><path d="M16 13v8M8 13v8M12 15v8M20 16.58A5 5 0 0 0 18 7h-1.26A8 8 0 1 0 4 15.25"></path></svg>`
    };

    // --- Logic ---

    function celsiusToFahrenheit(c) {
        return Math.round((c * 9/5) + 32);
    }

    function renderDashboard() {
        const symbol = isCelsius ? '°C' : '°F';
        
        // Update Current Weather
        const displayTemp = isCelsius ? weatherData.current.temp : celsiusToFahrenheit(weatherData.current.temp);
        const displayFeels = isCelsius ? weatherData.current.feelsLike : celsiusToFahrenheit(weatherData.current.feelsLike);
        
        document.getElementById('currentTemp').textContent = `${displayTemp}${symbol}`;
        document.getElementById('feelsLike').textContent = `${displayFeels}${symbol}`;

        // Update Forecast
        const forecastContainer = document.getElementById('forecastContainer');
        forecastContainer.innerHTML = '';
        
        weatherData.forecast.forEach(item => {
            const high = isCelsius ? item.high : celsiusToFahrenheit(item.high);
            const low = isCelsius ? item.low : celsiusToFahrenheit(item.low);
            
            const div = document.createElement('div');
            div.className = 'forecast-item';
            div.innerHTML = `
                <div class="forecast-day">${item.day}</div>
                <div class="forecast-icon">${icons[item.icon]}</div>
                <div class="forecast-temp" style="color: var(--text-primary)">${high}</div>
                <div class="forecast-temp" style="color: var(--text-secondary); font-size: 0.8rem">${low}</div>
            `;
            forecastContainer.appendChild(div);
        });

        // Update Chart
        renderChart();
    }

    function renderChart() {
        const svg = document.getElementById('tempChart');
        const data = weatherData.forecast;
        const height = 200;
        const width = 600; // ViewBox width
        const padding = 30;

        // Determine scale
        let allTemps = data.flatMap(d => [d.high, d.low]);
        if (!isCelsius) allTemps = allTemps.map(t => celsiusToFahrenheit(t));
        
        const minTemp = Math.min(...allTemps) - 2;
        const maxTemp = Math.max(...allTemps) + 2;
        const range = maxTemp - minTemp;

        // Helper to map temp to Y coordinate
        const getY = (temp) => {
            return height - padding - ((temp - minTemp) / range) * (height - 2 * padding);
        };

        // Helper to map day index to X coordinate
        const getX = (index) => {
            return padding + (index / (data.length - 1)) * (width - 2 * padding);
        };

        // Build Path
        let pathData = "M ";
        let lowPathData = "M ";

        data.forEach((item, index) => {
            const h = isCelsius ? item.high : celsiusToFahrenheit(item.high);
            const l = isCelsius ? item.low : celsiusToFahrenheit(item.low);
            
            const x = getX(index);
            const yHigh = getY(h);
            const yLow = getY(l);

            if (index === 0) {
                pathData += `${x},${yHigh} `;
                lowPathData += `${x},${yLow} `;
            } else {
                pathData += `L ${x},${yHigh} `;
                lowPathData += `L ${x},${yLow} `;
            }
        });

        // Create SVG Elements
        let svgContent = `
            <!-- Grid Lines -->
            <line x1="${padding}" y1="${height-padding}" x2="${width-padding}" y2="${height-padding}" stroke="#333" stroke-width="1" />
            <line x1="${padding}" y1="${padding}" x2="${padding}" y2="${height-padding}" stroke="#333" stroke-width="1" />
            
            <!-- Highs Line -->
            <path d="${pathData}" fill="none" stroke="var(--accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            
            <!-- Lows Line -->
            <path d="${lowPathData}" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5,5" stroke-linecap="round" stroke-linejoin="round"/>

            <!-- Data Points & Labels -->
        `;

        data.forEach((item, index) => {
            const h = isCelsius ? item.high : celsiusToFahrenheit(item.high);
            const l = isCelsius ? item.low : celsiusToFahrenheit(item.low);
            const x = getX(index);
            const yHigh = getY(h);
            const yLow = getY(l);

            svgContent += `
                <!-- High Point -->
                <circle cx="${x}" cy="${yHigh}" r="4" fill="var(--bg-color)" stroke="var(--accent)" stroke-width="2"/>
                <text x="${x}" y="${yHigh - 10}" text-anchor="middle" fill="var(--text-primary)" font-size="12" font-weight="bold">${h}°</text>
                
                <!-- Low Point -->
                <text x="${x}" y="${yLow + 20}" text-anchor="middle" fill="var(--text-secondary)" font-size="12">${l}°</text>

                <!-- Day Label -->
                <text x="${x}" y="${height - 10}" text-anchor="middle" fill="var(--text-secondary)" font-size="12">${item.day}</text>
            `;
        });

        svg.innerHTML = svgContent;
    }

    // --- Event Listeners ---
    document.getElementById('unitToggle').addEventListener('change', (e) => {
        isCelsius = !e.target.checked;
        renderDashboard();
    });

    // Initial Render
    renderDashboard();

</script>
</body>
</html>
