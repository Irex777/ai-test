<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prague Weather Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #eaeaea;
            padding: 20px;
        }

        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .current-weather {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .temp-display {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .temp-main {
            font-size: 4rem;
            font-weight: bold;
        }

        .temp-unit {
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            transition: background 0.3s;
        }

        .temp-unit:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .weather-icon {
            width: 80px;
            height: 80px;
        }

        .weather-stat {
            text-align: center;
        }

        .weather-stat-label {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 5px;
        }

        .weather-stat-value {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .air-quality {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .aqi-indicator {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #4ade80;
            box-shadow: 0 0 10px #4ade80;
        }

        .forecast-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .forecast-title {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #eaeaea;
        }

        .forecast-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
        }

        .forecast-day {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            transition: transform 0.3s, background 0.3s;
        }

        .forecast-day:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.1);
        }

        .day-name {
            font-weight: 600;
            margin-bottom: 10px;
            color: #ffd700;
        }

        .forecast-icon {
            width: 50px;
            height: 50px;
            margin: 10px auto;
        }

        .forecast-temp {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
        }

        .temp-high {
            font-weight: bold;
            color: #ff6b6b;
        }

        .temp-low {
            color: #4ecdc4;
        }

        .chart-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .chart-title {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #eaeaea;
        }

        .sun-times {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .sun-item {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .sun-icon {
            width: 60px;
            height: 60px;
        }

        .sun-info {
            text-align: left;
        }

        .sun-label {
            font-size: 0.9rem;
            color: #aaa;
        }

        .sun-time {
            font-size: 1.8rem;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .forecast-row {
                grid-template-columns: repeat(3, 1fr);
            }

            .forecast-row .forecast-day:nth-child(4),
            .forecast-row .forecast-day:nth-child(5) {
                grid-column: span 1;
            }

            .forecast-row {
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            }

            h1 {
                font-size: 2rem;
            }

            .temp-main {
                font-size: 3rem;
            }

            .current-weather {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .temp-display {
                justify-content: center;
            }

            .sun-times {
                flex-direction: column;
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>🌤️ Prague Weather Dashboard</h1>

        <!-- Current Weather Card -->
        <div class="current-weather">
            <div class="temp-display">
                <svg class="weather-icon" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="25" fill="#ffd700"/>
                    <line x1="50" y1="5" x2="50" y2="20" stroke="#ffd700" stroke-width="4" stroke-linecap="round"/>
                    <line x1="50" y1="80" x2="50" y2="95" stroke="#ffd700" stroke-width="4" stroke-linecap="round"/>
                    <line x1="5" y1="50" x2="20" y2="50" stroke="#ffd700" stroke-width="4" stroke-linecap="round"/>
                    <line x1="80" y1="50" x2="95" y2="50" stroke="#ffd700" stroke-width="4" stroke-linecap="round"/>
                    <line x1="18" y1="18" x2="28" y2="28" stroke="#ffd700" stroke-width="4" stroke-linecap="round"/>
                    <line x1="72" y1="72" x2="82" y2="82" stroke="#ffd700" stroke-width="4" stroke-linecap="round"/>
                    <line x1="18" y1="82" x2="28" y2="72" stroke="#ffd700" stroke-width="4" stroke-linecap="round"/>
                    <line x1="72" y1="28" x2="82" y2="18" stroke="#ffd700" stroke-width="4" stroke-linecap="round"/>
                </svg>
                <div>
                    <div class="temp-main" id="currentTemp">22°C</div>
                    <div class="temp-unit" onclick="toggleUnit()">°C / °F</div>
                </div>
            </div>

            <div class="weather-stat">
                <div class="weather-stat-label">Conditions</div>
                <div class="weather-stat-value">Partly Cloudy</div>
            </div>

            <div class="weather-stat">
                <div class="weather-stat-label">Humidity</div>
                <div class="weather-stat-value">65%</div>
            </div>

            <div class="weather-stat">
                <div class="weather-stat-label">Wind</div>
                <div class="weather-stat-value">12 km/h NE</div>
            </div>

            <div class="weather-stat">
                <div class="weather-stat-label">Air Quality</div>
                <div class="weather-stat-value air-quality">
                    <div class="aqi-indicator"></div>
                    <span>Good (42)</span>
                </div>
            </div>
        </div>

        <!-- 5-Day Forecast -->
        <div class="forecast-container">
            <h2 class="forecast-title">5-Day Forecast</h2>
            <div class="forecast-row" id="forecastRow"></div>
        </div>

        <!-- Temperature Chart -->
        <div class="chart-container">
            <h2 class="chart-title">Temperature Trend</h2>
            <svg id="tempChart" viewBox="0 0 600 200" style="width: 100%; height: auto;">
                <!-- Chart will be drawn here -->
            </svg>
        </div>

        <!-- Sunrise/Sunset -->
        <div class="sun-times">
            <div class="sun-item">
                <svg class="sun-icon" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="20" fill="#ff6b6b"/>
                    <line x1="50" y1="15" x2="50" y2="30" stroke="#ff6b6b" stroke-width="3" stroke-linecap="round"/>
                    <line x1="50" y1="70" x2="50" y2="85" stroke="#ff6b6b" stroke-width="3" stroke-linecap="round"/>
                    <line x1="15" y1="50" x2="30" y2="50" stroke="#ff6b6b" stroke-width="3" stroke-linecap="round"/>
                    <line x1="70" y1="50" x2="85" y2="50" stroke="#ff6b6b" stroke-width="3" stroke-linecap="round"/>
                    <line x1="25" y1="25" x2="35" y2="35" stroke="#ff6b6b" stroke-width="3" stroke-linecap="round"/>
                    <line x1="65" y1="65" x2="75" y2="75" stroke="#ff6b6b" stroke-width="3" stroke-linecap="round"/>
                    <line x1="25" y1="75" x2="35" y2="65" stroke="#ff6b6b" stroke-width="3" stroke-linecap="round"/>
                    <line x1="65" y1="35" x2="75" y2="25" stroke="#ff6b6b" stroke-width="3" stroke-linecap="round"/>
                    <line x1="20" y1="90" x2="80" y2="90" stroke="#4ade80" stroke-width="4" stroke-linecap="round"/>
                </svg>
                <div class="sun-info">
                    <div class="sun-label">Sunrise</div>
                    <div class="sun-time">5:12 AM</div>
                </div>
            </div>
            <div class="sun-item">
                <svg class="sun-icon" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="20" fill="#ffa500"/>
                    <line x1="50" y1="15" x2="50" y2="30" stroke="#ffa500" stroke-width="3" stroke-linecap="round"/>
                    <line x1="50" y1="70" x2="50" y2="85" stroke="#ffa500" stroke-width="3" stroke-linecap="round"/>
                    <line x1="15" y1="50" x2="30" y2="50" stroke="#ffa500" stroke-width="3" stroke-linecap="round"/>
                    <line x1="70" y1="50" x2="85" y2="50" stroke="#ffa500" stroke-width="3" stroke-linecap="round"/>
                    <line x1="25" y1="25" x2="35" y2="35" stroke="#ffa500" stroke-width="3" stroke-linecap="round"/>
                    <line x1="65" y1="65" x2="75" y2="75" stroke="#ffa500" stroke-width="3" stroke-linecap="round"/>
                    <line x1="25" y1="75" x2="35" y2="65" stroke="#ffa500" stroke-width="3" stroke-linecap="round"/>
                    <line x1="65" y1="35" x2="75" y2="25" stroke="#ffa500" stroke-width="3" stroke-linecap="round"/>
                    <path d="M 20 70 Q 50 40 80 70" fill="rgba(255, 165, 0, 0.3)" stroke="#ffa500" stroke-width="2"/>
                    <line x1="20" y1="90" x2="80" y2="90" stroke="#4ade80" stroke-width="4" stroke-linecap="round"/>
                </svg>
                <div class="sun-info">
                    <div class="sun-label">Sunset</div>
                    <div class="sun-time">8:45 PM</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Weather data
        let isCelsius = true;
        const currentTempC = 22;
        
        const forecastData = [
            { day: 'Today', icon: 'partlyCloudy', high: 24, low: 15 },
            { day: 'Tomorrow', icon: 'sun', high: 26, low: 17 },
            { day: 'Wednesday', icon: 'cloud', high: 21, low: 14 },
            { day: 'Thursday', icon: 'rain', high: 19, low: 12 },
            { day: 'Friday', icon: 'partlyCloudy', high: 23, low: 16 }
        ];

        const chartData = {
            days: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
            highs: [24, 26, 21, 19, 23, 25, 27],
            lows: [15, 17, 14, 12, 16, 18, 19]
        };

        // Temperature conversion
        function celsiusToFahrenheit(celsius) {
            return Math.round((celsius * 9/5) + 32);
        }

        function formatTemp(celsius) {
            if (isCelsius) {
                return `${celsius}°C`;
            } else {
                return `${celsiusToFahrenheit(celsius)}°F`;
            }
        }

        // Toggle temperature unit
        function toggleUnit() {
            isCelsius = !isCelsius;
            updateCurrentWeather();
            renderForecast();
            drawChart();
        }

        // Update current weather display
        function updateCurrentWeather() {
            document.getElementById('currentTemp').textContent = formatTemp(currentTempC);
        }

        // SVG icons generator
        function getWeatherIcon(type) {
            const icons = {
                sun: `<svg viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="25" cy="25" r="8" fill="#ffd700"/>
                    <line x1="25" y1="8" x2="25" y2="12" stroke="#ffd700" stroke-width="2" stroke-linecap="round"/>
                    <line x1="25" y1="38" x2="25" y2="42" stroke="#ffd700" stroke-width="2" stroke-linecap="round"/>
                    <line x1="8" y1="25" x2="12" y2="25" stroke="#ffd700" stroke-width="2" stroke-linecap="round"/>
                    <line x1="38" y1="25" x2="42" y2="25" stroke="#ffd700" stroke-width="2" stroke-linecap="round"/>
                    <line x1="12" y1="12" x2="15" y2="15" stroke="#ffd700" stroke-width="2" stroke-linecap="round"/>
                    <line x1="35" y1="35" x2="38" y2="38" stroke="#ffd700" stroke-width="2" stroke-linecap="round"/>
                    <line x1="12" y1="38" x2="15" y2="35" stroke="#ffd700" stroke-width="2" stroke-linecap="round"/>
                    <line x1="35" y1="15" x2="38" y2="12" stroke="#ffd700" stroke-width="2" stroke-linecap="round"/>
                </svg>`,
                cloud: `<svg viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <ellipse cx="20" cy="28" rx="12" ry="10" fill="#b0c4de"/>
                    <ellipse cx="32" cy="25" rx="10" ry="8" fill="#b0c4de"/>
                    <ellipse cx="26" cy="30" rx="15" ry="10" fill="#d3d3d3"/>
                    <ellipse cx="18" cy="32" rx="10" ry="6" fill="#d3d3d3"/>
                </svg>`,
                rain: `<svg viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <ellipse cx="20" cy="20" rx="12" ry="10" fill="#778899"/>
                    <ellipse cx="32" cy="17" rx="10" ry="8" fill="#778899"/>
                    <ellipse cx="26" cy="22" rx="15" ry="10" fill="#a9a9a9"/>
                    <ellipse cx="18" cy="24" rx="10" ry="6" fill="#a9a9a9"/>
                    <line x1="15" y1="35" x2="12" y2="42" stroke="#4ecdc4" stroke-width="2" stroke-linecap="round"/>
                    <line x1="25" y1="38" x2="22" y2="45" stroke="#4ecdc4" stroke-width="2" stroke-linecap="round"/>
                    <line x1="35" y1="35" x2="32" y2="42" stroke="#4ecdc4" stroke-width="2" stroke-linecap="round"/>
                </svg>`,
                partlyCloudy: `<svg viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="18" cy="18" r="8" fill="#ffd700"/>
                    <line x1="18" y1="5" x2="18" y2="8" stroke="#ffd700" stroke-width="2" stroke-linecap="round"/>
                    <line x1="18" y1="28" x2="18" y2="31" stroke="#ffd700" stroke-width="2" stroke-linecap="round"/>
                    <line x1="5" y1="18" x2="8" y2="18" stroke="#ffd700" stroke-width="2" stroke-linecap="round"/>
                    <line x1="28" y1="18" x2="31" y2="18" stroke="#ffd700" stroke-width="2" stroke-linecap="round"/>
                    <ellipse cx="32" cy="32" rx="12" ry="8" fill="#d3d3d3"/>
                    <ellipse cx="38" cy="28" rx="8" ry="6" fill="#d3d3d3"/>
                </svg>`
            };
            return icons[type] || icons.sun;
        }

        // Render forecast
        function renderForecast() {
            const container = document.getElementById('forecastRow');
            container.innerHTML = forecastData.map(day => `
                <div class="forecast-day">
                    <div class="day-name">${day.day}</div>
                    <div class="forecast-icon">${getWeatherIcon(day.icon)}</div>
                    <div class="forecast-temp">
                        <span class="temp-high">${formatTemp(day.high)}</span>
                        <span class="temp-low">${formatTemp(day.low)}</span>
                    </div>
                </div>
            `).join('');
        }

        // Draw temperature chart
        function drawChart() {
            const svg = document.getElementById('tempChart');
            const width = 600;
            const height = 200;
            const padding = 40;
            
            const temps = isCelsius ? chartData : {
                days: chartData.days,
                highs: chartData.highs.map(celsiusToFahrenheit),
                lows: chartData.lows.map(celsiusToFahrenheit)
            };

            const allTemps = [...temps.highs, ...temps.lows];
            const maxTemp = Math.max(...allTemps) + 5;
            const minTemp = Math.min(...allTemps) - 5;

            const xStep = (width - 2 * padding) / (temps.days.length - 1);
            const yScale = (height - 2 * padding) / (maxTemp - minTemp);

            function getX(index) {
                return padding + index * xStep;
            }

            function getY(temp) {
                return height - padding - (temp - minTemp) * yScale;
            }

            let chartHTML = `
                <!-- Grid lines -->
                <line x1="${padding}" y1="${padding}" x2="${width - padding}" y2="${padding}" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
                <line x1="${padding}" y1="${height - padding}" x2="${width - padding}" y2="${height - padding}" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
                
                <!-- High temperature line -->
                <polyline fill="none" stroke="#ff6b6b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
                    points="${temps.highs.map((temp, i) => `${getX(i)},${getY(temp)}`).join(' ')}"/>
                
                <!-- Low temperature line -->
                <polyline fill="none" stroke="#4ecdc4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
                    points="${temps.lows.map((temp, i) => `${getX(i)},${getY(temp)}`).join(' ')}"/>
                
                <!-- Data points and labels -->
            `;

            // Add high temp points and labels
            temps.highs.forEach((temp, i) => {
                const x = getX(i);
                const y = getY(temp);
                chartHTML += `
                    <circle cx="${x}" cy="${y}" r="5" fill="#ff6b6b"/>
                    <text x="${x}" y="${y - 10}" fill="#ff6b6b" text-anchor="middle" font-size="12" font-weight="bold">${temp}°</text>
                `;
            });

            // Add low temp points and labels
            temps.lows.forEach((temp, i) => {
                const x = getX(i);
                const y = getY(temp);
                chartHTML += `
                    <circle cx="${x}" cy="${y}" r="5" fill="#4ecdc4"/>
                    <text x="${x}" y="${y + 20}" fill="#4ecdc4" text-anchor="middle" font-size="12" font-weight="bold">${temp}°</text>
                `;
            });

            // Add day labels
            temps.days.forEach((day, i) => {
                const x = getX(i);
                chartHTML += `
                    <text x="${x}" y="${height - 10}" fill="#aaa" text-anchor="middle" font-size="12">${day}</text>
                `;
            });

            // Legend
            chartHTML += `
                <circle cx="${width - 100}" cy="20" r="5" fill="#ff6b6b"/>
                <text x="${width - 85}" y="24" fill="#ff6b6b" font-size="12">High</text>
                <circle cx="${width - 50}" cy="20" r="5" fill="#4ecdc4"/>
                <text x="${width - 35}" y="24" fill="#4ecdc4" font-size="12">Low</text>
            `;

            svg.innerHTML = chartHTML;
        }

        // Initialize
        updateCurrentWeather();
        renderForecast();
        drawChart();
    </script>
</body>
</html>
