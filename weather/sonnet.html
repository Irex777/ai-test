<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard - Prague</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e4e4e4;
            padding: 20px;
        }

        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #64b5f6, #81c784);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .location {
            font-size: 1.2rem;
            color: #a0a0a0;
        }

        .toggle-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .toggle-btn {
            padding: 8px 16px;
            border: 2px solid #64b5f6;
            background: transparent;
            color: #64b5f6;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .toggle-btn.active {
            background: #64b5f6;
            color: #1a1a2e;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .current-weather {
            text-align: center;
        }

        .weather-icon-large {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
        }

        .temperature {
            font-size: 4rem;
            font-weight: 300;
            margin-bottom: 10px;
        }

        .condition {
            font-size: 1.5rem;
            color: #81c784;
            margin-bottom: 20px;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .detail-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .detail-icon {
            width: 30px;
            height: 30px;
            margin: 0 auto 8px;
        }

        .detail-label {
            font-size: 0.85rem;
            color: #a0a0a0;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .air-quality {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .air-quality-header {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #64b5f6;
        }

        .aqi-display {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .aqi-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #4caf50, #81c784);
        }

        .aqi-info {
            flex: 1;
        }

        .aqi-level {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .aqi-description {
            color: #a0a0a0;
            font-size: 0.9rem;
        }

        .pollutants {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .pollutant {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pollutant-name {
            font-size: 0.85rem;
            color: #a0a0a0;
        }

        .pollutant-value {
            font-weight: 600;
            color: #81c784;
        }

        .sun-times {
            margin-top: 20px;
            display: flex;
            justify-content: space-around;
            text-align: center;
        }

        .sun-item {
            flex: 1;
        }

        .sun-icon {
            width: 40px;
            height: 40px;
            margin: 0 auto 8px;
        }

        .sun-label {
            font-size: 0.85rem;
            color: #a0a0a0;
            margin-bottom: 5px;
        }

        .sun-time {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .forecast-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: #64b5f6;
        }

        .forecast-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        @media (max-width: 768px) {
            .forecast-row {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .forecast-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .forecast-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(100, 181, 246, 0.2);
        }

        .forecast-day {
            font-size: 0.9rem;
            color: #a0a0a0;
            margin-bottom: 10px;
        }

        .forecast-icon {
            width: 50px;
            height: 50px;
            margin: 0 auto 10px;
        }

        .forecast-temp {
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .forecast-conditions {
            font-size: 0.85rem;
            color: #81c784;
        }

        .chart-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chart-title {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #64b5f6;
        }

        .chart {
            width: 100%;
            height: 200px;
        }

        /* Weather Icons */
        .sun {
            fill: #ffb74d;
        }

        .cloud {
            fill: #90a4ae;
        }

        .rain {
            fill: #64b5f6;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1>Weather Dashboard</h1>
            <p class="location">📍 Prague, Czech Republic</p>
            <div class="toggle-container">
                <button class="toggle-btn active" data-unit="celsius">°C</button>
                <button class="toggle-btn" data-unit="fahrenheit">°F</button>
            </div>
        </div>

        <div class="main-content">
            <div class="card current-weather">
                <div class="weather-icon-large">
                    <svg viewBox="0 0 100 100" class="weather-icon">
                        <circle cx="50" cy="50" r="25" class="sun"/>
                        <g class="sun-rays">
                            <line x1="50" y1="10" x2="50" y2="20" stroke="#ffb74d" stroke-width="3"/>
                            <line x1="50" y1="80" x2="50" y2="90" stroke="#ffb74d" stroke-width="3"/>
                            <line x1="10" y1="50" x2="20" y2="50" stroke="#ffb74d" stroke-width="3"/>
                            <line x1="80" y1="50" x2="90" y2="50" stroke="#ffb74d" stroke-width="3"/>
                            <line x1="22" y1="22" x2="29" y2="29" stroke="#ffb74d" stroke-width="3"/>
                            <line x1="71" y1="71" x2="78" y2="78" stroke="#ffb74d" stroke-width="3"/>
                            <line x1="22" y1="78" x2="29" y2="71" stroke="#ffb74d" stroke-width="3"/>
                            <line x1="71" y1="29" x2="78" y2="22" stroke="#ffb74d" stroke-width="3"/>
                        </g>
                    </svg>
                </div>
                <div class="temperature" id="currentTemp">22°C</div>
                <div class="condition">Partly Cloudy</div>
                <div class="weather-details">
                    <div class="detail-item">
                        <svg class="detail-icon" viewBox="0 0 24 24">
                            <path fill="#64b5f6" d="M12 2c-5.33 4-8 8-8 12 0 3.31 2.69 6 6 6 1.05 0 2.05-.27 2.9-.75.36.63.92 1.09 1.6 1.3 1.87.59 3.9-.48 4.49-2.35.15-.47.22-.96.22-1.45 0-4-2.67-8-8-12z"/>
                        </svg>
                        <div class="detail-label">Humidity</div>
                        <div class="detail-value" id="humidity">65%</div>
                    </div>
                    <div class="detail-item">
                        <svg class="detail-icon" viewBox="0 0 24 24">
                            <path fill="#81c784" d="M12.74 2.32c-.09-.23-.34-.37-.6-.3-.6.16-1.18.4-1.72.71-.84.48-1.56 1.15-2.1 1.95-.27.41-.18.96.23 1.24.41.27.96.18 1.24-.23.37-.56.87-1.03 1.46-1.37.38-.22.8-.38 1.23-.5.28-.08.42-.38.32-.65zM6.5 7c-.28 0-.5.22-.5.5s.22.5.5.5h.5v1h-.5c-.28 0-.5.22-.5.5s.22.5.5.5h.5v1h-.5c-.28 0-.5.22-.5.5s.22.5.5.5h2c.28 0 .5-.22.5-.5s-.22-.5-.5-.5h-.5v-1h.5c.28 0 .5-.22.5-.5s-.22-.5-.5-.5h-.5v-1h.5c.28 0 .5-.22.5-.5s-.22-.5-.5-.5h-.5z"/>
                        </svg>
                        <div class="detail-label">Wind</div>
                        <div class="detail-value" id="wind">12 km/h</div>
                    </div>
                    <div class="detail-item">
                        <svg class="detail-icon" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="5" fill="#ffb74d"/>
                        </svg>
                        <div class="detail-label">UV Index</div>
                        <div class="detail-value">6 (High)</div>
                    </div>
                    <div class="detail-item">
                        <svg class="detail-icon" viewBox="0 0 24 24">
                            <path fill="#90a4ae" d="M19.36 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.64-4.96z"/>
                        </svg>
                        <div class="detail-label">Visibility</div>
                        <div class="detail-value">10 km</div>
                    </div>
                </div>
            </div>

            <div class="card air-quality">
                <div class="air-quality-header">Air Quality</div>
                <div class="aqi-display">
                    <div class="aqi-circle" id="aqiCircle">42</div>
                    <div class="aqi-info">
                        <div class="aqi-level" id="aqiLevel">Good</div>
                        <div class="aqi-description">Air quality is satisfactory</div>
                    </div>
                </div>
                <div class="pollutants">
                    <div class="pollutant">
                        <span class="pollutant-name">PM2.5</span>
                        <span class="pollutant-value">8 μg/m³</span>
                    </div>
                    <div class="pollutant">
                        <span class="pollutant-name">PM10</span>
                        <span class="pollutant-value">15 μg/m³</span>
                    </div>
                    <div class="pollutant">
                        <span class="pollutant-name">O₃</span>
                        <span class="pollutant-value">45 μg/m³</span>
                    </div>
                    <div class="pollutant">
                        <span class="pollutant-name">NO₂</span>
                        <span class="pollutant-value">20 μg/m³</span>
                    </div>
                </div>
                <div class="sun-times">
                    <div class="sun-item">
                        <svg class="sun-icon" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="5" fill="#ffb74d"/>
                            <line x1="12" y1="1" x2="12" y2="3" stroke="#ffb74d" stroke-width="2"/>
                            <line x1="12" y1="21" x2="12" y2="23" stroke="#ffb74d" stroke-width="2"/>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" stroke="#ffb74d" stroke-width="2"/>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" stroke="#ffb74d" stroke-width="2"/>
                            <line x1="1" y1="12" x2="3" y2="12" stroke="#ffb74d" stroke-width="2"/>
                            <line x1="21" y1="12" x2="23" y2="12" stroke="#ffb74d" stroke-width="2"/>
                        </svg>
                        <div class="sun-label">Sunrise</div>
                        <div class="sun-time" id="sunrise">5:12 AM</div>
                    </div>
                    <div class="sun-item">
                        <svg class="sun-icon" viewBox="0 0 24 24">
                            <path fill="#ff7043" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                        </svg>
                        <div class="sun-label">Sunset</div>
                        <div class="sun-time" id="sunset">9:05 PM</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="forecast-section">
            <h3 class="section-title">5-Day Forecast</h3>
            <div class="forecast-row" id="forecastRow">
                <!-- Generated by JS -->
            </div>
        </div>

        <div class="chart-container">
            <h3 class="chart-title">Temperature Trend</h3>
            <svg class="chart" id="tempChart" viewBox="0 0 800 200">
                <!-- Generated by JS -->
            </svg>
        </div>
    </div>

    <script>
        // Weather data for Prague (hardcoded)
        const weatherData = {
            current: {
                tempCelsius: 22,
                condition: 'Partly Cloudy',
                humidity: 65,
                windKmh: 12,
                aqi: 42,
                sunrise: '5:12 AM',
                sunset: '9:05 PM'
            },
            forecast: [
                { day: 'Today', icon: 'partlyCloudy', highC: 22, lowC: 14, condition: 'Partly Cloudy' },
                { day: 'Tomorrow', icon: 'sunny', highC: 25, lowC: 16, condition: 'Sunny' },
                { day: 'Wednesday', icon: 'rainy', highC: 18, lowC: 12, condition: 'Rainy' },
                { day: 'Thursday', icon: 'cloudy', highC: 20, lowC: 13, condition: 'Cloudy' },
                { day: 'Friday', icon: 'sunny', highC: 24, lowC: 15, condition: 'Sunny' }
            ]
        };

        let isCelsius = true;

        // Temperature conversion
        function celsiusToFahrenheit(celsius) {
            return Math.round((celsius * 9/5) + 32);
        }

        function formatTemp(celsius) {
            return isCelsius ? `${celsius}°C` : `${celsiusToFahrenheit(celsius)}°F`;
        }

        // Weather icon generator
        function getWeatherIcon(type, size = 50) {
            const icons = {
                sunny: `<svg viewBox="0 0 100 100" width="${size}" height="${size}">
                    <circle cx="50" cy="50" r="25" class="sun"/>
                    <g class="sun-rays">
                        <line x1="50" y1="10" x2="50" y2="20" stroke="#ffb74d" stroke-width="3"/>
                        <line x1="50" y1="80" x2="50" y2="90" stroke="#ffb74d" stroke-width="3"/>
                        <line x1="10" y1="50" x2="20" y2="50" stroke="#ffb74d" stroke-width="3"/>
                        <line x1="80" y1="50" x2="90" y2="50" stroke="#ffb74d" stroke-width="3"/>
                        <line x1="22" y1="22" x2="29" y2="29" stroke="#ffb74d" stroke-width="3"/>
                        <line x1="71" y1="71" x2="78" y2="78" stroke="#ffb74d" stroke-width="3"/>
                        <line x1="22" y1="78" x2="29" y2="71" stroke="#ffb74d" stroke-width="3"/>
                        <line x1="71" y1="29" x2="78" y2="22" stroke="#ffb74d" stroke-width="3"/>
                    </g>
                </svg>`,
                partlyCloudy: `<svg viewBox="0 0 100 100" width="${size}" height="${size}">
                    <circle cx="35" cy="40" r="20" class="sun"/>
                    <ellipse cx="60" cy="60" rx="25" ry="15" class="cloud"/>
                    <ellipse cx="45" cy="55" rx="15" ry="12" class="cloud"/>
                    <ellipse cx="75" cy="58" rx="12" ry="10" class="cloud"/>
                </svg>`,
                cloudy: `<svg viewBox="0 0 100 100" width="${size}" height="${size}">
                    <ellipse cx="50" cy="50" rx="30" ry="18" class="cloud"/>
                    <ellipse cx="35" cy="45" rx="18" ry="14" class="cloud"/>
                    <ellipse cx="65" cy="48" rx="15" ry="12" class="cloud"/>
                    <ellipse cx="40" cy="60" rx="20" ry="12" class="cloud"/>
                    <ellipse cx="60" cy="58" rx="18" ry="10" class="cloud"/>
                </svg>`,
                rainy: `<svg viewBox="0 0 100 100" width="${size}" height="${size}">
                    <ellipse cx="50" cy="40" rx="25" ry="15" class="cloud"/>
                    <ellipse cx="35" cy="38" rx="15" ry="12" class="cloud"/>
                    <ellipse cx="65" cy="38" rx="12" ry="10" class="cloud"/>
                    <line x1="35" y1="60" x2="30" y2="75" stroke="#64b5f6" stroke-width="2" stroke-linecap="round"/>
                    <line x1="50" y1="58" x2="45" y2="73" stroke="#64b5f6" stroke-width="2" stroke-linecap="round"/>
                    <line x1="65" y1="60" x2="60" y2="75" stroke="#64b5f6" stroke-width="2" stroke-linecap="round"/>
                </svg>`
            };
            return icons[type] || icons.sunny;
        }

        // Update current weather display
        function updateCurrentWeather() {
            document.getElementById('currentTemp').textContent = formatTemp(weatherData.current.tempCelsius);
            document.getElementById('humidity').textContent = `${weatherData.current.humidity}%`;
            document.getElementById('wind').textContent = isCelsius ?
                `${weatherData.current.windKmh} km/h` :
                `${Math.round(weatherData.current.windKmh * 0.621371)} mph`;
        }

        // Generate forecast cards
        function generateForecast() {
            const forecastRow = document.getElementById('forecastRow');
            forecastRow.innerHTML = weatherData.forecast.map(day => `
                <div class="forecast-card">
                    <div class="forecast-day">${day.day}</div>
                    <div class="forecast-icon">${getWeatherIcon(day.icon)}</div>
                    <div class="forecast-temp">
                        ${formatTemp(day.highC)} / ${formatTemp(day.lowC)}
                    </div>
                    <div class="forecast-conditions">${day.condition}</div>
                </div>
            `).join('');
        }

        // Generate temperature chart
        function generateChart() {
            const chart = document.getElementById('tempChart');
            const width = 800;
            const height = 200;
            const padding = 50;

            const temps = weatherData.forecast.map(d => isCelsius ? d.highC : celsiusToFahrenheit(d.highC));
            const lows = weatherData.forecast.map(d => isCelsius ? d.lowC : celsiusToFahrenheit(d.lowC));

            const allTemps = [...temps, ...lows];
            const maxTemp = Math.max(...allTemps) + 5;
            const minTemp = Math.min(...allTemps) - 5;

            const xStep = (width - padding * 2) / (weatherData.forecast.length - 1);

            function yCoord(temp) {
                return height - padding - ((temp - minTemp) / (maxTemp - minTemp)) * (height - padding * 2);
            }

            // Create high temperature line
            const highLine = temps.map((temp, i) =>
                `${i === 0 ? 'M' : 'L'}${padding + i * xStep},${yCoord(temp)}`
            ).join(' ');

            // Create low temperature line
            const lowLine = lows.map((temp, i) =>
                `${i === 0 ? 'M' : 'L'}${padding + i * xStep},${yCoord(temp)}`
            ).join(' ');

            // Generate points
            const highPoints = temps.map((temp, i) =>
                `<circle cx="${padding + i * xStep}" cy="${yCoord(temp)}" r="6" fill="#ff7043"/>`
            ).join('');

            const lowPoints = lows.map((temp, i) =>
                `<circle cx="${padding + i * xStep}" cy="${yCoord(temp)}" r="6" fill="#64b5f6"/>`
            ).join('');

            // Generate labels
            const labels = weatherData.forecast.map((day, i) => {
                const x = padding + i * xStep;
                return `
                    <text x="${x}" y="${height - 10}" text-anchor="middle" fill="#a0a0a0" font-size="12">${day.day}</text>
                    <text x="${x}" y="${yCoord(temps[i]) - 15}" text-anchor="middle" fill="#ff7043" font-size="12" font-weight="bold">${formatTemp(day.highC)}</text>
                    <text x="${x}" y="${yCoord(lows[i]) + 25}" text-anchor="middle" fill="#64b5f6" font-size="12" font-weight="bold">${formatTemp(day.lowC)}</text>
                `;
            }).join('');

            chart.innerHTML = `
                <!-- Background grid -->
                <line x1="${padding}" y1="${padding}" x2="${padding}" y2="${height - padding}" stroke="#333" stroke-width="1"/>
                <line x1="${padding}" y1="${height - padding}" x2="${width - padding}" y2="${height - padding}" stroke="#333" stroke-width="1"/>

                <!-- High temperature line -->
                <path d="${highLine}" fill="none" stroke="#ff7043" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

                <!-- Low temperature line -->
                <path d="${lowLine}" fill="none" stroke="#64b5f6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

                <!-- Temperature points -->
                ${highPoints}
                ${lowPoints}

                <!-- Labels -->
                ${labels}

                <!-- Legend -->
                <circle cx="60" cy="20" r="5" fill="#ff7043"/>
                <text x="75" y="25" fill="#e4e4e4" font-size="12">High</text>
                <circle cx="130" cy="20" r="5" fill="#64b5f6"/>
                <text x="145" y="25" fill="#e4e4e4" font-size="12">Low</text>
            `;
        }

        // Toggle temperature unit
        function setupToggle() {
            const buttons = document.querySelectorAll('.toggle-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    buttons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    isCelsius = btn.dataset.unit === 'celsius';
                    updateCurrentWeather();
                    generateForecast();
                    generateChart();
                });
            });
        }

        // Initialize dashboard
        function init() {
            updateCurrentWeather();
            generateForecast();
            generateChart();
            setupToggle();
        }

        // Run on load
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
