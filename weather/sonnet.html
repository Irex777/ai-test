<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard - Prague</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .location {
            font-size: 1.2rem;
            color: #8892b0;
        }

        .toggle-container {
            text-align: center;
            margin: 20px 0;
        }

        .toggle-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #64ffda;
            color: #64ffda;
            padding: 10px 25px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 25px;
            transition: all 0.3s ease;
        }

        .toggle-btn:hover {
            background: rgba(100, 255, 218, 0.2);
        }

        .current-weather {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .current-weather-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .main-info {
            flex: 1;
            min-width: 250px;
        }

        .temperature {
            font-size: 4rem;
            font-weight: 300;
            margin: 15px 0;
        }

        .condition {
            font-size: 1.5rem;
            color: #64ffda;
            margin-bottom: 10px;
        }

        .weather-icon {
            width: 120px;
            height: 120px;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .detail-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .detail-label {
            font-size: 0.9rem;
            color: #8892b0;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .additional-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px 20px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .aqi {
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
        }

        .aqi-good { background: rgba(100, 255, 218, 0.2); color: #64ffda; }
        .aqi-moderate { background: rgba(255, 193, 7, 0.2); color: #ffc107; }
        .aqi-poor { background: rgba(255, 82, 82, 0.2); color: #ff5252; }

        .sun-times {
            display: flex;
            gap: 20px;
        }

        .sun-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sun-icon {
            width: 24px;
            height: 24px;
        }

        .forecast {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .forecast-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        .forecast-row {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .forecast-day {
            min-width: 140px;
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            flex-shrink: 0;
        }

        .day-name {
            font-weight: 600;
            margin-bottom: 10px;
        }

        .forecast-icon {
            width: 50px;
            height: 50px;
            margin: 10px auto;
        }

        .forecast-temps {
            margin-top: 10px;
        }

        .forecast-high {
            font-weight: 600;
            color: #ff6b6b;
        }

        .forecast-low {
            color: #4ecdc4;
        }

        .chart-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chart-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        .chart-container {
            position: relative;
            height: 250px;
        }

        .chart-svg {
            width: 100%;
            height: 100%;
        }

        .chart-line {
            fill: none;
            stroke-width: 3;
        }

        .high-line { stroke: #ff6b6b; }
        .low-line { stroke: #4ecdc4; }

        .chart-dot {
            r: 5;
        }

        .high-dot { fill: #ff6b6b; }
        .low-dot { fill: #4ecdc4; }

        .chart-labels {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
        }

        .chart-label {
            text-align: center;
            font-size: 0.9rem;
            color: #8892b0;
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            
            .temperature { font-size: 3rem; }
            
            .current-weather-content {
                flex-direction: column;
                text-align: center;
            }
            
            .weather-icon {
                margin: 0 auto;
            }
            
            .forecast-row {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .additional-info {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>☀️ Weather Dashboard</h1>
            <p class="location">Prague, Czech Republic</p>
        </header>

        <div class="toggle-container">
            <button class="toggle-btn" onclick="toggleUnit()">°C / °F</button>
        </div>

        <div class="current-weather">
            <div class="current-weather-content">
                <div class="main-info">
                    <div class="condition">Partly Cloudy</div>
                    <div class="temperature" id="currentTemp">22°C</div>
                    <p style="color: #8892b0;">Feels like <span id="feelsLike">20°C</span></p>
                </div>
                <svg class="weather-icon" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="20" fill="#ffd93d"/>
                    <g fill="none" stroke="#ffd93d" stroke-width="3">
                        <line x1="50" y1="20" x2="50" y2="10"/>
                        <line x1="50" y1="80" x2="50" y2="90"/>
                        <line x1="20" y1="50" x2="10" y2="50"/>
                        <line x1="80" y1="50" x2="90" y2="50"/>
                        <line x1="28" y1="28" x2="21" y2="21"/>
                        <line x1="72" y1="72" x2="79" y2="79"/>
                        <line x1="28" y1="72" x2="21" y2="79"/>
                        <line x1="72" y1="28" x2="79" y2="21"/>
                    </g>
                    <ellipse cx="70" cy="65" rx="18" ry="12" fill="rgba(255,255,255,0.3)"/>
                </svg>
            </div>

            <div class="details-grid">
                <div class="detail-card">
                    <div class="detail-label">Humidity</div>
                    <div class="detail-value">65%</div>
                </div>
                <div class="detail-card">
                    <div class="detail-label">Wind</div>
                    <div class="detail-value" id="wind">12 km/h</div>
                </div>
                <div class="detail-card">
                    <div class="detail-label">Pressure</div>
                    <div class="detail-value">1013 hPa</div>
                </div>
                <div class="detail-card">
                    <div class="detail-label">Visibility</div>
                    <div class="detail-value">10 km</div>
                </div>
            </div>

            <div class="additional-info">
                <div class="info-card">
                    <span class="aqi aqi-good">AQI 42 - Good</span>
                    <span style="font-size: 0.9rem; color: #8892b0;">Air Quality</span>
                </div>
                <div class="info-card">
                    <div class="sun-times">
                        <div class="sun-item">
                            <svg class="sun-icon" viewBox="0 0 24 24">
                                <circle cx="12" cy="12" r="5" fill="#ffd93d"/>
                                <g fill="none" stroke="#ffd93d" stroke-width="2">
                                    <path d="M12 2V6M12 18V22M2 12H6M18 12H22"/>
                                </g>
                            </svg>
                            <span>05:24</span>
                        </div>
                        <div class="sun-item">
                            <svg class="sun-icon" viewBox="0 0 24 24">
                                <path d="M12 2C7 2 3 6 3 11c0 4 3 8 9 11 6-3 9-7 9-11 0-5-4-9-9-9z" fill="#ff6b6b"/>
                            </svg>
                            <span>20:51</span>
                        </div>
                    </div>
                    <span style="font-size: 0.9rem; color: #8892b0;">Sunrise / Sunset</span>
                </div>
            </div>
        </div>

        <div class="forecast">
            <h2 class="forecast-title">5-Day Forecast</h2>
            <div class="forecast-row" id="forecastRow">
            </div>
        </div>

        <div class="chart-section">
            <h2 class="chart-title">Temperature Trend</h2>
            <div class="chart-container">
                <svg class="chart-svg" id="tempChart" viewBox="0 0 800 200"></svg>
            </div>
            <div class="chart-labels" id="chartLabels"></div>
        </div>
    </div>

    <script>
        let isCelsius = true;
        
        const weatherData = {
            current: { temp: 22, feelsLike: 20, wind: 12 },
            forecast: [
                { day: 'Tomorrow', high: 24, low: 14, condition: 'sunny' },
                { day: 'Wednesday', high: 20, low: 12, condition: 'cloudy' },
                { day: 'Thursday', high: 18, low: 11, condition: 'rainy' },
                { day: 'Friday', high: 21, low: 13, condition: 'partlyCloudy' },
                { day: 'Saturday', high: 25, low: 15, condition: 'sunny' }
            ]
        };

        function toFahrenheit(celsius) {
            return Math.round(celsius * 9/5 + 32);
        }

        function formatTemp(celsius) {
            if (isCelsius) {
                return `${celsius}°C`;
            }
            return `${toFahrenheit(celsius)}°F`;
        }

        function formatWind(kmh) {
            if (isCelsius) {
                return `${kmh} km/h`;
            }
            return `${Math.round(kmh * 0.621)} mph`;
        }

        function getWeatherIcon(condition, size = 50) {
            const icons = {
                sunny: `<svg viewBox="0 0 100 100" width="${size}" height="${size}">
                    <circle cx="50" cy="50" r="18" fill="#ffd93d"/>
                    <g fill="none" stroke="#ffd93d" stroke-width="3">
                        <line x1="50" y1="25" x2="50" y2="15"/>
                        <line x1="50" y1="75" x2="50" y2="85"/>
                        <line x1="25" y1="50" x2="15" y2="50"/>
                        <line x1="75" y1="50" x2="85" y2="50"/>
                        <line x1="32" y1="32" x2="25" y2="25"/>
                        <line x1="68" y1="68" x2="75" y2="75"/>
                        <line x1="32" y1="68" x2="25" y2="75"/>
                        <line x1="68" y1="32" x2="75" y2="25"/>
                    </g>
                </svg>`,
                cloudy: `<svg viewBox="0 0 100 100" width="${size}" height="${size}">
                    <ellipse cx="50" cy="55" rx="25" ry="18" fill="rgba(255,255,255,0.4)"/>
                    <ellipse cx="35" cy="50" rx="18" ry="14" fill="rgba(255,255,255,0.5)"/>
                    <ellipse cx="65" cy="52" rx="15" ry="12" fill="rgba(255,255,255,0.4)"/>
                </svg>`,
                rainy: `<svg viewBox="0 0 100 100" width="${size}" height="${size}">
                    <ellipse cx="50" cy="40" rx="22" ry="15" fill="rgba(255,255,255,0.4)"/>
                    <ellipse cx="35" cy="35" rx="16" ry="12" fill="rgba(255,255,255,0.5)"/>
                    <ellipse cx="65" cy="38" rx="14" ry="10" fill="rgba(255,255,255,0.4)"/>
                    <g fill="#4ecdc4">
                        <ellipse cx="40" cy="65" rx="3" ry="5"/>
                        <ellipse cx="50" cy="70" rx="3" ry="5"/>
                        <ellipse cx="60" cy="65" rx="3" ry="5"/>
                    </g>
                </svg>`,
                partlyCloudy: `<svg viewBox="0 0 100 100" width="${size}" height="${size}">
                    <circle cx="35" cy="40" r="15" fill="#ffd93d"/>
                    <g fill="none" stroke="#ffd93d" stroke-width="2">
                        <line x1="35" y1="20" x2="35" y2="12"/>
                        <line x1="18" y1="40" x2="10" y2="40"/>
                    </g>
                    <ellipse cx="60" cy="50" rx="22" ry="15" fill="rgba(255,255,255,0.4)"/>
                    <ellipse cx="75" cy="45" rx="14" ry="12" fill="rgba(255,255,255,0.3)"/>
                </svg>`
            };
            return icons[condition] || icons.sunny;
        }

        function updateCurrentWeather() {
            document.getElementById('currentTemp').textContent = formatTemp(weatherData.current.temp);
            document.getElementById('feelsLike').textContent = formatTemp(weatherData.current.feelsLike);
            document.getElementById('wind').textContent = formatWind(weatherData.current.wind);
        }

        function renderForecast() {
            const row = document.getElementById('forecastRow');
            row.innerHTML = weatherData.forecast.map(day => `
                <div class="forecast-day">
                    <div class="day-name">${day.day}</div>
                    <div class="forecast-icon">${getWeatherIcon(day.condition)}</div>
                    <div class="forecast-temps">
                        <div class="forecast-high">${formatTemp(day.high)}</div>
                        <div class="forecast-low">${formatTemp(day.low)}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderChart() {
            const svg = document.getElementById('tempChart');
            const labels = document.getElementById('chartLabels');
            const data = weatherData.forecast;
            
            const allTemps = data.flatMap(d => [d.high, d.low]);
            const minTemp = Math.min(...allTemps) - 2;
            const maxTemp = Math.max(...allTemps) + 2;
            const tempRange = maxTemp - minTemp;
            
            const width = 800;
            const height = 180;
            const padding = 20;
            const pointSpacing = width / (data.length - 1);
            
            const getY = (temp) => height - ((temp - minTemp) / tempRange) * (height - 2 * padding) - padding;
            const getX = (index) => index * pointSpacing;
            
            const highPoints = data.map((d, i) => `${getX(i)},${getY(d.high)}`).join(' ');
            const lowPoints = data.map((d, i) => `${getX(i)},${getY(d.low)}`).join(' ');
            
            svg.innerHTML = `
                <polyline class="chart-line high-line" points="${highPoints}"/>
                <polyline class="chart-line low-line" points="${lowPoints}"/>
                ${data.map((d, i) => `
                    <circle class="chart-dot high-dot" cx="${getX(i)}" cy="${getY(d.high)}"/>
                    <circle class="chart-dot low-dot" cx="${getX(i)}" cy="${getY(d.low)}"/>
                `).join('')}
            `;
            
            labels.innerHTML = data.map(d => `<div class="chart-label">${d.day}</div>`).join('');
        }

        function toggleUnit() {
            isCelsius = !isCelsius;
            updateCurrentWeather();
            renderForecast();
            renderChart();
        }

        updateCurrentWeather();
        renderForecast();
        renderChart();
    </script>
</body>
</html>
