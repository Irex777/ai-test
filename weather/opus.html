<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard - Prague</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #22c55e;
            --warning: #eab308;
            --danger: #ef4444;
            --border: #475569;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
        }

        .location {
            color: var(--text-secondary);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .unit-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .unit-toggle:hover {
            background: var(--bg-card);
        }

        .main-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border);
        }

        .current-weather {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .weather-icon {
            width: 100px;
            height: 100px;
            flex-shrink: 0;
        }

        .temp-display {
            flex: 1;
        }

        .current-temp {
            font-size: 4rem;
            font-weight: 700;
            line-height: 1;
        }

        .condition {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-top: 8px;
        }

        .feels-like {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 4px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-top: 20px;
        }

        .stat {
            background: var(--bg-card);
            padding: 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stat-icon {
            width: 32px;
            height: 32px;
            color: var(--accent);
        }

        .stat-value {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .air-quality {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .aqi-badge {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .aqi-value {
            font-size: 2.5rem;
            font-weight: 700;
        }

        .aqi-label {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .aqi-good { background: rgba(34, 197, 94, 0.2); color: var(--success); }
        .aqi-moderate { background: rgba(234, 179, 8, 0.2); color: var(--warning); }
        .aqi-poor { background: rgba(239, 68, 68, 0.2); color: var(--danger); }

        .aqi-bar {
            height: 8px;
            background: linear-gradient(to right, var(--success), var(--warning), var(--danger));
            border-radius: 4px;
            margin-top: 16px;
            position: relative;
        }

        .aqi-indicator {
            position: absolute;
            width: 4px;
            height: 16px;
            background: white;
            top: -4px;
            border-radius: 2px;
            transform: translateX(-50%);
        }

        .sun-times {
            display: flex;
            justify-content: space-around;
            margin-top: 16px;
        }

        .sun-time {
            text-align: center;
        }

        .sun-icon {
            width: 40px;
            height: 40px;
            margin: 0 auto 8px;
        }

        .sun-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .sun-value {
            font-weight: 600;
            margin-top: 4px;
        }

        .forecast-section {
            margin-top: 20px;
        }

        .section-title {
            font-size: 1.2rem;
            margin-bottom: 16px;
            font-weight: 600;
        }

        .forecast-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }

        .forecast-day {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 16px 12px;
            text-align: center;
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }

        .forecast-day:hover {
            transform: translateY(-4px);
        }

        .day-name {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 12px;
        }

        .forecast-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 12px;
        }

        .forecast-temps {
            display: flex;
            justify-content: center;
            gap: 8px;
            font-weight: 600;
        }

        .temp-high {
            color: var(--text-primary);
        }

        .temp-low {
            color: var(--text-secondary);
        }

        .chart-section {
            margin-top: 20px;
        }

        .chart-container {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border);
            height: 250px;
            position: relative;
        }

        .chart-grid {
            position: absolute;
            inset: 40px 20px 40px 50px;
        }

        .chart-line {
            fill: none;
            stroke-width: 3;
            stroke-linecap: round;
        }

        .line-high {
            stroke: #ef4444;
        }

        .line-low {
            stroke: #3b82f6;
        }

        .chart-point {
            fill: var(--bg-secondary);
            stroke-width: 3;
            r: 6;
        }

        .point-high {
            stroke: #ef4444;
        }

        .point-low {
            stroke: #3b82f6;
        }

        .chart-label {
            fill: var(--text-secondary);
            font-size: 12px;
        }

        .chart-legend {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 12px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        @media (max-width: 768px) {
            .forecast-row {
                grid-template-columns: repeat(3, 1fr);
            }

            .forecast-row .forecast-day:nth-child(n+4) {
                display: none;
            }

            .current-temp {
                font-size: 3rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .forecast-row {
                grid-template-columns: repeat(2, 1fr);
            }

            header {
                flex-direction: column;
                align-items: flex-start;
            }

            .unit-toggle {
                align-self: flex-end;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>Weather Dashboard</h1>
                <div class="location">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                    </svg>
                    Prague, Czech Republic
                </div>
            </div>
            <button class="unit-toggle" onclick="toggleUnit()">°C / °F</button>
        </header>

        <div class="main-grid">
            <!-- Current Weather Card -->
            <div class="card">
                <div class="current-weather">
                    <div class="weather-icon">
                        <svg viewBox="0 0 100 100" fill="none">
                            <circle cx="50" cy="50" r="20" fill="#fbbf24"/>
                            <g stroke="#fbbf24" stroke-width="4" stroke-linecap="round">
                                <line x1="50" y1="15" x2="50" y2="25"/>
                                <line x1="50" y1="75" x2="50" y2="85"/>
                                <line x1="15" y1="50" x2="25" y2="50"/>
                                <line x1="75" y1="50" x2="85" y2="50"/>
                                <line x1="25" y1="25" x2="32" y2="32"/>
                                <line x1="68" y1="68" x2="75" y2="75"/>
                                <line x1="25" y1="75" x2="32" y2="68"/>
                                <line x1="68" y1="32" x2="75" y2="25"/>
                            </g>
                            <ellipse cx="70" cy="65" rx="25" ry="15" fill="#94a3b8" opacity="0.9"/>
                        </svg>
                    </div>
                    <div class="temp-display">
                        <div class="current-temp" id="currentTemp">22°</div>
                        <div class="condition">Partly Cloudy</div>
                        <div class="feels-like">Feels like <span id="feelsLike">24°</span></div>
                    </div>
                </div>
                <div class="stats-grid">
                    <div class="stat">
                        <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2.69l5.74 5.88-1.42 1.42-3.32-3.42V17h-2V6.57l-3.32 3.42-1.42-1.42L12 2.69z"/>
                            <path d="M12 22a7 7 0 100-14 7 7 0 000 14z" opacity="0.3"/>
                        </svg>
                        <div>
                            <div class="stat-value" id="humidity">65%</div>
                            <div class="stat-label">Humidity</div>
                        </div>
                    </div>
                    <div class="stat">
                        <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9.59 4.59A2 2 0 1111 8H2m10.59 11.41A2 2 0 1014 16H2m15.73-8.27A2.5 2.5 0 1119.5 12H2"/>
                        </svg>
                        <div>
                            <div class="stat-value"><span id="windSpeed">12</span> km/h</div>
                            <div class="stat-label">Wind Speed</div>
                        </div>
                    </div>
                    <div class="stat">
                        <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 4v10.54a4 4 0 11-4 0V4a2 2 0 114 0z"/>
                        </svg>
                        <div>
                            <div class="stat-value" id="pressure">1013 hPa</div>
                            <div class="stat-label">Pressure</div>
                        </div>
                    </div>
                    <div class="stat">
                        <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                        </svg>
                        <div>
                            <div class="stat-value">6 km/h</div>
                            <div class="stat-label">UV Index</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Air Quality Card -->
            <div class="card">
                <div class="air-quality">
                    <div>
                        <h3 class="section-title">Air Quality</h3>
                        <div class="aqi-badge">
                            <div class="aqi-value" id="aqiValue">42</div>
                            <div>
                                <div class="aqi-label aqi-good">Good</div>
                                <div style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 4px;">US AQI</div>
                            </div>
                        </div>
                    </div>
                    <svg width="80" height="80" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="40" fill="none" stroke="#334155" stroke-width="8"/>
                        <circle cx="50" cy="50" r="40" fill="none" stroke="#22c55e" stroke-width="8" 
                                stroke-dasharray="251.2" stroke-dashoffset="145" transform="rotate(-90 50 50)"/>
                        <text x="50" y="55" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="600">Good</text>
                    </svg>
                </div>
                <div class="aqi-bar">
                    <div class="aqi-indicator" id="aqiIndicator" style="left: 14%;"></div>
                </div>
                <div style="display: flex; justify-content: space-between; margin-top: 8px; font-size: 0.75rem; color: var(--text-secondary);">
                    <span>Good</span>
                    <span>Moderate</span>
                    <span>Poor</span>
                </div>
                <div class="sun-times">
                    <div class="sun-time">
                        <svg class="sun-icon" viewBox="0 0 50 50">
                            <circle cx="25" cy="25" r="8" fill="#fbbf24"/>
                            <g stroke="#fbbf24" stroke-width="2" stroke-linecap="round">
                                <line x1="25" y1="8" x2="25" y2="13"/>
                                <line x1="25" y1="37" x2="25" y2="42"/>
                                <line x1="8" y1="25" x2="13" y2="25"/>
                                <line x1="37" y1="25" x2="42" y2="25"/>
                            </g>
                        </svg>
                        <div class="sun-label">Sunrise</div>
                        <div class="sun-value">5:12 AM</div>
                    </div>
                    <div class="sun-time">
                        <svg class="sun-icon" viewBox="0 0 50 50">
                            <path d="M25 35c-8.28 0-15-6.72-15-15h30c0 8.28-6.72 15-15 15z" fill="#f97316"/>
                            <circle cx="25" cy="10" r="6" fill="#fbbf24"/>
                        </svg>
                        <div class="sun-label">Sunset</div>
                        <div class="sun-value">8:45 PM</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 5-Day Forecast -->
        <div class="forecast-section">
            <h3 class="section-title">5-Day Forecast</h3>
            <div class="forecast-row" id="forecastRow"></div>
        </div>

        <!-- Temperature Chart -->
        <div class="chart-section">
            <h3 class="section-title">Temperature Trend</h3>
            <div class="chart-container">
                <svg id="tempChart" width="100%" height="100%" viewBox="0 0 800 250" preserveAspectRatio="xMidYMid meet">
                    <!-- Chart will be drawn by JS -->
                </svg>
            </div>
            <div class="chart-legend">
                <div class="legend-item">
                    <div class="legend-dot" style="background: #ef4444;"></div>
                    <span>High Temperature</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background: #3b82f6;"></div>
                    <span>Low Temperature</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Weather Data for Prague
        const weatherData = {
            current: {
                tempC: 22,
                feelsLikeC: 24,
                humidity: 65,
                windSpeed: 12,
                pressure: 1013,
                aqi: 42,
                condition: 'Partly Cloudy'
            },
            forecast: [
                { day: 'Today', highC: 24, lowC: 14, condition: 'sunny' },
                { day: 'Tomorrow', highC: 22, lowC: 13, condition: 'cloudy' },
                { day: 'Wednesday', highC: 19, lowC: 12, condition: 'rain' },
                { day: 'Thursday', highC: 21, lowC: 11, condition: 'cloudy' },
                { day: 'Friday', highC: 25, lowC: 15, condition: 'sunny' }
            ]
        };

        let isCelsius = true;

        function cToF(c) {
            return Math.round((c * 9/5) + 32);
        }

        function formatTemp(c) {
            return isCelsius ? `${c}°` : `${cToF(c)}°`;
        }

        function toggleUnit() {
            isCelsius = !isCelsius;
            updateDisplay();
        }

        function updateDisplay() {
            // Current temp
            document.getElementById('currentTemp').textContent = formatTemp(weatherData.current.tempC);
            document.getElementById('feelsLike').textContent = formatTemp(weatherData.current.feelsLikeC);
            
            // Forecast
            renderForecast();
            
            // Chart
            renderChart();
        }

        function getWeatherIcon(condition, size = 48) {
            const icons = {
                sunny: `<svg viewBox="0 0 50 50" fill="none">
                    <circle cx="25" cy="25" r="10" fill="#fbbf24"/>
                    <g stroke="#fbbf24" stroke-width="3" stroke-linecap="round">
                        <line x1="25" y1="5" x2="25" y2="12"/>
                        <line x1="25" y1="38" x2="25" y2="45"/>
                        <line x1="5" y1="25" x2="12" y2="25"/>
                        <line x1="38" y1="25" x2="45" y2="25"/>
                        <line x1="10" y1="10" x2="15" y2="15"/>
                        <line x1="35" y1="35" x2="40" y2="40"/>
                        <line x1="10" y1="40" x2="15" y2="35"/>
                        <line x1="35" y1="15" x2="40" y2="10"/>
                    </g>
                </svg>`,
                cloudy: `<svg viewBox="0 0 50 50" fill="none">
                    <circle cx="18" cy="25" r="8" fill="#fbbf24" opacity="0.7"/>
                    <ellipse cx="28" cy="30" rx="18" ry="10" fill="#94a3b8"/>
                    <ellipse cx="20" cy="32" rx="12" ry="7" fill="#64748b"/>
                </svg>`,
                rain: `<svg viewBox="0 0 50 50" fill="none">
                    <ellipse cx="25" cy="22" rx="16" ry="10" fill="#64748b"/>
                    <ellipse cx="16" cy="24" rx="10" ry="6" fill="#475569"/>
                    <g stroke="#3b82f6" stroke-width="2" stroke-linecap="round">
                        <line x1="18" y1="34" x2="15" y2="42">
                            <animate attributeName="y1" values="34;36;34" dur="1s" repeatCount="indefinite"/>
                            <animate attributeName="y2" values="42;44;42" dur="1s" repeatCount="indefinite"/>
                        </line>
                        <line x1="25" y1="36" x2="22" y2="44">
                            <animate attributeName="y1" values="36;38;36" dur="1s" repeatCount="indefinite" begin="0.2s"/>
                            <animate attributeName="y2" values="44;46;44" dur="1s" repeatCount="indefinite" begin="0.2s"/>
                        </line>
                        <line x1="32" y1="34" x2="29" y2="42">
                            <animate attributeName="y1" values="34;36;34" dur="1s" repeatCount="indefinite" begin="0.4s"/>
                            <animate attributeName="y2" values="42;44;42" dur="1s" repeatCount="indefinite" begin="0.4s"/>
                        </line>
                    </g>
                </svg>`
            };
            return icons[condition] || icons.sunny;
        }

        function renderForecast() {
            const container = document.getElementById('forecastRow');
            container.innerHTML = weatherData.forecast.map(day => `
                <div class="forecast-day">
                    <div class="day-name">${day.day}</div>
                    <div class="forecast-icon">${getWeatherIcon(day.condition)}</div>
                    <div class="forecast-temps">
                        <span class="temp-high">${formatTemp(day.highC)}</span>
                        <span class="temp-low">${formatTemp(day.lowC)}</span>
                    </div>
                </div>
            `).join('');
        }

        function renderChart() {
            const svg = document.getElementById('tempChart');
            const width = 800;
            const height = 250;
            const padding = { top: 30, right: 30, bottom: 50, left: 50 };
            
            const chartWidth = width - padding.left - padding.right;
            const chartHeight = height - padding.top - padding.bottom;
            
            // Get temps in current unit
            const highs = weatherData.forecast.map(d => isCelsius ? d.highC : cToF(d.highC));
            const lows = weatherData.forecast.map(d => isCelsius ? d.lowC : cToF(d.lowC));
            
            const allTemps = [...highs, ...lows];
            const minTemp = Math.min(...allTemps) - 2;
            const maxTemp = Math.max(...allTemps) + 2;
            
            const xStep = chartWidth / (weatherData.forecast.length - 1);
            
            function getY(temp) {
                return padding.top + chartHeight - ((temp - minTemp) / (maxTemp - minTemp)) * chartHeight;
            }
            
            function getX(index) {
                return padding.left + index * xStep;
            }
            
            // Generate points for high line
            const highPoints = highs.map((t, i) => `${getX(i)},${getY(t)}`).join(' ');
            
            // Generate points for low line
            const lowPoints = lows.map((t, i) => `${getX(i)},${getY(t)}`).join(' ');
            
            // Y-axis labels
            const yLabels = [];
            const ySteps = 5;
            for (let i = 0; i <= ySteps; i++) {
                const temp = Math.round(minTemp + (maxTemp - minTemp) * (i / ySteps));
                const y = getY(temp);
                yLabels.push(`
                    <text x="40" y="${y + 4}" text-anchor="end" class="chart-label">${temp}°</text>
                    <line x1="${padding.left}" y1="${y}" x2="${width - padding.right}" y2="${y}" 
                          stroke="#475569" stroke-width="1" stroke-dasharray="4" opacity="0.3"/>
                `);
            }
            
            // X-axis labels
            const xLabels = weatherData.forecast.map((d, i) => `
                <text x="${getX(i)}" y="${height - 10}" text-anchor="middle" class="chart-label">${d.day.slice(0, 3)}</text>
            `).join('');
            
            // High temp points
            const highPointsCircles = highs.map((t, i) => `
                <circle cx="${getX(i)}" cy="${getY(t)}" class="chart-point point-high"/>
                <text x="${getX(i)}" y="${getY(t) - 12}" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="600">${t}°</text>
            `).join('');
            
            // Low temp points
            const lowPointsCircles = lows.map((t, i) => `
                <circle cx="${getX(i)}" cy="${getY(t)}" class="chart-point point-low"/>
                <text x="${getX(i)}" y="${getY(t) + 20}" text-anchor="middle" fill="#3b82f6" font-size="12" font-weight="600">${t}°</text>
            `).join('');
            
            svg.innerHTML = `
                ${yLabels.join('')}
                ${xLabels}
                <polyline points="${highPoints}" class="chart-line line-high"/>
                <polyline points="${lowPoints}" class="chart-line line-low"/>
                ${highPointsCircles}
                ${lowPointsCircles}
            `;
        }

        // Initialize
        updateDisplay();
    </script>
</body>
</html>
