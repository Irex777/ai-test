<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prague Weather Dashboard</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080c15;--card:rgba(14,20,40,0.72);--card-hover:rgba(20,28,52,0.85);
  --border:rgba(255,255,255,0.06);--border-hover:rgba(255,255,255,0.13);
  --accent:#f59e0b;--accent-dim:rgba(245,158,11,0.12);--accent-glow:rgba(245,158,11,0.25);
  --text:#e2e8f0;--muted:#7a8ba8;--dim:#475569;
  --teal:#14b8a6;--teal-dim:rgba(20,184,166,0.12);
  --green:#10b981;--yellow:#eab308;--orange:#f97316;--red:#ef4444;
  --radius:16px;--radius-sm:10px;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;
  line-height:1.5;
}
/* Background orbs */
.bg-orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
.bg-orb-1{width:500px;height:500px;background:radial-gradient(circle,rgba(245,158,11,0.12),transparent 70%);top:-120px;right:-120px}
.bg-orb-2{width:400px;height:400px;background:radial-gradient(circle,rgba(20,184,166,0.08),transparent 70%);bottom:-80px;left:-80px}
.bg-orb-3{width:300px;height:300px;background:radial-gradient(circle,rgba(245,158,11,0.06),transparent 70%);top:45%;left:35%}

.dashboard{position:relative;z-index:1;max-width:1160px;margin:0 auto;padding:24px 20px 48px}

/* Header */
header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px;margin-bottom:28px;animation:fadeSlideDown .6s ease both}
.location h1{font-size:1.65rem;font-weight:700;letter-spacing:-.02em}
.location p{color:var(--muted);font-size:.88rem;margin-top:2px}
.header-right{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.datetime{color:var(--muted);font-size:.82rem;text-align:right;line-height:1.45}

/* Toggle switch */
.unit-toggle{
  display:flex;align-items:center;gap:0;
  background:rgba(255,255,255,0.06);border-radius:24px;padding:3px;
  border:1px solid var(--border);cursor:pointer;position:relative;
  transition:border-color .3s;
}
.unit-toggle:hover{border-color:var(--border-hover)}
.unit-toggle:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.unit-btn{
  padding:6px 16px;border-radius:20px;font-size:.82rem;font-weight:600;
  color:var(--muted);background:transparent;border:none;cursor:pointer;
  transition:all .3s ease;position:relative;z-index:1;
}
.unit-btn.active{color:#0b1120;background:var(--accent)}

/* Cards */
.card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  transition:transform .3s ease,border-color .3s ease,background .3s ease;
}
.card:hover{transform:translateY(-2px);border-color:var(--border-hover);background:var(--card-hover)}

/* Hero section */
.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.current-card{padding:32px 28px;animation:fadeSlideUp .5s ease .1s both}
.current-main{display:flex;align-items:center;gap:20px;margin-bottom:16px}
.weather-icon-wrap{
  width:96px;height:96px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.weather-icon-wrap svg{width:100%;height:100%}
.temp-display{display:flex;align-items:flex-start;gap:2px}
.temp-value{font-size:4.5rem;font-weight:800;letter-spacing:-.04em;line-height:1}
.temp-unit{font-size:1.8rem;font-weight:300;color:var(--muted);margin-top:8px}
.condition-text{font-size:1.15rem;font-weight:500;margin-bottom:4px}
.feels-like{font-size:.85rem;color:var(--muted)}
.high-low{display:flex;gap:16px;margin-top:14px;font-size:.88rem}
.high-low span{display:flex;align-items:center;gap:4px}
.hl-high{color:var(--accent)}
.hl-low{color:var(--teal)}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;animation:fadeSlideUp .5s ease .2s both}
.stat-card{padding:18px 16px;display:flex;flex-direction:column;gap:6px}
.stat-icon{width:28px;height:28px;color:var(--accent);opacity:.7}
.stat-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);font-weight:600}
.stat-value{font-size:1.15rem;font-weight:700}
.stat-sub{font-size:.75rem;color:var(--muted)}

/* Forecast */
.forecast-section{margin-bottom:20px;animation:fadeSlideUp .5s ease .3s both}
.forecast-section h2{font-size:1rem;font-weight:600;margin-bottom:14px;color:var(--muted);letter-spacing:.02em}
.forecast-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.forecast-card{padding:20px 12px;text-align:center}
.forecast-day{font-size:.78rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.forecast-icon{width:44px;height:44px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center}
.forecast-icon svg{width:100%;height:100%}
.forecast-temps{display:flex;justify-content:center;gap:8px;font-size:.9rem;font-weight:600}
.forecast-high{color:var(--text)}
.forecast-low{color:var(--dim)}
.forecast-precip{font-size:.72rem;color:var(--teal);margin-top:8px;display:flex;align-items:center;justify-content:center;gap:3px}

/* Chart */
.chart-section{padding:24px;margin-bottom:20px;animation:fadeSlideUp .5s ease .4s both;overflow:hidden}
.chart-section h2{font-size:1rem;font-weight:600;margin-bottom:16px;color:var(--muted);letter-spacing:.02em}
.chart-wrap{width:100%;overflow-x:auto}
.chart-wrap svg{width:100%;min-width:500px;display:block}

/* Bottom grid */
.bottom-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;animation:fadeSlideUp .5s ease .5s both}

/* AQI */
.aqi-card{padding:24px}
.aqi-card h2{font-size:1rem;font-weight:600;margin-bottom:16px;color:var(--muted);letter-spacing:.02em}
.aqi-main{display:flex;align-items:center;gap:20px;margin-bottom:18px}
.aqi-circle{
  width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;font-weight:800;flex-shrink:0;position:relative;
}
.aqi-circle::before{
  content:'';position:absolute;inset:-3px;border-radius:50%;
  background:conic-gradient(var(--green) 0deg,var(--green) calc(var(--pct)*3.6deg),rgba(255,255,255,0.06) calc(var(--pct)*3.6deg));
  z-index:-1;
}
.aqi-circle span{position:relative;z-index:1}
.aqi-label{font-size:1.1rem;font-weight:700}
.aqi-desc{font-size:.8rem;color:var(--muted);margin-top:2px}
.aqi-bar-wrap{margin-bottom:18px}
.aqi-bar{height:6px;border-radius:3px;background:linear-gradient(90deg,#10b981,#eab308,#f97316,#ef4444);position:relative}
.aqi-marker{
  position:absolute;top:-5px;width:16px;height:16px;border-radius:50%;
  background:#fff;border:3px solid var(--green);
  transform:translateX(-50%);transition:left .8s ease;
  box-shadow:0 0 8px rgba(16,185,129,0.4);
}
.pollutants{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pollutant{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.pollutant-name{font-size:.75rem;color:var(--dim);font-weight:500}
.pollutant-val{font-size:.82rem;font-weight:600}

/* Sun card */
.sun-card{padding:24px}
.sun-card h2{font-size:1rem;font-weight:600;margin-bottom:16px;color:var(--muted);letter-spacing:.02em}
.sun-arc-wrap{display:flex;justify-content:center;margin-bottom:8px}
.sun-arc-wrap svg{width:100%;max-width:320px;display:block}
.sun-times{display:flex;justify-content:space-between;padding:0 8px;margin-top:8px}
.sun-time{text-align:center}
.sun-time-label{font-size:.7rem;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.sun-time-val{font-size:.92rem;font-weight:600}
.daylight-info{text-align:center;margin-top:14px;font-size:.8rem;color:var(--muted)}
.daylight-info strong{color:var(--text)}

/* Animations */
@keyframes fadeSlideUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes fadeSlideDown{
  from{opacity:0;transform:translateY(-15px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}
@keyframes spin-slow{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}
@keyframes raindrop{
  0%{opacity:1;transform:translateY(0)}
  100%{opacity:0;transform:translateY(12px)}
}
.float-anim{animation:float 4s ease-in-out infinite}
.spin-slow{animation:spin-slow 20s linear infinite}

/* Chart line draw animation */
.draw-line{stroke-dasharray:var(--dash);stroke-dashoffset:var(--dash);animation:drawLine 1.8s ease forwards}
@keyframes drawLine{to{stroke-dashoffset:0}}

/* Responsive */
@media(max-width:900px){
  .hero-grid{grid-template-columns:1fr}
  .bottom-grid{grid-template-columns:1fr}
}
@media(max-width:640px){
  .dashboard{padding:16px 12px 36px}
  .forecast-row{grid-template-columns:repeat(5,1fr);gap:8px}
  .forecast-card{padding:14px 6px}
  .forecast-icon{width:32px;height:32px;margin-bottom:8px}
  .forecast-temps{flex-direction:column;gap:2px;font-size:.8rem}
  .temp-value{font-size:3.2rem}
  .weather-icon-wrap{width:72px;height:72px}
  .current-card{padding:24px 20px}
  .stats-grid{grid-template-columns:1fr 1fr;gap:10px}
  .stat-card{padding:14px 12px}
  .pollutants{grid-template-columns:1fr}
  header{flex-direction:column;gap:12px}
  .header-right{width:100%;justify-content:space-between}
}
@media(max-width:420px){
  .forecast-row{grid-template-columns:repeat(5,1fr);gap:4px}
  .forecast-card{padding:10px 2px}
  .forecast-day{font-size:.65rem}
  .forecast-precip{display:none}
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
}
</style>
</head>
<body>

<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="bg-orb bg-orb-3"></div>

<div class="dashboard">
  <header>
    <div class="location">
      <h1>Prague</h1>
      <p>Czech Republic</p>
    </div>
    <div class="header-right">
      <div class="datetime">
        <div id="dateDisplay"></div>
        <div id="timeDisplay"></div>
      </div>
      <div class="unit-toggle" role="button" tabindex="0" aria-label="Toggle temperature unit" id="unitToggle" onclick="toggleUnit()">
        <button class="unit-btn active" id="btnC" aria-hidden="true">°C</button>
        <button class="unit-btn" id="btnF" aria-hidden="true">°F</button>
      </div>
    </div>
  </header>

  <div class="hero-grid">
    <div class="current-card card" id="currentCard">
      <!-- Filled by JS -->
    </div>
    <div class="stats-grid" id="statsGrid">
      <!-- Filled by JS -->
    </div>
  </div>

  <section class="forecast-section">
    <h2>5-Day Forecast</h2>
    <div class="forecast-row" id="forecastRow">
      <!-- Filled by JS -->
    </div>
  </section>

  <section class="chart-section card">
    <h2>Temperature Trend</h2>
    <div class="chart-wrap">
      <svg id="tempChart" viewBox="0 0 700 280" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Temperature trend chart showing daily highs and lows"></svg>
    </div>
  </section>

  <div class="bottom-grid">
    <div class="aqi-card card" id="aqiCard">
      <!-- Filled by JS -->
    </div>
    <div class="sun-card card" id="sunCard">
      <!-- Filled by JS -->
    </div>
  </div>
</div>

<script>
/* ===== Weather Data ===== */
const W = {
  city:"Prague", country:"Czech Republic",
  current:{
    temp:18, feelsLike:16, condition:"partly-cloudy", conditionText:"Partly Cloudy",
    humidity:65, wind:{speed:12,dir:"NW",gust:18},
    pressure:1013, uvIndex:4, visibility:10, dewPoint:11,
    high:20, low:12
  },
  forecast:[
    {day:"Mon",high:20,low:12,condition:"partly-cloudy",precip:10},
    {day:"Tue",high:22,low:14,condition:"sunny",precip:0},
    {day:"Wed",high:17,low:10,condition:"rainy",precip:70},
    {day:"Thu",high:15,low:8,condition:"rainy",precip:85},
    {day:"Fri",high:19,low:11,condition:"cloudy",precip:25}
  ],
  aqi:{value:42,label:"Good",pm25:8.3,pm10:15.2,o3:38,no2:12},
  sun:{rise:"6:12",set:"20:34",riseH:6.2,setH:20.57,nowH:14.5}
};

let useCelsius = true;

/* ===== Unit Conversion ===== */
function c2f(c){return Math.round(c*9/5+32)}
function displayTemp(c){return useCelsius?c:c2f(c)}
function unitLabel(){return useCelsius?"°C":"°F"}

/* ===== SVG Weather Icons ===== */
function sunRays(cx,cy,r1,r2,count,sw){
  let s='';
  for(let i=0;i<count;i++){
    const a=i*360/count*Math.PI/180;
    s+=`<line x1="${cx+r1*Math.cos(a)}" y1="${cy+r1*Math.sin(a)}" x2="${cx+r2*Math.cos(a)}" y2="${cy+r2*Math.sin(a)}" stroke="#fbbf24" stroke-width="${sw}" stroke-linecap="round"/>`;
  }
  return s;
}

function iconSun(size=80){
  return `<svg width="${size}" height="${size}" viewBox="0 0 100 100">
    <g class="spin-slow" style="transform-origin:50px 50px">${sunRays(50,50,28,40,8,3)}</g>
    <circle cx="50" cy="50" r="18" fill="#fbbf24"/>
    <circle cx="50" cy="50" r="14" fill="#fcd34d" opacity=".5"/>
  </svg>`;
}

function iconCloud(size=80,color="#94a3b8"){
  return `<svg width="${size}" height="${size}" viewBox="0 0 100 80">
    <path d="M25,62 C12,62 6,52 10,42 C8,30 20,24 32,26 C36,16 50,10 62,16 C70,8 86,12 88,24 C98,26 102,40 94,50 C98,58 92,66 80,64 Z" fill="${color}" opacity=".85"/>
    <path d="M25,62 C12,62 6,52 10,42 C8,30 20,24 32,26 C36,16 50,10 62,16 C70,8 86,12 88,24 C98,26 102,40 94,50 C98,58 92,66 80,64 Z" fill="white" opacity=".08"/>
  </svg>`;
}

function iconPartlyCloudy(size=80){
  return `<svg width="${size}" height="${size}" viewBox="0 0 100 100">
    <g class="spin-slow" style="transform-origin:35px 35px">
      ${sunRays(35,35,24,34,8,2.5)}
      <circle cx="35" cy="35" r="13" fill="#fbbf24"/>
    </g>
    <path d="M40,80 C28,80 22,72 26,62 C24,52 34,46 44,48 C48,38 62,34 72,40 C78,34 90,38 90,50 C98,52 100,64 92,70 C94,76 88,82 78,80 Z" fill="#94a3b8" opacity=".9"/>
  </svg>`;
}

function iconRain(size=80){
  return `<svg width="${size}" height="${size}" viewBox="0 0 100 100">
    <path d="M25,55 C12,55 6,46 10,36 C8,25 20,19 32,21 C36,11 50,5 62,11 C70,3 86,7 88,19 C98,21 102,35 94,44 C98,52 92,58 80,56 Z" fill="#64748b" opacity=".9"/>
    ${[[30,70,4],[42,78,5],[54,66,3],[66,76,4],[38,90,3],[52,88,4]].map(([x,y,d],i)=>
      `<line x1="${x}" y1="${y}" x2="${x-d}" y2="${y+d+6}" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" opacity=".7" style="animation:raindrop 1s ease-in ${i*.15}s infinite"/>`
    ).join('')}
  </svg>`;
}

function getIcon(condition,size=80){
  switch(condition){
    case 'sunny':return iconSun(size);
    case 'cloudy':return iconCloud(size);
    case 'partly-cloudy':return iconPartlyCloudy(size);
    case 'rainy':return iconRain(size);
    default:return iconCloud(size);
  }
}

/* ===== Render Functions ===== */
function renderCurrent(){
  const c=W.current;
  document.getElementById('currentCard').innerHTML=`
    <div class="current-main">
      <div class="weather-icon-wrap float-anim">${getIcon(c.condition,96)}</div>
      <div>
        <div class="temp-display">
          <span class="temp-value" id="tempVal">${displayTemp(c.temp)}</span>
          <span class="temp-unit" id="tempUnit">${unitLabel()}</span>
        </div>
        <div class="condition-text">${c.conditionText}</div>
        <div class="feels-like">Feels like <span id="feelsVal">${displayTemp(c.feelsLike)}</span>${unitLabel()}</div>
      </div>
    </div>
    <div class="high-low">
      <span class="hl-high">
        <svg width="14" height="14" viewBox="0 0 16 16"><path d="M8 2l3 5H5z" fill="#f59e0b"/></svg>
        ${displayTemp(c.high)}${unitLabel()}
      </span>
      <span class="hl-low">
        <svg width="14" height="14" viewBox="0 0 16 16"><path d="M8 14l3-5H5z" fill="#14b8a6"/></svg>
        ${displayTemp(c.low)}${unitLabel()}
      </span>
    </div>`;
}

function renderStats(){
  const c=W.current;
  const stats=[
    {icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v6m0 0a4 4 0 100 8 4 4 0 000-8z"/><path d="M12 2C8 6 4 10 4 14a8 8 0 0016 0c0-4-4-8-8-12z"/></svg>`,label:"Humidity",value:`${c.humidity}%`,sub:"Normal range"},
    {icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.59 4.59A2 2 0 1111 8H2m10.59 11.41A2 2 0 1014 16H2m15.73-8.27A2.5 2.5 0 1119.5 12H2"/></svg>`,label:"Wind",value:`${c.wind.speed} km/h`,sub:`${c.wind.dir} · Gusts ${c.wind.gust} km/h`},
    {icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>`,label:"Pressure",value:`${c.pressure} hPa`,sub:"Stable"},
    {icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`,label:"UV Index",value:c.uvIndex,sub:c.uvIndex<=2?"Low":c.uvIndex<=5?"Moderate":"High"},
    {icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`,label:"Visibility",value:`${c.visibility} km`,sub:"Clear"},
    {icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v6m0 0a4 4 0 100 8 4 4 0 000-8z"/></svg>`,label:"Dew Point",value:`${displayTemp(c.dewPoint)}${unitLabel()}`,sub:"Comfortable"}
  ];
  document.getElementById('statsGrid').innerHTML=stats.map((s,i)=>`
    <div class="stat-card card" style="animation-delay:${.2+i*.05}s">
      <div class="stat-icon">${s.icon}</div>
      <div class="stat-label">${s.label}</div>
      <div class="stat-value">${s.value}</div>
      <div class="stat-sub">${s.sub}</div>
    </div>`).join('');
}

function renderForecast(){
  document.getElementById('forecastRow').innerHTML=W.forecast.map(f=>`
    <div class="forecast-card card">
      <div class="forecast-day">${f.day}</div>
      <div class="forecast-icon">${getIcon(f.condition,44)}</div>
      <div class="forecast-temps">
        <span class="forecast-high">${displayTemp(f.high)}°</span>
        <span class="forecast-low">${displayTemp(f.low)}°</span>
      </div>
      ${f.precip>0?`<div class="forecast-precip">
        <svg width="10" height="10" viewBox="0 0 10 10"><path d="M5 1C3 4 1 6 1 7.5a4 4 0 008 0C9 6 7 4 5 1z" fill="#60a5fa" opacity=".7"/></svg>
        ${f.precip}%
      </div>`:''}
    </div>`).join('');
}

/* ===== Temperature Chart ===== */
function renderChart(){
  const svg=document.getElementById('tempChart');
  const pad={l:50,r:30,t:35,b:50};
  const W2=700-pad.l-pad.r;
  const H=280-pad.t-pad.b;
  const forecast=W.forecast;
  const allTemps=forecast.flatMap(f=>[f.high,f.low]);
  const minT=Math.min(...allTemps)-3;
  const maxT=Math.max(...allTemps)+3;
  const range=maxT-minT||1;

  function x(i){return pad.l+(W2/(forecast.length-1))*i}
  function y(t){return pad.t+H-((t-minT)/range)*H}

  // Grid lines
  let gridLines='';
  const step=Math.ceil(range/4);
  for(let t=Math.ceil(minT);t<=Math.floor(maxT);t+=step){
    const yy=y(t);
    gridLines+=`<line x1="${pad.l}" y1="${yy}" x2="${700-pad.r}" y2="${yy}" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>`;
    gridLines+=`<text x="${pad.l-10}" y="${yy+4}" text-anchor="end" fill="#475569" font-size="11">${displayTemp(t)}</text>`;
  }

  // X labels
  let xLabels='';
  forecast.forEach((f,i)=>{
    xLabels+=`<text x="${x(i)}" y="${280-pad.b+22}" text-anchor="middle" fill="#7a8ba8" font-size="12" font-weight="600">${f.day}</text>`;
  });

  // Smooth curve helper (Catmull-Rom to Bezier)
  function smoothPath(points){
    if(points.length<2)return'';
    let d=`M ${points[0].x} ${points[0].y}`;
    for(let i=0;i<points.length-1;i++){
      const p0=points[Math.max(0,i-1)];
      const p1=points[i];
      const p2=points[i+1];
      const p3=points[Math.min(points.length-1,i+2)];
      const cp1x=p1.x+(p2.x-p0.x)/6;
      const cp1y=p1.y+(p2.y-p0.y)/6;
      const cp2x=p2.x-(p3.x-p1.x)/6;
      const cp2y=p2.y-(p3.y-p1.y)/6;
      d+=` C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${p2.x} ${p2.y}`;
    }
    return d;
  }

  const highPts=forecast.map((f,i)=>({x:x(i),y:y(f.high)}));
  const lowPts=forecast.map((f,i)=>({x:x(i),y:y(f.low)}));
  const highPath=smoothPath(highPts);
  const lowPath=smoothPath(lowPts);

  // Calculate total path length for animation (approximate)
  const dashVal=800;

  // Area fill
  const highArea=highPath+` L ${x(forecast.length-1)} ${y(minT)} L ${x(0)} ${y(minT)} Z`;
  const lowArea=lowPath+` L ${x(forecast.length-1)} ${y(minT)} L ${x(0)} ${y(minT)} Z`;

  // Data points and labels
  let dots='';
  forecast.forEach((f,i)=>{
    const hx=x(i),hy=y(f.high),ly=y(f.low);
    // High dot
    dots+=`<circle cx="${hx}" cy="${hy}" r="5" fill="#f59e0b" stroke="#0b1120" stroke-width="2"/>`;
    dots+=`<text x="${hx}" y="${hy-12}" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700">${displayTemp(f.high)}°</text>`;
    // Low dot
    dots+=`<circle cx="${hx}" cy="${ly}" r="5" fill="#14b8a6" stroke="#0b1120" stroke-width="2"/>`;
    dots+=`<text x="${hx}" y="${ly+20}" text-anchor="middle" fill="#5eead4" font-size="11" font-weight="700">${displayTemp(f.low)}°</text>`;
  });

  svg.innerHTML=`
    <defs>
      <linearGradient id="highGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#f59e0b" stop-opacity=".25"/>
        <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
      </linearGradient>
      <linearGradient id="lowGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#14b8a6" stop-opacity=".15"/>
        <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
      </linearGradient>
    </defs>
    ${gridLines}
    ${xLabels}
    <path d="${highArea}" fill="url(#highGrad)"/>
    <path d="${lowArea}" fill="url(#lowGrad)"/>
    <path d="${highPath}" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" class="draw-line" style="--dash:${dashVal}"/>
    <path d="${lowPath}" fill="none" stroke="#14b8a6" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="6 4" class="draw-line" style="--dash:${dashVal}"/>
    ${dots}
    <text x="${pad.l}" y="${pad.t-12}" fill="#f59e0b" font-size="11" font-weight="600" opacity=".7">HIGH</text>
    <text x="${pad.l+50}" y="${pad.t-12}" fill="#14b8a6" font-size="11" font-weight="600" opacity=".7">LOW</text>
  `;
}

/* ===== AQI ===== */
function renderAQI(){
  const a=W.aqi;
  const pct=Math.min(100,Math.round(a.value/3));
  const clr=a.value<=50?'#10b981':a.value<=100?'#eab308':a.value<=150?'#f97316':'#ef4444';
  const pollutants=[
    {name:'PM2.5',val:a.pm25,unit:'µg/m³'},
    {name:'PM10',val:a.pm10,unit:'µg/m³'},
    {name:'O₃',val:a.o3,unit:'ppb'},
    {name:'NO₂',val:a.no2,unit:'ppb'}
  ];
  document.getElementById('aqiCard').innerHTML=`
    <h2>Air Quality Index</h2>
    <div class="aqi-main">
      <div class="aqi-circle" style="--pct:${pct};background:rgba(0,0,0,.3);border:3px solid ${clr}">
        <span style="color:${clr}">${a.value}</span>
      </div>
      <div>
        <div class="aqi-label" style="color:${clr}">${a.label}</div>
        <div class="aqi-desc">Air quality is satisfactory with minimal risk.</div>
      </div>
    </div>
    <div class="aqi-bar-wrap">
      <div class="aqi-bar">
        <div class="aqi-marker" style="left:${pct}%;border-color:${clr}"></div>
      </div>
    </div>
    <div class="pollutants">
      ${pollutants.map(p=>`
        <div class="pollutant">
          <span class="pollutant-name">${p.name}</span>
          <span class="pollutant-val">${p.val} <small style="color:var(--dim);font-weight:400">${p.unit}</small></span>
        </div>`).join('')}
    </div>`;
}

/* ===== Sunrise / Sunset ===== */
function renderSun(){
  const s=W.sun;
  const dayLen=s.setH-s.riseH;
  const elapsed=s.nowH-s.riseH;
  const progress=Math.max(0,Math.min(1,elapsed/dayLen));
  const hrs=Math.floor(dayLen);
  const mins=Math.round((dayLen-hrs)*60);

  // Arc parameters
  const cx=160,cy=140,rx=140,ry=105;
  // Sun position on ellipse
  const angle=Math.PI*(1-progress);
  const sx=cx+rx*Math.cos(angle);
  const sy=cy-ry*Math.sin(angle);

  // Build arc path (full semi-ellipse, dashed for future portion)
  const arcStart={x:cx-rx,y:cy};
  const arcEnd={x:cx+rx,y:cy};

  // Generate visible arc points
  let arcPts=[];
  for(let i=0;i<=50;i++){
    const t=i/50;
    const a=Math.PI*(1-t);
    arcPts.push({x:cx+rx*Math.cos(a),y:cy-ry*Math.sin(a)});
  }
  const arcPath='M '+arcPts.map(p=>`${p.x} ${p.y}`).join(' L ');

  // Split arc into elapsed (solid) and remaining (dashed)
  const splitIdx=Math.round(progress*50);
  const elapsedPath='M '+arcPts.slice(0,splitIdx+1).map(p=>`${p.x} ${p.y}`).join(' L ');
  const remainPath='M '+arcPts.slice(splitIdx).map(p=>`${p.x} ${p.y}`).join(' L ');

  document.getElementById('sunCard').innerHTML=`
    <h2>Sunrise &amp; Sunset</h2>
    <div class="sun-arc-wrap">
      <svg viewBox="0 0 320 180" preserveAspectRatio="xMidYMid meet">
        <defs>
          <linearGradient id="arcGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#f59e0b" stop-opacity=".3"/>
            <stop offset="100%" stop-color="#f59e0b" stop-opacity=".6"/>
          </linearGradient>
          <radialGradient id="sunGlow">
            <stop offset="0%" stop-color="#fbbf24" stop-opacity=".4"/>
            <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <!-- Horizon -->
        <line x1="${cx-rx-10}" y1="${cy}" x2="${cx+rx+10}" y2="${cy}" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="4 4"/>
        <!-- Remaining path (dashed) -->
        <path d="${remainPath}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2" stroke-dasharray="4 6"/>
        <!-- Elapsed path (solid) -->
        <path d="${elapsedPath}" fill="none" stroke="url(#arcGrad)" stroke-width="2.5"/>
        <!-- Sun glow -->
        <circle cx="${sx}" cy="${sy}" r="18" fill="url(#sunGlow)"/>
        <!-- Sun dot -->
        <circle cx="${sx}" cy="${sy}" r="7" fill="#fbbf24"/>
        <circle cx="${sx}" cy="${sy}" r="4" fill="#fef3c7"/>
        <!-- Sunrise label -->
        <text x="${cx-rx}" y="${cy+20}" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">${s.rise}</text>
        <text x="${cx-rx}" y="${cy+32}" text-anchor="middle" fill="#475569" font-size="8">AM</text>
        <!-- Sunset label -->
        <text x="${cx+rx}" y="${cy+20}" text-anchor="middle" fill="#f97316" font-size="10" font-weight="600">${s.set}</text>
        <text x="${cx+rx}" y="${cy+32}" text-anchor="middle" fill="#475569" font-size="8">PM</text>
      </svg>
    </div>
    <div class="daylight-info"><strong>${hrs}h ${mins}m</strong> of daylight</div>`;
}

/* ===== Toggle Unit ===== */
function toggleUnit(){
  useCelsius=!useCelsius;
  document.getElementById('btnC').classList.toggle('active',useCelsius);
  document.getElementById('btnF').classList.toggle('active',!useCelsius);
  renderCurrent();
  renderStats();
  renderForecast();
  renderChart();
}

/* ===== Date/Time ===== */
function updateDateTime(){
  const now=new Date();
  const opts={weekday:'long',year:'numeric',month:'long',day:'numeric'};
  document.getElementById('dateDisplay').textContent=now.toLocaleDateString('en-US',opts);
  document.getElementById('timeDisplay').textContent=now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}

/* ===== Init ===== */
function init(){
  updateDateTime();
  setInterval(updateDateTime,30000);
  renderCurrent();
  renderStats();
  renderForecast();
  renderChart();
  renderAQI();
  renderSun();
}

document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
