<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Model Comparison — Todo Kanban</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26;
    --border: #2a2a3a; --text: #e0e0e8; --text2: #8888a0;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
  .header { padding: 24px 32px; border-bottom: 1px solid var(--border); }
  .header h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
  .header p { color: var(--text2); font-size: 14px; }
  .header .meta { display: flex; gap: 16px; margin-top: 12px; font-size: 13px; color: var(--text2); flex-wrap: wrap; }
  .header .meta span { background: var(--surface2); padding: 4px 10px; border-radius: 6px; }
  .tabs { display: flex; gap: 0; padding: 0 32px; border-bottom: 1px solid var(--border); background: var(--surface); align-items: center; flex-wrap: wrap; }
  .tab {
    padding: 14px 20px; cursor: pointer; font-size: 14px; font-weight: 600;
    border-bottom: 3px solid transparent; transition: all 0.2s;
    display: flex; align-items: center; gap: 8px; user-select: none;
  }
  .tab:hover { background: rgba(255,255,255,0.03); }
  .tab.active { border-bottom-color: var(--text); background: var(--bg); }
  .tab .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .stats {
    display: flex; gap: 12px; padding: 14px 32px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    font-size: 13px; overflow-x: auto; flex-wrap: wrap;
  }
  .stat { background: var(--surface2); padding: 6px 12px; border-radius: 8px; display: flex; flex-direction: column; gap: 2px; min-width: 85px; }
  .stat .label { color: var(--text2); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat .value { font-weight: 700; font-size: 14px; }
  .fast { color: #4ecdc4; } .medium { color: #d4a574; } .slow { color: #ff6b6b; }
  .compare-btn {
    margin-left: auto; padding: 8px 16px; background: var(--surface2);
    border: 1px solid var(--border); color: var(--text); border-radius: 8px;
    cursor: pointer; font-size: 13px; transition: all 0.2s;
  }
  .compare-btn:hover { background: var(--border); }
  .compare-btn.active { background: #d4a574; color: #000; border-color: #d4a574; }
  #singleView iframe { width: 100%; height: calc(100vh - 230px); border: none; background: #fff; display: block; }
  .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; height: calc(100vh - 130px); }
  .compare-grid .panel { position: relative; border-right: 2px solid var(--border); border-bottom: 2px solid var(--border); overflow: hidden; }
  .compare-grid .panel:nth-child(2n) { border-right: none; }
  .compare-grid .panel:nth-child(n+3) { border-bottom: none; }
  .compare-grid .panel-label {
    position: absolute; top: 8px; left: 8px; z-index: 10;
    background: rgba(0,0,0,0.85); color: #fff; padding: 4px 10px;
    border-radius: 6px; font-size: 12px; font-weight: 600; white-space: nowrap;
  }
  .compare-grid iframe { width: 100%; height: 100%; border: none; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="header">
  <h1>AI Model Bake-Off: Todo Kanban App</h1>
  <p>Same prompt, four models, zero hand-editing. Judge for yourself.</p>
  <div class="meta">
    <span>Prompt: "Create a complete Kanban board"</span>
    <span>No external deps</span>
    <span>Drag & drop / Dark theme / LocalStorage</span>
  </div>
</div>
<div class="tabs">
  <div class="tab active" data-model="sonnet" onclick="switchTab('sonnet')"><span class="dot" style="background:#d4a574"></span> Sonnet 4.6</div>
  <div class="tab" data-model="opus" onclick="switchTab('opus')"><span class="dot" style="background:#c084fc"></span> Opus 4.7</div>
  <div class="tab" data-model="glm" onclick="switchTab('glm')"><span class="dot" style="background:#4ecdc4"></span> GLM 5.1</div>
  <div class="tab" data-model="qwen" onclick="switchTab('qwen')"><span class="dot" style="background:#ff6b6b"></span> Qwen 3.6</div>
  <button class="compare-btn" onclick="toggleCompare()">Compare All</button>
</div>
<div class="stats" id="statsBar"></div>
<div id="singleView"><iframe id="appFrame" src="sonnet.html"></iframe></div>
<div id="compareView" class="hidden">
  <div class="compare-grid">
    <div class="panel"><div class="panel-label" style="background:rgba(212,165,116,0.95)">Sonnet 4.6 — 54s</div><iframe src="sonnet.html"></iframe></div>
    <div class="panel"><div class="panel-label" style="background:rgba(192,132,252,0.95)">Opus 4.7 — 74s</div><iframe src="opus.html"></iframe></div>
    <div class="panel"><div class="panel-label" style="background:rgba(78,205,196,0.95)">GLM 5.1 — 166s</div><iframe src="glm.html"></iframe></div>
    <div class="panel"><div class="panel-label" style="background:rgba(255,107,107,0.95)">Qwen 3.6 — 93s</div><iframe src="qwen.html"></iframe></div>
  </div>
</div>
<script>
var meta = {
  sonnet: { name: "Claude Sonnet 4.6", provider: "Anthropic (Pro)", time: 54.12, tokens: "~5K", speed: "~100 tok/s", size: "23,426", quant: "FP16 (cloud)" },
  opus: { name: "Claude Opus 4.7", provider: "Anthropic (Pro)", time: 74.1, tokens: "~6K", speed: "~80 tok/s", size: "32,222", quant: "FP16 (cloud)" },
  glm: { name: "GLM 5.1 Turbo", provider: "ZAI / z.ai", time: 165.73, tokens: "9120", speed: "55.0 tok/s", size: "30,948", quant: "FP16 (cloud)" },
  qwen: { name: "Qwen 3.6 27B", provider: "Local llama.cpp", time: 92.8, tokens: "5674", speed: "61.1 tok/s", size: "22,560", quant: "Q4_K_M (~16GB)" }
};

function switchTab(model) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.toggle('active', t.dataset.model === model); });
  updateStats(model);
  document.getElementById('appFrame').src = model + '.html';
}

function updateStats(model) {
  var m = meta[model];
  var tc = m.time < 60 ? 'fast' : m.time < 120 ? 'medium' : 'slow';
  document.getElementById('statsBar').innerHTML =
    '<div class="stat"><span class="label">Model</span><span class="value">' + m.name + '</span></div>' +
    '<div class="stat"><span class="label">Provider</span><span class="value">' + m.provider + '</span></div>' +
    '<div class="stat"><span class="label">Generation Time</span><span class="value ' + tc + '">' + m.time + 's</span></div>' +
    '<div class="stat"><span class="label">Output Tokens</span><span class="value">' + m.tokens + '</span></div>' +
    '<div class="stat"><span class="label">Speed</span><span class="value">' + m.speed + '</span></div>' +
    '<div class="stat"><span class="label">Output Size</span><span class="value">' + m.size + ' chars</span></div>' +
    '<div class="stat"><span class="label">Quantization</span><span class="value">' + m.quant + '</span></div>';
}

function toggleCompare() {
  var cm = !document.querySelector('.compare-btn').classList.contains('active');
  document.querySelector('.compare-btn').classList.toggle('active', cm);
  document.getElementById('singleView').classList.toggle('hidden', cm);
  document.getElementById('compareView').classList.toggle('hidden', !cm);
  document.getElementById('statsBar').style.display = cm ? 'none' : 'flex';
}

updateStats('sonnet');
</script>
</body>
</html>
