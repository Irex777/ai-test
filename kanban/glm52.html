<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flow Board — 任务流转看板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ===== 设计令牌 ===== */
  :root {
    --bg-base: #0a0b10;
    --bg-deep: #06070b;
    --bg-elevated: #13151c;
    --bg-card: #181a23;
    --bg-card-hover: #1e2130;
    --bg-input: #0e1017;

    --border-subtle: rgba(255, 255, 255, 0.06);
    --border-default: rgba(255, 255, 255, 0.1);
    --border-strong: rgba(255, 255, 255, 0.18);

    --text-primary: #f3f4f8;
    --text-secondary: #9ea3b5;
    --text-muted: #5d6275;

    --accent: #ff7849;
    --accent-soft: rgba(255, 120, 73, 0.15);
    --accent-glow: rgba(255, 120, 73, 0.45);

    --todo-color: #38bdf8;
    --progress-color: #fbbf24;
    --done-color: #34d399;

    --priority-low: #64748b;
    --priority-medium: #f59e0b;
    --priority-high: #ef4444;

    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
    --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.5);
    --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.6);
    --shadow-glow: 0 0 40px var(--accent-glow);

    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 16px;

    --ease: cubic-bezier(0.4, 0, 0.2, 1);
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow-x: hidden;
  }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg-base);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    position: relative;
    overflow-x: hidden;
  }

  /* ===== 动态背景 ===== */
  .bg-effects {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
  }

  .bg-blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.4;
    animation: float 20s ease-in-out infinite;
  }

  .bg-blob.b1 {
    width: 600px; height: 600px;
    background: radial-gradient(circle, #ff7849, transparent 70%);
    top: -200px; right: -150px;
  }

  .bg-blob.b2 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, #38bdf8, transparent 70%);
    bottom: -200px; left: -100px;
    animation-delay: -10s;
    opacity: 0.25;
  }

  .bg-blob.b3 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, #fbbf24, transparent 70%);
    top: 40%; left: 50%;
    animation-delay: -5s;
    opacity: 0.15;
  }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(50px, -30px) scale(1.1); }
    66% { transform: translate(-30px, 40px) scale(0.95); }
  }

  /* ===== 应用容器 ===== */
  .app {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ===== 顶部栏 ===== */
  .header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border-subtle);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    background: rgba(10, 11, 16, 0.7);
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .brand-mark {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), #ff5a1f);
    display: grid;
    place-items: center;
    box-shadow: 0 0 20px var(--accent-glow), inset 0 1px 0 rgba(255, 255, 255, 0.2);
    position: relative;
    overflow: hidden;
  }

  .brand-mark::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(45deg, transparent 30%, rgba(255, 255, 255, 0.3) 50%, transparent 70%);
    animation: shine 3s ease-in-out infinite;
  }

  @keyframes shine {
    0%, 100% { transform: translateX(-100%); }
    50% { transform: translateX(100%); }
  }

  .brand-mark svg {
    width: 22px; height: 22px;
    stroke: white;
    stroke-width: 2.5;
    fill: none;
    position: relative;
    z-index: 1;
  }

  .brand-text h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .brand-text p {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 3px;
    letter-spacing: 0.05em;
  }

  .search-wrap {
    flex: 1;
    min-width: 200px;
    max-width: 400px;
    position: relative;
  }

  .search-input {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border-default);
    color: var(--text-primary);
    padding: 10px 14px 10px 38px;
    border-radius: var(--radius-md);
    font-family: inherit;
    font-size: 13px;
    transition: all 0.2s var(--ease);
  }

  .search-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  .search-input::placeholder { color: var(--text-muted); }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    stroke: var(--text-muted);
    fill: none;
    stroke-width: 2;
    pointer-events: none;
  }

  .filters {
    display: flex;
    gap: 4px;
    background: var(--bg-input);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    padding: 3px;
  }

  .filter-btn {
    background: transparent;
    border: none;
    color: var(--text-secondary);
    padding: 7px 14px;
    border-radius: 7px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s var(--ease);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .filter-btn:hover { color: var(--text-primary); }

  .filter-btn.active {
    background: var(--bg-elevated);
    color: var(--text-primary);
    box-shadow: var(--shadow-sm);
  }

  .filter-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
  }

  .new-task-btn {
    background: linear-gradient(135deg, var(--accent), #ff5a1f);
    border: none;
    color: white;
    padding: 10px 18px;
    border-radius: var(--radius-md);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s var(--ease);
    box-shadow: 0 4px 14px var(--accent-glow), inset 0 1px 0 rgba(255, 255, 255, 0.25);
    position: relative;
    overflow: hidden;
  }

  .new-task-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px var(--accent-glow), inset 0 1px 0 rgba(255, 255, 255, 0.25);
  }

  .new-task-btn:active { transform: translateY(0); }

  .new-task-btn svg {
    width: 14px; height: 14px;
    stroke: white;
    stroke-width: 2.5;
    fill: none;
  }

  /* 统计条 */
  .stats-bar {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
    font-size: 12px;
    color: var(--text-secondary);
    font-family: 'JetBrains Mono', monospace;
  }

  .stat-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stat-item strong {
    color: var(--text-primary);
    font-weight: 600;
  }

  .progress-track {
    flex: 1;
    min-width: 100px;
    height: 4px;
    background: var(--bg-input);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--todo-color), var(--progress-color), var(--done-color));
    border-radius: 2px;
    transition: width 0.6s var(--ease);
    box-shadow: 0 0 10px rgba(52, 211, 153, 0.5);
  }

  /* ===== 看板 ===== */
  .board {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    padding: 24px 32px 32px;
    min-height: 0;
  }

  .column {
    background: linear-gradient(180deg, rgba(24, 26, 35, 0.6), rgba(19, 21, 28, 0.4));
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    display: flex;
    flex-direction: column;
    min-height: 500px;
    transition: all 0.3s var(--ease);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    position: relative;
    overflow: hidden;
  }

  .column::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--col-color);
    opacity: 0.6;
    transition: opacity 0.3s var(--ease);
  }

  .column.drag-over {
    border-color: var(--col-color);
    background: linear-gradient(180deg, rgba(24, 26, 35, 0.9), rgba(19, 21, 28, 0.6));
    transform: scale(1.005);
    box-shadow: 0 0 0 1px var(--col-color), 0 20px 50px rgba(0, 0, 0, 0.4);
  }

  .column.drag-over::before {
    opacity: 1;
    height: 5px;
    box-shadow: 0 0 20px var(--col-color);
  }

  .column-header {
    padding: 18px 18px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border-subtle);
  }

  .column-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .column-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--col-color);
    box-shadow: 0 0 10px var(--col-color);
  }

  .column-count {
    background: var(--bg-input);
    color: var(--text-secondary);
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    border: 1px solid var(--border-default);
    min-width: 24px;
    text-align: center;
  }

  .column-body {
    flex: 1;
    padding: 14px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 100px;
  }

  .column-body::-webkit-scrollbar { width: 6px; }
  .column-body::-webkit-scrollbar-track { background: transparent; }
  .column-body::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 3px; }
  .column-body::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

  .column-add-btn {
    margin: 0 14px 14px;
    padding: 10px;
    background: transparent;
    border: 1px dashed var(--border-default);
    color: var(--text-muted);
    border-radius: var(--radius-md);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s var(--ease);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .column-add-btn:hover {
    border-color: var(--col-color);
    color: var(--col-color);
    background: rgba(255, 255, 255, 0.02);
  }

  .empty-state {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-muted);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    opacity: 0.6;
  }

  /* ===== 任务卡片 ===== */
  .task-card {
    background: var(--bg-card);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    padding: 14px;
    cursor: grab;
    transition: all 0.25s var(--ease);
    position: relative;
    overflow: hidden;
    animation: cardEnter 0.4s var(--ease-spring) backwards;
  }

  @keyframes cardEnter {
    from {
      opacity: 0;
      transform: translateY(10px) scale(0.96);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  .task-card:hover {
    background: var(--bg-card-hover);
    border-color: var(--border-strong);
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }

  .task-card:active { cursor: grabbing; }

  .task-card.dragging {
    opacity: 0.4;
    transform: rotate(3deg) scale(1.02);
    cursor: grabbing;
    box-shadow: var(--shadow-lg);
  }

  .task-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--p-color);
    opacity: 0.8;
  }

  .task-card[data-priority="low"] { --p-color: var(--priority-low); }
  .task-card[data-priority="medium"] { --p-color: var(--priority-medium); }
  .task-card[data-priority="high"] { --p-color: var(--priority-high); }

  .task-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 6px;
  }

  .task-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.35;
    flex: 1;
    word-break: break-word;
  }

  .task-card[data-status="done"] .task-title {
    text-decoration: line-through;
    text-decoration-color: var(--text-muted);
    color: var(--text-secondary);
  }

  .task-actions {
    display: flex;
    gap: 2px;
    opacity: 0;
    transition: opacity 0.2s var(--ease);
    flex-shrink: 0;
  }

  .task-card:hover .task-actions { opacity: 1; }

  .task-action-btn {
    background: transparent;
    border: none;
    color: var(--text-muted);
    width: 24px; height: 24px;
    border-radius: 5px;
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: all 0.15s var(--ease);
  }

  .task-action-btn:hover {
    background: var(--bg-input);
    color: var(--text-primary);
  }

  .task-action-btn.delete:hover { color: var(--priority-high); }

  .task-action-btn svg {
    width: 13px; height: 13px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
  }

  .task-desc {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.5;
    margin-bottom: 10px;
    word-break: break-word;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .task-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding-top: 10px;
    border-top: 1px solid var(--border-subtle);
  }

  .priority-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    background: rgba(255, 255, 255, 0.04);
    color: var(--p-color);
    border: 1px solid rgba(255, 255, 255, 0.06);
  }

  .priority-badge::before {
    content: '';
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--p-color);
    box-shadow: 0 0 6px var(--p-color);
  }

  .task-time {
    font-size: 10px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* ===== 模态框 ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(6, 7, 11, 0.75);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 100;
    display: grid;
    place-items: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s var(--ease);
  }

  .modal-overlay.active {
    opacity: 1;
    pointer-events: auto;
  }

  .modal {
    background: var(--bg-elevated);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-lg);
    width: 100%;
    max-width: 480px;
    padding: 28px;
    box-shadow: var(--shadow-lg);
    transform: scale(0.95) translateY(10px);
    transition: transform 0.3s var(--ease-spring);
    position: relative;
    overflow: hidden;
  }

  .modal::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .modal-overlay.active .modal {
    transform: scale(1) translateY(0);
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 22px;
  }

  .modal-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .modal-close {
    background: transparent;
    border: none;
    color: var(--text-muted);
    width: 30px; height: 30px;
    border-radius: 7px;
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: all 0.15s var(--ease);
  }

  .modal-close:hover {
    background: var(--bg-input);
    color: var(--text-primary);
  }

  .modal-close svg {
    width: 16px; height: 16px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
  }

  .form-group { margin-bottom: 18px; }

  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .form-input,
  .form-textarea {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border-default);
    color: var(--text-primary);
    padding: 11px 14px;
    border-radius: var(--radius-md);
    font-family: inherit;
    font-size: 13px;
    transition: all 0.2s var(--ease);
    resize: none;
  }

  .form-input:focus,
  .form-textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  .form-textarea {
    min-height: 80px;
    line-height: 1.5;
  }

  .priority-picker {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .priority-option {
    background: var(--bg-input);
    border: 1px solid var(--border-default);
    color: var(--text-secondary);
    padding: 10px;
    border-radius: var(--radius-md);
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s var(--ease);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    position: relative;
  }

  .priority-option::before {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  .priority-option[data-p="low"]::before { background: var(--priority-low); }
  .priority-option[data-p="medium"]::before { background: var(--priority-medium); }
  .priority-option[data-p="high"]::before { background: var(--priority-high); }

  .priority-option:hover {
    border-color: var(--border-strong);
    color: var(--text-primary);
  }

  .priority-option.selected[data-p="low"] {
    background: rgba(100, 116, 139, 0.15);
    border-color: var(--priority-low);
    color: var(--priority-low);
  }

  .priority-option.selected[data-p="medium"] {
    background: rgba(245, 158, 11, 0.15);
    border-color: var(--priority-medium);
    color: var(--priority-medium);
  }

  .priority-option.selected[data-p="high"] {
    background: rgba(239, 68, 68, 0.15);
    border-color: var(--priority-high);
    color: var(--priority-high);
  }

  .modal-footer {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 24px;
  }

  .btn {
    padding: 10px 18px;
    border-radius: var(--radius-md);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.2s var(--ease);
  }

  .btn-secondary {
    background: transparent;
    border-color: var(--border-default);
    color: var(--text-secondary);
  }

  .btn-secondary:hover {
    background: var(--bg-input);
    color: var(--text-primary);
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #ff5a1f);
    color: white;
    box-shadow: 0 4px 14px var(--accent-glow);
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px var(--accent-glow);
  }

  /* ===== Toast ===== */
  .toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 200;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
  }

  .toast {
    background: var(--bg-elevated);
    border: 1px solid var(--border-default);
    color: var(--text-primary);
    padding: 12px 16px;
    border-radius: var(--radius-md);
    font-size: 13px;
    box-shadow: var(--shadow-lg);
    display: flex;
    align-items: center;
    gap: 10px;
    animation: toastIn 0.3s var(--ease-spring);
    min-width: 240px;
    pointer-events: auto;
  }

  .toast.removing {
    animation: toastOut 0.25s var(--ease) forwards;
  }

  @keyframes toastIn {
    from { transform: translateX(120%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  @keyframes toastOut {
    to { transform: translateX(120%); opacity: 0; }
  }

  .toast-icon {
    width: 18px; height: 18px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    flex-shrink: 0;
  }

  .toast.success .toast-icon { background: rgba(52, 211, 153, 0.2); color: var(--done-color); }
  .toast.info .toast-icon { background: rgba(56, 189, 248, 0.2); color: var(--todo-color); }
  .toast.warn .toast-icon { background: rgba(245, 158, 11, 0.2); color: var(--progress-color); }
  .toast.error .toast-icon { background: rgba(239, 68, 68, 0.2); color: var(--priority-high); }

  .toast-icon svg {
    width: 11px; height: 11px;
    stroke: currentColor;
    fill: none;
    stroke-width: 3;
  }

  /* ===== 响应式 ===== */
  @media (max-width: 960px) {
    .header { padding: 16px 18px; }
    .header-top { gap: 12px; }
    .brand-text p { display: none; }
    .search-wrap { max-width: none; order: 3; flex-basis: 100%; }
    .board {
      grid-template-columns: 1fr;
      padding: 16px;
      gap: 14px;
    }
    .column { min-height: 300px; }
    .stats-bar { font-size: 11px; gap: 12px; }
  }

  @media (max-width: 520px) {
    .filters { width: 100%; justify-content: space-between; }
    .filter-btn { flex: 1; justify-content: center; }
    .new-task-btn { width: 100%; justify-content: center; }
    .header-top > * { flex-shrink: 0; }
    .modal { padding: 22px; }
  }

  /* 焦点态可见性 */
  button:focus-visible,
  input:focus-visible,
  textarea:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  /* 减弱动画偏好 */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
    .bg-blob { display: none; }
  }
</style>
</head>
<body>

<div class="bg-effects" aria-hidden="true">
  <div class="bg-grid"></div>
  <div class="bg-blob b1"></div>
  <div class="bg-blob b2"></div>
  <div class="bg-blob b3"></div>
</div>

<div class="app">
  <!-- 顶部栏 -->
  <header class="header">
    <div class="header-top">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M3 12h4l3-9 4 18 3-9h4"/></svg>
        </div>
        <div class="brand-text">
          <h1>Flow Board</h1>
          <p id="currentDate">— · —</p>
        </div>
      </div>

      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" class="search-input" id="searchInput" placeholder="搜索任务标题或描述..." aria-label="搜索任务">
      </div>

      <div class="filters" role="group" aria-label="优先级筛选">
        <button class="filter-btn active" data-filter="all">全部</button>
        <button class="filter-btn" data-filter="high">
          <span class="filter-dot" style="background:var(--priority-high)"></span>高
        </button>
        <button class="filter-btn" data-filter="medium">
          <span class="filter-dot" style="background:var(--priority-medium)"></span>中
        </button>
        <button class="filter-btn" data-filter="low">
          <span class="filter-dot" style="background:var(--priority-low)"></span>低
        </button>
      </div>

      <button class="new-task-btn" id="newTaskBtn">
        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        新建任务
      </button>
    </div>

    <div class="stats-bar">
      <div class="stat-item">总计 <strong id="totalCount">0</strong></div>
      <div class="stat-item" style="color:var(--todo-color)">○ <strong id="todoStat">0</strong> 待办</div>
      <div class="stat-item" style="color:var(--progress-color)">◐ <strong id="progressStat">0</strong> 进行</div>
      <div class="stat-item" style="color:var(--done-color)">● <strong id="doneStat">0</strong> 完成</div>
      <div class="progress-track" aria-label="完成进度">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="stat-item">完成率 <strong id="completionRate">0%</strong></div>
    </div>
  </header>

  <!-- 看板 -->
  <main class="board" id="board">
    <section class="column" data-column="todo" style="--col-color: var(--todo-color)">
      <div class="column-header">
        <div class="column-title">
          <span class="column-dot"></span>
          <span>待办</span>
        </div>
        <span class="column-count" id="count-todo">0</span>
      </div>
      <div class="column-body" id="body-todo" data-drop="todo"></div>
      <button class="column-add-btn" data-add="todo">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        添加任务
      </button>
    </section>

    <section class="column" data-column="progress" style="--col-color: var(--progress-color)">
      <div class="column-header">
        <div class="column-title">
          <span class="column-dot"></span>
          <span>进行中</span>
        </div>
        <span class="column-count" id="count-progress">0</span>
      </div>
      <div class="column-body" id="body-progress" data-drop="progress"></div>
      <button class="column-add-btn" data-add="progress">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        添加任务
      </button>
    </section>

    <section class="column" data-column="done" style="--col-color: var(--done-color)">
      <div class="column-header">
        <div class="column-title">
          <span class="column-dot"></span>
          <span>已完成</span>
        </div>
        <span class="column-count" id="count-done">0</span>
      </div>
      <div class="column-body" id="body-done" data-drop="done"></div>
      <button class="column-add-btn" data-add="done">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        添加任务
      </button>
    </section>
  </main>
</div>

<!-- 任务模态框 -->
<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modalTitle">新建任务</h2>
      <button class="modal-close" id="modalClose" aria-label="关闭">
        <svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <form id="taskForm" autocomplete="off">
      <div class="form-group">
        <label class="form-label" for="taskTitle">标题</label>
        <input type="text" class="form-input" id="taskTitle" maxlength="80" required placeholder="简明扼要的任务标题">
      </div>

      <div class="form-group">
        <label class="form-label" for="taskDesc">描述</label>
        <textarea class="form-textarea" id="taskDesc" maxlength="500" placeholder="补充任务细节、要求或备注（可选）"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">优先级</label>
        <div class="priority-picker" role="radiogroup">
          <button type="button" class="priority-option" data-p="low" role="radio">低</button>
          <button type="button" class="priority-option selected" data-p="medium" role="radio">中</button>
          <button type="button" class="priority-option" data-p="high" role="radio">高</button>
        </div>
      </div>

      <div class="form-group" id="statusGroup">
        <label class="form-label">所在列</label>
        <div class="priority-picker">
          <button type="button" class="priority-option status-option" data-s="todo">待办</button>
          <button type="button" class="priority-option status-option selected" data-s="progress">进行中</button>
          <button type="button" class="priority-option status-option" data-s="done">已完成</button>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" id="cancelBtn">取消</button>
        <button type="submit" class="btn btn-primary" id="saveBtn">保存任务</button>
      </div>
    </form>
  </div>
</div>

<!-- Toast 容器 -->
<div class="toast-container" id="toastContainer" aria-live="polite"></div>

<script>
/* =========================================================
   Flow Board — 单文件任务看板
   ========================================================= */

const STORAGE_KEY = 'flowboard.tasks.v1';

// 状态管理
const state = {
  tasks: [],
  search: '',
  filter: 'all',
  editingId: null,
  draggedId: null,
  selectedPriority: 'medium',
  selectedStatus: 'progress'
};

// DOM 引用
const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);

const board = $('#board');
const modal = $('#modalOverlay');
const form = $('#taskForm');
const titleInput = $('#taskTitle');
const descInput = $('#taskDesc');
const searchInput = $('#searchInput');

/* ---------- 数据持久化 ---------- */
function loadTasks() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      state.tasks = JSON.parse(raw);
      return;
    }
  } catch (e) { console.warn('读取失败', e); }

  // 首次访问：植入示例任务
  const now = Date.now();
  state.tasks = [
    { id: uid(), title: '设计登录页面交互原型', desc: '完成首屏设计、表单交互、错误状态。重点关注无障碍体验与移动端适配。', priority: 'high', status: 'todo', createdAt: now - 3600000 },
    { id: uid(), title: '编写组件单元测试', desc: '为核心交互组件补充测试用例，覆盖率目标 80% 以上。', priority: 'medium', status: 'todo', createdAt: now - 7200000 },
    { id: uid(), title: '优化首屏加载性能', desc: '路由懒加载、图片懒加载、关键 CSS 内联。', priority: 'high', status: 'progress', createdAt: now - 86400000 },
    { id: uid(), title: '搭建项目脚手架', desc: '基础工程目录、构建配置、代码规范。', priority: 'medium', status: 'done', createdAt: now - 172800000 },
    { id: uid(), title: '收集竞品设计参考', desc: '整理 3 个同类产品的视觉风格特征。', priority: 'low', status: 'done', createdAt: now - 259200000 }
  ];
  saveTasks();
}

function saveTasks() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.tasks));
  } catch (e) { console.warn('保存失败', e); }
}

function uid() {
  return 't_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 7);
}

/* ---------- 渲染 ---------- */
function render() {
  const cols = { todo: [], progress: [], done: [] };
  const q = state.search.toLowerCase();

  state.tasks.forEach(t => {
    if (state.filter !== 'all' && t.priority !== state.filter) return;
    if (q && !t.title.toLowerCase().includes(q) && !t.desc.toLowerCase().includes(q)) return;
    cols[t.status]?.push(t);
  });

  // 按优先级排序：高 > 中 > 低，同级按创建时间倒序
  const pOrder = { high: 0, medium: 1, low: 2 };
  Object.keys(cols).forEach(k => {
    cols[k].sort((a, b) => {
      const p = pOrder[a.priority] - pOrder[b.priority];
      return p !== 0 ? p : b.createdAt - a.createdAt;
    });
  });

  ['todo', 'progress', 'done'].forEach(status => {
    const body = $(`#body-${status}`);
    const count = cols[status].length;
    $(`#count-${status}`).textContent = count;

    if (count === 0) {
      body.innerHTML = `<div class="empty-state">${state.search || state.filter !== 'all' ? '无匹配任务' : '拖拽或点击下方添加'}</div>`;
    } else {
      body.innerHTML = cols[status].map((t, i) => cardHTML(t, i)).join('');
    }
  });

  // 更新统计
  const total = state.tasks.length;
  const done = state.tasks.filter(t => t.status === 'done').length;
  const inProgress = state.tasks.filter(t => t.status === 'progress').length;
  const todo = state.tasks.filter(t => t.status === 'todo').length;
  $('#totalCount').textContent = total;
  $('#todoStat').textContent = todo;
  $('#progressStat').textContent = inProgress;
  $('#doneStat').textContent = done;
  const rate = total === 0 ? 0 : Math.round(done / total * 100);
  $('#completionRate').textContent = rate + '%';
  $('#progressFill').style.width = rate + '%';
}

function cardHTML(t, idx) {
  const priorityText = { low: '低', medium: '中', high: '高' }[t.priority];
  return `
    <article class="task-card" draggable="true" data-id="${t.id}" data-status="${t.status}" data-priority="${t.priority}" style="animation-delay:${idx * 0.04}s">
      <div class="task-head">
        <div class="task-title">${escapeHTML(t.title)}</div>
        <div class="task-actions">
          <button class="task-action-btn" data-action="edit" data-id="${t.id}" aria-label="编辑" title="编辑">
            <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
          </button>
          <button class="task-action-btn delete" data-action="delete" data-id="${t.id}" aria-label="删除" title="删除">
            <svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
          </button>
        </div>
      </div>
      ${t.desc ? `<div class="task-desc">${escapeHTML(t.desc)}</div>` : ''}
      <div class="task-meta">
        <span class="priority-badge">${priorityText}</span>
        <span class="task-time">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          ${formatTime(t.createdAt)}
        </span>
      </div>
    </article>
  `;
}

function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, m => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[m]));
}

function formatTime(ts) {
  const diff = Date.now() - ts;
  const min = 60 * 1000, hour = 60 * min, day = 24 * hour;
  if (diff < min) return '刚刚';
  if (diff < hour) return Math.floor(diff / min) + '分钟前';
  if (diff < day) return Math.floor(diff / hour) + '小时前';
  if (diff < 7 * day) return Math.floor(diff / day) + '天前';
  const d = new Date(ts);
  return `${d.getMonth() + 1}/${d.getDate()}`;
}

function updateDate() {
  const d = new Date();
  const wd = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'][d.getDay()];
  $('#currentDate').textContent = `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')} · ${wd}`;
}

/* ---------- 模态框 ---------- */
function openModal(taskId = null, presetStatus = null) {
  state.editingId = taskId;
  if (taskId) {
    const t = state.tasks.find(x => x.id === taskId);
    if (!t) return;
    $('#modalTitle').textContent = '编辑任务';
    titleInput.value = t.title;
    descInput.value = t.desc;
    setPriority(t.priority);
    setStatus(t.status);
  } else {
    $('#modalTitle').textContent = '新建任务';
    form.reset();
    setPriority('medium');
    setStatus(presetStatus || 'progress');
  }
  modal.classList.add('active');
  setTimeout(() => titleInput.focus(), 100);
}

function closeModal() {
  modal.classList.remove('active');
  state.editingId = null;
}

function setPriority(p) {
  state.selectedPriority = p;
  $$('.priority-option[data-p]').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.p === p);
  });
}

function setStatus(s) {
  state.selectedStatus = s;
  $$('.status-option').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.s === s);
  });
}

/* ---------- CRUD ---------- */
function saveTask(e) {
  e?.preventDefault();
  const title = titleInput.value.trim();
  const desc = descInput.value.trim();
  if (!title) {
    toast('请输入任务标题', 'warn');
    titleInput.focus();
    return;
  }

  if (state.editingId) {
    const t = state.tasks.find(x => x.id === state.editingId);
    if (t) {
      t.title = title;
      t.desc = desc;
      t.priority = state.selectedPriority;
      t.status = state.selectedStatus;
      toast('任务已更新', 'success');
    }
  } else {
    state.tasks.unshift({
      id: uid(),
      title, desc,
      priority: state.selectedPriority,
      status: state.selectedStatus,
      createdAt: Date.now()
    });
    toast('任务已创建', 'success');
  }
  saveTasks();
  render();
  closeModal();
}

function deleteTask(id) {
  const t = state.tasks.find(x => x.id === id);
  if (!t) return;
  state.tasks = state.tasks.filter(x => x.id !== id);
  saveTasks();
  render();
  toast(`已删除「${t.title.length > 12 ? t.title.slice(0, 12) + '…' : t.title}」`, 'info');
}

/* ---------- 拖拽 ---------- */
function setupDrag() {
  board.addEventListener('dragstart', (e) => {
    const card = e.target.closest('.task-card');
    if (!card) return;
    state.draggedId = card.dataset.id;
    card.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    try { e.dataTransfer.setData('text/plain', card.dataset.id); } catch (_) {}
  });

  board.addEventListener('dragend', (e) => {
    const card = e.target.closest('.task-card');
    if (card) card.classList.remove('dragging');
    state.draggedId = null;
    $$('.column').forEach(c => c.classList.remove('drag-over'));
  });

  // 使用 dragover 而非 dragenter 处理高亮，更稳定
  board.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const col = e.target.closest('.column');
    if (!col) return;
    $$('.column').forEach(c => {
      if (c !== col) c.classList.remove('drag-over');
    });
    col.classList.add('drag-over');
  });

  board.addEventListener('dragleave', (e) => {
    const col = e.target.closest('.column');
    if (!col) return;
    // 仅在真的离开列时清除
    const related = e.relatedTarget;
    if (!col.contains(related)) {
      col.classList.remove('drag-over');
    }
  });

  board.addEventListener('drop', (e) => {
    e.preventDefault();
    const col = e.target.closest('.column');
    if (!col || !state.draggedId) return;
    const newStatus = col.dataset.column;
    const t = state.tasks.find(x => x.id === state.draggedId);
    if (t && t.status !== newStatus) {
      t.status = newStatus;
      saveTasks();
      render();
      const labels = { todo: '待办', progress: '进行中', done: '已完成' };
      toast(`已移至「${labels[newStatus]}」`, 'success');
    }
    col.classList.remove('drag-over');
  });
}

/* ---------- Toast ---------- */
function toast(msg, type = 'info') {
  const c = $('#toastContainer');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const icons = {
    success: '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>',
    info: '<svg viewBox="0 0 24 24"><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>',
    warn: '<svg viewBox="0 0 24 24"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
    error: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
  };
  el.innerHTML = `<span class="toast-icon">${icons[type] || icons.info}</span><span>${escapeHTML(msg)}</span>`;
  c.appendChild(el);
  setTimeout(() => {
    el.classList.add('removing');
    setTimeout(() => el.remove(), 250);
  }, 2400);
}

/* ---------- 事件绑定 ---------- */
function bindEvents() {
  // 新建按钮
  $('#newTaskBtn').addEventListener('click', () => openModal());

  // 列内添加按钮
  $$('.column-add-btn').forEach(btn => {
    btn.addEventListener('click', () => openModal(null, btn.dataset.add));
  });

  // 模态框关闭
  $('#modalClose').addEventListener('click', closeModal);
  $('#cancelBtn').addEventListener('click', closeModal);
  modal.addEventListener('click', (e) => {
    if (e.target === modal) closeModal();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && modal.classList.contains('active')) closeModal();
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter' && modal.classList.contains('active')) {
      saveTask();
    }
    // 全局 n 快速新建
    if (e.key === 'n' && !modal.classList.contains('active') &&
        !['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) {
      e.preventDefault();
      openModal();
    }
  });

  // 表单提交
  form.addEventListener('submit', saveTask);

  // 优先级 / 状态选择
  $$('.priority-option[data-p]').forEach(btn => {
    btn.addEventListener('click', () => setPriority(btn.dataset.p));
  });
  $$('.status-option').forEach(btn => {
    btn.addEventListener('click', () => setStatus(btn.dataset.s));
  });

  // 搜索
  let searchTimer;
  searchInput.addEventListener('input', (e) => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      state.search = e.target.value;
      render();
    }, 150);
  });

  // 筛选
  $$('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      $$('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.filter = btn.dataset.filter;
      render();
    });
  });

  // 任务卡片操作（事件委托）
  board.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const id = btn.dataset.id;
    const action = btn.dataset.action;
    if (action === 'edit') openModal(id);
    else if (action === 'delete') deleteTask(id);
  });

  // 双击卡片编辑
  board.addEventListener('dblclick', (e) => {
    const card = e.target.closest('.task-card');
    if (card) openModal(card.dataset.id);
  });
}

/* ---------- 启动 ---------- */
function init() {
  updateDate();
  loadTasks();
  bindEvents();
  setupDrag();
  render();

  // 每分钟更新一次相对时间显示
  setInterval(() => {
    if (!state.search && state.filter === 'all') render();
  }, 60000);
}

init();
</script>

</body>
</html>
