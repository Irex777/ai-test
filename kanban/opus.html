<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --bg-card-hover: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: #334155;
            --accent-blue: #3b82f6;
            --accent-blue-hover: #2563eb;
            --accent-green: #22c55e;
            --accent-yellow: #eab308;
            --accent-red: #ef4444;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.3), 0 2px 4px -2px rgb(0 0 0 / 0.2);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.4), 0 4px 6px -4px rgb(0 0 0 / 0.3);
            --radius: 8px;
            --radius-sm: 4px;
            --transition: 0.2s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            margin-bottom: 24px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        .search-box, .filter-select {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 14px;
            border-radius: var(--radius);
            font-size: 14px;
            transition: var(--transition);
        }

        .search-box {
            flex: 1;
            min-width: 200px;
        }

        .search-box:focus, .filter-select:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .btn {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background: var(--accent-blue-hover);
            transform: translateY(-1px);
        }

        .btn-danger {
            background: var(--accent-red);
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-icon {
            padding: 6px;
            background: transparent;
            color: var(--text-secondary);
        }

        .btn-icon:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
            transform: none;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            align-items: start;
        }

        @media (max-width: 900px) {
            .board {
                grid-template-columns: 1fr;
            }
        }

        .column {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 16px;
            min-height: 400px;
            transition: var(--transition);
        }

        .column.drag-over {
            background: var(--bg-card-hover);
            box-shadow: inset 0 0 0 2px var(--accent-blue);
        }

        .column-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .column-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .column-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .todo-dot { background: var(--accent-blue); }
        .progress-dot { background: var(--accent-yellow); }
        .done-dot { background: var(--accent-green); }

        .task-count {
            background: var(--bg-primary);
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .task-list {
            min-height: 200px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 14px;
            cursor: grab;
            transition: var(--transition);
            position: relative;
        }

        .task:hover {
            background: var(--bg-card-hover);
            box-shadow: var(--shadow);
        }

        .task.dragging {
            opacity: 0.5;
            cursor: grabbing;
            transform: rotate(3deg);
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 8px;
        }

        .task-title {
            font-weight: 600;
            font-size: 15px;
            flex: 1;
            word-break: break-word;
        }

        .task-actions {
            display: flex;
            gap: 4px;
        }

        .task-description {
            color: var(--text-secondary);
            font-size: 13px;
            margin-bottom: 12px;
            line-height: 1.4;
            word-break: break-word;
        }

        .task-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .priority {
            padding: 3px 8px;
            border-radius: var(--radius-sm);
            font-weight: 500;
            font-size: 11px;
            text-transform: uppercase;
        }

        .priority-low {
            background: rgba(34, 197, 94, 0.15);
            color: var(--accent-green);
        }

        .priority-medium {
            background: rgba(234, 179, 8, 0.15);
            color: var(--accent-yellow);
        }

        .priority-high {
            background: rgba(239, 68, 68, 0.15);
            color: var(--accent-red);
        }

        .timestamp {
            font-size: 11px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 24px;
            width: 100%;
            max-width: 450px;
            transform: scale(0.9);
            transition: var(--transition);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal-header {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-secondary);
        }

        .form-input, .form-textarea, .form-select {
            width: 100%;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 12px;
            border-radius: var(--radius);
            font-size: 14px;
            transition: var(--transition);
        }

        .form-textarea {
            min-height: 80px;
            resize: vertical;
        }

        .form-input:focus, .form-textarea:focus, .form-select:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .btn-secondary {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }

        .btn-secondary:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
            transform: translateY(-1px);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 40px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .hidden {
            display: none !important;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .task {
            animation: slideIn 0.2s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Kanban Board</h1>
            <div class="controls">
                <input type="text" class="search-box" id="searchInput" placeholder="🔍 Search tasks...">
                <select class="filter-select" id="filterPriority">
                    <option value="all">All Priorities</option>
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
                <button class="btn" id="addTaskBtn">
                    <span>+ Add Task</span>
                </button>
            </div>
        </header>

        <div class="board">
            <div class="column" data-status="todo">
                <div class="column-header">
                    <span class="column-title">
                        <span class="column-dot todo-dot"></span>
                        To Do
                    </span>
                    <span class="task-count" id="todoCount">0</span>
                </div>
                <div class="task-list" id="todoList"></div>
            </div>

            <div class="column" data-status="inprogress">
                <div class="column-header">
                    <span class="column-title">
                        <span class="column-dot progress-dot"></span>
                        In Progress
                    </span>
                    <span class="task-count" id="inprogressCount">0</span>
                </div>
                <div class="task-list" id="inprogressList"></div>
            </div>

            <div class="column" data-status="done">
                <div class="column-header">
                    <span class="column-title">
                        <span class="column-dot done-dot"></span>
                        Done
                    </span>
                    <span class="task-count" id="doneCount">0</span>
                </div>
                <div class="task-list" id="doneList"></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="taskModal">
        <div class="modal">
            <h2 class="modal-header" id="modalTitle">Add New Task</h2>
            <form id="taskForm">
                <div class="form-group">
                    <label class="form-label">Title *</label>
                    <input type="text" class="form-input" id="taskTitle" required placeholder="Enter task title">
                </div>
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea class="form-textarea" id="taskDescription" placeholder="Enter task description"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Priority</label>
                    <select class="form-select" id="taskPriority">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'kanban-tasks';
        
        let tasks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let editingTaskId = null;
        let draggedTask = null;

        const elements = {
            searchInput: document.getElementById('searchInput'),
            filterPriority: document.getElementById('filterPriority'),
            addTaskBtn: document.getElementById('addTaskBtn'),
            taskModal: document.getElementById('taskModal'),
            modalTitle: document.getElementById('modalTitle'),
            taskForm: document.getElementById('taskForm'),
            taskTitle: document.getElementById('taskTitle'),
            taskDescription: document.getElementById('taskDescription'),
            taskPriority: document.getElementById('taskPriority'),
            cancelBtn: document.getElementById('cancelBtn'),
            todoList: document.getElementById('todoList'),
            inprogressList: document.getElementById('inprogressList'),
            doneList: document.getElementById('doneList'),
            todoCount: document.getElementById('todoCount'),
            inprogressCount: document.getElementById('inprogressCount'),
            doneCount: document.getElementById('doneCount')
        };

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        function formatDate(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleDateString('en-US', { 
                month: 'short', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function saveTasks() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
        }

        function getFilteredTasks() {
            const searchTerm = elements.searchInput.value.toLowerCase();
            const priorityFilter = elements.filterPriority.value;

            return tasks.filter(task => {
                const matchesSearch = task.title.toLowerCase().includes(searchTerm) ||
                                    task.description.toLowerCase().includes(searchTerm);
                const matchesPriority = priorityFilter === 'all' || task.priority === priorityFilter;
                return matchesSearch && matchesPriority;
            });
        }

        function createTaskElement(task) {
            const taskEl = document.createElement('div');
            taskEl.className = 'task';
            taskEl.draggable = true;
            taskEl.dataset.id = task.id;

            taskEl.innerHTML = `
                <div class="task-header">
                    <span class="task-title">${escapeHtml(task.title)}</span>
                    <div class="task-actions">
                        <button class="btn btn-icon edit-btn" title="Edit">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                            </svg>
                        </button>
                        <button class="btn btn-icon delete-btn" title="Delete">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 6h18"></path>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            </svg>
                        </button>
                    </div>
                </div>
                ${task.description ? `<div class="task-description">${escapeHtml(task.description)}</div>` : ''}
                <div class="task-meta">
                    <span class="priority priority-${task.priority}">${task.priority}</span>
                    <span class="timestamp">${formatDate(task.createdAt)}</span>
                </div>
            `;

            taskEl.querySelector('.edit-btn').addEventListener('click', () => openEditModal(task));
            taskEl.querySelector('.delete-btn').addEventListener('click', () => deleteTask(task.id));

            taskEl.addEventListener('dragstart', handleDragStart);
            taskEl.addEventListener('dragend', handleDragEnd);

            return taskEl;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderTasks() {
            const filteredTasks = getFilteredTasks();
            const todoTasks = filteredTasks.filter(t => t.status === 'todo');
            const progressTasks = filteredTasks.filter(t => t.status === 'inprogress');
            const doneTasks = filteredTasks.filter(t => t.status === 'done');

            elements.todoList.innerHTML = todoTasks.length ? '' : '<div class="empty-state"><div class="empty-state-icon">📝</div>No tasks</div>';
            elements.inprogressList.innerHTML = progressTasks.length ? '' : '<div class="empty-state"><div class="empty-state-icon">🔄</div>No tasks</div>';
            elements.doneList.innerHTML = doneTasks.length ? '' : '<div class="empty-state"><div class="empty-state-icon">✅</div>No tasks</div>';

            todoTasks.forEach(task => elements.todoList.appendChild(createTaskElement(task)));
            progressTasks.forEach(task => elements.inprogressList.appendChild(createTaskElement(task)));
            doneTasks.forEach(task => elements.doneList.appendChild(createTaskElement(task)));

            elements.todoCount.textContent = todoTasks.length;
            elements.inprogressCount.textContent = progressTasks.length;
            elements.doneCount.textContent = doneTasks.length;
        }

        function openModal() {
            elements.taskModal.classList.add('active');
            elements.taskTitle.focus();
        }

        function closeModal() {
            elements.taskModal.classList.remove('active');
            elements.taskForm.reset();
            editingTaskId = null;
            elements.modalTitle.textContent = 'Add New Task';
        }

        function openEditModal(task) {
            editingTaskId = task.id;
            elements.modalTitle.textContent = 'Edit Task';
            elements.taskTitle.value = task.title;
            elements.taskDescription.value = task.description || '';
            elements.taskPriority.value = task.priority;
            openModal();
        }

        function saveTask(e) {
            e.preventDefault();

            const title = elements.taskTitle.value.trim();
            const description = elements.taskDescription.value.trim();
            const priority = elements.taskPriority.value;

            if (!title) return;

            if (editingTaskId) {
                const taskIndex = tasks.findIndex(t => t.id === editingTaskId);
                if (taskIndex !== -1) {
                    tasks[taskIndex] = { ...tasks[taskIndex], title, description, priority };
                }
            } else {
                tasks.push({
                    id: generateId(),
                    title,
                    description,
                    priority,
                    status: 'todo',
                    createdAt: Date.now()
                });
            }

            saveTasks();
            renderTasks();
            closeModal();
        }

        function deleteTask(id) {
            if (confirm('Are you sure you want to delete this task?')) {
                tasks = tasks.filter(t => t.id !== id);
                saveTasks();
                renderTasks();
            }
        }

        function handleDragStart(e) {
            draggedTask = e.target;
            e.target.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', e.target.dataset.id);
        }

        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
            document.querySelectorAll('.column').forEach(col => col.classList.remove('drag-over'));
            draggedTask = null;
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            const column = e.target.closest('.column');
            if (column) {
                column.classList.add('drag-over');
            }
        }

        function handleDragLeave(e) {
            const column = e.target.closest('.column');
            if (column && !column.contains(e.relatedTarget)) {
                column.classList.remove('drag-over');
            }
        }

        function handleDrop(e) {
            e.preventDefault();
            const column = e.target.closest('.column');
            if (!column || !draggedTask) return;

            const newStatus = column.dataset.status;
            const taskId = e.dataTransfer.getData('text/plain');
            
            const taskIndex = tasks.findIndex(t => t.id === taskId);
            if (taskIndex !== -1) {
                tasks[taskIndex].status = newStatus;
                saveTasks();
                renderTasks();
            }

            column.classList.remove('drag-over');
        }

        function init() {
            elements.addTaskBtn.addEventListener('click', openModal);
            elements.cancelBtn.addEventListener('click', closeModal);
            elements.taskForm.addEventListener('submit', saveTask);
            elements.searchInput.addEventListener('input', renderTasks);
            elements.filterPriority.addEventListener('change', renderTasks);

            elements.taskModal.addEventListener('click', (e) => {
                if (e.target === elements.taskModal) closeModal();
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && elements.taskModal.classList.contains('active')) {
                    closeModal();
                }
            });

            document.querySelectorAll('.column').forEach(column => {
                column.addEventListener('dragover', handleDragOver);
                column.addEventListener('dragleave', handleDragLeave);
                column.addEventListener('drop', handleDrop);
            });

            renderTasks();
        }

        init();
    </script>
</body>
</html>
