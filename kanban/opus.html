<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <style>
        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-card: #0f3460;
            --text-primary: #eaeaea;
            --text-secondary: #a0a0a0;
            --accent: #e94560;
            --accent-hover: #ff6b6b;
            --border: #2a2a4a;
            --priority-low: #4ade80;
            --priority-medium: #fbbf24;
            --priority-high: #ef4444;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            --transition: all 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--accent), #ff9a8b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }

        .search-box {
            position: relative;
            flex: 1;
            max-width: 400px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid var(--border);
            border-radius: 25px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 1rem;
            transition: var(--transition);
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .filter-select {
            padding: 12px 20px;
            border: 2px solid var(--border);
            border-radius: 25px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            align-items: start;
        }

        .column {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 20px;
            min-height: 400px;
            box-shadow: var(--shadow-lg);
        }

        .column-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border);
        }

        .column-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .task-count {
            background: var(--accent);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
        }

        .task-list {
            min-height: 200px;
            transition: var(--transition);
        }

        .task-list.drag-over {
            background: rgba(233, 69, 96, 0.1);
            border-radius: 8px;
        }

        .task-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 15px;
            cursor: grab;
            transition: var(--transition);
            border-left: 4px solid var(--border);
            position: relative;
        }

        .task-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }

        .task-card:active {
            cursor: grabbing;
        }

        .task-card.dragging {
            opacity: 0.5;
            transform: rotate(3deg);
        }

        .task-card.priority-low {
            border-left-color: var(--priority-low);
        }

        .task-card.priority-medium {
            border-left-color: var(--priority-medium);
        }

        .task-card.priority-high {
            border-left-color: var(--priority-high);
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }

        .task-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            flex: 1;
        }

        .task-actions {
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: var(--transition);
        }

        .task-card:hover .task-actions {
            opacity: 1;
        }

        .task-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: var(--transition);
        }

        .task-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .task-btn.delete:hover {
            color: var(--priority-high);
        }

        .task-description {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .task-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .priority-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .priority-badge.low {
            background: rgba(74, 222, 128, 0.2);
            color: var(--priority-low);
        }

        .priority-badge.medium {
            background: rgba(251, 191, 36, 0.2);
            color: var(--priority-medium);
        }

        .priority-badge.high {
            background: rgba(239, 68, 68, 0.2);
            color: var(--priority-high);
        }

        .timestamp {
            font-size: 0.75rem;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            padding: 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            box-shadow: var(--shadow-lg);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-secondary {
            background: var(--border);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: #3a3a5a;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .board {
                grid-template-columns: 1fr;
            }

            .column {
                min-height: auto;
            }

            .task-actions {
                opacity: 1;
            }
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .empty-state svg {
            width: 60px;
            height: 60px;
            margin-bottom: 15px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Kanban Board</h1>
        </header>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Search tasks...">
            </div>
            <select id="filterSelect" class="filter-select">
                <option value="all">All Priorities</option>
                <option value="low">Low Priority</option>
                <option value="medium">Medium Priority</option>
                <option value="high">High Priority</option>
            </select>
            <button class="btn btn-primary" id="addTaskBtn">+ Add Task</button>
        </div>

        <div class="board">
            <div class="column" data-status="todo">
                <div class="column-header">
                    <span class="column-title">📝 To Do</span>
                    <span class="task-count" id="todoCount">0</span>
                </div>
                <div class="task-list" id="todoList"></div>
            </div>

            <div class="column" data-status="inprogress">
                <div class="column-header">
                    <span class="column-title">🚀 In Progress</span>
                    <span class="task-count" id="inprogressCount">0</span>
                </div>
                <div class="task-list" id="inprogressList"></div>
            </div>

            <div class="column" data-status="done">
                <div class="column-header">
                    <span class="column-title">✅ Done</span>
                    <span class="task-count" id="doneCount">0</span>
                </div>
                <div class="task-list" id="doneList"></div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="taskModal">
        <div class="modal-content">
            <div class="modal-header" id="modalTitle">Add New Task</div>
            <form id="taskForm">
                <input type="hidden" id="taskId">
                <div class="form-group">
                    <label for="taskTitle">Title *</label>
                    <input type="text" id="taskTitle" required placeholder="Enter task title">
                </div>
                <div class="form-group">
                    <label for="taskDescription">Description</label>
                    <textarea id="taskDescription" placeholder="Enter task description"></textarea>
                </div>
                <div class="form-group">
                    <label for="taskPriority">Priority</label>
                    <select id="taskPriority">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // State
        let tasks = JSON.parse(localStorage.getItem('kanbanTasks')) || [];
        let draggedTask = null;

        // DOM Elements
        const modal = document.getElementById('taskModal');
        const taskForm = document.getElementById('taskForm');
        const searchInput = document.getElementById('searchInput');
        const filterSelect = document.getElementById('filterSelect');
        const addTaskBtn = document.getElementById('addTaskBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const modalTitle = document.getElementById('modalTitle');

        // Initialize
        renderBoard();
        setupEventListeners();

        function setupEventListeners() {
            addTaskBtn.addEventListener('click', () => openModal());
            cancelBtn.addEventListener('click', closeModal);
            taskForm.addEventListener('submit', handleSubmit);
            searchInput.addEventListener('input', renderBoard);
            filterSelect.addEventListener('change', renderBoard);

            // Close modal on outside click
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeModal();
            });

            // Setup drag and drop for each column
            ['todo', 'inprogress', 'done'].forEach(status => {
                const list = document.getElementById(`${status}List`);
                
                list.addEventListener('dragover', handleDragOver);
                list.addEventListener('drop', handleDrop);
                list.addEventListener('dragenter', handleDragEnter);
                list.addEventListener('dragleave', handleDragLeave);
            });
        }

        function openModal(task = null) {
            document.getElementById('taskId').value = task?.id || '';
            document.getElementById('taskTitle').value = task?.title || '';
            document.getElementById('taskDescription').value = task?.description || '';
            document.getElementById('taskPriority').value = task?.priority || 'medium';
            modalTitle.textContent = task ? 'Edit Task' : 'Add New Task';
            modal.classList.add('active');
            document.getElementById('taskTitle').focus();
        }

        function closeModal() {
            modal.classList.remove('active');
            taskForm.reset();
        }

        function handleSubmit(e) {
            e.preventDefault();
            
            const id = document.getElementById('taskId').value;
            const title = document.getElementById('taskTitle').value.trim();
            const description = document.getElementById('taskDescription').value.trim();
            const priority = document.getElementById('taskPriority').value;

            if (id) {
                // Edit existing task
                const index = tasks.findIndex(t => t.id === id);
                if (index !== -1) {
                    tasks[index] = { ...tasks[index], title, description, priority, updatedAt: new Date().toISOString() };
                }
            } else {
                // Add new task
                const newTask = {
                    id: generateId(),
                    title,
                    description,
                    priority,
                    status: 'todo',
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                };
                tasks.push(newTask);
            }

            saveTasks();
            renderBoard();
            closeModal();
        }

        function handleDragOver(e) {
            e.preventDefault();
        }

        function handleDragEnter(e) {
            e.preventDefault();
            e.currentTarget.classList.add('drag-over');
        }

        function handleDragLeave(e) {
            if (!e.currentTarget.contains(e.relatedTarget)) {
                e.currentTarget.classList.remove('drag-over');
            }
        }

        function handleDrop(e) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            
            const newStatus = e.currentTarget.id.replace('List', '');
            const task = tasks.find(t => t.id === draggedTask);
            
            if (task && task.status !== newStatus) {
                task.status = newStatus;
                task.updatedAt = new Date().toISOString();
                saveTasks();
                renderBoard();
            }
            
            draggedTask = null;
        }

        function editTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) openModal(task);
        }

        function deleteTask(id) {
            if (confirm('Are you sure you want to delete this task?')) {
                tasks = tasks.filter(t => t.id !== id);
                saveTasks();
                renderBoard();
            }
        }

        function saveTasks() {
            localStorage.setItem('kanbanTasks', JSON.stringify(tasks));
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        function formatDate(isoString) {
            const date = new Date(isoString);
            return date.toLocaleDateString('en-US', { 
                month: 'short', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function getFilteredTasks() {
            const searchTerm = searchInput.value.toLowerCase();
            const filter = filterSelect.value;

            return tasks.filter(task => {
                const matchesSearch = task.title.toLowerCase().includes(searchTerm) ||
                                    task.description.toLowerCase().includes(searchTerm);
                const matchesFilter = filter === 'all' || task.priority === filter;
                return matchesSearch && matchesFilter;
            });
        }

        function createTaskCard(task) {
            const card = document.createElement('div');
            card.className = `task-card priority-${task.priority}`;
            card.draggable = true;
            card.dataset.id = task.id;

            card.innerHTML = `
                <div class="task-header">
                    <div class="task-title">${escapeHtml(task.title)}</div>
                    <div class="task-actions">
                        <button class="task-btn edit" onclick="editTask('${task.id}')" title="Edit">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                            </svg>
                        </button>
                        <button class="task-btn delete" onclick="deleteTask('${task.id}')" title="Delete">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            </svg>
                        </button>
                    </div>
                </div>
                ${task.description ? `<div class="task-description">${escapeHtml(task.description)}</div>` : ''}
                <div class="task-meta">
                    <span class="priority-badge ${task.priority}">${task.priority}</span>
                    <span class="timestamp">${formatDate(task.createdAt)}</span>
                </div>
            `;

            card.addEventListener('dragstart', (e) => {
                draggedTask = task.id;
                card.classList.add('dragging');
            });

            card.addEventListener('dragend', () => {
                card.classList.remove('dragging');
            });

            return card;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderBoard() {
            const filteredTasks = getFilteredTasks();
            
            const columns = {
                todo: document.getElementById('todoList'),
                inprogress: document.getElementById('inprogressList'),
                done: document.getElementById('doneList')
            };

            const counts = {
                todo: document.getElementById('todoCount'),
                inprogress: document.getElementById('inprogressCount'),
                done: document.getElementById('doneCount')
            };

            // Clear columns
            Object.values(columns).forEach(col => col.innerHTML = '');

            // Count tasks per column
            const taskCounts = { todo: 0, inprogress: 0, done: 0 };

            filteredTasks.forEach(task => {
                if (columns[task.status]) {
                    columns[task.status].appendChild(createTaskCard(task));
                    taskCounts[task.status]++;
                }
            });

            // Update counts
            Object.keys(taskCounts).forEach(status => {
                counts[status].textContent = taskCounts[status];
                
                // Add empty state if needed
                if (taskCounts[status] === 0) {
                    columns[status].innerHTML = `
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="9" y1="9" x2="15" y2="9"></line>
                                <line x1="9" y1="13" x2="15" y2="13"></line>
                                <line x1="9" y1="17" x2="13" y2="17"></line>
                            </svg>
                            <p>No tasks yet</p>
                        </div>
                    `;
                }
            });
        }
    </script>
</body>
</html>
