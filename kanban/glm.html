<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanban Board</title>
<style>
  :root {
    --bg: #0f1117;
    --bg-secondary: #161822;
    --card: #1c1f2e;
    --card-hover: #242840;
    --border: #2a2e42;
    --fg: #e8e9ed;
    --fg-muted: #7a7f9a;
    --accent: #e8a43a;
    --accent-glow: rgba(232, 164, 58, 0.15);
    --priority-high: #ef4444;
    --priority-medium: #f59e0b;
    --priority-low: #22c55e;
    --column-todo: #3b82f6;
    --column-progress: #a855f7;
    --column-done: #10b981;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 4px 24px rgba(0,0,0,0.3);
    --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(232,164,58,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(168,85,247,0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(59,130,246,0.04) 0%, transparent 60%);
    animation: bgDrift 20s ease-in-out infinite alternate;
    z-index: 0;
    pointer-events: none;
  }

  @keyframes bgDrift {
    0% { transform: translate(0, 0) rotate(0deg); }
    100% { transform: translate(-3%, -3%) rotate(3deg); }
  }

  /* Header */
  header {
    position: relative; z-index: 10;
    padding: 24px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(15,17,23,0.8);
    backdrop-filter: blur(20px);
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--accent), #d4782a);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 900; color: #0f1117;
    box-shadow: 0 0 20px rgba(232,164,58,0.25);
  }

  .logo-text h1 {
    font-size: 22px; font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--fg), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo-text span {
    font-size: 12px; color: var(--fg-muted);
    letter-spacing: 0.5px;
  }

  .header-controls {
    display: flex; align-items: center; gap: 12px;
    flex-wrap: wrap;
  }

  .search-box {
    position: relative;
  }

  .search-box input {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 10px 16px 10px 40px;
    color: var(--fg);
    font-size: 14px;
    width: 240px;
    outline: none;
    transition: var(--transition);
  }

  .search-box input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .search-box input::placeholder { color: var(--fg-muted); }

  .search-box::before {
    content: '⌕';
    position: absolute; left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--fg-muted); font-size: 18px;
    pointer-events: none;
  }

  .filter-select {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 10px 16px;
    color: var(--fg);
    font-size: 14px;
    outline: none;
    cursor: pointer;
    transition: var(--transition);
  }

  .filter-select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .filter-select option {
    background: var(--bg-secondary);
    color: var(--fg);
  }

  .btn {
    padding: 10px 20px;
    border: none;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #d4782a);
    color: #0f1117;
    box-shadow: 0 2px 12px rgba(232,164,58,0.3);
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(232,164,58,0.4);
  }

  .btn-primary:active { transform: translateY(0); }

  /* Main board */
  main {
    position: relative; z-index: 5;
    padding: 28px 32px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    max-width: 1440px;
    margin: 0 auto;
    min-height: calc(100vh - 100px);
  }

  /* Columns */
  .column {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0;
    display: flex;
    flex-direction: column;
    min-height: 400px;
    transition: var(--transition);
  }

  .column-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .column-title-area {
    display: flex; align-items: center; gap: 10px;
  }

  .column-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .column[data-status="todo"] .column-dot { background: var(--column-todo); box-shadow: 0 0 8px rgba(59,130,246,0.5); }
  .column[data-status="progress"] .column-dot { background: var(--column-progress); box-shadow: 0 0 8px rgba(168,85,247,0.5); }
  .column[data-status="done"] .column-dot { background: var(--column-done); box-shadow: 0 0 8px rgba(16,185,129,0.5); }

  .column-title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  .column-count {
    background: var(--card);
    color: var(--fg-muted);
    font-size: 12px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 50px;
    min-width: 28px;
    text-align: center;
  }

  .column-body {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 100px;
    transition: background var(--transition);
  }

  .column-body.drag-over {
    background: var(--accent-glow);
    outline: 2px dashed rgba(232,164,58,0.3);
    outline-offset: -4px;
    border-radius: 0 0 var(--radius) var(--radius);
  }

  .column-body::-webkit-scrollbar { width: 4px; }
  .column-body::-webkit-scrollbar-track { background: transparent; }
  .column-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    color: var(--fg-muted);
    font-size: 13px;
    text-align: center;
    opacity: 0.6;
  }

  .empty-state .empty-icon {
    font-size: 32px;
    margin-bottom: 8px;
    opacity: 0.4;
  }

  /* Task cards */
  .task-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 16px;
    cursor: grab;
    transition: all var(--transition);
    position: relative;
    overflow: hidden;
  }

  .task-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px; height: 100%;
    border-radius: 4px 0 0 4px;
  }

  .task-card[data-priority="high"]::before { background: var(--priority-high); }
  .task-card[data-priority="medium"]::before { background: var(--priority-medium); }
  .task-card[data-priority="low"]::before { background: var(--priority-low); }

  .task-card:hover {
    background: var(--card-hover);
    border-color: rgba(232,164,58,0.2);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }

  .task-card.dragging {
    opacity: 0.4;
    transform: rotate(2deg) scale(0.95);
  }

  .task-card.drag-clone {
    box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    transform: rotate(3deg) scale(1.03);
    z-index: 1000;
    pointer-events: none;
  }

  .task-card.just-dropped {
    animation: dropIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes dropIn {
    0% { opacity: 0.5; transform: scale(0.9) translateY(-10px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  .task-top-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 8px;
  }

  .task-title {
    font-size: 14px;
    font-weight: 700;
    line-height: 1.4;
    flex: 1;
    word-break: break-word;
  }

  .task-desc {
    font-size: 12.5px;
    color: var(--fg-muted);
    line-height: 1.5;
    margin-bottom: 12px;
    word-break: break-word;
  }

  .task-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .task-meta-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .priority-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 50px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .priority-badge.high { background: rgba(239,68,68,0.15); color: var(--priority-high); }
  .priority-badge.medium { background: rgba(245,158,11,0.15); color: var(--priority-medium); }
  .priority-badge.low { background: rgba(34,197,94,0.15); color: var(--priority-low); }

  .task-time {
    font-size: 11px;
    color: var(--fg-muted);
    opacity: 0.7;
  }

  .task-actions {
    display: flex; gap: 4px;
  }

  .task-btn {
    width: 28px; height: 28px;
    border: none;
    border-radius: 6px;
    background: transparent;
    color: var(--fg-muted);
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
  }

  .task-btn:hover {
    background: var(--border);
    color: var(--fg);
  }

  .task-btn.delete:hover {
    background: rgba(239,68,68,0.15);
    color: var(--priority-high);
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    visibility: hidden;
    transition: var(--transition);
  }

  .modal-overlay.active {
    opacity: 1;
    visibility: visible;
  }

  .modal {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    transform: translateY(20px) scale(0.95);
    transition: var(--transition);
  }

  .modal-overlay.active .modal {
    transform: translateY(0) scale(1);
  }

  .modal h2 {
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 24px;
  }

  .form-group {
    margin-bottom: 18px;
  }

  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--fg-muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    color: var(--fg);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: var(--transition);
  }

  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .form-group textarea { resize: vertical; min-height: 80px; }

  .form-group select option {
    background: var(--card);
  }

  .form-error {
    font-size: 12px;
    color: var(--priority-high);
    margin-top: 4px;
    display: none;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 24px;
  }

  .btn-ghost {
    background: transparent;
    color: var(--fg-muted);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover {
    background: var(--card);
    color: var(--fg);
  }

  /* Toast */
  .toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 200;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
  }

  .toast {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 20px;
    font-size: 13px;
    font-weight: 600;
    color: var(--fg);
    box-shadow: var(--shadow);
    pointer-events: auto;
    animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  @keyframes toastIn {
    from { opacity: 0; transform: translateX(40px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes toastOut {
    from { opacity: 1; transform: translateX(0); }
    to { opacity: 0; transform: translateX(40px); }
  }

  /* Confirm modal */
  .confirm-text {
    font-size: 14px;
    color: var(--fg-muted);
    line-height: 1.6;
    margin-bottom: 8px;
  }

  .btn-danger {
    background: var(--priority-high);
    color: #fff;
  }

  .btn-danger:hover {
    background: #dc2626;
    transform: translateY(-1px);
  }

  /* Responsive */
  @media (max-width: 1024px) {
    main {
      grid-template-columns: 1fr;
      padding: 20px 16px;
      gap: 20px;
    }
    .column { min-height: 250px; }
    header { padding: 16px 20px; }
    .search-box input { width: 180px; }
  }

  @media (max-width: 600px) {
    header {
      flex-direction: column;
      align-items: stretch;
    }
    .header-controls {
      flex-wrap: wrap;
    }
    .search-box input { width: 100%; }
    .search-box { flex: 1; }
    main { padding: 16px 12px; }
    .modal { padding: 24px 20px; }
  }

  /* Reduce motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }

  /* Floating particles */
  .particle {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
    opacity: 0;
    animation: floatParticle linear infinite;
  }

  @keyframes floatParticle {
    0% { opacity: 0; transform: translateY(100vh) scale(0); }
    10% { opacity: 0.6; }
    90% { opacity: 0.6; }
    100% { opacity: 0; transform: translateY(-20vh) scale(1); }
  }
</style>
</head>
<body>

<!-- Floating particles -->
<div id="particles"></div>

<!-- Header -->
<header>
  <div class="logo-area">
    <div class="logo-icon">K</div>
    <div class="logo-text">
      <h1>Kanban Flow</h1>
      <span>Organize your work visually</span>
    </div>
  </div>
  <div class="header-controls">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search tasks..." aria-label="Search tasks">
    </div>
    <select class="filter-select" id="filterPriority" aria-label="Filter by priority">
      <option value="all">All Priorities</option>
      <option value="high">High</option>
      <option value="medium">Medium</option>
      <option value="low">Low</option>
    </select>
    <button class="btn btn-primary" id="addTaskBtn" aria-label="Add new task">+ New Task</button>
  </div>
</header>

<!-- Board -->
<main id="board">
  <section class="column" data-status="todo">
    <div class="column-header">
      <div class="column-title-area">
        <div class="column-dot"></div>
        <h2 class="column-title">To Do</h2>
      </div>
      <span class="column-count" data-count="todo">0</span>
    </div>
    <div class="column-body" data-status="todo" id="todoBody"></div>
  </section>

  <section class="column" data-status="progress">
    <div class="column-header">
      <div class="column-title-area">
        <div class="column-dot"></div>
        <h2 class="column-title">In Progress</h2>
      </div>
      <span class="column-count" data-count="progress">0</span>
    </div>
    <div class="column-body" data-status="progress" id="progressBody"></div>
  </section>

  <section class="column" data-status="done">
    <div class="column-header">
      <div class="column-title-area">
        <div class="column-dot"></div>
        <h2 class="column-title">Done</h2>
      </div>
      <span class="column-count" data-count="done">0</span>
    </div>
    <div class="column-body" data-status="done" id="doneBody"></div>
  </section>
</main>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="taskModal">
  <div class="modal" role="dialog" aria-labelledby="modalTitle">
    <h2 id="modalTitle">New Task</h2>
    <div class="form-group">
      <label for="taskTitle">Title</label>
      <input type="text" id="taskTitle" placeholder="What needs to be done?" maxlength="100">
      <div class="form-error" id="titleError">Title is required</div>
    </div>
    <div class="form-group">
      <label for="taskDesc">Description</label>
      <textarea id="taskDesc" placeholder="Add some details..." maxlength="500"></textarea>
    </div>
    <div class="form-group">
      <label for="taskPriority">Priority</label>
      <select id="taskPriority">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
      </select>
    </div>
    <div class="form-group">
      <label for="taskStatus">Column</label>
      <select id="taskStatus">
        <option value="todo">To Do</option>
        <option value="progress">In Progress</option>
        <option value="done">Done</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="cancelBtn">Cancel</button>
      <button class="btn btn-primary" id="saveBtn">Save Task</button>
    </div>
  </div>
</div>

<!-- Confirm Delete Modal -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal" role="dialog" aria-labelledby="confirmTitle">
    <h2 id="confirmTitle">Delete Task</h2>
    <p class="confirm-text">Are you sure you want to permanently delete this task? This action cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="confirmCancel">Cancel</button>
      <button class="btn btn-danger" id="confirmDelete">Delete</button>
    </div>
  </div>
</div>

<!-- Toasts -->
<div class="toast-container" id="toastContainer"></div>

<script>
  // ── State ──
  const STORAGE_KEY = 'kanban_flow_tasks';
  let tasks = [];
  let editingId = null;
  let deletingId = null;
  let draggedId = null;

  // ── DOM refs ──
  const board = document.getElementById('board');
  const searchInput = document.getElementById('searchInput');
  const filterPriority = document.getElementById('filterPriority');
  const addTaskBtn = document.getElementById('addTaskBtn');
  const taskModal = document.getElementById('taskModal');
  const confirmModal = document.getElementById('confirmModal');
  const modalTitle = document.getElementById('modalTitle');
  const taskTitleInput = document.getElementById('taskTitle');
  const taskDescInput = document.getElementById('taskDesc');
  const taskPriorityInput = document.getElementById('taskPriority');
  const taskStatusInput = document.getElementById('taskStatus');
  const titleError = document.getElementById('titleError');
  const saveBtn = document.getElementById('saveBtn');
  const cancelBtn = document.getElementById('cancelBtn');
  const confirmCancel = document.getElementById('confirmCancel');
  const confirmDelete = document.getElementById('confirmDelete');
  const toastContainer = document.getElementById('toastContainer');

  // ── Particles ──
  (function createParticles() {
    const container = document.getElementById('particles');
    const colors = ['rgba(232,164,58,0.3)', 'rgba(168,85,247,0.2)', 'rgba(59,130,246,0.2)', 'rgba(16,185,129,0.2)'];
    for (let i = 0; i < 12; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 4 + 2;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.left = Math.random() * 100 + '%';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.animationDuration = (Math.random() * 15 + 15) + 's';
      p.style.animationDelay = (Math.random() * 15) + 's';
      container.appendChild(p);
    }
  })();

  // ── LocalStorage ──
  function saveTasks() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    } catch(e) { /* storage full or unavailable */ }
  }

  function loadTasks() {
    try {
      const data = localStorage.getItem(STORAGE_KEY);
      if (data) tasks = JSON.parse(data);
    } catch(e) { tasks = []; }

    // Seed some sample tasks if first visit
    if (!tasks.length && !localStorage.getItem(STORAGE_KEY)) {
      const now = Date.now();
      tasks = [
        { id: genId(), title: 'Design new landing page', desc: 'Create wireframes and mockups for the upcoming product launch.', priority: 'high', status: 'todo', createdAt: now - 3600000, updatedAt: now - 3600000 },
        { id: genId(), title: 'Set up CI/CD pipeline', desc: 'Configure automated testing and deployment workflows.', priority: 'medium', status: 'todo', createdAt: now - 7200000, updatedAt: now - 7200000 },
        { id: genId(), title: 'Write API documentation', desc: 'Document all REST endpoints with examples and schemas.', priority: 'low', status: 'progress', createdAt: now - 86400000, updatedAt: now - 43200000 },
        { id: genId(), title: 'Refactor auth module', desc: 'Improve token refresh logic and add proper error handling.', priority: 'high', status: 'progress', createdAt: now - 172800000, updatedAt: now - 86400000 },
        { id: genId(), title: 'User onboarding flow', desc: 'Completed the step-by-step onboarding for new users.', priority: 'medium', status: 'done', createdAt: now - 259200000, updatedAt: now - 86400000 },
      ];
      saveTasks();
    }
  }

  function genId() {
    return '_' + Math.random().toString(36).substr(2, 9) + Date.now().toString(36);
  }

  // ── Render ──
  function render() {
    const search = searchInput.value.toLowerCase().trim();
    const filter = filterPriority.value;

    const filtered = tasks.filter(t => {
      const matchSearch = !search || t.title.toLowerCase().includes(search) || t.desc.toLowerCase().includes(search);
      const matchFilter = filter === 'all' || t.priority === filter;
      return matchSearch && matchFilter;
    });

    const columns = { todo: [], progress: [], done: [] };
    filtered.forEach(t => {
      if (columns[t.status]) columns[t.status].push(t);
    });

    // Sort: high priority first, then by updatedAt desc
    const prioOrder = { high: 0, medium: 1, low: 2 };
    Object.keys(columns).forEach(status => {
      columns[status].sort((a, b) => {
        const pd = prioOrder[a.priority] - prioOrder[b.priority];
        if (pd !== 0) return pd;
        return b.updatedAt - a.updatedAt;
      });
    });

    ['todo', 'progress', 'done'].forEach(status => {
      const body = document.querySelector(`.column-body[data-status="${status}"]`);
      const countEl = document.querySelector(`[data-count="${status}"]`);
      const colTasks = columns[status];

      // Count all tasks (unfiltered) for accuracy
      const totalInCol = tasks.filter(t => t.status === status).length;
      countEl.textContent = totalInCol;

      body.innerHTML = '';
      if (colTasks.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.innerHTML = `<div class="empty-icon">${status === 'todo' ? '📋' : status === 'progress' ? '⚡' : '✓'}</div><div>${search || filter !== 'all' ? 'No matching tasks' : 'No tasks yet'}</div>`;
        body.appendChild(empty);
      } else {
        colTasks.forEach(t => {
          body.appendChild(createCard(t));
        });
      }
    });
  }

  function createCard(task) {
    const card = document.createElement('div');
    card.className = 'task-card';
    card.setAttribute('draggable', 'true');
    card.setAttribute('data-id', task.id);
    card.setAttribute('data-priority', task.priority);

    const timeStr = formatTime(task.updatedAt);

    card.innerHTML = `
      <div class="task-top-row">
        <div class="task-title">${escHtml(task.title)}</div>
        <div class="task-actions">
          <button class="task-btn edit" title="Edit" aria-label="Edit task">✎</button>
          <button class="task-btn delete" title="Delete" aria-label="Delete task">✕</button>
        </div>
      </div>
      ${task.desc ? `<div class="task-desc">${escHtml(task.desc)}</div>` : ''}
      <div class="task-meta">
        <div class="task-meta-left">
          <span class="priority-badge ${task.priority}">${task.priority}</span>
          <span class="task-time">${timeStr}</span>
        </div>
      </div>
    `;

    // Drag events
    card.addEventListener('dragstart', handleDragStart);
    card.addEventListener('dragend', handleDragEnd);

    // Edit button
    card.querySelector('.edit').addEventListener('click', (e) => {
      e.stopPropagation();
      openEditModal(task.id);
    });

    // Delete button
    card.querySelector('.delete').addEventListener('click', (e) => {
      e.stopPropagation();
      openConfirmDelete(task.id);
    });

    return card;
  }

  function escHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function formatTime(ts) {
    const diff = Date.now() - ts;
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    const days = Math.floor(hrs / 24);
    if (days < 7) return days + 'd ago';
    const d = new Date(ts);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  // ── Drag & Drop ──
  function handleDragStart(e) {
    draggedId = e.currentTarget.getAttribute('data-id');
    e.currentTarget.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', draggedId);

    // Slight delay to let the visual feedback apply
    requestAnimationFrame(() => {
      e.currentTarget.style.opacity = '0.4';
    });
  }

  function handleDragEnd(e) {
    e.currentTarget.classList.remove('dragging');
    e.currentTarget.style.opacity = '';
    draggedId = null;
    document.querySelectorAll('.column-body').forEach(cb => cb.classList.remove('drag-over'));
  }

  document.querySelectorAll('.column-body').forEach(body => {
    body.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      body.classList.add('drag-over');

      // Find insertion point
      const afterElement = getDragAfterElement(body, e.clientY);
      const draggingCard = document.querySelector('.task-card.dragging');
      if (draggingCard) {
        if (afterElement == null) {
          body.appendChild(draggingCard);
        } else {
          body.insertBefore(draggingCard, afterElement);
        }
      }
    });

    body.addEventListener('dragleave', (e) => {
      if (!body.contains(e.relatedTarget)) {
        body.classList.remove('drag-over');
      }
    });

    body.addEventListener('drop', (e) => {
      e.preventDefault();
      body.classList.remove('drag-over');
      const taskId = e.dataTransfer.getData('text/plain');
      const newStatus = body.getAttribute('data-status');

      const task = tasks.find(t => t.id === taskId);
      if (task) {
        const oldStatus = task.status;
        task.status = newStatus;
        task.updatedAt = Date.now();
        saveTasks();
        render();

        // Animate the dropped card
        const droppedCard = document.querySelector(`.task-card[data-id="${taskId}"]`);
        if (droppedCard) {
          droppedCard.classList.add('just-dropped');
          droppedCard.addEventListener('animationend', () => droppedCard.classList.remove('just-dropped'), { once: true });
        }

        if (oldStatus !== newStatus) {
          showToast(`Moved to ${statusLabel(newStatus)}`);
        }
      }
    });
  });

  function getDragAfterElement(container, y) {
    const draggableElements = [...container.querySelectorAll('.task-card:not(.dragging)')];
    return draggableElements.reduce((closest, child) => {
      const box = child.getBoundingClientRect();
      const offset = y - box.top - box.height / 2;
      if (offset < 0 && offset > closest.offset) {
        return { offset: offset, element: child };
      } else {
        return closest;
      }
    }, { offset: Number.NEGATIVE_INFINITY }).element;
  }

  function statusLabel(s) {
    return s === 'todo' ? 'To Do' : s === 'progress' ? 'In Progress' : 'Done';
  }

  // ── Modal: Add/Edit ──
  function openAddModal() {
    editingId = null;
    modalTitle.textContent = 'New Task';
    saveBtn.textContent = 'Add Task';
    taskTitleInput.value = '';
    taskDescInput.value = '';
    taskPriorityInput.value = 'medium';
    taskStatusInput.value = 'todo';
    titleError.style.display = 'none';
    taskModal.classList.add('active');
    setTimeout(() => taskTitleInput.focus(), 100);
  }

  function openEditModal(id) {
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    editingId = id;
    modalTitle.textContent = 'Edit Task';
    saveBtn.textContent = 'Update Task';
    taskTitleInput.value = task.title;
    taskDescInput.value = task.desc;
    taskPriorityInput.value = task.priority;
    taskStatusInput.value = task.status;
    titleError.style.display = 'none';
    taskModal.classList.add('active');
    setTimeout(() => taskTitleInput.focus(), 100);
  }

  function closeModal() {
    taskModal.classList.remove('active');
    editingId = null;
  }

  function saveTask() {
    const title = taskTitleInput.value.trim();
    const desc = taskDescInput.value.trim();
    const priority = taskPriorityInput.value;
    const status = taskStatusInput.value;

    if (!title) {
      titleError.style.display = 'block';
      taskTitleInput.focus();
      return;
    }

    titleError.style.display = 'none';

    if (editingId) {
      const task = tasks.find(t => t.id === editingId);
      if (task) {
        task.title = title;
        task.desc = desc;
        task.priority = priority;
        task.status = status;
        task.updatedAt = Date.now();
        showToast('Task updated');
      }
    } else {
      const now = Date.now();
      tasks.push({
        id: genId(),
        title,
        desc,
        priority,
        status,
        createdAt: now,
        updatedAt: now
      });
      showToast('Task created');
    }

    saveTasks();
    render();
    closeModal();
  }

  // ── Modal: Confirm Delete ──
  function openConfirmDelete(id) {
    deletingId = id;
    confirmModal.classList.add('active');
  }

  function closeConfirm() {
    confirmModal.classList.remove('active');
    deletingId = null;
  }

  function executeDelete() {
    if (!deletingId) return;
    tasks = tasks.filter(t => t.id !== deletingId);
    saveTasks();
    render();
    closeConfirm();
    showToast('Task deleted');
  }

  // ── Toast ──
  function showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = `<span style="color:var(--accent);">●</span> ${escHtml(msg)}`;
    toastContainer.appendChild(toast);
    setTimeout(() => {
      if (toast.parentNode) toast.parentNode.removeChild(toast);
    }, 3000);
  }

  // ── Events ──
  addTaskBtn.addEventListener('click', openAddModal);
  cancelBtn.addEventListener('click', closeModal);
  saveBtn.addEventListener('click', saveTask);
  confirmCancel.addEventListener('click', closeConfirm);
  confirmDelete.addEventListener('click', executeDelete);

  // Close modals on overlay click
  taskModal.addEventListener('click', (e) => {
    if (e.target === taskModal) closeModal();
  });
  confirmModal.addEventListener('click', (e) => {
    if (e.target === confirmModal) closeConfirm();
  });

  // Keyboard support
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      closeModal();
      closeConfirm();
    }
    if (e.key === 'Enter' && taskModal.classList.contains('active')) {
      // Only save if not in textarea
      if (document.activeElement !== taskDescInput) {
        saveTask();
      }
    }
  });

  // Search & filter
  searchInput.addEventListener('input', render);
  filterPriority.addEventListener('change', render);

  // ── Init ──
  loadTasks();
  render();
</script>
</body>
</html>
