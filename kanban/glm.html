<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flow — Kanban Task Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg-base: #0c0a09;
  --bg-elev: #17130f;
  --bg-card: #1f1a15;
  --bg-hover: #28221c;
  --bg-input: #100d0a;
  --border: #2d2620;
  --border-strong: #3d3329;
  --text-primary: #f5f0e8;
  --text-secondary: #a89e8e;
  --text-muted: #6b6155;
  --accent: #ff7a45;
  --accent-warm: #f59e0b;
  --accent-glow: rgba(255, 122, 69, 0.4);
  --accent-soft: rgba(255, 122, 69, 0.12);
  --priority-high: #ef4444;
  --priority-high-soft: rgba(239, 68, 68, 0.15);
  --priority-medium: #f59e0b;
  --priority-medium-soft: rgba(245, 158, 11, 0.15);
  --priority-low: #84cc16;
  --priority-low-soft: rgba(132, 204, 22, 0.15);
  --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.4);
  --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.5);
  --radius: 14px;
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; }

body {
  font-family: 'Manrope', -apple-system, sans-serif;
  background: var(--bg-base);
  color: var(--text-primary);
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  line-height: 1.5;
}

/* Atmospheric background */
.bg-decor {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(90px);
  opacity: 0.32;
  animation: float 22s ease-in-out infinite;
}

.blob-1 {
  width: 520px; height: 520px;
  background: radial-gradient(circle, #ff7a45 0%, transparent 70%);
  top: -220px; left: -120px;
}

.blob-2 {
  width: 420px; height: 420px;
  background: radial-gradient(circle, #c2410c 0%, transparent 70%);
  bottom: -180px; right: -120px;
  animation-delay: -7s;
}

.blob-3 {
  width: 340px; height: 340px;
  background: radial-gradient(circle, #f59e0b 0%, transparent 70%);
  top: 35%; left: 45%;
  animation-delay: -14s;
  opacity: 0.2;
}

@keyframes float {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(40px, -60px) scale(1.1); }
  66% { transform: translate(-30px, 40px) scale(0.92); }
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
  opacity: 0.035;
  pointer-events: none;
  z-index: 1;
  mix-blend-mode: overlay;
}

.app {
  position: relative;
  z-index: 2;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* HEADER */
.header {
  padding: 24px 36px 20px;
  border-bottom: 1px solid var(--border);
  background: rgba(12, 10, 9, 0.72);
  backdrop-filter: blur(24px) saturate(140%);
  -webkit-backdrop-filter: blur(24px) saturate(140%);
  position: sticky;
  top: 0;
  z-index: 50;
}

.header-top {
  display: flex;
  align-items: center;
  gap: 24px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.brand {
  display: flex;
  align-items: center;
  gap: 14px;
}

.brand-mark {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--accent), #c2410c 70%, #7c2d12);
  display: grid;
  place-items: center;
  font-family: 'Instrument Serif', serif;
  font-size: 26px;
  font-style: italic;
  color: #1a0a04;
  font-weight: 400;
  box-shadow: 0 6px 18px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.2);
  position: relative;
}

.brand-mark::after {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--accent), transparent);
  z-index: -1;
  opacity: 0.4;
  filter: blur(8px);
}

.brand-text { display: flex; flex-direction: column; gap: 2px; }

.brand-title {
  font-family: 'Instrument Serif', serif;
  font-size: 30px;
  font-weight: 400;
  letter-spacing: -0.5px;
  line-height: 1;
}

.brand-title em {
  color: var(--accent);
  font-style: italic;
}

.brand-sub {
  font-size: 10.5px;
  color: var(--text-muted);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-weight: 600;
}

.header-actions {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 12px;
}

/* Search */
.search {
  position: relative;
  width: 280px;
  max-width: 36vw;
}

.search input {
  width: 100%;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px 10px 38px;
  color: var(--text-primary);
  font-family: inherit;
  font-size: 13.5px;
  font-weight: 500;
  transition: all 0.2s var(--ease);
}

.search input::placeholder { color: var(--text-muted); }

.search input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
  background: var(--bg-card);
}

.search svg {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  pointer-events: none;
}

.search-kbd {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 10px;
  color: var(--text-muted);
  background: var(--bg-base);
  padding: 2px 6px;
  border-radius: 4px;
  border: 1px solid var(--border);
  pointer-events: none;
  font-weight: 600;
}

/* Filter chips */
.filters { display: flex; gap: 6px; }

.chip {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s var(--ease);
  font-family: inherit;
  display: flex;
  align-items: center;
  gap: 7px;
}

.chip:hover {
  border-color: var(--border-strong);
  color: var(--text-primary);
  background: var(--bg-elev);
}

.chip.active {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent);
}

.chip .dot {
  width: 7px; height: 7px; border-radius: 50%;
}

/* Add button */
.btn-add {
  background: linear-gradient(135deg, var(--accent), #ea580c);
  color: #1a0a04;
  border: none;
  padding: 10px 18px;
  border-radius: 10px;
  font-weight: 700;
  font-size: 13.5px;
  cursor: pointer;
  font-family: inherit;
  display: flex;
  align-items: center;
  gap: 7px;
  transition: all 0.2s var(--ease);
  box-shadow: 0 4px 14px var(--accent-glow);
  position: relative;
  overflow: hidden;
}

.btn-add::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.2) 50%, transparent 70%);
  transform: translateX(-100%);
  transition: transform 0.6s var(--ease);
}

.btn-add:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 22px var(--accent-glow);
}

.btn-add:hover::before { transform: translateX(100%); }

.btn-add:active { transform: translateY(0); }

/* Stats bar */
.stats {
  display: flex;
  gap: 28px;
  align-items: center;
  padding-top: 4px;
}

.stat { display: flex; align-items: baseline; gap: 8px; }

.stat-num {
  font-family: 'Instrument Serif', serif;
  font-size: 30px;
  color: var(--accent);
  line-height: 1;
  font-weight: 400;
  font-feature-settings: "tnum";
}

.stat-label {
  font-size: 10.5px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.14em;
  font-weight: 700;
}

.progress-wrap {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 14px;
  min-width: 200px;
}

.progress-track {
  flex: 1;
  height: 6px;
  background: var(--bg-elev);
  border-radius: 3px;
  overflow: hidden;
  position: relative;
  border: 1px solid var(--border);
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent-warm));
  border-radius: 3px;
  transition: width 0.6s var(--ease);
  position: relative;
  box-shadow: 0 0 12px var(--accent-glow);
}

.progress-fill::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  animation: shimmer 2.5s infinite;
}

@keyframes shimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

.progress-pct {
  font-family: 'Instrument Serif', serif;
  font-size: 22px;
  color: var(--text-primary);
  font-weight: 400;
  min-width: 56px;
  text-align: right;
}

/* BOARD */
.board {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  padding: 22px 36px 36px;
  min-height: 0;
}

.column {
  background: rgba(31, 26, 21, 0.55);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  transition: all 0.25s var(--ease);
  max-height: calc(100vh - 220px);
  position: relative;
  overflow: hidden;
}

.column::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
}

.column.drag-over {
  border-color: var(--accent);
  background: rgba(255, 122, 69, 0.06);
  box-shadow: 0 0 0 1px var(--accent), 0 20px 50px rgba(255, 122, 69, 0.12);
  transform: translateY(-2px);
}

.column-header {
  padding: 16px 18px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: rgba(0, 0, 0, 0.18);
}

.column-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.column-marker {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  position: relative;
}

.column-marker::after {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  border: 1px solid currentColor;
  opacity: 0.3;
}

.column[data-status="todo"] .column-marker { background: var(--text-secondary); color: var(--text-secondary); }
.column[data-status="progress"] .column-marker { background: var(--accent); color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
.column[data-status="done"] .column-marker { background: var(--priority-low); color: var(--priority-low); box-shadow: 0 0 10px rgba(132, 204, 22, 0.4); }

.column-count {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 2px 9px;
  border-radius: 6px;
  font-size: 11.5px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  min-width: 26px;
  text-align: center;
  transition: all 0.2s var(--ease);
}

.column-count.bump {
  animation: bump 0.4s var(--ease-spring);
}

@keyframes bump {
  0%, 100% { transform: scale(1); }
  40% { transform: scale(1.25); background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }
}

.column-add {
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-muted);
  cursor: pointer;
  width: 28px;
  height: 28px;
  border-radius: 7px;
  display: grid;
  place-items: center;
  transition: all 0.2s var(--ease);
}

.column-add:hover {
  background: var(--bg-hover);
  color: var(--accent);
  border-color: var(--border);
}

.task-list {
  flex: 1;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  overflow-y: auto;
  min-height: 180px;
}

.task-list::-webkit-scrollbar { width: 6px; }
.task-list::-webkit-scrollbar-track { background: transparent; }
.task-list::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
.task-list::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* TASK CARD */
.task {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 11px;
  padding: 13px 15px;
  cursor: grab;
  position: relative;
  transition: background 0.2s, border-color 0.2s, transform 0.2s, box-shadow 0.2s;
  border-left: 3px solid var(--border-strong);
  animation: cardIn 0.32s var(--ease) backwards;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(10px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.task[data-priority="high"] { border-left-color: var(--priority-high); }
.task[data-priority="medium"] { border-left-color: var(--priority-medium); }
.task[data-priority="low"] { border-left-color: var(--priority-low); }

.task:hover {
  background: var(--bg-hover);
  border-color: var(--border-strong);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}

.task:active { cursor: grabbing; }

.task.dragging {
  opacity: 0.35;
  transform: rotate(2.5deg) scale(0.98);
  cursor: grabbing;
}

.task-title {
  font-weight: 600;
  font-size: 14px;
  margin-bottom: 5px;
  line-height: 1.4;
  word-break: break-word;
  color: var(--text-primary);
}

.task-desc {
  font-size: 12.5px;
  color: var(--text-secondary);
  line-height: 1.5;
  margin-bottom: 11px;
  word-break: break-word;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.task-desc.empty {
  font-style: italic;
  color: var(--text-muted);
  opacity: 0.65;
}

.task-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.task-meta {
  display: flex;
  align-items: center;
  gap: 9px;
  font-size: 11px;
  color: var(--text-muted);
  min-width: 0;
}

.priority-badge {
  font-size: 9.5px;
  font-weight: 800;
  padding: 3px 8px;
  border-radius: 5px;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  white-space: nowrap;
}

.priority-badge[data-priority="high"] {
  background: var(--priority-high-soft);
  color: #f87171;
}

.priority-badge[data-priority="medium"] {
  background: var(--priority-medium-soft);
  color: #fbbf24;
}

.priority-badge[data-priority="low"] {
  background: var(--priority-low-soft);
  color: #a3e635;
}

.task-time {
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.task-actions {
  display: flex;
  gap: 2px;
  opacity: 0.45;
  transition: opacity 0.2s var(--ease);
}

.task:hover .task-actions { opacity: 1; }

@media (hover: none) { .task-actions { opacity: 1; } }

.action-btn {
  background: transparent;
  border: none;
  color: var(--text-muted);
  width: 26px;
  height: 26px;
  border-radius: 6px;
  display: grid;
  place-items: center;
  cursor: pointer;
  transition: all 0.15s var(--ease);
}

.action-btn:hover {
  background: var(--bg-base);
  color: var(--text-primary);
}

.action-btn.delete:hover { color: #f87171; background: rgba(239, 68, 68, 0.1); }

mark {
  background: var(--accent-soft);
  color: var(--accent);
  padding: 1px 3px;
  border-radius: 3px;
  font-weight: 700;
}

/* Empty state */
.empty-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 36px 20px;
  color: var(--text-muted);
  text-align: center;
  border: 2px dashed var(--border);
  border-radius: 11px;
  transition: all 0.2s var(--ease);
}

.column.drag-over .empty-col {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-soft);
}

.empty-col-icon {
  margin-bottom: 10px;
  opacity: 0.5;
  display: grid;
  place-items: center;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--bg-elev);
  border: 1px solid var(--border);
}

.column.drag-over .empty-col-icon {
  background: var(--accent-soft);
  border-color: var(--accent);
  opacity: 1;
}

.empty-col p { font-size: 12px; font-weight: 500; }
.empty-col p span { color: var(--text-secondary); display: block; margin-top: 3px; font-size: 11px; }

/* MODAL */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  transition: opacity 0.25s var(--ease);
}

.modal-backdrop.open { display: flex; opacity: 1; }

.modal {
  background: var(--bg-elev);
  border: 1px solid var(--border-strong);
  border-radius: 18px;
  padding: 28px;
  width: 100%;
  max-width: 500px;
  max-height: 92vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg), 0 0 0 1px rgba(255,255,255,0.03) inset;
  transform: scale(0.95) translateY(20px);
  transition: transform 0.3s var(--ease-spring);
  position: relative;
}

.modal::before {
  content: '';
  position: absolute;
  top: 0; left: 20%; right: 20%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0.4;
}

.modal-backdrop.open .modal { transform: scale(1) translateY(0); }

.modal-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 22px;
}

.modal-title {
  font-family: 'Instrument Serif', serif;
  font-size: 28px;
  font-weight: 400;
  line-height: 1.1;
}

.modal-title em { color: var(--accent); font-style: italic; }

.modal-close {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  width: 32px;
  height: 32px;
  border-radius: 8px;
  cursor: pointer;
  display: grid;
  place-items: center;
  transition: all 0.15s var(--ease);
}

.modal-close:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
  border-color: var(--border-strong);
}

.field { margin-bottom: 18px; }

.field label {
  display: block;
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-muted);
  margin-bottom: 8px;
  font-weight: 700;
}

.field input,
.field textarea {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  color: var(--text-primary);
  font-family: inherit;
  font-size: 14px;
  transition: all 0.2s var(--ease);
  resize: vertical;
}

.field textarea {
  min-height: 78px;
  font-family: inherit;
  line-height: 1.5;
}

.field input:focus,
.field textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
  background: var(--bg-card);
}

.field input::placeholder,
.field textarea::placeholder { color: var(--text-muted); }

.option-group {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.option {
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 11px 8px;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s var(--ease);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  user-select: none;
}

.option .ind {
  width: 12px;
  height: 12px;
  border-radius: 50%;
}

.option[data-priority="high"] .ind { background: var(--priority-high); }
.option[data-priority="medium"] .ind { background: var(--priority-medium); }
.option[data-priority="low"] .ind { background: var(--priority-low); }

.option[data-status] .ind {
  border: 2px solid var(--text-muted);
  background: transparent;
  width: 14px;
  height: 14px;
}

.option[data-status="done"] .ind {
  background: var(--priority-low);
  border-color: var(--priority-low);
}

.option span {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
}

.option:hover {
  border-color: var(--border-strong);
  background: var(--bg-card);
}

.option.selected {
  background: var(--bg-card);
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}

.option.selected span { color: var(--text-primary); }

.modal-footer {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 26px;
}

.btn {
  padding: 11px 20px;
  border-radius: 10px;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  font-family: inherit;
  border: 1px solid transparent;
  transition: all 0.2s var(--ease);
}

.btn-ghost {
  background: transparent;
  border-color: var(--border);
  color: var(--text-secondary);
}

.btn-ghost:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
  border-color: var(--border-strong);
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent), #ea580c);
  color: #1a0a04;
  font-weight: 700;
}

.btn-primary:hover {
  box-shadow: 0 8px 22px var(--accent-glow);
  transform: translateY(-1px);
}

/* Toast */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(120px);
  background: var(--bg-elev);
  border: 1px solid var(--border-strong);
  padding: 12px 18px 12px 14px;
  border-radius: 11px;
  box-shadow: var(--shadow-lg);
  font-size: 13px;
  font-weight: 600;
  z-index: 200;
  transition: transform 0.35s var(--ease-spring);
  display: flex;
  align-items: center;
  gap: 10px;
}

.toast.show { transform: translateX(-50%) translateY(0); }

.toast-icon {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  flex-shrink: 0;
}

.toast.success .toast-icon { background: var(--priority-low-soft); color: #a3e635; }
.toast.error .toast-icon { background: var(--priority-high-soft); color: #f87171; }
.toast.info .toast-icon { background: var(--accent-soft); color: var(--accent); }

.task.removing {
  animation: cardOut 0.32s var(--ease) forwards;
  pointer-events: none;
}

@keyframes cardOut {
  to {
    opacity: 0;
    transform: translateX(40px) scale(0.85);
    margin-bottom: calc(-1 * var(--card-h, 80px));
    padding-top: 0;
    padding-bottom: 0;
    height: 0;
    border-width: 0;
  }
}

/* Drop indicator */
.drop-indicator {
  height: 3px;
  background: var(--accent);
  border-radius: 2px;
  margin: -2px 4px;
  box-shadow: 0 0 8px var(--accent-glow);
  animation: pulseLine 1s ease-in-out infinite;
}

@keyframes pulseLine {
  0%, 100% { opacity: 0.7; transform: scaleX(0.95); }
  50% { opacity: 1; transform: scaleX(1); }
}

/* Responsive */
@media (max-width: 1100px) {
  .board { grid-template-columns: 1fr; padding: 16px; gap: 16px; }
  .column { max-height: none; }
  .header { padding: 18px 20px 16px; }
  .stats { flex-wrap: wrap; gap: 20px; }
  .progress-wrap { width: 100%; margin-left: 0; }
}

@media (max-width: 720px) {
  .header-top { gap: 14px; }
  .search { width: 100%; max-width: none; order: 10; }
  .filters { display: none; }
  .brand-title { font-size: 26px; }
  .stat-num { font-size: 24px; }
  .header-actions { flex: 1; justify-content: flex-end; }
  .btn-add { padding: 9px 14px; font-size: 13px; }
  .btn-add span { display: none; }
  .modal { padding: 22px; }
  .modal-title { font-size: 24px; }
}

/* prefers-reduced-motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
  .blob { animation: none; }
}
</style>
</head>
<body>
<div class="bg-decor" aria-hidden="true">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<div class="app">
  <header class="header">
    <div class="header-top">
      <div class="brand">
        <div class="brand-mark">F</div>
        <div class="brand-text">
          <div class="brand-title">Flow<em>.</em></div>
          <div class="brand-sub">Task Board</div>
        </div>
      </div>
      <div class="header-actions">
        <div class="search">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="search" type="text" placeholder="Search tasks..." aria-label="Search tasks" />
          <span class="search-kbd">/</span>
        </div>
        <div class="filters" role="group" aria-label="Filter by priority">
          <button class="chip active" data-filter="all">All</button>
          <button class="chip" data-filter="high"><span class="dot" style="background:var(--priority-high)"></span>High</button>
          <button class="chip" data-filter="medium"><span class="dot" style="background:var(--priority-medium)"></span>Med</button>
          <button class="chip" data-filter="low"><span class="dot" style="background:var(--priority-low)"></span>Low</button>
        </div>
        <button class="btn-add" id="addBtn" aria-label="New task">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          <span>New Task</span>
        </button>
      </div>
    </div>
    <div class="stats">
      <div class="stat">
        <span class="stat-num" id="totalCount">0</span>
        <span class="stat-label">Total Tasks</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="progressCount" style="color: var(--accent)">0</span>
        <span class="stat-label">In Progress</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="doneCount" style="color: var(--priority-low)">0</span>
        <span class="stat-label">Completed</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        <span class="progress-pct" id="progressPct">0%</span>
      </div>
    </div>
  </header>

  <main class="board">
    <section class="column" data-status="todo">
      <header class="column-header">
        <div class="column-title">
          <span class="column-marker"></span>
          <span>To Do</span>
          <span class="column-count" id="count-todo">0</span>
        </div>
        <button class="column-add" data-status="todo" aria-label="Add to To Do">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        </button>
      </header>
      <div class="task-list" data-status="todo"></div>
    </section>

    <section class="column" data-status="progress">
      <header class="column-header">
        <div class="column-title">
          <span class="column-marker"></span>
          <span>In Progress</span>
          <span class="column-count" id="count-progress">0</span>
        </div>
        <button class="column-add" data-status="progress" aria-label="Add to In Progress">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        </button>
      </header>
      <div class="task-list" data-status="progress"></div>
    </section>

    <section class="column" data-status="done">
      <header class="column-header">
        <div class="column-title">
          <span class="column-marker"></span>
          <span>Done</span>
          <span class="column-count" id="count-done">0</span>
        </div>
        <button class="column-add" data-status="done" aria-label="Add to Done">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        </button>
      </header>
      <div class="task-list" data-status="done"></div>
    </section>
  </main>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modalTitle">New <em>Task</em></h2>
      <button class="modal-close" id="closeModal" aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="field">
      <label for="titleInput">Title</label>
      <input id="titleInput" type="text" placeholder="What needs doing?" maxlength="120" />
    </div>
    <div class="field">
      <label for="descInput">Description</label>
      <textarea id="descInput" placeholder="Add details, links, or context..." maxlength="500"></textarea>
    </div>
    <div class="field">
      <label>Priority</label>
      <div class="option-group" id="priorityGroup">
        <div class="option" data-priority="low" role="button" tabindex="0">
          <div class="ind"></div><span>Low</span>
        </div>
        <div class="option selected" data-priority="medium" role="button" tabindex="0">
          <div class="ind"></div><span>Medium</span>
        </div>
        <div class="option" data-priority="high" role="button" tabindex="0">
          <div class="ind"></div><span>High</span>
        </div>
      </div>
    </div>
    <div class="field">
      <label>Status</label>
      <div class="option-group" id="statusGroup">
        <div class="option" data-status="todo" role="button" tabindex="0">
          <div class="ind"></div><span>To Do</span>
        </div>
        <div class="option" data-status="progress" role="button" tabindex="0">
          <div class="ind"></div><span>In Progress</span>
        </div>
        <div class="option" data-status="done" role="button" tabindex="0">
          <div class="ind"></div><span>Done</span>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="cancelBtn">Cancel</button>
      <button class="btn btn-primary" id="saveBtn">Save Task</button>
    </div>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
const STORAGE_KEY = 'flow-kanban-v1';

let tasks = [];
let editingId = null;
let draggedId = null;
let draggedCard = null;
let currentFilter = 'all';
let searchQuery = '';
let modalPriority = 'medium';
let modalStatus = 'todo';

const seedTasks = [
  { id: 's1', title: 'Design landing page hero', description: 'Explore three bold concepts with editorial typography and motion sketches for the new marketing site.', priority: 'high', status: 'progress', createdAt: Date.now() - 86400000 * 2, updatedAt: Date.now() - 3600000 * 4, order: 0 },
  { id: 's2', title: 'Review authentication PR', description: 'Check the OAuth refactor branch — focus on token refresh logic and session handling.', priority: 'medium', status: 'todo', createdAt: Date.now() - 86400000, updatedAt: Date.now() - 86400000, order: 0 },
  { id: 's3', title: 'Patch vulnerable dependencies', description: 'Run npm audit fix and verify nothing breaks in the CI pipeline.', priority: 'high', status: 'todo', createdAt: Date.now() - 7200000, updatedAt: Date.now() - 7200000, order: 1 },
  { id: 's4', title: 'Write weekly digest', description: 'Summarize key wins, blockers, and upcoming focus areas for the team newsletter.', priority: 'low', status: 'todo', createdAt: Date.now() - 14400000, updatedAt: Date.now() - 14400000, order: 2 },
  { id: 's5', title: 'Set up parallel CI runners', description: 'Split the test suite across four GitHub Actions runners to cut build time in half.', priority: 'medium', status: 'progress', createdAt: Date.now() - 86400000 * 3, updatedAt: Date.now() - 7200000, order: 1 },
  { id: 's6', title: 'Refactor onboarding flow', description: 'Reduce sign-up from five steps to three. Add contextual hints and progress indicator.', priority: 'high', status: 'done', createdAt: Date.now() - 86400000 * 5, updatedAt: Date.now() - 86400000 * 2, order: 0 },
  { id: 's7', title: 'Fix iOS Safari nav bug', description: 'Hamburger menu fails to close after navigation on iOS 17. Reproduced and patched.', priority: 'medium', status: 'done', createdAt: Date.now() - 86400000 * 4, updatedAt: Date.now() - 86400000, order: 1 }
];

// ---------- Storage ----------
function loadTasks() {
  const stored = localStorage.getItem(STORAGE_KEY);
  if (stored) {
    try { tasks = JSON.parse(stored); }
    catch (e) { tasks = []; }
  } else {
    tasks = [...seedTasks];
    saveTasks();
  }
}

function saveTasks() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
}

function genId() {
  return 't_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

// ---------- Helpers ----------
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function highlight(text, query) {
  const safe = escapeHtml(text);
  if (!query) return safe;
  const escQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return safe.replace(new RegExp('(' + escQuery + ')', 'gi'), '<mark>$1</mark>');
}

function fmtTime(ts) {
  const diff = Date.now() - ts;
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  const d = Math.floor(h / 24);
  if (d < 7) return d + 'd ago';
  return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function statusLabel(s) {
  return { todo: 'To Do', progress: 'In Progress', done: 'Done' }[s] || s;
}

function getVisibleTasks() {
  return tasks.filter(t => {
    if (currentFilter !== 'all' && t.priority !== currentFilter) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      if (!t.title.toLowerCase().includes(q) && !t.description.toLowerCase().includes(q)) return false;
    }
    return true;
  });
}

// ---------- Rendering ----------
const prevCounts = { todo: 0, progress: 0, done: 0 };

function render() {
  const visible = getVisibleTasks();
  const isFiltering = searchQuery || currentFilter !== 'all';

  ['todo', 'progress', 'done'].forEach(status => {
    const list = document.querySelector(`.task-list[data-status="${status}"]`);
    const countEl = document.getElementById(`count-${status}`);
    const colTasks = visible
      .filter(t => t.status === status)
      .sort((a, b) => (a.order ?? 999) - (b.order ?? 999) || a.createdAt - b.createdAt);

    // Total count for column (always shows actual)
    const totalInCol = tasks.filter(t => t.status === status).length;
    countEl.textContent = totalInCol;
    if (totalInCol !== prevCounts[status]) {
      countEl.classList.remove('bump');
      void countEl.offsetWidth;
      countEl.classList.add('bump');
      prevCounts[status] = totalInCol;
    }

    list.innerHTML = '';
    if (colTasks.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-col';
      const msg = isFiltering
        ? (searchQuery ? 'No matches' : 'No tasks of this priority')
        : 'No tasks yet';
      const sub = isFiltering ? 'Try a different filter' : 'Drop tasks or click +';
      empty.innerHTML = `
        <div class="empty-col-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="4" y="4" width="16" height="16" rx="2"/>
            <path d="M9 12h6"/>
          </svg>
        </div>
        <p>${msg}<span>${sub}</span></p>`;
      list.appendChild(empty);
    } else {
      colTasks.forEach((task, idx) => list.appendChild(createCard(task, idx)));
    }
  });

  // Stats
  const total = tasks.length;
  const inProg = tasks.filter(t => t.status === 'progress').length;
  const done = tasks.filter(t => t.status === 'done').length;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('progressCount').textContent = inProg;
  document.getElementById('doneCount').textContent = done;
  const pct = total === 0 ? 0 : Math.round((done / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
}

function createCard(task, idx) {
  const card = document.createElement('article');
  card.className = 'task';
  card.draggable = true;
  card.dataset.id = task.id;
  card.dataset.priority = task.priority;
  card.style.animationDelay = Math.min(idx * 0.04, 0.3) + 's';

  const titleHtml = highlight(task.title, searchQuery);
  const descHtml = task.description
    ? highlight(task.description, searchQuery)
    : '<em>No description</em>';

  card.innerHTML = `
    <div class="task-title">${titleHtml}</div>
    <div class="task-desc ${task.description ? '' : 'empty'}">${descHtml}</div>
    <div class="task-footer">
      <div class="task-meta">
        <span class="priority-badge" data-priority="${task.priority}">${task.priority}</span>
        <span class="task-time">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          ${fmtTime(task.updatedAt || task.createdAt)}
        </span>
      </div>
      <div class="task-actions">
        <button class="action-btn edit" aria-label="Edit task">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="action-btn delete" aria-label="Delete task">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
      </div>
    </div>`;

  card.addEventListener('dragstart', e => {
    draggedId = task.id;
    draggedCard = card;
    setTimeout(() => card.classList.add('dragging'), 0);
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', task.id);
  });

  card.addEventListener('dragend', () => {
    card.classList.remove('dragging');
    draggedId = null;
    draggedCard = null;
    document.querySelectorAll('.column.drag-over').forEach(c => c.classList.remove('drag-over'));
    document.querySelectorAll('.drop-indicator').forEach(d => d.remove());
  });

  card.querySelector('.edit').addEventListener('click', e => {
    e.stopPropagation();
    openModal(task);
  });

  card.querySelector('.delete').addEventListener('click', e => {
    e.stopPropagation();
    deleteTask(task.id);
  });

  return card;
}

// ---------- Drag & Drop ----------
function getDropPosition(container, y) {
  const cards = [...container.querySelectorAll('.task:not(.dragging)')];
  let closest = null;
  let closestOffset = Number.NEGATIVE_INFINITY;
  cards.forEach(card => {
    const rect = card.getBoundingClientRect();
    const offset = y - (rect.top + rect.height / 2);
    if (offset < 0 && offset > closestOffset) {
      closestOffset = offset;
      closest = card;
    }
  });
  return closest;
}

function setupDnd() {
  document.querySelectorAll('.column').forEach(col => {
    const status = col.dataset.status;
    const list = col.querySelector('.task-list');

    col.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      col.classList.add('drag-over');

      // remove old indicators
      document.querySelectorAll('.drop-indicator').forEach(d => d.remove());

      const after = getDropPosition(list, e.clientY);
      const indicator = document.createElement('div');
      indicator.className = 'drop-indicator';
      if (after) {
        list.insertBefore(indicator, after);
      } else {
        // append at the end (after empty state if any)
        const empty = list.querySelector('.empty-col');
        if (empty) empty.replaceWith(indicator);
        else list.appendChild(indicator);
      }
    });

    col.addEventListener('dragleave', e => {
      if (e.relatedTarget && col.contains(e.relatedTarget)) return;
      col.classList.remove('drag-over');
    });

    col.addEventListener('drop', e => {
      e.preventDefault();
      col.classList.remove('drag-over');
      document.querySelectorAll('.drop-indicator').forEach(d => d.remove());
      if (!draggedId) return;
      const beforeCard = getDropPosition(list, e.clientY);
      moveTask(draggedId, status, beforeCard?.dataset.id || null);
    });
  });
}

function moveTask(id, newStatus, beforeId) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  const oldStatus = task.status;
  task.status = newStatus;
  task.updatedAt = Date.now();

  // Reorder: assign order based on position
  const colTasks = tasks
    .filter(t => t.status === newStatus && t.id !== id)
    .sort((a, b) => (a.order ?? 999) - (b.order ?? 999) || a.createdAt - b.createdAt);

  let insertIdx = colTasks.length;
  if (beforeId) {
    insertIdx = colTasks.findIndex(t => t.id === beforeId);
    if (insertIdx === -1) insertIdx = colTasks.length;
  }
  colTasks.splice(insertIdx, 0, task);
  colTasks.forEach((t, i) => { t.order = i; });

  // Also normalize old column orders
  if (oldStatus !== newStatus) {
    const oldColTasks = tasks
      .filter(t => t.status === oldStatus)
      .sort((a, b) => (a.order ?? 999) - (b.order ?? 999) || a.createdAt - b.createdAt);
    oldColTasks.forEach((t, i) => { t.order = i; });
  }

  saveTasks();
  render();
  if (oldStatus !== newStatus) {
    showToast(`Moved to ${statusLabel(newStatus)}`, 'success');
  }
}

// ---------- CRUD ----------
function deleteTask(id) {
  const card = document.querySelector(`.task[data-id="${id}"]`);
  if (card) {
    const rect = card.getBoundingClientRect();
    card.style.setProperty('--card-h', rect.height + 'px');
    card.classList.add('removing');
    setTimeout(() => {
      tasks = tasks.filter(t => t.id !== id);
      saveTasks();
      render();
      showToast('Task deleted', 'info');
    }, 300);
  } else {
    tasks = tasks.filter(t => t.id !== id);
    saveTasks();
    render();
  }
}

// ---------- Modal ----------
function openModal(task = null, presetStatus = null) {
  editingId = task?.id || null;
  document.getElementById('modalTitle').innerHTML = task ? 'Edit <em>Task</em>' : 'New <em>Task</em>';
  document.getElementById('titleInput').value = task?.title || '';
  document.getElementById('descInput').value = task?.description || '';
  modalPriority = task?.priority || 'medium';
  modalStatus = task?.status || presetStatus || 'todo';

  document.querySelectorAll('#priorityGroup .option').forEach(o => {
    o.classList.toggle('selected', o.dataset.priority === modalPriority);
  });
  document.querySelectorAll('#statusGroup .option').forEach(o => {
    o.classList.toggle('selected', o.dataset.status === modalStatus);
  });

  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('titleInput').focus(), 60);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  editingId = null;
}

function saveTaskFromModal() {
  const title = document.getElementById('titleInput').value.trim();
  const desc = document.getElementById('descInput').value.trim();
  if (!title) {
    showToast('Please enter a title', 'error');
    document.getElementById('titleInput').focus();
    return;
  }

  if (editingId) {
    const task = tasks.find(t => t.id === editingId);
    if (task) {
      const statusChanged = task.status !== modalStatus;
      task.title = title;
      task.description = desc;
      task.priority = modalPriority;
      task.status = modalStatus;
      task.updatedAt = Date.now();
      // Reorder if status changed - put at end of new column
      if (statusChanged) {
        const colCount = tasks.filter(t => t.status === modalStatus && t.id !== editingId).length;
        task.order = colCount;
      }
      showToast('Task updated', 'success');
    }
  } else {
    const colCount = tasks.filter(t => t.status === modalStatus).length;
    tasks.push({
      id: genId(),
      title,
      description: desc,
      priority: modalPriority,
      status: modalStatus,
      createdAt: Date.now(),
      updatedAt: Date.now(),
      order: colCount
    });
    showToast('Task created', 'success');
  }

  saveTasks();
  render();
  closeModal();
}

// ---------- Toast ----------
let toastTimer;
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  const icons = {
    success: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
    error: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>',
    info: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M12 8v4M12 16h.01"/><circle cx="12" cy="12" r="10"/></svg>'
  };
  t.innerHTML = `<span class="toast-icon">${icons[type] || icons.info}</span><span>${msg}</span>`;
  t.className = 'toast ' + type;
  requestAnimationFrame(() => t.classList.add('show'));
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

// ---------- Init ----------
function init() {
  loadTasks();

  document.getElementById('addBtn').addEventListener('click', () => openModal());

  document.querySelectorAll('.column-add').forEach(btn => {
    btn.addEventListener('click', () => openModal(null, btn.dataset.status));
  });

  document.getElementById('closeModal').addEventListener('click', closeModal);
  document.getElementById('cancelBtn').addEventListener('click', closeModal);
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target.id === 'modal') closeModal();
  });
  document.getElementById('saveBtn').addEventListener('click', saveTaskFromModal);

  document.querySelectorAll('#priorityGroup .option').forEach(o => {
    const select = () => {
      modalPriority = o.dataset.priority;
      document.querySelectorAll('#priorityGroup .option').forEach(x => x.classList.toggle('selected', x === o));
    };
    o.addEventListener('click', select);
    o.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); select(); } });
  });

  document.querySelectorAll('#statusGroup .option').forEach(o => {
    const select = () => {
      modalStatus = o.dataset.status;
      document.querySelectorAll('#statusGroup .option').forEach(x => x.classList.toggle('selected', x === o));
    };
    o.addEventListener('click', select);
    o.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); select(); } });
  });

  document.getElementById('search').addEventListener('input', e => {
    searchQuery = e.target.value.trim();
    render();
  });

  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      currentFilter = chip.dataset.filter;
      render();
    });
  });

  document.addEventListener('keydown', e => {
    const modalOpen = document.getElementById('modal').classList.contains('open');
    if (e.key === 'Escape' && modalOpen) closeModal();
    if (e.key === 'n' && !modalOpen && !e.target.matches('input, textarea')) {
      e.preventDefault();
      openModal();
    }
    if (e.key === '/' && !modalOpen && !e.target.matches('input, textarea')) {
      e.preventDefault();
      document.getElementById('search').focus();
    }
    if (e.key === 'Enter' && modalOpen && e.target.matches('input')) {
      e.preventDefault();
      saveTaskFromModal();
    }
  });

  setupDnd();
  render();

  // Refresh timestamps every minute
  setInterval(() => { if (!searchQuery && currentFilter === 'all') render(); }, 60000);
}

init();
</script>
