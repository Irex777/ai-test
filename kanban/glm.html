<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanban Board</title>
<style>
  :root {
    --bg: #0f1117;
    --bg-secondary: #161822;
    --card: #1c1f2e;
    --card-hover: #242840;
    --border: #2a2e42;
    --fg: #e4e6f0;
    --fg-muted: #8b8fa8;
    --accent: #f59e0b;
    --accent-glow: rgba(245, 158, 11, 0.15);
    --danger: #ef4444;
    --danger-glow: rgba(239, 68, 68, 0.15);
    --success: #10b981;
    --success-glow: rgba(16, 185, 129, 0.15);
    --info: #06b6d4;
    --info-glow: rgba(6, 182, 212, 0.15);
    --priority-low: #6366f1;
    --priority-medium: #f59e0b;
    --priority-high: #ef4444;
    --radius: 10px;
    --shadow: 0 4px 24px rgba(0,0,0,0.3);
    --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 20% 20%, rgba(245,158,11,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(6,182,212,0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(99,102,241,0.02) 0%, transparent 60%);
    z-index: -1;
    animation: bgDrift 30s ease-in-out infinite alternate;
  }

  @keyframes bgDrift {
    0% { transform: translate(0, 0) rotate(0deg); }
    100% { transform: translate(-3%, -3%) rotate(2deg); }
  }

  header {
    padding: 24px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-secondary);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--accent), #d97706);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 900;
    color: #000;
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .logo-text h1 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--fg), var(--fg-muted));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .logo-text span {
    font-size: 11px;
    color: var(--fg-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .search-box {
    position: relative;
  }

  .search-box input {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px 10px 38px;
    color: var(--fg);
    font-size: 14px;
    width: 240px;
    transition: var(--transition);
    outline: none;
  }

  .search-box input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .search-box input::placeholder { color: var(--fg-muted); }

  .search-box svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--fg-muted);
    width: 16px;
    height: 16px;
  }

  .filter-select {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--fg);
    font-size: 14px;
    cursor: pointer;
    outline: none;
    transition: var(--transition);
  }

  .filter-select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .filter-select option { background: var(--card); }

  .btn {
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: var(--transition);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #d97706);
    color: #000;
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 28px rgba(245, 158, 11, 0.3);
  }

  .btn-primary:active { transform: translateY(0); }

  .btn-ghost {
    background: transparent;
    color: var(--fg-muted);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover {
    background: var(--card);
    color: var(--fg);
    border-color: var(--fg-muted);
  }

  .btn-danger {
    background: var(--danger);
    color: #fff;
  }

  .btn-danger:hover {
    box-shadow: 0 0 20px var(--danger-glow);
    transform: translateY(-1px);
  }

  main {
    padding: 28px 32px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    max-width: 1440px;
    margin: 0 auto;
    min-height: calc(100vh - 90px);
  }

  .column {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    min-height: 400px;
    transition: var(--transition);
  }

  .column.drag-over {
    border-color: var(--accent);
    box-shadow: 0 0 30px var(--accent-glow), inset 0 0 30px var(--accent-glow);
  }

  .column-header {
    padding: 20px 20px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .column-title-area {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .column-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .column-dot.todo { background: var(--info); box-shadow: 0 0 10px var(--info-glow); }
  .column-dot.progress { background: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
  .column-dot.done { background: var(--success); box-shadow: 0 0 10px var(--success-glow); }

  .column-title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  .column-count {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 12px;
    font-weight: 600;
    color: var(--fg-muted);
    min-width: 28px;
    text-align: center;
  }

  .column-body {
    padding: 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow-y: auto;
    min-height: 100px;
  }

  .column-body::-webkit-scrollbar { width: 4px; }
  .column-body::-webkit-scrollbar-track { background: transparent; }
  .column-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: var(--fg-muted);
    font-size: 13px;
    opacity: 0.5;
    padding: 40px 0;
    text-align: center;
  }

  .empty-state svg { width: 40px; height: 40px; margin-bottom: 10px; opacity: 0.4; }

  .task-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    cursor: grab;
    transition: var(--transition);
    position: relative;
    animation: cardIn 0.35s ease-out;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(-10px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .task-card:hover {
    background: var(--card-hover);
    border-color: var(--fg-muted);
    transform: translateY(-2px);
    box-shadow: var(--shadow);
  }

  .task-card:active { cursor: grabbing; }

  .task-card.dragging {
    opacity: 0.4;
    transform: scale(0.95) rotate(2deg);
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }

  .task-card.drag-preview {
    box-shadow: 0 0 0 2px var(--accent), 0 10px 40px rgba(0,0,0,0.4);
    transform: rotate(-2deg);
  }

  .task-priority-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    border-radius: var(--radius) var(--radius) 0 0;
  }

  .task-priority-bar.low { background: var(--priority-low); }
  .task-priority-bar.medium { background: var(--priority-medium); }
  .task-priority-bar.high { background: var(--priority-high); }

  .task-top-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 8px;
  }

  .task-title {
    font-size: 14px;
    font-weight: 700;
    line-height: 1.4;
    flex: 1;
  }

  .task-actions {
    display: flex;
    gap: 2px;
    opacity: 0;
    transition: var(--transition);
    flex-shrink: 0;
  }

  .task-card:hover .task-actions { opacity: 1; }

  .task-action-btn {
    width: 28px;
    height: 28px;
    border: none;
    background: transparent;
    color: var(--fg-muted);
    cursor: pointer;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
  }

  .task-action-btn:hover { background: var(--border); color: var(--fg); }
  .task-action-btn.delete:hover { background: var(--danger-glow); color: var(--danger); }

  .task-desc {
    font-size: 12px;
    color: var(--fg-muted);
    line-height: 1.5;
    margin-bottom: 12px;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .task-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
  }

  .task-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
  }

  .task-badge.low { background: rgba(99,102,241,0.15); color: var(--priority-low); }
  .task-badge.medium { background: rgba(245,158,11,0.15); color: var(--priority-medium); }
  .task-badge.high { background: rgba(239,68,68,0.15); color: var(--priority-high); }

  .task-time {
    font-size: 11px;
    color: var(--fg-muted);
    opacity: 0.7;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: fadeIn 0.2s ease;
    opacity: 0;
    pointer-events: none;
  }

  .modal-overlay.active { opacity: 1; pointer-events: auto; }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: modalIn 0.3s ease;
  }

  @keyframes modalIn {
    from { transform: translateY(20px) scale(0.96); opacity: 0; }
    to { transform: translateY(0) scale(1); opacity: 1; }
  }

  .modal h2 {
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 24px;
    letter-spacing: -0.3px;
  }

  .form-group {
    margin-bottom: 18px;
  }

  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--fg-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--fg);
    font-size: 14px;
    outline: none;
    transition: var(--transition);
    font-family: inherit;
  }

  .form-group textarea { resize: vertical; min-height: 80px; }

  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .form-group select option { background: var(--card); }

  .form-error {
    font-size: 12px;
    color: var(--danger);
    margin-top: 4px;
    display: none;
  }

  .form-error.show { display: block; }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 24px;
  }

  /* Toast */
  .toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 300;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
  }

  .toast {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 18px;
    font-size: 13px;
    font-weight: 500;
    box-shadow: var(--shadow);
    animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
    pointer-events: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  @keyframes toastIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes toastOut {
    from { opacity: 1; transform: translateX(0); }
    to { opacity: 0; transform: translateX(30px); }
  }

  .toast.success { border-left: 3px solid var(--success); }
  .toast.error { border-left: 3px solid var(--danger); }
  .toast.info { border-left: 3px solid var(--info); }

  /* Drop placeholder */
  .drop-placeholder {
    border: 2px dashed var(--accent);
    border-radius: var(--radius);
    min-height: 60px;
    background: var(--accent-glow);
    transition: var(--transition);
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  @media (max-width: 1024px) {
    main { grid-template-columns: 1fr; padding: 16px; gap: 16px; }
    header { padding: 16px; }
    .column { min-height: 200px; }
    .search-box input { width: 160px; }
  }

  @media (max-width: 600px) {
    .header-actions { width: 100%; }
    .search-box input { width: 100%; }
    .search-box { flex: 1; }
    main { padding: 12px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <div class="logo-icon">K</div>
    <div class="logo-text">
      <h1>Kanban Board</h1>
      <span>Task Management</span>
    </div>
  </div>
  <div class="header-actions">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Search tasks..." aria-label="Search tasks">
    </div>
    <select class="filter-select" id="priorityFilter" aria-label="Filter by priority">
      <option value="all">All Priorities</option>
      <option value="low">Low</option>
      <option value="medium">Medium</option>
      <option value="high">High</option>
    </select>
    <button class="btn btn-primary" id="addTaskBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      Add Task
    </button>
  </div>
</header>

<main>
  <!-- To Do Column -->
  <section class="column" data-column="todo" aria-label="To Do column">
    <div class="column-header">
      <div class="column-title-area">
        <div class="column-dot todo"></div>
        <h2 class="column-title">To Do</h2>
      </div>
      <span class="column-count" id="count-todo">0</span>
    </div>
    <div class="column-body" id="body-todo"></div>
  </section>

  <!-- In Progress Column -->
  <section class="column" data-column="progress" aria-label="In Progress column">
    <div class="column-header">
      <div class="column-title-area">
        <div class="column-dot progress"></div>
        <h2 class="column-title">In Progress</h2>
      </div>
      <span class="column-count" id="count-progress">0</span>
    </div>
    <div class="column-body" id="body-progress"></div>
  </section>

  <!-- Done Column -->
  <section class="column" data-column="done" aria-label="Done column">
    <div class="column-header">
      <div class="column-title-area">
        <div class="column-dot done"></div>
        <h2 class="column-title">Done</h2>
      </div>
      <span class="column-count" id="count-done">0</span>
    </div>
    <div class="column-body" id="body-done"></div>
  </section>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal">
    <h2 id="modalTitle">Add New Task</h2>
    <div class="form-group">
      <label for="taskTitle">Title</label>
      <input type="text" id="taskTitle" placeholder="Enter task title" maxlength="100">
      <div class="form-error" id="titleError">Title is required</div>
    </div>
    <div class="form-group">
      <label for="taskDesc">Description</label>
      <textarea id="taskDesc" placeholder="Describe the task (optional)" maxlength="500"></textarea>
    </div>
    <div class="form-group">
      <label for="taskPriority">Priority</label>
      <select id="taskPriority">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="cancelBtn">Cancel</button>
      <button class="btn btn-primary" id="saveBtn">Save Task</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script>
  /* ── State ── */
  let tasks = [];
  let editingId = null;
  let draggedId = null;

  /* ── DOM refs ── */
  const $ = (s) => document.querySelector(s);
  const $$ = (s) => document.querySelectorAll(s);

  const modalOverlay = $('#modalOverlay');
  const addTaskBtn = $('#addTaskBtn');
  const cancelBtn = $('#cancelBtn');
  const saveBtn = $('#saveBtn');
  const searchInput = $('#searchInput');
  const priorityFilter = $('#priorityFilter');
  const toastContainer = $('#toastContainer');

  const titleInput = $('#taskTitle');
  const descInput = $('#taskDesc');
  const priorityInput = $('#taskPriority');
  const titleError = $('#titleError');
  const modalTitle = $('#modalTitle');

  /* ── LocalStorage ── */
  function saveTasks() {
    localStorage.setItem('kanban_tasks', JSON.stringify(tasks));
  }

  function loadTasks() {
    try {
      const stored = localStorage.getItem('kanban_tasks');
      if (stored) {
        tasks = JSON.parse(stored);
      } else {
        // Seed some sample tasks
        tasks = [
          { id: genId(), title: 'Design system architecture', desc: 'Plan the microservices layout and communication patterns for the new platform.', priority: 'high', column: 'todo', created: Date.now() - 86400000, updated: Date.now() - 86400000 },
          { id: genId(), title: 'Set up CI/CD pipeline', desc: 'Configure automated builds, tests, and deployments using GitHub Actions.', priority: 'medium', column: 'todo', created: Date.now() - 72000000, updated: Date.now() - 72000000 },
          { id: genId(), title: 'Implement user authentication', desc: 'OAuth 2.0 flow with JWT tokens and refresh token rotation.', priority: 'high', column: 'progress', created: Date.now() - 50000000, updated: Date.now() - 36000000 },
          { id: genId(), title: 'Write unit tests for API', desc: 'Cover all endpoints with at least 80% code coverage.', priority: 'low', column: 'progress', created: Date.now() - 40000000, updated: Date.now() - 20000000 },
          { id: genId(), title: 'Project kickoff meeting', desc: 'Initial meeting completed with stakeholders.', priority: 'low', column: 'done', created: Date.now() - 200000000, updated: Date.now() - 100000000 },
          { id: genId(), title: 'Database schema design', desc: 'Finalized ER diagram and migration scripts.', priority: 'medium', column: 'done', created: Date.now() - 150000000, updated: Date.now() - 80000000 },
        ];
        saveTasks();
      }
    } catch {
      tasks = [];
    }
  }

  function genId() {
    return Date.now().toString(36) + Math.random().toString(36).substr(2, 9);
  }

  /* ── Rendering ── */
  function renderAll() {
    const search = searchInput.value.toLowerCase().trim();
    const filter = priorityFilter.value;

    const columns = { todo: [], progress: [], done: [] };

    tasks.forEach((t) => {
      // Search filter
      if (search && !t.title.toLowerCase().includes(search) && !t.desc.toLowerCase().includes(search)) return;
      // Priority filter
      if (filter !== 'all' && t.priority !== filter) return;
      if (columns[t.column]) columns[t.column].push(t);
    });

    // Sort: high first
    const prioOrder = { high: 0, medium: 1, low: 2 };
    Object.values(columns).forEach((arr) => {
      arr.sort((a, b) => prioOrder[a.priority] - prioOrder[b.priority] || b.created - a.created);
    });

    ['todo', 'progress', 'done'].forEach((col) => {
      const body = $(`#body-${col}`);
      const countEl = $(`#count-${col}`);
      // Count all tasks in column regardless of filter
      const totalCount = tasks.filter((t) => t.column === col).length;
      countEl.textContent = totalCount;

      body.innerHTML = '';

      if (columns[col].length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 12h6M12 9v6"/></svg><span>No tasks here</span>`;
        body.appendChild(empty);
        return;
      }

      columns[col].forEach((task) => {
        const card = createCard(task);
        body.appendChild(card);
      });
    });
  }

  function createCard(task) {
    const card = document.createElement('article');
    card.className = 'task-card';
    card.setAttribute('draggable', 'true');
    card.dataset.id = task.id;

    const timeStr = formatTime(task.updated);

    card.innerHTML = `
      <div class="task-priority-bar ${task.priority}"></div>
      <div class="task-top-row">
        <div class="task-title">${escapeHtml(task.title)}</div>
        <div class="task-actions">
          <button class="task-action-btn edit" title="Edit" aria-label="Edit task" data-action="edit">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
          </button>
          <button class="task-action-btn delete" title="Delete" aria-label="Delete task" data-action="delete">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
        </div>
      </div>
      ${task.desc ? `<div class="task-desc">${escapeHtml(task.desc)}</div>` : ''}
      <div class="task-meta">
        <span class="task-badge ${task.priority}">${task.priority}</span>
        <span class="task-time">${timeStr}</span>
      </div>
    `;

    // Action buttons
    card.querySelector('[data-action="edit"]').addEventListener('click', (e) => {
      e.stopPropagation();
      openEdit(task.id);
    });
    card.querySelector('[data-action="delete"]').addEventListener('click', (e) => {
      e.stopPropagation();
      deleteTask(task.id);
    });

    // Drag events
    card.addEventListener('dragstart', handleDragStart);
    card.addEventListener('dragend', handleDragEnd);

    return card;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function formatTime(ts) {
    const d = new Date(ts);
    const now = new Date();
    const diff = now - d;
    const mins = Math.floor(diff / 60000);
    const hrs = Math.floor(diff / 3600000);
    const days = Math.floor(diff / 86400000);

    if (mins < 1) return 'Just now';
    if (mins < 60) return `${mins}m ago`;
    if (hrs < 24) return `${hrs}h ago`;
    if (days < 7) return `${days}d ago`;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  /* ── Drag & Drop ── */
  function handleDragStart(e) {
    draggedId = e.currentTarget.dataset.id;
    e.currentTarget.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    // For Firefox compatibility
    e.dataTransfer.setData('text/plain', draggedId);
  }

  function handleDragEnd(e) {
    e.currentTarget.classList.remove('dragging');
    draggedId = null;
    // Clean up all column states and placeholders
    $$('.column').forEach((col) => col.classList.remove('drag-over'));
    $$('.drop-placeholder').forEach((p) => p.remove());
  }

  // Column drag handlers
  $$('.column').forEach((column) => {
    column.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      column.classList.add('drag-over');

      // Add placeholder if not present
      const body = column.querySelector('.column-body');
      if (!body.querySelector('.drop-placeholder')) {
        const placeholder = document.createElement('div');
        placeholder.className = 'drop-placeholder';
        body.appendChild(placeholder);
      }
    });

    column.addEventListener('dragleave', (e) => {
      // Only trigger if leaving the column entirely
      if (!column.contains(e.relatedTarget)) {
        column.classList.remove('drag-over');
        const ph = column.querySelector('.drop-placeholder');
        if (ph) ph.remove();
      }
    });

    column.addEventListener('drop', (e) => {
      e.preventDefault();
      column.classList.remove('drag-over');
      const ph = column.querySelector('.drop-placeholder');
      if (ph) ph.remove();

      const targetColumn = column.dataset.column;
      if (!draggedId) return;

      const task = tasks.find((t) => t.id === draggedId);
      if (!task) return;

      if (task.column !== targetColumn) {
        task.column = targetColumn;
        task.updated = Date.now();
        saveTasks();
        renderAll();
        showToast(`Moved to ${column.querySelector('.column-title').textContent}`, 'success');
      }
    });
  });

  /* ── Touch Drag Support ── */
  let touchDragId = null;
  let touchClone = null;
  let touchOffsetX = 0;
  let touchOffsetY = 0;

  document.addEventListener('touchstart', (e) => {
    const card = e.target.closest('.task-card');
    if (!card || e.target.closest('.task-actions')) return;
    touchDragId = card.dataset.id;
    const rect = card.getBoundingClientRect();
    touchOffsetX = e.touches[0].clientX - rect.left;
    touchOffsetY = e.touches[0].clientY - rect.top;

    touchClone = card.cloneNode(true);
    touchClone.style.position = 'fixed';
    touchClone.style.width = rect.width + 'px';
    touchClone.style.zIndex = '500';
    touchClone.style.pointerEvents = 'none';
    touchClone.style.opacity = '0.85';
    touchClone.style.transform = 'rotate(-2deg)';
    touchClone.style.boxShadow = '0 10px 40px rgba(0,0,0,0.5)';
    document.body.appendChild(touchClone);

    card.classList.add('dragging');
  }, { passive: true });

  document.addEventListener('touchmove', (e) => {
    if (!touchDragId || !touchClone) return;
    const x = e.touches[0].clientX - touchOffsetX;
    const y = e.touches[0].clientY - touchOffsetY;
    touchClone.style.left = x + 'px';
    touchClone.style.top = y + 'px';

    // Highlight column under touch
    const el = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
    $$('.column').forEach((c) => c.classList.remove('drag-over'));
    if (el) {
      const col = el.closest('.column');
      if (col) col.classList.add('drag-over');
    }
  }, { passive: true });

  document.addEventListener('touchend', (e) => {
    if (!touchDragId) return;
    if (touchClone) { touchClone.remove(); touchClone = null; }

    const touch = e.changedTouches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    const col = el ? el.closest('.column') : null;

    if (col) {
      const targetColumn = col.dataset.column;
      const task = tasks.find((t) => t.id === touchDragId);
      if (task && task.column !== targetColumn) {
        task.column = targetColumn;
        task.updated = Date.now();
        saveTasks();
        renderAll();
        showToast(`Moved to ${col.querySelector('.column-title').textContent}`, 'success');
      }
    }

    $$('.column').forEach((c) => c.classList.remove('drag-over'));
    $$('.task-card.dragging').forEach((c) => c.classList.remove('dragging'));
    touchDragId = null;
  });

  /* ── Modal ── */
  function openModal() {
    modalOverlay.classList.add('active');
    setTimeout(() => titleInput.focus(), 100);
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    modalOverlay.classList.remove('active');
    titleInput.value = '';
    descInput.value = '';
    priorityInput.value = 'medium';
    titleError.classList.remove('show');
    editingId = null;
    modalTitle.textContent = 'Add New Task';
    saveBtn.textContent = 'Save Task';
    document.body.style.overflow = '';
  }

  function openEdit(id) {
    const task = tasks.find((t) => t.id === id);
    if (!task) return;
    editingId = id;
    modalTitle.textContent = 'Edit Task';
    saveBtn.textContent = 'Update Task';
    titleInput.value = task.title;
    descInput.value = task.desc;
    priorityInput.value = task.priority;
    openModal();
  }

  addTaskBtn.addEventListener('click', () => {
    editingId = null;
    modalTitle.textContent = 'Add New Task';
    saveBtn.textContent = 'Save Task';
    openModal();
  });

  cancelBtn.addEventListener('click', closeModal);
  modalOverlay.addEventListener('click', (e) => {
    if (e.target === modalOverlay) closeModal();
  });

  // Escape key closes modal
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && modalOverlay.classList.contains('active')) closeModal();
  });

  saveBtn.addEventListener('click', () => {
    const title = titleInput.value.trim();
    const desc = descInput.value.trim();
    const priority = priorityInput.value;

    if (!title) {
      titleError.classList.add('show');
      titleInput.focus();
      return;
    }
    titleError.classList.remove('show');

    if (editingId) {
      const task = tasks.find((t) => t.id === editingId);
      if (task) {
        task.title = title;
        task.desc = desc;
        task.priority = priority;
        task.updated = Date.now();
        showToast('Task updated', 'success');
      }
    } else {
      tasks.push({
        id: genId(),
        title,
        desc,
        priority,
        column: 'todo',
        created: Date.now(),
        updated: Date.now(),
      });
      showToast('Task created', 'success');
    }

    saveTasks();
    renderAll();
    closeModal();
  });

  /* ── Delete ── */
  function deleteTask(id) {
    const task = tasks.find((t) => t.id === id);
    if (!task) return;

    // Animate out
    const card = document.querySelector(`.task-card[data-id="${id}"]`);
    if (card) {
      card.style.transition = '0.3s ease';
      card.style.transform = 'translateX(40px) scale(0.9)';
      card.style.opacity = '0';
      setTimeout(() => {
        tasks = tasks.filter((t) => t.id !== id);
        saveTasks();
        renderAll();
        showToast('Task deleted', 'error');
      }, 280);
    } else {
      tasks = tasks.filter((t) => t.id !== id);
      saveTasks();
      renderAll();
      showToast('Task deleted', 'error');
    }
  }

  /* ── Search & Filter ── */
  searchInput.addEventListener('input', renderAll);
  priorityFilter.addEventListener('change', renderAll);

  /* ── Toast ── */
  function showToast(message, type) {
    const toast = document.createElement('div');
    toast.className = `toast ${type || 'info'}`;
    const icons = {
      success: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4 12 14.01l-3-3"/></svg>',
      error: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6M9 9l6 6"/></svg>',
      info: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#06b6d4" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>',
    };
    toast.innerHTML = `${icons[type] || icons.info} ${message}`;
    toastContainer.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  /* ── Init ── */
  loadTasks();
  renderAll();
</script>
</body>
</html>
