<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Board · Task Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============ DESIGN TOKENS ============ */
:root {
  --bg-deep: #060912;
  --bg-base: #0a0e1a;
  --bg-surface: #0f1422;
  --bg-elevated: #161c2e;
  --bg-hover: #1c2336;
  --border: #1f273b;
  --border-strong: #2d3851;
  --text-primary: #eaf0fb;
  --text-secondary: #94a2c2;
  --text-muted: #5a6885;
  --accent: #ff7a45;
  --accent-glow: rgba(255, 122, 69, 0.35);
  --cyan: #2dd4bf;
  --cyan-glow: rgba(45, 212, 191, 0.25);
  --amber: #fbbf24;
  --rose: #f43f5e;
  --shadow-lg: 0 20px 60px -20px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.02);
  --radius: 14px;
  --radius-sm: 8px;
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: 'Space Grotesk', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

body { min-height: 100vh; position: relative; }

/* ============ ATMOSPHERE ============ */
.bg-atmosphere {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, var(--accent-glow), transparent 55%),
    radial-gradient(ellipse 60% 50% at 100% 100%, var(--cyan-glow), transparent 60%),
    radial-gradient(ellipse 50% 40% at 0% 80%, rgba(244, 63, 94, 0.12), transparent 60%);
}

.bg-grid {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px);
  background-size: 44px 44px;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
  -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
}

.orb {
  position: fixed; border-radius: 50%; filter: blur(90px);
  opacity: 0.35; pointer-events: none; z-index: 0;
  animation: drift 22s var(--ease) infinite;
}
.orb-1 { width: 420px; height: 420px; background: var(--accent); top: -120px; left: -120px; }
.orb-2 { width: 500px; height: 500px; background: var(--cyan); bottom: -180px; right: -160px; animation-delay: -8s; }
.orb-3 { width: 320px; height: 320px; background: var(--rose); top: 40%; left: 60%; opacity: 0.18; animation-delay: -14s; }

@keyframes drift {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(50px, -30px) scale(1.1); }
  66% { transform: translate(-40px, 40px) scale(0.95); }
}

/* ============ APP CONTAINER ============ */
.app {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: flex; flex-direction: column;
}

/* ============ HEADER ============ */
.app-header {
  padding: 22px 32px;
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 28px;
  align-items: center;
  border-bottom: 1px solid var(--border);
  background: rgba(10, 14, 26, 0.65);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  position: sticky; top: 0; z-index: 100;
}

.brand {
  display: flex; align-items: center; gap: 14px;
}

.brand-mark {
  width: 44px; height: 44px;
  background: linear-gradient(135deg, var(--accent), #ff4d6d);
  border-radius: 12px;
  display: grid; place-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700; font-size: 22px;
  color: var(--bg-deep);
  box-shadow: 0 8px 24px -8px var(--accent-glow);
  position: relative; overflow: hidden;
}
.brand-mark::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent 40%, rgba(255, 255, 255, 0.3));
}

.brand-text h1 {
  font-size: 19px; font-weight: 700;
  letter-spacing: -0.02em;
  background: linear-gradient(180deg, #fff, #b8c4dc);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  line-height: 1.1;
}
.brand-text p {
  font-size: 11px; color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-top: 2px;
}

/* ============ TOOLBAR ============ */
.toolbar {
  display: flex; align-items: center; gap: 10px;
  max-width: 720px; width: 100%;
  margin: 0 auto;
}

.search-wrap {
  position: relative; flex: 1;
}
.search-wrap svg {
  position: absolute; left: 14px; top: 50%;
  transform: translateY(-50%);
  width: 16px; height: 16px;
  color: var(--text-muted);
  pointer-events: none;
}
.search-input {
  width: 100%;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px 10px 40px;
  color: var(--text-primary);
  font-family: inherit; font-size: 14px;
  transition: all 0.2s var(--ease);
}
.search-input:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--bg-elevated);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.search-input::placeholder { color: var(--text-muted); }

.priority-filter {
  display: flex; gap: 4px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 3px;
}
.filter-btn {
  background: transparent; border: none;
  padding: 6px 12px;
  color: var(--text-secondary);
  font-family: inherit; font-size: 12px; font-weight: 500;
  border-radius: 7px;
  cursor: pointer;
  transition: all 0.2s var(--ease);
  letter-spacing: 0.01em;
}
.filter-btn:hover { color: var(--text-primary); }
.filter-btn.active {
  background: var(--bg-elevated);
  color: var(--text-primary);
  box-shadow: inset 0 0 0 1px var(--border-strong);
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent), #ff5a3c);
  border: none; color: white;
  padding: 11px 18px;
  border-radius: 10px;
  font-family: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 8px;
  box-shadow: 0 6px 20px -6px var(--accent-glow), inset 0 1px 0 rgba(255, 255, 255, 0.2);
  transition: all 0.2s var(--ease);
  letter-spacing: 0.01em;
}
.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 10px 28px -6px var(--accent-glow), inset 0 1px 0 rgba(255, 255, 255, 0.25);
}
.btn-primary:active { transform: translateY(0); }
.btn-primary svg { width: 14px; height: 14px; }

/* ============ BOARD ============ */
.board {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 20px;
  padding: 24px 32px 40px;
  max-width: 1600px;
  margin: 0 auto;
  width: 100%;
}

.column {
  background: linear-gradient(180deg, rgba(15, 20, 34, 0.6), rgba(10, 14, 26, 0.4));
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex; flex-direction: column;
  min-height: 400px;
  transition: all 0.3s var(--ease);
  position: relative; overflow: hidden;
  backdrop-filter: blur(10px);
}
.column::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
  background: var(--col-color, var(--accent));
  opacity: 0.8;
}
.column[data-status="todo"] { --col-color: var(--accent); }
.column[data-status="progress"] { --col-color: var(--cyan); }
.column[data-status="done"] { --col-color: var(--rose); }

.column.drag-over {
  background: linear-gradient(180deg, rgba(255, 122, 69, 0.08), rgba(255, 122, 69, 0.02));
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 12px 40px -12px var(--accent-glow);
}
.column[data-status="progress"].drag-over {
  background: linear-gradient(180deg, rgba(45, 212, 191, 0.08), rgba(45, 212, 191, 0.02));
  border-color: var(--cyan);
  box-shadow: 0 12px 40px -12px var(--cyan-glow);
}
.column[data-status="done"].drag-over {
  background: linear-gradient(180deg, rgba(244, 63, 94, 0.08), rgba(244, 63, 94, 0.02));
  border-color: var(--rose);
  box-shadow: 0 12px 40px -12px rgba(244, 63, 94, 0.3);
}

.column-header {
  padding: 18px 20px 14px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.column-title {
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-primary);
}
.column-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--col-color);
  box-shadow: 0 0 12px var(--col-color);
}
.column-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; font-weight: 500;
  background: var(--bg-elevated);
  color: var(--text-secondary);
  padding: 3px 9px;
  border-radius: 6px;
  min-width: 28px;
  text-align: center;
  border: 1px solid var(--border);
}

.task-list {
  flex: 1;
  padding: 14px;
  display: flex; flex-direction: column;
  gap: 10px;
  overflow-y: auto;
  min-height: 100px;
}

.task-list::-webkit-scrollbar { width: 6px; }
.task-list::-webkit-scrollbar-track { background: transparent; }
.task-list::-webkit-scrollbar-thumb {
  background: var(--border-strong); border-radius: 3px;
}
.task-list::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ============ TASK CARD ============ */
.task-card {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px;
  cursor: grab;
  position: relative;
  transition: transform 0.2s var(--ease), border-color 0.2s var(--ease), box-shadow 0.2s var(--ease);
  animation: cardIn 0.4s var(--ease);
  will-change: transform;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.task-card:hover {
  border-color: var(--border-strong);
  transform: translateY(-2px);
  box-shadow: 0 10px 24px -10px rgba(0, 0, 0, 0.5);
}
.task-card:active { cursor: grabbing; }

.task-card.dragging {
  opacity: 0.4;
  transform: rotate(2deg) scale(1.02);
  cursor: grabbing;
  z-index: 100;
}

.priority-bar {
  position: absolute; top: 0; left: 0;
  width: 3px; height: 100%;
  border-radius: 3px 0 0 3px;
}
.task-card[data-priority="low"] .priority-bar { background: var(--cyan); }
.task-card[data-priority="medium"] .priority-bar { background: var(--amber); }
.task-card[data-priority="high"] .priority-bar { background: var(--rose); box-shadow: 0 0 12px var(--rose); }

.task-head {
  display: flex; align-items: flex-start; gap: 8px;
  margin-bottom: 6px;
}

.task-title {
  flex: 1;
  font-size: 14px; font-weight: 600;
  color: var(--text-primary);
  line-height: 1.35;
  word-break: break-word;
}
.task-card[data-status="done"] .task-title {
  text-decoration: line-through;
  text-decoration-color: var(--text-muted);
  color: var(--text-secondary);
}

.task-desc {
  font-size: 12.5px;
  color: var(--text-secondary);
  line-height: 1.5;
  margin-bottom: 12px;
  word-break: break-word;
}

.task-foot {
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}

.task-meta {
  display: flex; align-items: center; gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  color: var(--text-muted);
}

.priority-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 2px 8px;
  border-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.task-card[data-priority="low"] .priority-badge {
  background: rgba(45, 212, 191, 0.12); color: var(--cyan);
}
.task-card[data-priority="medium"] .priority-badge {
  background: rgba(251, 191, 36, 0.12); color: var(--amber);
}
.task-card[data-priority="high"] .priority-badge {
  background: rgba(244, 63, 94, 0.14); color: var(--rose);
}

.task-actions {
  display: flex; gap: 4px;
  opacity: 0;
  transform: translateX(4px);
  transition: all 0.2s var(--ease);
}
.task-card:hover .task-actions {
  opacity: 1; transform: translateX(0);
}

.icon-btn {
  background: transparent; border: none;
  width: 26px; height: 26px;
  border-radius: 6px;
  display: grid; place-items: center;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s var(--ease);
}
.icon-btn:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}
.icon-btn.danger:hover {
  background: rgba(244, 63, 94, 0.15);
  color: var(--rose);
}
.icon-btn svg { width: 13px; height: 13px; }

/* Empty state */
.empty-state {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 20px;
  text-align: center;
  color: var(--text-muted);
  font-size: 12px;
  border: 1px dashed var(--border);
  border-radius: var(--radius-sm);
  margin: 6px;
}
.empty-state-icon {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--bg-elevated);
  display: grid; place-items: center;
  margin-bottom: 10px;
  color: var(--text-muted);
}

/* ============ MODAL ============ */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(6, 9, 18, 0.75);
  backdrop-filter: blur(8px);
  display: grid; place-items: center;
  padding: 20px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s var(--ease);
}
.modal-overlay.active { opacity: 1; pointer-events: all; }

.modal {
  width: 100%; max-width: 460px;
  background: var(--bg-surface);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow-lg);
  transform: translateY(20px) scale(0.96);
  transition: transform 0.3s var(--ease);
  position: relative; overflow: hidden;
}
.modal::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}
.modal-overlay.active .modal { transform: translateY(0) scale(1); }

.modal-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.modal-title {
  font-size: 18px; font-weight: 700;
  letter-spacing: -0.01em;
}

.field { margin-bottom: 16px; }
.field-label {
  display: block;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-secondary);
  margin-bottom: 7px;
  font-family: 'JetBrains Mono', monospace;
}
.field-input, .field-textarea {
  width: 100%;
  background: var(--bg-base);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 11px 13px;
  color: var(--text-primary);
  font-family: inherit; font-size: 14px;
  transition: all 0.2s var(--ease);
  resize: none;
}
.field-textarea { min-height: 80px; line-height: 1.5; }
.field-input:focus, .field-textarea:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--bg-deep);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.priority-select {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
}
.priority-opt {
  background: var(--bg-base);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  cursor: pointer;
  font-family: inherit; font-size: 12px; font-weight: 600;
  color: var(--text-secondary);
  transition: all 0.2s var(--ease);
  display: flex; align-items: center; justify-content: center; gap: 6px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.priority-opt::before {
  content: ''; width: 8px; height: 8px; border-radius: 50%;
}
.priority-opt[data-p="low"]::before { background: var(--cyan); }
.priority-opt[data-p="medium"]::before { background: var(--amber); }
.priority-opt[data-p="high"]::before { background: var(--rose); }
.priority-opt:hover { border-color: var(--border-strong); color: var(--text-primary); }
.priority-opt.selected {
  background: var(--bg-elevated);
  border-color: var(--accent);
  color: var(--text-primary);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.modal-foot {
  display: flex; gap: 8px; justify-content: flex-end;
  margin-top: 22px;
}
.btn-secondary {
  background: var(--bg-base);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 10px 16px;
  border-radius: 8px;
  font-family: inherit; font-size: 13px; font-weight: 500;
  cursor: pointer;
  transition: all 0.2s var(--ease);
}
.btn-secondary:hover {
  background: var(--bg-elevated);
  color: var(--text-primary);
  border-color: var(--border-strong);
}

/* ============ TOAST ============ */
.toast-stack {
  position: fixed; bottom: 24px; right: 24px; z-index: 300;
  display: flex; flex-direction: column; gap: 10px;
  pointer-events: none;
}
.toast {
  background: var(--bg-elevated);
  border: 1px solid var(--border-strong);
  border-radius: 10px;
  padding: 12px 16px;
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; font-weight: 500;
  color: var(--text-primary);
  box-shadow: var(--shadow-lg);
  animation: toastIn 0.3s var(--ease);
  min-width: 220px;
}
.toast.out { animation: toastOut 0.3s var(--ease) forwards; }
.toast-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--cyan);
  box-shadow: 0 0 10px var(--cyan);
}
@keyframes toastIn {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes toastOut {
  to { opacity: 0; transform: translateX(20px); }
}

/* ============ RESPONSIVE ============ */
@media (max-width: 1024px) {
  .app-header { grid-template-columns: 1fr; gap: 14px; }
  .brand { justify-content: flex-start; }
  .toolbar { margin: 0; }
}
@media (max-width: 820px) {
  .board { grid-template-columns: 1fr; padding: 16px; }
  .app-header { padding: 16px; }
  .toolbar { flex-wrap: wrap; }
  .priority-filter { width: 100%; justify-content: space-between; }
  .filter-btn { flex: 1; }
}
@media (max-width: 480px) {
  .brand-text p { display: none; }
  .modal { padding: 18px; }
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  .orb { animation: none; }
}
</style>
</head>
<body>

<div class="bg-atmosphere"></div>
<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="app">
  <header class="app-header">
    <div class="brand">
      <div class="brand-mark">N</div>
      <div class="brand-text">
        <h1>Nexus Board</h1>
        <p>Task Orchestration System</p>
      </div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input type="text" id="search" class="search-input" placeholder="Search tasks by title or description…" aria-label="Search tasks">
      </div>
      <div class="priority-filter" role="tablist" aria-label="Filter by priority">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="high">High</button>
        <button class="filter-btn" data-filter="medium">Medium</button>
        <button class="filter-btn" data-filter="low">Low</button>
      </div>
    </div>

    <button class="btn-primary" id="addBtn" aria-label="Add new task">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      New Task
    </button>
  </header>

  <main class="board" id="board">
    <section class="column" data-status="todo" aria-label="To do column">
      <div class="column-header">
        <div class="column-title">
          <span class="column-dot"></span>
          To Do
        </div>
        <span class="column-count" id="count-todo">0</span>
      </div>
      <div class="task-list" id="list-todo" data-dropzone="todo"></div>
    </section>

    <section class="column" data-status="progress" aria-label="In progress column">
      <div class="column-header">
        <div class="column-title">
          <span class="column-dot"></span>
          In Progress
        </div>
        <span class="column-count" id="count-progress">0</span>
      </div>
      <div class="task-list" id="list-progress" data-dropzone="progress"></div>
    </section>

    <section class="column" data-status="done" aria-label="Done column">
      <div class="column-header">
        <div class="column-title">
          <span class="column-dot"></span>
          Done
        </div>
        <span class="column-count" id="count-done">0</span>
      </div>
      <div class="task-list" id="list-done" data-dropzone="done"></div>
    </section>
  </main>
</div>

<!-- ============ MODAL ============ -->
<div class="modal-overlay" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal">
    <div class="modal-head">
      <h2 class="modal-title" id="modalTitle">New Task</h2>
      <button class="icon-btn" id="modalClose" aria-label="Close modal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <form id="taskForm" autocomplete="off">
      <div class="field">
        <label class="field-label" for="taskTitle">Title</label>
        <input type="text" id="taskTitle" class="field-input" placeholder="What needs to be done?" required maxlength="120">
      </div>

      <div class="field">
        <label class="field-label" for="taskDesc">Description</label>
        <textarea id="taskDesc" class="field-textarea" placeholder="Add details, context, or steps…" maxlength="500"></textarea>
      </div>

      <div class="field">
        <label class="field-label">Priority</label>
        <div class="priority-select" id="prioritySelect">
          <button type="button" class="priority-opt" data-p="low">Low</button>
          <button type="button" class="priority-opt selected" data-p="medium">Medium</button>
          <button type="button" class="priority-opt" data-p="high">High</button>
        </div>
      </div>

      <div class="modal-foot">
        <button type="button" class="btn-secondary" id="modalCancel">Cancel</button>
        <button type="submit" class="btn-primary" id="modalSubmit">Save Task</button>
      </div>
    </form>
  </div>
</div>

<!-- Toast container -->
<div class="toast-stack" id="toastStack" aria-live="polite"></div>

<script>
/* ============================================================
   NEXUS BOARD — Task Orchestration
   Single-file Kanban with localStorage persistence
============================================================ */

const STORAGE_KEY = 'nexus-board-tasks-v1';

// ---------- STATE ----------
let tasks = loadTasks();
let currentFilter = 'all';
let currentSearch = '';
let editingId = null;
let selectedPriority = 'medium';
let dragId = null;

// ---------- DOM ----------
const $ = (sel) => document.querySelector(sel);
const board = $('#board');
const modal = $('#modal');
const taskForm = $('#taskForm');
const titleInput = $('#taskTitle');
const descInput = $('#taskDesc');
const prioritySelect = $('#prioritySelect');
const searchInput = $('#search');
const toastStack = $('#toastStack');

// ---------- STORAGE ----------
function loadTasks() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { /* swallow */ }
  return seedTasks();
}

function saveTasks() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
}

function seedTasks() {
  const now = Date.now();
  return [
    { id: uid(), title: 'Define Q4 product roadmap', description: 'Align with leadership on key initiatives and quarterly OKRs for the upcoming cycle.', priority: 'high', status: 'todo', createdAt: now - 1000 * 60 * 60 * 5 },
    { id: uid(), title: 'Refine onboarding sequence', description: 'Audit the new-user journey and ship an improved activation flow.', priority: 'medium', status: 'todo', createdAt: now - 1000 * 60 * 60 * 2 },
    { id: uid(), title: 'Archive legacy documentation', description: 'Move outdated wiki pages to the archive section.', priority: 'low', status: 'todo', createdAt: now - 1000 * 60 * 30 },
    { id: uid(), title: 'Design system component audit', description: 'Inventory all UI components and identify inconsistencies across surfaces.', priority: 'high', status: 'progress', createdAt: now - 1000 * 60 * 60 * 26 },
    { id: uid(), title: 'Implement OAuth integration', description: 'Wire up the new authentication provider with proper session handling.', priority: 'medium', status: 'progress', createdAt: now - 1000 * 60 * 60 * 12 },
    { id: uid(), title: 'Launch analytics dashboard', description: 'Internal metrics portal is now live for the operations team.', priority: 'high', status: 'done', createdAt: now - 1000 * 60 * 60 * 48 },
    { id: uid(), title: 'Set up CI/CD pipeline', description: 'Automated deployments are flowing through GitHub Actions.', priority: 'medium', status: 'done', createdAt: now - 1000 * 60 * 60 * 72 }
  ];
}

function uid() {
  return 't_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 7);
}

// ---------- TIME ----------
function relativeTime(ts) {
  const diff = Date.now() - ts;
  const sec = Math.floor(diff / 1000);
  const min = Math.floor(sec / 60);
  const hr = Math.floor(min / 60);
  const day = Math.floor(hr / 24);
  if (sec < 60) return 'just now';
  if (min < 60) return min + 'm ago';
  if (hr < 24) return hr + 'h ago';
  if (day === 1) return 'yesterday';
  if (day < 7) return day + 'd ago';
  return new Date(ts).toLocaleDateString('en', { month: 'short', day: 'numeric' });
}

// ---------- RENDER ----------
function render() {
  const lists = { todo: [], progress: [], done: [] };
  const filtered = tasks.filter(matchesFilters);
  for (const t of filtered) lists[t.status].push(t);

  // Sort each list: high → medium → low, then newest first
  const pOrder = { high: 0, medium: 1, low: 2 };
  for (const k of Object.keys(lists)) {
    lists[k].sort((a, b) => {
      const p = pOrder[a.priority] - pOrder[b.priority];
      if (p !== 0) return p;
      return b.createdAt - a.createdAt;
    });
  }

  for (const status of ['todo', 'progress', 'done']) {
    const container = document.getElementById('list-' + status);
    const countEl = document.getElementById('count-' + status);
    const totalInColumn = tasks.filter(t => t.status === status).length;
    countEl.textContent = totalInColumn;
    container.innerHTML = '';

    if (lists[status].length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      const isFiltering = currentSearch || currentFilter !== 'all';
      empty.innerHTML = `
        <div class="empty-state-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M9 11l3 3 8-8M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/></svg>
        </div>
        ${isFiltering ? 'No tasks match your filters' : 'Drop tasks here'}
      `;
      container.appendChild(empty);
      continue;
    }

    for (const task of lists[status]) {
      container.appendChild(buildCard(task));
    }
  }
}

function matchesFilters(task) {
  if (currentFilter !== 'all' && task.priority !== currentFilter) return false;
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    if (!task.title.toLowerCase().includes(q) &&
        !task.description.toLowerCase().includes(q)) return false;
  }
  return true;
}

function buildCard(task) {
  const card = document.createElement('article');
  card.className = 'task-card';
  card.dataset.id = task.id;
  card.dataset.priority = task.priority;
  card.dataset.status = task.status;
  card.draggable = true;

  card.innerHTML = `
    <div class="priority-bar"></div>
    <div class="task-head">
      <div class="task-title">${escapeHTML(task.title)}</div>
    </div>
    ${task.description ? `<div class="task-desc">${escapeHTML(task.description)}</div>` : ''}
    <div class="task-foot">
      <div class="task-meta">
        <span class="priority-badge">${task.priority}</span>
        <span>·</span>
        <span>${relativeTime(task.createdAt)}</span>
      </div>
      <div class="task-actions">
        <button class="icon-btn" data-action="edit" aria-label="Edit task">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="icon-btn danger" data-action="delete" aria-label="Delete task">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        </button>
      </div>
    </div>
  `;

  // Drag events
  card.addEventListener('dragstart', (e) => {
    dragId = task.id;
    card.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', task.id);
  });
  card.addEventListener('dragend', () => {
    card.classList.remove('dragging');
    dragId = null;
    document.querySelectorAll('.column.drag-over').forEach(c => c.classList.remove('drag-over'));
  });

  // Action buttons
  card.querySelector('[data-action="edit"]').addEventListener('click', (e) => {
    e.stopPropagation();
    openModal(task);
  });
  card.querySelector('[data-action="delete"]').addEventListener('click', (e) => {
    e.stopPropagation();
    deleteTask(task.id);
  });

  return card;
}

function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

// ---------- CRUD ----------
function addTask(data) {
  tasks.push({
    id: uid(),
    title: data.title.trim(),
    description: data.description.trim(),
    priority: data.priority,
    status: 'todo',
    createdAt: Date.now()
  });
  saveTasks();
  render();
  toast('Task created');
}

function updateTask(id, data) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  t.title = data.title.trim();
  t.description = data.description.trim();
  t.priority = data.priority;
  saveTasks();
  render();
  toast('Task updated');
}

function deleteTask(id) {
  const card = document.querySelector(`.task-card[data-id="${id}"]`);
  if (card) {
    card.style.transition = 'all 0.25s var(--ease)';
    card.style.transform = 'translateX(-20px) scale(0.95)';
    card.style.opacity = '0';
    setTimeout(() => {
      tasks = tasks.filter(t => t.id !== id);
      saveTasks();
      render();
      toast('Task removed');
    }, 220);
  } else {
    tasks = tasks.filter(t => t.id !== id);
    saveTasks();
    render();
  }
}

function moveTask(id, newStatus) {
  const t = tasks.find(x => x.id === id);
  if (!t || t.status === newStatus) return false;
  t.status = newStatus;
  saveTasks();
  render();
  return true;
}

// ---------- MODAL ----------
function openModal(task) {
  editingId = task ? task.id : null;
  $('#modalTitle').textContent = task ? 'Edit Task' : 'New Task';
  $('#modalSubmit').textContent = task ? 'Update Task' : 'Save Task';
  titleInput.value = task ? task.title : '';
  descInput.value = task ? task.description : '';
  selectPriority(task ? task.priority : 'medium');
  modal.classList.add('active');
  setTimeout(() => titleInput.focus(), 50);
}

function closeModal() {
  modal.classList.remove('active');
  editingId = null;
}

function selectPriority(p) {
  selectedPriority = p;
  prioritySelect.querySelectorAll('.priority-opt').forEach(b => {
    b.classList.toggle('selected', b.dataset.p === p);
  });
}

prioritySelect.addEventListener('click', (e) => {
  const btn = e.target.closest('.priority-opt');
  if (!btn) return;
  selectPriority(btn.dataset.p);
});

$('#addBtn').addEventListener('click', () => openModal(null));
$('#modalClose').addEventListener('click', closeModal);
$('#modalCancel').addEventListener('click', closeModal);
modal.addEventListener('click', (e) => {
  if (e.target === modal) closeModal();
});

taskForm.addEventListener('submit', (e) => {
  e.preventDefault();
  const title = titleInput.value.trim();
  if (!title) {
    titleInput.focus();
    titleInput.style.borderColor = 'var(--rose)';
    setTimeout(() => titleInput.style.borderColor = '', 1200);
    return;
  }
  const data = { title, description: descInput.value, priority: selectedPriority };
  if (editingId) updateTask(editingId, data);
  else addTask(data);
  closeModal();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && modal.classList.contains('active')) closeModal();
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    searchInput.focus();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
    e.preventDefault();
    openModal(null);
  }
});

// ---------- SEARCH & FILTER ----------
searchInput.addEventListener('input', (e) => {
  currentSearch = e.target.value.trim();
  render();
});

document.querySelector('.priority-filter').addEventListener('click', (e) => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter;
  render();
});

// ---------- DRAG & DROP ----------
document.querySelectorAll('.column').forEach(col => {
  const list = col.querySelector('.task-list');
  col.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    col.classList.add('drag-over');
  });
  col.addEventListener('dragleave', (e) => {
    // Only remove if leaving the column entirely
    if (!col.contains(e.relatedTarget)) {
      col.classList.remove('drag-over');
    }
  });
  col.addEventListener('drop', (e) => {
    e.preventDefault();
    col.classList.remove('drag-over');
    const id = e.dataTransfer.getData('text/plain') || dragId;
    if (!id) return;
    const newStatus = col.dataset.status;
    if (moveTask(id, newStatus)) {
      toast(`Moved to ${statusLabel(newStatus)}`);
    }
  });
});

function statusLabel(s) {
  return { todo: 'To Do', progress: 'In Progress', done: 'Done' }[s] || s;
}

// ---------- TOAST ----------
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<span class="toast-dot"></span>${escapeHTML(msg)}`;
  toastStack.appendChild(el);
  setTimeout(() => {
    el.classList.add('out');
    setTimeout(() => el.remove(), 300);
  }, 2200);
}

// ---------- INIT ----------
render();

// Refresh relative timestamps every minute
setInterval(() => {
  document.querySelectorAll('.task-card').forEach(card => {
    const id = card.dataset.id;
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    const meta = card.querySelector('.task-meta');
    if (meta) {
      const span = meta.children[2];
      if (span) span.textContent = relativeTime(task.createdAt);
    }
  });
}, 60000);
</script>
</body>
</html>
