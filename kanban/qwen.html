<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KanbanFlow - Dark Mode Task Manager</title>
    <style>
        :root {
            /* Color Palette - Dark Theme */
            --bg-body: #121212;
            --bg-column: #1e1e1e;
            --bg-card: #2c2c2c;
            --bg-input: #333333;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent-color: #bb86fc;
            --accent-hover: #9965f4;
            --danger-color: #cf6679;
            --success-color: #03dac6;
            
            /* Priority Colors */
            --prio-low: #4caf50;
            --prio-med: #ff9800;
            --prio-high: #f44336;

            /* Spacing & Radius */
            --radius: 8px;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            --transition: all 0.2s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header & Controls */
        header {
            padding: 1rem 2rem;
            background-color: var(--bg-column);
            box-shadow: var(--shadow);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            z-index: 10;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 1px;
        }
        h1 span { color: var(--accent-color); font-weight: 700; }

        .controls {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            background-color: var(--bg-input);
            border: 1px solid #444;
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: var(--radius);
            outline: none;
            width: 200px;
            transition: var(--transition);
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        button.primary-btn {
            background-color: var(--accent-color);
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        button.primary-btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        /* Board Layout */
        .board {
            display: flex;
            flex: 1;
            padding: 2rem;
            gap: 1.5rem;
            overflow-x: auto;
        }

        .column {
            flex: 1;
            min-width: 300px;
            background-color: var(--bg-column);
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 100px);
            box-shadow: var(--shadow);
        }

        .column-header {
            padding: 1rem;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .column-header h2 {
            font-size: 1.1rem;
            color: var(--text-secondary);
        }

        .badge {
            background-color: var(--bg-input);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
        }

        .task-list {
            padding: 1rem;
            flex: 1;
            overflow-y: auto;
            min-height: 100px; /* Target for drop */
            transition: background-color 0.2s;
        }

        .task-list.drag-over {
            background-color: rgba(187, 134, 252, 0.05);
            border: 2px dashed var(--accent-color);
            border-radius: var(--radius);
        }

        /* Task Card */
        .task-card {
            background-color: var(--bg-card);
            border-radius: var(--radius);
            padding: 1rem;
            margin-bottom: 1rem;
            box-shadow: var(--shadow);
            cursor: grab;
            transition: var(--transition);
            position: relative;
            border-left: 4px solid transparent;
        }

        .task-card:hover {
            transform: translateY(-2px);
            background-color: #353535;
        }

        .task-card.dragging {
            opacity: 0.5;
            cursor: grabbing;
            border: 1px dashed var(--text-secondary);
        }

        /* Priority Indicators */
        .priority-high { border-left-color: var(--prio-high); }
        .priority-medium { border-left-color: var(--prio-med); }
        .priority-low { border-left-color: var(--prio-low); }

        .card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .priority-tag {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;
            color: #fff;
        }

        .p-high { background-color: var(--prio-high); }
        .p-med { background-color: var(--prio-med); }
        .p-low { background-color: var(--prio-low); }

        .card-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 1rem;
        }

        .card-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: #666;
        }

        .card-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
        }

        .icon-btn:hover {
            background-color: rgba(255,255,255,0.1);
            color: var(--text-primary);
        }

        .icon-btn.delete:hover { color: var(--danger-color); }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background-color: var(--bg-column);
            padding: 2rem;
            border-radius: var(--radius);
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transform: translateY(20px);
            transition: transform 0.3s;
        }

        .modal-overlay.open .modal {
            transform: translateY(0);
        }

        .modal h2 { margin-bottom: 1.5rem; color: var(--accent-color); }

        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-secondary); }
        
        .form-control {
            width: 100%;
            padding: 10px;
            background-color: var(--bg-input);
            border: 1px solid #444;
            border-radius: var(--radius);
            color: var(--text-primary);
        }

        select.form-control { cursor: pointer; }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 1.5rem;
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid var(--text-secondary);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: var(--radius);
            cursor: pointer;
        }
        .btn-cancel:hover { border-color: var(--text-primary); color: var(--text-primary); }

        /* Responsive */
        @media (max-width: 768px) {
            .board { flex-direction: column; overflow-y: auto; }
            .column { min-height: 300px; max-height: none; }
            header { flex-direction: column; align-items: stretch; }
            .controls { flex-direction: column; }
            input[type="text"] { width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Kanban<span>Flow</span></h1>
        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search tasks..." oninput="renderBoard()">
            <button class="primary-btn" onclick="openModal()">+ New Task</button>
        </div>
    </header>

    <div class="board">
        <!-- To Do Column -->
        <div class="column" id="col-todo">
            <div class="column-header">
                <h2>To Do</h2>
                <span class="badge" id="count-todo">0</span>
            </div>
            <div class="task-list" id="list-todo" ondrop="drop(event)" ondragover="allowDrop(event)">
                <!-- Tasks injected here -->
            </div>
        </div>

        <!-- In Progress Column -->
        <div class="column" id="col-progress">
            <div class="column-header">
                <h2>In Progress</h2>
                <span class="badge" id="count-progress">0</span>
            </div>
            <div class="task-list" id="list-progress" ondrop="drop(event)" ondragover="allowDrop(event)">
                <!-- Tasks injected here -->
            </div>
        </div>

        <!-- Done Column -->
        <div class="column" id="col-done">
            <div class="column-header">
                <h2>Done</h2>
                <span class="badge" id="count-done">0</span>
            </div>
            <div class="task-list" id="list-done" ondrop="drop(event)" ondragover="allowDrop(event)">
                <!-- Tasks injected here -->
            </div>
        </div>
    </div>

    <!-- Modal Form -->
    <div class="modal-overlay" id="taskModal">
        <div class="modal">
            <h2 id="modalTitle">Add New Task</h2>
            <form id="taskForm" onsubmit="handleFormSubmit(event)">
                <input type="hidden" id="taskId">
                <input type="hidden" id="taskStatus">
                
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" class="form-control" required placeholder="Task title">
                </div>
                
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" class="form-control" rows="3" placeholder="Details..."></textarea>
                </div>

                <div class="form-group">
                    <label for="priority">Priority</label>
                    <select id="priority" class="form-control">
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="primary-btn">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // State Management
        let tasks = JSON.parse(localStorage.getItem('kanban-tasks')) || [];
        let draggedTaskId = null;

        // DOM Elements
        const modal = document.getElementById('taskModal');
        const taskForm = document.getElementById('taskForm');
        const modalTitle = document.getElementById('modalTitle');

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            renderBoard();
        });

        // --- Core Logic ---

        function saveToLocal() {
            localStorage.setItem('kanban-tasks', JSON.stringify(tasks));
            renderBoard();
        }

        function renderBoard() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            // Clear columns
            ['todo', 'progress', 'done'].forEach(status => {
                document.getElementById(`list-${status}`).innerHTML = '';
            });

            // Filter tasks
            const filteredTasks = tasks.filter(task => 
                task.title.toLowerCase().includes(searchTerm) || 
                task.description.toLowerCase().includes(searchTerm)
            );

            // Update Counts
            // Note: Counts reflect filtered results if searching, or total if not.
            // For better UX, let's count filtered items in columns.
            const counts = { todo: 0, progress: 0, done: 0 };

            filteredTasks.forEach(task => {
                counts[task.status]++;
                const card = createTaskElement(task);
                document.getElementById(`list-${task.status}`).appendChild(card);
            });

            // Update Badges
            document.getElementById('count-todo').textContent = counts.todo;
            document.getElementById('count-progress').textContent = counts.progress;
            document.getElementById('count-done').textContent = counts.done;
        }

        function createTaskElement(task) {
            const div = document.createElement('div');
            div.className = `task-card priority-${task.priority.toLowerCase()}`;
            div.draggable = true;
            div.id = `task-${task.id}`;
            
            // Drag Events
            div.addEventListener('dragstart', (e) => {
                draggedTaskId = task.id;
                div.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
            });

            div.addEventListener('dragend', () => {
                div.classList.remove('dragging');
                draggedTaskId = null;
                // Remove visual cue from all lists
                document.querySelectorAll('.task-list').forEach(list => list.classList.remove('drag-over'));
            });

            const timeAgo = getTimeAgo(new Date(task.timestamp));

            div.innerHTML = `
                <div class="card-header">
                    <span class="priority-tag p-${task.priority === 'Medium' ? 'med' : (task.priority === 'High' ? 'high' : 'low')}">${task.priority}</span>
                </div>
                <div class="card-title">${escapeHtml(task.title)}</div>
                <div class="card-desc">${escapeHtml(task.description)}</div>
                <div class="card-footer">
                    <span>${timeAgo}</span>
                    <div class="card-actions">
                        <button class="icon-btn" onclick="editTask('${task.id}')">✎</button>
                        <button class="icon-btn delete" onclick="deleteTask('${task.id}')">🗑</button>
                    </div>
                </div>
            `;
            return div;
        }

        // --- Drag and Drop Logic ---

        function allowDrop(ev) {
            ev.preventDefault();
            ev.currentTarget.classList.add('drag-over');
        }

        function drop(ev) {
            ev.preventDefault();
            const list = ev.currentTarget;
            list.classList.remove('drag-over');

            if (draggedTaskId) {
                // Determine new status based on column ID
                const newStatus = list.id.replace('list-', '');
                
                // Update Data
                const taskIndex = tasks.findIndex(t => t.id === draggedTaskId);
                if (taskIndex > -1) {
                    tasks[taskIndex].status = newStatus;
                    saveToLocal();
                }
            }
        }

        // --- CRUD Operations ---

        function handleFormSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('taskId').value;
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const priority = document.getElementById('priority').value;
            const status = document.getElementById('taskStatus').value;

            if (id) {
                // Edit
                const taskIndex = tasks.findIndex(t => t.id === id);
                if (taskIndex > -1) {
                    tasks[taskIndex].title = title;
                    tasks[taskIndex].description = description;
                    tasks[taskIndex].priority = priority;
                    // Keep original timestamp or update? usually keep created, add modified. keeping simple here.
                }
            } else {
                // Create
                const newTask = {
                    id: Date.now().toString(),
                    title,
                    description,
                    priority,
                    status: status || 'todo', // Default to todo if new
                    timestamp: Date.now()
                };
                tasks.push(newTask);
            }

            saveToLocal();
            closeModal();
        }

        function deleteTask(id) {
            if(confirm('Are you sure you want to delete this task?')) {
                tasks = tasks.filter(t => t.id !== id);
                saveToLocal();
            }
        }

        function editTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                openModal(task);
            }
        }

        // --- Modal Handling ---

        function openModal(task = null) {
            if (task) {
                modalTitle.textContent = 'Edit Task';
                document.getElementById('taskId').value = task.id;
                document.getElementById('title').value = task.title;
                document.getElementById('description').value = task.description;
                document.getElementById('priority').value = task.priority;
                document.getElementById('taskStatus').value = task.status;
            } else {
                modalTitle.textContent = 'Add New Task';
                taskForm.reset();
                document.getElementById('taskId').value = '';
                document.getElementById('taskStatus').value = 'todo';
            }
            modal.classList.add('open');
        }

        function closeModal() {
            modal.classList.remove('open');
        }

        // Close modal on outside click
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        // --- Utilities ---

        function escapeHtml(text) {
            if (!text) return "";
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function getTimeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            let interval = seconds / 31536000;
            if (interval > 1) return Math.floor(interval) + " years ago";
            interval = seconds / 2592000;
            if (interval > 1) return Math.floor(interval) + " months ago";
            interval = seconds / 86400;
            if (interval > 1) return Math.floor(interval) + " days ago";
            interval = seconds / 3600;
            if (interval > 1) return Math.floor(interval) + " hours ago";
            interval = seconds / 60;
            if (interval > 1) return Math.floor(interval) + " mins ago";
            return "Just now";
        }
    </script>
</body>
</html>
