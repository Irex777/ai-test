<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Todo Board</title>
    <style>
        :root {
            --bg-body: #121212;
            --bg-column: #1e1e1e;
            --bg-card: #2c2c2c;
            --bg-input: #333333;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --border-color: #444444;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --danger-color: #ef4444;
            --success-color: #22c55e;
            
            --priority-low: #22c55e;
            --priority-med: #eab308;
            --priority-high: #ef4444;

            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            --radius: 8px;
            --transition: all 0.2s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header & Controls */
        header {
            padding: 1rem 2rem;
            background-color: var(--bg-column);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-color);
        }

        .controls {
            display: flex;
            gap: 1rem;
        }

        input[type="text"] {
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.5rem 1rem;
            border-radius: var(--radius);
            outline: none;
            width: 250px;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        button {
            cursor: pointer;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: var(--radius);
            font-weight: 600;
            transition: var(--transition);
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
        }

        /* Board Layout */
        .board {
            display: flex;
            flex: 1;
            padding: 2rem;
            gap: 1.5rem;
            overflow-x: auto;
        }

        .column {
            flex: 1;
            min-width: 300px;
            background-color: var(--bg-column);
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            max-height: 100%;
            border: 1px solid var(--border-color);
        }

        .column-header {
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            border-radius: var(--radius) var(--radius) 0 0;
        }

        .column-title {
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .count-badge {
            background-color: var(--bg-input);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .task-list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* Task Cards */
        .task-card {
            background-color: var(--bg-card);
            padding: 1rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border-left: 4px solid transparent;
            transition: var(--transition);
            position: relative;
            cursor: grab;
            animation: fadeIn 0.3s ease-out;
        }

        .task-card:active {
            cursor: grabbing;
        }

        .task-card.dragging {
            opacity: 0.5;
            transform: scale(0.98);
        }

        .task-card[data-priority="High"] { border-left-color: var(--priority-high); }
        .task-card[data-priority="Medium"] { border-left-color: var(--priority-med); }
        .task-card[data-priority="Low"] { border-left-color: var(--priority-low); }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.5rem;
        }

        .task-title {
            font-weight: 600;
            font-size: 1rem;
            line-height: 1.4;
        }

        .task-actions {
            display: flex;
            gap: 0.5rem;
            opacity: 0;
            transition: var(--transition);
        }

        .task-card:hover .task-actions {
            opacity: 1;
        }

        .icon-btn {
            background: transparent;
            color: var(--text-muted);
            padding: 4px;
            font-size: 0.9rem;
        }

        .icon-btn:hover {
            color: var(--text-main);
            background-color: rgba(255,255,255,0.1);
        }

        .icon-btn.delete:hover {
            color: var(--danger-color);
        }

        .task-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            white-space: pre-wrap;
        }

        .task-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: auto;
        }

        .priority-tag {
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 0.65rem;
        }
        
        .priority-tag.high { background: rgba(239, 68, 68, 0.2); color: var(--priority-high); }
        .priority-tag.medium { background: rgba(234, 179, 8, 0.2); color: var(--priority-med); }
        .priority-tag.low { background: rgba(34, 197, 94, 0.2); color: var(--priority-low); }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition);
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: var(--bg-column);
            padding: 2rem;
            border-radius: var(--radius);
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transform: translateY(20px);
            transition: var(--transition);
        }

        .modal-overlay.active .modal {
            transform: translateY(0);
        }

        .modal h2 {
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.75rem;
            border-radius: var(--radius);
            outline: none;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-group select {
            cursor: pointer;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
        }
        
        .btn-secondary:hover {
            background-color: rgba(255,255,255,0.05);
            color: var(--text-main);
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-body);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .board {
                flex-direction: column;
                overflow-y: auto;
                overflow-x: hidden;
            }
            .column {
                min-width: 100%;
                max-height: none;
            }
            .task-list {
                max-height: 300px; /* Scroll individual columns on mobile */
            }
            .controls {
                width: 100%;
            }
            input[type="text"] {
                flex: 1;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Kanban Board</h1>
        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search tasks...">
            <button class="btn-primary" onclick="openModal()">+ New Task</button>
        </div>
    </header>

    <div class="board">
        <!-- To Do Column -->
        <div class="column" id="col-todo" ondragover="allowDrop(event)" ondrop="drop(event)">
            <div class="column-header">
                <span class="column-title">To Do</span>
                <span class="count-badge" id="count-todo">0</span>
            </div>
            <div class="task-list" id="list-todo">
                <!-- Tasks go here -->
            </div>
        </div>

        <!-- In Progress Column -->
        <div class="column" id="col-progress" ondragover="allowDrop(event)" ondrop="drop(event)">
            <div class="column-header">
                <span class="column-title">In Progress</span>
                <span class="count-badge" id="count-progress">0</span>
            </div>
            <div class="task-list" id="list-progress">
                <!-- Tasks go here -->
            </div>
        </div>

        <!-- Done Column -->
        <div class="column" id="col-done" ondragover="allowDrop(event)" ondrop="drop(event)">
            <div class="column-header">
                <span class="column-title">Done</span>
                <span class="count-badge" id="count-done">0</span>
            </div>
            <div class="task-list" id="list-done">
                <!-- Tasks go here -->
            </div>
        </div>
    </div>

    <!-- Modal for Add/Edit -->
    <div class="modal-overlay" id="taskModal">
        <div class="modal">
            <h2 id="modalTitle">Add Task</h2>
            <form id="taskForm" onsubmit="handleFormSubmit(event)">
                <input type="hidden" id="taskId">
                <div class="form-group">
                    <label for="inputTitle">Title</label>
                    <input type="text" id="inputTitle" required placeholder="Task title">
                </div>
                <div class="form-group">
                    <label for="inputDesc">Description</label>
                    <textarea id="inputDesc" placeholder="Details about the task..."></textarea>
                </div>
                <div class="form-group">
                    <label for="inputPriority">Priority</label>
                    <select id="inputPriority">
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-primary" id="saveBtn">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- State Management ---
        let tasks = JSON.parse(localStorage.getItem('kanban_tasks')) || [];
        let draggedTaskId = null;

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            renderBoard();
            
            // Search Listener
            document.getElementById('searchInput').addEventListener('input', (e) => {
                renderBoard(e.target.value);
            });
        });

        function saveTasks() {
            localStorage.setItem('kanban_tasks', JSON.stringify(tasks));
            renderBoard(document.getElementById('searchInput').value);
        }

        // --- Rendering ---
        function renderBoard(filterText = '') {
            const columns = {
                'todo': document.getElementById('list-todo'),
                'progress': document.getElementById('list-progress'),
                'done': document.getElementById('list-done')
            };
            
            // Clear columns
            Object.values(columns).forEach(col => col.innerHTML = '');

            // Reset counts
            const counts = { 'todo': 0, 'progress': 0, 'done': 0 };

            // Filter tasks
            const filteredTasks = tasks.filter(task => {
                const searchLower = filterText.toLowerCase();
                return task.title.toLowerCase().includes(searchLower) || 
                       task.description.toLowerCase().includes(searchLower);
            });

            // Render tasks
            filteredTasks.forEach(task => {
                const card = createTaskElement(task);
                columns[task.status].appendChild(card);
                counts[task.status]++;
            });

            // Update counts
            document.getElementById('count-todo').textContent = counts['todo'];
            document.getElementById('count-progress').textContent = counts['progress'];
            document.getElementById('count-done').textContent = counts['done'];
        }

        function createTaskElement(task) {
            const div = document.createElement('div');
            div.className = 'task-card';
            div.draggable = true;
            div.dataset.id = task.id;
            div.dataset.priority = task.priority;
            
            // Drag Events
            div.addEventListener('dragstart', (e) => {
                draggedTaskId = task.id;
                div.classList.add('dragging');
                e.dataTransfer.effectAllowed = "move";
            });

            div.addEventListener('dragend', () => {
                div.classList.remove('dragging');
                draggedTaskId = null;
            });

            // Date formatting
            const createdDate = new Date(task.createdAt).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });

            div.innerHTML = `
                <div class="task-header">
                    <div class="task-title">${escapeHtml(task.title)}</div>
                    <div class="task-actions">
                        <button class="icon-btn" onclick="editTask('${task.id}')">✎</button>
                        <button class="icon-btn delete" onclick="deleteTask('${task.id}')">✕</button>
                    </div>
                </div>
                <div class="task-desc">${escapeHtml(task.description)}</div>
                <div class="task-meta">
                    <span class="priority-tag ${task.priority.toLowerCase()}">${task.priority}</span>
                    <span>${createdDate}</span>
                </div>
            `;
            return div;
        }

        // --- Drag and Drop Logic ---
        function allowDrop(ev) {
            ev.preventDefault();
            // Visual feedback could be added here
        }

        function drop(ev) {
            ev.preventDefault();
            if (!draggedTaskId) return;

            // Find the closest column element
            const dropColumn = ev.target.closest('.column');
            if (!dropColumn) return;

            const newStatus = dropColumn.id.replace('col-', ''); // e.g., 'col-todo' -> 'todo'

            // Update Data
            const taskIndex = tasks.findIndex(t => t.id === draggedTaskId);
            if (taskIndex > -1) {
                tasks[taskIndex].status = newStatus;
                saveTasks();
            }
        }

        // --- CRUD Operations ---
        function handleFormSubmit(e) {
            e.preventDefault();
            
            const id = document.getElementById('taskId').value;
            const title = document.getElementById('inputTitle').value;
            const desc = document.getElementById('inputDesc').value;
            const priority = document.getElementById('inputPriority').value;

            if (id) {
                // Edit
                const index = tasks.findIndex(t => t.id === id);
                if (index > -1) {
                    tasks[index].title = title;
                    tasks[index].description = desc;
                    tasks[index].priority = priority;
                }
            } else {
                // Add New
                const newTask = {
                    id: Date.now().toString(),
                    title,
                    description: desc,
                    priority,
                    status: 'todo', // Default column
                    createdAt: Date.now()
                };
                tasks.push(newTask);
            }

            closeModal();
            saveTasks();
        }

        function deleteTask(id) {
            if(confirm('Are you sure you want to delete this task?')) {
                tasks = tasks.filter(t => t.id !== id);
                saveTasks();
            }
        }

        function editTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                document.getElementById('taskId').value = task.id;
                document.getElementById('inputTitle').value = task.title;
                document.getElementById('inputDesc').value = task.description;
                document.getElementById('inputPriority').value = task.priority;
                
                document.getElementById('modalTitle').textContent = 'Edit Task';
                document.getElementById('saveBtn').textContent = 'Update Task';
                
                document.getElementById('taskModal').classList.add('active');
            }
        }

        // --- Modal Handling ---
        function openModal() {
            document.getElementById('taskForm').reset();
            document.getElementById('taskId').value = '';
            document.getElementById('modalTitle').textContent = 'Add New Task';
            document.getElementById('saveBtn').textContent = 'Save Task';
            document.getElementById('taskModal').classList.add('active');
            document.getElementById('inputTitle').focus();
        }

        function closeModal() {
            document.getElementById('taskModal').classList.remove('active');
        }

        // Close modal if clicking outside
        document.getElementById('taskModal').addEventListener('click', (e) => {
            if (e.target.id === 'taskModal') closeModal();
        });

        // --- Utilities ---
        function escapeHtml(text) {
            if (!text) return "";
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
