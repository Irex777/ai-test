<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanban Board</title>
<style>
  :root {
    --bg-primary: #0f1117;
    --bg-secondary: #1a1d27;
    --bg-card: #20232e;
    --bg-column: #161820;
    --border: #2a2d3e;
    --border-hover: #3d4166;
    --text-primary: #e2e8f0;
    --text-secondary: #8892a4;
    --text-muted: #555e72;
    --accent: #6366f1;
    --accent-hover: #818cf8;
    --accent-dim: #6366f120;
    --low: #22c55e;
    --low-bg: #22c55e18;
    --medium: #f59e0b;
    --medium-bg: #f59e0b18;
    --high: #ef4444;
    --high-bg: #ef444418;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
    --radius: 10px;
    --radius-sm: 6px;
    --transition: 0.18s ease;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  header {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .logo {
    font-size: 1.1rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }
  .logo-icon {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .search-wrap {
    flex: 1;
    min-width: 160px;
    max-width: 320px;
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }
  #searchInput {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-size: 0.875rem;
    padding: 8px 12px 8px 34px;
    outline: none;
    transition: border-color var(--transition);
  }
  #searchInput:focus { border-color: var(--accent); }
  #searchInput::placeholder { color: var(--text-muted); }
  .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 0.78rem;
    font-weight: 500;
    padding: 6px 12px;
    transition: all var(--transition);
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--border-hover); color: var(--text-primary); }
  .filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent-hover); }
  .btn-add {
    background: var(--accent);
    border: none;
    border-radius: var(--radius-sm);
    color: #fff;
    cursor: pointer;
    font-size: 0.875rem;
    font-weight: 600;
    padding: 8px 18px;
    transition: background var(--transition), transform var(--transition);
    white-space: nowrap;
    display: flex; align-items: center; gap: 6px;
    margin-left: auto;
  }
  .btn-add:hover { background: var(--accent-hover); transform: translateY(-1px); }
  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    padding: 24px;
    min-height: calc(100vh - 65px);
    align-items: start;
  }
  @media (max-width: 800px) {
    .board { grid-template-columns: 1fr; padding: 12px; }
  }
  .column {
    background: var(--bg-column);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    min-height: 300px;
    transition: border-color var(--transition);
  }
  .column.drag-over {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-dim);
  }
  .column-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .column-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .col-todo .column-dot    { background: #6366f1; }
  .col-progress .column-dot { background: #f59e0b; }
  .col-done .column-dot   { background: #22c55e; }
  .column-title {
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text-secondary);
    flex: 1;
  }
  .column-count {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-muted);
    font-size: 0.75rem;
    font-weight: 600;
    min-width: 24px;
    padding: 2px 8px;
    text-align: center;
  }
  .cards-area {
    flex: 1;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 120px;
  }
  .drop-placeholder {
    border: 2px dashed var(--accent);
    border-radius: var(--radius-sm);
    height: 76px;
    opacity: 0.45;
    pointer-events: none;
  }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: grab;
    padding: 12px;
    transition: all var(--transition);
    animation: cardIn 0.22s ease;
    user-select: none;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card:hover {
    border-color: var(--border-hover);
    box-shadow: var(--shadow);
    transform: translateY(-2px);
  }
  .card.dragging {
    opacity: 0.3;
    cursor: grabbing;
    transform: scale(0.96);
    border-color: var(--accent);
  }
  .card.hidden { display: none; }
  .card-top { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
  .priority-badge {
    border-radius: 4px;
    font-size: 0.66rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    padding: 2px 7px;
    text-transform: uppercase;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .priority-low    { background: var(--low-bg);    color: var(--low); }
  .priority-medium { background: var(--medium-bg); color: var(--medium); }
  .priority-high   { background: var(--high-bg);   color: var(--high); }
  .card-title {
    font-size: 0.88rem;
    font-weight: 600;
    line-height: 1.35;
    flex: 1;
    word-break: break-word;
  }
  .card-desc {
    color: var(--text-secondary);
    font-size: 0.78rem;
    line-height: 1.45;
    margin-bottom: 10px;
    word-break: break-word;
  }
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .card-time { color: var(--text-muted); font-size: 0.7rem; }
  .card-actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity var(--transition);
  }
  .card:hover .card-actions { opacity: 1; }
  .action-btn {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-secondary);
    cursor: pointer;
    padding: 3px 7px;
    font-size: 0.7rem;
    font-family: inherit;
    transition: all var(--transition);
    display: flex; align-items: center; gap: 3px;
  }
  .action-btn:hover { border-color: var(--border-hover); color: var(--text-primary); }
  .action-btn.del:hover { border-color: var(--high); color: var(--high); }
  .modal-backdrop {
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(4px);
    display: none;
    inset: 0;
    place-items: center;
    position: fixed;
    z-index: 999;
  }
  .modal-backdrop.open { display: grid; }
  .modal {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 28px;
    width: min(480px, 94vw);
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-title {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-close {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 1.2rem;
    line-height: 1;
    padding: 2px 6px;
    transition: color var(--transition);
  }
  .modal-close:hover { color: var(--text-primary); }
  .form-group { margin-bottom: 16px; }
  label {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 6px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  input[type="text"], textarea, select {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-family: inherit;
    font-size: 0.875rem;
    outline: none;
    padding: 9px 12px;
    transition: border-color var(--transition);
  }
  input[type="text"]:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { min-height: 80px; resize: vertical; }
  select option { background: var(--bg-card); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 22px;
  }
  .btn {
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-family: inherit;
    font-size: 0.875rem;
    font-weight: 600;
    padding: 9px 20px;
    transition: all var(--transition);
    border: none;
  }
  .btn-ghost {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-secondary);
  }
  .btn-ghost:hover { border-color: var(--border-hover); color: var(--text-primary); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
  .empty {
    color: var(--text-muted);
    font-size: 0.8rem;
    padding: 24px;
    text-align: center;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">&#9783;</div>
    Kanban
  </div>
  <div class="search-wrap">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="searchInput" placeholder="Search tasks… (⌘K)">
  </div>
  <div class="filter-group">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="low" style="color:var(--low)">Low</button>
    <button class="filter-btn" data-filter="medium" style="color:var(--medium)">Med</button>
    <button class="filter-btn" data-filter="high" style="color:var(--high)">High</button>
  </div>
  <button class="btn-add" onclick="openModal()">
    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    New Task
  </button>
</header>

<div class="board">
  <div class="column col-todo" data-col="todo">
    <div class="column-header">
      <div class="column-dot"></div>
      <div class="column-title">To Do</div>
      <div class="column-count" id="count-todo">0</div>
    </div>
    <div class="cards-area" id="area-todo"></div>
  </div>
  <div class="column col-progress" data-col="progress">
    <div class="column-header">
      <div class="column-dot"></div>
      <div class="column-title">In Progress</div>
      <div class="column-count" id="count-progress">0</div>
    </div>
    <div class="cards-area" id="area-progress"></div>
  </div>
  <div class="column col-done" data-col="done">
    <div class="column-header">
      <div class="column-dot"></div>
      <div class="column-title">Done</div>
      <div class="column-count" id="count-done">0</div>
    </div>
    <div class="cards-area" id="area-done"></div>
  </div>
</div>

<div class="modal-backdrop" id="modalBackdrop" onclick="onBackdropClick(event)">
  <div class="modal">
    <div class="modal-title">
      <span id="modalHeading">New Task</span>
      <button class="modal-close" onclick="closeModal()">&#10005;</button>
    </div>
    <div class="form-group">
      <label for="taskTitle">Title</label>
      <input type="text" id="taskTitle" placeholder="What needs to be done?" maxlength="120">
    </div>
    <div class="form-group">
      <label for="taskDesc">Description</label>
      <textarea id="taskDesc" placeholder="Optional details…" maxlength="500"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="taskPriority">Priority</label>
        <select id="taskPriority">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
      </div>
      <div class="form-group">
        <label for="taskColumn">Column</label>
        <select id="taskColumn">
          <option value="todo">To Do</option>
          <option value="progress">In Progress</option>
          <option value="done">Done</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'kanban_v3';
  let tasks = [];
  let dragId = null;
  let editId = null;
  let activeFilter = 'all';
  let searchQuery = '';
  let placeholder = null;

  function load() {
    try { tasks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { tasks = []; }
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  }

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  function fmtTime(ts) {
    const d = new Date(ts), now = new Date();
    const diff = (now - d) / 1000;
    if (diff < 60)    return 'just now';
    if (diff < 3600)  return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function matchesFilter(t) {
    if (activeFilter !== 'all' && t.priority !== activeFilter) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      return t.title.toLowerCase().includes(q) || (t.desc || '').toLowerCase().includes(q);
    }
    return true;
  }

  function renderAll() {
    ['todo','progress','done'].forEach(col => {
      const area = document.getElementById('area-' + col);
      const colTasks = tasks.filter(t => t.col === col);
      const visible  = colTasks.filter(matchesFilter);
      area.innerHTML = '';
      if (colTasks.length === 0) {
        area.innerHTML = '<div class="empty">Drop tasks here</div>';
      } else {
        colTasks.forEach(t => {
          const c = buildCard(t);
          if (!matchesFilter(t)) c.classList.add('hidden');
          area.appendChild(c);
        });
      }
      document.getElementById('count-' + col).textContent =
        (searchQuery || activeFilter !== 'all') && visible.length !== colTasks.length
          ? visible.length + '/' + colTasks.length
          : colTasks.length;
    });
  }

  function buildCard(t) {
    const div = document.createElement('div');
    div.className = 'card';
    div.dataset.id = t.id;
    div.draggable = true;
    div.innerHTML = `
      <div class="card-top">
        <span class="priority-badge priority-${t.priority}">${t.priority}</span>
        <div class="card-title">${esc(t.title)}</div>
      </div>
      ${t.desc ? `<div class="card-desc">${esc(t.desc)}</div>` : ''}
      <div class="card-footer">
        <span class="card-time">${fmtTime(t.created)}</span>
        <div class="card-actions">
          <button class="action-btn" onclick="startEdit('${t.id}')">&#9998; Edit</button>
          <button class="action-btn del" onclick="deleteTask('${t.id}')">&#10005; Del</button>
        </div>
      </div>`;
    div.addEventListener('dragstart', onDragStart);
    div.addEventListener('dragend',   onDragEnd);
    return div;
  }

  /* Drag & Drop */
  function onDragStart(e) {
    dragId = e.currentTarget.dataset.id;
    setTimeout(() => e.currentTarget.classList.add('dragging'), 0);
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', dragId);
  }

  function onDragEnd(e) {
    e.currentTarget.classList.remove('dragging');
    removePlaceholder();
    document.querySelectorAll('.column').forEach(c => c.classList.remove('drag-over'));
    dragId = null;
  }

  function removePlaceholder() {
    if (placeholder && placeholder.parentNode) placeholder.parentNode.removeChild(placeholder);
    placeholder = null;
  }

  function getDragAfterEl(area, y) {
    const els = [...area.querySelectorAll('.card:not(.dragging):not(.hidden)')];
    return els.reduce((closest, el) => {
      const box = el.getBoundingClientRect();
      const offset = y - box.top - box.height / 2;
      if (offset < 0 && offset > (closest.offset ?? -Infinity))
        return { offset, el };
      return closest;
    }, {}).el;
  }

  document.querySelectorAll('.column').forEach(col => {
    col.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      col.classList.add('drag-over');
      const area = col.querySelector('.cards-area');
      const afterEl = getDragAfterEl(area, e.clientY);
      removePlaceholder();
      placeholder = document.createElement('div');
      placeholder.className = 'drop-placeholder';
      if (afterEl) area.insertBefore(placeholder, afterEl);
      else area.appendChild(placeholder);
    });

    col.addEventListener('dragleave', e => {
      if (!col.contains(e.relatedTarget)) {
        col.classList.remove('drag-over');
        removePlaceholder();
      }
    });

    col.addEventListener('drop', e => {
      e.preventDefault();
      col.classList.remove('drag-over');
      removePlaceholder();
      if (!dragId) return;
      const targetCol = col.dataset.col;
      const task = tasks.find(t => t.id === dragId);
      if (!task) return;
      const area = col.querySelector('.cards-area');
      const afterEl = getDragAfterEl(area, e.clientY);
      const others = tasks.filter(t => t.col === targetCol && t.id !== dragId);
      tasks = tasks.filter(t => t.id !== dragId);
      task.col = targetCol;
      const colTasks = tasks.filter(t => t.col === targetCol);
      if (!afterEl) {
        colTasks.push(task);
      } else {
        const idx = colTasks.findIndex(t => t.id === afterEl.dataset.id);
        colTasks.splice(idx === -1 ? colTasks.length : idx, 0, task);
      }
      tasks = [...tasks.filter(t => t.col !== targetCol), ...colTasks];
      save(); renderAll();
    });
  });

  /* Modal */
  function openModal(col) {
    editId = null;
    document.getElementById('modalHeading').textContent = 'New Task';
    document.getElementById('taskTitle').value = '';
    document.getElementById('taskDesc').value = '';
    document.getElementById('taskPriority').value = 'medium';
    document.getElementById('taskColumn').value = col || 'todo';
    document.getElementById('modalBackdrop').classList.add('open');
    setTimeout(() => document.getElementById('taskTitle').focus(), 80);
  }

  function startEdit(id) {
    const t = tasks.find(x => x.id === id);
    if (!t) return;
    editId = id;
    document.getElementById('modalHeading').textContent = 'Edit Task';
    document.getElementById('taskTitle').value = t.title;
    document.getElementById('taskDesc').value = t.desc || '';
    document.getElementById('taskPriority').value = t.priority;
    document.getElementById('taskColumn').value = t.col;
    document.getElementById('modalBackdrop').classList.add('open');
    setTimeout(() => document.getElementById('taskTitle').focus(), 80);
  }

  function closeModal() {
    document.getElementById('modalBackdrop').classList.remove('open');
    editId = null;
  }

  function onBackdropClick(e) {
    if (e.target === document.getElementById('modalBackdrop')) closeModal();
  }

  function saveTask() {
    const titleEl = document.getElementById('taskTitle');
    const title = titleEl.value.trim();
    if (!title) {
      titleEl.focus();
      titleEl.style.borderColor = 'var(--high)';
      setTimeout(() => titleEl.style.borderColor = '', 900);
      return;
    }
    const desc     = document.getElementById('taskDesc').value.trim();
    const priority = document.getElementById('taskPriority').value;
    const col      = document.getElementById('taskColumn').value;
    if (editId) {
      const t = tasks.find(x => x.id === editId);
      if (t) Object.assign(t, { title, desc, priority, col });
    } else {
      tasks.push({ id: uid(), title, desc, priority, col, created: Date.now() });
    }
    save(); renderAll(); closeModal();
  }

  function deleteTask(id) {
    const card = document.querySelector(`.card[data-id="${id}"]`);
    if (card) {
      card.style.transition = 'opacity 0.18s, transform 0.18s';
      card.style.opacity = '0';
      card.style.transform = 'scale(0.88)';
    }
    setTimeout(() => {
      tasks = tasks.filter(t => t.id !== id);
      save(); renderAll();
    }, 190);
  }

  /* Search & Filter */
  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value.trim();
    renderAll();
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      renderAll();
    });
  });

  /* Keyboard */
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      if (document.getElementById('modalBackdrop').classList.contains('open')) saveTask();
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });

  /* Init */
  load();
  if (tasks.length === 0) {
    const n = Date.now();
    tasks = [
      { id: uid(), title: 'Define project scope',       desc: 'Outline goals, deliverables, and stakeholders.', priority: 'high',   col: 'todo',     created: n - 864e5*2 },
      { id: uid(), title: 'Design system setup',         desc: 'Create color tokens and typography scale.',       priority: 'medium', col: 'todo',     created: n - 864e5   },
      { id: uid(), title: 'Write API documentation',     desc: 'Document all public endpoints with examples.',    priority: 'low',    col: 'todo',     created: n - 36e5*5  },
      { id: uid(), title: 'Build authentication flow',   desc: 'JWT login, refresh tokens, and logout.',          priority: 'high',   col: 'progress', created: n - 864e5*3 },
      { id: uid(), title: 'Implement drag & drop',       desc: 'Kanban card DnD with touch support.',             priority: 'medium', col: 'progress', created: n - 36e5*8  },
      { id: uid(), title: 'Set up CI/CD pipeline',       desc: 'GitHub Actions for test, lint, and deploy.',      priority: 'high',   col: 'done',     created: n - 864e5*5 },
      { id: uid(), title: 'Configure ESLint + Prettier', desc: '',                                                priority: 'low',    col: 'done',     created: n - 864e5*4 },
    ];
    save();
  }
  renderAll();
</script>
</body>
</html>
