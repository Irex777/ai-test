        }

    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Kanban Board</h1>
            <div class="controls">
                <input type="text" class="search-box" placeholder="🔍 Search tasks..." id="searchInput">
                <select class="filter-select" id="filterSelect">
                    <option value="all">All Priorities</option>
                    <option value="low">Low Priority</option>
                    <option value="medium">Medium Priority</option>
                    <option value="high">High Priority</option>
                </select>
                <button class="add-btn" id="addTaskBtn">➕ Add Task</button>
            </div>
        </header>

        <div class="board">
            <div class="column column-todo" data-status="todo">
                <div class="column-header">
                    <div class="column-title">📝 To Do</div>
                    <div class="column-count" id="count-todo">0</div>
                </div>
                <div class="task-list" id="todo-tasks"></div>
            </div>

            <div class="column column-progress" data-status="progress">
                <div class="column-header">
                    <div class="column-title">🚀 In Progress</div>
                    <div class="column-count" id="count-progress">0</div>
                </div>
                <div class="task-list" id="progress-tasks"></div>
            </div>

            <div class="column column-done" data-status="done">
                <div class="column-header">
                    <div class="column-title">✅ Done</div>
                    <div class="column-count" id="count-done">0</div>
                </div>
                <div class="task-list" id="done-tasks"></div>
            </div>
        </div>
    </div>

    <div class="modal" id="taskModal">
        <div class="modal-content">
            <h2 class="modal-title" id="modalTitle">Add New Task</h2>
            <form id="taskForm">
                <div class="form-group">
                    <label class="form-label">Title *</label>
                    <input type="text" class="form-input" id="taskTitle" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea class="form-textarea" id="taskDescription"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Priority</label>
                    <select class="form-select" id="taskPriority">
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn btn-primary">Save Task</button>
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        class KanbanBoard {
            constructor() {
                this.tasks = this.loadTasks();
                this.currentEditId = null;
                this.init();
            }

            init() {
                this.cacheElements();
                this.bindEvents();
                this.render();
            }

            cacheElements() {
                this.searchInput = document.getElementById('searchInput');
                this.filterSelect = document.getElementById('filterSelect');
                this.addTaskBtn = document.getElementById('addTaskBtn');
                this.modal = document.getElementById('taskModal');
                this.taskForm = document.getElementById('taskForm');
                this.modalTitle = document.getElementById('modalTitle');
                this.cancelBtn = document.getElementById('cancelBtn');
                
                this.taskLists = {
                    todo: document.getElementById('todo-tasks'),
                    progress: document.getElementById('progress-tasks'),
                    done: document.getElementById('done-tasks')
                };

                this.counts = {
                    todo: document.getElementById('count-todo'),
                    progress: document.getElementById('count-progress'),
                    done: document.getElementById('count-done')
                };
            }

            bindEvents() {
                this.addTaskBtn.addEventListener('click', () => this.openModal());
                this.cancelBtn.addEventListener('click', () => this.closeModal());
                this.taskForm.addEventListener('submit', (e) => this.handleSubmit(e));
                this.searchInput.addEventListener('input', () => this.render());
                this.filterSelect.addEventListener('change', () => this.render());
                this.modal.addEventListener('click', (e) => {
                    if (e.target === this.modal) this.closeModal();
                });

                document.querySelectorAll('.task-list').forEach(list => {
                    list.addEventListener('dragover', (e) => this.handleDragOver(e));
                    list.addEventListener('drop', (e) => this.handleDrop(e));
                    list.addEventListener('dragleave', (e) => this.handleDragLeave(e));
                });
            }

            loadTasks() {
                const stored = localStorage.getItem('kanbanTasks');
                return stored ? JSON.parse(stored) : [];
            }

            saveTasks() {
                localStorage.setItem('kanbanTasks', JSON.stringify(this.tasks));
            }

            openModal(task = null) {
                this.currentEditId = task ? task.id : null;
                this.modalTitle.textContent = task ? 'Edit Task' : 'Add New Task';
                
                if (task) {
                    document.getElementById('taskTitle').value = task.title;
                    document.getElementById('taskDescription').value = task.description;
                    document.getElementById('taskPriority').value = task.priority;
                } else {
                    this.taskForm.reset();
                    document.getElementById('taskPriority').value = 'medium';
                }
                
                this.modal.classList.add('active');
                document.getElementById('taskTitle').focus();
            }

            closeModal() {
                this.modal.classList.remove('active');
                this.currentEditId = null;
                this.taskForm.reset();
            }

            handleSubmit(e) {
                e.preventDefault();
                
                const taskData = {
                    title: document.getElementById('taskTitle').value.trim(),
                    description: document.getElementById('taskDescription').value.trim(),
                    priority: document.getElementById('taskPriority').value
                };

                if (this.currentEditId) {
                    const index = this.tasks.findIndex(t => t.id === this.currentEditId);
                    if (index !== -1) {
                        this.tasks[index] = {
                            ...this.tasks[index],
                            ...taskData,
                            updatedAt: new Date().toISOString()
                        };
                    }
                } else {
                    this.tasks.push({
                        id: Date.now().toString(),
                        ...taskData,
                        status: 'todo',
                        createdAt: new Date().toISOString(),
                        updatedAt: new Date().toISOString()
                    });
                }

                this.saveTasks();
                this.render();
                this.closeModal();
            }

            deleteTask(id) {
                if (confirm('Are you sure you want to delete this task?')) {
                    this.tasks = this.tasks.filter(t => t.id !== id);
                    this.saveTasks();
                    this.render();
                }
            }

            editTask(id) {
                const task = this.tasks.find(t => t.id === id);
                if (task) this.openModal(task);
            }

            getFilteredTasks() {
                const searchTerm = this.searchInput.value.toLowerCase();
                const priorityFilter = this.filterSelect.value;

                return this.tasks.filter(task => {
                    const matchesSearch = task.title.toLowerCase().includes(searchTerm) ||
                                         task.description.toLowerCase().includes(searchTerm);
                    const matchesPriority = priorityFilter === 'all' || task.priority === priorityFilter;
                    return matchesSearch && matchesPriority;
                });
            }

            formatDate(dateString) {
                const date = new Date(dateString);
                const now = new Date();
                const diffMs = now - date;
                const diffMins = Math.floor(diffMs / 60000);
                const diffHours = Math.floor(diffMs / 3600000);
                const diffDays = Math.floor(diffMs / 86400000);

                if (diffMins < 1) return 'Just now';
                if (diffMins < 60) return `${diffMins}m ago`;
                if (diffHours < 24) return `${diffHours}h ago`;
                if (diffDays < 7) return `${diffDays}d ago`;
                return date.toLocaleDateString();
            }

            createTaskElement(task) {
                const div = document.createElement('div');
                div.className = 'task';
                div.draggable = true;
                div.dataset.id = task.id;

                div.innerHTML = `
                    <div class="task-header">
                        <div class="task-title">${this.escapeHtml(task.title)}</div>
                        <div class="task-actions">
                            <button class="task-btn edit" data-id="${task.id}">✏️</button>
                            <button class="task-btn delete" data-id="${task.id}">🗑️</button>
                        </div>
                    </div>
                    ${task.description ? `<div class="task-description">${this.escapeHtml(task.description)}</div>` : ''}
                    <div class="task-meta">
                        <span class="priority priority-${task.priority}">${task.priority}</span>
                        <span class="timestamp">${this.formatDate(task.updatedAt)}</span>
                    </div>
                `;

                div.addEventListener('dragstart', (e) => this.handleDragStart(e));
                div.addEventListener('dragend', (e) => this.handleDragEnd(e));

                div.querySelector('.edit').addEventListener('click', () => this.editTask(task.id));
                div.querySelector('.delete').addEventListener('click', () => this.deleteTask(task.id));

                return div;
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            handleDragStart(e) {
                e.target.classList.add('dragging');
                e.dataTransfer.setData('text/plain', e.target.dataset.id);
                e.dataTransfer.effectAllowed = 'move';
            }

            handleDragEnd(e) {
                e.target.classList.remove('dragging');
                document.querySelectorAll('.task-list').forEach(list => {
                    list.classList.remove('drag-over');
                });
            }

            handleDragOver(e) {
                e.preventDefault();
                e.currentTarget.classList.add('drag-over');
            }

            handleDragLeave(e) {
                if (!e.currentTarget.contains(e.relatedTarget)) {
                    e.currentTarget.classList.remove('drag-over');
                }
            }

            handleDrop(e) {
                e.preventDefault();
                const taskList = e.currentTarget;
                taskList.classList.remove('drag-over');

                const taskId = e.dataTransfer.getData('text/plain');
                const newStatus = taskList.id.replace('-tasks', '');

                const task = this.tasks.find(t => t.id === taskId);
                if (task && task.status !== newStatus) {
                    task.status = newStatus;
                    task.updatedAt = new Date().toISOString();
                    this.saveTasks();
                    this.render();
                    
                    taskList.classList.add('drop-animation');
                    setTimeout(() => taskList.classList.remove('drop-animation'), 300);
                }
            }

            updateCounts() {
                const counts = {
                    todo: this.tasks.filter(t => t.status === 'todo').length,
                    progress: this.tasks.filter(t => t.status === 'progress').length,
                    done: this.tasks.filter(t => t.status === 'done').length
                };

                Object.keys(counts).forEach(status => {
                    this.counts[status].textContent = counts[status];
                });
            }

            render() {
                const filteredTasks = this.getFilteredTasks();

                ['todo', 'progress', 'done'].forEach(status => {
                    const taskList = this.taskLists[status];
                    const statusTasks = filteredTasks.filter(t => t.status === status);

                    taskList.innerHTML = '';

                    if (statusTasks.length === 0) {
                        taskList.innerHTML = `
                            <div class="empty-state">
                                No tasks here
                            </div>
                        `;
                    } else {
                        statusTasks.forEach(task => {
                            taskList.appendChild(this.createTaskElement(task));
                        });
                    }
                });

                this.updateCounts();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new KanbanBoard();
        });
    </script>
</body>
</html>
