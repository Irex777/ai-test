<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <style>
        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-card: #0f3460;
            --text-primary: #eaeaea;
            --text-secondary: #a0a0a0;
            --accent-blue: #00d4ff;
            --accent-green: #00ff88;
            --accent-red: #ff4757;
            --accent-yellow: #ffd93d;
            --accent-orange: #ff9f43;
            --border-color: #2a2a4a;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .filter-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .filter-group select {
            padding: 12px 20px;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            cursor: pointer;
        }

        .add-task-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-green));
            border: none;
            border-radius: 8px;
            color: var(--bg-primary);
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .add-task-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .column {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            min-height: 400px;
            border: 2px solid var(--border-color);
        }

        .column-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border-color);
        }

        .column-title {
            font-size: 1.3rem;
            font-weight: bold;
        }

        .task-count {
            background: var(--bg-card);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            color: var(--accent-blue);
        }

        .task-list {
            min-height: 200px;
            border: 2px dashed transparent;
            border-radius: 8px;
            padding: 10px;
            transition: border-color 0.3s, background 0.3s;
        }

        .task-list.drag-over {
            border-color: var(--accent-blue);
            background: rgba(0, 212, 255, 0.1);
        }

        .task-card {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent-blue);
            cursor: grab;
            transition: transform 0.2s, box-shadow 0.2s;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .task-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }

        .task-card.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }

        .task-card.priority-high {
            border-left-color: var(--accent-red);
        }

        .task-card.priority-medium {
            border-left-color: var(--accent-orange);
        }

        .task-card.priority-low {
            border-left-color: var(--accent-green);
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }

        .task-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text-primary);
            word-break: break-word;
        }

        .task-actions {
            display: flex;
            gap: 8px;
        }

        .task-action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            padding: 5px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .task-action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .task-description {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .task-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .task-priority {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .task-priority.high {
            background: rgba(255, 71, 87, 0.2);
            color: var(--accent-red);
        }

        .task-priority.medium {
            background: rgba(255, 159, 67, 0.2);
            color: var(--accent-orange);
        }

        .task-priority.low {
            background: rgba(0, 255, 136, 0.2);
            color: var(--accent-green);
        }

        .task-timestamp {
            font-size: 0.8rem;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            border: 2px solid var(--border-color);
            animation: modalSlideIn 0.3s ease-out;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .close-modal:hover {
            color: var(--text-primary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--text-primary);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            background: var(--bg-primary);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-actions {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-green));
            color: var(--bg-primary);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .btn-danger {
            background: var(--accent-red);
            color: white;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .board {
                grid-template-columns: 1fr;
            }

            .filter-group {
                flex-wrap: wrap;
            }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Kanban Board</h1>
        </header>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Search tasks...">
            </div>
            <div class="filter-group">
                <select id="priorityFilter">
                    <option value="">All Priorities</option>
                    <option value="high">High Priority</option>
                    <option value="medium">Medium Priority</option>
                    <option value="low">Low Priority</option>
                </select>
                <button class="add-task-btn" id="addTaskBtn">+ Add Task</button>
            </div>
        </div>

        <div class="board">
            <div class="column" id="todo-column">
                <div class="column-header">
                    <span class="column-title">📝 To Do</span>
                    <span class="task-count" id="todo-count">0</span>
                </div>
                <div class="task-list" id="todo-list" data-column="todo"></div>
            </div>

            <div class="column" id="inprogress-column">
                <div class="column-header">
                    <span class="column-title">⚡ In Progress</span>
                    <span class="task-count" id="inprogress-count">0</span>
                </div>
                <div class="task-list" id="inprogress-list" data-column="inprogress"></div>
            </div>

            <div class="column" id="done-column">
                <div class="column-header">
                    <span class="column-title">✅ Done</span>
                    <span class="task-count" id="done-count">0</span>
                </div>
                <div class="task-list" id="done-list" data-column="done"></div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Task Modal -->
    <div class="modal" id="taskModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Add New Task</h2>
                <button class="close-modal" id="closeModal">&times;</button>
            </div>
            <form id="taskForm">
                <div class="form-group">
                    <label for="taskTitle">Title *</label>
                    <input type="text" id="taskTitle" required placeholder="Enter task title">
                </div>
                <div class="form-group">
                    <label for="taskDescription">Description</label>
                    <textarea id="taskDescription" placeholder="Enter task description"></textarea>
                </div>
                <div class="form-group">
                    <label for="taskPriority">Priority *</label>
                    <select id="taskPriority" required>
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal" id="deleteModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Delete Task</h2>
                <button class="close-modal" id="closeDeleteModal">&times;</button>
            </div>
            <p style="margin-bottom: 20px; color: var(--text-secondary);">Are you sure you want to delete this task? This action cannot be undone.</p>
            <div class="form-actions">
                <button class="btn btn-secondary" id="cancelDelete">Cancel</button>
                <button class="btn btn-danger" id="confirmDelete">Delete</button>
            </div>
        </div>
    </div>

    <script>
        // Task Management System
        class KanbanBoard {
            constructor() {
                this.tasks = this.loadTasks();
                this.currentEditId = null;
                this.currentDeleteId = null;
                this.draggedTask = null;
                this.init();
            }

            init() {
                this.setupEventListeners();
                this.render();
            }

            loadTasks() {
                const saved = localStorage.getItem('kanbanTasks');
                return saved ? JSON.parse(saved) : [];
            }

            saveTasks() {
                localStorage.setItem('kanbanTasks', JSON.stringify(this.tasks));
            }

            setupEventListeners() {
                // Add Task Button
                document.getElementById('addTaskBtn').addEventListener('click', () => {
                    this.openModal();
                });

                // Modal Controls
                document.getElementById('closeModal').addEventListener('click', () => this.closeModal());
                document.getElementById('cancelBtn').addEventListener('click', () => this.closeModal());
                document.getElementById('taskForm').addEventListener('submit', (e) => this.handleSubmit(e));

                // Delete Modal Controls
                document.getElementById('closeDeleteModal').addEventListener('click', () => this.closeDeleteModal());
                document.getElementById('cancelDelete').addEventListener('click', () => this.closeDeleteModal());
                document.getElementById('confirmDelete').addEventListener('click', () => this.confirmDeleteTask());

                // Search and Filter
                document.getElementById('searchInput').addEventListener('input', () => this.render());
                document.getElementById('priorityFilter').addEventListener('change', () => this.render());

                // Drag and Drop
                this.setupDragAndDrop();
            }

            setupDragAndDrop() {
                const taskLists = document.querySelectorAll('.task-list');

                taskLists.forEach(list => {
                    list.addEventListener('dragover', (e) => {
                        e.preventDefault();
                        list.classList.add('drag-over');
                    });

                    list.addEventListener('dragleave', () => {
                        list.classList.remove('drag-over');
                    });

                    list.addEventListener('drop', (e) => {
                        e.preventDefault();
                        list.classList.remove('drag-over');

                        if (this.draggedTask) {
                            const newColumn = list.dataset.column;
                            const taskId = this.draggedTask.dataset.taskId;

                            this.moveTask(taskId, newColumn);
                            this.draggedTask = null;
                        }
                    });
                });
            }

            render() {
                const searchTerm = document.getElementById('searchInput').value.toLowerCase();
                const priorityFilter = document.getElementById('priorityFilter').value;

                // Clear all lists
                document.getElementById('todo-list').innerHTML = '';
                document.getElementById('inprogress-list').innerHTML = '';
                document.getElementById('done-list').innerHTML = '';

                // Filter tasks
                const filteredTasks = this.tasks.filter(task => {
                    const matchesSearch = task.title.toLowerCase().includes(searchTerm) ||
                                         task.description.toLowerCase().includes(searchTerm);
                    const matchesPriority = !priorityFilter || task.priority === priorityFilter;
                    return matchesSearch && matchesPriority;
                });

                // Count tasks per column
                const counts = { todo: 0, inprogress: 0, done: 0 };

                filteredTasks.forEach(task => {
                    counts[task.column]++;
                    const taskElement = this.createTaskElement(task);
                    document.getElementById(`${task.column}-list`).appendChild(taskElement);
                });

                // Update counts
                document.getElementById('todo-count').textContent = counts.todo;
                document.getElementById('inprogress-count').textContent = counts.inprogress;
                document.getElementById('done-count').textContent = counts.done;

                // Add empty states
                if (counts.todo === 0) this.addEmptyState('todo-list');
                if (counts.inprogress === 0) this.addEmptyState('inprogress-list');
                if (counts.done === 0) this.addEmptyState('done-list');
            }

            createTaskElement(task) {
                const taskCard = document.createElement('div');
                taskCard.className = `task-card priority-${task.priority}`;
                taskCard.draggable = true;
                taskCard.dataset.taskId = task.id;

                const timestamp = this.formatTimestamp(task.createdAt);

                taskCard.innerHTML = `
                    <div class="task-header">
                        <h3 class="task-title">${this.escapeHtml(task.title)}</h3>
                        <div class="task-actions">
                            <button class="task-action-btn edit-btn" title="Edit">✏️</button>
                            <button class="task-action-btn delete-btn" title="Delete">🗑️</button>
                        </div>
                    </div>
                    ${task.description ? `<p class="task-description">${this.escapeHtml(task.description)}</p>` : ''}
                    <div class="task-meta">
                        <span class="task-priority ${task.priority}">${task.priority}</span>
                        <span class="task-timestamp">${timestamp}</span>
                    </div>
                `;

                // Drag events
                taskCard.addEventListener('dragstart', (e) => {
                    this.draggedTask = taskCard;
                    taskCard.classList.add('dragging');
                });

                taskCard.addEventListener('dragend', () => {
                    taskCard.classList.remove('dragging');
                    this.draggedTask = null;
                });

                // Edit and Delete buttons
                taskCard.querySelector('.edit-btn').addEventListener('click', () => {
                    this.editTask(task.id);
                });

                taskCard.querySelector('.delete-btn').addEventListener('click', () => {
                    this.openDeleteModal(task.id);
                });

                return taskCard;
            }

            addEmptyState(listId) {
                const list = document.getElementById(listId);
                const emptyState = document.createElement('div');
                emptyState.className = 'empty-state';
                emptyState.innerHTML = `
                    <div class="empty-state-icon">📭</div>
                    <p>No tasks here yet</p>
                `;
                list.appendChild(emptyState);
            }

            openModal(task = null) {
                const modal = document.getElementById('taskModal');
                const title = document.getElementById('modalTitle');
                const form = document.getElementById('taskForm');

                if (task) {
                    title.textContent = 'Edit Task';
                    document.getElementById('taskTitle').value = task.title;
                    document.getElementById('taskDescription').value = task.description || '';
                    document.getElementById('taskPriority').value = task.priority;
                    this.currentEditId = task.id;
                } else {
                    title.textContent = 'Add New Task';
                    form.reset();
                    this.currentEditId = null;
                }

                modal.classList.add('active');
            }

            closeModal() {
                document.getElementById('taskModal').classList.remove('active');
                this.currentEditId = null;
            }

            handleSubmit(e) {
                e.preventDefault();

                const title = document.getElementById('taskTitle').value.trim();
                const description = document.getElementById('taskDescription').value.trim();
                const priority = document.getElementById('taskPriority').value;

                if (!title) return;

                if (this.currentEditId) {
                    // Update existing task
                    const taskIndex = this.tasks.findIndex(t => t.id === this.currentEditId);
                    if (taskIndex !== -1) {
                        this.tasks[taskIndex] = {
                            ...this.tasks[taskIndex],
                            title,
                            description,
                            priority,
                            updatedAt: new Date().toISOString()
                        };
                    }
                } else {
                    // Add new task
                    const newTask = {
                        id: this.generateId(),
                        title,
                        description,
                        priority,
                        column: 'todo',
                        createdAt: new Date().toISOString(),
                        updatedAt: new Date().toISOString()
                    };
                    this.tasks.push(newTask);
                }

                this.saveTasks();
                this.render();
                this.closeModal();
            }

            editTask(id) {
                const task = this.tasks.find(t => t.id === id);
                if (task) {
                    this.openModal(task);
                }
            }

            openDeleteModal(id) {
                this.currentDeleteId = id;
                document.getElementById('deleteModal').classList.add('active');
            }

            closeDeleteModal() {
                document.getElementById('deleteModal').classList.remove('active');
                this.currentDeleteId = null;
            }

            confirmDeleteTask() {
                if (this.currentDeleteId) {
                    this.tasks = this.tasks.filter(t => t.id !== this.currentDeleteId);
                    this.saveTasks();
                    this.render();
                    this.closeDeleteModal();
                }
            }

            moveTask(taskId, newColumn) {
                const taskIndex = this.tasks.findIndex(t => t.id === taskId);
                if (taskIndex !== -1 && this.tasks[taskIndex].column !== newColumn) {
                    this.tasks[taskIndex].column = newColumn;
                    this.tasks[taskIndex].updatedAt = new Date().toISOString();
                    this.saveTasks();
                    this.render();
                }
            }

            generateId() {
                return 'task_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            }

            formatTimestamp(dateString) {
                const date = new Date(dateString);
                const now = new Date();
                const diff = now - date;

                if (diff < 60000) return 'Just now';
                if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
                if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
                if (diff < 604800000) return `${Math.floor(diff / 86400000)}d ago`;

                return date.toLocaleDateString();
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        }

        // Initialize the Kanban Board
        const board = new KanbanBoard();
    </script>
</body>
</html>
