<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Password Generator</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --accent: #bb86fc;
            --accent-hover: #9965f4;
            --border: #333;
            --input-bg: #2c2c2c;
            --danger: #cf6679;
            --success: #03dac6;
            --warning: #ffb74d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 500px;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 300;
            letter-spacing: 1px;
            color: var(--accent);
        }

        /* Password Display Area */
        .password-display {
            background-color: var(--input-bg);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            position: relative;
        }

        .password-text {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.1rem;
            word-break: break-all;
            flex-grow: 1;
            margin-right: 10px;
            color: #fff;
            letter-spacing: 1px;
        }

        .copy-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
            transition: color 0.2s;
        }

        .copy-btn:hover {
            color: var(--accent);
        }

        /* Strength Meter */
        .strength-container {
            margin-bottom: 25px;
        }

        .strength-bar-bg {
            height: 6px;
            background-color: var(--input-bg);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .strength-bar-fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        .strength-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .entropy-val {
            color: var(--accent);
            font-weight: bold;
        }

        /* Controls */
        .control-group {
            margin-bottom: 20px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            background: transparent;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            margin-top: -6px;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            background: var(--input-bg);
            border-radius: 2px;
        }

        /* Toggles */
        .toggles-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            cursor: pointer;
            user-select: none;
            font-size: 0.9rem;
        }

        .checkbox-wrapper input {
            display: none;
        }

        .custom-checkbox {
            width: 18px;
            height: 18px;
            border: 2px solid var(--text-muted);
            border-radius: 4px;
            margin-right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .checkbox-wrapper input:checked + .custom-checkbox {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        .checkmark {
            display: none;
            color: #000;
            font-size: 12px;
            font-weight: bold;
        }

        .checkbox-wrapper input:checked + .custom-checkbox .checkmark {
            display: block;
        }

        /* Generate Button */
        .generate-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-bottom: 30px;
        }

        .generate-btn:hover {
            background-color: var(--accent-hover);
        }

        /* History */
        .history-section {
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        .history-header {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .history-list {
            list-style: none;
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            background-color: var(--input-bg);
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            border-left: 3px solid var(--border);
        }

        .history-item span {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 80%;
        }

        .delete-history {
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.8rem;
        }
        
        .delete-history:hover {
            color: var(--danger);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--success);
            color: #000;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 100;
        }
        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>PASSGEN</h1>

        <!-- Password Display -->
        <div class="password-display">
            <div id="passwordOutput" class="password-text">Generating...</div>
            <button id="copyBtn" class="copy-btn" title="Copy to Clipboard">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
            </button>
        </div>

        <!-- Strength Meter -->
        <div class="strength-container">
            <div class="strength-bar-bg">
                <div id="strengthBar" class="strength-bar-fill"></div>
            </div>
            <div class="strength-info">
                <span id="strengthText">Strength: Weak</span>
                <span id="entropyText" class="entropy-val">0 bits</span>
            </div>
        </div>

        <!-- Controls -->
        <div class="control-group">
            <div class="slider-header">
                <span>Length</span>
                <span id="lengthVal">16</span>
            </div>
            <input type="range" id="lengthSlider" min="8" max="64" value="16">
        </div>

        <div class="toggles-grid">
            <label class="checkbox-wrapper">
                <input type="checkbox" id="chkUpper" checked>
                <span class="custom-checkbox"><span class="checkmark">✓</span></span>
                Uppercase (A-Z)
            </label>
            <label class="checkbox-wrapper">
                <input type="checkbox" id="chkLower" checked>
                <span class="custom-checkbox"><span class="checkmark">✓</span></span>
                Lowercase (a-z)
            </label>
            <label class="checkbox-wrapper">
                <input type="checkbox" id="chkNumbers" checked>
                <span class="custom-checkbox"><span class="checkmark">✓</span></span>
                Numbers (0-9)
            </label>
            <label class="checkbox-wrapper">
                <input type="checkbox" id="chkSymbols" checked>
                <span class="custom-checkbox"><span class="checkmark">✓</span></span>
                Symbols (!@#$)
            </label>
            <label class="checkbox-wrapper">
                <input type="checkbox" id="chkAmbiguous">
                <span class="custom-checkbox"><span class="checkmark">✓</span></span>
                Exclude Ambiguous
            </label>
        </div>

        <button id="generateBtn" class="generate-btn">GENERATE PASSWORD</button>

        <!-- History -->
        <div class="history-section">
            <div class="history-header">History (Last 10)</div>
            <ul id="historyList" class="history-list">
                <!-- History items injected here -->
            </ul>
        </div>
    </div>

    <div id="toast" class="toast">Copied to Clipboard!</div>

    <script>
        // Character Sets
        const CHAR_SETS = {
            upper: "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
            lower: "abcdefghijklmnopqrstuvwxyz",
            numbers: "0123456789",
            symbols: "!@#$%^&*()_+~`|}{[]:;?><,./-=",
            ambiguous: "Il1O0o" // Characters often confused
        };

        // State
        let history = [];

        // DOM Elements
        const els = {
            output: document.getElementById('passwordOutput'),
            lengthSlider: document.getElementById('lengthSlider'),
            lengthVal: document.getElementById('lengthVal'),
            chkUpper: document.getElementById('chkUpper'),
            chkLower: document.getElementById('chkLower'),
            chkNumbers: document.getElementById('chkNumbers'),
            chkSymbols: document.getElementById('chkSymbols'),
            chkAmbiguous: document.getElementById('chkAmbiguous'),
            generateBtn: document.getElementById('generateBtn'),
            copyBtn: document.getElementById('copyBtn'),
            strengthBar: document.getElementById('strengthBar'),
            strengthText: document.getElementById('strengthText'),
            entropyText: document.getElementById('entropyText'),
            historyList: document.getElementById('historyList'),
            toast: document.getElementById('toast')
        };

        // Utility: Secure Random Integer
        function getSecureRandomInt(max) {
            const array = new Uint32Array(1);
            window.crypto.getRandomValues(array);
            return array[0] % max;
        }

        // Logic: Generate Password
        function generatePassword() {
            const length = parseInt(els.lengthSlider.value);
            const useUpper = els.chkUpper.checked;
            const useLower = els.chkLower.checked;
            const useNumbers = els.chkNumbers.checked;
            const useSymbols = els.chkSymbols.checked;
            const excludeAmbiguous = els.chkAmbiguous.checked;

            // Build pool
            let pool = "";
            if (useUpper) pool += CHAR_SETS.upper;
            if (useLower) pool += CHAR_SETS.lower;
            if (useNumbers) pool += CHAR_SETS.numbers;
            if (useSymbols) pool += CHAR_SETS.symbols;

            // Handle ambiguous exclusions
            if (excludeAmbiguous) {
                const ambChars = CHAR_SETS.ambiguous.split('');
                pool = pool.split('').filter(c => !ambChars.includes(c)).join('');
            }

            // Validation: If pool is empty, force default or show error
            if (pool === "") {
                els.output.textContent = "Select at least one option";
                resetStrength();
                return;
            }

            let password = "";
            for (let i = 0; i < length; i++) {
                const randomIndex = getSecureRandomInt(pool.length);
                password += pool[randomIndex];
            }

            els.output.textContent = password;
            updateStrength(password, pool.length);
            addToHistory(password);
        }

        // Logic: Strength Meter
        function updateStrength(password, poolSize) {
            if (!password) return;
            
            // Entropy Calculation: Length * log2(poolSize)
            // If poolSize is 0 (shouldn't happen with validation), prevent NaN
            const entropy = poolSize > 0 ? password.length * Math.log2(poolSize) : 0;
            
            els.entropyText.textContent = `${Math.round(entropy)} bits`;

            let strength = 0; // 0-100%
            let color = "#cf6679"; // Default Red
            let text = "Weak";

            if (entropy < 40) {
                strength = 10;
                color = "#cf6679"; // Red
                text = "Very Weak";
            } else if (entropy < 60) {
                strength = 35;
                color = "#ffb74d"; // Orange
                text = "Weak";
            } else if (entropy < 80) {
                strength = 65;
                color = "#ffd54f"; // Yellow
                text = "Medium";
            } else if (entropy < 100) {
                strength = 85;
                color = "#69f0ae"; // Light Green
                text = "Strong";
            } else {
                strength = 100;
                color = "#03dac6"; // Teal/Green
                text = "Very Strong";
            }

            els.strengthBar.style.width = `${strength}%`;
            els.strengthBar.style.backgroundColor = color;
            els.strengthText.textContent = `Strength: ${text}`;
            els.strengthText.style.color = color;
        }

        function resetStrength() {
            els.strengthBar.style.width = "0%";
            els.strengthText.textContent = "Strength: N/A";
            els.entropyText.textContent = "0 bits";
        }

        // Logic: History
        function addToHistory(pwd) {
            // Add to beginning
            history.unshift(pwd);
            // Keep only last 10
            if (history.length > 10) {
                history.pop();
            }
            renderHistory();
        }

        function renderHistory() {
            els.historyList.innerHTML = "";
            history.forEach((pwd, index) => {
                const li = document.createElement('li');
                li.className = 'history-item';
                
                // Truncate for display if too long
                const displayPwd = pwd.length > 20 ? pwd.substring(0, 20) + "..." : pwd;
                
                li.innerHTML = `
                    <span title="${pwd}">${displayPwd}</span>
                    <span class="delete-history" onclick="clearHistoryItem(${index})">×</span>
                `;
                els.historyList.appendChild(li);
            });
        }

        // Exposed to global scope for HTML onclick
        window.clearHistoryItem = function(index) {
            history.splice(index, 1);
            renderHistory();
        };

        // Logic: Copy
        function copyToClipboard() {
            const pwd = els.output.textContent;
            if (!pwd || pwd === "Generating..." || pwd === "Select at least one option") return;

            navigator.clipboard.writeText(pwd).then(() => {
                showToast();
            }).catch(err => {
                console.error('Failed to copy: ', err);
            });
        }

        function showToast() {
            els.toast.classList.add('show');
            setTimeout(() => {
                els.toast.classList.remove('show');
            }, 2000);
        }

        // Event Listeners
        els.generateBtn.addEventListener('click', generatePassword);
        
        els.copyBtn.addEventListener('click', copyToClipboard);

        // Update slider text
        els.lengthSlider.addEventListener('input', (e) => {
            els.lengthVal.textContent = e.target.value;
        });

        // Auto-generate on option change (optional, but nice UX)
        // Uncomment below if you want it to regenerate instantly when toggling checkboxes
        /*
        [els.chkUpper, els.chkLower, els.chkNumbers, els.chkSymbols, els.chkAmbiguous, els.lengthSlider].forEach(el => {
            el.addEventListener('change', generatePassword);
        });
        */

        // Initial Run
        window.addEventListener('DOMContentLoaded', () => {
            generatePassword();
        });

    </script>
</body>
</html>
