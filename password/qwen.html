<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Password Generator</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --accent: #bb86fc;
            --accent-hover: #9965f4;
            --border: #333;
            --danger: #cf6679;
            --success: #03dac6;
            
            /* Strength Colors */
            --str-weak: #ff5252;
            --str-med: #ffb74d;
            --str-strong: #66bb6a;
            --str-vstrong: #26a69a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
        }

        h1 {
            text-align: center;
            margin-bottom: 1.5rem;
            font-weight: 300;
            letter-spacing: 1px;
            color: var(--accent);
        }

        /* Display Section */
        .display-section {
            background: #141414;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #password-output {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            word-break: break-all;
            color: #fff;
            margin-right: 10px;
            min-height: 1.5em;
        }

        .copy-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 5px;
            transition: color 0.2s;
        }

        .copy-btn:hover {
            color: var(--accent);
        }

        .copy-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* Stats Section */
        .stats-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .strength-container {
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        /* Controls */
        .control-group {
            margin-bottom: 20px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        input[type="range"] {
            flex-grow: 1;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .length-val {
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--accent);
            min-width: 30px;
            text-align: right;
        }

        .toggles {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .toggle-item {
            display: flex;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .toggle-item input {
            display: none;
        }

        .custom-checkbox {
            width: 18px;
            height: 18px;
            border: 2px solid var(--text-muted);
            border-radius: 4px;
            margin-right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .toggle-item input:checked + .custom-checkbox {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        .custom-checkbox::after {
            content: '✔';
            font-size: 12px;
            color: #121212;
            display: none;
        }

        .toggle-item input:checked + .custom-checkbox::after {
            display: block;
        }

        /* Generate Button */
        .generate-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .generate-btn:hover {
            background-color: var(--accent-hover);
        }

        .generate-btn:active {
            transform: scale(0.98);
        }

        /* History */
        .history-section {
            margin-top: 30px;
            border-top: 1px solid var(--border);
            padding-top: 15px;
        }

        .history-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .history-list {
            list-style: none;
            max-height: 150px;
            overflow-y: auto;
        }

        /* Scrollbar styling */
        .history-list::-webkit-scrollbar {
            width: 6px;
        }
        .history-list::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }

        .history-item {
            padding: 8px;
            background: #252525;
            margin-bottom: 5px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.85rem;
            color: #ccc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .history-item span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 85%;
        }

        .history-copy {
            cursor: pointer;
            opacity: 0.5;
            font-size: 0.8rem;
        }
        .history-copy:hover { opacity: 1; color: var(--accent); }

    </style>
</head>
<body>

<div class="container">
    <h1>Password Generator</h1>

    <!-- Display -->
    <div class="display-section">
        <div id="password-output">...</div>
        <button class="copy-btn" id="main-copy-btn" title="Copy to clipboard">
            <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
        </button>
    </div>

    <!-- Stats & Strength -->
    <div class="stats-row">
        <span id="strength-text">Strength: None</span>
        <span id="entropy-text">Entropy: 0 bits</span>
    </div>
    <div class="strength-container">
        <div class="strength-bar" id="strength-bar"></div>
    </div>

    <!-- Controls -->
    <div class="slider-container">
        <span>Length:</span>
        <input type="range" id="length-slider" min="8" max="64" value="16">
        <span class="length-val" id="length-val">16</span>
    </div>

    <div class="toggles">
        <label class="toggle-item">
            <input type="checkbox" id="chk-upper" checked>
            <div class="custom-checkbox"></div>
            <span>Uppercase (A-Z)</span>
        </label>
        <label class="toggle-item">
            <input type="checkbox" id="chk-lower" checked>
            <div class="custom-checkbox"></div>
            <span>Lowercase (a-z)</span>
        </label>
        <label class="toggle-item">
            <input type="checkbox" id="chk-numbers" checked>
            <div class="custom-checkbox"></div>
            <span>Numbers (0-9)</span>
        </label>
        <label class="toggle-item">
            <input type="checkbox" id="chk-symbols" checked>
            <div class="custom-checkbox"></div>
            <span>Symbols (!@#)</span>
        </label>
        <label class="toggle-item" style="grid-column: span 2;">
            <input type="checkbox" id="chk-ambiguous">
            <div class="custom-checkbox"></div>
            <span>Exclude Ambiguous (i, l, 1, L, o, 0, O)</span>
        </label>
    </div>

    <button class="generate-btn" id="gen-btn">Generate Password</button>

    <!-- History -->
    <div class="history-section">
        <div class="history-title">History (Last 10)</div>
        <ul class="history-list" id="history-list">
            <!-- Items added via JS -->
        </ul>
    </div>
</div>

<script>
    // Character Sets
    const CHAR_SETS = {
        upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
        lower: 'abcdefghijklmnopqrstuvwxyz',
        numbers: '0123456789',
        symbols: '!@#$%^&*()_+~`|}{[]:;?><,./-=',
        ambiguous: 'il1Lo0O'
    };

    // DOM Elements
    const els = {
        output: document.getElementById('password-output'),
        slider: document.getElementById('length-slider'),
        val: document.getElementById('length-val'),
        chkUpper: document.getElementById('chk-upper'),
        chkLower: document.getElementById('chk-lower'),
        chkNum: document.getElementById('chk-numbers'),
        chkSym: document.getElementById('chk-symbols'),
        chkAmb: document.getElementById('chk-ambiguous'),
        btn: document.getElementById('gen-btn'),
        copyBtn: document.getElementById('main-copy-btn'),
        strengthBar: document.getElementById('strength-bar'),
        strengthText: document.getElementById('strength-text'),
        entropyText: document.getElementById('entropy-text'),
        historyList: document.getElementById('history-list')
    };

    let history = [];

    // Logic
    function getPool() {
        let pool = '';
        if (els.chkUpper.checked) pool += CHAR_SETS.upper;
        if (els.chkLower.checked) pool += CHAR_SETS.lower;
        if (els.chkNum.checked) pool += CHAR_SETS.numbers;
        if (els.chkSym.checked) pool += CHAR_SETS.symbols;

        if (els.chkAmb.checked) {
            const amb = CHAR_SETS.ambiguous.split('');
            pool = pool.split('').filter(char => !amb.includes(char)).join('');
        }
        
        return pool;
    }

    function generate() {
        const length = parseInt(els.slider.value);
        const pool = getPool();

        if (pool === '') {
            els.output.textContent = "Select option!";
            els.output.style.color = "var(--danger)";
            resetStrength();
            return;
        }
        
        els.output.style.color = "#fff";

        // Use Crypto API for secure randomness
        let password = "";
        const array = new Uint32Array(length);
        window.crypto.getRandomValues(array);

        for (let i = 0; i < length; i++) {
            password += pool[array[i] % pool.length];
        }

        els.output.textContent = password;
        updateStats(password, pool.length);
        addToHistory(password);
    }

    function updateStats(password, poolSize) {
        if(password === "Select option!") return;

        const len = password.length;
        // Entropy = length * log2(poolSize)
        const entropy = Math.floor(len * Math.log2(poolSize));
        
        els.entropyText.textContent = `Entropy: ${entropy} bits`;

        // Strength Logic
        let strength = 0; // 0-100%
        let color = 'var(--str-weak)';
        let label = 'Weak';

        if (entropy < 50) {
            strength = 15;
            color = 'var(--str-weak)';
            label = 'Very Weak';
        } else if (entropy < 80) {
            strength = 40;
            color = 'var(--str-med)';
            label = 'Medium';
        } else if (entropy < 120) {
            strength = 75;
            color = 'var(--str-strong)';
            label = 'Strong';
        } else {
            strength = 100;
            color = 'var(--str-vstrong)';
            label = 'Very Strong';
        }

        els.strengthBar.style.width = `${strength}%`;
        els.strengthBar.style.backgroundColor = color;
        els.strengthText.textContent = `Strength: ${label}`;
        els.strengthText.style.color = color;
    }

    function resetStrength() {
        els.strengthBar.style.width = '0%';
        els.strengthText.textContent = 'Strength: -';
        els.strengthText.style.color = '#a0a0a0';
        els.entropyText.textContent = 'Entropy: 0 bits';
    }

    function addToHistory(pw) {
        if (pw === "Select option!") return;
        
        // Add to start, keep max 10
        history.unshift(pw);
        if (history.length > 10) history.pop();

        renderHistory();
    }

    function renderHistory() {
        els.historyList.innerHTML = '';
        history.forEach(pw => {
            const li = document.createElement('li');
            li.className = 'history-item';
            
            const span = document.createElement('span');
            span.textContent = pw;
            
            const copyIcon = document.createElement('div');
            copyIcon.className = 'history-copy';
            copyIcon.textContent = 'Copy';
            copyIcon.onclick = () => copyToClipboard(pw);

            li.appendChild(span);
            li.appendChild(copyIcon);
            els.historyList.appendChild(li);
        });
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            // Visual feedback on main button
            const originalText = els.copyBtn.title;
            els.copyBtn.title = "Copied!";
            els.copyBtn.style.color = "var(--success)";
            setTimeout(() => {
                els.copyBtn.title = originalText;
                els.copyBtn.style.color = "";
            }, 1500);
        });
    }

    // Event Listeners
    els.slider.addEventListener('input', (e) => {
        els.val.textContent = e.target.value;
        // Optional: regenerate immediately or wait for button? 
        // Let's wait for button to keep history clean, or maybe just update display?
        // UX choice: Update display live is often preferred in modern apps.
        generate(); 
    });

    [els.chkUpper, els.chkLower, els.chkNum, els.chkSym, els.chkAmb].forEach(el => {
        el.addEventListener('change', generate);
    });

    els.btn.addEventListener('click', generate);
    els.copyBtn.addEventListener('click', () => copyToClipboard(els.output.textContent));

    // Initial Generation
    generate();

</script>
</body>
</html>
