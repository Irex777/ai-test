<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Password Generator</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent: #bb86fc;
            --accent-hover: #9965f4;
            --border: #333333;
            --danger: #cf6679;
            --success: #03dac6;
            
            /* Strength Colors */
            --str-weak: #ff5252;
            --str-medium: #ffb74d;
            --str-strong: #69f0ae;
            --str-very-strong: #00e676;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
        }

        h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: var(--accent);
            letter-spacing: 1px;
        }

        /* Display Area */
        .password-display {
            background-color: #121212;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
        }

        .password-text {
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            word-break: break-all;
            color: var(--text-primary);
            min-height: 1.5em;
        }

        .copy-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 5px;
            transition: color 0.3s;
        }

        .copy-btn:hover {
            color: var(--accent);
        }

        /* Stats & Strength */
        .stats-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .strength-bar-container {
            height: 6px;
            background-color: #333;
            border-radius: 3px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        /* Controls */
        .control-group {
            margin-bottom: 20px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type="range"] {
            flex-grow: 1;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
            color: var(--text-secondary);
            transition: color 0.2s;
        }

        .checkbox-label:hover {
            color: var(--text-primary);
        }

        input[type="checkbox"] {
            accent-color: var(--accent);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        /* Action Button */
        .generate-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--accent);
            color: #000;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-bottom: 30px;
        }

        .generate-btn:hover {
            background-color: var(--accent-hover);
        }

        .generate-btn:active {
            transform: scale(0.98);
        }

        /* History */
        .history-section {
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        .history-title {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .history-list {
            list-style: none;
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 10px;
            background-color: #252525;
            margin-bottom: 5px;
            border-radius: 4px;
            font-size: 0.85rem;
            color: #ccc;
            font-family: 'Courier New', monospace;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #121212; 
        }
        ::-webkit-scrollbar-thumb {
            background: #444; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555; 
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--success);
            color: #000;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>PassGen</h2>

        <div class="password-display">
            <span id="passwordOutput" class="password-text">Click Generate</span>
            <button id="copyBtn" class="copy-btn" title="Copy to Clipboard">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
            </button>
        </div>

        <div class="stats-row">
            <span id="strengthText">Strength: N/A</span>
            <span id="entropyText">Entropy: 0 bits</span>
        </div>
        <div class="strength-bar-container">
            <div id="strengthBar" class="strength-bar"></div>
        </div>

        <div class="control-group">
            <div class="stats-row">
                <label for="lengthSlider">Length</label>
                <span id="lengthVal">16</span>
            </div>
            <div class="slider-container">
                <input type="range" id="lengthSlider" min="8" max="64" value="16">
            </div>
        </div>

        <div class="checkbox-grid">
            <label class="checkbox-label">
                <input type="checkbox" id="chkUpper" checked> Uppercase (A-Z)
            </label>
            <label class="checkbox-label">
                <input type="checkbox" id="chkLower" checked> Lowercase (a-z)
            </label>
            <label class="checkbox-label">
                <input type="checkbox" id="chkNumbers" checked> Numbers (0-9)
            </label>
            <label class="checkbox-label">
                <input type="checkbox" id="chkSymbols" checked> Symbols (!@#)
            </label>
            <label class="checkbox-label" style="grid-column: span 2;">
                <input type="checkbox" id="chkAmbiguous"> Exclude Ambiguous (0O1lI)
            </label>
        </div>

        <button id="generateBtn" class="generate-btn">Generate Password</button>

        <div class="history-section">
            <div class="history-title">Recent History</div>
            <ul id="historyList" class="history-list">
                <!-- History items go here -->
            </ul>
        </div>
    </div>

    <div id="toast" class="toast">Copied to clipboard!</div>

    <script>
        // DOM Elements
        const passwordOutput = document.getElementById('passwordOutput');
        const copyBtn = document.getElementById('copyBtn');
        const lengthSlider = document.getElementById('lengthSlider');
        const lengthVal = document.getElementById('lengthVal');
        const chkUpper = document.getElementById('chkUpper');
        const chkLower = document.getElementById('chkLower');
        const chkNumbers = document.getElementById('chkNumbers');
        const chkSymbols = document.getElementById('chkSymbols');
        const chkAmbiguous = document.getElementById('chkAmbiguous');
        const generateBtn = document.getElementById('generateBtn');
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');
        const entropyText = document.getElementById('entropyText');
        const historyList = document.getElementById('historyList');
        const toast = document.getElementById('toast');

        // Character Sets
        const UPPER = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const LOWER = "abcdefghijklmnopqrstuvwxyz";
        const NUMBERS = "0123456789";
        const SYMBOLS = "!@#$%^&*()_+~`|}{[]:;?><,./-=";
        const AMBIGUOUS = "0O1lI";

        let history = [];

        // Utility: Get Random Item from Array
        const getRandomChar = (string) => string[Math.floor(Math.random() * string.length)];

        // Update Slider Value
        lengthSlider.addEventListener('input', () => {
            lengthVal.textContent = lengthSlider.value;
        });

        // Generate Password Logic
        function generatePassword() {
            const length = parseInt(lengthSlider.value);
            const useUpper = chkUpper.checked;
            const useLower = chkLower.checked;
            const useNumbers = chkNumbers.checked;
            const useSymbols = chkSymbols.checked;
            const excludeAmbiguous = chkAmbiguous.checked;

            if (!useUpper && !useLower && !useNumbers && !useSymbols) {
                passwordOutput.textContent = "Select at least one type!";
                passwordOutput.style.color = "var(--danger)";
                updateStrength(0, 0);
                return;
            }

            let charPool = "";
            if (useUpper) charPool += UPPER;
            if (useLower) charPool += LOWER;
            if (useNumbers) charPool += NUMBERS;
            if (useSymbols) charPool += SYMBOLS;

            if (excludeAmbiguous) {
                charPool = charPool.split('').filter(c => !AMBIGUOUS.includes(c)).join('');
            }

            let password = "";
            
            // Ensure at least one character from each selected set is included
            // (optional robustness, but keeps it simple here by just random drawing from pool)
            // For strict compliance we could force 1 of each, but simple random is usually acceptable for this scope.
            
            for (let i = 0; i < length; i++) {
                password += getRandomChar(charPool);
            }

            passwordOutput.textContent = password;
            passwordOutput.style.color = "var(--text-primary)";

            // Calculate Stats
            const poolSize = charPool.length;
            const entropy = length * Math.log2(poolSize);
            updateStrength(entropy, length);
            addToHistory(password);
        }

        // Strength Meter Logic
        function updateStrength(entropy, length) {
            let strength = 0; // 0 to 100
            let color = "var(--danger)";
            let label = "Weak";

            if (entropy > 0) {
                // Simple heuristic for entropy to visual bar
                // 60 bits is usually considered minimum secure
                // 100+ bits is strong
                // 128+ bits is very strong
                if (entropy < 36) {
                    strength = 10; color = "var(--danger)"; label = "Very Weak";
                } else if (entropy < 60) {
                    strength = 30; color = "var(--str-weak)"; label = "Weak";
                } else if (entropy < 80) {
                    strength = 60; color = "var(--str-medium)"; label = "Medium";
                } else if (entropy < 100) {
                    strength = 85; color = "var(--str-strong)"; label = "Strong";
                } else {
                    strength = 100; color = "var(--str-very-strong)"; label = "Very Strong";
                }
            } else {
                strength = 0;
                label = "N/A";
            }

            strengthBar.style.width = `${strength}%`;
            strengthBar.style.backgroundColor = color;
            strengthText.textContent = `Strength: ${label}`;
            strengthText.style.color = color;
            entropyText.textContent = `Entropy: ${Math.floor(entropy)} bits`;
        }

        // Copy to Clipboard
        copyBtn.addEventListener('click', () => {
            const text = passwordOutput.textContent;
            if (text && text !== "Click Generate" && text !== "Select at least one type!") {
                navigator.clipboard.writeText(text).then(() => {
                    showToast();
                });
            }
        });

        function showToast() {
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // History Management
        function addToHistory(password) {
            // Add to beginning
            history.unshift(password);
            // Keep max 10
            if (history.length > 10) history.pop();
            renderHistory();
        }

        function renderHistory() {
            historyList.innerHTML = "";
            history.forEach(pass => {
                const li = document.createElement('li');
                li.className = "history-item";
                li.textContent = pass;
                // Optional: make history items clickable to copy
                li.style.cursor = "pointer";
                li.title = "Click to copy";
                li.addEventListener('click', () => {
                    navigator.clipboard.writeText(pass);
                    showToast();
                });
                historyList.appendChild(li);
            });
        }

        // Initialize
        generateBtn.addEventListener('click', generatePassword);
        
        // Generate one on load
        generatePassword();

    </script>
</body>
</html>
