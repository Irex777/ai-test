<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Password Generator</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --accent: #bb86fc;
            --accent-hover: #9965f4;
            --border: #333333;
            --success: #03dac6;
            --danger: #cf6679;
            --warning: #ffb74d;
            --info: #64b5f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: var(--accent);
            font-size: 1.8rem;
        }

        /* Password Display Area */
        .password-display {
            position: relative;
            background-color: #121212;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #password-output {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            color: var(--success);
            word-break: break-all;
            flex-grow: 1;
            margin-right: 10px;
            min-height: 1.5em;
        }

        .copy-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            padding: 5px;
            transition: color 0.2s;
        }

        .copy-btn:hover {
            color: var(--accent);
        }

        /* Stats Area */
        .stats-area {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        /* Strength Meter */
        .strength-container {
            margin-bottom: 1.5rem;
        }

        .strength-bar-bg {
            height: 6px;
            background-color: #333;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 5px;
        }

        .strength-bar-fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        /* Controls */
        .control-group {
            margin-bottom: 1.5rem;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        input[type="range"] {
            flex-grow: 1;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .checkboxes {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
            font-size: 0.95rem;
        }

        input[type="checkbox"] {
            accent-color: var(--accent);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        /* Generate Button */
        .generate-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--accent);
            color: #000;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
            margin-bottom: 2rem;
        }

        .generate-btn:hover {
            background-color: var(--accent-hover);
        }

        /* History */
        .history-section {
            border-top: 1px solid var(--border);
            padding-top: 1rem;
        }

        .history-title {
            font-size: 1rem;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        .history-list {
            list-style: none;
            max-height: 150px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            background-color: #252525;
            margin-bottom: 5px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-family: monospace;
            color: var(--text-muted);
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e1e1e;
        }
        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--success);
            color: #000;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 100;
        }
        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Password Generator</h1>

    <div class="password-display">
        <span id="password-output">Click Generate</span>
        <button class="copy-btn" id="copy-btn" title="Copy to clipboard">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
        </button>
    </div>

    <div class="stats-area">
        <span id="char-count">Length: 0</span>
        <span id="entropy-display">Entropy: 0 bits</span>
    </div>

    <div class="strength-container">
        <div style="display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 2px;">
            <span>Weak</span>
            <span id="strength-text" style="font-weight: bold;">None</span>
            <span>Very Strong</span>
        </div>
        <div class="strength-bar-bg">
            <div class="strength-bar-fill" id="strength-bar"></div>
        </div>
    </div>

    <div class="control-group">
        <div class="slider-container">
            <label for="length-slider">Length</label>
            <input type="range" id="length-slider" min="8" max="64" value="16">
            <span id="length-val" style="font-weight: bold; min-width: 20px;">16</span>
        </div>

        <div class="checkboxes">
            <label class="checkbox-label">
                <input type="checkbox" id="chk-uppercase" checked>
                Uppercase (A-Z)
            </label>
            <label class="checkbox-label">
                <input type="checkbox" id="chk-lowercase" checked>
                Lowercase (a-z)
            </label>
            <label class="checkbox-label">
                <input type="checkbox" id="chk-numbers" checked>
                Numbers (0-9)
            </label>
            <label class="checkbox-label">
                <input type="checkbox" id="chk-symbols" checked>
                Symbols (!@#)
            </label>
            <label class="checkbox-label">
                <input type="checkbox" id="chk-ambiguous">
                Exclude Ambiguous
            </label>
        </div>
    </div>

    <button class="generate-btn" id="generate-btn">Generate Password</button>

    <div class="history-section">
        <h3 class="history-title">Recent History</h3>
        <ul class="history-list" id="history-list">
            <!-- History items will appear here -->
        </ul>
    </div>
</div>

<div class="toast" id="toast">Copied to clipboard!</div>

<script>
    // Configuration
    const charSets = {
        upper: "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
        lower: "abcdefghijklmnopqrstuvwxyz",
        number: "0123456789",
        symbol: "!@#$%^&*()_+~`|}{[]:;?><,./-="
    };

    const ambiguousChars = "Il1O0o";

    // DOM Elements
    const elOutput = document.getElementById('password-output');
    const elCopyBtn = document.getElementById('copy-btn');
    const elGenBtn = document.getElementById('generate-btn');
    const elSlider = document.getElementById('length-slider');
    const elLengthVal = document.getElementById('length-val');
    const elCharCount = document.getElementById('char-count');
    const elEntropy = document.getElementById('entropy-display');
    const elStrengthBar = document.getElementById('strength-bar');
    const elStrengthText = document.getElementById('strength-text');
    const elHistoryList = document.getElementById('history-list');
    const elToast = document.getElementById('toast');

    // Checkboxes
    const chkUpper = document.getElementById('chk-uppercase');
    const chkLower = document.getElementById('chk-lowercase');
    const chkNumber = document.getElementById('chk-numbers');
    const chkSymbol = document.getElementById('chk-symbols');
    const chkAmbiguous = document.getElementById('chk-ambiguous');

    // State
    let history = [];

    // Helper: Get random integer
    function getRandomInt(max) {
        return Math.floor(Math.random() * max);
    }

    // Helper: Shuffle array
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    // Main Generator Logic
    function generatePassword() {
        const length = parseInt(elSlider.value);
        let charset = "";
        let poolSize = 0;

        // Build character set
        if (chkUpper.checked) {
            charset += charSets.upper;
            poolSize += charSets.upper.length;
        }
        if (chkLower.checked) {
            charset += charSets.lower;
            poolSize += charSets.lower.length;
        }
        if (chkNumber.checked) {
            charset += charSets.number;
            poolSize += charSets.number.length;
        }
        if (chkSymbol.checked) {
            charset += charSets.symbol;
            poolSize += charSets.symbol.length;
        }

        // Validation: At least one type must be selected
        if (charset === "") {
            elOutput.innerText = "Select options!";
            elOutput.style.color = "var(--danger)";
            updateStats(0, 0);
            return;
        } else {
            elOutput.style.color = "var(--success)";
        }

        // Exclude ambiguous characters
        if (chkAmbiguous.checked) {
            let newCharset = "";
            for (let i = 0; i < charset.length; i++) {
                if (!ambiguousChars.includes(charset[i])) {
                    newCharset += charset[i];
                }
            }
            charset = newCharset;
            poolSize = charset.length;
        }

        // Generate
        let password = "";
        for (let i = 0; i < length; i++) {
            password += charset[getRandomInt(charset.length)];
        }

        // Display
        elOutput.innerText = password;
        
        // Update Stats
        updateStats(length, poolSize);
        
        // Add to History
        addToHistory(password);
    }

    // Update Length Slider Text
    elSlider.addEventListener('input', () => {
        elLengthVal.innerText = elSlider.value;
        // Optional: Auto-generate on slide? Let's stick to button click for control
        // but update stats preview if password exists
        if(elOutput.innerText !== "" && elOutput.innerText !== "Select options!") {
             // We recalculate stats based on current settings even if password text isn't refreshed yet
             // Actually, let's just update the UI text for length
             elCharCount.innerText = `Length: ${elSlider.value}`;
        }
    });

    // Calculate Entropy and Strength
    function updateStats(length, poolSize) {
        elCharCount.innerText = `Length: ${length}`;
        
        if (length === 0) {
            elEntropy.innerText = `Entropy: 0 bits`;
            elStrengthBar.style.width = "0%";
            elStrengthText.innerText = "None";
            return;
        }

        // Entropy = L * log2(R)
        const entropy = length * Math.log2(poolSize);
        elEntropy.innerText = `Entropy: ${Math.floor(entropy)} bits`;

        // Strength Meter Logic
        let percentage = 0;
        let color = "";
        let text = "";

        if (entropy < 50) {
            percentage = 25;
            color = "var(--danger)";
            text = "Weak";
        } else if (entropy < 80) {
            percentage = 50;
            color = "var(--warning)";
            text = "Medium";
        } else if (entropy < 120) {
            percentage = 75;
            color = "var(--info)";
            text = "Strong";
        } else {
            percentage = 100;
            color = "var(--success)";
            text = "Very Strong";
        }

        elStrengthBar.style.width = `${percentage}%`;
        elStrengthBar.style.backgroundColor = color;
        elStrengthText.innerText = text;
        elStrengthText.style.color = color;
    }

    // Copy to Clipboard
    elCopyBtn.addEventListener('click', () => {
        const pwd = elOutput.innerText;
        if (!pwd || pwd === "Click Generate" || pwd === "Select options!") return;

        navigator.clipboard.writeText(pwd).then(() => {
            showToast();
        }).catch(err => {
            console.error('Failed to copy: ', err);
            // Fallback for older browsers
            const textArea = document.createElement("textarea");
            textArea.value = pwd;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand("copy");
            textArea.remove();
            showToast();
        });
    });

    function showToast() {
        elToast.classList.add('show');
        setTimeout(() => {
            elToast.classList.remove('show');
        }, 2000);
    }

    // History Management
    function addToHistory(pwd) {
        if (!pwd) return;
        
        // Add to front
        history.unshift(pwd);
        
        // Limit to 10
        if (history.length > 10) {
            history.pop();
        }

        renderHistory();
    }

    function renderHistory() {
        elHistoryList.innerHTML = "";
        history.forEach(pwd => {
            const li = document.createElement('li');
            li.className = 'history-item';
            
            // Truncate if too long for display
            let displayPwd = pwd;
            if (pwd.length > 20) {
                displayPwd = pwd.substring(0, 18) + "...";
            }

            li.innerHTML = `<span>${displayPwd}</span>`;
            
            // Optional: Click history item to copy
            li.style.cursor = "pointer";
            li.title = "Click to copy";
            li.addEventListener('click', () => {
                navigator.clipboard.writeText(pwd);
                showToast();
            });

            elHistoryList.appendChild(li);
        });
    }

    // Event Listeners for inputs to trigger regeneration immediately? 
    // Requirement says "Generate Button".
    // But toggling checkboxes usually implies immediate feedback or readiness.
    // We will bind to the button.

    elGenBtn.addEventListener('click', generatePassword);
    
    // Also generate on slider change for better UX? 
    // Let's keep it manual to strictly follow "Generate Button" requirement,
    // but we can add a keyup listener if we wanted.
    
    // Initial generation on load
    generatePassword();

</script>
</body>
</html>
