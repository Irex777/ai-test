<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0f0f1a;--card:#1a1a2e;--card2:#222240;--accent:#7c3aed;--accent2:#a78bfa;
--text:#e2e8f0;--text2:#94a3b8;--danger:#ef4444;--warn:#f59e0b;--success:#10b981;
--info:#3b82f6;--border:#2d2d50;--radius:12px;
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;padding:20px 16px}
.app{width:100%;max-width:520px}
h1{text-align:center;font-size:1.6rem;margin:20px 0 8px;background:linear-gradient(135deg,var(--accent2),var(--info));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{text-align:center;color:var(--text2);font-size:.85rem;margin-bottom:28px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.password-display{position:relative;margin-bottom:16px}
.password-display input{width:100%;background:var(--card2);border:2px solid var(--border);border-radius:10px;padding:14px 50px 14px 16px;font-family:'Courier New',monospace;font-size:1.05rem;color:var(--text);letter-spacing:.5px;transition:border-color .2s}
.password-display input:focus{outline:none;border-color:var(--accent)}
.copy-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text2);cursor:pointer;padding:6px 8px;border-radius:6px;transition:all .2s;font-size:1.1rem}
.copy-btn:hover{color:var(--accent2);background:rgba(124,58,237,.1)}
.copy-btn.copied{color:var(--success)}
.char-count{position:absolute;left:16px;top:-8px;background:var(--accent);color:#fff;font-size:.65rem;padding:1px 8px;border-radius:6px;font-weight:600}
.strength-section{margin-bottom:0}
.strength-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.strength-label span{font-size:.8rem;color:var(--text2)}
.strength-label .strength-text{font-weight:600;text-transform:uppercase;font-size:.75rem;letter-spacing:.5px}
.strength-bar{height:6px;background:var(--card2);border-radius:3px;overflow:hidden}
.strength-fill{height:100%;border-radius:3px;transition:width .4s ease,background .4s ease;width:0}
.entropy-display{text-align:center;font-size:.8rem;color:var(--text2);margin-top:10px}
.entropy-display strong{color:var(--accent2)}
.controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.slider-group{flex:1;min-width:200px}
.slider-group label{display:block;font-size:.8rem;color:var(--text2);margin-bottom:6px;font-weight:500}
.slider-row{display:flex;align-items:center;gap:10px}
input[type=range]{-webkit-appearance:none;flex:1;height:6px;background:var(--card2);border-radius:3px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;background:var(--accent);border-radius:50%;cursor:pointer;transition:transform .15s}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.2)}
input[type=range]::-moz-range-thumb{width:18px;height:18px;background:var(--accent);border-radius:50%;cursor:pointer;border:none}
.length-value{font-size:.9rem;font-weight:700;color:var(--accent2);min-width:24px;text-align:right}
.toggles{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.toggle{display:flex;align-items:center;gap:8px;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 14px;cursor:pointer;transition:all .2s;user-select:none;font-size:.85rem}
.toggle:hover{border-color:var(--accent)}
.toggle.active{border-color:var(--accent);background:rgba(124,58,237,.12)}
.toggle input{display:none}
.check{width:18px;height:18px;border:2px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.toggle.active .check{background:var(--accent);border-color:var(--accent)}
.toggle.active .check::after{content:'✓';color:#fff;font-size:.7rem;font-weight:700}
.generate-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),#6d28d9);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:all .25s;letter-spacing:.5px;display:flex;align-items:center;justify-content:center;gap:8px}
.generate-btn:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(124,58,237,.35)}
.generate-btn:active{transform:translateY(0)}
.generate-btn .icon{font-size:1.2rem}
.history-section h3{font-size:.9rem;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.history-list{display:flex;flex-direction:column;gap:6px;max-height:320px;overflow-y:auto}
.history-list::-webkit-scrollbar{width:4px}
.history-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.history-item{display:flex;align-items:center;gap:10px;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;transition:all .2s}
.history-item:hover{border-color:var(--accent)}
.history-item .pw{font-family:'Courier New',monospace;font-size:.78rem;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.history-item .meta{font-size:.7rem;color:var(--text2);flex-shrink:0}
.history-item .hist-btn{background:none;border:none;color:var(--text2);cursor:pointer;padding:4px 6px;border-radius:4px;font-size:.85rem;transition:all .15s}
.history-item .hist-btn:hover{color:var(--accent2);background:rgba(124,58,237,.1)}
.empty-history{text-align:center;color:var(--text2);font-size:.85rem;padding:20px}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--success);color:#fff;padding:10px 24px;border-radius:10px;font-size:.85rem;font-weight:600;opacity:0;transition:all .35s ease;z-index:99;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.ambiguous-row{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.ambiguous-row .toggle{padding:6px 12px;font-size:.8rem}
@media(max-width:400px){
h1{font-size:1.3rem}
.toggle{padding:6px 10px;font-size:.8rem}
.password-display input{font-size:.9rem;padding:12px 48px 12px 14px}
}
</style>
</head>
<body>
<div class="app">
<h1>🔐 Password Generator</h1>
<p class="subtitle">Generate secure, random passwords</p>

<div class="card">
<div class="password-display">
<span class="char-count" id="charCount">0</span>
<input type="text" id="passwordOutput" readonly placeholder="Click generate…">
<button class="copy-btn" id="copyBtn" title="Copy to clipboard">📋</button>
</div>

<div class="strength-section">
<div class="strength-label">
<span>Strength</span>
<span class="strength-text" id="strengthText">—</span>
</div>
<div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
</div>

<div class="entropy-display" id="entropyDisplay">Entropy: —</div>
</div>

<div class="card">
<div class="controls">
<div class="slider-group">
<label>Password Length</label>
<div class="slider-row">
<input type="range" id="lengthSlider" min="8" max="64" value="16">
<span class="length-value" id="lengthValue">16</span>
</div>
</div>
</div>

<div class="toggles">
<label class="toggle active" data-key="upper">
<input type="checkbox" checked>
<span class="check"></span>
Uppercase (A-Z)
</label>
<label class="toggle" data-key="lower">
<input type="checkbox">
<span class="check"></span>
Lowercase (a-z)
</label>
<label class="toggle" data-key="numbers">
<input type="checkbox">
<span class="check"></span>
Numbers (0-9)
</label>
<label class="toggle" data-key="symbols">
<input type="checkbox">
<span class="check"></span>
Symbols (!@#$…)
</label>
</div>

<label class="toggle ambiguous-row" id="ambiguousToggle">
<input type="checkbox">
<span class="check"></span>
Exclude ambiguous chars (O, 0, l, 1, I)
</label>

<button class="generate-btn" id="generateBtn">
<span class="icon">⚡</span> Generate Password
</button>
</div>

<div class="history-section">
<h3>📜 Recent Passwords</h3>
<div class="history-list" id="historyList">
<div class="empty-history">No passwords generated yet</div>
</div>
</div>
</div>

<div class="toast" id="toast">Copied!</div>

<script>
const CHARSETS = {
  upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
  lower: 'abcdefghijklmnopqrstuvwxyz',
  numbers: '0123456789',
  symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?/~`'
};
const AMBIGUOUS = new Set('O0l1I');

const $ = id => document.getElementById(id);
let history = [];
let currentEntropy = 0;

// Toggle behavior
document.querySelectorAll('.toggle').forEach(toggle => {
  toggle.addEventListener('click', e => {
    e.preventDefault();
    const cb = toggle.querySelector('input[type=checkbox]');
    if (toggle.id === 'ambiguousToggle') {
      cb.checked = !cb.checked;
      toggle.classList.toggle('active', cb.checked);
    } else {
      // Don't allow unchecking all
      const allToggles = document.querySelectorAll('.toggles .toggle');
      if (!toggle.classList.contains('active')) {
        const anyActive = [...allToggles].some(t => t !== toggle && t.classList.contains('active'));
        if (!anyActive) return;
      }
      cb.checked = !cb.checked;
      toggle.classList.toggle('active', cb.checked);
    }
  });
});

// Slider
const slider = $('lengthSlider');
const lengthValue = $('lengthValue');
slider.addEventListener('input', () => {
  lengthValue.textContent = slider.value;
  $('charCount').textContent = slider.value;
});

// Generate
function generatePassword() {
  const length = parseInt(slider.value);
  const excludeAmbiguous = $('ambiguousToggle').querySelector('input').checked;
  
  let pool = '';
  const used = [];
  
  if (document.querySelector('[data-key="upper"]').classList.contains('active')) {
    let s = CHARSETS.upper;
    if (excludeAmbiguous) s = s.split('').filter(c => !AMBIGUOUS.has(c)).join('');
    pool += s; used.push(s);
  }
  if (document.querySelector('[data-key="lower"]').classList.contains('active')) {
    let s = CHARSETS.lower;
    if (excludeAmbiguous) s = s.split('').filter(c => !AMBIGUOUS.has(c)).join('');
    pool += s; used.push(s);
  }
  if (document.querySelector('[data-key="numbers"]').classList.contains('active')) {
    let s = CHARSETS.numbers;
    if (excludeAmbiguous) s = s.split('').filter(c => !AMBIGUOUS.has(c)).join('');
    pool += s; used.push(s);
  }
  if (document.querySelector('[data-key="symbols"]').classList.contains('active')) {
    pool += CHARSETS.symbols; used.push(CHARSETS.symbols);
  }

  if (!pool) {
    $('passwordOutput').value = '';
    updateStrength(0);
    return;
  }

  // Ensure at least one char from each selected set
  let password = [];
  const cryptoArr = new Uint32Array(length);
  crypto.getRandomValues(cryptoArr);
  
  // First fill with guaranteed chars from each set
  const guaranteed = [];
  const indices = {};
  let idx = 0;
  
  for (let i = 0; i < used.length; i++) {
    if (used[i].length === 0) continue;
    const gi = cryptoArr[idx] % used[i].length;
    guaranteed.push(used[i][gi]);
    indices[i] = idx;
    idx++;
  }
  
  password = guaranteed.map((c, i) => ({ char: c, index: indices[i] }));
  
  // Fill rest
  while (password.length < length) {
    const ci = cryptoArr[idx] % pool.length;
    password.push({ char: pool[ci], index: idx });
    idx++;
  }
  
  // Fisher-Yates shuffle
  for (let i = password.length - 1; i > 0; i--) {
    const j = cryptoArr[idx++] % (i + 1);
    [password[i], password[j]] = [password[j], password[i]];
  }
  
  const pw = password.map(p => p.char).join('');
  $('passwordOutput').value = pw;
  $('charCount').textContent = length;
  
  // Entropy
  const entropy = length * Math.log2(pool.length);
  currentEntropy = entropy;
  updateEntropy(entropy);
  updateStrength(entropy);
  
  // History
  addToHistory(pw, length, pool.length);
}

function updateStrength(entropy) {
  const fill = $('strengthFill');
  const text = $('strengthText');
  
  let level, pct, color;
  if (entropy < 30) { level = 'Weak'; pct = 20; color = 'var(--danger)'; }
  else if (entropy < 60) { level = 'Medium'; pct = 50; color = 'var(--warn)'; }
  else if (entropy < 90) { level = 'Strong'; pct = 75; color = 'var(--info)'; }
  else { level = 'Very Strong'; pct = 100; color = 'var(--success)'; }
  
  fill.style.width = pct + '%';
  fill.style.background = color;
  text.textContent = level;
  text.style.color = color;
}

function updateEntropy(entropy) {
  $('entropyDisplay').innerHTML = `Entropy: <strong>${entropy.toFixed(1)} bits</strong>`;
}

function addToHistory(pw, length, poolSize) {
  history.unshift({ pw, length, poolSize, time: new Date() });
  if (history.length > 10) history.pop();
  renderHistory();
}

function renderHistory() {
  const list = $('historyList');
  if (history.length === 0) {
    list.innerHTML = '<div class="empty-history">No passwords generated yet</div>';
    return;
  }
  list.innerHTML = history.map((item, i) => {
    const time = item.time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const entropy = (item.length * Math.log2(item.poolSize)).toFixed(1);
    return `<div class="history-item">
      <span class="pw" title="${item.pw}">${escapeHtml(item.pw)}</span>
      <span class="meta">${item.length}ch · ${entropy}b</span>
      <span class="meta" style="min-width:40px">${time}</span>
      <button class="hist-btn" onclick="copyPassword('${escapeAttr(item.pw)}')" title="Copy">📋</button>
    </div>`;
  }).join('');
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escapeAttr(s) {
  return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
}

function copyPassword(pw) {
  navigator.clipboard.writeText(pw).then(() => showToast());
}

function showToast() {
  const toast = $('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1800);
}

$('copyBtn').addEventListener('click', () => {
  const pw = $('passwordOutput').value;
  if (pw) copyPassword(pw);
});

$('generateBtn').addEventListener('click', generatePassword);

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.target.matches('input')) generatePassword();
});

// Generate one on load
generatePassword();
</script>
</body>
</html>
