<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator</title>
<style>
*, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
}

.container {
    width: 100%;
    max-width: 560px;
}

h1 {
    text-align: center;
    font-size: 1.8rem;
    margin-bottom: 0.25rem;
    background: linear-gradient(135deg, #58a6ff, #bc8cff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.subtitle {
    text-align: center;
    font-size: 0.85rem;
    color: #8b949e;
    margin-bottom: 2rem;
}

.card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1rem;
}

.card-title {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #8b949e;
    margin-bottom: 1rem;
}

.password-display-wrapper {
    position: relative;
    display: flex;
    align-items: center;
    background: #0d1117;
    border: 2px solid #30363d;
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.3s;
}

.password-display-wrapper:focus-within {
    border-color: #58a6ff;
}

.password-display {
    flex: 1;
    padding: 1rem 1.25rem;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 1.1rem;
    letter-spacing: 0.05em;
    color: #e6edf3;
    word-break: break-all;
    line-height: 1.5;
    user-select: all;
    min-height: 52px;
    display: flex;
    align-items: center;
}

.password-display:empty::after {
    content: 'Click generate to create a password';
    color: #484f58;
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 0.9rem;
    letter-spacing: normal;
}

.copy-btn {
    background: none;
    border: none;
    border-left: 1px solid #30363d;
    padding: 0.75rem 1rem;
    cursor: pointer;
    color: #8b949e;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
}

.copy-btn:hover {
    color: #58a6ff;
    background: rgba(88, 166, 255, 0.1);
}

.copy-btn.copied {
    color: #3fb950;
}

.copy-btn svg {
    width: 20px;
    height: 20px;
}

.controls {
    margin-bottom: 1.5rem;
}

.slider-group {
    margin-bottom: 1.25rem;
}

.slider-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
}

.slider-label {
    font-size: 0.9rem;
    color: #c9d1d9;
}

.slider-value {
    font-size: 0.9rem;
    font-weight: 600;
    color: #58a6ff;
    background: rgba(88, 166, 255, 0.1);
    padding: 0.15rem 0.6rem;
    border-radius: 6px;
}

input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: #21262d;
    outline: none;
    cursor: pointer;
}

input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #58a6ff;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(88, 166, 255, 0.4);
    transition: transform 0.15s;
}

input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.15);
}

input[type="range"]::-moz-range-thumb {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #58a6ff;
    cursor: pointer;
    border: none;
    box-shadow: 0 0 8px rgba(88, 166, 255, 0.4);
}

.toggles {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
    margin-bottom: 1rem;
}

.toggle-item {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.6rem 0.75rem;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
}

.toggle-item:hover {
    border-color: #484f58;
}

.toggle-item.active {
    border-color: #58a6ff;
    background: rgba(88, 166, 255, 0.05);
}

.toggle-switch {
    position: relative;
    width: 36px;
    height: 20px;
    flex-shrink: 0;
}

.toggle-switch input {
    opacity: 0;
    width: 0;
    height: 0;
}

.toggle-slider {
    position: absolute;
    inset: 0;
    background: #30363d;
    border-radius: 20px;
    transition: background 0.25s;
    cursor: pointer;
}

.toggle-slider::before {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    left: 2px;
    top: 2px;
    background: #c9d1d9;
    border-radius: 50%;
    transition: transform 0.25s;
}

.toggle-switch input:checked + .toggle-slider {
    background: #58a6ff;
}

.toggle-switch input:checked + .toggle-slider::before {
    transform: translateX(16px);
}

.toggle-text {
    font-size: 0.85rem;
    color: #c9d1d9;
}

.ambiguous-toggle {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.6rem 0.75rem;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
    grid-column: 1 / -1;
}

.ambiguous-toggle:hover {
    border-color: #484f58;
}

.ambiguous-toggle.active {
    border-color: #f0883e;
    background: rgba(240, 136, 62, 0.05);
}

.ambiguous-text {
    font-size: 0.85rem;
    color: #c9d1d9;
}

.ambiguous-hint {
    font-size: 0.7rem;
    color: #484f58;
    margin-left: auto;
}

.generate-btn {
    width: 100%;
    padding: 0.9rem;
    background: linear-gradient(135deg, #58a6ff, #bc8cff);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
}

.generate-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(88, 166, 255, 0.3);
}

.generate-btn:active {
    transform: translateY(0);
}

.generate-btn svg {
    width: 18px;
    height: 18px;
}

.stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
}

.stat-item {
    background: #0d1117;
    border: 1px solid #21262d;
    border-radius: 8px;
    padding: 0.75rem 1rem;
}

.stat-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #8b949e;
    margin-bottom: 0.25rem;
}

.stat-value {
    font-size: 1.05rem;
    font-weight: 600;
    color: #e6edf3;
}

.strength-meter {
    margin-top: 1rem;
}

.strength-bar-container {
    height: 6px;
    background: #21262d;
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 0.5rem;
}

.strength-bar {
    height: 100%;
    border-radius: 3px;
    transition: width 0.4s ease, background 0.4s ease;
    width: 0%;
}

.strength-label {
    font-size: 0.8rem;
    text-align: right;
    font-weight: 500;
    transition: color 0.3s;
}

.history-list {
    list-style: none;
    max-height: 240px;
    overflow-y: auto;
}

.history-list::-webkit-scrollbar {
    width: 6px;
}

.history-list::-webkit-scrollbar-track {
    background: transparent;
}

.history-list::-webkit-scrollbar-thumb {
    background: #30363d;
    border-radius: 3px;
}

.history-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.6rem 0.75rem;
    border-bottom: 1px solid #21262d;
    transition: background 0.15s;
    border-radius: 6px;
    gap: 0.5rem;
}

.history-item:last-child {
    border-bottom: none;
}

.history-item:hover {
    background: rgba(88, 166, 255, 0.05);
}

.history-password {
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    font-size: 0.78rem;
    color: #c9d1d9;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 340px;
}

.history-meta {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-shrink: 0;
}

.history-time {
    font-size: 0.7rem;
    color: #484f58;
}

.history-copy-btn {
    background: none;
    border: none;
    color: #484f58;
    cursor: pointer;
    padding: 0.25rem;
    transition: color 0.2s;
    display: flex;
    align-items: center;
}

.history-copy-btn:hover {
    color: #58a6ff;
}

.history-copy-btn svg {
    width: 14px;
    height: 14px;
}

.empty-history {
    text-align: center;
    padding: 2rem;
    color: #484f58;
    font-size: 0.85rem;
}

.clear-history-btn {
    width: 100%;
    padding: 0.5rem;
    background: none;
    border: 1px solid #30363d;
    border-radius: 8px;
    color: #8b949e;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 0.5rem;
}

.clear-history-btn:hover {
    border-color: #f85149;
    color: #f85149;
}

.toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #3fb950;
    color: #fff;
    padding: 0.75rem 1.5rem;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 500;
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 100;
    pointer-events: none;
}

.toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

@media (max-width: 480px) {
    body {
        padding: 1rem 0.75rem;
    }
    .toggles {
        grid-template-columns: 1fr;
    }
    .password-display {
        font-size: 0.9rem;
        padding: 0.75rem 1rem;
    }
}
</style>
</head>
<body>
<div class="container">
    <h1>🔐 Password Generator</h1>
    <p class="subtitle">Generate secure, random passwords</p>

    <div class="card">
        <div class="card-title">Password</div>
        <div class="password-display-wrapper">
            <div class="password-display" id="passwordDisplay"></div>
            <button class="copy-btn" id="copyBtn" title="Copy to clipboard" onclick="copyPassword()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                </svg>
            </button>
        </div>
        <div class="strength-meter" id="strengthMeter" style="display:none;">
            <div class="strength-bar-container">
                <div class="strength-bar" id="strengthBar"></div>
            </div>
            <div class="strength-label" id="strengthLabel"></div>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Settings</div>
        <div class="controls">
            <div class="slider-group">
                <div class="slider-header">
                    <span class="slider-label">Password Length</span>
                    <span class="slider-value" id="lengthValue">16</span>
                </div>
                <input type="range" id="lengthSlider" min="8" max="64" value="16" oninput="updateLength()">
            </div>

            <div class="toggles">
                <label class="toggle-item active" id="toggleUppercase">
                    <div class="toggle-switch">
                        <input type="checkbox" id="uppercase" checked onchange="toggleUpdate()">
                        <span class="toggle-slider"></span>
                    </div>
                    <span class="toggle-text">Uppercase</span>
                </label>
                <label class="toggle-item active" id="toggleLowercase">
                    <div class="toggle-switch">
                        <input type="checkbox" id="lowercase" checked onchange="toggleUpdate()">
                        <span class="toggle-slider"></span>
                    </div>
                    <span class="toggle-text">Lowercase</span>
                </label>
                <label class="toggle-item active" id="toggleNumbers">
                    <div class="toggle-switch">
                        <input type="checkbox" id="numbers" checked onchange="toggleUpdate()">
                        <span class="toggle-slider"></span>
                    </div>
                    <span class="toggle-text">Numbers</span>
                </label>
                <label class="toggle-item active" id="toggleSymbols">
                    <div class="toggle-switch">
                        <input type="checkbox" id="symbols" checked onchange="toggleUpdate()">
                        <span class="toggle-slider"></span>
                    </div>
                    <span class="toggle-text">Symbols</span>
                </label>
                <label class="ambiguous-toggle" id="toggleAmbiguous">
                    <div class="toggle-switch">
                        <input type="checkbox" id="excludeAmbiguous" onchange="toggleUpdate()">
                        <span class="toggle-slider"></span>
                    </div>
                    <span class="ambiguous-text">Exclude Ambiguous</span>
                    <span class="ambiguous-hint">O, 0, l, 1, I, |</span>
                </label>
            </div>

            <button class="generate-btn" onclick="generatePassword()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"/>
                    <polyline points="1 20 1 14 7 14"/>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                </svg>
                Generate Password
            </button>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Statistics</div>
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-label">Character Count</div>
                <div class="stat-value" id="charCount">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Entropy</div>
                <div class="stat-value" id="entropyBits">0 bits</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Character Classes</div>
                <div class="stat-value" id="charClasses">0 / 4</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Pool Size</div>
                <div class="stat-value" id="poolSize">0</div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-title">History (Last 10)</div>
        <ul class="history-list" id="historyList">
            <li class="empty-history" id="emptyHistory">No passwords generated yet</li>
        </ul>
        <button class="clear-history-btn" id="clearHistoryBtn" style="display:none;" onclick="clearHistory()">Clear History</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const AMBIGUOUS_CHARS = new Set(['O', '0', 'l', '1', 'I', '|']);

let passwordHistory = [];
let currentPassword = '';

function getSecureRandom() {
    const array = new Uint32Array(1);
    crypto.getRandomValues(array);
    return array[0];
}

function getRandomInt(max) {
    return getSecureRandom() % max;
}

function buildCharset() {
    const excludeAmb = document.getElementById('excludeAmbiguous').checked;
    let chars = '';
    const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const lower = 'abcdefghijklmnopqrstuvwxyz';
    const nums = '0123456789';
    const syms = '!@#$%^&*()_+-=[]{}|;:,.<>?';

    if (document.getElementById('uppercase').checked) {
        chars += upper;
    }
    if (document.getElementById('lowercase').checked) {
        chars += lower;
    }
    if (document.getElementById('numbers').checked) {
        chars += nums;
    }
    if (document.getElementById('symbols').checked) {
        chars += syms;
    }

    if (excludeAmb) {
        chars = chars.split('').filter(c => !AMBIGUOUS_CHARS.has(c)).join('');
    }

    return chars;
}

function generatePassword() {
    const charset = buildCharset();
    if (charset.length === 0) {
        showToast('⚠️ Select at least one character type');
        return;
    }

    const length = parseInt(document.getElementById('lengthSlider').value);
    let password = '';
    for (let i = 0; i < length; i++) {
        password += charset[getRandomInt(charset.length)];
    }

    currentPassword = password;
    document.getElementById('passwordDisplay').textContent = password;

    updateStats(password, charset);
    updateStrength(password, charset);
    addToHistory(password);
    showToast('✅ Password generated!');
}

function copyPassword() {
    if (!currentPassword) return;
    navigator.clipboard.writeText(currentPassword).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.classList.add('copied');
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
        showToast('📋 Copied to clipboard!');
        setTimeout(() => {
            btn.classList.remove('copied');
            btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
        }, 2000);
    });
}

function updateStats(password, charset) {
    const len = password.length;
    const pool = charset.length;
    const entropy = len * Math.log2(pool);

    document.getElementById('charCount').textContent = len;
    document.getElementById('entropyBits').textContent = entropy < 1 ? entropy.toFixed(1) + ' bits' : Math.round(entropy) + ' bits';

    let classes = 0;
    if (document.getElementById('uppercase').checked) classes++;
    if (document.getElementById('lowercase').checked) classes++;
    if (document.getElementById('numbers').checked) classes++;
    if (document.getElementById('symbols').checked) classes++;
    document.getElementById('charClasses').textContent = classes + ' / 4';
    document.getElementById('poolSize').textContent = pool;
}

function updateStrength(password, charset) {
    const pool = charset.length;
    const len = password.length;
    const entropy = len * Math.log2(pool);

    const meter = document.getElementById('strengthMeter');
    const bar = document.getElementById('strengthBar');
    const label = document.getElementById('strengthLabel');

    meter.style.display = 'block';

    let strength, color, width;
    if (entropy < 35) {
        strength = '🔴 Weak';
        color = '#f85149';
        width = 25;
    } else if (entropy < 60) {
        strength = '🟠 Medium';
        color = '#d29922';
        width = 50;
    } else if (entropy < 80) {
        strength = '🟢 Strong';
        color = '#3fb950';
        width = 75;
    } else {
        strength = '🟣 Very Strong';
        color = '#bc8cff';
        width = 100;
    }

    bar.style.width = width + '%';
    bar.style.background = color;
    label.textContent = strength;
    label.style.color = color;
}

function toggleUpdate() {
    const upper = document.getElementById('uppercase');
    const lower = document.getElementById('lowercase');
    const nums = document.getElementById('numbers');
    const syms = document.getElementById('symbols');

    document.getElementById('toggleUppercase').classList.toggle('active', upper.checked);
    document.getElementById('toggleLowercase').classList.toggle('active', lower.checked);
    document.getElementById('toggleNumbers').classList.toggle('active', nums.checked);
    document.getElementById('toggleSymbols').classList.toggle('active', syms.checked);

    const ambiguous = document.getElementById('toggleAmbiguous');
    ambiguous.classList.toggle('active', document.getElementById('excludeAmbiguous').checked);

    if (currentPassword) {
        generatePassword();
    }
}

function updateLength() {
    document.getElementById('lengthValue').textContent = document.getElementById('lengthSlider').value;
    if (currentPassword) {
        generatePassword();
    }
}

function addToHistory(password) {
    const now = new Date();
    const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

    passwordHistory.unshift({ password, time: timeStr });
    if (passwordHistory.length > 10) {
        passwordHistory.pop();
    }

    renderHistory();
}

function renderHistory() {
    const list = document.getElementById('historyList');
    const clearBtn = document.getElementById('clearHistoryBtn');
    const empty = document.getElementById('emptyHistory');

    if (passwordHistory.length === 0) {
        list.innerHTML = '<li class="empty-history" id="emptyHistory">No passwords generated yet</li>';
        clearBtn.style.display = 'none';
        return;
    }

    clearBtn.style.display = 'block';
    list.innerHTML = passwordHistory.map((item, i) => `
        <li class="history-item">
            <span class="history-password" title="${item.password}">${escapeHtml(item.password)}</span>
            <div class="history-meta">
                <span class="history-time">${item.time}</span>
                <button class="history-copy-btn" title="Copy" onclick="copyFromHistory('${escapeJs(item.password)}')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                    </svg>
                </button>
            </div>
        </li>
    `).join('');
}

function copyFromHistory(password) {
    navigator.clipboard.writeText(password).then(() => {
        showToast('📋 Copied to clipboard!');
    });
}

function clearHistory() {
    passwordHistory = [];
    renderHistory();
    showToast('🗑️ History cleared');
}

function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function escapeJs(str) {
    return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n');
}

function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
}

document.getElementById('passwordDisplay').addEventListener('click', () => {
    if (currentPassword) {
        copyPassword();
    }
});

generatePassword();
</script>
</body>
</html>
