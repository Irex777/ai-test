<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 24px; font-size: 1.8rem; color: #58a6ff; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 24px; margin-bottom: 16px; }
        .password-display { background: #0d1117; border: 2px solid #30363d; border-radius: 8px; padding: 16px; font-family: 'SF Mono', 'Consolas', monospace; font-size: 1.2rem; word-break: break-all; min-height: 60px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .password-text { flex: 1; overflow-wrap: break-word; }
        .copy-btn { background: #238636; border: none; color: white; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; transition: background 0.2s; white-space: nowrap; }
        .copy-btn:hover { background: #2ea043; }
        .copy-btn.copied { background: #768390; }
        .slider-container { margin: 20px 0; }
        .slider-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; }
        .slider { width: 100%; height: 6px; border-radius: 3px; background: #30363d; outline: none; -webkit-appearance: none; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #58a6ff; cursor: pointer; }
        .slider::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: #58a6ff; cursor: pointer; border: none; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .option { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.9rem; }
        .option input[type="checkbox"] { width: 18px; height: 18px; accent-color: #58a6ff; cursor: pointer; }
        .option input[type="checkbox"]:disabled { accent-color: #484f58; cursor: not-allowed; }
        .option.disabled { opacity: 0.5; cursor: not-allowed; }
        .strength-meter { margin: 20px 0; }
        .strength-label { font-size: 0.85rem; margin-bottom: 6px; display: flex; justify-content: space-between; }
        .strength-bar { height: 8px; background: #30363d; border-radius: 4px; overflow: hidden; }
        .strength-fill { height: 100%; width: 0%; transition: width 0.3s, background 0.3s; border-radius: 4px; }
        .strength-weak { background: #f85149; width: 25%; }
        .strength-medium { background: #d29922; width: 50%; }
        .strength-strong { background: #3fb950; width: 75%; }
        .strength-very-strong { background: #238636; width: 100%; }
        .entropy { font-size: 0.8rem; color: #8b949e; text-align: right; margin-top: 4px; }
        .generate-btn { width: 100%; padding: 14px; background: #238636; border: none; color: white; font-size: 1rem; font-weight: 600; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        .generate-btn:hover { background: #2ea043; }
        .history { margin-top: 8px; }
        .history h3 { font-size: 0.9rem; margin-bottom: 12px; color: #8b949e; }
        .history-list { list-style: none; max-height: 200px; overflow-y: auto; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #21262d; font-family: 'SF Mono', 'Consolas', monospace; font-size: 0.85rem; }
        .history-item:last-child { border-bottom: none; }
        .history-password { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 12px; }
        .history-copy { background: #21262d; border: none; color: #58a6ff; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
        .history-copy:hover { background: #30363d; }
        .char-count { font-size: 0.8rem; color: #8b949e; margin-top: 8px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Password Generator</h1>
        
        <div class="card">
            <div class="password-display">
                <span class="password-text" id="password">Click Generate</span>
                <button class="copy-btn" id="copyBtn">Copy</button>
            </div>
            
            <div class="slider-container">
                <div class="slider-header">
                    <label>Length</label>
                    <span id="lengthValue">16</span>
                </div>
                <input type="range" class="slider" id="lengthSlider" min="8" max="64" value="16">
            </div>
            
            <div class="options">
                <label class="option"><input type="checkbox" id="uppercase" checked> Uppercase (A-Z)</label>
                <label class="option"><input type="checkbox" id="lowercase" checked> Lowercase (a-z)</label>
                <label class="option"><input type="checkbox" id="numbers" checked> Numbers (0-9)</label>
                <label class="option"><input type="checkbox" id="symbols" checked> Symbols (!@#$)</label>
                <label class="option"><input type="checkbox" id="ambiguous" checked> Exclude ambiguous</label>
            </div>
            
            <div class="strength-meter">
                <div class="strength-label">
                    <span>Strength</span>
                    <span id="strengthText">-</span>
                </div>
                <div class="strength-bar">
                    <div class="strength-fill" id="strengthFill"></div>
                </div>
                <div class="entropy" id="entropy">0 bits of entropy</div>
            </div>
            
            <div class="char-count" id="charCount">0 characters</div>
            
            <button class="generate-btn" id="generateBtn">Generate Password</button>
        </div>
        
        <div class="card history">
            <h3>History (Last 10)</h3>
            <ul class="history-list" id="historyList"></ul>
        </div>
    </div>

    <script>
        const CHARS = {
            uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            lowercase: 'abcdefghijklmnopqrstuvwxyz',
            numbers: '0123456789',
            symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
        };
        
        const AMBIGUOUS = '0O1Il|B8G6S5Z2';
        
        const lengthSlider = document.getElementById('lengthSlider');
        const lengthValue = document.getElementById('lengthValue');
        const uppercase = document.getElementById('uppercase');
        const lowercase = document.getElementById('lowercase');
        const numbers = document.getElementById('numbers');
        const symbols = document.getElementById('symbols');
        const ambiguous = document.getElementById('ambiguous');
        const passwordDisplay = document.getElementById('password');
        const copyBtn = document.getElementById('copyBtn');
        const generateBtn = document.getElementById('generateBtn');
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');
        const entropyDisplay = document.getElementById('entropy');
        const charCount = document.getElementById('charCount');
        const historyList = document.getElementById('historyList');
        
        let history = [];
        let lastPassword = '';

        function getCharset() {
            let charset = '';
            const excludeAmbiguous = ambiguous.checked;
            
            if (uppercase.checked) charset += CHARS.uppercase;
            if (lowercase.checked) charset += CHARS.lowercase;
            if (numbers.checked) charset += CHARS.numbers;
            if (symbols.checked) charset += CHARS.symbols;
            
            if (excludeAmbiguous && charset) {
                for (const char of AMBIGUOUS) {
                    charset = charset.split(char).join('');
                }
            }
            
            return charset;
        }

        function generatePassword() {
            const length = parseInt(lengthSlider.value);
            let charset = getCharset();
            
            if (!charset) {
                passwordDisplay.textContent = 'Select at least one option';
                updateStrength('', 0);
                return '';
            }
            
            let password = '';
            const array = new Uint32Array(length);
            crypto.getRandomValues(array);
            
            for (let i = 0; i < length; i++) {
                password += charset[array[i] % charset.length];
            }
            
            passwordDisplay.textContent = password;
            charCount.textContent = `${password.length} characters`;
            
            const poolSize = charset.length;
            const entropy = Math.floor(length * Math.log2(poolSize));
            updateStrength(password, entropy);
            
            if (password && password !== lastPassword) {
                addToHistory(password);
                lastPassword = password;
            }
            
            return password;
        }

        function updateStrength(password, entropy) {
            let strength = '';
            let strengthClass = '';
            
            if (entropy < 40) {
                strength = 'Weak';
                strengthClass = 'strength-weak';
            } else if (entropy < 60) {
                strength = 'Medium';
                strengthClass = 'strength-medium';
            } else if (entropy < 80) {
                strength = 'Strong';
                strengthClass = 'strength-strong';
            } else {
                strength = 'Very Strong';
                strengthClass = 'strength-very-strong';
            }
            
            strengthText.textContent = password ? strength : '-';
            strengthFill.className = 'strength-fill';
            if (password) strengthFill.classList.add(strengthClass);
            entropyDisplay.textContent = password ? `${entropy} bits of entropy` : '0 bits of entropy';
        }

        function addToHistory(password) {
            if (history.includes(password)) return;
            
            history.unshift(password);
            if (history.length > 10) history.pop();
            
            renderHistory();
        }

        function renderHistory() {
            historyList.innerHTML = history.map((pwd, index) => `
                <li class="history-item">
                    <span class="history-password">${pwd}</span>
                    <button class="history-copy" onclick="copyFromHistory(${index})">Copy</button>
                </li>
            `).join('');
        }

        function copyFromHistory(index) {
            navigator.clipboard.writeText(history[index]);
            const btns = document.querySelectorAll('.history-copy');
            const originalText = btns[index].textContent;
            btns[index].textContent = 'Copied!';
            setTimeout(() => btns[index].textContent = originalText, 1500);
        }

        function copyPassword() {
            const password = passwordDisplay.textContent;
            if (!password || password === 'Click Generate' || password === 'Select at least one option') return;
            
            navigator.clipboard.writeText(password);
            copyBtn.textContent = 'Copied!';
            copyBtn.classList.add('copied');
            setTimeout(() => {
                copyBtn.textContent = 'Copy';
                copyBtn.classList.remove('copied');
            }, 1500);
        }

        function ensureOneOption() {
            const checked = [uppercase, lowercase, numbers, symbols].filter(cb => cb.checked);
            if (checked.length === 1) {
                [uppercase, lowercase, numbers, symbols].forEach(cb => {
                    if (!cb.checked) cb.disabled = true;
                });
            } else {
                [uppercase, lowercase, numbers, symbols].forEach(cb => cb.disabled = false);
            }
        }

        lengthSlider.addEventListener('input', () => {
            lengthValue.textContent = lengthSlider.value;
        });

        generateBtn.addEventListener('click', generatePassword);
        copyBtn.addEventListener('click', copyPassword);

        [uppercase, lowercase, numbers, symbols].forEach(cb => {
            cb.addEventListener('change', () => {
                ensureOneOption();
                if (getcharset()) generatePassword();
            });
        });

        ambiguous.addEventListener('change', generatePassword);

        generateBtn.addEventListener('click', () => {
            const btn = generateBtn;
            btn.style.transform = 'scale(0.98)';
            setTimeout(() => btn.style.transform = '', 100);
        });

        lengthSlider.addEventListener('change', generatePassword);

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && e.ctrlKey) {
                e.preventDefault();
                generatePassword();
            }
        });

        ensureOneOption();
        generatePassword();
    </script>
</body>
</html>
