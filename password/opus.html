<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator</title>
<style>
  :root {
    --bg: #0b0e17;
    --bg-grad-1: #111521;
    --bg-grad-2: #0a0d15;
    --card: #151a27;
    --card-2: #1a2030;
    --border: #252b3d;
    --text: #e6e9f2;
    --muted: #8b93a7;
    --accent: #7c5cff;
    --accent-2: #4f8cff;
    --accent-glow: rgba(124, 92, 255, 0.45);
    --weak: #ff5470;
    --medium: #ffa53b;
    --strong: #2dd4a7;
    --very-strong: #00e676;
    --shadow: 0 20px 60px rgba(0, 0, 0, 0.55);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(124, 92, 255, 0.18), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(79, 140, 255, 0.14), transparent 60%),
      linear-gradient(160deg, var(--bg-grad-1), var(--bg-grad-2));
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px 16px;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    width: 100%;
    max-width: 560px;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
  }

  .logo {
    width: 42px; height: 42px;
    border-radius: 12px;
    display: grid; place-items: center;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    box-shadow: 0 8px 24px var(--accent-glow);
    flex-shrink: 0;
  }
  .logo svg { width: 22px; height: 22px; stroke: #fff; }

  h1 {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .subtitle { color: var(--muted); font-size: 0.82rem; }

  .card {
    background: linear-gradient(180deg, var(--card), var(--card-2));
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 22px;
    box-shadow: var(--shadow);
  }

  /* Password display */
  .display {
    position: relative;
    background: #0d1018;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 60px 18px 18px;
    margin-bottom: 16px;
    min-height: 64px;
    display: flex;
    align-items: center;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .display:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .pw {
    font-family: "SF Mono", "JetBrains Mono", "Fira Code", Menlo, Consolas, monospace;
    font-size: 1.2rem;
    letter-spacing: 0.02em;
    word-break: break-all;
    line-height: 1.5;
    width: 100%;
  }
  .pw .c-up { color: #8be9fd; }
  .pw .c-low { color: #c7d0e0; }
  .pw .c-num { color: #ffd479; }
  .pw .c-sym { color: #ff7eb6; }

  .copy-btn {
    position: absolute;
    top: 50%; right: 10px;
    transform: translateY(-50%);
    background: var(--card-2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 40px; height: 40px;
    border-radius: 10px;
    cursor: pointer;
    display: grid; place-items: center;
    transition: background 0.18s, border-color 0.18s, color 0.18s, transform 0.1s;
  }
  .copy-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
  .copy-btn:active { transform: translateY(-50%) scale(0.94); }
  .copy-btn svg { width: 18px; height: 18px; stroke: currentColor; }
  .copy-btn.copied { background: var(--very-strong); border-color: var(--very-strong); color: #04210f; }

  /* Strength meter */
  .strength-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px;
  }
  .strength-label { font-size: 0.8rem; color: var(--muted); }
  .strength-value { font-size: 0.85rem; font-weight: 700; letter-spacing: 0.02em; }

  .meter {
    height: 8px;
    border-radius: 99px;
    background: #0d1018;
    border: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 22px;
  }
  .meter-fill {
    height: 100%;
    width: 0%;
    border-radius: 99px;
    transition: width 0.45s cubic-bezier(0.22, 1, 0.36, 1), background 0.3s;
  }

  /* Length */
  .control-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 10px;
  }
  .control-head label { font-size: 0.88rem; color: var(--text); font-weight: 500; }
  .len-val {
    font-family: "SF Mono", Menlo, monospace;
    font-size: 1.15rem; font-weight: 700;
    color: var(--accent);
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--accent) 0%, var(--accent) var(--p, 0%), #2a3043 var(--p, 0%));
    outline: none;
    margin-bottom: 22px;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: #fff;
    border: 3px solid var(--accent);
    box-shadow: 0 2px 8px var(--accent-glow);
    cursor: grab;
    transition: transform 0.12s;
  }
  input[type="range"]::-webkit-slider-thumb:active { transform: scale(1.18); cursor: grabbing; }
  input[type="range"]::-moz-range-thumb {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #fff;
    border: 3px solid var(--accent);
    cursor: grab;
  }

  /* Toggles */
  .toggles {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 22px;
  }
  .toggle {
    display: flex; align-items: center; gap: 10px;
    background: #0f1320;
    border: 1px solid var(--border);
    border-radius: 11px;
    padding: 11px 13px;
    cursor: pointer;
    user-select: none;
    transition: border-color 0.18s, background 0.18s;
  }
  .toggle:hover { border-color: #3a4considerable; border-color: #38405e; }
  .toggle input { display: none; }
  .switch {
    position: relative;
    width: 38px; height: 22px;
    border-radius: 99px;
    background: #2a3043;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .switch::after {
    content: "";
    position: absolute;
    top: 3px; left: 3px;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #fff;
    transition: transform 0.2s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .toggle input:checked + .switch { background: linear-gradient(135deg, var(--accent), var(--accent-2)); }
  .toggle input:checked + .switch::after { transform: translateX(16px); }
  .toggle input:focus-visible + .switch { box-shadow: 0 0 0 3px var(--accent-glow); }
  .toggle span.txt { font-size: 0.86rem; }

  .toggle.full { grid-column: 1 / -1; }
  .toggle .hint { color: var(--muted); font-size: 0.74rem; margin-left: auto; }

  /* Generate button */
  .generate {
    width: 100%;
    border: none;
    cursor: pointer;
    padding: 15px;
    border-radius: 13px;
    font-size: 1rem;
    font-weight: 700;
    color: #fff;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    box-shadow: 0 10px 28px var(--accent-glow);
    display: flex; align-items: center; justify-content: center; gap: 9px;
    transition: transform 0.1s, box-shadow 0.2s, filter 0.2s;
  }
  .generate:hover { filter: brightness(1.08); }
  .generate:active { transform: scale(0.985); }
  .generate svg { width: 18px; height: 18px; stroke: #fff; }

  /* Stats */
  .stats {
    display: flex;
    gap: 10px;
    margin-top: 18px;
  }
  .stat {
    flex: 1;
    background: #0f1320;
    border: 1px solid var(--border);
    border-radius: 11px;
    padding: 12px;
    text-align: center;
  }
  .stat .num {
    font-family: "SF Mono", Menlo, monospace;
    font-size: 1.15rem;
    font-weight: 700;
  }
  .stat .lbl { font-size: 0.72rem; color: var(--muted); margin-top: 3px; }

  /* History */
  .history-card { margin-top: 16px; }
  .history-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px;
  }
  .history-head h2 { font-size: 0.92rem; font-weight: 600; }
  .clear-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 11px;
    border-radius: 8px;
    font-size: 0.75rem;
    cursor: pointer;
    transition: color 0.18s, border-color 0.18s;
  }
  .clear-btn:hover { color: var(--weak); border-color: var(--weak); }

  .history-list { display: flex; flex-direction: column; gap: 7px; }
  .history-item {
    display: flex; align-items: center; gap: 10px;
    background: #0f1320;
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 9px 11px;
    cursor: pointer;
    transition: border-color 0.16s, background 0.16s;
  }
  .history-item:hover { border-color: var(--accent); background: #131826; }
  .history-item .hpw {
    font-family: "SF Mono", Menlo, monospace;
    font-size: 0.82rem;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .history-item .hcopy {
    color: var(--muted);
    font-size: 0.7rem;
    flex-shrink: 0;
  }
  .history-empty {
    text-align: center;
    color: var(--muted);
    font-size: 0.82rem;
    padding: 14px 0;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--very-strong);
    color: #04210f;
    padding: 11px 20px;
    border-radius: 99px;
    font-weight: 700;
    font-size: 0.85rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s, transform 0.25s;
    box-shadow: 0 12px 32px rgba(0, 230, 118, 0.35);
    z-index: 50;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 480px) {
    .toggles { grid-template-columns: 1fr; }
    .pw { font-size: 1.05rem; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <div>
        <h1>Password Generator</h1>
        <div class="subtitle">Secure, random & cryptographic</div>
      </div>
    </header>

    <div class="card">
      <!-- Password display -->
      <div class="display">
        <div class="pw" id="password" aria-live="polite" aria-label="Generated password"></div>
        <button class="copy-btn" id="copyBtn" title="Copy to clipboard" aria-label="Copy password">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>
      </div>

      <!-- Strength meter -->
      <div class="strength-row">
        <span class="strength-label">Strength</span>
        <span class="strength-value" id="strengthValue">—</span>
      </div>
      <div class="meter"><div class="meter-fill" id="meterFill"></div></div>

      <!-- Length -->
      <div class="control-head">
        <label for="length">Password Length</label>
        <span class="len-val"><span id="lengthValue">16</span></span>
      </div>
      <input type="range" id="length" min="8" max="64" value="16" aria-label="Password length">

      <!-- Toggles -->
      <div class="toggles">
        <label class="toggle">
          <input type="checkbox" id="upper" checked>
          <span class="switch"></span>
          <span class="txt">A–Z</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="lower" checked>
          <span class="switch"></span>
          <span class="txt">a–z</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="numbers" checked>
          <span class="switch"></span>
          <span class="txt">0–9</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="symbols" checked>
          <span class="switch"></span>
          <span class="txt">!@#$</span>
        </label>
        <label class="toggle full">
          <input type="checkbox" id="excludeAmbiguous">
          <span class="switch"></span>
          <span class="txt">Exclude ambiguous</span>
          <span class="hint">(il1Lo0O)</span>
        </label>
      </div>

      <!-- Generate -->
      <button class="generate" id="generateBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Generate Password
      </button>

      <!-- Stats -->
      <div class="stats">
        <div class="stat">
          <div class="num" id="charCount">0</div>
          <div class="lbl">Characters</div>
        </div>
        <div class="stat">
          <div class="num" id="entropyBits">0</div>
          <div class="lbl">Entropy (bits)</div>
        </div>
      </div>
    </div>

    <!-- History -->
    <div class="card history-card">
      <div class="history-head">
        <h2>Recent Passwords</h2>
        <button class="clear-btn" id="clearBtn">Clear</button>
      </div>
      <div class="history-list" id="historyList">
        <div class="history-empty">No passwords yet — generate one above.</div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">Copied!</div>

<script>
(function () {
  "use strict";

  const SETS = {
    upper: "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
    lower: "abcdefghijklmnopqrstuvwxyz",
    numbers: "0123456789",
    symbols: "!@#$%^&*()_+-=[]{}|;:,.<>?/~`"
  };
  const AMBIGUOUS = "il1Lo0O";

  // DOM refs
  const $ = (id) => document.getElementById(id);
  const lengthInput = $("length");
  const lengthValue = $("lengthValue");
  const upperEl = $("upper");
  const lowerEl = $("lower");
  const numbersEl = $("numbers");
  const symbolsEl = $("symbols");
  const excludeAmbEl = $("excludeAmbiguous");
  const passwordEl = $("password");
  const meterFill = $("meterFill");
  const strengthValue = $("strengthValue");
  const charCountEl = $("charCount");
  const entropyBitsEl = $("entropyBits");
  const generateBtn = $("generateBtn");
  const copyBtn = $("copyBtn");
  const historyList = $("historyList");
  const clearBtn = $("clearBtn");
  const toast = $("toast");

  let history = [];
  const MAX_HISTORY = 10;

  // Uniform, cryptographically secure random int in [0, max)
  function secureRandomInt(max) {
    if (max <= 0) return 0;
    const buf = new Uint32Array(1);
    const range = 0x100000000;
    const limit = range - (range % max);
    let x;
    do {
      crypto.getRandomValues(buf);
      x = buf[0];
    } while (x >= limit);
    return x % max;
  }

  function shuffleArr(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = secureRandomInt(i + 1);
      const tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
    return arr;
  }

  function getSettings() {
    return {
      length: parseInt(lengthInput.value, 10),
      upper: upperEl.checked,
      lower: lowerEl.checked,
      numbers: numbersEl.checked,
      symbols: symbolsEl.checked,
      excludeAmbiguous: excludeAmbEl.checked
    };
  }

  function buildCharset(s) {
    let pool = "";
    const groups = [];
    if (s.upper) groups.push(SETS.upper);
    if (s.lower) groups.push(SETS.lower);
    if (s.numbers) groups.push(SETS.numbers);
    if (s.symbols) groups.push(SETS.symbols);

    groups.forEach((g) => {
      let chars = g;
      if (s.excludeAmbiguous) {
        chars = chars.split("").filter((c) => !AMBIGUOUS.includes(c)).join("");
      }
      pool += chars;
    });

    return { pool, groups };
  }

  function generate() {
    const s = getSettings();
    const { pool, groups } = buildCharset(s);

    if (!pool) {
      passwordEl.textContent = "Select at least one character set";
      passwordEl.style.color = "#ff5470";
      meterFill.style.width = "0%";
      meterFill.style.background = "#ff5470";
      strengthValue.textContent = "None";
      strengthValue.style.color = "#ff5470";
      charCountEl.textContent = "0";
      entropyBitsEl.textContent = "0";
      return;
    }
    passwordEl.style.color = "";

    // Ensure at least one char from each enabled (non-empty) group
    const seedGroups = groups
      .map((g) => (s.excludeAmbiguous
        ? g.split("").filter((c) => !AMBIGUOUS.includes(c))
        : g.split("")))
      .filter((arr) => arr.length > 0);

    const chars = [];
    const takeCount = Math.min(seedGroups.length, s.length);

    for (let i = 0; i < takeCount; i++) {
      const g = seedGroups[i];
      chars.push(g[secureRandomInt(g.length)]);
    }
    while (chars.length < s.length) {
      chars.push(pool[secureRandomInt(pool.length)]);
    }
    shuffleArr(chars);
    const password = chars.join("");

    renderPassword(password);
    updateStats(pool.length, s.length);
    updateStrength(pool.length, s.length);
    addToHistory(password);
  }

  // Color-code each character by type
  function classify(ch) {
    if (SETS.upper.includes(ch)) return "c-up";
    if (SETS.lower.includes(ch)) return "c-low";
    if (SETS.numbers.includes(ch)) return "c-num";
    return "c-sym";
  }

  function renderPassword(password) {
    passwordEl.dataset.raw = password;
    let html = "";
    for (const ch of password) {
      const esc = ch === "<" ? "&lt;" : ch === ">" ? "&gt;" : ch === "&" ? "&amp;" : ch;
      html += '<span class="' + classify(ch) + '">' + esc + "</span>";
    }
    passwordEl.innerHTML = html;
    charCountEl.textContent = password.length;
  }

  function updateStats(poolSize, length) {
    const entropy = length * Math.log2(poolSize);
    entropyBitsEl.textContent = Math.round(entropy);
  }

  function updateStrength(poolSize, length) {
    const entropy = length * Math.log2(poolSize);
    let level, color, pct;

    if (entropy < 40) {
      level = "Weak"; color = "#ff5470";
      pct = 25;
    } else if (entropy < 60) {
      level = "Medium"; color = "#ffa53b";
      pct = 50;
    } else if (entropy < 90) {
      level = "Strong"; color = "#2dd4a7";
      pct = 75;
    } else {
      level = "Very Strong"; color = "#00e676";
      pct = 100;
    }

    meterFill.style.width = pct + "%";
    meterFill.style.background = color;
    strengthValue.textContent = level;
    strengthValue.style.color = color;
  }

  function addToHistory(password) {
    // avoid immediate duplicates
    if (history[0] === password) return;
    history.unshift(password);
    if (history.length > MAX_HISTORY) history = history.slice(0, MAX_HISTORY);
    renderHistory();
  }

  function escapeHtml(str) {
    return str.replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    })[c]);
  }

  function renderHistory() {
    if (history.length === 0) {
      historyList.innerHTML = '<div class="history-empty">No passwords yet — generate one above.</div>';
      return;
    }
    historyList.innerHTML = history.map(function (pw) {
      return '<div class="history-item" data-pw="' + escapeHtml(pw) + '" title="Click to copy">' +
        '<span class="hpw">' + escapeHtml(pw) + '</span>' +
        '<span class="hcopy">copy</span></div>';
    }).join("");
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add("show");
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toast.classList.remove("show"), 1400);
  }

  async function copyText(text) {
    try {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return true;
      }
    } catch (e) { /* fall through */ }
    // Fallback
    try {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      const ok = document.execCommand("copy");
      document.body.removeChild(ta);
      return ok;
    } catch (e) {
      return false;
    }
  }

  async function handleCopy(text) {
    const ok = await copyText(text);
    if (ok) {
      copyBtn.classList.add("copied");
      showToast("Copied to clipboard");
      setTimeout(() => copyBtn.classList.remove("copied"), 1200);
    } else {
      showToast("Copy failed");
    }
  }

  // Slider track fill
  function updateSliderFill() {
    const min = parseInt(lengthInput.min, 10);
    const max = parseInt(lengthInput.max, 10);
    const val = parseInt(lengthInput.value, 10);
    const p = ((val - min) / (max - min)) * 100;
    lengthInput.style.setProperty("--p", p + "%");
    lengthValue.textContent = val;
  }

  // Events
  lengthInput.addEventListener("input", updateSliderFill);
  lengthInput.addEventListener("change", generate);

  [upperEl, lowerEl, numbersEl, symbolsEl, excludeAmbEl].forEach((el) => {
    el.addEventListener("change", generate);
  });

  generateBtn.addEventListener("click", generate);

  copyBtn.addEventListener("click", function () {
    const pw = passwordEl.dataset.raw || "";
    if (pw) handleCopy(pw);
  });

  historyList.addEventListener("click", function (e) {
    const item = e.target.closest(".history-item");
    if (item) handleCopy(item.dataset.pw);
  });

  clearBtn.addEventListener("click", function () {
    history = [];
    renderHistory();
    showToast("History cleared");
  });

  // Keyboard: space/enter on generate handled natively; add global shortcut
  document.addEventListener("keydown", function (e) {
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "g") {
      e.preventDefault();
      generate();
    }
  });

  // Init
  updateSliderFill();
  generate();
})();
</script>
</body>
</html>
