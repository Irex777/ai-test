<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0d1117;--bg2:#161b22;--bg3:#1c2333;--border:#30363d;
    --fg:#e6edf3;--muted:#8b949e;--accent:#f0883e;
    --accent-glow:rgba(240,136,62,0.15);
    --weak:#f85149;--fair:#f0883e;--strong:#3fb950;--vstrong:#58a6ff;
    --radius:10px;
  }
  html{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--fg);line-height:1.5}
  body{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 16px 60px;
    background:var(--bg);
    background-image:
      radial-gradient(ellipse 80% 60% at 50% 0%,rgba(240,136,62,0.06),transparent),
      radial-gradient(ellipse 60% 50% at 80% 100%,rgba(88,166,255,0.04),transparent);
  }

  .app{max-width:520px;width:100%}

  .title{font-size:28px;font-weight:800;letter-spacing:-0.5px;margin-bottom:4px;text-align:center}
  .subtitle{font-size:13px;color:var(--muted);text-align:center;margin-bottom:32px;letter-spacing:0.5px;text-transform:uppercase}

  .card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;
    transition:border-color .2s}
  .card:hover{border-color:rgba(240,136,62,0.3)}

  /* Password display */
  .pw-display{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:20px;min-height:56px}
  .pw-text{flex:1;font-family:'Courier New',monospace;font-size:17px;font-weight:700;word-break:break-all;letter-spacing:1px;color:var(--fg);min-height:24px;user-select:all}
  .pw-text.placeholder{color:var(--muted);font-weight:400;font-size:14px;font-family:'Segoe UI',system-ui,sans-serif}
  .btn-copy{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:8px 14px;cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap;transition:all .15s;flex-shrink:0}
  .btn-copy:hover{filter:brightness(1.15);transform:scale(1.03)}
  .btn-copy:active{transform:scale(0.97)}
  .btn-copy.copied{background:var(--strong)}

  /* Strength meter */
  .strength-wrap{margin-bottom:20px}
  .strength-bar-bg{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin-bottom:8px}
  .strength-bar{height:100%;width:0%;border-radius:3px;transition:width .4s ease,background .4s ease}
  .strength-label{display:flex;justify-content:space-between;align-items:center;font-size:12px}
  .strength-label span:first-child{color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;font-weight:600}
  .strength-label .strength-val{font-weight:700;font-size:13px}

  /* Slider */
  .slider-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .slider-row label{font-size:14px;font-weight:600;color:var(--fg)}
  .slider-row .len-val{background:var(--accent);color:#fff;font-weight:700;font-size:14px;padding:2px 10px;border-radius:5px;min-width:36px;text-align:center}
  input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:var(--bg);outline:none;margin-bottom:20px;cursor:pointer}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--accent);cursor:pointer;border:3px solid var(--bg2);box-shadow:0 0 8px rgba(240,136,62,0.3);transition:transform .15s}
  input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.15)}
  input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--accent);cursor:pointer;border:3px solid var(--bg2)}

  /* Toggles */
  .toggles{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
  .toggle-item{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;cursor:pointer;transition:all .15s;user-select:none}
  .toggle-item:hover{border-color:var(--accent)}
  .toggle-item.active{border-color:var(--accent);background:var(--accent-glow)}
  .toggle-item input{display:none}
  .toggle-box{width:18px;height:18px;border-radius:4px;border:2px solid var(--muted);display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
  .toggle-item.active .toggle-box{background:var(--accent);border-color:var(--accent)}
  .toggle-box svg{width:12px;height:12px;opacity:0;transition:opacity .15s}
  .toggle-item.active .toggle-box svg{opacity:1}
  .toggle-label{font-size:13px;font-weight:600}

  .toggle-item.full{grid-column:1/-1}

  /* Generate button */
  .btn-gen{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),#e8622a);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:0.3px;transition:all .2s;position:relative;overflow:hidden}
  .btn-gen:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 6px 20px rgba(240,136,62,0.3)}
  .btn-gen:active{transform:translateY(0);filter:brightness(0.95)}

  /* Info row */
  .info-row{display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding:12px 16px;background:var(--bg);border-radius:8px;border:1px solid var(--border)}
  .info-item{text-align:center;flex:1}
  .info-item .info-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;font-weight:600;margin-bottom:2px}
  .info-item .info-value{font-size:18px;font-weight:800;font-family:'Courier New',monospace}

  /* History */
  .history-title{font-size:14px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .history-title::after{content:'';flex:1;height:1px;background:var(--border)}
  .history-list{display:flex;flex-direction:column;gap:6px}
  .history-item{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:10px 14px;transition:all .15s;animation:fadeIn .3s ease}
  .history-item:hover{border-color:rgba(240,136,62,0.3)}
  .history-num{font-size:11px;color:var(--muted);font-weight:700;min-width:20px}
  .history-pw{flex:1;font-family:'Courier New',monospace;font-size:13px;word-break:break-all;color:var(--fg);letter-spacing:0.5px}
  .history-meta{font-size:10px;color:var(--muted);white-space:nowrap;font-weight:600}
  .btn-history-copy{background:none;border:1px solid var(--border);color:var(--muted);border-radius:5px;padding:4px 8px;cursor:pointer;font-size:11px;transition:all .15s}
  .btn-history-copy:hover{border-color:var(--accent);color:var(--accent)}

  .empty-history{text-align:center;padding:24px;color:var(--muted);font-size:13px}

  @keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

  /* Toast */
  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg3);border:1px solid var(--border);color:var(--fg);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;opacity:0;transition:all .3s ease;z-index:999;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:480px){
    .toggles{grid-template-columns:1fr}
    .title{font-size:22px}
    .pw-text{font-size:14px}
  }
</style>
</head>
<body>
<div class="app">
  <div class="title">Password Generator</div>
  <div class="subtitle">Generate secure passwords instantly</div>

  <!-- Password display -->
  <div class="card">
    <div class="pw-display">
      <div class="pw-text placeholder" id="pwDisplay">Click generate to create a password</div>
      <button class="btn-copy" id="btnCopy" onclick="copyPassword()">Copy</button>
    </div>

    <!-- Strength meter -->
    <div class="strength-wrap">
      <div class="strength-bar-bg"><div class="strength-bar" id="strengthBar"></div></div>
      <div class="strength-label">
        <span>Strength</span>
        <span class="strength-val" id="strengthVal">---</span>
      </div>
    </div>

    <!-- Length slider -->
    <div class="slider-row">
      <label>Password Length</label>
      <span class="len-val" id="lenVal">16</span>
    </div>
    <input type="range" id="lenSlider" min="8" max="64" value="16" oninput="updateLength(this.value)">

    <!-- Toggles -->
    <div class="toggles">
      <label class="toggle-item active" onclick="toggleOption(this)">
        <input type="checkbox" checked data-opt="uppercase">
        <span class="toggle-box"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></span>
        <span class="toggle-label">Uppercase</span>
      </label>
      <label class="toggle-item active" onclick="toggleOption(this)">
        <input type="checkbox" checked data-opt="lowercase">
        <span class="toggle-box"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></span>
        <span class="toggle-label">Lowercase</span>
      </label>
      <label class="toggle-item active" onclick="toggleOption(this)">
        <input type="checkbox" checked data-opt="numbers">
        <span class="toggle-box"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></span>
        <span class="toggle-label">Numbers</span>
      </label>
      <label class="toggle-item active" onclick="toggleOption(this)">
        <input type="checkbox" checked data-opt="symbols">
        <span class="toggle-box"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></span>
        <span class="toggle-label">Symbols</span>
      </label>
      <label class="toggle-item full" onclick="toggleOption(this)">
        <input type="checkbox" data-opt="excludeAmbiguous">
        <span class="toggle-box"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></span>
        <span class="toggle-label">Exclude Ambiguous Characters (0Oo1lI)</span>
      </label>
    </div>

    <!-- Generate button -->
    <button class="btn-gen" onclick="generatePassword()">Generate Password</button>

    <!-- Info row -->
    <div class="info-row">
      <div class="info-item">
        <div class="info-label">Characters</div>
        <div class="info-value" id="charCount">0</div>
      </div>
      <div class="info-item">
        <div class="info-label">Entropy</div>
        <div class="info-value" id="entropyBits">0 <small style="font-size:11px;color:var(--muted)">bits</small></div>
      </div>
      <div class="info-item">
        <div class="info-label">Pool Size</div>
        <div class="info-value" id="poolSize">0</div>
      </div>
    </div>
  </div>

  <!-- History -->
  <div class="card">
    <div class="history-title">Recent Passwords</div>
    <div class="history-list" id="historyList">
      <div class="empty-history">No passwords generated yet</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // Character sets
  const CHARSETS = {
    uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
    lowercase: 'abcdefghijklmnopqrstuvwxyz',
    numbers: '0123456789',
    symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
  };
  const AMBIGUOUS = '0Oo1lI';

  let currentPassword = '';
  let history = [];

  function getOptions() {
    const items = document.querySelectorAll('.toggle-item');
    const opts = {};
    items.forEach(item => {
      const cb = item.querySelector('input');
      opts[cb.dataset.opt] = cb.checked;
    });
    return opts;
  }

  function buildPool(opts) {
    let pool = '';
    if (opts.uppercase) pool += CHARSETS.uppercase;
    if (opts.lowercase) pool += CHARSETS.lowercase;
    if (opts.numbers) pool += CHARSETS.numbers;
    if (opts.symbols) pool += CHARSETS.symbols;
    if (opts.excludeAmbiguous) {
      pool = pool.split('').filter(c => !AMBIGUOUS.includes(c)).join('');
    }
    return pool;
  }

  function secureRandom(max) {
    const arr = new Uint32Array(1);
    crypto.getRandomValues(arr);
    return arr[0] % max;
  }

  function generatePassword() {
    const opts = getOptions();
    const pool = buildPool(opts);
    if (!pool) {
      showToast('Enable at least one character set');
      return;
    }
    const len = parseInt(document.getElementById('lenSlider').value);
    let pw = '';
    for (let i = 0; i < len; i++) {
      pw += pool[secureRandom(pool.length)];
    }
    currentPassword = pw;

    // Update display
    const display = document.getElementById('pwDisplay');
    display.textContent = pw;
    display.classList.remove('placeholder');

    // Update info
    updateStrength(pw, pool, len);
    document.getElementById('charCount').textContent = pw.length;

    // Add to history
    addToHistory(pw, len);
  }

  function updateStrength(pw, pool, len) {
    const poolLen = pool.length;
    const entropy = Math.floor(len * Math.log2(poolLen));

    document.getElementById('entropyBits').innerHTML = entropy + ' <small style="font-size:11px;color:var(--muted)">bits</small>';
    document.getElementById('poolSize').textContent = poolLen;

    const bar = document.getElementById('strengthBar');
    const val = document.getElementById('strengthVal');

    let percent, label, color;
    if (entropy < 40) {
      percent = 15; label = 'Weak'; color = 'var(--weak)';
    } else if (entropy < 60) {
      percent = 38; label = 'Fair'; color = 'var(--fair)';
    } else if (entropy < 80) {
      percent = 65; label = 'Strong'; color = 'var(--strong)';
    } else {
      percent = 100; label = 'Very Strong'; color = 'var(--vstrong)';
    }

    // Scale percentage based on entropy more granularly
    percent = Math.min(100, Math.max(5, (entropy / 128) * 100));

    bar.style.width = percent + '%';
    bar.style.background = color;
    val.textContent = label;
    val.style.color = color;
  }

  function updateLength(val) {
    document.getElementById('lenVal').textContent = val;
  }

  function toggleOption(el) {
    // Use a small delay so the checkbox state updates first
    setTimeout(() => {
      const cb = el.querySelector('input');
      if (cb.checked) {
        el.classList.add('active');
      } else {
        el.classList.remove('active');
      }
      // Ensure at least one charset is active
      const opts = getOptions();
      if (!opts.uppercase && !opts.lowercase && !opts.numbers && !opts.symbols) {
        cb.checked = true;
        el.classList.add('active');
        showToast('At least one character type must be enabled');
      }
    }, 10);
  }

  function copyPassword() {
    if (!currentPassword) {
      showToast('Generate a password first');
      return;
    }
    navigator.clipboard.writeText(currentPassword).then(() => {
      const btn = document.getElementById('btnCopy');
      btn.textContent = 'Copied';
      btn.classList.add('copied');
      showToast('Password copied to clipboard');
      setTimeout(() => {
        btn.textContent = 'Copy';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  function copyFromHistory(pw) {
    navigator.clipboard.writeText(pw).then(() => {
      showToast('Copied from history');
    });
  }

  function addToHistory(pw, len) {
    history.unshift({ pw, len, time: new Date() });
    if (history.length > 10) history.pop();
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    if (history.length === 0) {
      list.innerHTML = '<div class="empty-history">No passwords generated yet</div>';
      return;
    }
    list.innerHTML = history.map((item, i) => {
      const truncated = item.pw.length > 32 ? item.pw.substring(0, 32) + '...' : item.pw;
      const entropy = Math.floor(item.len * Math.log2(buildPool(getOptions())));
      return `<div class="history-item" style="animation-delay:${i * 0.03}s">
        <span class="history-num">${i + 1}.</span>
        <span class="history-pw">${escapeHtml(truncated)}</span>
        <span class="history-meta">${item.pw.length}ch</span>
        <button class="btn-history-copy" onclick="copyFromHistory('${escapeAttr(item.pw)}')">Copy</button>
      </div>`;
    }).join('');
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function escapeAttr(str) {
    return str.replace(/'/g, "\\'").replace(/"/g, '\\"');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  // Generate on load
  window.addEventListener('DOMContentLoaded', () => {
    generatePassword();
  });
</script>
</body>
</html>
