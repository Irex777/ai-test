<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .container { width: 100%; max-width: 560px; }

  h1 {
    font-size: 1.5rem;
    font-weight: 700;
    text-align: center;
    margin-bottom: 1.75rem;
    color: #f8fafc;
    letter-spacing: -0.02em;
  }

  .card {
    background: #1e2130;
    border: 1px solid #2d3248;
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1rem;
  }

  .pw-box {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: #13151f;
    border: 1px solid #2d3248;
    border-radius: 8px;
    padding: 0.75rem 1rem;
    margin-bottom: 1rem;
  }

  #pw-display {
    flex: 1;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 1rem;
    color: #a5f3fc;
    word-break: break-all;
    min-height: 1.5rem;
    user-select: all;
  }
  #pw-display.empty { color: #475569; font-style: italic; font-family: inherit; font-size: 0.9rem; }

  .copy-btn {
    flex-shrink: 0;
    background: #334155;
    border: none;
    border-radius: 6px;
    color: #cbd5e1;
    cursor: pointer;
    padding: 0.4rem 0.7rem;
    font-size: 0.8rem;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .copy-btn:hover { background: #475569; color: #f1f5f9; }
  .copy-btn.copied { background: #166534; color: #86efac; }

  .strength-section { margin-bottom: 1rem; }

  .strength-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
    font-size: 0.8rem;
  }
  .strength-label { color: #94a3b8; }
  .strength-value { font-weight: 600; }
  .strength-value.weak    { color: #f87171; }
  .strength-value.medium  { color: #fb923c; }
  .strength-value.strong  { color: #facc15; }
  .strength-value.vstrong { color: #4ade80; }

  .strength-bar-bg {
    height: 6px;
    background: #2d3248;
    border-radius: 99px;
    overflow: hidden;
  }
  .strength-bar {
    height: 100%;
    border-radius: 99px;
    transition: width 0.3s ease, background 0.3s ease;
    width: 0%;
  }
  .strength-bar.weak    { background: #f87171; }
  .strength-bar.medium  { background: #fb923c; }
  .strength-bar.strong  { background: #facc15; }
  .strength-bar.vstrong { background: #4ade80; }

  .meta-row {
    display: flex;
    gap: 1.5rem;
    margin-top: 0.6rem;
    font-size: 0.75rem;
    color: #64748b;
  }

  .control-group { margin-bottom: 1.25rem; }
  .control-group:last-child { margin-bottom: 0; }

  .control-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
    font-size: 0.85rem;
    color: #94a3b8;
  }
  .control-label strong { color: #e2e8f0; }
  .length-val { font-family: monospace; color: #a5f3fc; font-weight: 700; }

  input[type="range"] {
    width: 100%;
    -webkit-appearance: none;
    height: 4px;
    border-radius: 99px;
    background: #2d3248;
    outline: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #38bdf8;
    cursor: pointer;
    box-shadow: 0 0 0 3px rgba(56,189,248,0.2);
    transition: box-shadow 0.15s;
  }
  input[type="range"]::-webkit-slider-thumb:hover { box-shadow: 0 0 0 5px rgba(56,189,248,0.3); }

  .toggles-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
  }

  .toggle-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #13151f;
    border: 1px solid #2d3248;
    border-radius: 8px;
    padding: 0.6rem 0.75rem;
    cursor: pointer;
    transition: border-color 0.15s;
    user-select: none;
  }
  .toggle-item:hover { border-color: #475569; }
  .toggle-item.active { border-color: #38bdf8; background: #0c1929; }

  .toggle-label { font-size: 0.8rem; color: #cbd5e1; }

  .toggle-switch {
    width: 34px;
    height: 18px;
    background: #334155;
    border-radius: 99px;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle-switch::after {
    content: '';
    position: absolute;
    width: 12px;
    height: 12px;
    background: #94a3b8;
    border-radius: 50%;
    top: 3px;
    left: 3px;
    transition: transform 0.2s, background 0.2s;
  }
  .toggle-item.active .toggle-switch { background: #0369a1; }
  .toggle-item.active .toggle-switch::after { transform: translateX(16px); background: #38bdf8; }

  .gen-btn {
    width: 100%;
    padding: 0.85rem;
    background: linear-gradient(135deg, #0369a1, #0c4a6e);
    border: none;
    border-radius: 8px;
    color: #e0f2fe;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: opacity 0.15s, transform 0.1s;
    margin-bottom: 1rem;
  }
  .gen-btn:hover { opacity: 0.9; }
  .gen-btn:active { transform: scale(0.99); }

  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.75rem;
  }
  .history-title { font-size: 0.85rem; font-weight: 600; color: #94a3b8; }
  .clear-btn {
    font-size: 0.75rem;
    color: #475569;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.2rem 0.4rem;
    border-radius: 4px;
    transition: color 0.15s;
  }
  .clear-btn:hover { color: #f87171; }

  .history-list { display: flex; flex-direction: column; gap: 0.4rem; }

  .history-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #13151f;
    border: 1px solid #2d3248;
    border-radius: 6px;
    padding: 0.5rem 0.75rem;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 0.8rem;
    color: #7dd3fc;
    gap: 0.5rem;
  }

  .history-pw {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    cursor: pointer;
  }
  .history-pw:hover { color: #a5f3fc; }

  .history-copy {
    flex-shrink: 0;
    font-size: 0.7rem;
    color: #475569;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.15rem 0.3rem;
    border-radius: 3px;
    transition: color 0.15s;
  }
  .history-copy:hover { color: #94a3b8; }
  .history-copy.copied { color: #4ade80; }

  .history-empty { font-size: 0.8rem; color: #334155; text-align: center; padding: 0.75rem; }

  @media (max-width: 400px) { .toggles-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container">
  <h1>Password Generator</h1>

  <div class="card">
    <div class="pw-box">
      <span id="pw-display" class="empty">Click Generate</span>
      <button class="copy-btn" id="copy-btn" onclick="copyPassword()">Copy</button>
    </div>
    <div class="strength-section">
      <div class="strength-header">
        <span class="strength-label">Strength</span>
        <span class="strength-value" id="strength-label">—</span>
      </div>
      <div class="strength-bar-bg">
        <div class="strength-bar" id="strength-bar"></div>
      </div>
      <div class="meta-row">
        <span id="char-count">0 characters</span>
        <span id="entropy-display">0 bits entropy</span>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="control-group">
      <div class="control-label">
        <strong>Length</strong>
        <span class="length-val" id="length-val">16</span>
      </div>
      <input type="range" id="length-slider" min="8" max="64" value="16"
             oninput="onLengthChange(this.value)">
    </div>
    <div class="control-group">
      <div class="control-label"><strong>Character Sets</strong></div>
      <div class="toggles-grid">
        <div class="toggle-item active" id="toggle-upper" onclick="toggle('upper')">
          <span class="toggle-label">Uppercase (A–Z)</span>
          <div class="toggle-switch"></div>
        </div>
        <div class="toggle-item active" id="toggle-lower" onclick="toggle('lower')">
          <span class="toggle-label">Lowercase (a–z)</span>
          <div class="toggle-switch"></div>
        </div>
        <div class="toggle-item active" id="toggle-numbers" onclick="toggle('numbers')">
          <span class="toggle-label">Numbers (0–9)</span>
          <div class="toggle-switch"></div>
        </div>
        <div class="toggle-item active" id="toggle-symbols" onclick="toggle('symbols')">
          <span class="toggle-label">Symbols (!@#…)</span>
          <div class="toggle-switch"></div>
        </div>
        <div class="toggle-item" id="toggle-ambiguous" onclick="toggle('ambiguous')" style="grid-column:1/-1">
          <span class="toggle-label">Exclude ambiguous chars (0 O l I 1 |)</span>
          <div class="toggle-switch"></div>
        </div>
      </div>
    </div>
  </div>

  <button class="gen-btn" onclick="generate()">Generate Password</button>

  <div class="card">
    <div class="history-header">
      <span class="history-title">Recent Passwords</span>
      <button class="clear-btn" onclick="clearHistory()">Clear</button>
    </div>
    <div class="history-list" id="history-list">
      <div class="history-empty">No passwords generated yet</div>
    </div>
  </div>
</div>

<script>
  const CHARS = {
    upper:   'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
    lower:   'abcdefghijklmnopqrstuvwxyz',
    numbers: '0123456789',
    symbols: '!@#$%^&*()-_=+[]{}|;:,.<>?'
  };
  const AMBIGUOUS = /[0Ol1I|]/g;

  const state = {
    upper: true, lower: true, numbers: true, symbols: true,
    ambiguous: false, length: 16, current: '', history: []
  };

  function onLengthChange(v) {
    state.length = +v;
    document.getElementById('length-val').textContent = v;
  }

  function toggle(key) {
    if (state[key] && key !== 'ambiguous') {
      const active = ['upper','lower','numbers','symbols'].filter(k => state[k]).length;
      if (active <= 1) return;
    }
    state[key] = !state[key];
    document.getElementById('toggle-' + key).classList.toggle('active', state[key]);
  }

  function buildCharset() {
    let pool = '';
    if (state.upper)   pool += CHARS.upper;
    if (state.lower)   pool += CHARS.lower;
    if (state.numbers) pool += CHARS.numbers;
    if (state.symbols) pool += CHARS.symbols;
    if (state.ambiguous) pool = pool.replace(AMBIGUOUS, '');
    return pool;
  }

  function secureRandom(max) {
    const buf = new Uint32Array(1);
    let v;
    do { crypto.getRandomValues(buf); v = buf[0]; }
    while (v >= Math.floor(0x100000000 / max) * max);
    return v % max;
  }

  function generate() {
    const pool = buildCharset();
    if (!pool) return;

    const arr = Array.from({ length: state.length }, () => pool[secureRandom(pool.length)]);

    [
      state.upper   && CHARS.upper.replace(AMBIGUOUS, ''),
      state.lower   && CHARS.lower.replace(AMBIGUOUS, ''),
      state.numbers && CHARS.numbers.replace(AMBIGUOUS, ''),
      state.symbols && CHARS.symbols.replace(AMBIGUOUS, '')
    ].filter(Boolean).forEach(chars => {
      if (chars.length) arr[secureRandom(state.length)] = chars[secureRandom(chars.length)];
    });

    const pw = arr.join('');
    state.current = pw;
    renderPassword(pw, pool.length);
    state.history.unshift(pw);
    if (state.history.length > 10) state.history.pop();
    renderHistory();
  }

  function getStrength(bits) {
    if (bits < 40) return { label: 'Weak',        cls: 'weak',    pct: 15 };
    if (bits < 60) return { label: 'Medium',       cls: 'medium',  pct: 40 };
    if (bits < 80) return { label: 'Strong',       cls: 'strong',  pct: 70 };
    return            { label: 'Very Strong',    cls: 'vstrong', pct: 100 };
  }

  function renderPassword(pw, poolSize) {
    const disp = document.getElementById('pw-display');
    disp.textContent = pw;
    disp.classList.remove('empty');

    const bits = Math.round(pw.length * Math.log2(poolSize));
    const s = getStrength(bits);

    const lbl = document.getElementById('strength-label');
    lbl.textContent = s.label;
    lbl.className = 'strength-value ' + s.cls;

    const bar = document.getElementById('strength-bar');
    bar.style.width = s.pct + '%';
    bar.className = 'strength-bar ' + s.cls;

    document.getElementById('char-count').textContent = pw.length + ' characters';
    document.getElementById('entropy-display').textContent = bits + ' bits entropy';
  }

  async function copyPassword() {
    if (!state.current) return;
    await navigator.clipboard.writeText(state.current);
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
  }

  function clearHistory() {
    state.history = [];
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('history-list');
    if (!state.history.length) {
      list.innerHTML = '<div class="history-empty">No passwords generated yet</div>';
      return;
    }
    list.innerHTML = state.history.map((pw, i) => `
      <div class="history-item">
        <span class="history-pw" title="${pw}" onclick="useHistory(${i})">${pw}</span>
        <button class="history-copy" onclick="copyHistory(event,${i})">copy</button>
      </div>`).join('');
  }

  function useHistory(i) {
    state.current = state.history[i];
    renderPassword(state.history[i], buildCharset().length || 62);
  }

  async function copyHistory(e, i) {
    await navigator.clipboard.writeText(state.history[i]);
    const btn = e.currentTarget;
    btn.textContent = 'ok';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1200);
  }

  generate();
</script>
</body>
</html>
