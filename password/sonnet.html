<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #eaeaea;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .password-display {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .password-text {
            font-family: 'Courier New', monospace;
            font-size: 1.2em;
            word-break: break-all;
            color: #00ff88;
            flex: 1;
            margin-right: 10px;
        }

        .copy-btn {
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            border: none;
            border-radius: 8px;
            padding: 10px 15px;
            cursor: pointer;
            font-weight: bold;
            color: #1a1a2e;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .copy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 217, 255, 0.4);
        }

        .copy-btn:active {
            transform: translateY(0);
        }

        .strength-meter {
            margin-bottom: 25px;
        }

        .strength-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9em;
            color: #aaa;
        }

        .strength-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s, background 0.3s;
            border-radius: 4px;
        }

        .strength-weak { background: #ff4757; }
        .strength-medium { background: #ffa502; }
        .strength-strong { background: #2ed573; }
        .strength-very-strong { background: #00ff88; }

        .controls {
            margin-bottom: 25px;
        }

        .length-control {
            margin-bottom: 20px;
        }

        .length-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .length-slider {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
        }

        .length-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(0, 217, 255, 0.3);
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .option:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .option input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #00ff88;
            cursor: pointer;
        }

        .option label {
            cursor: pointer;
            font-size: 0.9em;
        }

        .entropy-display {
            text-align: center;
            margin-bottom: 20px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            font-size: 0.85em;
            color: #aaa;
        }

        .entropy-value {
            color: #00d9ff;
            font-weight: bold;
        }

        .generate-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: bold;
            color: #1a1a2e;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 25px;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0, 217, 255, 0.4);
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        .history {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 15px;
        }

        .history-title {
            font-size: 0.9em;
            color: #aaa;
            margin-bottom: 10px;
            text-align: center;
        }

        .history-list {
            list-style: none;
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-password {
            color: #00ff88;
            flex: 1;
            margin-right: 10px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .history-copy {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 4px;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 0.75em;
            color: #eaeaea;
            transition: background 0.2s;
        }

        .history-copy:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .empty-history {
            text-align: center;
            color: #666;
            font-size: 0.9em;
            padding: 20px;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Password Generator</h1>

        <div class="password-display">
            <div class="password-text" id="passwordText">Click Generate</div>
            <button class="copy-btn" id="copyBtn">📋 Copy</button>
        </div>

        <div class="strength-meter">
            <div class="strength-label">
                <span>Strength</span>
                <span id="strengthLabel">-</span>
            </div>
            <div class="strength-bar">
                <div class="strength-fill" id="strengthFill"></div>
            </div>
        </div>

        <div class="controls">
            <div class="length-control">
                <div class="length-label">
                    <span>Length</span>
                    <span id="lengthValue">16</span>
                </div>
                <input type="range" class="length-slider" id="lengthSlider" min="8" max="64" value="16">
            </div>

            <div class="options-grid">
                <div class="option">
                    <input type="checkbox" id="uppercase" checked>
                    <label for="uppercase">Uppercase (A-Z)</label>
                </div>
                <div class="option">
                    <input type="checkbox" id="lowercase" checked>
                    <label for="lowercase">Lowercase (a-z)</label>
                </div>
                <div class="option">
                    <input type="checkbox" id="numbers" checked>
                    <label for="numbers">Numbers (0-9)</label>
                </div>
                <div class="option">
                    <input type="checkbox" id="symbols" checked>
                    <label for="symbols">Symbols (!@#$)</label>
                </div>
                <div class="option">
                    <input type="checkbox" id="excludeAmbiguous">
                    <label for="excludeAmbiguous">Exclude ambiguous</label>
                </div>
            </div>
        </div>

        <div class="entropy-display">
            Entropy: <span class="entropy-value" id="entropyValue">0 bits</span> |
            Characters: <span class="entropy-value" id="charCount">0</span>
        </div>

        <button class="generate-btn" id="generateBtn">🎲 Generate Password</button>

        <div class="history">
            <div class="history-title">📜 History (Last 10)</div>
            <ul class="history-list" id="historyList">
                <li class="empty-history">No passwords generated yet</li>
            </ul>
        </div>
    </div>

    <script>
        const CHAR_SETS = {
            uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            lowercase: 'abcdefghijklmnopqrstuvwxyz',
            numbers: '0123456789',
            symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
        };

        const AMBIGUOUS_CHARS = '0OIl1';

        let passwordHistory = [];

        const passwordText = document.getElementById('passwordText');
        const copyBtn = document.getElementById('copyBtn');
        const strengthLabel = document.getElementById('strengthLabel');
        const strengthFill = document.getElementById('strengthFill');
        const lengthSlider = document.getElementById('lengthSlider');
        const lengthValue = document.getElementById('lengthValue');
        const uppercase = document.getElementById('uppercase');
        const lowercase = document.getElementById('lowercase');
        const numbers = document.getElementById('numbers');
        const symbols = document.getElementById('symbols');
        const excludeAmbiguous = document.getElementById('excludeAmbiguous');
        const entropyValue = document.getElementById('entropyValue');
        const charCount = document.getElementById('charCount');
        const generateBtn = document.getElementById('generateBtn');
        const historyList = document.getElementById('historyList');

        lengthSlider.addEventListener('input', updateLength);
        generateBtn.addEventListener('click', generatePassword);
        copyBtn.addEventListener('click', copyToClipboard);

        function updateLength() {
            lengthValue.textContent = lengthSlider.value;
        }

        function getCharacterSet() {
            let charset = '';
            if (uppercase.checked) charset += CHAR_SETS.uppercase;
            if (lowercase.checked) charset += CHAR_SETS.lowercase;
            if (numbers.checked) charset += CHAR_SETS.numbers;
            if (symbols.checked) charset += CHAR_SETS.symbols;
            if (excludeAmbiguous.checked) {
                charset = charset.split('').filter(char => !AMBIGUOUS_CHARS.includes(char)).join('');
            }
            return charset;
        }

        function generatePassword() {
            const length = parseInt(lengthSlider.value);
            const charset = getCharacterSet();
            if (charset.length === 0) {
                passwordText.textContent = 'Select at least one option';
                return;
            }
            let password = '';
            const array = new Uint32Array(length);
            crypto.getRandomValues(array);
            for (let i = 0; i < length; i++) {
                password += charset[array[i] % charset.length];
            }
            passwordText.textContent = password;
            updateStrength(password, charset.length);
            updateEntropy(length, charset.length);
            addToHistory(password);
        }

        function calculateEntropy(passwordLength, charsetSize) {
            return Math.floor(passwordLength * Math.log2(charsetSize));
        }

        function updateEntropy(length, charsetSize) {
            const entropy = calculateEntropy(length, charsetSize);
            entropyValue.textContent = `${entropy} bits`;
            charCount.textContent = length;
        }

        function getStrengthLevel(entropy) {
            if (entropy < 40) return { level: 'Weak', class: 'strength-weak', percent: 25 };
            if (entropy < 60) return { level: 'Medium', class: 'strength-medium', percent: 50 };
            if (entropy < 80) return { level: 'Strong', class: 'strength-strong', percent: 75 };
            return { level: 'Very Strong', class: 'strength-very-strong', percent: 100 };
        }

        function updateStrength(password, charsetSize) {
            const entropy = calculateEntropy(password.length, charsetSize);
            const strength = getStrengthLevel(entropy);
            strengthLabel.textContent = strength.level;
            strengthFill.className = 'strength-fill ' + strength.class;
            strengthFill.style.width = strength.percent + '%';
        }

        function addToHistory(password) {
            passwordHistory.unshift(password);
            if (passwordHistory.length > 10) {
                passwordHistory.pop();
            }
            renderHistory();
        }

        function renderHistory() {
            if (passwordHistory.length === 0) {
                historyList.innerHTML = '<li class="empty-history">No passwords generated yet</li>';
                return;
            }
            historyList.innerHTML = passwordHistory.map((pwd, index) => `
                <li class="history-item">
                    <span class="history-password">${pwd}</span>
                    <button class="history-copy" onclick="copyFromHistory('${pwd}')">📋</button>
                </li>
            `).join('');
        }

        function copyToClipboard() {
            const password = passwordText.textContent;
            if (password && password !== 'Click Generate' && password !== 'Select at least one option') {
                navigator.clipboard.writeText(password).then(() => {
                    copyBtn.textContent = '✅ Copied!';
                    setTimeout(() => {
                        copyBtn.textContent = '📋 Copy';
                    }, 2000);
                });
            }
        }

        function copyFromHistory(password) {
            navigator.clipboard.writeText(password);
        }

        generatePassword();
    </script>
</body>
</html>
