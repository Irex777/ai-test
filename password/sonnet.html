<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #e4e4e4;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .password-display {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .password-text {
            font-family: 'Courier New', monospace;
            font-size: 24px;
            word-break: break-all;
            text-align: center;
            min-height: 36px;
            color: #4fd1c5;
            font-weight: bold;
        }

        .copy-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .copy-btn:hover {
            transform: translateY(-50%) scale(1.05);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .copy-btn.copied {
            background: #48bb78;
        }

        .controls {
            margin-bottom: 25px;
        }

        .length-control {
            margin-bottom: 25px;
        }

        .length-control label {
            display: block;
            margin-bottom: 10px;
            font-size: 16px;
            color: #b0b0b0;
        }

        .length-value {
            color: #667eea;
            font-weight: bold;
            font-size: 18px;
        }

        .slider {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.5);
        }

        .slider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.5);
        }

        .toggles {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .toggle-item {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .toggle-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(102, 126, 234, 0.3);
        }

        .toggle-item input[type="checkbox"] {
            display: none;
        }

        .toggle-check {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            margin-right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .toggle-item input:checked + .toggle-check {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
        }

        .toggle-check::after {
            content: '✓';
            color: white;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .toggle-item input:checked + .toggle-check::after {
            opacity: 1;
        }

        .toggle-label {
            font-size: 14px;
            color: #d0d0d0;
        }

        .generate-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 25px;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        .strength-meter {
            margin-bottom: 25px;
        }

        .strength-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
            color: #b0b0b0;
        }

        .strength-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            transition: all 0.5s ease;
            border-radius: 4px;
        }

        .entropy-display {
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
            color: #b0b0b0;
        }

        .entropy-value {
            color: #4fd1c5;
            font-weight: bold;
            font-size: 16px;
        }

        .history {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .history-title {
            font-size: 16px;
            color: #b0b0b0;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .clear-history {
            background: transparent;
            border: 1px solid rgba(255, 100, 100, 0.3);
            color: #ff6b6b;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .clear-history:hover {
            background: rgba(255, 100, 100, 0.1);
            border-color: #ff6b6b;
        }

        .history-list {
            list-style: none;
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            margin-bottom: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: #9f9f9f;
            transition: all 0.3s ease;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .history-password {
            color: #4fd1c5;
            word-break: break-all;
            margin-right: 10px;
            flex-grow: 1;
        }

        .history-copy {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 6px;
            padding: 5px 10px;
            color: #b0b0b0;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .history-copy:hover {
            background: rgba(102, 126, 234, 0.3);
            color: white;
        }

        .char-count {
            text-align: center;
            font-size: 12px;
            color: #808080;
            margin-top: 10px;
        }

        .empty-history {
            text-align: center;
            color: #606060;
            font-size: 14px;
            padding: 20px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
            
            .toggles {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Password Generator</h1>
        
        <div class="password-display">
            <div class="password-text" id="password">Click Generate</div>
            <button class="copy-btn" id="copyBtn">Copy</button>
        </div>
        
        <div class="controls">
            <div class="length-control">
                <label>Password Length: <span class="length-value" id="lengthValue">16</span></label>
                <input type="range" class="slider" id="lengthSlider" min="8" max="64" value="16">
            </div>
            
            <div class="toggles">
                <label class="toggle-item">
                    <input type="checkbox" id="uppercase" checked>
                    <span class="toggle-check"></span>
                    <span class="toggle-label">Uppercase (A-Z)</span>
                </label>
                
                <label class="toggle-item">
                    <input type="checkbox" id="lowercase" checked>
                    <span class="toggle-check"></span>
                    <span class="toggle-label">Lowercase (a-z)</span>
                </label>
                
                <label class="toggle-item">
                    <input type="checkbox" id="numbers" checked>
                    <span class="toggle-check"></span>
                    <span class="toggle-label">Numbers (0-9)</span>
                </label>
                
                <label class="toggle-item">
                    <input type="checkbox" id="symbols" checked>
                    <span class="toggle-check"></span>
                    <span class="toggle-label">Symbols (!@#$)</span>
                </label>
                
                <label class="toggle-item">
                    <input type="checkbox" id="excludeAmbiguous">
                    <span class="toggle-check"></span>
                    <span class="toggle-label">No Ambiguous</span>
                </label>
            </div>
            
            <button class="generate-btn" id="generateBtn">Generate Password</button>
        </div>
        
        <div class="entropy-display">
            Entropy: <span class="entropy-value" id="entropyValue">0</span> bits
        </div>
        
        <div class="strength-meter">
            <div class="strength-label">
                <span>Strength</span>
                <span id="strengthText">-</span>
            </div>
            <div class="strength-bar">
                <div class="strength-fill" id="strengthFill"></div>
            </div>
        </div>
        
        <div class="char-count">
            <span id="charCount">0</span> characters
        </div>
        
        <div class="history">
            <div class="history-title">
                <span>History (Last 10)</span>
                <button class="clear-history" id="clearHistory">Clear</button>
            </div>
            <ul class="history-list" id="historyList">
                <li class="empty-history">No passwords generated yet</li>
            </ul>
        </div>
    </div>

    <script>
        const uppercaseChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const lowercaseChars = 'abcdefghijklmnopqrstuvwxyz';
        const numberChars = '0123456789';
        const symbolChars = '!@#$%^&*()_+-=[]{}|;:,.<>?';
        const ambiguousChars = '0OIl1o';
        
        let passwordHistory = [];
        
        const lengthSlider = document.getElementById('lengthSlider');
        const lengthValue = document.getElementById('lengthValue');
        const uppercase = document.getElementById('uppercase');
        const lowercase = document.getElementById('lowercase');
        const numbers = document.getElementById('numbers');
        const symbols = document.getElementById('symbols');
        const excludeAmbiguous = document.getElementById('excludeAmbiguous');
        const generateBtn = document.getElementById('generateBtn');
        const passwordDisplay = document.getElementById('password');
        const copyBtn = document.getElementById('copyBtn');
        const entropyValue = document.getElementById('entropyValue');
        const strengthText = document.getElementById('strengthText');
        const strengthFill = document.getElementById('strengthFill');
        const charCount = document.getElementById('charCount');
        const historyList = document.getElementById('historyList');
        const clearHistory = document.getElementById('clearHistory');
        
        lengthSlider.addEventListener('input', () => {
            lengthValue.textContent = lengthSlider.value;
        });
        
        function getCharacterSet() {
            let charset = '';
            
            if (uppercase.checked) charset += uppercaseChars;
            if (lowercase.checked) charset += lowercaseChars;
            if (numbers.checked) charset += numberChars;
            if (symbols.checked) charset += symbolChars;
            
            if (excludeAmbiguous.checked) {
                charset = charset.split('').filter(char => !ambiguousChars.includes(char)).join('');
            }
            
            return charset;
        }
        
        function calculateEntropy(password, charsetSize) {
            if (password.length === 0 || charsetSize === 0) return 0;
            return Math.round(password.length * Math.log2(charsetSize));
        }
        
        function getStrengthLevel(entropy) {
            if (entropy < 28) return { text: 'Weak', color: '#ff6b6b', width: '25%' };
            if (entropy < 36) return { text: 'Fair', color: '#ffa500', width: '50%' };
            if (entropy < 60) return { text: 'Strong', color: '#4fd1c5', width: '75%' };
            return { text: 'Very Strong', color: '#48bb78', width: '100%' };
        }
        
        function generatePassword() {
            const length = parseInt(lengthSlider.value);
            let charset = getCharacterSet();
            
            if (charset === '') {
                passwordDisplay.textContent = 'Select at least one option';
                passwordDisplay.style.color = '#ff6b6b';
                return;
            }
            
            let password = '';
            const array = new Uint32Array(length);
            crypto.getRandomValues(array);
            
            for (let i = 0; i < length; i++) {
                password += charset[array[i] % charset.length];
            }
            
            passwordDisplay.textContent = password;
            passwordDisplay.style.color = '#4fd1c5';
            
            const charsetSize = charset.length;
            const entropy = calculateEntropy(password, charsetSize);
            const strength = getStrengthLevel(entropy);
            
            entropyValue.textContent = entropy;
            strengthText.textContent = strength.text;
            strengthFill.style.width = strength.width;
            strengthFill.style.background = strength.color;
            charCount.textContent = password.length;
            
            addToHistory(password);
        }
        
        function addToHistory(password) {
            passwordHistory.unshift({
                password: password,
                timestamp: new Date().toLocaleTimeString()
            });
            
            if (passwordHistory.length > 10) {
                passwordHistory.pop();
            }
            
            updateHistoryDisplay();
        }
        
        function updateHistoryDisplay() {
            if (passwordHistory.length === 0) {
                historyList.innerHTML = '<li class="empty-history">No passwords generated yet</li>';
                return;
            }
            
            historyList.innerHTML = passwordHistory.map((item, index) => `
                <li class="history-item">
                    <span class="history-password">${item.password}</span>
                    <button class="history-copy" onclick="copyFromHistory(${index})">Copy</button>
                </li>
            `).join('');
        }
        
        function copyFromHistory(index) {
            const password = passwordHistory[index].password;
            navigator.clipboard.writeText(password).then(() => {
                const historyItems = historyList.querySelectorAll('.history-copy');
                historyItems[index].textContent = 'Copied!';
                setTimeout(() => {
                    historyItems[index].textContent = 'Copy';
                }, 1500);
            });
        }
        
        copyBtn.addEventListener('click', () => {
            const password = passwordDisplay.textContent;
            if (password && password !== 'Click Generate' && password !== 'Select at least one option') {
                navigator.clipboard.writeText(password).then(() => {
                    copyBtn.textContent = 'Copied!';
                    copyBtn.classList.add('copied');
                    setTimeout(() => {
                        copyBtn.textContent = 'Copy';
                        copyBtn.classList.remove('copied');
                    }, 1500);
                });
            }
        });
        
        generateBtn.addEventListener('click', generatePassword);
        
        clearHistory.addEventListener('click', () => {
            passwordHistory = [];
            updateHistoryDisplay();
        });
        
        // Generate initial password
        generatePassword();
    </script>
</body>
</html>
