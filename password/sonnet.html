<body>
    <div class="container">
        <h1>🔐 Password Generator</h1>
        
        <div class="password-display">
            <span class="password-text" id="passwordOutput">Click Generate</span>
            <button class="copy-btn" onclick="copyPassword()">📋 Copy</button>
        </div>

        <div class="section">
            <div class="section-title">Password Length</div>
            <div class="length-control">
                <input type="range" class="length-slider" id="lengthSlider" min="8" max="64" value="16" oninput="updateLength()">
                <span class="length-value" id="lengthValue">16</span>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Character Options</div>
            <div class="options-grid">
                <label class="option-label">
                    <input type="checkbox" class="option-checkbox" id="uppercase" checked>
                    <span class="option-text">Uppercase (A-Z)</span>
                </label>
                <label class="option-label">
                    <input type="checkbox" class="option-checkbox" id="lowercase" checked>
                    <span class="option-text">Lowercase (a-z)</span>
                </label>
                <label class="option-label">
                    <input type="checkbox" class="option-checkbox" id="numbers" checked>
                    <span class="option-text">Numbers (0-9)</span>
                </label>
                <label class="option-label">
                    <input type="checkbox" class="option-checkbox" id="symbols" checked>
                    <span class="option-text">Symbols (!@#$)</span>
                </label>
                <label class="option-label">
                    <input type="checkbox" class="option-checkbox" id="excludeAmbiguous">
                    <span class="option-text">Exclude ambiguous</span>
                </label>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Password Strength</div>
            <div class="strength-meter">
                <div class="strength-bar" id="strengthBar"></div>
            </div>
            <div class="strength-text" id="strengthText">Generate a password</div>
            <div class="entropy-display" id="entropyDisplay"></div>
        </div>

        <button class="generate-btn" onclick="generatePassword()">🔄 Generate Password</button>

        <div class="stats">
            <span id="charCount">Characters: 0</span>
            <span id="historyCount">History: 0/10</span>
        </div>

        <div class="history-section">
            <div class="history-title">📜 Recent Passwords</div>
            <div class="history-list" id="historyList">
                <div class="empty-history">No passwords generated yet</div>
            </div>
        </div>
    </div>

    <script>
        const CHAR_SETS = {
            uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            lowercase: 'abcdefghijklmnopqrstuvwxyz',
            numbers: '0123456789',
            symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
        };

        const AMBIGUOUS_CHARS = '0OIl1';

        let passwordHistory = [];

        function updateLength() {
            const slider = document.getElementById('lengthSlider');
            document.getElementById('lengthValue').textContent = slider.value;
        }

        function getCharacterSet() {
            let chars = '';
            const uppercase = document.getElementById('uppercase').checked;
            const lowercase = document.getElementById('lowercase').checked;
            const numbers = document.getElementById('numbers').checked;
            const symbols = document.getElementById('symbols').checked;
            const excludeAmbiguous = document.getElementById('excludeAmbiguous').checked;

            if (uppercase) chars += CHAR_SETS.uppercase;
            if (lowercase) chars += CHAR_SETS.lowercase;
            if (numbers) chars += CHAR_SETS.numbers;
            if (symbols) chars += CHAR_SETS.symbols;

            if (excludeAmbiguous) {
                chars = chars.split('').filter(c => !AMBIGUOUS_CHARS.includes(c)).join('');
            }

            return chars;
        }

        function generatePassword() {
            const length = parseInt(document.getElementById('lengthSlider').value);
            let chars = getCharacterSet();

            if (chars === '') {
                alert('Please select at least one character type!');
                return;
            }

            let password = '';
            const array = new Uint32Array(length);
            crypto.getRandomValues(array);

            for (let i = 0; i < length; i++) {
                password += chars[array[i] % chars.length];
            }

            displayPassword(password);
            updateStrength(password);
            addToHistory(password);
        }

        function displayPassword(password) {
            document.getElementById('passwordOutput').textContent = password;
            document.getElementById('charCount').textContent = `Characters: ${password.length}`;
        }

        function calculateEntropy(password) {
            let charsetSize = 0;
            const uppercase = document.getElementById('uppercase').checked;
            const lowercase = document.getElementById('lowercase').checked;
            const numbers = document.getElementById('numbers').checked;
            const symbols = document.getElementById('symbols').checked;

            if (uppercase) charsetSize += 26;
            if (lowercase) charsetSize += 26;
            if (numbers) charsetSize += 10;
            if (symbols) charsetSize += 32;

            const excludeAmbiguous = document.getElementById('excludeAmbiguous').checked;
            if (excludeAmbiguous) charsetSize -= AMBIGUOUS_CHARS.length;

            const entropy = Math.floor(Math.log2(Math.pow(charsetSize, password.length)));
            return entropy;
        }

        function updateStrength(password) {
            const entropy = calculateEntropy(password);
            const strengthBar = document.getElementById('strengthBar');
            const strengthText = document.getElementById('strengthText');
            const entropyDisplay = document.getElementById('entropyDisplay');

            strengthBar.className = 'strength-bar';
            entropyDisplay.textContent = `Entropy: ${entropy} bits`;

            if (entropy < 40) {
                strengthBar.classList.add('strength-weak');
                strengthText.textContent = '⚠️ Weak';
            } else if (entropy < 60) {
                strengthBar.classList.add('strength-medium');
                strengthText.textContent = '🔶 Medium';
            } else if (entropy < 80) {
                strengthBar.classList.add('strength-strong');
                strengthText.textContent = '✅ Strong';
            } else {
                strengthBar.classList.add('strength-very-strong');
                strengthText.textContent = '💪 Very Strong';
            }
        }

        function copyPassword() {
            const password = document.getElementById('passwordOutput').textContent;
            if (password === 'Click Generate') return;

            navigator.clipboard.writeText(password).then(() => {
                const copyBtn = document.querySelector('.copy-btn');
                const originalText = copyBtn.textContent;
                copyBtn.textContent = '✓ Copied!';
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                }, 1500);
            });
        }

        function addToHistory(password) {
            passwordHistory.unshift(password);
            if (passwordHistory.length > 10) {
                passwordHistory.pop();
            }
            renderHistory();
        }

        function renderHistory() {
            const historyList = document.getElementById('historyList');
            document.getElementById('historyCount').textContent = `History: ${passwordHistory.length}/10`;

            if (passwordHistory.length === 0) {
                historyList.innerHTML = '<div class="empty-history">No passwords generated yet</div>';
                return;
            }

            historyList.innerHTML = passwordHistory.map((pwd, index) => `
                <div class="history-item" onclick="copyFromHistory('${pwd}')">
                    <span class="history-password">${pwd}</span>
                    <button class="history-copy" onclick="event.stopPropagation(); copyFromHistory('${pwd}')">📋</button>
                </div>
            `).join('');
        }

        function copyFromHistory(password) {
            navigator.clipboard.writeText(password).then(() => {
                displayPassword(password);
                updateStrength(password);
            });
        }

        // Generate initial password on load
        window.onload = generatePassword;
    </script>
</body>
</html>
