<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KanbanFlow - Dark Mode Task Manager</title>
    <style>
        :root {
            --bg-body: #121212;
            --bg-column: #1e1e1e;
            --bg-card: #2c2c2c;
            --bg-input: #333333;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent-color: #6c5ce7;
            --accent-hover: #5649c0;
            --danger-color: #ff4757;
            --success-color: #2ed573;
            --warning-color: #ffa502;
            --border-radius: 12px;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header & Controls */
        header {
            padding: 20px;
            background-color: var(--bg-column);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            z-index: 10;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-color);
            letter-spacing: 1px;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex: 1;
            justify-content: flex-end;
            max-width: 600px;
        }

        input[type="text"] {
            background: var(--bg-input);
            border: 1px solid transparent;
            color: var(--text-primary);
            padding: 10px 15px;
            border-radius: 8px;
            outline: none;
            width: 100%;
            transition: var(--transition);
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        button.btn-primary {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
            transition: var(--transition);
        }

        button.btn-primary:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        /* Board Layout */
        .board {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
            overflow-x: auto;
            height: calc(100vh - 80px);
        }

        .column {
            flex: 1;
            min-width: 300px;
            background-color: var(--bg-column);
            border-radius: var(--border-radius);
            display: flex;
            flex-direction: column;
            padding: 15px;
            box-shadow: var(--shadow);
            max-height: 100%;
        }

        .column-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--bg-input);
        }

        .column-title {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .task-count {
            background-color: var(--bg-input);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .task-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Scrollbar Styling */
        .task-list::-webkit-scrollbar {
            width: 6px;
        }
        .task-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .task-list::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }

        /* Task Card */
        .task-card {
            background-color: var(--bg-card);
            padding: 15px;
            border-radius: 8px;
            cursor: grab;
            transition: var(--transition);
            border: 1px solid transparent;
            position: relative;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border-color: #444;
        }

        .task-card.dragging {
            opacity: 0.5;
            border: 2px dashed var(--accent-color);
            cursor: grabbing;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .task-title {
            font-weight: 600;
            font-size: 1rem;
            margin-right: 10px;
            word-break: break-word;
        }

        .priority-badge {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
            min-width: 50px;
            text-align: center;
        }

        .priority-low { background: rgba(46, 213, 115, 0.2); color: var(--success-color); }
        .priority-medium { background: rgba(255, 165, 2, 0.2); color: var(--warning-color); }
        .priority-high { background: rgba(255, 71, 87, 0.2); color: var(--danger-color); }

        .task-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
            line-height: 1.4;
            white-space: pre-wrap;
        }

        .task-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: #666;
            border-top: 1px solid #333;
            padding-top: 8px;
        }

        .task-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 4px;
            border-radius: 4px;
            transition: 0.2s;
        }

        .icon-btn:hover {
            background-color: rgba(255,255,255,0.1);
            color: var(--text-primary);
        }

        .icon-btn.delete:hover {
            color: var(--danger-color);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            backdrop-filter: blur(3px);
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: var(--bg-column);
            padding: 25px;
            border-radius: var(--border-radius);
            width: 90%;
            max-width: 450px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transform: scale(0.9);
            transition: transform 0.3s;
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal h2 {
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            background: var(--bg-input);
            border: 1px solid transparent;
            border-radius: 6px;
            color: var(--text-primary);
            outline: none;
        }

        .form-control:focus {
            border-color: var(--accent-color);
        }

        select.form-control {
            cursor: pointer;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid var(--text-secondary);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-cancel:hover {
            border-color: var(--text-primary);
            color: var(--text-primary);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .board {
                flex-direction: column;
                overflow-y: auto;
                height: auto;
            }
            
            .column {
                min-height: 300px;
                margin-bottom: 20px;
            }

            header {
                flex-direction: column;
                align-items: stretch;
            }

            .controls {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Kanban<span style="color:var(--text-primary)">Flow</span></h1>
        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search tasks...">
            <button class="btn-primary" onclick="openModal()">+ New Task</button>
        </div>
    </header>

    <div class="board" id="board">
        <!-- Column 1: To Do -->
        <div class="column" id="col-todo" ondrop="drop(event)" ondragover="allowDrop(event)" data-status="todo">
            <div class="column-header">
                <span class="column-title">To Do</span>
                <span class="task-count" id="count-todo">0</span>
            </div>
            <div class="task-list" id="list-todo">
                <!-- Tasks injected here -->
            </div>
        </div>

        <!-- Column 2: In Progress -->
        <div class="column" id="col-progress" ondrop="drop(event)" ondragover="allowDrop(event)" data-status="progress">
            <div class="column-header">
                <span class="column-title">In Progress</span>
                <span class="task-count" id="count-progress">0</span>
            </div>
            <div class="task-list" id="list-progress">
                <!-- Tasks injected here -->
            </div>
        </div>

        <!-- Column 3: Done -->
        <div class="column" id="col-done" ondrop="drop(event)" ondragover="allowDrop(event)" data-status="done">
            <div class="column-header">
                <span class="column-title">Done</span>
                <span class="task-count" id="count-done">0</span>
            </div>
            <div class="task-list" id="list-done">
                <!-- Tasks injected here -->
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="taskModal">
        <div class="modal">
            <h2 id="modalTitle">New Task</h2>
            <form id="taskForm">
                <input type="hidden" id="taskId">
                <div class="form-group">
                    <label for="taskTitle">Title</label>
                    <input type="text" id="taskTitle" class="form-control" required placeholder="What needs to be done?">
                </div>
                <div class="form-group">
                    <label for="taskDesc">Description</label>
                    <textarea id="taskDesc" class="form-control" rows="3" placeholder="Add details..."></textarea>
                </div>
                <div class="form-group">
                    <label for="taskPriority">Priority</label>
                    <select id="taskPriority" class="form-control">
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="taskStatus">Status</label>
                    <select id="taskStatus" class="form-control">
                        <option value="todo">To Do</option>
                        <option value="progress">In Progress</option>
                        <option value="done">Done</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- State Management ---
        let tasks = JSON.parse(localStorage.getItem('kanban-tasks')) || [];
        let draggedTaskId = null;

        // --- DOM Elements ---
        const modal = document.getElementById('taskModal');
        const form = document.getElementById('taskForm');
        const searchInput = document.getElementById('searchInput');
        const columns = {
            todo: document.getElementById('list-todo'),
            progress: document.getElementById('list-progress'),
            done: document.getElementById('list-done')
        };
        const counts = {
            todo: document.getElementById('count-todo'),
            progress: document.getElementById('count-progress'),
            done: document.getElementById('count-done')
        };

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            renderTasks();
        });

        // --- Event Listeners ---
        searchInput.addEventListener('input', (e) => {
            renderTasks(e.target.value);
        });

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            saveTask();
        });

        // Close modal when clicking outside
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        // --- Core Functions ---

        function saveToStorage() {
            localStorage.setItem('kanban-tasks', JSON.stringify(tasks));
        }

        function renderTasks(filterText = '') {
            // Clear columns
            Object.values(columns).forEach(col => col.innerHTML = '');
            
            // Reset counts
            const countsTemp = { todo: 0, progress: 0, done: 0 };

            // Filter and Sort (High priority first usually, but let's stick to creation time or simple list)
            // Here we just filter
            const filteredTasks = tasks.filter(t => 
                t.title.toLowerCase().includes(filterText.toLowerCase()) || 
                t.desc.toLowerCase().includes(filterText.toLowerCase())
            );

            filteredTasks.forEach(task => {
                const card = createTaskElement(task);
                if (columns[task.status]) {
                    columns[task.status].appendChild(card);
                    countsTemp[task.status]++;
                }
            });

            // Update counts
            counts.todo.textContent = countsTemp.todo;
            counts.progress.textContent = countsTemp.progress;
            counts.done.textContent = countsTemp.done;
        }

        function createTaskElement(task) {
            const div = document.createElement('div');
            div.className = 'task-card';
            div.draggable = true;
            div.id = task.id;
            
            // Drag Events
            div.addEventListener('dragstart', drag);
            div.addEventListener('dragend', dragEnd);

            // Priority Color Class
            const priorityClass = `priority-${task.priority.toLowerCase()}`;
            const dateObj = new Date(task.createdAt);
            const dateStr = dateObj.toLocaleDateString() + ' ' + dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            div.innerHTML = `
                <div class="task-header">
                    <span class="task-title">${escapeHtml(task.title)}</span>
                    <span class="priority-badge ${priorityClass}">${task.priority}</span>
                </div>
                ${task.desc ? `<div class="task-desc">${escapeHtml(task.desc)}</div>` : ''}
                <div class="task-footer">
                    <span>${dateStr}</span>
                    <div class="task-actions">
                        <button class="icon-btn" onclick="editTask('${task.id}')" title="Edit">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                        </button>
                        <button class="icon-btn delete" onclick="deleteTask('${task.id}')" title="Delete">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                    </div>
                </div>
            `;
            return div;
        }

        function saveTask() {
            const id = document.getElementById('taskId').value;
            const title = document.getElementById('taskTitle').value;
            const desc = document.getElementById('taskDesc').value;
            const priority = document.getElementById('taskPriority').value;
            const status = document.getElementById('taskStatus').value;

            if (id) {
                // Edit existing
                const taskIndex = tasks.findIndex(t => t.id === id);
                if (taskIndex > -1) {
                    tasks[taskIndex] = { ...tasks[taskIndex], title, desc, priority, status };
                }
            } else {
                // Add new
                const newTask = {
                    id: Date.now().toString(),
                    title,
                    desc,
                    priority,
                    status,
                    createdAt: Date.now()
                };
                tasks.push(newTask);
            }

            saveToStorage();
            closeModal();
            renderTasks(searchInput.value);
        }

        function deleteTask(id) {
            if(confirm('Are you sure you want to delete this task?')) {
                tasks = tasks.filter(t => t.id !== id);
                saveToStorage();
                renderTasks(searchInput.value);
            }
        }

        // --- Modal Logic ---
        function openModal() {
            form.reset();
            document.getElementById('taskId').value = '';
            document.getElementById('modalTitle').textContent = 'New Task';
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        function editTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                document.getElementById('taskId').value = task.id;
                document.getElementById('taskTitle').value = task.title;
                document.getElementById('taskDesc').value = task.desc;
                document.getElementById('taskPriority').value = task.priority;
                document.getElementById('taskStatus').value = task.status;
                document.getElementById('modalTitle').textContent = 'Edit Task';
                modal.classList.add('active');
            }
        }

        // --- Drag and Drop Logic ---
        function drag(ev) {
            draggedTaskId = ev.target.id;
            ev.target.classList.add('dragging');
            ev.dataTransfer.effectAllowed = "move";
        }

        function dragEnd(ev) {
            ev.target.classList.remove('dragging');
            draggedTaskId = null;
        }

        function allowDrop(ev) {
            ev.preventDefault();
            ev.dataTransfer.dropEffect = "move";
        }

        function drop(ev) {
            ev.preventDefault();
            
            // Find closest column (handling drops on headers or empty space)
            let targetColumn = ev.target;
            while (!targetColumn.classList.contains('column') && targetColumn.id !== 'board') {
                targetColumn = targetColumn.parentElement;
                if(!targetColumn) return;
            }

            if (targetColumn.classList.contains('column')) {
                const newStatus = targetColumn.getAttribute('data-status');
                
                // Update task status
                const taskIndex = tasks.findIndex(t => t.id === draggedTaskId);
                if (taskIndex > -1 && tasks[taskIndex].status !== newStatus) {
                    tasks[taskIndex].status = newStatus;
                    saveToStorage();
                    renderTasks(searchInput.value);
                }
            }
        }

        // Security helper
        function escapeHtml(text) {
            if (!text) return '';
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

    </script>
</body>
</html>
