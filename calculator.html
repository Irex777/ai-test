<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .calculator {
            background: #1a1a2e;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            padding: 25px;
            max-width: 400px;
            width: 100%;
        }

        .display {
            background: #0f0f1a;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: right;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .expression-history {
            color: #6c6c80;
            font-size: 14px;
            min-height: 20px;
            margin-bottom: 5px;
            word-wrap: break-word;
        }

        .current-input {
            color: #ffffff;
            font-size: 36px;
            font-weight: 300;
            word-wrap: break-word;
            min-height: 45px;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        button {
            padding: 20px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
            background: #2d2d44;
            color: #ffffff;
            user-select: none;
        }

        button:hover {
            background: #3d3d5c;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button.number {
            background: #252538;
        }

        button.operator {
            background: #4a4a6a;
            color: #a0a0ff;
        }

        button.equals {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        button.equals:hover {
            background: linear-gradient(135deg, #7b8ff0 0%, #8b5bb2 100%);
        }

        button.clear {
            background: #e74c3c;
            color: white;
        }

        button.clear:hover {
            background: #f56c6c;
        }

        button.memory {
            background: #3498db;
            color: white;
        }

        button.memory:hover {
            background: #5dade2;
        }

        .memory-indicator {
            position: absolute;
            top: 10px;
            left: 15px;
            font-size: 12px;
            color: #3498db;
            font-weight: bold;
            display: none;
        }

        .memory-indicator.active {
            display: block;
        }

        .error {
            color: #e74c3c !important;
            font-size: 20px !important;
        }

        @media (max-width: 420px) {
            .calculator {
                padding: 15px;
            }

            button {
                padding: 15px;
                font-size: 16px;
            }

            .current-input {
                font-size: 28px;
            }

            .expression-history {
                font-size: 12px;
            }
        }

        @media (max-width: 350px) {
            .button-grid {
                gap: 8px;
            }

            button {
                padding: 12px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <span class="memory-indicator" id="memoryIndicator">M</span>
            <div class="expression-history" id="expressionHistory"></div>
            <div class="current-input" id="currentInput">0</div>
        </div>
        <div class="button-grid">
            <button class="memory" data-action="MC">MC</button>
            <button class="memory" data-action="MR">MR</button>
            <button class="memory" data-action="M+">M+</button>
            <button class="memory" data-action="M-">M-</button>
            <button class="clear" data-action="CE">CE</button>

            <button class="clear" data-action="C">C</button>
            <button data-action="backspace">⌫</button>
            <button class="operator" data-action="%">%</button>
            <button class="operator" data-action="/">÷</button>
            <button class="operator" data-action="*">×</button>

            <button class="number" data-value="7">7</button>
            <button class="number" data-value="8">8</button>
            <button class="number" data-value="9">9</button>
            <button class="operator" data-action="-">−</button>
            <button class="operator" data-action="+">+</button>

            <button class="number" data-value="4">4</button>
            <button class="number" data-value="5">5</button>
            <button class="number" data-value="6">6</button>
            <button class="operator" data-action="+/-">±</button>
            <button class="equals" data-action="=">=</button>

            <button class="number" data-value="1">1</button>
            <button class="number" data-value="2">2</button>
            <button class="number" data-value="3">3</button>
            <button class="number" data-value=".">.</button>
            <button class="number" data-value="0">0</button>
        </div>
    </div>

    <script>
        class Calculator {
            constructor() {
                this.currentInput = '0';
                this.expressionHistory = '';
                this.memory = 0;
                this.memoryHasValue = false;
                this.shouldResetInput = false;

                this.currentInputElement = document.getElementById('currentInput');
                this.expressionHistoryElement = document.getElementById('expressionHistory');
                this.memoryIndicator = document.getElementById('memoryIndicator');

                this.init();
            }

            init() {
                document.querySelectorAll('button').forEach(button => {
                    button.addEventListener('click', (e) => this.handleClick(e));
                });

                document.addEventListener('keydown', (e) => this.handleKeyboard(e));
            }

            handleClick(e) {
                const button = e.target;
                const value = button.dataset.value;
                const action = button.dataset.action;

                if (value) {
                    this.inputNumber(value);
                } else if (action) {
                    this.handleAction(action);
                }

                this.updateDisplay();
            }

            handleKeyboard(e) {
                const key = e.key;

                if (/[0-9.]/.test(key)) {
                    e.preventDefault();
                    this.inputNumber(key);
                } else if (['+', '-', '*', '/'].includes(key)) {
                    e.preventDefault();
                    this.handleAction(key);
                } else if (key === 'Enter' || key === '=') {
                    e.preventDefault();
                    this.handleAction('=');
                } else if (key === 'Escape') {
                    e.preventDefault();
                    this.handleAction('C');
                } else if (key === 'Backspace') {
                    e.preventDefault();
                    this.handleAction('backspace');
                } else if (key === '%') {
                    e.preventDefault();
                    this.handleAction('%');
                }

                this.updateDisplay();
            }

            inputNumber(value) {
                if (this.shouldResetInput) {
                    this.currentInput = '0';
                    this.shouldResetInput = false;
                }

                if (value === '.') {
                    if (!this.currentInput.includes('.')) {
                        this.currentInput += '.';
                    }
                } else {
                    if (this.currentInput === '0' && value !== '.') {
                        this.currentInput = value;
                    } else if (this.currentInput !== '0' || value !== '0') {
                        this.currentInput += value;
                    }
                }
            }

            handleAction(action) {
                switch (action) {
                    case '+':
                    case '-':
                    case '*':
                    case '/':
                        this.handleOperator(action);
                        break;
                    case '=':
                        this.calculate();
                        break;
                    case 'C':
                        this.clearAll();
                        break;
                    case 'CE':
                        this.clearEntry();
                        break;
                    case 'backspace':
                        this.backspace();
                        break;
                    case '%':
                        this.percentage();
                        break;
                    case '+/-':
                        this.toggleSign();
                        break;
                    case 'M+':
                        this.memoryAdd();
                        break;
                    case 'M-':
                        this.memorySubtract();
                        break;
                    case 'MR':
                        this.memoryRecall();
                        break;
                    case 'MC':
                        this.memoryClear();
                        break;
                }
            }

            handleOperator(operator) {
                const displayOperator = operator === '*' ? '×' : operator === '/' ? '÷' : operator === '-' ? '−' : operator;

                if (this.expressionHistory && !this.shouldResetInput) {
                    this.calculate();
                }

                this.expressionHistory = `${this.currentInput} ${displayOperator}`;
                this.shouldResetInput = true;
            }

            calculate() {
                if (!this.expressionHistory) return;

                const operator = this.expressionHistory.slice(-1);
                const previousValue = parseFloat(this.expressionHistory.slice(0, -2));
                const currentValue = parseFloat(this.currentInput);

                let result;
                const displayOperator = operator === '×' ? '*' : operator === '÷' ? '/' : operator === '−' ? '-' : operator;

                switch (displayOperator) {
                    case '+':
                        result = previousValue + currentValue;
                        break;
                    case '-':
                        result = previousValue - currentValue;
                        break;
                    case '*':
                        result = previousValue * currentValue;
                        break;
                    case '/':
                        if (currentValue === 0) {
                            this.showError('Error: Division by zero');
                            return;
                        }
                        result = previousValue / currentValue;
                        break;
                    default:
                        return;
                }

                this.expressionHistory = `${this.expressionHistory} ${this.currentInput} =`;
                this.currentInput = this.formatResult(result);
                this.shouldResetInput = true;
            }

            formatResult(result) {
                if (isNaN(result) || !isFinite(result)) {
                    return 'Error';
                }

                const rounded = Math.round(result * 1000000000) / 1000000000;
                return rounded.toString();
            }

            showError(message) {
                this.currentInput = message;
                this.expressionHistory = '';
                this.shouldResetInput = true;
                this.updateDisplay();
                setTimeout(() => {
                    if (this.currentInput === message) {
                        this.currentInput = '0';
                        this.updateDisplay();
                    }
                }, 2000);
            }

            clearAll() {
                this.currentInput = '0';
                this.expressionHistory = '';
                this.shouldResetInput = false;
            }

            clearEntry() {
                this.currentInput = '0';
            }

            backspace() {
                if (this.currentInput.length > 1) {
                    this.currentInput = this.currentInput.slice(0, -1);
                } else {
                    this.currentInput = '0';
                }
            }

            percentage() {
                this.currentInput = (parseFloat(this.currentInput) / 100).toString();
            }

            toggleSign() {
                this.currentInput = (parseFloat(this.currentInput) * -1).toString();
            }

            memoryAdd() {
                this.memory += parseFloat(this.currentInput);
                this.memoryHasValue = true;
                this.updateMemoryIndicator();
                this.shouldResetInput = true;
            }

            memorySubtract() {
                this.memory -= parseFloat(this.currentInput);
                this.memoryHasValue = true;
                this.updateMemoryIndicator();
                this.shouldResetInput = true;
            }

            memoryRecall() {
                if (this.memoryHasValue) {
                    this.currentInput = this.memory.toString();
                    this.shouldResetInput = true;
                }
            }

            memoryClear() {
                this.memory = 0;
                this.memoryHasValue = false;
                this.updateMemoryIndicator();
            }

            updateMemoryIndicator() {
                if (this.memoryHasValue) {
                    this.memoryIndicator.classList.add('active');
                } else {
                    this.memoryIndicator.classList.remove('active');
                }
            }

            updateDisplay() {
                this.currentInputElement.textContent = this.currentInput;
                this.expressionHistoryElement.textContent = this.expressionHistory;

                if (this.currentInput.includes('Error')) {
                    this.currentInputElement.classList.add('error');
                } else {
                    this.currentInputElement.classList.remove('error');
                }
            }
        }

        const calculator = new Calculator();
    </script>
</body>
</html>
