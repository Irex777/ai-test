<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEON SNAKE — Arcade Edition</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-0: #07090a;
    --bg-1: #0c1211;
    --fg: #e8ffe5;
    --muted: #6b7d6f;
    --accent: #b6ff3c;
    --accent-2: #ff3864;
    --accent-3: #00e5ff;
    --border: rgba(182, 255, 60, 0.18);
    --card: rgba(20, 30, 25, 0.55);
  }

  html, body { height: 100%; }

  body {
    background:
      radial-gradient(ellipse at top, rgba(182, 255, 60, 0.08), transparent 55%),
      radial-gradient(ellipse at bottom right, rgba(255, 56, 100, 0.07), transparent 55%),
      radial-gradient(ellipse at bottom left, rgba(0, 229, 255, 0.05), transparent 55%),
      var(--bg-0);
    color: var(--fg);
    font-family: 'Courier New', ui-monospace, monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
    padding: 16px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: -2px;
    background-image:
      linear-gradient(rgba(182, 255, 60, 0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(182, 255, 60, 0.035) 1px, transparent 1px);
    background-size: 44px 44px;
    pointer-events: none;
    z-index: 0;
    animation: gridMove 24s linear infinite;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 90%);
  }

  @keyframes gridMove {
    from { background-position: 0 0, 0 0; }
    to { background-position: 44px 44px, 44px 44px; }
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    width: 100%;
    max-width: 540px;
  }

  .header { text-align: center; }

  .title {
    font-size: clamp(2.2rem, 7vw, 3.6rem);
    font-weight: 900;
    letter-spacing: 0.28em;
    color: var(--fg);
    line-height: 1;
    padding-left: 0.28em;
  }

  .title .accent { color: var(--accent); }

  .subtitle {
    font-size: 0.7rem;
    letter-spacing: 0.55em;
    color: var(--muted);
    margin-top: 10px;
    padding-left: 0.55em;
  }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    width: 100%;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 14px;
    backdrop-filter: blur(10px);
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 1px;
    background: linear-gradient(90deg, transparent, currentColor, transparent);
    opacity: 0.4;
  }

  .stat-card.score { color: var(--accent); }
  .stat-card.best { color: var(--accent-3); }
  .stat-card.level { color: var(--accent-2); }

  .stat-label {
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .stat-value {
    font-size: 1.6rem;
    font-weight: 900;
    color: currentColor;
    margin-top: 2px;
    font-variant-numeric: tabular-nums;
    line-height: 1.1;
  }

  .game-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    box-shadow:
      0 0 80px rgba(182, 255, 60, 0.08),
      0 20px 60px rgba(0, 0, 0, 0.6),
      inset 0 0 0 1px rgba(255, 255, 255, 0.02);
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    background: var(--bg-1);
    touch-action: none;
  }

  .game-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(transparent 50%, rgba(0, 0, 0, 0.05) 50%);
    background-size: 100% 3px;
    pointer-events: none;
    z-index: 5;
    opacity: 0.35;
    mix-blend-mode: overlay;
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(7, 9, 10, 0.86);
    backdrop-filter: blur(6px);
    z-index: 10;
    text-align: center;
    padding: 24px;
    transition: opacity 0.25s;
  }

  .overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .overlay-title {
    font-size: clamp(2rem, 6vw, 3rem);
    font-weight: 900;
    letter-spacing: 0.18em;
    margin-bottom: 14px;
    line-height: 1;
  }

  .overlay-title.start { color: var(--accent); }
  .overlay-title.start .blink {
    display: inline-block;
    animation: blink 1.1s steps(2) infinite;
  }

  .overlay-title.over { color: var(--accent-2); }

  @keyframes blink {
    50% { opacity: 0; }
  }

  .overlay-text {
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    margin-bottom: 22px;
    line-height: 1.7;
    max-width: 320px;
  }

  .final-score {
    display: flex;
    gap: 36px;
    margin-bottom: 24px;
  }

  .final-stat { text-align: center; }

  .final-stat-label {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.25em;
  }

  .final-stat-value {
    font-size: 2.2rem;
    font-weight: 900;
    color: var(--fg);
    margin-top: 2px;
  }

  .final-stat.highlight .final-stat-value { color: var(--accent); }

  .btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 14px 36px;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.25s, box-shadow 0.25s, transform 0.1s;
    border-radius: 2px;
    position: relative;
    overflow: hidden;
    z-index: 1;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: translateX(-101%);
    transition: transform 0.3s ease;
    z-index: -1;
  }

  .btn:hover {
    color: var(--bg-0);
    box-shadow: 0 0 30px rgba(182, 255, 60, 0.45);
  }

  .btn:hover::before { transform: translateX(0); }
  .btn:active { transform: scale(0.97); }

  .controls-hint {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-align: center;
    line-height: 2;
  }

  .key {
    display: inline-block;
    padding: 3px 9px;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--fg);
    margin: 0 2px;
    font-size: 0.65rem;
    background: rgba(182, 255, 60, 0.04);
  }

  .new-record {
    color: var(--accent-3);
    font-size: 0.72rem;
    letter-spacing: 0.35em;
    margin-bottom: 14px;
    animation: pulse 1.4s ease-in-out infinite;
    font-weight: 700;
  }

  .new-record.hidden { display: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; text-shadow: 0 0 12px rgba(0, 229, 255, 0.6); }
    50% { opacity: 0.45; text-shadow: 0 0 4px rgba(0, 229, 255, 0.2); }
  }

  .touch-hint { display: none; font-size: 0.65rem; color: var(--muted); letter-spacing: 0.18em; margin-top: 16px; }

  @media (hover: none) and (pointer: coarse) {
    .touch-hint { display: block; }
    .desktop-hint { display: none; }
  }

  .footer-tag {
    font-size: 0.6rem;
    letter-spacing: 0.4em;
    color: var(--muted);
    opacity: 0.6;
    margin-top: 4px;
  }
</style>
</head>
<body>
  <main class="container">
    <header class="header">
      <h1 class="title">NEON <span class="accent">SNAKE</span></h1>
      <div class="subtitle">ARCADE EDITION</div>
    </header>

    <section class="stats" aria-label="Game statistics">
      <div class="stat-card score">
        <div class="stat-label">Score</div>
        <div class="stat-value" id="score">0</div>
      </div>
      <div class="stat-card best">
        <div class="stat-label">Best</div>
        <div class="stat-value" id="best">0</div>
      </div>
      <div class="stat-card level">
        <div class="stat-label">Level</div>
        <div class="stat-value" id="level">1</div>
      </div>
    </section>

    <div class="game-wrap">
      <canvas id="game" width="500" height="500" aria-label="Snake game arena"></canvas>

      <div class="overlay" id="startScreen">
        <h2 class="overlay-title start">READY<span class="blink">_</span></h2>
        <p class="overlay-text">
          Eat the fruit. Avoid the walls. Don't bite yourself.<br>
          The faster you score, the faster it gets.
        </p>
        <button class="btn" id="startBtn" type="button">Start Game</button>
        <div class="controls-hint desktop-hint" style="margin-top: 22px;">
          <span class="key">↑</span><span class="key">↓</span><span class="key">←</span><span class="key">→</span>
          &nbsp;or&nbsp;
          <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span>
        </div>
        <div class="touch-hint">SWIPE TO MOVE</div>
      </div>

      <div class="overlay hidden" id="gameOverScreen">
        <div class="new-record hidden" id="newRecord">NEW HIGH SCORE</div>
        <h2 class="overlay-title over">GAME OVER</h2>
        <div class="final-score">
          <div class="final-stat highlight">
            <div class="final-stat-label">SCORE</div>
            <div class="final-stat-value" id="finalScore">0</div>
          </div>
          <div class="final-stat">
            <div class="final-stat-label">BEST</div>
            <div class="final-stat-value" id="finalBest">0</div>
          </div>
        </div>
        <button class="btn" id="restartBtn" type="button">Play Again</button>
      </div>
    </div>

    <div class="controls-hint desktop-hint">
      <span class="key">↑</span><span class="key">↓</span><span class="key">←</span><span class="key">→</span>
      MOVE &nbsp;·&nbsp;
      <span class="key">P</span> PAUSE &nbsp;·&nbsp;
      <span class="key">SPACE</span> RESTART
    </div>

    <div class="footer-tag">v 1.0 — INSERT COIN</div>
  </main>

<script>
(() => {
  // ===== Config =====
  const COLS = 20;
  const ROWS = 20;
  const BASE_TICK = 145;   // ms per move at start
  const MIN_TICK = 55;     // fastest
  const SPEED_STEP = 7;    // ms shaved per level-up threshold

  // ===== DOM =====
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const levelEl = document.getElementById('level');
  const startScreen = document.getElementById('startScreen');
  const gameOverScreen = document.getElementById('gameOverScreen');
  const startBtn = document.getElementById('startBtn');
  const restartBtn = document.getElementById('restartBtn');
  const finalScoreEl = document.getElementById('finalScore');
  const finalBestEl = document.getElementById('finalBest');
  const newRecordEl = document.getElementById('newRecord');

  // Internal resolution
  const CELL = canvas.width / COLS;

  // ===== State =====
  let snake, dir, queuedDir, food, score, tickNow;
  let running = false, paused = false;
  let lastTick = 0;
  let particles = [], ripples = [], deathFlash = 0;
  let rafId = null;
  let best = parseInt(localStorage.getItem('neonSnakeBest') || '0', 10);
  bestEl.textContent = best;

  function init() {
    snake = [
      { x: 10, y: 10 },
      { x: 9, y: 10 },
      { x: 8, y: 10 },
      { x: 7, y: 10 }
    ];
    dir = { x: 1, y: 0 };
    queuedDir = { x: 1, y: 0 };
    score = 0;
    tickNow = BASE_TICK;
    particles = [];
    ripples = [];
    deathFlash = 0;
    spawnFood();
    updateHUD();
  }

  function currentLevel() {
    return Math.floor((BASE_TICK - tickNow) / SPEED_STEP) + 1;
  }

  function updateHUD() {
    scoreEl.textContent = score;
    bestEl.textContent = best;
    levelEl.textContent = currentLevel();
  }

  function spawnFood() {
    const free = [];
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        if (!snake.some(s => s.x === x && s.y === y)) free.push({ x, y });
      }
    }
    if (free.length === 0) return;
    const pick = free[Math.floor(Math.random() * free.length)];
    food = { x: pick.x, y: pick.y, pulse: 0, born: performance.now() };
  }

  function step() {
    dir = queuedDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // Wall
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
      return gameOver();
    }
    // Self
    for (let i = 0; i < snake.length - 1; i++) {
      if (snake[i].x === head.x && snake[i].y === head.y) return gameOver();
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score += 10;
      const cx = food.x * CELL + CELL / 2;
      const cy = food.y * CELL + CELL / 2;
      emitParticles(cx, cy);
      ripples.push({ x: cx, y: cy, r: CELL * 0.4, life: 1 });
      tickNow = Math.max(MIN_TICK, BASE_TICK - Math.floor(score / 30) * SPEED_STEP);
      spawnFood();
      updateHUD();
    } else {
      snake.pop();
    }
  }

  function emitParticles(x, y) {
    const n = 22;
    for (let i = 0; i < n; i++) {
      const a = (Math.PI * 2 * i) / n + Math.random() * 0.4;
      const sp = 1.2 + Math.random() * 3.4;
      particles.push({
        x, y,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp,
        life: 1,
        size: 1.6 + Math.random() * 2.4,
        color: Math.random() < 0.6 ? '255, 56, 100' : '255, 184, 108'
      });
    }
  }

  function updateFX() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.91; p.vy *= 0.91;
      p.life -= 0.024;
      if (p.life <= 0) particles.splice(i, 1);
    }
    for (let i = ripples.length - 1; i >= 0; i--) {
      const r = ripples[i];
      r.r += 2.2;
      r.life -= 0.035;
      if (r.life <= 0) ripples.splice(i, 1);
    }
    if (deathFlash > 0) deathFlash -= 0.04;
  }

  function roundRect(x, y, w, h, r) {
    r = Math.min(r, Math.max(0, w / 2), Math.max(0, h / 2));
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function draw() {
    // Background
    ctx.fillStyle = '#0c1211';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Soft vignette
    const vg = ctx.createRadialGradient(
      canvas.width / 2, canvas.height / 2, Math.max(1, canvas.width * 0.15),
      canvas.width / 2, canvas.height / 2, Math.max(2, canvas.width * 0.75)
    );
    vg.addColorStop(0, 'rgba(182, 255, 60, 0.05)');
    vg.addColorStop(1, 'rgba(0, 0, 0, 0.35)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid overlay
    ctx.strokeStyle = 'rgba(182, 255, 60, 0.06)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = 0; i <= COLS; i++) {
      const x = (i * canvas.width) / COLS;
      ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height);
    }
    for (let j = 0; j <= ROWS; j++) {
      const y = (j * canvas.height) / ROWS;
      ctx.moveTo(0, y); ctx.lineTo(canvas.width, y);
    }
    ctx.stroke();

    // Corner accents
    ctx.strokeStyle = 'rgba(182, 255, 60, 0.35)';
    ctx.lineWidth = 2;
    const cl = 14;
    [[0,0,1,1],[canvas.width,0,-1,1],[0,canvas.height,1,-1],[canvas.width,canvas.height,-1,-1]].forEach(([x,y,sx,sy]) => {
      ctx.beginPath();
      ctx.moveTo(x, y + sy * cl);
      ctx.lineTo(x, y);
      ctx.lineTo(x + sx * cl, y);
      ctx.stroke();
    });

    // Ripples
    ripples.forEach(r => {
      ctx.strokeStyle = `rgba(255, 56, 100, ${Math.max(0, r.life * 0.6)})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(r.x, r.y, Math.max(0.5, r.r), 0, Math.PI * 2);
      ctx.stroke();
    });

    // Food
    if (food) {
      food.pulse += 0.09;
      const pulse = 1 + Math.sin(food.pulse) * 0.18;
      const fx = food.x * CELL + CELL / 2;
      const fy = food.y * CELL + CELL / 2;
      const fr = Math.max(2, (CELL / 2 - 4) * pulse);

      const glow = ctx.createRadialGradient(fx, fy, 0, fx, fy, Math.max(2, CELL * 1.3));
      glow.addColorStop(0, 'rgba(255, 56, 100, 0.55)');
      glow.addColorStop(0.45, 'rgba(255, 56, 100, 0.18)');
      glow.addColorStop(1, 'rgba(255, 56, 100, 0)');
      ctx.fillStyle = glow;
      ctx.fillRect(fx - CELL * 1.3, fy - CELL * 1.3, CELL * 2.6, CELL * 2.6);

      ctx.fillStyle = '#ff3864';
      ctx.beginPath();
      ctx.arc(fx, fy, fr, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = 'rgba(255, 220, 220, 0.85)';
      ctx.beginPath();
      ctx.arc(fx - fr * 0.32, fy - fr * 0.32, Math.max(0.8, fr * 0.28), 0, Math.PI * 2);
      ctx.fill();
    }

    // Snake
    for (let i = snake.length - 1; i >= 0; i--) {
      const seg = snake[i];
      const sx = seg.x * CELL;
      const sy = seg.y * CELL;
      const isHead = i === 0;
      const t = 1 - i / Math.max(1, snake.length);

      if (isHead) {
        const hg = ctx.createRadialGradient(
          sx + CELL / 2, sy + CELL / 2, 0,
          sx + CELL / 2, sy + CELL / 2, Math.max(2, CELL * 1.6)
        );
        hg.addColorStop(0, 'rgba(182, 255, 60, 0.45)');
        hg.addColorStop(1, 'rgba(182, 255, 60, 0)');
        ctx.fillStyle = hg;
        ctx.fillRect(sx - CELL, sy - CELL, CELL * 3, CELL * 3);
      }

      const r = Math.floor(182 * t + 50 * (1 - t));
      const g = Math.floor(255 * t + 90 * (1 - t));
      const b = Math.floor(60 * t + 40 * (1 - t));
      ctx.fillStyle = isHead ? '#d8ff66' : `rgb(${r}, ${g}, ${b})`;

      const pad = isHead ? 1 : 2;
      const radius = isHead ? 7 : 5;
      roundRect(sx + pad, sy + pad, CELL - pad * 2, CELL - pad * 2, radius);
      ctx.fill();

      // Subtle inner shine on body
      if (!isHead) {
        ctx.fillStyle = `rgba(255, 255, 255, ${0.06 * t})`;
        roundRect(sx + pad + 2, sy + pad + 2, CELL - pad * 2 - 4, (CELL - pad * 2 - 4) * 0.4, radius - 2);
        ctx.fill();
      }

      if (isHead) {
        // Eye positions based on direction
        const eo = 6, es = 2.6;
        let e1, e2;
        if (dir.x === 1) {
          e1 = { x: sx + CELL - eo, y: sy + eo + 1 };
          e2 = { x: sx + CELL - eo, y: sy + CELL - eo - 1 };
        } else if (dir.x === -1) {
          e1 = { x: sx + eo, y: sy + eo + 1 };
          e2 = { x: sx + eo, y: sy + CELL - eo - 1 };
        } else if (dir.y === 1) {
          e1 = { x: sx + eo + 1, y: sy + CELL - eo };
          e2 = { x: sx + CELL - eo - 1, y: sy + CELL - eo };
        } else {
          e1 = { x: sx + eo + 1, y: sy + eo };
          e2 = { x: sx + CELL - eo - 1, y: sy + eo };
        }
        ctx.fillStyle = '#08120a';
        ctx.beginPath();
        ctx.arc(e1.x, e1.y, es, 0, Math.PI * 2);
        ctx.arc(e2.x, e2.y, es, 0, Math.PI * 2);
        ctx.fill();
        // pupils glint
        ctx.fillStyle = '#b6ff3c';
        ctx.beginPath();
        ctx.arc(e1.x + dir.x * 0.6, e1.y + dir.y * 0.6, 0.8, 0, Math.PI * 2);
        ctx.arc(e2.x + dir.x * 0.6, e2.y + dir.y * 0.6, 0.8, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Particles
    particles.forEach(p => {
      ctx.fillStyle = `rgba(${p.color}, ${Math.max(0, p.life)})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, Math.max(0.4, p.size * p.life), 0, Math.PI * 2);
      ctx.fill();
    });

    // Death flash
    if (deathFlash > 0) {
      ctx.fillStyle = `rgba(255, 56, 100, ${Math.max(0, deathFlash * 0.4)})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    // Pause veil
    if (paused && running) {
      ctx.fillStyle = 'rgba(7, 9, 10, 0.65)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#b6ff3c';
      ctx.font = '900 36px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
      ctx.font = '12px "Courier New", monospace';
      ctx.fillStyle = '#6b7d6f';
      ctx.fillText('PRESS  P  TO RESUME', canvas.width / 2, canvas.height / 2 + 28);
    }
  }

  function loop(ts) {
    if (!running) return;
    if (!paused) {
      if (ts - lastTick >= tickNow) {
        step();
        lastTick = ts;
      }
      updateFX();
    }
    draw();
    rafId = requestAnimationFrame(loop);
  }

  function startGame() {
    init();
    running = true;
    paused = false;
    lastTick = performance.now();
    startScreen.classList.add('hidden');
    gameOverScreen.classList.add('hidden');
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(loop);
  }

  function gameOver() {
    running = false;
    cancelAnimationFrame(rafId);
    deathFlash = 1;

    let isNew = false;
    if (score > best) {
      best = score;
      localStorage.setItem('neonSnakeBest', String(best));
      isNew = true;
    }

    finalScoreEl.textContent = score;
    finalBestEl.textContent = best;
    newRecordEl.classList.toggle('hidden', !isNew);
    updateHUD();

    // Final dramatic frame
    const fadeStart = performance.now();
    const fadeDur = 420;
    const fadeFrame = (t) => {
      const p = Math.min(1, (t - fadeStart) / fadeDur);
      draw();
      ctx.fillStyle = `rgba(255, 56, 100, ${(1 - p) * 0.35 + 0.05})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      if (p < 1) requestAnimationFrame(fadeFrame);
      else gameOverScreen.classList.remove('hidden');
    };
    requestAnimationFrame(fadeFrame);
  }

  function setDir(dx, dy) {
    // Disallow direct reverse
    if (snake.length > 1 && dx === -dir.x && dy === -dir.y) return;
    if (dx === dir.x && dy === dir.y) return;
    queuedDir = { x: dx, y: dy };
  }

  // ===== Keyboard =====
  window.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    if (k === ' ') {
      e.preventDefault();
      if (!running) startGame();
      return;
    }
    if (k === 'p' && running) {
      paused = !paused;
      return;
    }
    if (!running || paused) return;
    if (k === 'arrowup' || k === 'w') { e.preventDefault(); setDir(0, -1); }
    else if (k === 'arrowdown' || k === 's') { e.preventDefault(); setDir(0, 1); }
    else if (k === 'arrowleft' || k === 'a') { e.preventDefault(); setDir(-1, 0); }
    else if (k === 'arrowright' || k === 'd') { e.preventDefault(); setDir(1, 0); }
  });

  // ===== Touch / Swipe =====
  let touchStart = null;
  const wrap = canvas.parentElement;
  wrap.addEventListener('touchstart', (e) => {
    if (!running) return;
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, t: Date.now() };
  }, { passive: true });

  wrap.addEventListener('touchend', (e) => {
    if (!touchStart || !running || paused) { touchStart = null; return; }
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.x;
    const dy = t.clientY - touchStart.y;
    const ax = Math.abs(dx), ay = Math.abs(dy);
    if (Math.max(ax, ay) > 18) {
      if (ax > ay) setDir(dx > 0 ? 1 : -1, 0);
      else setDir(0, dy > 0 ? 1 : -1);
    }
    touchStart = null;
  }, { passive: true });

  wrap.addEventListener('touchmove', (e) => { if (running) e.preventDefault(); }, { passive: false });

  // ===== Buttons =====
  startBtn.addEventListener('click', startGame);
  restartBtn.addEventListener('click', startGame);

  // ===== Initial paint (so the arena looks alive behind start overlay) =====
  init();
  draw();
})();
</script>
</body>
</html>
