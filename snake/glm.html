<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0e13;
    --bg2: #111820;
    --fg: #e8ecf1;
    --muted: #4a5568;
    --accent: #00e676;
    --accent2: #00bfa5;
    --danger: #ff5252;
    --card: rgba(17, 24, 32, 0.85);
    --border: rgba(0, 230, 118, 0.12);
    --glow: rgba(0, 230, 118, 0.25);
  }

  @font-face {
    font-family: 'sys';
    src: local('Segoe UI'), local('Helvetica Neue'), local('sans-serif');
  }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'sys', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated background blobs */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.15;
    z-index: 0;
    animation: blobFloat 12s ease-in-out infinite alternate;
  }
  body::before {
    width: 500px; height: 500px;
    background: var(--accent);
    top: -150px; left: -100px;
  }
  body::after {
    width: 400px; height: 400px;
    background: var(--accent2);
    bottom: -100px; right: -80px;
    animation-delay: -6s;
  }

  @keyframes blobFloat {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(60px, 40px) scale(1.15); }
  }

  .game-wrapper {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  /* Score bar */
  .score-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 520px;
    padding: 12px 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    backdrop-filter: blur(12px);
  }

  .score-section {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .score-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    font-weight: 700;
  }

  .score-value {
    font-size: 28px;
    font-weight: 900;
    color: var(--accent);
    line-height: 1;
    text-shadow: 0 0 20px var(--glow);
    transition: transform 0.15s ease;
  }

  .score-value.bump {
    transform: scale(1.25);
  }

  .high-score .score-value {
    color: var(--accent2);
    text-shadow: 0 0 20px rgba(0, 191, 165, 0.3);
  }

  .speed-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 600;
  }

  .speed-dots {
    display: flex;
    gap: 3px;
  }

  .speed-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    opacity: 0.3;
    transition: all 0.3s ease;
  }

  .speed-dot.active {
    background: var(--accent);
    opacity: 1;
    box-shadow: 0 0 6px var(--glow);
  }

  /* Canvas container */
  .canvas-container {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow:
      0 0 40px rgba(0, 230, 118, 0.05),
      0 20px 60px rgba(0, 0, 0, 0.4),
      inset 0 1px 0 rgba(255,255,255,0.03);
  }

  canvas {
    display: block;
    background: var(--bg2);
  }

  /* Overlays */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10, 14, 19, 0.92);
    backdrop-filter: blur(8px);
    z-index: 10;
    transition: opacity 0.4s ease;
    border-radius: 16px;
  }

  .overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .overlay-title {
    font-size: 42px;
    font-weight: 900;
    letter-spacing: -1px;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .overlay-subtitle {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 32px;
    letter-spacing: 0.5px;
  }

  .game-over-score {
    font-size: 60px;
    font-weight: 900;
    color: var(--fg);
    line-height: 1;
    margin-bottom: 4px;
  }

  .game-over-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 24px;
  }

  .new-high {
    display: none;
    padding: 6px 16px;
    background: rgba(0, 230, 118, 0.1);
    border: 1px solid rgba(0, 230, 118, 0.3);
    border-radius: 20px;
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 28px;
    animation: pulse 1.5s ease-in-out infinite;
  }

  .new-high.show {
    display: block;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.3); }
    50% { box-shadow: 0 0 0 8px rgba(0, 230, 118, 0); }
  }

  .btn {
    padding: 14px 36px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s ease;
    outline: none;
    text-transform: uppercase;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: var(--bg);
    box-shadow: 0 4px 20px rgba(0, 230, 118, 0.25);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0, 230, 118, 0.35);
  }

  .btn-primary:active {
    transform: translateY(0);
  }

  .btn:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }

  .controls-hint {
    margin-top: 24px;
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .hint-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
  }

  .key-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border: 1px solid var(--muted);
    border-radius: 6px;
    font-size: 10px;
    color: var(--muted);
    background: rgba(255,255,255,0.03);
  }

  /* Touch zone */
  .touch-zone {
    display: none;
    width: 100%;
    max-width: 520px;
    height: 120px;
    position: relative;
  }

  @media (hover: none) and (pointer: coarse) {
    .touch-zone { display: flex; align-items: center; justify-content: center; }
    .controls-hint .hint-item:nth-child(n+2) { display: none; }
  }

  .touch-pad {
    width: 140px;
    height: 140px;
    position: relative;
  }

  .touch-btn {
    position: absolute;
    width: 44px;
    height: 44px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s ease;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .touch-btn:active {
    background: rgba(0, 230, 118, 0.15);
    border-color: var(--accent);
    color: var(--accent);
    transform: scale(0.92);
  }

  .touch-btn.up    { top: 0; left: 50%; transform: translateX(-50%); }
  .touch-btn.down  { bottom: 0; left: 50%; transform: translateX(-50%); }
  .touch-btn.left  { left: 0; top: 50%; transform: translateY(-50%); }
  .touch-btn.right { right: 0; top: 50%; transform: translateY(-50%); }

  .touch-btn.up:active    { transform: translateX(-50%) scale(0.92); }
  .touch-btn.down:active  { transform: translateX(-50%) scale(0.92); }
  .touch-btn.left:active  { transform: translateY(-50%) scale(0.92); }
  .touch-btn.right:active { transform: translateY(-50%) scale(0.92); }

  /* Particle layer */
  .particle-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 5;
    border-radius: 16px;
    overflow: hidden;
  }

  @media (prefers-reduced-motion: reduce) {
    body::before, body::after { animation: none; }
    .new-high { animation: none; }
    .speed-dot { transition: none; }
  }

  @media (max-width: 560px) {
    .score-bar { max-width: calc(100vw - 32px); padding: 10px 14px; }
    .canvas-container { border-radius: 12px; }
    .overlay-title { font-size: 32px; }
    .game-over-score { font-size: 48px; }
  }
</style>
</head>
<body>

<div class="game-wrapper">
  <!-- Score Bar -->
  <div class="score-bar" role="status" aria-live="polite">
    <div class="score-section">
      <span class="score-label">Score</span>
      <span class="score-value" id="scoreDisplay">0</span>
    </div>
    <div class="speed-indicator">
      <span>Speed</span>
      <div class="speed-dots" id="speedDots">
        <div class="speed-dot active"></div>
        <div class="speed-dot"></div>
        <div class="speed-dot"></div>
        <div class="speed-dot"></div>
        <div class="speed-dot"></div>
        <div class="speed-dot"></div>
        <div class="speed-dot"></div>
        <div class="speed-dot"></div>
        <div class="speed-dot"></div>
        <div class="speed-dot"></div>
      </div>
    </div>
    <div class="score-section high-score" style="text-align:right;">
      <span class="score-label">Best</span>
      <span class="score-value" id="highScoreDisplay">0</span>
    </div>
  </div>

  <!-- Canvas -->
  <div class="canvas-container">
    <canvas id="gameCanvas" width="500" height="500"></canvas>
    <div class="particle-layer" id="particleLayer"></div>

    <!-- Start Overlay -->
    <div class="overlay" id="startOverlay">
      <div class="overlay-title">Snake</div>
      <div class="overlay-subtitle">A classic reimagined</div>
      <button class="btn btn-primary" id="startBtn" aria-label="Start Game">Start Game</button>
      <div class="controls-hint">
        <div class="hint-item">
          <span class="key-icon">&#9650;</span>
          <span class="key-icon">&#9660;</span>
          <span class="key-icon">&#9664;</span>
          <span class="key-icon">&#9654;</span>
          <span>Arrow keys</span>
        </div>
        <div class="hint-item">
          <span class="key-icon">W</span>
          <span class="key-icon">A</span>
          <span class="key-icon">S</span>
          <span class="key-icon">D</span>
          <span>or WASD</span>
        </div>
      </div>
    </div>

    <!-- Game Over Overlay -->
    <div class="overlay hidden" id="gameOverOverlay">
      <div class="overlay-title">Game Over</div>
      <div class="game-over-score" id="finalScore">0</div>
      <div class="game-over-label">Points scored</div>
      <div class="new-high" id="newHighBadge">New High Score</div>
      <button class="btn btn-primary" id="restartBtn" aria-label="Play Again">Play Again</button>
      <div class="controls-hint">
        <div class="hint-item">
          <span style="color:var(--muted); font-size:12px;">Press Space or Enter to restart</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Touch Controls -->
  <div class="touch-zone" aria-label="Touch controls">
    <div class="touch-pad">
      <button class="touch-btn up" data-dir="up" aria-label="Up">&#9650;</button>
      <button class="touch-btn down" data-dir="down" aria-label="Down">&#9660;</button>
      <button class="touch-btn left" data-dir="left" aria-label="Left">&#9664;</button>
      <button class="touch-btn right" data-dir="right" aria-label="Right">&#9654;</button>
    </div>
  </div>
</div>

<script>
(function() {
  /* ---- DOM references ---- */
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const scoreDisplay = document.getElementById('scoreDisplay');
  const highScoreDisplay = document.getElementById('highScoreDisplay');
  const speedDots = document.getElementById('speedDots').children;
  const startOverlay = document.getElementById('startOverlay');
  const gameOverOverlay = document.getElementById('gameOverOverlay');
  const finalScoreEl = document.getElementById('finalScore');
  const newHighBadge = document.getElementById('newHighBadge');
  const startBtn = document.getElementById('startBtn');
  const restartBtn = document.getElementById('restartBtn');
  const particleLayer = document.getElementById('particleLayer');

  /* ---- Game constants ---- */
  const CELL = 25;
  const COLS = canvas.width / CELL;   // 20
  const ROWS = canvas.height / CELL;  // 20
  const BASE_INTERVAL = 140; // ms
  const MIN_INTERVAL = 50;

  /* ---- Game state ---- */
  let snake = [];
  let direction = { x: 1, y: 0 };
  let nextDirection = { x: 1, y: 0 };
  let food = { x: 0, y: 0 };
  let score = 0;
  let highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
  let gameRunning = false;
  let gameLoop = null;
  let currentInterval = BASE_INTERVAL;
  let foodPulse = 0;
  let animFrame = null;
  let particles = [];

  highScoreDisplay.textContent = highScore;

  /* ---- Responsive canvas ---- */
  function resizeCanvas() {
    const maxW = Math.min(window.innerWidth - 32, 500);
    const scale = maxW / 500;
    if (scale < 1) {
      canvas.style.width = maxW + 'px';
      canvas.style.height = maxW + 'px';
    } else {
      canvas.style.width = '';
      canvas.style.height = '';
    }
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  /* ---- Utility ---- */
  function randomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function getInterval() {
    // Decrease interval as score increases
    const decrease = Math.floor(score / 3) * 8;
    return Math.max(MIN_INTERVAL, BASE_INTERVAL - decrease);
  }

  function updateSpeedDots() {
    const level = Math.min(10, Math.floor(score / 3) + 1);
    for (let i = 0; i < speedDots.length; i++) {
      speedDots[i].classList.toggle('active', i < level);
    }
  }

  /* ---- Food spawning ---- */
  function spawnFood() {
    let attempts = 0;
    do {
      food.x = randomInt(0, COLS - 1);
      food.y = randomInt(0, ROWS - 1);
      attempts++;
    } while (snake.some(s => s.x === food.x && s.y === food.y) && attempts < 500);
  }

  /* ---- Particle effects ---- */
  function spawnParticles(cx, cy, color) {
    const count = 12;
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
      const speed = 1.5 + Math.random() * 3;
      particles.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 0.02 + Math.random() * 0.03,
        size: 2 + Math.random() * 3,
        color: color
      });
    }
  }

  function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.96;
      p.vy *= 0.96;
      p.life -= p.decay;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function drawParticles() {
    particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.arc(p.x, p.y, Math.max(0.5, p.size * p.life), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
  }

  /* ---- Drawing ---- */
  function drawGrid() {
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.025)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= COLS; x++) {
      ctx.beginPath();
      ctx.moveTo(x * CELL, 0);
      ctx.lineTo(x * CELL, canvas.height);
      ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
      ctx.beginPath();
      ctx.moveTo(0, y * CELL);
      ctx.lineTo(canvas.width, y * CELL);
      ctx.stroke();
    }
  }

  function drawSnake() {
    snake.forEach((seg, i) => {
      const x = seg.x * CELL;
      const y = seg.y * CELL;
      const isHead = i === 0;
      const t = i / snake.length;

      // Gradient from bright green head to darker teal tail
      const r = Math.round(0 + t * 0);
      const g = Math.round(230 - t * 100);
      const b = Math.round(118 - t * 30);
      const color = `rgb(${r},${g},${b})`;

      const pad = isHead ? 1 : 2;
      const radius = isHead ? 6 : 4;

      ctx.save();
      if (isHead) {
        ctx.shadowColor = 'rgba(0, 230, 118, 0.5)';
        ctx.shadowBlur = 12;
      }

      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.roundRect(x + pad, y + pad, CELL - pad * 2, CELL - pad * 2, radius);
      ctx.fill();

      // Eye detail on head
      if (isHead) {
        ctx.shadowBlur = 0;
        const eyeSize = 3;
        const eyeOffset = 7;
        ctx.fillStyle = '#0a0e13';
        if (direction.x === 1) {
          ctx.beginPath(); ctx.arc(x + CELL - eyeOffset, y + 8, eyeSize, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(x + CELL - eyeOffset, y + CELL - 8, eyeSize, 0, Math.PI * 2); ctx.fill();
        } else if (direction.x === -1) {
          ctx.beginPath(); ctx.arc(x + eyeOffset, y + 8, eyeSize, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(x + eyeOffset, y + CELL - 8, eyeSize, 0, Math.PI * 2); ctx.fill();
        } else if (direction.y === -1) {
          ctx.beginPath(); ctx.arc(x + 8, y + eyeOffset, eyeSize, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(x + CELL - 8, y + eyeOffset, eyeSize, 0, Math.PI * 2); ctx.fill();
        } else {
          ctx.beginPath(); ctx.arc(x + 8, y + CELL - eyeOffset, eyeSize, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(x + CELL - 8, y + CELL - eyeOffset, eyeSize, 0, Math.PI * 2); ctx.fill();
        }
      }
      ctx.restore();
    });
  }

  function drawFood() {
    foodPulse += 0.08;
    const pulse = Math.sin(foodPulse) * 0.15 + 1;
    const cx = food.x * CELL + CELL / 2;
    const cy = food.y * CELL + CELL / 2;
    const baseR = (CELL / 2 - 3);
    const r = Math.max(1, baseR * pulse);

    // Outer glow
    ctx.save();
    ctx.shadowColor = 'rgba(255, 82, 82, 0.6)';
    ctx.shadowBlur = 18;
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    grad.addColorStop(0, '#ff8a80');
    grad.addColorStop(0.6, '#ff5252');
    grad.addColorStop(1, '#d32f2f');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();

    // Shine
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.arc(cx - 2, cy - 2, Math.max(0.5, r * 0.3), 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function render() {
    // Clear
    ctx.fillStyle = '#111820';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    drawGrid();
    drawFood();
    drawSnake();
    updateParticles();
    drawParticles();

    if (gameRunning) {
      animFrame = requestAnimationFrame(render);
    }
  }

  /* ---- Game Logic ---- */
  function initGame() {
    const midX = Math.floor(COLS / 2);
    const midY = Math.floor(ROWS / 2);
    snake = [
      { x: midX, y: midY },
      { x: midX - 1, y: midY },
      { x: midX - 2, y: midY },
    ];
    direction = { x: 1, y: 0 };
    nextDirection = { x: 1, y: 0 };
    score = 0;
    currentInterval = BASE_INTERVAL;
    particles = [];
    foodPulse = 0;
    scoreDisplay.textContent = '0';
    updateSpeedDots();
    spawnFood();
  }

  function tick() {
    if (!gameRunning) return;

    direction = { ...nextDirection };

    const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

    // Wall collision
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
      gameOver();
      return;
    }

    // Self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      gameOver();
      return;
    }

    snake.unshift(head);

    // Food collision
    if (head.x === food.x && head.y === food.y) {
      score++;
      scoreDisplay.textContent = score;

      // Score bump animation
      scoreDisplay.classList.add('bump');
      setTimeout(() => scoreDisplay.classList.remove('bump'), 150);

      // Particles at food location
      const cx = food.x * CELL + CELL / 2;
      const cy = food.y * CELL + CELL / 2;
      spawnParticles(cx, cy, '#ff5252');
      spawnParticles(cx, cy, '#ff8a80');

      // Update speed
      currentInterval = getInterval();
      updateSpeedDots();
      clearInterval(gameLoop);
      gameLoop = setInterval(tick, currentInterval);

      spawnFood();
    } else {
      snake.pop();
    }
  }

  function startGame() {
    initGame();
    gameRunning = true;
    startOverlay.classList.add('hidden');
    gameOverOverlay.classList.add('hidden');
    gameLoop = setInterval(tick, currentInterval);
    render();
  }

  function gameOver() {
    gameRunning = false;
    clearInterval(gameLoop);
    cancelAnimationFrame(animFrame);

    // Head collision particles
    const hx = snake[0].x * CELL + CELL / 2;
    const hy = snake[0].y * CELL + CELL / 2;
    spawnParticles(hx, hy, '#ff5252');
    spawnParticles(hx, hy, '#ff8a80');

    // Draw one final frame to show particles
    ctx.fillStyle = '#111820';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawGrid();
    drawFood();
    drawSnake();
    drawParticles();

    // Update high score
    let isNewHigh = false;
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('snakeHighScore', highScore);
      highScoreDisplay.textContent = highScore;
      isNewHigh = true;
    }

    finalScoreEl.textContent = score;
    newHighBadge.classList.toggle('show', isNewHigh);

    setTimeout(() => {
      gameOverOverlay.classList.remove('hidden');
    }, 400);
  }

  /* ---- Input Handling ---- */
  const dirMap = {
    ArrowUp:    { x: 0,  y: -1 },
    ArrowDown:  { x: 0,  y: 1 },
    ArrowLeft:  { x: -1, y: 0 },
    ArrowRight: { x: 1,  y: 0 },
    w: { x: 0,  y: -1 },
    s: { x: 0,  y: 1 },
    a: { x: -1, y: 0 },
    d: { x: 1,  y: 0 },
    W: { x: 0,  y: -1 },
    S: { x: 0,  y: 1 },
    A: { x: -1, y: 0 },
    D: { x: 1,  y: 0 },
  };

  function setDirection(dir) {
    if (!gameRunning) return;
    // Prevent 180-degree turn
    if (dir.x === -direction.x && dir.y === -direction.y) return;
    if (dir.x === direction.x && dir.y === direction.y) return;
    nextDirection = { ...dir };
  }

  document.addEventListener('keydown', (e) => {
    const dir = dirMap[e.key];
    if (dir) {
      e.preventDefault();
      setDirection(dir);
    }
    // Restart shortcuts
    if ((e.key === ' ' || e.key === 'Enter') && !gameRunning) {
      if (!startOverlay.classList.contains('hidden')) {
        startGame();
      } else if (!gameOverOverlay.classList.contains('hidden')) {
        startGame();
      }
    }
  });

  /* ---- Touch Controls ---- */
  // D-pad buttons
  document.querySelectorAll('.touch-btn').forEach(btn => {
    const map = { up: { x:0,y:-1 }, down: { x:0,y:1 }, left: { x:-1,y:0 }, right: { x:1,y:0 } };
    btn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const d = map[btn.dataset.dir];
      if (d) setDirection(d);
    });
    btn.addEventListener('mousedown', (e) => {
      const d = map[btn.dataset.dir];
      if (d) setDirection(d);
    });
  });

  // Swipe on canvas
  let touchStartX = 0, touchStartY = 0;
  canvas.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  canvas.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    const absDx = Math.abs(dx);
    const absDy = Math.abs(dy);
    if (Math.max(absDx, absDy) < 20) return; // too small

    if (absDx > absDy) {
      setDirection(dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 });
    } else {
      setDirection(dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 });
    }
  }, { passive: true });

  /* ---- Button Events ---- */
  startBtn.addEventListener('click', startGame);
  restartBtn.addEventListener('click', startGame);

  /* ---- roundRect polyfill ---- */
  if (!ctx.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
      if (typeof r === 'number') r = [r, r, r, r];
      const [tl, tr, br, bl] = r;
      this.moveTo(x + tl, y);
      this.lineTo(x + w - tr, y);
      this.quadraticCurveTo(x + w, y, x + w, y + tr);
      this.lineTo(x + w, y + h - br);
      this.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
      this.lineTo(x + bl, y + h);
      this.quadraticCurveTo(x, y + h, x, y + h - bl);
      this.lineTo(x, y + tl);
      this.quadraticCurveTo(x, y, x + tl, y);
      this.closePath();
    };
  }

  /* ---- Initial idle render ---- */
  (function idleDraw() {
    ctx.fillStyle = '#111820';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawGrid();
  })();
})();
</script>
</body>
