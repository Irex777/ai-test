<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Serpent Arcade</title>
<style>
  /* CSS Variables - warm amber/neon green retro palette */
  :root {
    --bg: #0a0a0f;
    --bg-surface: #12121a;
    --fg: #e8e4d9;
    --muted: #5a5647;
    --accent: #39ff14;
    --accent-dim: rgba(57, 255, 20, 0.15);
    --food: #ff6a00;
    --food-glow: rgba(255, 106, 0, 0.5);
    --danger: #ff2255;
    --card: rgba(18, 18, 26, 0.85);
    --border: rgba(57, 255, 20, 0.12);
    --grid-line: rgba(57, 255, 20, 0.04);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* Animated background noise */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(57, 255, 20, 0.03) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(255, 106, 0, 0.03) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(57, 255, 20, 0.02) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.08) 2px,
      rgba(0, 0, 0, 0.08) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  .game-wrapper {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  /* Header bar */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 520px;
    padding: 0 4px;
  }

  .title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(57, 255, 20, 0.4);
  }

  .scores {
    display: flex;
    gap: 20px;
    font-size: 13px;
    letter-spacing: 2px;
  }

  .score-label {
    color: var(--muted);
  }

  .score-value {
    color: var(--fg);
    font-weight: 700;
    min-width: 30px;
    display: inline-block;
    text-align: right;
  }

  .score-value.high {
    color: var(--food);
  }

  /* Canvas container */
  .canvas-container {
    position: relative;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    box-shadow:
      0 0 40px rgba(57, 255, 20, 0.05),
      inset 0 0 60px rgba(0, 0, 0, 0.3);
  }

  canvas {
    display: block;
    background: var(--bg-surface);
  }

  /* Overlay screens */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10, 10, 15, 0.88);
    backdrop-filter: blur(6px);
    z-index: 10;
    transition: opacity 0.4s ease;
  }

  .overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .overlay-title {
    font-size: 36px;
    font-weight: 900;
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .overlay-title.start-title {
    color: var(--accent);
    text-shadow: 0 0 30px rgba(57, 255, 20, 0.5);
  }

  .overlay-title.gameover-title {
    color: var(--danger);
    text-shadow: 0 0 30px rgba(255, 34, 85, 0.5);
  }

  .overlay-sub {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 3px;
    margin-bottom: 30px;
  }

  .final-score {
    font-size: 48px;
    font-weight: 900;
    color: var(--fg);
    margin-bottom: 6px;
  }

  .final-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .new-best {
    color: var(--food);
    font-size: 12px;
    letter-spacing: 3px;
    margin-bottom: 20px;
    animation: pulse-glow 1.2s ease-in-out infinite;
  }

  .new-best.hidden { display: none; }

  @keyframes pulse-glow {
    0%, 100% { opacity: 0.6; text-shadow: none; }
    50% { opacity: 1; text-shadow: 0 0 12px var(--food-glow); }
  }

  .btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Courier New', monospace;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    padding: 14px 40px;
    cursor: pointer;
    transition: all 0.25s ease;
    border-radius: 2px;
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.25s ease;
    z-index: -1;
  }

  .btn:hover::before, .btn:focus::before {
    opacity: 0.12;
  }

  .btn:hover {
    box-shadow: 0 0 20px rgba(57, 255, 20, 0.2);
    transform: translateY(-1px);
  }

  .btn:active {
    transform: translateY(0);
  }

  .hint {
    margin-top: 18px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
  }

  .controls-hint {
    display: flex;
    gap: 6px;
    margin-top: 12px;
    align-items: center;
  }

  .key {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border: 1px solid var(--border);
    border-radius: 3px;
    font-size: 12px;
    color: var(--muted);
    background: rgba(255,255,255,0.03);
  }

  /* Speed indicator */
  .speed-bar {
    width: 100%;
    max-width: 520px;
    height: 2px;
    background: rgba(57, 255, 20, 0.08);
    border-radius: 1px;
    overflow: hidden;
  }

  .speed-fill {
    height: 100%;
    background: var(--accent);
    box-shadow: 0 0 8px rgba(57, 255, 20, 0.4);
    transition: width 0.3s ease;
    width: 10%;
  }

  .footer-info {
    display: flex;
    justify-content: space-between;
    width: 100%;
    max-width: 520px;
    padding: 0 4px;
  }

  .footer-text {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    opacity: 0.5;
  }

  /* Toast notification */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--fg);
    padding: 10px 24px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    border-radius: 3px;
    z-index: 200;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  /* Responsive */
  @media (max-width: 560px) {
    .title { font-size: 16px; letter-spacing: 4px; }
    .scores { gap: 12px; font-size: 11px; }
    .overlay-title { font-size: 26px; letter-spacing: 5px; }
    .final-score { font-size: 36px; }
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>
  <div class="toast" id="toast"></div>

  <div class="game-wrapper">
    <header class="header">
      <div class="title">Serpent</div>
      <div class="scores">
        <div>
          <span class="score-label">SCORE </span>
          <span class="score-value" id="scoreDisplay">0</span>
        </div>
        <div>
          <span class="score-label">BEST </span>
          <span class="score-value high" id="highScoreDisplay">0</span>
        </div>
      </div>
    </header>

    <div class="canvas-container" id="canvasContainer">
      <canvas id="gameCanvas"></canvas>

      <!-- Start Screen -->
      <div class="overlay" id="startScreen">
        <div class="overlay-title start-title">Serpent</div>
        <div class="overlay-sub">A classic reimagined</div>
        <button class="btn" id="startBtn" aria-label="Start game">Start Game</button>
        <div class="controls-hint">
          <span class="key">&#9650;</span>
          <span class="key">&#9660;</span>
          <span class="key">&#9664;</span>
          <span class="key">&#9654;</span>
        </div>
        <div class="hint">or swipe on mobile</div>
      </div>

      <!-- Game Over Screen -->
      <div class="overlay hidden" id="gameOverScreen">
        <div class="overlay-title gameover-title">Game Over</div>
        <div class="final-score" id="finalScore">0</div>
        <div class="final-label">points earned</div>
        <div class="new-best hidden" id="newBestLabel">NEW PERSONAL BEST</div>
        <button class="btn" id="restartBtn" aria-label="Play again">Play Again</button>
        <div class="hint">press Space or Enter</div>
      </div>
    </div>

    <div class="speed-bar">
      <div class="speed-fill" id="speedFill"></div>
    </div>

    <footer class="footer-info">
      <span class="footer-text" id="speedLabel">SPEED 1x</span>
      <span class="footer-text" id="lengthLabel">LENGTH 3</span>
    </footer>
  </div>

<script>
  /* ==============================
     SERPENT ARCADE - Snake Game
     ============================== */

  // DOM references
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const scoreDisplay = document.getElementById('scoreDisplay');
  const highScoreDisplay = document.getElementById('highScoreDisplay');
  const startScreen = document.getElementById('startScreen');
  const gameOverScreen = document.getElementById('gameOverScreen');
  const finalScoreEl = document.getElementById('finalScore');
  const newBestLabel = document.getElementById('newBestLabel');
  const startBtn = document.getElementById('startBtn');
  const restartBtn = document.getElementById('restartBtn');
  const speedFill = document.getElementById('speedFill');
  const speedLabel = document.getElementById('speedLabel');
  const lengthLabel = document.getElementById('lengthLabel');
  const toastEl = document.getElementById('toast');

  // Game configuration
  const CELL_SIZE = 20;
  const GRID_COLS = 25;
  const GRID_ROWS = 25;
  const CANVAS_W = CELL_SIZE * GRID_COLS;
  const CANVAS_H = CELL_SIZE * GRID_ROWS;

  // Set canvas size
  canvas.width = CANVAS_W;
  canvas.height = CANVAS_H;

  // Responsive canvas sizing
  function resizeCanvas() {
    const container = document.getElementById('canvasContainer');
    const maxW = Math.min(window.innerWidth - 32, 520);
    const maxH = window.innerHeight - 200;
    const scale = Math.min(maxW / CANVAS_W, maxH / CANVAS_H, 1);
    canvas.style.width = (CANVAS_W * scale) + 'px';
    canvas.style.height = (CANVAS_H * scale) + 'px';
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // Game state
  let snake = [];
  let direction = { x: 1, y: 0 };
  let nextDirection = { x: 1, y: 0 };
  let food = { x: 0, y: 0 };
  let score = 0;
  let highScore = parseInt(localStorage.getItem('serpent_high') || '0', 10);
  let gameRunning = false;
  let gameLoop = null;
  let baseInterval = 140; // ms per tick at start
  let particles = [];
  let screenShake = 0;

  // Display saved high score
  highScoreDisplay.textContent = highScore;

  // Toast system
  let toastTimeout = null;
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => toastEl.classList.remove('show'), 2000);
  }

  // Initialize / reset game state
  function initGame() {
    const midX = Math.floor(GRID_COLS / 2);
    const midY = Math.floor(GRID_ROWS / 2);
    snake = [
      { x: midX, y: midY },
      { x: midX - 1, y: midY },
      { x: midX - 2, y: midY }
    ];
    direction = { x: 1, y: 0 };
    nextDirection = { x: 1, y: 0 };
    score = 0;
    particles = [];
    screenShake = 0;
    scoreDisplay.textContent = '0';
    lengthLabel.textContent = 'LENGTH 3';
    updateSpeedUI();
    spawnFood();
  }

  // Spawn food at random empty cell
  function spawnFood() {
    let attempts = 0;
    while (attempts < 1000) {
      const fx = Math.floor(Math.random() * GRID_COLS);
      const fy = Math.floor(Math.random() * GRID_ROWS);
      const onSnake = snake.some(seg => seg.x === fx && seg.y === fy);
      if (!onSnake) {
        food = { x: fx, y: fy };
        return;
      }
      attempts++;
    }
    // Fallback: find first empty cell
    for (let x = 0; x < GRID_COLS; x++) {
      for (let y = 0; y < GRID_ROWS; y++) {
        if (!snake.some(seg => seg.x === x && seg.y === y)) {
          food = { x, y };
          return;
        }
      }
    }
  }

  // Calculate game speed based on score
  function getInterval() {
    // Speed increases every 5 points, caps at 50ms
    const level = Math.floor(score / 5);
    const interval = Math.max(50, baseInterval - level * 10);
    return interval;
  }

  function getSpeedMultiplier() {
    return (baseInterval / getInterval()).toFixed(1);
  }

  function updateSpeedUI() {
    const mult = getSpeedMultiplier();
    const pct = Math.min(100, ((baseInterval - getInterval()) / (baseInterval - 50)) * 100);
    speedFill.style.width = Math.max(8, pct) + '%';
    speedLabel.textContent = 'SPEED ' + mult + 'x';
  }

  // Particle system
  function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1 + Math.random() * 3;
      particles.push({
        x: x * CELL_SIZE + CELL_SIZE / 2,
        y: y * CELL_SIZE + CELL_SIZE / 2,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 0.02 + Math.random() * 0.03,
        size: 2 + Math.random() * 3,
        color: color
      });
    }
  }

  function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.96;
      p.vy *= 0.96;
      p.life -= p.decay;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function drawParticles() {
    particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(p.x, p.y, Math.max(0.5, p.size * p.life), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
  }

  // Game tick
  function tick() {
    // Apply queued direction
    direction = { ...nextDirection };

    // Calculate new head position
    const head = snake[0];
    const newHead = {
      x: head.x + direction.x,
      y: head.y + direction.y
    };

    // Wall collision
    if (newHead.x < 0 || newHead.x >= GRID_COLS || newHead.y < 0 || newHead.y >= GRID_ROWS) {
      gameOver();
      return;
    }

    // Self collision
    if (snake.some(seg => seg.x === newHead.x && seg.y === newHead.y)) {
      gameOver();
      return;
    }

    // Move snake
    snake.unshift(newHead);

    // Check food
    if (newHead.x === food.x && newHead.y === food.y) {
      score++;
      scoreDisplay.textContent = score;
      lengthLabel.textContent = 'LENGTH ' + snake.length;
      updateSpeedUI();

      // Particles burst on eating
      spawnParticles(food.x, food.y, '#ff6a00', 12);
      spawnParticles(food.x, food.y, '#ffaa00', 6);

      // Restart loop with new speed
      clearInterval(gameLoop);
      gameLoop = setInterval(tick, getInterval());

      spawnFood();
    } else {
      snake.pop();
    }
  }

  // Game over
  function gameOver() {
    gameRunning = false;
    clearInterval(gameLoop);

    // Screen shake
    screenShake = 10;

    // Death particles
    const head = snake[0];
    spawnParticles(head.x, head.y, '#ff2255', 20);
    spawnParticles(head.x, head.y, '#ff6a00', 10);

    // Check high score
    let isNewBest = false;
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('serpent_high', highScore.toString());
      highScoreDisplay.textContent = highScore;
      isNewBest = true;
    }

    // Show game over screen after a short delay for particles
    setTimeout(() => {
      finalScoreEl.textContent = score;
      if (isNewBest && score > 0) {
        newBestLabel.classList.remove('hidden');
        showToast('NEW HIGH SCORE: ' + highScore);
      } else {
        newBestLabel.classList.add('hidden');
      }
      gameOverScreen.classList.remove('hidden');
      restartBtn.focus();
    }, 500);
  }

  // Start game
  function startGame() {
    startScreen.classList.add('hidden');
    gameOverScreen.classList.add('hidden');
    initGame();
    gameRunning = true;
    gameLoop = setInterval(tick, baseInterval);
  }

  // Restart game
  function restartGame() {
    gameOverScreen.classList.add('hidden');
    initGame();
    gameRunning = true;
    gameLoop = setInterval(tick, baseInterval);
  }

  // Button handlers
  startBtn.addEventListener('click', startGame);
  restartBtn.addEventListener('click', restartGame);

  // Keyboard controls
  document.addEventListener('keydown', (e) => {
    // Start / restart with Enter or Space
    if (!gameRunning) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        if (!startScreen.classList.contains('hidden')) {
          startGame();
        } else if (!gameOverScreen.classList.contains('hidden')) {
          restartGame();
        }
        return;
      }
    }

    // Direction controls
    if (!gameRunning) return;

    switch (e.key) {
      case 'ArrowUp':
      case 'w':
      case 'W':
        e.preventDefault();
        if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
        break;
      case 'ArrowDown':
      case 's':
      case 'S':
        e.preventDefault();
        if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
        break;
      case 'ArrowLeft':
      case 'a':
      case 'A':
        e.preventDefault();
        if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
        break;
      case 'ArrowRight':
      case 'd':
      case 'D':
        e.preventDefault();
        if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
        break;
    }
  });

  // Touch / swipe controls
  let touchStartX = 0;
  let touchStartY = 0;
  let touchStartTime = 0;

  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    touchStartX = touch.clientX;
    touchStartY = touch.clientY;
    touchStartTime = Date.now();
  }, { passive: false });

  canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    if (!gameRunning) return;

    const touch = e.changedTouches[0];
    const dx = touch.clientX - touchStartX;
    const dy = touch.clientY - touchStartY;
    const elapsed = Date.now() - touchStartTime;

    // Only register as swipe if sufficient distance and quick enough
    if (elapsed > 500) return;
    const minSwipe = 20;
    if (Math.abs(dx) < minSwipe && Math.abs(dy) < minSwipe) return;

    if (Math.abs(dx) > Math.abs(dy)) {
      // Horizontal swipe
      if (dx > 0 && direction.x !== -1) nextDirection = { x: 1, y: 0 };
      else if (dx < 0 && direction.x !== 1) nextDirection = { x: -1, y: 0 };
    } else {
      // Vertical swipe
      if (dy > 0 && direction.y !== -1) nextDirection = { x: 0, y: 1 };
      else if (dy < 0 && direction.y !== 1) nextDirection = { x: 0, y: -1 };
    }
  }, { passive: false });

  // Prevent scrolling on touch devices
  document.addEventListener('touchmove', (e) => {
    if (gameRunning) e.preventDefault();
  }, { passive: false });

  /* ================================
     RENDERING
     ================================ */

  // Draw grid overlay
  function drawGrid() {
    ctx.strokeStyle = 'rgba(57, 255, 20, 0.04)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= GRID_COLS; x++) {
      ctx.beginPath();
      ctx.moveTo(x * CELL_SIZE, 0);
      ctx.lineTo(x * CELL_SIZE, CANVAS_H);
      ctx.stroke();
    }
    for (let y = 0; y <= GRID_ROWS; y++) {
      ctx.beginPath();
      ctx.moveTo(0, y * CELL_SIZE);
      ctx.lineTo(CANVAS_W, y * CELL_SIZE);
      ctx.stroke();
    }
  }

  // Draw food with pulsing glow
  function drawFood() {
    const cx = food.x * CELL_SIZE + CELL_SIZE / 2;
    const cy = food.y * CELL_SIZE + CELL_SIZE / 2;
    const t = Date.now() / 400;
    const pulse = 0.8 + 0.2 * Math.sin(t);
    const radius = Math.max(1, (CELL_SIZE / 2 - 2) * pulse);

    // Outer glow
    ctx.save();
    ctx.shadowColor = '#ff6a00';
    ctx.shadowBlur = 15 + 5 * Math.sin(t);
    ctx.fillStyle = 'rgba(255, 106, 0, 0.2)';
    ctx.beginPath();
    ctx.arc(cx, cy, radius + 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Core
    ctx.save();
    ctx.shadowColor = '#ff6a00';
    ctx.shadowBlur = 10;
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(0.3, '#ffcc00');
    grad.addColorStop(0.7, '#ff6a00');
    grad.addColorStop(1, '#cc3300');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Draw snake
  function drawSnake() {
    const len = snake.length;
    snake.forEach((seg, i) => {
      const x = seg.x * CELL_SIZE;
      const y = seg.y * CELL_SIZE;
      const pad = 1;

      // Color gradient from head to tail
      const t = i / Math.max(1, len - 1);
      const r = Math.round(57 - t * 30);
      const g = Math.round(255 - t * 100);
      const b = Math.round(20 + t * 20);
      const color = `rgb(${r},${g},${b})`;

      ctx.save();

      if (i === 0) {
        // Head - brighter, with glow
        ctx.shadowColor = '#39ff14';
        ctx.shadowBlur = 12;
        ctx.fillStyle = '#5fff3a';
        const headRadius = 3;
        roundRect(ctx, x + pad, y + pad, CELL_SIZE - pad * 2, CELL_SIZE - pad * 2, headRadius);
        ctx.fill();

        // Eyes
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#0a0a0f';
        const eyeSize = 3;
        let ex1, ey1, ex2, ey2;
        const cx = x + CELL_SIZE / 2;
        const cy = y + CELL_SIZE / 2;

        if (direction.x === 1) { // right
          ex1 = cx + 4; ey1 = cy - 4;
          ex2 = cx + 4; ey2 = cy + 4;
        } else if (direction.x === -1) { // left
          ex1 = cx - 4; ey1 = cy - 4;
          ex2 = cx - 4; ey2 = cy + 4;
        } else if (direction.y === -1) { // up
          ex1 = cx - 4; ey1 = cy - 4;
          ex2 = cx + 4; ey2 = cy - 4;
        } else { // down
          ex1 = cx - 4; ey1 = cy + 4;
          ex2 = cx + 4; ey2 = cy + 4;
        }
        ctx.beginPath();
        ctx.arc(ex1, ey1, eyeSize, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(ex2, ey2, eyeSize, 0, Math.PI * 2);
        ctx.fill();

      } else {
        // Body segment
        ctx.fillStyle = color;
        ctx.shadowColor = color;
        ctx.shadowBlur = 4;
        roundRect(ctx, x + pad, y + pad, CELL_SIZE - pad * 2, CELL_SIZE - pad * 2, 2);
        ctx.fill();
      }

      ctx.restore();
    });
  }

  // Rounded rect helper
  function roundRect(ctx, x, y, w, h, r) {
    r = Math.max(0, Math.min(r, Math.min(w, h) / 2));
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h - r);
    ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h);
    ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.lineTo(x, y + r);
    ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
  }

  // Border glow effect based on proximity to walls
  function drawBorderWarning() {
    if (snake.length === 0) return;
    const head = snake[0];
    const warningDist = 3;

    // Proximity to each wall
    const proxLeft = head.x / warningDist;
    const proxRight = (GRID_COLS - 1 - head.x) / warningDist;
    const proxTop = head.y / warningDist;
    const proxBottom = (GRID_ROWS - 1 - head.y) / warningDist;

    const drawEdgeGlow = (side, intensity) => {
      if (intensity <= 0) return;
      const alpha = Math.min(0.25, (1 - intensity) * 0.25);
      if (alpha < 0.02) return;
      let grad;
      if (side === 'left') {
        grad = ctx.createLinearGradient(0, 0, 40, 0);
      } else if (side === 'right') {
        grad = ctx.createLinearGradient(CANVAS_W, 0, CANVAS_W - 40, 0);
      } else if (side === 'top') {
        grad = ctx.createLinearGradient(0, 0, 0, 40);
      } else {
        grad = ctx.createLinearGradient(0, CANVAS_H, 0, CANVAS_H - 40);
      }
      grad.addColorStop(0, `rgba(255, 34, 85, ${alpha})`);
      grad.addColorStop(1, 'rgba(255, 34, 85, 0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    };

    drawEdgeGlow('left', proxLeft);
    drawEdgeGlow('right', proxRight);
    drawEdgeGlow('top', proxTop);
    drawEdgeGlow('bottom', proxBottom);
  }

  // Main render loop (always runs for smooth particle animations)
  function render() {
    // Screen shake
    ctx.save();
    if (screenShake > 0) {
      const shakeX = (Math.random() - 0.5) * screenShake;
      const shakeY = (Math.random() - 0.5) * screenShake;
      ctx.translate(shakeX, shakeY);
      screenShake *= 0.85;
      if (screenShake < 0.5) screenShake = 0;
    }

    // Clear canvas
    ctx.fillStyle = '#12121a';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

    // Draw grid
    drawGrid();

    if (gameRunning || snake.length > 0) {
      drawBorderWarning();
      drawFood();
      drawSnake();
    }

    // Particles always render
    updateParticles();
    drawParticles();

    ctx.restore();

    requestAnimationFrame(render);
  }

  // Kick off render loop
  requestAnimationFrame(render);

  // Focus start button
  startBtn.focus();
</script>
