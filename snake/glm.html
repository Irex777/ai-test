<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
<title>SNAKE // PROTOCOL</title>
<style>
  :root {
    --bg-0: #060809;
    --bg-1: #0c1012;
    --bg-2: #131a1c;
    --fg: #e6f4ef;
    --muted: #5a6b65;
    --accent: #00ff9c;
    --accent-2: #00d488;
    --accent-dim: #007a4a;
    --danger: #ff3b5c;
    --amber: #ffb800;
    --border: rgba(0, 255, 156, 0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg-0);
    color: var(--fg);
    font-family: 'Courier New', ui-monospace, monospace;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    background:
      radial-gradient(ellipse 60% 50% at 18% 25%, rgba(0,255,156,0.09), transparent 60%),
      radial-gradient(ellipse 50% 50% at 82% 75%, rgba(255,184,0,0.05), transparent 60%),
      radial-gradient(ellipse at 50% 50%, var(--bg-1), var(--bg-0) 75%);
    position: relative;
  }

  /* Ambient grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,156,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,156,0.025) 1px, transparent 1px);
    background-size: 44px 44px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
    pointer-events: none;
    z-index: 0;
  }

  /* Scanlines */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg,
      transparent 0, transparent 2px,
      rgba(0,0,0,0.18) 2px, rgba(0,0,0,0.18) 3px);
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
    mix-blend-mode: multiply;
  }

  .shell {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 18px;
    width: 100%;
    max-width: 560px;
  }

  /* HUD */
  .hud {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    width: 100%;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 14px;
    backdrop-filter: blur(8px);
  }

  .hud-cell {
    background: linear-gradient(180deg, rgba(13,18,16,0.9), rgba(7,10,9,0.9));
    padding: 11px 14px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .hud-label {
    font-size: 10px;
    letter-spacing: 2.5px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .hud-value {
    font-size: 26px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 0 16px rgba(0,255,156,0.4);
  }

  .hud-value.best { color: var(--amber); text-shadow: 0 0 16px rgba(255,184,0,0.4); }
  .hud-value.level { color: var(--fg); text-shadow: 0 0 16px rgba(230,244,239,0.3); }

  /* Canvas */
  .stage {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
    border: 1px solid var(--border);
    background: #04060a;
    box-shadow:
      0 0 0 1px rgba(0,255,156,0.05),
      0 20px 60px -20px rgba(0,255,156,0.25),
      0 0 80px -20px rgba(0,255,156,0.15),
      inset 0 0 60px rgba(0,0,0,0.6);
    transition: box-shadow 0.3s ease;
  }

  .stage.dying {
    animation: death 0.6s ease-out;
  }

  @keyframes death {
    0%, 100% { box-shadow: 0 0 0 1px rgba(0,255,156,0.05), 0 20px 60px -20px rgba(0,255,156,0.25), inset 0 0 60px rgba(0,0,0,0.6); }
    30% { box-shadow: 0 0 0 2px var(--danger), 0 20px 80px -10px rgba(255,59,92,0.5), inset 0 0 80px rgba(255,59,92,0.4); }
  }

  canvas { display: block; width: 100%; height: 100%; }

  /* Footer */
  .footer {
    width: 100%;
    margin-top: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .footer .dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    background: var(--accent);
    border-radius: 50%;
    margin-right: 7px;
    box-shadow: 0 0 10px var(--accent);
    animation: blink 1.4s infinite;
    vertical-align: middle;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.25; }
  }

  .keys { display: flex; gap: 5px; align-items: center; }
  .key {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 22px;
    height: 22px;
    padding: 0 6px;
    border: 1px solid var(--border);
    font-size: 11px;
    color: var(--accent);
    background: rgba(0,255,156,0.04);
    border-radius: 3px;
  }

  /* Overlay */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, rgba(6,8,9,0.85) 30%, rgba(6,8,9,0.98) 90%);
    backdrop-filter: blur(6px);
    text-align: center;
    padding: 30px 24px;
    z-index: 10;
    transition: opacity 0.35s ease;
  }

  .overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .title-block {
    position: relative;
    margin-bottom: 8px;
  }

  .title {
    font-size: clamp(46px, 13vw, 84px);
    font-weight: 900;
    letter-spacing: 8px;
    line-height: 0.95;
    color: var(--accent);
    text-shadow:
      0 0 30px rgba(0,255,156,0.6),
      0 0 80px rgba(0,255,156,0.3);
    position: relative;
    animation: titleGlow 3s ease-in-out infinite;
  }

  @keyframes titleGlow {
    0%, 100% { text-shadow: 0 0 30px rgba(0,255,156,0.6), 0 0 80px rgba(0,255,156,0.3); }
    50% { text-shadow: 0 0 40px rgba(0,255,156,0.9), 0 0 120px rgba(0,255,156,0.5); }
  }

  .title::before {
    content: 'SNAKE';
    position: absolute;
    inset: 0;
    color: var(--danger);
    transform: translate(-3px, 0);
    opacity: 0.35;
    mix-blend-mode: screen;
    animation: glitchX 4s infinite;
  }

  .title::after {
    content: 'SNAKE';
    position: absolute;
    inset: 0;
    color: var(--amber);
    transform: translate(3px, 0);
    opacity: 0.25;
    mix-blend-mode: screen;
    animation: glitchX 4s infinite reverse;
  }

  @keyframes glitchX {
    0%, 90%, 100% { transform: translate(0, 0); }
    92% { transform: translate(-3px, 1px); }
    94% { transform: translate(2px, -1px); }
    96% { transform: translate(-1px, 2px); }
  }

  .subtitle {
    font-size: 11px;
    letter-spacing: 8px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 32px;
    padding-left: 8px;
  }

  .subtitle .dim { color: var(--accent-dim); }

  .hint {
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 18px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .hint .pulse {
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 1.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.6); opacity: 0.5; }
  }

  .controls-grid {
    display: grid;
    grid-template-columns: repeat(3, 36px);
    grid-template-rows: repeat(2, 36px);
    gap: 4px;
    margin: 6px 0 18px;
  }

  .ck {
    border: 1px solid var(--border);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    background: rgba(0,255,156,0.03);
    border-radius: 4px;
  }
  .ck.empty { border: none; background: none; }
  .ck.active { background: var(--accent); color: #000; box-shadow: 0 0 14px var(--accent); }

  /* Start button */
  .start-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 5px;
    padding: 14px 36px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
    margin-top: 4px;
  }

  .start-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(0,255,156,0.3), transparent);
    transform: translateX(-100%);
    transition: transform 0.6s ease;
  }

  .start-btn:hover {
    background: var(--accent);
    color: #000;
    box-shadow: 0 0 30px rgba(0,255,156,0.5);
    letter-spacing: 7px;
  }

  .start-btn:hover::before { transform: translateX(100%); }
  .start-btn:active { transform: scale(0.98); }

  /* Game over */
  .go-title {
    font-size: clamp(36px, 10vw, 60px);
    font-weight: 900;
    letter-spacing: 6px;
    color: var(--danger);
    text-shadow: 0 0 30px rgba(255,59,92,0.6), 0 0 80px rgba(255,59,92,0.3);
    margin-bottom: 4px;
    animation: titleGlow 2s ease-in-out infinite;
  }

  .go-sub {
    font-size: 10px;
    letter-spacing: 6px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .score-row {
    display: flex;
    gap: 32px;
    margin: 8px 0 24px;
  }

  .score-block { text-align: center; }
  .score-block-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .score-block-value {
    font-size: 32px;
    font-weight: 800;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    text-shadow: 0 0 18px rgba(0,255,156,0.5);
  }
  .score-block-value.amber {
    color: var(--amber);
    text-shadow: 0 0 18px rgba(255,184,0,0.5);
  }

  .new-best {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--amber);
    margin-top: 10px;
    margin-bottom: 8px;
    animation: blink 0.8s infinite;
  }

  /* Mobile swipe hint */
  @media (max-width: 540px) {
    .hud-value { font-size: 22px; }
    .hud-cell { padding: 9px 11px; }
    .footer { font-size: 10px; }
    .keys { display: none; }
  }

  @media (max-height: 700px) {
    .shell { padding: 10px; }
    .hud { margin-bottom: 8px; }
    .footer { margin-top: 8px; }
  }

</style>
</head>
<body>
  <div class="shell">
    <header class="hud" aria-label="Game heads-up display">
      <div class="hud-cell">
        <span class="hud-label">Score</span>
        <span class="hud-value" id="score">0000</span>
      </div>
      <div class="hud-cell">
        <span class="hud-label">Level</span>
        <span class="hud-value level" id="level">01</span>
      </div>
      <div class="hud-cell">
        <span class="hud-label">Best</span>
        <span class="hud-value best" id="best">0000</span>
      </div>
    </header>

    <main class="stage" id="stage">
      <canvas id="game" width="480" height="480" aria-label="Snake game canvas"></canvas>

      <!-- Start overlay -->
      <div class="overlay" id="startScreen">
        <div class="title-block">
          <h1 class="title" data-text="SNAKE">SNAKE</h1>
        </div>
        <p class="subtitle">SYS <span class="dim">//</span> PROTOCOL <span class="dim">v.01</span></p>
        <div class="controls-grid" aria-hidden="true">
          <span class="ck empty"></span>
          <span class="ck" id="kU">▲</span>
          <span class="ck empty"></span>
          <span class="ck" id="kL">◀</span>
          <span class="ck" id="kD">▼</span>
          <span class="ck" id="kR">▶</span>
        </div>
        <button class="start-btn" id="startBtn">Initialize</button>
        <p class="hint"><span class="pulse"></span>Arrow keys &nbsp;·&nbsp; Swipe to move</p>
      </div>

      <!-- Game over overlay -->
      <div class="overlay hidden" id="gameOver">
        <h2 class="go-title">TERMINATED</h2>
        <p class="go-sub">Connection lost</p>
        <div class="new-best hidden" id="newBest">// NEW RECORD //</div>
        <div class="score-row">
          <div class="score-block">
            <div class="score-block-label">Score</div>
            <div class="score-block-value" id="finalScore">0000</div>
          </div>
          <div class="score-block">
            <div class="score-block-label">Best</div>
            <div class="score-block-value amber" id="finalBest">0000</div>
          </div>
        </div>
        <button class="start-btn" id="restartBtn">Reboot</button>
        <p class="hint"><span class="pulse"></span>Press space or enter</p>
      </div>
    </main>

    <footer class="footer">
      <div><span class="dot"></span>System online</div>
      <div class="keys">
        <span class="key">←</span>
        <span class="key">↑</span>
        <span class="key">↓</span>
        <span class="key">→</span>
      </div>
    </footer>
  </div>

<script>
(function () {
  'use strict';

  // -------- Configuration --------
  const GRID = 24;                       // cells per side
  const CELL = 20;                       // pixel size of a cell (canvas is GRID*CELL)
  const BASE_SPEED = 150;                // ms per tick at level 1
  const MIN_SPEED = 55;                  // fastest tick
  const SPEED_STEP = 7;                  // ms removed per level
  const POINTS_PER_LEVEL = 4;            // every N foods = 1 level
  const POINTS_PER_FOOD = 10;
  const HS_KEY = 'snake_protocol_highscore_v1';

  // -------- DOM refs --------
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const levelEl = document.getElementById('level');
  const bestEl = document.getElementById('best');
  const startScreen = document.getElementById('startScreen');
  const gameOverScreen = document.getElementById('gameOver');
  const startBtn = document.getElementById('startBtn');
  const restartBtn = document.getElementById('restartBtn');
  const finalScoreEl = document.getElementById('finalScore');
  const finalBestEl = document.getElementById('finalBest');
  const newBestEl = document.getElementById('newBest');
  const stageEl = document.getElementById('stage');

  // -------- State --------
  let snake = [];
  let direction = { x: 1, y: 0 };
  let nextDirection = { x: 1, y: 0 };
  let food = null;
  let score = 0;
  let level = 1;
  let highScore = 0;
  let gameState = 'start';               // 'start' | 'playing' | 'gameover'
  let lastTick = 0;
  let currentSpeed = BASE_SPEED;
  let particles = [];
  let ripples = [];
  let foodPulse = 0;
  let shake = 0;
  let prevSnake = [];                    // for interpolation
  let tickProgress = 0;                  // 0..1 between ticks
  let flashLevel = 0;                    // brief flash when leveling up
  let foodEatenPulse = 0;                // animation when eating

  // -------- Init --------
  function init() {
    highScore = parseInt(localStorage.getItem(HS_KEY) || '0', 10) || 0;
    updateHUD();
    bindEvents();
    requestAnimationFrame(loop);
  }

  function resetGame() {
    snake = [
      { x: 10, y: 12 },
      { x: 9, y: 12 },
      { x: 8, y: 12 }
    ];
    prevSnake = snake.map(s => ({ ...s }));
    direction = { x: 1, y: 0 };
    nextDirection = { x: 1, y: 0 };
    score = 0;
    level = 1;
    currentSpeed = BASE_SPEED;
    particles = [];
    ripples = [];
    shake = 0;
    flashLevel = 0;
    foodEatenPulse = 0;
    spawnFood();
    updateHUD();
  }

  // -------- Food --------
  function spawnFood() {
    // Find a cell not occupied by snake
    const occupied = new Set(snake.map(s => s.x + ',' + s.y));
    const free = [];
    for (let y = 0; y < GRID; y++) {
      for (let x = 0; x < GRID; x++) {
        if (!occupied.has(x + ',' + y)) free.push({ x: x, y: y });
      }
    }
    if (free.length === 0) return null;
    food = free[Math.floor(Math.random() * free.length)];
    food.spawnTime = performance.now();
    // Add spawn ripple
    ripples.push({
      x: food.x * CELL + CELL / 2,
      y: food.y * CELL + CELL / 2,
      r: 0,
      max: CELL * 1.8,
      life: 1,
      color: '#ffb800'
    });
  }

  // -------- Game logic --------
  function tick() {
    prevSnake = snake.map(s => ({ ...s }));

    // Apply queued direction (no reversing)
    if ((nextDirection.x !== -direction.x || nextDirection.y !== -direction.y)) {
      direction = nextDirection;
    }

    const head = {
      x: snake[0].x + direction.x,
      y: snake[0].y + direction.y
    };

    // Wall collision
    if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) {
      return gameOver();
    }

    // Self collision (ignore tail tip since it'll move — unless growing)
    const willEat = (food && head.x === food.x && head.y === food.y);
    const checkBody = willEat ? snake : snake.slice(0, -1);
    for (let i = 0; i < checkBody.length; i++) {
      if (checkBody[i].x === head.x && checkBody[i].y === head.y) {
        return gameOver();
      }
    }

    snake.unshift(head);

    if (willEat) {
      score += POINTS_PER_FOOD;
      foodEatenPulse = 1;
      // Particles
      const fx = food.x * CELL + CELL / 2;
      const fy = food.y * CELL + CELL / 2;
      for (let i = 0; i < 18; i++) {
        const a = Math.random() * Math.PI * 2;
        const s = 1 + Math.random() * 3;
        particles.push({
          x: fx, y: fy,
          vx: Math.cos(a) * s,
          vy: Math.sin(a) * s,
          life: 1,
          size: 1 + Math.random() * 2,
          color: Math.random() > 0.4 ? '#ffb800' : '#00ff9c'
        });
      }
      ripples.push({ x: fx, y: fy, r: 0, max: CELL * 2.5, life: 1, color: '#ffb800' });
      // Level up?
      const newLevel = Math.floor(score / (POINTS_PER_FOOD * POINTS_PER_LEVEL)) + 1;
      if (newLevel > level) {
        level = newLevel;
        currentSpeed = Math.max(MIN_SPEED, BASE_SPEED - (level - 1) * SPEED_STEP);
        flashLevel = 1;
        // Ripple from center
        ripples.push({
          x: GRID * CELL / 2,
          y: GRID * CELL / 2,
          r: 0,
          max: GRID * CELL,
          life: 1,
          color: '#00ff9c'
        });
      }
      spawnFood();
      updateHUD();
    } else {
      snake.pop();
    }
  }

  function gameOver() {
    gameState = 'gameover';
    shake = 14;
    stageEl.classList.remove('dying');
    void stageEl.offsetWidth; // restart animation
    stageEl.classList.add('dying');

    // Death particles from each snake segment
    snake.forEach((seg, i) => {
      const cx = seg.x * CELL + CELL / 2;
      const cy = seg.y * CELL + CELL / 2;
      const count = i === 0 ? 24 : 4;
      for (let k = 0; k < count; k++) {
        const a = Math.random() * Math.PI * 2;
        const s = 0.5 + Math.random() * (i === 0 ? 5 : 2);
        particles.push({
          x: cx, y: cy,
          vx: Math.cos(a) * s,
          vy: Math.sin(a) * s,
          life: 1,
          size: 1 + Math.random() * 2.5,
          color: i === 0 ? '#ff3b5c' : (Math.random() > 0.5 ? '#00ff9c' : '#ff3b5c')
        });
      }
    });

    let isNewBest = false;
    if (score > highScore) {
      highScore = score;
      localStorage.setItem(HS_KEY, String(highScore));
      isNewBest = true;
    }

    finalScoreEl.textContent = pad(score, 4);
    finalBestEl.textContent = pad(highScore, 4);
    if (isNewBest) newBestEl.classList.remove('hidden');
    else newBestEl.classList.add('hidden');

    updateHUD();

    // Delay showing the game over overlay so the death animation reads
    setTimeout(() => {
      if (gameState === 'gameover') gameOverScreen.classList.remove('hidden');
    }, 650);
  }

  function updateHUD() {
    scoreEl.textContent = pad(score, 4);
    bestEl.textContent = pad(highScore, 4);
    levelEl.textContent = pad(level, 2);
  }

  function pad(n, len) {
    const s = String(Math.max(0, Math.floor(n)));
    return s.length >= len ? s : ('0000' + s).slice(-len);
  }

  // -------- Input --------
  function setDirection(dx, dy, source) {
    if (gameState !== 'playing') return;
    // No reversing
    if (dx === -direction.x && dy === -direction.y) return;
    // No no-op
    if (dx === direction.x && dy === direction.y) return;
    nextDirection = { x: dx, y: dy };
    flashKey(source);
  }

  function flashKey(which) {
    const map = { U: 'kU', D: 'kD', L: 'kL', R: 'kR' };
    if (!which || !map[which]) return;
    const el = document.getElementById(map[which]);
    if (!el) return;
    el.classList.add('active');
    setTimeout(() => el.classList.remove('active'), 110);
  }

  function startGame() {
    resetGame();
    gameState = 'playing';
    startScreen.classList.add('hidden');
    gameOverScreen.classList.add('hidden');
    lastTick = performance.now();
    tickProgress = 0;
  }

  function bindEvents() {
    // Keyboard
    window.addEventListener('keydown', (e) => {
      const k = e.key;
      if (k === 'ArrowUp' || k === 'w' || k === 'W') { setDirection(0, -1, 'U'); e.preventDefault(); }
      else if (k === 'ArrowDown' || k === 's' || k === 'S') { setDirection(0, 1, 'D'); e.preventDefault(); }
      else if (k === 'ArrowLeft' || k === 'a' || k === 'A') { setDirection(-1, 0, 'L'); e.preventDefault(); }
      else if (k === 'ArrowRight' || k === 'd' || k === 'D') { setDirection(1, 0, 'R'); e.preventDefault(); }
      else if (k === ' ' || k === 'Enter') {
        if (gameState !== 'playing') {
          startGame();
          e.preventDefault();
        }
      }
    });

    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', startGame);

    // Touch swipe on the stage
    let tStartX = 0, tStartY = 0, tStartT = 0, tracking = false;
    const THRESH = 22;

    stageEl.addEventListener('touchstart', (e) => {
      if (e.touches.length !== 1) return;
      tStartX = e.touches[0].clientX;
      tStartY = e.touches[0].clientY;
      tStartT = performance.now();
      tracking = true;
    }, { passive: true });

    stageEl.addEventListener('touchmove', (e) => {
      if (!tracking) return;
      const dx = e.touches[0].clientX - tStartX;
      const dy = e.touches[0].clientY - tStartY;
      if (Math.abs(dx) < THRESH && Math.abs(dy) < THRESH) return;
      if (Math.abs(dx) > Math.abs(dy)) {
        setDirection(dx > 0 ? 1 : -1, 0, dx > 0 ? 'R' : 'L');
      } else {
        setDirection(0, dy > 0 ? 1 : -1, dy > 0 ? 'D' : 'U');
      }
      // reset so subsequent swipes register
      tStartX = e.touches[0].clientX;
      tStartY = e.touches[0].clientY;
    }, { passive: true });

    stageEl.addEventListener('touchend', () => { tracking = false; }, { passive: true });

    // Tap on stage during start/gameover to start
    stageEl.addEventListener('click', (e) => {
      // Only treat as tap if it was on overlay (not a swipe)
      if (gameState !== 'playing' && e.target.closest('.overlay') && !e.target.closest('button')) {
        // Don't auto-start on click; require button. Keeps it intentional.
      }
    });
  }

  // -------- Rendering --------
  function draw(now) {
    // Apply shake
    ctx.save();
    if (shake > 0.1) {
      const sx = (Math.random() - 0.5) * shake;
      const sy = (Math.random() - 0.5) * shake;
      ctx.translate(sx, sy);
      shake *= 0.86;
    }

    // Clear with subtle bg
    const bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    bgGrad.addColorStop(0, '#070b0a');
    bgGrad.addColorStop(1, '#04060a');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(-20, -20, canvas.width + 40, canvas.height + 40);

    // Level-up ambient flash
    if (flashLevel > 0.01) {
      ctx.fillStyle = 'rgba(0,255,156,' + (flashLevel * 0.08) + ')';
      ctx.fillRect(-20, -20, canvas.width + 40, canvas.height + 40);
      flashLevel *= 0.92;
    }

    drawGrid();
    drawRipples();
    drawFood(now);
    drawSnake();
    drawParticles();

    // Border
    ctx.strokeStyle = 'rgba(0,255,156,0.12)';
    ctx.lineWidth = 1;
    ctx.strokeRect(0.5, 0.5, canvas.width - 1, canvas.height - 1);

    ctx.restore();
  }

  function drawGrid() {
    ctx.strokeStyle = 'rgba(0,255,156,0.045)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = 1; i < GRID; i++) {
      const p = i * CELL + 0.5;
      ctx.moveTo(p, 0);
      ctx.lineTo(p, canvas.height);
      ctx.moveTo(0, p);
      ctx.lineTo(canvas.width, p);
    }
    ctx.stroke();

    // Stronger every 4 cells
    ctx.strokeStyle = 'rgba(0,255,156,0.08)';
    ctx.beginPath();
    for (let i = 4; i < GRID; i += 4) {
      const p = i * CELL + 0.5;
      ctx.moveTo(p, 0);
      ctx.lineTo(p, canvas.height);
      ctx.moveTo(0, p);
      ctx.lineTo(canvas.width, p);
    }
    ctx.stroke();

    // Dotted accent at corners
    const dots = [[0,0],[GRID-1,0],[0,GRID-1],[GRID-1,GRID-1]];
    ctx.fillStyle = 'rgba(0,255,156,0.5)';
    dots.forEach(d => {
      ctx.fillRect(d.x * CELL + CELL/2 - 1, d.y * CELL + CELL/2 - 1, 2, 2);
    });
  }

  function drawRipples() {
    for (let i = ripples.length - 1; i >= 0; i--) {
      const rp = ripples[i];
      rp.r += (rp.max - rp.r) * 0.12;
      rp.life *= 0.9;
      if (rp.life < 0.03) { ripples.splice(i, 1); continue; }
      ctx.beginPath();
      ctx.arc(rp.x, rp.y, Math.max(0.5, rp.r), 0, Math.PI * 2);
      ctx.strokeStyle = colorWithAlpha(rp.color, rp.life * 0.6);
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }

  function drawFood(now) {
    if (!food) return;
    const cx = food.x * CELL + CELL / 2;
    const cy = food.y * CELL + CELL / 2;
    const age = (now - (food.spawnTime || now)) / 1000;
    const pulse = Math.sin(now * 0.006) * 0.5 + 0.5;
    const baseR = Math.max(1, CELL * 0.32);
    const r = baseR + pulse * 1.6;

    // Outer glow
    const glowR = Math.max(2, r + 14 + pulse * 6);
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowR);
    grad.addColorStop(0, 'rgba(255,184,0,0.55)');
    grad.addColorStop(0.4, 'rgba(255,184,0,0.18)');
    grad.addColorStop(1, 'rgba(255,184,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, glowR, 0, Math.PI * 2);
    ctx.fill();

    // Rotating outer ring (small marks)
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(now * 0.002);
    ctx.strokeStyle = 'rgba(255,184,0,0.5)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 4; i++) {
      ctx.beginPath();
      const a = (i / 4) * Math.PI * 2;
      const r1 = r + 3;
      const r2 = r + 6;
      ctx.moveTo(Math.cos(a) * r1, Math.sin(a) * r1);
      ctx.lineTo(Math.cos(a) * r2, Math.sin(a) * r2);
      ctx.stroke();
    }
    ctx.restore();

    // Core
    ctx.fillStyle = '#ffb800';
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();

    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.beginPath();
    ctx.arc(cx - r * 0.32, cy - r * 0.32, Math.max(0.5, r * 0.28), 0, Math.PI * 2);
    ctx.fill();
  }

  function drawSnake() {
    if (snake.length === 0) return;

    // Interpolated positions for smoothness
    const interp = gameState === 'playing' ? tickProgress : 0;
    const positions = snake.map((seg, i) => {
      const prev = prevSnake[i] || seg;
      // If segment just spawned (no prev), don't interpolate
      const px = prev ? prev.x : seg.x;
      const py = prev ? prev.y : seg.y;
      // If teleport (wrap), just use current
      const dx = seg.x - px;
      const dy = seg.y - py;
      if (Math.abs(dx) > 1 || Math.abs(dy) > 1) {
        return { x: seg.x, y: seg.y };
      }
      return {
        x: px + dx * interp,
        y: py + dy * interp
      };
    });

    // Draw segments back to front
    for (let i = positions.length - 1; i >= 0; i--) {
      const pos = positions[i];
      const px = pos.x * CELL;
      const py = pos.y * CELL;
      const t = i / Math.max(1, positions.length - 1); // 0 head .. 1 tail

      // Color gradient from head (bright) to tail (deep)
      const isHead = i === 0;
      const inset = isHead ? 1 : 2;

      // Subtle outer glow for head
      if (isHead) {
        const gR = CELL;
        const gG = ctx.createRadialGradient(
          px + CELL/2, py + CELL/2, 0,
          px + CELL/2, py + CELL/2, gR
        );
        gG.addColorStop(0, 'rgba(0,255,156,0.35)');
        gG.addColorStop(1, 'rgba(0,255,156,0)');
        ctx.fillStyle = gG;
        ctx.fillRect(px - CELL/2, py - CELL/2, CELL * 2, CELL * 2);
      }

      // Body fill — slight gradient
      const bodyGrad = ctx.createLinearGradient(px, py, px + CELL, py + CELL);
      const headA = 'rgba(180,255,220,1)';
      const headB = 'rgba(0,255,156,1)';
      const tailA = 'rgba(0,180,108,1)';
      const tailB = 'rgba(0,90,55,1)';
      if (isHead) {
        bodyGrad.addColorStop(0, headA);
        bodyGrad.addColorStop(1, headB);
      } else {
        // Lerp between bright & deep
        const lerp = t;
        const cA = lerpColor([0, 255, 156], [0, 120, 75], lerp);
        const cB = lerpColor([180, 255, 220], [0, 80, 50], lerp);
        bodyGrad.addColorStop(0, rgbaStr(cB));
        bodyGrad.addColorStop(1, rgbaStr(cA));
      }
      ctx.fillStyle = bodyGrad;
      roundRect(ctx, px + inset, py + inset, CELL - inset * 2, CELL - inset * 2, isHead ? 5 : 4);
      ctx.fill();

      // Inner highlight bar
      if (!isHead) {
        ctx.fillStyle = 'rgba(255,255,255,0.06)';
        roundRect(ctx, px + inset + 2, py + inset + 2, CELL - inset * 2 - 4, 2, 1);
        ctx.fill();
      }

      // Head details: eyes
      if (isHead) {
        const ex = px + CELL / 2;
        const ey = py + CELL / 2;
        const off = 4;
        const eyeR = 2.2;
        let e1x, e1y, e2x, e2y;
        if (direction.x === 1) {
          e1x = ex + 2; e1y = ey - off;
          e2x = ex + 2; e2y = ey + off;
        } else if (direction.x === -1) {
          e1x = ex - 2; e1y = ey - off;
          e2x = ex - 2; e2y = ey + off;
        } else if (direction.y === -1) {
          e1x = ex - off; e1y = ey - 2;
          e2x = ex + off; e2y = ey - 2;
        } else {
          e1x = ex - off; e1y = ey + 2;
          e2x = ex + off; e2y = ey + 2;
        }
        // Eye whites
        ctx.fillStyle = '#04060a';
        ctx.beginPath();
        ctx.arc(e1x, e1y, eyeR, 0, Math.PI * 2);
        ctx.arc(e2x, e2y, eyeR, 0, Math.PI * 2);
        ctx.fill();
        // Pupils — look in direction of motion
        ctx.fillStyle = '#00ff9c';
        ctx.beginPath();
        ctx.arc(e1x + direction.x * 0.8, e1y + direction.y * 0.8, 1, 0, Math.PI * 2);
        ctx.arc(e2x + direction.x * 0.8, e2y + direction.y * 0.8, 1, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  function drawParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.92;
      p.vy *= 0.92;
      p.life *= 0.93;
      if (p.life < 0.03) { particles.splice(i, 1); continue; }
      ctx.fillStyle = colorWithAlpha(p.color, p.life);
      const s = Math.max(0.4, p.size * p.life);
      ctx.beginPath();
      ctx.arc(p.x, p.y, s, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // -------- Utils --------
  function roundRect(c, x, y, w, h, r) {
    if (w <= 0 || h <= 0) return;
    r = Math.min(r, w / 2, h / 2);
    c.beginPath();
    c.moveTo(x + r, y);
    c.lineTo(x + w - r, y);
    c.quadraticCurveTo(x + w, y, x + w, y + r);
    c.lineTo(x + w, y + h - r);
    c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    c.lineTo(x + r, y + h);
    c.quadraticCurveTo(x, y + h, x, y + h - r);
    c.lineTo(x, y + r);
    c.quadraticCurveTo(x, y, x + r, y);
    c.closePath();
  }

  function colorWithAlpha(color, alpha) {
    if (color.startsWith('#')) {
      const r = parseInt(color.slice(1, 3), 16);
      const g = parseInt(color.slice(3, 5), 16);
      const b = parseInt(color.slice(5, 7), 16);
      return 'rgba(' + r + ',' + g + ',' + b + ',' + Math.max(0, Math.min(1, alpha)) + ')';
    }
    return color;
  }

  function lerpColor(a, b, t) {
    return [
      Math.round(a[0] + (b[0] - a[0]) * t),
      Math.round(a[1] + (b[1] - a[1]) * t),
      Math.round(a[2] + (b[2] - a[2]) * t)
    ];
  }

  function rgbaStr(c) {
    return 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',1)';
  }

  // -------- Main loop --------
  function loop(now) {
    if (gameState === 'playing') {
      const elapsed = now - lastTick;
      tickProgress = Math.min(1, elapsed / currentSpeed);
      if (elapsed >= currentSpeed) {
        tick();
        lastTick = now;
        tickProgress = 0;
      }
    } else {
      tickProgress = 0;
    }

    if (foodEatenPulse > 0.01) foodEatenPulse *= 0.9;
    foodPulse += 0.05;

    draw(now);
    requestAnimationFrame(loop);
  }

  // -------- Boot --------
  init();
})();
</script>
</body>
