<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SERPENT — A Snake Game</title>
<style>
  :root {
    --bg: #0a0a0f;
    --bg-alt: #12121c;
    --fg: #e8e8f0;
    --muted: #4a4a5e;
    --accent: #00ffaa;
    --accent-dim: rgba(0, 255, 170, 0.15);
    --danger: #ff3366;
    --card: #16162a;
    --border: #2a2a40;
    --grid-line: rgba(255, 255, 255, 0.03);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  @font-face {
    font-family: 'sys';
    src: local('Segoe UI'), local('Helvetica Neue'), local('sans-serif');
  }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'sys', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Atmospheric background */
  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(0, 255, 170, 0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(255, 51, 102, 0.03) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(0, 100, 255, 0.03) 0%, transparent 50%);
    animation: bgDrift 20s ease-in-out infinite alternate;
    z-index: 0;
    pointer-events: none;
  }

  @keyframes bgDrift {
    0% { transform: translate(0, 0) rotate(0deg); }
    100% { transform: translate(-3%, 2%) rotate(2deg); }
  }

  .game-wrapper {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  /* Header / HUD */
  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 480px;
    padding: 0 4px;
  }

  .hud-block {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .hud-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    font-weight: 600;
  }

  .hud-value {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1;
  }

  .hud-value.score {
    color: var(--accent);
  }

  .hud-value.high {
    color: var(--muted);
  }

  .hud-value.speed {
    color: var(--danger);
    font-size: 16px;
    font-weight: 700;
  }

  .speed-bar-track {
    width: 80px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 4px;
  }

  .speed-bar-fill {
    height: 100%;
    background: var(--danger);
    border-radius: 2px;
    transition: width 0.3s ease;
    width: 10%;
  }

  /* Canvas container */
  .canvas-container {
    position: relative;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    box-shadow:
      0 0 40px rgba(0, 255, 170, 0.05),
      0 4px 30px rgba(0, 0, 0, 0.4),
      inset 0 0 60px rgba(0, 0, 0, 0.3);
  }

  canvas {
    display: block;
    background: var(--bg-alt);
  }

  /* Overlays */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10, 10, 15, 0.92);
    backdrop-filter: blur(8px);
    border-radius: 8px;
    z-index: 10;
    transition: opacity 0.3s ease;
  }

  .overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .overlay-title {
    font-size: 48px;
    font-weight: 900;
    letter-spacing: 6px;
    text-transform: uppercase;
    background: linear-gradient(135deg, var(--accent), #00ddff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .overlay-subtitle {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  .overlay-score-label {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .overlay-score {
    font-size: 56px;
    font-weight: 900;
    color: var(--danger);
    margin-bottom: 8px;
    line-height: 1;
  }

  .overlay-high {
    font-size: 14px;
    color: var(--accent);
    margin-bottom: 32px;
  }

  .new-record {
    display: inline-block;
    background: var(--accent);
    color: var(--bg);
    font-size: 10px;
    font-weight: 800;
    padding: 2px 8px;
    border-radius: 3px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-left: 8px;
    animation: recordPulse 1s ease-in-out infinite alternate;
  }

  @keyframes recordPulse {
    0% { opacity: 1; }
    100% { opacity: 0.6; }
  }

  .btn {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 12px 36px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s ease;
    font-family: inherit;
  }

  .btn:hover, .btn:focus-visible {
    background: var(--accent);
    color: var(--bg);
    box-shadow: 0 0 20px rgba(0, 255, 170, 0.3);
    outline: none;
  }

  .btn:active {
    transform: scale(0.97);
  }

  .controls-hint {
    margin-top: 20px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .controls-hint kbd {
    display: inline-block;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 6px;
    font-family: inherit;
    font-size: 10px;
    color: var(--fg);
    margin: 0 2px;
  }

  /* Snake preview animation on start screen */
  .snake-art {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    margin-bottom: 24px;
    opacity: 0.6;
    font-family: monospace;
  }

  /* Footer info */
  .footer-info {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-top: 12px;
    opacity: 0.5;
  }

  /* Touch zone indicators */
  .touch-zone {
    display: none;
    position: absolute;
    z-index: 5;
  }

  @media (hover: none) and (pointer: coarse) {
    .touch-zone { display: block; }
    .controls-hint { display: none; }
  }

  /* Responsive */
  @media (max-width: 520px) {
    .overlay-title { font-size: 32px; letter-spacing: 4px; }
    .overlay-score { font-size: 40px; }
    .hud-value { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="game-wrapper">
  <div class="hud">
    <div class="hud-block">
      <span class="hud-label">Score</span>
      <span class="hud-value score" id="scoreDisplay">0</span>
    </div>
    <div class="hud-block" style="align-items:center;">
      <span class="hud-label">Speed</span>
      <span class="hud-value speed" id="speedDisplay">1x</span>
      <div class="speed-bar-track">
        <div class="speed-bar-fill" id="speedBar"></div>
      </div>
    </div>
    <div class="hud-block" style="align-items:flex-end;">
      <span class="hud-label">Best</span>
      <span class="hud-value high" id="highDisplay">0</span>
    </div>
  </div>

  <div class="canvas-container" id="canvasContainer">
    <canvas id="gameCanvas"></canvas>

    <!-- Start overlay -->
    <div class="overlay" id="startOverlay">
      <div class="snake-art">~ ~~oOOOo~~&gt;&gt;&gt;</div>
      <div class="overlay-title">Serpent</div>
      <div class="overlay-subtitle">A snake game</div>
      <button class="btn" id="startBtn" autofocus>Start Game</button>
      <div class="controls-hint">
        <kbd>Arrow Keys</kbd> to move &middot; <kbd>Space</kbd> to pause
      </div>
    </div>

    <!-- Game Over overlay -->
    <div class="overlay hidden" id="gameOverOverlay">
      <div class="overlay-score-label">Final Score</div>
      <div class="overlay-score" id="finalScore">0</div>
      <div class="overlay-high" id="finalHigh"></div>
      <button class="btn" id="restartBtn">Play Again</button>
      <div class="controls-hint">
        Press <kbd>Enter</kbd> to restart
      </div>
    </div>

    <!-- Pause overlay -->
    <div class="overlay hidden" id="pauseOverlay">
      <div class="overlay-title" style="font-size:32px;">Paused</div>
      <div class="overlay-subtitle" style="margin-bottom:24px;">Press Space to resume</div>
      <button class="btn" id="resumeBtn">Resume</button>
    </div>
  </div>

  <div class="footer-info">Swipe or use arrow keys</div>
</div>

<script>
(function() {
  /* ===== Configuration ===== */
  const GRID_SIZE = 20;         // Number of cells per row/col
  const CELL_SIZE = 22;         // Pixels per cell
  const CANVAS_SIZE = GRID_SIZE * CELL_SIZE;
  const BASE_SPEED = 130;       // Starting interval (ms)
  const MIN_SPEED = 50;         // Fastest interval (ms)
  const SPEED_STEP = 4;         // ms reduction per food eaten

  /* ===== DOM Elements ===== */
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const scoreDisplay = document.getElementById('scoreDisplay');
  const highDisplay = document.getElementById('highDisplay');
  const speedDisplay = document.getElementById('speedDisplay');
  const speedBar = document.getElementById('speedBar');
  const startOverlay = document.getElementById('startOverlay');
  const gameOverOverlay = document.getElementById('gameOverOverlay');
  const pauseOverlay = document.getElementById('pauseOverlay');
  const finalScoreEl = document.getElementById('finalScore');
  const finalHighEl = document.getElementById('finalHigh');
  const startBtn = document.getElementById('startBtn');
  const restartBtn = document.getElementById('restartBtn');
  const resumeBtn = document.getElementById('resumeBtn');

  canvas.width = CANVAS_SIZE;
  canvas.height = CANVAS_SIZE;

  /* ===== Game State ===== */
  let snake = [];
  let direction = { x: 1, y: 0 };
  let nextDirection = { x: 1, y: 0 };
  let food = null;
  let score = 0;
  let highScore = parseInt(localStorage.getItem('serpent_high') || '0', 10);
  let gameInterval = null;
  let currentSpeed = BASE_SPEED;
  let isRunning = false;
  let isPaused = false;
  let isGameOver = false;
  let particles = [];
  let foodPulse = 0;
  let animFrame = null;

  highDisplay.textContent = highScore;

  /* ===== Utility Functions ===== */
  function randomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function spawnFood() {
    let pos;
    do {
      pos = { x: randomInt(0, GRID_SIZE - 1), y: randomInt(0, GRID_SIZE - 1) };
    } while (snake.some(s => s.x === pos.x && s.y === pos.y));
    food = pos;
  }

  function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x: x * CELL_SIZE + CELL_SIZE / 2,
        y: y * CELL_SIZE + CELL_SIZE / 2,
        vx: (Math.random() - 0.5) * 6,
        vy: (Math.random() - 0.5) * 6,
        life: 1,
        decay: 0.02 + Math.random() * 0.03,
        size: 2 + Math.random() * 3,
        color: color
      });
    }
  }

  function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.96;
      p.vy *= 0.96;
      p.life -= p.decay;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function drawParticles() {
    particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(p.x, p.y, Math.max(0.5, p.size * p.life), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
  }

  /* ===== Drawing ===== */
  function drawGrid() {
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.025)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= GRID_SIZE; i++) {
      const pos = i * CELL_SIZE;
      ctx.beginPath();
      ctx.moveTo(pos, 0);
      ctx.lineTo(pos, CANVAS_SIZE);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, pos);
      ctx.lineTo(CANVAS_SIZE, pos);
      ctx.stroke();
    }
  }

  function drawSnake() {
    const len = snake.length;
    snake.forEach((seg, i) => {
      const x = seg.x * CELL_SIZE;
      const y = seg.y * CELL_SIZE;
      const pad = i === 0 ? 1 : 2;
      const radius = i === 0 ? 5 : 3;

      // Color gradient from head to tail
      const t = len > 1 ? i / (len - 1) : 0;
      const r = Math.round(0 + t * 0);
      const g = Math.round(255 - t * 80);
      const b = Math.round(170 - t * 70);
      const alpha = 1 - t * 0.3;

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = `rgb(${r},${g},${b})`;

      if (i === 0) {
        // Head glow
        ctx.shadowColor = 'rgba(0, 255, 170, 0.5)';
        ctx.shadowBlur = 12;
      }

      // Rounded rect
      const rx = x + pad;
      const ry = y + pad;
      const rw = CELL_SIZE - pad * 2;
      const rh = CELL_SIZE - pad * 2;
      ctx.beginPath();
      ctx.moveTo(rx + radius, ry);
      ctx.lineTo(rx + rw - radius, ry);
      ctx.quadraticCurveTo(rx + rw, ry, rx + rw, ry + radius);
      ctx.lineTo(rx + rw, ry + rh - radius);
      ctx.quadraticCurveTo(rx + rw, ry + rh, rx + rw - radius, ry + rh);
      ctx.lineTo(rx + radius, ry + rh);
      ctx.quadraticCurveTo(rx, ry + rh, rx, ry + rh - radius);
      ctx.lineTo(rx, ry + radius);
      ctx.quadraticCurveTo(rx, ry, rx + radius, ry);
      ctx.closePath();
      ctx.fill();

      // Eyes on head
      if (i === 0) {
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#0a0a0f';
        const eyeSize = 3;
        const eyeOffset = 5;
        if (direction.x === 1) {
          ctx.fillRect(x + CELL_SIZE - 7, y + 5, eyeSize, eyeSize);
          ctx.fillRect(x + CELL_SIZE - 7, y + CELL_SIZE - 8, eyeSize, eyeSize);
        } else if (direction.x === -1) {
          ctx.fillRect(x + 4, y + 5, eyeSize, eyeSize);
          ctx.fillRect(x + 4, y + CELL_SIZE - 8, eyeSize, eyeSize);
        } else if (direction.y === -1) {
          ctx.fillRect(x + 5, y + 4, eyeSize, eyeSize);
          ctx.fillRect(x + CELL_SIZE - 8, y + 4, eyeSize, eyeSize);
        } else {
          ctx.fillRect(x + 5, y + CELL_SIZE - 7, eyeSize, eyeSize);
          ctx.fillRect(x + CELL_SIZE - 8, y + CELL_SIZE - 7, eyeSize, eyeSize);
        }
      }
      ctx.restore();
    });
  }

  function drawFood() {
    if (!food) return;
    foodPulse += 0.08;
    const pulse = Math.sin(foodPulse) * 0.15 + 1;
    const cx = food.x * CELL_SIZE + CELL_SIZE / 2;
    const cy = food.y * CELL_SIZE + CELL_SIZE / 2;
    const baseR = (CELL_SIZE / 2 - 3);

    // Outer glow
    ctx.save();
    ctx.globalAlpha = 0.15 + Math.sin(foodPulse) * 0.05;
    ctx.fillStyle = '#ff3366';
    ctx.shadowColor = '#ff3366';
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.arc(cx, cy, baseR * pulse * 1.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Core
    ctx.save();
    ctx.fillStyle = '#ff3366';
    ctx.shadowColor = '#ff3366';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(cx, cy, baseR * pulse, 0, Math.PI * 2);
    ctx.fill();

    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.arc(cx - 2, cy - 2, baseR * 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function draw() {
    // Clear
    ctx.fillStyle = '#12121c';
    ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

    drawGrid();
    drawFood();
    drawSnake();
    drawParticles();
  }

  /* ===== Game Logic ===== */
  function gameStep() {
    if (!isRunning || isPaused || isGameOver) return;

    // Apply buffered direction
    direction = { ...nextDirection };

    // Move head
    const head = { ...snake[0] };
    head.x += direction.x;
    head.y += direction.y;

    // Wall collision
    if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
      gameOver();
      return;
    }

    // Self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      gameOver();
      return;
    }

    snake.unshift(head);

    // Food check
    if (food && head.x === food.x && head.y === food.y) {
      score++;
      scoreDisplay.textContent = score;
      updateSpeed();
      spawnParticles(food.x, food.y, '#ff3366', 12);
      spawnParticles(food.x, food.y, '#00ffaa', 6);
      spawnFood();
    } else {
      snake.pop();
    }
  }

  function updateSpeed() {
    currentSpeed = Math.max(MIN_SPEED, BASE_SPEED - score * SPEED_STEP);
    const speedLevel = ((BASE_SPEED - currentSpeed) / (BASE_SPEED - MIN_SPEED));
    const multiplier = (1 + speedLevel * 3).toFixed(1);
    speedDisplay.textContent = multiplier + 'x';
    speedBar.style.width = (10 + speedLevel * 90) + '%';

    // Restart interval with new speed
    if (gameInterval) clearInterval(gameInterval);
    gameInterval = setInterval(gameStep, currentSpeed);
  }

  function gameOver() {
    isRunning = false;
    isGameOver = true;
    if (gameInterval) clearInterval(gameInterval);

    // Death particles
    snake.forEach((seg, i) => {
      if (i < 8) spawnParticles(seg.x, seg.y, '#ff3366', 4);
    });

    // High score check
    let isNewRecord = false;
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('serpent_high', String(highScore));
      highDisplay.textContent = highScore;
      isNewRecord = true;
    }

    finalScoreEl.textContent = score;
    if (isNewRecord) {
      finalHighEl.innerHTML = 'New Record!';
    } else {
      finalHighEl.innerHTML = 'Best: ' + highScore;
    }

    setTimeout(() => {
      gameOverOverlay.classList.remove('hidden');
      restartBtn.focus();
    }, 600);
  }

  function startGame() {
    // Reset state
    const mid = Math.floor(GRID_SIZE / 2);
    snake = [
      { x: mid, y: mid },
      { x: mid - 1, y: mid },
      { x: mid - 2, y: mid }
    ];
    direction = { x: 1, y: 0 };
    nextDirection = { x: 1, y: 0 };
    score = 0;
    currentSpeed = BASE_SPEED;
    particles = [];
    foodPulse = 0;
    isRunning = true;
    isPaused = false;
    isGameOver = false;

    scoreDisplay.textContent = '0';
    speedDisplay.textContent = '1.0x';
    speedBar.style.width = '10%';

    startOverlay.classList.add('hidden');
    gameOverOverlay.classList.add('hidden');
    pauseOverlay.classList.add('hidden');

    spawnFood();

    if (gameInterval) clearInterval(gameInterval);
    gameInterval = setInterval(gameStep, currentSpeed);
  }

  function togglePause() {
    if (!isRunning || isGameOver) return;
    isPaused = !isPaused;
    if (isPaused) {
      pauseOverlay.classList.remove('hidden');
      resumeBtn.focus();
    } else {
      pauseOverlay.classList.add('hidden');
    }
  }

  /* ===== Render Loop (for smooth visuals) ===== */
  function renderLoop() {
    updateParticles();
    draw();
    animFrame = requestAnimationFrame(renderLoop);
  }

  renderLoop();

  /* ===== Input: Keyboard ===== */
  const OPPOSITES = { x: { 1: -1, '-1': 1 }, y: { 1: -1, '-1': 1 } };

  document.addEventListener('keydown', function(e) {
    // Prevent scrolling with arrow keys
    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
      e.preventDefault();
    }

    if (isGameOver) {
      if (e.code === 'Enter' || e.code === 'Space') {
        startGame();
      }
      return;
    }

    if (!isRunning) {
      if (e.code === 'Enter' || e.code === 'Space') {
        startGame();
      }
      return;
    }

    if (e.code === 'Space') {
      togglePause();
      return;
    }

    if (isPaused) return;

    switch (e.code) {
      case 'ArrowUp':
      case 'KeyW':
        if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
        break;
      case 'ArrowDown':
      case 'KeyS':
        if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
        break;
      case 'ArrowLeft':
      case 'KeyA':
        if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
        break;
      case 'ArrowRight':
      case 'KeyD':
        if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
        break;
    }
  });

  /* ===== Input: Touch (Swipe) ===== */
  let touchStartX = 0;
  let touchStartY = 0;
  let touchId = null;

  canvas.addEventListener('touchstart', function(e) {
    if (e.touches.length === 1) {
      const t = e.touches[0];
      touchStartX = t.clientX;
      touchStartY = t.clientY;
      touchId = t.identifier;
    }
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('touchend', function(e) {
    if (!isRunning && !isGameOver) return;
    if (isGameOver) return;

    for (let i = 0; i < e.changedTouches.length; i++) {
      const t = e.changedTouches[i];
      if (t.identifier === touchId) {
        const dx = t.clientX - touchStartX;
        const dy = t.clientY - touchStartY;
        const absDx = Math.abs(dx);
        const absDy = Math.abs(dy);

        if (Math.max(absDx, absDy) < 20) return; // Too short

        if (absDx > absDy) {
          // Horizontal swipe
          if (dx > 0 && direction.x !== -1) nextDirection = { x: 1, y: 0 };
          else if (dx < 0 && direction.x !== 1) nextDirection = { x: -1, y: 0 };
        } else {
          // Vertical swipe
          if (dy > 0 && direction.y !== -1) nextDirection = { x: 0, y: 1 };
          else if (dy < 0 && direction.y !== 1) nextDirection = { x: 0, y: -1 };
        }
      }
    }
    e.preventDefault();
  }, { passive: false });

  /* ===== Button Handlers ===== */
  startBtn.addEventListener('click', startGame);
  restartBtn.addEventListener('click', startGame);
  resumeBtn.addEventListener('click', togglePause);

  /* ===== Reduced Motion ===== */
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (prefersReducedMotion) {
    document.querySelectorAll('*').forEach(el => {
      el.style.animation = 'none';
      el.style.transition = 'none';
    });
  }
})();
</script>
</body>
</html>
