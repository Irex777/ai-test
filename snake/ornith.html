<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake Game</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    touch-action: none;
}

#gameContainer {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
}

#scoreBoard {
    display: flex;
    justify-content: space-between;
    width: 100%;
    padding: 0 5px;
    font-size: 16px;
    color: #888;
}

#scoreBoard .score {
    color: #4ade80;
    font-weight: bold;
}

#scoreBoard .high-score {
    color: #facc15;
    font-weight: bold;
}

canvas {
    border: 2px solid #333;
    border-radius: 4px;
    display: block;
    background: #111;
}

#overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0, 0, 0, 0.85);
    z-index: 10;
    border-radius: 4px;
}

#overlay.hidden {
    display: none;
}

#overlay h1 {
    font-size: 48px;
    color: #4ade80;
    margin-bottom: 10px;
    text-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
}

#overlay h2 {
    font-size: 28px;
    color: #ef4444;
    margin-bottom: 10px;
    text-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
}

#overlay p {
    font-size: 16px;
    color: #888;
    margin-top: 15px;
}

#overlay .final-score {
    font-size: 22px;
    color: #facc15;
    margin: 10px 0;
}

#overlay .controls-hint {
    font-size: 13px;
    color: #555;
    margin-top: 25px;
    text-align: center;
    line-height: 1.8;
}

.snake-icon {
    font-size: 60px;
    margin-bottom: 10px;
}

@media (max-width: 500px) {
    #overlay h1 { font-size: 32px; }
    #overlay h2 { font-size: 22px; }
    #scoreBoard { font-size: 13px; }
}
</style>
</head>
<body>
<div id="gameContainer">
    <div id="scoreBoard">
        <span>Score: <span class="score" id="score">0</span></span>
        <span>Best: <span class="high-score" id="highScore">0</span></span>
    </div>
    <div style="position: relative;">
        <canvas id="gameCanvas"></canvas>
        <div id="overlay">
            <div class="snake-icon">🐍</div>
            <h1 id="overlayTitle">SNAKE</h1>
            <h2 id="overlaySubtitle" class="hidden"></h2>
            <p class="final-score hidden" id="finalScore"></p>
            <p id="startHint">Press any key or tap to start</p>
            <div class="controls-hint">
                Arrow Keys / WASD to move<br>
                Swipe on mobile
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlaySubtitle = document.getElementById('overlaySubtitle');
    const finalScoreEl = document.getElementById('finalScore');
    const startHint = document.getElementById('startHint');
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('highScore');

    // Responsive canvas sizing
    const GRID = 20;
    let cols, rows, cellSize;

    function resizeCanvas() {
        const maxW = Math.min(window.innerWidth - 20, 600);
        const maxH = Math.min(window.innerHeight - 100, 600);
        cellSize = Math.floor(Math.min(maxW, maxH) / GRID);
        cols = GRID;
        rows = GRID;
        canvas.width = cols * cellSize;
        canvas.height = rows * cellSize;
    }
    resizeCanvas();

    // Game state
    let snake, direction, nextDirection, food, score, highScore, gameRunning, gameLoop, speed, particles;
    let lastRenderTime = 0;

    // Load high score
    highScore = parseInt(localStorage.getItem('snakeHighScore') || '0');
    highScoreEl.textContent = highScore;

    function initGame() {
        const midX = Math.floor(cols / 2);
        const midY = Math.floor(rows / 2);
        snake = [
            { x: midX, y: midY },
            { x: midX - 1, y: midY },
            { x: midX - 2, y: midY }
        ];
        direction = { x: 1, y: 0 };
        nextDirection = { x: 1, y: 0 };
        score = 0;
        speed = 120;
        particles = [];
        scoreEl.textContent = '0';
        spawnFood();
    }

    function spawnFood() {
        let pos;
        do {
            pos = {
                x: Math.floor(Math.random() * cols),
                y: Math.floor(Math.random() * rows)
            };
        } while (snake.some(s => s.x === pos.x && s.y === pos.y));
        food = pos;
    }

    function createParticles(x, y) {
        for (let i = 0; i < 8; i++) {
            particles.push({
                x: x * cellSize + cellSize / 2,
                y: y * cellSize + cellSize / 2,
                vx: (Math.random() - 0.5) * 6,
                vy: (Math.random() - 0.5) * 6,
                life: 1,
                color: Math.random() > 0.5 ? '#ef4444' : '#f97316',
                size: Math.random() * 4 + 2
            });
        }
    }

    function updateParticles() {
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.04;
            p.size *= 0.97;
            if (p.life <= 0) particles.splice(i, 1);
        }
    }

    function drawParticles() {
        particles.forEach(p => {
            ctx.save();
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        });
    }

    function drawGrid() {
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
        ctx.lineWidth = 0.5;
        for (let i = 0; i <= cols; i++) {
            ctx.beginPath();
            ctx.moveTo(i * cellSize, 0);
            ctx.lineTo(i * cellSize, rows * cellSize);
            ctx.stroke();
        }
        for (let i = 0; i <= rows; i++) {
            ctx.beginPath();
            ctx.moveTo(0, i * cellSize);
            ctx.lineTo(cols * cellSize, i * cellSize);
            ctx.stroke();
        }
    }

    function drawSnake() {
        snake.forEach((segment, index) => {
            const ratio = 1 - (index / snake.length) * 0.6;
            const r = Math.floor(74 * ratio);
            const g = Math.floor(222 * ratio);
            const b = Math.floor(128 * ratio);

            ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
            const padding = index === 0 ? 1 : 2;
            ctx.fillRect(
                segment.x * cellSize + padding,
                segment.y * cellSize + padding,
                cellSize - padding * 2,
                cellSize - padding * 2
            );

            // Glow for head
            if (index === 0) {
                ctx.shadowColor = '#4ade80';
                ctx.shadowBlur = 10;
                ctx.fillStyle = '#4ade80';
                ctx.fillRect(
                    segment.x * cellSize + padding,
                    segment.y * cellSize + padding,
                    cellSize - padding * 2,
                    cellSize - padding * 2
                );
                ctx.shadowBlur = 0;

                // Eyes
                const eyeSize = Math.max(2, cellSize / 8);
                let ex1, ey1, ex2, ey2;
                if (direction.x === 1) { ex1 = cellSize * 0.7; ey1 = cellSize * 0.25; ex2 = cellSize * 0.7; ey2 = cellSize * 0.75; }
                else if (direction.x === -1) { ex1 = cellSize * 0.3; ey1 = cellSize * 0.25; ex2 = cellSize * 0.3; ey2 = cellSize * 0.75; }
                else if (direction.y === -1) { ex1 = cellSize * 0.25; ey1 = cellSize * 0.3; ex2 = cellSize * 0.75; ey2 = cellSize * 0.3; }
                else { ex1 = cellSize * 0.25; ey1 = cellSize * 0.7; ex2 = cellSize * 0.75; ey2 = cellSize * 0.7; }
                ctx.fillStyle = '#111';
                ctx.beginPath();
                ctx.arc(segment.x * cellSize + ex1, segment.y * cellSize + ey1, eyeSize, 0, Math.PI * 2);
                ctx.arc(segment.x * cellSize + ex2, segment.y * cellSize + ey2, eyeSize, 0, Math.PI * 2);
                ctx.fill();
            }
        });
    }

    function drawFood() {
        const pulse = 0.8 + Math.sin(Date.now() / 200) * 0.2;
        const fx = food.x * cellSize + cellSize / 2;
        const fy = food.y * cellSize + cellSize / 2;
        const radius = (cellSize / 2 - 3) * pulse;

        ctx.shadowColor = '#ef4444';
        ctx.shadowBlur = 15;
        ctx.fillStyle = '#ef4444';
        ctx.beginPath();
        ctx.arc(fx, fy, radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        // Inner highlight
        ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
        ctx.beginPath();
        ctx.arc(fx - radius * 0.2, fy - radius * 0.2, radius * 0.4, 0, Math.PI * 2);
        ctx.fill();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawGrid();
        drawFood();
        drawSnake();
        drawParticles();
    }

    function update() {
        direction = { ...nextDirection };

        const head = {
            x: snake[0].x + direction.x,
            y: snake[0].y + direction.y
        };

        // Wall collision
        if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows) {
            gameOver();
            return;
        }

        // Self collision
        if (snake.some(s => s.x === head.x && s.y === head.y)) {
            gameOver();
            return;
        }

        snake.unshift(head);

        // Eat food
        if (head.x === food.x && head.y === food.y) {
            score++;
            scoreEl.textContent = score;
            createParticles(food.x, food.y);
            spawnFood();

            // Speed increase
            speed = Math.max(50, 120 - score * 2);
        } else {
            snake.pop();
        }

        updateParticles();
    }

    function gameOver() {
        gameRunning = false;
        clearInterval(gameLoop);

        if (score > highScore) {
            highScore = score;
            localStorage.setItem('snakeHighScore', highScore.toString());
            highScoreEl.textContent = highScore;
        }

        overlayTitle.textContent = 'GAME OVER';
        overlaySubtitle.textContent = '';
        overlaySubtitle.classList.add('hidden');
        finalScoreEl.textContent = `Score: ${score}`;
        finalScoreEl.classList.remove('hidden');
        startHint.textContent = 'Press any key or tap to restart';
        overlay.classList.remove('hidden');
    }

    function startGame() {
        initGame();
        overlay.classList.add('hidden');
        gameRunning = true;
        clearInterval(gameLoop);
        gameLoop = setInterval(() => {
            if (gameRunning) {
                update();
                draw();
            }
        }, speed);

        // Restart interval when speed changes
        let speedTimer = null;
        const origStart = startGame;
        clearInterval(speedTimer);
        speedTimer = setInterval(() => {
            if (gameRunning) {
                clearInterval(gameLoop);
                gameLoop = setInterval(() => {
                    if (gameRunning) {
                        update();
                        draw();
                    }
                }, speed);
            }
        }, 1000);
    }

    // Continuous draw for animations
    function animate() {
        if (gameRunning) {
            draw();
        }
        requestAnimationFrame(animate);
    }
    animate();

    // Keyboard controls
    document.addEventListener('keydown', (e) => {
        if (!gameRunning && overlay.classList.contains('hidden') === false) {
            startGame();
            return;
        }

        switch (e.key) {
            case 'ArrowUp':
            case 'w':
            case 'W':
                if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                e.preventDefault();
                break;
            case 'ArrowDown':
            case 's':
            case 'S':
                if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                e.preventDefault();
                break;
            case 'ArrowLeft':
            case 'a':
            case 'A':
                if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                e.preventDefault();
                break;
            case 'ArrowRight':
            case 'd':
            case 'D':
                if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                e.preventDefault();
                break;
        }
    });

    // Touch controls (swipe)
    let touchStartX = 0, touchStartY = 0, touchStartTime = 0;

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
        touchStartTime = Date.now();

        if (!gameRunning) {
            startGame();
        }
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
        e.preventDefault();
        if (!gameRunning) return;

        const touch = e.changedTouches[0];
        const dx = touch.clientX - touchStartX;
        const dy = touch.clientY - touchStartY;
        const dt = Date.now() - touchStartTime;

        if (dt > 500) return; // Ignore slow taps

        const absDx = Math.abs(dx);
        const absDy = Math.abs(dy);

        if (Math.max(absDx, absDy) < 15) return; // Too small to be a swipe

        if (absDx > absDy) {
            // Horizontal swipe
            if (dx > 0 && direction.x !== -1) nextDirection = { x: 1, y: 0 };
            else if (dx < 0 && direction.x !== 1) nextDirection = { x: -1, y: 0 };
        } else {
            // Vertical swipe
            if (dy > 0 && direction.y !== -1) nextDirection = { x: 0, y: 1 };
            else if (dy < 0 && direction.y !== 1) nextDirection = { x: 0, y: -1 };
        }
    }, { passive: false });

    // Tap overlay to start
    overlay.addEventListener('click', () => {
        if (!gameRunning) startGame();
    });

    // Handle resize
    window.addEventListener('resize', () => {
        resizeCanvas();
        if (!gameRunning) draw();
    });
})();
</script>
</body>
</html>
