<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #gameContainer {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        #scoreBoard {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 402px;
            padding: 0 4px;
            font-size: 14px;
            color: #888;
        }

        #scoreBoard span {
            color: #4ade80;
            font-weight: bold;
        }

        #gameCanvas {
            border: 2px solid #1a1a2e;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(74, 222, 128, 0.05), inset 0 0 60px rgba(0,0,0,0.5);
            display: block;
            background: #0f0f1a;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(10, 10, 10, 0.92);
            z-index: 10;
            border-radius: 4px;
            transition: opacity 0.3s;
        }

        #overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #overlay h1 {
            font-size: 42px;
            color: #4ade80;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(74, 222, 128, 0.4);
            letter-spacing: 4px;
        }

        #overlay .subtitle {
            font-size: 13px;
            color: #555;
            margin-bottom: 36px;
        }

        #overlay .highScore {
            font-size: 15px;
            color: #f59e0b;
            margin-bottom: 24px;
        }

        #overlay .gameOverScore {
            font-size: 20px;
            color: #ef4444;
            margin-bottom: 12px;
        }

        #overlay .gameOverHigh {
            font-size: 14px;
            color: #f59e0b;
            margin-bottom: 30px;
        }

        #startBtn {
            padding: 14px 48px;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            background: transparent;
            color: #4ade80;
            border: 2px solid #4ade80;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 2px;
        }

        #startBtn:hover {
            background: #4ade80;
            color: #0a0a0a;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.3);
        }

        #controls {
            margin-top: 12px;
            font-size: 11px;
            color: #333;
            text-align: center;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="scoreBoard">
            <div>SCORE: <span id="score">0</span></div>
            <div>SPEED: <span id="speed">1</span></div>
            <div>HIGH: <span id="highScoreDisplay">0</span></div>
        </div>
        <div style="position: relative; display: inline-block;">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div id="overlay">
                <h1>SNAKE</h1>
                <div class="subtitle">CLASSIC ARCADE GAME</div>
                <div class="highScore" id="startHighScore"></div>
                <div class="gameOverScore" id="gameOverScore" style="display:none;"></div>
                <div class="gameOverHigh" id="gameOverHigh" style="display:none;"></div>
                <button id="startBtn">PLAY</button>
            </div>
        </div>
        <div id="controls">Arrow Keys / WASD to move &bull; Swipe on mobile</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('startBtn');
        const scoreEl = document.getElementById('score');
        const speedEl = document.getElementById('speed');
        const highScoreDisplay = document.getElementById('highScoreDisplay');
        const startHighScore = document.getElementById('startHighScore');
        const gameOverScore = document.getElementById('gameOverScore');
        const gameOverHigh = document.getElementById('gameOverHigh');

        const GRID = 20;
        const COLS = canvas.width / GRID;
        const ROWS = canvas.height / GRID;

        let snake, direction, nextDirection, food, score, gameSpeed, gameLoop, isRunning, isGameOver;
        let highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;

        highScoreDisplay.textContent = highScore;
        startHighScore.textContent = highScore > 0 ? 'HIGH SCORE: ' + highScore : '';

        function init() {
            snake = [
                { x: Math.floor(COLS / 2), y: Math.floor(ROWS / 2) },
                { x: Math.floor(COLS / 2) - 1, y: Math.floor(ROWS / 2) },
                { x: Math.floor(COLS / 2) - 2, y: Math.floor(ROWS / 2) }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            gameSpeed = 120;
            isGameOver = false;
            scoreEl.textContent = '0';
            speedEl.textContent = '1';
            spawnFood();
        }

        function spawnFood() {
            let pos;
            do {
                pos = {
                    x: Math.floor(Math.random() * COLS),
                    y: Math.floor(Math.random() * ROWS)
                };
            } while (snake.some(s => s.x === pos.x && s.y === pos.y));
            food = pos;
        }

        function drawGrid() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 0.5;
            for (let x = 0; x <= COLS; x++) {
                ctx.beginPath();
                ctx.moveTo(x * GRID, 0);
                ctx.lineTo(x * GRID, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y <= ROWS; y++) {
                ctx.beginPath();
                ctx.moveTo(0, y * GRID);
                ctx.lineTo(canvas.width, y * GRID);
                ctx.stroke();
            }
        }

        function draw() {
            // Clear
            ctx.fillStyle = '#0f0f1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawGrid();

            // Food
            ctx.fillStyle = '#ef4444';
            ctx.shadowColor = 'rgba(239, 68, 68, 0.5)';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(food.x * GRID + GRID / 2, food.y * GRID + GRID / 2, GRID / 2 - 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Snake
            snake.forEach((segment, i) => {
                const ratio = 1 - (i / snake.length) * 0.6;
                const g = Math.floor(222 * ratio);
                const b = Math.floor(128 * ratio);
                ctx.fillStyle = i === 0
                    ? '#4ade80'
                    : `rgb(20, ${g}, ${b})`;

                if (i === 0) {
                    ctx.shadowColor = 'rgba(74, 222, 128, 0.4)';
                    ctx.shadowBlur = 8;
                }

                const padding = i === 0 ? 1 : 2;
                ctx.fillRect(
                    segment.x * GRID + padding,
                    segment.y * GRID + padding,
                    GRID - padding * 2,
                    GRID - padding * 2
                );

                ctx.shadowBlur = 0;
            });

            // Snake eyes
            if (snake.length > 0) {
                const head = snake[0];
                ctx.fillStyle = '#0a0a0a';
                const eyeSize = 2.5;
                let ex1, ey1, ex2, ey2;
                const cx = head.x * GRID + GRID / 2;
                const cy = head.y * GRID + GRID / 2;

                if (direction.x === 1) {
                    ex1 = cx + 3; ey1 = cy - 4;
                    ex2 = cx + 3; ey2 = cy + 4;
                } else if (direction.x === -1) {
                    ex1 = cx - 3; ey1 = cy - 4;
                    ex2 = cx - 3; ey2 = cy + 4;
                } else if (direction.y === -1) {
                    ex1 = cx - 4; ey1 = cy - 3;
                    ex2 = cx + 4; ey2 = cy - 3;
                } else {
                    ex1 = cx - 4; ey1 = cy + 3;
                    ex2 = cx + 4; ey2 = cy + 3;
                }

                ctx.beginPath();
                ctx.arc(ex1, ey1, eyeSize, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(ex2, ey2, eyeSize, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function update() {
            direction = { ...nextDirection };

            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // Wall collision
            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
                gameOver();
                return;
            }

            // Self collision
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // Eat food
            if (head.x === food.x && head.y === food.y) {
                score++;
                scoreEl.textContent = score;

                // Speed increase
                const newSpeed = Math.max(50, 120 - Math.floor(score / 2) * 8);
                if (newSpeed !== gameSpeed) {
                    gameSpeed = newSpeed;
                    speedEl.textContent = Math.floor((120 - gameSpeed) / 8) + 1;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(tick, gameSpeed);
                }

                spawnFood();
            } else {
                snake.pop();
            }
        }

        function tick() {
            update();
            draw();
        }

        function gameOver() {
            isGameOver = true;
            isRunning = false;
            clearInterval(gameLoop);

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreDisplay.textContent = highScore;
                startHighScore.textContent = 'HIGH SCORE: ' + highScore;
            }

            gameOverScore.textContent = 'SCORE: ' + score;
            gameOverScore.style.display = 'block';

            gameOverHigh.textContent = score >= highScore && score > 0 ? '★ NEW HIGH SCORE! ★' : 'HIGH SCORE: ' + highScore;
            gameOverHigh.style.display = 'block';

            startBtn.textContent = 'RESTART';
            overlay.classList.remove('hidden');
        }

        function startGame() {
            init();
            overlay.classList.add('hidden');
            isRunning = true;
            clearInterval(gameLoop);
            gameLoop = setInterval(tick, gameSpeed);
            draw();
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (!isRunning) {
                if (e.key === 'Enter' || e.key === ' ') {
                    startGame();
                }
                return;
            }

            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
            e.preventDefault();
        });

        // Touch / swipe controls
        let touchStartX = 0, touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            if (!isRunning) return;

            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            const absDx = Math.abs(dx);
            const absDy = Math.abs(dy);

            if (Math.max(absDx, absDy) < 15) return;

            if (absDx > absDy) {
                if (dx > 0 && direction.x !== -1) nextDirection = { x: 1, y: 0 };
                else if (dx < 0 && direction.x !== 1) nextDirection = { x: -1, y: 0 };
            } else {
                if (dy > 0 && direction.y !== -1) nextDirection = { x: 0, y: 1 };
                else if (dy < 0 && direction.y !== 1) nextDirection = { x: 0, y: -1 };
            }
            e.preventDefault();
        }, { passive: false });

        // Button
        startBtn.addEventListener('click', startGame);

        // Initial draw
        init();
        draw();
    </script>
</body>
</html>
