<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake Game</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    touch-action: none;
}

#gameContainer {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
}

#scoreBoard {
    display: flex;
    justify-content: space-between;
    width: 100%;
    max-width: 500px;
    padding: 0 4px;
    font-size: 16px;
}

#scoreBoard .score-item {
    background: #1a1a2e;
    border: 1px solid #16213e;
    padding: 8px 16px;
    border-radius: 6px;
    min-width: 120px;
    text-align: center;
}

#scoreBoard .score-label {
    color: #666;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

#scoreBoard .score-value {
    color: #00ff88;
    font-size: 22px;
    font-weight: bold;
    margin-top: 2px;
}

#highScore .score-value {
    color: #ffaa00;
}

#speedDisplay .score-value {
    color: #00ccff;
}

#canvasWrapper {
    position: relative;
    border: 2px solid #1a1a3e;
    border-radius: 4px;
    box-shadow: 0 0 30px rgba(0, 255, 136, 0.05), inset 0 0 30px rgba(0,0,0,0.3);
}

canvas {
    display: block;
    border-radius: 2px;
}

#overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(5, 5, 15, 0.92);
    border-radius: 2px;
    z-index: 10;
    transition: opacity 0.3s;
}

#overlay.hidden {
    opacity: 0;
    pointer-events: none;
}

#overlay h1 {
    font-size: 48px;
    color: #00ff88;
    text-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
    margin-bottom: 8px;
    letter-spacing: 4px;
}

#overlay .subtitle {
    color: #555;
    font-size: 14px;
    margin-bottom: 32px;
}

#overlay .game-over-title {
    font-size: 36px;
    color: #ff4444;
    text-shadow: 0 0 15px rgba(255, 68, 68, 0.4);
    margin-bottom: 8px;
}

#overlay .final-score {
    font-size: 20px;
    color: #aaa;
    margin-bottom: 8px;
}

#overlay .new-high {
    color: #ffaa00;
    font-size: 16px;
    margin-bottom: 24px;
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}

#overlay .prompt {
    color: #00ff88;
    font-size: 16px;
    animation: blink 1.5s infinite;
}

@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
}

#overlay .controls-info {
    margin-top: 24px;
    color: #444;
    font-size: 12px;
    text-align: center;
    line-height: 1.8;
}

#overlay .controls-info span {
    color: #555;
    background: #1a1a2e;
    padding: 2px 6px;
    border-radius: 3px;
    border: 1px solid #2a2a4e;
}
</style>
</head>
<body>
<div id="gameContainer">
    <div id="scoreBoard">
        <div class="score-item" id="score">
            <div class="score-label">Score</div>
            <div class="score-value" id="scoreValue">0</div>
        </div>
        <div class="score-item" id="speedDisplay">
            <div class="score-label">Speed</div>
            <div class="score-value" id="speedValue">1</div>
        </div>
        <div class="score-item" id="highScore">
            <div class="score-label">Best</div>
            <div class="score-value" id="highValue">0</div>
        </div>
    </div>
    <div id="canvasWrapper">
        <canvas id="gameCanvas"></canvas>
        <div id="overlay">
            <h1>🐍 SNAKE</h1>
            <div class="subtitle">Classic Arcade Game</div>
            <div class="prompt">Press any key or swipe to start</div>
            <div class="controls-info">
                <span>↑</span> <span>↓</span> <span>←</span> <span>→</span> or <span>W</span><span>A</span><span>S</span><span>D</span><br>
                Swipe on mobile
            </div>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreValue = document.getElementById('scoreValue');
const highValue = document.getElementById('highValue');
const speedValue = document.getElementById('speedValue');

// Grid settings
const CELL = 20;
const COLS = 25;
const ROWS = 25;
canvas.width = COLS * CELL;
canvas.height = ROWS * CELL;

// Game state
let snake, direction, nextDirection, food, score, highScore, speed, gameRunning, gameOver, gameStarted, lastTime, accumulator;

// Load high score
highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
highValue.textContent = highScore;

function init() {
    snake = [];
    const startX = Math.floor(COLS / 2);
    const startY = Math.floor(ROWS / 2);
    for (let i = 0; i < 3; i++) {
        snake.push({ x: startX - i, y: startY });
    }
    direction = { x: 1, y: 0 };
    nextDirection = { x: 1, y: 0 };
    score = 0;
    speed = 1;
    gameOver = false;
    gameRunning = false;
    accumulator = 0;
    scoreValue.textContent = '0';
    speedValue.textContent = '1';
    spawnFood();
}

function getSpeed() {
    // Speed increases every 5 points
    const level = Math.floor(score / 5) + 1;
    return Math.min(level, 20);
}

function getInterval() {
    // ms per frame: starts at 150ms, decreases
    return Math.max(40, 150 - (speed - 1) * 6);
}

function spawnFood() {
    let pos;
    do {
        pos = {
            x: Math.floor(Math.random() * COLS),
            y: Math.floor(Math.random() * ROWS)
        };
    } while (snake.some(s => s.x === pos.x && s.y === pos.y));
    food = pos;
}

function update() {
    direction = { ...nextDirection };
    const head = {
        x: snake[snake.length - 1].x + direction.x,
        y: snake[snake.length - 1].y + direction.y
    };

    // Wall collision
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        endGame();
        return;
    }

    // Self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
        endGame();
        return;
    }

    snake.push(head);

    // Food collision
    if (head.x === food.x && head.y === food.y) {
        score++;
        scoreValue.textContent = score;
        speed = getSpeed();
        speedValue.textContent = speed;
        spawnFood();
    } else {
        snake.shift();
    }
}

function endGame() {
    gameOver = true;
    gameRunning = false;

    let isNewHigh = false;
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('snakeHighScore', highScore);
        highValue.textContent = highScore;
        isNewHigh = true;
    }

    showGameOver(isNewHigh);
}

function showGameOver(isNewHigh) {
    overlay.classList.remove('hidden');
    overlay.innerHTML = `
        <div class="game-over-title">GAME OVER</div>
        <div class="final-score">Score: ${score}</div>
        ${isNewHigh ? '<div class="new-high">★ NEW HIGH SCORE! ★</div>' : ''}
        <div class="prompt">Press any key or tap to restart</div>
    `;
}

function drawGrid() {
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= COLS; x++) {
        ctx.beginPath();
        ctx.moveTo(x * CELL, 0);
        ctx.lineTo(x * CELL, canvas.height);
        ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * CELL);
        ctx.lineTo(canvas.width, y * CELL);
        ctx.stroke();
    }
}

function drawSnake() {
    snake.forEach((seg, i) => {
        const ratio = 1 - (i / snake.length) * 0.6;
        const g = Math.floor(255 * ratio);
        const b = Math.floor(100 * ratio);

        if (i === snake.length - 1) {
            // Head
            ctx.fillStyle = `rgb(0, ${g}, ${b})`;
            ctx.shadowColor = 'rgba(0, 255, 136, 0.4)';
            ctx.shadowBlur = 8;
            roundRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2, 4);
            ctx.shadowBlur = 0;

            // Eyes
            const eyeSize = 3;
            ctx.fillStyle = '#fff';
            let ex1, ey1, ex2, ey2;
            if (direction.x === 1) {
                ex1 = seg.x * CELL + CELL - 6; ey1 = seg.y * CELL + 5;
                ex2 = seg.x * CELL + CELL - 6; ey2 = seg.y * CELL + CELL - 5 - eyeSize;
            } else if (direction.x === -1) {
                ex1 = seg.x * CELL + 3; ey1 = seg.y * CELL + 5;
                ex2 = seg.x * CELL + 3; ey2 = seg.y * CELL + CELL - 5 - eyeSize;
            } else if (direction.y === -1) {
                ex1 = seg.x * CELL + 5; ey1 = seg.y * CELL + 3;
                ex2 = seg.x * CELL + CELL - 5 - eyeSize; ey2 = seg.y * CELL + 3;
            } else {
                ex1 = seg.x * CELL + 5; ey1 = seg.y * CELL + CELL - 6;
                ex2 = seg.x * CELL + CELL - 5 - eyeSize; ey2 = seg.y * CELL + CELL - 6;
            }
            ctx.fillRect(ex1, ey1, eyeSize, eyeSize);
            ctx.fillRect(ex2, ey2, eyeSize, eyeSize);
        } else {
            ctx.fillStyle = `rgb(0, ${g}, ${b})`;
            roundRect(seg.x * CELL + 1.5, seg.y * CELL + 1.5, CELL - 3, CELL - 3, 3);
        }
    });
}

function drawFood() {
    // Glow
    ctx.shadowColor = 'rgba(255, 68, 68, 0.6)';
    ctx.shadowBlur = 12;
    ctx.fillStyle = '#ff4444';
    roundRect(food.x * CELL + 2, food.y * CELL + 2, CELL - 4, CELL - 4, 4);
    ctx.shadowBlur = 0;

    // Highlight
    ctx.fillStyle = 'rgba(255, 150, 150, 0.4)';
    ctx.fillRect(food.x * CELL + 5, food.y * CELL + 5, 4, 4);
}

function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.fill();
}

function draw() {
    // Clear
    ctx.fillStyle = '#0d0d1a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    drawGrid();
    drawFood();
    if (snake.length > 0) drawSnake();
}

function gameLoop(timestamp) {
    if (!lastTime) lastTime = timestamp;
    const delta = timestamp - lastTime;
    lastTime = timestamp;

    if (gameRunning && !gameOver) {
        accumulator += delta;
        const interval = getInterval();
        while (accumulator >= interval) {
            update();
            accumulator -= interval;
            if (gameOver) break;
        }
    }

    draw();
    requestAnimationFrame(gameLoop);
}

function startGame() {
    init();
    gameStarted = true;
    gameRunning = true;
    overlay.classList.add('hidden');
}

// Keyboard controls
document.addEventListener('keydown', (e) => {
    if (!gameStarted) {
        startGame();
        return;
    }

    if (gameOver) {
        startGame();
        return;
    }

    switch (e.key) {
        case 'ArrowUp': case 'w': case 'W':
            if (direction.y === 0) nextDirection = { x: 0, y: -1 };
            break;
        case 'ArrowDown': case 's': case 'S':
            if (direction.y === 0) nextDirection = { x: 0, y: 1 };
            break;
        case 'ArrowLeft': case 'a': case 'A':
            if (direction.x === 0) nextDirection = { x: -1, y: 0 };
            break;
        case 'ArrowRight': case 'd': case 'D':
            if (direction.x === 0) nextDirection = { x: 1, y: 0 };
            break;
    }
    e.preventDefault();
});

// Touch controls
let touchStartX = 0, touchStartY = 0;

document.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;

    if (!gameStarted || gameOver) {
        startGame();
        e.preventDefault();
        return;
    }
}, { passive: false });

document.addEventListener('touchmove', (e) => {
    e.preventDefault();
}, { passive: false });

document.addEventListener('touchend', (e) => {
    if (!gameRunning || gameOver) return;

    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    const absDx = Math.abs(dx);
    const absDy = Math.abs(dy);

    if (Math.max(absDx, absDy) < 20) return; // Too short

    if (absDx > absDy) {
        if (dx > 0 && direction.x === 0) nextDirection = { x: 1, y: 0 };
        else if (dx < 0 && direction.x === 0) nextDirection = { x: -1, y: 0 };
    } else {
        if (dy > 0 && direction.y === 0) nextDirection = { x: 0, y: 1 };
        else if (dy < 0 && direction.y === 0) nextDirection = { x: 0, y: -1 };
    }
});

// Init
init();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
