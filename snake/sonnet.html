<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .game-container {
            position: relative;
        }

        canvas {
            border: 2px solid #00ff88;
            box-shadow: 0 0 20px #00ff88, 0 0 40px rgba(0, 255, 136, 0.3);
            border-radius: 8px;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(10, 10, 15, 0.95);
            color: #00ff88;
            text-align: center;
        }

        .screen.hidden {
            display: none;
        }

        h1 {
            font-size: 3rem;
            text-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88;
            margin-bottom: 20px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
            margin-bottom: 30px;
        }

        .btn {
            background: transparent;
            border: 2px solid #00ff88;
            color: #00ff88;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-family: inherit;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
            text-shadow: 0 0 5px #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        .btn:hover {
            background: #00ff88;
            color: #0a0a0f;
            box-shadow: 0 0 20px #00ff88;
        }

        .score-display {
            position: absolute;
            top: -50px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            color: #00ff88;
            font-size: 1.2rem;
            text-shadow: 0 0 5px #00ff88;
        }

        .controls {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #888;
        }

        .controls span {
            color: #ff00ff;
        }

        .final-score {
            font-size: 2rem;
            margin: 20px 0;
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
        }

        .high-score-display {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #ffff00;
            text-shadow: 0 0 10px #ffff00;
        }

        .toggle-grid {
            position: absolute;
            top: -80px;
            right: 0;
            background: transparent;
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 5px 15px;
            font-family: inherit;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .pause-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffff00;
            font-size: 2rem;
            text-shadow: 0 0 20px #ffff00;
            pointer-events: none;
        }

        .pause-indicator.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="score-display">
            <div>Score: <span id="currentScore">0</span></div>
            <div>High Score: <span id="highScore">0</span></div>
        </div>
        
        <button class="toggle-grid" id="gridToggle">Grid: ON</button>
        
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div class="pause-indicator hidden" id="pauseIndicator">PAUSED</div>

        <!-- Start Screen -->
        <div class="screen" id="startScreen">
            <h1>NEON SNAKE</h1>
            <div class="subtitle">A Classic Reimagined</div>
            <button class="btn" id="startBtn">START GAME</button>
            <div class="controls">
                <p>Use <span>Arrow Keys</span> or <span>WASD</span> to move</p>
                <p><span>Space</span> to pause | <span>Swipe</span> on mobile</p>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div class="screen hidden" id="gameOverScreen">
            <h1>GAME OVER</h1>
            <div class="final-score">Score: <span id="finalScore">0</span></div>
            <div class="high-score-display" id="highScoreDisplay"></div>
            <button class="btn" id="restartBtn">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        // Audio Context for sound effects
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(frequency, type = 'square', duration = 0.1) {
            if (!audioCtx) return;
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.frequency.value = frequency;
            oscillator.type = type;
            
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + duration);
        }

        function playEatSound() {
            playSound(600, 'square', 0.1);
            setTimeout(() => playSound(800, 'square', 0.1), 50);
        }

        function playGameOverSound() {
            playSound(200, 'sawtooth', 0.3);
            setTimeout(() => playSound(150, 'sawtooth', 0.3), 200);
            setTimeout(() => playSound(100, 'sawtooth', 0.4), 400);
        }

        function playMoveSound() {
            playSound(400, 'sine', 0.05);
        }

        // Game state
        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let dx = 0;
        let dy = 0;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameSpeed = 150;
        let gameLoop;
        let isGameRunning = false;
        let isPaused = false;
        let showGrid = true;

        // DOM elements
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const currentScoreEl = document.getElementById('currentScore');
        const highScoreEl = document.getElementById('highScore');
        const finalScoreEl = document.getElementById('finalScore');
        const highScoreDisplay = document.getElementById('highScoreDisplay');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const gridToggle = document.getElementById('gridToggle');
        const pauseIndicator = document.getElementById('pauseIndicator');

        // Initialize high score display
        highScoreEl.textContent = highScore;

        function drawGrid() {
            if (!showGrid) return;
            
            ctx.strokeStyle = 'rgba(0, 255, 136, 0.1)';
            ctx.lineWidth = 1;
            
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
        }

        function drawSnake() {
            snake.forEach((segment, index) => {
                const gradient = ctx.createRadialGradient(
                    segment.x * gridSize + gridSize / 2,
                    segment.y * gridSize + gridSize / 2,
                    0,
                    segment.x * gridSize + gridSize / 2,
                    segment.y * gridSize + gridSize / 2,
                    gridSize / 2
                );
                
                if (index === 0) {
                    // Head
                    gradient.addColorStop(0, '#00ff88');
                    gradient.addColorStop(1, '#00cc66');
                } else {
                    // Body
                    const alpha = 1 - (index / snake.length) * 0.5;
                    gradient.addColorStop(0, `rgba(0, 255, 136, ${alpha})`);
                    gradient.addColorStop(1, `rgba(0, 204, 102, ${alpha})`);
                }
                
                ctx.fillStyle = gradient;
                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
                
                // Add glow effect
                ctx.shadowColor = '#00ff88';
                ctx.shadowBlur = 10;
                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
                ctx.shadowBlur = 0;
            });
        }

        function drawFood() {
            const gradient = ctx.createRadialGradient(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                0,
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2
            );
            gradient.addColorStop(0, '#ff00ff');
            gradient.addColorStop(1, '#cc00cc');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            
            // Add glow effect
            ctx.shadowColor = '#ff00ff';
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function moveSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // Check wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }
            
            // Check self collision
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }
            
            snake.unshift(head);
            
            // Check food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                currentScoreEl.textContent = score;
                playEatSound();
                
                // Increase speed
                if (score % 50 === 0 && gameSpeed > 50) {
                    gameSpeed -= 10;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(gameStep, gameSpeed);
                }
                
                spawnFood();
            } else {
                snake.pop();
                playMoveSound();
            }
        }

        function spawnFood() {
            do {
                food.x = Math.floor(Math.random() * tileCount);
                food.y = Math.floor(Math.random() * tileCount);
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawGrid();
            drawFood();
            drawSnake();
        }

        function gameStep() {
            if (!isPaused && isGameRunning) {
                moveSnake();
                draw();
            }
        }

        function startGame() {
            initAudio();
            
            snake = [{x: 10, y: 10}];
            dx = 1;
            dy = 0;
            score = 0;
            gameSpeed = 150;
            currentScoreEl.textContent = score;
            isPaused = false;
            isGameRunning = true;
            
            spawnFood();
            
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            pauseIndicator.classList.add('hidden');
            
            draw();
            
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(gameStep, gameSpeed);
        }

        function gameOver() {
            isGameRunning = false;
            clearInterval(gameLoop);
            playGameOverSound();
            
            finalScoreEl.textContent = score;
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreEl.textContent = highScore;
                highScoreDisplay.textContent = 'New High Score!';
            } else {
                highScoreDisplay.textContent = `High Score: ${highScore}`;
            }
            
            gameOverScreen.classList.remove('hidden');
        }

        function togglePause() {
            if (!isGameRunning) return;
            
            isPaused = !isPaused;
            pauseIndicator.classList.toggle('hidden', !isPaused);
        }

        // Event listeners
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (!isGameRunning && startScreen.classList.contains('hidden') && gameOverScreen.classList.contains('hidden')) {
                    startGame();
                } else {
                    togglePause();
                }
                return;
            }

            if (!isGameRunning || isPaused) return;

            const keyDiffs = {
                'ArrowUp': {x: 0, y: -1},
                'ArrowDown': {x: 0, y: 1},
                'ArrowLeft': {x: -1, y: 0},
                'ArrowRight': {x: 1, y: 0},
                'KeyW': {x: 0, y: -1},
                'KeyS': {x: 0, y: 1},
                'KeyA': {x: -1, y: 0},
                'KeyD': {x: 1, y: 0}
            };

            const newDir = keyDiffs[e.code];
            if (newDir) {
                e.preventDefault();
                // Prevent 180-degree turns
                if (newDir.x !== -dx || newDir.y !== -dy) {
                    dx = newDir.x;
                    dy = newDir.y;
                }
            }
        });

        // Touch controls
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', (e) => {
            if (!isGameRunning || isPaused) return;

            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;

            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                // Horizontal swipe
                if (deltaX > 0 && dx !== -1) {
                    dx = 1;
                    dy = 0;
                } else if (deltaX < 0 && dx !== 1) {
                    dx = -1;
                    dy = 0;
                }
            } else {
                // Vertical swipe
                if (deltaY > 0 && dy !== -1) {
                    dx = 0;
                    dy = 1;
                } else if (deltaY < 0 && dy !== 1) {
                    dx = 0;
                    dy = -1;
                }
            }
        });

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        gridToggle.addEventListener('click', () => {
            showGrid = !showGrid;
            gridToggle.textContent = `Grid: ${showGrid ? 'ON' : 'OFF'}`;
            draw();
        });

        // Initial draw
        draw();
    </script>
</body>
</html>
