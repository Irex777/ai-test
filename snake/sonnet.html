<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #eee;
            overflow: hidden;
        }
        
        .game-container {
            text-align: center;
        }
        
        .score-board {
            display: flex;
            justify-content: space-around;
            margin-bottom: 10px;
            font-size: 18px;
        }
        
        .score {
            color: #00ff88;
        }
        
        .high-score {
            color: #ff6b6b;
        }
        
        #gameCanvas {
            border: 3px solid #00ff88;
            background: #16213e;
            display: block;
            margin: 0 auto;
        }
        
        .start-screen, .game-over-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(26, 26, 46, 0.95);
            padding: 40px;
            border-radius: 10px;
            border: 2px solid #00ff88;
            z-index: 10;
        }
        
        .start-screen h1, .game-over-screen h1 {
            color: #00ff88;
            margin-bottom: 20px;
            font-size: 48px;
        }
        
        .start-screen p, .game-over-screen p {
            margin: 10px 0;
            font-size: 16px;
        }
        
        .start-btn {
            background: #00ff88;
            color: #1a1a2e;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            transition: transform 0.2s;
        }
        
        .start-btn:hover {
            transform: scale(1.05);
        }
        
        .hidden {
            display: none;
        }
        
        .controls-info {
            margin-top: 15px;
            font-size: 14px;
            color: #aaa;
        }
        
        .final-score {
            color: #ff6b6b;
            font-size: 24px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="score-board">
            <div>Score: <span id="score" class="score">0</span></div>
            <div>High Score: <span id="highScore" class="high-score">0</span></div>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div id="startScreen" class="start-screen">
            <h1>🐍 SNAKE</h1>
            <p>Use arrow keys to control the snake</p>
            <p>Swipe on touch devices</p>
            <p>Eat food to grow and score points!</p>
            <button class="start-btn" onclick="startGame()">START GAME</button>
            <div class="controls-info">
                <p>⬆️ ⬇️ ⬅️ ➡️ Arrow Keys</p>
                <p>📱 Touch: Swipe in any direction</p>
            </div>
        </div>
        
        <div id="gameOverScreen" class="game-over-screen hidden">
            <h1>GAME OVER</h1>
            <p class="final-score">Final Score: <span id="finalScore">0</span></p>
            <p>High Score: <span id="finalHighScore">0</span></p>
            <button class="start-btn" onclick="restartGame()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreElement = document.getElementById('finalScore');
        const finalHighScoreElement = document.getElementById('finalHighScore');

        // Game constants
        const GRID_SIZE = 20;
        const CANVAS_SIZE = 400;
        const CELL_SIZE = CANVAS_SIZE / GRID_SIZE;
        const INITIAL_SPEED = 150;
        const SPEED_INCREMENT = 5;
        const MIN_SPEED = 50;

        // Game state
        let snake = [];
        let food = {};
        let direction = 'right';
        let nextDirection = 'right';
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop = null;
        let speed = INITIAL_SPEED;
        let gameRunning = false;

        // Initialize high score display
        highScoreElement.textContent = highScore;

        // Draw grid overlay
        function drawGrid() {
            ctx.strokeStyle = '#1e3a5f';
            ctx.lineWidth = 0.5;
            
            for (let i = 0; i <= GRID_SIZE; i++) {
                // Vertical lines
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, CANVAS_SIZE);
                ctx.stroke();
                
                // Horizontal lines
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(CANVAS_SIZE, i * CELL_SIZE);
                ctx.stroke();
            }
        }

        // Draw snake
        function drawSnake() {
            snake.forEach((segment, index) => {
                const gradient = ctx.createRadialGradient(
                    segment.x * CELL_SIZE + CELL_SIZE / 2,
                    segment.y * CELL_SIZE + CELL_SIZE / 2,
                    2,
                    segment.x * CELL_SIZE + CELL_SIZE / 2,
                    segment.y * CELL_SIZE + CELL_SIZE / 2,
                    CELL_SIZE / 2
                );
                
                if (index === 0) {
                    // Head - brighter color
                    gradient.addColorStop(0, '#00ff88');
                    gradient.addColorStop(1, '#00cc6a');
                } else {
                    // Body - gradient based on position
                    const brightness = Math.max(0.3, 1 - (index / snake.length) * 0.7);
                    gradient.addColorStop(0, `rgba(0, 255, 136, ${brightness})`);
                    gradient.addColorStop(1, `rgba(0, 180, 100, ${brightness})`);
                }
                
                ctx.fillStyle = gradient;
                ctx.fillRect(
                    segment.x * CELL_SIZE + 1,
                    segment.y * CELL_SIZE + 1,
                    CELL_SIZE - 2,
                    CELL_SIZE - 2
                );
                
                // Draw eyes on head
                if (index === 0) {
                    ctx.fillStyle = '#1a1a2e';
                    const eyeSize = 3;
                    let eye1X, eye1Y, eye2X, eye2Y;
                    
                    switch(direction) {
                        case 'up':
                            eye1X = segment.x * CELL_SIZE + CELL_SIZE * 0.3;
                            eye1Y = segment.y * CELL_SIZE + CELL_SIZE * 0.3;
                            eye2X = segment.x * CELL_SIZE + CELL_SIZE * 0.7;
                            eye2Y = segment.y * CELL_SIZE + CELL_SIZE * 0.3;
                            break;
                        case 'down':
                            eye1X = segment.x * CELL_SIZE + CELL_SIZE * 0.3;
                            eye1Y = segment.y * CELL_SIZE + CELL_SIZE * 0.7;
                            eye2X = segment.x * CELL_SIZE + CELL_SIZE * 0.7;
                            eye2Y = segment.y * CELL_SIZE + CELL_SIZE * 0.7;
                            break;
                        case 'left':
                            eye1X = segment.x * CELL_SIZE + CELL_SIZE * 0.3;
                            eye1Y = segment.y * CELL_SIZE + CELL_SIZE * 0.3;
                            eye2X = segment.x * CELL_SIZE + CELL_SIZE * 0.3;
                            eye2Y = segment.y * CELL_SIZE + CELL_SIZE * 0.7;
                            break;
                        case 'right':
                            eye1X = segment.x * CELL_SIZE + CELL_SIZE * 0.7;
                            eye1Y = segment.y * CELL_SIZE + CELL_SIZE * 0.3;
                            eye2X = segment.x * CELL_SIZE + CELL_SIZE * 0.7;
                            eye2Y = segment.y * CELL_SIZE + CELL_SIZE * 0.7;
                            break;
                    }
                    
                    ctx.beginPath();
                    ctx.arc(eye1X, eye1Y, eyeSize, 0, Math.PI * 2);
                    ctx.arc(eye2X, eye2Y, eyeSize, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        // Draw food
        function drawFood() {
            const gradient = ctx.createRadialGradient(
                food.x * CELL_SIZE + CELL_SIZE / 2,
                food.y * CELL_SIZE + CELL_SIZE / 2,
                2,
                food.x * CELL_SIZE + CELL_SIZE / 2,
                food.y * CELL_SIZE + CELL_SIZE / 2,
                CELL_SIZE / 2
            );
            gradient.addColorStop(0, '#ff6b6b');
            gradient.addColorStop(1, '#cc5555');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(
                food.x * CELL_SIZE + CELL_SIZE / 2,
                food.y * CELL_SIZE + CELL_SIZE / 2,
                CELL_SIZE / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            
            // Add shine effect
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.beginPath();
            ctx.arc(
                food.x * CELL_SIZE + CELL_SIZE / 2 - 3,
                food.y * CELL_SIZE + CELL_SIZE / 2 - 3,
                3,
                0,
                Math.PI * 2
            );
            ctx.fill();
        }

        // Spawn food at random position
        function spawnFood() {
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * GRID_SIZE),
                    y: Math.floor(Math.random() * GRID_SIZE)
                };
            } while (snake.some(segment => segment.x === newFood.x && segment.y === newFood.y));
            
            food = newFood;
        }

        // Move snake
        function moveSnake() {
            direction = nextDirection;
            const head = { ...snake[0] };
            
            switch(direction) {
                case 'up': head.y--; break;
                case 'down': head.y++; break;
                case 'left': head.x--; break;
                case 'right': head.x++; break;
            }
            
            snake.unshift(head);
            
            // Check if snake ate food
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                spawnFood();
                increaseSpeed();
            } else {
                snake.pop();
            }
        }

        // Increase game speed
        function increaseSpeed() {
            speed = Math.max(MIN_SPEED, speed - SPEED_INCREMENT);
            clearInterval(gameLoop);
            gameLoop = setInterval(gameStep, speed);
        }

        // Check collisions
        function checkCollision() {
            const head = snake[0];
            
            // Wall collision
            if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                return true;
            }
            
            // Self collision (skip head)
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    return true;
                }
            }
            
            return false;
        }

        // Game over
        function gameOver() {
            gameRunning = false;
            clearInterval(gameLoop);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreElement.textContent = highScore;
            }
            
            finalScoreElement.textContent = score;
            finalHighScoreElement.textContent = highScore;
            gameOverScreen.classList.remove('hidden');
        }

        // Main game step
        function gameStep() {
            moveSnake();
            
            if (checkCollision()) {
                gameOver();
                return;
            }
            
            // Clear canvas and redraw
            ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
            drawGrid();
            drawFood();
            drawSnake();
        }

        // Initialize game
        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            speed = INITIAL_SPEED;
            scoreElement.textContent = score;
            spawnFood();
            
            // Initial draw
            ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
            drawGrid();
            drawFood();
            drawSnake();
        }

        // Start game
        function startGame() {
            startScreen.classList.add('hidden');
            initGame();
            gameRunning = true;
            gameLoop = setInterval(gameStep, speed);
        }

        // Restart game
        function restartGame() {
            gameOverScreen.classList.add('hidden');
            initGame();
            gameRunning = true;
            gameLoop = setInterval(gameStep, speed);
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            
            switch(e.key) {
                case 'ArrowUp':
                    if (direction !== 'down') nextDirection = 'up';
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    if (direction !== 'up') nextDirection = 'down';
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                    if (direction !== 'right') nextDirection = 'left';
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    if (direction !== 'left') nextDirection = 'right';
                    e.preventDefault();
                    break;
            }
        });

        // Touch controls
        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            if (!gameRunning) return;
            
            touchEndX = e.changedTouches[0].screenX;
            touchEndY = e.changedTouches[0].screenY;
            
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;
            
            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                // Horizontal swipe
                if (deltaX > 30 && direction !== 'left') {
                    nextDirection = 'right';
                } else if (deltaX < -30 && direction !== 'right') {
                    nextDirection = 'left';
                }
            } else {
                // Vertical swipe
                if (deltaY > 30 && direction !== 'up') {
                    nextDirection = 'down';
                } else if (deltaY < -30 && direction !== 'down') {
                    nextDirection = 'up';
                }
            }
            
            e.preventDefault();
        }, { passive: false });

        // Prevent scrolling on touch devices
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });

        // Initial setup
        initGame();
    </script>
</body>
</html>
