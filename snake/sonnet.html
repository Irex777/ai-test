<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0d0d;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    user-select: none;
  }
  h1 {
    font-size: 2rem;
    letter-spacing: 0.3em;
    color: #39ff14;
    text-shadow: 0 0 12px #39ff14aa;
    margin-bottom: 12px;
  }
  #scoreboard {
    display: flex;
    gap: 40px;
    margin-bottom: 10px;
    font-size: 1rem;
    letter-spacing: 0.1em;
  }
  #scoreboard span { color: #888; }
  #scoreboard strong { color: #39ff14; }
  #canvas-wrap {
    position: relative;
    border: 2px solid #39ff1444;
    box-shadow: 0 0 24px #39ff1422;
  }
  canvas { display: block; }
  #overlay {
    position: absolute;
    inset: 0;
    background: #0d0d0ddd;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  #overlay h2 {
    font-size: 2rem;
    letter-spacing: 0.2em;
    color: #39ff14;
    text-shadow: 0 0 10px #39ff14;
  }
  #overlay p {
    font-size: 0.9rem;
    color: #888;
    text-align: center;
    line-height: 1.6;
    white-space: pre-line;
  }
  .score-display {
    font-size: 1.2rem;
    color: #fff;
    min-height: 1.5em;
  }
  #start-btn {
    margin-top: 8px;
    padding: 10px 36px;
    background: transparent;
    border: 2px solid #39ff14;
    color: #39ff14;
    font-family: 'Courier New', monospace;
    font-size: 1rem;
    letter-spacing: 0.2em;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.2s, box-shadow 0.2s;
  }
  #start-btn:hover {
    background: #39ff1422;
    box-shadow: 0 0 16px #39ff1488;
  }
  #hint {
    margin-top: 4px;
    font-size: 0.75rem;
    color: #444;
    text-align: center;
  }
</style>
</head>
<body>
<h1>SNAKE</h1>
<div id="scoreboard">
  <div><span>SCORE </span><strong id="score-val">0</strong></div>
  <div><span>BEST &nbsp;</span><strong id="hi-val">0</strong></div>
  <div><span>SPEED </span><strong id="spd-val">1</strong></div>
</div>
<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div id="overlay">
    <h2 id="overlay-title">SNAKE</h2>
    <p id="overlay-sub">Arrow keys or WASD to move&#10;Swipe on mobile</p>
    <div class="score-display" id="overlay-score"></div>
    <button id="start-btn">START</button>
    <p id="hint">Press Space to start</p>
  </div>
</div>

<script>
const COLS = 25, ROWS = 25, CELL = 20;
const W = COLS * CELL, H = ROWS * CELL;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = W; canvas.height = H;

const scoreEl  = document.getElementById('score-val');
const hiEl     = document.getElementById('hi-val');
const spdEl    = document.getElementById('spd-val');
const overlay  = document.getElementById('overlay');
const oTitle   = document.getElementById('overlay-title');
const oSub     = document.getElementById('overlay-sub');
const oScore   = document.getElementById('overlay-score');
const startBtn = document.getElementById('start-btn');
const hint     = document.getElementById('hint');

let snake, dir, nextDir, food, score, hiScore, speed, loop, running;

function loadHi() {
  hiScore = parseInt(localStorage.getItem('snake_hi') || '0');
  hiEl.textContent = hiScore;
}
function saveHi() {
  localStorage.setItem('snake_hi', hiScore);
  hiEl.textContent = hiScore;
}

function rand(n) { return Math.floor(Math.random() * n); }

function spawnFood() {
  const occupied = new Set(snake.map(s => s.x + ',' + s.y));
  let fx, fy;
  do { fx = rand(COLS); fy = rand(ROWS); } while (occupied.has(fx + ',' + fy));
  food = { x: fx, y: fy };
}

function getSpeed(sc) {
  return Math.max(60, 200 - Math.floor(sc / 5) * 15);
}

function init() {
  const cx = Math.floor(COLS / 2), cy = Math.floor(ROWS / 2);
  snake = [{ x: cx, y: cy }, { x: cx - 1, y: cy }, { x: cx - 2, y: cy }];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  speed = getSpeed(0);
  scoreEl.textContent = 0;
  spdEl.textContent = 1;
  spawnFood();
}

function drawGrid() {
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= W; x += CELL) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y <= H; y += CELL) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

function drawFood() {
  const x = food.x * CELL, y = food.y * CELL;
  ctx.save();
  ctx.shadowBlur = 12;
  ctx.shadowColor = '#ff4444';
  ctx.fillStyle = '#ff3b3b';
  ctx.beginPath();
  ctx.arc(x + CELL / 2, y + CELL / 2, CELL / 2 - 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawSnake() {
  snake.forEach((seg, i) => {
    const t = 1 - i / snake.length;
    const g = Math.round(155 + t * 100);
    ctx.save();
    if (i === 0) { ctx.shadowBlur = 14; ctx.shadowColor = '#39ff14'; }
    ctx.fillStyle = i === 0 ? '#39ff14' : `rgb(30,${g},20)`;
    const pad = i === 0 ? 1 : 2;
    ctx.fillRect(seg.x * CELL + pad, seg.y * CELL + pad, CELL - pad * 2, CELL - pad * 2);
    ctx.restore();
  });
}

function draw() {
  ctx.fillStyle = '#0d0d0d';
  ctx.fillRect(0, 0, W, H);
  drawGrid();
  if (food) drawFood();
  if (snake) drawSnake();
}

function step() {
  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) { gameOver(); return; }
  if (snake.some(s => s.x === head.x && s.y === head.y)) { gameOver(); return; }
  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score++;
    scoreEl.textContent = score;
    if (score > hiScore) { hiScore = score; saveHi(); }
    spdEl.textContent = Math.floor(score / 5) + 1;
    const ns = getSpeed(score);
    if (ns !== speed) {
      speed = ns;
      clearInterval(loop);
      loop = setInterval(tick, speed);
    }
    spawnFood();
  } else {
    snake.pop();
  }
  draw();
}

function tick() { if (running) step(); }

function startGame() {
  init();
  draw();
  running = true;
  clearInterval(loop);
  loop = setInterval(tick, speed);
  overlay.style.display = 'none';
}

function gameOver() {
  running = false;
  clearInterval(loop);
  oTitle.textContent = 'GAME OVER';
  oSub.textContent = '';
  oScore.textContent = 'Score: ' + score + '   Best: ' + hiScore;
  startBtn.textContent = 'RESTART';
  hint.textContent = 'Press Space or tap to restart';
  overlay.style.display = 'flex';
}

function showStart() {
  loadHi();
  oTitle.textContent = 'SNAKE';
  oSub.textContent = 'Arrow keys or WASD to move\nSwipe on mobile';
  oScore.textContent = hiScore > 0 ? 'Best: ' + hiScore : '';
  startBtn.textContent = 'START';
  hint.textContent = 'Press Space to start';
  overlay.style.display = 'flex';
  draw();
}

const KEY_DIR = {
  ArrowUp:    { x: 0, y: -1 }, w: { x: 0, y: -1 }, W: { x: 0, y: -1 },
  ArrowDown:  { x: 0, y: 1 },  s: { x: 0, y: 1 },  S: { x: 0, y: 1 },
  ArrowLeft:  { x: -1, y: 0 }, a: { x: -1, y: 0 }, A: { x: -1, y: 0 },
  ArrowRight: { x: 1, y: 0 },  d: { x: 1, y: 0 },  D: { x: 1, y: 0 },
};

document.addEventListener('keydown', e => {
  const d = KEY_DIR[e.key];
  if (d) {
    e.preventDefault();
    if (running && (d.x !== -dir.x || d.y !== -dir.y)) nextDir = d;
  }
  if ((e.key === ' ' || e.key === 'Enter') && !running) startGame();
});

startBtn.addEventListener('click', startGame);

let tx0 = null, ty0 = null;
document.addEventListener('touchstart', e => {
  tx0 = e.touches[0].clientX; ty0 = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', e => {
  if (tx0 === null) return;
  const dx = e.changedTouches[0].clientX - tx0;
  const dy = e.changedTouches[0].clientY - ty0;
  tx0 = ty0 = null;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
  let d;
  if (Math.abs(dx) > Math.abs(dy)) d = dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 };
  else d = dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 };
  if (running && (d.x !== -dir.x || d.y !== -dir.y)) nextDir = d;
}, { passive: true });

ctx.fillStyle = '#0d0d0d';
ctx.fillRect(0, 0, W, H);
drawGrid();
showStart();
</script>
</body>
</html>
