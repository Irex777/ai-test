<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            color: #00ff00;
        }
        .game-container {
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00ff00;
        }
        .scores {
            display: flex;
            gap: 40px;
            justify-content: center;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }
        .score-box {
            background: #1a1a1a;
            padding: 10px 25px;
            border-radius: 8px;
            border: 2px solid #00ff00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }
        .score-box span {
            color: #ffff00;
        }
        #gameCanvas {
            border: 3px solid #00ff00;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.4);
            background: #0d0d0d;
        }
        .start-screen, .game-over-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px 60px;
            border-radius: 15px;
            border: 3px solid #00ff00;
            text-align: center;
            z-index: 10;
        }
        .start-screen h2, .game-over-screen h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00ff00;
        }
        .start-screen p, .game-over-screen p {
            margin: 10px 0;
            font-size: 1.1rem;
        }
        .btn {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-family: 'Courier New', monospace;
            background: #00ff00;
            color: #0a0a0a;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        .btn:hover {
            background: #00cc00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.6);
            transform: scale(1.05);
        }
        .controls {
            margin-top: 20px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
        .hidden {
            display: none;
        }
        .final-score {
            font-size: 1.5rem;
            color: #ffff00;
            margin: 15px 0;
        }
        .new-high {
            color: #ff6b6b;
            animation: pulse 0.5s infinite alternate;
        }
        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }
        .mobile-controls {
            display: none;
            margin-top: 20px;
            gap: 10px;
        }
        .mobile-btn {
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
            background: #1a1a1a;
            color: #00ff00;
            border: 2px solid #00ff00;
            border-radius: 10px;
            cursor: pointer;
        }
        .mobile-btn:active {
            background: #00ff00;
            color: #0a0a0a;
        }
        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
        }
        .d-pad button:nth-child(1) { grid-column: 2; }
        .d-pad button:nth-child(2) { grid-column: 1; grid-row: 2; }
        .d-pad button:nth-child(3) { grid-column: 3; grid-row: 2; }
        .d-pad button:nth-child(4) { grid-column: 2; grid-row: 3; }
        @media (max-width: 600px) {
            .mobile-controls {
                display: block;
            }
            .controls {
                display: none;
            }
            #gameCanvas {
                width: 320px;
                height: 320px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 SNAKE</h1>
        <div class="scores">
            <div class="score-box">Score: <span id="score">0</span></div>
            <div class="score-box">High Score: <span id="highScore">0</span></div>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <p class="controls">Use Arrow Keys or Swipe to move</p>
        
        <div class="mobile-controls">
            <div class="d-pad">
                <button class="mobile-btn" id="upBtn">↑</button>
                <button class="mobile-btn" id="leftBtn">←</button>
                <button class="mobile-btn" id="rightBtn">→</button>
                <button class="mobile-btn" id="downBtn">↓</button>
            </div>
        </div>
    </div>

    <div class="start-screen" id="startScreen">
        <h2>🐍 SNAKE GAME</h2>
        <p>Eat food to grow longer</p>
        <p>Avoid walls and yourself</p>
        <p>Speed increases with score!</p>
        <button class="btn" id="startBtn">START GAME</button>
        <p style="margin-top: 20px; font-size: 0.9rem; opacity: 0.7;">Arrow Keys or Swipe</p>
    </div>

    <div class="game-over-screen hidden" id="gameOverScreen">
        <h2>GAME OVER</h2>
        <div class="final-score">Score: <span id="finalScore">0</span></div>
        <div id="newHighScore" class="new-high hidden">🎉 NEW HIGH SCORE! 🎉</div>
        <button class="btn" id="restartBtn">PLAY AGAIN</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{x: 10, y: 10}];
        let velocityX = 0;
        let velocityY = 0;
        let food = {x: 15, y: 15};
        let score = 0;
        let highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
        let gameLoop;
        let gameSpeed = 150;
        let gameRunning = false;
        let lastVelocityX = 0;
        let lastVelocityY = 0;

        document.getElementById('highScore').textContent = highScore;

        function drawGrid() {
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
        }

        function drawSnake() {
            snake.forEach((segment, index) => {
                if (index === 0) {
                    ctx.fillStyle = '#00ff00';
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#00ff00';
                } else {
                    ctx.fillStyle = '#00cc00';
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = '#00cc00';
                }
                ctx.fillRect(segment.x * gridSize + 1, segment.y * gridSize + 1, gridSize - 2, gridSize - 2);
            });
            ctx.shadowBlur = 0;
        }

        function drawFood() {
            ctx.fillStyle = '#ff6b6b';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ff6b6b';
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function moveSnake() {
            const head = {x: snake[0].x + velocityX, y: snake[0].y + velocityY};
            
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }
            
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }
            
            snake.unshift(head);
            
            if (head.x === food.x && head.y === food.y) {
                score++;
                document.getElementById('score').textContent = score;
                spawnFood();
                
                if (score % 3 === 0 && gameSpeed > 50) {
                    gameSpeed -= 5;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(gameStep, gameSpeed);
                }
            } else {
                snake.pop();
            }
            
            lastVelocityX = velocityX;
            lastVelocityY = velocityY;
        }

        function spawnFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }

        function gameStep() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGrid();
            moveSnake();
            if (gameRunning) {
                drawFood();
                drawSnake();
            }
        }

        function gameOver() {
            gameRunning = false;
            clearInterval(gameLoop);
            
            document.getElementById('finalScore').textContent = score;
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
                document.getElementById('newHighScore').classList.remove('hidden');
            } else {
                document.getElementById('newHighScore').classList.add('hidden');
            }
            
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        function startGame() {
            snake = [{x: 10, y: 10}];
            velocityX = 0;
            velocityY = 0;
            score = 0;
            gameSpeed = 150;
            gameRunning = true;
            lastVelocityX = 0;
            lastVelocityY = 0;
            
            document.getElementById('score').textContent = score;
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            
            spawnFood();
            gameLoop = setInterval(gameStep, gameSpeed);
        }

        function setDirection(x, y) {
            if (!gameRunning) return;
            if (x !== 0 && lastVelocityX !== 0) return;
            if (y !== 0 && lastVelocityY !== 0) return;
            velocityX = x;
            velocityY = y;
        }

        document.addEventListener('keydown', (e) => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
                e.preventDefault();
            }
            switch(e.key) {
                case 'ArrowUp': setDirection(0, -1); break;
                case 'ArrowDown': setDirection(0, 1); break;
                case 'ArrowLeft': setDirection(-1, 0); break;
                case 'ArrowRight': setDirection(1, 0); break;
                case ' ': 
                    if (!gameRunning) startGame();
                    break;
            }
        });

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);

        document.getElementById('upBtn').addEventListener('click', () => setDirection(0, -1));
        document.getElementById('downBtn').addEventListener('click', () => setDirection(0, 1));
        document.getElementById('leftBtn').addEventListener('click', () => setDirection(-1, 0));
        document.getElementById('rightBtn').addEventListener('click', () => setDirection(1, 0));

        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, {passive: true});

        canvas.addEventListener('touchend', (e) => {
            if (!gameRunning) return;
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                setDirection(dx > 0 ? 1 : -1, 0);
            } else if (Math.abs(dy) > 10) {
                setDirection(0, dy > 0 ? 1 : -1);
            }
        }, {passive: true});

        drawGrid();
    </script>
</body>
</html>
