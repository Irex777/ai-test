<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Snake</title>
<style>
  :root{
    --bg:#0f1117; --panel:#161a23; --grid:#1c2230;
    --accent:#4ade80; --accent2:#22c55e; --food:#f43f5e;
    --text:#e5e7eb; --muted:#6b7280; --border:#242b3a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{
    height:100%;
    background:radial-gradient(circle at 50% 0%,#1a1f2e 0%,var(--bg) 70%);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;-webkit-tap-highlight-color:transparent;touch-action:none;
  }
  .wrap{display:flex;flex-direction:column;align-items:center;gap:14px;padding:16px}
  .hud{display:flex;justify-content:space-between;align-items:center;width:100%;gap:12px}
  .stat{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:10px 18px;min-width:130px;flex:1;text-align:center}
  .stat span{display:block;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
  .stat b{font-size:26px;color:var(--accent)}
  .stat.high b{color:#facc15}
  .board{position:relative;border-radius:14px;overflow:hidden;border:1px solid var(--border);
    box-shadow:0 20px 60px rgba(0,0,0,.5),inset 0 0 0 1px rgba(255,255,255,.02)}
  canvas{display:block;background:var(--bg)}
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:14px;text-align:center;background:rgba(15,17,23,.85);backdrop-filter:blur(6px);
    transition:opacity .25s ease;padding:24px}
  .overlay.hidden{opacity:0;pointer-events:none}
  .overlay h1{font-size:46px;font-weight:800;letter-spacing:2px;
    background:linear-gradient(135deg,var(--accent),#22d3ee);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .overlay h2{font-size:34px;font-weight:800;color:var(--food)}
  .overlay p{color:var(--muted);font-size:14px;line-height:1.6;max-width:320px}
  .overlay p b{color:var(--text)}
  .overlay .final{font-size:20px;color:var(--text)}
  .overlay .final b{color:var(--accent)}
  button{margin-top:6px;background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#052e16;border:none;border-radius:10px;padding:13px 34px;font-size:16px;font-weight:700;
    cursor:pointer;letter-spacing:.5px;transition:transform .1s ease,box-shadow .2s ease;
    box-shadow:0 6px 20px rgba(74,222,128,.3)}
  button:active{transform:scale(.96)}
  .hint{color:var(--muted);font-size:12px;margin-top:2px}
  .newbest{color:#facc15;font-weight:700;font-size:15px;display:none}
  .newbest.show{display:block;animation:pulse 1s ease infinite}
  @keyframes pulse{50%{opacity:.5}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hud">
    <div class="stat"><span>Score</span><b id="score">0</b></div>
    <div class="stat high"><span>Best</span><b id="best">0</b></div>
  </div>
  <div class="board" id="board">
    <canvas id="game" width="420" height="420"></canvas>
    <div class="overlay" id="overlay">
      <h1>SNAKE</h1>
      <p>Use <b>arrow keys</b> or <b>WASD</b> to move.<br>Swipe to steer on touch devices.<br>Eat the food, grow longer, don't crash.</p>
      <button id="startBtn">Play</button>
    </div>
  </div>
  <div class="hint">Arrow keys / WASD / Swipe &nbsp;·&nbsp; Space to pause</div>
</div>

<script>
(() => {
  const canvas  = document.getElementById('game');
  const ctx     = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const scoreEl = document.getElementById('score');
  const bestEl  = document.getElementById('best');
  const board   = document.getElementById('board');

  const GRID = 21;                      // cells per side
  const CELL = canvas.width / GRID;     // pixel size per cell

  const State = { READY:0, PLAYING:1, OVER:2, PAUSED:3 };
  let state = State.READY;

  let snake, dir, nextDir, food, score, best, tickMs, acc, last, raf;

  best = parseInt(localStorage.getItem('snake_best') || '0', 10);
  bestEl.textContent = best;

  function reset(){
    const m = Math.floor(GRID/2);
    snake   = [{x:m,y:m},{x:m-1,y:m},{x:m-2,y:m}];
    dir     = {x:1,y:0};
    nextDir = dir;
    score   = 0;
    tickMs  = 140;                      // starting speed (ms per step)
    acc     = 0;
    last    = 0;
    scoreEl.textContent = '0';
    placeFood();
  }

  function placeFood(){
    const free = [];
    for (let y=0;y<GRID;y++)
      for (let x=0;x<GRID;x++)
        if (!snake.some(s=>s.x===x&&s.y===y)) free.push({x,y});
    food = free.length ? free[Math.floor(Math.random()*free.length)] : null;
  }

  function start(){
    reset();
    state = State.PLAYING;
    overlay.classList.add('hidden');
    last = performance.now();
    cancelAnimationFrame(raf);
    raf = requestAnimationFrame(loop);
  }

  function gameOver(){
    state = State.OVER;
    const isNew = score > best;
    if (isNew){ best = score; localStorage.setItem('snake_best', String(best)); bestEl.textContent = best; }
    overlay.innerHTML =
      '<h2>Game Over</h2>'+
      '<div class="final">Score: <b>'+score+'</b></div>'+
      '<div class="newbest '+(isNew?'show':'')+'">★ New Best! ★</div>'+
      '<p>Press <b>Enter</b> or tap to play again.</p>'+
      '<button id="startBtn">Play Again</button>';
    overlay.classList.remove('hidden');
    document.getElementById('startBtn').addEventListener('click', start);
  }

  function step(){
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // wall collision
    if (head.x<0 || head.y<0 || head.x>=GRID || head.y>=GRID) return gameOver();
    // self collision (ignore tail cell — it will move away unless we grow)
    for (let i=0;i<snake.length-1;i++)
      if (snake[i].x===head.x && snake[i].y===head.y) return gameOver();

    snake.unshift(head);

    if (food && head.x===food.x && head.y===food.y){
      score += 10;
      scoreEl.textContent = score;
      tickMs = Math.max(60, tickMs - 6);    // speed up, capped
      placeFood();
    } else {
      snake.pop();
    }
  }

  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function draw(){
    // background
    ctx.fillStyle = '#0f1117';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // grid overlay
    ctx.strokeStyle = '#1c2230';
    ctx.lineWidth = 1;
    for (let i=0;i<=GRID;i++){
      const p = i*CELL + 0.5;
      ctx.beginPath(); ctx.moveTo(p,0); ctx.lineTo(p,canvas.height); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,p); ctx.lineTo(canvas.width,p); ctx.stroke();
    }

    // food (pulsing glow + core)
    if (food){
      const cx = food.x*CELL + CELL/2;
      const cy = food.y*CELL + CELL/2;
      const pulse = Math.sin(performance.now()/200)*0.12 + 0.88;
      ctx.fillStyle = 'rgba(244,63,94,0.25)';
      ctx.beginPath(); ctx.arc(cx,cy, CELL*0.7*pulse, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#f43f5e';
      ctx.beginPath(); ctx.arc(cx,cy, CELL*0.32, 0, Math.PI*2); ctx.fill();
    }

    // snake (tail→head so head sits on top)
    for (let i=snake.length-1;i>=0;i--){
      const s = snake[i];
      const t = i/snake.length;
      const x = s.x*CELL, y = s.y*CELL, pad = 1.5, r = 5;
      if (i===0) ctx.fillStyle = '#86efac';                 // head
      else       ctx.fillStyle = 'hsl(142,70%,'+(55-t*20)+'%)'; // body gradient
      roundRect(x+pad,y+pad, CELL-pad*2, CELL-pad*2, r);
      ctx.fill();

      // eyes on the head, oriented along direction
      if (i===0){
        ctx.fillStyle = '#052e16';
        const ex=dir.x, ey=dir.y, eo=CELL*0.28, off=CELL*0.12;
        const e1={x:x+CELL/2+ey*eo-ex*off, y:y+CELL/2-ex*eo-ey*off};
        const e2={x:x+CELL/2-ey*eo-ex*off, y:y+CELL/2+ex*eo-ey*off};
        ctx.beginPath(); ctx.arc(e1.x,e1.y,1.9,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(e2.x,e2.y,1.9,0,Math.PI*2); ctx.fill();
      }
    }
  }

  function loop(now){
    if (state!==State.PLAYING){ draw(); return; }
    const dt = now - last; last = now;
    acc += dt;
    while (acc >= tickMs){
      acc -= tickMs;
      step();
      if (state!==State.PLAYING) break;
    }
    draw();
    raf = requestAnimationFrame(loop);
  }

  // --- Input ---
  function setDir(nx,ny){
    if (nx===-dir.x && ny===-dir.y) return; // no instant reversal
    if (nx===dir.x && ny===dir.y)   return;
    nextDir = {x:nx,y:ny};
  }

  const keymap = {
    ArrowUp:[0,-1], ArrowDown:[0,1], ArrowLeft:[-1,0], ArrowRight:[1,0],
    w:[0,-1], s:[0,1], a:[-1,0], d:[1,0],
    W:[0,-1], S:[0,1], A:[-1,0], D:[1,0]
  };

  document.addEventListener('keydown', e => {
    if (keymap[e.key]){
      e.preventDefault();
      if (state===State.PLAYING) setDir(keymap[e.key][0], keymap[e.key][1]);
    } else if (e.key===' '){
      e.preventDefault(); togglePause();
    } else if (e.key==='Enter'){
      if (state===State.READY || state===State.OVER) start();
    }
  });

  function togglePause(){
    if (state===State.PLAYING){
      state = State.PAUSED;
      overlay.innerHTML = '<h1>PAUSED</h1><p>Press <b>Space</b> or tap to resume.</p><button id="startBtn">Resume</button>';
      overlay.classList.remove('hidden');
      document.getElementById('startBtn').addEventListener('click', togglePause);
    } else if (state===State.PAUSED){
      state = State.PLAYING;
      overlay.classList.add('hidden');
      last = performance.now();
      raf = requestAnimationFrame(loop);
    }
  }

  // --- Touch / swipe controls ---
  let touchStart = null;
  board.addEventListener('touchstart', e => {
    const t = e.changedTouches[0];
    touchStart = {x:t.clientX, y:t.clientY};
  }, {passive:true});

  board.addEventListener('touchmove', e => {
    if (!touchStart || state!==State.PLAYING) return;
    const t  = e.changedTouches[0];
    const dx = t.clientX - touchStart.x;
    const dy = t.clientY - touchStart.y;
    const TH = 24;
    if (Math.abs(dx)<TH && Math.abs(dy)<TH) return;
    if (Math.abs(dx) > Math.abs(dy)) setDir(dx>0?1:-1, 0);
    else                              setDir(0, dy>0?1:-1);
    touchStart = {x:t.clientX, y:t.clientY};
  }, {passive:true});

  board.addEventListener('touchend', () => { touchStart = null; }, {passive:true});

  // tap the board to start / restart
  board.addEventListener('click', () => {
    if (state===State.READY || state===State.OVER) start();
  });

  document.getElementById('startBtn').addEventListener('click', start);

  // initial paint on the start screen
  reset();
  draw();
})();
</script>
</body>
</html>
