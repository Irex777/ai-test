<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Snake Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      overflow: hidden;
      touch-action: none;
    }
    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .scores {
      display: flex;
      gap: 40px;
      font-size: 18px;
      font-weight: 600;
    }
    .scores span {
      color: #4ade80;
    }
    .scores .high-score {
      color: #f59e0b;
    }
    .canvas-wrapper {
      position: relative;
      border: 2px solid #333;
      border-radius: 8px;
      overflow: hidden;
    }
    canvas {
      display: block;
      background: #111;
    }
    .start-screen, .game-over-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .game-over-screen {
      display: none;
    }
    .start-screen h1, .game-over-screen h1 {
      font-size: 48px;
      color: #4ade80;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
    }
    .game-over-screen h1 {
      color: #ef4444;
      text-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
    }
    .start-screen p, .game-over-screen p {
      font-size: 16px;
      color: #888;
      margin-bottom: 30px;
    }
    .btn {
      padding: 14px 40px;
      font-size: 18px;
      font-weight: 600;
      background: #4ade80;
      color: #000;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
    }
    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(74, 222, 128, 0.4);
    }
    .controls {
      margin-top: 16px;
      font-size: 14px;
      color: #555;
      text-align: center;
    }
    .final-score {
      font-size: 24px;
      margin-bottom: 20px;
    }
    .new-high {
      color: #f59e0b;
      animation: pulse 0.5s ease-in-out infinite alternate;
    }
    @keyframes pulse {
      from { transform: scale(1); }
      to { transform: scale(1.1); }
    }
    @media (max-width: 500px) {
      .scores {
        font-size: 14px;
        gap: 20px;
      }
      .start-screen h1, .game-over-screen h1 {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="scores">
      <div>Score: <span id="score">0</span></div>
      <div class="high-score">High Score: <span id="highScore">0</span></div>
    </div>
    <div class="canvas-wrapper">
      <canvas id="gameCanvas" width="400" height="400"></canvas>
      <div class="start-screen" id="startScreen">
        <h1>🐍 Snake</h1>
        <p>Use arrow keys or swipe to move</p>
        <button class="btn" id="startBtn">Start Game</button>
      </div>
      <div class="game-over-screen" id="gameOverScreen">
        <h1>Game Over</h1>
        <p class="final-score">Score: <span id="finalScore">0</span></p>
        <p id="newHigh" class="new-high" style="display:none">🏆 New High Score!</p>
        <button class="btn" id="restartBtn">Play Again</button>
      </div>
    </div>
    <div class="controls">
      Arrow Keys / Swipe to move • Eat food to grow
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const startScreen = document.getElementById('startScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('highScore');
    const finalScoreEl = document.getElementById('finalScore');
    const newHighEl = document.getElementById('newHigh');

    const gridSize = 20;
    const tileCount = canvas.width / gridSize;

    let snake = [{x: 10, y: 10}];
    let food = {x: 15, y: 15};
    let dx = 0;
    let dy = 0;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
    let gameLoop;
    let baseSpeed = 150;
    let speed = baseSpeed;
    let gameRunning = false;
    let lastDir = {x: 0, y: 0};

    highScoreEl.textContent = highScore;

    function drawGrid() {
      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= tileCount; i++) {
        ctx.beginPath();
        ctx.moveTo(i * gridSize, 0);
        ctx.lineTo(i * gridSize, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * gridSize);
        ctx.lineTo(canvas.width, i * gridSize);
        ctx.stroke();
      }
    }

    function drawSnake() {
      snake.forEach((segment, index) => {
        const gradient = ctx.createRadialGradient(
          segment.x * gridSize + gridSize/2,
          segment.y * gridSize + gridSize/2,
          0,
          segment.x * gridSize + gridSize/2,
          segment.y * gridSize + gridSize/2,
          gridSize/2
        );
        if (index === 0) {
          gradient.addColorStop(0, '#4ade80');
          gradient.addColorStop(1, '#22c55e');
        } else {
          gradient.addColorStop(0, '#22c55e');
          gradient.addColorStop(1, '#16a34a');
        }
        ctx.fillStyle = gradient;
        ctx.fillRect(
          segment.x * gridSize + 1,
          segment.y * gridSize + 1,
          gridSize - 2,
          gridSize - 2
        );
        
        if (index === 0) {
          ctx.fillStyle = '#000';
          ctx.beginPath();
          ctx.arc(segment.x * gridSize + 7, segment.y * gridSize + 7, 2, 0, Math.PI * 2);
          ctx.arc(segment.x * gridSize + 13, segment.y * gridSize + 7, 2, 0, Math.PI * 2);
          ctx.fill();
        }
      });
    }

    function drawFood() {
      const gradient = ctx.createRadialGradient(
        food.x * gridSize + gridSize/2,
        food.y * gridSize + gridSize/2,
        0,
        food.x * gridSize + gridSize/2,
        food.y * gridSize + gridSize/2,
        gridSize/2
      );
      gradient.addColorStop(0, '#ef4444');
      gradient.addColorStop(1, '#dc2626');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(
        food.x * gridSize + gridSize/2,
        food.y * gridSize + gridSize/2,
        gridSize/2 - 2,
        0,
        Math.PI * 2
      );
      ctx.fill();
      
      ctx.fillStyle = '#fca5a5';
      ctx.beginPath();
      ctx.arc(
        food.x * gridSize + gridSize/2 - 3,
        food.y * gridSize + gridSize/2 - 3,
        2,
        0,
        Math.PI * 2
      );
      ctx.fill();
    }

    function spawnFood() {
      do {
        food = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };
      } while (snake.some(seg => seg.x === food.x && seg.y === food.y));
    }

    function update() {
      if (!gameRunning) return;

      const head = {x: snake[0].x + dx, y: snake[0].y + dy};

      if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount ||
          snake.some(seg => seg.x === head.x && seg.y === head.y)) {
        gameOver();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreEl.textContent = score;
        speed = Math.max(50, baseSpeed - Math.floor(score / 50) * 10);
        spawnFood();
        clearInterval(gameLoop);
        gameLoop = setInterval(gameStep, speed);
      } else {
        snake.pop();
      }

      lastDir = {x: dx, y: dy};
    }

    function draw() {
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawGrid();
      drawFood();
      drawSnake();
    }

    function gameStep() {
      update();
      draw();
    }

    function gameOver() {
      gameRunning = false;
      clearInterval(gameLoop);
      finalScoreEl.textContent = score;
      
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('snakeHighScore', highScore);
        highScoreEl.textContent = highScore;
        newHighEl.style.display = 'block';
      } else {
        newHighEl.style.display = 'none';
      }
      
      gameOverScreen.style.display = 'flex';
    }

    function startGame() {
      snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
      dx = 1;
      dy = 0;
      lastDir = {x: 1, y: 0};
      score = 0;
      speed = baseSpeed;
      scoreEl.textContent = score;
      spawnFood();
      startScreen.style.display = 'none';
      gameOverScreen.style.display = 'none';
      gameRunning = true;
      clearInterval(gameLoop);
      gameLoop = setInterval(gameStep, speed);
    }

    document.addEventListener('keydown', (e) => {
      if (!gameRunning) return;
      
      switch(e.key) {
        case 'ArrowUp':
          if (lastDir.y !== 1) { dx = 0; dy = -1; }
          break;
        case 'ArrowDown':
          if (lastDir.y !== -1) { dx = 0; dy = 1; }
          break;
        case 'ArrowLeft':
          if (lastDir.x !== 1) { dx = -1; dy = 0; }
          break;
        case 'ArrowRight':
          if (lastDir.x !== -1) { dx = 1; dy = 0; }
          break;
      }
      e.preventDefault();
    });

    let touchStartX = 0;
    let touchStartY = 0;

    canvas.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, {passive: true});

    canvas.addEventListener('touchend', (e) => {
      if (!gameRunning) return;
      
      const touchEndX = e.changedTouches[0].clientX;
      const touchEndY = e.changedTouches[0].clientY;
      const diffX = touchEndX - touchStartX;
      const diffY = touchEndY - touchStartY;

      if (Math.abs(diffX) > Math.abs(diffY)) {
        if (diffX > 30 && lastDir.x !== -1) { dx = 1; dy = 0; }
        else if (diffX < -30 && lastDir.x !== 1) { dx = -1; dy = 0; }
      } else {
        if (diffY > 30 && lastDir.y !== -1) { dx = 0; dy = 1; }
        else if (diffY < -30 && lastDir.y !== 1) { dx = 0; dy = -1; }
      }
    }, {passive: true});

    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', startGame);

    draw();
  </script>
</body>
</html>
