<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dark Snake</title>
    <style>
        :root {
            --bg-color: #121212;
            --game-bg: #1e1e1e;
            --snake-color: #00ff9d;
            --food-color: #ff4757;
            --text-color: #ffffff;
            --grid-color: #2c2c2c;
            --accent-color: #2ed573;
        }

        * {
            box-sizing: border-box;
            touch-action: none; /* Prevents scrolling on mobile */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border: 2px solid #333;
            border-radius: 4px;
        }

        canvas {
            background-color: var(--game-bg);
            display: block;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(18, 18, 18, 0.85);
            z-index: 10;
            transition: opacity 0.3s;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            margin: 0 0 20px 0;
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--snake-color);
            text-shadow: 0 0 10px rgba(0, 255, 157, 0.3);
        }

        .score-board {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: bold;
            pointer-events: none;
            z-index: 5;
            text-shadow: 1px 1px 2px black;
        }

        button {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: transparent;
            color: var(--snake-color);
            border: 2px solid var(--snake-color);
            border-radius: 30px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.2s;
            outline: none;
        }

        button:hover {
            background: var(--snake-color);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--snake-color);
        }

        .controls-hint {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="score-board">
            <span>Score: <span id="score">0</span></span>
            <span>High Score: <span id="high-score">0</span></span>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <!-- Start Screen -->
        <div id="start-screen" class="ui-layer">
            <h1>SNAKE</h1>
            <button id="start-btn">Start Game</button>
            <div class="controls-hint">Use Arrow Keys or Swipe</div>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="ui-layer hidden">
            <h1 style="color: var(--food-color);">Game Over</h1>
            <p style="font-size: 1.5rem; margin-bottom: 20px;">Score: <span id="final-score">0</span></p>
            <button id="restart-btn">Try Again</button>
        </div>
    </div>

    <script>
        // --- Configuration ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('high-score');
        const finalScoreEl = document.getElementById('final-score');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');

        // Game constants
        const GRID_SIZE = 20;
        const TILE_COUNT = canvas.width / GRID_SIZE;
        const INITIAL_SPEED = 150; // ms per frame
        
        // Game State
        let snake = [];
        let food = { x: 0, y: 0 };
        let velocity = { x: 0, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameSpeed = INITIAL_SPEED;
        let gameLoopTimeout;
        let isGameRunning = false;
        let lastInputDirection = { x: 0, y: 0 }; // Prevents double-turn suicide

        // Initialize High Score UI
        highScoreEl.innerText = highScore;

        // --- Input Handling ---

        // Keyboard
        document.addEventListener('keydown', keyDownEvent);

        function keyDownEvent(e) {
            if (!isGameRunning) return;

            switch(e.keyCode) {
                case 37: // Left
                    if (lastInputDirection.x !== 1) velocity = { x: -1, y: 0 };
                    break;
                case 38: // Up
                    if (lastInputDirection.y !== 1) velocity = { x: 0, y: -1 };
                    break;
                case 39: // Right
                    if (lastInputDirection.x !== -1) velocity = { x: 1, y: 0 };
                    break;
                case 40: // Down
                    if (lastInputDirection.y !== -1) velocity = { x: 0, y: 1 };
                    break;
            }
        }

        // Touch (Swipe)
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', function(e) {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, false);

        canvas.addEventListener('touchend', function(e) {
            if (!isGameRunning) return;
            
            let touchEndX = e.changedTouches[0].screenX;
            let touchEndY = e.changedTouches[0].screenY;
            
            handleSwipe(touchStartX, touchStartY, touchEndX, touchEndY);
        }, false);

        function handleSwipe(startX, startY, endX, endY) {
            let xDiff = endX - startX;
            let yDiff = endY - startY;

            if (Math.abs(xDiff) > Math.abs(yDiff)) {
                // Horizontal swipe
                if (xDiff > 0 && lastInputDirection.x !== -1) {
                    velocity = { x: 1, y: 0 }; // Right
                } else if (xDiff < 0 && lastInputDirection.x !== 1) {
                    velocity = { x: -1, y: 0 }; // Left
                }
            } else {
                // Vertical swipe
                if (yDiff > 0 && lastInputDirection.y !== -1) {
                    velocity = { x: 0, y: 1 }; // Down
                } else if (yDiff < 0 && lastInputDirection.y !== 1) {
                    velocity = { x: 0, y: -1 }; // Up
                }
            }
        }

        // --- Game Logic ---

        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            score = 0;
            velocity = { x: 1, y: 0 }; // Start moving right
            lastInputDirection = { x: 1, y: 0 };
            gameSpeed = INITIAL_SPEED;
            scoreEl.innerText = score;
            isGameRunning = true;
            
            spawnFood();
            gameLoop();
        }

        function gameLoop() {
            if (!isGameRunning) return;

            // Move Snake
            const head = { x: snake[0].x + velocity.x, y: snake[0].y + velocity.y };
            lastInputDirection = { ...velocity }; // Update processed direction

            // Check Wall Collision
            if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) {
                gameOver();
                return;
            }

            // Check Self Collision
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head); // Add new head

            // Check Food Collision
            if (head.x === food.x && head.y === food.y) {
                score++;
                scoreEl.innerText = score;
                // Increase speed slightly per food
                if(gameSpeed > 50) gameSpeed -= 2; 
                spawnFood();
            } else {
                snake.pop(); // Remove tail if not eating
            }

            draw();
            gameLoopTimeout = setTimeout(gameLoop, gameSpeed);
        }

        function spawnFood() {
            // Random position
            food.x = Math.floor(Math.random() * TILE_COUNT);
            food.y = Math.floor(Math.random() * TILE_COUNT);

            // Ensure food doesn't spawn on snake body
            for (let part of snake) {
                if (part.x === food.x && part.y === food.y) {
                    spawnFood(); // Recursively try again
                    return;
                }
            }
        }

        function gameOver() {
            isGameRunning = false;
            clearTimeout(gameLoopTimeout);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreEl.innerText = highScore;
            }
            
            finalScoreEl.innerText = score;
            gameOverScreen.classList.remove('hidden');
        }

        // --- Rendering ---

        function draw() {
            // Clear Canvas
            ctx.fillStyle = '#1e1e1e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Grid Overlay
            ctx.strokeStyle = '#2c2c2c';
            ctx.lineWidth = 1;
            for (let i = 0; i < TILE_COUNT; i++) {
                // Vertical lines
                ctx.beginPath();
                ctx.moveTo(i * GRID_SIZE, 0);
                ctx.lineTo(i * GRID_SIZE, canvas.height);
                ctx.stroke();

                // Horizontal lines
                ctx.beginPath();
                ctx.moveTo(0, i * GRID_SIZE);
                ctx.lineTo(canvas.width, i * GRID_SIZE);
                ctx.stroke();
            }

            // Draw Food
            ctx.fillStyle = '#ff4757';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ff4757';
            ctx.beginPath();
            ctx.arc(
                (food.x * GRID_SIZE) + (GRID_SIZE/2), 
                (food.y * GRID_SIZE) + (GRID_SIZE/2), 
                (GRID_SIZE/2) - 2, 
                0, 
                2 * Math.PI
            );
            ctx.fill();
            ctx.shadowBlur = 0; // Reset shadow

            // Draw Snake
            ctx.fillStyle = '#00ff9d';
            snake.forEach((part, index) => {
                // Head is slightly different color or brighter
                if(index === 0) ctx.fillStyle = '#2ed573';
                else ctx.fillStyle = '#00ff9d';

                ctx.fillRect(
                    part.x * GRID_SIZE + 1, 
                    part.y * GRID_SIZE + 1, 
                    GRID_SIZE - 2, 
                    GRID_SIZE - 2
                );
            });
        }

        // --- Event Listeners for UI ---
        startBtn.addEventListener('click', () => {
            startScreen.classList.add('hidden');
            initGame();
        });

        restartBtn.addEventListener('click', () => {
            gameOverScreen.classList.add('hidden');
            initGame();
        });

        // Initial Draw to show grid
        draw();

    </script>
</body>
</html>
