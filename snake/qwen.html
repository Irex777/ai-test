<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Snake</title>
    <style>
        :root {
            --bg-color: #121212;
            --game-bg: #1e1e1e;
            --snake-color: #00ff9d;
            --food-color: #ff0055;
            --grid-color: #2a2a2a;
            --text-color: #ffffff;
            --accent-color: #00ccff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden; /* Prevent scrolling on mobile */
            touch-action: none; /* Disable default touch actions */
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            border: 2px solid #333;
        }

        canvas {
            background-color: var(--game-bg);
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let clicks pass through to canvas if needed */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .hud {
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
        }

        #start-screen, #game-over-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 2rem;
            text-align: center;
            border-radius: 8px;
            border: 1px solid var(--grid-color);
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 250px;
        }

        h1 { margin: 0; color: var(--snake-color); font-size: 2.5rem; text-transform: uppercase; letter-spacing: 2px; }
        h2 { margin: 0; color: var(--food-color); font-size: 2rem; }
        p { margin: 0; color: #ccc; }
        
        button {
            background: transparent;
            color: var(--snake-color);
            border: 2px solid var(--snake-color);
            padding: 10px 20px;
            font-family: inherit;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            font-weight: bold;
        }

        button:hover {
            background: var(--snake-color);
            color: #000;
            box-shadow: 0 0 15px var(--snake-color);
        }

        .hidden { display: none !important; }

        .controls-hint {
            margin-top: 10px;
            font-size: 0.8rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div id="ui-layer">
            <div class="hud">
                <div id="score-display">Score: 0</div>
                <div id="highscore-display">High: 0</div>
            </div>
        </div>

        <div id="start-screen">
            <h1>SNAKE</h1>
            <p>Use Arrow Keys or Swipe</p>
            <button id="start-btn">Start Game</button>
        </div>

        <div id="game-over-screen" class="hidden">
            <h2>GAME OVER</h2>
            <p id="final-score">Score: 0</p>
            <button id="restart-btn">Try Again</button>
        </div>
    </div>

    <script>
        // --- Configuration ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const scoreEl = document.getElementById('score-display');
        const highScoreEl = document.getElementById('highscore-display');
        const finalScoreEl = document.getElementById('final-score');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');

        // Game constants
        const GRID_SIZE = 20;
        const TILE_COUNT = canvas.width / GRID_SIZE; // 20x20 grid
        const INITIAL_SPEED = 150; // ms per frame
        const MIN_SPEED = 50; // Cap max speed
        const SPEED_DECREMENT = 2; // How much faster per food eaten

        // Game State
        let snake = [];
        let food = { x: 0, y: 0 };
        let dx = 0;
        let dy = 0;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameSpeed = INITIAL_SPEED;
        let gameLoopId;
        let isGameRunning = false;
        let lastRenderTime = 0;
        
        // Input buffering to prevent self-collision on quick turns
        let nextDx = 0;
        let nextDy = 0;

        // Initialize High Score UI
        highScoreEl.innerText = `High: ${highScore}`;

        // --- Game Logic ---

        function initGame() {
            // Start in the middle
            const startX = 10;
            const startY = 10;
            snake = [
                { x: startX, y: startY },
                { x: startX, y: startY + 1 },
                { x: startX, y: startY + 2 }
            ];
            
            score = 0;
            gameSpeed = INITIAL_SPEED;
            dx = 0;
            dy = -1; // Moving up initially
            nextDx = 0;
            nextDy = -1;
            
            scoreEl.innerText = `Score: ${score}`;
            spawnFood();
            
            isGameRunning = true;
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            
            // Start Loop
            window.requestAnimationFrame(mainLoop);
        }

        function spawnFood() {
            let validPosition = false;
            while (!validPosition) {
                food.x = Math.floor(Math.random() * TILE_COUNT);
                food.y = Math.floor(Math.random() * TILE_COUNT);

                // Don't spawn on snake body
                validPosition = !snake.some(segment => segment.x === food.x && segment.y === food.y);
            }
        }

        function mainLoop(currentTime) {
            if (!isGameRunning) return;

            window.requestAnimationFrame(mainLoop);

            const secondsSinceLastRender = (currentTime - lastRenderTime) / 1000;
            if (secondsSinceLastRender < gameSpeed / 1000) return;

            lastRenderTime = currentTime;

            update();
            draw();
        }

        function update() {
            // Apply buffered direction
            dx = nextDx;
            dy = nextDy;

            // Calculate new head position
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Check Wall Collision
            if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) {
                gameOver();
                return;
            }

            // Check Self Collision
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head); // Add new head

            // Check Food Collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.innerText = `Score: ${score}`;
                
                // Increase Speed
                if (gameSpeed > MIN_SPEED) {
                    gameSpeed -= SPEED_DECREMENT;
                }

                spawnFood();
                // Don't pop the tail, so snake grows
            } else {
                snake.pop(); // Remove tail
            }
        }

        function draw() {
            // Clear Canvas
            ctx.fillStyle = '#1e1e1e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Grid
            ctx.strokeStyle = '#2a2a2a';
            ctx.lineWidth = 1;
            for (let i = 0; i <= TILE_COUNT; i++) {
                // Vertical
                ctx.beginPath();
                ctx.moveTo(i * GRID_SIZE, 0);
                ctx.lineTo(i * GRID_SIZE, canvas.height);
                ctx.stroke();

                // Horizontal
                ctx.beginPath();
                ctx.moveTo(0, i * GRID_SIZE);
                ctx.lineTo(canvas.width, i * GRID_SIZE);
                ctx.stroke();
            }

            // Draw Food
            ctx.fillStyle = '#ff0055';
            ctx.shadowColor = '#ff0055';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(
                (food.x * GRID_SIZE) + (GRID_SIZE / 2), 
                (food.y * GRID_SIZE) + (GRID_SIZE / 2), 
                GRID_SIZE / 2 - 2, 
                0, 
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0; // Reset shadow

            // Draw Snake
            ctx.fillStyle = '#00ff9d';
            ctx.shadowColor = '#00ff9d';
            ctx.shadowBlur = 10;
            
            snake.forEach((segment, index) => {
                // Head is slightly different color or just rendered first
                if (index === 0) {
                    ctx.fillStyle = '#ccffdd'; // Lighter head
                } else {
                    ctx.fillStyle = '#00ff9d';
                }
                
                ctx.fillRect(
                    segment.x * GRID_SIZE + 1, 
                    segment.y * GRID_SIZE + 1, 
                    GRID_SIZE - 2, 
                    GRID_SIZE - 2
                );
            });
            ctx.shadowBlur = 0;
        }

        function gameOver() {
            isGameRunning = false;
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreEl.innerText = `High: ${highScore}`;
            }

            finalScoreEl.innerText = `Score: ${score}`;
            gameOverScreen.classList.remove('hidden');
        }

        // --- Input Handling ---

        // Keyboard Controls
        document.addEventListener('keydown', (e) => {
            if (!isGameRunning) return;

            switch (e.key) {
                case 'ArrowUp':
                    if (dy === 0) { nextDx = 0; nextDy = -1; }
                    break;
                case 'ArrowDown':
                    if (dy === 0) { nextDx = 0; nextDy = 1; }
                    break;
                case 'ArrowLeft':
                    if (dx === 0) { nextDx = -1; nextDy = 0; }
                    break;
                case 'ArrowRight':
                    if (dx === 0) { nextDx = 1; nextDy = 0; }
                    break;
            }
        });

        // Touch Controls (Swipe)
        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, { passive: false });

        document.addEventListener('touchend', (e) => {
            if (!isGameRunning) return;

            const touchEndX = e.changedTouches[0].screenX;
            const touchEndY = e.changedTouches[0].screenY;

            handleSwipe(touchStartX, touchStartY, touchEndX, touchEndY);
        }, { passive: false });

        function handleSwipe(startX, startY, endX, endY) {
            const diffX = endX - startX;
            const diffY = endY - startY;

            // Determine if swipe was mostly horizontal or vertical
            if (Math.abs(diffX) > Math.abs(diffY)) {
                // Horizontal
                if (diffX > 0 && dx === 0) { // Right
                    nextDx = 1; nextDy = 0;
                } else if (diffX < 0 && dx === 0) { // Left
                    nextDx = -1; nextDy = 0;
                }
            } else {
                // Vertical
                if (diffY > 0 && dy === 0) { // Down
                    nextDx = 0; nextDy = 1;
                } else if (diffY < 0 && dy === 0) { // Up
                    nextDx = 0; nextDy = -1;
                }
            }
        }

        // Button Listeners
        startBtn.addEventListener('click', initGame);
        restartBtn.addEventListener('click', initGame);

        // Initial Draw (Empty Grid)
        draw();

    </script>
</body>
</html>
