<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Game</title>
    <style>
        :root {
            --bg-color: #121212;
            --grid-color: #1e1e1e;
            --snake-color: #4caf50;
            --snake-head-color: #81c784;
            --food-color: #ff5252;
            --text-color: #ffffff;
            --ui-bg: rgba(0, 0, 0, 0.85);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            touch-action: none; /* Prevent scrolling on mobile */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border: 2px solid #333;
        }

        canvas {
            display: block;
            background-color: #000;
        }

        /* UI Overlays */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--ui-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.3s;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: var(--snake-color);
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px var(--snake-color);
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #ccc;
        }

        .score-board {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            margin-bottom: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 0 10px;
        }

        button {
            padding: 12px 24px;
            font-size: 1.2rem;
            background-color: var(--snake-color);
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s, background-color 0.2s;
        }

        button:hover {
            background-color: var(--snake-head-color);
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        .controls-hint {
            margin-top: 20px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="score-board">
        <div>Score: <span id="score">0</span></div>
        <div>High Score: <span id="highScore">0</span></div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <!-- Start Screen -->
        <div id="startScreen" class="overlay">
            <h1>SNAKE</h1>
            <button id="startBtn">Start Game</button>
            <div class="controls-hint">Use Arrow Keys or Swipe</div>
        </div>

        <!-- Game Over Screen -->
        <div id="gameOverScreen" class="overlay hidden">
            <h1 style="color: var(--food-color); text-shadow: 0 0 10px var(--food-color);">GAME OVER</h1>
            <p>Final Score: <span id="finalScore">0</span></p>
            <button id="restartBtn">Play Again</button>
        </div>
    </div>

    <script>
        /**
         * Game Configuration & State
         */
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Elements
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const finalScoreEl = document.getElementById('finalScore');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        // Constants
        const GRID_SIZE = 20; // Size of one square
        const TILE_COUNT = canvas.width / GRID_SIZE; // 20x20 grid
        const INITIAL_SPEED = 150; // ms per frame
        
        // Variables
        let snake = [];
        let food = { x: 0, y: 0 };
        let dx = 0;
        let dy = 0;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameSpeed = INITIAL_SPEED;
        let gameLoopId;
        let isGameRunning = false;
        let changingDirection = false; // Prevent double key press suicide

        // Initialize High Score UI
        highScoreEl.textContent = highScore;

        /**
         * Game Logic
         */

        function initGame() {
            // Reset State
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            score = 0;
            dx = 1; // Moving right initially
            dy = 0;
            gameSpeed = INITIAL_SPEED;
            isGameRunning = true;
            scoreEl.textContent = score;
            
            // Hide Screens
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');

            spawnFood();
            gameLoop();
        }

        function gameLoop() {
            if (!isGameRunning) return;

            setTimeout(() => {
                changingDirection = false;
                update();
                draw();
                gameLoop();
            }, gameSpeed);
        }

        function update() {
            // Calculate new head position
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // 1. Check Wall Collision
            if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) {
                handleGameOver();
                return;
            }

            // 2. Check Self Collision
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    handleGameOver();
                    return;
                }
            }

            // Add new head
            snake.unshift(head);

            // 3. Check Food Collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                
                // Increase Speed (decrease delay)
                if (gameSpeed > 50) {
                    gameSpeed -= 2; 
                }

                spawnFood();
                // Don't pop the tail, so snake grows
            } else {
                // Remove tail
                snake.pop();
            }
        }

        function spawnFood() {
            // Random position
            food.x = Math.floor(Math.random() * TILE_COUNT);
            food.y = Math.floor(Math.random() * TILE_COUNT);

            // Ensure food doesn't spawn on snake body
            for (let part of snake) {
                if (part.x === food.x && part.y === food.y) {
                    spawnFood(); // Try again
                    return;
                }
            }
        }

        function handleGameOver() {
            isGameRunning = false;
            
            // Update High Score
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreEl.textContent = highScore;
            }

            finalScoreEl.textContent = score;
            gameOverScreen.classList.remove('hidden');
        }

        /**
         * Rendering
         */
        function draw() {
            // Clear Canvas
            ctx.fillStyle = '#000'; // Pure black background for canvas
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Grid Overlay (Subtle)
            ctx.strokeStyle = '#1e1e1e';
            ctx.lineWidth = 1;
            for (let i = 0; i < TILE_COUNT; i++) {
                // Vertical lines
                ctx.beginPath();
                ctx.moveTo(i * GRID_SIZE, 0);
                ctx.lineTo(i * GRID_SIZE, canvas.height);
                ctx.stroke();

                // Horizontal lines
                ctx.beginPath();
                ctx.moveTo(0, i * GRID_SIZE);
                ctx.lineTo(canvas.width, i * GRID_SIZE);
                ctx.stroke();
            }

            // Draw Snake
            snake.forEach((part, index) => {
                // Head is lighter green, body is darker
                ctx.fillStyle = (index === 0) ? '#81c784' : '#4caf50';
                ctx.fillRect(part.x * GRID_SIZE, part.y * GRID_SIZE, GRID_SIZE - 2, GRID_SIZE - 2);
                
                // Optional: Draw eyes on head
                if (index === 0) {
                    ctx.fillStyle = '#000';
                    // Simple logic to position eyes based on direction could go here
                    // Keeping it simple for now
                }
            });

            // Draw Food
            ctx.fillStyle = '#ff5252';
            ctx.beginPath();
            const centerX = food.x * GRID_SIZE + GRID_SIZE / 2;
            const centerY = food.y * GRID_SIZE + GRID_SIZE / 2;
            ctx.arc(centerX, centerY, GRID_SIZE / 2 - 2, 0, 2 * Math.PI);
            ctx.fill();
        }

        /**
         * Input Handling
         */
        
        // Keyboard Controls
        document.addEventListener('keydown', changeDirection);

        function changeDirection(event) {
            // Prevent scrolling
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(event.code) > -1) {
                event.preventDefault();
            }

            if (changingDirection) return;
            changingDirection = true;

            const keyPressed = event.key;
            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if ((keyPressed === 'ArrowLeft' || keyPressed === 'a') && !goingRight) {
                dx = -1; dy = 0;
            }
            if ((keyPressed === 'ArrowUp' || keyPressed === 'w') && !goingDown) {
                dx = 0; dy = -1;
            }
            if ((keyPressed === 'ArrowRight' || keyPressed === 'd') && !goingLeft) {
                dx = 1; dy = 0;
            }
            if ((keyPressed === 'ArrowDown' || keyPressed === 's') && !goingUp) {
                dx = 0; dy = 1;
            }
        }

        // Touch Controls (Swipe)
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', function(e) {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, {passive: false});

        canvas.addEventListener('touchend', function(e) {
            if (changingDirection) return; // debounce similar to keyboard
            
            let touchEndX = e.changedTouches[0].screenX;
            let touchEndY = e.changedTouches[0].screenY;
            
            handleSwipe(touchStartX, touchStartY, touchEndX, touchEndY);
        }, {passive: false});

        function handleSwipe(startX, startY, endX, endY) {
            const diffX = endX - startX;
            const diffY = endY - startY;
            
            // Determine if horizontal or vertical swipe was stronger
            if (Math.abs(diffX) > Math.abs(diffY)) {
                // Horizontal
                const goingRight = dx === 1;
                const goingLeft = dx === -1;
                
                if (diffX > 0 && !goingLeft) { // Right
                    dx = 1; dy = 0;
                    changingDirection = true;
                } else if (diffX < 0 && !goingRight) { // Left
                    dx = -1; dy = 0;
                    changingDirection = true;
                }
            } else {
                // Vertical
                const goingUp = dy === -1;
                const goingDown = dy === 1;
                
                if (diffY > 0 && !goingUp) { // Down
                    dx = 0; dy = 1;
                    changingDirection = true;
                } else if (diffY < 0 && !goingDown) { // Up
                    dx = 0; dy = -1;
                    changingDirection = true;
                }
            }
        }

        // Button Listeners
        startBtn.addEventListener('click', initGame);
        restartBtn.addEventListener('click', initGame);

        // Initial Draw (Grid only)
        draw();

    </script>
</body>
</html>
