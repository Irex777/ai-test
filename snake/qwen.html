<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Snake</title>
    <style>
        :root {
            --bg-color: #121212;
            --game-bg: #1e1e1e;
            --snake-color: #00ff9d;
            --food-color: #ff0055;
            --text-color: #ffffff;
            --grid-color: rgba(255, 255, 255, 0.05);
            --accent: #2d2d2d;
        }

        * {
            box-sizing: border-box;
            touch-action: none; /* Prevent browser zooming/scrolling */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #ui-container {
            width: 400px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-box span {
            color: var(--snake-color);
        }

        .high-score-box span {
            color: #ffcc00;
        }

        #game-wrapper {
            position: relative;
            width: 400px;
            height: 400px;
            background-color: var(--game-bg);
            border: 2px solid var(--accent);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        canvas {
            display: block;
            background-color: var(--game-bg);
        }

        /* Grid Overlay */
        #grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 20px 20px; /* Matches Tile Size */
            z-index: 1;
        }

        /* Screens (Start / Game Over) */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(18, 18, 18, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            text-align: center;
        }

        .hidden {
            display: none;
        }

        h1 {
            font-size: 3rem;
            margin: 0 0 20px 0;
            color: var(--snake-color);
            text-shadow: 0 0 10px var(--snake-color);
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-family: inherit;
            font-weight: bold;
            color: var(--bg-color);
            background-color: var(--snake-color);
            border: none;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            text-transform: uppercase;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--snake-color);
        }

        button:active {
            transform: scale(0.95);
        }

        /* Mobile hint */
        .controls-hint {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #666;
            display: none;
        }

        @media (max-width: 450px) {
            #ui-container, #game-wrapper {
                width: 95vw;
            }
            #game-wrapper {
                height: 95vw; /* Keep aspect ratio square */
            }
            .controls-hint {
                display: block;
            }
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <div class="score-box">Score: <span id="score">0</span></div>
        <div class="high-score-box">High: <span id="highScore">0</span></div>
    </div>

    <div id="game-wrapper">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="grid-overlay"></div>

        <!-- Start Screen -->
        <div id="start-screen" class="screen">
            <h1>SNAKE</h1>
            <p>Use Arrow Keys or Swipe to Move</p>
            <button id="start-btn">Start Game</button>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="screen hidden">
            <h1 style="color: var(--food-color); text-shadow: 0 0 10px var(--food-color);">GAME OVER</h1>
            <p>Final Score: <span id="final-score">0</span></p>
            <button id="restart-btn">Try Again</button>
        </div>
    </div>

    <div class="controls-hint">Swipe to change direction</div>

    <script>
        // --- Configuration ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const finalScoreEl = document.getElementById('final-score');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');

        const TILE_SIZE = 20;
        const TILE_COUNT = 20; // 400px / 20px
        const INITIAL_SPEED = 150; // ms per frame
        const MIN_SPEED = 50; // Cap speed
        const SPEED_DECREMENT = 2; // How much faster per food

        // --- Game State ---
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameSpeed = INITIAL_SPEED;
        let gameLoopId;
        let isGameRunning = false;

        // Snake & Food
        let snake = [];
        let food = { x: 0, y: 0 };
        
        // Velocity (x, y)
        let dx = 0;
        let dy = 0;
        
        // Input buffering to prevent self-collision on quick turns
        let nextDx = 0;
        let nextDy = 0;

        // --- Initialization ---
        highScoreEl.textContent = highScore;

        function initGame() {
            // Start in the middle
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            score = 0;
            gameSpeed = INITIAL_SPEED;
            scoreEl.textContent = score;
            
            // Initial movement right
            dx = 1;
            dy = 0;
            nextDx = 1;
            nextDy = 0;

            spawnFood();
            isGameRunning = true;
            
            // Hide screens
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');

            // Start Loop
            gameLoop();
        }

        // --- Core Loop ---
        function gameLoop() {
            if (!isGameRunning) return;

            setTimeout(() => {
                if (!isGameRunning) return;
                requestAnimationFrame(draw);
                update();
                gameLoop();
            }, gameSpeed);
        }

        // --- Update Logic ---
        function update() {
            // Apply buffered direction
            dx = nextDx;
            dy = nextDy;

            // Calculate new head position
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // 1. Check Wall Collision
            if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) {
                handleGameOver();
                return;
            }

            // 2. Check Self Collision
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    handleGameOver();
                    return;
                }
            }

            // Move Snake (Add new head)
            snake.unshift(head);

            // 3. Check Food Collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                
                // Increase speed
                if (gameSpeed > MIN_SPEED) {
                    gameSpeed -= SPEED_DECREMENT;
                }

                spawnFood();
                // Don't pop tail, so snake grows
            } else {
                // Remove tail
                snake.pop();
            }
        }

        // --- Rendering ---
        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Food
            ctx.fillStyle = '#ff0055';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ff0055';
            ctx.fillRect(food.x * TILE_SIZE, food.y * TILE_SIZE, TILE_SIZE - 2, TILE_SIZE - 2);
            ctx.shadowBlur = 0; // Reset shadow

            // Draw Snake
            ctx.fillStyle = '#00ff9d';
            snake.forEach((segment, index) => {
                // Head is slightly different color/brightness
                if (index === 0) {
                    ctx.fillStyle = '#ccffdd';
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#00ff9d';
                } else {
                    ctx.fillStyle = '#00ff9d';
                    ctx.shadowBlur = 0;
                }
                ctx.fillRect(segment.x * TILE_SIZE, segment.y * TILE_SIZE, TILE_SIZE - 2, TILE_SIZE - 2);
            });
        }

        // --- Helpers ---
        function spawnFood() {
            // Random position
            let validPosition = false;
            while (!validPosition) {
                food.x = Math.floor(Math.random() * TILE_COUNT);
                food.y = Math.floor(Math.random() * TILE_COUNT);

                // Ensure food doesn't spawn on snake body
                validPosition = true;
                for (let segment of snake) {
                    if (segment.x === food.x && segment.y === food.y) {
                        validPosition = false;
                        break;
                    }
                }
            }
        }

        function handleGameOver() {
            isGameRunning = false;
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreEl.textContent = highScore;
            }

            finalScoreEl.textContent = score;
            gameOverScreen.classList.remove('hidden');
        }

        // --- Input Handling ---

        // Keyboard
        document.addEventListener('keydown', (e) => {
            if (!isGameRunning) return;

            // Prevent default scrolling for arrow keys
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.code) > -1) {
                e.preventDefault();
            }

            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            switch (e.key) {
                case 'ArrowLeft':
                    if (!goingRight) { nextDx = -1; nextDy = 0; }
                    break;
                case 'ArrowUp':
                    if (!goingDown) { nextDx = 0; nextDy = -1; }
                    break;
                case 'ArrowRight':
                    if (!goingLeft) { nextDx = 1; nextDy = 0; }
                    break;
                case 'ArrowDown':
                    if (!goingUp) { nextDx = 0; nextDy = 1; }
                    break;
            }
        });

        // Touch (Swipe)
        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, { passive: false });

        document.addEventListener('touchend', (e) => {
            if (!isGameRunning) return;

            const touchEndX = e.changedTouches[0].screenX;
            const touchEndY = e.changedTouches[0].screenY;

            handleSwipe(touchStartX, touchStartY, touchEndX, touchEndY);
        }, { passive: false });

        function handleSwipe(startX, startY, endX, endY) {
            const diffX = endX - startX;
            const diffY = endY - startY;
            const threshold = 30; // Minimum swipe distance

            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                // Horizontal Swipe
                if (Math.abs(diffX) > threshold) {
                    if (diffX > 0 && !goingLeft) { // Right
                        nextDx = 1; nextDy = 0;
                    } else if (diffX < 0 && !goingRight) { // Left
                        nextDx = -1; nextDy = 0;
                    }
                }
            } else {
                // Vertical Swipe
                if (Math.abs(diffY) > threshold) {
                    if (diffY > 0 && !goingUp) { // Down
                        nextDx = 0; nextDy = 1;
                    } else if (diffY < 0 && !goingDown) { // Up
                        nextDx = 0; nextDy = -1;
                    }
                }
            }
        }

        // --- Button Listeners ---
        startBtn.addEventListener('click', initGame);
        restartBtn.addEventListener('click', initGame);

    </script>
</body>
</html>
