```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;

        }

        .calculator {
            background: #2c2c2c;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            padding: 20px;

            width: 100%;
        }

        .display {
            background: #1a1a1a;

            color: #888;
            font-size: 14px;

            word-wrap: break-word;

            color: #4CAF50;

</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="memory-indicator" id="memoryIndicator">M</div>
            <div class="expression-history" id="expressionHistory"></div>
            <div class="current-input" id="currentInput">0</div>
        </div>
        <div class="button-grid">
            <button class="memory" data-action="MC">MC</button>
            <button class="memory" data-action="MR">MR</button>
            <button class="memory" data-action="M+">M+</button>
            <button class="memory" data-action="M-">M-</button>
            <button class="clear" data-action="CE">CE</button>
            
            <button class="function" data-action="C">C</button>
            <button class="function" data-action="backspace">⌫</button>
            <button class="function" data-action="percent">%</button>
            <button class="operator" data-action="divide">÷</button>
            <button class="function" data-action="negate">+/-</button>
            
            <button class="number" data-value="7">7</button>
            <button class="number" data-value="8">8</button>
            <button class="number" data-value="9">9</button>
            <button class="operator" data-action="multiply">×</button>
            <button class="operator" data-action="subtract">−</button>
            
            <button class="number" data-value="4">4</button>
            <button class="number" data-value="5">5</button>
            <button class="number" data-value="6">6</button>
            <button class="operator" data-action="add">+</button>
            <button class="equals" data-action="equals">=</button>
            
            <button class="number" data-value="1">1</button>
            <button class="number" data-value="2">2</button>
            <button class="number" data-value="3">3</button>
            <button class="decimal zero" data-action="decimal">.</button>
            
            <button class="number zero" data-value="0">0</button>
        </div>
    </div>

    <script>
        class Calculator {
            constructor() {
                this.currentInput = '0';
                this.expressionHistory = '';
                this.memory = 0;
                this.shouldResetInput = false;
                this.lastResult = null;

                this.currentInputDisplay = document.getElementById('currentInput');
                this.expressionHistoryDisplay = document.getElementById('expressionHistory');
                this.memoryIndicator = document.getElementById('memoryIndicator');

                this.setupEventListeners();
                this.setupKeyboardSupport();
            }

            setupEventListeners() {
                document.querySelectorAll('button').forEach(button => {
                    button.addEventListener('click', (e) => {
                        const action = button.dataset.action;
                        const value = button.dataset.value;

                        if (value !== undefined) {
                            this.inputNumber(value);
                        } else if (action) {
                            this.handleAction(action);
                        }
                    });
                });
            }

            setupKeyboardSupport() {
                document.addEventListener('keydown', (e) => {
                    const key = e.key;

                    // Numbers
                    if (/[0-9]/.test(key)) {
                        this.inputNumber(key);
                    }
                    // Operators
                    else if (key === '+') {
                        this.handleAction('add');
                    } else if (key === '-') {
                        this.handleAction('subtract');
                    } else if (key === '*') {
                        this.handleAction('multiply');
                    } else if (key === '/') {
                        e.preventDefault();
                        this.handleAction('divide');
                    }
                    // Equals and Enter
                    else if (key === '=' || key === 'Enter') {
                        this.handleAction('equals');
                    }
                    // Clear
                    else if (key === 'Escape') {
                        this.handleAction('C');
                    }
                    // Backspace
                    else if (key === 'Backspace') {
                        this.handleAction('backspace');
                    }
                    // Decimal
                    else if (key === '.') {
                        this.handleAction('decimal');
                    }
                    // Percent
                    else if (key === '%') {
                        this.handleAction('percent');
                    }
                    // Clear Entry
                    else if (key === 'Delete') {
                        this.handleAction('CE');
                    }
                });
            }

            inputNumber(num) {
                if (this.shouldResetInput) {
                    this.currentInput = num;
                    this.shouldResetInput = false;
                } else if (this.currentInput === '0' && num !== '0') {
                    this.currentInput = num;
                } else if (this.currentInput !== '0') {
                    this.currentInput += num;
                }
                this.updateDisplay();
            }

            handleAction(action) {
                switch (action) {
                    case 'add':
                    case 'subtract':
                    case 'multiply':
                    case 'divide':
                        this.handleOperator(action);
                        break;
                    case 'equals':
                        this.calculate();
                        break;
                    case 'C':
                        this.clearAll();
                        break;
                    case 'CE':
                        this.clearEntry();
                        break;
                    case 'backspace':
                        this.backspace();
                        break;
                    case 'decimal':
                        this.inputDecimal();
                        break;
                    case 'negate':
                        this.negate();
                        break;
                    case 'percent':
                        this.percent();
                        break;
                    case 'MC':
                        this.memoryClear();
                        break;
                    case 'MR':
                        this.memoryRecall();
                        break;
                    case 'M+':
                        this.memoryAdd();
                        break;
                    case 'M-':
                        this.memorySubtract();
                        break;
                }
            }

            handleOperator(operator) {
                const operatorSymbols = {
                    'add': '+',
                    'subtract': '-',
                    'multiply': '×',
                    'divide': '÷'
                };

                if (this.expressionHistory && !this.shouldResetInput) {
                    this.calculate();
                }

                this.expressionHistory = this.currentInput + ' ' + operatorSymbols[operator];
                this.shouldResetInput = true;
                this.updateDisplay();
            }

            calculate() {
                if (!this.expressionHistory) return;

                try {
                    const expression = this.expressionHistory + ' ' + this.currentInput;
                    const operator = this.expressionHistory.slice(-1);
                    const firstOperand = parseFloat(this.expressionHistory.slice(0, -2));
                    const secondOperand = parseFloat(this.currentInput);

                    let result;
                    switch (operator) {
                        case '+':
                            result = firstOperand + secondOperand;
                            break;
                        case '-':
                            result = firstOperand - secondOperand;
                            break;
                        case '×':
                            result = firstOperand * secondOperand;
                            break;
                        case '÷':
                            if (secondOperand === 0) {
                                throw new Error('Division by zero');
                            }
                            result = firstOperand / secondOperand;
                            break;
                    }

                    // Round to avoid floating point precision issues
                    result = Math.round(result * 1000000000) / 1000000000;

                    this.expressionHistory = expression + ' =';
                    this.currentInput = result.toString();
                    this.shouldResetInput = true;
                    this.lastResult = result;
                    this.updateDisplay();
                } catch (error) {
                    this.showError('Error');
                }
            }

            clearAll() {
                this.currentInput = '0';
                this.expressionHistory = '';
                this.shouldResetInput = false;
                this.lastResult = null;
                this.updateDisplay();
            }

            clearEntry() {
                this.currentInput = '0';
                this.shouldResetInput = false;
                this.updateDisplay();
            }

            backspace() {
                if (this.currentInput.length > 1) {
                    this.currentInput = this.currentInput.slice(0, -1);
                } else {
                    this.currentInput = '0';
                }
                this.updateDisplay();
            }

            inputDecimal() {
                if (this.shouldResetInput) {
                    this.currentInput = '0.';
                    this.shouldResetInput = false;
                } else if (!this.currentInput.includes('.')) {
                    this.currentInput += '.';
                }
                this.updateDisplay();
            }

            negate() {
                if (this.currentInput !== '0') {
                    if (this.currentInput.startsWith('-')) {
                        this.currentInput = this.currentInput.slice(1);
                    } else {
                        this.currentInput = '-' + this.currentInput;
                    }
                }
                this.updateDisplay();
            }

            percent() {
                const value = parseFloat(this.currentInput);
                this.currentInput = (value / 100).toString();
                this.updateDisplay();
            }

            memoryClear() {
                this.memory = 0;
                this.updateMemoryIndicator();
            }

            memoryRecall() {
                this.currentInput = this.memory.toString();
                this.shouldResetInput = true;
                this.updateDisplay();
            }

            memoryAdd() {
                this.memory += parseFloat(this.currentInput);
                this.shouldResetInput = true;
                this.updateMemoryIndicator();
            }

            memorySubtract() {
                this.memory -= parseFloat(this.currentInput);
                this.shouldResetInput = true;
                this.updateMemoryIndicator();
            }

            updateMemoryIndicator() {
                if (this.memory !== 0) {
                    this.memoryIndicator.classList.add('active');
                } else {
                    this.memoryIndicator.classList.remove('active');
                }
            }

            updateDisplay() {
                this.currentInputDisplay.textContent = this.currentInput;
                this.expressionHistoryDisplay.textContent = this.expressionHistory;
            }

            showError(message) {
                this.currentInputDisplay.textContent = message;
                this.currentInputDisplay.classList.add('error');
                setTimeout(() => {
                    this.currentInputDisplay.classList.remove('error');
                    this.clearAll();
                }, 1500);
            }
        }

        // Initialize calculator
        const calculator = new Calculator();
    </script>
</body>
</html>
