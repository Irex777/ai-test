<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .calculator {
            background: #0f0f23;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            padding: 25px;
            max-width: 400px;
            width: 100%;
        }

        .display {
            background: #1a1a2e;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: right;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .history {
            color: #888;
            font-size: 14px;
            min-height: 20px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .current-input {
            color: #fff;
            font-size: 36px;
            font-weight: 300;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            padding: 20px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .number {
            background: #2d2d44;
            color: #fff;
        }

        .number:hover {
            background: #3d3d54;
        }

        .operator {
            background: #4a4a6a;
            color: #fff;
        }

        .operator:hover {
            background: #5a5a7a;
        }

        .equals {
            background: #e94560;
            color: #fff;
        }

        .equals:hover {
            background: #ff5570;
        }

        .clear {
            background: #ff6b6b;
            color: #fff;
        }

        .clear:hover {
            background: #ff7b7b;
        }

        .memory {
            background: #38a3d5;
            color: #fff;
            font-size: 14px;
        }

        .memory:hover {
            background: #48b3e5;
        }

        .memory-indicator {
            color: #38a3d5;
            font-size: 12px;
            margin-top: 5px;
            text-align: right;
            height: 15px;
        }

        @media (max-width: 480px) {
            .calculator {
                padding: 15px;
            }

            .current-input {
                font-size: 28px;
            }

            button {
                padding: 15px;
                font-size: 16px;
            }

            .memory {
                font-size: 12px;
                padding: 12px;
            }
        }

        @media (max-width: 350px) {
            .button-grid {
                gap: 8px;
            }

            button {
                padding: 12px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="history" id="history"></div>
            <div class="current-input" id="display">0</div>
            <div class="memory-indicator" id="memory-indicator"></div>
        </div>
        <div class="button-grid">
            <button class="memory" onclick="memoryClear()">MC</button>
            <button class="memory" onclick="memoryRecall()">MR</button>
            <button class="memory" onclick="memoryAdd()">M+</button>
            <button class="memory" onclick="memorySubtract()">M-</button>

            <button class="clear" onclick="clearEntry()">CE</button>
            <button class="clear" onclick="clearAll()">C</button>
            <button class="operator" onclick="backspace()">⌫</button>
            <button class="operator" onclick="appendOperator('/')">÷</button>

            <button class="number" onclick="appendNumber('7')">7</button>
            <button class="number" onclick="appendNumber('8')">8</button>
            <button class="number" onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="appendOperator('*')">×</button>

            <button class="number" onclick="appendNumber('4')">4</button>
            <button class="number" onclick="appendNumber('5')">5</button>
            <button class="number" onclick="appendNumber('6')">6</button>
            <button class="operator" onclick="appendOperator('-')">−</button>

            <button class="number" onclick="appendNumber('1')">1</button>
            <button class="number" onclick="appendNumber('2')">2</button>
            <button class="number" onclick="appendNumber('3')">3</button>
            <button class="operator" onclick="appendOperator('+')">+</button>

            <button class="number" onclick="toggleSign()">±</button>
            <button class="number" onclick="appendNumber('0')">0</button>
            <button class="number" onclick="appendDecimal()">.</button>
            <button class="number" onclick="percentage()">%</button>

            <button class="equals" onclick="calculate()" style="grid-column: span 4;">=</button>
        </div>
    </div>

    <script>
        let currentInput = '0';
        let history = '';
        let memory = 0;
        let shouldResetInput = false;

        function updateDisplay() {
            document.getElementById('display').textContent = currentInput;
            document.getElementById('history').textContent = history;
            document.getElementById('memory-indicator').textContent = memory !== 0 ? 'M' : '';
        }

        function appendNumber(num) {
            if (shouldResetInput) {
                currentInput = num;
                shouldResetInput = false;
            } else {
                currentInput = currentInput === '0' ? num : currentInput + num;
            }
            updateDisplay();
        }

        function appendDecimal() {
            if (shouldResetInput) {
                currentInput = '0.';
                shouldResetInput = false;
            } else if (!currentInput.includes('.')) {
                currentInput += '.';
            }
            updateDisplay();
        }

        function appendOperator(op) {
            history = currentInput + ' ' + op;
            shouldResetInput = true;
            updateDisplay();
        }

        function calculate() {
            if (history && !shouldResetInput) {
                try {
                    const expression = history + currentInput;
                    const result = eval(expression);

                    if (!isFinite(result)) {
                        throw new Error('Invalid result');
                    }

                    history = expression + ' =';
                    currentInput = String(result);
                    shouldResetInput = true;
                } catch (error) {
                    currentInput = 'Error';
                    shouldResetInput = true;
                }
            }
            updateDisplay();
        }

        function clearAll() {
            currentInput = '0';
            history = '';
            shouldResetInput = false;
            updateDisplay();
        }

        function clearEntry() {
            currentInput = '0';
            shouldResetInput = false;
            updateDisplay();
        }

        function backspace() {
            if (currentInput.length > 1) {
                currentInput = currentInput.slice(0, -1);
            } else {
                currentInput = '0';
            }
            updateDisplay();
        }

        function toggleSign() {
            currentInput = String(parseFloat(currentInput) * -1);
            updateDisplay();
        }

        function percentage() {
            currentInput = String(parseFloat(currentInput) / 100);
            updateDisplay();
        }

        function memoryAdd() {
            memory += parseFloat(currentInput);
            shouldResetInput = true;
            updateDisplay();
        }

        function memorySubtract() {
            memory -= parseFloat(currentInput);
            shouldResetInput = true;
            updateDisplay();
        }

        function memoryRecall() {
            currentInput = String(memory);
            shouldResetInput = true;
            updateDisplay();
        }

        function memoryClear() {
            memory = 0;
            updateDisplay();
        }

        // Keyboard support
        document.addEventListener('keydown', (event) => {
            const key = event.key;

            if (/[0-9]/.test(key)) {
                appendNumber(key);
            } else if (key === '.') {
                appendDecimal();
            } else if (key === '+') {
                appendOperator('+');
            } else if (key === '-') {
                appendOperator('-');
            } else if (key === '*') {
                appendOperator('*');
            } else if (key === '/') {
                event.preventDefault();
                appendOperator('/');
            } else if (key === 'Enter' || key === '=') {
                event.preventDefault();
                calculate();
            } else if (key === 'Escape') {
                clearAll();
            } else if (key === 'Backspace') {
                backspace();
            } else if (key === '%') {
                percentage();
            }
        });

        // Initialize display
        updateDisplay();
    </script>
</body>
</html>
