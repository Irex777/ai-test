<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0f0f0f;
  font-family: 'Segoe UI', system-ui, sans-serif;
}
.calc {
  background: #1a1a1a;
  border-radius: 16px;
  padding: 20px;
  width: 340px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
}
.display {
  background: #0d0d0d;
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 16px;
  min-height: 100px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  overflow: hidden;
}
.history { color: #555; font-size: 13px; text-align: right; min-height: 20px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.expression { color: #888; font-size: 15px; text-align: right; min-height: 22px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 4px; }
.current { color: #fff; font-size: 36px; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 4px; font-weight: 300; letter-spacing: -1px; }
.current.error { color: #ff6b6b; font-size: 22px; }
.memory-bar { display: flex; gap: 6px; margin-bottom: 12px; }
.memory-bar button { flex: 1; padding: 8px 4px; background: #222; border: 1px solid #333; border-radius: 8px; color: #aaa; font-size: 12px; cursor: pointer; transition: background 0.15s; }
.memory-bar button:hover { background: #2a2a2a; color: #fff; }
.memory-bar button:active { background: #333; }
.memory-bar button.has-mem { color: #4ecdc4; border-color: #4ecdc4; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
button { border: none; outline: none; cursor: pointer; font-size: 18px; font-weight: 400; border-radius: 10px; padding: 18px 10px; transition: background 0.12s, transform 0.08s; user-select: none; }
button:active { transform: scale(0.94); }
.btn-num { background: #2a2a2a; color: #fff; }
.btn-num:hover { background: #333; }
.btn-op { background: #2d2d3d; color: #a78bfa; }
.btn-op:hover { background: #363650; }
.btn-eq { background: #7c3aed; color: #fff; font-size: 22px; }
.btn-eq:hover { background: #8b5cf6; }
.btn-clear { background: #3d1a1a; color: #ff6b6b; }
.btn-clear:hover { background: #4a2020; }
.btn-fn { background: #1f2a2a; color: #4ecdc4; }
.btn-fn:hover { background: #263333; }
.btn-zero { grid-column: span 2; }
.mem-indicator { color: #4ecdc4; font-size: 11px; text-align: left; padding: 0 2px 6px; min-height: 18px; }
</style>
</head>
<body>
<div class="calc">
  <div class="display">
    <div class="history" id="history"></div>
    <div class="expression" id="expression"></div>
    <div class="current" id="current">0</div>
  </div>
  <div class="mem-indicator" id="memIndicator"></div>
  <div class="memory-bar">
    <button onclick="mc()" id="btnMC">MC</button>
    <button onclick="mr()" id="btnMR">MR</button>
    <button onclick="mplus()">M+</button>
    <button onclick="mminus()">M-</button>
  </div>
  <div class="grid">
    <button class="btn-clear" onclick="clearAll()">C</button>
    <button class="btn-clear" onclick="clearEntry()">CE</button>
    <button class="btn-fn" onclick="backspace()">&#x232B;</button>
    <button class="btn-op" onclick="inputOp('/')">&#247;</button>

    <button class="btn-num" onclick="inputDigit('7')">7</button>
    <button class="btn-num" onclick="inputDigit('8')">8</button>
    <button class="btn-num" onclick="inputDigit('9')">9</button>
    <button class="btn-op" onclick="inputOp('*')">&#215;</button>

    <button class="btn-num" onclick="inputDigit('4')">4</button>
    <button class="btn-num" onclick="inputDigit('5')">5</button>
    <button class="btn-num" onclick="inputDigit('6')">6</button>
    <button class="btn-op" onclick="inputOp('-')">&#8722;</button>

    <button class="btn-num" onclick="inputDigit('1')">1</button>
    <button class="btn-num" onclick="inputDigit('2')">2</button>
    <button class="btn-num" onclick="inputDigit('3')">3</button>
    <button class="btn-op" onclick="inputOp('+')">+</button>

    <button class="btn-fn" onclick="toggleSign()">+/&#8722;</button>
    <button class="btn-num btn-zero" onclick="inputDigit('0')">0</button>
    <button class="btn-num" onclick="inputDecimal()">.</button>
    <button class="btn-fn" onclick="percent()">%</button>
    <button class="btn-eq" style="grid-column:span 4" onclick="calculate()">=</button>
  </div>
</div>
<script>
var currentInput='0', expression='', expressionDisplay='', memory=0, hasMemory=false, justCalculated=false, errorState=false;
var elCurrent=document.getElementById('current'), elExpression=document.getElementById('expression'), elHistory=document.getElementById('history'), elMemInd=document.getElementById('memIndicator'), btnMC=document.getElementById('btnMC'), btnMR=document.getElementById('btnMR');

function updateDisplay() {
  elCurrent.textContent=currentInput;
  elCurrent.className='current'+(errorState?' error':'');
  elExpression.textContent=expressionDisplay;
  elMemInd.textContent=hasMemory?'M = '+memory:'';
  btnMC.className=hasMemory?'has-mem':'';
  btnMR.className=hasMemory?'has-mem':'';
}
function inputDigit(d) {
  if(errorState) clearAll();
  if(justCalculated){expression='';expressionDisplay='';justCalculated=false;currentInput=d;updateDisplay();return;}
  if(currentInput==='0'&&d!=='.')currentInput=d;
  else if(currentInput.length<15)currentInput+=d;
  updateDisplay();
}
function inputDecimal() {
  if(errorState) clearAll();
  if(justCalculated){expression='';expressionDisplay='';justCalculated=false;currentInput='0.';updateDisplay();return;}
  if(!currentInput.includes('.'))currentInput+='.';
  updateDisplay();
}
function inputOp(op) {
  if(errorState)return;
  var d={'+':'+','-':'−','*':'×','/':'÷'}[op];
  if(justCalculated){expression=currentInput+op;expressionDisplay=currentInput+' '+d+' ';justCalculated=false;updateDisplay();return;}
  if(expression!==''&&/[\+\-\*\/]$/.test(expression)){
    expression=expression.slice(0,-1)+op;
    expressionDisplay=expressionDisplay.trimEnd().replace(/[\+−×÷]$/,d)+' ';
  } else {
    expression+=currentInput+op;
    expressionDisplay+=currentInput+' '+d+' ';
    currentInput='0';
  }
  updateDisplay();
}
function calculate() {
  if(errorState||expression==='')return;
  var fe=expression+currentInput, fd=expressionDisplay+currentInput;
  try {
    var r=safeEval(fe);
    if(!isFinite(r)){showError('Cannot divide by zero');return;}
    elHistory.textContent=fd+' =';
    expressionDisplay='';expression='';
    currentInput=formatResult(r);
    justCalculated=true;
  } catch(e){showError('Error');}
  updateDisplay();
}
function safeEval(expr) {
  var t=expr.match(/(\d+\.?\d*|\.\d+|[\+\-\*\/])/g);
  if(!t)return 0;
  var n=[],o=[],p={'+':1,'-':1,'*':2,'/':2};
  function app(){var b=n.pop(),a=n.pop(),op=o.pop();if(op==='+')n.push(a+b);else if(op==='-')n.push(a-b);else if(op==='*')n.push(a*b);else if(op==='/'){if(b===0)throw new Error('d0');n.push(a/b);}}
  for(var i=0;i<t.length;i++){
    var x=t[i];
    if(/[\+\-\*\/]/.test(x)){while(o.length&&p[o[o.length-1]]>=p[x])app();o.push(x);}
    else n.push(parseFloat(x));
  }
  while(o.length)app();
  return n[0];
}
function formatResult(n){if(Number.isInteger(n))return String(n);var s=parseFloat(n.toPrecision(10)).toString();return s.length>15?parseFloat(n.toFixed(8)).toString():s;}
function showError(m){currentInput=m;errorState=true;updateDisplay();}
function clearAll(){currentInput='0';expression='';expressionDisplay='';errorState=false;justCalculated=false;elHistory.textContent='';updateDisplay();}
function clearEntry(){if(errorState){clearAll();return;}currentInput='0';updateDisplay();}
function backspace(){if(errorState){clearAll();return;}if(justCalculated)return;currentInput=currentInput.length>1?currentInput.slice(0,-1):'0';updateDisplay();}
function toggleSign(){if(errorState||currentInput==='0')return;currentInput=currentInput.startsWith('-')?currentInput.slice(1):'-'+currentInput;updateDisplay();}
function percent(){if(errorState)return;var v=parseFloat(currentInput);if(isNaN(v))return;currentInput=formatResult(v/100);updateDisplay();}
function mc(){memory=0;hasMemory=false;updateDisplay();}
function mr(){if(hasMemory){currentInput=formatResult(memory);justCalculated=false;updateDisplay();}}
function mplus(){memory+=parseFloat(currentInput)||0;hasMemory=true;updateDisplay();}
function mminus(){memory-=parseFloat(currentInput)||0;hasMemory=true;updateDisplay();}

document.addEventListener('keydown',function(e){
  if(e.ctrlKey||e.metaKey)return;
  var k=e.key;
  if(k>='0'&&k<='9'){e.preventDefault();inputDigit(k);}
  else if(k==='.'){e.preventDefault();inputDecimal();}
  else if(k==='+'){e.preventDefault();inputOp('+');}
  else if(k==='-'){e.preventDefault();inputOp('-');}
  else if(k==='*'){e.preventDefault();inputOp('*');}
  else if(k==='/'){e.preventDefault();inputOp('/');}
  else if(k==='Enter'||k==='='){e.preventDefault();calculate();}
  else if(k==='Backspace'){e.preventDefault();backspace();}
  else if(k==='Escape'){e.preventDefault();clearAll();}
  else if(k==='Delete'){e.preventDefault();clearEntry();}
  else if(k==='%'){e.preventDefault();percent();}
});
updateDisplay();
</script>
</body>
</html>
