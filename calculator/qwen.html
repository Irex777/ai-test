<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Calculator</title>
    <style>
        :root {
            --bg-color: #121212;
            --calc-bg: #1e1e1e;
            --display-bg: #2c2c2c;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --btn-num: #3a3a3a;
            --btn-op: #ff9f0a;
            --btn-func: #505050;
            --btn-mem: #303030;
            --accent: #0a84ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .calculator {
            width: 100%;
            max-width: 360px;
            height: 100%;
            max-height: 800px;
            background-color: var(--calc-bg);
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            position: relative;
        }

        /* Responsive adjustments */
        @media (min-width: 400px) {
            .calculator {
                height: 90vh;
                border-radius: 20px;
            }
        }

        /* Display Section */
        .display {
            flex: 1;
            background-color: var(--display-bg);
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            word-wrap: break-word;
            word-break: break-all;
        }

        .history {
            color: var(--text-muted);
            font-size: 1.2rem;
            min-height: 1.5rem;
            margin-bottom: 5px;
            text-align: right;
            width: 100%;
        }

        .current-input {
            font-size: 3.5rem;
            font-weight: 300;
            text-align: right;
            width: 100%;
        }

        /* Keypad Grid */
        .keypad {
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(6, 1fr); /* 5 rows standard + 1 row memory */
            gap: 12px;
        }

        button {
            border: none;
            border-radius: 50%; /* Circular buttons */
            font-size: 1.5rem;
            cursor: pointer;
            transition: filter 0.1s;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
            aspect-ratio: 1 / 1;
            color: var(--text-main);
        }

        button:active {
            filter: brightness(130%);
        }

        /* Button Types */
        .btn-num {
            background-color: var(--btn-num);
        }

        .btn-op {
            background-color: var(--btn-op);
            font-size: 1.8rem;
        }

        .btn-func {
            background-color: var(--btn-func);
            color: var(--text-main);
        }

        .btn-mem {
            background-color: var(--btn-mem);
            font-size: 1rem;
            border-radius: 10px;
            aspect-ratio: auto;
            height: 40px;
            margin-bottom: 5px;
        }

        /* Zero button spans 2 columns */
        .btn-zero {
            grid-column: span 2;
            border-radius: 40px;
            aspect-ratio: auto;
            justify-content: flex-start;
            padding-left: 30px;
        }

        /* Memory Bar Layout */
        .memory-bar {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 5px;
        }

        /* Error State */
        .error {
            color: #ff453a;
        }

    </style>
</head>
<body>

    <div class="calculator">
        <div class="display">
            <div class="history" id="history"></div>
            <div class="current-input" id="display">0</div>
        </div>

        <div class="keypad">
            <!-- Memory Row -->
            <div class="memory-bar">
                <button class="btn-mem" onclick="calc.memoryClear()">MC</button>
                <button class="btn-mem" onclick="calc.memoryRecall()">MR</button>
                <button class="btn-mem" onclick="calc.memorySub()">M-</button>
                <button class="btn-mem" onclick="calc.memoryAdd()">M+</button>
            </div>

            <!-- Standard Keys -->
            <button class="btn-func" onclick="calc.clear()">C</button>
            <button class="btn-func" onclick="calc.clearEntry()">CE</button>
            <button class="btn-func" onclick="calc.percent()">%</button>
            <button class="btn-func" onclick="calc.backspace()">⌫</button>

            <button class="btn-func" onclick="calc.setOperator('/')">÷</button>
            <button class="btn-func" onclick="calc.setOperator('*')">×</button>
            <button class="btn-func" onclick="calc.setOperator('-')">-</button>
            <button class="btn-func" onclick="calc.setOperator('+')">+</button>

            <button class="btn-num" onclick="calc.appendNumber('7')">7</button>
            <button class="btn-num" onclick="calc.appendNumber('8')">8</button>
            <button class="btn-num" onclick="calc.appendNumber('9')">9</button>
            <button class="btn-func" onclick="calc.toggleSign()">+/-</button>

            <button class="btn-num" onclick="calc.appendNumber('4')">4</button>
            <button class="btn-num" onclick="calc.appendNumber('5')">5</button>
            <button class="btn-num" onclick="calc.appendNumber('6')">6</button>
            <!-- Placeholder for grid alignment if needed, or just leave empty -->
            <div></div> 

            <button class="btn-num" onclick="calc.appendNumber('1')">1</button>
            <button class="btn-num" onclick="calc.appendNumber('2')">2</button>
            <button class="btn-num" onclick="calc.appendNumber('3')">3</button>
            <button class="btn-op" style="grid-row: span 2" onclick="calc.compute()">=</button>

            <button class="btn-num btn-zero" onclick="calc.appendNumber('0')">0</button>
            <button class="btn-num" onclick="calc.appendDecimal()">.</button>
        </div>
    </div>

    <script>
        class Calculator {
            constructor(historyElement, displayElement) {
                this.historyElement = historyElement;
                this.displayElement = displayElement;
                
                this.currentOperand = '0';
                this.previousOperand = '';
                this.operation = null;
                this.shouldResetScreen = false;
                this.memory = 0;
            }

            clear() {
                this.currentOperand = '0';
                this.previousOperand = '';
                this.operation = null;
                this.updateDisplay();
                this.historyElement.innerText = '';
            }

            clearEntry() {
                this.currentOperand = '0';
                this.updateDisplay();
            }

            backspace() {
                if (this.shouldResetScreen) return;
                this.currentOperand = this.currentOperand.toString().slice(0, -1);
                if (this.currentOperand === '' || this.currentOperand === '-') {
                    this.currentOperand = '0';
                }
                this.updateDisplay();
            }

            appendNumber(number) {
                if (this.shouldResetScreen) {
                    this.currentOperand = '';
                    this.shouldResetScreen = false;
                }
                if (number === '0' && this.currentOperand === '0') return;
                if (this.currentOperand === '0' && number !== '.') {
                    this.currentOperand = number.toString();
                } else {
                    this.currentOperand = this.currentOperand.toString() + number.toString();
                }
                this.updateDisplay();
            }

            appendDecimal() {
                if (this.shouldResetScreen) {
                    this.currentOperand = '0';
                    this.shouldResetScreen = false;
                }
                if (this.currentOperand.includes('.')) return;
                this.currentOperand = this.currentOperand.toString() + '.';
                this.updateDisplay();
            }

            toggleSign() {
                if (this.currentOperand === '0') return;
                this.currentOperand = (parseFloat(this.currentOperand) * -1).toString();
                this.updateDisplay();
            }

            percent() {
                const current = parseFloat(this.currentOperand);
                if (isNaN(current)) return;
                this.currentOperand = (current / 100).toString();
                this.updateDisplay();
            }

            setOperator(op) {
                if (this.operation !== null && !this.shouldResetScreen) {
                    this.compute();
                }
                this.operation = op;
                this.previousOperand = this.currentOperand;
                this.shouldResetScreen = true;
                this.updateHistory();
            }

            compute() {
                let computation;
                const prev = parseFloat(this.previousOperand);
                const current = parseFloat(this.currentOperand);
                
                if (isNaN(prev) || isNaN(current)) return;

                switch (this.operation) {
                    case '+':
                        computation = prev + current;
                        break;
                    case '-':
                        computation = prev - current;
                        break;
                    case '*':
                        computation = prev * current;
                        break;
                    case '/':
                        if (current === 0) {
                            this.triggerError("Can't divide by 0");
                            return;
                        }
                        computation = prev / current;
                        break;
                    default:
                        return;
                }

                // Fix floating point precision issues (e.g. 0.1 + 0.2)
                computation = Math.round(computation * 100000000) / 100000000;

                this.currentOperand = computation.toString();
                this.operation = null;
                this.previousOperand = '';
                this.shouldResetScreen = true;
                this.updateDisplay();
                this.historyElement.innerText = '';
            }

            triggerError(msg) {
                this.currentOperand = msg;
                this.previousOperand = '';
                this.operation = null;
                this.shouldResetScreen = true;
                this.updateDisplay();
                this.displayElement.classList.add('error');
                setTimeout(() => this.displayElement.classList.remove('error'), 1500);
            }

            // Memory Functions
            memoryAdd() {
                this.memory += parseFloat(this.currentOperand);
                this.shouldResetScreen = true;
            }

            memorySub() {
                this.memory -= parseFloat(this.currentOperand);
                this.shouldResetScreen = true;
            }

            memoryRecall() {
                this.currentOperand = this.memory.toString();
                this.shouldResetScreen = true;
                this.updateDisplay();
            }

            memoryClear() {
                this.memory = 0;
            }

            getOperationSymbol(op) {
                switch(op) {
                    case '+': return '+';
                    case '-': return '-';
                    case '*': return '×';
                    case '/': return '÷';
                    default: return '';
                }
            }

            updateHistory() {
                const symbol = this.getOperationSymbol(this.operation);
                this.historyElement.innerText = `${this.previousOperand} ${symbol}`;
            }

            updateDisplay() {
                this.displayElement.innerText = this.currentOperand;
            }
        }

        // Initialize
        const calc = new Calculator(
            document.getElementById('history'),
            document.getElementById('display')
        );

        // Keyboard Support
        document.addEventListener('keydown', (e) => {
            const key = e.key;

            if (/[0-9]/.test(key)) {
                calc.appendNumber(key);
            } else if (key === '.') {
                calc.appendDecimal();
            } else if (key === 'Backspace') {
                calc.backspace();
            } else if (key === 'Enter' || key === '=') {
                e.preventDefault(); // prevent default form submit behavior if any
                calc.compute();
            } else if (key === 'Escape') {
                calc.clear();
            } else if (key === '+') {
                calc.setOperator('+');
            } else if (key === '-') {
                calc.setOperator('-');
            } else if (key === '*') {
                calc.setOperator('*');
            } else if (key === '/') {
                e.preventDefault(); // prevent quick find in Firefox
                calc.setOperator('/');
            } else if (key === '%') {
                calc.percent();
            }
        });

    </script>
</body>
</html>
