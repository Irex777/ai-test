<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Theme Calculator</title>
    <style>
        :root {
            --bg-color: #121212;
            --calc-bg: #1e1e1e;
            --display-color: #ffffff;
            --history-color: #888888;
            --btn-bg: #2d2d2d;
            --btn-hover: #3d3d3d;
            --btn-active: #4d4d4d;
            --accent-color: #03dac6;
            --operator-color: #ff9800;
            --danger-color: #cf6679;
            --text-color: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-color);
        }

        .calculator {
            background-color: var(--calc-bg);
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Display Section */
        .display {
            background-color: #000000;
            border-radius: 10px;
            padding: 20px;
            text-align: right;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            height: 120px;
            word-wrap: break-word;
            word-break: break-all;
        }

        .history {
            color: var(--history-color);
            font-size: 1rem;
            min-height: 1.2rem;
            margin-bottom: 5px;
        }

        .current-input {
            color: var(--display-color);
            font-size: 2.5rem;
            font-weight: 300;
        }

        /* Memory Bar */
        .memory-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 5px;
        }

        /* Main Grid */
        .keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            border: none;
            background-color: var(--btn-bg);
            color: var(--text-color);
            font-size: 1.25rem;
            padding: 20px;
            border-radius: 50%; /* Circular buttons */
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
            aspect-ratio: 1;
        }

        button:hover {
            background-color: var(--btn-hover);
        }

        button:active {
            background-color: var(--btn-active);
            transform: scale(0.95);
        }

        /* Button Specific Styles */
        .btn-operator {
            color: var(--accent-color);
            font-weight: bold;
            font-size: 1.5rem;
        }

        .btn-equals {
            background-color: var(--accent-color);
            color: #000;
            font-weight: bold;
            border-radius: 10px; /* Rounded rect for equals */
        }
        .btn-equals:hover { background-color: #04b3a7; }

        .btn-clear {
            color: var(--operator-color);
            font-weight: bold;
        }
        
        .btn-backspace {
            font-size: 1rem;
        }

        .btn-memory {
            font-size: 0.9rem;
            border-radius: 8px;
            padding: 10px;
            aspect-ratio: auto;
        }

        /* Responsive tweaks */
        @media (max-width: 350px) {
            .calculator { padding: 10px; }
            button { padding: 15px; font-size: 1.1rem; }
            .current-input { font-size: 2rem; }
        }
    </style>
</head>
<body>

<div class="calculator">
    <!-- Display -->
    <div class="display">
        <div class="history" id="historyDisplay"></div>
        <div class="current-input" id="currentDisplay">0</div>
    </div>

    <!-- Memory Functions -->
    <div class="memory-bar">
        <button class="btn-memory" onclick="memoryCalc('MC')">MC</button>
        <button class="btn-memory" onclick="memoryCalc('MR')">MR</button>
        <button class="btn-memory" onclick="memoryCalc('M+')">M+</button>
        <button class="btn-memory" onclick="memoryCalc('M-')">M-</button>
    </div>

    <!-- Main Keypad -->
    <div class="keypad">
        <!-- Row 1 -->
        <button class="btn-clear" onclick="clearDisplay()">C</button>
        <button class="btn-clear" onclick="clearEntry()">CE</button>
        <button class="btn-backspace" onclick="backspace()">⌫</button>
        <button class="btn-operator" onclick="chooseOperation('/')">÷</button>

        <!-- Row 2 -->
        <button onclick="inputDigit('7')">7</button>
        <button onclick="inputDigit('8')">8</button>
        <button onclick="inputDigit('9')">9</button>
        <button class="btn-operator" onclick="chooseOperation('*')">×</button>

        <!-- Row 3 -->
        <button onclick="inputDigit('4')">4</button>
        <button onclick="inputDigit('5')">5</button>
        <button onclick="inputDigit('6')">6</button>
        <button class="btn-operator" onclick="chooseOperation('-')">−</button>

        <!-- Row 4 -->
        <button onclick="inputDigit('1')">1</button>
        <button onclick="inputDigit('2')">2</button>
        <button onclick="inputDigit('3')">3</button>
        <button class="btn-operator" onclick="chooseOperation('+')">+</button>

        <!-- Row 5 -->
        <button onclick="toggleSign()">+/-</button>
        <button onclick="inputDigit('0')">0</button>
        <button onclick="inputDecimal()">.</button>
        <button class="btn-equals" onclick="computeResult()">=</button>
    </div>
</div>

<script>
    // State variables
    let currentInput = '0';
    let previousInput = '';
    let operation = null;
    let shouldResetScreen = false;
    let memory = 0;
    
    // DOM Elements
    const currentDisplay = document.getElementById('currentDisplay');
    const historyDisplay = document.getElementById('historyDisplay');

    // --- Core Logic ---

    function inputDigit(digit) {
        if (currentInput === '0' || shouldResetScreen || currentInput === 'Error') {
            currentInput = digit;
            shouldResetScreen = false;
        } else {
            // Limit length to prevent overflow
            if(currentInput.length < 15) {
                currentInput += digit;
            }
        }
        updateDisplay();
    }

    function inputDecimal() {
        if (shouldResetScreen) {
            currentInput = '0';
            shouldResetScreen = false;
        }
        if (!currentInput.includes('.')) {
            currentInput += '.';
        }
        updateDisplay();
    }

    function clearDisplay() {
        currentInput = '0';
        previousInput = '';
        operation = null;
        historyDisplay.innerText = '';
        shouldResetScreen = false;
        updateDisplay();
    }

    function clearEntry() {
        currentInput = '0';
        updateDisplay();
    }

    function backspace() {
        if (shouldResetScreen) return;
        if (currentInput.length === 1 || currentInput === 'Error') {
            currentInput = '0';
        } else {
            currentInput = currentInput.toString().slice(0, -1);
        }
        updateDisplay();
    }

    function toggleSign() {
        if (currentInput === '0' || currentInput === 'Error') return;
        currentInput = (parseFloat(currentInput) * -1).toString();
        updateDisplay();
    }

    function chooseOperation(op) {
        if (currentInput === 'Error') return;
        
        // If we have an operation pending, calculate the intermediate result first
        if (operation !== null && !shouldResetScreen) {
            computeResult(true);
        }

        operation = op;
        previousInput = currentInput;
        shouldResetScreen = true;
        
        // Visual History
        let visualOp = op === '*' ? '×' : (op === '/' ? '÷' : op);
        historyDisplay.innerText = `${previousInput} ${visualOp}`;
    }

    function computeResult(isChaining = false) {
        if (operation === null || shouldResetScreen && !isChaining) return;

        let a = parseFloat(previousInput);
        let b = parseFloat(currentInput);
        let result;

        // Handle divide by zero
        if (operation === '/' && b === 0) {
            currentInput = 'Error';
            operation = null;
            previousInput = '';
            historyDisplay.innerText = 'Cannot divide by zero';
            shouldResetScreen = true;
            updateDisplay();
            return;
        }

        switch (operation) {
            case '+': result = a + b; break;
            case '-': result = a - b; break;
            case '*': result = a * b; break;
            case '/': result = a / b; break;
            default: return;
        }

        // Fix floating point precision issues (e.g. 0.1 + 0.2)
        result = Math.round(result * 1000000000000) / 1000000000000;

        if (!isChaining) {
            historyDisplay.innerText = `${a} ${operation === '*' ? '×' : (operation === '/' ? '÷' : operation)} ${b} =`;
            operation = null;
        }

        currentInput = result.toString();
        shouldResetScreen = true;
        updateDisplay();
    }

    // --- Memory Logic ---
    function memoryCalc(action) {
        let val = parseFloat(currentInput);
        if (isNaN(val)) val = 0;

        switch(action) {
            case 'MC':
                memory = 0;
                break;
            case 'MR':
                currentInput = memory.toString();
                shouldResetScreen = true;
                updateDisplay();
                break;
            case 'M+':
                memory += val;
                shouldResetScreen = true;
                break;
            case 'M-':
                memory -= val;
                shouldResetScreen = true;
                break;
        }
    }

    // --- UI Update ---
    function updateDisplay() {
        currentDisplay.innerText = currentInput;
    }

    // --- Keyboard Support ---
    document.addEventListener('keydown', (e) => {
        const key = e.key;

        // Numbers
        if (/[0-9]/.test(key)) {
            inputDigit(key);
        }
        // Operators
        else if (key === '+') chooseOperation('+');
        else if (key === '-') chooseOperation('-');
        else if (key === '*') chooseOperation('*');
        else if (key === '/') { e.preventDefault(); chooseOperation('/'); }
        // Actions
        else if (key === 'Enter' || key === '=') { e.preventDefault(); computeResult(); }
        else if (key === 'Backspace') backspace();
        else if (key === 'Escape') clearDisplay(); // Full Clear
        else if (key === 'Delete') clearEntry(); // CE
        else if (key === '.') inputDecimal();
        else if (key === '%') { 
            // Simple percentage implementation: current / 100
            currentInput = (parseFloat(currentInput) / 100).toString();
            shouldResetScreen = true;
            updateDisplay(); 
        }
    });

</script>
</body>
</html>
