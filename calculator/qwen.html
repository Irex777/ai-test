<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Calculator</title>
    <style>
        :root {
            --bg-color: #121212;
            --calc-bg: #1e1e1e;
            --display-bg: #2d2d2d;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --accent: #00e676;
            --btn-num: #3c3c3c;
            --btn-op: #ff9100;
            --btn-func: #505050;
            --btn-memory: #2a2a2a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .calculator {
            background-color: var(--calc-bg);
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 95vh;
            max-height: 800px;
        }

        /* Display Section */
        .display-container {
            background-color: var(--display-bg);
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            word-wrap: break-word;
            word-break: break-all;
        }

        .history {
            color: var(--text-dim);
            font-size: 1.2rem;
            min-height: 1.5rem;
            margin-bottom: 5px;
            text-align: right;
        }

        .current-input {
            font-size: 3.5rem;
            font-weight: 300;
            transition: font-size 0.2s;
        }

        .memory-indicator {
            font-size: 0.8rem;
            color: var(--accent);
            align-self: flex-start;
            margin-bottom: 5px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .memory-indicator.active {
            opacity: 1;
        }

        /* Keypad Section */
        .keypad {
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            background-color: var(--calc-bg);
        }

        button {
            border: none;
            outline: none;
            background-color: var(--btn-num);
            color: var(--text-main);
            font-size: 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.1s ease;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 65px;
        }

        button:active {
            transform: scale(0.95);
            filter: brightness(1.2);
        }

        button:focus {
            box-shadow: 0 0 0 2px var(--accent);
        }

        /* Specific Button Styles */
        .btn-op {
            background-color: var(--btn-op);
            color: #fff;
            font-weight: bold;
        }

        .btn-func {
            background-color: var(--btn-func);
            color: var(--accent);
            font-size: 1.2rem;
        }

        .btn-memory {
            background-color: transparent;
            color: var(--text-dim);
            font-size: 1rem;
            height: 40px;
            margin-bottom: 10px;
        }

        .btn-memory:hover {
            color: var(--text-main);
        }

        .span-2 {
            grid-column: span 2;
        }

        /* Responsive adjustments */
        @media (max-width: 350px) {
            .current-input { font-size: 2.5rem; }
            button { height: 55px; font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="calculator">
    <div class="display-container">
        <div id="mem-indicator" class="memory-indicator">M</div>
        <div id="history" class="history"></div>
        <div id="display" class="current-input">0</div>
    </div>

    <div class="keypad">
        <!-- Memory Row 1 -->
        <button class="btn-memory" onclick="calc.memoryClear()">MC</button>
        <button class="btn-memory" onclick="calc.memoryRead()">MR</button>
        <button class="btn-memory" onclick="calc.memoryAdd()">M+</button>
        <button class="btn-memory" onclick="calc.memorySub()">M-</button>

        <!-- Standard Functions -->
        <button class="btn-func" onclick="calc.clear()">AC</button>
        <button class="btn-func" onclick="calc.clearEntry()">CE</button>
        <button class="btn-func" onclick="calc.percent()">%</button>
        <button class="btn-func btn-op" onclick="calc.chooseOp('/')">÷</button>

        <!-- Row 7-9 -->
        <button onclick="calc.inputDigit('7')">7</button>
        <button onclick="calc.inputDigit('8')">8</button>
        <button onclick="calc.inputDigit('9')">9</button>
        <button class="btn-func btn-op" onclick="calc.chooseOp('*')">×</button>

        <!-- Row 4-6 -->
        <button onclick="calc.inputDigit('4')">4</button>
        <button onclick="calc.inputDigit('5')">5</button>
        <button onclick="calc.inputDigit('6')">6</button>
        <button class="btn-func btn-op" onclick="calc.chooseOp('-')">−</button>

        <!-- Row 1-3 -->
        <button onclick="calc.inputDigit('1')">1</button>
        <button onclick="calc.inputDigit('2')">2</button>
        <button onclick="calc.inputDigit('3')">3</button>
        <button class="btn-func btn-op" onclick="calc.chooseOp('+')">+</button>

        <!-- Bottom Row -->
        <button onclick="calc.toggleSign()">+/-</button>
        <button onclick="calc.inputDigit('0')">0</button>
        <button onclick="calc.inputDot()">.</button>
        <button class="btn-func btn-op" onclick="calc.backspace()">⌫</button>
        
        <!-- Equal Button (Full width or large) -->
        <button class="btn-op span-2" style="grid-column: span 4;" onclick="calc.compute()">=</button>
    </div>
</div>

<script>
    class Calculator {
        constructor(displayElement, historyElement, memIndicator) {
            this.displayElement = displayElement;
            this.historyElement = historyElement;
            this.memIndicator = memIndicator;
            
            this.reset();
            this.memory = 0;
        }

        reset() {
            this.currentOperand = '0';
            this.previousOperand = '';
            this.operation = undefined;
            this.shouldResetScreen = false;
            this.lastResult = null;
            this.updateDisplay();
        }

        clear() {
            this.reset();
        }

        clearEntry() {
            this.currentOperand = '0';
            this.updateDisplay();
        }

        backspace() {
            if (this.shouldResetScreen) return;
            this.currentOperand = this.currentOperand.toString().slice(0, -1);
            if (this.currentOperand === '' || this.currentOperand === '-') {
                this.currentOperand = '0';
            }
            this.updateDisplay();
        }

        inputDigit(digit) {
            if (this.shouldResetScreen) {
                this.currentOperand = digit;
                this.shouldResetScreen = false;
            } else {
                if (this.currentOperand === '0' && digit !== '0') {
                    this.currentOperand = digit;
                } else if (this.currentOperand === '0' && digit === '0') {
                    // Do nothing
                } else {
                    this.currentOperand = this.currentOperand.toString() + digit;
                }
            }
            this.updateDisplay();
        }

        inputDot() {
            if (this.shouldResetScreen) {
                this.currentOperand = '0.';
                this.shouldResetScreen = false;
                this.updateDisplay();
                return;
            }
            if (!this.currentOperand.toString().includes('.')) {
                this.currentOperand = this.currentOperand.toString() + '.';
                this.updateDisplay();
            }
        }

        toggleSign() {
            if (this.currentOperand === '0') return;
            this.currentOperand = (parseFloat(this.currentOperand) * -1).toString();
            this.updateDisplay();
        }

        percent() {
            const current = parseFloat(this.currentOperand);
            if (current === 0) return;
            this.currentOperand = (current / 100).toString();
            this.updateDisplay();
        }

        chooseOp(op) {
            if (this.operation !== undefined && !this.shouldResetScreen) {
                this.compute();
            }
            this.operation = op;
            this.previousOperand = this.currentOperand;
            this.shouldResetScreen = true;
            this.updateHistory();
        }

        compute() {
            if (!this.operation) return;
            
            let computation;
            const prev = parseFloat(this.previousOperand);
            const current = parseFloat(this.currentOperand);
            
            if (isNaN(prev) || isNaN(current)) return;

            switch (this.operation) {
                case '+':
                    computation = prev + current;
                    break;
                case '-':
                    computation = prev - current;
                    break;
                case '*':
                    computation = prev * current;
                    break;
                case '/':
                    if (current === 0) {
                        this.handleError();
                        return;
                    }
                    computation = prev / current;
                    break;
                default:
                    return;
            }

            // Handle floating point errors (e.g. 0.1 + 0.2)
            computation = Math.round(computation * 10000000000) / 10000000000;

            this.currentOperand = computation.toString();
            this.operation = undefined;
            this.previousOperand = '';
            this.shouldResetScreen = true;
            this.lastResult = computation;
            this.updateDisplay();
            this.historyElement.innerText = ''; // Clear history after final calc
        }

        handleError() {
            this.currentOperand = 'Error';
            this.shouldResetScreen = true;
            this.operation = undefined;
            this.previousOperand = '';
            this.updateDisplay();
            setTimeout(() => {
                this.clear();
            }, 1500);
        }

        // Memory Functions
        memoryClear() {
            this.memory = 0;
            this.memIndicator.classList.remove('active');
        }

        memoryRead() {
            if (this.memory !== 0) {
                this.currentOperand = this.memory.toString();
                this.shouldResetScreen = true;
                this.updateDisplay();
            }
        }

        memoryAdd() {
            this.memory += parseFloat(this.currentOperand);
            this.memIndicator.classList.add('active');
            this.shouldResetScreen = true;
        }

        memorySub() {
            this.memory -= parseFloat(this.currentOperand);
            this.memIndicator.classList.add('active');
            this.shouldResetScreen = true;
        }

        updateDisplay() {
            // Format numbers with commas
            if (this.currentOperand !== 'Error') {
                const stringNumber = this.currentOperand.toString();
                const numberPart = stringNumber.split('.')[0];
                const decimalPart = stringNumber.split('.')[1];
                
                let internationalDisplay;
                if (decimalPart) {
                    internationalDisplay = numberPart.split('').reverse().reduce((curr, next) => {
                        return next + (curr.length > 0 && curr.length % 3 === 0 ? ',' : '') + curr;
                    }, '') + '.' + decimalPart;
                } else {
                    internationalDisplay = numberPart.split('').reverse().reduce((curr, next) => {
                        return next + (curr.length > 0 && curr.length % 3 === 0 ? ',' : '') + curr;
                    }, '');
                }
                this.displayElement.innerText = internationalDisplay;
            } else {
                this.displayElement.innerText = this.currentOperand;
            }
            
            // Adjust font size if number is huge
            if (this.displayElement.innerText.length > 12) {
                this.displayElement.style.fontSize = '2rem';
            } else if (this.displayElement.innerText.length > 9) {
                this.displayElement.style.fontSize = '2.5rem';
            } else {
                this.displayElement.style.fontSize = '3.5rem';
            }
        }

        updateHistory() {
            const opSymbol = this.operation === '*' ? '×' : 
                            this.operation === '/' ? '÷' : 
                            this.operation === '-' ? '−' : '+';
            
            this.historyElement.innerText = `${this.previousOperand} ${opSymbol}`;
        }
    }

    // Initialization
    const display = document.getElementById('display');
    const history = document.getElementById('history');
    const memInd = document.getElementById('mem-indicator');
    
    const calc = new Calculator(display, history, memInd);

    // Keyboard Support
    document.addEventListener('keydown', (e) => {
        // Digits
        if (e.key >= '0' && e.key <= '9') calc.inputDigit(e.key);
        
        // Operators
        if (e.key === '+') calc.chooseOp('+');
        if (e.key === '-') calc.chooseOp('-');
        if (e.key === '*') calc.chooseOp('*');
        if (e.key === '/') {
            e.preventDefault(); // Prevent quick find in Firefox
            calc.chooseOp('/');
        }
        
        // Actions
        if (e.key === 'Enter' || e.key === '=') calc.compute();
        if (e.key === 'Backspace') calc.backspace();
        if (e.key === 'Escape') calc.clear();
        if (e.key === 'Delete') calc.clearEntry();
        if (e.key === '.') calc.inputDot();
        if (e.key === '%') calc.percent();
    });

</script>
</body>
</html>
