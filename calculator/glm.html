<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Calculator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07070a;--surface:#111114;--display-bg:#0a0a0d;
  --btn:#18181d;--btn-h:#222228;--btn-a:#0f0f13;
  --fn:#141419;--fn-h:#1c1c23;
  --op:#1e1a12;--op-h:#2a2518;
  --accent:#d4922a;--accent-h:#e8a838;--accent-glow:rgba(212,146,42,0.25);
  --text:#dfe0e4;--dim:#58585f;--muted:#3e3e46;
  --mem:#5a9a6a;--err:#e85050;
  --bdr:rgba(255,255,255,0.04);
}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;
  background:var(--bg);display:flex;align-items:center;justify-content:center;
  overflow:hidden;color:var(--text);
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 600px 400px at 25% 15%,rgba(212,146,42,0.04),transparent),
    radial-gradient(ellipse 500px 500px at 80% 75%,rgba(212,146,42,0.025),transparent);
  animation:amb 20s ease-in-out infinite alternate;
}
@keyframes amb{from{opacity:.7}to{opacity:1}}
.calc{
  position:relative;width:370px;max-width:96vw;
  background:var(--surface);border-radius:22px;
  border:1px solid var(--bdr);
  box-shadow:0 30px 80px rgba(0,0,0,.55),inset 0 0 0 1px rgba(255,255,255,.02);
  padding:16px 16px 18px;user-select:none;
}
.brand{
  font-size:10px;font-weight:700;letter-spacing:3.5px;
  text-transform:uppercase;color:var(--muted);text-align:center;
  margin-bottom:10px;
}
.display{
  position:relative;background:var(--display-bg);border-radius:14px;
  padding:16px 20px 14px;margin-bottom:12px;min-height:108px;
  display:flex;flex-direction:column;justify-content:flex-end;align-items:flex-end;
  box-shadow:inset 0 2px 12px rgba(0,0,0,.45);overflow:hidden;
}
.mi{
  position:absolute;top:10px;left:14px;font-size:11px;font-weight:700;
  color:var(--mem);opacity:0;transition:opacity .3s;letter-spacing:.5px;
}
.mi.flash{color:#fff;transition:color .05s}
.hist{
  font-family:'SF Mono','Cascadia Mono','Fira Mono',Consolas,'Liberation Mono',Menlo,monospace;
  font-size:13px;color:var(--dim);text-align:right;width:100%;
  min-height:18px;line-height:1.5;word-break:break-all;
}
.cur{
  font-family:'SF Mono','Cascadia Mono','Fira Mono',Consolas,'Liberation Mono',Menlo,monospace;
  font-size:44px;font-weight:300;color:var(--text);text-align:right;width:100%;
  line-height:1.15;margin-top:6px;transition:font-size .12s ease;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.cur.err{color:var(--err);font-size:22px;font-weight:500}
.cur.sm{font-size:34px}
.cur.xs{font-size:26px}
.cur.xx{font-size:20px}
@keyframes pop{from{transform:translateY(5px);opacity:.4}to{transform:none;opacity:1}}
.cur.pop{animation:pop .18s ease-out}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.b{
  font-family:inherit;font-size:18px;border:none;border-radius:12px;
  padding:16px 0;cursor:pointer;background:var(--btn);color:var(--text);
  transition:background .08s,transform .08s;position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;outline:none;
}
.b:hover{background:var(--btn-h)}
.b:active{transform:scale(.94);background:var(--btn-a)}
.b:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.b.m{
  background:transparent;color:var(--muted);font-size:12px;font-weight:700;
  letter-spacing:.4px;padding:11px 0;border-radius:8px;
}
.b.m:hover{background:rgba(90,154,106,.08);color:var(--mem)}
.b.m:active{background:rgba(90,154,106,.16)}
.b.f{background:var(--fn);color:var(--dim);font
