<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .calculator {
            background: #16213e;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
        }
        .display {
            background: #0f0f23;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: right;
        }
        .history {
            color: #6c757d;
            font-size: 14px;
            min-height: 20px;
            word-wrap: break-word;
        }
        .current {
            color: #e94560;
            font-size: 36px;
            font-weight: 300;
            min-height: 44px;
            word-wrap: break-word;
        }
        .memory-indicator {
            color: #4ecca3;
            font-size: 12px;
            min-height: 16px;
        }
        .button-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }
        button {
            border: none;
            border-radius: 12px;
            padding: 18px 10px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
        }
        button:hover {
            transform: scale(1.05);
        }
        button:active {
            transform: scale(0.95);
        }
        .number, .decimal {
            background: #2a2a4a;
            color: #fff;
        }
        .operator {
            background: #e94560;
            color: #fff;
        }
        .operator:hover {
            background: #ff6b6b;
        }
        .function {
            background: #3a3a5a;
            color: #4ecca3;
        }
        .function:hover {
            background: #4a4a6a;
        }
        .clear {
            background: #ff4757;
            color: #fff;
        }
        .clear:hover {
            background: #ff6b7a;
        }
        .memory {
            background: #2d4a3e;
            color: #4ecca3;
            font-size: 14px;
        }
        .memory:hover {
            background: #3d5a4e;
        }
        .equals {
            background: #4ecca3;
            color: #1a1a2e;
        }
        .equals:hover {
            background: #5eddb3;
        }
        .span-2 {
            grid-column: span 2;
        }
        .error {
            color: #ff4757;
        }
        @media (max-width: 380px) {
            .button-grid {
                gap: 6px;
            }
            button {
                padding: 14px 6px;
                font-size: 16px;
            }
            .current {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="memory-indicator" id="memoryIndicator"></div>
            <div class="history" id="history"></div>
            <div class="current" id="current">0</div>
        </div>
        <div class="button-grid">
            <button class="memory" data-action="mc">MC</button>
            <button class="memory" data-action="mr">MR</button>
            <button class="memory" data-action="m-plus">M+</button>
            <button class="memory" data-action="m-minus">M-</button>
            <button class="clear" data-action="ce">CE</button>
            
            <button class="function" data-action="clear">C</button>
            <button class="function" data-action="backspace">⌫</button>
            <button class="function" data-action="percent">%</button>
            <button class="operator" data-action="operator" data-value="/">÷</button>
            <button class="function" data-action="negate">±</button>
            
            <button class="number" data-action="number" data-value="7">7</button>
            <button class="number" data-action="number" data-value="8">8</button>
            <button class="number" data-action="number" data-value="9">9</button>
            <button class="operator" data-action="operator" data-value="*">×</button>
            <button class="function" data-action="sqrt">√</button>
            
            <button class="number" data-action="number" data-value="4">4</button>
            <button class="number" data-action="number" data-value="5">5</button>
            <button class="number" data-action="number" data-value="6">6</button>
            <button class="operator" data-action="operator" data-value="-">−</button>
            <button class="function" data-action="reciprocal">1/x</button>
            
            <button class="number" data-action="number" data-value="1">1</button>
            <button class="number" data-action="number" data-value="2">2</button>
            <button class="number" data-action="number" data-value="3">3</button>
            <button class="operator" data-action="operator" data-value="+">+</button>
            <button class="function" data-action="square">x²</button>
            
            <button class="number span-2" data-action="number" data-value="0">0</button>
            <button class="decimal" data-action="decimal">.</button>
            <button class="equals" data-action="equals">=</button>
        </div>
    </div>
    <script>
        class Calculator {
            constructor() {
                this.currentValue = '0';
                this.previousValue = '';
                this.operator = null;
                this.history = '';
                this.memory = 0;
                this.shouldResetDisplay = false;
                this.lastResult = null;
                
                this.currentDisplay = document.getElementById('current');
                this.historyDisplay = document.getElementById('history');
                this.memoryIndicator = document.getElementById('memoryIndicator');
                
                this.bindEvents();
            }
            
            bindEvents() {
                document.querySelectorAll('button[data-action]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        this.handleAction(e.target.dataset.action, e.target.dataset.value);
                        e.target.blur();
                    });
                });
                
                document.addEventListener('keydown', (e) => this.handleKeyboard(e));
            }
            
            handleKeyboard(e) {
                const key = e.key;
                
                if (key >= '0' && key <= '9') {
                    this.pressButton(`[data-value="${key}"]`);
                } else if (key === '.') {
                    this.pressButton('[data-action="decimal"]');
                } else if (key === '+' || key === '-' || key === '*' || key === '/') {
                    this.pressButton(`[data-value="${key}"]`);
                } else if (key === 'Enter' || key === '=') {
                    e.preventDefault();
                    this.pressButton('[data-action="equals"]');
                } else if (key === 'Escape') {
                    this.pressButton('[data-action="clear"]');
                } else if (key === 'Backspace') {
                    this.pressButton('[data-action="backspace"]');
                } else if (key === 'Delete') {
                    this.pressButton('[data-action="ce"]');
                } else if (key === '%') {
                    this.pressButton('[data-action="percent"]');
                }
            }
            
            pressButton(selector) {
                const btn = document.querySelector(selector);
                if (btn) btn.click();
            }
            
            handleAction(action, value) {
                this.clearError();
                
                switch (action) {
                    case 'number':
                        this.inputNumber(value);
                        break;
                    case 'operator':
                        this.inputOperator(value);
                        break;
                    case 'decimal':
                        this.inputDecimal();
                        break;
                    case 'equals':
                        this.calculate();
                        break;
                    case 'clear':
                        this.clearAll();
                        break;
                    case 'ce':
                        this.clearEntry();
                        break;
                    case 'backspace':
                        this.backspace();
                        break;
                    case 'percent':
                        this.percent();
                        break;
                    case 'negate':
                        this.negate();
                        break;
                    case 'mc':
                        this.memoryClear();
                        break;
                    case 'mr':
                        this.memoryRecall();
                        break;
                    case 'm-plus':
                        this.memoryAdd();
                        break;
                    case 'm-minus':
                        this.memorySubtract();
                        break;
                    case 'sqrt':
                        this.squareRoot();
                        break;
                    case 'square':
                        this.square();
                        break;
                    case 'reciprocal':
                        this.reciprocal();
                        break;
                }
                
                this.updateDisplay();
            }
            
            inputNumber(num) {
                if (this.shouldResetDisplay) {
                    this.currentValue = num;
                    this.shouldResetDisplay = false;
                } else {
                    this.currentValue = this.currentValue === '0' ? num : this.currentValue + num;
                }
                this.limitLength();
            }
            
            inputOperator(op) {
                if (this.operator && !this.shouldResetDisplay) {
                    this.calculate();
                }
                
                this.previousValue = this.currentValue;
                this.operator = op;
                this.shouldResetDisplay = true;
                this.history = `${this.formatNumber(this.previousValue)} ${this.formatOperator(op)}`;
            }
            
            inputDecimal() {
                if (this.shouldResetDisplay) {
                    this.currentValue = '0.';
                    this.shouldResetDisplay = false;
                } else if (!this.currentValue.includes('.')) {
                    this.currentValue += '.';
                }
            }
            
            calculate() {
                if (!this.operator || this.previousValue === '') return;
                
                const prev = parseFloat(this.previousValue);
                const current = parseFloat(this.currentValue);
                let result;
                
                switch (this.operator) {
                    case '+':
                        result = prev + current;
                        break;
                    case '-':
                        result = prev - current;
                        break;
                    case '*':
                        result = prev * current;
                        break;
                    case '/':
                        if (current === 0) {
                            this.showError('Cannot divide by zero');
                            this.currentValue = 'Error';
                            this.operator = null;
                            this.previousValue = '';
                            this.shouldResetDisplay = true;
                            return;
                        }
                        result = prev / current;
                        break;
                }
                
                this.history = `${this.formatNumber(this.previousValue)} ${this.formatOperator(this.operator)} ${this.formatNumber(this.currentValue)} =`;
                this.currentValue = this.formatResult(result);
                this.lastResult = this.currentValue;
                this.operator = null;
                this.previousValue = '';
                this.shouldResetDisplay = true;
            }
            
            clearAll() {
                this.currentValue = '0';
                this.previousValue = '';
                this.operator = null;
                this.history = '';
                this.shouldResetDisplay = false;
            }
            
            clearEntry() {
                this.currentValue = '0';
                this.shouldResetDisplay = false;
            }
            
            backspace() {
                if (this.shouldResetDisplay) return;
                
                this.currentValue = this.currentValue.length > 1 
                    ? this.currentValue.slice(0, -1) 
                    : '0';
            }
            
            percent() {
                const value = parseFloat(this.currentValue);
                this.currentValue = this.formatResult(value / 100);
                this.shouldResetDisplay = true;
            }
            
            negate() {
                const value = parseFloat(this.currentValue);
                this.currentValue = this.formatResult(-value);
            }
            
            memoryClear() {
                this.memory = 0;
                this.updateMemoryIndicator();
            }
            
            memoryRecall() {
                this.currentValue = this.formatResult(this.memory);
                this.shouldResetDisplay = true;
            }
            
            memoryAdd() {
                this.memory += parseFloat(this.currentValue);
                this.updateMemoryIndicator();
                this.shouldResetDisplay = true;
            }
            
            memorySubtract() {
                this.memory -= parseFloat(this.currentValue);
                this.updateMemoryIndicator();
                this.shouldResetDisplay = true;
            }
            
            squareRoot() {
                const value = parseFloat(this.currentValue);
                if (value < 0) {
                    this.showError('Invalid input');
                    return;
                }
                this.currentValue = this.formatResult(Math.sqrt(value));
                this.shouldResetDisplay = true;
            }
            
            square() {
                const value = parseFloat(this.currentValue);
                this.currentValue = this.formatResult(value * value);
                this.shouldResetDisplay = true;
            }
            
            reciprocal() {
                const value = parseFloat(this.currentValue);
                if (value === 0) {
                    this.showError('Cannot divide by zero');
                    return;
                }
                this.currentValue = this.formatResult(1 / value);
                this.shouldResetDisplay = true;
            }
            
            formatNumber(num) {
                const n = parseFloat(num);
                if (isNaN(n)) return '0';
                return n.toLocaleString('en-US', { maximumFractionDigits: 10 });
            }
            
            formatOperator(op) {
                const operators = { '+': '+', '-': '−', '*': '×', '/': '÷' };
                return operators[op] || op;
            }
            
            formatResult(num) {
                if (!isFinite(num)) return 'Error';
                if (isNaN(num)) return 'Error';
                
                const rounded = Math.round(num * 1e10) / 1e10;
                return String(rounded);
            }
            
            limitLength() {
                const maxLen = 15;
                if (this.currentValue.length > maxLen) {
                    this.currentValue = this.currentValue.slice(0, maxLen);
                }
            }
            
            showError(msg) {
                this.currentDisplay.classList.add('error');
                this.currentValue = msg;
                this.shouldResetDisplay = true;
                setTimeout(() => this.clearError(), 2000);
            }
            
            clearError() {
                this.currentDisplay.classList.remove('error');
                if (this.currentValue === 'Error' || this.currentValue === 'Invalid input' || this.currentValue === 'Cannot divide by zero') {
                    this.currentValue = '0';
                }
            }
            
            updateMemoryIndicator() {
                this.memoryIndicator.textContent = this.memory !== 0 ? 'M' : '';
            }
            
            updateDisplay() {
                this.currentDisplay.textContent = this.currentValue;
                this.historyDisplay.textContent = this.history;
            }
        }
        
        new Calculator();
    </script>
</body>
</html>
