<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<style>
  :root {
    --bg: #0f1020;
    --bg-grad-1: #14152b;
    --bg-grad-2: #0a0b16;
    --card: #1c1d2e;
    --display-bg: #0a0b16;
    --digit: #2b2c44;
    --digit-hover: #3a3c58;
    --func: #3d3f5c;
    --func-hover: #4c4f70;
    --mem: #232443;
    --mem-hover: #303155;
    --accent: #ff9f0a;
    --accent-hover: #ffb13d;
    --accent-press: #e68900;
    --eq-grad: linear-gradient(135deg, #ff9f0a 0%, #ff5e3a 100%);
    --eq-hover: linear-gradient(135deg, #ffb13d 0%, #ff7a5a 100%);
    --text: #f5f5fa;
    --muted: #8a8ca8;
    --danger: #ff453a;
    --shadow: 0 20px 60px rgba(0, 0, 0, 0.55);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 16px;
    background: radial-gradient(circle at 30% 20%, var(--bg-grad-1), var(--bg-grad-2));
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  .calculator {
    width: min(420px, 94vw);
    background: var(--card);
    border-radius: 24px;
    padding: clamp(14px, 3vw, 22px);
    box-shadow: var(--shadow);
    border: 1px solid rgba(255, 255, 255, 0.04);
  }

  .display {
    background: var(--display-bg);
    border-radius: 16px;
    padding: 18px 20px;
    margin-bottom: 16px;
    text-align: right;
    position: relative;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    border: 1px solid rgba(255, 255, 255, 0.03);
    overflow: hidden;
  }

  .memory-badge {
    position: absolute;
    top: 12px;
    left: 16px;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .memory-badge.active { opacity: 1; }

  .history {
    font-size: clamp(0.95rem, 3.2vw, 1.15rem);
    color: var(--muted);
    min-height: 1.4em;
    word-break: break-all;
    line-height: 1.3;
    margin-bottom: 6px;
  }

  .current {
    font-size: clamp(2rem, 9vw, 3.2rem);
    font-weight: 600;
    line-height: 1.1;
    word-break: break-all;
    transition: font-size 0.05s linear;
  }

  .current.error { color: var(--danger); }

  .keys {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-auto-rows: 1fr;
    grid-template-areas:
      "mc   mr   mp   mm"
      "c    ce   perc bs"
      "b7   b8   b9   div"
      "b4   b5   b6   mul"
      "b1   b2   b3   sub"
      "sign b0   dot  add"
      "eq   eq   eq   eq";
    gap: clamp(6px, 1.6vw, 10px);
    aspect-ratio: 1 / 1.25;
  }

  button {
    border: none;
    border-radius: 14px;
    font-size: clamp(1.05rem, 4.4vw, 1.5rem);
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: transform 0.06s ease, background 0.15s ease, filter 0.15s ease;
    user-select: none;
    font-family: inherit;
    background: var(--digit);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
    min-width: 0;
  }

  button:hover { background: var(--digit-hover); }
  button:active { transform: scale(0.95); filter: brightness(1.1); }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .mem { background: var(--mem); font-size: clamp(0.8rem, 3.2vw, 1rem); font-weight: 600; color: var(--muted); }
  .mem:hover { background: var(--mem-hover); color: var(--text); }

  .func { background: var(--func); font-weight: 600; }
  .func:hover { background: var(--func-hover); }

  .op { background: var(--accent); color: #1a1205; font-weight: 700; }
  .op:hover { background: var(--accent-hover); }
  .op.active-op { filter: brightness(1.25); box-shadow: inset 0 0 0 2px rgba(255,255,255,0.4); }

  .eq {
    grid-area: eq;
    background: var(--eq-grad);
    color: #1a1205;
    font-weight: 800;
    font-size: clamp(1.3rem, 5vw, 1.8rem);
    letter-spacing: 2px;
  }
  .eq:hover { background: var(--eq-hover); }

  .hint {
    margin-top: 12px;
    text-align: center;
    font-size: 0.7rem;
    color: var(--muted);
    opacity: 0.7;
    line-height: 1.5;
  }

  @media (max-width: 360px) {
    .hint { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    button { transition: none; }
  }
</style>
</head>
<body>
  <main class="calculator" role="application" aria-label="Calculator">
    <section class="display" aria-live="polite">
      <span class="memory-badge" id="memBadge" aria-label="Memory in use">M</span>
      <div class="history" id="history">&nbsp;</div>
      <div class="current" id="current" aria-label="Current value">0</div>
    </section>

    <div class="keys" role="group" aria-label="Calculator keys">
      <button class="mem" style="grid-area:mc"  data-action="mc"   aria-label="Memory clear">MC</button>
      <button class="mem" style="grid-area:mr"  data-action="mr"   aria-label="Memory recall">MR</button>
      <button class="mem" style="grid-area:mp"  data-action="madd" aria-label="Memory add">M+</button>
      <button class="mem" style="grid-area:mm"  data-action="msub" aria-label="Memory subtract">M-</button>

      <button class="func" style="grid-area:c"    data-action="clear"      aria-label="Clear all">C</button>
      <button class="func" style="grid-area:ce"   data-action="clearEntry" aria-label="Clear entry">CE</button>
      <button class="func" style="grid-area:perc" data-action="percent"    aria-label="Percent">%</button>
      <button class="func" style="grid-area:bs"   data-action="backspace"  aria-label="Backspace">&#9003;</button>

      <button style="grid-area:b7"  data-action="digit" data-val="7">7</button>
      <button style="grid-area:b8"  data-action="digit" data-val="8">8</button>
      <button style="grid-area:b9"  data-action="digit" data-val="9">9</button>
      <button class="op" style="grid-area:div"  data-action="op" data-val="/" aria-label="Divide">&divide;</button>

      <button style="grid-area:b4"  data-action="digit" data-val="4">4</button>
      <button style="grid-area:b5"  data-action="digit" data-val="5">5</button>
      <button style="grid-area:b6"  data-action="digit" data-val="6">6</button>
      <button class="op" style="grid-area:mul"  data-action="op" data-val="*" aria-label="Multiply">&times;</button>

      <button style="grid-area:b1"  data-action="digit" data-val="1">1</button>
      <button style="grid-area:b2"  data-action="digit" data-val="2">2</button>
      <button style="grid-area:b3"  data-action="digit" data-val="3">3</button>
      <button class="op" style="grid-area:sub"  data-action="op" data-val="-" aria-label="Subtract">&minus;</button>

      <button class="func" style="grid-area:sign" data-action="sign"   aria-label="Toggle sign">&#177;</button>
      <button style="grid-area:b0"  data-action="digit" data-val="0">0</button>
      <button style="grid-area:dot" data-action="decimal" aria-label="Decimal point">.</button>
      <button class="op" style="grid-area:add"  data-action="op" data-val="+" aria-label="Add">+</button>

      <button class="eq" data-action="equals" aria-label="Equals">=</button>
    </div>

    <p class="hint">Keys: 0-9 . + &minus; * / Enter(=) Backspace Esc(=C) Del(=CE) % n(+/&minus;)</p>
  </main>

<script>
(function () {
  "use strict";

  var current = "0";        // string currently being typed / shown
  var previous = null;      // accumulated numeric value (null = none)
  var operator = null;      // pending operator symbol
  var expression = "";      // history display string
  var waitingForOperand = false;  // true after an operator press
  var justEvaluated = false;      // true right after "="
  var memory = 0;

  var elCurrent = document.getElementById("current");
  var elHistory = document.getElementById("history");
  var elMemBadge = document.getElementById("memBadge");

  var OP_SYMBOL = { "+": "+", "-": "\u2212", "*": "\u00d7", "/": "\u00f7" };

  function roundResult(n) {
    if (!isFinite(n)) return n;
    return Math.round((n + Number.EPSILON) * 1e12) / 1e12;
  }

  function formatNumber(n) {
    if (typeof n === "string") return n;
    if (!isFinite(n)) return "Error";
    n = roundResult(n);
    var str = String(n);
    if (str.replace(/[-.]/g, "").length > 14) {
      str = parseFloat(n.toPrecision(12)).toString();
    }
    return str;
  }

  function compute(a, b, op) {
    switch (op) {
      case "+": return a + b;
      case "-": return a - b;
      case "*": return a * b;
      case "/": return b === 0 ? "Error" : a / b;
    }
    return b;
  }

  function shrinkFont(text) {
    var len = text.replace(/[-.]/g, "").length;
    if (len > 12) return "clamp(1.4rem, 6vw, 2.1rem)";
    if (len > 9)  return "clamp(1.7rem, 7vw, 2.5rem)";
    return "";  // use CSS default
  }

  function updateDisplay() {
    elCurrent.textContent = current;
    elCurrent.classList.toggle("error", current === "Error");
    elCurrent.style.fontSize = shrinkFont(current);
    elHistory.textContent = expression || "\u00a0";
    elMemBadge.classList.toggle("active", memory !== 0);

    document.querySelectorAll(".op.active-op").forEach(function (b) { b.classList.remove("active-op"); });
    if (operator && !justEvaluated) {
      var active = document.querySelector('.op[data-val="' + operator + '"]');
      if (active) active.classList.add("active-op");
    }
  }

  function handleError() {
    current = "Error";
    expression = "";
    previous = null;
    operator = null;
    waitingForOperand = false;
    justEvaluated = false;
    updateDisplay();
  }

  // ---- Input handlers ----
  function inputDigit(d) {
    if (current === "Error") clearAll();
    if (waitingForOperand) {
      current = d;
      waitingForOperand = false;
    } else if (justEvaluated) {
      current = d;
      expression = "";
      justEvaluated = false;
    } else {
      current = current === "0" ? d : current + d;
    }
    updateDisplay();
  }

  function inputDecimal() {
    if (current === "Error") clearAll();
    if (waitingForOperand || justEvaluated) {
      current = "0.";
      waitingForOperand = false;
      if (justEvaluated) expression = "";
      justEvaluated = false;
    } else if (current.indexOf(".") === -1) {
      current += ".";
    }
    updateDisplay();
  }

  function setOperator(nextOp) {
    if (current === "Error") return;
    var inputValue = parseFloat(current);
    if (isNaN(inputValue)) inputValue = 0;

    if (previous === null) {
      previous = inputValue;
    } else if (operator && !waitingForOperand) {
      var result = compute(previous, inputValue, operator);
      if (result === "Error" || !isFinite(result)) { handleError(); return; }
      previous = result;
      current = formatNumber(result);
    }

    operator = nextOp;
    waitingForOperand = true;
    justEvaluated = false;
    expression = formatNumber(previous) + " " + (OP_SYMBOL[nextOp] || nextOp);
    updateDisplay();
  }

  function equals() {
    if (operator === null || previous === null || current === "Error") return;
    var inputValue = waitingForOperand ? previous : parseFloat(current);
    if (isNaN(inputValue)) inputValue = 0;

    var result = compute(previous, inputValue, operator);
    expression = formatNumber(previous) + " " + (OP_SYMBOL[operator] || operator) +
                 " " + formatNumber(inputValue) + " =";

    if (result === "Error" || !isFinite(result)) { handleError(); return; }

    current = formatNumber(result);
    previous = null;
    operator = null;
    waitingForOperand = false;
    justEvaluated = true;
    updateDisplay();
  }

  function clearAll() {
    current = "0";
    previous = null;
    operator = null;
    expression = "";
    waitingForOperand = false;
    justEvaluated = false;
    updateDisplay();
  }

  function clearEntry() {
    if (current === "Error") { clearAll(); return; }
    current = "0";
    waitingForOperand = false;
    updateDisplay();
  }

  function backspace() {
    if (current === "Error") { clearAll(); return; }
    if (waitingForOperand || justEvaluated) return;
    if (current.length > 1) {
      current = current.slice(0, -1);
      if (current === "-") current = "0";
    } else {
      current = "0";
    }
    updateDisplay();
  }

  function percent() {
    if (current === "Error") return;
    var val = parseFloat(current);
    if (isNaN(val)) return;
    if (operator !== null && previous !== null) {
      val = previous * val / 100;   // e.g. 50 + 10% -> 50 + 5
    } else {
      val = val / 100;
    }
    current = formatNumber(val);
    updateDisplay();
  }

  function toggleSign() {
    if (current === "Error" || current === "0") return;
    current = current.charAt(0) === "-" ? current.slice(1) : "-" + current;
    updateDisplay();
  }

  // ---- Memory ----
  function memoryAdd() {
    if (current === "Error") return;
    memory = roundResult(memory + (parseFloat(current) || 0));
    updateDisplay();
  }
  function memorySubtract() {
    if (current === "Error") return;
    memory = roundResult(memory - (parseFloat(current) || 0));
    updateDisplay();
  }
  function memoryRecall() {
    if (current === "Error") clearAll();
    current = formatNumber(memory);
    waitingForOperand = false;
    justEvaluated = true;
    updateDisplay();
  }
  function memoryClear() {
    memory = 0;
    updateDisplay();
  }

  // ---- Dispatch ----
  function handleAction(action, val) {
    switch (action) {
      case "digit":      inputDigit(val); break;
      case "decimal":    inputDecimal(); break;
      case "op":         setOperator(val); break;
      case "equals":     equals(); break;
      case "clear":      clearAll(); break;
      case "clearEntry": clearEntry(); break;
      case "backspace":  backspace(); break;
      case "percent":    percent(); break;
      case "sign":       toggleSign(); break;
      case "madd":       memoryAdd(); break;
      case "msub":       memorySubtract(); break;
      case "mr":         memoryRecall(); break;
      case "mc":         memoryClear(); break;
    }
  }

  // ---- Click wiring ----
  document.querySelectorAll(".keys button").forEach(function (btn) {
    btn.addEventListener("click", function () {
      handleAction(btn.dataset.action, btn.dataset.val);
    });
  });

  // ---- Keyboard support ----
  document.addEventListener("keydown", function (e) {
    var k = e.key;

    if (k >= "0" && k <= "9") { handleAction("digit", k); e.preventDefault(); return; }
    if (k === ".")            { handleAction("decimal"); e.preventDefault(); return; }
    if (k === "+" || k === "-" || k === "*" || k === "/") {
      handleAction("op", k); e.preventDefault(); return;
    }
    if (k === "Enter" || k === "=") { handleAction("equals"); e.preventDefault(); return; }
    if (k === "Backspace")          { handleAction("backspace"); e.preventDefault(); return; }
    if (k === "Escape")             { handleAction("clear"); e.preventDefault(); return; }
    if (k === "Delete")             { handleAction("clearEntry"); e.preventDefault(); return; }
    if (k === "%")                  { handleAction("percent"); e.preventDefault(); return; }
    if (k === "n" || k === "N")     { handleAction("sign"); e.preventDefault(); return; }
  });

  updateDisplay();
})();
</script>
</body>
</html>
