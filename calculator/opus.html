<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a1a2e;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            padding: 20px;
        }

        .calculator {
            background: #16213e;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 100%;
        }

        .display {
            background: #0f3460;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .history {
            color: #888;
            font-size: 14px;
            text-align: right;
            min-height: 20px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .current {
            color: #eaeaea;
            font-size: 36px;
            text-align: right;
            font-weight: 300;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .current.error {
            color: #ff6b6b;
            font-size: 24px;
        }

        .memory-indicator {
            color: #4cc9f0;
            font-size: 12px;
            height: 16px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        button {
            border: none;
            border-radius: 12px;
            padding: 20px 10px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
        }

        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        button:active {
            transform: translateY(0);
        }

        .number {
            background: #2a2a4a;
            color: #eaeaea;
        }

        .operator {
            background: #4cc9f0;
            color: #1a1a2e;
        }

        .equals {
            background: #f72585;
            color: #eaeaea;
            grid-row: span 2;
        }

        .clear {
            background: #ff6b6b;
            color: #eaeaea;
        }

        .function {
            background: #3a3a5a;
            color: #4cc9f0;
        }

        .memory {
            background: #3a3a5a;
            color: #7209b7;
        }

        @media (max-width: 380px) {
            .calculator {
                padding: 15px;
            }

            .current {
                font-size: 28px;
            }

            button {
                padding: 15px 8px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="memory-indicator" id="memoryIndicator"></div>
            <div class="history" id="history"></div>
            <div class="current" id="current">0</div>
        </div>
        <div class="buttons">
            <button class="memory" data-action="mc">MC</button>
            <button class="memory" data-action="mr">MR</button>
            <button class="memory" data-action="m-plus">M+</button>
            <button class="memory" data-action="m-minus">M-</button>
            <button class="clear" data-action="ce">CE</button>
            
            <button class="function" data-action="backspace">⌫</button>
            <button class="clear" data-action="c">C</button>
            <button class="function" data-action="sign">+/-</button>
            <button class="function" data-action="percent">%</button>
            <button class="operator" data-action="divide">÷</button>
            
            <button class="number" data-value="7">7</button>
            <button class="number" data-value="8">8</button>
            <button class="number" data-value="9">9</button>
            <button class="operator" data-action="multiply">×</button>
            <button class="operator" data-action="equals">=</button>
            
            <button class="number" data-value="4">4</button>
            <button class="number" data-value="5">5</button>
            <button class="number" data-value="6">6</button>
            <button class="operator" data-action="subtract">−</button>
            
            <button class="number" data-value="1">1</button>
            <button class="number" data-value="2">2</button>
            <button class="number" data-value="3">3</button>
            <button class="operator" data-action="add">+</button>
            
            <button class="number" data-value="0">0</button>
            <button class="number" data-action="decimal">.</button>
        </div>
    </div>

    <script>
        const historyEl = document.getElementById('history');
        const currentEl = document.getElementById('current');
        const memoryIndicator = document.getElementById('memoryIndicator');

        let currentValue = '0';
        let previousValue = '';
        let operator = null;
        let waitingForOperand = false;
        let memory = 0;
        let expression = '';

        function updateDisplay() {
            currentEl.textContent = currentValue;
            currentEl.classList.remove('error');
            
            if (expression) {
                historyEl.textContent = expression + (operator ? ` ${operatorSymbol(operator)}` : '');
            } else {
                historyEl.textContent = '';
            }
            
            if (memory !== 0) {
                memoryIndicator.textContent = 'M';
            } else {
                memoryIndicator.textContent = '';
            }
        }

        function operatorSymbol(op) {
            const symbols = { add: '+', subtract: '−', multiply: '×', divide: '÷' };
            return symbols[op] || '';
        }

        function inputDigit(digit) {
            if (waitingForOperand) {
                currentValue = digit;
                waitingForOperand = false;
            } else {
                currentValue = currentValue === '0' ? digit : currentValue + digit;
            }
            if (currentValue.length > 15) currentValue = currentValue.slice(0, 15);
        }

        function inputDecimal() {
            if (waitingForOperand) {
                currentValue = '0.';
                waitingForOperand = false;
            } else if (!currentValue.includes('.')) {
                currentValue += '.';
            }
        }

        function clear() {
            currentValue = '0';
            previousValue = '';
            operator = null;
            waitingForOperand = false;
            expression = '';
        }

        function clearEntry() {
            currentValue = '0';
        }

        function backspace() {
            if (waitingForOperand) return;
            currentValue = currentValue.length > 1 ? currentValue.slice(0, -1) : '0';
        }

        function toggleSign() {
            currentValue = (parseFloat(currentValue) * -1).toString();
        }

        function percent() {
            currentValue = (parseFloat(currentValue) / 100).toString();
        }

        function performOperation(nextOperator) {
            const input = parseFloat(currentValue);

            if (previousValue === '') {
                previousValue = input;
            } else if (operator) {
                const result = calculate(previousValue, input, operator);
                if (result === null) return;
                currentValue = String(result);
                previousValue = result;
            }

            waitingForOperand = true;
            operator = nextOperator;
            expression = currentValue;
        }

        function calculate(a, b, op) {
            switch (op) {
                case 'add': return a + b;
                case 'subtract': return a - b;
                case 'multiply': return a * b;
                case 'divide':
                    if (b === 0) {
                        currentEl.textContent = 'Error: Division by zero';
                        currentEl.classList.add('error');
                        clear();
                        return null;
                    }
                    return a / b;
                default: return b;
            }
        }

        function equals() {
            if (operator === null || previousValue === '') return;
            
            const input = parseFloat(currentValue);
            const result = calculate(previousValue, input, operator);
            
            if (result === null) return;
            
            expression = `${previousValue} ${operatorSymbol(operator)} ${input}`;
            currentValue = String(result);
            previousValue = '';
            operator = null;
            waitingForOperand = true;
        }

        function memoryAdd() {
            memory += parseFloat(currentValue);
            waitingForOperand = true;
        }

        function memorySubtract() {
            memory -= parseFloat(currentValue);
            waitingForOperand = true;
        }

        function memoryRecall() {
            currentValue = String(memory);
            waitingForOperand = true;
        }

        function memoryClear() {
            memory = 0;
        }

        document.querySelector('.buttons').addEventListener('click', (e) => {
            if (!e.target.matches('button')) return;

            const { value, action } = e.target.dataset;

            if (value !== undefined) {
                inputDigit(value);
            } else {
                switch (action) {
                    case 'decimal': inputDecimal(); break;
                    case 'clear': case 'c': clear(); break;
                    case 'ce': clearEntry(); break;
                    case 'backspace': backspace(); break;
                    case 'sign': toggleSign(); break;
                    case 'percent': percent(); break;
                    case 'add': case 'subtract': case 'multiply': case 'divide':
                        performOperation(action); break;
                    case 'equals': equals(); break;
                    case 'm-plus': memoryAdd(); break;
                    case 'm-minus': memorySubtract(); break;
                    case 'mr': memoryRecall(); break;
                    case 'mc': memoryClear(); break;
                }
            }
            updateDisplay();
        });

        document.addEventListener('keydown', (e) => {
            const key = e.key;
            
            if (/[0-9]/.test(key)) inputDigit(key);
            else if (key === '.') inputDecimal();
            else if (key === 'Enter' || key === '=') { e.preventDefault(); equals(); }
            else if (key === 'Backspace') backspace();
            else if (key === 'Escape') clear();
            else if (key === '+') performOperation('add');
            else if (key === '-') performOperation('subtract');
            else if (key === '*') performOperation('multiply');
            else if (key === '/') { e.preventDefault(); performOperation('divide'); }
            else if (key === '%') percent();
            
            updateDisplay();
        });
    </script>
</body>
</html>
