<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --bg-0: #050810;
  --bg-1: #0e1421;
  --bg-2: #161e2e;
  --display-bg: #060a14;
  --display-glow: rgba(251, 191, 36, 0.05);
  --btn: #1a2231;
  --btn-hover: #242e42;
  --btn-active: #2e3a52;
  --op-bg: #251a08;
  --op-text: #fbbf24;
  --op-hover: #38280f;
  --fn-bg: #1a2030;
  --fn-text: #94a3b8;
  --fn-hover: #232b3f;
  --mem-bg: #0d2125;
  --mem-text: #5eead4;
  --mem-hover: #143339;
  --eq-grad-1: #fbbf24;
  --eq-grad-2: #f97316;
  --text: #f1f5f9;
  --text-muted: #64748b;
  --text-dim: #334155;
  --danger: #ef4444;
  --border: rgba(255, 255, 255, 0.06);
  --border-strong: rgba(255, 255, 255, 0.1);
}

html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg-0);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
}

/* Atmospheric background */
.blob {
  position: fixed;
  border-radius: 50%;
  filter: blur(100px);
  pointer-events: none;
  z-index: 0;
}
.blob-1 {
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(251, 191, 36, 0.4), transparent 70%);
  top: -180px; left: -120px;
  animation: blobFloat1 18s ease-in-out infinite;
}
.blob-2 {
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(20, 184, 166, 0.32), transparent 70%);
  bottom: -250px; right: -150px;
  animation: blobFloat2 22s ease-in-out infinite;
}
.blob-3 {
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(244, 63, 94, 0.2), transparent 70%);
  top: 40%; left: 60%;
  animation: blobFloat3 26s ease-in-out infinite;
}
@keyframes blobFloat1 {
  0%,100% { transform: translate(0,0) scale(1); }
  33% { transform: translate(80px, 50px) scale(1.15); }
  66% { transform: translate(-50px, 100px) scale(0.9); }
}
@keyframes blobFloat2 {
  0%,100% { transform: translate(0,0) scale(1); }
  50% { transform: translate(-100px, -80px) scale(1.2); }
}
@keyframes blobFloat3 {
  0%,100% { transform: translate(0,0) scale(1); opacity: 0.6; }
  50% { transform: translate(-150px, 60px) scale(0.8); opacity: 0.4; }
}

.grid-bg {
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 48px 48px;
  z-index: 0; pointer-events: none;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
  -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
}

.calculator {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 380px;
  background: linear-gradient(180deg, var(--bg-2), var(--bg-1));
  border: 1px solid var(--border-strong);
  border-radius: 28px;
  padding: 22px;
  box-shadow:
    0 40px 80px rgba(0,0,0,0.6),
    0 16px 32px rgba(0,0,0,0.4),
    inset 0 1px 0 rgba(255,255,255,0.08),
    inset 0 0 0 1px rgba(255,255,255,0.03);
  animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(20px) scale(0.96); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.display {
  background: linear-gradient(180deg, var(--display-bg), #020409);
  border-radius: 20px;
  padding: 22px 22px 20px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(0,0,0,0.5);
  box-shadow:
    inset 0 4px 16px rgba(0,0,0,0.7),
    inset 0 0 60px var(--display-glow),
    inset 0 1px 0 rgba(255,255,255,0.03);
  transition: box-shadow 0.4s ease;
}
.display.computing {
  box-shadow:
    inset 0 4px 16px rgba(0,0,0,0.7),
    inset 0 0 80px rgba(251, 191, 36, 0.2),
    inset 0 1px 0 rgba(255,255,255,0.03);
}
.display::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.012) 2px, rgba(255,255,255,0.012) 3px);
  pointer-events: none;
}
.display::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 50%;
  background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
  pointer-events: none;
}

.display-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  font-weight: 700;
  margin-bottom: 10px;
  position: relative;
  z-index: 1;
}
.brand {
  color: var(--text-dim);
  letter-spacing: 3px;
}
.brand::before {
  content: '●';
  color: var(--op-text);
  margin-right: 6px;
  font-size: 8px;
  vertical-align: middle;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 0.4; }
  50% { opacity: 1; }
}
.memory-indicator, .error-indicator {
  display: inline-flex;
  align-items: center;
  font-size: 10px;
  letter-spacing: 1.5px;
  opacity: 0;
  transition: opacity 0.3s;
}
.memory-indicator { color: var(--mem-text); }
.memory-indicator.active { opacity: 1; }
.memory-indicator::before {
  content: '';
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--mem-text);
  margin-right: 6px;
  animation: memPulse 2s ease-in-out infinite;
}
@keyframes memPulse {
  0%,100% { box-shadow: 0 0 8px var(--mem-text); }
  50% { box-shadow: 0 0 16px var(--mem-text); }
}
.error-indicator { color: var(--danger); }
.error-indicator.active { opacity: 1; }
.error-indicator::before { content: '⚠ '; }

.expression {
  font-family: 'SF Mono', 'JetBrains Mono', 'Cascadia Code', 'Roboto Mono', Consolas, monospace;
  font-size: 14px;
  color: var(--text-muted);
  min-height: 20px;
  text-align: right;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  position: relative;
  z-index: 1;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.5px;
}

.current {
  font-family: 'SF Mono', 'JetBrains Mono', 'Cascadia Code', 'Roboto Mono', Consolas, monospace;
  font-size: 50px;
  font-weight: 200;
  text-align: right;
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin-top: 4px;
  position: relative;
  z-index: 1;
  font-variant-numeric: tabular-nums;
  letter-spacing: -1.5px;
  line-height: 1.1;
  transition: color 0.2s, transform 0.15s, font-size 0.2s;
}
.current.len-10 { font-size: 44px; }
.current.len-12 { font-size: 38px; }
.current.len-14 { font-size: 32px; }
.current.error {
  color: var(--danger);
  font-size: 32px;
  letter-spacing: 0;
  animation: errorShake 0.4s;
}
@keyframes errorShake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}
.current.flash { animation: numFlash 0.25s ease; }
@keyframes numFlash {
  0% { transform: scale(1); }
  50% { transform: scale(0.96); opacity: 0.75; }
  100% { transform: scale(1); }
}

.memory-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 8px;
}
.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

.btn {
  height: 60px;
  border: 1px solid var(--border);
  border-radius: 14px;
  background: var(--btn);
  color: var(--text);
  font-size: 22px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: transform 0.1s ease, background 0.15s ease, box-shadow 0.15s ease;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.06),
    inset 0 -2px 4px rgba(0,0,0,0.3),
    0 4px 8px rgba(0,0,0,0.3);
  user-select: none;
}
.btn::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 50%;
  background: linear-gradient(180deg, rgba(255,255,255,0.04), transparent);
  pointer-events: none;
}
.btn:hover {
  background: var(--btn-hover);
  transform: translateY(-1px);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.08),
    inset 0 -2px 4px rgba(0,0,0,0.3),
    0 6px 12px rgba(0,0,0,0.4);
}
.btn:active, .btn.pressed {
  transform: translateY(1px);
  background: var(--btn-active);
  box-shadow:
    inset 0 2px 4px rgba(0,0,0,0.4),
    inset 0 -1px 0 rgba(255,255,255,0.04),
    0 1px 2px rgba(0,0,0,0.2);
}

.btn-op {
  background: var(--op-bg);
  color: var(--op-text);
  font-size: 24px;
  font-weight: 600;
  border-color: rgba(251,191,36,0.1);
}
.btn-op:hover { background: var(--op-hover); }
.btn-op.active {
  background: var(--op-text);
  color: #1a1006;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.3),
    0 0 24px rgba(251, 191, 36, 0.5),
    0 4px 12px rgba(251, 191, 36, 0.3);
}

.btn-fn {
  background: var(--fn-bg);
  color: var(--fn-text);
  font-size: 17px;
  font-weight: 600;
}

.btn-mem {
  background: var(--mem-bg);
  color: var(--mem-text);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.8px;
  height: 44px;
  border: 1px solid rgba(94, 234, 212, 0.12);
}
.btn-mem:hover {
  background: var(--mem-hover);
  border-color: rgba(94, 234, 212, 0.25);
}

.btn-eq {
  grid-column: span 4;
  background: linear-gradient(135deg, var(--eq-grad-1), var(--eq-grad-2));
  color: #1a0e02;
  font-weight: 800;
  font-size: 24px;
  height: 56px;
  border: none;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.4),
    0 4px 16px rgba(251, 191, 36, 0.35),
    0 1px 0 rgba(0,0,0,0.2);
  animation: eqGlow 3s ease-in-out infinite;
}
.btn-eq:hover {
  background: linear-gradient(135deg, #fcc347, #fb923c);
  transform: translateY(-1px);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.5),
    0 6px 24px rgba(251, 191, 36, 0.55),
    0 2px 0 rgba(0,0,0,0.2);
  animation: none;
}
.btn-eq:active, .btn-eq.pressed {
  transform: translateY(1px);
  background: linear-gradient(135deg, #d97706, #c2410c);
  animation: none;
}
@keyframes eqGlow {
  0%,100% {
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.4),
      0 4px 16px rgba(251, 191, 36, 0.3),
      0 1px 0 rgba(0,0,0,0.2);
  }
  50% {
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.4),
      0 4px 28px rgba(251, 191, 36, 0.55),
      0 1px 0 rgba(0,0,0,0.2);
  }
}

.footer {
  margin-top: 14px;
  text-align: center;
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.5px;
  line-height: 1.6;
}
.kbd {
  display: inline-block;
  padding: 1px 5px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-bottom-width: 2px;
  border-radius: 4px;
  font-family: 'SF Mono', monospace;
  font-size: 9px;
  color: var(--text-muted);
  margin: 0 1px;
  vertical-align: middle;
}

@media (max-width: 420px) {
  body { padding: 12px; }
  .calculator { padding: 18px; border-radius: 22px; }
  .btn { height: 54px; font-size: 20px; }
  .btn-mem { height: 40px; }
  .btn-op { font-size: 22px; }
  .btn-eq { font-size: 22px; height: 50px; }
  .current { font-size: 42px; }
  .expression { font-size: 13px; }
  .footer { font-size: 9px; }
}
@media (max-height: 720px) {
  .btn { height: 52px; }
  .current { font-size: 42px; }
  .display { padding: 18px 20px 16px; margin-bottom: 12px; }
}
@media (max-height: 640px) {
  .btn { height: 44px; font-size: 17px; }
  .btn-mem { height: 36px; }
  .btn-eq { height: 42px; font-size: 18px; }
  .current { font-size: 32px; }
  .display { padding: 14px 18px 12px; margin-bottom: 10px; }
  .footer { display: none; }
}
</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>
<div class="grid-bg"></div>

<main class="calculator" role="application" aria-label="Calculator">
  <section class="display" id="display" aria-live="polite">
    <div class="display-meta">
      <span class="memory-indicator" id="memIndicator">M</span>
      <span class="brand">CALC</span>
      <span class="error-indicator" id="errIndicator">ERR</span>
    </div>
    <div class="expression" id="expression">&nbsp;</div>
    <div class="current" id="current">0</div>
  </section>

  <nav class="memory-row" aria-label="Memory functions">
    <button class="btn btn-mem" data-action="mc" aria-label="Memory Clear">MC</button>
    <button class="btn btn-mem" data-action="mr" aria-label="Memory Recall">MR</button>
    <button class="btn btn-mem" data-action="m-plus" aria-label="Memory Add">M+</button>
    <button class="btn btn-mem" data-action="m-minus" aria-label="Memory Subtract">M−</button>
  </nav>

  <div class="buttons">
    <button class="btn btn-fn" data-action="ce">CE</button>
    <button class="btn btn-fn" data-action="c">C</button>
    <button class="btn btn-fn" data-action="backspace" aria-label="Backspace">⌫</button>
    <button class="btn btn-fn" data-action="percent">%</button>

    <button class="btn" data-digit="7">7</button>
    <button class="btn" data-digit="8">8</button>
    <button class="btn" data-digit="9">9</button>
    <button class="btn btn-op" data-op="/" aria-label="Divide">÷</button>

    <button class="btn" data-digit="4">4</button>
    <button class="btn" data-digit="5">5</button>
    <button class="btn" data-digit="6">6</button>
    <button class="btn btn-op" data-op="*" aria-label="Multiply">×</button>

    <button class="btn" data-digit="1">1</button>
    <button class="btn" data-digit="2">2</button>
    <button class="btn" data-digit="3">3</button>
    <button class="btn btn-op" data-op="-" aria-label="Subtract">−</button>

    <button class="btn btn-fn" data-action="negate" aria-label="Negate">±</button>
    <button class="btn" data-digit="0">0</button>
    <button class="btn" data-action="decimal">.</button>
    <button class="btn btn-op" data-op="+" aria-label="Add">+</button>

    <button class="btn btn-eq" data-action="equals" aria-label="Equals">=</button>
  </div>

  <footer class="footer">
    <span class="kbd">0-9</span>
    <span class="kbd">+</span><span class="kbd">−</span><span class="kbd">×</span><span class="kbd">÷</span>
    <span class="kbd">Enter</span>
    <span class="kbd">.</span>
    <span class="kbd">%</span>
    <span class="kbd">⌫</span>
    <span class="kbd">Esc</span>
    <span class="kbd">Del</span>
  </footer>
</main>

<script>
'use strict';

// Calculator state
const state = {
  current: '0',
  previous: null,
  operator: null,
  waitingForOperand: false,
  expression: '',
  memory: 0,
  hasMemory: false,
  hasError: false,
  justEvaluated: false,
};

const dom = {
  current: document.getElementById('current'),
  expression: document.getElementById('expression'),
  memIndicator: document.getElementById('memIndicator'),
  errIndicator: document.getElementById('errIndicator'),
  display: document.getElementById('display'),
};

const OP_SYMBOLS = { '+': '+', '-': '−', '*': '×', '/': '÷' };

// Format number for display, removing floating point noise
function formatNumber(num) {
  if (!isFinite(num)) return 'Error';
  if (typeof num === 'string') num = parseFloat(num);
  if (isNaN(num)) return '0';

  const abs = Math.abs(num);
  if (abs !== 0 && (abs < 1e-9 || abs >= 1e15)) {
    return num.toExponential(6).replace(/\.?0+e/, 'e');
  }

  const rounded = Math.round(num * 1e12) / 1e12;
  let str = String(rounded);

  if (str.replace(/[-.]/g, '').length > 14) {
    str = parseFloat(rounded.toPrecision(12)).toString();
    if (str.replace(/[-.]/g, '').length > 14) {
      str = rounded.toExponential(6).replace(/\.?0+e/, 'e');
    }
  }
  return str;
}

function updateDisplay() {
  if (state.hasError) {
    dom.current.classList.add('error');
    dom.current.textContent = 'Error';
    dom.errIndicator.classList.add('active');
  } else {
    dom.current.classList.remove('error');
    dom.errIndicator.classList.remove('active');
    dom.current.textContent = state.current || '0';
  }

  // Auto-size font based on length
  const len = (state.current || '').replace(/[-.]/g, '').length;
  dom.current.classList.remove('len-10', 'len-12', 'len-14');
  if (len >= 14) dom.current.classList.add('len-14');
  else if (len >= 12) dom.current.classList.add('len-12');
  else if (len >= 10) dom.current.classList.add('len-10');

  dom.expression.innerHTML = state.expression || '&nbsp;';
  dom.memIndicator.classList.toggle('active', state.hasMemory);

  document.querySelectorAll('.btn-op').forEach(btn => {
    btn.classList.toggle('active',
      !!state.operator && btn.dataset.op === state.operator && state.waitingForOperand && !state.justEvaluated);
  });
}

function flashCurrent() {
  dom.current.classList.remove('flash');
  void dom.current.offsetWidth;
  dom.current.classList.add('flash');
}

function flashDisplay() {
  dom.display.classList.remove('computing');
  void dom.display.offsetWidth;
  dom.display.classList.add('computing');
  setTimeout(() => dom.display.classList.remove('computing'), 450);
}

// Input handlers
function inputDigit(digit) {
  if (state.hasError) clearAll();

  if (state.justEvaluated) {
    state.current = digit;
    state.previous = null;
    state.operator = null;
    state.expression = '';
    state.justEvaluated = false;
    state.waitingForOperand = false;
    updateDisplay();
    return;
  }

  if (state.waitingForOperand) {
    state.current = digit;
    state.waitingForOperand = false;
  } else {
    if (state.current.replace(/[-.]/g, '').length >= 14) return;
    state.current = state.current === '0' ? digit : state.current + digit;
  }
  updateDisplay();
}

function inputDecimal() {
  if (state.hasError) clearAll();

  if (state.justEvaluated) {
    state.current = '0.';
    state.previous = null;
    state.operator = null;
    state.expression = '';
    state.justEvaluated = false;
    state.waitingForOperand = false;
    updateDisplay();
    return;
  }

  if (state.waitingForOperand) {
    state.current = '0.';
    state.waitingForOperand = false;
  } else if (!state.current.includes('.')) {
    if (state.current === '' || state.current === '-') {
      state.current += '0.';
    } else {
      state.current += '.';
    }
  }
  updateDisplay();
}

function inputOperator(op) {
  if (state.hasError) return;

  if (state.justEvaluated) {
    state.previous = parseFloat(state.current);
    state.justEvaluated = false;
  } else if (state.operator !== null && !state.waitingForOperand) {
    // Chain operation: compute previous op current, then set new op
    const result = compute(state.previous, parseFloat(state.current), state.operator);
    if (state.hasError) { updateDisplay(); return; }
    state.previous = result;
    state.current = formatNumber(result);
  } else if (state.operator === null) {
    state.previous = parseFloat(state.current);
  }
  // else: operator pending & waiting → just swap operator

  state.operator = op;
  state.waitingForOperand = true;
  state.expression = formatNumber(state.previous) + ' ' + OP_SYMBOLS[op];
  flashCurrent();
  updateDisplay();
}

function compute(a, b, op) {
  let result;
  switch (op) {
    case '+': result = a + b; break;
    case '-': result = a - b; break;
    case '*': result = a * b; break;
    case '/':
      if (b === 0) { state.hasError = true; return 0; }
      result = a / b;
      break;
    default: return b;
  }
  return result;
}

function equals() {
  if (state.hasError) return;
  if (state.operator === null || state.previous === null) {
    state.justEvaluated = false;
    return;
  }

  const currentVal = state.waitingForOperand ? state.previous : parseFloat(state.current);
  const a = state.previous;
  const op = state.operator;

  state.expression = formatNumber(a) + ' ' + OP_SYMBOLS[op] + ' ' + formatNumber(currentVal) + ' =';

  const result = compute(a, currentVal, op);
  if (state.hasError) {
    state.current = 'Error';
    state.expression = 'Cannot divide by zero';
    updateDisplay();
    return;
  }

  state.current = formatNumber(result);
  state.previous = result;
  state.operator = null;
  state.waitingForOperand = true;
  state.justEvaluated = true;
  flashCurrent();
  flashDisplay();
  updateDisplay();
}

function clearAll() {
  state.current = '0';
  state.previous = null;
  state.operator = null;
  state.waitingForOperand = false;
  state.expression = '';
  state.hasError = false;
  state.justEvaluated = false;
  updateDisplay();
}

function clearEntry() {
  if (state.hasError) { clearAll(); return; }
  state.current = '0';
  state.waitingForOperand = false;
  state.justEvaluated = false;
  updateDisplay();
}

function backspace() {
  if (state.hasError) { clearAll(); return; }
  if (state.waitingForOperand || state.justEvaluated) return;

  let c = state.current;
  if (c.length <= 1 || (c.length === 2 && c.startsWith('-'))) {
    state.current = '0';
  } else {
    c = c.slice(0, -1);
    if (c === '-' || c === '') c = '0';
    state.current = c;
  }
  updateDisplay();
}

function negate() {
  if (state.hasError) return;
  if (state.waitingForOperand) return;
  if (state.current === '0' || state.current === '') return;

  if (state.current.startsWith('-')) {
    state.current = state.current.slice(1);
  } else {
    state.current = '-' + state.current;
  }
  updateDisplay();
}

function percent() {
  if (state.hasError) return;

  let val = parseFloat(state.current);
  if (state.operator && state.previous !== null) {
    val = state.previous * (val / 100);
  } else {
    val = val / 100;
  }
  state.current = formatNumber(val);
  state.justEvaluated = false;
  flashCurrent();
  updateDisplay();
}

// Memory functions
function memoryClear() {
  state.memory = 0;
  state.hasMemory = false;
  updateDisplay();
}

function memoryRecall() {
  if (state.hasError) clearAll();
  state.current = formatNumber(state.memory);
  state.waitingForOperand = false;
  state.justEvaluated = false;
  flashCurrent();
  updateDisplay();
}

function memoryAdd() {
  if (state.hasError) return;
  state.memory += parseFloat(state.current) || 0;
  state.hasMemory = true;
  flashCurrent();
  updateDisplay();
}

function memorySubtract() {
  if (state.hasError) return;
  state.memory -= parseFloat(state.current) || 0;
  state.hasMemory = true;
  flashCurrent();
  updateDisplay();
}

// Wire up button clicks
function handleAction(data) {
  const { digit, op, action } = data;
  if (digit !== undefined) inputDigit(digit);
  else if (op !== undefined) inputOperator(op);
  else if (action) {
    switch (action) {
      case 'equals': equals(); break;
      case 'c': clearAll(); break;
      case 'ce': clearEntry(); break;
      case 'backspace': backspace(); break;
      case 'decimal': inputDecimal(); break;
      case 'negate': negate(); break;
      case 'percent': percent(); break;
      case 'mc': memoryClear(); break;
      case 'mr': memoryRecall(); break;
      case 'm-plus': memoryAdd(); break;
      case 'm-minus': memorySubtract(); break;
    }
  }
}

document.querySelectorAll('button').forEach(btn => {
  btn.addEventListener('click', () => handleAction(btn.dataset));
});

// Keyboard support
function flashButton(selector) {
  const btn = document.querySelector(selector);
  if (btn) {
    btn.classList.add('pressed');
    setTimeout(() => btn.classList.remove('pressed'), 120);
  }
}

document.addEventListener('keydown', (e) => {
  if (e.ctrlKey || e.altKey || e.metaKey) return;

  const key = e.key;
  let handled = true;

  if (/^[0-9]$/.test(key)) {
    inputDigit(key);
    flashButton(`[data-digit="${key}"]`);
  } else if (['+', '-', '*', '/'].includes(key)) {
    inputOperator(key);
    flashButton(`[data-op="${key}"]`);
  } else if (key === 'Enter' || key === '=') {
    equals();
    flashButton('[data-action="equals"]');
  } else if (key === 'Escape') {
    clearAll();
    flashButton('[data-action="c"]');
  } else if (key === 'Delete') {
    clearEntry();
    flashButton('[data-action="ce"]');
  } else if (key === 'Backspace') {
    backspace();
    flashButton('[data-action="backspace"]');
  } else if (key === '.' || key === ',') {
    inputDecimal();
    flashButton('[data-action="decimal"]');
  } else if (key === '%') {
    percent();
    flashButton('[data-action="percent"]');
  } else if (key === '_' || key === 'n' || key === 'N') {
    negate();
    flashButton('[data-action="negate"]');
  } else if (key === 'm' || key === 'M') {
    memoryClear();
    flashButton('[data-action="mc"]');
  } else if (key === 'r' || key === 'R') {
    memoryRecall();
    flashButton('[data-action="mr"]');
  } else if (key === 'p' || key === 'P') {
    memoryAdd();
    flashButton('[data-action="m-plus"]');
  } else if (key === 'q' || key === 'Q') {
    memorySubtract();
    flashButton('[data-action="m-minus"]');
  } else {
    handled = false;
  }

  if (handled) e.preventDefault();
});

// Init
updateDisplay();
</script>
</body>
</html>
