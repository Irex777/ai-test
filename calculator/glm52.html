<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<style>
:root {
  --bg: #0a0e14;
  --bg-2: #0f1419;
  --card: #141a22;
  --border: #1e2730;
  --fg: #e6edf3;
  --muted: #6b7785;
  --accent: #ff6b35;
  --accent-glow: rgba(255, 107, 53, 0.35);
  --teal: #2ec4b6;
  --teal-glow: rgba(46, 196, 182, 0.3);
  --danger: #e63946;
  --warn: #ffb703;
  --btn: #1a2230;
  --btn-hover: #232d3d;
  --btn-active: #2d3a4d;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--fg);
  font-family: 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace;
  min-height: 100vh;
  overflow-x: hidden;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
}

/* Ambient background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 800px 600px at 15% 20%, rgba(255, 107, 53, 0.12), transparent 60%),
    radial-gradient(ellipse 700px 500px at 85% 85%, rgba(46, 196, 182, 0.08), transparent 60%),
    radial-gradient(ellipse 500px 400px at 50% 50%, rgba(255, 183, 3, 0.04), transparent 70%);
  pointer-events: none;
  z-index: 0;
  animation: bgShift 20s ease-in-out infinite alternate;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
}

@keyframes bgShift {
  0% { transform: translate(0, 0) scale(1); }
  100% { transform: translate(2%, -1%) scale(1.05); }
}

/* Brand */
.brand {
  position: fixed;
  top: 28px;
  left: 32px;
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 10;
  letter-spacing: 0.3em;
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
}
.brand-dot {
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 12px var(--accent-glow);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.85); }
}

/* Calculator */
.calculator {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 440px;
  background: linear-gradient(180deg, var(--card), var(--bg-2));
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 22px;
  box-shadow:
    0 30px 80px rgba(0, 0, 0, 0.6),
    0 0 0 1px rgba(255, 255, 255, 0.02) inset,
    0 -2px 20px rgba(255, 107, 53, 0.05) inset;
}

/* Display */
.display {
  background: linear-gradient(180deg, rgba(0,0,0,0.4), rgba(0,0,0,0.2));
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px 22px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
  min-height: 130px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.display::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,107,53,0.3), transparent);
}

.history {
  color: var(--muted);
  font-size: 15px;
  min-height: 22px;
  text-align: right;
  word-wrap: break-word;
  overflow-wrap: break-word;
  word-break: break-all;
  font-weight: 400;
  letter-spacing: 0.5px;
}

.current {
  font-size: 46px;
  font-weight: 300;
  text-align: right;
  color: var(--fg);
  word-wrap: break-word;
  overflow-wrap: break-word;
  word-break: break-all;
  line-height: 1.1;
  letter-spacing: -1px;
  transition: color 0.2s;
}
.current.error { color: var(--danger); }
.current.flash { animation: flash 0.4s ease; }
@keyframes flash {
  0% { transform: scale(1); }
  40% { transform: scale(1.04); color: var(--accent); }
  100% { transform: scale(1); }
}

.display-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 6px;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.2em;
  text-transform: uppercase;
}
.memory-tag {
  color: var(--teal);
  font-weight: 600;
  padding: 3px 9px;
  background: rgba(46, 196, 182, 0.1);
  border: 1px solid rgba(46, 196, 182, 0.25);
  border-radius: 4px;
  opacity: 0;
  transition: opacity 0.2s;
}
.memory-tag.active { opacity: 1; }
.memory-value {
  color: var(--muted);
  font-size: 11px;
}

/* Buttons */
.buttons {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 8px;
}

.btn {
  border: none;
  background: var(--btn);
  color: var(--fg);
  font-family: inherit;
  font-size: 18px;
  font-weight: 500;
  padding: 16px 0;
  border-radius: 12px;
  cursor: pointer;
  transition: transform 0.08s ease, background 0.15s ease, box-shadow 0.15s ease, color 0.15s;
  position: relative;
  user-select: none;
  letter-spacing: 0.5px;
}
.btn:hover { background: var(--btn-hover); }
.btn:active {
  transform: scale(0.94);
  background: var(--btn-active);
}
.btn.pressed {
  background: var(--btn-active);
  transform: scale(0.94);
}

.btn-op {
  background: linear-gradient(180deg, #2a3441, #1f2832);
  color: var(--teal);
  font-weight: 600;
}
.btn-op:hover {
  background: linear-gradient(180deg, #313d4c, #252f3a);
  box-shadow: 0 0 0 1px rgba(46, 196, 182, 0.25);
}

.btn-fn {
  background: linear-gradient(180deg, #1f242c, #181d24);
  color: var(--muted);
  font-size: 13px;
  font-weight: 600;
}
.btn-fn:hover {
  color: var(--fg);
  background: linear-gradient(180deg, #252b34, #1d2229);
}

.btn-mem {
  background: linear-gradient(180deg, #1a2128, #141a20);
  color: var(--warn);
  font-size: 13px;
  font-weight: 700;
  border: 1px solid rgba(255, 183, 3, 0.15);
}
.btn-mem:hover {
  background: linear-gradient(180deg, #221e10, #1a1810);
  box-shadow: 0 0 0 1px rgba(255, 183, 3, 0.3);
}

.btn-equals {
  background: linear-gradient(180deg, var(--accent), #d4541c);
  color: #fff;
  font-weight: 700;
  box-shadow: 0 4px 16px rgba(255, 107, 53, 0.3), 0 0 0 1px rgba(255,107,53,0.4) inset;
}
.btn-equals:hover {
  background: linear-gradient(180deg, #ff7a48, #e25c1f);
  box-shadow: 0 6px 24px rgba(255, 107, 53, 0.5), 0 0 0 1px rgba(255,107,53,0.5) inset;
}

.btn-danger {
  color: var(--danger);
}

/* Kbd hint */
.kbd-hint {
  margin-top: 14px;
  text-align: center;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  opacity: 0.7;
}
.kbd-hint kbd {
  background: var(--btn);
  padding: 2px 6px;
  border-radius: 3px;
  border: 1px solid var(--border);
  margin: 0 2px;
  font-family: inherit;
  color: var(--fg);
}

/* Toast */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--card);
  border: 1px solid var(--border);
  border-left: 3px solid var(--teal);
  padding: 12px 22px;
  border-radius: 8px;
  font-size: 13px;
  letter-spacing: 0.5px;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 100;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.error { border-left-color: var(--danger); }
.toast.warn { border-left-color: var(--warn); }

@media (max-width: 480px) {
  .brand { top: 16px; left: 16px; font-size: 10px; }
  .calculator { padding: 16px; border-radius: 20px; }
  .display { padding: 16px 18px; min-height: 110px; }
  .current { font-size: 36px; }
  .history { font-size: 13px; }
  .btn { font-size: 15px; padding: 13px 0; }
  .btn-fn, .btn-mem { font-size: 11px; }
  .buttons { gap: 6px; }
}

@media (max-width: 380px) {
  .btn { font-size: 13px; padding: 11px 0; }
  .current { font-size: 30px; }
}
</style>
</head>
<body>

<div class="brand">
  <span class="brand-dot"></span>
  <span>NEXUS · CALC</span>
</div>

<div class="calculator" role="application" aria-label="Calculator">
  <div class="display">
    <div class="history" id="history" aria-live="polite"></div>
    <div class="current" id="current" aria-live="polite">0</div>
    <div class="display-meta">
      <span class="memory-tag" id="memoryTag">M</span>
      <span class="memory-value" id="memoryValue"></span>
    </div>
  </div>

  <div class="buttons">
    <button class="btn btn-mem" data-action="mc" aria-label="Memory Clear">MC</button>
    <button class="btn btn-mem" data-action="mr" aria-label="Memory Recall">MR</button>
    <button class="btn btn-mem" data-action="m-plus" aria-label="Memory Add">M+</button>
    <button class="btn btn-mem" data-action="m-minus" aria-label="Memory Subtract">M-</button>
    <button class="btn btn-danger btn-fn" data-action="ce">CE</button>
    <button class="btn btn-danger btn-fn" data-action="clear">C</button>

    <button class="btn btn-fn" data-action="backspace" aria-label="Backspace">⌫</button>
    <button class="btn btn-fn" data-action="negate">±</button>
    <button class="btn btn-fn" data-action="percent">%</button>
    <button class="btn btn-op" data-op="/">÷</button>
    <button class="btn btn-op" data-op="*">×</button>
    <button class="btn btn-op" data-op="-">−</button>

    <button class="btn" data-num="7">7</button>
    <button class="btn" data-num="8">8</button>
    <button class="btn" data-num="9">9</button>
    <button class="btn btn-op" data-op="+">+</button>
    <button class="btn" data-num="4">4</button>
    <button class="btn" data-num="5">5</button>

    <button class="btn" data-num="6">6</button>
    <button class="btn" data-num="1">1</button>
    <button class="btn" data-num="2">2</button>
    <button class="btn" data-num="3">3</button>
    <button class="btn" data-num="0">0</button>
    <button class="btn" data-action="decimal">.</button>

    <button class="btn btn-equals" data-action="equals" style="grid-column: span 2;">=</button>
  </div>

  <div class="kbd-hint">
    <kbd>0-9</kbd> numbers · <kbd>+−*/</kbd> ops · <kbd>Enter</kbd>= · <kbd>Esc</kbd>C · <kbd>⌫</kbd> back
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';

  const state = {
    current: '0',
    expression: [],
    lastWasOperator: false,
    lastWasEquals: false,
    memory: 0,
    hasError: false,
  };

  const $current = document.getElementById('current');
  const $history = document.getElementById('history');
  const $memoryTag = document.getElementById('memoryTag');
  const $memoryValue = document.getElementById('memoryValue');
  const $toast = document.getElementById('toast');

  // ---------- Formatting ----------
  function formatNumber(n) {
    if (!isFinite(n)) return 'Error';
    if (n === 0) return '0';
    const abs = Math.abs(n);
    if (abs >= 1e15 || (abs < 1e-9 && abs > 0)) {
      return n.toExponential(6).replace(/\.?0+e/, 'e');
    }
    // Keep up to 12 significant digits, strip trailing zeros
    let s = parseFloat(n.toPrecision(12)).toString();
    return s;
  }

  function displayCurrent(s) {
    $current.textContent = s;
  }

  function displayHistory(s) {
    $history.textContent = s;
  }

  function setError(msg) {
    state.hasError = true;
    state.current = 'Error';
    state.expression = [];
    displayCurrent('Error');
    $current.classList.add('error');
    if (msg) showToast(msg, 'error');
  }

  function clearError() {
    if (state.hasError) {
      state.hasError = false;
      $current.classList.remove('error');
    }
  }

  function flashDisplay() {
    $current.classList.remove('flash');
    void $current.offsetWidth;
    $current.classList.add('flash');
  }

  // ---------- Core actions ----------
  function inputNumber(n) {
    clearError();
    if (state.lastWasEquals) {
      state.current = n;
      state.expression = [];
      state.lastWasEquals = false;
      displayHistory('');
    } else if (state.lastWasOperator) {
      state.current = n;
      state.lastWasOperator = false;
    } else {
      if (state.current === '0') state.current = n;
      else if (state.current === '-0') state.current = '-' + n;
      else state.current += n;
    }
    displayCurrent(state.current);
  }

  function inputDecimal() {
    clearError();
    if (state.lastWasEquals) {
      state.current = '0.';
      state.expression = [];
      state.lastWasEquals = false;
      displayHistory('');
    } else if (state.lastWasOperator) {
      state.current = '0.';
      state.lastWasOperator = false;
    } else if (!state.current.includes('.')) {
      state.current += '.';
    }
    displayCurrent(state.current);
  }

  function applyOperator(op) {
    clearError();
    if (state.current === 'Error') return;

    if (state.lastWasOperator && state.expression.length > 0) {
      // Replace previous operator
      state.expression[state.expression.length - 1] = op;
    } else {
      state.expression.push(state.current);
    }

    state.lastWasOperator = true;
    state.lastWasEquals = false;
    updateExpressionDisplay();
  }

  function updateExpressionDisplay() {
    const parts = state.expression.map(p => {
      if (['+', '-', '*', '/'].includes(p)) {
        const sym = { '+': '+', '-': '−', '*': '×', '/': '÷' }[p];
        return ' ' + sym + ' ';
      }
      return p;
    });
    displayHistory(parts.join(''));
  }

  function evaluate(exprArr) {
    if (exprArr.length === 0) return null;
    const tokens = exprArr.slice();

    // First pass: * and /
    let i = 1;
    while (i < tokens.length - 1) {
      if (tokens[i] === '*' || tokens[i] === '/') {
        const a = parseFloat(tokens[i - 1]);
        const b = parseFloat(tokens[i + 1]);
        let r;
        if (tokens[i] === '*') r = a * b;
        else {
          if (b === 0) throw new Error('divide-zero');
          r = a / b;
        }
        tokens.splice(i - 1, 3, r);
      } else {
        i += 2;
      }
    }

    // Second pass: + and -
    i = 1;
    while (i < tokens.length - 1) {
      if (tokens[i] === '+' || tokens[i] === '-') {
        const a = parseFloat(tokens[i - 1]);
        const b = parseFloat(tokens[i + 1]);
        const r = tokens[i] === '+' ? a + b : a - b;
        tokens.splice(i - 1, 3, r);
      } else {
        i += 2;
      }
    }

    return tokens[0];
  }

  function equals() {
    clearError();
    if (state.expression.length === 0) return;

    if (!state.lastWasOperator) {
      state.expression.push(state.current);
    } else {
      // Trailing operator: drop it
      state.expression.pop();
      if (state.expression.length === 0) return;
    }

    updateExpressionDisplay();

    let result;
    try {
      result = evaluate(state.expression);
      if (result === null) return;
      if (!isFinite(result)) {
        setError('Math error');
        return;
      }
    } catch (e) {
      if (e.message === 'divide-zero') {
        setError('Cannot divide by zero');
      } else {
        setError('Error');
      }
      return;
    }

    const formatted = formatNumber(result);
    state.current = formatted;
    state.lastWasEquals = true;
    state.lastWasOperator = false;

    // Show result in history with =
    const exprText = $history.textContent;
    displayHistory(exprText + ' =');
    displayCurrent(formatted);
    flashDisplay();
    state.expression = [];
  }

  function clearAll() {
    state.current = '0';
    state.expression = [];
    state.lastWasOperator = false;
    state.lastWasEquals = false;
    clearError();
    displayCurrent('0');
    displayHistory('');
  }

  function clearEntry() {
    if (state.hasError) { clearAll(); return; }
    state.current = '0';
    displayCurrent('0');
    // If last was operator, also drop the trailing operator so user can re-enter
    if (state.lastWasOperator && state.expression.length > 0) {
      state.expression.pop();
      state.lastWasOperator = false;
      updateExpressionDisplay();
    }
  }

  function backspace() {
    if (state.hasError) { clearAll(); return; }
    if (state.lastWasEquals) {
      // After equals, backspace clears all
      clearAll();
      return;
    }
    if (state.current.length > 1) {
      state.current = state.current.slice(0, -1);
      if (state.current === '-') state.current = '0';
    } else {
      state.current = '0';
    }
    displayCurrent(state.current);
  }

  function negate() {
    clearError();
    if (state.current === '0' || state.current === 'Error') return;
    state.current = state.current.startsWith('-')
      ? state.current.slice(1)
      : '-' + state.current;
    displayCurrent(state.current);
  }

  function percent() {
    clearError();
    if (state.current === 'Error') return;
    // If we have a pending operation with a previous value, compute % of that value
    let base = 1;
    if (state.expression.length > 0) {
      const lastNum = state.expression[state.expression.length - 1];
      if (!['+','-','*','/'].includes(lastNum)) {
        base = parseFloat(lastNum);
      }
    }
    const v = parseFloat(state.current);
    const result = (v / 100) * base;
    state.current = formatNumber(result);
    displayCurrent(state.current);
  }

  // ---------- Memory ----------
  function memoryClear() {
    state.memory = 0;
    updateMemoryDisplay();
    showToast('Memory cleared');
  }

  function memoryRecall() {
    clearError();
    state.current = formatNumber(state.memory);
    displayCurrent(state.current);
    state.lastWasOperator = false;
    state.lastWasEquals = false;
  }

  function memoryAdd() {
    clearError();
    if (state.current === 'Error') return;
    state.memory += parseFloat(state.current) || 0;
    updateMemoryDisplay();
    flashDisplay();
    showToast('Added to memory');
  }

  function memorySubtract() {
    clearError();
    if (state.current === 'Error') return;
    state.memory -= parseFloat(state.current) || 0;
    updateMemoryDisplay();
    flashDisplay();
    showToast('Subtracted from memory');
  }

  function updateMemoryDisplay() {
    if (state.memory !== 0) {
      $memoryTag.classList.add('active');
      $memoryValue.textContent = 'M = ' + formatNumber(state.memory);
    } else {
      $memoryTag.classList.remove('active');
      $memoryValue.textContent = '';
    }
  }

  // ---------- Toast ----------
  let toastTimer = null;
  function showToast(msg, type) {
    $toast.textContent = msg;
    $toast.className = 'toast show' + (type ? ' ' + type : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
      $toast.classList.remove('show');
    }, 1800);
  }

  // ---------- Event wiring ----------
  document.querySelector('.calculator').addEventListener('click', (e) => {
    const t = e.target.closest('button');
    if (!t) return;
    handleAction(t.dataset);
  });

  function handleAction(data) {
    if (data.num !== undefined) inputNumber(data.num);
    else if (data.op) applyOperator(data.op);
    else if (data.action) {
      switch (data.action) {
        case 'decimal': inputDecimal(); break;
        case 'equals': equals(); break;
        case 'clear': clearAll(); break;
        case 'ce': clearEntry(); break;
        case 'backspace': backspace(); break;
        case 'negate': negate(); break;
        case 'percent': percent(); break;
        case 'mc': memoryClear(); break;
        case 'mr': memoryRecall(); break;
        case 'm-plus': memoryAdd(); break;
        case 'm-minus': memorySubtract(); break;
      }
    }
  }

  // Visual feedback for key press
  function flashButton(selector) {
    const btn = document.querySelector(selector);
    if (!btn) return;
    btn.classList.add('pressed');
    setTimeout(() => btn.classList.remove('pressed'), 120);
  }

  // ---------- Keyboard ----------
  document.addEventListener('keydown', (e) => {
    const k = e.key;

    if (k >= '0' && k <= '9') {
      inputNumber(k);
      flashButton(`[data-num="${k}"]`);
      e.preventDefault();
    } else if (k === '.') {
      inputDecimal();
      flashButton('[data-action="decimal"]');
      e.preventDefault();
    } else if (k === '+' || k === '-' || k === '*' || k === '/') {
      applyOperator(k);
      flashButton(`[data-op="${k}"]`);
      e.preventDefault();
    } else if (k === 'Enter' || k === '=') {
      equals();
      flashButton('[data-action="equals"]');
      e.preventDefault();
    } else if (k === 'Backspace') {
      backspace();
      flashButton('[data-action="backspace"]');
      e.preventDefault();
    } else if (k === 'Escape') {
      clearAll();
      flashButton('[data-action="clear"]');
      e.preventDefault();
    } else if (k === 'Delete') {
      clearEntry();
      flashButton('[data-action="ce"]');
      e.preventDefault();
    } else if (k === '%') {
      percent();
      flashButton('[data-action="percent"]');
      e.preventDefault();
    } else if (k === '_') {
      negate();
      flashButton('[data-action="negate"]');
      e.preventDefault();
    }
    // Memory shortcuts via Ctrl/Alt
    else if ((e.ctrlKey || e.altKey) && k.toLowerCase() === 'm') {
      memoryAdd();
      flashButton('[data-action="m-plus"]');
      e.preventDefault();
    }
  });

  // Initialize
  displayCurrent('0');
  updateMemoryDisplay();
})();
</script>
</body>
</html>
