<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 16px;
  }

  .calculator {
    width: 100%;
    max-width: 420px;
    background: #16213e;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
  }

  .display {
    background: #0f3460;
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 16px;
    min-height: 110px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.05);
  }

  .display .history {
    color: #8a8fa3;
    font-size: 14px;
    text-align: right;
    min-height: 20px;
    word-break: break-all;
    line-height: 1.4;
    overflow-wrap: break-word;
  }

  .display .expression {
    color: #b0b5c9;
    font-size: 16px;
    text-align: right;
    min-height: 22px;
    word-break: break-all;
    line-height: 1.4;
    margin-top: 4px;
  }

  .display .current {
    color: #e8eaf0;
    font-size: 36px;
    font-weight: 300;
    text-align: right;
    letter-spacing: -0.5px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-height: 44px;
    line-height: 1.2;
    transition: font-size 0.15s ease;
  }

  .display .current.shrink-1 { font-size: 28px; }
  .display .current.shrink-2 { font-size: 22px; }
  .display .current.shrink-3 { font-size: 18px; }

  .memory-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }

  .memory-bar button {
    flex: 1;
    padding: 8px 4px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 8px;
    color: #6b7a99;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
    letter-spacing: 0.5px;
  }

  .memory-bar button:hover {
    background: rgba(255, 255, 255, 0.08);
    color: #a0aec0;
  }

  .memory-bar button:active {
    transform: scale(0.96);
  }

  .memory-bar button.active {
    color: #e94560;
    border-color: rgba(233, 69, 96, 0.3);
  }

  .buttons {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }

  .buttons button {
    padding: 18px 4px;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.12s ease;
    position: relative;
    overflow: hidden;
  }

  .buttons button:active {
    transform: scale(0.94);
  }

  .btn-number {
    background: #1a2744;
    color: #e8eaf0;
    border: 1px solid rgba(255, 255, 255, 0.04);
  }

  .btn-number:hover {
    background: #223358;
  }

  .btn-operator {
    background: #0f3460;
    color: #53a8d4;
    border: 1px solid rgba(83, 168, 212, 0.1);
  }

  .btn-operator:hover {
    background: #144a7a;
  }

  .btn-function {
    background: #1a1a2e;
    color: #8a8fa3;
    border: 1px solid rgba(255, 255, 255, 0.04);
  }

  .btn-function:hover {
    background: #252545;
  }

  .btn-equals {
    background: #e94560;
    color: #ffffff;
    font-weight: 700;
    border: 1px solid rgba(233, 69, 96, 0.3);
  }

  .btn-equals:hover {
    background: #f05a73;
  }

  .btn-backspace {
    background: #1a2744;
    color: #e94560;
    border: 1px solid rgba(233, 69, 96, 0.1);
  }

  .btn-backspace:hover {
    background: #253358;
  }

  .btn-zero {
    grid-column: span 2;
  }

  .buttons button .key-hint {
    display: none;
  }

  @media (max-width: 380px) {
    .calculator {
      padding: 14px;
      border-radius: 16px;
    }

    .buttons button {
      padding: 15px 2px;
      font-size: 16px;
      border-radius: 10px;
    }

    .display .current {
      font-size: 30px;
    }

    .buttons {
      gap: 6px;
    }

    .memory-bar button {
      padding: 6px 2px;
      font-size: 11px;
    }
  }

  @media (min-width: 768px) {
    .calculator {
      padding: 28px;
    }

    .buttons button {
      padding: 22px 4px;
      font-size: 20px;
    }

    .display .current {
      font-size: 42px;
    }
  }

  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.15);
    transform: scale(0);
    animation: ripple-anim 0.5s ease-out;
    pointer-events: none;
  }

  @keyframes ripple-anim {
    to {
      transform: scale(4);
      opacity: 0;
    }
  }

  .error-flash {
    animation: error-pulse 0.4s ease;
  }

  @keyframes error-pulse {
    0%, 100% { background: #0f3460; }
    50% { background: #3d1a2e; }
  }
</style>
</head>
<body>

<div class="calculator" id="calculator">
  <div class="display" id="display">
    <div class="history" id="history"></div>
    <div class="expression" id="expression"></div>
    <div class="current" id="current">0</div>
  </div>

  <div class="memory-bar">
    <button onclick="memoryClear()" title="Memory Clear (MC)">MC</button>
    <button onclick="memoryRecall()" title="Memory Recall (MR)">MR</button>
    <button onclick="memorySubtract()" title="Memory Subtract (M-)">M−</button>
    <button onclick="memoryAdd()" title="Memory Add (M+)">M+</button>
  </div>

  <div class="buttons">
    <button class="btn-function" onclick="clearEntry()" title="Clear Entry (CE)">CE</button>
    <button class="btn-function" onclick="clearAll()" title="Clear All (C)">C</button>
    <button class="btn-function" onclick="inputPercent()" title="Percent (%)">%</button>
    <button class="btn-operator" onclick="inputToggleSign()" title="Toggle Sign (+/-)">±</button>
    <button class="btn-operator" onclick="inputOperator('/')" title="Divide (÷)">÷</button>

    <button class="btn-number" onclick="inputDigit('7')">7</button>
    <button class="btn-number" onclick="inputDigit('8')">8</button>
    <button class="btn-number" onclick="inputDigit('9')">9</button>
    <button class="btn-backspace" onclick="backspace()" title="Backspace">⌫</button>
    <button class="btn-operator" onclick="inputOperator('*')" title="Multiply (×)">×</button>

    <button class="btn-number" onclick="inputDigit('4')">4</button>
    <button class="btn-number" onclick="inputDigit('5')">5</button>
    <button class="btn-number" onclick="inputDigit('6')">6</button>
    <button class="btn-function" onclick="inputPower()" title="Power (^)">xʸ</button>
    <button class="btn-operator" onclick="inputOperator('-')" title="Subtract (−)">−</button>

    <button class="btn-number" onclick="inputDigit('1')">1</button>
    <button class="btn-number" onclick="inputDigit('2')">2</button>
    <button class="btn-number" onclick="inputDigit('3')">3</button>
    <button class="btn-function" onclick="inputSquareRoot()" title="Square Root (√)">√</button>
    <button class="btn-operator" onclick="inputOperator('+')" title="Add (+)">+</button>

    <button class="btn-number btn-zero" onclick="inputDigit('0')">0</button>
    <button class="btn-number" onclick="inputDecimal()">.</button>
    <button class="btn-function" onclick="inputFactorial()" title="Factorial (!)">n!</button>
    <button class="btn-equals" onclick="calculate()" title="Equals (=)">=</button>
  </div>
</div>

<script>
  let currentInput = '0';
  let expression = '';
  let fullExpression = '';
  let lastResult = null;
  let justCalculated = false;
  let memory = 0;
  let hasMemory = false;
  let operandStack = [];
  let operatorStack = [];

  const currentEl = document.getElementById('current');
  const expressionEl = document.getElementById('expression');
  const historyEl = document.getElementById('history');
  const displayEl = document.getElementById('display');

  function updateDisplay() {
    currentEl.textContent = formatNumber(currentInput);
    expressionEl.textContent = fullExpression;

    const len = currentInput.replace(/[^0-9.]/g, '').length;
    currentEl.className = 'current';
    if (len > 12) currentEl.classList.add('shrink-3');
    else if (len > 9) currentEl.classList.add('shrink-2');
    else if (len > 7) currentEl.classList.add('shrink-1');

    updateMemoryButtons();
  }

  function formatNumber(numStr) {
    if (numStr === 'Error' || numStr === 'Infinity' || numStr === '-Infinity' || numStr === 'NaN') {
      return 'Error';
    }
    if (numStr.includes('e')) return numStr;
    const parts = numStr.split('.');
    let intPart = parts[0];
    const isNeg = intPart.startsWith('-');
    if (isNeg) intPart = intPart.slice(1);
    intPart = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    if (isNeg) intPart = '-' + intPart;
    return parts.length > 1 ? intPart + '.' + parts[1] : intPart;
  }

  function parseExpression(expr) {
    return expr
      .replace(/×/g, '*')
      .replace(/÷/g, '/')
      .replace(/−/g, '-')
      .replace(/×\^/g, '*')
      .replace(/÷\^/g, '/');
  }

  function evaluateExpression(expr) {
    try {
      let sanitized = parseExpression(expr);
      sanitized = sanitized.replace(/[^0-9+\-*/().%^!sqrtpi]/g, '');
      if (!sanitized || sanitized === '-') return NaN;

      let result = safeEvaluate(sanitized);
      if (result === Infinity || result === -Infinity) {
        if (expr.includes('/') && !expr.includes('e')) {
          return NaN;
        }
        return result;
      }
      if (result !== result) return NaN;

      let precise = parseFloat(result.toPrecision(15));
      return precise;
    } catch (e) {
      return NaN;
    }
  }

  function safeEvaluate(expr) {
    expr = expr.replace(/\s+/g, '');

    if (expr.includes('sqrt(')) {
      return safeEvaluate(expr.replace(/sqrt\(([^)]+)\)/g, (_, inner) => {
        const val = safeEvaluate(inner);
        if (val < 0) return 'NaN';
        return Math.sqrt(val).toString();
      }));
    }

    if (expr.includes('pow(')) {
      return safeEvaluate(expr.replace(/pow\(([^,]+),([^)]+)\)/g, (_, base, exp) => {
        return Math.pow(parseFloat(safeEvaluate(base)), parseFloat(safeEvaluate(exp))).toString();
      }));
    }

    if (expr.includes('^')) {
      return safeEvaluate(expr.replace(/(\d+\.?\d*)\^(\d+\.?\d*)/g, (_, base, exp) => {
        return Math.pow(parseFloat(base), parseFloat(exp)).toString();
      }));
    }

    if (expr.includes('!')) {
      return safeEvaluate(expr.replace(/(\d+)!/g, (_, num) => {
        let n = parseInt(num);
        if (n < 0 || n > 170) return 'NaN';
        let result = 1;
        for (let i = 2; i <= n; i++) result *= i;
        return result.toString();
      }));
    }

    let result = Function('"use strict"; return (' + expr + ')')();
    return result;
  }

  function showError() {
    currentInput = 'Error';
    fullExpression = '';
    expression = '';
    updateDisplay();
    displayEl.classList.add('error-flash');
    setTimeout(() => displayEl.classList.remove('error-flash'), 400);
  }

  function inputDigit(digit) {
    if (justCalculated) {
      currentInput = digit;
      fullExpression = '';
      expression = '';
      lastResult = null;
      justCalculated = false;
    } else {
      if (currentInput === '0' && digit !== '.') {
        currentInput = digit;
      } else {
        if (currentInput.length < 20) {
          currentInput += digit;
        }
      }
    }
    updateDisplay();
  }

  function inputDecimal() {
    if (justCalculated) {
      currentInput = '0.';
      fullExpression = '';
      expression = '';
      lastResult = null;
      justCalculated = false;
    } else if (!currentInput.includes('.')) {
      if (currentInput === '0' || currentInput === '') {
        currentInput = '0.';
      } else {
        currentInput += '.';
      }
    }
    updateDisplay();
  }

  function inputOperator(op) {
    if (currentInput === 'Error') return;

    const opSymbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
    const currentVal = currentInput;

    if (justCalculated && lastResult !== null) {
      fullExpression = formatNumber(lastResult.toString()) + ' ' + opSymbols[op] + ' ';
      currentInput = '0';
      justCalculated = false;
      expression = fullExpression;
      updateDisplay();
      return;
    }

    if (fullExpression && !justCalculated) {
      fullExpression = fullExpression.trimEnd();
      if (fullExpression.match(/[+\-×÷]$/)) {
        fullExpression = fullExpression.slice(0, -1) + opSymbols[op] + ' ';
      } else {
        fullExpression += ' ' + opSymbols[op] + ' ';
      }
      currentInput = '0';
      expression = fullExpression;
    } else {
      fullExpression = formatNumber(currentVal) + ' ' + opSymbols[op] + ' ';
      currentInput = '0';
      expression = fullExpression;
    }
    updateDisplay();
  }

  function inputPercent() {
    if (currentInput === 'Error') return;
    const val = parseFloat(currentInput);
    if (isNaN(val)) return;
    currentInput = String(val / 100);
    updateDisplay();
  }

  function inputToggleSign() {
    if (currentInput === 'Error' || currentInput === '0') return;
    if (currentInput.startsWith('-')) {
      currentInput = currentInput.slice(1);
    } else {
      currentInput = '-' + currentInput;
    }
    updateDisplay();
  }

  function inputPower() {
    if (currentInput === 'Error') return;
    const currentVal = currentInput;
    fullExpression += currentVal + '^';
    currentInput = '0';
    expression = fullExpression;
    updateDisplay();
  }

  function inputSquareRoot() {
    if (currentInput === 'Error') return;
    const val = parseFloat(currentInput);
    if (isNaN(val)) return;
    if (val < 0) {
      showError();
      return;
    }
    const result = Math.sqrt(val);
    fullExpression = '√(' + formatNumber(currentInput) + ')';
    currentInput = String(parseFloat(result.toPrecision(15)));
    lastResult = currentInput;
    justCalculated = true;
    updateDisplay();
  }

  function inputFactorial() {
    if (currentInput === 'Error') return;
    const val = parseFloat(currentInput);
    if (isNaN(val) || val < 0 || val > 170 || val !== Math.floor(val)) {
      showError();
      return;
    }
    let result = 1;
    for (let i = 2; i <= val; i++) result *= i;
    fullExpression = formatNumber(currentInput) + '!';
    currentInput = String(result);
    lastResult = currentInput;
    justCalculated = true;
    updateDisplay();
  }

  function calculate() {
    if (currentInput === 'Error') return;

    let exprToEval = fullExpression + currentInput;

    if (!exprToEval.trim()) return;

    let displayExpr = exprToEval;
    let result = evaluateExpression(exprToEval);

    if (isNaN(result) || result === Infinity || result === -Infinity) {
      if (exprToEval.includes('/') && !exprToEval.match(/e[+-]?\d/)) {
        historyEl.textContent = displayExpr + ' =';
        showError();
        return;
      }
      currentInput = 'Error';
      updateDisplay();
      return;
    }

    let precise = parseFloat(result.toPrecision(15));
    historyEl.textContent = displayExpr + ' =';
    expressionEl.textContent = '';
    fullExpression = '';
    expression = '';
    currentInput = String(precise);
    lastResult = precise;
    justCalculated = true;
    updateDisplay();
  }

  function clearAll() {
    currentInput = '0';
    fullExpression = '';
    expression = '';
    lastResult = null;
    justCalculated = false;
    historyEl.textContent = '';
    updateDisplay();
  }

  function clearEntry() {
    currentInput = '0';
    updateDisplay();
  }

  function backspace() {
    if (currentInput === 'Error' || justCalculated) {
      clearAll();
      return;
    }
    if (currentInput.length > 1) {
      currentInput = currentInput.slice(0, -1);
    } else {
      currentInput = '0';
    }
    updateDisplay();
  }

  function memoryAdd() {
    if (currentInput === 'Error') return;
    const val = parseFloat(currentInput);
    if (isNaN(val)) return;
    memory += val;
    hasMemory = true;
    updateDisplay();
  }

  function memorySubtract() {
    if (currentInput === 'Error') return;
    const val = parseFloat(currentInput);
    if (isNaN(val)) return;
    memory -= val;
    hasMemory = true;
    updateDisplay();
  }

  function memoryRecall() {
    if (!hasMemory) return;
    currentInput = String(memory);
    justCalculated = false;
    updateDisplay();
  }

  function memoryClear() {
    memory = 0;
    hasMemory = false;
    updateDisplay();
  }

  function updateMemoryButtons() {
    const buttons = document.querySelectorAll('.memory-bar button');
    buttons.forEach(btn => {
      btn.classList.toggle('active', hasMemory);
    });
  }

  function createRipple(e, btn) {
    const ripple = document.createElement('span');
    ripple.classList.add('ripple');
    const rect = btn.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    ripple.style.width = ripple.style.height = size + 'px';
    ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
    ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
    btn.appendChild(ripple);
    setTimeout(() => ripple.remove(), 500);
  }

  document.querySelectorAll('.buttons button, .memory-bar button').forEach(btn => {
    btn.addEventListener('click', function(e) {
      createRipple(e, this);
    });
  });

  document.addEventListener('keydown', function(e) {
    const key = e.key;

    if (key >= '0' && key <= '9') {
      e.preventDefault();
      inputDigit(key);
      flashButton(key);
    } else if (key === '.') {
      e.preventDefault();
      inputDecimal();
    } else if (key === '+') {
      e.preventDefault();
      inputOperator('+');
    } else if (key === '-') {
      e.preventDefault();
      inputOperator('-');
    } else if (key === '*') {
      e.preventDefault();
      inputOperator('*');
    } else if (key === '/') {
      e.preventDefault();
      inputOperator('/');
    } else if (key === 'Enter' || key === '=') {
      e.preventDefault();
      calculate();
    } else if (key === 'Escape') {
      e.preventDefault();
      clearAll();
    } else if (key === 'Backspace') {
      e.preventDefault();
      backspace();
    } else if (key === '%') {
      e.preventDefault();
      inputPercent();
    } else if (key === 'Delete') {
      e.preventDefault();
      clearEntry();
    } else if (key === '^') {
      e.preventDefault();
      inputPower();
    } else if (key === '!') {
      e.preventDefault();
      inputFactorial();
    } else if (key === 'm') {
      e.preventDefault();
      memoryAdd();
    } else if (key === 'M') {
      e.preventDefault();
      memoryClear();
    } else if (key === 'r') {
      e.preventDefault();
      memoryRecall();
    }
  });

  function flashButton(key) {
    const buttons = document.querySelectorAll('.buttons button');
    buttons.forEach(btn => {
      if (btn.textContent.trim() === key) {
        btn.style.filter = 'brightness(1.5)';
        setTimeout(() => btn.style.filter = '', 120);
      }
    });
  }

  updateDisplay();
</script>

</body>
</html>
