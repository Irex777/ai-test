<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 16px;
  }

  .calculator {
    width: 100%;
    max-width: 420px;
    background: #16213e;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
  }

  .display {
    padding: 20px 24px 16px;
    background: #0f3460;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    position: relative;
    overflow: hidden;
  }

  .display::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  }

  .expression-history {
    color: #8899aa;
    font-size: 14px;
    text-align: right;
    min-height: 20px;
    word-wrap: break-word;
    overflow-wrap: break-word;
    line-height: 1.4;
    max-height: 56px;
    overflow-y: auto;
  }

  .current-input {
    color: #e8e8e8;
    font-size: 42px;
    font-weight: 300;
    text-align: right;
    line-height: 1.2;
    margin-top: 8px;
    transition: font-size 0.15s ease;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }

  .current-input.small {
    font-size: 32px;
  }

  .current-input.xsmall {
    font-size: 24px;
  }

  .memory-indicator {
    position: absolute;
    top: 8px;
    left: 16px;
    color: #4fc3f7;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .memory-indicator.active {
    opacity: 1;
  }

  .buttons {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 1px;
    background: #0d1b36;
    padding: 1px;
  }

  button {
    border: none;
    outline: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 18px;
    font-weight: 500;
    padding: 18px 0;
    transition: all 0.12s ease;
    position: relative;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  button:active {
    transform: scale(0.95);
  }

  .btn-memory {
    background: #1a2744;
    color: #6b8daf;
    font-size: 13px;
    font-weight: 600;
  }

  .btn-memory:hover {
    background: #223355;
    color: #8fb3d4;
  }

  .btn-memory:active {
    background: #2a3f66;
  }

  .btn-function {
    background: #1e2d4a;
    color: #a0b4c8;
    font-size: 16px;
  }

  .btn-function:hover {
    background: #283a5c;
    color: #c0d4e8;
  }

  .btn-function:active {
    background: #304468;
  }

  .btn-digit {
    background: #253552;
    color: #e8e8e8;
    font-size: 22px;
    font-weight: 400;
  }

  .btn-digit:hover {
    background: #2e4262;
  }

  .btn-digit:active {
    background: #384e72;
  }

  .btn-operator {
    background: #0f4c75;
    color: #4fc3f7;
    font-size: 22px;
    font-weight: 500;
  }

  .btn-operator:hover {
    background: #1565a0;
    color: #81d4fa;
  }

  .btn-operator:active {
    background: #1a7bc8;
  }

  .btn-equals {
    background: #e94560;
    color: #ffffff;
    font-size: 26px;
    font-weight: 600;
    grid-row: span 3;
  }

  .btn-equals:hover {
    background: #f05a73;
  }

  .btn-equals:active {
    background: #f76f86;
  }

  .btn-zero {
    grid-column: span 2;
  }

  /* Ripple effect */
  button::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(255,255,255,0.15), transparent 60%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  button:active::after {
    opacity: 1;
  }

  /* Keyboard focus visible */
  button:focus-visible {
    outline: 2px solid #4fc3f7;
    outline-offset: -2px;
  }

  /* Responsive adjustments */
  @media (max-width: 380px) {
    button {
      padding: 14px 0;
      font-size: 16px;
    }

    .btn-digit {
      font-size: 18px;
    }

    .current-input {
      font-size: 36px;
    }

    .btn-equals {
      font-size: 22px;
    }
  }

  @media (max-height: 700px) {
    button {
      padding: 12px 0;
    }

    .display {
      min-height: 90px;
      padding: 14px 20px 10px;
    }
  }

  @media (min-width: 600px) {
    .calculator {
      max-width: 480px;
    }

    button {
      padding: 22px 0;
      font-size: 20px;
    }

    .current-input {
      font-size: 48px;
    }
  }
</style>
</head>
<body>

<div class="calculator">
  <div class="display">
    <div class="memory-indicator" id="memIndicator">M</div>
    <div class="expression-history" id="expressionHistory"></div>
    <div class="current-input" id="currentInput">0</div>
  </div>
  <div class="buttons" id="buttonGrid">
    <!-- Row 1: Memory row -->
    <button class="btn-memory" data-action="mc" aria-label="Memory Clear">MC</button>
    <button class="btn-memory" data-action="m+" aria-label="Memory Add">M+</button>
    <button class="btn-memory" data-action="m-" aria-label="Memory Subtract">M−</button>
    <button class="btn-memory" data-action="mr" aria-label="Memory Recall">MR</button>
    <button class="btn-function" data-action="percent" aria-label="Percent">%</button>
    <button class="btn-function" data-action="backspace" aria-label="Backspace">⌫</button>

    <!-- Row 2: CE, C, +/-, ÷, × -->
    <button class="btn-function" data-action="ce" aria-label="Clear Entry">CE</button>
    <button class="btn-function" data-action="clear" aria-label="Clear All">C</button>
    <button class="btn-function" data-action="sign" aria-label="Toggle Sign">+/−</button>
    <button class="btn-operator" data-action="divide" aria-label="Divide">÷</button>
    <button class="btn-operator" data-action="multiply" aria-label="Multiply">×</button>

    <!-- Row 3: 7, 8, 9, −, + -->
    <button class="btn-digit" data-action="digit" data-value="7">7</button>
    <button class="btn-digit" data-action="digit" data-value="8">8</button>
    <button class="btn-digit" data-action="digit" data-value="9">9</button>
    <button class="btn-operator" data-action="subtract" aria-label="Subtract">−</button>
    <button class="btn-operator" data-action="add" aria-label="Add">+</button>

    <!-- Row 4: 4, 5, 6, = (span 3 rows) -->
    <button class="btn-digit" data-action="digit" data-value="4">4</button>
    <button class="btn-digit" data-action="digit" data-value="5">5</button>
    <button class="btn-digit" data-action="digit" data-value="6">6</button>
    <button class="btn-equals" data-action="equals" aria-label="Equals">=</button>

    <!-- Row 5: 1, 2, 3, (covered by =), (covered by =) -->
    <button class="btn-digit" data-action="digit" data-value="1">1</button>
    <button class="btn-digit" data-action="digit" data-value="2">2</button>
    <button class="btn-digit" data-action="digit" data-value="3">3</button>

    <!-- Row 6: 0 (span 2), ., (covered by =), (covered by =) -->
    <button class="btn-digit btn-zero" data-action="digit" data-value="0">0</button>
    <button class="btn-digit" data-action="decimal" aria-label="Decimal Point">.</button>
  </div>
</div>

<script>
(function() {
  'use strict';

  // State
  let state = {
    currentInput: '0',
    expression: '',
    fullExpression: '',
    lastOperator: null,
    lastOperand: null,
    resetNext: false,
    memory: 0,
    hasMemory: false,
    justEvaluated: false,
    error: false
  };

  // DOM refs
  const currentInputEl = document.getElementById('currentInput');
  const expressionHistoryEl = document.getElementById('expressionHistory');
  const memIndicatorEl = document.getElementById('memIndicator');

  // Format number for display
  function formatNumber(num) {
    if (num === Infinity) return 'Error';
    if (num === -Infinity) return 'Error';
    if (isNaN(num)) return 'Error';

    if (Math.abs(num) > 999999999999999) {
      return num.toExponential(6);
    }

    let str = num.toString();
    if (str.length > 15) {
      str = num.toPrecision(12);
      str = str.replace(/\.?0+$/, '');
    }
    return str;
  }

  // Format display string with commas for integer part
  function formatDisplay(str) {
    if (str === 'Error' || str.includes('e') || str.includes('E')) return str;

    const parts = str.split('.');
    let intPart = parts[0];
    const isNeg = intPart.startsWith('-');
    if (isNeg) intPart = intPart.slice(1);

    intPart = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    let result = (isNeg ? '-' : '') + intPart;
    if (parts.length > 1) result += '.' + parts[1];
    return result;
  }

  // Update display
  function updateDisplay() {
    let displayStr = state.currentInput;

    // Try to format with commas if it looks like a plain number
    if (!state.error && !displayStr.includes('e') && !displayStr.includes('E')) {
      if (/^-?\d+(\.\d*)?$/.test(displayStr) || /^-?\.\d+$/.test(displayStr)) {
        const num = parseFloat(displayStr);
        if (!isNaN(num) && num >= -999999999999999 && num <= 999999999999999) {
          displayStr = formatDisplay(displayStr);
        }
      }
    }

    currentInputEl.textContent = displayStr;

    // Adjust font size based on length
    const len = displayStr.replace(/[,.]/g, '').length;
    currentInputEl.className = 'current-input' +
      (len > 12 ? ' xsmall' : len > 8 ? ' small' : '');

    expressionHistoryEl.textContent = state.fullExpression;

    memIndicatorEl.className = 'memory-indicator' + (state.hasMemory ? ' active' : '');
  }

  // Safe evaluation using a proper parser
  function evaluateExpression(expr) {
    // Tokenize
    const tokens = [];
    let i = 0;
    while (i < expr.length) {
      const ch = expr[i];
      if (ch === ' ' || ch === '\t') {
        i++;
        continue;
      }
      if (ch >= '0' && ch <= '9' || ch === '.') {
        let num = '';
        while (i < expr.length && ((expr[i] >= '0' && expr[i] <= '9') || expr[i] === '.')) {
          num += expr[i++];
        }
        tokens.push({ type: 'number', value: parseFloat(num) });
        continue;
      }
      if (ch === '+' || ch === '-' || ch === '*' || ch === '/') {
        tokens.push({ type: 'operator', value: ch });
        i++;
        continue;
      }
      i++;
    }

    let pos = 0;

    function peek() {
      return pos < tokens.length ? tokens[pos] : null;
    }

    function consume() {
      return tokens[pos++];
    }

    // expression = term (('+' | '-') term)*
    function parseExpression() {
      let result = parseTerm();
      while (true) {
        const tok = peek();
        if (!tok || tok.type !== 'operator' || (tok.value !== '+' && tok.value !== '-')) break;
        consume();
        const right = parseTerm();
        if (tok.value === '+') result += right;
        else result -= right;
      }
      return result;
    }

    // term = factor (('*' | '/') factor)*
    function parseTerm() {
      let result = parseFactor();
      while (true) {
        const tok = peek();
        if (!tok || tok.type !== 'operator' || (tok.value !== '*' && tok.value !== '/')) break;
        consume();
        const right = parseFactor();
        if (tok.value === '*') {
          result *= right;
        } else {
          if (right === 0) throw new Error('Division by zero');
          result /= right;
        }
      }
      return result;
    }

    // factor = NUMBER | '+' factor | '-' factor | '(' expression ')'
    function parseFactor() {
      const tok = peek();
      if (!tok) throw new Error('Unexpected end');

      if (tok.type === 'number') {
        consume();
        return tok.value;
      }

      if (tok.type === 'operator') {
        if (tok.value === '+') {
          consume();
          return parseFactor();
        }
        if (tok.value === '-') {
          consume();
          return -parseFactor();
        }
      }

      throw new Error('Unexpected token');
    }

    const result = parseExpression();

    if (pos !== tokens.length) {
      throw new Error('Invalid expression');
    }

    return result;
  }

  // Convert display operators to math operators
  function normalizeExpression(expr) {
    return expr
      .replace(/÷/g, '/')
      .replace(/×/g, '*')
      .replace(/−/g, '-')
      .replace(/+/g, '+');
  }

  // Perform calculation
  function calculate() {
    if (state.error) return;

    let expr = state.fullExpression + state.currentInput;

    // Remove trailing operator if present (shouldn't happen but safety)
    const lastCh = expr.trim().slice(-1);
    if (lastCh === '+' || lastCh === '-' || lastCh === '*' || lastCh === '/') {
      expr = expr.trim().slice(0, -1);
    }

    try {
      const normalized = normalizeExpression(expr);
      const result = evaluateExpression(normalized);

      if (result === undefined || result === null) {
        showError();
        return;
      }

      const displayResult = formatNumber(result);

      // Show the expression that was evaluated
      state.fullExpression = expr + ' =';
      state.currentInput = displayResult;
      state.resetNext = true;
      state.justEvaluated = true;
      state.lastOperator = null;
      state.lastOperand = null;

      updateDisplay();
    } catch (e) {
      showError();
    }
  }

  function showError() {
    state.error = true;
    state.currentInput = 'Error';
    state.fullExpression = '';
    state.lastOperator = null;
    state.lastOperand = null;
    updateDisplay();
  }

  // Input a digit
  function inputDigit(digit) {
    if (state.error) return;

    if (state.resetNext || state.justEvaluated) {
      state.currentInput = digit;
      state.resetNext = false;
      state.justEvaluated = false;
      if (state.justEvaluated === false && state.currentInput !== digit) {
        // We just started a new number after evaluation
      }
      if (state.justEvaluated) {
        state.fullExpression = '';
        state.justEvaluated = false;
      }
    } else {
      if (state.currentInput === '0' && digit !== '0') {
        state.currentInput = digit;
      } else if (state.currentInput === '0' && digit === '0') {
        // Don't add extra zeros
      } else {
        if (state.currentInput.replace(/[^0-9]/g, '').length >= 15) return;
        state.currentInput += digit;
      }
    }
    updateDisplay();
  }

  // Input decimal
  function inputDecimal() {
    if (state.error) return;

    if (state.resetNext || state.justEvaluated) {
      state.currentInput = '0.';
      state.resetNext = false;
      state.justEvaluated = false;
      if (state.justEvaluated) {
        state.fullExpression = '';
        state.justEvaluated = false;
      }
    } else if (!state.currentInput.includes('.')) {
      state.currentInput += '.';
    }
    updateDisplay();
  }

  // Input operator
  function inputOperator(op) {
    if (state.error) return;

    const opSymbols = { add: '+', subtract: '−', multiply: '×', divide: '÷' };
    const symbol = opSymbols[op];

    if (state.justEvaluated) {
      // Continue from result
      state.fullExpression = state.currentInput + ' ' + symbol + ' ';
      state.resetNext = true;
      state.justEvaluated = false;
      updateDisplay();
      return;
    }

    if (state.lastOperator && !state.resetNext) {
      // Chain: evaluate previous operation first
      try {
        const prevExpr = state.fullExpression + state.currentInput;
        const normalized = normalizeExpression(prevExpr);
        const result = evaluateExpression(normalized);
        const displayResult = formatNumber(result);
        state.currentInput = displayResult;
        state.fullExpression = state.currentInput + ' ' + symbol + ' ';
      } catch (e) {
        showError();
        return;
      }
    } else {
      if (state.fullExpression === '' && state.currentInput !== '0') {
        state.fullExpression = state.currentInput + ' ' + symbol + ' ';
      } else if (state.fullExpression === '') {
        state.fullExpression = '0 ' + symbol + ' ';
      } else {
        // Replace last operator
        state.fullExpression = state.fullExpression.trimEnd();
        // Remove old operator
        state.fullExpression = state.fullExpression.replace(/[+\-×÷]$/, '') + ' ' + symbol + ' ';
      }
    }

    state.resetNext = true;
    state.lastOperator = op;
    updateDisplay();
  }

  // Percent
  function inputPercent() {
    if (state.error) return;

    const num = parseFloat(state.currentInput);
    if (isNaN(num)) return;

    if (state.lastOperator === 'add' || state.lastOperator === 'subtract') {
      // e.g., 200 + 10% of 200
      const baseExpr = state.fullExpression;
      const match = baseExpr.match(/^(.+?)\s*[+\-]\s*([\d.]+)$/);
      if (match) {
        const base = parseFloat(match[1]);
        state.currentInput = formatNumber(base * (num / 100));
      } else {
        state.currentInput = formatNumber(num / 100);
      }
    } else {
      state.currentInput = formatNumber(num / 100);
    }

    state.resetNext = true;
    updateDisplay();
  }

  // Toggle sign
  function toggleSign() {
    if (state.error) return;

    if (state.currentInput === '0') return;

    if (state.currentInput.startsWith('-')) {
      state.currentInput = state.currentInput.slice(1);
    } else {
      state.currentInput = '-' + state.currentInput;
    }
    updateDisplay();
  }

  // Clear entry
  function clearEntry() {
    if (state.error) return;
    state.currentInput = '0';
    updateDisplay();
  }

  // Clear all
  function clearAll() {
    state.currentInput = '0';
    state.fullExpression = '';
    state.lastOperator = null;
    state.lastOperand = null;
    state.resetNext = false;
    state.justEvaluated = false;
    state.error = false;
    updateDisplay();
  }

  // Backspace
  function backspace() {
    if (state.error || state.resetNext || state.justEvaluated) return;

    if (state.currentInput.length > 1) {
      state.currentInput = state.currentInput.slice(0, -1);
      if (state.currentInput === '-') state.currentInput = '0';
    } else {
      state.currentInput = '0';
    }
    updateDisplay();
  }

  // Memory functions
  function memoryClear() {
    state.memory = 0;
    state.hasMemory = false;
    updateDisplay();
  }

  function memoryRecall() {
    if (state.error) return;
    state.currentInput = formatNumber(state.memory);
    state.resetNext = true;
    updateDisplay();
  }

  function memoryAdd() {
    if (state.error) return;
    const num = parseFloat(state.currentInput);
    if (!isNaN(num)) {
      state.memory += num;
      state.hasMemory = true;
      updateDisplay();
    }
  }

  function memorySubtract() {
    if (state.error) return;
    const num = parseFloat(state.currentInput);
    if (!isNaN(num)) {
      state.memory -= num;
      state.hasMemory = true;
      updateDisplay();
    }
  }

  // Handle button clicks
  document.getElementById('buttonGrid').addEventListener('click', function(e) {
    const btn = e.target.closest('button');
    if (!btn) return;

    const action = btn.dataset.action;
    const value = btn.dataset.value;

    switch (action) {
      case 'digit': inputDigit(value); break;
      case 'decimal': inputDecimal(); break;
      case 'add': inputOperator('add'); break;
      case 'subtract': inputOperator('subtract'); break;
      case 'multiply': inputOperator('multiply'); break;
      case 'divide': inputOperator('divide'); break;
      case 'equals': calculate(); break;
      case 'clear': clearAll(); break;
      case 'ce': clearEntry(); break;
      case 'sign': toggleSign(); break;
      case 'percent': inputPercent(); break;
      case 'backspace': backspace(); break;
      case 'mc': memoryClear(); break;
      case 'mr': memoryRecall(); break;
      case 'm+': memoryAdd(); break;
      case 'm-': memorySubtract(); break;
    }
  });

  // Keyboard support
  document.addEventListener('keydown', function(e) {
    const key = e.key;

    // Prevent default for calculator keys
    if (['/', '*', '-', '+', 'Enter', 'Backspace', 'Escape', '%'].includes(key)) {
      e.preventDefault();
    }

    if (key >= '0' && key <= '9') {
      inputDigit(key);
    } else if (key === '.') {
      inputDecimal();
    } else if (key === '+') {
      inputOperator('add');
    } else if (key === '-') {
      inputOperator('subtract');
    } else if (key === '*') {
      inputOperator('multiply');
    } else if (key === '/') {
      inputOperator('divide');
    } else if (key === 'Enter' || key === '=') {
      calculate();
    } else if (key === 'Backspace') {
      backspace();
    } else if (key === 'Escape') {
      clearAll();
    } else if (key === 'Delete') {
      clearEntry();
    } else if (key === '%') {
      inputPercent();
    } else if (key === 'm' || key === 'M') {
      // Ctrl+M for memory, or just M for MR
      if (e.ctrlKey || e.metaKey) {
        // Ctrl+M could be memory clear
        memoryClear();
      }
    }
  });

  // Initialize display
  updateDisplay();

})();
</script>

</body>
</html>
