<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg1:#0c1020; --bg2:#161d36;
    --panel:rgba(28,36,64,.72); --panel-border:rgba(120,140,200,.18);
    --light:#cdd9e8; --dark:#4a6391;
    --sel:#f3c623; --last:rgba(243,198,35,.30);
    --dot:rgba(86,210,160,.85); --cap:rgba(231,90,90,.85);
    --check:#e84040;
    --text:#e7ebf5; --muted:#8b97b8; --accent:#6ea8ff;
  }
  body {
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
    background: radial-gradient(1200px 800px at 30% 0%, #1c2750 0%, var(--bg1) 55%, var(--bg2) 100%);
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .app { display: flex; gap: 28px; flex-wrap: wrap; align-items: flex-start; justify-content: center; }

  /* Board */
  .board-wrap {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    padding: 14px;
    box-shadow: 0 18px 60px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.04);
    backdrop-filter: blur(6px);
  }
  #board {
    display: grid;
    grid-template-columns: repeat(8,1fr);
    grid-template-rows: repeat(8,1fr);
    width: min(92vw, 560px);
    aspect-ratio: 1 / 1;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 6px 24px rgba(0,0,0,.4);
  }
  .sq {
    position: relative;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    user-select: none;
  }
  .sq.light { background: var(--light); }
  .sq.dark  { background: var(--dark); }
  .sq.last::after {
    content:""; position:absolute; inset:0;
    background: var(--last); pointer-events:none;
  }
  .sq.sel::after {
    content:""; position:absolute; inset:0;
    background: var(--sel); opacity:.55; pointer-events:none;
  }
  .sq.check::after {
    content:""; position:absolute; inset:0;
    background: radial-gradient(circle at center, rgba(232,64,64,.95), rgba(232,64,64,.35) 70%);
    pointer-events:none;
  }
  .pc {
    position: relative; z-index: 2;
    font-size: clamp(22px, 7.2vw, 44px);
    line-height: 1;
    pointer-events: none;
  }
  .pc.white { color:#f7f7f7; text-shadow: 0 2px 3px rgba(0,0,0,.55); }
  .pc.black {
    color:#1d1d1d;
    text-shadow: 0 0 1px rgba(255,255,255,.35), 0 2px 3px rgba(0,0,0,.5);
  }
  .marker { position:absolute; inset:0; z-index:1; pointer-events:none; }
  .marker.dot::before {
    content:""; position:absolute; left:50%; top:50%;
    width:30%; height:30%; transform:translate(-50%,-50%);
    background: var(--dot); border-radius:50%;
  }
  .marker.cap::before {
    content:""; position:absolute; inset:6%;
    border: 4px solid var(--cap); border-radius:50%;
  }
  .rn, .fn { position:absolute; z-index:3; font-size:10px; font-weight:700; pointer-events:none; opacity:.7; }
  .rn { left:3px; top:2px; }
  .fn { right:3px; bottom:1px; }
  .sq.light .rn, .sq.light .fn { color:#33415c; }
  .sq.dark  .rn, .sq.dark  .fn { color:#dbe4f5; }

  /* Side panel */
  .panel { width: 300px; display:flex; flex-direction:column; gap:16px; }
  .card {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    padding: 14px 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,.3);
    backdrop-filter: blur(6px);
  }
  h1 { font-size: 20px; letter-spacing: .5px; display:flex; align-items:center; gap:8px; }
  h1 .logo { font-size: 24px; }
  .turn-row { display:flex; align-items:center; justify-content:space-between; margin-top: 10px; }
  .turn {
    font-size: 15px; font-weight:600; padding: 8px 14px; border-radius: 999px;
    border:1px solid var(--panel-border); display:inline-flex; align-items:center; gap:8px;
  }
  .turn .doti { width:12px; height:12px; border-radius:50%; box-shadow:0 0 0 2px rgba(255,255,255,.15); }
  .turn.w { background: rgba(247,247,247,.12); }
  .turn.w .doti { background:#f7f7f7; }
  .turn.b { background: rgba(0,0,0,.25); }
  .turn.b .doti { background:#1d1d1d; box-shadow:0 0 0 2px rgba(255,255,255,.25); }
  #status { margin-top: 10px; font-size: 13px; color: #ff9a9a; font-weight:600; min-height: 18px; }

  .label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 6px; }
  .cap-row { display:flex; flex-wrap: wrap; gap: 2px 1px; min-height: 26px; align-items:center; }
  .cap-row .pc-i { font-size: 22px; line-height: 1; }
  .cap-row .pc-i.white { color:#f7f7f7; text-shadow:0 1px 2px rgba(0,0,0,.5); }
  .cap-row .pc-i.black { color:#1d1d1d; text-shadow:0 0 1px rgba(255,255,255,.4); }
  .adv { font-size: 12px; color: var(--accent); font-weight:700; margin-left:6px; }

  .history-card { flex: 1; min-height: 160px; display:flex; flex-direction:column; }
  #history {
    margin-top: 6px; overflow-y:auto; max-height: 240px;
    font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 13px;
  }
  #history .row { display:grid; grid-template-columns: 34px 1fr 1fr; padding: 3px 4px; border-radius:6px; }
  #history .row:nth-child(odd){ background: rgba(255,255,255,.03); }
  #history .num { color: var(--muted); }
  #history .mv { padding-left: 6px; }
  #history .mv.last { color: var(--accent); font-weight:700; }
  #history::-webkit-scrollbar { width: 8px; }
  #history::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 8px; }

  button.newgame {
    width: 100%; padding: 12px; border:none; border-radius: 12px; cursor:pointer;
    background: linear-gradient(135deg, var(--accent), #8f7bff);
    color:#0c1020; font-weight:800; font-size: 14px; letter-spacing:.5px;
    box-shadow: 0 8px 20px rgba(110,168,255,.35);
    transition: transform .08s ease, box-shadow .2s ease;
  }
  button.newgame:hover { box-shadow: 0 10px 26px rgba(110,168,255,.5); }
  button.newgame:active { transform: translateY(1px); }
  .hint { font-size: 11px; color: var(--muted); text-align:center; margin-top: -4px; }
</style>
</head>
<body>
  <div class="app">
    <div class="board-wrap">
      <div id="board"></div>
    </div>

    <div class="panel">
      <div class="card">
        <h1><span class="logo">♚</span> Chess</h1>
        <div class="turn-row">
          <span id="turn" class="turn w"><span class="doti"></span> White to move</span>
        </div>
        <div id="status"></div>
      </div>

      <div class="card">
        <div class="label">White captured<span id="advW" class="adv"></span></div>
        <div id="capW" class="cap-row"></div>
        <div class="label" style="margin-top:10px;">Black captured<span id="advB" class="adv"></span></div>
        <div id="capB" class="cap-row"></div>
      </div>

      <div class="card history-card">
        <div class="label">Move history</div>
        <div id="history"></div>
      </div>

      <button class="newgame" id="newgame">New Game</button>
      <div class="hint">Click a piece, then click a highlighted square. Pawns auto-promote to Queen.</div>
    </div>
  </div>

<script>
"use strict";
const FILLED = { k:"♚", q:"♛", r:"♜", b:"♝", n:"♞", p:"♟" };
const VALUE = { p:1, n:3, b:3, r:5, q:9, k:0 };
const START = [
  ["br","bn","bb","bq","bk","bb","bn","br"],
  ["bp","bp","bp","bp","bp","bp","bp","bp"],
  [null,null,null,null,null,null,null,null],
  [null,null,null,null,null,null,null,null],
  [null,null,null,null,null,null,null,null],
  [null,null,null,null,null,null,null,null],
  ["wp","wp","wp","wp","wp","wp","wp","wp"],
  ["wr","wn","wb","wq","wk","wb","wn","wr"]
];

let board, turn, selected, validMoves, history, capW, capB,
    castleRights, enPassant, lastMove, status, gameOver, checkSquare;

function init(){
  board = START.map(r => r.slice());
  turn = "w";
  selected = null;
  validMoves = [];
  history = [];
  capW = []; capB = [];
  castleRights = { wK:true, wQ:true, bK:true, bQ:true };
  enPassant = null;
  lastMove = null;
  status = "";
  gameOver = false;
  checkSquare = null;
  render();
}

const inb = (r,c) => r>=0 && r<8 && c>=0 && c<8;
const cloneBoard = b => b.map(r => r.slice());
const sqName = (r,c) => String.fromCharCode(97 + c) + (8 - r);

function findKing(b, color){
  for (let r=0;r<8;r++) for (let c=0;c<8;c++)
    if (b[r][c] === color + "k") return [r,c];
  return null;
}

function isAttacked(b, r, c, by){
  // pawns
  const pd = by === "w" ? 1 : -1;  // row offset where an attacking pawn sits
  for (const dc of [-1,1]){
    const pr = r + pd, pc = c + dc;
    if (inb(pr,pc) && b[pr][pc] === by + "p") return true;
  }
  // knights
  for (const [dr,dc] of [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]]){
    const tr=r+dr, tc=c+dc;
    if (inb(tr,tc) && b[tr][tc] === by + "n") return true;
  }
  // king
  for (let dr=-1; dr<=1; dr++) for (let dc=-1; dc<=1; dc++){
    if (!dr && !dc) continue;
    const tr=r+dr, tc=c+dc;
    if (inb(tr,tc) && b[tr][tc] === by + "k") return true;
  }
  // diagonal sliders (bishop/queen)
  for (const [dr,dc] of [[-1,-1],[-1,1],[1,-1],[1,1]]){
    let tr=r+dr, tc=c+dc;
    while (inb(tr,tc)){
      const p = b[tr][tc];
      if (p){ if (p === by+"b" || p === by+"q") return true; break; }
      tr+=dr; tc+=dc;
    }
  }
  // orthogonal sliders (rook/queen)
  for (const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]){
    let tr=r+dr, tc=c+dc;
    while (inb(tr,tc)){
      const p = b[tr][tc];
      if (p){ if (p === by+"r" || p === by+"q") return true; break; }
      tr+=dr; tc+=dc;
    }
  }
  return false;
}

function inCheck(b, color){
  const k = findKing(b, color);
  return k ? isAttacked(b, k[0], k[1], color === "w" ? "b" : "w") : false;
}

// Pseudo-legal moves for the piece at (r,c). Reads globals enPassant & castleRights.
function genMoves(r, c){
  const piece = board[r][c];
  if (!piece) return [];
  const color = piece[0], type = piece[1], enemy = color === "w" ? "b" : "w";
  const m = [];
  const push = (tr,tc,sp) => m.push({ fr:r, fc:c, tr, tc, sp });

  if (type === "p"){
    const dir = color === "w" ? -1 : 1;
    const startR = color === "w" ? 6 : 1;
    const promoR = color === "w" ? 0 : 7;
    // forward
    if (inb(r+dir,c) && !board[r+dir][c]){
      if (r+dir === promoR) push(r+dir, c, "promo");
      else push(r+dir, c);
      if (r === startR && !board[r+2*dir][c]) push(r+2*dir, c, "double");
    }
    // captures + en passant
    for (const dc of [-1,1]){
      const tr=r+dir, tc=c+dc;
      if (!inb(tr,tc)) continue;
      const t = board[tr][tc];
      if (t && t[0] === enemy){
        if (tr === promoR) push(tr,tc,"promo-cap"); else push(tr,tc,"cap");
      }
      if (enPassant && enPassant[0] === tr && enPassant[1] === tc) push(tr,tc,"ep");
    }
  } else if (type === "n"){
    for (const [dr,dc] of [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]]){
      const tr=r+dr, tc=c+dc;
      if (!inb(tr,tc)) continue;
      const t = board[tr][tc];
      if (!t) push(tr,tc);
      else if (t[0] === enemy) push(tr,tc,"cap");
    }
  } else if (type === "k"){
    for (let dr=-1; dr<=1; dr++) for (let dc=-1; dc<=1; dc++){
      if (!dr && !dc) continue;
      const tr=r+dr, tc=c+dc;
      if (!inb(tr,tc)) continue;
      const t = board[tr][tc];
      if (!t) push(tr,tc);
      else if (t[0] === enemy) push(tr,tc,"cap");
    }
    // castling (king-side / queen-side)
    const kr = color === "w" ? "wK" : "bK";
    const qg = color === "w" ? "wQ" : "bQ";
    if (castleRights[kr] && !board[r][5] && !board[r][6] && board[r][7] === color+"r"
        && !isAttacked(board,r,4,enemy) && !isAttacked(board,r,5,enemy) && !isAttacked(board,r,6,enemy))
      push(r,6,"castleK");
    if (castleRights[qg] && !board[r][1] && !board[r][2] && !board[r][3] && board[r][0] === color+"r"
        && !isAttacked(board,r,4,enemy) && !isAttacked(board,r,3,enemy) && !isAttacked(board,r,2,enemy))
      push(r,2,"castleQ");
  } else {
    let dirs = [];
    if (type === "b" || type === "q") dirs.push([-1,-1],[-1,1],[1,-1],[1,1]);
    if (type === "r" || type === "q") dirs.push([-1,0],[1,0],[0,-1],[0,1]);
    for (const [dr,dc] of dirs){
      let tr=r+dr, tc=c+dc;
      while (inb(tr,tc)){
        const t = board[tr][tc];
        if (!t) push(tr,tc);
        else { if (t[0] === enemy) push(tr,tc,"cap"); break; }
        tr+=dr; tc+=dc;
      }
    }
  }
  return m;
}

// Apply a move onto a board (no global side-effects). Used for legality simulation.
function applyOnBoard(b, mv){
  const piece = b[mv.fr][mv.fc];
  b[mv.tr][mv.tc] = piece;
  b[mv.fr][mv.fc] = null;
  if (mv.sp === "ep") b[mv.fr][mv.tc] = null;          // captured pawn sits behind target
  if (mv.sp === "castleK"){ b[mv.tr][5] = b[mv.tr][7]; b[mv.tr][7] = null; }
  if (mv.sp === "castleQ"){ b[mv.tr][3] = b[mv.tr][0]; b[mv.tr][0] = null; }
  if (mv.sp === "promo" || mv.sp === "promo-cap") b[mv.tr][mv.tc] = piece[0] + "q";
}

function legalMovesFor(r, c){
  const piece = board[r][c];
  if (!piece || piece[0] !== turn) return [];
  const color = turn, enemy = color === "w" ? "b" : "w";
  return genMoves(r,c).filter(mv => {
    const nb = cloneBoard(board);
    applyOnBoard(nb, mv);
    const k = findKing(nb, color);
    return k && !isAttacked(nb, k[0], k[1], enemy);
  });
}

function hasAnyLegalMove(){
  for (let r=0;r<8;r++) for (let c=0;c<8;c++)
    if (board[r][c] && board[r][c][0] === turn && legalMovesFor(r,c).length) return true;
  return false;
}

// SAN-style notation computed from the PRE-move position (call before mutating).
function moveToSAN(mv){
  if (mv.sp === "castleK") return "O-O";
  if (mv.sp === "castleQ") return "O-O-O";
  const piece = board[mv.fr][mv.fc];
  const color = piece[0], type = piece[1];
  const capture = !!board[mv.tr][mv.tc] || mv.sp === "ep";
  let s = "";
  if (type === "p"){
    if (capture) s += String.fromCharCode(97 + mv.fc) + "x";
    s += sqName(mv.tr, mv.tc);
    if (mv.sp === "promo" || mv.sp === "promo-cap") s += "=Q";
  } else {
    s += type.toUpperCase();
    // disambiguation among same-type pieces that can also reach the target
    const others = [];
    for (let r=0;r<8;r++) for (let c=0;c<8;c++){
      if (r === mv.fr && c === mv.fc) continue;
      if (board[r][c] === color + type &&
          legalMovesFor(r,c).some(m => m.tr === mv.tr && m.tc === mv.tc)) others.push([r,c]);
    }
    if (others.length){
      const sameFile = others.some(([rr,cc]) => cc === mv.fc);
      const sameRank = others.some(([rr,cc]) => rr === mv.fr);
      if (!sameFile) s += String.fromCharCode(97 + mv.fc);
      else if (!sameRank) s += String(8 - mv.fr);
      else s += String.fromCharCode(97 + mv.fc) + String(8 - mv.fr);
    }
    if (capture) s += "x";
    s += sqName(mv.tr, mv.tc);
  }
  return s;
}

function doMove(mv){
  const san = moveToSAN(mv);                 // capture notation before mutation
  const piece = board[mv.fr][mv.fc];
  const color = piece[0];
  let captured = board[mv.tr][mv.tc];

  if (mv.sp === "ep"){ captured = board[mv.fr][mv.tc]; board[mv.fr][mv.tc] = null; }
  board[mv.tr][mv.tc] = piece;
  board[mv.fr][mv.fc] = null;
  if (mv.sp === "promo" || mv.sp === "promo-cap") board[mv.tr][mv.tc] = color + "q";
  if (mv.sp === "castleK"){ board[mv.tr][5] = board[mv.tr][7]; board[mv.tr][7] = null; }
  if (mv.sp === "castleQ"){ board[mv.tr][3] = board[mv.tr][0]; board[mv.tr][0] = null; }

  if (captured){ (color === "w" ? capW : capB).push(captured); }

  // update castling rights
  if (piece[1] === "k"){
    if (color === "w"){ castleRights.wK = false; castleRights.wQ = false; }
    else { castleRights.bK = false; castleRights.bQ = false; }
  }
  if (mv.fr === 7 && mv.fc === 0) castleRights.wQ = false;
  if (mv.fr === 7 && mv.fc === 7) castleRights.wK = false;
  if (mv.fr === 0 && mv.fc === 0) castleRights.bQ = false;
  if (mv.fr === 0 && mv.fc === 7) castleRights.bK = false;
  if (mv.tr === 7 && mv.tc === 0) castleRights.wQ = false;
  if (mv.tr === 7 && mv.tc === 7) castleRights.wK = false;
  if (mv.tr === 0 && mv.tc === 0) castleRights.bQ = false;
  if (mv.tr === 0 && mv.tc === 7) castleRights.bK = false;

  // en passant target for next move
  enPassant = (mv.sp === "double") ? [(mv.fr + mv.tr) / 2, mv.fc] : null;

  lastMove = { fr: mv.fr, fc: mv.fc, tr: mv.tr, tc: mv.tc };
  turn = (turn === "w") ? "b" : "w";

  // check / checkmate / stalemate
  const checked = inCheck(board, turn);
  let suffix = "";
  checkSquare = null;
  if (!hasAnyLegalMove()){
    if (checked){ suffix = "#"; gameOver = true; status = (turn === "w" ? "Black" : "White") + " wins by checkmate"; }
    else { gameOver = true; status = "Draw — stalemate"; }
  } else if (checked){
    suffix = "+";
    checkSquare = findKing(board, turn);
    status = (turn === "w" ? "White" : "Black") + " is in check!";
  } else {
    status = "";
  }

  history.push({ san: san + suffix, color });
}

function selectSquare(r, c){
  selected = [r, c];
  validMoves = legalMovesFor(r, c);
  render();
}

function onSquareClick(r, c){
  if (gameOver) return;
  if (selected){
    const mv = validMoves.find(m => m.tr === r && m.tc === c);
    if (mv){
      doMove(mv);
      selected = null; validMoves = [];
      render();
      return;
    }
    if (board[r][c] && board[r][c][0] === turn){ selectSquare(r, c); return; }
    selected = null; validMoves = []; render(); return;
  }
  if (board[r][c] && board[r][c][0] === turn) selectSquare(r, c);
}

function render(){
  const boardEl = document.getElementById("board");
  boardEl.innerHTML = "";
  for (let r=0;r<8;r++) for (let c=0;c<8;c++){
    const sq = document.createElement("div");
    sq.className = "sq " + (((r + c) % 2 === 0) ? "light" : "dark");
    if (lastMove && ((lastMove.fr === r && lastMove.fc === c) || (lastMove.tr === r && lastMove.tc === c))) sq.classList.add("last");
    if (selected && selected[0] === r && selected[1] === c) sq.classList.add("sel");
    if (checkSquare && checkSquare[0] === r && checkSquare[1] === c) sq.classList.add("check");

    const movesHere = validMoves.filter(m => m.tr === r && m.tc === c);
    if (movesHere.length){
      const marker = document.createElement("div");
      const isCapture = !!board[r][c] || movesHere.some(m => m.sp === "ep");
      marker.className = "marker " + (isCapture ? "cap" : "dot");
      sq.appendChild(marker);
    }

    const p = board[r][c];
    if (p){
      const pe = document.createElement("div");
      pe.className = "pc " + (p[0] === "w" ? "white" : "black");
      pe.textContent = FILLED[p[1]];
      sq.appendChild(pe);
    }

    if (c === 0){ const n = document.createElement("span"); n.className = "rn"; n.textContent = 8 - r; sq.appendChild(n); }
    if (r === 7){ const n = document.createElement("span"); n.className = "fn"; n.textContent = String.fromCharCode(97 + c); sq.appendChild(n); }

    sq.addEventListener("click", () => onSquareClick(r, c));
    boardEl.appendChild(sq);
  }

  // turn indicator
  const turnEl = document.getElementById("turn");
  turnEl.className = "turn " + turn;
  turnEl.innerHTML = '<span class="doti"></span> ' + (gameOver ? "Game over" : (turn === "w" ? "White to move" : "Black to move"));

  document.getElementById("status").textContent = status || "";

  renderCaptured();
  renderHistory();
}

function renderCaptured(){
  const order = { q:5, r:4, b:3, n:2, p:1, k:6 };
  const sortFn = (a,b) => order[b[1]] - order[a[1]];
  const sum = arr => arr.reduce((s,p) => s + VALUE[p[1]], 0);
  const wTotal = sum(capW), bTotal = sum(capB);

  document.getElementById("capW").innerHTML =
    capW.slice().sort(sortFn).map(p => '<span class="pc-i black">' + FILLED[p[1]] + "</span>").join("");
  document.getElementById("capB").innerHTML =
    capB.slice().sort(sortFn).map(p => '<span class="pc-i white">' + FILLED[p[1]] + "</span>").join("");

  const diff = wTotal - bTotal;
  document.getElementById("advW").textContent = diff > 0 ? "+" + diff : "";
  document.getElementById("advB").textContent = diff < 0 ? "+" + (-diff) : "";
}

function renderHistory(){
  const rows = [];
  for (const mv of history){
    if (mv.color === "w") rows.push({ n: rows.length + 1, w: mv.san, b: "" });
    else {
      if (rows.length && rows[rows.length-1].b === "") rows[rows.length-1].b = mv.san;
      else rows.push({ n: rows.length + 1, w: "...", b: mv.san });
    }
  }
  const lastIdx = history.length - 1;
  const html = rows.map((row, i) => {
    const wLast = (i*2) === lastIdx;
    const bLast = (i*2 + 1) === lastIdx;
    return '<div class="row">' +
      '<span class="num">' + row.n + '.</span>' +
      '<span class="mv' + (wLast ? " last" : "") + '">' + row.w + '</span>' +
      '<span class="mv' + (bLast ? " last" : "") + '">' + row.b + '</span>' +
    '</div>';
  }).join("");
  const el = document.getElementById("history");
  el.innerHTML = html || '<div class="num" style="padding:4px;">No moves yet.</div>';
  el.scrollTop = el.scrollHeight;
}

document.getElementById("newgame").addEventListener("click", init);
init();
</script>
