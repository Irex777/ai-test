<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .board-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .turn-indicator {
            font-size: 1.2rem;
            padding: 10px 25px;
            border-radius: 25px;
            background: #16213e;
            border: 2px solid #0f3460;
            transition: all 0.3s;
        }

        .turn-indicator.white {
            border-color: #667eea;
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.5);
        }

        .turn-indicator.black {
            border-color: #764ba2;
            box-shadow: 0 0 15px rgba(118, 75, 162, 0.5);
        }

        .check-indicator {
            display: none;
            font-size: 1rem;
            padding: 8px 20px;
            border-radius: 20px;
            background: #e94560;
            color: white;
            font-weight: bold;
            animation: pulse 1s infinite;
        }

        .check-indicator.active {
            display: inline-block;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .chess-board {
            display: grid;
            grid-template-columns: repeat(8, 60px);
            grid-template-rows: repeat(8, 60px);
            border: 4px solid #0f3460;
            border-radius: 4px;
            overflow: hidden;
        }

        .square {
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
            position: relative;
        }

        .square.light {
            background: #e8e8e8;
            color: #1a1a2e;
        }

        .square.dark {
            background: #4a4a6a;
            color: #1a1a2e;
        }

        .square.selected {
            background: #ffd700 !important;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
        }

        .square.valid-move {
            position: relative;
        }

        .square.valid-move::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(100, 200, 100, 0.7);
            border-radius: 50%;
        }

        .square.valid-move.has-piece::after {
            width: 100%;
            height: 100%;
            background: rgba(255, 100, 100, 0.4);
            border-radius: 0;
        }

        .square.check {
            background: #e94560 !important;
        }

        .square:hover {
            opacity: 0.9;
        }

        .piece {
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }

        .piece:hover {
            transform: scale(1.1);
        }

        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 250px;
        }

        .panel {
            background: #16213e;
            border-radius: 10px;
            padding: 15px;
            border: 2px solid #0f3460;
        }

        .panel h3 {
            font-size: 1rem;
            margin-bottom: 10px;
            color: #667eea;
            border-bottom: 1px solid #0f3460;
            padding-bottom: 8px;
        }

        .captured-pieces {
            min-height: 40px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            font-size: 24px;
        }

        .captured-pieces.white-pieces {
            color: #fff;
            text-shadow: 1px 1px 2px #000;
        }

        .captured-pieces.black-pieces {
            color: #000;
            text-shadow: 1px 1px 2px #fff;
        }

        .move-history {
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .move-history::-webkit-scrollbar {
            width: 6px;
        }

        .move-history::-webkit-scrollbar-track {
            background: #0f3460;
            border-radius: 3px;
        }

        .move-history::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 3px;
        }

        .move-entry {
            padding: 4px 8px;
            border-radius: 4px;
            margin-bottom: 2px;
        }

        .move-entry:nth-child(odd) {
            background: rgba(102, 126, 234, 0.1);
        }

        .btn {
            padding: 12px 30px;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-new-game {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-new-game:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-new-game:active {
            transform: translateY(0);
        }

        .game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .game-over-overlay.active {
            display: flex;
        }

        .game-over-message {
            background: #16213e;
            padding: 40px 60px;
            border-radius: 20px;
            text-align: center;
            border: 3px solid #667eea;
            animation: fadeIn 0.3s;
        }

        .game-over-message h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #667eea;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .coordinates {
            font-size: 10px;
            position: absolute;
            color: #666;
        }

        .square .coord-rank {
            position: absolute;
            left: 2px;
            top: 2px;
            font-size: 10px;
            color: inherit;
            opacity: 0.5;
        }

        .square .coord-file {
            position: absolute;
            right: 2px;
            bottom: 2px;
            font-size: 10px;
            color: inherit;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="board-section">
            <h1>♔ Chess ♚</h1>
            <div class="turn-indicator white">White's Turn</div>
            <span class="check-indicator" id="checkIndicator">CHECK!</span>
            <div class="chess-board" id="chessBoard"></div>
            <button class="btn btn-new-game" onclick="newGame()">New Game</button>
        </div>
        <div class="info-panel">
            <div class="panel">
                <h3>Black's Captures</h3>
                <div class="captured-pieces white-pieces" id="capturedWhite"></div>
            </div>
            <div class="panel">
                <h3>White's Captures</h3>
                <div class="captured-pieces black-pieces" id="capturedBlack"></div>
            </div>
            <div class="panel">
                <h3>Move History</h3>
                <div class="move-history" id="moveHistory"></div>
            </div>
        </div>
    </div>
    <div class="game-over-overlay" id="gameOverOverlay">
        <div class="game-over-message">
            <h2 id="gameOverText">Checkmate!</h2>
            <button class="btn btn-new-game" onclick="newGame()">Play Again</button>
        </div>
    </div>

    <script>
        const PIECES = {
            WHITE_KING: '♔', WHITE_QUEEN: '♕', WHITE_ROOK: '♖',
            WHITE_BISHOP: '♗', WHITE_KNIGHT: '♘', WHITE_PAWN: '♙',
            BLACK_KING: '♚', BLACK_QUEEN: '♛', BLACK_ROOK: '♜',
            BLACK_BISHOP: '♝', BLACK_KNIGHT: '♞', BLACK_PAWN: '♟'
        };

        const FILES = 'abcdefgh';
        const RANKS = '87654321';

        let board = [];
        let selectedSquare = null;
        let currentTurn = 'white';
        let capturedByWhite = [];
        let capturedByBlack = [];
        let moveHistory = [];
        let gameOver = false;
        let whiteKingMoved = false;
        let blackKingMoved = false;
        let whiteRookAMoved = false;
        let whiteRookHMoved = false;
        let blackRookAMoved = false;
        let blackRookHMoved = false;

        function initBoard() {
            board = [
                ['♜','♞','♝','♛','♚','♝','♞','♜'],
                ['♟','♟','♟','♟','♟','♟','♟','♟'],
                ['','','','','','','',''],
                ['','','','','','','',''],
                ['','','','','','','',''],
                ['','','','','','','',''],
                ['♙','♙','♙','♙','♙','♙','♙','♙'],
                ['♖','♘','♗','♕','♔','♗','♘','♖']
            ];
        }

        function getPieceColor(piece) {
            if (!piece) return null;
            return '♔♕♖♗♘♙'.includes(piece) ? 'white' : 'black';
        }

        function isEnemyPiece(piece, turn) {
            if (!piece) return false;
            return getPieceColor(piece) !== turn;
        }

        function isOwnPiece(piece, turn) {
            if (!piece) return false;
            return getPieceColor(piece) === turn;
        }

        function getValidMoves(row, col) {
            const piece = board[row][col];
            if (!piece) return [];
            
            const color = getPieceColor(piece);
            const moves = [];
            
            const pawnWhite = piece === '♙';
            const pawnBlack = piece === '♟';
            const rook = piece === '♖' || piece === '♜';
            const knight = piece === '♘' || piece === '♞';
            const bishop = piece === '♗' || piece === '♝';
            const queen = piece === '♕' || piece === '♛';
            const king = piece === '♔' || piece === '♚';

            // Pawn moves
            if (pawnWhite || pawnBlack) {
                const dir = pawnWhite ? -1 : 1;
                const startRow = pawnWhite ? 6 : 1;
                
                // Forward move
                if (board[row + dir] && !board[row + dir][col]) {
                    moves.push([row + dir, col]);
                    // Double move from start
                    if (row === startRow && !board[row + 2 * dir][col]) {
                        moves.push([row + 2 * dir, col]);
                    }
                }
                // Captures
                if (board[row + dir]) {
                    if (col > 0 && isEnemyPiece(board[row + dir][col - 1], color)) {
                        moves.push([row + dir, col - 1]);
                    }
                    if (col < 7 && isEnemyPiece(board[row + dir][col + 1], color)) {
                        moves.push([row + dir, col + 1]);
                    }
                }
            }

            // Rook moves
            if (rook || queen) {
                const directions = [[0,1],[0,-1],[1,0],[-1,0]];
                for (const [dr, dc] of directions) {
                    for (let i = 1; i < 8; i++) {
                        const nr = row + dr * i;
                        const nc = col + dc * i;
                        if (nr < 0 || nr > 7 || nc < 0 || nc > 7) break;
                        if (!board[nr][nc]) {
                            moves.push([nr, nc]);
                        } else if (isEnemyPiece(board[nr][nc], color)) {
                            moves.push([nr, nc]);
                            break;
                        } else {
                            break;
                        }
                    }
                }
            }

            // Bishop moves
            if (bishop || queen) {
                const directions = [[1,1],[1,-1],[-1,1],[-1,-1]];
                for (const [dr, dc] of directions) {
                    for (let i = 1; i < 8; i++) {
                        const nr = row + dr * i;
                        const nc = col + dc * i;
                        if (nr < 0 || nr > 7 || nc < 0 || nc > 7) break;
                        if (!board[nr][nc]) {
                            moves.push([nr, nc]);
                        } else if (isEnemyPiece(board[nr][nc], color)) {
                            moves.push([nr, nc]);
                            break;
                        } else {
                            break;
                        }
                    }
                }
            }

            // Knight moves
            if (knight) {
                const offsets = [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]];
                for (const [dr, dc] of offsets) {
                    const nr = row + dr;
                    const nc = col + dc;
                    if (nr >= 0 && nr <= 7 && nc >= 0 && nc <= 7) {
                        if (!board[nr][nc] || isEnemyPiece(board[nr][nc], color)) {
                            moves.push([nr, nc]);
                        }
                    }
                }
            }

            // King moves
            if (king) {
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        if (dr === 0 && dc === 0) continue;
                        const nr = row + dr;
                        const nc = col + dc;
                        if (nr >= 0 && nr <= 7 && nc >= 0 && nc <= 7) {
                            if (!board[nr][nc] || isEnemyPiece(board[nr][nc], color)) {
                                moves.push([nr, nc]);
                            }
                        }
                    }
                }
            }

            // Filter out moves that would put own king in check
            return moves.filter(([nr, nc]) => !wouldBeInCheck(row, col, nr, nc, color));
        }

        function findKing(color) {
            const king = color === 'white' ? '♔' : '♚';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (board[r][c] === king) return [r, c];
                }
            }
            return null;
        }

        function isSquareAttacked(row, col, byColor) {
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (isOwnPiece(board[r][c], byColor)) {
                        const piece = board[r][c];
                        const color = getPieceColor(piece);
                        
                        // Check pawn attacks
                        const pawnWhite = piece === '♙';
                        const pawnBlack = piece === '♟';
                        if (pawnWhite || pawnBlack) {
                            const dir = pawnWhite ? -1 : 1;
                            if (r + dir === row && (c - 1 === col || c + 1 === col)) {
                                return true;
                            }
                        }
                        
                        // Check knight attacks
                        const knight = piece === '♘' || piece === '♞';
                        if (knight) {
                            const dr = Math.abs(r - row);
                            const dc = Math.abs(c - col);
                            if ((dr === 2 && dc === 1) || (dr === 1 && dc === 2)) {
                                return true;
                            }
                        }
                        
                        // Check king attacks
                        const king = piece === '♔' || piece === '♚';
                        if (king) {
                            if (Math.abs(r - row) <= 1 && Math.abs(c - col) <= 1) {
                                return true;
                            }
                        }
                        
                        // Check rook/queen attacks (straight lines)
                        const rook = piece === '♖' || piece === '♜';
                        const queen = piece === '♕' || piece === '♛';
                        if (rook || queen) {
                            if (r === row || c === col) {
                                let blocked = false;
                                const dr = row === r ? 0 : row > r ? 1 : -1;
                                const dc = col === c ? 0 : col > c ? 1 : -1;
                                let cr = r + dr, cc = c + dc;
                                while (cr !== row || cc !== col) {
                                    if (board[cr][cc]) { blocked = true; break; }
                                    cr += dr; cc += dc;
                                }
                                if (!blocked) return true;
                            }
                        }
                        
                        // Check bishop/queen attacks (diagonals)
                        const bishop = piece === '♗' || piece === '♝';
                        if (bishop || queen) {
                            if (Math.abs(r - row) === Math.abs(c - col)) {
                                let blocked = false;
                                const dr = row > r ? 1 : -1;
                                const dc = col > c ? 1 : -1;
                                let cr = r + dr, cc = c + dc;
                                while (cr !== row || cc !== col) {
                                    if (board[cr][cc]) { blocked = true; break; }
                                    cr += dr; cc += dc;
                                }
                                if (!blocked) return true;
                            }
                        }
                    }
                }
            }
            return false;
        }

        function isInCheck(color) {
            const kingPos = findKing(color);
            if (!kingPos) return false;
            const enemyColor = color === 'white' ? 'black' : 'white';
            return isSquareAttacked(kingPos[0], kingPos[1], enemyColor);
        }

        function wouldBeInCheck(fromRow, fromCol, toRow, toCol, color) {
            // Simulate the move
            const originalPiece = board[toRow][toCol];
            const movingPiece = board[fromRow][fromCol];
            
            board[toRow][toCol] = movingPiece;
            board[fromRow][fromCol] = '';
            
            const inCheck = isInCheck(color);
            
            // Restore
            board[fromRow][fromCol] = movingPiece;
            board[toRow][toCol] = originalPiece;
            
            return inCheck;
        }

        function hasValidMoves(color) {
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (isOwnPiece(board[r][c], color)) {
                        if (getValidMoves(r, c).length > 0) return true;
                    }
                }
            }
            return false;
        }

        function getMoveNotation(fromRow, fromCol, toRow, toCol, piece, captured) {
            const pieceSymbols = { '♔': 'K', '♚': 'K', '♕': 'Q', '♛': 'Q', '♖': 'R', '♜': 'R', '♗': 'B', '♝': 'B', '♘': 'N', '♞': 'N', '♙': '', '♟': '' };
            const pieceLetter = pieceSymbols[piece];
            const capture = captured ? 'x' : '';
            const toSquare = FILES[toCol] + RANKS[toRow];
            return (pieceLetter || '') + capture + toSquare;
        }

        function handleSquareClick(row, col) {
            if (gameOver) return;
            
            const piece = board[row][col];
            
            if (selectedSquare) {
                const [selRow, selCol] = selectedSquare;
                const validMoves = getValidMoves(selRow, selCol);
                
                const isValidMove = validMoves.some(([r, c]) => r === row && c === col);
                
                if (isValidMove) {
                    // Make the move
                    const movingPiece = board[selRow][selCol];
                    const capturedPiece = board[row][col];
                    
                    // Handle capture
                    if (capturedPiece) {
                        if (currentTurn === 'white') {
                            capturedByWhite.push(capturedPiece);
                        } else {
                            capturedByBlack.push(capturedPiece);
                        }
                    }
                    
                    // Pawn promotion
                    if ((movingPiece === '♙' && row === 0) || (movingPiece === '♟' && row === 7)) {
                        board[row][col] = currentTurn === 'white' ? '♕' : '♛';
                    } else {
                        board[row][col] = movingPiece;
                    }
                    board[selRow][selCol] = '';
                    
                    // Track king/rook movement for castling
                    if (movingPiece === '♔') whiteKingMoved = true;
                    if (movingPiece === '♚') blackKingMoved = true;
                    if (movingPiece === '♖' && selCol === 0) whiteRookAMoved = true;
                    if (movingPiece === '♖' && selCol === 7) whiteRookHMoved = true;
                    if (movingPiece === '♜' && selCol === 0) blackRookAMoved = true;
                    if (movingPiece === '♜' && selCol === 7) blackRookHMoved = true;
                    
                    // Record move
                    const notation = getMoveNotation(selRow, selCol, row, col, movingPiece, !!capturedPiece);
                    moveHistory.push(notation);
                    
                    // Switch turn
                    currentTurn = currentTurn === 'white' ? 'black' : 'white';
                    
                    // Check for checkmate or stalemate
                    if (!hasValidMoves(currentTurn)) {
                        gameOver = true;
                        const overlay = document.getElementById('gameOverOverlay');
                        const text = document.getElementById('gameOverText');
                        if (isInCheck(currentTurn)) {
                            const winner = currentTurn === 'white' ? 'Black' : 'White';
                            text.textContent = `Checkmate! ${winner} wins!`;
                        } else {
                            text.textContent = 'Stalemate! Draw!';
                        }
                        overlay.classList.add('active');
                    }
                    
                    selectedSquare = null;
                    renderBoard();
                    updateUI();
                } else if (isOwnPiece(piece, currentTurn)) {
                    // Select different piece
                    selectedSquare = [row, col];
                    renderBoard();
                } else {
                    // Deselect
                    selectedSquare = null;
                    renderBoard();
                }
            } else if (isOwnPiece(piece, currentTurn)) {
                // Select piece
                selectedSquare = [row, col];
                renderBoard();
            }
        }

        function renderBoard() {
            const boardEl = document.getElementById('chessBoard');
            boardEl.innerHTML = '';
            
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const square = document.createElement('div');
                    const isLight = (row + col) % 2 === 0;
                    square.className = `square ${isLight ? 'light' : 'dark'}`;
                    
                    // Add coordinates
                    if (col === 0) {
                        const rank = document.createElement('span');
                        rank.className = 'coord-rank';
                        rank.textContent = RANKS[row];
                        square.appendChild(rank);
                    }
                    if (row === 7) {
                        const file = document.createElement('span');
                        file.className = 'coord-file';
                        file.textContent = FILES[col];
                        square.appendChild(file);
                    }
                    
                    // Highlight selected
                    if (selectedSquare && selectedSquare[0] === row && selectedSquare[1] === col) {
                        square.classList.add('selected');
                    }
                    
                    // Highlight valid moves
                    if (selectedSquare) {
                        const validMoves = getValidMoves(selectedSquare[0], selectedSquare[1]);
                        const isValid = validMoves.some(([r, c]) => r === row && c === col);
                        if (isValid) {
                            square.classList.add('valid-move');
                            if (board[row][col]) square.classList.add('has-piece');
                        }
                    }
                    
                    // Highlight king in check
                    const piece = board[row][col];
                    if (piece && (piece === '♔' || piece === '♚')) {
                        const color = getPieceColor(piece);
                        if (isInCheck(color) && color === currentTurn) {
                            square.classList.add('check');
                        }
                    }
                    
                    // Add piece
                    if (piece) {
                        const pieceEl = document.createElement('span');
                        pieceEl.className = 'piece';
                        pieceEl.textContent = piece;
                        square.appendChild(pieceEl);
                    }
                    
                    square.addEventListener('click', () => handleSquareClick(row, col));
                    boardEl.appendChild(square);
                }
            }
        }

        function updateUI() {
            // Turn indicator
            const turnIndicator = document.querySelector('.turn-indicator');
            turnIndicator.textContent = `${currentTurn === 'white' ? 'White' : 'Black'}'s Turn`;
            turnIndicator.className = `turn-indicator ${currentTurn}`;
            
            // Check indicator
            const checkIndicator = document.getElementById('checkIndicator');
            if (isInCheck(currentTurn) && !gameOver) {
                checkIndicator.classList.add('active');
            } else {
                checkIndicator.classList.remove('active');
            }
            
            // Captured pieces
            document.getElementById('capturedWhite').textContent = capturedByWhite.join('');
            document.getElementById('capturedBlack').textContent = capturedByBlack.join('');
            
            // Move history
            const historyEl = document.getElementById('moveHistory');
            historyEl.innerHTML = moveHistory.map((move, i) => 
                `<div class="move-entry">${Math.floor(i/2) + 1}${i % 2 === 0 ? '.' : '...'} ${move}</div>`
            ).join('');
            historyEl.scrollTop = historyEl.scrollHeight;
        }

        function newGame() {
            initBoard();
            selectedSquare = null;
            currentTurn = 'white';
            capturedByWhite = [];
            capturedByBlack = [];
            moveHistory = [];
            gameOver = false;
            whiteKingMoved = false;
            blackKingMoved = false;
            whiteRookAMoved = false;
            whiteRookHMoved = false;
            blackRookAMoved = false;
            blackRookHMoved = false;
            
            document.getElementById('gameOverOverlay').classList.remove('active');
            
            renderBoard();
            updateUI();
        }

        // Initialize game
        newGame();
    </script>
</body>
