<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess — Strategic Duel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0a0d16;
  --bg-mid: #131826;
  --bg-card: #1a2032;
  --border: #2a3245;
  --border-soft: #1f2538;
  --fg: #ece6d2;
  --fg-muted: #7a8094;
  --accent: #d4a44c;
  --accent-bright: #f0c060;
  --accent-dim: rgba(212, 164, 76, 0.12);
  --light-sq: #e8d2a4;
  --dark-sq: #3d5b50;
  --check: #e84850;
  --selected: rgba(240, 192, 96, 0.55);
  --last-move: rgba(212, 164, 76, 0.32);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg-deep);
  color: var(--fg);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  animation: pageLoad 0.7s ease-out;
}

@keyframes pageLoad { from { opacity: 0; } to { opacity: 1; } }

body::before {
  content: '';
  position: fixed; inset: 0;
  background: 
    radial-gradient(ellipse 60% 50% at 15% 0%, rgba(212, 164, 76, 0.09), transparent),
    radial-gradient(ellipse 70% 60% at 85% 100%, rgba(61, 91, 80, 0.22), transparent),
    radial-gradient(ellipse 100% 80% at 50% 50%, rgba(15, 22, 40, 0.5), transparent);
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: 
    repeating-linear-gradient(45deg, transparent 0, transparent 90px, rgba(212, 164, 76, 0.018) 90px, rgba(212, 164, 76, 0.018) 91px),
    repeating-linear-gradient(-45deg, transparent 0, transparent 90px, rgba(212, 164, 76, 0.018) 90px, rgba(212, 164, 76, 0.018) 91px);
  pointer-events: none;
  z-index: 0;
}

.app {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  padding: 24px;
  display: flex;
  flex-direction: column;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 24px 22px;
  margin-bottom: 24px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  gap: 16px;
}

.brand { display: flex; align-items: baseline; gap: 16px; }

.brand h1 {
  font-family: 'Cinzel', serif;
  font-size: 38px;
  font-weight: 800;
  letter-spacing: 0.22em;
  color: var(--fg);
  line-height: 1;
}

.brand h1 .dot { color: var(--accent); }

.brand .sub {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 0.4em;
  color: var(--accent);
  font-weight: 500;
  opacity: 0.85;
}

.controls { display: flex; gap: 12px; }

.btn {
  background: transparent;
  color: var(--fg);
  border: 1px solid var(--accent);
  padding: 11px 22px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.btn::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
  transition: left 0.55s;
}

.btn:hover::before { left: 100%; }
.btn:hover {
  background: var(--accent);
  color: var(--bg-deep);
  box-shadow: 0 0 26px rgba(212, 164, 76, 0.4);
}

.btn:disabled {
  border-color: var(--border);
  color: var(--fg-muted);
  cursor: not-allowed;
  opacity: 0.5;
}
.btn:disabled:hover { background: transparent; box-shadow: none; }
.btn:disabled::before { display: none; }

.btn-secondary {
  border-color: var(--border);
  color: var(--fg-muted);
}
.btn-secondary:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: transparent;
  box-shadow: 0 0 16px rgba(212, 164, 76, 0.22);
}

.main {
  flex: 1;
  display: grid;
  grid-template-columns: 280px 1fr 300px;
  gap: 24px;
  max-width: 1400px;
  margin: 0 auto;
  width: 100%;
}

.panel {
  background: linear-gradient(160deg, var(--bg-card) 0%, var(--bg-mid) 100%);
  border: 1px solid var(--border);
  padding: 22px;
  position: relative;
  animation: panelIn 0.65s ease-out;
}

@keyframes panelIn {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}

.panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0.55;
}

.panel-title {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 0.3em;
  color: var(--accent);
  margin-bottom: 18px;
  text-transform: uppercase;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 10px;
}

.panel-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--accent-dim), transparent);
}

.turn-card {
  text-align: center;
  padding: 22px 16px 22px;
  margin-bottom: 22px;
  background: rgba(0,0,0,0.22);
  border: 1px solid var(--border);
  position: relative;
  transition: all 0.45s;
}

.turn-card.white-turn { border-color: rgba(245, 240, 224, 0.32); box-shadow: 0 0 30px rgba(245, 240, 224, 0.06); }
.turn-card.black-turn { border-color: rgba(212, 164, 76, 0.45); box-shadow: 0 0 30px rgba(212, 164, 76, 0.1); }

.turn-label {
  font-size: 9px;
  letter-spacing: 0.4em;
  color: var(--fg-muted);
  text-transform: uppercase;
  margin-bottom: 14px;
  font-weight: 700;
}

.turn-piece-display {
  font-size: 66px;
  line-height: 1;
  margin-bottom: 6px;
  display: inline-block;
  transition: all 0.4s;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
}

.turn-card.white-turn .turn-piece-display { color: #f8f3e0; }
.turn-card.black-turn .turn-piece-display {
  color: #1a1a1a;
  text-shadow: 0 0 18px rgba(212, 164, 76, 0.55);
}

.turn-name {
  font-family: 'Cinzel', serif;
  font-size: 22px;
  letter-spacing: 0.22em;
  font-weight: 700;
  color: var(--fg);
}

.status-msg {
  margin-top: 10px;
  font-size: 10px;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  font-weight: 700;
  min-height: 14px;
  color: var(--check);
}

.status-msg.check {
  animation: pulseCheck 1.1s ease-in-out infinite;
}

@keyframes pulseCheck {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.55; transform: scale(0.97); }
}

.status-msg.win { color: var(--accent-bright); }

.captured-section { margin-bottom: 18px; }

.captured-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 9px;
  letter-spacing: 0.28em;
  color: var(--fg-muted);
  margin-bottom: 8px;
  text-transform: uppercase;
  font-weight: 700;
}

.material-adv {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--accent-bright);
  font-weight: 700;
  letter-spacing: 0;
}

.captured-row {
  min-height: 42px;
  padding: 8px 12px;
  background: rgba(0,0,0,0.28);
  border: 1px solid var(--border-soft);
  display: flex;
  flex-wrap: wrap;
  gap: 0;
  align-items: center;
  font-size: 22px;
  line-height: 1;
}

.captured-row:empty::before {
  content: '—';
  color: var(--fg-muted);
  font-size: 14px;
  opacity: 0.4;
  font-family: 'JetBrains Mono', monospace;
}

.captured-row.white-cap span { color: #f8f3e0; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
.captured-row.black-cap span { color: #1a1a1a; text-shadow: 0 0 6px rgba(212, 164, 76, 0.4); }

.captured-row span {
  margin-right: -4px;
  transition: transform 0.2s;
}

.captured-row span:hover { transform: translateY(-2px); }

.board-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding-top: 4px;
}

.board-frame {
  position: relative;
  padding: 30px;
  background: linear-gradient(135deg, #1f2638 0%, #0d111c 100%);
  border: 1px solid rgba(212, 164, 76, 0.42);
  box-shadow: 
    0 0 90px rgba(212, 164, 76, 0.13),
    0 24px 60px rgba(0,0,0,0.65),
    inset 0 0 36px rgba(0,0,0,0.5);
}

.board-frame::before {
  content: '';
  position: absolute;
  inset: 14px;
  border: 1px solid rgba(212, 164, 76, 0.28);
  pointer-events: none;
}

.board-frame::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at top left, rgba(212, 164, 76, 0.06), transparent 55%);
  pointer-events: none;
}

.coords {
  position: absolute;
  display: flex;
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--accent);
  font-weight: 600;
  opacity: 0.9;
  pointer-events: none;
}

.coords-row {
  left: 30px; right: 30px;
  height: 16px;
  justify-content: space-around;
  align-items: center;
}
.coords-row.top { top: 7px; }
.coords-row.bottom { bottom: 7px; }

.coords-col {
  top: 30px; bottom: 30px;
  width: 16px;
  flex-direction: column;
  justify-content: space-around;
  align-items: center;
}
.coords-col.left { left: 7px; }
.coords-col.right { right: 7px; }

.board {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  grid-template-rows: repeat(8, 1fr);
  width: min(68vh, 560px);
  height: min(68vh, 560px);
  position: relative;
  box-shadow: 0 0 0 1px rgba(212, 164, 76, 0.65);
}

.square {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background 0.2s;
  user-select: none;
}

.square.light { background: var(--light-sq); }
.square.dark { background: var(--dark-sq); }

.square .piece {
  font-size: calc(min(68vh, 560px) / 8 * 0.82);
  line-height: 1;
  transition: transform 0.18s ease;
  position: relative;
  z-index: 2;
  pointer-events: none;
}

.square.white-piece .piece { 
  color: #f8f3e0; 
  text-shadow: 0 1px 2px rgba(0,0,0,0.45), 0 0 1px rgba(0,0,0,0.7);
}
.square.black-piece .piece { 
  color: #1a1a1a; 
  text-shadow: 0 0 6px rgba(212, 164, 76, 0.55), 0 1px 2px rgba(0,0,0,0.4);
}

.square:hover .piece { transform: scale(1.07); }

.square.selected {
  background: var(--selected) !important;
  box-shadow: inset 0 0 26px rgba(240, 192, 96, 0.5);
}

.square.last-move-from, .square.last-move-to {
  background: var(--last-move) !important;
  box-shadow: inset 0 0 0 1px rgba(212, 164, 76, 0.45);
}

.square.valid-move::before {
  content: '';
  position: absolute;
  width: 28%;
  height: 28%;
  background: radial-gradient(circle, var(--accent-bright) 0%, var(--accent) 65%, transparent 100%);
  border-radius: 50%;
  pointer-events: none;
  opacity: 0.65;
  animation: dotPulse 1.7s ease-in-out infinite;
}

.square.valid-capture::before {
  content: '';
  position: absolute;
  width: 88%;
  height: 88%;
  border: 4px solid var(--accent-bright);
  border-radius: 50%;
  pointer-events: none;
  opacity: 0.75;
  animation: dotPulse 1.7s ease-in-out infinite;
}

@keyframes dotPulse {
  0%, 100% { opacity: 0.5; transform: scale(1); }
  50% { opacity: 0.9; transform: scale(1.06); }
}

.square.in-check {
  background: radial-gradient(circle, rgba(232, 72, 80, 0.7) 0%, rgba(232, 72, 80, 0.3) 60%, transparent 100%) !important;
  animation: checkPulse 1s ease-in-out infinite;
}

@keyframes checkPulse {
  0%, 100% { box-shadow: inset 0 0 22px rgba(232, 72, 80, 0.55); }
  50% { box-shadow: inset 0 0 42px rgba(232, 72, 80, 0.85); }
}

.square.placing { animation: piecePlace 0.3s ease-out; }
@keyframes piecePlace {
  from { transform: scale(0.85); opacity: 0.4; }
  to { transform: scale(1); opacity: 1; }
}

.move-history {
  display: flex;
  flex-direction: column;
  height: 100%;
  max-height: 720px;
}

.move-list {
  flex: 1;
  overflow-y: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  padding-right: 4px;
}

.move-list::-webkit-scrollbar { width: 6px; }
.move-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
.move-list::-webkit-scrollbar-thumb { background: var(--accent-dim); border-radius: 3px; }
.move-list::-webkit-scrollbar-thumb:hover { background: var(--accent); }

.move-row {
  display: grid;
  grid-template-columns: 36px 1fr 1fr;
  gap: 4px;
  padding: 7px 8px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  align-items: center;
  animation: rowIn 0.3s ease-out;
}

@keyframes rowIn {
  from { opacity: 0; transform: translateX(-6px); }
  to { opacity: 1; transform: translateX(0); }
}

.move-row:nth-child(odd) { background: rgba(255,255,255,0.02); }

.move-num { color: var(--fg-muted); font-weight: 600; font-size: 12px; }

.move-cell {
  color: var(--fg);
  padding: 2px 6px;
  border-radius: 3px;
  transition: all 0.2s;
  font-weight: 500;
}

.move-cell.recent {
  background: var(--accent);
  color: var(--bg-deep);
  font-weight: 700;
  box-shadow: 0 0 14px rgba(212, 164, 76, 0.45);
}

.move-empty {
  padding: 32px 8px;
  text-align: center;
  color: var(--fg-muted);
  font-size: 12px;
  letter-spacing: 0.18em;
  font-style: italic;
  font-family: 'Space Grotesk', sans-serif;
}

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.78);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
  animation: overlayIn 0.3s ease-out;
}
.modal-overlay.show { display: flex; }

@keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: linear-gradient(160deg, var(--bg-card) 0%, var(--bg-mid) 100%);
  border: 1px solid var(--accent);
  padding: 36px 44px;
  text-align: center;
  box-shadow: 0 0 80px rgba(212, 164, 76, 0.28), 0 30px 80px rgba(0,0,0,0.75);
  animation: modalIn 0.45s cubic-bezier(0.2, 0.9, 0.3, 1.2);
  position: relative;
  min-width: 320px;
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.85); }
  to { opacity: 1; transform: scale(1); }
}

.modal::before {
  content: '';
  position: absolute;
  inset: 8px;
  border: 1px solid rgba(212, 164, 76, 0.3);
  pointer-events: none;
}

.modal h3 {
  font-family: 'Cinzel', serif;
  font-size: 14px;
  letter-spacing: 0.32em;
  margin-bottom: 22px;
  color: var(--accent);
  font-weight: 700;
  text-transform: uppercase;
}

.promo-pieces { display: flex; gap: 10px; justify-content: center; }

.promo-piece {
  font-size: 52px;
  width: 76px;
  height: 76px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.32);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.25s;
}

.promo-piece:hover {
  border-color: var(--accent);
  background: var(--accent-dim);
  transform: translateY(-4px) scale(1.05);
  box-shadow: 0 8px 22px rgba(212, 164, 76, 0.32);
}

.promo-piece.white { color: #f8f3e0; text-shadow: 0 2px 4px rgba(0,0,0,0.55); }
.promo-piece.black { color: #1a1a1a; text-shadow: 0 0 8px rgba(212, 164, 76, 0.55); }

.game-over .result-icon {
  font-size: 60px;
  margin-bottom: 14px;
  line-height: 1;
  display: inline-block;
}

.game-over .result-icon.white { color: #f8f3e0; text-shadow: 0 4px 12px rgba(0,0,0,0.5); }
.game-over .result-icon.black { color: #1a1a1a; text-shadow: 0 0 14px rgba(212, 164, 76, 0.55); }

.game-over .result {
  font-family: 'Cinzel', serif;
  font-size: 32px;
  letter-spacing: 0.18em;
  margin-bottom: 8px;
  color: var(--fg);
  font-weight: 700;
}

.game-over .detail {
  font-size: 11px;
  letter-spacing: 0.32em;
  color: var(--accent);
  margin-bottom: 28px;
  text-transform: uppercase;
  font-weight: 700;
}

@media (max-width: 1100px) {
  .main { grid-template-columns: 1fr; max-width: 600px; }
  .move-history { max-height: 280px; }
  .turn-card { padding: 16px; }
  .turn-piece-display { font-size: 50px; }
  .panel { padding: 18px; }
}

@media (max-width: 640px) {
  .app { padding: 12px; }
  .header { padding: 4px 8px 16px; }
  .brand h1 { font-size: 26px; }
  .brand .sub { display: none; }
  .board-frame { padding: 22px; }
  .coords-row { left: 22px; right: 22px; }
  .coords-col { top: 22px; bottom: 22px; }
  .board { width: min(92vw, 480px); height: min(92vw, 480px); }
  .square .piece { font-size: calc(min(92vw, 480px) / 8 * 0.82); }
  .btn { padding: 9px 16px; font-size: 10px; letter-spacing: 0.18em; }
  .panel { padding: 14px; }
}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="brand">
      <h1>CHESS<span class="dot">.</span></h1>
      <span class="sub">STRATEGIC DUEL</span>
    </div>
    <div class="controls">
      <button class="btn btn-secondary" id="undoBtn">Undo</button>
      <button class="btn" id="newGameBtn">New Game</button>
    </div>
  </header>
  
  <div class="main">
    <aside class="panel">
      <div class="turn-card white-turn" id="turnCard">
        <div class="turn-label">Now Playing</div>
        <div class="turn-piece-display" id="turnPiece">♔</div>
        <div class="turn-name" id="turnName">White</div>
        <div class="status-msg" id="statusMsg"></div>
      </div>
      
      <div class="captured-section">
        <div class="captured-label">
          <span>Captured by White</span>
          <span class="material-adv" id="whiteAdv"></span>
        </div>
        <div class="captured-row black-cap" id="capturedByWhite"></div>
      </div>
      
      <div class="captured-section">
        <div class="captured-label">
          <span>Captured by Black</span>
          <span class="material-adv" id="blackAdv"></span>
        </div>
        <div class="captured-row white-cap" id="capturedByBlack"></div>
      </div>
    </aside>
    
    <div class="board-wrap">
      <div class="board-frame">
        <div class="coords coords-row top">
          <span>a</span><span>b</span><span>c</span><span>d</span>
          <span>e</span><span>f</span><span>g</span><span>h</span>
        </div>
        <div class="coords coords-row bottom">
          <span>a</span><span>b</span><span>c</span><span>d</span>
          <span>e</span><span>f</span><span>g</span><span>h</span>
        </div>
        <div class="coords coords-col left">
          <span>8</span><span>7</span><span>6</span><span>5</span>
          <span>4</span><span>3</span><span>2</span><span>1</span>
        </div>
        <div class="coords coords-col right">
          <span>8</span><span>7</span><span>6</span><span>5</span>
          <span>4</span><span>3</span><span>2</span><span>1</span>
        </div>
        <div class="board" id="board"></div>
      </div>
    </div>
    
    <aside class="panel">
      <div class="move-history">
        <div class="panel-title">Move History</div>
        <div class="move-list" id="moveList">
          <div class="move-empty">No moves yet — White begins</div>
        </div>
      </div>
    </aside>
  </div>
</div>

<div class="modal-overlay" id="promoModal">
  <div class="modal">
    <h3>Choose Promotion</h3>
    <div class="promo-pieces" id="promoPieces"></div>
  </div>
</div>

<div class="modal-overlay" id="gameOverModal">
  <div class="modal game-over">
    <div class="result-icon" id="gameOverIcon">♔</div>
    <div class="result" id="gameOverResult">Checkmate</div>
    <div class="detail" id="gameOverDetail">White Wins</div>
    <button class="btn" id="playAgainBtn">Play Again</button>
  </div>
</div>

<script>
// ============ CHESS ENGINE ============
const PIECES = {
  'wk':'♔','wq':'♕','wr':'♖','wb':'♗','wn':'♘','wp':'♙',
  'bk':'♚','bq':'♛','br':'♜','bb':'♝','bn':'♞','bp':'♟'
};
const PIECE_LETTERS = {p:'',n:'N',b:'B',r:'R',q:'Q',k:'K'};
const PIECE_VALUES = {p:1,n:3,b:3,r:5,q:9,k:0};
const FILES = ['a','b','c','d','e','f','g','h'];
const KNIGHT_MOVES = [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]];
const BISHOP_DIRS = [[-1,-1],[-1,1],[1,-1],[1,1]];
const ROOK_DIRS = [[-1,0],[1,0],[0,-1],[0,1]];
const KING_DIRS = [...BISHOP_DIRS, ...ROOK_DIRS];

let game;

function createGame() {
  return {
    board: [
      ['br','bn','bb','bq','bk','bb','bn','br'],
      ['bp','bp','bp','bp','bp','bp','bp','bp'],
      [null,null,null,null,null,null,null,null],
      [null,null,null,null,null,null,null,null],
      [null,null,null,null,null,null,null,null],
      [null,null,null,null,null,null,null,null],
      ['wp','wp','wp','wp','wp','wp','wp','wp'],
      ['wr','wn','wb','wq','wk','wb','wn','wr']
    ],
    turn: 'w',
    castling: { wK:true, wQ:true, bK:true, bQ:true },
    enPassant: null,
    selected: null,
    validMoves: [],
    history: [],
    captured: { w:[], b:[] },
    lastMove: null,
    inCheck: false,
    checkSquare: null,
    gameOver: false,
    result: null,
    promotionPending: null
  };
}

const inBounds = (r,c) => r>=0 && r<8 && c>=0 && c<8;

function isSquareAttacked(board, r, c, byColor) {
  // Pawn attacks
  const pdir = byColor === 'w' ? -1 : 1;
  for (const dc of [-1, 1]) {
    const pr = r - pdir, pc = c + dc;
    if (inBounds(pr, pc) && board[pr][pc] === byColor + 'p') return true;
  }
  // Knight
  for (const [dr, dc] of KNIGHT_MOVES) {
    const nr = r+dr, nc = c+dc;
    if (inBounds(nr, nc) && board[nr][nc] === byColor + 'n') return true;
  }
  // King
  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      if (!dr && !dc) continue;
      const nr = r+dr, nc = c+dc;
      if (inBounds(nr, nc) && board[nr][nc] === byColor + 'k') return true;
    }
  }
  // Diagonal sliders (bishop, queen)
  for (const [dr, dc] of BISHOP_DIRS) {
    let nr = r+dr, nc = c+dc;
    while (inBounds(nr, nc)) {
      if (board[nr][nc]) {
        if (board[nr][nc] === byColor + 'b' || board[nr][nc] === byColor + 'q') return true;
        break;
      }
      nr += dr; nc += dc;
    }
  }
  // Straight sliders (rook, queen)
  for (const [dr, dc] of ROOK_DIRS) {
    let nr = r+dr, nc = c+dc;
    while (inBounds(nr, nc)) {
      if (board[nr][nc]) {
        if (board[nr][nc] === byColor + 'r' || board[nr][nc] === byColor + 'q') return true;
        break;
      }
      nr += dr; nc += dc;
    }
  }
  return false;
}

function findKing(board, color) {
  for (let r = 0; r < 8; r++)
    for (let c = 0; c < 8; c++)
      if (board[r][c] === color + 'k') return [r, c];
  return null;
}

function isInCheck(board, color) {
  const k = findKing(board, color);
  return k ? isSquareAttacked(board, k[0], k[1], color === 'w' ? 'b' : 'w') : false;
}

function getPseudoMoves(board, r, c, castling, enPassant) {
  const piece = board[r][c];
  if (!piece) return [];
  const color = piece[0];
  const type = piece[1];
  const moves = [];
  
  if (type === 'p') {
    const dir = color === 'w' ? -1 : 1;
    const startRow = color === 'w' ? 6 : 1;
    if (inBounds(r+dir, c) && !board[r+dir][c]) {
      moves.push({to:[r+dir, c], type:'normal'});
      if (r === startRow && !board[r+2*dir][c]) {
        moves.push({to:[r+2*dir, c], type:'double'});
      }
    }
    for (const dc of [-1, 1]) {
      const nr = r+dir, nc = c+dc;
      if (inBounds(nr, nc) && board[nr][nc] && board[nr][nc][0] !== color) {
        moves.push({to:[nr, nc], type:'capture'});
      }
      if (enPassant && enPassant[0] === nr && enPassant[1] === nc) {
        moves.push({to:[nr, nc], type:'enpassant'});
      }
    }
  } else if (type === 'n') {
    for (const [dr, dc] of KNIGHT_MOVES) {
      const nr = r+dr, nc = c+dc;
      if (inBounds(nr, nc) && (!board[nr][nc] || board[nr][nc][0] !== color)) {
        moves.push({to:[nr, nc], type: board[nr][nc] ? 'capture' : 'normal'});
      }
    }
  } else if (type === 'b' || type === 'r' || type === 'q') {
    const dirs = type === 'b' ? BISHOP_DIRS : (type === 'r' ? ROOK_DIRS : KING_DIRS);
    for (const [dr, dc] of dirs) {
      let nr = r+dr, nc = c+dc;
      while (inBounds(nr, nc)) {
        if (!board[nr][nc]) {
          moves.push({to:[nr, nc], type:'normal'});
        } else {
          if (board[nr][nc][0] !== color) moves.push({to:[nr, nc], type:'capture'});
          break;
        }
        nr += dr; nc += dc;
      }
    }
  } else if (type === 'k') {
    for (const [dr, dc] of KING_DIRS) {
      const nr = r+dr, nc = c+dc;
      if (inBounds(nr, nc) && (!board[nr][nc] || board[nr][nc][0] !== color)) {
        moves.push({to:[nr, nc], type: board[nr][nc] ? 'capture' : 'normal'});
      }
    }
    // Castling
    const enemy = color === 'w' ? 'b' : 'w';
    const home = color === 'w' ? 7 : 0;
    if (r === home && c === 4 && !isSquareAttacked(board, r, c, enemy)) {
      if (castling[color + 'K'] && !board[home][5] && !board[home][6]
          && board[home][7] === color + 'r'
          && !isSquareAttacked(board, home, 5, enemy)
          && !isSquareAttacked(board, home, 6, enemy)) {
        moves.push({to:[home, 6], type:'castle-k'});
      }
      if (castling[color + 'Q'] && !board[home][3] && !board[home][2] && !board[home][1]
          && board[home][0] === color + 'r'
          && !isSquareAttacked(board, home, 3, enemy)
          && !isSquareAttacked(board, home, 2, enemy)) {
        moves.push({to:[home, 2], type:'castle-q'});
      }
    }
  }
  return moves;
}

function applyMove(board, from, to, moveType, castling, enPassant) {
  const nb = board.map(row => [...row]);
  const nc = {...castling};
  let ne = null;
  const [fr, fc] = from;
  const [tr, tc] = to;
  const piece = nb[fr][fc];
  const color = piece[0];
  const type = piece[1];
  
  nb[fr][fc] = null;
  
  if (moveType === 'enpassant') {
    nb[fr][tc] = null;
    nb[tr][tc] = piece;
  } else if (moveType === 'castle-k') {
    nb[tr][tc] = piece;
    nb[tr][5] = nb[tr][7];
    nb[tr][7] = null;
  } else if (moveType === 'castle-q') {
    nb[tr][tc] = piece;
    nb[tr][3] = nb[tr][0];
    nb[tr][0] = null;
  } else {
    nb[tr][tc] = piece;
  }
  
  if (type === 'k') {
    nc[color + 'K'] = false;
    nc[color + 'Q'] = false;
  }
  if (type === 'r') {
    if (fr === 7 && fc === 0) nc.wQ = false;
    if (fr === 7 && fc === 7) nc.wK = false;
    if (fr === 0 && fc === 0) nc.bQ = false;
    if (fr === 0 && fc === 7) nc.bK = false;
  }
  if (tr === 0 && tc === 0) nc.bQ = false;
  if (tr === 0 && tc === 7) nc.bK = false;
  if (tr === 7 && tc === 0) nc.wQ = false;
  if (tr === 7 && tc === 7) nc.wK = false;
  
  if (type === 'p' && Math.abs(tr - fr) === 2) {
    ne = [(tr + fr) / 2, fc];
  }
  return {board: nb, castling: nc, enPassant: ne};
}

function getLegalMovesFor(r, c) {
  const piece = game.board[r][c];
  if (!piece || piece[0] !== game.turn) return [];
  const pseudo = getPseudoMoves(game.board, r, c, game.castling, game.enPassant);
  return pseudo.filter(m => {
    const res = applyMove(game.board, [r, c], m.to, m.type, game.castling, game.enPassant);
    return !isInCheck(res.board, piece[0]);
  });
}

function hasAnyLegalMove(color) {
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      if (game.board[r][c] && game.board[r][c][0] === color) {
        const pseudo = getPseudoMoves(game.board, r, c, game.castling, game.enPassant);
        for (const m of pseudo) {
          const res = applyMove(game.board, [r, c], m.to, m.type, game.castling, game.enPassant);
          if (!isInCheck(res.board, color)) return true;
        }
      }
    }
  }
  return false;
}

function buildNotation(piece, from, to, moveType, captured, promotion, check, checkmate, preBoard, preCastling, preEP) {
  const [fr, fc] = from;
  const [tr, tc] = to;
  const type = piece[1];
  const color = piece[0];
  const dest = FILES[tc] + (8 - tr);
  const suffix = checkmate ? '#' : (check ? '+' : '');
  
  if (moveType === 'castle-k') return 'O-O' + suffix;
  if (moveType === 'castle-q') return 'O-O-O' + suffix;
  
  if (type === 'p') {
    let s = captured ? (FILES[fc] + 'x' + dest) : dest;
    if (promotion) s += '=' + PIECE_LETTERS[promotion];
    return s + suffix;
  }
  
  let s = PIECE_LETTERS[type];
  
  // Disambiguation
  const others = [];
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      if (r === fr && c === fc) continue;
      if (preBoard[r][c] === piece) {
        const pseudo = getPseudoMoves(preBoard, r, c, preCastling, preEP);
        const found = pseudo.find(m => m.to[0] === tr && m.to[1] === tc);
        if (found) {
          const res = applyMove(preBoard, [r, c], [tr, tc], found.type, preCastling, preEP);
          if (!isInCheck(res.board, color)) {
            others.push([r, c]);
          }
        }
      }
    }
  }
  
  if (others.length > 0) {
    const sameFile = others.some(([r, c]) => c === fc);
    const sameRank = others.some(([r, c]) => r === fr);
    if (!sameFile) s += FILES[fc];
    else if (!sameRank) s += (8 - fr);
    else s += FILES[fc] + (8 - fr);
  }
  
  if (captured) s += 'x';
  s += dest;
  return s + suffix;
}

// ============ GAME FLOW ============

function executeMove(from, to, moveType, promotion) {
  const [fr, fc] = from;
  const [tr, tc] = to;
  const piece = game.board[fr][fc];
  const color = piece[0];
  
  let captured = null;
  if (moveType === 'enpassant') {
    captured = game.board[fr][tc];
  } else if (game.board[tr][tc] && game.board[tr][tc][0] !== color) {
    captured = game.board[tr][tc];
  }
  
  const snapshot = {
    board: game.board.map(row => [...row]),
    castling: {...game.castling},
    enPassant: game.enPassant ? [...game.enPassant] : null,
    captured: { w: [...game.captured.w], b: [...game.captured.b] },
    turn: game.turn,
    lastMove: game.lastMove ? {from: [...game.lastMove.from], to: [...game.lastMove.to]} : null,
    inCheck: game.inCheck,
    checkSquare: game.checkSquare ? [...game.checkSquare] : null,
    gameOver: game.gameOver,
    result: game.result
  };
  
  const preCastling = {...game.castling};
  const preEP = game.enPassant ? [...game.enPassant] : null;
  const preBoard = game.board.map(row => [...row]);
  
  const res = applyMove(game.board, from, to, moveType, game.castling, game.enPassant);
  game.board = res.board;
  game.castling = res.castling;
  game.enPassant = res.enPassant;
  
  if (promotion) {
    game.board[tr][tc] = color + promotion;
  }
  
  if (captured) {
    game.captured[color].push(captured);
  }
  
  game.turn = color === 'w' ? 'b' : 'w';
  
  const enemyInCheck = isInCheck(game.board, game.turn);
  const enemyHasMoves = hasAnyLegalMove(game.turn);
  const checkmate = enemyInCheck && !enemyHasMoves;
  const stalemate = !enemyInCheck && !enemyHasMoves;
  
  game.inCheck = enemyInCheck;
  game.checkSquare = enemyInCheck ? findKing(game.board, game.turn) : null;
  
  const notation = buildNotation(piece, from, to, moveType, captured, promotion, enemyInCheck, checkmate, preBoard, preCastling, preEP);
  
  game.history.push({
    snapshot, notation, color,
    from: [...from], to: [...to], moveType,
    captured, promotion,
    check: enemyInCheck, checkmate, stalemate
  });
  game.lastMove = {from: [...from], to: [...to]};
  
  if (checkmate) {
    game.gameOver = true;
    game.result = {type: 'checkmate', winner: color};
    setTimeout(() => showGameOver('Checkmate', (color === 'w' ? 'White' : 'Black') + ' Wins', color === 'w' ? '♔' : '♚', color), 650);
  } else if (stalemate) {
    game.gameOver = true;
    game.result = {type: 'stalemate'};
    setTimeout(() => showGameOver('Stalemate', 'Draw', '', 'w'), 650);
  }
  
  game.selected = null;
  game.validMoves = [];
  updateUI();
}

function undoMove() {
  if (game.history.length === 0) return;
  // Close promotion modal if open
  document.getElementById('promoModal').classList.remove('show');
  game.promotionPending = null;
  
  const last = game.history.pop();
  const s = last.snapshot;
  game.board = s.board;
  game.castling = s.castling;
  game.enPassant = s.enPassant;
  game.captured = s.captured;
  game.turn = s.turn;
  game.lastMove = s.lastMove;
  game.inCheck = s.inCheck;
  game.checkSquare = s.checkSquare;
  game.gameOver = s.gameOver;
  game.result = s.result;
  game.selected = null;
  game.validMoves = [];
  hideGameOver();
  updateUI();
}

function handleSquareClick(r, c) {
  if (game.gameOver || game.promotionPending) return;
  
  const piece = game.board[r][c];
  
  if (game.selected) {
    const move = game.validMoves.find(m => m.to[0] === r && m.to[1] === c);
    if (move) {
      const [fr, fc] = game.selected;
      const movingPiece = game.board[fr][fc];
      if (movingPiece[1] === 'p' && (r === 0 || r === 7)) {
        game.promotionPending = {from: [...game.selected], to: [r, c], moveType: move.type};
        showPromotionModal(movingPiece[0]);
        return;
      }
      executeMove([...game.selected], [r, c], move.type, null);
      return;
    }
    if (piece && piece[0] === game.turn) {
      selectSquare(r, c);
      return;
    }
    game.selected = null;
    game.validMoves = [];
    renderBoard();
    return;
  }
  
  if (piece && piece[0] === game.turn) {
    selectSquare(r, c);
  }
}

function selectSquare(r, c) {
  game.selected = [r, c];
  game.validMoves = getLegalMovesFor(r, c);
  renderBoard();
}

// ============ RENDERING ============

function renderBoard() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const sq = document.createElement('div');
      sq.className = 'square ' + ((r + c) % 2 === 0 ? 'light' : 'dark');
      sq.dataset.r = r;
      sq.dataset.c = c;
      
      const piece = game.board[r][c];
      if (piece) {
        sq.classList.add(piece[0] + '-piece');
        const p = document.createElement('span');
        p.className = 'piece';
        p.textContent = PIECES[piece];
        sq.appendChild(p);
      }
      
      if (game.selected && game.selected[0] === r && game.selected[1] === c) {
        sq.classList.add('selected');
      }
      
      if (game.lastMove) {
        if (game.lastMove.from[0] === r && game.lastMove.from[1] === c) sq.classList.add('last-move-from');
        if (game.lastMove.to[0] === r && game.lastMove.to[1] === c) sq.classList.add('last-move-to');
      }
      
      const validMove = game.validMoves.find(m => m.to[0] === r && m.to[1] === c);
      if (validMove) {
        if (piece || validMove.type === 'enpassant') {
          sq.classList.add('valid-capture');
        } else {
          sq.classList.add('valid-move');
        }
      }
      
      if (game.checkSquare && game.checkSquare[0] === r && game.checkSquare[1] === c) {
        sq.classList.add('in-check');
      }
      
      sq.addEventListener('click', () => handleSquareClick(r, c));
      boardEl.appendChild(sq);
    }
  }
}

function updateUI() {
  renderBoard();
  
  const turnCard = document.getElementById('turnCard');
  const turnPiece = document.getElementById('turnPiece');
  const turnName = document.getElementById('turnName');
  const statusMsg = document.getElementById('statusMsg');
  
  if (game.turn === 'w') {
    turnCard.classList.remove('black-turn');
    turnCard.classList.add('white-turn');
    turnPiece.textContent = '♔';
    turnName.textContent = 'White';
  } else {
    turnCard.classList.remove('white-turn');
    turnCard.classList.add('black-turn');
    turnPiece.textContent = '♚';
    turnName.textContent = 'Black';
  }
  
  statusMsg.className = 'status-msg';
  if (game.gameOver) {
    if (game.result && game.result.type === 'checkmate') {
      statusMsg.textContent = 'Checkmate';
      statusMsg.classList.add('win');
    } else if (game.result && game.result.type === 'stalemate') {
      statusMsg.textContent = 'Stalemate';
      statusMsg.classList.add('win');
    }
  } else if (game.inCheck) {
    statusMsg.textContent = 'Check';
    statusMsg.classList.add('check');
  } else {
    statusMsg.textContent = '';
  }
  
  // Captured pieces (sorted by value descending)
  const capByWhite = document.getElementById('capturedByWhite');
  const capByBlack = document.getElementById('capturedByBlack');
  
  capByWhite.innerHTML = game.captured.w.slice().sort((a, b) => PIECE_VALUES[b[1]] - PIECE_VALUES[a[1]])
    .map(p => `<span>${PIECES[p]}</span>`).join('');
  capByBlack.innerHTML = game.captured.b.slice().sort((a, b) => PIECE_VALUES[b[1]] - PIECE_VALUES[a[1]])
    .map(p => `<span>${PIECES[p]}</span>`).join('');
  
  const whiteScore = game.captured.w.reduce((sum, p) => sum + PIECE_VALUES[p[1]], 0);
  const blackScore = game.captured.b.reduce((sum, p) => sum + PIECE_VALUES[p[1]], 0);
  const diff = whiteScore - blackScore;
  document.getElementById('whiteAdv').textContent = diff > 0 ? `+${diff}` : '';
  document.getElementById('blackAdv').textContent = diff < 0 ? `+${-diff}` : '';
  
  renderMoveHistory();
  
  document.getElementById('undoBtn').disabled = game.history.length === 0;
}

function renderMoveHistory() {
  const list = document.getElementById('moveList');
  if (game.history.length === 0) {
    list.innerHTML = '<div class="move-empty">No moves yet — White begins</div>';
    return;
  }
  
  let html = '';
  const lastIdx = game.history.length - 1;
  for (let i = 0; i < game.history.length; i += 2) {
    const moveNum = (i / 2) + 1;
    const white = game.history[i];
    const black = game.history[i+1];
    
    html += '<div class="move-row">';
    html += `<span class="move-num">${moveNum}.</span>`;
    html += `<span class="move-cell${i === lastIdx ? ' recent' : ''}">${white.notation}</span>`;
    if (black) {
      html += `<span class="move-cell${(i+1) === lastIdx ? ' recent' : ''}">${black.notation}</span>`;
    } else {
      html += '<span class="move-cell"></span>';
    }
    html += '</div>';
  }
  list.innerHTML = html;
  list.scrollTop = list.scrollHeight;
}

// ============ MODALS ============

function showPromotionModal(color) {
  const modal = document.getElementById('promoModal');
  const pieces = document.getElementById('promoPieces');
  pieces.innerHTML = '';
  for (const t of ['q', 'r', 'b', 'n']) {
    const el = document.createElement('div');
    el.className = `promo-piece ${color === 'w' ? 'white' : 'black'}`;
    el.textContent = PIECES[color + t];
    el.addEventListener('click', () => {
      const pending = game.promotionPending;
      game.promotionPending = null;
      modal.classList.remove('show');
      executeMove(pending.from, pending.to, pending.moveType, t);
    });
    pieces.appendChild(el);
  }
  modal.classList.add('show');
}

function showGameOver(result, detail, icon, color) {
  document.getElementById('gameOverResult').textContent = result;
  document.getElementById('gameOverDetail').textContent = detail;
  const iconEl = document.getElementById('gameOverIcon');
  if (icon) {
    iconEl.textContent = icon;
    iconEl.className = 'result-icon ' + (color === 'w' ? 'white' : 'black');
    iconEl.style.display = '';
  } else {
    iconEl.style.display = 'none';
  }
  document.getElementById('gameOverModal').classList.add('show');
}

function hideGameOver() {
  document.getElementById('gameOverModal').classList.remove('show');
}

// ============ INIT ============

function newGame() {
  game = createGame();
  hideGameOver();
  document.getElementById('promoModal').classList.remove('show');
  updateUI();
}

document.getElementById('newGameBtn').addEventListener('click', newGame);
document.getElementById('playAgainBtn').addEventListener('click', newGame);
document.getElementById('undoBtn').addEventListener('click', undoMove);

// Keyboard shortcut: Escape to deselect
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && game.selected && !game.promotionPending) {
    game.selected = null;
    game.validMoves = [];
    renderBoard();
  }
});

newGame();
</script>
