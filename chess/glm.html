<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e12;
    --fg: #e8e6e1;
    --muted: #6b6a6a;
    --accent: #c8a44e;
    --accent-glow: rgba(200, 164, 78, 0.3);
    --card: #1a1a22;
    --card-hover: #22222e;
    --border: #2a2a35;
    --light-sq: #2a2a38;
    --dark-sq: #1a1a26;
    --selected: rgba(200, 164, 78, 0.45);
    --valid-move: rgba(200, 164, 78, 0.25);
    --capture-ring: rgba(220, 80, 60, 0.5);
    --last-move: rgba(200, 164, 78, 0.15);
    --white-piece: #f0ece4;
    --black-piece: #1a1a1a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    top: -40%; left: -20%;
    width: 80vw; height: 80vw;
    background: radial-gradient(circle, rgba(200,164,78,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -30%; right: -10%;
    width: 60vw; height: 60vw;
    background: radial-gradient(circle, rgba(100,80,200,0.03) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .game-container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    padding: 20px;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 16px;
    width: 100%;
    max-width: 520px;
    justify-content: space-between;
  }

  .title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: linear-gradient(135deg, var(--accent), #e8d5a0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .new-game-btn {
    font-family: 'Space Grotesk', sans-serif;
    background: transparent;
    border: 1.5px solid var(--accent);
    color: var(--accent);
    padding: 8px 20px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .new-game-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.25s ease;
    z-index: 0;
  }

  .new-game-btn:hover::before { opacity: 0.12; }
  .new-game-btn:hover { box-shadow: 0 0 20px var(--accent-glow); }
  .new-game-btn:active { transform: scale(0.96); }
  .new-game-btn span { position: relative; z-index: 1; }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 100%;
    max-width: 520px;
    justify-content: center;
  }

  .turn-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    transition: all 0.4s ease;
    flex-shrink: 0;
  }

  .turn-dot.white {
    background: var(--white-piece);
    box-shadow: 0 0 8px rgba(240,236,228,0.4);
  }

  .turn-dot.black {
    background: #444;
    box-shadow: 0 0 8px rgba(60,60,60,0.6);
    border: 1.5px solid #666;
  }

  .turn-text {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .capture-info {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-left: auto;
  }

  .board-wrapper {
    position: relative;
    padding: 6px;
    background: linear-gradient(145deg, var(--accent), #8a6e2a);
    border-radius: 6px;
    box-shadow:
      0 8px 32px rgba(0,0,0,0.5),
      0 0 60px var(--accent-glow),
      inset 0 1px 0 rgba(255,255,255,0.1);
  }

  .board {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
    width: min(80vw, 480px);
    height: min(80vw, 480px);
    border-radius: 3px;
    overflow: hidden;
  }

  .square {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: min(8vw, 46px);
    cursor: pointer;
    position: relative;
    user-select: none;
    transition: background 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .square.light { background: var(--light-sq); }
  .square.dark { background: var(--dark-sq); }

  .square.selected { background: var(--selected) !important; }

  .square.valid-move::after {
    content: '';
    position: absolute;
    width: 26%;
    height: 26%;
    border-radius: 50%;
    background: var(--valid-move);
    pointer-events: none;
    animation: pulse-dot 1.5s ease-in-out infinite;
  }

  .square.valid-capture::after {
    content: '';
    position: absolute;
    width: 85%;
    height: 85%;
    border-radius: 50%;
    border: 3px solid var(--capture-ring);
    background: transparent;
    pointer-events: none;
    animation: pulse-ring 1.5s ease-in-out infinite;
  }

  .square.last-from, .square.last-to {
    background: var(--last-move) !important;
  }

  .square.selected.last-from, .square.selected.last-to {
    background: var(--selected) !important;
  }

  .square:hover:not(.selected) {
    filter: brightness(1.15);
  }

  .piece {
    position: relative;
    z-index: 2;
    line-height: 1;
    transition: transform 0.1s ease;
    pointer-events: none;
  }

  .piece.white-piece {
    color: var(--white-piece);
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.4));
  }

  .piece.black-piece {
    color: var(--black-piece);
    text-shadow: none;
    filter:
      drop-shadow(0 0 0.5px rgba(255,255,255,0.3))
      drop-shadow(0 1px 2px rgba(0,0,0,0.6));
  }

  .square:active .piece {
    transform: scale(1.1);
  }

  .rank-labels, .file-labels {
    display: flex;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(200,164,78,0.6);
    font-weight: 400;
  }

  .rank-labels {
    flex-direction: column;
    position: absolute;
    left: -18px;
    top: 6px;
    height: min(80vw, 480px);
    justify-content: space-around;
  }

  .file-labels {
    position: absolute;
    bottom: -18px;
    left: 6px;
    width: min(80vw, 480px);
    justify-content: space-around;
  }

  .captured-pieces {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    min-height: 28px;
    align-items: center;
    max-width: 520px;
    width: 100%;
    padding: 0 4px;
  }

  .captured-pieces span {
    font-size: 18px;
    opacity: 0.7;
  }

  .captured-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
    margin-right: 8px;
  }

  .game-over-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,10,15,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(6px);
    animation: fadeIn 0.4s ease;
  }

  .game-over-overlay.active { display: flex; }

  .game-over-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 50px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    animation: slideUp 0.4s ease;
  }

  .game-over-card h2 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--accent), #e8d5a0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .game-over-card p {
    color: var(--muted);
    font-size: 15px;
    margin-bottom: 24px;
  }

  .game-over-card button {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--accent);
    border: none;
    color: var(--bg);
    padding: 12px 32px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.2s ease;
  }

  .game-over-card button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px var(--accent-glow);
  }

  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--card);
    border: 1px solid var(--accent);
    color: var(--fg);
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    z-index: 200;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    pointer-events: none;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  @keyframes pulse-ring {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 0.9; }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="game-over-overlay" id="gameOverOverlay">
  <div class="game-over-card">
    <h2 id="gameOverTitle">Checkmate</h2>
    <p id="gameOverText">White wins!</p>
    <button onclick="closeOverlay(); newGame();">Play Again</button>
  </div>
</div>

<div class="game-container">
  <div class="header">
    <div class="title">Chess</div>
    <button class="new-game-btn" onclick="newGame()"><span>New Game</span></button>
  </div>

  <div class="status-bar">
    <div class="turn-dot" id="turnDot"></div>
    <div class="turn-text" id="turnText">White to move</div>
    <div class="capture-info" id="moveCount">Move 1</div>
  </div>

  <div class="captured-pieces" id="capturedWhite">
    <span class="captured-label">Captured:</span>
  </div>

  <div class="board-wrapper">
    <div class="rank-labels" id="rankLabels"></div>
    <div class="board" id="board"></div>
    <div class="file-labels" id="fileLabels"></div>
  </div>

  <div class="captured-pieces" id="capturedBlack">
    <span class="captured-label">Captured:</span>
  </div>
</div>

<script>
  // --- Game State ---
  let board = [];
  let selectedSquare = null;
  let currentTurn = 'white';
  let moveNumber = 1;
  let lastMove = null;
  let capturedByWhite = [];
  let capturedByBlack = [];
  let gameOver = false;

  // Piece symbols
  const PIECES = {
    white: { king: '♔', queen: '♕', rook: '♖', bishop: '♗', knight: '♘', pawn: '♙' },
    black: { king: '♚', queen: '♛', rook: '♜', bishop: '♝', knight: '♞', pawn: '♟' }
  };

  // Piece values for ordering captures
  const PIECE_ORDER = { pawn: 1, knight: 2, bishop: 3, rook: 4, queen: 5, king: 6 };

  function initBoard() {
    return [
      ['bR','bN','bB','bQ','bK','bB','bN','bR'],
      ['bP','bP','bP','bP','bP','bP','bP','bP'],
      [null,null,null,null,null,null,null,null],
      [null,null,null,null,null,null,null,null],
      [null,null,null,null,null,null,null,null],
      [null,null,null,null,null,null,null,null],
      ['wP','wP','wP','wP','wP','wP','wP','wP'],
      ['wR','wN','wB','wQ','wK','wB','wN','wR'],
    ];
  }

  function parsePiece(code) {
    if (!code) return null;
    const color = code[0] === 'w' ? 'white' : 'black';
    const typeMap = { K:'king', Q:'queen', R:'rook', B:'bishop', N:'knight', P:'pawn' };
    const type = typeMap[code[1]];
    return { color, type };
  }

  function getSymbol(code) {
    const p = parsePiece(code);
    if (!p) return '';
    return PIECES[p.color][p.type];
  }

  function renderBoard() {
    const boardEl = document.getElementById('board');
    boardEl.innerHTML = '';

    for (let r = 0; r < 8; r++) {
      for (let c = 0; c < 8; c++) {
        const sq = document.createElement('div');
        const isLight = (r + c) % 2 === 0;
        sq.className = 'square ' + (isLight ? 'light' : 'dark');
        sq.dataset.row = r;
        sq.dataset.col = c;

        // Last move highlighting
        if (lastMove) {
          if (lastMove.from.r === r && lastMove.from.c === c) sq.classList.add('last-from');
          if (lastMove.to.r === r && lastMove.to.c === c) sq.classList.add('last-to');
        }

        // Selected highlighting
        if (selectedSquare && selectedSquare.r === r && selectedSquare.c === c) {
          sq.classList.add('selected');
        }

        // Valid move / capture indicators
        if (selectedSquare) {
          if (isValidMove(selectedSquare.r, selectedSquare.c, r, c)) {
            if (board[r][c]) {
              sq.classList.add('valid-capture');
            } else {
              sq.classList.add('valid-move');
            }
          }
        }

        // Piece
        if (board[r][c]) {
          const pieceEl = document.createElement('span');
          const p = parsePiece(board[r][c]);
          pieceEl.className = 'piece ' + p.color + '-piece';
          pieceEl.textContent = getSymbol(board[r][c]);
          sq.appendChild(pieceEl);
        }

        sq.addEventListener('click', () => handleClick(r, c));
        boardEl.appendChild(sq);
      }
    }

    // Rank & file labels
    const rankLabels = document.getElementById('rankLabels');
    const fileLabels = document.getElementById('fileLabels');
    rankLabels.innerHTML = '';
    fileLabels.innerHTML = '';
    for (let i = 0; i < 8; i++) {
      const rl = document.createElement('span');
      rl.textContent = 8 - i;
      rankLabels.appendChild(rl);
      const fl = document.createElement('span');
      fl.textContent = String.fromCharCode(97 + i);
      fileLabels.appendChild(fl);
    }
  }

  function updateStatus() {
    const turnDot = document.getElementById('turnDot');
    const turnText = document.getElementById('turnText');
    const moveCountEl = document.getElementById('moveCount');

    turnDot.className = 'turn-dot ' + currentTurn;
    turnText.textContent = (currentTurn === 'white' ? 'White' : 'Black') + ' to move';
    moveCountEl.textContent = 'Move ' + moveNumber;

    // Captured pieces
    const capWhiteEl = document.getElementById('capturedWhite');
    const capBlackEl = document.getElementById('capturedBlack');

    capWhiteEl.innerHTML = '<span class="captured-label">White captured:</span>';
    capturedByWhite.sort((a, b) => PIECE_ORDER[a.type] - PIECE_ORDER[b.type]);
    capturedByWhite.forEach(p => {
      const s = document.createElement('span');
      s.textContent = PIECES[p.color][p.type];
      s.style.opacity = '0.7';
      capWhiteEl.appendChild(s);
    });

    capBlackEl.innerHTML = '<span class="captured-label">Black captured:</span>';
    capturedByBlack.sort((a, b) => PIECE_ORDER[a.type] - PIECE_ORDER[b.type]);
    capturedByBlack.forEach(p => {
      const s = document.createElement('span');
      s.textContent = PIECES[p.color][p.type];
      s.style.opacity = '0.7';
      capBlackEl.appendChild(s);
    });
  }

  function inBounds(r, c) {
    return r >= 0 && r < 8 && c >= 0 && c < 8;
  }

  // --- Move Validation ---
  function isValidMove(fromR, fromC, toR, toC) {
    if (fromR === toR && fromC === toC) return false;
    const code = board[fromR][fromC];
    if (!code) return false;
    const piece = parsePiece(code);
    const target = board[toR][toC];

    // Can't capture own pieces
    if (target) {
      const tp = parsePiece(target);
      if (tp.color === piece.color) return false;
    }

    const dr = toR - fromR;
    const dc = toC - fromC;
    const adr = Math.abs(dr);
    const adc = Math.abs(dc);

    switch (piece.type) {
      case 'pawn': {
        const dir = piece.color === 'white' ? -1 : 1;
        const startRow = piece.color === 'white' ? 6 : 1;

        // Forward one
        if (dc === 0 && dr === dir && !target) return true;
        // Forward two from start
        if (dc === 0 && dr === 2 * dir && fromR === startRow && !target && !board[fromR + dir][fromC]) return true;
        // Diagonal capture
        if (adc === 1 && dr === dir && target) return true;
        return false;
      }
      case 'knight':
        return (adr === 2 && adc === 1) || (adr === 1 && adc === 2);
      case 'bishop':
        if (adr !== adc || adr === 0) return false;
        return isPathClear(fromR, fromC, toR, toC);
      case 'rook':
        if (dr !== 0 && dc !== 0) return false;
        return isPathClear(fromR, fromC, toR, toC);
      case 'queen':
        if (dr !== 0 && dc !== 0 && adr !== adc) return false;
        return isPathClear(fromR, fromC, toR, toC);
      case 'king':
        return adr <= 1 && adc <= 1;
    }
    return false;
  }

  function isPathClear(fromR, fromC, toR, toC) {
    const dr = Math.sign(toR - fromR);
    const dc = Math.sign(toC - fromC);
    let r = fromR + dr;
    let c = fromC + dc;
    while (r !== toR || c !== toC) {
      if (board[r][c]) return false;
      r += dr;
      c += dc;
    }
    return true;
  }

  // --- Check / Checkmate detection ---
  function findKing(color) {
    const kingCode = (color === 'white' ? 'w' : 'b') + 'K';
    for (let r = 0; r < 8; r++) {
      for (let c = 0; c < 8; c++) {
        if (board[r][c] === kingCode) return { r, c };
      }
    }
    return null;
  }

  function isInCheck(color) {
    const king = findKing(color);
    if (!king) return false;
    const opp = color === 'white' ? 'black' : 'white';
    for (let r = 0; r < 8; r++) {
      for (let c = 0; c < 8; c++) {
        if (board[r][c]) {
          const p = parsePiece(board[r][c]);
          if (p.color === opp && isValidMove(r, c, king.r, king.c)) return true;
        }
      }
    }
    return false;
  }

  function wouldBeInCheck(fromR, fromC, toR, toC, color) {
    // Simulate move
    const saved = board[toR][toC];
    const piece = board[fromR][fromC];
    board[toR][toC] = piece;
    board[fromR][fromC] = null;
    const check = isInCheck(color);
    board[fromR][fromC] = piece;
    board[toR][toC] = saved;
    return check;
  }

  function hasLegalMoves(color) {
    for (let r = 0; r < 8; r++) {
      for (let c = 0; c < 8; c++) {
        if (board[r][c]) {
          const p = parsePiece(board[r][c]);
          if (p.color === color) {
            for (let tr = 0; tr < 8; tr++) {
              for (let tc = 0; tc < 8; tc++) {
                if (isValidMove(r, c, tr, tc) && !wouldBeInCheck(r, c, tr, tc, color)) {
                  return true;
                }
              }
            }
          }
        }
      }
    }
    return false;
  }

  // --- Pawn promotion ---
  function promoteIfNeeded(r, c) {
    const code = board[r][c];
    if (!code) return;
    const p = parsePiece(code);
    if (p.type !== 'pawn') return;
    const promoRow = p.color === 'white' ? 0 : 7;
    if (r === promoRow) {
      // Auto-promote to queen
      board[r][c] = (p.color === 'white' ? 'w' : 'b') + 'Q';
      showToast((p.color === 'white' ? 'White' : 'Black') + ' pawn promoted to Queen!');
    }
  }

  // --- Click Handler ---
  function handleClick(r, c) {
    if (gameOver) return;

    const clickedPiece = board[r][c];

    if (selectedSquare) {
      // If clicking own piece, reselect
      if (clickedPiece) {
        const cp = parsePiece(clickedPiece);
        if (cp.color === currentTurn) {
          selectedSquare = { r, c };
          renderBoard();
          return;
        }
      }

      // Try to move
      if (isValidMove(selectedSquare.r, selectedSquare.c, r, c)) {
        // Check if move leaves own king in check
        if (wouldBeInCheck(selectedSquare.r, selectedSquare.c, r, c, currentTurn)) {
          showToast('Illegal move: King would be in check!');
          selectedSquare = null;
          renderBoard();
          return;
        }

        // Capture
        if (board[r][c]) {
          const captured = parsePiece(board[r][c]);
          if (currentTurn === 'white') capturedByWhite.push(captured);
          else capturedByBlack.push(captured);
        }

        // Execute move
        board[r][c] = board[selectedSquare.r][selectedSquare.c];
        board[selectedSquare.r][selectedSquare.c] = null;

        lastMove = { from: { r: selectedSquare.r, c: selectedSquare.c }, to: { r, c } };
        selectedSquare = null;

        // Promotion
        promoteIfNeeded(r, c);

        // Switch turn
        if (currentTurn === 'black') moveNumber++;
        currentTurn = currentTurn === 'white' ? 'black' : 'white';

        renderBoard();
        updateStatus();

        // Check for check / checkmate / stalemate
        const inChk = isInCheck(currentTurn);
        const hasMoves = hasLegalMoves(currentTurn);

        if (inChk && !hasMoves) {
          gameOver = true;
          const winner = currentTurn === 'white' ? 'Black' : 'White';
          showGameOver('Checkmate', winner + ' wins!');
        } else if (!hasMoves) {
          gameOver = true;
          showGameOver('Stalemate', 'The game is a draw.');
        } else if (inChk) {
          showToast((currentTurn === 'white' ? 'White' : 'Black') + ' is in check!');
        }
        return;
      } else {
        // Invalid move
        selectedSquare = null;
        renderBoard();
        return;
      }
    }

    // Select a piece
    if (clickedPiece) {
      const cp = parsePiece(clickedPiece);
      if (cp.color === currentTurn) {
        selectedSquare = { r, c };
        renderBoard();
      }
    }
  }

  // --- UI Helpers ---
  let toastTimeout;
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => toast.classList.remove('show'), 2200);
  }

  function showGameOver(title, text) {
    document.getElementById('gameOverTitle').textContent = title;
    document.getElementById('gameOverText').textContent = text;
    document.getElementById('gameOverOverlay').classList.add('active');
  }

  function closeOverlay() {
    document.getElementById('gameOverOverlay').classList.remove('active');
  }

  function newGame() {
    board = initBoard();
    selectedSquare = null;
    currentTurn = 'white';
    moveNumber = 1;
    lastMove = null;
    capturedByWhite = [];
    capturedByBlack = [];
    gameOver = false;
    closeOverlay();
    renderBoard();
    updateStatus();
  }

  // --- Init ---
  newGame();
</script>
