<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess</title>
<style>
    body {
        background-color: #1e1e1e;
        color: #ffffff;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 50px;
    }
    #board {
        display: grid;
        grid-template-columns: repeat(8, 60px);
        grid-template-rows: repeat(8, 60px);
        border: 4px solid #000;
        box-shadow: 0 0 15px rgba(0,0,0,0.8);
    }
    .cell {
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 45px;
        cursor: pointer;
        user-select: none;
    }
    .light { background-color: #b0b0b0; }
    .dark { background-color: #505050; }
    .selected { background-color: #f6f669 !important; }
    button {
        margin-top: 20px;
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        background-color: #333;
        color: white;
        border: 1px solid #fff;
        border-radius: 4px;
        transition: background 0.2s;
    }
    button:hover { background-color: #555; }
    #status { font-size: 24px; margin-bottom: 20px; font-weight: bold; }
</style>
</head>
<body>

<div id="status">White's Turn</div>
<div id="board"></div>
<button id="reset">New Game</button>

<script>
let board, selected, player;

const initialBoard = [
    ['тЩЬ','тЩЮ','тЩЭ','тЩЫ','тЩЪ','тЩЭ','тЩЮ','тЩЬ'],
    ['тЩЯ','тЩЯ','тЩЯ','тЩЯ','тЩЯ','тЩЯ','тЩЯ','тЩЯ'],
    ['','','','','','','',''],
    ['','','','','','','',''],
    ['','','','','','','',''],
    ['','','','','','','',''],
    ['тЩЩ','тЩЩ','тЩЩ','тЩЩ','тЩЩ','тЩЩ','тЩЩ','тЩЩ'],
    ['тЩЦ','тЩШ','тЩЧ','тЩХ','тЩФ','тЩЧ','тЩШ','тЩЦ']
];

const getColor = (piece) => {
    if (!piece) return null;
    const code = piece.charCodeAt(0);
    if (code >= 9818 && code <= 9823) return 'black';
    if (code >= 9812 && code <= 9817) return 'white';
    return null;
};

const init = () => {
    board = initialBoard.map(row => [...row]);
    selected = null;
    player = 'white';
    updateStatus();
    render();
};

const render = () => {
    const boardEl = document.getElementById('board');
    boardEl.innerHTML = '';
    
    for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
            const cell = document.createElement('div');
            cell.className = 'cell ' + ((r + c) % 2 === 0 ? 'light' : 'dark');
            
            if (selected && selected[0] === r && selected[1] === c) {
                cell.classList.add('selected');
            }
            
            cell.innerText = board[r][c];
            cell.onclick = () => handleClick(r, c);
            boardEl.appendChild(cell);
        }
    }
};

const updateStatus = () => {
    document.getElementById('status').innerText = 
        player.charAt(0).toUpperCase() + player.slice(1) + "'s Turn";
};

const handleClick = (r, c) => {
    const pieceColor = getColor(board[r][c]);

    if (selected) {
        const [startR, startC] = selected;
        const targetColor = getColor(board[r][c]);

        if (r === startR && c === startC) {
            selected = null;
        } else if (pieceColor === player) {
            selected = [r, c];
        } else if (targetColor !== player) {
            board[r][c] = board[startR][startC];
            board[startR][startC] = '';
            selected = null;
            player = player === 'white' ? 'black' : 'white';
            updateStatus();
        }
    } else {
        if (pieceColor === player) {
            selected = [r, c];
        }
    }
    
    render();
};

window.onload = () => {
    document.getElementById('reset').onclick = init;
    init();
};
</script>
</body>
</html>
