<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0f14;
            --bg-secondary: #1a1a24;
            --bg-tertiary: #252532;
            --bg-card: #1e1e28;
            --bg-card-hover: #2a2a38;
            --text-primary: #f0f0f5;
            --text-secondary: #a0a0b0;
            --text-muted: #606070;
            --border-color: #2a2a38;
            --accent: #6366f1;
            --accent-hover: #7c7ff2;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.5);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
        }

        .header {
            background: var(--bg-secondary);
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .logo {
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .search-container {
            position: relative;
            flex: 1;
            max-width: 400px;
        }

        .search-input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.75rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        .add-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .add-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .filter-bar {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-chip {
            padding: 0.5rem 1rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
        }

        .filter-chip:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
        }

        .filter-chip.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            padding: 2rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        .column {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 1.25rem;
            min-height: 400px;
            display: flex;
            flex-direction: column;
        }

        .column-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border-color);
        }

        .column-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .task-count {
            background: var(--bg-tertiary);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .task-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            min-height: 200px;
        }

        .task-list.drag-over {
            background: rgba(99, 102, 241, 0.1);
            border-radius: 12px;
            padding: 0.5rem;
        }

        .task-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            cursor: grab;
            transition: var(--transition);
            animation: slideIn 0.2s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .task-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .task-card.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }

        .task-card.hidden {
            display: none;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .task-title {
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-primary);
            flex: 1;
            word-break: break-word;
        }

        .task-title-edit {
            width: 100%;
            padding: 0.4rem 0.6rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--accent);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
        }

        .task-actions {
            display: flex;
            gap: 0.25rem;
            opacity: 0;
            transition: var(--transition);
        }

        .task-card:hover .task-actions {
            opacity: 1;
        }

        .task-action-btn {
            background: none;
            border: none;
            padding: 0.35rem;
            border-radius: 6px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .task-action-btn.edit:hover {
            background: rgba(99, 102, 241, 0.2);
            color: var(--accent);
        }

        .task-action-btn.delete:hover {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .task-description {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
            line-height: 1.4;
            word-break: break-word;
        }

        .task-description-edit {
            width: 100%;
            padding: 0.4rem 0.6rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--accent);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: inherit;
            resize: vertical;
            min-height: 60px;
            margin-bottom: 0.5rem;
        }

        .task-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .task-meta {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .priority-badge {
            padding: 0.25rem 0.6rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .priority-low {
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
        }

        .priority-medium {
            background: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
        }

        .priority-high {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
        }

        .task-timestamp {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .edit-controls {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .edit-btn {
            flex: 1;
            padding: 0.5rem;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .edit-btn.save {
            background: var(--success);
            color: white;
        }

        .edit-btn.save:hover {
            background: #16a34a;
        }

        .edit-btn.cancel {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
        }

        .edit-btn.cancel:hover {
            background: var(--bg-card-hover);
        }

        .empty-state {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            opacity: 0.5;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            transform: scale(0.9) translateY(20px);
            transition: var(--transition);
            box-shadow: var(--shadow-lg);
        }

        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            transition: var(--transition);
        }

        .modal-close:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .form-input,
        .form-textarea,
        .form-select {
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: var(--transition);
            font-family: inherit;
        }

        .form-input:focus,
        .form-textarea:focus,
        .form-select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .form-btn {
            flex: 1;
            padding: 0.875rem 1.5rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .form-btn.primary {
            background: var(--accent);
            color: white;
        }

        .form-btn.primary:hover {
            background: var(--accent-hover);
        }

        .form-btn.secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .form-btn.secondary:hover {
            background: var(--bg-card-hover);
        }

        @media (max-width: 1024px) {
            .board {
                grid-template-columns: 1fr;
                gap: 1rem;
                padding: 1rem;
            }

            .column {
                min-height: auto;
            }

            .task-list {
                min-height: 100px;
            }

            .header {
                padding: 1rem;
            }

            .header-top {
                flex-direction: column;
                align-items: stretch;
            }

            .search-container {
                max-width: none;
            }

            .add-btn {
                width: 100%;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .modal {
                padding: 1.5rem;
            }

            .modal-title {
                font-size: 1.25rem;
            }

            .logo {
                font-size: 1.5rem;
            }

            .filter-chip {
                font-size: 0.8rem;
                padding: 0.4rem 0.8rem;
            }
        }

        .drag-placeholder {
            background: var(--bg-tertiary);
            border: 2px dashed var(--accent);
            border-radius: 12px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-top">
            <div class="logo">✨ Kanban Board</div>
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" placeholder="Search tasks..." id="searchInput">
            </div>
            <button class="add-btn" id="addTaskBtn">
                <span>+</span> Add Task
            </button>
        </div>
        <div class="filter-bar" id="filterBar">
            <button class="filter-chip active" data-filter="all">All</button>
            <button class="filter-chip" data-filter="high">🔴 High Priority</button>
            <button class="filter-chip" data-filter="medium">🟡 Medium Priority</button>
            <button class="filter-chip" data-filter="low">🟢 Low Priority</button>
        </div>
    </div>

    <div class="board">
        <div class="column" data-status="todo">
            <div class="column-header">
                <span class="column-title">📋 To Do</span>
                <span class="task-count" id="count-todo">0</span>
            </div>
            <div class="task-list" id="todo"></div>
        </div>

        <div class="column" data-status="inprogress">
            <div class="column-header">
                <span class="column-title">🚀 In Progress</span>
                <span class="task-count" id="count-inprogress">0</span>
            </div>
            <div class="task-list" id="inprogress"></div>
        </div>

        <div class="column" data-status="done">
            <div class="column-header">
                <span class="column-title">✅ Done</span>
                <span class="task-count" id="count-done">0</span>
            </div>
            <div class="task-list" id="done"></div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Add New Task</h2>
                <button class="modal-close" id="modalClose">✕</button>
            </div>
            <form id="taskForm">
                <div class="form-group">
                    <label class="form-label" for="taskTitle">Title *</label>
                    <input type="text" class="form-input" id="taskTitle" placeholder="Enter task title..." required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="taskDescription">Description</label>
                    <textarea class="form-textarea" id="taskDescription" placeholder="Enter task description..."></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label" for="taskPriority">Priority</label>
                    <select class="form-select" id="taskPriority">
                        <option value="low">🟢 Low</option>
                        <option value="medium" selected>🟡 Medium</option>
                        <option value="high">🔴 High</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" class="form-btn secondary" id="modalCancel">Cancel</button>
                    <button type="submit" class="form-btn primary" id="modalSubmit">Add Task</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        class KanbanBoard {
            constructor() {
                this.tasks = this.loadTasks();
                this.currentFilter = 'all';
                this.searchQuery = '';
                this.draggedTask = null;
                this.editingTaskId = null;
                this.init();
            }

            init() {
                this.bindEvents();
                this.render();
            }

            bindEvents() {
                // Modal events
                document.getElementById('addTaskBtn').addEventListener('click', () => this.openModal());
                document.getElementById('modalClose').addEventListener('click', () => this.closeModal());
                document.getElementById('modalCancel').addEventListener('click', () => this.closeModal());
                document.getElementById('modalOverlay').addEventListener('click', (e) => {
                    if (e.target === document.getElementById('modalOverlay')) this.closeModal();
                });
                document.getElementById('taskForm').addEventListener('submit', (e) => this.handleSubmit(e));

                // Search and filter
                document.getElementById('searchInput').addEventListener('input', (e) => {
                    this.searchQuery = e.target.value.toLowerCase();
                    this.render();
                });

                document.querySelectorAll('.filter-chip').forEach(chip => {
                    chip.addEventListener('click', () => {
                        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                        chip.classList.add('active');
                        this.currentFilter = chip.dataset.filter;
                        this.render();
                    });
                });

                // Drag and drop
                this.setupDragAndDrop();
            }

            setupDragAndDrop() {
                document.addEventListener('dragstart', (e) => {
                    if (e.target.classList.contains('task-card')) {
                        this.draggedTask = e.target;
                        e.target.classList.add('dragging');
                        e.dataTransfer.effectAllowed = 'move';
                    }
                });

                document.addEventListener('dragend', (e) => {
                    if (e.target.classList.contains('task-card')) {
                        e.target.classList.remove('dragging');
                        this.draggedTask = null;
                        document.querySelectorAll('.task-list').forEach(list => {
                            list.classList.remove('drag-over');
                        });
                    }
                });

                document.querySelectorAll('.task-list').forEach(list => {
                    list.addEventListener('dragover', (e) => {
                        e.preventDefault();
                        e.dataTransfer.dropEffect = 'move';
                        list.classList.add('drag-over');
                    });

                    list.addEventListener('dragleave', () => {
                        list.classList.remove('drag-over');
                    });

                    list.addEventListener('drop', (e) => {
                        e.preventDefault();
                        list.classList.remove('drag-over');
                        
                        if (this.draggedTask) {
                            const taskId = this.draggedTask.dataset.id;
                            const newStatus = list.id;
                            this.moveTask(taskId, newStatus);
                        }
                    });
                });
            }

            loadTasks() {
                const stored = localStorage.getItem('kanbanTasks');
                return stored ? JSON.parse(stored) : [];
            }

            saveTasks() {
                localStorage.setItem('kanbanTasks', JSON.stringify(this.tasks));
            }

            generateId() {
                return Date.now().toString(36) + Math.random().toString(36).substr(2);
            }

            openModal() {
                document.getElementById('modalOverlay').classList.add('active');
                document.getElementById('modalTitle').textContent = 'Add New Task';
                document.getElementById('modalSubmit').textContent = 'Add Task';
                document.getElementById('taskForm').reset();
                document.getElementById('taskTitle').focus();
            }

            closeModal() {
                document.getElementById('modalOverlay').classList.remove('active');
                document.getElementById('taskForm').reset();
            }

            handleSubmit(e) {
                e.preventDefault();
                
                const title = document.getElementById('taskTitle').value.trim();
                const description = document.getElementById('taskDescription').value.trim();
                const priority = document.getElementById('taskPriority').value;

                if (!title) return;

                const task = {
                    id: this.generateId(),
                    title,
                    description,
                    priority,
                    status: 'todo',
                    createdAt: Date.now()
                };

                this.tasks.push(task);
                this.saveTasks();
                this.closeModal();
                this.render();
            }

            deleteTask(id) {
                this.tasks = this.tasks.filter(t => t.id !== id);
                this.saveTasks();
                this.render();
            }

            moveTask(id, newStatus) {
                const task = this.tasks.find(t => t.id === id);
                if (task && task.status !== newStatus) {
                    task.status = newStatus;
                    this.saveTasks();
                    this.render();
                }
            }

            startEdit(id) {
                this.editingTaskId = id;
                this.render();
            }

            saveEdit(id) {
                const titleInput = document.querySelector(`[data-id="${id}"] .task-title-edit`);
                const descInput = document.querySelector(`[data-id="${id}"] .task-description-edit`);
                const prioritySelect = document.querySelector(`[data-id="${id}"] .priority-select`);
                
                const task = this.tasks.find(t => t.id === id);
                if (task) {
                    task.title = titleInput.value.trim() || task.title;
                    task.description = descInput.value.trim();
                    task.priority = prioritySelect.value;
                    this.saveTasks();
                }
                
                this.editingTaskId = null;
                this.render();
            }

            cancelEdit() {
                this.editingTaskId = null;
                this.render();
            }

            filterTasks(tasks) {
                return tasks.filter(task => {
                    const matchesFilter = this.currentFilter === 'all' || task.priority === this.currentFilter;
                    const matchesSearch = !this.searchQuery || 
                        task.title.toLowerCase().includes(this.searchQuery) ||
                        task.description.toLowerCase().includes(this.searchQuery);
                    return matchesFilter && matchesSearch;
                });
            }

            formatDate(timestamp) {
                const date = new Date(timestamp);
                const now = new Date();
                const diff = now - date;
                
                if (diff < 60000) return 'Just now';
                if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
                if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
                if (diff < 604800000) return `${Math.floor(diff / 86400000)}d ago`;
                
                return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            }

            createTaskElement(task) {
                const isEditing = this.editingTaskId === task.id;
                
                if (isEditing) {
                    return `
                        <div class="task-card" data-id="${task.id}" draggable="false">
                            <input type="text" class="task-title-edit" value="${this.escapeHtml(task.title)}" id="edit-title-${task.id}">
                            <textarea class="task-description-edit" id="edit-desc-${task.id}">${this.escapeHtml(task.description)}</textarea>
                            <select class="form-input priority-select" id="edit-priority-${task.id}">
                                <option value="low" ${task.priority === 'low' ? 'selected' : ''}>🟢 Low</option>
                                <option value="medium" ${task.priority === 'medium' ? 'selected' : ''}>🟡 Medium</option>
                                <option value="high" ${task.priority === 'high' ? 'selected' : ''}>🔴 High</option>
                            </select>
                            <div class="edit-controls">
                                <button class="edit-btn save" onclick="board.saveEdit('${task.id}')">Save</button>
                                <button class="edit-btn cancel" onclick="board.cancelEdit()">Cancel</button>
                            </div>
                        </div>
                    `;
                }

                return `
                    <div class="task-card" data-id="${task.id}" draggable="true">
                        <div class="task-header">
                            <span class="task-title">${this.escapeHtml(task.title)}</span>
                            <div class="task-actions">
                                <button class="task-action-btn edit" onclick="board.startEdit('${task.id}')" title="Edit">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"></path>
                                        <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                    </svg>
                                </button>
                                <button class="task-action-btn delete" onclick="board.deleteTask('${task.id}')" title="Delete">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="3 6 5 6 21 6"></polyline>
                                        <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        ${task.description ? `<div class="task-description">${this.escapeHtml(task.description)}</div>` : ''}
                        <div class="task-footer">
                            <div class="task-meta">
                                <span class="priority-badge priority-${task.priority}">
                                    ${task.priority === 'low' ? '🟢' : task.priority === 'medium' ? '🟡' : '🔴'} ${task.priority}
                                </span>
                                <span class="task-timestamp">${this.formatDate(task.createdAt)}</span>
                            </div>
                        </div>
                    </div>
                `;
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text || '';
                return div.innerHTML;
            }

            render() {
                const statuses = ['todo', 'inprogress', 'done'];
                
                statuses.forEach(status => {
                    const container = document.getElementById(status);
                    const tasks = this.filterTasks(this.tasks.filter(t => t.status === status));
                    const countEl = document.getElementById(`count-${status}`);
                    
                    countEl.textContent = tasks.length;
                    
                    if (tasks.length === 0) {
                        container.innerHTML = `
                            <div class="empty-state">
                                <div class="empty-state-icon">📝</div>
                                <div>No tasks yet</div>
                            </div>
                        `;
                    } else {
                        container.innerHTML = tasks.map(task => this.createTaskElement(task)).join('');
                    }
                });
            }
        }

        const board = new KanbanBoard();
    </script>
</body>
</html>
