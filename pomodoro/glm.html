<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Timer</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root{
    --bg:#0f0f13;
    --bg2:#18181f;
    --card:#1e1e28;
    --border:#2a2a3a;
    --fg:#e8e6f0;
    --muted:#6b6880;
    --accent:#ff6b4a;
    --accent-glow:rgba(255,107,74,0.25);
    --break-accent:#4ae0c2;
    --break-glow:rgba(74,224,194,0.25);
    --long-accent:#a78bfa;
    --long-glow:rgba(167,139,250,0.25);
    --radius:14px;
    --current-accent:var(--accent);
    --current-glow:var(--accent-glow);
  }

  html,body{
    height:100%;
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:var(--bg);
    color:var(--fg);
    overflow-x:hidden;
  }

  body{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    position:relative;
  }

  /* Animated background blobs */
  .bg-blob{
    position:fixed;
    border-radius:50%;
    filter:blur(120px);
    opacity:0.15;
    pointer-events:none;
    z-index:0;
    animation:blobFloat 20s ease-in-out infinite alternate;
  }
  .bg-blob.b1{width:500px;height:500px;background:var(--accent);top:-10%;left:-10%;animation-delay:0s;}
  .bg-blob.b2{width:400px;height:400px;background:var(--break-accent);bottom:-10%;right:-10%;animation-delay:-7s;}
  .bg-blob.b3{width:350px;height:350px;background:var(--long-accent);top:50%;left:60%;animation-delay:-14s;}

  @keyframes blobFloat{
    0%{transform:translate(0,0) scale(1)}
    33%{transform:translate(30px,-40px) scale(1.1)}
    66%{transform:translate(-20px,30px) scale(0.95)}
    100%{transform:translate(10px,-10px) scale(1.05)}
  }

  .app{
    position:relative;
    z-index:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:28px;
    padding:32px 24px;
    max-width:480px;
    width:100%;
  }

  /* Header */
  .header{
    text-align:center;
  }
  .header h1{
    font-size:1.6rem;
    font-weight:800;
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--fg);
  }
  .header p{
    font-size:0.85rem;
    color:var(--muted);
    margin-top:4px;
    letter-spacing:1px;
  }

  /* Mode tabs */
  .mode-tabs{
    display:flex;
    gap:6px;
    background:var(--bg2);
    border-radius:12px;
    padding:5px;
    border:1px solid var(--border);
  }
  .mode-tab{
    padding:10px 20px;
    border:none;
    border-radius:9px;
    background:transparent;
    color:var(--muted);
    font-size:0.85rem;
    font-weight:600;
    cursor:pointer;
    transition:all 0.3s ease;
    letter-spacing:0.5px;
    position:relative;
    overflow:hidden;
  }
  .mode-tab:hover{color:var(--fg);background:rgba(255,255,255,0.04);}
  .mode-tab.active{
    color:#fff;
    background:var(--current-accent);
    box-shadow:0 4px 20px var(--current-glow);
  }

  /* Timer ring container */
  .timer-container{
    position:relative;
    width:300px;
    height:300px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .timer-ring-bg{
    position:absolute;
    inset:0;
    border-radius:50%;
    background:var(--card);
    border:1px solid var(--border);
    box-shadow:0 0 60px rgba(0,0,0,0.4),inset 0 0 40px rgba(0,0,0,0.2);
  }

  .timer-svg{
    position:relative;
    z-index:2;
    width:300px;
    height:300px;
    transform:rotate(-90deg);
  }
  .timer-track{
    fill:none;
    stroke:var(--border);
    stroke-width:6;
  }
  .timer-progress{
    fill:none;
    stroke:var(--current-accent);
    stroke-width:6;
    stroke-linecap:round;
    transition:stroke 0.5s ease;
    filter:drop-shadow(0 0 8px var(--current-glow));
  }

  /* Timer text overlay */
  .timer-text{
    position:absolute;
    z-index:3;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
  }
  .timer-time{
    font-size:3.6rem;
    font-weight:200;
    letter-spacing:4px;
    font-variant-numeric:tabular-nums;
    color:var(--fg);
    line-height:1;
  }
  .timer-label{
    font-size:0.8rem;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:2px;
    font-weight:600;
  }

  /* Pulse animation when running */
  .timer-container.running .timer-ring-bg{
    animation:ringPulse 2s ease-in-out infinite;
  }
  @keyframes ringPulse{
    0%,100%{box-shadow:0 0 60px rgba(0,0,0,0.4),inset 0 0 40px rgba(0,0,0,0.2)}
    50%{box-shadow:0 0 60px var(--current-glow),inset 0 0 40px rgba(0,0,0,0.2)}
  }

  /* Tick marks on the ring */
  .timer-ticks{
    position:absolute;
    inset:0;
    z-index:1;
  }
  .timer-ticks .tick{
    position:absolute;
    width:2px;
    height:8px;
    background:var(--border);
    top:4px;
    left:50%;
    transform-origin:center 146px;
    border-radius:1px;
  }
  .timer-ticks .tick.major{
    height:12px;
    background:var(--muted);
    width:2.5px;
  }

  /* Controls */
  .controls{
    display:flex;
    gap:14px;
    align-items:center;
  }
  .btn{
    border:none;
    border-radius:50%;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:all 0.25s ease;
    position:relative;
    overflow:hidden;
  }
  .btn::after{
    content:'';
    position:absolute;
    inset:0;
    background:rgba(255,255,255,0);
    border-radius:inherit;
    transition:background 0.2s;
  }
  .btn:hover::after{background:rgba(255,255,255,0.08);}
  .btn:active{transform:scale(0.93);}

  .btn-main{
    width:72px;height:72px;
    background:var(--current-accent);
    box-shadow:0 6px 30px var(--current-glow);
  }
  .btn-main svg{width:28px;height:28px;fill:#fff;}
  .btn-main:hover{box-shadow:0 8px 40px var(--current-glow);transform:scale(1.05);}
  .btn-main:active{transform:scale(0.95);}

  .btn-secondary{
    width:50px;height:50px;
    background:var(--card);
    border:1px solid var(--border);
  }
  .btn-secondary svg{width:20px;height:20px;fill:var(--muted);}
  .btn-secondary:hover svg{fill:var(--fg);}
  .btn-secondary:hover{border-color:var(--muted);}

  /* Session counter */
  .sessions{
    display:flex;
    gap:10px;
    align-items:center;
    padding:14px 24px;
    background:var(--card);
    border-radius:var(--radius);
    border:1px solid var(--border);
  }
  .sessions-label{
    font-size:0.8rem;
    color:var(--muted);
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:1px;
    margin-right:4px;
  }
  .session-dots{
    display:flex;
    gap:8px;
  }
  .session-dot{
    width:14px;height:14px;
    border-radius:50%;
    border:2px solid var(--border);
    transition:all 0.4s ease;
    position:relative;
  }
  .session-dot.filled{
    background:var(--current-accent);
    border-color:var(--current-accent);
    box-shadow:0 0 12px var(--current-glow);
    animation:dotPop 0.4s ease;
  }
  @keyframes dotPop{
    0%{transform:scale(0.5)}
    60%{transform:scale(1.3)}
    100%{transform:scale(1)}
  }
  .session-count{
    font-size:0.9rem;
    color:var(--fg);
    font-weight:700;
    margin-left:6px;
    min-width:20px;
    text-align:center;
  }

  /* Settings toggle */
  .settings-toggle{
    position:absolute;
    top:20px;
    right:20px;
    z-index:10;
    width:44px;height:44px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:all 0.3s ease;
  }
  .settings-toggle:hover{
    border-color:var(--muted);
    transform:rotate(30deg);
  }
  .settings-toggle svg{width:20px;height:20px;fill:var(--muted);transition:fill 0.2s;}
  .settings-toggle:hover svg{fill:var(--fg);}

  /* Settings panel overlay */
  .settings-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(8px);
    z-index:100;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.3s ease;
  }
  .settings-overlay.open{
    opacity:1;
    pointer-events:all;
  }
  .settings-panel{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:20px;
    padding:32px;
    width:90%;
    max-width:400px;
    transform:translateY(20px) scale(0.96);
    transition:transform 0.3s ease;
  }
  .settings-overlay.open .settings-panel{
    transform:translateY(0) scale(1);
  }
  .settings-title{
    font-size:1.1rem;
    font-weight:700;
    margin-bottom:24px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .settings-close{
    width:36px;height:36px;
    background:var(--bg2);
    border:1px solid var(--border);
    border-radius:10px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:all 0.2s;
    color:var(--muted);
    font-size:1.2rem;
  }
  .settings-close:hover{background:var(--border);color:var(--fg);}

  .setting-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 0;
    border-bottom:1px solid var(--border);
  }
  .setting-row:last-child{border-bottom:none;}
  .setting-label{
    font-size:0.9rem;
    font-weight:500;
  }
  .setting-label small{
    display:block;
    color:var(--muted);
    font-size:0.75rem;
    margin-top:2px;
  }
  .setting-input{
    width:80px;
    padding:8px 12px;
    background:var(--bg2);
    border:1px solid var(--border);
    border-radius:10px;
    color:var(--fg);
    font-size:0.95rem;
    text-align:center;
    font-weight:600;
    outline:none;
    transition:border-color 0.2s;
  }
  .setting-input:focus{border-color:var(--accent);}
  .setting-input::-webkit-inner-spin-button{opacity:0.5;}

  .settings-save{
    width:100%;
    padding:14px;
    margin-top:20px;
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:12px;
    font-size:0.95rem;
    font-weight:700;
    cursor:pointer;
    transition:all 0.2s;
    letter-spacing:0.5px;
  }
  .settings-save:hover{filter:brightness(1.1);transform:translateY(-1px);}
  .settings-save:active{transform:translateY(0);}

  /* Toast notification */
  .toast{
    position:fixed;
    top:24px;
    left:50%;
    transform:translateX(-50%) translateY(-100px);
    z-index:200;
    padding:14px 28px;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    color:var(--fg);
    font-size:0.9rem;
    font-weight:600;
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
    transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events:none;
  }
  .toast.show{
    transform:translateX(-50%) translateY(0);
  }

  /* Responsive */
  @media(max-width:480px){
    .timer-container,.timer-svg,.timer-ring-bg{width:260px;height:260px;}
    .timer-ticks .tick{transform-origin:center 126px;}
    .timer-time{font-size:2.8rem;}
    .mode-tab{padding:8px 14px;font-size:0.78rem;}
    .sessions{padding:12px 16px;}
  }

  /* Reduced motion */
  @media(prefers-reduced-motion:reduce){
    *,*::before,*::after{
      animation-duration:0.01ms!important;
      transition-duration:0.01ms!important;
    }
  }
</style>
</head>
<body>

<div class="bg-blob b1"></div>
<div class="bg-blob b2"></div>
<div class="bg-blob b3"></div>

<!-- Settings gear -->
<button class="settings-toggle" id="settingsToggle" aria-label="Open settings">
  <svg viewBox="0 0 24 24"><path d="M19.14 12.94a7.07 7.07 0 000-1.88l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96a7.04 7.04 0 00-1.62-.94l-.36-2.54a.48.48 0 00-.48-.41h-3.84a.48.48 0 00-.48.41l-.36 2.54a7.04 7.04 0 00-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87a.48.48 0 00.12.61l2.03 1.58a7.07 7.07 0 000 1.88l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32a.49.49 0 00.59.22l2.39-.96c.5.38 1.04.7 1.62.94l.36 2.54c.05.24.26.41.48.41h3.84c.23 0 .43-.17.48-.41l.36-2.54a7.04 7.04 0 001.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 00-.12-.61l-2.03-1.58zM12 15.5A3.5 3.5 0 1115.5 12 3.5 3.5 0 0112 15.5z"/></svg>
</button>

<!-- Toast -->
<div class="toast" id="toast"></div>

<main class="app">
  <header class="header">
    <h1>Pomodoro</h1>
    <p>Stay focused. Stay sharp.</p>
  </header>

  <!-- Mode tabs -->
  <nav class="mode-tabs" role="tablist" aria-label="Timer mode">
    <button class="mode-tab active" role="tab" data-mode="work" aria-selected="true">Work</button>
    <button class="mode-tab" role="tab" data-mode="shortBreak" aria-selected="false">Short Break</button>
    <button class="mode-tab" role="tab" data-mode="longBreak" aria-selected="false">Long Break</button>
  </nav>

  <!-- Timer ring -->
  <div class="timer-container" id="timerContainer">
    <div class="timer-ring-bg"></div>
    <div class="timer-ticks" id="timerTicks"></div>
    <svg class="timer-svg" viewBox="0 0 300 300">
      <circle class="timer-track" cx="150" cy="150" r="140"/>
      <circle class="timer-progress" id="timerProgress" cx="150" cy="150" r="140"
        stroke-dasharray="879.65" stroke-dashoffset="0"/>
    </svg>
    <div class="timer-text">
      <span class="timer-time" id="timerDisplay">25:00</span>
      <span class="timer-label" id="timerModeLabel">Work</span>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-secondary" id="btnReset" aria-label="Reset timer">
      <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.96 7.96 0 0012 4C7.58 4 4.01 7.58 4.01 12S7.58 20 12 20c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
    </button>
    <button class="btn btn-main" id="btnStartPause" aria-label="Start timer">
      <svg viewBox="0 0 24 24" id="iconPlay"><polygon points="8,5 20,12 8,19"/></svg>
      <svg viewBox="0 0 24 24" id="iconPause" style="display:none"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
    </button>
    <button class="btn btn-secondary" id="btnSkip" aria-label="Skip to next session">
      <svg viewBox="0 0 24 24"><polygon points="6,5 16,12 6,19"/><rect x="16" y="5" width="3" height="14" rx="1"/></svg>
    </button>
  </div>

  <!-- Session counter -->
  <div class="sessions">
    <span class="sessions-label">Sessions</span>
    <div class="session-dots" id="sessionDots">
      <div class="session-dot"></div>
      <div class="session-dot"></div>
      <div class="session-dot"></div>
      <div class="session-dot"></div>
    </div>
    <span class="session-count" id="sessionCount">0</span>
  </div>
</main>

<!-- Settings overlay -->
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-panel" role="dialog" aria-label="Timer settings">
    <div class="settings-title">
      <span>Settings</span>
      <button class="settings-close" id="settingsClose" aria-label="Close settings">&times;</button>
    </div>
    <div class="setting-row">
      <label class="setting-label" for="setWork">
        Work Duration
        <small>Minutes (1–90)</small>
      </label>
      <input class="setting-input" type="number" id="setWork" min="1" max="90" value="25">
    </div>
    <div class="setting-row">
      <label class="setting-label" for="setShort">
        Short Break
        <small>Minutes (1–30)</small>
      </label>
      <input class="setting-input" type="number" id="setShort" min="1" max="30" value="5">
    </div>
    <div class="setting-row">
      <label class="setting-label" for="setLong">
        Long Break
        <small>Minutes (1–60)</small>
      </label>
      <input class="setting-input" type="number" id="setLong" min="1" max="60" value="15">
    </div>
    <div class="setting-row">
      <label class="setting-label" for="setLongInterval">
        Long Break After
        <small>Sessions (1–10)</small>
      </label>
      <input class="setting-input" type="number" id="setLongInterval" min="1" max="10" value="4">
    </div>
    <button class="settings-save" id="settingsSave">Save Settings</button>
  </div>
</div>

<script>
  /* ── State ── */
  const CIRCUMFERENCE = 2 * Math.PI * 140; // ~879.65

  let config = {
    work: 25,
    shortBreak: 5,
    longBreak: 15,
    longBreakInterval: 4
  };

  let state = {
    mode: 'work',           // 'work' | 'shortBreak' | 'longBreak'
    totalSeconds: config.work * 60,
    remainingSeconds: config.work * 60,
    running: false,
    intervalId: null,
    sessionsCompleted: 0
  };

  /* ── DOM refs ── */
  const timerDisplay = document.getElementById('timerDisplay');
  const timerModeLabel = document.getElementById('timerModeLabel');
  const timerProgress = document.getElementById('timerProgress');
  const timerContainer = document.getElementById('timerContainer');
  const btnStartPause = document.getElementById('btnStartPause');
  const btnReset = document.getElementById('btnReset');
  const btnSkip = document.getElementById('btnSkip');
  const iconPlay = document.getElementById('iconPlay');
  const iconPause = document.getElementById('iconPause');
  const sessionDots = document.getElementById('sessionDots');
  const sessionCount = document.getElementById('sessionCount');
  const modeTabs = document.querySelectorAll('.mode-tab');
  const settingsOverlay = document.getElementById('settingsOverlay');
  const settingsToggle = document.getElementById('settingsToggle');
  const settingsClose = document.getElementById('settingsClose');
  const settingsSave = document.getElementById('settingsSave');
  const toastEl = document.getElementById('toast');

  /* ── Generate tick marks ── */
  (function generateTicks() {
    const container = document.getElementById('timerTicks');
    for (let i = 0; i < 60; i++) {
      const tick = document.createElement('div');
      tick.className = 'tick' + (i % 5 === 0 ? ' major' : '');
      tick.style.transform = `rotate(${i * 6}deg)`;
      container.appendChild(tick);
    }
  })();

  /* ── Accent colors per mode ── */
  const modeColors = {
    work:       { accent: 'var(--accent)',      glow: 'var(--accent-glow)'      },
    shortBreak: { accent: 'var(--break-accent)', glow: 'var(--break-glow)'      },
    longBreak:  { accent: 'var(--long-accent)',  glow: 'var(--long-glow)'       }
  };

  function applyModeColors(mode) {
    const r = document.documentElement;
    const c = modeColors[mode];
    r.style.setProperty('--current-accent', c.accent);
    r.style.setProperty('--current-glow', c.glow);
  }

  /* ── Helpers ── */
  function formatTime(seconds) {
    const m = Math.floor(seconds / 60).toString().padStart(2, '0');
    const s = (seconds % 60).toString().padStart(2, '0');
    return `${m}:${s}`;
  }

  function setProgress(fraction) {
    // fraction: 0 (empty) → 1 (full)
    const offset = CIRCUMFERENCE * (1 - fraction);
    timerProgress.style.strokeDashoffset = offset;
  }

  function updateDisplay() {
    timerDisplay.textContent = formatTime(state.remainingSeconds);
    const fraction = state.totalSeconds > 0 ? state.remainingSeconds / state.totalSeconds : 0;
    setProgress(fraction);
  }

  function updateSessionDots() {
    const interval = config.longBreakInterval;
    // Rebuild dots
    sessionDots.innerHTML = '';
    for (let i = 0; i < interval; i++) {
      const dot = document.createElement('div');
      dot.className = 'session-dot';
      // Fill dots based on sessions completed within current cycle
      const cycleSession = state.sessionsCompleted % interval;
      if (i < cycleSession) {
        dot.classList.add('filled');
      }
      sessionDots.appendChild(dot);
    }
    sessionCount.textContent = state.sessionsCompleted;
  }

  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(() => toastEl.classList.remove('show'), 2500);
  }

  /* ── Audio beep via Web Audio API ── */
  function playBeep() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();

      // Play a pleasant two-tone chime
      const notes = [523.25, 659.25, 783.99]; // C5, E5, G5
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.18);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.18 + 0.5);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(ctx.currentTime + i * 0.18);
        osc.stop(ctx.currentTime + i * 0.18 + 0.5);
      });
    } catch (e) {
      // Fallback: no audio
    }
  }

  /* ── Timer logic ── */
  function setMode(mode, autoStarted) {
    if (state.running) {
      clearInterval(state.intervalId);
      state.running = false;
    }

    state.mode = mode;

    // Determine seconds
    let mins;
    if (mode === 'work') mins = config.work;
    else if (mode === 'shortBreak') mins = config.shortBreak;
    else mins = config.longBreak;

    state.totalSeconds = mins * 60;
    state.remainingSeconds = state.totalSeconds;

    // Update UI
    applyModeColors(mode);
    updateDisplay();
    updatePlayPauseIcon();

    const labels = { work: 'Work', shortBreak: 'Short Break', longBreak: 'Long Break' };
    timerModeLabel.textContent = labels[mode];

    // Update tabs
    modeTabs.forEach(tab => {
      const isActive = tab.dataset.mode === mode;
      tab.classList.toggle('active', isActive);
      tab.setAttribute('aria-selected', isActive);
    });

    timerContainer.classList.remove('running');

    if (autoStarted) {
      startTimer();
    }
  }

  function startTimer() {
    if (state.running) return;
    state.running = true;
    timerContainer.classList.add('running');
    updatePlayPauseIcon();

    state.intervalId = setInterval(() => {
      state.remainingSeconds--;

      if (state.remainingSeconds <= 0) {
        state.remainingSeconds = 0;
        updateDisplay();
        clearInterval(state.intervalId);
        state.running = false;
        timerContainer.classList.remove('running');
        playBeep();
        onTimerComplete();
        return;
      }

      updateDisplay();
    }, 1000);
  }

  function pauseTimer() {
    if (!state.running) return;
    clearInterval(state.intervalId);
    state.running = false;
    timerContainer.classList.remove('running');
    updatePlayPauseIcon();
  }

  function resetTimer() {
    clearInterval(state.intervalId);
    state.running = false;
    timerContainer.classList.remove('running');

    let mins;
    if (state.mode === 'work') mins = config.work;
    else if (state.mode === 'shortBreak') mins = config.shortBreak;
    else mins = config.longBreak;

    state.totalSeconds = mins * 60;
    state.remainingSeconds = state.totalSeconds;
    updateDisplay();
    updatePlayPauseIcon();
  }

  function updatePlayPauseIcon() {
    if (state.running) {
      iconPlay.style.display = 'none';
      iconPause.style.display = 'block';
      btnStartPause.setAttribute('aria-label', 'Pause timer');
    } else {
      iconPlay.style.display = 'block';
      iconPause.style.display = 'none';
      btnStartPause.setAttribute('aria-label', 'Start timer');
    }
  }

  function onTimerComplete() {
    if (state.mode === 'work') {
      state.sessionsCompleted++;
      updateSessionDots();

      // Check if we should take a long break
      if (state.sessionsCompleted % config.longBreakInterval === 0) {
        showToast('Great work! Time for a long break.');
        setMode('longBreak', true);
      } else {
        showToast('Session complete! Take a short break.');
        setMode('shortBreak', true);
      }
    } else {
      showToast('Break over. Let\'s focus!');
      setMode('work', true);
    }
  }

  /* ── Event listeners ── */
  btnStartPause.addEventListener('click', () => {
    if (state.running) {
      pauseTimer();
    } else {
      startTimer();
    }
  });

  btnReset.addEventListener('click', () => {
    resetTimer();
  });

  btnSkip.addEventListener('click', () => {
    // Skip to next phase manually
    if (state.mode === 'work') {
      // Don't count as completed session
      setMode('shortBreak');
    } else {
      setMode('work');
    }
  });

  modeTabs.forEach(tab => {
    tab.addEventListener('click', () => {
      setMode(tab.dataset.mode);
    });
  });

  /* ── Settings ── */
  settingsToggle.addEventListener('click', () => {
    document.getElementById('setWork').value = config.work;
    document.getElementById('setShort').value = config.shortBreak;
    document.getElementById('setLong').value = config.longBreak;
    document.getElementById('setLongInterval').value = config.longBreakInterval;
    settingsOverlay.classList.add('open');
  });

  settingsClose.addEventListener('click', () => {
    settingsOverlay.classList.remove('open');
  });

  settingsOverlay.addEventListener('click', (e) => {
    if (e.target === settingsOverlay) {
      settingsOverlay.classList.remove('open');
    }
  });

  settingsSave.addEventListener('click', () => {
    const w = Math.max(1, Math.min(90, parseInt(document.getElementById('setWork').value) || 25));
    const s = Math.max(1, Math.min(30, parseInt(document.getElementById('setShort').value) || 5));
    const l = Math.max(1, Math.min(60, parseInt(document.getElementById('setLong').value) || 15));
    const li = Math.max(1, Math.min(10, parseInt(document.getElementById('setLongInterval').value) || 4));

    config.work = w;
    config.shortBreak = s;
    config.longBreak = l;
    config.longBreakInterval = li;

    // Reset current timer with new durations
    resetTimer();
    updateSessionDots();
    settingsOverlay.classList.remove('open');
    showToast('Settings saved');
  });

  // Keyboard: Escape closes settings, Space toggles timer
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      settingsOverlay.classList.remove('open');
    }
    if (e.key === ' ' && !settingsOverlay.classList.contains('open')) {
      e.preventDefault();
      if (state.running) pauseTimer();
      else startTimer();
    }
  });

  /* ── Initial render ── */
  applyModeColors('work');
  updateDisplay();
  updateSessionDots();
  updatePlayPauseIcon();
  timerProgress.style.strokeDasharray = CIRCUMFERENCE;
</script>
</body>
</html>
