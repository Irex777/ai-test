<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Flow - Pomodoro Timer</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent-work: #ff6b6b;
            --accent-short: #4ecdc4;
            --accent-long: #ffe66d;
            --transition-speed: 0.3s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            transition: background-color var(--transition-speed);
        }

        /* App Container */
        .app-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        /* Mode Switcher */
        .mode-container {
            display: flex;
            background-color: var(--surface-color);
            border-radius: 50px;
            padding: 5px;
            margin-bottom: 30px;
            position: relative;
        }

        .mode-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            z-index: 2;
        }

        .mode-btn.active {
            color: var(--bg-color);
            background-color: var(--current-accent);
        }

        /* Timer Ring */
        .timer-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }

        circle {
            fill: none;
            stroke-width: 8;
            stroke-linecap: round;
        }

        .track-bg {
            stroke: var(--surface-color);
        }

        .track-progress {
            stroke: var(--current-accent);
            stroke-dasharray: 880; /* 2 * PI * r (approx 140) */
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear, stroke 0.3s ease;
        }

        .timer-display {
            position: absolute;
            text-align: center;
        }

        .time-text {
            font-size: 4rem;
            font-weight: bold;
            font-variant-numeric: tabular-nums;
        }

        .session-text {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .btn {
            background-color: var(--surface-color);
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            padding: 15px;
            border-radius: 50%;
            transition: transform 0.1s, background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .btn:hover {
            background-color: #2c2c2c;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-main {
            width: 80px;
            height: 80px;
            background-color: var(--current-accent);
            color: var(--bg-color);
        }

        .btn-main:hover {
            background-color: var(--current-accent);
            opacity: 0.9;
        }

        /* Settings Modal */
        .settings-btn {
            margin-top: 30px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.5rem;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 10;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background-color: var(--surface-color);
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 350px;
            transform: translateY(20px);
            transition: transform 0.3s;
        }

        .modal-overlay.open .modal {
            transform: translateY(0);
        }

        .modal h2 {
            margin-bottom: 20px;
            color: var(--current-accent);
        }

        .setting-item {
            margin-bottom: 15px;
        }

        .setting-item label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-secondary);
        }

        .setting-item input {
            width: 100%;
            padding: 10px;
            background: var(--bg-color);
            border: 1px solid #333;
            color: var(--text-primary);
            border-radius: 5px;
            font-size: 1rem;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .save-btn {
            background-color: var(--current-accent);
            color: var(--bg-color);
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Dynamic Accent Handling */
        .theme-work { --current-accent: var(--accent-work); }
        .theme-short { --current-accent: var(--accent-short); }
        .theme-long { --current-accent: var(--accent-long); }

    </style>
</head>
<body class="theme-work">

    <div class="app-container">
        <!-- Mode Switcher -->
        <div class="mode-container">
            <button class="mode-btn active" id="btn-work" onclick="switchMode('work')">Work</button>
            <button class="mode-btn" id="btn-short" onclick="switchMode('short')">Short Break</button>
            <button class="mode-btn" id="btn-long" onclick="switchMode('long')">Long Break</button>
        </div>

        <!-- Timer Display -->
        <div class="timer-wrapper">
            <svg>
                <circle class="track-bg" cx="150" cy="150" r="140"></circle>
                <circle class="track-progress" id="progress-ring" cx="150" cy="150" r="140"></circle>
            </svg>
            <div class="timer-display">
                <div class="time-text" id="time-display">25:00</div>
                <div class="session-text" id="session-label">Ready to Focus</div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="btn" onclick="resetTimer()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 12" /><path d="M3 3v9h9" /></svg>
            </button>
            <button class="btn btn-main" id="play-pause-btn" onclick="toggleTimer()">
                <svg id="icon-play" width="32" height="32" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                <svg id="icon-pause" width="32" height="32" viewBox="0 0 24 24" fill="currentColor" stroke="none" style="display:none;"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
            </button>
            <button class="btn" onclick="skipTimer()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>
            </button>
        </div>

        <!-- Settings Icon -->
        <button class="settings-btn" onclick="openSettings()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal">
            <h2>Timer Settings (min)</h2>
            <div class="setting-item">
                <label>Work Duration</label>
                <input type="number" id="set-work" value="25" min="1" max="60">
            </div>
            <div class="setting-item">
                <label>Short Break</label>
                <input type="number" id="set-short" value="5" min="1" max="30">
            </div>
            <div class="setting-item">
                <label>Long Break</label>
                <input type="number" id="set-long" value="15" min="1" max="60">
            </div>
            <div class="modal-actions">
                <button class="save-btn" onclick="saveSettings()">Save & Reset</button>
            </div>
        </div>
    </div>

    <script>
        // --- Configuration & State ---
        const CIRCUMFERENCE = 2 * Math.PI * 140; // 879.64
        
        let config = {
            work: 25 * 60,
            short: 5 * 60,
            long: 15 * 60
        };

        let state = {
            mode: 'work', // 'work', 'short', 'long'
            timeLeft: config.work,
            totalTime: config.work,
            isRunning: false,
            sessionsCompleted: 0,
            timerId: null
        };

        // --- DOM Elements ---
        const els = {
            body: document.body,
            timeDisplay: document.getElementById('time-display'),
            sessionLabel: document.getElementById('session-label'),
            ring: document.getElementById('progress-ring'),
            playIcon: document.getElementById('icon-play'),
            pauseIcon: document.getElementById('icon-pause'),
            btns: {
                work: document.getElementById('btn-work'),
                short: document.getElementById('btn-short'),
                long: document.getElementById('btn-long'),
            },
            modal: document.getElementById('settings-modal'),
            inputs: {
                work: document.getElementById('set-work'),
                short: document.getElementById('set-short'),
                long: document.getElementById('set-long'),
            }
        };

        // --- Initialization ---
        els.ring.style.strokeDasharray = `${CIRCUMFERENCE} ${CIRCUMFERENCE}`;
        els.ring.style.strokeDashoffset = 0;

        // --- Core Timer Logic ---

        function toggleTimer() {
            if (state.isRunning) {
                pauseTimer();
            } else {
                startTimer();
            }
        }

        function startTimer() {
            state.isRunning = true;
            updatePlayPauseIcon();
            
            state.timerId = setInterval(() => {
                state.timeLeft--;
                updateUI();

                if (state.timeLeft <= 0) {
                    handleTimerComplete();
                }
            }, 1000);
        }

        function pauseTimer() {
            state.isRunning = false;
            clearInterval(state.timerId);
            updatePlayPauseIcon();
        }

        function resetTimer() {
            pauseTimer();
            state.timeLeft = config[state.mode];
            state.totalTime = config[state.mode];
            updateUI();
        }

        function switchMode(newMode) {
            pauseTimer();
            state.mode = newMode;
            state.timeLeft = config[newMode];
            state.totalTime = config[newMode];
            
            // Update UI classes
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            els.btns[newMode].classList.add('active');
            
            // Update Theme
            els.body.className = `theme-${newMode}`;
            
            // Update Label
            const labels = {
                work: "Ready to Focus",
                short: "Short Break",
                long: "Long Break"
            };
            els.sessionLabel.textContent = labels[newMode];

            updateUI();
        }

        function skipTimer() {
            handleTimerComplete();
        }

        function handleTimerComplete() {
            pauseTimer();
            playNotificationSound();
            
            // Logic for auto-switching
            if (state.mode === 'work') {
                state.sessionsCompleted++;
                // Standard Pomodoro: 4 work sessions = 1 long break, otherwise short
                if (state.sessionsCompleted % 4 === 0) {
                    switchMode('long');
                } else {
                    switchMode('short');
                }
            } else {
                switchMode('work');
            }
        }

        // --- UI Updates ---

        function updateUI() {
            // Update Text
            const minutes = Math.floor(state.timeLeft / 60);
            const seconds = state.timeLeft % 60;
            els.timeDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            // Update Ring
            // Calculate offset: 0 offset = full circle, circumference offset = empty
            const offset = CIRCUMFERENCE - (state.timeLeft / state.totalTime) * CIRCUMFERENCE;
            els.ring.style.strokeDashoffset = offset;

            // Update Title
            document.title = `${els.timeDisplay.textContent} - Pomodoro`;
        }

        function updatePlayPauseIcon() {
            if (state.isRunning) {
                els.playIcon.style.display = 'none';
                els.pauseIcon.style.display = 'block';
            } else {
                els.playIcon.style.display = 'block';
                els.pauseIcon.style.display = 'none';
            }
        }

        // --- Audio (Web Audio API) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playNotificationSound() {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // A5
            oscillator.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.5);

            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.5);
        }

        // --- Settings Modal ---

        function openSettings() {
            els.inputs.work.value = Math.floor(config.work / 60);
            els.inputs.short.value = Math.floor(config.short / 60);
            els.inputs.long.value = Math.floor(config.long / 60);
            els.modal.classList.add('open');
        }

        function saveSettings() {
            const workVal = parseInt(els.inputs.work.value) * 60;
            const shortVal = parseInt(els.inputs.short.value) * 60;
            const longVal = parseInt(els.inputs.long.value) * 60;

            if (workVal > 0 && shortVal > 0 && longVal > 0) {
                config.work = workVal;
                config.short = shortVal;
                config.long = longVal;
                
                els.modal.classList.remove('open');
                resetTimer(); // Reset current timer to new duration
            } else {
                alert("Please enter valid numbers greater than 0.");
            }
        }

        // Close modal on outside click
        els.modal.addEventListener('click', (e) => {
            if (e.target === els.modal) {
                els.modal.classList.remove('open');
            }
        });

        // Initial UI render
        updateUI();

    </script>
</body>
</html>
