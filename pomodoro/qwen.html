<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Flow - Pomodoro Timer</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            
            --color-work: #ff6b6b;
            --color-short: #4ecdc4;
            --color-long: #45b7d1;
            
            --current-color: var(--color-work);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            transition: color 0.3s ease, background-color 0.3s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Layout */
        .app-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        /* Mode Switcher */
        .modes {
            display: flex;
            gap: 10px;
            margin-bottom: 40px;
            background: var(--surface-color);
            padding: 5px;
            border-radius: 30px;
        }

        .mode-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .mode-btn.active {
            background-color: var(--current-color);
            color: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Timer Circle */
        .timer-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin-bottom: 40px;
        }

        svg.progress-ring {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        circle {
            fill: none;
            stroke-width: 8;
            stroke-linecap: round;
        }

        .ring-bg {
            stroke: var(--surface-color);
        }

        .ring-fg {
            stroke: var(--current-color);
            transition: stroke-dashoffset 0.35s;
            filter: drop-shadow(0 0 4px var(--current-color));
        }

        .time-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .time-text {
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .session-count {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 30px;
        }

        .btn {
            background: var(--surface-color);
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, background-color 0.2s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-main {
            width: 70px;
            height: 70px;
            background-color: var(--current-color);
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        .btn-main svg {
            fill: white;
            width: 28px;
            height: 28px;
            margin-left: 4px; /* Optical centering for play icon */
        }
        
        .btn-main.paused svg {
            margin-left: 0;
        }

        .btn-secondary {
            width: 45px;
            height: 45px;
        }

        .btn-secondary svg {
            fill: var(--text-secondary);
            width: 20px;
            height: 20px;
        }

        /* Settings Panel */
        .settings-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: transparent;
            border: none;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        .settings-btn:hover { opacity: 1; }
        .settings-btn svg { fill: var(--text-primary); width: 24px; height: 24px; }

        .settings-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 100;
        }

        .settings-modal.open {
            opacity: 1;
            pointer-events: auto;
        }

        .settings-content {
            background: var(--surface-color);
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .settings-group {
            margin-bottom: 15px;
        }

        .settings-label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .settings-input {
            width: 100%;
            background: var(--bg-color);
            border: 1px solid #333;
            color: var(--text-primary);
            padding: 10px;
            border-radius: 5px;
            font-size: 1rem;
        }

        .close-settings {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* SVG Icons */
        .icon-play { width: 32px; height: 32px; fill: white; }
        .icon-pause { width: 32px; height: 32px; fill: white; }
        .icon-reset { width: 24px; height: 24px; fill: var(--text-secondary); }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Mode Selectors -->
        <div class="modes">
            <button class="mode-btn active" id="mode-work" onclick="switchMode('work')">Work</button>
            <button class="mode-btn" id="mode-short" onclick="switchMode('short')">Short Break</button>
            <button class="mode-btn" id="mode-long" onclick="switchMode('long')">Long Break</button>
        </div>

        <!-- Timer Display -->
        <div class="timer-container">
            <svg class="progress-ring" width="300" height="300">
                <circle class="ring-bg" cx="150" cy="150" r="140"></circle>
                <circle class="ring-fg" cx="150" cy="150" r="140" id="progress-ring"></circle>
            </svg>
            <div class="time-display">
                <div class="time-text" id="time-display">25:00</div>
                <div class="session-count" id="session-display">Session 1</div>
            </div>
        </div>

        <!-- Main Controls -->
        <div class="controls">
            <button class="btn btn-secondary" onclick="resetTimer()">
                <svg viewBox="0 0 24 24">
                    <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                </svg>
            </button>
            
            <button class="btn btn-main" id="play-btn" onclick="toggleTimer()">
                <!-- Play Icon -->
                <svg id="icon-play" viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z"/>
                </svg>
                <!-- Pause Icon (Hidden by default) -->
                <svg id="icon-pause" viewBox="0 0 24 24" style="display: none;">
                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                </svg>
            </button>

            <button class="btn btn-secondary" onclick="skipPhase()">
                <svg viewBox="0 0 24 24">
                    <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Settings Button -->
    <button class="settings-btn" onclick="toggleSettings()">
        <svg viewBox="0 0 24 24">
            <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
        </svg>
    </button>

    <!-- Settings Modal -->
    <div class="settings-modal" id="settings-modal">
        <div class="settings-content">
            <div class="settings-header">
                <h3>Settings</h3>
                <button class="close-settings" onclick="toggleSettings()">&times;</button>
            </div>
            <div class="settings-group">
                <label class="settings-label">Work Duration (min)</label>
                <input type="number" id="set-work" class="settings-input" value="25">
            </div>
            <div class="settings-group">
                <label class="settings-label">Short Break (min)</label>
                <input type="number" id="set-short" class="settings-input" value="5">
            </div>
            <div class="settings-group">
                <label class="settings-label">Long Break (min)</label>
                <input type="number" id="set-long" class="settings-input" value="15">
            </div>
            <button class="btn-main" style="width: 100%; border-radius: 8px; height: auto; padding: 15px; margin-top: 10px;" onclick="saveSettings()">Save</button>
        </div>
    </div>

    <script>
        // State
        let timer;
        let isRunning = false;
        let timeLeft = 25 * 60;
        let currentMode = 'work'; // 'work', 'short', 'long'
        let sessions = 1;
        
        // Configuration (Minutes)
        let durations = {
            work: 25,
            short: 5,
            long: 15
        };

        // DOM Elements
        const timeDisplay = document.getElementById('time-display');
        const sessionDisplay = document.getElementById('session-display');
        const playBtn = document.getElementById('play-btn');
        const iconPlay = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');
        const circle = document.getElementById('progress-ring');
        const root = document.documentElement;

        // SVG Circle Setup
        const radius = circle.r.baseVal.value;
        const circumference = radius * 2 * Math.PI;
        
        circle.style.strokeDasharray = `${circumference} ${circumference}`;
        circle.style.strokeDashoffset = 0;

        // Audio Context
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // --- Core Functions ---

        function playSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // A5
            oscillator.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.5);
            
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.6);
        }

        function setProgress(percent) {
            const offset = circumference - (percent / 100) * circumference;
            circle.style.strokeDashoffset = offset;
        }

        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timeDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            // Update Ring
            const totalTime = durations[currentMode] * 60;
            const percent = (timeLeft / totalTime) * 100;
            setProgress(percent);

            // Update Title
            document.title = `${timeDisplay.textContent} - ${currentMode === 'work' ? 'Focus' : 'Break'}`;
        }

        function switchMode(mode) {
            if(isRunning) return; // Prevent switching while running
            currentMode = mode;
            
            // Update UI Colors
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`mode-${mode}`).classList.add('active');

            // Update CSS Variable for color
            let colorVar;
            if(mode === 'work') colorVar = '--color-work';
            else if(mode === 'short') colorVar = '--color-short';
            else colorVar = '--color-long';
            
            root.style.setProperty('--current-color', `var(${colorVar})`);
            
            resetTimer();
        }

        function toggleTimer() {
            if (isRunning) {
                pauseTimer();
            } else {
                startTimer();
            }
        }

        function startTimer() {
            isRunning = true;
            iconPlay.style.display = 'none';
            iconPause.style.display = 'block';
            playBtn.classList.add('paused');

            timer = setInterval(() => {
                timeLeft--;
                updateDisplay();

                if (timeLeft < 0) {
                    completeTimer();
                }
            }, 1000);
        }

        function pauseTimer() {
            isRunning = false;
            clearInterval(timer);
            iconPlay.style.display = 'block';
            iconPause.style.display = 'none';
            playBtn.classList.remove('paused');
        }

        function resetTimer() {
            pauseTimer();
            timeLeft = durations[currentMode] * 60;
            updateDisplay();
        }

        function skipPhase() {
            pauseTimer();
            completeTimer();
        }

        function completeTimer() {
            pauseTimer();
            playSound();
            
            if (currentMode === 'work') {
                sessions++;
                sessionDisplay.textContent = `Session ${sessions}`;
                
                // Auto-switch logic
                if (sessions % 4 === 0) {
                    switchMode('long');
                } else {
                    switchMode('short');
                }
            } else {
                switchMode('work');
            }
        }

        // --- Settings Logic ---

        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            if (modal.classList.contains('open')) {
                modal.classList.remove('open');
            } else {
                modal.classList.add('open');
            }
        }

        function saveSettings() {
            const workVal = parseInt(document.getElementById('set-work').value);
            const shortVal = parseInt(document.getElementById('set-short').value);
            const longVal = parseInt(document.getElementById('set-long').value);

            if (workVal > 0 && shortVal > 0 && longVal > 0) {
                durations.work = workVal;
                durations.short = shortVal;
                durations.long = longVal;
                
                toggleSettings();
                resetTimer();
            } else {
                alert("Please enter valid positive numbers.");
            }
        }

        // Initialize
        updateDisplay();
    </script>
</body>
</html>
