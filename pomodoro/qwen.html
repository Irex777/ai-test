<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Focus Timer</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-work: #ff5f5f;
            --accent-short: #4cd964;
            --accent-long: #5ac8fa;
            --ring-track: #333;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            transition: background-color 0.3s;
        }

        .app-container {
            background-color: var(--surface-color);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 350px;
            text-align: center;
            position: relative;
        }

        /* Mode Switcher */
        .mode-switch {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 2rem;
            background: var(--bg-color);
            padding: 5px;
            border-radius: 30px;
        }

        .mode-btn {
            background: transparent;
            border: none;
            color: #777;
            padding: 8px 16px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .mode-btn.active {
            background-color: var(--surface-color);
            color: var(--text-color);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* Timer Ring */
        .timer-container {
            position: relative;
            width: 250px;
            height: 250px;
            margin: 0 auto 2rem;
        }

        .progress-ring {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }

        .progress-ring__circle {
            transition: stroke-dashoffset 0.35s;
            transform-origin: 50% 50%;
            stroke-width: 8;
            fill: transparent;
        }

        .progress-ring__bg {
            stroke: var(--ring-track);
            stroke-width: 8;
            fill: transparent;
        }

        .time-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.5rem;
            font-weight: bold;
            font-variant-numeric: tabular-nums;
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 1.5rem;
        }

        .control-btn {
            border: none;
            background: none;
            cursor: pointer;
            color: var(--text-color);
            border: 2px solid var(--text-color);
            padding: 10px 25px;
            border-radius: 8px;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        .control-btn:hover {
            background-color: rgba(255,255,255,0.1);
        }

        .control-btn.primary {
            background-color: var(--text-color);
            color: var(--bg-color);
        }

        .control-btn.primary:hover {
            opacity: 0.9;
        }

        /* Session Counter */
        .session-info {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 1rem;
        }

        /* Settings */
        .settings-toggle {
            background: none;
            border: none;
            color: #555;
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 1rem;
        }
        
        .settings-toggle:hover { color: #888; }

        .settings-panel {
            display: none;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #333;
            text-align: left;
        }

        .settings-panel.open { display: block; }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .setting-row label { font-size: 0.9rem; color: #aaa; }
        
        .setting-row input {
            background: var(--bg-color);
            border: 1px solid #444;
            color: white;
            padding: 5px;
            border-radius: 4px;
            width: 50px;
            text-align: center;
        }

        /* Dynamic Colors based on Mode */
        .mode-work .progress-ring__circle { stroke: var(--accent-work); }
        .mode-work .mode-btn.active { color: var(--accent-work); }
        
        .mode-short .progress-ring__circle { stroke: var(--accent-short); }
        .mode-short .mode-btn.active { color: var(--accent-short); }
        
        .mode-long .progress-ring__circle { stroke: var(--accent-long); }
        .mode-long .mode-btn.active { color: var(--accent-long); }

    </style>
</head>
<body>

<div class="app-container mode-work" id="app">
    <!-- Mode Switcher -->
    <div class="mode-switch">
        <button class="mode-btn active" onclick="switchMode('work')">Pomodoro</button>
        <button class="mode-btn" onclick="switchMode('short')">Short Break</button>
        <button class="mode-btn" onclick="switchMode('long')">Long Break</button>
    </div>

    <!-- Timer Display -->
    <div class="timer-container">
        <svg class="progress-ring" width="250" height="250">
            <circle class="progress-ring__bg" cx="125" cy="125" r="110" />
            <circle class="progress-ring__circle" cx="125" cy="125" r="110" stroke-dasharray="691.15" stroke-dashoffset="0" id="progress-ring" />
        </svg>
        <div class="time-display" id="time-display">25:00</div>
    </div>

    <!-- Controls -->
    <div class="controls">
        <button class="control-btn primary" id="start-pause-btn" onclick="toggleTimer()">START</button>
        <button class="control-btn" onclick="resetTimer()">RESET</button>
    </div>

    <!-- Session Counter -->
    <div class="session-info">
        Sessions Completed: <span id="session-count">0</span>
    </div>

    <!-- Settings -->
    <button class="settings-toggle" onclick="toggleSettings()">⚙ Settings</button>
    <div class="settings-panel" id="settings-panel">
        <div class="setting-row">
            <label>Work (min)</label>
            <input type="number" id="input-work" value="25" min="1" max="60">
        </div>
        <div class="setting-row">
            <label>Short Break (min)</label>
            <input type="number" id="input-short" value="5" min="1" max="30">
        </div>
        <div class="setting-row">
            <label>Long Break (min)</label>
            <input type="number" id="input-long" value="15" min="1" max="60">
        </div>
        <div class="setting-row">
            <label>Long Break Interval</label>
            <input type="number" id="input-interval" value="4" min="2" max="10">
        </div>
    </div>
</div>

<script>
    // Configuration & State
    const state = {
        mode: 'work', // 'work', 'short', 'long'
        timeLeft: 25 * 60,
        totalTime: 25 * 60,
        isRunning: false,
        intervalId: null,
        sessions: 0,
        settings: {
            work: 25,
            short: 5,
            long: 15,
            interval: 4 // Long break every 4 sessions
        }
    };

    // DOM Elements
    const els = {
        app: document.getElementById('app'),
        display: document.getElementById('time-display'),
        ring: document.getElementById('progress-ring'),
        btn: document.getElementById('start-pause-btn'),
        sessionCount: document.getElementById('session-count'),
        inputs: {
            work: document.getElementById('input-work'),
            short: document.getElementById('input-short'),
            long: document.getElementById('input-long'),
            interval: document.getElementById('input-interval')
        },
        settingsPanel: document.getElementById('settings-panel')
    };

    // Constants
    const CIRCLE_RADIUS = 110;
    const CIRCLE_CIRCUMFERENCE = 2 * Math.PI * CIRCLE_RADIUS;

    // Audio Context (Web Audio API)
    let audioCtx = null;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function playNotificationSound() {
        initAudio();
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }

        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // A5
        oscillator.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.5);

        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);

        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.5);
    }

    // Core Logic
    function updateDisplay() {
        const minutes = Math.floor(state.timeLeft / 60);
        const seconds = state.timeLeft % 60;
        els.display.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        
        // Update Ring
        const offset = CIRCLE_CIRCUMFERENCE - (state.timeLeft / state.totalTime) * CIRCLE_CIRCUMFERENCE;
        els.ring.style.strokeDashoffset = offset;
    }

    function toggleTimer() {
        initAudio(); // Initialize audio on first interaction
        if (state.isRunning) {
            pauseTimer();
        } else {
            startTimer();
        }
    }

    function startTimer() {
        if (state.isRunning) return;
        
        state.isRunning = true;
        els.btn.textContent = 'PAUSE';
        
        state.intervalId = setInterval(() => {
            state.timeLeft--;
            updateDisplay();

            if (state.timeLeft < 0) {
                completeTimer();
            }
        }, 1000);
    }

    function pauseTimer() {
        state.isRunning = false;
        els.btn.textContent = 'RESUME';
        clearInterval(state.intervalId);
    }

    function resetTimer() {
        pauseTimer();
        els.btn.textContent = 'START';
        state.timeLeft = state.settings[state.mode] * 60;
        state.totalTime = state.timeLeft;
        updateDisplay();
    }

    function completeTimer() {
        pauseTimer();
        playNotificationSound();
        els.btn.textContent = 'START';

        if (state.mode === 'work') {
            state.sessions++;
            els.sessionCount.textContent = state.sessions;
            
            // Check if Long Break is needed
            if (state.sessions % state.settings.interval === 0) {
                switchMode('long');
            } else {
                switchMode('short');
            }
        } else {
            // Break finished, go back to work
            switchMode('work');
        }
    }

    function switchMode(newMode) {
        pauseTimer();
        state.mode = newMode;
        
        // Update UI Theme
        els.app.className = `app-container mode-${newMode}`;
        
        // Update Buttons
        document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtnIndex = newMode === 'work' ? 0 : newMode === 'short' ? 1 : 2;
        document.querySelectorAll('.mode-btn')[activeBtnIndex].classList.add('active');

        // Reset Time
        state.timeLeft = state.settings[newMode] * 60;
        state.totalTime = state.timeLeft;
        els.btn.textContent = 'START';
        
        updateDisplay();
    }

    function toggleSettings() {
        els.settingsPanel.classList.toggle('open');
    }

    // Settings Handling
    Object.keys(els.inputs).forEach(key => {
        els.inputs[key].addEventListener('change', (e) => {
            let val = parseInt(e.target.value);
            if (val < 1) val = 1;
            state.settings[key] = val;
            
            // If we change the setting for the current mode, update the timer immediately
            if (key === state.mode) {
                resetTimer();
            }
        });
    });

    // Initialization
    els.ring.style.strokeDasharray = `${CIRCLE_CIRCUMFERENCE} ${CIRCLE_CIRCUMFERENCE}`;
    els.ring.style.strokeDashoffset = 0;
    updateDisplay();

</script>
</body>
</html>
