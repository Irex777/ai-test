<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Timer</title>
<style>
  :root {
    --bg: #0e1014;
    --card: #161a22;
    --card-2: #1e232e;
    --text: #e7eaf1;
    --muted: #8a90a0;
    --border: #2a2f3b;
    --work: #ff6b6b;
    --short: #38d9c4;
    --long: #6c9cff;
    --accent: var(--work);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(circle at 50% -10%, #1c2230 0%, var(--bg) 55%);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    transition: background 0.6s ease;
  }
  .app {
    width: 100%;
    max-width: 420px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 26px;
    padding: 30px 28px 28px;
    box-shadow: 0 30px 90px rgba(0,0,0,0.55);
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 22px;
  }
  .title { font-size: 19px; font-weight: 700; letter-spacing: 0.3px; }
  .title span { color: var(--accent); transition: color 0.5s ease; }
  .icon-btn {
    background: var(--card-2);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 40px; height: 40px;
    border-radius: 12px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
  }
  .icon-btn:hover { color: var(--text); border-color: var(--accent); transform: rotate(40deg); }

  .modes {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    background: var(--card-2);
    padding: 6px;
    border-radius: 14px;
    margin-bottom: 28px;
  }
  .mode-btn {
    border: none;
    background: transparent;
    color: var(--muted);
    padding: 10px 6px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
  }
  .mode-btn:hover { color: var(--text); }
  .mode-btn.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 6px 18px rgba(0,0,0,0.35);
  }

  .timer-wrap {
    position: relative;
    width: 280px; height: 280px;
    margin: 0 auto 28px;
  }
  .ring { transform: rotate(-90deg); display: block; }
  .ring-track { stroke: var(--card-2); }
  .ring-progress {
    stroke: var(--accent);
    stroke-linecap: round;
    transition: stroke-dashoffset 0.3s linear, stroke 0.5s ease, filter 0.5s ease;
    filter: drop-shadow(0 0 10px var(--accent));
  }
  .time-display {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .time {
    font-size: 66px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: -1.5px;
  }
  .status {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .controls { display: flex; gap: 12px; justify-content: center; margin-bottom: 26px; }
  .btn {
    border: none;
    cursor: pointer;
    font-weight: 600;
    border-radius: 14px;
    font-size: 15px;
    transition: transform 0.15s ease, filter 0.2s ease, border-color 0.2s ease, background 0.2s ease;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    padding: 14px 50px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
  }
  .btn-primary:hover { transform: translateY(-2px); filter: brightness(1.1); }
  .btn-primary:active { transform: translateY(0); }
  .btn-ghost {
    background: var(--card-2);
    color: var(--text);
    padding: 14px 26px;
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--accent); }

  .sessions {
    display: flex; align-items: center; justify-content: center;
    gap: 14px; color: var(--muted); font-size: 13px;
  }
  .dots { display: flex; gap: 8px; }
  .dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--card-2);
    border: 1px solid var(--border);
    transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
  }
  .dot.filled {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center; justify-content: center;
    z-index: 10;
    padding: 20px;
  }
  .overlay.active { display: flex; }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 26px;
    width: 100%;
    max-width: 380px;
    animation: pop 0.2s ease;
  }
  @keyframes pop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal h2 { font-size: 18px; margin-bottom: 18px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 7px; }
  .field input {
    width: 100%;
    background: var(--card-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 12px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s ease;
  }
  .field input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 12px; margin-top: 8px; }
  .modal-actions .btn { flex: 1; padding: 12px; }

  .hint { text-align: center; font-size: 11px; color: #555b69; margin-top: 14px; letter-spacing: 0.5px; }
  .hint kbd {
    background: var(--card-2); border: 1px solid var(--border);
    border-radius: 5px; padding: 1px 6px; font-family: inherit; color: var(--muted);
  }

  @media (max-width: 380px) {
    .time { font-size: 54px; }
    .timer-wrap { width: 240px; height: 240px; }
  }
</style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="title">Pomo<span>doro</span></div>
      <button class="icon-btn" id="settingsBtn" aria-label="Settings" title="Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>

    <div class="modes" role="tablist">
      <button class="mode-btn active" data-mode="work">Work</button>
      <button class="mode-btn" data-mode="short">Short Break</button>
      <button class="mode-btn" data-mode="long">Long Break</button>
    </div>

    <div class="timer-wrap">
      <svg class="ring" width="280" height="280" viewBox="0 0 280 280">
        <circle class="ring-track" cx="140" cy="140" r="130" fill="none" stroke-width="14"/>
        <circle class="ring-progress" id="progress" cx="140" cy="140" r="130" fill="none" stroke-width="14"/>
      </svg>
      <div class="time-display">
        <div class="time" id="time">25:00</div>
        <div class="status" id="status">Time to focus</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-primary" id="startBtn">Start</button>
      <button class="btn btn-ghost" id="resetBtn">Reset</button>
    </div>

    <div class="sessions">
      <span id="sessionLabel">Round 1 · 0/4 sessions</span>
      <div class="dots" id="dots"></div>
    </div>

    <div class="hint"><kbd>Space</kbd> start/pause &nbsp;·&nbsp; <kbd>R</kbd> reset</div>
  </div>

  <div class="overlay" id="overlay">
    <div class="modal">
      <h2>Settings</h2>
      <div class="field">
        <label>Work duration (minutes)</label>
        <input type="number" id="workInput" min="1" max="180" value="25">
      </div>
      <div class="field">
        <label>Short break (minutes)</label>
        <input type="number" id="shortInput" min="1" max="60" value="5">
      </div>
      <div class="field">
        <label>Long break (minutes)</label>
        <input type="number" id="longInput" min="1" max="90" value="15">
      </div>
      <div class="field">
        <label>Sessions until long break</label>
        <input type="number" id="roundsInput" min="1" max="12" value="4">
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="cancelBtn">Cancel</button>
        <button class="btn btn-primary" id="saveBtn">Save</button>
      </div>
    </div>
  </div>

<script>
(function () {
  "use strict";

  var MODES = {
    work:  { color: "#ff6b6b", status: "Time to focus" },
    short: { color: "#38d9c4", status: "Take a breather" },
    long:  { color: "#6c9cff", status: "Recharge" }
  };

  var state = {
    mode: "work",
    durations: { work: 25, short: 5, long: 15 },
    roundsUntilLong: 4,
    workSessions: 0,        // total completed work sessions
    remaining: 25 * 60,     // seconds left in current phase
    running: false,
    endTime: 0,             // wall-clock target (ms)
    timer: null
  };

  var RADIUS = 130;
  var CIRC = 2 * Math.PI * RADIUS;

  var $ = function (id) { return document.getElementById(id); };
  var progressEl = $("progress");
  var timeEl = $("time");
  var statusEl = $("status");
  var startBtn = $("startBtn");
  var resetBtn = $("resetBtn");
  var sessionLabel = $("sessionLabel");
  var dotsEl = $("dots");
  var overlay = $("overlay");
  var workInput = $("workInput");
  var shortInput = $("shortInput");
  var longInput = $("longInput");
  var roundsInput = $("roundsInput");

  progressEl.style.strokeDasharray = CIRC;

  function fmt(sec) {
    sec = Math.max(0, Math.ceil(sec));
    var m = Math.floor(sec / 60);
    var s = sec % 60;
    return (m < 10 ? "0" : "") + m + ":" + (s < 10 ? "0" : "") + s;
  }

  function setRing(fractionFull) {
    progressEl.style.strokeDashoffset = CIRC * (1 - Math.max(0, Math.min(1, fractionFull)));
  }

  function accentFor(mode) {
    document.documentElement.style.setProperty("--accent", MODES[mode].color);
  }

  function renderRound() {
    var inCycle = state.workSessions % state.roundsUntilLong;
    var roundNum = Math.floor(state.workSessions / state.roundsUntilLong) + 1;
    sessionLabel.textContent =
      "Round " + roundNum + " · " + inCycle + "/" + state.roundsUntilLong + " sessions";
    var html = "";
    for (var i = 0; i < state.roundsUntilLong; i++) {
      html += '<span class="dot' + (i < inCycle ? " filled" : "") + '"></span>';
    }
    dotsEl.innerHTML = html;
  }

  function setMode(mode) {
    clearInterval(state.timer);
    state.timer = null;
    state.running = false;
    state.mode = mode;
    state.remaining = state.durations[mode] * 60;
    accentFor(mode);
    statusEl.textContent = MODES[mode].status;
    startBtn.textContent = "Start";
    setRing(1);
    timeEl.textContent = fmt(state.remaining);
    document.title = "Pomodoro Timer";
    Array.prototype.forEach.call(document.querySelectorAll(".mode-btn"), function (b) {
      b.classList.toggle("active", b.getAttribute("data-mode") === mode);
    });
    renderRound();
  }

  function tick() {
    var remaining = (state.endTime - Date.now()) / 1000;
    if (remaining <= 0) {
      state.remaining = 0;
      timeEl.textContent = "00:00";
      setRing(0);
      complete();
      return;
    }
    state.remaining = remaining;
    timeEl.textContent = fmt(remaining);
    document.title = fmt(remaining) + " · " + MODES[state.mode].status;
    setRing(remaining / (state.durations[state.mode] * 60));
  }

  function start() {
    if (state.running || state.remaining <= 0) return;
    ensureAudio();
    state.running = true;
    state.endTime = Date.now() + state.remaining * 1000;
    startBtn.textContent = "Pause";
    tick();
    state.timer = setInterval(tick, 200);
  }

  function pause() {
    if (!state.running) return;
    state.running = false;
    clearInterval(state.timer);
    state.timer = null;
    state.remaining = Math.max(0, (state.endTime - Date.now()) / 1000);
    startBtn.textContent = "Resume";
    document.title = fmt(state.remaining) + " · Paused";
  }

  function toggle() { state.running ? pause() : start(); }

  function reset() {
    clearInterval(state.timer);
    state.timer = null;
    state.running = false;
    state.remaining = state.durations[state.mode] * 60;
    startBtn.textContent = "Start";
    setRing(1);
    timeEl.textContent = fmt(state.remaining);
    document.title = "Pomodoro Timer";
  }

  function complete() {
    clearInterval(state.timer);
    state.timer = null;
    state.running = false;
    beep();

    var next;
    if (state.mode === "work") {
      state.workSessions += 1;
      var cycleDone = state.workSessions % state.roundsUntilLong === 0;
      next = cycleDone ? "long" : "short";
    } else {
      next = "work";
    }
    setMode(next);
    // auto-switch: kick off the next phase shortly after the beep
    setTimeout(start, 700);
  }

  /* ---------- Audio (Web Audio API beep) ---------- */
  var audioCtx = null;
  function ensureAudio() {
    try {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === "suspended") audioCtx.resume();
    } catch (e) { /* ignore */ }
  }
  function beep() {
    if (!audioCtx) ensureAudio();
    if (!audioCtx) return;
    try {
      var ctx = audioCtx;
      var now = ctx.currentTime;
      var notes = [880, 1108, 1318];       // A5, C#6, E6 — a bright triad
      notes.forEach(function (freq, i) {
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.type = "sine";
        osc.frequency.value = freq;
        osc.connect(gain);
        gain.connect(ctx.destination);
        var t = now + i * 0.22;
        gain.gain.setValueAtTime(0.0001, t);
        gain.gain.exponentialRampToValueAtTime(0.28, t + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
        osc.start(t);
        osc.stop(t + 0.24);
      });
    } catch (e) { /* ignore */ }
  }

  /* ---------- Settings ---------- */
  function clampInt(v, min, max) {
    v = parseInt(v, 10);
    if (isNaN(v)) v = min;
    return Math.min(max, Math.max(min, v));
  }
  function openSettings() {
    workInput.value = state.durations.work;
    shortInput.value = state.durations.short;
    longInput.value = state.durations.long;
    roundsInput.value = state.roundsUntilLong;
    overlay.classList.add("active");
  }
  function saveSettings() {
    state.durations.work = clampInt(workInput.value, 1, 180);
    state.durations.short = clampInt(shortInput.value, 1, 60);
    state.durations.long = clampInt(longInput.value, 1, 90);
    state.roundsUntilLong = clampInt(roundsInput.value, 1, 12);
    overlay.classList.remove("active");
    if (state.workSessions % state.roundsUntilLong !== 0) {
      // keep the streak count aligned if the cycle length shrank
    }
    reset();        // re-arm current mode with (possibly) new duration
    renderRound();
  }

  /* ---------- Wiring ---------- */
  startBtn.addEventListener("click", toggle);
  resetBtn.addEventListener("click", reset);
  $("settingsBtn").addEventListener("click", openSettings);
  $("cancelBtn").addEventListener("click", function () { overlay.classList.remove("active"); });
  $("saveBtn").addEventListener("click", saveSettings);
  overlay.addEventListener("click", function (e) {
    if (e.target === overlay) overlay.classList.remove("active");
  });
  Array.prototype.forEach.call(document.querySelectorAll(".mode-btn"), function (b) {
    b.addEventListener("click", function () { setMode(b.getAttribute("data-mode")); });
  });
  document.addEventListener("keydown", function (e) {
    if (e.target && (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA")) return;
    if (e.code === "Space") { e.preventDefault(); toggle(); }
    else if (e.key && e.key.toLowerCase() === "r") { reset(); }
  });

  /* ---------- Init ---------- */
  setMode("work");
})();
</script>
</body>
</html>
