<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-tertiary: #0f3460;
            --text-primary: #eaeaea;
            --text-secondary: #a0a0a0;
            --work-color: #e94560;
            --short-break-color: #00d9a5;
            --long-break-color: #00b4d8;
            --ring-bg: #2a2a4a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .mode-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .mode-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .mode-btn:hover {
            background: var(--bg-tertiary);
            transform: translateY(-2px);
        }

        .mode-btn.active {
            color: var(--bg-primary);
            font-weight: 600;
        }

        .mode-btn.work.active {
            background: var(--work-color);
        }

        .mode-btn.short-break.active {
            background: var(--short-break-color);
        }

        .mode-btn.long-break.active {
            background: var(--long-break-color);
        }

        .timer-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto 40px;
        }

        .timer-ring {
            transform: rotate(-90deg);
        }

        .ring-bg {
            fill: none;
            stroke: var(--ring-bg);
            stroke-width: 12;
        }

        .ring-progress {
            fill: none;
            stroke-width: 12;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear, stroke 0.3s ease;
        }

        .time-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4.5rem;
            font-weight: 200;
            font-variant-numeric: tabular-nums;
        }

        .session-counter {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-btn {
            padding: 16px 40px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .start-btn {
            background: var(--work-color);
            color: var(--bg-primary);
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
        }

        .reset-btn {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .reset-btn:hover {
            background: var(--bg-tertiary);
        }

        .settings-toggle {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.5rem;
            margin-top: 20px;
            transition: color 0.3s ease;
        }

        .settings-toggle:hover {
            color: var(--text-primary);
        }

        .settings-panel {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 25px;
            margin-top: 20px;
            display: none;
        }

        .settings-panel.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .setting-item label {
            color: var(--text-secondary);
        }

        .setting-item input {
            background: var(--bg-tertiary);
            border: 1px solid var(--ring-bg);
            color: var(--text-primary);
            padding: 8px 15px;
            border-radius: 10px;
            width: 80px;
            text-align: center;
            font-size: 1rem;
        }

        .setting-item input:focus {
            outline: none;
            border-color: var(--work-color);
        }

        .auto-switch {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }

        .auto-switch input {
            width: auto;
        }

        .auto-switch label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        @media (max-width: 400px) {
            .timer-container {
                width: 260px;
                height: 260px;
            }

            .time-display {
                font-size: 3.5rem;
            }

            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>POMODORO</h1>
        
        <div class="mode-tabs">
            <button class="mode-btn work active" data-mode="work">Work</button>
            <button class="mode-btn short-break" data-mode="shortBreak">Short Break</button>
            <button class="mode-btn long-break" data-mode="longBreak">Long Break</button>
        </div>

        <div class="timer-container">
            <svg class="timer-ring" width="320" height="320" viewBox="0 0 320 320">
                <circle class="ring-bg" cx="160" cy="160" r="140"/>
                <circle class="ring-progress" cx="160" cy="160" r="140" 
                    stroke-dasharray="879.65" stroke-dashoffset="0"/>
            </svg>
            <div class="time-display">25:00</div>
            <div class="session-counter">Session #1</div>
        </div>

        <div class="controls">
            <button class="control-btn start-btn" id="startBtn">Start</button>
            <button class="control-btn reset-btn" id="resetBtn">Reset</button>
        </div>

        <button class="settings-toggle" id="settingsToggle">⚙️ Settings</button>

        <div class="settings-panel" id="settingsPanel">
            <div class="setting-item">
                <label for="workDuration">Work (minutes)</label>
                <input type="number" id="workDuration" min="1" max="60" value="25">
            </div>
            <div class="setting-item">
                <label for="shortBreakDuration">Short Break (minutes)</label>
                <input type="number" id="shortBreakDuration" min="1" max="30" value="5">
            </div>
            <div class="setting-item">
                <label for="longBreakDuration">Long Break (minutes)</label>
                <input type="number" id="longBreakDuration" min="1" max="60" value="15">
            </div>
            <div class="auto-switch">
                <label>
                    <input type="checkbox" id="autoSwitch" checked>
                    Auto-switch to break
                </label>
            </div>
        </div>
    </div>

    <script>
        const CIRCUMFERENCE = 2 * Math.PI * 140;
        
        const state = {
            mode: 'work',
            timeLeft: 25 * 60,
            totalTime: 25 * 60,
            isRunning: false,
            session: 1,
            intervals: {
                work: 25,
                shortBreak: 5,
                longBreak: 15
            },
            autoSwitch: true
        };

        const elements = {
            timeDisplay: document.querySelector('.time-display'),
            sessionCounter: document.querySelector('.session-counter'),
            startBtn: document.getElementById('startBtn'),
            resetBtn: document.getElementById('resetBtn'),
            ringProgress: document.querySelector('.ring-progress'),
            modeBtns: document.querySelectorAll('.mode-btn'),
            settingsToggle: document.getElementById('settingsToggle'),
            settingsPanel: document.getElementById('settingsPanel'),
            workDuration: document.getElementById('workDuration'),
            shortBreakDuration: document.getElementById('shortBreakDuration'),
            longBreakDuration: document.getElementById('longBreakDuration'),
            autoSwitch: document.getElementById('autoSwitch')
        };

        let timerInterval = null;
        let audioContext = null;

        const colors = {
            work: '#e94560',
            shortBreak: '#00d9a5',
            longBreak: '#00b4d8'
        };

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function updateDisplay() {
            elements.timeDisplay.textContent = formatTime(state.timeLeft);
            elements.sessionCounter.textContent = `Session #${state.session}`;
            
            const progress = (state.totalTime - state.timeLeft) / state.totalTime;
            const offset = CIRCUMFERENCE * (1 - progress);
            elements.ringProgress.style.strokeDashoffset = offset;
        }

        function setMode(mode) {
            state.mode = mode;
            state.timeLeft = state.intervals[mode] * 60;
            state.totalTime = state.intervals[mode] * 60;
            
            elements.modeBtns.forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-mode="${mode}"]`).classList.add('active');
            
            elements.ringProgress.style.stroke = colors[mode];
            elements.startBtn.style.background = colors[mode];
            
            if (state.isRunning) {
                pauseTimer();
            }
            updateDisplay();
        }

        function playNotification() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            const frequencies = [880, 784, 659];
            frequencies.forEach((freq, i) => {
                setTimeout(() => {
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    
                    oscillator.frequency.value = freq;
                    oscillator.type = 'sine';
                    
                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                    
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.3);
                }, i * 200);
            });
        }

        function timerComplete() {
            pauseTimer();
            playNotification();
            
            if (state.autoSwitch && state.mode === 'work') {
                state.session++;
                const nextMode = state.session % 4 === 0 ? 'longBreak' : 'shortBreak';
                setMode(nextMode);
                startTimer();
            } else if (state.mode !== 'work') {
                setMode('work');
            }
        }

        function startTimer() {
            if (state.isRunning) return;
            
            state.isRunning = true;
            elements.startBtn.textContent = 'Pause';
            
            timerInterval = setInterval(() => {
                state.timeLeft--;
                updateDisplay();
                
                if (state.timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerComplete();
                }
            }, 1000);
        }

        function pauseTimer() {
            state.isRunning = false;
            elements.startBtn.textContent = 'Start';
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function resetTimer() {
            pauseTimer();
            state.timeLeft = state.totalTime;
            updateDisplay();
        }

        function updateDurations() {
            state.intervals.work = parseInt(elements.workDuration.value) || 25;
            state.intervals.shortBreak = parseInt(elements.shortBreakDuration.value) || 5;
            state.intervals.longBreak = parseInt(elements.longBreakDuration.value) || 15;
            state.autoSwitch = elements.autoSwitch.checked;
            
            if (!state.isRunning) {
                setMode(state.mode);
            }
        }

        // Event Listeners
        elements.startBtn.addEventListener('click', () => {
            if (state.isRunning) {
                pauseTimer();
            } else {
                startTimer();
            }
        });

        elements.resetBtn.addEventListener('click', resetTimer);

        elements.modeBtns.forEach(btn => {
            btn.addEventListener('click', () => setMode(btn.dataset.mode));
        });

        elements.settingsToggle.addEventListener('click', () => {
            elements.settingsPanel.classList.toggle('show');
        });

        [elements.workDuration, elements.shortBreakDuration, elements.longBreakDuration]
            .forEach(input => {
                input.addEventListener('change', updateDurations);
            });

        elements.autoSwitch.addEventListener('change', updateDurations);

        // Initialize
        setMode('work');
    </script>
</body>
</html>
