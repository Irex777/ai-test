<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .mode-btn {
            padding: 10px 20px;
            border: 2px solid #4a9eff;
            background: transparent;
            color: #4a9eff;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .mode-btn:hover {
            background: rgba(74, 158, 255, 0.1);
        }

        .mode-btn.active {
            background: #4a9eff;
            color: #1a1a2e;
        }

        .timer-container {
            position: relative;
            width: 350px;
            height: 350px;
            margin: 0 auto 30px;
        }

        .progress-ring {
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .progress-ring-circle-bg {
            fill: none;
            stroke: #2a2a4e;
            stroke-width: 12;
        }

        .progress-ring-circle {
            fill: none;
            stroke-width: 12;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s ease;
        }

        .timer-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            font-weight: 200;
            font-variant-numeric: tabular-nums;
        }

        .session-counter {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem;
            color: #888;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .start-btn {
            background: #4ade80;
            color: #1a1a2e;
        }

        .start-btn:hover {
            background: #22c55e;
            transform: scale(1.05);
        }

        .pause-btn {
            background: #fbbf24;
            color: #1a1a2e;
        }

        .pause-btn:hover {
            background: #f59e0b;
            transform: scale(1.05);
        }

        .reset-btn {
            background: #f87171;
            color: #1a1a2e;
        }

        .reset-btn:hover {
            background: #ef4444;
            transform: scale(1.05);
        }

        .settings-btn {
            background: #8b5cf6;
            color: #1a1a2e;
        }

        .settings-btn:hover {
            background: #7c3aed;
            transform: scale(1.05);
        }

        .settings-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            display: none;
            backdrop-filter: blur(10px);
        }

        .settings-panel.show {
            display: block;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .setting-item label {
            font-size: 0.9rem;
            color: #ccc;
        }

        .setting-item input {
            width: 80px;
            padding: 8px;
            border: 1px solid #4a9eff;
            background: rgba(74, 158, 255, 0.1);
            color: #eee;
            border-radius: 5px;
            text-align: center;
            font-size: 1rem;
        }

        .setting-item input:focus {
            outline: none;
            border-color: #6bb3ff;
        }

        .auto-switch-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
            background: #4a4a6e;
            border-radius: 13px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .toggle-switch.active {
            background: #4a9eff;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.3s ease;
        }

        .toggle-switch.active::after {
            transform: translateX(24px);
        }

        .status {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #4a9eff;
            min-height: 30px;
        }

        @media (max-width: 400px) {
            .timer-container {
                width: 280px;
                height: 280px;
            }
            .timer-display {
                font-size: 3rem;
            }
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>POMODORO</h1>
        
        <div class="mode-selector">
            <button class="mode-btn active" data-mode="work">Work</button>
            <button class="mode-btn" data-mode="shortBreak">Short Break</button>
            <button class="mode-btn" data-mode="longBreak">Long Break</button>
        </div>

        <div class="status" id="status">Ready to focus!</div>

        <div class="timer-container">
            <svg class="progress-ring" width="350" height="350">
                <circle class="progress-ring-circle-bg" cx="175" cy="175" r="150"/>
                <circle class="progress-ring-circle" id="progressCircle" cx="175" cy="175" r="150"/>
            </svg>
            <div class="timer-display" id="timerDisplay">25:00</div>
            <div class="session-counter" id="sessionCounter">Session: 0</div>
        </div>

        <div class="controls">
            <button class="control-btn start-btn" id="startBtn" title="Start">▶</button>
            <button class="control-btn pause-btn" id="pauseBtn" title="Pause">⏸</button>
            <button class="control-btn reset-btn" id="resetBtn" title="Reset">↺</button>
            <button class="control-btn settings-btn" id="settingsBtn" title="Settings">⚙</button>
        </div>

        <div class="settings-panel" id="settingsPanel">
            <div class="setting-item">
                <label for="workDuration">Work (minutes):</label>
                <input type="number" id="workDuration" min="1" max="60" value="25">
            </div>
            <div class="setting-item">
                <label for="shortBreakDuration">Short Break (minutes):</label>
                <input type="number" id="shortBreakDuration" min="1" max="30" value="5">
            </div>
            <div class="setting-item">
                <label for="longBreakDuration">Long Break (minutes):</label>
                <input type="number" id="longBreakDuration" min="1" max="60" value="15">
            </div>
            <div class="auto-switch-toggle">
                <div class="toggle-switch" id="autoSwitchToggle"></div>
                <label for="autoSwitchToggle">Auto-switch work/break</label>
            </div>
        </div>
    </div>

    <script>
        const timerDisplay = document.getElementById('timerDisplay');
        const progressCircle = document.getElementById('progressCircle');
        const sessionCounter = document.getElementById('sessionCounter');
        const statusEl = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsPanel = document.getElementById('settingsPanel');
        const modeBtns = document.querySelectorAll('.mode-btn');
        const autoSwitchToggle = document.getElementById('autoSwitchToggle');

        const circumference = 2 * Math.PI * 150;
        progressCircle.style.strokeDasharray = circumference;
        progressCircle.style.strokeDashoffset = circumference;

        let settings = {
            work: 25,
            shortBreak: 5,
            longBreak: 15,
            autoSwitch: false
        };

        let currentMode = 'work';
        let timeLeft = settings.work * 60;
        let totalTime = settings.work * 60;
        let isRunning = false;
        let interval = null;
        let sessionCount = 0;

        const modeColors = {
            work: '#4ade80',
            shortBreak: '#60a5fa',
            longBreak: '#a78bfa'
        };

        const modeMessages = {
            work: 'Focus time!',
            shortBreak: 'Take a short break',
            longBreak: 'Take a long break'
        };

        function playBeep() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = 800;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function updateProgress() {
            const progress = (totalTime - timeLeft) / totalTime;
            const offset = circumference * (1 - progress);
            progressCircle.style.strokeDashoffset = offset;
            timerDisplay.textContent = formatTime(timeLeft);
        }

        function updateModeColor() {
            progressCircle.style.stroke = modeColors[currentMode];
            document.querySelector('h1').style.color = modeColors[currentMode];
        }

        function setMode(mode) {
            currentMode = mode;
            modeBtns.forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.mode === mode) {
                    btn.classList.add('active');
                }
            });

            totalTime = settings[mode] * 60;
            timeLeft = totalTime;
            statusEl.textContent = modeMessages[mode];
            updateModeColor();
            updateProgress();
        }

        function startTimer() {
            if (isRunning) return;
            
            isRunning = true;
            statusEl.textContent = modeMessages[currentMode];
            
            interval = setInterval(() => {
                timeLeft--;
                updateProgress();

                if (timeLeft <= 0) {
                    clearInterval(interval);
                    isRunning = false;
                    playBeep();

                    if (currentMode === 'work') {
                        sessionCount++;
                        sessionCounter.textContent = `Session: ${sessionCount}`;
                        
                        if (settings.autoSwitch) {
                            const nextMode = sessionCount % 4 === 0 ? 'longBreak' : 'shortBreak';
                            setMode(nextMode);
                            startTimer();
                        } else {
                            statusEl.textContent = 'Great work! Take a break.';
                        }
                    } else {
                        if (settings.autoSwitch) {
                            setMode('work');
                            startTimer();
                        } else {
                            statusEl.textContent = 'Break over! Ready to focus?';
                        }
                    }
                }
            }, 1000);
        }

        function pauseTimer() {
            if (!isRunning) return;
            clearInterval(interval);
            isRunning = false;
            statusEl.textContent = 'Paused';
        }

        function resetTimer() {
            clearInterval(interval);
            isRunning = false;
            timeLeft = totalTime;
            statusEl.textContent = modeMessages[currentMode];
            updateProgress();
        }

        function toggleSettings() {
            settingsPanel.classList.toggle('show');
        }

        function updateSettings() {
            settings.work = parseInt(document.getElementById('workDuration').value) || 25;
            settings.shortBreak = parseInt(document.getElementById('shortBreakDuration').value) || 5;
            settings.longBreak = parseInt(document.getElementById('longBreakDuration').value) || 15;
            
            if (!isRunning) {
                totalTime = settings[currentMode] * 60;
                timeLeft = totalTime;
                updateProgress();
            }
        }

        function toggleAutoSwitch() {
            settings.autoSwitch = !settings.autoSwitch;
            autoSwitchToggle.classList.toggle('active', settings.autoSwitch);
        }

        startBtn.addEventListener('click', startTimer);
        pauseBtn.addEventListener('click', pauseTimer);
        resetBtn.addEventListener('click', resetTimer);
        settingsBtn.addEventListener('click', toggleSettings);
        autoSwitchToggle.addEventListener('click', toggleAutoSwitch);

        modeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const mode = btn.dataset.mode;
                pauseTimer();
                setMode(mode);
            });
        });

        document.querySelectorAll('.settings-panel input').forEach(input => {
            input.addEventListener('change', updateSettings);
        });

        setMode('work');
        updateModeColor();
    </script>
</body>
</html>
