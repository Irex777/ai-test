<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(45, 45, 68, 0.8);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
            color: #ffffff;
        }

        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .mode-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid transparent;
            color: #e0e0e0;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .mode-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .mode-btn.active {
            background: rgba(255, 255, 255, 0.3);
            border-color: #ffffff;
        }

        .mode-btn.work.active {
            background: rgba(255, 107, 107, 0.3);
            border-color: #ff6b6b;
        }

        .mode-btn.short-break.active {
            background: rgba(78, 205, 196, 0.3);
            border-color: #4ecdc4;
        }

        .mode-btn.long-break.active {
            background: rgba(99, 179, 237, 0.3);
            border-color: #63b3ed;
        }

        .timer-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
        }

        .progress-ring {
            position: relative;
            width: 280px;
            height: 280px;
        }

        .progress-ring svg {
            transform: rotate(-90deg);
        }

        .progress-ring circle {
            fill: none;
            stroke-width: 8;
            stroke-linecap: round;
        }

        .progress-ring .background {
            stroke: rgba(255, 255, 255, 0.1);
        }

        .progress-ring .progress {
            stroke: #ff6b6b;
            transition: stroke-dashoffset 1s linear, stroke 0.3s ease;
        }

        .progress-ring.short-break .progress {
            stroke: #4ecdc4;
        }

        .progress-ring.long-break .progress {
            stroke: #63b3ed;
        }

        .time-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.5em;
            font-weight: bold;
            color: #ffffff;
        }

        .session-counter {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.1em;
            color: #b0b0b0;
        }

        .session-counter span {
            color: #ffffff;
            font-weight: bold;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #ffffff;
            padding: 15px 30px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s ease;
            min-width: 120px;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .control-btn:active {
            transform: translateY(0);
        }

        .control-btn.start {
            background: #4ecdc4;
        }

        .control-btn.pause {
            background: #ffd93d;
            color: #1e1e2e;
        }

        .control-btn.reset {
            background: #ff6b6b;
        }

        .settings-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #e0e0e0;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
            margin: 0 auto;
            display: block;
        }

        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .settings-panel {
            display: none;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }

        .settings-panel.show {
            display: block;
        }

        .setting-item {
            margin-bottom: 15px;
        }

        .setting-item label {
            display: block;
            margin-bottom: 5px;
            color: #b0b0b0;
            font-size: 0.9em;
        }

        .setting-item input {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 1em;
        }

        .setting-item input:focus {
            outline: none;
            border-color: #4ecdc4;
        }

        .auto-switch-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }

        .auto-switch-toggle input[type="checkbox"] {
            width: auto;
            margin-right: 10px;
        }

        .auto-switch-toggle label {
            margin-bottom: 0;
            cursor: pointer;
        }

        .status-message {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: rgba(78, 205, 196, 0.2);
            color: #4ecdc4;
            display: none;
        }

        .status-message.show {
            display: block;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .status-message.completed {
            animation: pulse 2s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍅 Pomodoro Timer</h1>

        <div class="mode-selector">
            <button class="mode-btn work active" data-mode="work">Work</button>
            <button class="mode-btn short-break" data-mode="shortBreak">Short Break</button>
            <button class="mode-btn long-break" data-mode="longBreak">Long Break</button>
        </div>

        <div class="timer-display">
            <div class="progress-ring" id="progressRing">
                <svg width="280" height="280">
                    <circle class="background" cx="140" cy="140" r="120"></circle>
                    <circle class="progress" id="progressCircle" cx="140" cy="140" r="120"></circle>
                </svg>
                <div class="time-display" id="timeDisplay">25:00</div>
            </div>
        </div>

        <div class="session-counter">
            Session: <span id="sessionCount">1</span> / 4
        </div>

        <div class="controls">
            <button class="control-btn start" id="startBtn">Start</button>
            <button class="control-btn pause" id="pauseBtn" style="display: none;">Pause</button>
            <button class="control-btn reset" id="resetBtn">Reset</button>
        </div>

        <button class="settings-btn" id="settingsBtn">⚙️ Settings</button>

        <div class="settings-panel" id="settingsPanel">
            <div class="setting-item">
                <label for="workDuration">Work Duration (minutes):</label>
                <input type="number" id="workDuration" min="1" max="60" value="25">
            </div>
            <div class="setting-item">
                <label for="shortBreakDuration">Short Break Duration (minutes):</label>
                <input type="number" id="shortBreakDuration" min="1" max="30" value="5">
            </div>
            <div class="setting-item">
                <label for="longBreakDuration">Long Break Duration (minutes):</label>
                <input type="number" id="longBreakDuration" min="1" max="60" value="15">
            </div>
            <div class="auto-switch-toggle">
                <input type="checkbox" id="autoSwitch" checked>
                <label for="autoSwitch">Auto-switch between work and break</label>
            </div>
        </div>

        <div class="status-message" id="statusMessage"></div>
    </div>

    <script>
        // Audio Context for notifications
        let audioContext;

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playNotificationSound() {
            initAudio();

            // Create a pleasant notification sound
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            // Create a two-tone notification
            oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
            oscillator.frequency.setValueAtTime(1000, audioContext.currentTime + 0.1);
            oscillator.frequency.setValueAtTime(800, audioContext.currentTime + 0.2);

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        }

        // Timer state
        let timerState = {
            mode: 'work',
            timeRemaining: 25 * 60,
            totalTime: 25 * 60,
            isRunning: false,
            interval: null,
            sessionCount: 1,
            sessionsUntilLongBreak: 4,
            settings: {
                workDuration: 25,
                shortBreakDuration: 5,
                longBreakDuration: 15,
                autoSwitch: true
            }
        };

        // DOM elements
        const timeDisplay = document.getElementById('timeDisplay');
        const progressCircle = document.getElementById('progressCircle');
        const progressRing = document.getElementById('progressRing');
        const sessionCount = document.getElementById('sessionCount');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsPanel = document.getElementById('settingsPanel');
        const statusMessage = document.getElementById('statusMessage');
        const modeButtons = document.querySelectorAll('.mode-btn');
        const settingsInputs = {
            workDuration: document.getElementById('workDuration'),
            shortBreakDuration: document.getElementById('shortBreakDuration'),
            longBreakDuration: document.getElementById('longBreakDuration'),
            autoSwitch: document.getElementById('autoSwitch')
        };

        // Initialize progress ring
        const circumference = 2 * Math.PI * 120;
        progressCircle.style.strokeDasharray = circumference;
        progressCircle.style.strokeDashoffset = circumference;

        function updateDisplay() {
            const minutes = Math.floor(timerState.timeRemaining / 60);
            const seconds = timerState.timeRemaining % 60;
            timeDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

            // Update progress ring
            const progress = timerState.timeRemaining / timerState.totalTime;
            const offset = circumference * (1 - progress);
            progressCircle.style.strokeDashoffset = offset;

            // Update document title
            document.title = `${timeDisplay.textContent} - Pomodoro Timer`;
        }

        function updateModeDisplay() {
            // Update mode buttons
            modeButtons.forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.mode === timerState.mode) {
                    btn.classList.add('active');
                }
            });

            // Update progress ring color
            progressRing.className = 'progress-ring';
            if (timerState.mode === 'shortBreak') {
                progressRing.classList.add('short-break');
            } else if (timerState.mode === 'longBreak') {
                progressRing.classList.add('long-break');
            }

            // Update session counter
            sessionCount.textContent = timerState.sessionCount;
        }

        function startTimer() {
            initAudio();

            if (timerState.isRunning) return;

            timerState.isRunning = true;
            startBtn.style.display = 'none';
            pauseBtn.style.display = 'inline-block';

            timerState.interval = setInterval(() => {
                if (timerState.timeRemaining > 0) {
                    timerState.timeRemaining--;
                    updateDisplay();
                } else {
                    timerComplete();
                }
            }, 1000);
        }

        function pauseTimer() {
            if (!timerState.isRunning) return;

            timerState.isRunning = false;
            clearInterval(timerState.interval);
            startBtn.style.display = 'inline-block';
            pauseBtn.style.display = 'none';
        }

        function resetTimer() {
            pauseTimer();
            timerState.timeRemaining = timerState.totalTime;
            updateDisplay();
            hideStatusMessage();
        }

        function timerComplete() {
            pauseTimer();
            playNotificationSound();

            const modeText = {
                work: 'Work session',
                shortBreak: 'Short break',
                longBreak: 'Long break'
            };

            showStatusMessage(`${modeText[timerState.mode]} completed! 🎉`, 'completed');

            if (timerState.settings.autoSwitch) {
                setTimeout(() => {
                    autoSwitchMode();
                }, 2000);
            }
        }

        function autoSwitchMode() {
            if (timerState.mode === 'work') {
                // Determine break type
                if (timerState.sessionCount >= timerState.sessionsUntilLongBreak) {
                    switchMode('longBreak');
                    timerState.sessionCount = 1;
                } else {
                    switchMode('shortBreak');
                }
            } else {
                // Break completed, switch to work
                timerState.sessionCount++;
                switchMode('work');
            }

            hideStatusMessage();
            startTimer();
        }

        function switchMode(mode) {
            pauseTimer();
            timerState.mode = mode;

            switch(mode) {
                case 'work':
                    timerState.totalTime = timerState.settings.workDuration * 60;
                    break;
                case 'shortBreak':
                    timerState.totalTime = timerState.settings.shortBreakDuration * 60;
                    break;
                case 'longBreak':
                    timerState.totalTime = timerState.settings.longBreakDuration * 60;
                    break;
            }

            timerState.timeRemaining = timerState.totalTime;
            updateModeDisplay();
            updateDisplay();
        }

        function showStatusMessage(message, type = 'info') {
            statusMessage.textContent = message;
            statusMessage.className = 'status-message show';
            if (type === 'completed') {
                statusMessage.classList.add('completed');
            }
        }

        function hideStatusMessage() {
            statusMessage.className = 'status-message';
        }

        function toggleSettings() {
            settingsPanel.classList.toggle('show');
        }

        function updateSettings() {
            timerState.settings.workDuration = parseInt(settingsInputs.workDuration.value) || 25;
            timerState.settings.shortBreakDuration = parseInt(settingsInputs.shortBreakDuration.value) || 5;
            timerState.settings.longBreakDuration = parseInt(settingsInputs.longBreakDuration.value) || 15;
            timerState.settings.autoSwitch = settingsInputs.autoSwitch.checked;

            // Update current timer if not running
            if (!timerState.isRunning) {
                switchMode(timerState.mode);
            }
        }

        // Event listeners
        startBtn.addEventListener('click', startTimer);
        pauseBtn.addEventListener('click', pauseTimer);
        resetBtn.addEventListener('click', resetTimer);
        settingsBtn.addEventListener('click', toggleSettings);

        modeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                switchMode(btn.dataset.mode);
            });
        });

        // Settings listeners
        Object.values(settingsInputs).forEach(input => {
            input.addEventListener('change', updateSettings);
        });

        // Initialize
        updateDisplay();
        updateModeDisplay();
    </script>
</body>
</html>
