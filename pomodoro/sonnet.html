<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #eee;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        .mode-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .mode-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.1);
            color: #eee;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .mode-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .mode-btn.active {
            background: #e94560;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        .timer-container {
            position: relative;
            width: 350px;
            height: 350px;
            margin: 0 auto 2rem;
        }

        .progress-ring {
            transform: rotate(-90deg);
        }

        .progress-ring-circle {
            transition: stroke-dashoffset 0.5s ease;
        }

        .timer-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .control-btn {
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .start-btn {
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
            color: white;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 184, 148, 0.4);
        }

        .pause-btn {
            background: linear-gradient(135deg, #fdcb6e 0%, #f39c12 100%);
            color: white;
        }

        .reset-btn {
            background: linear-gradient(135deg, #e94560 0%, #d63031 100%);
            color: white;
        }

        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
        }

        .session-counter {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-bottom: 1.5rem;
        }

        .session-counter span {
            font-weight: 600;
            color: #00cec9;
        }

        .settings-btn {
            background: none;
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #eee;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #eee;
        }

        .settings-panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(26, 26, 46, 0.98);
            padding: 2rem;
            border-radius: 20px;
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .settings-panel.active {
            display: block;
        }

        .settings-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
        }

        .settings-overlay.active {
            display: block;
        }

        .settings-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .setting-item {
            margin-bottom: 1.5rem;
        }

        .setting-item label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 14px;
            opacity: 0.8;
        }

        .setting-item input {
            width: 100px;
            padding: 10px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: #eee;
            font-size: 16px;
            text-align: center;
        }

        .setting-item input:focus {
            outline: none;
            border-color: #00cec9;
        }

        .settings-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 2rem;
        }

        .save-btn {
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
        }

        .cancel-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #eee;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }

        .current-mode {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            font-weight: 300;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="current-mode" id="currentMode">Work Session</div>
        
        <div class="mode-buttons">
            <button class="mode-btn active" data-mode="work">Work</button>
            <button class="mode-btn" data-mode="shortBreak">Short Break</button>
            <button class="mode-btn" data-mode="longBreak">Long Break</button>
        </div>

        <div class="timer-container">
            <svg class="progress-ring" width="350" height="350">
                <circle
                    class="progress-ring-circle-bg"
                    stroke="rgba(255, 255, 255, 0.1)"
                    stroke-width="8"
                    fill="transparent"
                    r="150"
                    cx="175"
                    cy="175"
                />
                <circle
                    class="progress-ring-circle"
                    stroke="url(#gradient)"
                    stroke-width="8"
                    fill="transparent"
                    r="150"
                    cx="175"
                    cy="175"
                    stroke-linecap="round"
                />
                <defs>
                    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#00b894" />
                        <stop offset="100%" stop-color="#00cec9" />
                    </linearGradient>
                </defs>
            </svg>
            <div class="timer-display" id="timerDisplay">25:00</div>
        </div>

        <div class="controls">
            <button class="control-btn start-btn" id="startBtn">Start</button>
            <button class="control-btn pause-btn" id="pauseBtn" style="display: none;">Pause</button>
            <button class="control-btn reset-btn" id="resetBtn">Reset</button>
        </div>

        <div class="session-counter">
            Sessions completed: <span id="sessionCount">0</span>
        </div>

        <button class="settings-btn" id="settingsBtn">⚙️ Settings</button>
    </div>

    <div class="settings-overlay" id="settingsOverlay"></div>
    <div class="settings-panel" id="settingsPanel">
        <h2 class="settings-title">Settings</h2>
        <div class="setting-item">
            <label>Work Duration (minutes)</label>
            <input type="number" id="workDuration" value="25" min="1" max="60">
        </div>
        <div class="setting-item">
            <label>Short Break Duration (minutes)</label>
            <input type="number" id="shortBreakDuration" value="5" min="1" max="30">
        </div>
        <div class="setting-item">
            <label>Long Break Duration (minutes)</label>
            <input type="number" id="longBreakDuration" value="15" min="1" max="60">
        </div>
        <div class="setting-item">
            <label>Sessions until Long Break</label>
            <input type="number" id="sessionsUntilLongBreak" value="4" min="2" max="10">
        </div>
        <div class="settings-actions">
            <button class="save-btn" id="saveSettings">Save</button>
            <button class="cancel-btn" id="cancelSettings">Cancel</button>
        </div>
    </div>

    <script>
        // Timer State
        let state = {
            mode: 'work',
            timeLeft: 25 * 60,
            totalTime: 25 * 60,
            isRunning: false,
            sessionCount: 0,
            interval: null,
            durations: {
                work: 25,
                shortBreak: 5,
                longBreak: 15
            },
            sessionsUntilLongBreak: 4
        };

        // Audio Context for beep
        let audioContext = null;

        function playBeep() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 800;
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        }

        // DOM Elements
        const timerDisplay = document.getElementById('timerDisplay');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const sessionCount = document.getElementById('sessionCount');
        const progressCircle = document.querySelector('.progress-ring-circle');
        const currentMode = document.getElementById('currentMode');
        const modeButtons = document.querySelectorAll('.mode-btn');
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsPanel = document.getElementById('settingsPanel');
        const settingsOverlay = document.getElementById('settingsOverlay');
        const saveSettings = document.getElementById('saveSettings');
        const cancelSettings = document.getElementById('cancelSettings');

        // Initialize progress ring
        const radius = 150;
        const circumference = 2 * Math.PI * radius;
        progressCircle.style.strokeDasharray = `${circumference} ${circumference}`;
        progressCircle.style.strokeDashoffset = 0;

        function updateProgressRing() {
            const progress = state.timeLeft / state.totalTime;
            const offset = circumference * (1 - progress);
            progressCircle.style.strokeDashoffset = offset;
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function updateDisplay() {
            timerDisplay.textContent = formatTime(state.timeLeft);
            updateProgressRing();
            
            // Update document title
            document.title = `${formatTime(state.timeLeft)} - Pomodoro`;
        }

        function switchMode(newMode) {
            state.mode = newMode;
            state.totalTime = state.durations[newMode] * 60;
            state.timeLeft = state.totalTime;
            state.isRunning = false;
            
            clearInterval(state.interval);
            
            // Update UI
            modeButtons.forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.mode === newMode) {
                    btn.classList.add('active');
                }
            });

            // Update mode display
            const modeNames = {
                work: 'Work Session',
                shortBreak: 'Short Break',
                longBreak: 'Long Break'
            };
            currentMode.textContent = modeNames[newMode];

            // Update gradient color based on mode
            const gradient = document.querySelector('#gradient');
            if (newMode === 'work') {
                gradient.innerHTML = '<stop offset="0%" stop-color="#00b894" /><stop offset="100%" stop-color="#00cec9" />';
            } else {
                gradient.innerHTML = '<stop offset="0%" stop-color="#fdcb6e" /><stop offset="100%" stop-color="#f39c12" />';
            }

            startBtn.style.display = 'block';
            pauseBtn.style.display = 'none';
            
            updateDisplay();
        }

        function startTimer() {
            if (state.isRunning) return;
            
            state.isRunning = true;
            startBtn.style.display = 'none';
            pauseBtn.style.display = 'block';

            state.interval = setInterval(() => {
                state.timeLeft--;
                updateDisplay();

                if (state.timeLeft <= 0) {
                    clearInterval(state.interval);
                    playBeep();
                    
                    // Handle session completion
                    if (state.mode === 'work') {
                        state.sessionCount++;
                        sessionCount.textContent = state.sessionCount;
                        
                        // Auto-switch to break
                        if (state.sessionCount % state.sessionsUntilLongBreak === 0) {
                            switchMode('longBreak');
                        } else {
                            switchMode('shortBreak');
                        }
                        
                        // Auto-start break
                        setTimeout(() => startTimer(), 1000);
                    } else {
                        // Switch back to work
                        switchMode('work');
                        setTimeout(() => startTimer(), 1000);
                    }
                }
            }, 1000);
        }

        function pauseTimer() {
            state.isRunning = false;
            clearInterval(state.interval);
            startBtn.style.display = 'block';
            pauseBtn.style.display = 'none';
        }

        function resetTimer() {
            pauseTimer();
            state.timeLeft = state.totalTime;
            updateDisplay();
        }

        // Event Listeners
        startBtn.addEventListener('click', startTimer);
        pauseBtn.addEventListener('click', pauseTimer);
        resetBtn.addEventListener('click', resetTimer);

        modeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                switchMode(btn.dataset.mode);
            });
        });

        // Settings Panel
        settingsBtn.addEventListener('click', () => {
            settingsPanel.classList.add('active');
            settingsOverlay.classList.add('active');
            
            // Load current settings
            document.getElementById('workDuration').value = state.durations.work;
            document.getElementById('shortBreakDuration').value = state.durations.shortBreak;
            document.getElementById('longBreakDuration').value = state.durations.longBreak;
            document.getElementById('sessionsUntilLongBreak').value = state.sessionsUntilLongBreak;
        });

        function closeSettings() {
            settingsPanel.classList.remove('active');
            settingsOverlay.classList.remove('active');
        }

        settingsOverlay.addEventListener('click', closeSettings);
        cancelSettings.addEventListener('click', closeSettings);

        saveSettings.addEventListener('click', () => {
            const work = parseInt(document.getElementById('workDuration').value);
            const shortBreak = parseInt(document.getElementById('shortBreakDuration').value);
            const longBreak = parseInt(document.getElementById('longBreakDuration').value);
            const sessions = parseInt(document.getElementById('sessionsUntilLongBreak').value);

            if (work > 0 && shortBreak > 0 && longBreak > 0 && sessions > 0) {
                state.durations = { work, shortBreak, longBreak };
                state.sessionsUntilLongBreak = sessions;
                
                // Reset current timer with new duration
                switchMode(state.mode);
                closeSettings();
            }
        });

        // Initialize
        updateDisplay();
    </script>
</body>
</html>
