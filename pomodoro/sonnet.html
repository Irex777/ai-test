<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Timer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#0d0d1a;
  --surface:#141428;
  --surface2:#1c1c38;
  --border:#252545;
  --text:#e8e8f4;
  --muted:#5a5a88;
  --accent:#e94560;
  --circ:691.15px
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:1.5rem;
  gap:1.6rem
}

h1{
  font-size:.95rem;
  font-weight:600;
  letter-spacing:.35em;
  color:var(--muted);
  text-transform:uppercase
}

.tabs{
  display:flex;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:50px;
  padding:4px;
  gap:3px
}

.tab{
  padding:.42rem 1.05rem;
  border:none;
  border-radius:50px;
  background:transparent;
  color:var(--muted);
  cursor:pointer;
  font-size:.82rem;
  font-weight:500;
  transition:background .2s,color .2s;
  white-space:nowrap
}

.tab.active{background:var(--accent);color:#fff}
.tab:not(.active):hover{color:var(--text)}

.ring-wrap{position:relative;width:270px;height:270px}

.ring-svg{
  width:270px;height:270px;
  transform:rotate(-90deg);
  overflow:visible
}

.ring-track{fill:none;stroke:var(--surface2);stroke-width:11}

.ring-fill{
  fill:none;
  stroke:var(--accent);
  stroke-width:11;
  stroke-linecap:round;
  stroke-dasharray:var(--circ);
  stroke-dashoffset:0;
  transition:stroke-dashoffset 1s linear,stroke .35s ease
}

.ring-inner{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:.3rem;pointer-events:none
}

.time-num{
  font-size:4rem;font-weight:700;
  font-variant-numeric:tabular-nums;
  letter-spacing:.02em;line-height:1
}

.mode-tag{
  font-size:.72rem;color:var(--muted);
  text-transform:uppercase;letter-spacing:.18em
}

.controls{display:flex;gap:.7rem;align-items:center}

.btn-start{
  padding:.75rem 2.6rem;
  border:none;border-radius:50px;
  background:var(--accent);color:#fff;
  font-size:1rem;font-weight:700;
  letter-spacing:.06em;cursor:pointer;
  min-width:140px;
  transition:filter .2s,transform .1s
}

.btn-start:hover{filter:brightness(1.18);transform:translateY(-1px)}
.btn-start:active{transform:translateY(0)}

.btn-reset{
  padding:.75rem 1.1rem;
  border:1px solid var(--border);border-radius:50px;
  background:transparent;color:var(--muted);
  font-size:.88rem;cursor:pointer;
  transition:border-color .2s,color .2s
}

.btn-reset:hover{border-color:var(--text);color:var(--text)}

.sessions{
  display:flex;flex-direction:column;
  align-items:center;gap:.55rem
}

.dots{display:flex;gap:7px}

.dot{
  width:9px;height:9px;border-radius:50%;
  background:var(--surface2);
  border:1.5px solid var(--border);
  transition:all .3s
}

.dot.done{background:var(--accent);border-color:var(--accent)}
.dot.active{background:transparent;border-color:var(--accent)}

.sess-label{font-size:.76rem;color:var(--muted)}

.gear-btn{
  background:none;
  border:1px solid var(--border);color:var(--muted);
  padding:.35rem .95rem;border-radius:50px;
  font-size:.78rem;cursor:pointer;
  transition:border-color .2s,color .2s;
  display:flex;align-items:center;gap:.4rem
}

.gear-btn:hover{border-color:var(--accent);color:var(--accent)}

.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.65);z-index:50;
  align-items:center;justify-content:center
}

.overlay.open{display:flex}

.modal{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:18px;padding:1.75rem;width:310px
}

.modal h2{font-size:1rem;font-weight:600;margin-bottom:1.3rem}

.field{
  display:flex;justify-content:space-between;
  align-items:center;margin-bottom:.9rem
}

.field label{font-size:.88rem;color:#aab0cc}

.field input{
  width:76px;padding:.35rem .55rem;
  background:var(--bg);
  border:1px solid var(--border);border-radius:8px;
  color:var(--text);font-size:.9rem;
  text-align:center;outline:none;
  transition:border-color .2s
}

.field input:focus{border-color:var(--accent)}

.modal-actions{display:flex;gap:.55rem;margin-top:1.3rem}

.btn-apply{
  flex:1;padding:.6rem;
  background:var(--accent);color:#fff;
  border:none;border-radius:10px;
  cursor:pointer;font-size:.9rem;font-weight:600;
  transition:filter .2s
}

.btn-apply:hover{filter:brightness(1.1)}

.btn-cancel2{
  padding:.6rem 1rem;background:transparent;
  color:var(--muted);border:1px solid var(--border);
  border-radius:10px;cursor:pointer;font-size:.9rem;
  transition:all .2s
}

.btn-cancel2:hover{color:var(--text);border-color:var(--text)}

.no-transition{transition:none!important}

@keyframes flash{
  0%,100%{opacity:1}
  40%{opacity:.15}
}

.flashing{animation:flash .4s ease-in-out 3}

@keyframes glow-pulse{
  0%,100%{opacity:.85}
  50%{opacity:1}
}

.ring-fill.running{animation:glow-pulse 2.5s ease-in-out infinite}
</style>
</head>
<body>

<h1>Pomodoro</h1>

<div class="tabs" id="tabs">
  <button class="tab active" data-mode="work">Focus</button>
  <button class="tab" data-mode="short">Short Break</button>
  <button class="tab" data-mode="long">Long Break</button>
</div>

<div class="ring-wrap">
  <svg class="ring-svg" viewBox="0 0 270 270">
    <circle class="ring-track" cx="135" cy="135" r="110"/>
    <circle class="ring-fill" id="ring" cx="135" cy="135" r="110"/>
  </svg>
  <div class="ring-inner">
    <div class="time-num" id="timeNum">25:00</div>
    <div class="mode-tag" id="modeTag">Focus</div>
  </div>
</div>

<div class="controls">
  <button class="btn-start" id="startBtn">Start</button>
  <button class="btn-reset" id="resetBtn">Reset</button>
</div>

<div class="sessions">
  <div class="dots" id="dots">
    <div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div>
  </div>
  <div class="sess-label" id="sessLabel">0 sessions completed</div>
</div>

<button class="gear-btn" id="gearBtn">⚙ Settings</button>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2>Timer Settings</h2>
    <div class="field">
      <label>Focus (min)</label>
      <input type="number" id="iWork" min="1" max="99" value="25">
    </div>
    <div class="field">
      <label>Short Break (min)</label>
      <input type="number" id="iShort" min="1" max="99" value="5">
    </div>
    <div class="field">
      <label>Long Break (min)</label>
      <input type="number" id="iLong" min="1" max="99" value="15">
    </div>
    <div class="modal-actions">
      <button class="btn-apply" id="applyBtn">Apply</button>
      <button class="btn-cancel2" id="cancelBtn">Cancel</button>
    </div>
  </div>
</div>

<script>
const CIRC = 2 * Math.PI * 110; // 691.15

const COLORS = { work:'#e94560', short:'#0fb8a0', long:'#7c4dff' };
const LABELS = { work:'Focus', short:'Short Break', long:'Long Break' };

let cfg    = { work:25, short:5, long:15 };
let mode   = 'work';
let total  = cfg.work * 60;
let rem    = total;
let live   = false;
let tid    = null;
let cycPos = 0;
let allSes = 0;

const ring     = document.getElementById('ring');
const timeNum  = document.getElementById('timeNum');
const modeTag  = document.getElementById('modeTag');
const startBtn = document.getElementById('startBtn');
const sessLabel= document.getElementById('sessLabel');

function fmt(s){ return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}` }

function setOffset(instant){
  const off = CIRC * (1 - rem / total);
  if(instant){
    ring.classList.add('no-transition');
    ring.style.strokeDashoffset = off;
    ring.getBoundingClientRect();
    ring.classList.remove('no-transition');
  } else {
    ring.style.strokeDashoffset = off;
  }
}

function refreshDots(){
  document.querySelectorAll('.dot').forEach((d,i)=>{
    d.className='dot';
    if(i < cycPos) d.classList.add('done');
    else if(i===cycPos && mode==='work' && live) d.classList.add('active');
  });
  sessLabel.textContent = `${allSes} session${allSes!==1?'s':''} completed`;
}

function activateMode(m, instant){
  mode  = m;
  total = cfg[m] * 60;
  rem   = total;
  ring.style.stroke = COLORS[m];
  modeTag.textContent = LABELS[m];
  document.querySelectorAll('.tab').forEach(t=>
    t.classList.toggle('active', t.dataset.mode===m));
  timeNum.textContent = fmt(rem);
  setOffset(instant !== false);
  live = false;
  ring.classList.remove('running');
  startBtn.textContent = 'Start';
}

function startTimer(){
  live = true;
  startBtn.textContent = 'Pause';
  ring.classList.add('running');
  refreshDots();
  clearInterval(tid);
  tid = setInterval(()=>{
    if(rem > 0){
      rem--;
      timeNum.textContent = fmt(rem);
      setOffset(false);
    } else {
      clearInterval(tid);
      live = false;
      ring.classList.remove('running');
      onDone();
    }
  }, 1000);
}

function pauseTimer(){
  live = false;
  clearInterval(tid);
  startBtn.textContent = 'Resume';
  ring.classList.remove('running');
}

function onDone(){
  beep();
  timeNum.classList.add('flashing');
  setTimeout(()=>timeNum.classList.remove('flashing'), 1200);

  if(mode === 'work'){
    allSes++;
    cycPos++;
    if(cycPos >= 4){ cycPos=0; activateMode('long', true); }
    else            { activateMode('short', true); }
  } else {
    activateMode('work', true);
  }
  refreshDots();
}

function beep(){
  try{
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    [0, .32, .64].forEach(t=>{
      const osc = ac.createOscillator();
      const env = ac.createGain();
      osc.connect(env); env.connect(ac.destination);
      osc.type = 'sine';
      osc.frequency.value = 880;
      const s = ac.currentTime + t;
      env.gain.setValueAtTime(0, s);
      env.gain.linearRampToValueAtTime(.45, s+.01);
      env.gain.exponentialRampToValueAtTime(.001, s+.28);
      osc.start(s); osc.stop(s+.3);
    });
  } catch(e){}
}

startBtn.addEventListener('click', ()=>{
  if(live) pauseTimer(); else startTimer();
});

document.getElementById('resetBtn').addEventListener('click', ()=>{
  clearInterval(tid);
  live = false;
  ring.classList.remove('running');
  rem = total;
  timeNum.textContent = fmt(rem);
  setOffset(true);
  startBtn.textContent = 'Start';
});

document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click', ()=>{
    if(live){ clearInterval(tid); ring.classList.remove('running'); }
    activateMode(t.dataset.mode, true);
  });
});

document.getElementById('gearBtn').addEventListener('click', ()=>{
  document.getElementById('iWork').value  = cfg.work;
  document.getElementById('iShort').value = cfg.short;
  document.getElementById('iLong').value  = cfg.long;
  document.getElementById('overlay').classList.add('open');
});

document.getElementById('applyBtn').addEventListener('click', ()=>{
  const clamp = (v,d)=> Math.max(1, Math.min(99, parseInt(v)||d));
  cfg.work  = clamp(document.getElementById('iWork').value,  25);
  cfg.short = clamp(document.getElementById('iShort').value,  5);
  cfg.long  = clamp(document.getElementById('iLong').value,  15);
  document.getElementById('overlay').classList.remove('open');
  if(!live){
    total = cfg[mode] * 60;
    rem   = total;
    timeNum.textContent = fmt(rem);
    setOffset(true);
  }
});

document.getElementById('cancelBtn').addEventListener('click', ()=>{
  document.getElementById('overlay').classList.remove('open');
});

document.getElementById('overlay').addEventListener('click', e=>{
  if(e.target===e.currentTarget) e.currentTarget.classList.remove('open');
});

ring.style.strokeDasharray  = CIRC;
ring.style.strokeDashoffset = 0;
ring.style.stroke = COLORS.work;
activateMode('work', true);
refreshDots();
</script>
</body>
</html>
