<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tomato · A Pomodoro Timer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg-0: #0a0d12;
    --bg-1: #0f141c;
    --bg-2: #161d28;
    --fg: #ecf0f5;
    --muted: #6b7689;
    --dim: #3a4456;
    --border: rgba(255, 255, 255, 0.06);
    --border-strong: rgba(255, 255, 255, 0.1);
    --work: #ff5e3a;
    --work-glow: rgba(255, 94, 58, 0.45);
    --short: #14d8a4;
    --short-glow: rgba(20, 216, 164, 0.45);
    --long: #f5a623;
    --long-glow: rgba(245, 166, 35, 0.45);
    --accent: var(--work);
    --accent-glow: var(--work-glow);
    --font-display: ui-monospace, 'SF Mono', 'JetBrains Mono', 'Cascadia Code', Menlo, Consolas, monospace;
    --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }

  [data-mode="short"] { --accent: var(--short); --accent-glow: var(--short-glow); }
  [data-mode="long"] { --accent: var(--long); --accent-glow: var(--long-glow); }

  html, body {
    background: var(--bg-0);
    color: var(--fg);
    font-family: var(--font-ui);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px 24px;
    gap: 28px;
  }

  /* Background — layered glows */
  .bg { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; }
  .bg::before {
    content: '';
    position: absolute;
    inset: -20%;
    background:
      radial-gradient(circle at 18% 28%, var(--accent-glow) 0%, transparent 35%),
      radial-gradient(circle at 82% 75%, var(--accent-glow) 0%, transparent 38%);
    opacity: 0.55;
    filter: blur(70px);
    transition: background 1.2s ease;
  }
  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
  }
  .noise {
    position: fixed; inset: 0; z-index: -1; pointer-events: none;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  .app {
    width: 100%;
    max-width: 460px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-mark {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, var(--accent), color-mix(in srgb, var(--accent), #000 35%));
    box-shadow: 0 0 24px var(--accent-glow), inset 0 -4px 8px rgba(0,0,0,0.3);
    position: relative;
    transition: background 0.6s ease, box-shadow 0.6s ease;
  }
  .brand-mark::after {
    content: '';
    position: absolute;
    top: -3px; left: 50%;
    transform: translateX(-50%) rotate(-15deg);
    width: 10px; height: 7px;
    background: #2d4a1f;
    border-radius: 50% 50% 30% 30%;
    box-shadow: 0 1px 0 rgba(0,0,0,0.4);
  }
  .brand-name {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.3em;
    color: var(--fg);
    text-transform: uppercase;
  }
  .brand-name span { color: var(--muted); font-weight: 400; }
  .icon-btn {
    width: 40px; height: 40px;
    border-radius: 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
  }
  .icon-btn:hover {
    color: var(--fg);
    background: rgba(255,255,255,0.06);
    border-color: var(--border-strong);
    transform: translateY(-1px);
  }
  .icon-btn svg { width: 18px; height: 18px; }

  /* Mode tabs */
  .modes {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    background: rgba(255,255,255,0.025);
    padding: 6px;
    border-radius: 16px;
    border: 1px solid var(--border);
    backdrop-filter: blur(8px);
  }
  .mode-tab {
    padding: 13px 12px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
    font-family: var(--font-ui);
    border-radius: 11px;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    letter-spacing: 0.02em;
    position: relative;
  }
  .mode-tab:hover:not(.active) { color: var(--fg); background: rgba(255,255,255,0.04); }
  .mode-tab.active {
    background: linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
    color: var(--fg);
    box-shadow: 0 4px 16px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.08), inset 0 -1px 0 rgba(0,0,0,0.3);
  }
  .mode-tab.active::after {
    content: '';
    position: absolute;
    bottom: 6px; left: 50%;
    transform: translateX(-50%);
    width: 18px; height: 2px;
    background: var(--accent);
    border-radius: 1px;
    box-shadow: 0 0 10px var(--accent);
  }

  /* Timer card */
  .timer {
    position: relative;
    padding: 32px;
    background: linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.012));
    border-radius: 28px;
    border: 1px solid var(--border);
    backdrop-filter: blur(20px);
    box-shadow: 0 30px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .ring-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ring-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }
  .ring-track {
    fill: none;
    stroke: rgba(255,255,255,0.05);
    stroke-width: 6;
  }
  .ring-progress {
    fill: none;
    stroke: var(--accent);
    stroke-width: 6;
    stroke-linecap: round;
    filter: drop-shadow(0 0 10px var(--accent-glow)) drop-shadow(0 0 24px var(--accent-glow));
    transition: stroke-dashoffset 0.95s linear, stroke 0.6s ease;
  }
  /* Inner halo */
  .ring-halo {
    fill: none;
    stroke: var(--accent);
    stroke-width: 1;
    opacity: 0.25;
    filter: blur(4px);
    transition: stroke 0.6s ease;
  }
  /* Tick marks */
  .tick {
    stroke: rgba(255,255,255,0.06);
    stroke-width: 1;
  }
  .tick.major {
    stroke: rgba(255,255,255,0.12);
    stroke-width: 1.5;
  }

  .ring-center {
    position: relative;
    z-index: 2;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .phase-label {
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.4em;
    color: var(--accent);
    text-transform: uppercase;
    transition: color 0.6s ease;
    text-shadow: 0 0 12px var(--accent-glow);
  }
  .time {
    font-family: var(--font-display);
    font-size: clamp(48px, 13vw, 72px);
    font-weight: 200;
    letter-spacing: -0.02em;
    color: var(--fg);
    line-height: 1;
    font-variant-numeric: tabular-nums;
    transition: opacity 0.3s ease;
  }
  .time.paused { opacity: 0.4; }
  .status {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 4px;
    height: 14px;
    transition: color 0.3s ease;
  }
  .status.running { color: var(--accent); }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
  }
  .btn-ghost {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
  }
  .btn-ghost:hover {
    color: var(--fg);
    background: rgba(255,255,255,0.08);
    border-color: var(--border-strong);
    transform: translateY(-2px);
  }
  .btn-ghost:active { transform: translateY(0); }
  .btn-ghost svg { width: 18px; height: 18px; }

  .btn-primary {
    position: relative;
    padding: 0 44px;
    height: 64px;
    background: var(--accent);
    border: none;
    border-radius: 32px;
    color: #0a0d12;
    font-family: var(--font-ui);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 8px 32px var(--accent-glow), 0 0 0 1px rgba(255,255,255,0.1) inset;
    min-width: 170px;
    justify-content: center;
    overflow: hidden;
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 40px var(--accent-glow), 0 0 0 1px rgba(255,255,255,0.15) inset;
  }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary svg { width: 16px; height: 16px; }
  .btn-primary::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    transition: left 0.6s ease;
  }
  .btn-primary:hover::before { left: 100%; }

  /* Stats row */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    background: rgba(255,255,255,0.025);
    border-radius: 18px;
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .stat {
    padding: 16px 12px;
    text-align: center;
    border-right: 1px solid var(--border);
  }
  .stat:last-child { border-right: none; }
  .stat-label {
    display: block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .stat-value {
    display: block;
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 500;
    color: var(--fg);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
  }
  .stat-value.accent { color: var(--accent); transition: color 0.6s ease; }

  /* Task hint */
  .hint {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: rgba(255,255,255,0.025);
    border-radius: 14px;
    border: 1px solid var(--border);
    font-size: 13px;
    color: var(--muted);
  }
  .hint-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
    flex-shrink: 0;
    transition: background 0.6s ease, box-shadow 0.6s ease;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }

  /* Settings panel */
  .settings {
    background: rgba(255,255,255,0.025);
    border-radius: 18px;
    border: 1px solid var(--border);
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    transition: max-height 0.4s ease, opacity 0.3s ease, padding 0.4s ease;
  }
  .settings.open {
    max-height: 600px;
    opacity: 1;
    padding: 8px 0;
  }
  .settings-inner {
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .settings-title {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .setting-label {
    font-size: 13px;
    color: var(--fg);
    font-weight: 500;
  }
  .setting-control {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(0,0,0,0.25);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
  }
  .step-btn {
    width: 26px; height: 26px;
    border-radius: 6px;
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
  }
  .step-btn:hover { background: rgba(255,255,255,0.08); color: var(--fg); }
  .step-value {
    min-width: 56px;
    text-align: center;
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 500;
    color: var(--fg);
    font-variant-numeric: tabular-nums;
  }
  .toggle {
    position: relative;
    width: 40px; height: 22px;
    background: rgba(255,255,255,0.08);
    border-radius: 11px;
    cursor: pointer;
    transition: background 0.2s ease;
  }
  .toggle::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 18px; height: 18px;
    background: var(--fg);
    border-radius: 50%;
    transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .toggle.on { background: var(--accent); }
  .toggle.on::after { transform: translateX(18px); background: #0a0d12; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(20, 26, 36, 0.95);
    border: 1px solid var(--border-strong);
    backdrop-filter: blur(20px);
    padding: 12px 20px;
    border-radius: 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--fg);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease;
    z-index: 100;
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
  }

  /* Responsive */
  @media (max-width: 480px) {
    body { padding: 20px 16px; }
    .timer { padding: 24px; }
    .btn-primary { padding: 0 32px; min-width: 0; flex: 1; }
    .controls { gap: 10px; }
    .btn-ghost { width: 48px; height: 48px; }
    .brand-name { font-size: 11px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body data-mode="work">
  <div class="bg"></div>
  <div class="noise"></div>

  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <div class="brand-name">TOMATO <span>// POMODORO</span></div>
      </div>
      <button class="icon-btn" id="settingsBtn" aria-label="Toggle settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <!-- Mode tabs -->
    <nav class="modes" role="tablist" aria-label="Timer mode">
      <button class="mode-tab active" data-mode="work" role="tab">Focus</button>
      <button class="mode-tab" data-mode="short" role="tab">Short Break</button>
      <button class="mode-tab" data-mode="long" role="tab">Long Break</button>
    </nav>

    <!-- Timer card -->
    <main class="timer">
      <div class="ring-wrap">
        <svg class="ring-svg" viewBox="0 0 320 320" aria-hidden="true">
          <!-- Outer halo -->
          <circle class="ring-halo" cx="160" cy="160" r="142"/>
          <!-- Track -->
          <circle class="ring-track" cx="160" cy="160" r="142"/>
          <!-- Progress -->
          <circle class="ring-progress" id="progress" cx="160" cy="160" r="142"/>
          <!-- Tick marks generated by JS -->
          <g id="ticks"></g>
        </svg>

        <div class="ring-center">
          <div class="phase-label" id="phaseLabel">Focus</div>
          <div class="time" id="time" aria-live="polite">25:00</div>
          <div class="status" id="status">Ready to focus</div>
        </div>
      </div>
    </main>

    <!-- Controls -->
    <div class="controls">
      <button class="btn-ghost" id="resetBtn" aria-label="Reset timer" title="Reset">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
        </svg>
      </button>

      <button class="btn-primary" id="startBtn">
        <svg viewBox="0 0 24 24" fill="currentColor" id="startIcon"><polygon points="6 4 20 12 6 20 6 4"/></svg>
        <span id="startText">Start</span>
      </button>

      <button class="btn-ghost" id="skipBtn" aria-label="Skip to next phase" title="Skip">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 4 15 12 5 20 5 4" fill="currentColor"/>
          <line x1="19" y1="5" x2="19" y2="19"/>
        </svg>
      </button>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat">
        <span class="stat-label">Round</span>
        <span class="stat-value" id="sessionCount">0 / 4</span>
      </div>
      <div class="stat">
        <span class="stat-label">Today</span>
        <span class="stat-value accent" id="todayCount">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Focus Time</span>
        <span class="stat-value" id="focusTime">0m</span>
      </div>
    </div>

    <!-- Status hint -->
    <div class="hint">
      <span class="hint-dot"></span>
      <span id="hintText">Press start to begin your first focus session.</span>
    </div>

    <!-- Settings -->
    <section class="settings" id="settingsPanel" aria-label="Settings">
      <div class="settings-inner">
        <div class="settings-title">Durations (minutes)</div>

        <div class="setting-row">
          <span class="setting-label">Focus</span>
          <div class="setting-control">
            <button class="step-btn" data-dec="work" aria-label="Decrease focus">−</button>
            <span class="step-value" id="workMin">25</span>
            <button class="step-btn" data-inc="work" aria-label="Increase focus">+</button>
          </div>
        </div>

        <div class="setting-row">
          <span class="setting-label">Short Break</span>
          <div class="setting-control">
            <button class="step-btn" data-dec="short" aria-label="Decrease short break">−</button>
            <span class="step-value" id="shortMin">5</span>
            <button class="step-btn" data-inc="short" aria-label="Increase short break">+</button>
          </div>
        </div>

        <div class="setting-row">
          <span class="setting-label">Long Break</span>
          <div class="setting-control">
            <button class="step-btn" data-dec="long" aria-label="Decrease long break">−</button>
            <span class="step-value" id="longMin">15</span>
            <button class="step-btn" data-inc="long" aria-label="Increase long break">+</button>
          </div>
        </div>

        <div class="setting-row">
          <span class="setting-label">Rounds until long break</span>
          <div class="setting-control">
            <button class="step-btn" data-dec="rounds" aria-label="Decrease rounds">−</button>
            <span class="step-value" id="roundsVal">4</span>
            <button class="step-btn" data-inc="rounds" aria-label="Increase rounds">+</button>
          </div>
        </div>

        <div class="setting-row">
          <span class="setting-label">Auto-start next phase</span>
          <div class="toggle on" id="autoToggle" role="switch" aria-checked="true"></div>
        </div>

        <div class="setting-row">
          <span class="setting-label">Sound on completion</span>
          <div class="toggle on" id="soundToggle" role="switch" aria-checked="true"></div>
        </div>
      </div>
    </section>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite">
    <span class="toast-dot"></span>
    <span id="toastText"></span>
  </div>

<script>
(function () {
  'use strict';

  // ---------- State ----------
  const MODE_LABEL = { work: 'Focus', short: 'Short Break', long: 'Long Break' };
  const MODE_NEXT = { work: 'short', short: 'work', long: 'work' };

  const state = {
    mode: 'work',
    durations: { work: 25, short: 5, long: 15 }, // minutes
    remaining: 25 * 60, // seconds
    total: 25 * 60,
    running: false,
    intervalId: null,
    completedWork: 0,        // total ever
    roundsBeforeLong: 4,
    autoStart: true,
    sound: true,
    sessionKey: new Date().toDateString(),
    todayCount: 0,
    todayFocusSeconds: 0
  };

  // ---------- Elements ----------
  const el = {
    body: document.body,
    time: document.getElementById('time'),
    progress: document.getElementById('progress'),
    phaseLabel: document.getElementById('phaseLabel'),
    status: document.getElementById('status'),
    hintText: document.getElementById('hintText'),
    startBtn: document.getElementById('startBtn'),
    startText: document.getElementById('startText'),
    startIcon: document.getElementById('startIcon'),
    resetBtn: document.getElementById('resetBtn'),
    skipBtn: document.getElementById('skipBtn'),
    sessionCount: document.getElementById('sessionCount'),
    todayCount: document.getElementById('todayCount'),
    focusTime: document.getElementById('focusTime'),
    settingsBtn: document.getElementById('settingsBtn'),
    settingsPanel: document.getElementById('settingsPanel'),
    autoToggle: document.getElementById('autoToggle'),
    soundToggle: document.getElementById('soundToggle'),
    ticks: document.getElementById('ticks'),
    toast: document.getElementById('toast'),
    toastText: document.getElementById('toastText')
  };

  // ---------- Persistence ----------
  function loadState() {
    try {
      const raw = localStorage.getItem('tomato-state');
      if (raw) {
        const data = JSON.parse(raw);
        if (data.durations) state.durations = { ...state.durations, ...data.durations };
        if (typeof data.roundsBeforeLong === 'number') state.roundsBeforeLong = data.roundsBeforeLong;
        if (typeof data.autoStart === 'boolean') state.autoStart = data.autoStart;
        if (typeof data.sound === 'boolean') state.sound = data.sound;
        if (typeof data.completedWork === 'number') state.completedWork = data.completedWork;
        if (data.sessionKey === state.sessionKey) {
          state.todayCount = data.todayCount || 0;
          state.todayFocusSeconds = data.todayFocusSeconds || 0;
        }
      }
    } catch (e) { /* ignore */ }
  }
  function saveState() {
    try {
      localStorage.setItem('tomato-state', JSON.stringify({
        durations: state.durations,
        roundsBeforeLong: state.roundsBeforeLong,
        autoStart: state.autoStart,
        sound: state.sound,
        completedWork: state.completedWork,
        sessionKey: state.sessionKey,
        todayCount: state.todayCount,
        todayFocusSeconds: state.todayFocusSeconds
      }));
    } catch (e) { /* ignore */ }
  }

  // ---------- Audio (Web Audio API) ----------
  let audioCtx = null;
  function getAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { return null; }
    }
    return audioCtx;
  }
  function playBeep() {
    if (!state.sound) return;
    const ctx = getAudio();
    if (!ctx) return;
    if (ctx.state === 'suspended') ctx.resume();

    const now = ctx.currentTime;
    const notes = [
      { f: 880, t: 0,    d: 0.18 },
      { f: 660, t: 0.22, d: 0.18 },
      { f: 880, t: 0.44, d: 0.28 }
    ];
    notes.forEach(n => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = n.f;
      const start = now + n.t;
      const end = start + n.d;
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(0.25, start + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, end);
      osc.connect(gain).connect(ctx.destination);
      osc.start(start);
      osc.stop(end + 0.02);
    });

    // Subtle low undertone
    const sub = ctx.createOscillator();
    const subGain = ctx.createGain();
    sub.type = 'triangle';
    sub.frequency.value = 220;
    subGain.gain.setValueAtTime(0.0001, now);
    subGain.gain.exponentialRampToValueAtTime(0.08, now + 0.05);
    subGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.8);
    sub.connect(subGain).connect(ctx.destination);
    sub.start(now);
    sub.stop(now + 0.85);
  }

  // ---------- Ring geometry ----------
  const RADIUS = 142;
  const CIRC = 2 * Math.PI * RADIUS;
  el.progress.style.strokeDasharray = CIRC;
  el.progress.style.strokeDashoffset = 0;

  // Generate tick marks
  function buildTicks() {
    const cx = 160, cy = 160;
    const inner = 118, outer = 124, outerMajor = 128;
    const frag = document.createDocumentFragment();
    for (let i = 0; i < 60; i++) {
      const angle = (i / 60) * Math.PI * 2;
      const isMajor = i % 5 === 0;
      const o = isMajor ? outerMajor : outer;
      const x1 = cx + Math.cos(angle) * inner;
      const y1 = cy + Math.sin(angle) * inner;
      const x2 = cx + Math.cos(angle) * o;
      const y2 = cy + Math.sin(angle) * o;
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', x1); line.setAttribute('y1', y1);
      line.setAttribute('x2', x2); line.setAttribute('y2', y2);
      line.setAttribute('class', isMajor ? 'tick major' : 'tick');
      frag.appendChild(line);
    }
    el.ticks.appendChild(frag);
  }

  // ---------- Rendering ----------
  function formatTime(sec) {
    sec = Math.max(0, Math.floor(sec));
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  }

  function formatFocusTime(totalSec) {
    const mins = Math.floor(totalSec / 60);
    if (mins < 60) return mins + 'm';
    const h = Math.floor(mins / 60);
    const m = mins % 60;
    return m === 0 ? h + 'h' : h + 'h ' + m + 'm';
  }

  function render() {
    el.body.dataset.mode = state.mode;
    el.time.textContent = formatTime(state.remaining);
    el.phaseLabel.textContent = MODE_LABEL[state.mode];

    const progress = state.total > 0 ? state.remaining / state.total : 0;
    el.progress.style.strokeDashoffset = CIRC * (1 - progress);

    el.time.classList.toggle('paused', !state.running);

    if (state.running) {
      el.startText.textContent = 'Pause';
      el.startIcon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
      el.status.textContent = state.mode === 'work' ? 'Focusing…' : 'On a break';
      el.status.classList.add('running');
      el.hintText.textContent = state.mode === 'work'
        ? 'Stay focused. Eliminate distractions.'
        : 'Step away. Rest your eyes and mind.';
    } else {
      el.startText.textContent = 'Start';
      el.startIcon.innerHTML = '<polygon points="6 4 20 12 6 20 6 4"/>';
      el.status.textContent = state.remaining < state.total
        ? 'Paused'
        : (state.mode === 'work' ? 'Ready to focus' : 'Ready for a break');
      el.status.classList.remove('running');
      if (state.remaining < state.total) {
        el.hintText.textContent = 'Take a breath, then continue when ready.';
      } else {
        el.hintText.textContent = state.mode === 'work'
          ? 'Press start to begin a focus session.'
          : (state.completedWork > 0 ? 'Time for a well-earned break.' : 'Complete a focus session first.');
      }
    }

    const completedInCycle = state.completedWork % state.roundsBeforeLong;
    el.sessionCount.textContent = completedInCycle + ' / ' + state.roundsBeforeLong;
    el.todayCount.textContent = state.todayCount;
    el.focusTime.textContent = formatFocusTime(state.todayFocusSeconds);

    // Sync settings UI
    document.getElementById('workMin').textContent = state.durations.work;
    document.getElementById('shortMin').textContent = state.durations.short;
    document.getElementById('longMin').textContent = state.durations.long;
    document.getElementById('roundsVal').textContent = state.roundsBeforeLong;
    el.autoToggle.classList.toggle('on', state.autoStart);
    el.soundToggle.classList.toggle('on', state.sound);
    el.autoToggle.setAttribute('aria-checked', state.autoStart);
    el.soundToggle.setAttribute('aria-checked', state.sound);

    // Update page title
    document.title = formatTime(state.remaining) + ' · ' + MODE_LABEL[state.mode];
  }

  // ---------- Timer logic ----------
  function setMode(mode, { resetTime = true } = {}) {
    state.mode = mode;
    if (resetTime) {
      state.total = state.durations[mode] * 60;
      state.remaining = state.total;
    }
    document.querySelectorAll('.mode-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.mode === mode);
      t.setAttribute('aria-selected', t.dataset.mode === mode);
    });
    render();
  }

  function tick() {
    state.remaining -= 1;
    if (state.remaining <= 0) {
      state.remaining = 0;
      finishPhase();
      return;
    }
    // Track focus time actual
    if (state.mode === 'work') {
      state.todayFocusSeconds += 1;
    }
    render();
    // Save periodically (every minute)
    if (state.remaining % 60 === 0) saveState();
  }

  function start() {
    if (state.running) return;
    state.running = true;
    // Ensure audio context is unlocked on user gesture
    getAudio();
    if (state.intervalId) clearInterval(state.intervalId);
    state.intervalId = setInterval(tick, 1000);
    render();
  }

  function pause() {
    if (!state.running) return;
    state.running = false;
    clearInterval(state.intervalId);
    state.intervalId = null;
    render();
  }

  function reset() {
    pause();
    state.total = state.durations[state.mode] * 60;
    state.remaining = state.total;
    render();
    showToast('Timer reset');
  }

  function finishPhase() {
    pause();
    playBeep();

    if (state.mode === 'work') {
      state.completedWork += 1;
      state.todayCount += 1;
      const nextMode = (state.completedWork % state.roundsBeforeLong === 0) ? 'long' : 'short';
      showToast('Focus complete · ' + MODE_LABEL[nextMode] + ' next');
      setMode(nextMode);
    } else {
      showToast('Break complete · back to focus');
      setMode('work');
    }

    saveState();

    if (state.autoStart) {
      // Small delay so UI can settle
      setTimeout(start, 700);
    }
  }

  function skip() {
    pause();
    if (state.mode === 'work') {
      // Only count as completed if at least half elapsed
      if (state.remaining < state.total * 0.5) {
        state.completedWork += 1;
        state.todayCount += 1;
      }
      const nextMode = (state.completedWork % state.roundsBeforeLong === 0) ? 'long' : 'short';
      setMode(nextMode);
      showToast('Skipped to ' + MODE_LABEL[nextMode]);
    } else {
      setMode('work');
      showToast('Skipped to Focus');
    }
    saveState();
  }

  // ---------- Toast ----------
  let toastTimer = null;
  function showToast(text) {
    el.toastText.textContent = text;
    el.toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.toast.classList.remove('show'), 2600);
  }

  // ---------- Settings handlers ----------
  function adjustDuration(key, delta) {
    const min = key === 'work' ? 1 : 1;
    const max = key === 'work' ? 90 : 60;
    let val = state.durations[key] + delta;
    val = Math.max(min, Math.min(max, val));
    state.durations[key] = val;
    if (key === state.mode && !state.running) {
      state.total = val * 60;
      state.remaining = state.total;
    }
    saveState();
    render();
  }

  function adjustRounds(delta) {
    state.roundsBeforeLong = Math.max(2, Math.min(8, state.roundsBeforeLong + delta));
    saveState();
    render();
  }

  // ---------- Wire events ----------
  el.startBtn.addEventListener('click', () => {
    if (state.running) pause(); else start();
  });
  el.resetBtn.addEventListener('click', reset);
  el.skipBtn.addEventListener('click', skip);

  document.querySelectorAll('.mode-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      if (tab.dataset.mode === state.mode) return;
      pause();
      setMode(tab.dataset.mode);
    });
  });

  el.settingsBtn.addEventListener('click', () => {
    const open = el.settingsPanel.classList.toggle('open');
    el.settingsBtn.style.color = open ? 'var(--fg)' : '';
  });

  document.querySelectorAll('[data-dec]').forEach(b => {
    b.addEventListener('click', () => {
      const key = b.getAttribute('data-dec');
      if (key === 'rounds') adjustRounds(-1); else adjustDuration(key, -1);
    });
  });
  document.querySelectorAll('[data-inc]').forEach(b => {
    b.addEventListener('click', () => {
      const key = b.getAttribute('data-inc');
      if (key === 'rounds') adjustRounds(1); else adjustDuration(key, 1);
    });
  });

  el.autoToggle.addEventListener('click', () => {
    state.autoStart = !state.autoStart;
    saveState();
    render();
  });
  el.soundToggle.addEventListener('click', () => {
    state.sound = !state.sound;
    if (state.sound) {
      // Quick test beep
      getAudio();
      const ctx = getAudio();
      if (ctx && ctx.state === 'suspended') ctx.resume();
      playBeep();
    }
    saveState();
    render();
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.code === 'Space') { e.preventDefault(); state.running ? pause() : start(); }
    else if (e.key === 'r' || e.key === 'R') reset();
    else if (e.key === 's' || e.key === 'S') skip();
    else if (e.key === '1') { pause(); setMode('work'); }
    else if (e.key === '2') { pause(); setMode('short'); }
    else if (e.key === '3') { pause(); setMode('long'); }
  });

  // ---------- Init ----------
  buildTicks();
  loadState();
  setMode(state.mode, { resetTime: true });
  render();
})();
</script>
</body>
</html>
