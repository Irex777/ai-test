<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Analytics Dashboard</title>
<style>
  /* ===== CSS Variables / Design Tokens ===== */
  :root {
    --bg: #06090f;
    --bg-elevated: #0c1019;
    --card: #111723;
    --card-hover: #161e2e;
    --border: #1e293b;
    --border-subtle: #162032;
    --fg: #e8ecf4;
    --fg-muted: #7a8ba8;
    --fg-dim: #4a5b75;
    --accent: #00dfa2;
    --accent-glow: rgba(0,223,162,0.15);
    --accent-soft: rgba(0,223,162,0.08);
    --amber: #f5a623;
    --amber-soft: rgba(245,166,35,0.12);
    --rose: #f4587b;
    --rose-soft: rgba(244,88,123,0.12);
    --blue: #3b9eff;
    --blue-soft: rgba(59,158,255,0.12);
    --radius: 14px;
    --radius-sm: 8px;
    --shadow-card: 0 1px 3px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.2);
    --shadow-hover: 0 4px 12px rgba(0,0,0,0.4), 0 16px 40px rgba(0,0,0,0.3);
    --transition: 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  /* ===== Reset ===== */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ===== Atmospheric background ===== */
  body::before {
    content: '';
    position: fixed;
    top: -30%; left: -20%;
    width: 70vw; height: 70vw;
    background: radial-gradient(circle, rgba(0,223,162,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -40%; right: -15%;
    width: 60vw; height: 60vw;
    background: radial-gradient(circle, rgba(59,158,255,0.03) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ===== Scrollbar ===== */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--fg-dim); }

  /* ===== Layout ===== */
  .dashboard {
    position: relative;
    z-index: 1;
    max-width: 1440px;
    margin: 0 auto;
    padding: 24px 32px 48px;
  }

  /* ===== Header ===== */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border-subtle);
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo-mark {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), #00b386);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 18px; color: #06090f;
    box-shadow: 0 0 20px rgba(0,223,162,0.2);
  }
  .header-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .header-title span { color: var(--fg-muted); font-weight: 400; font-size: 15px; margin-left: 8px; }

  .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

  /* ===== Toolbar Controls ===== */
  .date-filter {
    display: flex; align-items: center; gap: 4px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 4px;
  }
  .date-btn {
    padding: 7px 14px;
    border: none; background: transparent;
    color: var(--fg-muted);
    font-size: 13px; font-weight: 500;
    border-radius: 6px;
    cursor: pointer;
    transition: var(--transition);
    white-space: nowrap;
  }
  .date-btn:hover { color: var(--fg); background: var(--bg-elevated); }
  .date-btn.active {
    background: var(--accent);
    color: #06090f;
    font-weight: 600;
    box-shadow: 0 0 12px rgba(0,223,162,0.25);
  }

  .btn {
    padding: 8px 18px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--fg);
    font-size: 13px; font-weight: 500;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: var(--transition);
    display: flex; align-items: center; gap: 6px;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
  .btn svg { width: 15px; height: 15px; }

  .refresh-indicator {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--fg-dim);
    padding: 6px 12px;
    background: var(--card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
  }
  .refresh-dot {
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,223,162,0.4); }
    50% { opacity: 0.6; box-shadow: 0 0 0 6px rgba(0,223,162,0); }
  }

  /* ===== KPI Cards Grid ===== */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-bottom: 28px;
  }

  .kpi-card {
    background: var(--card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    padding: 24px;
    position: relative;
    overflow: hidden;
    transition: var(--transition);
    cursor: default;
    box-shadow: var(--shadow-card);
  }
  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: var(--radius) var(--radius) 0 0;
    opacity: 0;
    transition: var(--transition);
  }
  .kpi-card:hover {
    transform: translateY(-4px);
    border-color: transparent;
    box-shadow: var(--shadow-hover);
    background: var(--card-hover);
  }
  .kpi-card:hover::before { opacity: 1; }

  .kpi-card.accent-green::before { background: linear-gradient(90deg, var(--accent), #00b386); }
  .kpi-card.accent-blue::before { background: linear-gradient(90deg, var(--blue), #2563eb); }
  .kpi-card.accent-amber::before { background: linear-gradient(90deg, var(--amber), #d97706); }
  .kpi-card.accent-rose::before { background: linear-gradient(90deg, var(--rose), #e11d48); }

  .kpi-card.accent-green:hover { border-color: rgba(0,223,162,0.2); }
  .kpi-card.accent-blue:hover { border-color: rgba(59,158,255,0.2); }
  .kpi-card.accent-amber:hover { border-color: rgba(245,166,35,0.2); }
  .kpi-card.accent-rose:hover { border-color: rgba(244,88,123,0.2); }

  .kpi-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .kpi-label { font-size: 13px; font-weight: 500; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.5px; }

  .kpi-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .kpi-icon svg { width: 18px; height: 18px; }
  .kpi-icon.green { background: var(--accent-soft); color: var(--accent); }
  .kpi-icon.blue { background: var(--blue-soft); color: var(--blue); }
  .kpi-icon.amber { background: var(--amber-soft); color: var(--amber); }
  .kpi-icon.rose { background: var(--rose-soft); color: var(--rose); }

  .kpi-value {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.1;
    margin-bottom: 10px;
    font-variant-numeric: tabular-nums;
  }

  .kpi-footer { display: flex; align-items: center; gap: 8px; }
  .kpi-trend {
    display: flex; align-items: center; gap: 3px;
    font-size: 12px; font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
  }
  .kpi-trend.up { background: var(--accent-soft); color: var(--accent); }
  .kpi-trend.down { background: var(--rose-soft); color: var(--rose); }
  .kpi-trend svg { width: 12px; height: 12px; }
  .kpi-period { font-size: 12px; color: var(--fg-dim); }

  /* Sparkline inside card */
  .kpi-sparkline {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 50px;
    opacity: 0.15;
    transition: opacity var(--transition);
  }
  .kpi-card:hover .kpi-sparkline { opacity: 0.3; }

  /* ===== Main Content Grid ===== */
  .content-grid {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 20px;
  }

  .panel {
    background: var(--card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    box-shadow: var(--shadow-card);
    overflow: hidden;
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border-subtle);
  }
  .panel-title { font-size: 16px; font-weight: 600; }
  .panel-badge {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--accent-soft);
    color: var(--accent);
    font-weight: 600;
  }

  /* ===== Chart ===== */
  .chart-container {
    padding: 20px 24px 24px;
    position: relative;
  }
  .chart-canvas { width: 100%; height: 320px; display: block; }
  .chart-tooltip {
    position: absolute;
    background: #1a2236;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 10;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .chart-tooltip.visible { opacity: 1; }
  .chart-tooltip-label { color: var(--fg-muted); margin-bottom: 4px; }
  .chart-tooltip-value { font-size: 16px; font-weight: 700; color: var(--accent); }

  /* ===== Activity Feed ===== */
  .activity-list { padding: 8px 0; max-height: 430px; overflow-y: auto; }
  .activity-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 14px 24px;
    transition: background var(--transition);
    cursor: default;
    position: relative;
  }
  .activity-item:hover { background: var(--bg-elevated); }
  .activity-item + .activity-item::before {
    content: '';
    position: absolute;
    top: 0; left: 52px; right: 24px;
    height: 1px;
    background: var(--border-subtle);
  }

  .activity-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
    flex-shrink: 0;
  }
  .activity-avatar.green { background: var(--accent-soft); color: var(--accent); }
  .activity-avatar.blue { background: var(--blue-soft); color: var(--blue); }
  .activity-avatar.amber { background: var(--amber-soft); color: var(--amber); }
  .activity-avatar.rose { background: var(--rose-soft); color: var(--rose); }

  .activity-body { flex: 1; min-width: 0; }
  .activity-text { font-size: 13px; color: var(--fg); line-height: 1.5; }
  .activity-text strong { font-weight: 600; }
  .activity-time { font-size: 11px; color: var(--fg-dim); margin-top: 3px; }
  .activity-amount { font-size: 13px; font-weight: 600; color: var(--accent); white-space: nowrap; }

  /* ===== Secondary Stats Row ===== */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-top: 20px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    padding: 20px 24px;
    box-shadow: var(--shadow-card);
    transition: var(--transition);
  }
  .stat-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-hover);
    border-color: var(--border);
  }
  .stat-label { font-size: 12px; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .stat-value { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .stat-bar { height: 4px; background: var(--bg); border-radius: 2px; overflow: hidden; }
  .stat-bar-fill { height: 100%; border-radius: 2px; transition: width 1s ease; }
  .stat-bar-fill.green { background: linear-gradient(90deg, var(--accent), #00b386); }
  .stat-bar-fill.blue { background: linear-gradient(90deg, var(--blue), #2563eb); }
  .stat-bar-fill.amber { background: linear-gradient(90deg, var(--amber), #d97706); }

  /* ===== Toast ===== */
  .toast-container {
    position: fixed;
    bottom: 24px; right: 24px;
    z-index: 1000;
    display: flex; flex-direction: column; gap: 8px;
  }
  .toast {
    background: #1a2236;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 18px;
    font-size: 13px;
    color: var(--fg);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    display: flex; align-items: center; gap: 8px;
    animation: toast-in 0.3s ease;
    min-width: 240px;
  }
  .toast.leaving { animation: toast-out 0.3s ease forwards; }
  .toast-icon { font-size: 16px; }
  @keyframes toast-in { from { opacity: 0; transform: translateY(16px) scale(0.95); } to { opacity: 1; transform: none; } }
  @keyframes toast-out { from { opacity: 1; transform: none; } to { opacity: 0; transform: translateY(-8px) scale(0.95); } }

  /* ===== Responsive ===== */
  @media (max-width: 1100px) {
    .content-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 900px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .stats-row { grid-template-columns: 1fr; }
    .dashboard { padding: 16px; }
  }
  @media (max-width: 600px) {
    .kpi-grid { grid-template-columns: 1fr; }
    .header { flex-direction: column; align-items: flex-start; }
    .header-right { width: 100%; }
    .date-filter { width: 100%; overflow-x: auto; }
    .kpi-value { font-size: 28px; }
  }

  /* ===== Reduced Motion ===== */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>
  <div class="dashboard">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="logo-mark">N</div>
        <h1 class="header-title">Nexus <span>Analytics</span></h1>
      </div>
      <div class="header-right">
        <div class="refresh-indicator">
          <div class="refresh-dot"></div>
          <span id="refreshTimer">Refreshing in 30s</span>
        </div>
        <nav class="date-filter" aria-label="Date range filter">
          <button class="date-btn" data-range="7">7D</button>
          <button class="date-btn active" data-range="30">30D</button>
          <button class="date-btn" data-range="90">90D</button>
          <button class="date-btn" data-range="365">1Y</button>
        </nav>
        <button class="btn" id="exportBtn" aria-label="Export data">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export CSV
        </button>
      </div>
    </header>

    <!-- KPI Cards -->
    <section class="kpi-grid" aria-label="Key performance indicators">
      <article class="kpi-card accent-green">
        <div class="kpi-header">
          <span class="kpi-label">Revenue</span>
          <div class="kpi-icon green">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          </div>
        </div>
        <div class="kpi-value" id="kpi-revenue" data-target="847" data-prefix="$" data-suffix="K">$0K</div>
        <div class="kpi-footer">
          <span class="kpi-trend up"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="1,8 6,3 11,8"/></svg>+12.5%</span>
          <span class="kpi-period">vs last period</span>
        </div>
        <canvas class="kpi-sparkline" id="spark-revenue"></canvas>
      </article>

      <article class="kpi-card accent-blue">
        <div class="kpi-header">
          <span class="kpi-label">Users</span>
          <div class="kpi-icon blue">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
        </div>
        <div class="kpi-value" id="kpi-users" data-target="12.4" data-prefix="" data-suffix="K">0K</div>
        <div class="kpi-footer">
          <span class="kpi-trend up"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="1,8 6,3 11,8"/></svg>+8.3%</span>
          <span class="kpi-period">vs last period</span>
        </div>
        <canvas class="kpi-sparkline" id="spark-users"></canvas>
      </article>

      <article class="kpi-card accent-amber">
        <div class="kpi-header">
          <span class="kpi-label">Orders</span>
          <div class="kpi-icon amber">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          </div>
        </div>
        <div class="kpi-value" id="kpi-orders" data-target="3.2" data-prefix="" data-suffix="K">0K</div>
        <div class="kpi-footer">
          <span class="kpi-trend up"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="1,8 6,3 11,8"/></svg>+5.7%</span>
          <span class="kpi-period">vs last period</span>
        </div>
        <canvas class="kpi-sparkline" id="spark-orders"></canvas>
      </article>

      <article class="kpi-card accent-rose">
        <div class="kpi-header">
          <span class="kpi-label">Growth</span>
          <div class="kpi-icon rose">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
          </div>
        </div>
        <div class="kpi-value" id="kpi-growth" data-target="24" data-prefix="+" data-suffix="%">+0%</div>
        <div class="kpi-footer">
          <span class="kpi-trend up"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="1,8 6,3 11,8"/></svg>+3.1%</span>
          <span class="kpi-period">vs last period</span>
        </div>
        <canvas class="kpi-sparkline" id="spark-growth"></canvas>
      </article>
    </section>

    <!-- Main Content -->
    <div class="content-grid">
      <!-- Revenue Chart -->
      <section class="panel">
        <div class="panel-header">
          <h2 class="panel-title">Revenue Overview</h2>
          <span class="panel-badge">Live</span>
        </div>
        <div class="chart-container">
          <canvas class="chart-canvas" id="revenueChart"></canvas>
          <div class="chart-tooltip" id="chartTooltip">
            <div class="chart-tooltip-label" id="tooltipLabel"></div>
            <div class="chart-tooltip-value" id="tooltipValue"></div>
          </div>
        </div>
      </section>

      <!-- Activity Feed -->
      <section class="panel">
        <div class="panel-header">
          <h2 class="panel-title">Recent Activity</h2>
          <span class="panel-badge" id="activityCount">10 new</span>
        </div>
        <div class="activity-list" id="activityFeed" role="log" aria-label="Recent activity feed">
          <!-- Populated by JS -->
        </div>
      </section>
    </div>

    <!-- Secondary Stats -->
    <section class="stats-row" aria-label="Secondary statistics">
      <div class="stat-card">
        <div class="stat-label">Conversion Rate</div>
        <div class="stat-value" id="stat-conversion">3.8%</div>
        <div class="stat-bar"><div class="stat-bar-fill green" id="bar-conversion" style="width:0%"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg. Order Value</div>
        <div class="stat-value" id="stat-aov">$264</div>
        <div class="stat-bar"><div class="stat-bar-fill blue" id="bar-aov" style="width:0%"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Customer Satisfaction</div>
        <div class="stat-value" id="stat-csat">94.2%</div>
        <div class="stat-bar"><div class="stat-bar-fill amber" id="bar-csat" style="width:0%"></div></div>
      </div>
    </section>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

<script>
/* ============================
   DATA
   ============================ */
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// Base revenue data for different ranges
const revenueData = {
  7:  { labels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'], values: [18.2, 22.5, 19.8, 28.4, 32.1, 26.7, 30.9] },
  30: { labels: ['Week 1','Week 2','Week 3','Week 4'], values: [142, 189, 221, 295] },
  90: { labels: MONTHS.slice(0, 3).concat(MONTHS.slice(3, 6)), values: [320, 380, 410, 450, 520, 590] },
  365:{ labels: MONTHS, values: [120, 145, 180, 210, 195, 240, 290, 340, 410, 460, 520, 610] }

/* ============================
   KPI ANIMATED COUNTERS
   ============================ */
function animateCounter(el, target, duration) {
  const prefix = el.dataset.prefix || '';
  const suffix = el.dataset.suffix || '';
  const start = 0;
  const startTime = performance.now();
  const isDecimal = target % 1 !== 0;

  function tick(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    // Ease-out cubic
    const eased = 1 - Math.pow(1 - progress, 3);
    const current = start + (target - start) * eased;
    const display = isDecimal ? current.toFixed(1) : Math.round(current);
    el.textContent = prefix + display.toLocaleString() + suffix;
    if (progress < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function runCounters() {
  document.querySelectorAll('.kpi-value').forEach(function(el) {
    const target = parseFloat(el.dataset.target);
    animateCounter(el, target, 1800);
  });
}

/* ============================

   ============================ */
function drawSparkline(canvasId, data, color) {
  var canvas = document.getElementById(canvasId);
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = 50 * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = '50px';
  ctx.scale(dpr, dpr);

  var w = rect.width;
  var h = 50;
  var max = Math.max.apply(null, data);
  var min = Math.min.apply(null, data);
  var range = max - min || 1;
  var step = w / (data.length - 1);

  ctx.clearRect(0, 0, w, h);

  // Fill
  ctx.beginPath();
  ctx.moveTo(0, h);
  data.forEach(function(val, i) {
    var x = i * step;
    var y = h - ((val - min) / range) * h * 0.8 - h * 0.1;
    if (i === 0) ctx.lineTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.lineTo(w, h);
  ctx.closePath();

  var grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, color);
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fill();
}

/* ============================
   REVENUE CHART (Canvas)
   ============================ */
var chartCanvas, chartCtx, chartData, chartPoints;
var hoveredIndex = -1;

function initChart() {
  chartCanvas = document.getElementById('revenueChart');
  chartCtx = chartCanvas.getContext('2d');
  updateChartData(currentRange);
  chartCanvas.addEventListener('mousemove', onChartMouseMove);
  chartCanvas.addEventListener('mouseleave', onChartMouseLeave);
  window.addEventListener('resize', function() { drawChart(); });
}

function updateChartData(range) {
  chartData = JSON.parse(JSON.stringify(revenueData[range]));
  // Simulate slight variations on each update
  chartData.values = chartData.values.map(function(v) {
    return Math.round((v + (Math.random() - 0.5) * v * 0.08) * 10) / 10;
  });
  drawChart();
}

function drawChart() {
  if (!chartData) return;
  var dpr = window.devicePixelRatio || 1;
  var rect = chartCanvas.parentElement.getBoundingClientRect();
  var w = rect.width;
  var h = 320;
  chartCanvas.width = w * dpr;
  chartCanvas.height = h * dpr;
  chartCanvas.style.width = w + 'px';
  chartCanvas.style.height = h + 'px';
  chartCtx.scale(dpr, dpr);

  var ctx = chartCtx;
  var pad = { top: 30, right: 20, bottom: 50, left: 60 };
  var chartW = w - pad.left - pad.right;
  var chartH = h - pad.top - pad.bottom;

  var values = chartData.values;
  var labels = chartData.labels;
  var maxVal = Math.max.apply(null, values) * 1.15;
  var minVal = 0;

  ctx.clearRect(0, 0, w, h);

  // Grid lines
  var gridLines = 5;
  ctx.strokeStyle = 'rgba(30,41,59,0.5)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  for (var i = 0; i <= gridLines; i++) {
    var y = pad.top + (chartH / gridLines) * i;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(w - pad.right, y);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // Y-axis labels
  ctx.fillStyle = '#4a5b75';
  ctx.font = '11px -apple-system, sans-serif';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  for (var i = 0; i <= gridLines; i++) {
    var y = pad.top + (chartH / gridLines) * i;
    var val = maxVal - (maxVal / gridLines) * i;
    var label = val >= 100 ? '$' + Math.round(val) : '$' + val.toFixed(1);
    ctx.fillText(label, pad.left - 12, y);
  }

  // Compute points
  chartPoints = [];
  var step = chartW / (values.length - 1);
  for (var i = 0; i < values.length; i++) {
    var x = pad.left + step * i;
    var y = pad.top + chartH - ((values[i] - minVal) / (maxVal - minVal)) * chartH;
    chartPoints.push({ x: x, y: y, val: values[i], label: labels[i] });
  }

  // Area fill
  ctx.beginPath();
  ctx.moveTo(chartPoints[0].x, chartPoints[0].y);
  for (var i = 1; i < chartPoints.length; i++) {
    var prev = chartPoints[i - 1];
    var curr = chartPoints[i];
    var cpx = (prev.x + curr.x) / 2;
    ctx.bezierCurveTo(cpx, prev.y, cpx, curr.y, curr.x, curr.y);
  }
  ctx.lineTo(chartPoints[chartPoints.length - 1].x, pad.top + chartH);
  ctx.lineTo(chartPoints[0].x, pad.top + chartH);
  ctx.closePath();

  var areaGrad = ctx.createLinearGradient(0, pad.top, 0, pad.top + chartH);
  areaGrad.addColorStop(0, 'rgba(0,223,162,0.2)');
  areaGrad.addColorStop(1, 'rgba(0,223,162,0.0)');
  ctx.fillStyle = areaGrad;
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.moveTo(chartPoints[0].x, chartPoints[0].y);
  for (var i = 1; i < chartPoints.length; i++) {
    var prev = chartPoints[i - 1];
    var curr = chartPoints[i];
    var cpx = (prev.x + curr.x) / 2;
    ctx.bezierCurveTo(cpx, prev.y, cpx, curr.y, curr.x, curr.y);
  }
  ctx.strokeStyle = '#00dfa2';
  ctx.lineWidth = 2.5;
  ctx.shadowColor = 'rgba(0,223,162,0.3)';
  ctx.shadowBlur = 8;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Dots
  chartPoints.forEach(function(pt, idx) {
    var isHovered = idx === hoveredIndex;
    var r = isHovered ? 6 : 4;
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, r, 0, Math.PI * 2);
    ctx.fillStyle = isHovered ? '#00dfa2' : '#111723';
    ctx.fill();
    ctx.strokeStyle = '#00dfa2';
    ctx.lineWidth = isHovered ? 3 : 2;
    ctx.stroke();
    if (isHovered) {
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, 12, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,223,162,0.1)';
      ctx.fill();
    }
  });

  // X-axis labels
  ctx.fillStyle = '#4a5b75';
  ctx.font = '12px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  chartPoints.forEach(function(pt) {
    ctx.fillText(pt.label, pt.x, pad.top + chartH + 12);
  });
}

function onChartMouseMove(e) {
  var rect = chartCanvas.getBoundingClientRect();
  var mx = e.clientX - rect.left;
  var closest = -1;
  var minDist = Infinity;
  if (!chartPoints) return;
  chartPoints.forEach(function(pt, idx) {
    var d = Math.abs(mx - pt.x);
    if (d < minDist && d < 40) {
      minDist = d;
      closest = idx;
    }
  });
  if (closest !== hoveredIndex) {
    hoveredIndex = closest;
    drawChart();
    var tooltip = document.getElementById('chartTooltip');
    if (closest >= 0) {
      var pt = chartPoints[closest];
      document.getElementById('tooltipLabel').textContent = pt.label;
      document.getElementById('tooltipValue').textContent = '$' + pt.val.toFixed(1) + 'K';
      var tx = pt.x + 16;
      var ty = pt.y - 50;
      if (tx + 140 > rect.width) tx = pt.x - 150;
      if (ty < 0) ty = 10;
      tooltip.style.left = tx + 'px';
      tooltip.style.top = ty + 'px';
      tooltip.classList.add('visible');
    } else {
      tooltip.classList.remove('visible');
    }
  }
}

function onChartMouseLeave() {
  hoveredIndex = -1;
  drawChart();
  document.getElementById('chartTooltip').classList.remove('visible');
}

/* ============================
   AUTO-REFRESH TIMER
   ============================ */
function startRefreshTimer() {
  refreshCountdown = refreshInterval;
  var timerEl = document.getElementById('refreshTimer');

  var tick = function() {
    refreshCountdown--;
    if (refreshCountdown <= 0) {
      simulateDataUpdate();
      refreshCountdown = refreshInterval;
    }
    timerEl.textContent = 'Refreshing in ' + refreshCountdown + 's';
  };

  setInterval(tick, 1000);
}

function simulateDataUpdate() {
  // Slightly vary KPI values
  var kpis = [
    { id: 'kpi-revenue', base: 847, variance: 20 },
    { id: 'kpi-users', base: 12.4, variance: 0.3 },
    { id: 'kpi-orders', base: 3.2, variance: 0.15 },
    { id: 'kpi-growth', base: 24, variance: 2 }
  ];

  kpis.forEach(function(kpi) {
    var el = document.getElementById(kpi.id);
    var newVal = kpi.base + (Math.random() - 0.5) * kpi.variance * 2;
    newVal = Math.round(newVal * 10) / 10;
    el.dataset.target = newVal;
    animateCounter(el, newVal, 800);
  });

  // Update chart with new variations
  updateChartData(currentRange);

  // Update stat values
  var conv = (3.5 + Math.random() * 0.8).toFixed(1);
  var aov = Math.round(240 + Math.random() * 50);
  var csat = (92 + Math.random() * 4).toFixed(1);
  document.getElementById('stat-conversion').textContent = conv + '%';
  document.getElementById('stat-aov').textContent = '$' + aov;
  document.getElementById('stat-csat').textContent = csat + '%';
  document.getElementById('bar-conversion').style.width = (parseFloat(conv) * 10) + '%';
  document.getElementById('bar-aov').style.width = (aov / 400 * 100) + '%';
  document.getElementById('bar-csat').style.width = csat + '%';

  // Shift activity feed times
  activityTemplates.forEach(function(item, idx) {
    var actions = [
      'completed a purchase', 'upgraded to Premium plan', 'placed a new order',
      'submitted a bulk order', 'started a free trial', 'renewed their subscription',
      'added items to cart', 'completed onboarding', 'purchased a gift card',
      'left a 5-star review'
    ];
    item.action = actions[Math.floor(Math.random() * actions.length)];
    var amounts = ['$' + Math.round(50 + Math.random() * 2000), '$' + Math.round(50 + Math.random() * 500) + '/mo', '--'];
    item.amount = amounts[Math.floor(Math.random() * amounts.length)];
  });
  renderActivityFeed();

  showToast('Dashboard data refreshed');
}

/* ============================
   TOAST NOTIFICATIONS
   ============================ */
function showToast(message) {
  var container = document.getElementById('toastContainer');
  var toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = '<span class="toast-icon">&#10003;</span> ' + message;
  container.appendChild(toast);

  setTimeout(function() {
    toast.classList.add('leaving');
    setTimeout(function() { toast.remove(); }, 300);
  }, 2500);
}

function init() {
  renderActivityFeed();
  renderSparklines();
  initChart();
  runCounters();
  animateStatBars();
  startRefreshTimer();
}

} else {

}
