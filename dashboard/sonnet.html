<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f1419;
            --bg-secondary: #1a1f2e;
            --bg-tertiary: #242b3d;
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-purple: #8b5cf6;
            --accent-orange: #f59e0b;
            --border-color: #2d3748;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
        }

        .header-controls {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .date-filter {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .date-filter input {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
        }

        .date-filter input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .btn {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .refresh-info {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .kpi-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
            border-color: var(--accent-blue);
        }

        .kpi-card:hover::before {
            opacity: 1;
        }

        .kpi-title {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .kpi-value {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .kpi-change {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
        }

        .kpi-change.positive {
            color: var(--accent-green);
        }

        .kpi-change.negative {
            color: #ef4444;
        }

        .kpi-icon {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.8;
        }

        .kpi-card.revenue .kpi-icon {
            background: rgba(59, 130, 246, 0.2);
            color: var(--accent-blue);
        }

        .kpi-card.users .kpi-icon {
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent-green);
        }

        .kpi-card.orders .kpi-icon {
            background: rgba(139, 92, 246, 0.2);
            color: var(--accent-purple);
        }

        .kpi-card.growth .kpi-icon {
            background: rgba(245, 158, 11, 0.2);
            color: var(--accent-orange);
        }

        .content-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        @media (max-width: 1024px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        .chart-card, .activity-card {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--border-color);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
        }

        .chart-container {
            height: 300px;
            position: relative;
        }

        #revenueChart {
            width: 100%;
            height: 100%;
        }

        .activity-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .activity-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.2s;
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-item:hover {
            background: var(--bg-tertiary);
            margin: 0 -12px;
            padding: 12px;
            border-radius: 6px;
        }

        .activity-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .activity-icon.order {
            background: rgba(59, 130, 246, 0.2);
            color: var(--accent-blue);
        }

        .activity-icon.user {
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent-green);
        }

        .activity-icon.system {
            background: rgba(139, 92, 246, 0.2);
            color: var(--accent-purple);
        }

        .activity-icon.alert {
            background: rgba(245, 158, 11, 0.2);
            color: var(--accent-orange);
        }

        .activity-content {
            flex: 1;
            min-width: 0;
        }

        .activity-text {
            font-size: 14px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .activity-time {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .activity-list::-webkit-scrollbar {
            width: 6px;
        }

        .activity-list::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
            border-radius: 3px;
        }

        .activity-list::-webkit-scrollbar-thumb {
            background: var(--accent-blue);
            border-radius: 3px;
        }

        .chart-tooltip {
            position: absolute;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 10;
        }

        .chart-tooltip.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1>📊 Analytics Dashboard</h1>
            <div class="header-controls">
                <div class="date-filter">
                    <input type="date" id="startDate">
                    <span>to</span>
                    <input type="date" id="endDate">
                </div>
                <button class="btn" onclick="exportData()">📥 Export Data</button>
                <div class="refresh-info">
                    <span class="pulse">🔄</span> Next refresh: <span id="countdown">30</span>s
                </div>
            </div>
        </div>

        <div class="kpi-grid">
            <div class="kpi-card revenue">
                <div class="kpi-icon">💰</div>
                <div class="kpi-title">Total Revenue</div>
                <div class="kpi-value" data-target="847000" data-prefix="$" data-suffix="K" data-divisor="1000">$0</div>
                <div class="kpi-change positive">↑ 12.5% vs last month</div>
            </div>

            <div class="kpi-card users">
                <div class="kpi-icon">👥</div>
                <div class="kpi-title">Active Users</div>
                <div class="kpi-value" data-target="12400" data-suffix="K" data-divisor="1000">0</div>
                <div class="kpi-change positive">↑ 8.2% vs last month</div>
            </div>

            <div class="kpi-card orders">
                <div class="kpi-icon">🛒</div>
                <div class="kpi-title">Total Orders</div>
                <div class="kpi-value" data-target="3200" data-suffix="K" data-divisor="1000">0</div>
                <div class="kpi-change positive">↑ 15.3% vs last month</div>
            </div>

            <div class="kpi-card growth">
                <div class="kpi-icon">📈</div>
                <div class="kpi-title">Growth Rate</div>
                <div class="kpi-value" data-target="24" data-prefix="+" data-suffix="%">+0%</div>
                <div class="kpi-change positive">↑ 2.1% vs last month</div>
            </div>
        </div>

        <div class="content-grid">
            <div class="chart-card">
                <div class="card-header">
                    <h2 class="card-title">Revenue Trend</h2>
                </div>
                <div class="chart-container">
                    <svg id="revenueChart"></svg>
                    <div class="chart-tooltip" id="chartTooltip"></div>
                </div>
            </div>

            <div class="activity-card">
                <div class="card-header">
                    <h2 class="card-title">Recent Activity</h2>
                </div>
                <div class="activity-list" id="activityList">
                    <div class="loading">Loading activities...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function animateCounters() {
            const counters = document.querySelectorAll('.kpi-value');
            counters.forEach(counter => {
                const target = parseInt(counter.dataset.target);
                const prefix = counter.dataset.prefix || '';
                const suffix = counter.dataset.suffix || '';
                const divisor = parseInt(counter.dataset.divisor) || 1;

                let current = 0;
                const increment = target / 50;
                const timer = setInterval(() => {
                    current += increment;
                    if (current >= target) {
                        current = target;
                        clearInterval(timer);
                    }

                    const displayValue = (current / divisor).toFixed(1);
                    counter.textContent = `${prefix}${displayValue}${suffix}`;
                }, 30);
            });
        }

        function createRevenueChart() {
            const svg = document.getElementById('revenueChart');
            const tooltip = document.getElementById('chartTooltip');
            const container = svg.parentElement;

            const data = [
                { month: 'Jan', value: 650 },
                { month: 'Feb', value: 720 },
                { month: 'Mar', value: 810 },
                { month: 'Apr', value: 750 },
                { month: 'May', value: 890 },
                { month: 'Jun', value: 847 },
                { month: 'Jul', value: 920 },
                { month: 'Aug', value: 980 },
                { month: 'Sep', value: 910 },
                { month: 'Oct', value: 1050 },
                { month: 'Nov', value: 1120 },
                { month: 'Dec', value: 1200 }
            ];

            const width = container.clientWidth;
            const height = container.clientHeight;
            const padding = 40;

            svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
            svg.innerHTML = '';

            const maxValue = Math.max(...data.map(d => d.value));
            const xScale = (index) => padding + (index * (width - 2 * padding) / (data.length - 1));
            const yScale = (value) => height - padding - (value / maxValue) * (height - 2 * padding);

            const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
            const gradient = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
            gradient.setAttribute('id', 'areaGradient');
            gradient.setAttribute('x1', '0%');
            gradient.setAttribute('y1', '0%');
            gradient.setAttribute('x2', '0%');
            gradient.setAttribute('y2', '100%');

            const stop1 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
            stop1.setAttribute('offset', '0%');
            stop1.setAttribute('style', 'stop-color:#3b82f6;stop-opacity:0.6');

            const stop2 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
            stop2.setAttribute('offset', '100%');
            stop2.setAttribute('style', 'stop-color:#3b82f6;stop-opacity:0');

            gradient.appendChild(stop1);
            gradient.appendChild(stop2);
            defs.appendChild(gradient);
            svg.appendChild(defs);

            const areaPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            let areaD = `M ${xScale(0)} ${height - padding}`;
            data.forEach((point, index) => {
                areaD += ` L ${xScale(index)} ${yScale(point.value)}`;
            });
            areaD += ` L ${xScale(data.length - 1)} ${height - padding} Z`;
            areaPath.setAttribute('d', areaD);
            areaPath.setAttribute('fill', 'url(#areaGradient)');
            svg.appendChild(areaPath);

            const linePath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            let lineD = `M ${xScale(0)} ${yScale(data[0].value)}`;
            data.forEach((point, index) => {
                if (index > 0) {
                    lineD += ` L ${xScale(index)} ${yScale(point.value)}`;
                }
            });
            linePath.setAttribute('d', lineD);
            linePath.setAttribute('fill', 'none');
            linePath.setAttribute('stroke', '#3b82f6');
            linePath.setAttribute('stroke-width', '3');
            linePath.setAttribute('stroke-linecap', 'round');
            linePath.setAttribute('stroke-linejoin', 'round');
            svg.appendChild(linePath);

            data.forEach((point, index) => {
                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.setAttribute('cx', xScale(index));
                circle.setAttribute('cy', yScale(point.value));
                circle.setAttribute('r', '6');
                circle.setAttribute('fill', '#3b82f6');
                circle.setAttribute('stroke', '#0f1419');
                circle.setAttribute('stroke-width', '2');
                circle.style.cursor = 'pointer';
                circle.style.transition = 'r 0.2s';

                circle.addEventListener('mouseenter', (e) => {
                    circle.setAttribute('r', '9');
                    tooltip.textContent = `${point.month}: $${point.value}K`;
                    tooltip.classList.add('visible');
                });

                circle.addEventListener('mousemove', (e) => {
                    const rect = container.getBoundingClientRect();
                    tooltip.style.left = (e.clientX - rect.left + 10) + 'px';
                    tooltip.style.top = (e.clientY - rect.top - 30) + 'px';
                });

                circle.addEventListener('mouseleave', () => {
                    circle.setAttribute('r', '6');
                    tooltip.classList.remove('visible');
                });

                svg.appendChild(circle);

                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', xScale(index));
                text.setAttribute('y', height - 10);
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('fill', '#a0aec0');
                text.setAttribute('font-size', '12');
                text.textContent = point.month;
                svg.appendChild(text);
            });

            const yAxisSteps = 5;
            for (let i = 0; i <= yAxisSteps; i++) {
                const value = (maxValue / yAxisSteps) * i;
                const y = yScale(value);

                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', padding - 10);
                text.setAttribute('y', y + 4);
                text.setAttribute('text-anchor', 'end');
                text.setAttribute('fill', '#a0aec0');
                text.setAttribute('font-size', '11');
                text.textContent = `$${Math.round(value)}K`;
                svg.appendChild(text);

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', padding);
                line.setAttribute('y1', y);
                line.setAttribute('x2', width - padding);
                line.setAttribute('y2', y);
                line.setAttribute('stroke', '#2d3748');
                line.setAttribute('stroke-width', '1');
                line.setAttribute('stroke-dasharray', '4,4');
                svg.insertBefore(line, svg.firstChild);
            }
        }

        const activities = [
            { type: 'order', text: 'New order #12345 from John Doe', time: '2 minutes ago' },
            { type: 'user', text: 'User Sarah Wilson signed up', time: '5 minutes ago' },
            { type: 'system', text: 'Database backup completed', time: '12 minutes ago' },
            { type: 'alert', text: 'High traffic detected on US server', time: '15 minutes ago' },
            { type: 'order', text: 'Order #12344 shipped successfully', time: '20 minutes ago' },
            { type: 'user', text: 'User Mike Johnson upgraded plan', time: '25 minutes ago' },
            { type: 'system', text: 'Security scan completed - no threats', time: '30 minutes ago' },
            { type: 'order', text: 'Refund requested for order #12343', time: '35 minutes ago' },
            { type: 'user', text: 'User Emma Davis left a review', time: '40 minutes ago' },
            { type: 'system', text: 'Cache cleared successfully', time: '45 minutes ago' }
        ];

        function renderActivities() {
            const container = document.getElementById('activityList');
            container.innerHTML = activities.map(activity => `
                <div class="activity-item">
                    <div class="activity-icon ${activity.type}">
                        ${getActivityIcon(activity.type)}
                    </div>
                    <div class="activity-content">
                        <div class="activity-text">${activity.text}</div>
                        <div class="activity-time">${activity.time}</div>
                    </div>
                </div>
            `).join('');
        }

        function getActivityIcon(type) {
            const icons = {
                order: '🛒',
                user: '👤',
                system: '⚙️',
                alert: '⚠️'
            };
            return icons[type] || '📌';
        }

        let countdown = 30;

        function updateCountdown() {
            countdown--;
            document.getElementById('countdown').textContent = countdown;

            if (countdown <= 0) {
                countdown = 30;
                refreshData();
            }
        }

        function refreshData() {
            const kpiCards = document.querySelectorAll('.kpi-value');
            kpiCards.forEach(card => {
                const baseValue = parseInt(card.dataset.target);
                const variance = Math.random() * 0.1 - 0.05;
                const newValue = Math.round(baseValue * (1 + variance));

                const prefix = card.dataset.prefix || '';
                const suffix = card.dataset.suffix || '';
                const divisor = parseInt(card.dataset.divisor) || 1;
                card.textContent = `${prefix}${(newValue / divisor).toFixed(1)}${suffix}`;
            });

            activities.forEach((activity, index) => {
                const minutes = (index + 1) * 5 + Math.floor(Math.random() * 5);
                activity.time = `${minutes} minutes ago`;
            });
            renderActivities();

            createRevenueChart();
        }

        function exportData() {
            const exportData = {
                timestamp: new Date().toISOString(),
                kpis: {
                    revenue: 847000,
                    users: 12400,
                    orders: 3200,
                    growth: 24
                },
                activities: activities,
                dateRange: {
                    start: document.getElementById('startDate').value,
                    end: document.getElementById('endDate').value
                }
            };

            const dataStr = JSON.stringify(exportData, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `analytics-export-${new Date().toISOString().split('T')[0]}.json`;
            link.click();
            URL.revokeObjectURL(url);
        }

        function initializeDates() {
            const today = new Date();
            const lastMonth = new Date(today.getFullYear(), today.getMonth() - 1, today.getDate());

            document.getElementById('endDate').value = today.toISOString().split('T')[0];
            document.getElementById('startDate').value = lastMonth.toISOString().split('T')[0];
        }

        window.addEventListener('resize', () => {
            createRevenueChart();
        });

        document.addEventListener('DOMContentLoaded', () => {
            animateCounters();
            createRevenueChart();
            renderActivities();
            initializeDates();

            setInterval(updateCountdown, 1000);
        });
    </script>
</body>
</html>
