<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .date-filter {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .date-filter input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 8px 12px;
            color: #e0e0e0;
            font-size: 14px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .refresh-timer {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #888;
        }

        .refresh-timer .timer {
            color: #667eea;
            font-weight: 600;
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .kpi-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .kpi-card:hover::before {
            transform: scaleX(1);
        }

        .kpi-label {
            font-size: 13px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .kpi-value {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 0%, #e0e0e0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .kpi-change {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 14px;
            font-weight: 600;
        }

        .kpi-change.positive {
            color: #10b981;
        }

        .kpi-change.negative {
            color: #ef4444;
        }

        .main-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .chart-section, .activity-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 24px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #e0e0e0;
        }

        .chart-container {
            height: 300px;
            position: relative;
        }

        #revenueChart {
            width: 100%;
            height: 100%;
        }

        .activity-feed {
            max-height: 300px;
            overflow-y: auto;
        }

        .activity-feed::-webkit-scrollbar {
            width: 6px;
        }

        .activity-feed::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }

        .activity-feed::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.5);
            border-radius: 3px;
        }

        .activity-item {
            display: flex;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.2s ease;
            padding-left: 8px;
            padding-right: 8px;
            border-radius: 8px;
            margin-bottom: 4px;
        }

        .activity-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .activity-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .activity-icon.sale {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
        }

        .activity-icon.user {
            background: rgba(102, 126, 234, 0.15);
            color: #667eea;
        }

        .activity-icon.order {
            background: rgba(251, 191, 36, 0.15);
            color: #fbbf24;
        }

        .activity-icon.alert {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .activity-content {
            flex: 1;
            min-width: 0;
        }

        .activity-text {
            font-size: 14px;
            color: #e0e0e0;
            margin-bottom: 4px;
            line-height: 1.4;
        }

        .activity-time {
            font-size: 12px;
            color: #888;
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .fade-in {
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1>Analytics Dashboard</h1>
            <div class="header-controls">
                <div class="date-filter">
                    <input type="date" id="startDate">
                    <span>to</span>
                    <input type="date" id="endDate">
                </div>
                <button class="btn" onclick="exportData()">Export Data</button>
                <div class="refresh-timer">
                    <span class="pulse">●</span>
                    <span>Next refresh in <span class="timer" id="timer">30</span>s</span>
                </div>
            </div>
        </div>

        <div class="kpi-grid">
            <div class="kpi-card">
                <div class="kpi-label">Revenue</div>
                <div class="kpi-value" id="revenue">$0</div>
                <div class="kpi-change positive">↑ 12.5%</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Users</div>
                <div class="kpi-value" id="users">0</div>
                <div class="kpi-change positive">↑ 8.3%</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Orders</div>
                <div class="kpi-value" id="orders">0</div>
                <div class="kpi-change positive">↑ 15.7%</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">Growth</div>
                <div class="kpi-value" id="growth">0%</div>
                <div class="kpi-change positive">↑ 24%</div>
            </div>
        </div>

        <div class="main-content">
            <div class="chart-section">
                <div class="section-header">
                    <h2 class="section-title">Revenue Trend</h2>
                </div>
                <div class="chart-container">
                    <canvas id="revenueChart"></canvas>
                </div>
            </div>
            <div class="activity-section">
                <div class="section-header">
                    <h2 class="section-title">Recent Activity</h2>
                </div>
                <div class="activity-feed" id="activityFeed"></div>
            </div>
        </div>
    </div>

    <script>
        // KPI Data
        const kpiData = {
            revenue: { target: 847000, prefix: '$', suffix: 'K', divisor: 1000 },
            users: { target: 12400, prefix: '', suffix: 'K', divisor: 1000 },
            orders: { target: 3200, prefix: '', suffix: 'K', divisor: 1000 },
            growth: { target: 24, prefix: '', suffix: '%', divisor: 1 }
        };

        // Animated counter function
        function animateCounter(element, target, prefix = '', suffix = '', divisor = 1, duration = 2000) {
            const start = 0;
            const startTime = performance.now();
            
            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeProgress = 1 - Math.pow(1 - progress, 3);
                const current = start + (target - start) * easeProgress;
                
                const displayValue = divisor > 1 ? (current / divisor).toFixed(1) : Math.round(current);
                element.textContent = `${prefix}${displayValue}${suffix}`;
                
                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }
            
            requestAnimationFrame(update);
        }

        // Initialize KPI counters
        function initKPIs() {
            animateCounter(document.getElementById('revenue'), kpiData.revenue.target, '$', 'K', 1000);
            animateCounter(document.getElementById('users'), kpiData.users.target, '', 'K', 1000);
            animateCounter(document.getElementById('orders'), kpiData.orders.target, '', 'K', 1000);
            animateCounter(document.getElementById('growth'), kpiData.growth.target, '', '%', 1);
        }

        // Revenue Chart using Canvas
        function drawRevenueChart() {
            const canvas = document.getElementById('revenueChart');
            const ctx = canvas.getContext('2d');
            
            // Set canvas size
            canvas.width = canvas.offsetWidth * 2;
            canvas.height = canvas.offsetHeight * 2;
            canvas.style.width = canvas.offsetWidth + 'px';
            canvas.style.height = canvas.offsetHeight + 'px';
            ctx.scale(2, 2);
            
            const width = canvas.offsetWidth;
            const height = canvas.offsetHeight;
            const padding = 40;
            
            // Generate data points
            const dataPoints = 30;
            const data = [];
            for (let i = 0; i < dataPoints; i++) {
                const baseValue = 500 + Math.random() * 300;
                const trend = i * 10;
                const noise = (Math.random() - 0.5) * 100;
                data.push(Math.max(200, baseValue + trend + noise));
            }
            
            const maxValue = Math.max(...data);
            const minValue = Math.min(...data);
            const range = maxValue - minValue;
            
            // Clear canvas
            ctx.clearRect(0, 0, width, height);
            
            // Draw grid lines
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 4; i++) {
                const y = padding + (height - 2 * padding) * i / 4;
                ctx.beginPath();
                ctx.moveTo(padding, y);
                ctx.lineTo(width - padding, y);
                ctx.stroke();
            }
            
            // Draw gradient fill
            const gradient = ctx.createLinearGradient(0, padding, 0, height - padding);
            gradient.addColorStop(0, 'rgba(102, 126, 234, 0.3)');
            gradient.addColorStop(1, 'rgba(102, 126, 234, 0)');
            
            ctx.beginPath();
            ctx.moveTo(padding, height - padding);
            
            data.forEach((value, index) => {
                const x = padding + (width - 2 * padding) * index / (dataPoints - 1);
                const y = height - padding - (height - 2 * padding) * (value - minValue) / range;
                ctx.lineTo(x, y);
            });
            
            ctx.lineTo(width - padding, height - padding);
            ctx.closePath();
            ctx.fillStyle = gradient;
            ctx.fill();
            
            // Draw line
            ctx.beginPath();
            data.forEach((value, index) => {
                const x = padding + (width - 2 * padding) * index / (dataPoints - 1);
                const y = height - padding - (height - 2 * padding) * (value - minValue) / range;
                if (index === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            });
            
            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();
            
            // Draw dots
            data.forEach((value, index) => {
                if (index % 5 === 0) {
                    const x = padding + (width - 2 * padding) * index / (dataPoints - 1);
                    const y = height - padding - (height - 2 * padding) * (value - minValue) / range;
                    
                    ctx.beginPath();
                    ctx.arc(x, y, 5, 0, Math.PI * 2);
                    ctx.fillStyle = '#667eea';
                    ctx.fill();
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            });
        }

        // Activity Feed Data
        const activityTypes = [
            { type: 'sale', icon: '💰', texts: ['New sale: $2,450', 'Order completed: $890', 'Payment received: $1,200'] },
            { type: 'user', icon: '👤', texts: ['New user registered', 'User upgraded to Pro', 'Profile updated'] },
            { type: 'order', icon: '📦', texts: ['Order #1234 shipped', 'New order placed', 'Return processed'] },
            { type: 'alert', icon: '⚠️', texts: ['Low stock alert', 'Cart abandonment', 'Server load high'] }
        ];

        function generateActivityItem() {
            const type = activityTypes[Math.floor(Math.random() * activityTypes.length)];
            const text = type.texts[Math.floor(Math.random() * type.texts.length)];
            const time = Math.floor(Math.random() * 60) + 1;
            
            return { ...type, text, time };
        }

        function renderActivityFeed() {
            const feed = document.getElementById('activityFeed');
            feed.innerHTML = '';
            
            for (let i = 0; i < 10; i++) {
                const activity = generateActivityItem();
                const item = document.createElement('div');
                item.className = 'activity-item fade-in';
                item.style.animationDelay = `${i * 0.05}s`;
                item.innerHTML = `
                    <div class="activity-icon ${activity.type}">${activity.icon}</div>
                    <div class="activity-content">
                        <div class="activity-text">${activity.text}</div>
                        <div class="activity-time">${activity.time} minutes ago</div>
                    </div>
                `;
                feed.appendChild(item);
            }
        }

        // Timer and auto-refresh
        let timeLeft = 30;
        
        function updateTimer() {
            const timerElement = document.getElementById('timer');
            timerElement.textContent = timeLeft;
            timeLeft--;
            
            if (timeLeft < 0) {
                timeLeft = 30;
                refreshData();
            }
        }

        function refreshData() {
            // Simulate data update
            const revenue = 800 + Math.floor(Math.random() * 100);
            const users = 11 + Math.floor(Math.random() * 3);
            const orders = 2.5 + Math.floor(Math.random() * 15) / 10;
            const growth = 20 + Math.floor(Math.random() * 10);
            
            animateCounter(document.getElementById('revenue'), revenue, '$', 'K', 1, 1000);
            animateCounter(document.getElementById('users'), users * 1000, '', 'K', 1000, 1000);
            animateCounter(document.getElementById('orders'), orders * 1000, '', 'K', 1000, 1000);
            animateCounter(document.getElementById('growth'), growth, '', '%', 1, 1000);
            
            drawRevenueChart();
            renderActivityFeed();
        }

        // Export function
        function exportData() {
            const data = {
                timestamp: new Date().toISOString(),
                kpis: {
                    revenue: '$847K',
                    users: '12.4K',
                    orders: '3.2K',
                    growth: '+24%'
                }
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `dashboard-export-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // Set default dates
        function setDefaultDates() {
            const endDate = new Date();
            const startDate = new Date();
            startDate.setDate(startDate.getDate() - 30);
            
            document.getElementById('startDate').value = startDate.toISOString().split('T')[0];
            document.getElementById('endDate').value = endDate.toISOString().split('T')[0];
        }

        // Initialize dashboard
        function init() {
            setDefaultDates();
            initKPIs();
            drawRevenueChart();
            renderActivityFeed();
            setInterval(updateTimer, 1000);
            
            // Redraw chart on resize
            window.addEventListener('resize', drawRevenueChart);
        }

        // Start the dashboard
        init();
    </script>
</body>
</html>
