<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f1419;
            --bg-secondary: #1a1f2e;
            --bg-card: #1e2535;
            --text-primary: #f0f4f8;
            --text-secondary: #8b9cb5;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-purple: #8b5cf6;
            --accent-orange: #f59e0b;
            --border: #2d3748;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
        }

        .header-controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .date-filter {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 8px 12px;
        }

        .date-filter input {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 14px;
        }

        .date-filter input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .btn {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
        }

        .btn-outline:hover {
            background: var(--bg-secondary);
            border-color: var(--accent-blue);
        }

        .auto-refresh {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .refresh-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* KPI Cards Grid */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .kpi-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border-color: var(--accent-blue);
        }

        .kpi-card:hover::before {
            transform: scaleX(1);
        }

        .kpi-label {
            color: var(--text-secondary);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .kpi-value {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .kpi-card.revenue .kpi-value { color: var(--accent-blue); }
        .kpi-card.users .kpi-value { color: var(--accent-purple); }
        .kpi-card.orders .kpi-value { color: var(--accent-orange); }
        .kpi-card.growth .kpi-value { color: var(--accent-green); }

        .kpi-change {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 14px;
        }

        .kpi-change.positive { color: var(--accent-green); }
        .kpi-change.negative { color: #ef4444; }

        /* Chart Section */
        .chart-section {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
        }

        .chart-legend {
            display: flex;
            gap: 20px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        .chart-container {
            position: relative;
            height: 300px;
        }

        #revenueChart {
            width: 100%;
            height: 100%;
        }

        /* Activity Feed */
        .activity-section {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--border);
        }

        .activity-list {
            list-style: none;
        }

        .activity-item {
            display: flex;
            gap: 16px;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s ease;
            border-radius: 8px;
            padding-left: 12px;
            padding-right: 12px;
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-item:hover {
            background: var(--bg-secondary);
        }

        .activity-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .activity-icon.order { background: rgba(59, 130, 246, 0.2); }
        .activity-icon.user { background: rgba(139, 92, 246, 0.2); }
        .activity-icon.revenue { background: rgba(16, 185, 129, 0.2); }
        .activity-icon.alert { background: rgba(239, 68, 68, 0.2); }

        .activity-content {
            flex: 1;
        }

        .activity-title {
            font-weight: 500;
            margin-bottom: 4px;
        }

        .activity-time {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .activity-amount {
            font-weight: 600;
            color: var(--accent-green);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .kpi-grid {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header-controls {
                width: 100%;
                justify-content: space-between;
            }

            .kpi-value {
                font-size: 28px;
            }

            .chart-container {
                height: 250px;
            }
        }

        /* Loading Animation */
        @keyframes countUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .kpi-value {
            animation: countUp 0.5s ease forwards;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>📊 Analytics Dashboard</h1>
            <div class="header-controls">
                <div class="date-filter">
                    <input type="date" id="startDate" value="2026-05-01">
                    <span>to</span>
                    <input type="date" id="endDate" value="2026-05-22">
                </div>
                <button class="btn btn-outline" onclick="exportData()">
                    📥 Export
                </button>
                <div class="auto-refresh">
                    <span class="refresh-indicator"></span>
                    <span>Refresh: <span id="countdown">30</span>s</span>
                </div>
            </div>
        </header>

        <!-- KPI Cards -->
        <div class="kpi-grid">
            <div class="kpi-card revenue">
                <div class="kpi-label">Total Revenue</div>
                <div class="kpi-value" id="revenue">$0</div>
                <div class="kpi-change positive">
                    <span>↑ 12.5%</span>
                    <span style="color: var(--text-secondary);">vs last month</span>
                </div>
            </div>
            <div class="kpi-card users">
                <div class="kpi-label">Active Users</div>
                <div class="kpi-value" id="users">0</div>
                <div class="kpi-change positive">
                    <span>↑ 8.2%</span>
                    <span style="color: var(--text-secondary);">vs last month</span>
                </div>
            </div>
            <div class="kpi-card orders">
                <div class="kpi-label">Total Orders</div>
                <div class="kpi-value" id="orders">0</div>
                <div class="kpi-change negative">
                    <span>↓ 3.1%</span>
                    <span style="color: var(--text-secondary);">vs last month</span>
                </div>
            </div>
            <div class="kpi-card growth">
                <div class="kpi-label">Growth Rate</div>
                <div class="kpi-value" id="growth">0%</div>
                <div class="kpi-change positive">
                    <span>↑ 4.2%</span>
                    <span style="color: var(--text-secondary);">vs last month</span>
                </div>
            </div>
        </div>

        <!-- Revenue Chart -->
        <section class="chart-section">
            <div class="section-header">
                <h2 class="section-title">Revenue Overview</h2>
                <div class="chart-legend">
                    <div class="legend-item">
                        <span class="legend-color" style="background: var(--accent-blue);"></span>
                        Revenue
                    </div>
                    <div class="legend-item">
                        <span class="legend-color" style="background: var(--accent-purple);"></span>
                        Target
                    </div>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="revenueChart"></canvas>
            </div>
        </section>

        <!-- Activity Feed -->
        <section class="activity-section">
            <div class="section-header">
                <h2 class="section-title">Recent Activity</h2>
                <button class="btn btn-outline" onclick="refreshActivity()">🔄 Refresh</button>
            </div>
            <ul class="activity-list" id="activityList"></ul>
        </section>
    </div>

    <script>
        // KPI Data
        const kpiData = {
            revenue: 847000,
            users: 12400,
            orders: 3200,
            growth: 24
        };

        // Animated Counter
        function animateCounter(element, target, prefix = '', suffix = '', duration = 1500) {
            const start = 0;
            const startTime = performance.now();
            
            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                // Easing function
                const easeOut = 1 - Math.pow(1 - progress, 3);
                const current = Math.floor(start + (target - start) * easeOut);
                
                let formatted = current.toLocaleString();
                if (target >= 1000) {
                    formatted = (current / 1000).toFixed(1) + 'K';
                }
                
                element.textContent = prefix + formatted + suffix;
                
                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }
            
            requestAnimationFrame(update);
        }

        // Initialize KPIs
        function initKPIs() {
            animateCounter(document.getElementById('revenue'), kpiData.revenue, '$');
            animateCounter(document.getElementById('users'), kpiData.users, '');
            animateCounter(document.getElementById('orders'), kpiData.orders, '');
            animateCounter(document.getElementById('growth'), kpiData.growth, '', '%');
        }

        // Revenue Chart
        function drawChart() {
            const canvas = document.getElementById('revenueChart');
            const ctx = canvas.getContext('2d');
            
            // Set canvas size
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            
            const width = canvas.width;
            const height = canvas.height;
            const padding = { top: 20, right: 20, bottom: 40, left: 60 };
            const chartWidth = width - padding.left - padding.right;
            const chartHeight = height - padding.top - padding.bottom;
            
            // Sample data
            const labels = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul'];
            const revenueData = [520, 680, 590, 720, 650, 810, 847];
            const targetData = [600, 650, 700, 750, 800, 850, 900];
            
            const maxValue = Math.max(...revenueData, ...targetData) * 1.1;
            
            // Clear canvas
            ctx.clearRect(0, 0, width, height);
            
            // Draw grid lines
            ctx.strokeStyle = '#2d3748';
            ctx.lineWidth = 1;
            
            const gridLines = 5;
            for (let i = 0; i <= gridLines; i++) {
                const y = padding.top + (chartHeight / gridLines) * i;
                ctx.beginPath();
                ctx.moveTo(padding.left, y);
                ctx.lineTo(width - padding.right, y);
                ctx.stroke();
                
                // Y-axis labels
                const value = Math.round(maxValue - (maxValue / gridLines) * i);
                ctx.fillStyle = '#8b9cb5';
                ctx.font = '12px sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText('$' + value + 'K', padding.left - 10, y + 4);
            }
            
            // Draw X-axis labels
            const xStep = chartWidth / (labels.length - 1);
            labels.forEach((label, i) => {
                const x = padding.left + xStep * i;
                ctx.fillStyle = '#8b9cb5';
                ctx.font = '12px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(label, x, height - 10);
            });
            
            // Draw target line (dashed)
            ctx.strokeStyle = '#8b5cf6';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            targetData.forEach((value, i) => {
                const x = padding.left + xStep * i;
                const y = padding.top + chartHeight - (value / maxValue) * chartHeight;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();
            ctx.setLineDash([]);
            
            // Draw area gradient
            const gradient = ctx.createLinearGradient(0, padding.top, 0, height - padding.bottom);
            gradient.addColorStop(0, 'rgba(59, 130, 246, 0.3)');
            gradient.addColorStop(1, 'rgba(59, 130, 246, 0)');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            revenueData.forEach((value, i) => {
                const x = padding.left + xStep * i;
                const y = padding.top + chartHeight - (value / maxValue) * chartHeight;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.lineTo(padding.left + xStep * (revenueData.length - 1), height - padding.bottom);
            ctx.lineTo(padding.left, height - padding.bottom);
            ctx.closePath();
            ctx.fill();
            
            // Draw revenue line
            ctx.strokeStyle = '#3b82f6';
            ctx.lineWidth = 3;
            ctx.beginPath();
            revenueData.forEach((value, i) => {
                const x = padding.left + xStep * i;
                const y = padding.top + chartHeight - (value / maxValue) * chartHeight;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();
            
            // Draw data points
            revenueData.forEach((value, i) => {
                const x = padding.left + xStep * i;
                const y = padding.top + chartHeight - (value / maxValue) * chartHeight;
                
                ctx.beginPath();
                ctx.arc(x, y, 5, 0, Math.PI * 2);
                ctx.fillStyle = '#1e2535';
                ctx.fill();
                ctx.strokeStyle = '#3b82f6';
                ctx.lineWidth = 2;
                ctx.stroke();
            });
        }

        // Activity Feed Data
        const activities = [
            { type: 'order', icon: '🛒', title: 'New order #12847', time: '2 min ago', amount: '+$234.50' },
            { type: 'user', icon: '👤', title: 'New user registered', time: '5 min ago', detail: 'from United States' },
            { type: 'revenue', icon: '💰', title: 'Payment received', time: '12 min ago', amount: '+$1,250.00' },
            { type: 'order', icon: '🛒', title: 'Order #12846 shipped', time: '18 min ago', detail: 'Express delivery' },
            { type: 'alert', icon: '⚠️', title: 'Low stock alert', time: '25 min ago', detail: 'SKU-1029 below threshold' },
            { type: 'user', icon: '👤', title: 'User upgraded plan', time: '32 min ago', amount: '+$99.00' },
            { type: 'revenue', icon: '💰', title: 'Refund processed', time: '45 min ago', amount: '-$45.00' },
            { type: 'order', icon: '🛒', title: 'Bulk order completed', time: '1 hour ago', amount: '+$3,420.00' },
            { type: 'user', icon: '👤', title: 'New subscription', time: '1 hour ago', amount: '+$29.00/mo' },
            { type: 'order', icon: '🛒', title: 'Order #12845 delivered', time: '2 hours ago', detail: 'Customer rated 5 stars' }
        ];

        function renderActivity() {
            const list = document.getElementById('activityList');
            list.innerHTML = activities.map(item => `
                <li class="activity-item">
                    <div class="activity-icon ${item.type}">${item.icon}</div>
                    <div class="activity-content">
                        <div class="activity-title">${item.title}</div>
                        <div class="activity-time">${item.time}${item.detail ? ' • ' + item.detail : ''}</div>
                    </div>
                    ${item.amount ? `<div class="activity-amount">${item.amount}</div>` : ''}
                </li>
            `).join('');
        }

        // Auto-refresh countdown
        let countdown = 30;
        
        function updateCountdown() {
            countdown--;
            document.getElementById('countdown').textContent = countdown;
            
            if (countdown <= 0) {
                countdown = 30;
                simulateDataUpdate();
            }
        }

        // Simulate data update
        function simulateDataUpdate() {
            // Update KPI values slightly
            kpiData.revenue += Math.floor(Math.random() * 10000) - 3000;
            kpiData.users += Math.floor(Math.random() * 100) - 30;
            kpiData.orders += Math.floor(Math.random() * 50) - 15;
            
            initKPIs();
            drawChart();
            
            // Add new activity item
            const newActivities = [
                { type: 'order', icon: '🛒', title: `New order #${12848 + Math.floor(Math.random() * 100)}`, time: 'Just now', amount: '+$' + (Math.random() * 500 + 50).toFixed(2) },
                { type: 'user', icon: '👤', title: 'New user registered', time: 'Just now', detail: 'from ' + ['US', 'UK', 'DE', 'FR', 'JP'][Math.floor(Math.random() * 5)] },
                { type: 'revenue', icon: '💰', title: 'Payment received', time: 'Just now', amount: '+$' + (Math.random() * 1000 + 100).toFixed(2) }
            ];
            
            activities.unshift(newActivities[Math.floor(Math.random() * newActivities.length)]);
            if (activities.length > 10) activities.pop();
            renderActivity();
        }

        // Refresh activity button
        function refreshActivity() {
            simulateDataUpdate();
        }

        // Export data
        function exportData() {
            const data = {
                exportDate: new Date().toISOString(),
                dateRange: {
                    start: document.getElementById('startDate').value,
                    end: document.getElementById('endDate').value
                },
                kpis: kpiData,
                activities: activities
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `analytics-export-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initKPIs();
            drawChart();
            renderActivity();
            
            // Start countdown timer
            setInterval(updateCountdown, 1000);
            
            // Handle window resize for chart
            window.addEventListener('resize', drawChart);
        });
    </script>
</body>
</html>
