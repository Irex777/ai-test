<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics Dashboard</title>
<style>
  :root{
    --bg:#0b1120; --surface:#131c31; --surface-2:#1b2742;
    --border:rgba(148,163,184,.14); --text:#e6edf7; --muted:#8b9bb8;
    --accent:#6366f1; --accent-2:#22d3ee;
    --green:#34d399; --cyan:#22d3ee; --amber:#fbbf24; --pink:#f472b6; --violet:#a78bfa; --red:#fb7185;
    --radius:16px; --shadow:0 10px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 600px at 80% -10%,#1b2a4a 0%,transparent 55%),var(--bg);
    color:var(--text);min-height:100vh;line-height:1.45;-webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1320px;margin:0 auto;padding:24px 22px 48px}

  header.top{display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-bottom:26px}
  .brand{display:flex;align-items:center;gap:13px;margin-right:auto}
  .logo{width:42px;height:42px;border-radius:12px;flex:none;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    display:grid;place-items:center;box-shadow:0 6px 18px rgba(99,102,241,.45)}
  .logo svg{width:22px;height:22px}
  .brand h1{font-size:19px;font-weight:700;letter-spacing:.2px}
  .brand p{font-size:12.5px;color:var(--muted)}

  .controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .select-wrap{position:relative}
  .select-wrap::after{content:"▾";position:absolute;right:12px;top:50%;transform:translateY(-50%);
    color:var(--muted);pointer-events:none;font-size:11px}
  select,button{font-family:inherit;font-size:13.5px;color:var(--text);
    background:var(--surface);border:1px solid var(--border);border-radius:11px;
    padding:10px 14px;cursor:pointer;transition:.18s;outline:none}
  select{padding-right:32px;appearance:none;-webkit-appearance:none}
  select:hover,button:hover{border-color:rgba(99,102,241,.6);background:var(--surface-2)}
  button.primary{background:linear-gradient(135deg,var(--accent),#7c3aed);border-color:transparent;
    font-weight:600;color:#fff}
  button.primary:hover{filter:brightness(1.08);transform:translateY(-1px);box-shadow:0 8px 20px rgba(99,102,241,.4)}
  button svg{width:15px;height:15px;vertical-align:-2px;margin-right:6px}

  .refresh{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);
    background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:8px 13px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--green);position:relative}
  .dot::after{content:"";position:absolute;inset:-4px;border-radius:50%;background:var(--green);
    opacity:.35;animation:ping 1.6s cubic-bezier(0,0,.2,1) infinite}
  @keyframes ping{75%,100%{transform:scale(2.1);opacity:0}}
  .pulse{color:var(--green);font-weight:600}

  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
  .card{background:linear-gradient(180deg,var(--surface),#101930);
    border:1px solid var(--border);border-radius:var(--radius);padding:20px;
    box-shadow:var(--shadow);position:relative;overflow:hidden;
    transition:transform .22s cubic-bezier(.2,.7,.3,1),box-shadow .22s,border-color .22s}
  .card::before{content:"";position:absolute;left:0;top:0;height:100%;width:3px;
    background:var(--c,var(--accent));opacity:.85}
  .card:hover{transform:translateY(-5px);box-shadow:0 18px 40px rgba(0,0,0,.45);
    border-color:color-mix(in srgb,var(--c,var(--accent)) 55%,transparent)}
  .kpi-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .kpi-label{font-size:12.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;font-weight:600}
  .ico{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;
    background:color-mix(in srgb,var(--c,var(--accent)) 18%,transparent);color:var(--c,var(--accent))}
  .ico svg{width:17px;height:17px}
  .kpi-value{font-size:30px;font-weight:700;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
  .kpi-foot{display:flex;align-items:center;gap:7px;margin-top:10px;font-size:12.5px;color:var(--muted)}
  .chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-weight:700;font-size:11.5px}
  .chip.up{color:var(--green);background:rgba(52,211,153,.13)}
  .chip.down{color:var(--red);background:rgba(251,113,133,.13)}

  .content-grid{display:grid;grid-template-columns:1.7fr 1fr;gap:20px}
  .panel{background:linear-gradient(180deg,var(--surface),#101930);
    border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);
    transition:border-color .22s,box-shadow .22s}
  .panel:hover{border-color:rgba(99,102,241,.35)}
  .panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap}
  .panel-head h2{font-size:15.5px;font-weight:700}
  .panel-head .sub{font-size:12px;color:var(--muted);margin-top:2px}
  .tabs{display:flex;gap:6px}
  .tab{font-size:12px;padding:6px 11px;border-radius:9px;background:var(--surface-2);
    border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:.15s}
  .tab:hover{color:var(--text)}
  .tab.active{background:linear-gradient(135deg,var(--accent),#7c3aed);color:#fff;border-color:transparent}
  .chart-wrap{position:relative;width:100%;height:300px}
  canvas{width:100%;height:100%;display:block}
  .tooltip{position:absolute;pointer-events:none;background:#0a1226;border:1px solid rgba(99,102,241,.5);
    border-radius:9px;padding:7px 11px;font-size:12px;color:var(--text);opacity:0;transition:opacity .12s;
    transform:translate(-50%,-115%);box-shadow:0 8px 20px rgba(0,0,0,.5);white-space:nowrap;z-index:5}
  .tooltip b{color:var(--accent-2)}

  .feed{display:flex;flex-direction:column;gap:2px;max-height:300px;overflow-y:auto}
  .feed::-webkit-scrollbar{width:7px}
  .feed::-webkit-scrollbar-thumb{background:var(--surface-2);border-radius:10px}
  .item{display:flex;gap:12px;padding:10px 6px;border-radius:10px;transition:.15s;align-items:flex-start}
  .item:hover{background:var(--surface-2)}
  .dot-ico{width:32px;height:32px;border-radius:9px;flex:none;display:grid;place-items:center;
    background:color-mix(in srgb,var(--c,var(--accent)) 16%,transparent);color:var(--c,var(--accent))}
  .dot-ico svg{width:15px;height:15px}
  .item-body{flex:1;min-width:0}
  .item-msg{font-size:13px}
  .item-msg b{font-weight:600}
  .item-time{font-size:11.5px;color:var(--muted);margin-top:2px}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:linear-gradient(135deg,var(--accent),#7c3aed);color:#fff;padding:12px 22px;border-radius:12px;
    font-size:13.5px;font-weight:600;box-shadow:0 12px 30px rgba(99,102,241,.45);
    opacity:0;transition:.3s;z-index:50;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (max-width:1080px){.content-grid{grid-template-columns:1fr}}
  @media (max-width:860px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
  @media (max-width:520px){
    .kpi-grid{grid-template-columns:1fr}
    .brand{margin-right:0;width:100%}
    .controls{width:100%}
    select,button,.refresh{flex:1;justify-content:center}
    .refresh{justify-content:center}
    .kpi-value{font-size:26px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>
      </div>
      <div><h1>Analytics Dashboard</h1><p>Real-time business performance overview</p></div>
    </div>
    <div class="controls">
      <div class="select-wrap">
        <select id="range" aria-label="Date range">
          <option value="24H">Last 24 Hours</option>
          <option value="7D" selected>Last 7 Days</option>
          <option value="30D">Last 30 Days</option>
          <option value="90D">Last 90 Days</option>
          <option value="1Y">Last Year</option>
        </select>
      </div>
      <button id="export" class="primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>Export
      </button>
      <div class="refresh"><span class="dot"></span><span>Auto-refresh <span id="countdown" class="pulse">10s</span></span></div>
    </div>
  </header>

  <section class="kpi-grid" id="kpis"></section>

  <div class="content-grid">
    <section class="panel">
      <div class="panel-head">
        <div><h2>Revenue Overview</h2><div class="sub" id="rangeLabel">Last 7 Days</div></div>
        <div class="tabs" id="metricTabs">
          <div class="tab active" data-metric="revenue">Revenue</div>
          <div class="tab" data-metric="orders">Orders</div>
          <div class="tab" data-metric="users">Users</div>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="chart"></canvas><div class="tooltip" id="tooltip"></div></div>
    </section>

    <section class="panel">
      <div class="panel-head"><div><h2>Recent Activity</h2><div class="sub">Live event stream</div></div></div>
      <div class="feed" id="feed"></div>
    </section>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const RANGE_POINTS={"24H":12,"7D":7,"30D":15,"90D":12,"1Y":12};
const RANGE_LABELS={"24H":"Last 24 Hours","7D":"Last 7 Days","30D":"Last 30 Days","90D":"Last 90 Days","1Y":"Last Year"};
let currentRange="7D",currentMetric="revenue",series=[],kpis=[];
const REFRESH_SECS=10; let countdown=REFRESH_SECS;

const ICONS={
 dollar:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1v22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>',
 users:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
 cart:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>',
 trend:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>',
 check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
 bolt:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>',
 cart2:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>',
 star:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
 user:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
 alert:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
 mail:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>',
 truck:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>'
};

function labelsFor(range){
  const n=RANGE_POINTS[range]; const out=[];
  if(range==="24H"){for(let i=0;i<n;i++)out.push(((i*2)%24).toString().padStart(2,'0')+':00');}
  else if(range==="7D"){out.push('Mon','Tue','Wed','Thu','Fri','Sat','Sun');}
  else if(range==="30D"){for(let i=0;i<n;i++)out.push('D'+(i*2+1));}
  else if(range==="90D"){const m=['Jan','Feb','Mar'];for(let i=0;i<n;i++)out.push(m[Math.floor(i/4)]+' W'+((i%4)+1));}
  else{out.push('Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec');}
  return out.slice(0,n);
}
function makeSeries(range,metric){
  const labels=labelsFor(range);
  const base={revenue:54000,orders:420,users:1100}[metric];
  const vol={revenue:14000,orders:90,users:260}[metric];
  const n=labels.length; const trend=0.5/n;
  let v=base*(0.8+Math.random()*0.2);
  return labels.map((label,i)=>{
    v=v+(base*trend)+(Math.random()-0.45)*vol;
    v=Math.max(base*0.35,v); return {label,value:Math.round(v)};
  });
}
function deriveKpis(s){
  const sum=a=>a.reduce((x,y)=>x+y,0);
  const tr=sum(s.revenue.map(d=>d.value)),to=sum(s.orders.map(d=>d.value)),tu=sum(s.users.map(d=>d.value));
  return [
    {label:'Revenue',icon:ICONS.dollar,color:'#34d399',value:847000+Math.round(tr%8000),prefix:'$',fmt:'k1',delta:+(12+Math.random()*8).toFixed(1)},
    {label:'Active Users',icon:ICONS.users,color:'#22d3ee',value:12400+Math.round(tu%500),fmt:'k1',delta:+(8+Math.random()*6).toFixed(1)},
    {label:'Orders',icon:ICONS.cart,color:'#fbbf24',value:3200+Math.round(to%120),fmt:'k1',delta:+(5+Math.random()*7).toFixed(1)},
    {label:'Growth',icon:ICONS.trend,color:'#a78bfa',value:24+Math.round((Math.random()-0.5)*4),suffix:'%',prefix:'+',fmt:'int',delta:+(2+Math.random()*3).toFixed(1)}
  ];
}
let datasets={revenue:[],orders:[],users:[]};
function regenerateAll(range){
  datasets.revenue=makeSeries(range,'revenue');
  datasets.orders=makeSeries(range,'orders');
  datasets.users=makeSeries(range,'users');
  kpis=deriveKpis(datasets); series=datasets[currentMetric];
}
function fmtMoney(n){return '$'+(n/1000).toFixed(1).replace(/\.0$/,'')+'K';}
function fmtNumber(v,fmt,prefix,suffix){
  prefix=prefix||'';suffix=suffix||'';let s;
  if(fmt==='k1'){const k=v/1000;s=(k>=100?Math.round(k):k.toFixed(1).replace(/\.0$/,''))+'K';}
  else s=Math.round(v).toLocaleString();
  return prefix+s+suffix;
}
function renderKpis(animate){
  const host=document.getElementById('kpis'); host.innerHTML='';
  kpis.forEach(k=>{
    const el=document.createElement('div'); el.className='card'; el.style.setProperty('--c',k.color);
    const up=k.delta>=0;
    el.innerHTML=`<div class="kpi-head"><span class="kpi-label">${k.label}</span><span class="ico">${k.icon}</span></div>
      <div class="kpi-value" data-k></div>
      <div class="kpi-foot"><span class="chip ${up?'up':'down'}">${up?'▲':'▼'} ${Math.abs(k.delta)}%</span><span>vs previous period</span></div>`;
    host.appendChild(el);
    const valEl=el.querySelector('[data-k]');
    if(animate)animateCount(valEl,0,k.value,1100,(x)=>fmtNumber(x,k.fmt,k.prefix,k.suffix));
    else valEl.textContent=fmtNumber(k.value,k.fmt,k.prefix,k.suffix);
  });
}
function animateCount(el,from,to,dur,format){
  const start=performance.now();
  function step(now){const t=Math.min(1,(now-start)/dur);const e=1-Math.pow(1-t,3);
    el.textContent=format(from+(to-from)*e);if(t<1)requestAnimationFrame(step);}
  requestAnimationFrame(step);
}

const canvas=document.getElementById('chart'),ctx=canvas.getContext('2d');
const tooltip=document.getElementById('tooltip');
let chartGeom=null,animProg=0,animRAF=null,hoverIdx=-1;
function resizeCanvas(){const dpr=window.devicePixelRatio||1;const r=canvas.getBoundingClientRect();
  canvas.width=r.width*dpr;canvas.height=r.height*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);}
function metricColor(){return {revenue:'#34d399',orders:'#fbbf24',users:'#22d3ee'}[currentMetric]||'#6366f1';}
function drawChart(){
  const r=canvas.getBoundingClientRect();const W=r.width,H=r.height;
  const pad={l:52,r:18,t:18,b:30};
  ctx.clearRect(0,0,W,H); if(!series.length)return;
  const max=Math.max(...series.map(d=>d.value)),min=Math.min(...series.map(d=>d.value));
  const range=(max-min)||1,top=max+range*0.15,bot=Math.max(0,min-range*0.12),span=top-bot||1;
  const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  const xAt=i=>pad.l+(cw*(i/(series.length-1||1)));
  const yAt=v=>pad.t+ch-((v-bot)/span)*ch;
  ctx.strokeStyle='rgba(148,163,184,.12)';ctx.lineWidth=1;ctx.fillStyle='#8b9bb8';
  ctx.font='11px -apple-system,Segoe UI,Roboto';ctx.textAlign='right';ctx.textBaseline='middle';
  const gridN=5;
  for(let i=0;i<=gridN;i++){const y=pad.t+(ch/gridN)*i;
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    ctx.fillText(fmtMoney(top-(span/gridN)*i),pad.l-10,y);}
  ctx.textAlign='center';ctx.textBaseline='top';
  series.forEach((d,i)=>ctx.fillText(d.label,xAt(i),H-pad.b+8));
  const col=metricColor(),n=series.length;
  const visN=Math.min(n,Math.max(2,Math.floor(animProg*(n-1))+2));
  const lastFrac=(animProg*(n-1))-Math.floor(animProg*(n-1));const pts=[];
  for(let i=0;i<visN;i++){let val=series[i].value;
    if(i===visN-1&&visN<n){const pv=series[i-1]?.value??val;val=pv+(val-pv)*lastFrac;}
    pts.push({x:xAt(i),y:yAt(val),i,val});}
  if(pts.length<2){chartGeom={xAt,yAt,pad,W,H};return;}
  const grad=ctx.createLinearGradient(0,pad.t,0,H-pad.b);
  grad.addColorStop(0,col+'55');grad.addColorStop(1,col+'05');
  ctx.beginPath();ctx.moveTo(pts[0].x,H-pad.b);ctx.lineTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++){const p0=pts[i-1],p1=pts[i];const mx=(p0.x+p1.x)/2;
    ctx.bezierCurveTo(mx,p0.y,mx,p1.y,p1.x,p1.y);}
  ctx.lineTo(pts[pts.length-1].x,H-pad.b);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++){const p0=pts[i-1],p1=pts[i];const mx=(p0.x+p1.x)/2;
    ctx.bezierCurveTo(mx,p0.y,mx,p1.y,p1.x,p1.y);}
  ctx.strokeStyle=col;ctx.lineWidth=2.6;ctx.lineJoin='round';ctx.lineCap='round';ctx.stroke();
  pts.forEach(p=>{const isHover=hoverIdx===p.i,r=isHover?6:3.4;
    ctx.beginPath();ctx.arc(p.x,p.y,r+(isHover?2:0),0,Math.PI*2);ctx.fillStyle='#0b1120';ctx.fill();
    ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
    if(isHover){ctx.beginPath();ctx.arc(p.x,p.y,11,0,Math.PI*2);ctx.strokeStyle=col+'66';ctx.lineWidth=2;ctx.stroke();}});
  chartGeom={xAt,yAt,pad,W,H};
}
function animateChart(){cancelAnimationFrame(animRAF);animProg=0;
  const start=performance.now(),dur=900;
  function step(now){animProg=Math.min(1,(now-start)/dur);animProg=1-Math.pow(1-animProg,3);
    drawChart();if(animProg<1)animRAF=requestAnimationFrame(step);}
  animRAF=requestAnimationFrame(step);}
canvas.addEventListener('mousemove',e=>{
  if(!chartGeom||animProg<1)return;
  const r=canvas.getBoundingClientRect();const x=e.clientX-r.left;let best=-1,bd=1e9;
  series.forEach((d,i)=>{const dist=Math.abs(chartGeom.xAt(i)-x);if(dist<bd){bd=dist;best=i;}});
  if(bd<40&&best!==hoverIdx){hoverIdx=best;drawChart();
    const px=chartGeom.xAt(best),d=series[best];
    const lf=currentMetric==='revenue'?fmtMoney(d.value):Math.round(d.value).toLocaleString();
    tooltip.innerHTML=`<div style="color:var(--muted);font-size:11px">${d.label}</div><b>${lf}</b> ${currentMetric}`;
    tooltip.style.left=px+'px';tooltip.style.top=chartGeom.yAt(d.value)+'px';tooltip.style.opacity=1;
  }else if(bd>=40&&hoverIdx!==-1){hoverIdx=-1;drawChart();tooltip.style.opacity=0;}
});
canvas.addEventListener('mouseleave',()=>{hoverIdx=-1;drawChart();tooltip.style.opacity=0;});

const NAMES=['Sarah Chen','Marcus Reid','Aiko Tanaka','Leo Fernández','Priya Nair','Tom Walker','Nadia Kim','David Cohen','Elena Rossi','Omar Haddad'];
const ACTIONS=[
 {c:'#34d399',ico:ICONS.check,msg:v=>`<b>${pick(NAMES)}</b> ${v} a new order`},
 {c:'#22d3ee',ico:ICONS.user,msg:()=>`<b>${pick(NAMES)}</b> signed up`},
 {c:'#fbbf24',ico:ICONS.cart2,msg:()=>`<b>${pick(NAMES)}</b> added items to cart`},
 {c:'#a78bfa',ico:ICONS.bolt,msg:()=>`<b>${pick(NAMES)}</b> upgraded to <b>Pro</b>`},
 {c:'#f472b6',ico:ICONS.star,msg:()=>`<b>${pick(NAMES)}</b> left a 5-star review`},
 {c:'#fb7185',ico:ICONS.alert,msg:()=>`Payment failed for <b>${pick(NAMES)}</b>`},
 {c:'#22d3ee',ico:ICONS.mail,msg:()=>`<b>${pick(NAMES)}</b> subscribed to newsletter`},
 {c:'#34d399',ico:ICONS.truck,msg:()=>`Order <b>#${1000+Math.floor(Math.random()*9000)}</b> shipped`}
];
const VERBS=['placed','completed','confirmed'];
function pick(a){return a[Math.floor(Math.random()*a.length)];}
let feed=[];
function seedFeed(){feed=[];for(let i=0;i<10;i++){const a=pick(ACTIONS);
  const verb=a.msg===ACTIONS[0].msg?pick(VERBS):null;
  feed.push({c:a.c,ico:a.ico,msg:a.msg(verb||''),mins:i*3+Math.floor(Math.random()*5)+1});}}
function timeAgo(m){if(m<1)return 'just now';if(m<60)return m+'m ago';if(m<1440)return Math.floor(m/60)+'h ago';return Math.floor(m/1440)+'d ago';}
function renderFeed(){const host=document.getElementById('feed');host.innerHTML='';
  feed.forEach(f=>{const el=document.createElement('div');el.className='item';el.style.setProperty('--c',f.c);
    el.innerHTML=`<div class="dot-ico">${f.ico}</div><div class="item-body"><div class="item-msg">${f.msg}</div><div class="item-time">${timeAgo(f.mins)}</div></div>`;
    host.appendChild(el);});}

function setRange(v){currentRange=v;regenerateAll(v);series=datasets[currentMetric];
  document.getElementById('rangeLabel').textContent=RANGE_LABELS[v];renderKpis(true);animateChart();}
document.getElementById('range').addEventListener('change',e=>setRange(e.target.value));
document.getElementById('metricTabs').addEventListener('click',e=>{
  const t=e.target.closest('.tab');if(!t)return;
  document.querySelectorAll('#metricTabs .tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');currentMetric=t.dataset.metric;series=datasets[currentMetric];animateChart();});
document.getElementById('export').addEventListener('click',()=>{
  const rows=[['Metric','Period','Point','Value']];
  Object.keys(datasets).forEach(m=>datasets[m].forEach(d=>rows.push([m,RANGE_LABELS[currentRange],d.label,d.value])));
  rows.push([]);rows.push(['KPI','Value']);
  kpis.forEach(k=>rows.push([k.label,fmtNumber(k.value,k.fmt,k.prefix,k.suffix)]));
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`analytics-${currentRange}-${Date.now()}.csv`;
  document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);showToast('Dashboard exported as CSV');});
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}

function tick(){countdown--;if(countdown<=0){refreshData();countdown=REFRESH_SECS;}
  document.getElementById('countdown').textContent=countdown+'s';}
function refreshData(){
  Object.keys(datasets).forEach(m=>{datasets[m]=datasets[m].map(d=>({...d,value:Math.max(1,Math.round(d.value*(0.92+Math.random()*0.16)))}));});
  kpis=deriveKpis(datasets);series=datasets[currentMetric];renderKpis(true);
  const a=pick(ACTIONS);const verb=a.msg===ACTIONS[0].msg?pick(VERBS):null;
  feed=feed.map(f=>({...f,mins:f.mins+Math.floor(Math.random()*4)+1}));
  feed.unshift({c:a.c,ico:a.ico,msg:a.msg(verb||''),mins:0});feed=feed.slice(0,10);
  renderFeed();animateChart();
}
let resizeTimer;
window.addEventListener('resize',()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(()=>{resizeCanvas();drawChart();},120);});

function init(){resizeCanvas();regenerateAll(currentRange);series=datasets[currentMetric];
  document.getElementById('rangeLabel').textContent=RANGE_LABELS[currentRange];
  renderKpis(true);seedFeed();renderFeed();animateChart();setInterval(tick,1000);}
init();
</script>
