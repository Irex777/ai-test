<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --bg-card-hover: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-purple: #8b5cf6;
            --accent-orange: #f59e0b;
            --accent-red: #ef4444;
            --border-color: #334155;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -4px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
        }

        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .date-filter {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-secondary);
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .date-filter label {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .date-filter select {
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 14px;
            cursor: pointer;
            outline: none;
        }

        .date-filter select:hover {
            border-color: var(--accent-blue);
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }

        .btn-outline:hover {
            border-color: var(--accent-blue);
            color: var(--text-primary);
        }

        .refresh-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            font-size: 13px;
        }

        .refresh-indicator.active .refresh-icon {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .kpi-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--card-color), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .kpi-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: var(--card-color);
        }

        .kpi-card:hover::before {
            opacity: 1;
        }

        .kpi-card.revenue { --card-color: var(--accent-blue); }
        .kpi-card.users { --card-color: var(--accent-green); }
        .kpi-card.orders { --card-color: var(--accent-purple); }
        .kpi-card.growth { --card-color: var(--accent-orange); }

        .kpi-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .kpi-title {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .kpi-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--card-color);
            opacity: 0.2;
        }

        .kpi-value {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .kpi-change {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .kpi-change.positive {
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-green);
        }

        .kpi-change.negative {
            background: rgba(239, 68, 68, 0.15);
            color: var(--accent-red);
        }

        .content-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
        }

        @media (max-width: 1024px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
        }

        .card-body {
            padding: 24px;
        }

        .chart-container {
            height: 320px;
            position: relative;
        }

        #revenueChart {
            width: 100%;
            height: 100%;
        }

        .activity-feed {
            max-height: 400px;
            overflow-y: auto;
        }

        .activity-feed::-webkit-scrollbar {
            width: 6px;
        }

        .activity-feed::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        .activity-feed::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        .activity-item {
            display: flex;
            gap: 14px;
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.2s ease;
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-item:hover {
            background: var(--bg-primary);
        }

        .activity-icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 16px;
        }

        .activity-icon.order { background: rgba(59, 130, 246, 0.15); }
        .activity-icon.user { background: rgba(16, 185, 129, 0.15); }
        .activity-icon.refund { background: rgba(239, 68, 68, 0.15); }
        .activity-icon.review { background: rgba(139, 92, 246, 0.15); }
        .activity-icon.alert { background: rgba(245, 158, 11, 0.15); }

        .activity-content {
            flex: 1;
            min-width: 0;
        }

        .activity-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
            color: var(--text-primary);
        }

        .activity-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chart-tooltip {
            position: absolute;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 10;
        }

        .chart-tooltip.visible {
            opacity: 1;
        }

        .sparkline {
            display: inline-block;
            width: 60px;
            height: 24px;
            margin-left: auto;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <header class="header">
            <h1>📊 Analytics Dashboard</h1>
            <div class="controls">
                <div class="refresh-indicator" id="refreshIndicator">
                    <span class="refresh-icon">🔄</span>
                    <span id="countdown">30s</span>
                </div>
                <div class="date-filter">
                    <label for="dateRange">📅 Period:</label>
                    <select id="dateRange">
                        <option value="7d">Last 7 days</option>
                        <option value="30d" selected>Last 30 days</option>
                        <option value="90d">Last 90 days</option>
                        <option value="1y">Last year</option>
                    </select>
                </div>
                <button class="btn btn-outline" onclick="exportDashboard()">
                    📥 Export
                </button>
                <button class="btn btn-primary" onclick="refreshNow()">
                    🔄 Refresh
                </button>
            </div>
        </header>

        <div class="kpi-grid">
            <div class="kpi-card revenue" data-kpi="revenue">
                <div class="kpi-header">
                    <span class="kpi-title">Total Revenue</span>
                    <div class="kpi-icon">💰</div>
                </div>
                <div class="kpi-value" data-target="847000" data-prefix="$" data-suffix="K" data-divisor="1000">$0</div>
                <div class="kpi-change positive">
                    <span>↑</span>
                    <span>12.5%</span>
                    <span style="color: var(--text-muted); margin-left: 4px;">vs last period</span>
                </div>
            </div>

            <div class="kpi-card users" data-kpi="users">
                <div class="kpi-header">
                    <span class="kpi-title">Active Users</span>
                    <div class="kpi-icon">👥</div>
                </div>
                <div class="kpi-value" data-target="12400" data-suffix="K" data-decimal="1" data-divisor="1000">0</div>
                <div class="kpi-change positive">
                    <span>↑</span>
                    <span>8.2%</span>
                    <span style="color: var(--text-muted); margin-left: 4px;">vs last period</span>
                </div>
            </div>

            <div class="kpi-card orders" data-kpi="orders">
                <div class="kpi-header">
                    <span class="kpi-title">Total Orders</span>
                    <div class="kpi-icon">🛒</div>
                </div>
                <div class="kpi-value" data-target="3200" data-suffix="K" data-decimal="1" data-divisor="1000">0</div>
                <div class="kpi-change positive">
                    <span>↑</span>
                    <span>15.8%</span>
                    <span style="color: var(--text-muted); margin-left: 4px;">vs last period</span>
                </div>
            </div>

            <div class="kpi-card growth" data-kpi="growth">
                <div class="kpi-header">
                    <span class="kpi-title">Growth Rate</span>
                    <div class="kpi-icon">📈</div>
                </div>
                <div class="kpi-value" data-target="24" data-prefix="+" data-suffix="%">+0%</div>
                <div class="kpi-change positive">
                    <span>↑</span>
                    <span>4.2%</span>
                    <span style="color: var(--text-muted); margin-left: 4px;">vs last period</span>
                </div>
            </div>
        </div>

        <div class="content-grid">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Revenue Trend</h2>
                    <div class="btn-group">
                        <button class="btn btn-outline" style="padding: 6px 12px; font-size: 12px;" onclick="setChartView('line')">Line</button>
                        <button class="btn btn-outline" style="padding: 6px 12px; font-size: 12px;" onclick="setChartView('bar')">Bar</button>
                    </div>
                </div>
                <div class="card-body">
                    <div class="chart-container" id="chartContainer">
                        <canvas id="revenueChart"></canvas>
                        <div class="chart-tooltip" id="chartTooltip"></div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Recent Activity</h2>
                    <span class="pulse" style="color: var(--accent-green);">●</span>
                </div>
                <div class="activity-feed" id="activityFeed">
                    <!-- Activity items will be injected here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Data
        let revenueData = [42000, 48000, 45000, 52000, 49000, 58000, 55000, 62000, 59000, 68000, 72000, 78000, 75000, 82000, 85000, 88000, 92000, 95000, 98000, 102000, 105000, 108000, 112000, 115000, 118000, 122000, 125000, 128000, 132000, 135000];
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        
        const activities = [
            { type: 'order', icon: '🛒', title: 'New order #12847 placed', time: '2 minutes ago' },
            { type: 'user', icon: '👤', title: 'User Sarah M. completed onboarding', time: '5 minutes ago' },
            { type: 'order', icon: '🛒', title: 'Bulk order #12846 processed ($4,250)', time: '8 minutes ago' },
            { type: 'review', icon: '⭐', title: 'New 5-star review received', time: '12 minutes ago' },
            { type: 'user', icon: '👤', title: '15 new users registered from campaign', time: '18 minutes ago' },
            { type: 'alert', icon: '⚠️', title: 'Low stock alert: SKU-7823', time: '25 minutes ago' },
            { type: 'refund', icon: '💸', title: 'Refund processed for order #12812', time: '32 minutes ago' },
            { type: 'order', icon: '🛒', title: 'International order #12845 shipped', time: '45 minutes ago' },
            { type: 'user', icon: '👤', title: 'Enterprise user upgraded plan', time: '1 hour ago' },
            { type: 'review', icon: '⭐', title: 'Customer feedback report generated', time: '1 hour ago' }
        ];

        let countdown = 30;
        let chartView = 'line';
        let refreshInterval;

        // Animate counters
        function animateCounter(element) {
            const target = parseFloat(element.dataset.target);
            const prefix = element.dataset.prefix || '';
            const suffix = element.dataset.suffix || '';
            const decimal = parseInt(element.dataset.decimal || 0);
            const divisor = parseInt(element.dataset.divisor || 1);
            const duration = 2000;
            const start = 0;
            const startTime = performance.now();

            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeProgress = 1 - Math.pow(1 - progress, 3);
                const current = start + (target - start) * easeProgress;
                const displayValue = (current / divisor).toFixed(decimal);
                element.textContent = `${prefix}${displayValue}${suffix}`;

                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }

            requestAnimationFrame(update);
        }

        // Initialize KPI animations
        function initKPIs() {
            document.querySelectorAll('.kpi-value').forEach(el => animateCounter(el));
        }

        // Draw chart
        function drawChart() {
            const canvas = document.getElementById('revenueChart');
            const container = document.getElementById('chartContainer');
            const tooltip = document.getElementById('chartTooltip');
            
            canvas.width = container.clientWidth * 2;
            canvas.height = container.clientHeight * 2;
            canvas.style.width = container.clientWidth + 'px';
            canvas.style.height = container.clientHeight + 'px';
            
            const ctx = canvas.getContext('2d');
            ctx.scale(2, 2);
            
            const width = container.clientWidth;
            const height = container.clientHeight;
            const padding = { top: 20, right: 20, bottom: 40, left: 60 };
            const chartWidth = width - padding.left - padding.right;
            const chartHeight = height - padding.top - padding.bottom;

            ctx.clearRect(0, 0, width, height);

            const maxVal = Math.max(...revenueData) * 1.1;
            const minVal = 0;
            const dataRange = maxVal - minVal;

            // Draw grid lines
            ctx.strokeStyle = '#334155';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 5; i++) {
                const y = padding.top + (chartHeight / 5) * i;
                ctx.beginPath();
                ctx.moveTo(padding.left, y);
                ctx.lineTo(width - padding.right, y);
                ctx.stroke();
                
                const value = maxVal - (dataRange / 5) * i;
                ctx.fillStyle = '#64748b';
                ctx.font = '12px -apple-system, sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText('$' + (value / 1000).toFixed(0) + 'K', padding.left - 10, y + 4);
            }

            // Draw data
            if (chartView === 'line') {
                // Gradient fill
                const gradient = ctx.createLinearGradient(0, padding.top, 0, height - padding.bottom);
                gradient.addColorStop(0, 'rgba(59, 130, 246, 0.3)');
                gradient.addColorStop(1, 'rgba(59, 130, 246, 0)');

                ctx.beginPath();
                ctx.moveTo(padding.left, height - padding.bottom);
                
                revenueData.forEach((val, i) => {
                    const x = padding.left + (chartWidth / (revenueData.length - 1)) * i;
                    const y = padding.top + chartHeight - ((val - minVal) / dataRange) * chartHeight;
                    ctx.lineTo(x, y);
                });
                
                ctx.lineTo(padding.left + chartWidth, height - padding.bottom);
                ctx.closePath();
                ctx.fillStyle = gradient;
                ctx.fill();

                // Line
                ctx.beginPath();
                ctx.strokeStyle = '#3b82f6';
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                
                revenueData.forEach((val, i) => {
                    const x = padding.left + (chartWidth / (revenueData.length - 1)) * i;
                    const y = padding.top + chartHeight - ((val - minVal) / dataRange) * chartHeight;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                });
                ctx.stroke();

                // Points
                revenueData.forEach((val, i) => {
                    const x = padding.left + (chartWidth / (revenueData.length - 1)) * i;
                    const y = padding.top + chartHeight - ((val - minVal) / dataRange) * chartHeight;
                    
                    ctx.beginPath();
                    ctx.arc(x, y, 4, 0, Math.PI * 2);
                    ctx.fillStyle = '#1e293b';
                    ctx.fill();
                    ctx.strokeStyle = '#3b82f6';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                });
            } else {
                // Bar chart
                const barWidth = chartWidth / revenueData.length * 0.7;
                const barGap = chartWidth / revenueData.length * 0.3;
                
                revenueData.forEach((val, i) => {
                    const x = padding.left + (chartWidth / revenueData.length) * i + barGap / 2;
                    const barHeight = ((val - minVal) / dataRange) * chartHeight;
                    const y = padding.top + chartHeight - barHeight;
                    
                    const gradient = ctx.createLinearGradient(x, y, x, y + barHeight);
                    gradient.addColorStop(0, '#3b82f6');
                    gradient.addColorStop(1, '#8b5cf6');
                    
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.roundRect(x, y, barWidth, barHeight, [4, 4, 0, 0]);
                    ctx.fill();
                });
            }

            // X-axis labels
            ctx.fillStyle = '#94a3b8';
            ctx.font = '11px -apple-system, sans-serif';
            ctx.textAlign = 'center';
            const labelInterval = Math.ceil(revenueData.length / 7);
            
            revenueData.forEach((_, i) => {
                if (i % labelInterval === 0 || i === revenueData.length - 1) {
                    const x = padding.left + (chartWidth / (revenueData.length - 1)) * i;
                    const dayNum = i + 1;
                    ctx.fillText(`Day ${dayNum}`, x, height - padding.bottom + 20);
                }
            });

            // Hover handler
            canvas.onmousemove = (e) => {
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                
                const dataIndex = Math.round((mouseX - padding.left) / (chartWidth / (revenueData.length - 1)));
                
                if (dataIndex >= 0 && dataIndex < revenueData.length) {
                    const val = revenueData[dataIndex];
                    tooltip.innerHTML = `<strong>Day ${dataIndex + 1}</strong><br>Revenue: $${(val / 1000).toFixed(1)}K`;
                    tooltip.style.left = (e.clientX - rect.left + 15) + 'px';
                    tooltip.style.top = (e.clientY - rect.top - 10) + 'px';
                    tooltip.classList.add('visible');
                }
            };

            canvas.onmouseleave = () => {
                tooltip.classList.remove('visible');
            };
        }

        // Render activity feed
        function renderActivityFeed() {
            const feed = document.getElementById('activityFeed');
            feed.innerHTML = activities.map(activity => `
                <div class="activity-item">
                    <div class="activity-icon ${activity.type}">${activity.icon}</div>
                    <div class="activity-content">
                        <div class="activity-title">${activity.title}</div>
                        <div class="activity-time">${activity.time}</div>
                    </div>
                </div>
            `).join('');
        }

        // Set chart view
        function setChartView(view) {
            chartView = view;
            drawChart();
        }

        // Refresh with simulated data
        function refreshNow() {
            // Simulate data updates
            revenueData = revenueData.map(v => v * (0.95 + Math.random() * 0.1));
            
            document.querySelectorAll('.kpi-value').forEach(el => {
                const target = parseFloat(el.dataset.target);
                const newVal = target * (0.97 + Math.random() * 0.06);
                el.dataset.target = newVal;
                animateCounter(el);
            });
            
            drawChart();
            
            // Reset countdown
            countdown = 30;
            document.getElementById('countdown').textContent = countdown + 's';
            
            // Show refresh animation
            const indicator = document.getElementById('refreshIndicator');
            indicator.classList.add('active');
            setTimeout(() => indicator.classList.remove('active'), 1000);
        }

        // Auto-refresh countdown
        function startCountdown() {
            refreshInterval = setInterval(() => {
                countdown--;
                document.getElementById('countdown').textContent = countdown + 's';
                
                if (countdown <= 0) {
                    refreshNow();
                }
            }, 1000);
        }

        // Export dashboard
        function exportDashboard() {
            const data = {
                timestamp: new Date().toISOString(),
                kpis: {
                    revenue: document.querySelector('[data-kpi="revenue"] .kpi-value').textContent,
                    users: document.querySelector('[data-kpi="users"] .kpi-value').textContent,
                    orders: document.querySelector('[data-kpi="orders"] .kpi-value').textContent,
                    growth: document.querySelector('[data-kpi="growth"] .kpi-value').textContent
                },
                revenueData: revenueData,
                activities: activities
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `analytics-export-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // Date range change handler
        document.getElementById('dateRange').addEventListener('change', (e) => {
            // Simulate different data for different ranges
            const multiplier = {
                '7d': 0.3,
                '30d': 1,
                '90d': 2.5,
                '1y': 8
            }[e.target.value];
            
            refreshNow();
        });

        // Resize handler
        window.addEventListener('resize', drawChart);

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initKPIs();
            drawChart();
            renderActivityFeed();
            startCountdown();
        });
    </script>
</body>
</html>
