<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #13131f;
            --bg-card: #1a1a2e;
            --text-primary: #e4e4e7;
            --text-secondary: #a1a1aa;
            --accent-blue: #3b82f6;
            --accent-green: #22c55e;
            --accent-purple: #a855f7;
            --accent-orange: #f97316;
            --accent-cyan: #06b6d4;
            --accent-pink: #ec4899;
            --border-color: #27273a;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }
        
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .last-update {
            font-size: 0.875rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .pulse {
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
        
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .kpi-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .kpi-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .kpi-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .kpi-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }
        
        .kpi-value {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1;
        }
        
        .kpi-change {
            font-size: 0.75rem;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .kpi-change.positive { color: var(--accent-green); }
        .kpi-change.negative { color: var(--accent-orange); }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        
        @media (max-width: 768px) {
            .charts-grid { grid-template-columns: 1fr; }
        }
        
        .chart-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
        }
        
        .chart-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-primary);
        }
        
        .activity-section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
        }
        
        .activity-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .activity-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            background: var(--bg-secondary);
            transition: background 0.2s ease;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .activity-item:hover {
            background: #1f1f35;
        }
        
        .activity-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-top: 6px;
            flex-shrink: 0;
        }
        
        .activity-content {
            flex: 1;
        }
        
        .activity-text {
            font-size: 0.875rem;
            color: var(--text-primary);
        }
        
        .activity-time {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        
        canvas {
            width: 100%;
            height: 200px;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1>Analytics Dashboard</h1>
            <div class="last-update">
                <span class="pulse"></span>
                <span id="updateTime">Updated just now</span>
            </div>
        </div>
        
        <div class="kpi-grid">
            <div class="kpi-card" id="kpi-revenue">
                <div class="kpi-label">
                    <div class="kpi-icon" style="background: rgba(59, 130, 246, 0.2);">$</div>
                    Revenue
                </div>
                <div class="kpi-value" id="revenue-value">$124K</div>
                <div class="kpi-change positive">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><path d="M6 2l4 4H8v4H4V6H2l4-4z"/></svg>
                    <span id="revenue-change">+12.5%</span>
                </div>
            </div>
            
            <div class="kpi-card" id="kpi-users">
                <div class="kpi-label">
                    <div class="kpi-icon" style="background: rgba(168, 85, 247, 0.2);">👥</div>
                    Users
                </div>
                <div class="kpi-value" id="users-value">8.4K</div>
                <div class="kpi-change positive">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><path d="M6 2l4 4H8v4H4V6H2l4-4z"/></svg>
                    <span id="users-change">+8.2%</span>
                </div>
            </div>
            
            <div class="kpi-card" id="kpi-orders">
                <div class="kpi-label">
                    <div class="kpi-icon" style="background: rgba(34, 197, 94, 0.2);">📦</div>
                    Orders
                </div>
                <div class="kpi-value" id="orders-value">1.2K</div>
                <div class="kpi-change positive">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><path d="M6 2l4 4H8v4H4V6H2l4-4z"/></svg>
                    <span id="orders-change">+23.1%</span>
                </div>
            </div>
            
            <div class="kpi-card" id="kpi-conversion">
                <div class="kpi-label">
                    <div class="kpi-icon" style="background: rgba(249, 115, 22, 0.2);">📈</div>
                    Conversion
                </div>
                <div class="kpi-value" id="conversion-value">3.2%</div>
                <div class="kpi-change negative">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><path d="M6 10l4-4H8V2H4v4H2l4 4z"/></svg>
                    <span id="conversion-change">-2.4%</span>
                </div>
            </div>
        </div>
        
        <div class="charts-grid">
            <div class="chart-card">
                <div class="chart-title">Weekly Revenue</div>
                <canvas id="lineChart"></canvas>
            </div>
            
            <div class="chart-card">
                <div class="chart-title">Category Breakdown</div>
                <canvas id="donutChart"></canvas>
            </div>
        </div>
        
        <div class="activity-section">
            <div class="chart-title">Recent Activity</div>
            <div class="activity-list" id="activityList"></div>
        </div>
    </div>
    
    <script>
        // Animated counter
        function animateValue(element, start, end, duration, prefix = '', suffix = '', decimals = 0) {
            const startTime = performance.now();
            const startValue = parseFloat(start);
            const endValue = parseFloat(end);
            const range = endValue - startValue;
            
            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 3);
                const current = startValue + range * easeOut;
                element.textContent = prefix + current.toFixed(decimals) + suffix;
                
                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }
            requestAnimationFrame(update);
        }
        
        // Line Chart
        function drawLineChart(canvas, data, labels) {
            const ctx = canvas.getContext('2d');
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * 2;
            canvas.height = rect.height * 2;
            ctx.scale(2, 2);
            
            const width = rect.width;
            const height = rect.height;
            const padding = 40;
            const chartWidth = width - padding * 2;
            const chartHeight = height - padding * 2;
            
            const max = Math.max(...data) * 1.2;
            const min = Math.min(...data) * 0.8;
            const range = max - min;
            
            ctx.clearRect(0, 0, width, height);
            
            // Grid lines
            ctx.strokeStyle = '#27273a';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 4; i++) {
                const y = padding + (chartHeight / 4) * i;
                ctx.beginPath();
                ctx.moveTo(padding, y);
                ctx.lineTo(width - padding, y);
                ctx.stroke();
                
                // Y-axis labels
                const value = max - (range / 4) * i;
                ctx.fillStyle = '#a1a1aa';
                ctx.font = '11px sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText('$' + Math.round(value) + 'K', padding - 10, y + 4);
            }
            
            // X-axis labels
            const stepX = chartWidth / (data.length - 1);
            labels.forEach((label, i) => {
                const x = padding + stepX * i;
                ctx.fillStyle = '#a1a1aa';
                ctx.textAlign = 'center';
                ctx.fillText(label, x, height - padding + 20);
            });
            
            // Line with gradient
            const gradient = ctx.createLinearGradient(0, padding, 0, height - padding);
            gradient.addColorStop(0, 'rgba(59, 130, 246, 0.3)');
            gradient.addColorStop(1, 'rgba(59, 130, 246, 0)');
            
            const points = data.map((value, i) => ({
                x: padding + stepX * i,
                y: padding + chartHeight - ((value - min) / range) * chartHeight
            }));
            
            // Area fill
            ctx.beginPath();
            ctx.moveTo(points[0].x, height - padding);
            points.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.lineTo(points[points.length - 1].x, height - padding);
            ctx.closePath();
            ctx.fillStyle = gradient;
            ctx.fill();
            
            // Line
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            points.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.strokeStyle = '#3b82f6';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();
            
            // Dots
            points.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
                ctx.fillStyle = '#1a1a2e';
                ctx.fill();
                ctx.strokeStyle = '#3b82f6';
                ctx.lineWidth = 2;
                ctx.stroke();
            });
        }
        
        // Donut Chart
        function drawDonutChart(canvas, data, labels, colors) {
            const ctx = canvas.getContext('2d');
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * 2;
            canvas.height = rect.height * 2;
            ctx.scale(2, 2);
            
            const width = rect.width;
            const height = rect.height;
            const centerX = width / 2;
            const centerY = height / 2;
            const radius = Math.min(width, height) / 2 - 40;
            const innerRadius = radius * 0.6;
            
            const total = data.reduce((a, b) => a + b, 0);
            let currentAngle = -Math.PI / 2;
            
            ctx.clearRect(0, 0, width, height);
            
            data.forEach((value, i) => {
                const sliceAngle = (value / total) * Math.PI * 2;
                
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, currentAngle, currentAngle + sliceAngle);
                ctx.arc(centerX, centerY, innerRadius, currentAngle + sliceAngle, currentAngle, true);
                ctx.closePath();
                ctx.fillStyle = colors[i];
                ctx.fill();
                
                currentAngle += sliceAngle;
            });
            
            // Center text
            ctx.fillStyle = '#e4e4e7';
            ctx.font = 'bold 24px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('100%', centerX, centerY - 10);
            ctx.fillStyle = '#a1a1aa';
            ctx.font = '14px sans-serif';
            ctx.fillText('Total', centerX, centerY + 15);
            
            // Legend
            const legendX = 20;
            let legendY = height - 30;
            
            labels.forEach((label, i) => {
                const x = legendX + (i * 100);
                
                ctx.fillStyle = colors[i];
                ctx.fillRect(x, legendY, 12, 12);
                
                ctx.fillStyle = '#a1a1aa';
                ctx.font = '12px sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText(label + ' (' + Math.round(data[i] / total * 100) + '%)', x + 18, legendY + 10);
            });
        }
        
        // Activity data
        const activities = [
            { text: 'New user registration: Sarah M.', type: 'user' },
            { text: 'Order #12847 completed - $2,340', type: 'order' },
            { text: 'Subscription upgraded to Pro plan', type: 'sub' },
            { text: 'Payment received from Enterprise client', type: 'payment' },
            { text: 'New feature deployed: Analytics v2.0', type: 'deploy' },
            { text: 'Server health check: All systems operational', type: 'system' },
            { text: 'User feedback: 5-star review received', type: 'review' },
            { text: 'Weekly report generated successfully', type: 'report' }
        ];
        
        const activityColors = {
            user: '#3b82f6',
            order: '#22c55e',
            sub: '#a855f7',
            payment: '#06b6d4',
            deploy: '#f97316',
            system: '#64748b',
            review: '#ec4899',
            report: '#8b5cf6'
        };
        
        function formatTime(minutesAgo) {
            if (minutesAgo < 1) return 'Just now';
            if (minutesAgo < 60) return minutesAgo + ' min ago';
            const hours = Math.floor(minutesAgo / 60);
            return hours + 'h ago';
        }
        
        function renderActivity() {
            const list = document.getElementById('activityList');
            list.innerHTML = '';
            
            const shuffled = [...activities].sort(() => Math.random() - 0.5).slice(0, 5);
            
            shuffled.forEach((activity, i) => {
                const minutesAgo = Math.floor(Math.random() * 120);
                const item = document.createElement('div');
                item.className = 'activity-item';
                item.style.animationDelay = (i * 0.1) + 's';
                item.innerHTML = `
                    <div class="activity-dot" style="background: ${activityColors[activity.type]}"></div>
                    <div class="activity-content">
                        <div class="activity-text">${activity.text}</div>
                        <div class="activity-time">${formatTime(minutesAgo)}</div>
                    </div>
                `;
                list.appendChild(item);
            });
        }
        
        // Data generators
        function generateRevenueData() {
            return Array.from({ length: 7 }, () => Math.floor(Math.random() * 80) + 70);
        }
        
        function generateCategoryData() {
            return [Math.floor(Math.random() * 30) + 35, Math.floor(Math.random() * 25) + 20, Math.floor(Math.random() * 20) + 15];
        }
        
        function generateKPIs() {
            return {
                revenue: Math.floor(Math.random() * 40) + 110,
                users: (Math.random() * 2 + 7).toFixed(1),
                orders: (Math.random() * 0.5 + 1).toFixed(1),
                conversion: (Math.random() * 1.5 + 2.5).toFixed(1)
            };
        }
        
        // Initialize
        const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
        const categories = ['Products', 'Services', 'Subscriptions'];
        const categoryColors = ['#3b82f6', '#22c55e', '#a855f7'];
        
        let currentKPIs = generateKPIs();
        
        function updateDashboard() {
            // Update KPIs with animation
            const newKPIs = generateKPIs();
            
            animateValue(document.getElementById('revenue-value'), currentKPIs.revenue, newKPIs.revenue, 500, '$', 'K');
            animateValue(document.getElementById('users-value'), currentKPIs.users, newKPIs.users, 500, '', 'K', 1);
            animateValue(document.getElementById('orders-value'), currentKPIs.orders, newKPIs.orders, 500, '', 'K', 1);
            animateValue(document.getElementById('conversion-value'), currentKPIs.conversion, newKPIs.conversion, 500, '', '%', 1);
            
            currentKPIs = newKPIs;
            
            // Update charts
            const revenueData = generateRevenueData();
            const categoryData = generateCategoryData();
            
            drawLineChart(document.getElementById('lineChart'), revenueData, days);
            drawDonutChart(document.getElementById('donutChart'), categoryData, categories, categoryColors);
            
            // Update activity
            renderActivity();
            
            // Update time
            document.getElementById('updateTime').textContent = 'Updated ' + new Date().toLocaleTimeString();
        }
        
        // Initial render
        updateDashboard();
        
        // Auto-refresh every 5 seconds
        setInterval(updateDashboard, 5000);
        
        // Handle resize
        window.addEventListener('resize', () => {
            const revenueData = generateRevenueData();
            const categoryData = generateCategoryData();
            drawLineChart(document.getElementById('lineChart'), revenueData, days);
            drawDonutChart(document.getElementById('donutChart'), categoryData, categories, categoryColors);
        });
    </script>
</body>
</html>
