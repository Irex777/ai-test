<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Analytics Dashboard</title>
    <style>
        :root {
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --bg-card-hover: #252525;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent-color: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.3);
            --success-color: #10b981;
            --danger-color: #ef4444;
            --border-color: #333;
            --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-body);
            color: var(--text-primary);
            font-family: var(--font-family);
            padding: 20px;
            min-height: 100vh;
        }

        /* Layout Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 250px 1fr;
            grid-template-rows: auto auto 1fr;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header & Controls */
        .header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 10px;
        }

        .header h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: 0.5px; }
        
        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-card);
            padding: 8px 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        select, button {
            background: #2d2d2d;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        button:hover { background: var(--accent-color); border-color: var(--accent-color); }
        
        .status-badge {
            font-size: 0.8rem;
            color: var(--success-color);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .status-dot { width: 8px; height: 8px; background: var(--success-color); border-radius: 50%; animation: pulse 2s infinite; }

        /* KPI Cards */
        .kpi-container {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
            transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            background-color: var(--bg-card-hover);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            border-color: var(--accent-color);
        }

        .kpi-title { font-size: 0.9rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .kpi-value { font-size: 2rem; font-weight: 700; color: var(--text-primary); }
        .kpi-sub { font-size: 0.85rem; margin-top: 5px; display: flex; align-items: center; gap: 5px; }
        .trend-up { color: var(--success-color); }
        .trend-down { color: var(--danger-color); }

        /* Main Content Area */
        .main-content {
            grid-column: 2 / 3;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-height: 500px;
        }

        .chart-container {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            flex: 2;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .chart-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        canvas { width: 100%; height: 100%; max-height: 350px; }

        /* Activity Feed */
        .activity-feed {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            flex: 1;
            border: 1px solid var(--border-color);
            overflow-y: auto;
            max-height: 400px;
        }

        .feed-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
        }
        .feed-item:last-child { border-bottom: none; }
        .feed-time { color: var(--text-secondary); font-size: 0.8rem; }
        .feed-action { color: var(--accent-color); font-weight: 500; }

        /* Responsive */
        @media (max-width: 900px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            .main-content { grid-column: 1 / -1; }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body>

    <div class="dashboard-grid">
        <!-- Header -->
        <header class="header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <h1>Analytics Dashboard</h1>
                <div class="status-badge">
                    <div class="status-dot"></div> Live Updates
                </div>
            </div>
            
            <div class="controls">
                <div class="control-group">
                    <label for="dateRange" style="font-size: 0.8rem; color: var(--text-secondary);">Range:</label>
                    <select id="dateRange">
                        <option value="7d">Last 7 Days</option>
                        <option value="30d" selected>Last 30 Days</option>
                        <option value="90d">Last 90 Days</option>
                    </select>
                </div>
                <button id="exportBtn">
                    <span style="margin-right: 5px;">&#8681;</span> Export Data
                </button>
            </div>
        </header>

        <!-- KPI Cards -->
        <div class="kpi-container">
            <div class="card">
                <div class="kpi-title">Total Revenue</div>
                <div class="kpi-value" id="kpi-revenue">$847,000</div>
                <div class="kpi-sub trend-up">
                    <span>&#9650;</span> <span id="kpi-rev-growth">12%</span> vs last month
                </div>
            </div>
            <div class="card">
                <div class="kpi-title">Active Users</div>
                <div class="kpi-value" id="kpi-users">12,400</div>
                <div class="kpi-sub trend-up">
                    <span>&#9650;</span> <span>5.2%</span> vs last month
                </div>
            </div>
            <div class="card">
                <div class="kpi-title">Total Orders</div>
                <div class="kpi-value" id="kpi-orders">3,200</div>
                <div class="kpi-sub trend-down">
                    <span>&#9660;</span> <span>1.1%</span> vs last month
                </div>
            </div>
            <div class="card">
                <div class="kpi-title">Growth Rate</div>
                <div class="kpi-value" id="kpi-growth">+24%</div>
                <div class="kpi-sub trend-up">
                    <span>Target Met</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Chart -->
            <div class="chart-container">
                <div class="chart-header">
                    <h3>Revenue Overview</h3>
                    <div style="font-size: 0.8rem; color: var(--text-secondary);">Source: Sales Dept.</div>
                </div>
                <canvas id="revenueChart"></canvas>
            </div>

            <!-- Activity Feed -->
            <div class="activity-feed">
                <h3 style="margin-bottom: 15px; font-size: 1rem;">Recent Activity</h3>
                <div id="feed-list">
                    <!-- Items injected via JS -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- State Management ---
        const state = {
            kpi: {
                revenue: 847000,
                users: 12400,
                orders: 3200,
                growth: 24
            },
            chartData: [65, 59, 80, 81, 56, 55, 40, 75, 85, 90, 70, 80],
            refreshRate: 3000, // ms
            refreshTimer: null
        };

        // --- Formatting Helpers ---
        const formatCurrency = (num) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(num);
        const formatNumber = (num) => new Intl.NumberFormat('en-US', { maximumFractionDigits: 0 }).format(num);
        const formatK = (num) => num >= 1000 ? (num / 1000).toFixed(1) + 'K' : num;

        // --- Animated Counter Logic ---
        function animateValue(obj, start, end, duration, formatter) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                
                // Easing function (easeOutQuad)
                const ease = 1 - (1 - progress) * (1 - progress);
                
                const currentVal = Math.floor(progress * (end - start) + start);
                obj.innerHTML = formatter(currentVal);
                
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                } else {
                    obj.innerHTML = formatter(end); // Ensure exact final value
                }
            };
            window.requestAnimationFrame(step);
        }

        // --- Chart Logic (Custom Canvas) ---
        const canvas = document.getElementById('revenueChart');
        const ctx = canvas.getContext('2d');
        let chartAnimationOffset = 0;

        function resizeCanvas() {
            // Handle High DPI displays
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.parentElement.getBoundingClientRect();
            
            canvas.width = (rect.width - 40) * dpr; // minus padding
            canvas.height = 350 * dpr;
            
            canvas.style.width = `${rect.width - 40}px`;
            canvas.style.height = `350px`;
            
            ctx.scale(dpr, dpr);
            drawChart();
        }

        function drawChart() {
            const width = canvas.width / (window.devicePixelRatio || 1);
            const height = canvas.height / (window.devicePixelRatio || 1);
            const padding = 30;
            const barWidth = (width - padding * 2) / state.chartData.length - 10;

            ctx.clearRect(0, 0, width, height);

            // Grid lines
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for(let i=1; i<=5; i++) {
                const y = height - padding - ((height - 2*padding) / 5) * i;
                ctx.moveTo(padding, y);
                ctx.lineTo(width - padding, y);
            }
            ctx.stroke();

            // Bars
            const maxVal = Math.max(...state.chartData) * 1.1; // 10% headroom
            
            state.chartData.forEach((val, index) => {
                const barHeight = (val / maxVal) * (height - padding * 2);
                const x = padding + 10 + index * (barWidth + 10);
                const y = height - padding - barHeight;

                // Gradient fill
                const gradient = ctx.createLinearGradient(0, y, 0, height - padding);
                gradient.addColorStop(0, '#3b82f6');
                gradient.addColorStop(1, '#1d4ed8');

                ctx.fillStyle = gradient;
                
                // Rounded top corners for bars
                ctx.beginPath();
                ctx.moveTo(x, height - padding);
                ctx.lineTo(x, y + 4);
                ctx.quadraticCurveTo(x, y, x + 4, y);
                ctx.lineTo(x + barWidth - 4, y);
                ctx.quadraticCurveTo(x + barWidth, y, x + barWidth, y + 4);
                ctx.lineTo(x + barWidth, height - padding);
                ctx.fill();

                // Hover effect simulation (just a glow on the highest bar)
                if (val === maxVal) {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = 'rgba(59, 130, 246, 0.5)';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            });

            // X Axis Labels
            ctx.fillStyle = '#a0a0a0';
            ctx.font = '10px Arial';
            ctx.textAlign = 'center';
            const labels = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            state.chartData.forEach((val, index) => {
                const x = padding + 10 + index * (barWidth + 10) + barWidth / 2;
                ctx.fillText(labels[index], x, height - 10);
            });
        }

        // --- Activity Feed Generator ---
        function generateFeed() {
            const actions = ['New Order', 'User Signup', 'Payment Received', 'Refund Issued', 'Inventory Alert'];
            const users = ['Alice', 'Bob', 'Charlie', 'Diana', 'Ethan', 'Fiona'];
            const feedContainer = document.getElementById('feed-list');
            
            let html = '';
            for(let i=0; i<10; i++) {
                const action = actions[Math.floor(Math.random() * actions.length)];
                const user = users[Math.floor(Math.random() * users.length)];
                const time = new Date(Date.now() - i * 60000 * 5).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                html += `
                <div class="feed-item">
                    <div>
                        <span class="feed-action">${action}</span> by <span style="color: #e0e0e0">${user}</span>
                    </div>
                    <div class="feed-time">${time}</div>
                </div>`;
            }
            feedContainer.innerHTML = html;
        }

        // --- Data Simulation (Auto-Refresh) ---
        function simulateDataUpdate() {
            // Randomize KPIs slightly
            const revenueChange = Math.floor(Math.random() * 5000) - 1000;
            const userChange = Math.floor(Math.random() * 100) - 20;
            const orderChange = Math.floor(Math.random() * 50) - 10;
            
            // Update State
            state.kpi.revenue += revenueChange;
            state.kpi.users += userChange;
            state.kpi.orders += orderChange;
            state.kpi.growth = 24 + (Math.random() * 2 - 1).toFixed(1);

            // Update DOM with animation
            animateValue(document.getElementById('kpi-revenue'), parseInt(document.getElementById('kpi-revenue').innerText.replace(/[^0-9]/g, '')), state.kpi.revenue, 1000, formatCurrency);
            animateValue(document.getElementById('kpi-users'), parseInt(document.getElementById('kpi-users').innerText.replace(/[^0-9]/g, '')), state.kpi.users, 1000, formatNumber);
            animateValue(document.getElementById('kpi-orders'), parseInt(document.getElementById('kpi-orders').innerText.replace(/[^0-9]/g, '')), state.kpi.orders, 1000, formatNumber);
            
            // Growth doesn't animate as nicely with simple counters, just text update
            document.getElementById('kpi-growth').innerText = '+' + state.kpi.growth + '%';

            // Randomize Chart Data
            state.chartData = state.chartData.map(val => {
                let change = Math.floor(Math.random() * 20) - 10;
                return Math.max(10, val + change); // Ensure positive
            });
            drawChart();

            // Add new feed item
            const feedContainer = document.getElementById('feed-list');
            const newItem = document.createElement('div');
            newItem.className = 'feed-item';
            newItem.innerHTML = `
                <div><span class="feed-action">System Update</span> Data Synced</div>
                <div class="feed-time">Just now</div>
            `;
            newItem.style.opacity = '0';
            newItem.style.transition = 'opacity 0.5s';
            feedContainer.prepend(newItem);
            
            // Fade in
            setTimeout(() => newItem.style.opacity = '1', 10);
            
            // Remove last if > 10
            if(feedContainer.children.length > 10) {
                feedContainer.lastElementChild.remove();
            }
        }

        // --- Initialization & Events ---
        document.addEventListener('DOMContentLoaded', () => {
            // Initial Render
            generateFeed();
            
            // Initial Animation (0 -> Value)
            animateValue(document.getElementById('kpi-revenue'), 0, state.kpi.revenue, 1500, formatCurrency);
            animateValue(document.getElementById('kpi-users'), 0, state.kpi.users, 1500, formatNumber);
            animateValue(document.getElementById('kpi-orders'), 0, state.kpi.orders, 1500, formatNumber);
            document.getElementById('kpi-growth').innerText = '+' + state.kpi.growth + '%';

            // Setup Chart
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // Start Auto Refresh
            state.refreshTimer = setInterval(simulateDataUpdate, state.refreshRate);

            // Date Filter (Visual only)
            document.getElementById('dateRange').addEventListener('change', (e) => {
                console.log(`Filter changed to: ${e.target.value}`);
                // Flash effect to simulate loading
                document.querySelector('.main-content').style.opacity = '0.5';
                setTimeout(() => {
                    document.querySelector('.main-content').style.opacity = '1';
                    simulateDataUpdate(); // Just re-simulate for effect
                }, 300);
            });

            // Export Button
            document.getElementById('exportBtn').addEventListener('click', () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state, null, 2));
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href", dataStr);
                downloadAnchorNode.setAttribute("download", "dashboard_data.json");
                document.body.appendChild(downloadAnchorNode);
                downloadAnchorNode.click();
                downloadAnchorNode.remove();
            });
        });

    </script>
</body>
</html>
