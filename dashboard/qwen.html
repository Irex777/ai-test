<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Analytics Dashboard</title>
    <style>
        :root {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --bg-hover: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-green: #10b981;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-red: #ef4444;
            --border-color: #334155;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-primary);
            padding: 20px;
            min-height: 100vh;
        }

        /* Header & Controls */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        select, button {
            background-color: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        button:hover {
            background-color: var(--bg-hover);
            border-color: var(--text-secondary);
        }

        button.primary {
            background-color: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }

        button.primary:hover {
            background-color: #2563eb;
        }

        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        /* KPI Cards */
        .card {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            border-color: var(--text-secondary);
        }

        .kpi-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .kpi-value {
            font-size: 2rem;
            font-weight: 700;
        }

        .trend {
            font-size: 0.9rem;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .trend.up { color: var(--accent-green); }
        .trend.down { color: var(--accent-red); }

        /* Chart Section */
        .chart-section {
            grid-column: span 3;
            height: 400px;
            display: flex;
            flex-direction: column;
        }

        .activity-section {
            grid-column: span 1;
            height: 400px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .section-header {
            margin-bottom: 15px;
            font-size: 1.1rem;
            font-weight: 600;
        }

        canvas {
            width: 100%;
            height: 100%;
            flex-grow: 1;
        }

        /* Activity Feed */
        .feed-list {
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 5px;
        }

        .feed-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 10px;
            animation: fadeIn 0.5s ease;
        }

        .feed-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: var(--bg-hover);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            flex-shrink: 0;
        }

        .feed-content h4 {
            font-size: 0.9rem;
            margin-bottom: 2px;
        }

        .feed-content p {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .dashboard-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .chart-section { grid-column: span 2; }
            .activity-section { grid-column: span 2; }
        }

        @media (max-width: 600px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            .chart-section, .activity-section {
                grid-column: span 1;
                height: 300px;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-card); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }
    </style>
</head>
<body>

    <header>
        <h1>Analytics Dashboard</h1>
        <div class="controls">
            <select id="dateRange">
                <option value="7d">Last 7 Days</option>
                <option value="30d">Last 30 Days</option>
                <option value="90d">Last Quarter</option>
            </select>
            <button onclick="exportData()">
                <span style="margin-right:5px">⬇</span> Export CSV
            </button>
        </div>
    </header>

    <div class="dashboard-grid">
        <!-- KPI Cards -->
        <div class="card" id="kpi-revenue">
            <div class="kpi-label">Total Revenue</div>
            <div class="kpi-value" id="val-revenue">$0</div>
            <div class="trend up">▲ 12% vs last period</div>
        </div>
        <div class="card" id="kpi-users">
            <div class="kpi-label">Active Users</div>
            <div class="kpi-value" id="val-users">0</div>
            <div class="trend up">▲ 5.4% vs last period</div>
        </div>
        <div class="card" id="kpi-orders">
            <div class="kpi-label">Total Orders</div>
            <div class="kpi-value" id="val-orders">0</div>
            <div class="trend down">▼ 1.2% vs last period</div>
        </div>
        <div class="card" id="kpi-growth">
            <div class="kpi-label">Growth Rate</div>
            <div class="kpi-value" id="val-growth">0%</div>
            <div class="trend up">▲ Target: 20%</div>
        </div>

        <!-- Chart -->
        <div class="card chart-section">
            <div class="section-header">Revenue Trends</div>
            <canvas id="revenueChart"></canvas>
        </div>

        <!-- Activity Feed -->
        <div class="card activity-section">
            <div class="section-header">Recent Activity</div>
            <div class="feed-list" id="activityFeed">
                <!-- Items injected by JS -->
            </div>
        </div>
    </div>

    <script>
        // --- Configuration & State ---
        const CONFIG = {
            target: { revenue: 847000, users: 12400, orders: 3200, growth: 24 },
            refreshRate: 5000, // ms
            colors: {
                grid: '#334155',
                line: '#3b82f6',
                area: 'rgba(59, 130, 246, 0.2)',
                text: '#94a3b8'
            }
        };

        // --- Utility Functions ---
        const formatCurrency = (num) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(num);
        const formatNumber = (num) => new Intl.NumberFormat('en-US', { notation: "compact", compactDisplay: "short" }).format(num);
        
        // --- Animated Counter Logic ---
        function animateValue(obj, start, end, duration, prefix = '', suffix = '') {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const value = Math.floor(progress * (end - start) + start);
                
                // Formatting based on type
                if(prefix === '$') obj.innerHTML = prefix + value.toLocaleString() + suffix;
                else if(suffix === '%') obj.innerHTML = value + suffix;
                else obj.innerHTML = value.toLocaleString() + suffix;

                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        // --- Chart Logic (Canvas) ---
        let chartData = [];
        let chartInstance = null;

        function initChart() {
            const canvas = document.getElementById('revenueChart');
            // Handle high DPI
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            const ctx = canvas.getContext('2d');
            ctx.scale(dpr, dpr);
            
            // Generate random data
            chartData = Array.from({length: 12}, () => Math.floor(Math.random() * 50000) + 20000);
            
            drawChart(ctx, rect.width, rect.height);
        }

        function drawChart(ctx, width, height) {
            ctx.clearRect(0, 0, width, height);
            
            const padding = 40;
            const chartW = width - padding * 2;
            const chartH = height - padding * 2;
            const maxVal = Math.max(...chartData) * 1.2;
            const minVal = Math.min(...chartData) * 0.8;
            const range = maxVal - minVal;

            // Draw Grid
            ctx.strokeStyle = CONFIG.colors.grid;
            ctx.lineWidth = 1;
            ctx.beginPath();
            for(let i=0; i<=4; i++) {
                const y = padding + (chartH / 4) * i;
                ctx.moveTo(padding, y);
                ctx.lineTo(width - padding, y);
            }
            ctx.stroke();

            // Draw Line & Area
            const getX = (i) => padding + (chartW / (chartData.length - 1)) * i;
            const getY = (val) => padding + chartH - ((val - minVal) / range) * chartH;

            // Area Gradient
            const gradient = ctx.createLinearGradient(0, padding, 0, height - padding);
            gradient.addColorStop(0, CONFIG.colors.area);
            gradient.addColorStop(1, 'rgba(59, 130, 246, 0)');

            ctx.beginPath();
            ctx.moveTo(getX(0), getY(chartData[0]));
            for(let i=1; i<chartData.length; i++) {
                // Bezier curve for smoothness
                const xc = (getX(i - 1) + getX(i)) / 2;
                const yc = (getY(chartData[i - 1]) + getY(chartData[i])) / 2;
                ctx.quadraticCurveTo(getX(i - 1), getY(chartData[i - 1]), xc, yc);
            }
            ctx.lineTo(getX(chartData.length - 1), getY(chartData[chartData.length - 1]));
            
            // Stroke Line
            ctx.strokeStyle = CONFIG.colors.line;
            ctx.lineWidth = 3;
            ctx.stroke();

            // Fill Area
            ctx.lineTo(getX(chartData.length - 1), height - padding);
            ctx.lineTo(getX(0), height - padding);
            ctx.closePath();
            ctx.fillStyle = gradient;
            ctx.fill();

            // Draw Points
            ctx.fillStyle = '#1e293b';
            ctx.strokeStyle = CONFIG.colors.line;
            ctx.lineWidth = 2;
            for(let i=0; i<chartData.length; i++) {
                ctx.beginPath();
                ctx.arc(getX(i), getY(chartData[i]), 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
            }
        }

        // --- Activity Feed Logic ---
        const activities = [
            { type: 'order', text: 'New order #1234 received', time: '2m ago' },
            { type: 'user', text: 'New user registered: John D.', time: '15m ago' },
            { type: 'alert', text: 'Server load spike detected', time: '32m ago' },
            { type: 'order', text: 'Order #1230 shipped', time: '1h ago' },
            { type: 'user', text: 'Subscription cancelled: Sarah K.', time: '2h ago' },
            { type: 'payment', text: 'Payment failed for #1220', time: '3h ago' },
            { type: 'order', text: 'Refund processed for #1199', time: '4h ago' },
            { type: 'system', text: 'Daily backup completed', time: '5h ago' },
            { type: 'user', text: 'Login attempt failed: Admin', time: '6h ago' },
            { type: 'order', text: 'Bulk order placed by Corp X', time: '8h ago' }
        ];

        function renderFeed() {
            const container = document.getElementById('activityFeed');
            container.innerHTML = '';
            activities.forEach(item => {
                let icon = '•';
                let color = '#94a3b8';
                if(item.type === 'order') { icon = '📦'; color = '#3b82f6'; }
                if(item.type === 'user') { icon = '👤'; color = '#10b981'; }
                if(item.type === 'alert' || item.type === 'payment') { icon = '⚠️'; color = '#ef4444'; }
                
                const div = document.createElement('div');
                div.className = 'feed-item';
                div.innerHTML = `
                    <div class="feed-icon" style="color:${color}">${icon}</div>
                    <div class="feed-content">
                        <h4>${item.text}</h4>
                        <p>${item.time}</p>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // --- Simulated Data Update ---
        function updateData() {
            // 1. Update Chart Data (Randomize slightly)
            chartData.shift();
            chartData.push(Math.floor(Math.random() * 50000) + 20000);
            const canvas = document.getElementById('revenueChart');
            const ctx = canvas.getContext('2d');
            const rect = canvas.getBoundingClientRect();
            drawChart(ctx, rect.width, rect.height);

            // 2. Flash KPIs to show activity (Subtle visual cue)
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                card.style.borderColor = 'var(--accent-blue)';
                setTimeout(() => card.style.borderColor = 'var(--border-color)', 500);
            });
            
            // 3. Add new activity item
            const newActivity = {
                type: 'order',
                text: 'Real-time update: New event',
                time: 'Just now'
            };
            activities.unshift(newActivity);
            if(activities.length > 10) activities.pop();
            renderFeed();
        }

        // --- Export Functionality ---
        function exportData() {
            const data = [
                ["Metric", "Value"],
                ["Revenue", CONFIG.target.revenue],
                ["Users", CONFIG.target.users],
                ["Orders", CONFIG.target.orders],
                ["Growth", CONFIG.target.growth + "%"]
            ];
            
            let csvContent = "data:text/csv;charset=utf-8," 
                + data.map(e => e.join(",")).join("\n");
            
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "dashboard_data.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            // Animate KPIs
            animateValue(document.getElementById("val-revenue"), 0, CONFIG.target.revenue, 2000, '$');
            animateValue(document.getElementById("val-users"), 0, CONFIG.target.users, 2000);
            animateValue(document.getElementById("val-orders"), 0, CONFIG.target.orders, 2000);
            animateValue(document.getElementById("val-growth"), 0, CONFIG.target.growth, 2000, '', '%');

            renderFeed();
            initChart();

            // Resize listener for chart
            window.addEventListener('resize', () => {
                const canvas = document.getElementById('revenueChart');
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                canvas.width = rect.width * (window.devicePixelRatio || 1);
                canvas.height = rect.height * (window.devicePixelRatio || 1);
                ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
                drawChart(ctx, rect.width, rect.height);
            });

            // Auto Refresh
            setInterval(updateData, CONFIG.refreshRate);
        });

    </script>
</body>
</html>
