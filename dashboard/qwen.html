<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard</title>
    <style>
        :root {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-purple: #8b5cf6;
            --accent-orange: #f59e0b;
            --danger: #ef4444;
            --border: #334155;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-primary);
            padding: 20px;
            min-height: 100vh;
        }

        /* Layout */
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-title h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        select, button {
            background-color: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        button:hover, select:hover {
            border-color: var(--accent-blue);
            background-color: #253347;
        }

        button.primary {
            background-color: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }

        button.primary:hover {
            background-color: #2563eb;
        }

        /* KPI Grid */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background-color: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .kpi-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            border-color: var(--accent-blue);
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background-color: var(--accent-blue);
        }

        .kpi-card.green::before { background-color: var(--accent-green); }
        .kpi-card.purple::before { background-color: var(--accent-purple); }
        .kpi-card.orange::before { background-color: var(--accent-orange); }

        .kpi-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .kpi-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .kpi-trend {
            font-size: 0.85rem;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .trend-up { color: var(--accent-green); }
        .trend-down { color: var(--danger); }

        /* Main Content Grid */
        .content-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Chart Section */
        .chart-container {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
            height: 400px;
            position: relative;
        }

        .chart-header {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        canvas {
            width: 100% !important;
            height: calc(100% - 40px) !important;
        }

        /* Activity Feed */
        .activity-container {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
            height: 400px;
            display: flex;
            flex-direction: column;
        }

        .activity-header {
            margin-bottom: 15px;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .activity-list {
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 5px;
        }

        /* Scrollbar styling */
        .activity-list::-webkit-scrollbar {
            width: 6px;
        }
        .activity-list::-webkit-scrollbar-track {
            background: var(--bg-body);
        }
        .activity-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .activity-item {
            display: flex;
            align-items: flex-start;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            animation: fadeIn 0.5s ease;
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: rgba(59, 130, 246, 0.1);
            color: var(--accent-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            flex-shrink: 0;
            font-size: 0.8rem;
        }

        .activity-icon.success { background-color: rgba(16, 185, 129, 0.1); color: var(--accent-green); }
        .activity-icon.alert { background-color: rgba(245, 158, 11, 0.1); color: var(--accent-orange); }

        .activity-content h4 {
            font-size: 0.9rem;
            margin-bottom: 2px;
        }

        .activity-content p {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .activity-time {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-left: auto;
            white-space: nowrap;
        }

        /* Status Bar */
        .status-bar {
            margin-top: 20px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background-color: var(--accent-green);
            border-radius: 50%;
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

<div class="dashboard-container">
    <header>
        <div class="header-title">
            <h1>Analytics Overview</h1>
        </div>
        <div class="header-controls">
            <select id="dateRange">
                <option value="7d">Last 7 Days</option>
                <option value="30d" selected>Last 30 Days</option>
                <option value="90d">Last 90 Days</option>
                <option value="1y">Last Year</option>
            </select>
            <button class="primary" id="exportBtn">Export CSV</button>
        </div>
    </header>

    <!-- KPI Cards -->
    <div class="kpi-grid">
        <div class="kpi-card">
            <div class="kpi-label">Total Revenue</div>
            <div class="kpi-value" id="kpi-revenue">$0</div>
            <div class="kpi-trend trend-up">
                <span>▲</span> 12.5% vs last period
            </div>
        </div>
        <div class="kpi-card green">
            <div class="kpi-label">Active Users</div>
            <div class="kpi-value" id="kpi-users">0</div>
            <div class="kpi-trend trend-up">
                <span>▲</span> 8.2% vs last period
            </div>
        </div>
        <div class="kpi-card purple">
            <div class="kpi-label">New Orders</div>
            <div class="kpi-value" id="kpi-orders">0</div>
            <div class="kpi-trend trend-up">
                <span>▲</span> 5.1% vs last period
            </div>
        </div>
        <div class="kpi-card orange">
            <div class="kpi-label">Growth Rate</div>
            <div class="kpi-value" id="kpi-growth">0%</div>
            <div class="kpi-trend trend-up">
                <span>▲</span> 2.4% vs last month
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="content-grid">
        <!-- Chart -->
        <div class="chart-container">
            <div class="chart-header">
                <h3>Revenue Trend</h3>
                <div style="font-size: 0.8rem; color: var(--text-secondary);">Live Updates</div>
            </div>
            <canvas id="revenueChart"></canvas>
        </div>

        <!-- Activity Feed -->
        <div class="activity-container">
            <div class="activity-header">Recent Activity</div>
            <div class="activity-list" id="activityFeed">
                <!-- Items injected via JS -->
            </div>
        </div>
    </div>

    <div class="status-bar">
        <div class="pulse"></div>
        <span>System Online • Auto-refreshing data every 5s</span>
    </div>
</div>

<script>
    // --- Data & State ---
    const state = {
        kpi: {
            revenue: 847000,
            users: 12400,
            orders: 3200,
            growth: 24
        },
        chartData: Array.from({length: 20}, () => Math.floor(Math.random() * 50000) + 20000),
        activities: [
            { type: 'order', title: 'New Order #1024', desc: 'John Doe purchased Pro Plan', time: '2m ago', icon: 'success' },
            { type: 'user', title: 'New User Signup', desc: 'Jane Smith joined', time: '15m ago', icon: '' },
            { type: 'alert', title: 'Server Load High', desc: 'CPU usage exceeded 90%', time: '1h ago', icon: 'alert' },
            { type: 'order', title: 'Payment Received', desc: 'Invoice #992 paid', time: '2h ago', icon: 'success' },
            { type: 'user', title: 'User Login', desc: 'Admin accessed dashboard', time: '3h ago', icon: '' },
            { type: 'order', title: 'Order Refunded', desc: 'Order #1001 cancelled', time: '4h ago', icon: 'alert' },
            { type: 'system', title: 'System Update', desc: 'Version 2.4.1 deployed', time: '5h ago', icon: '' },
            { type: 'user', title: 'New Subscriber', desc: 'Newsletter signup', time: '6h ago', icon: 'success' },
            { type: 'order', title: 'Bulk Order', desc: 'Enterprise client order', time: '8h ago', icon: 'success' },
            { type: 'alert', title: 'Low Inventory', desc: 'Product SKU-123 low stock', time: '10h ago', icon: 'alert' }
        ]
    };

    // --- Utilities ---
    const formatCurrency = (num) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(num);
    const formatNumber = (num) => new Intl.NumberFormat('en-US').format(num);
    
    // --- KPI Animation Logic ---
    function animateValue(obj, start, end, duration, prefix = '', suffix = '') {
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            
            let val = Math.floor(progress * (end - start) + start);
            
            // Handle specific formatting
            if (suffix === 'K') {
                obj.innerHTML = prefix + (val / 1000).toFixed(1) + suffix;
            } else if (suffix === '%') {
                obj.innerHTML = val + suffix;
            } else {
                obj.innerHTML = prefix + formatNumber(val);
            }
            
            if (progress < 1) {
                window.requestAnimationFrame(step);
            }
        };
        window.requestAnimationFrame(step);
    }

    function updateKPIs() {
        // Simulate data fluctuation for auto-refresh
        const newRev = state.kpi.revenue + (Math.random() * 1000 - 400);
        const newUser = state.kpi.users + (Math.floor(Math.random() * 20) - 5);
        const newOrd = state.kpi.orders + (Math.floor(Math.random() * 10) - 2);
        const newGrowth = state.kpi.growth + (Math.random() * 2 - 1);

        animateValue(document.getElementById("kpi-revenue"), 0, newRev, 1000, '$');
        animateValue(document.getElementById("kpi-users"), 0, newUser, 1000, '', 'K');
        animateValue(document.getElementById("kpi-orders"), 0, newOrd, 1000, '', 'K');
        animateValue(document.getElementById("kpi-growth"), 0, Math.floor(newGrowth), 1000, '', '%');

        // Update state
        state.kpi.revenue = newRev;
        state.kpi.users = newUser;
        state.kpi.orders = newOrd;
        state.kpi.growth = newGrowth;
    }

    // --- Chart Logic (Canvas) ---
    const canvas = document.getElementById('revenueChart');
    const ctx = canvas.getContext('2d');
    
    function resizeCanvas() {
        const parent = canvas.parentElement;
        canvas.width = parent.clientWidth;
        canvas.height = parent.clientHeight - 50; // Account for header
    }

    function drawChart() {
        const width = canvas.width;
        const height = canvas.height;
        const padding = 40;
        
        ctx.clearRect(0, 0, width, height);

        // Determine max value for scaling
        const maxVal = Math.max(...state.chartData) * 1.2;
        
        // Helper to map data to coordinates
        const getX = (i) => (i / (state.chartData.length - 1)) * (width - padding * 2) + padding;
        const getY = (val) => height - ((val / maxVal) * (height - padding * 2)) - padding;

        // Draw Grid lines
        ctx.strokeStyle = '#334155';
        ctx.lineWidth = 1;
        ctx.beginPath();
        for(let i=0; i<5; i++) {
            let y = padding + (i * (height - 2*padding) / 4);
            ctx.moveTo(padding, y);
            ctx.lineTo(width - padding, y);
        }
        ctx.stroke();

        // Draw Gradient Area
        const gradient = ctx.createLinearGradient(0, 0, 0, height);
        gradient.addColorStop(0, 'rgba(59, 130, 246, 0.5)');
        gradient.addColorStop(1, 'rgba(59, 130, 246, 0.0)');

        ctx.beginPath();
        ctx.moveTo(getX(0), height - padding);
        state.chartData.forEach((val, i) => {
            ctx.lineTo(getX(i), getY(val));
        });
        ctx.lineTo(getX(state.chartData.length - 1), height - padding);
        ctx.fillStyle = gradient;
        ctx.fill();

        // Draw Line
        ctx.beginPath();
        ctx.strokeStyle = '#3b82f6';
        ctx.lineWidth = 3;
        ctx.lineJoin = 'round';
        state.chartData.forEach((val, i) => {
            if(i === 0) ctx.moveTo(getX(i), getY(val));
            else ctx.lineTo(getX(i), getY(val));
        });
        ctx.stroke();

        // Draw Points
        ctx.fillStyle = '#1e293b';
        state.chartData.forEach((val, i) => {
            ctx.beginPath();
            ctx.arc(getX(i), getY(val), 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
        });
    }

    function updateChart() {
        // Shift data
        state.chartData.shift();
        // Add new random data point
        const lastVal = state.chartData[state.chartData.length - 1];
        const change = (Math.random() - 0.5) * 10000;
        let newVal = lastVal + change;
        if(newVal < 10000) newVal = 10000; // Floor
        
        state.chartData.push(newVal);
        drawChart();
    }

    // --- Activity Feed Logic ---
    function renderActivity() {
        const feed = document.getElementById('activityFeed');
        feed.innerHTML = '';
        state.activities.forEach(item => {
            const el = document.createElement('div');
            el.className = 'activity-item';
            el.innerHTML = `
                <div class="activity-icon ${item.icon}">
                    ${item.type === 'order' ? '$' : item.type === 'user' ? 'U' : '!'}
                </div>
                <div class="activity-content">
                    <h4>${item.title}</h4>
                    <p>${item.desc}</p>
                </div>
                <div class="activity-time">${item.time}</div>
            `;
            feed.appendChild(el);
        });
    }

    function addNewActivity() {
        const types = ['order', 'user', 'alert'];
        const randomType = types[Math.floor(Math.random() * types.length)];
        const titles = {
            order: ['New Sale', 'Payment Processed', 'Refund Issued'],
            user: ['New Registration', 'Login Attempt', 'Profile Update'],
            alert: ['High Traffic', 'API Latency', 'Disk Space Low']
        };
        
        const title = titles[randomType][Math.floor(Math.random() * titles[randomType].length)];
        
        state.activities.unshift({
            type: randomType,
            title: title,
            desc: 'System generated event',
            time: 'Just now',
            icon: randomType === 'alert' ? 'alert' : randomType === 'order' ? 'success' : ''
        });

        if(state.activities.length > 10) state.activities.pop();
        renderActivity();
    }

    // --- Event Listeners ---
    window.addEventListener('resize', () => {
        resizeCanvas();
        drawChart();
    });

    document.getElementById('exportBtn').addEventListener('click', () => {
        const data = state.chartData.map((val, i) => `Day ${i+1},${val}`).join('\n');
        const csvContent = "data:text/csv;charset=utf-8," + "Day,Revenue\n" + data;
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "analytics_data.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    });

    document.getElementById('dateRange').addEventListener('change', () => {
        // Simulate data update on filter change
        state.chartData = Array.from({length: 20}, () => Math.floor(Math.random() * 50000) + 20000);
        updateKPIs();
        drawChart();
    });

    // --- Initialization ---
    document.addEventListener('DOMContentLoaded', () => {
        resizeCanvas();
        updateKPIs();
        renderActivity();
        drawChart();

        // Auto Refresh Timer
        setInterval(() => {
            updateChart();
            // Randomly add activity occasionally
            if(Math.random() > 0.7) addNewActivity();
        }, 3000);
    });

</script>
</body>
</html>
