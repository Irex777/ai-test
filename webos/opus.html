<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora OS</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg1: #0d0e1f; --bg2: #1a1c38;
  --win: #1e2040; --titlebar: #272a52; --titlebar-active: #34376f;
  --accent: #5b7cfa; --accent2: #9b5bfa;
  --text: #e4e6f5; --dim: #9a9cc4; --border: #353766;
  --hover: rgba(91,124,250,.18); --sel: rgba(91,124,250,.35);
  --good: #4ade80; --warn: #fbbf24; --danger: #f87171;
}
html, body { height: 100%; overflow: hidden; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: linear-gradient(135deg, var(--bg1), var(--bg2)); color: var(--text); user-select: none; -webkit-user-select: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
::-webkit-scrollbar-track { background: transparent; }

/* ===== BOOT ===== */
#boot { position: fixed; inset: 0; background: radial-gradient(circle at 50% 40%, #14162e, #05060f);
  display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 99999; transition: opacity .7s ease; }
#boot.hide { opacity: 0; pointer-events: none; }
.boot-logo { width: 92px; height: 92px; border-radius: 22px; background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center; font-size: 48px; box-shadow: 0 0 50px rgba(91,124,250,.6); animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.07); } }
.boot-name { margin-top: 24px; font-size: 30px; font-weight: 300; letter-spacing: 6px; }
.boot-sub { margin-top: 6px; font-size: 12px; color: var(--dim); letter-spacing: 2px; }
.boot-bar { margin-top: 40px; width: 220px; height: 4px; background: rgba(255,255,255,.1); border-radius: 2px; overflow: hidden; }
.boot-bar i { display: block; height: 100%; width: 0; background: linear-gradient(90deg, var(--accent), var(--accent2)); animation: load 2.1s ease forwards; }
@keyframes load { to { width: 100%; } }
.boot-spin { margin-top: 28px; width: 26px; height: 26px; border: 3px solid rgba(255,255,255,.15); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== DESKTOP ===== */
#desktop { position: fixed; top: 0; left: 0; right: 0; bottom: 48px; overflow: hidden; }
.icon { position: absolute; width: 92px; display: flex; flex-direction: column; align-items: center; gap: 5px;
  padding: 9px 6px; border-radius: 8px; text-align: center; transition: background .12s; }
.icon:hover { background: var(--hover); }
.icon.selected { background: var(--sel); outline: 1px dashed rgba(255,255,255,.25); }
.icon .ic { font-size: 40px; line-height: 1; filter: drop-shadow(0 2px 4px rgba(0,0,0,.5)); }
.icon .lbl { font-size: 12.5px; text-shadow: 0 1px 3px rgba(0,0,0,.9); word-break: break-word; line-height: 1.2; }
.icon.dragging { opacity: .8; z-index: 5000; }

/* ===== TASKBAR ===== */
#taskbar { position: fixed; left: 0; right: 0; bottom: 0; height: 48px; background: rgba(18,20,42,.88);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border-top: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 8px; gap: 6px; z-index: 90000; }
#startBtn { display: flex; align-items: center; gap: 8px; height: 36px; padding: 0 14px; border-radius: 7px;
  background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; font-weight: 600; font-size: 14px;
  box-shadow: 0 2px 10px rgba(91,124,250,.4); transition: transform .1s; }
#startBtn:hover { transform: translateY(-1px); filter: brightness(1.08); }
#startBtn .win-logo { font-size: 16px; }
.tb-divider { width: 1px; height: 26px; background: var(--border); margin: 0 4px; }
.tb-app { display: flex; align-items: center; gap: 7px; height: 36px; padding: 0 12px; border-radius: 6px;
  background: rgba(255,255,255,.05); border: 1px solid transparent; font-size: 13px; max-width: 190px; transition: background .12s; }
.tb-app:hover { background: var(--hover); }
.tb-app.active { background: var(--sel); border-color: rgba(91,124,250,.4); }
.tb-app .ic { font-size: 16px; }
.tb-app .t { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#tray { margin-left: auto; display: flex; align-items: center; gap: 14px; padding: 0 12px; height: 36px; border-radius: 7px; background: rgba(255,255,255,.04); }
#tray .ti { font-size: 14px; opacity: .85; }
#tray #clock { display: flex; flex-direction: column; align-items: flex-end; line-height: 1.15; font-size: 12px; }
#tray #clock .t { font-weight: 600; font-size: 13px; }

/* ===== START MENU ===== */
#startMenu { position: fixed; left: 8px; bottom: 56px; width: 340px; max-height: 70vh; background: rgba(24,26,54,.96);
  backdrop-filter: blur(18px); border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,.6);
  z-index: 95000; padding: 16px; display: none; flex-direction: column; gap: 6px; transform-origin: bottom left; }
#startMenu.open { display: flex; animation: pop .15s ease; }
@keyframes pop { from { transform: scale(.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.sm-search { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,.25); border: 1px solid var(--border);
  border-radius: 7px; padding: 8px 12px; margin-bottom: 8px; }
.sm-search input { background: none; border: none; outline: none; color: var(--text); width: 100%; font-size: 13px; }
.sm-head { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; padding: 4px 6px; }
.sm-item { display: flex; align-items: center; gap: 12px; padding: 9px 10px; border-radius: 7px; font-size: 13.5px; transition: background .1s; }
.sm-item:hover { background: var(--hover); }
.sm-item .ic { font-size: 22px; width: 26px; text-align: center; }
.sm-foot { margin-top: 8px; padding-top: 10px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.sm-user { display: flex; align-items: center; gap: 9px; font-size: 13px; }
.sm-user .av { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 14px; }
.sm-power { display: flex; gap: 4px; }
.sm-power button { width: 34px; height: 34px; border-radius: 7px; font-size: 15px; }
.sm-power button:hover { background: var(--hover); }

/* ===== CONTEXT MENU ===== */
.cmenu { position: fixed; min-width: 190px; background: rgba(30,32,64,.97); backdrop-filter: blur(14px);
  border: 1px solid var(--border); border-radius: 9px; box-shadow: 0 14px 40px rgba(0,0,0,.6); z-index: 98000;
  padding: 6px; display: none; animation: pop .12s ease; }
.cmenu.open { display: block; }
.cmenu .it { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 6px; font-size: 13px; }
.cmenu .it:hover { background: var(--hover); }
.cmenu .it .ic { font-size: 15px; width: 18px; text-align: center; }
.cmenu .sep { height: 1px; background: var(--border); margin: 5px 8px; }

/* ===== WINDOWS ===== */
.window { position: absolute; background: var(--win); border: 1px solid var(--border); border-radius: 9px;
  box-shadow: 0 16px 50px rgba(0,0,0,.55); display: flex; flex-direction: column; min-width: 240px; min-height: 150px; overflow: hidden; }
.window.maximized { border-radius: 0; }
.window .titlebar { height: 36px; background: var(--titlebar); display: flex; align-items: center; gap: 9px;
  padding: 0 8px 0 13px; cursor: move; flex-shrink: 0; border-bottom: 1px solid rgba(0,0,0,.25); }
.window.active .titlebar { background: var(--titlebar-active); }
.window .titlebar .tic { font-size: 16px; }
.window .titlebar .ttl { font-size: 13px; font-weight: 600; pointer-events: none; }
.window .controls { margin-left: auto; display: flex; gap: 7px; }
.window .controls button { width: 30px; height: 24px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--dim); }
.window .controls button:hover { background: rgba(255,255,255,.12); color: var(--text); }
.window .controls button.close:hover { background: var(--danger); color: #fff; }
.window .body { flex: 1; overflow: auto; position: relative; }
.resize-handle { position: absolute; z-index: 50; }
.rh-e { top: 0; right: 0; width: 6px; height: 100%; cursor: ew-resize; }
.rh-w { top: 0; left: 0; width: 6px; height: 100%; cursor: ew-resize; }
.rh-n { top: 0; left: 0; width: 100%; height: 6px; cursor: ns-resize; }
.rh-s { bottom: 0; left: 0; width: 100%; height: 6px; cursor: ns-resize; }
.rh-ne { top: 0; right: 0; width: 12px; height: 12px; cursor: nesw-resize; }
.rh-nw { top: 0; left: 0; width: 12px; height: 12px; cursor: nwse-resize; }
.rh-se { bottom: 0; right: 0; width: 14px; height: 14px; cursor: nwse-resize; }
.rh-sw { bottom: 0; left: 0; width: 12px; height: 12px; cursor: nesw-resize; }
.window.minimized { display: none; }

/* ===== NOTEPAD ===== */
.np-menu { display: flex; gap: 2px; padding: 5px 8px; background: var(--titlebar); border-bottom: 1px solid var(--border); position: relative; }
.np-menu .mi { padding: 5px 11px; border-radius: 5px; font-size: 13px; position: relative; }
.np-menu .mi:hover, .np-menu .mi.open { background: var(--hover); }
.np-dd { position: absolute; top: 100%; left: 0; min-width: 150px; background: rgba(30,32,64,.98); border: 1px solid var(--border);
  border-radius: 7px; box-shadow: 0 10px 30px rgba(0,0,0,.5); padding: 5px; z-index: 60; display: none; }
.np-dd.open { display: block; }
.np-dd .di { padding: 7px 12px; border-radius: 5px; font-size: 13px; }
.np-dd .di:hover { background: var(--hover); }
.np-dd .sep { height: 1px; background: var(--border); margin: 4px 6px; }
.np-area { width: 100%; height: calc(100% - 58px); background: #16182f; color: var(--text); border: none; outline: none;
  padding: 12px 14px; font-family: 'Consolas','Menlo',monospace; font-size: 14px; resize: none; line-height: 1.5; }
.np-status { position: absolute; bottom: 0; left: 0; right: 0; height: 22px; background: var(--titlebar); border-top: 1px solid var(--border);
  font-size: 11px; color: var(--dim); display: flex; align-items: center; padding: 0 12px; gap: 16px; }

/* ===== CALCULATOR ===== */
.calc { display: flex; flex-direction: column; height: 100%; padding: 12px; gap: 10px; background: #16182f; }
.calc-disp { background: #0e0f22; border: 1px solid var(--border); border-radius: 8px; padding: 16px; text-align: right; min-height: 78px; display: flex; flex-direction: column; justify-content: flex-end; }
.calc-disp .hist { font-size: 13px; color: var(--dim); min-height: 16px; overflow: hidden; }
.calc-disp .cur { font-size: 34px; font-weight: 600; word-break: break-all; }
.calc-grid { flex: 1; display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
.calc-grid button { border-radius: 8px; font-size: 19px; background: #2a2c52; color: var(--text); transition: filter .1s, transform .05s; }
.calc-grid button:hover { filter: brightness(1.18); }
.calc-grid button:active { transform: scale(.95); }
.calc-grid button.op { background: #3a3c6e; color: var(--accent); }
.calc-grid button.fn { background: #22244a; color: var(--warn); }
.calc-grid button.eq { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
.calc-grid button.zero { grid-column: span 2; }

/* ===== TERMINAL ===== */
.term { height: 100%; background: #07080f; color: #c8f7d4; font-family: 'Consolas','Menlo',monospace; font-size: 13.5px;
  padding: 12px; overflow-y: auto; line-height: 1.5; cursor: text; }
.term .ln { white-space: pre-wrap; word-break: break-word; }
.term .pr { color: #5b7cfa; }
.term .pr .path { color: var(--good); }
.term .err { color: var(--danger); }
.term .dim { color: var(--dim); }
.term-input-line { display: flex; align-items: baseline; }
.term-input-line .pr { color: #5b7cfa; white-space: nowrap; }
.term-input-line input { flex: 1; background: none; border: none; outline: none; color: #c8f7d4; font: inherit; padding: 0; margin-left: 2px; }

/* ===== GENERIC APP CONTENTS ===== */
.app-pad { padding: 16px; }
.app-title { font-size: 18px; font-weight: 600; margin-bottom: 14px; }
.fc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(92px,1fr)); gap: 10px; }
.fc-item { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 12px 6px; border-radius: 8px; transition: background .1s; text-align: center; }
.fc-item:hover { background: var(--hover); }
.fc-item .ic { font-size: 34px; }
.fc-item .lbl { font-size: 12px; color: var(--dim); }
.center-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--dim); gap: 10px; }
.center-empty .ic { font-size: 54px; opacity: .5; }

/* Browser */
.br-bar { display: flex; gap: 6px; padding: 8px; background: var(--titlebar); border-bottom: 1px solid var(--border); align-items: center; }
.br-bar button { width: 30px; height: 30px; border-radius: 6px; font-size: 14px; color: var(--dim); }
.br-bar button:hover { background: var(--hover); color: var(--text); }
.br-addr { flex: 1; background: #16182f; border: 1px solid var(--border); border-radius: 16px; padding: 6px 14px; color: var(--text); font-size: 13px; outline: none; }
.br-page { padding: 24px; color: var(--text); }
.br-page h1 { font-size: 24px; margin-bottom: 8px; }
.br-page a { color: var(--accent); cursor: pointer; text-decoration: underline; }

/* Settings */
.set-row { display: flex; align-items: center; justify-content: space-between; padding: 13px 0; border-bottom: 1px solid var(--border); gap: 16px; }
.set-row .k { font-size: 14px; }
.set-row .d { font-size: 12px; color: var(--dim); }
.swatch-row { display: flex; gap: 10px; flex-wrap: wrap; }
.swatch { width: 34px; height: 34px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; }
.swatch.sel { border-color: #fff; }
.wp-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-top: 6px; }
.wp { height: 56px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; }
.wp.sel { border-color: var(--accent); }

/* Pictures */
.pic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px,1fr)); gap: 10px; padding: 14px; }
.pic { aspect-ratio: 1; border-radius: 8px; cursor: pointer; transition: transform .12s; box-shadow: 0 4px 14px rgba(0,0,0,.4); }
.pic:hover { transform: scale(1.04); }
.pic-modal { position: absolute; inset: 0; background: rgba(0,0,0,.85); display: none; align-items: center; justify-content: center; z-index: 70; }
.pic-modal.open { display: flex; }
.pic-modal .big { width: 80%; height: 80%; border-radius: 10px; }

/* Toast */
#toasts { position: fixed; bottom: 60px; right: 16px; z-index: 99000; display: flex; flex-direction: column; gap: 8px; }
.toast { background: rgba(30,32,64,.97); border: 1px solid var(--border); border-left: 3px solid var(--accent);
  border-radius: 8px; padding: 11px 16px; font-size: 13px; box-shadow: 0 8px 24px rgba(0,0,0,.5); animation: slidein .25s ease; max-width: 280px; }
@keyframes slidein { from { transform: translateX(120%); } to { transform: translateX(0); } }

/* Shutdown */
#shutdown { position: fixed; inset: 0; background: #05060f; z-index: 99998; display: none; flex-direction: column;
  align-items: center; justify-content: center; color: var(--text); }
#shutdown.on { display: flex; }
#shutdown .msg { margin-top: 26px; font-size: 16px; color: var(--dim); }
#shutdown .pw { margin-top: 30px; padding: 12px 26px; border-radius: 8px; background: linear-gradient(135deg,var(--accent),var(--accent2)); display: none; }
#shutdown .pw.show { display: block; }
.dim-text { color: var(--dim); }
</style>
</head>
<body>

<!-- BOOT SCREEN -->
<div id="boot">
  <div class="boot-logo">🪐</div>
  <div class="boot-name">AURORA</div>
  <div class="boot-sub">OPERATING SYSTEM</div>
  <div class="boot-bar"><i></i></div>
  <div class="boot-spin"></div>
</div>

<!-- DESKTOP -->
<div id="desktop"></div>

<!-- TASKBAR -->
<div id="taskbar">
  <button id="startBtn"><span class="win-logo">⊞</span><span>Start</span></button>
  <div class="tb-divider"></div>
  <div id="tbApps" style="display:flex;gap:6px;overflow:hidden;flex:1;"></div>
  <div id="tray">
    <span class="ti" title="Network">📶</span>
    <span class="ti" title="Volume">🔊</span>
    <span class="ti" title="Battery">🔋</span>
    <div id="clock"><span class="t">--:--</span><span class="d"></span></div>
  </div>
</div>

<!-- START MENU -->
<div id="startMenu">
  <div class="sm-search"><span>🔎</span><input id="smSearch" placeholder="Search apps..." autocomplete="off"></div>
  <div class="sm-head">All Apps</div>
  <div id="smList"></div>
  <div class="sm-foot">
    <div class="sm-user"><div class="av">G</div><span>Guest</span></div>
    <div class="sm-power">
      <button id="btnLock" title="Lock">🔒</button>
      <button id="btnRestart" title="Restart">⟳</button>
      <button id="btnShutdown" title="Shut down">⏻</button>
    </div>
  </div>
</div>

<!-- DESKTOP CONTEXT MENU -->
<div class="cmenu" id="deskMenu">
  <div class="it" data-act="refresh"><span class="ic">🔄</span>Refresh</div>
  <div class="it" data-act="newfolder"><span class="ic">📁</span>New Folder</div>
  <div class="sep"></div>
  <div class="it" data-act="sort"><span class="ic">↕️</span>Sort Icons</div>
  <div class="it" data-act="nextwp"><span class="ic">🖼️</span>Next Wallpaper</div>
  <div class="sep"></div>
  <div class="it" data-act="display"><span class="ic">🖥️</span>Display Settings</div>
  <div class="it" data-act="terminal"><span class="ic">⌨️</span>Open Terminal</div>
</div>

<!-- ICON CONTEXT MENU -->
<div class="cmenu" id="iconMenu">
  <div class="it" data-act="open"><span class="ic">📂</span>Open</div>
  <div class="sep"></div>
  <div class="it" data-act="rename"><span class="ic">✏️</span>Rename</div>
  <div class="it" data-act="delete"><span class="ic">🗑️</span>Delete</div>
  <div class="sep"></div>
  <div class="it" data-act="props"><span class="ic">ℹ️</span>Properties</div>
</div>

<!-- TOASTS -->
<div id="toasts"></div>

<!-- SHUTDOWN SCREEN -->
<div id="shutdown">
  <div class="boot-logo" style="animation:spin 1.4s linear infinite;">🪐</div>
  <div class="msg" id="sdMsg">Shutting down...</div>
  <button class="pw" id="sdPower">⏻  Power On</button>
</div>

<script>
"use strict";

/* ============ APP REGISTRY ============ */
const APPS = {
  mycomputer: { name: 'My Computer', icon: '🖥️', open: openMyComputer },
  recycle:    { name: 'Recycle Bin', icon: '🗑️', open: openRecycle },
  notepad:    { name: 'Notepad',     icon: '📝', open: openNotepad },
  calculator: { name: 'Calculator',  icon: '🧮', open: openCalculator },
  browser:    { name: 'Browser',     icon: '🌐', open: openBrowser },
  terminal:   { name: 'Terminal',    icon: '⌨️', open: openTerminal },
  settings:   { name: 'Settings',    icon: '⚙️', open: openSettings },
  pictures:   { name: 'Pictures',    icon: '🖼️', open: openPictures },
};
const DESKTOP_ORDER = ['mycomputer','recycle','notepad','calculator','browser','terminal','settings','pictures'];

const WALLPAPERS = [
  'linear-gradient(135deg,#0d0e1f,#1a1c38)',
  'linear-gradient(135deg,#1a0a2e,#4a1d6e,#16213e)',
  'linear-gradient(135deg,#0f2027,#203a43,#2c5364)',
  'radial-gradient(circle at 30% 20%,#3a1c5e,#0d0e1f 60%)',
  'linear-gradient(135deg,#1f1c2c,#928dab)',
  'linear-gradient(135deg,#0c0c1d,#1e3c72,#2a5298)',
];
const ACCENTS = ['#5b7cfa','#9b5bfa','#4ade80','#f472b6','#f59e0b','#22d3ee'];

let state = {
  z: 100,
  windows: new Map(),
  winId: 0,
  activeId: null,
  wallpaper: 0,
  accent: 0,
  icons: {},
  recycle: [],
};

/* ============ DOM HELPERS ============ */
const $ = (s, r=document) => r.querySelector(s);
const $$ = (s, r=document) => [...r.querySelectorAll(s)];
const el = (tag, cls, html) => { const e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; };

function toast(msg, ms=2600){
  const t = el('div','toast',msg);
  $('#toasts').appendChild(t);
  setTimeout(()=>{ t.style.transition='opacity .3s,transform .3s'; t.style.opacity=0; t.style.transform='translateX(120%)'; setTimeout(()=>t.remove(),300); }, ms);
}
function escapeHtml(s){ return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ============ CLOCK ============ */
function tickClock(){
  const d = new Date();
  let h = d.getHours(), m = String(d.getMinutes()).padStart(2,'0');
  const ap = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 || 12;
  $('#clock .t').textContent = `${h12}:${m} ${ap}`;
  $('#clock .d').textContent = d.toLocaleDateString(undefined,{month:'short',day:'numeric'});
}
setInterval(tickClock, 1000);

/* ============ BOOT ============ */
function boot(){
  tickClock();
  loadSettings();
  applyWallpaper();
  renderDesktopIcons();
  renderStartMenu();
  bindGlobal();
  setTimeout(()=>{ $('#boot').classList.add('hide'); setTimeout(()=>{ const b=$('#boot'); if(b) b.remove(); }, 700); }, 2200);
}

/* ============ DESKTOP ICONS ============ */
function renderDesktopIcons(){
  const desk = $('#desktop');
  desk.querySelectorAll('.icon').forEach(n=>n.remove());
  DESKTOP_ORDER.forEach((key, i) => {
    const app = APPS[key];
    const saved = state.icons[key];
    const icon = el('div','icon');
    icon.dataset.app = key;
    icon.innerHTML = `<div class="ic">${app.icon}</div><div class="lbl">${escapeHtml(app.name)}</div>`;
    const col = i % 2, row = Math.floor(i/2);
    icon.style.left = (saved?.x ?? (16 + col*100)) + 'px';
    icon.style.top  = (saved?.y ?? (16 + row*100)) + 'px';
    desk.appendChild(icon);
    makeIconDraggable(icon, key);
  });
}

function makeIconDraggable(icon, key){
  let sx, sy, ox, oy, drag=false, moved=false;
  icon.addEventListener('mousedown', e=>{
    if(e.button!==0) return;
    selectIcon(icon);
    drag=true; moved=false;
    sx=e.clientX; sy=e.clientY;
    const r=icon.getBoundingClientRect();
    const dr=$('#desktop').getBoundingClientRect();
    ox=r.left-dr.left; oy=r.top-dr.top;
    e.preventDefault();
  });
  const mv = (e)=>{
    if(!drag) return;
    const dx=e.clientX-sx, dy=e.clientY-sy;
    if(Math.abs(dx)+Math.abs(dy)>4){ moved=true; icon.classList.add('dragging'); }
    if(moved){
      const dr=$('#desktop').getBoundingClientRect();
      let nx=ox+dx, ny=oy+dy;
      nx=Math.max(0,Math.min(nx, dr.width-92));
      ny=Math.max(0,Math.min(ny, dr.height-90));
      icon.style.left=nx+'px'; icon.style.top=ny+'px';
    }
  };
  const up = ()=>{
    if(!drag) return;
    drag=false;
    if(moved){ icon.classList.remove('dragging'); state.icons[key]={x:parseInt(icon.style.left),y:parseInt(icon.style.top)}; saveSettings(); }
  };
  document.addEventListener('mousemove', mv);
  document.addEventListener('mouseup', up);
  icon.addEventListener('dblclick', ()=> openApp(key));
  icon.addEventListener('contextmenu', e=>{ e.preventDefault(); e.stopPropagation(); selectIcon(icon); showIconMenu(e.clientX,e.clientY,key); });
}

function selectIcon(icon){
  $$('.icon.selected').forEach(i=>i.classList.remove('selected'));
  icon.classList.add('selected');
}

/* ============ WINDOW MANAGER ============ */
function createWindow({title, icon, width=460, height=360, content, onMount, x, y, key}){
  const id = ++state.winId;
  const w = el('div','window');
  w.dataset.id = id; w.dataset.app = key||'';
  w.style.width = width+'px'; w.style.height = height+'px';
  const count = state.windows.size;
  w.style.left = (x ?? (80 + count*26)) + 'px';
  w.style.top  = (y ?? (50 + count*26)) + 'px';
  w.style.zIndex = ++state.z;

  w.innerHTML = `
    <div class="titlebar">
      <span class="tic">${icon||'🪟'}</span>
      <span class="ttl">${escapeHtml(title)}</span>
      <div class="controls">
        <button class="min" title="Minimize">—</button>
        <button class="max" title="Maximize">▢</button>
        <button class="close" title="Close">✕</button>
      </div>
    </div>
    <div class="body"></div>`;
  ['rh-n','rh-s','rh-e','rh-w','rh-ne','rh-nw','rh-se','rh-sw'].forEach(d=>{
    const h=el('div','resize-handle '+d); w.appendChild(h); makeResizable(h,w,d);
  });
  w.querySelector('.body').innerHTML = content||'';

  $('#desktop').appendChild(w);

  const rec = { id, el:w, title, icon, key, minimized:false, maximized:false, prev:null, onMount };
  state.windows.set(id, rec);

  w.querySelector('.close').onclick = (e)=>{ e.stopPropagation(); closeWindow(id); };
  w.querySelector('.min').onclick = (e)=>{ e.stopPropagation(); minimizeWindow(id); };
  w.querySelector('.max').onclick = (e)=>{ e.stopPropagation(); toggleMax(id); };
  w.querySelector('.titlebar').addEventListener('dblclick', (e)=>{ if(!e.target.closest('.controls')) toggleMax(id); });

  makeDraggable(w);
  w.addEventListener('mousedown', ()=> focusWindow(id));
  focusWindow(id);
  renderTaskbar();
  if(onMount) try{ onMount(w.querySelector('.body'), rec); }catch(err){ console.error(err); }
  return rec;
}

function makeDraggable(w){
  const bar = w.querySelector('.titlebar');
  let sx, sy, ox, oy, drag=false;
  bar.addEventListener('mousedown', e=>{
    if(e.target.closest('.controls')) return;
    if(w.classList.contains('maximized')) return;
    drag=true;
    sx=e.clientX; sy=e.clientY;
    ox=parseInt(w.style.left); oy=parseInt(w.style.top);
    e.preventDefault();
  });
  const mv = (e)=>{
    if(!drag) return;
    let nx=ox+(e.clientX-sx), ny=oy+(e.clientY-sy);
    ny=Math.max(0,Math.min(ny, window.innerHeight-48-36));
    w.style.left=nx+'px'; w.style.top=ny+'px';
  };
  const up = ()=>{ drag=false; };
  document.addEventListener('mousemove', mv);
  document.addEventListener('mouseup', up);
}

function makeResizable(handle, w, dir){
  handle.addEventListener('mousedown', e=>{
    if(w.classList.contains('maximized')) return;
    e.preventDefault(); e.stopPropagation();
    const sx=e.clientX, sy=e.clientY;
    const ow=w.offsetWidth, oh=w.offsetHeight, ol=parseInt(w.style.left), ot=parseInt(w.style.top);
    function mv(ev){
      const dx=ev.clientX-sx, dy=ev.clientY-sy;
      let nw=ow, nh=oh, nl=ol, nt=ot;
      if(dir.includes('e')) nw=Math.max(240, ow+dx);
      if(dir.includes('s')) nh=Math.max(150, oh+dy);
      if(dir.includes('w')){ nw=Math.max(240, ow-dx); nl=ol+(ow-nw); }
      if(dir.includes('n')){ nh=Math.max(150, oh-dy); nt=ot+(oh-nh); }
      w.style.width=nw+'px'; w.style.height=nh+'px';
      w.style.left=nl+'px'; w.style.top=nt+'px';
    }
    function up(){ document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); }
    document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
  });
}

function focusWindow(id){
  const rec = state.windows.get(id); if(!rec) return;
  state.windows.forEach(r=> r.el.classList.remove('active'));
  rec.el.classList.add('active');
  rec.el.style.zIndex = ++state.z;
  state.activeId = id;
  renderTaskbar();
}

function closeWindow(id){
  const rec = state.windows.get(id); if(!rec) return;
  rec.el.style.transition='opacity .15s,transform .15s';
  rec.el.style.opacity=0; rec.el.style.transform='scale(.96)';
  setTimeout(()=>{ rec.el.remove(); state.windows.delete(id); renderTaskbar(); }, 140);
}

function minimizeWindow(id){
  const rec = state.windows.get(id); if(!rec) return;
  rec.minimized=true; rec.el.classList.add('minimized');
  state.activeId=null;
  renderTaskbar();
}

function toggleMax(id){
  const rec = state.windows.get(id); if(!rec) return;
  if(rec.maximized){
    rec.maximized=false; rec.el.classList.remove('maximized');
    if(rec.prev){ rec.el.style.left=rec.prev.l; rec.el.style.top=rec.prev.t; rec.el.style.width=rec.prev.w; rec.el.style.height=rec.prev.h; }
  } else {
    rec.prev={l:rec.el.style.left,t:rec.el.style.top,w:rec.el.style.width,h:rec.el.style.height};
    rec.maximized=true; rec.el.classList.add('maximized');
    rec.el.style.left='0px'; rec.el.style.top='0px';
    rec.el.style.width=window.innerWidth+'px'; rec.el.style.height=(window.innerHeight-48)+'px';
  }
  focusWindow(id);
}

function toggleFromTaskbar(id){
  const rec = state.windows.get(id); if(!rec) return;
  if(rec.minimized){ rec.minimized=false; rec.el.classList.remove('minimized'); focusWindow(id); }
  else if(state.activeId===id){ minimizeWindow(id); }
  else { focusWindow(id); }
}

function renderTaskbar(){
  const tb = $('#tbApps'); tb.innerHTML='';
  state.windows.forEach(rec=>{
    const b = el('div','tb-app'+(state.activeId===rec.id && !rec.minimized?' active':''));
    b.innerHTML = `<span class="ic">${rec.icon}</span><span class="t">${escapeHtml(rec.title)}</span>`;
    b.onclick = ()=> toggleFromTaskbar(rec.id);
    tb.appendChild(b);
  });
}

function openApp(key){
  const app = APPS[key]; if(!app) return;
  const singletons = ['settings','mycomputer','recycle','pictures','browser'];
  if(singletons.includes(key)){
    for(const rec of state.windows.values()){
      if(rec.key===key){ if(rec.minimized){ rec.minimized=false; rec.el.classList.remove('minimized'); } focusWindow(rec.id); return rec; } }
  }
  return app.open();
}

function closeStartMenu(){ $('#startMenu').classList.remove('open'); const s=$('#smSearch'); if(s){ s.value=''; filterStart(''); } }
function filterStart(q){

}

/* ============ CONTEXT MENUS ============ */
function showDeskMenu(x,y){
  const m=$('#deskMenu'); m.classList.add('open'); placeMenu(m,x,y);
  m.querySelectorAll('.it').forEach(it=>{ it.onclick=()=>{ handleDeskAct(it.dataset.act); closeMenus(); }; });
}
function showIconMenu(x,y,key){
  const m=$('#iconMenu'); m.classList.add('open'); placeMenu(m,x,y);
  m.querySelectorAll('.it').forEach(it=>{ it.onclick=()=>{ handleIconAct(it.dataset.act,key); closeMenus(); }; });
}
function placeMenu(m,x,y){
  const r=m.getBoundingClientRect();
  const nx=Math.min(x, window.innerWidth-r.width-6);
  const ny=Math.min(y, window.innerHeight-r.height-54);
  m.style.left=Math.max(4,nx)+'px'; m.style.top=Math.max(4,ny)+'px';
}
function closeMenus(){ $$('.cmenu.open').forEach(m=>m.classList.remove('open')); }

function handleDeskAct(act){
  switch(act){
    case 'refresh': toast('Desktop refreshed'); break;
    case 'newfolder': toast('New Folder created on Desktop'); break;
    case 'sort': sortIcons(); toast('Icons sorted'); break;
    case 'nextwp': state.wallpaper=(state.wallpaper+1)%WALLPAPERS.length; applyWallpaper(); saveSettings(); break;
    case 'display': openApp('settings'); break;
    case 'terminal': openApp('terminal'); break;
  }
}
function handleIconAct(act,key){
  const app=APPS[key];
  switch(act){
    case 'open': openApp(key); break;
    case 'rename': { const n=prompt('Rename to:', app.name); if(n){ app.name=n; renderDesktopIcons(); renderStartMenu(); renderTaskbar(); } break; }
    case 'delete': state.recycle.push(app.name); toast(`${app.name} moved to Recycle Bin`); break;
    case 'props': toast(`Properties — ${app.name} · Type: Application`); break;
  }
}
function sortIcons(){
  let i=0;
  $$('#desktop .icon').forEach(ic=>{
    const col=i%2, row=Math.floor(i/2);
    ic.style.left=(16+col*100)+'px'; ic.style.top=(16+row*100)+'px';
    state.icons[ic.dataset.app]={x:16+col*100,y:16+row*100}; i++;
  });
  saveSettings();
}

/* ============ WALLPAPER / SETTINGS PERSIST ============ */
function applyWallpaper(){ $('#desktop').style.background = WALLPAPERS[state.wallpaper]; }
function applyAccent(){ document.documentElement.style.setProperty('--accent', ACCENTS[state.accent]); }
function saveSettings(){
  try{ localStorage.setItem('aurora.settings', JSON.stringify({wallpaper:state.wallpaper, accent:state.accent, icons:state.icons, recycle:state.recycle})); }catch(e){}
}
function loadSettings(){
  try{
    const s=JSON.parse(localStorage.getItem('aurora.settings')||'{}');
    if(s.wallpaper!=null) state.wallpaper=s.wallpaper;
    if(s.accent!=null) state.accent=s.accent;
    if(s.icons) state.icons=s.icons;
    if(s.recycle) state.recycle=s.recycle;
  }catch(e){}

}

function notepadAction(a, ta, rec, body){
  const status = body.querySelector('.np-status');
  const setTtl = (fn)=>{ rec.title = 'Notepad — '+(fn||'Untitled'); rec.el.querySelector('.ttl').textContent=escapeHtml(rec.title); status.querySelector('.fname').textContent=fn||'Untitled.txt'; renderTaskbar(); };
  if(a==='new'){ ta.value=''; setTtl('Untitled'); localStorage.removeItem('aurora.notepad.current'); toast('New document'); }
  else if(a==='open'){
    const data = JSON.parse(localStorage.getItem('aurora.notepad.files')||'{}');
    const names = Object.keys(data);
    if(!names.length){ toast('No saved documents found'); return; }
    const choice = prompt('Open file. Saved docs:\n'+names.join('\n')+'\n\nType name:', names[0]);
    if(choice && data[choice]){ ta.value=data[choice]; setTtl(choice); toast('Opened '+choice); }
    else if(choice){ toast('File not found'); }
  }
  else if(a==='save'){
    const data = JSON.parse(localStorage.getItem('aurora.notepad.files')||'{}');
    let fn = (status.querySelector('.fname').textContent==='Untitled.txt') ? null : status.querySelector('.fname').textContent;
    if(!fn) fn = prompt('Save as:', 'note'+String(Date.now()).slice(-4)+'.txt');
    if(fn){ data[fn]=ta.value; localStorage.setItem('aurora.notepad.files', JSON.stringify(data)); localStorage.setItem('aurora.notepad.current', JSON.stringify({name:fn, val:ta.value})); setTtl(fn); toast('Saved '+fn+' to localStorage'); }
  }
  else if(a==='saveas'){
    const data = JSON.parse(localStorage.getItem('aurora.notepad.files')||'{}');
    const fn = prompt('Save as:', 'note'+String(Date.now()).slice(-4)+'.txt');
    if(fn){ data[fn]=ta.value; localStorage.setItem('aurora.notepad.files', JSON.stringify(data)); localStorage.setItem('aurora.notepad.current', JSON.stringify({name:fn, val:ta.value})); setTtl(fn); toast('Saved '+fn); }
  }
  else if(a==='clear'){ ta.value=''; }
  else if(a==='selectall'){ ta.select(); }
  status.querySelector('.chars').textContent='Chars: '+ta.value.length;
  status.querySelector('.lines').textContent='Lines: '+ta.value.split('\n').length;
}
function notepadLoadAuto(ta, rec, body, upd){
  try{
    const cur = JSON.parse(localStorage.getItem('aurora.notepad.current')||'null');
    if(cur && cur.val){ ta.value=cur.val; rec.title='Notepad — '+cur.name; rec.el.querySelector('.ttl').textContent=escapeHtml(rec.title); body.querySelector('.fname').textContent=cur.name; renderTaskbar(); upd(); }
  }catch(e){}
}

/* ============ APP: CALCULATOR ============ */
function openCalculator(){
  return createWindow({
    key:'calculator', title:'Calculator', icon:'🧮', width:300, height:420,
    content:`<div class="calc">
      <div class="calc-disp"><div class="hist"></div><div class="cur">0</div></div>
      <div class="calc-grid">
        <button class="fn" data-k="C">C</button>
        <button class="fn" data-k="back">⌫</button>
        <button class="fn" data-k="%">%</button>
        <button class="op" data-k="/">÷</button>
        <button data-k="7">7</button><button data-k="8">8</button><button data-k="9">9</button>
        <button class="op" data-k="*">×</button>
        <button data-k="4">4</button><button data-k="5">5</button><button data-k="6">6</button>
        <button class="op" data-k="-">−</button>
        <button data-k="1">1</button><button data-k="2">2</button><button data-k="3">3</button>
        <button class="op" data-k="+">+</button>
        <button class="zero" data-k="0">0</button>
        <button data-k=".">.</button>
        <button class="fn" data-k="neg">±</button>
        <button class="eq" data-k="=">=</button>
      </div></div>`,
    onMount:(body)=>{
      const disp = body.querySelector('.cur'), hist = body.querySelector('.hist');
      let cur='0', prev=null, op=null, reset=false;
      const fmt=(n)=>{ if(n==='Error') return n; const num=Number(n); if(!isFinite(num)) return 'Error'; return String(parseFloat(num.toPrecision(12))); };
      const render=()=>{ disp.textContent=cur; hist.textContent = (prev!==null?(fmt(prev)+( {'+':'+','-':'−','*':'×','/':'÷'}[op]||'') ):''); };
      const num=(k)=>{ if(reset){cur='0'; reset=false;} if(k==='.'){ if(!cur.includes('.')) cur= cur==='Error'?'0.':cur+'.'; } else { cur = (cur==='0'||cur==='Error') ? k : cur+k; } };
      const compute=(a,b,o)=>{ a=parseFloat(a); b=parseFloat(b); let r; switch(o){case '+':r=a+b;break;case '-':r=a-b;break;case '*':r=a*b;break;case '/':r=b===0?'Error':a/b;break;case '%':r=a%b;break;} return r; };
      body.querySelectorAll('button').forEach(b=>{
        b.onclick=()=>{
          const k=b.dataset.k;
          if(/[0-9.]/.test(k)) num(k);
          else if(k==='C'){ cur='0'; prev=null; op=null; }
          else if(k==='back'){ cur=cur.length>1?cur.slice(0,-1):'0'; }
          else if(k==='neg'){ cur=cur==='0'||cur==='Error'?'0':(cur.startsWith('-')?cur.slice(1):'-'+cur); }
          else if(k==='%'){
            if(prev!==null && op){ const r=compute(prev,cur,'%'); cur=fmt(r); prev=null; op=null; reset=true; }
            else { cur=fmt(parseFloat(cur)/100); }
          }
          else if(['+','-','*','/'].includes(k)){
            if(op && !reset && prev!==null){ const r=compute(prev,cur,op); cur=fmt(r); }
            prev=cur; op=k; reset=true;
          }
          else if(k==='='){
            if(op!==null && prev!==null){ const r=compute(prev,cur,op); hist.textContent=fmt(prev)+({'+':'+','-':'−','*':'×','/':'÷'}[op])+cur+'='; cur=fmt(r); prev=null; op=null; reset=true; }
          }
          render();
        };
      });
      render();
    }
  });
}

/* ============ APP: TERMINAL ============ */
function openTerminal(){
  return createWindow({
    key:'terminal', title:'Terminal', icon:'⌨️', width:560, height:360,
    content:`<div class="term"></div>`,
    onMount:(body)=>{
      const t = body.querySelector('.term');
      const history=[]; let hi=0;
      const promptStr = () => `<span class="pr">guest<span class="dim">@</span>aurora<span class="dim">:</span><span class="path">~</span><span class="dim">$</span></span> `;
      function print(html, cls){ const l=el('div','ln'+(cls?' '+cls:'')); l.innerHTML=html; t.appendChild(l); }
      function newInputLine(){
        const line=el('div','term-input-line');
        line.innerHTML = promptStr();
        const inp=el('input'); inp.spellcheck=false; inp.autocomplete='off';
        line.appendChild(inp);
        t.appendChild(line); t.scrollTop=t.scrollHeight;
        inp.focus();
        inp.addEventListener('keydown', e=>{
          if(e.key==='Enter'){
            const cmd=inp.value;
            if(cmd.trim()){ history.push(cmd); hi=history.length; }
            line.classList.remove('term-input-line');
            line.innerHTML = promptStr()+escapeHtml(cmd);
            if(cmd.trim().toLowerCase()==='clear'){ t.innerHTML=''; }
            else { run(cmd, print); }
            newInputLine();
          } else if(e.key==='ArrowUp'){ if(hi>0){ hi--; inp.value=history[hi]||''; } e.preventDefault(); }
          else if(e.key==='ArrowDown'){ if(hi<history.length){ hi++; inp.value=history[hi]||''; } e.preventDefault(); }
        });
      }
      t.addEventListener('click', ()=>{ const last=t.querySelector('.term-input-line input'); if(last) last.focus(); });
      print('<span class="pr">Aurora OS Terminal</span> <span class="dim">[Version 1.0.0]</span>');
      print('<span class="dim">Type \'help\' for a list of commands.</span>');
      print('');
      newInputLine();
    }
  });
}
function run(raw, print){
  const input = raw.trim();
  if(!input) return;
  const parts = input.split(/\s+/);
  const cmd = parts[0].toLowerCase();
  const args = parts.slice(1);
  switch(cmd){
    case 'help':
      print('Available commands:');
      print('  <span class="dim">help</span>      Show this help message');
      print('  <span class="dim">date</span>      Show current date and time');
      print('  <span class="dim">echo</span>      Print text  (e.g. echo hello)');
      print('  <span class="dim">clear</span>     Clear the screen');
      print('  <span class="dim">ls</span>        List directory contents');
      print('  <span class="dim">whoami</span>    Print current user');
      print('  <span class="dim">ver</span>       Show OS version');
      print('  <span class="dim">pwd</span>       Print working directory');
      print('  <span class="dim">open</span>     Launch an app  (e.g. open notepad)');
      break;
    case 'date': print(String(new Date())); break;
    case 'echo': print(escapeHtml(args.join(' '))); break;
    case 'ls':
      print('<span class="dim">Desktop/</span>  <span class="dim">Documents/</span>  <span class="dim">Downloads/</span>');
      print('<span class="dim">Music/</span>     <span class="dim">Pictures/</span>  <span class="dim">Videos/</span>');
      print('readme.txt  .config');
      break;
    case 'whoami': print('guest'); break;
    case 'ver': print('Aurora OS [Version 1.0.0]'); break;
    case 'pwd': print('/home/guest'); break;
    case 'open': {
      const a=args[0]&&args[0].toLowerCase();
      if(APPS[a]){ openApp(a); print('Opening '+APPS[a].name+'...'); }
      else print('<span class="err">open: unknown app \''+escapeHtml(args[0]||'')+'\'</span>');
      break;
    }
    default:
      print('<span class="err">command not found: '+escapeHtml(cmd)+'</span>  <span class="dim">(try \'help\')</span>');
  }
  print('');
}

/* ============ APP: BROWSER ============ */
function openBrowser(){
  return createWindow({
    key:'browser', title:'Aurora Browser', icon:'🌐', width:640, height:460,
    content:`<div class="br-bar">
        <button data-go="back" title="Back">←</button>
        <button data-go="fwd" title="Forward">→</button>
        <button data-go="reload" title="Reload">⟳</button>
        <button data-go="home" title="Home">🏠</button>
        <input class="br-addr" value="aurora://home" autocomplete="off">
      </div>
      <div class="br-page"></div>`,
    onMount:(body)=>{
      const addr=body.querySelector('.br-addr'); const page=body.querySelector('.br-page');
      const sites={
        'aurora://home': `<h1>🪐 Aurora Start</h1><p class="dim-text">Welcome to the Aurora Browser.</p>
          <p style="margin-top:14px;">Quick links:</p><ul style="margin-left:20px;line-height:1.9;">
          <li><a data-url="aurora://search">🔍 Search</a></li>
          <li><a data-url="aurora://about">ℹ️ About Aurora</a></li>
          <li><a data-url="aurora://news">📰 News</a></li></ul>`,
        'aurora://search': `<h1>🔍 Search</h1><p class="dim-text">A simulated search engine.</p>
          <p style="margin-top:14px;">Top result: <b>"Aurora OS is the best web-based operating system"</b></p>`,
        'aurora://about': `<h1>ℹ️ About Aurora</h1><p class="dim-text">Version 1.0.0</p>
          <p style="margin-top:14px;">A single-file operating system built with HTML, CSS and JavaScript.</p>`,
        'aurora://news': `<h1>📰 Aurora News</h1><ul style="line-height:1.9;margin-top:10px;">
          <li>Dark themes continue to dominate UI design</li><li>New web-based OS released — runs entirely in a browser</li>
          <li>Local storage reaches 100% adoption</li></ul>`,
      };
      function nav(u){
        addr.value=u; page.innerHTML=sites[u]||`<h1>404</h1><p class="dim-text">Can't reach <b>${escapeHtml(u)}</b>.</p><p style="margin-top:14px;">Try <a data-url="aurora://home">aurora://home</a></p>`;
        page.querySelectorAll('a[data-url]').forEach(a=>a.onclick=()=>nav(a.dataset.url));
      }
      nav('aurora://home');
      addr.addEventListener('keydown',e=>{ if(e.key==='Enter'){ let u=addr.value.trim(); if(!u.includes('://')&&!u.startsWith('aurora')) u='aurora://'+u.replace(/^\/+/,''); nav(u);} });
      body.querySelector('[data-go="home"]').onclick=()=>nav('aurora://home');
      body.querySelector('[data-go="reload"]').onclick=()=>{ page.style.opacity=.4; setTimeout(()=>{nav(addr.value); page.style.opacity=1;},250); };
      body.querySelector('[data-go="back"]').onclick=()=>toast('No previous page');
      body.querySelector('[data-go="fwd"]').onclick=()=>toast('No next page');
    }
  });
}

/* ============ APP: RECYCLE BIN ============ */
function openRecycle(){
  return createWindow({
    key:'recycle', title:'Recycle Bin', icon:'🗑️', width:460, height:340,
    content:`<div class="app-pad" style="height:100%;display:flex;flex-direction:column;">
      <div class="app-title">Recycle Bin</div>
      <div class="rb-list" style="flex:1;overflow:auto;"></div>
      <div style="display:flex;gap:8px;padding-top:10px;border-top:1px solid var(--border);">
        <button class="tb-app" style="background:var(--danger);color:#fff;border:none;" id="rbEmpty">🗑️ Empty Recycle Bin</button>
        <button class="tb-app" id="rbRestore">♻️ Restore All</button>
      </div></div>`,
    onMount:(body)=>{
      const list=body.querySelector('.rb-list'); const render=()=>{
        list.innerHTML = state.recycle.length
          ? state.recycle.map((n)=>`<div class="fc-item" style="flex-direction:row;justify-content:flex-start;gap:10px;"><span class="ic" style="font-size:22px;">📄</span><span class="lbl" style="color:var(--text)">${escapeHtml(n)}</span></div>`).join('')
          : `<div class="center-empty"><div class="ic">🗑️</div><div>Recycle Bin is empty</div></div>`;
      };
      render();
      body.querySelector('#rbEmpty').onclick=()=>{ state.recycle=[]; saveSettings(); render(); toast('Recycle Bin emptied'); };
      body.querySelector('#rbRestore').onclick=()=>{ if(state.recycle.length){ toast('Restored '+state.recycle.length+' item(s)'); state.recycle=[]; saveSettings(); render(); } else toast('Nothing to restore'); };
    }
  });
}

/* ============ SHUTDOWN ============ */
function shutdown(){
  closeStartMenu(); closeMenus();
  state.windows.forEach(r=>r.el.remove()); state.windows.clear(); renderTaskbar();
  const sd=$('#shutdown'); sd.classList.add('on');
  $('#sdMsg').textContent='Shutting down...';
  $('#sdPower').classList.remove('show');
  setTimeout(()=>{ $('#sdMsg').textContent='It is now safe to power off.'; $('#sdPower').classList.add('show'); }, 1800);
}
function restart(){
  closeStartMenu(); closeMenus();
  const sd=$('#shutdown'); sd.classList.add('on'); $('#sdMsg').textContent='Restarting...';
  setTimeout(()=>{ location.reload(); }, 1600);
}

/* ============ GLOBAL EVENTS ============ */
function bindGlobal(){
  $('#startBtn').onclick=(e)=>{ e.stopPropagation(); $('#startMenu').classList.contains('open')?closeStartMenu():openStartMenu(); };
  $('#smSearch').addEventListener('input', e=>filterStart(e.target.value.toLowerCase()));
  $('#smSearch').addEventListener('keydown', e=>{ if(e.key==='Enter'){ const vis=$('#smList .sm-item:not([style*="none"])')[0]; if(vis) vis.click(); } if(e.key==='Escape') closeStartMenu(); });
  $('#btnShutdown').onclick=shutdown;
  $('#btnRestart').onclick=restart;
  $('#btnLock').onclick=()=>{ closeStartMenu(); toast('Locked (demo)'); };
  $('#sdPower').onclick=()=>{ $('#shutdown').classList.remove('on'); boot(); };

  $('#desktop').addEventListener('contextmenu', e=>{
    if(e.target.closest('.icon')||e.target.closest('.window')) return;
    e.preventDefault(); showDeskMenu(e.clientX,e.clientY);
  });
  $('#desktop').addEventListener('mousedown', e=>{
    if(e.target.id==='desktop'){ $$('.icon.selected').forEach(i=>i.classList.remove('selected')); }
  });

  document.addEventListener('click', e=>{
    if(!e.target.closest('#startMenu') && !e.target.closest('#startBtn')) closeStartMenu();
    if(!e.target.closest('.np-menu')) $$('.np-dd.open').forEach(d=>d.classList.remove('open'));
    if(!e.target.closest('.cmenu')) closeMenus();
  });
  document.addEventListener('keydown', e=>{
    if(e.key==='Escape'){ closeStartMenu(); closeMenus(); }
  });
  window.addEventListener('resize', ()=>{
    state.windows.forEach(r=>{ if(r.maximized){ r.el.style.width=window.innerWidth+'px'; r.el.style.height=(window.innerHeight-48)+'px'; } });
  });
}

boot();
</script>
