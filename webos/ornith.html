<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebOS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',Tahoma,sans-serif;background:#1a1a2e;color:#e0e0e0}

/* BOOT SCREEN */
#boot-screen{position:fixed;inset:0;background:#0f0f1a;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.8s}
#boot-screen.fade-out{opacity:0;pointer-events:none}
#boot-screen .logo{font-size:48px;font-weight:700;color:#6c63ff;margin-bottom:30px;animation:pulse 1.5s infinite}
#boot-screen .loader{width:200px;height:3px;background:#2a2a3e;border-radius:2px;overflow:hidden}
#boot-screen .loader-bar{height:100%;width:0;background:linear-gradient(90deg,#6c63ff,#e942f1);border-radius:2px;transition:width 0.3s}
#boot-screen .status{margin-top:15px;font-size:13px;color:#888}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}

/* DESKTOP */
#desktop{width:100%;height:calc(100% - 48px);position:relative;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);overflow:hidden}
#desktop-icons{display:grid;grid-template-columns:repeat(auto-fill,90px);grid-template-rows:repeat(auto-fill,95px);gap:5px;padding:15px;position:absolute;top:0;left:0}
.desktop-icon{display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border-radius:8px;padding:8px 4px;transition:background 0.15s}
.desktop-icon:hover{background:rgba(255,255,255,0.08)}
.desktop-icon.selected{background:rgba(108,99,255,0.25);outline:1px solid rgba(108,99,255,0.5)}
.desktop-icon .icon{font-size:36px;margin-bottom:4px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3))}
.desktop-icon .label{font-size:11px;text-align:center;color:#ccc;text-shadow:0 1px 3px rgba(0,0,0,0.8);word-wrap:break-word;max-width:80px;line-height:1.2}

/* TASKBAR */
#taskbar{position:fixed;bottom:0;left:0;right:0;height:48px;background:rgba(15,15,25,0.95);backdrop-filter:blur(20px);display:flex;align-items:center;padding:0 8px;z-index:9000;border-top:1px solid rgba(255,255,255,0.06)}
#start-btn{width:40px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;font-size:18px;transition:background 0.15s;background:rgba(108,99,255,0.15)}
#start-btn:hover{background:rgba(108,99,255,0.3)}
#taskbar-apps{flex:1;display:flex;align-items:center;gap:3px;margin-left:8px;height:100%}
.taskbar-app{height:36px;padding:0 12px;display:flex;align-items:center;gap:6px;border-radius:6px;cursor:pointer;font-size:12px;transition:background 0.15s;white-space:nowrap}
.taskbar-app:hover{background:rgba(255,255,255,0.06)}
.taskbar-app.active{background:rgba(108,99,255,0.2);border-bottom:2px solid #6c63ff}
.taskbar-app .t-icon{font-size:14px}
#system-tray{display:flex;align-items:center;gap:12px;padding:0 12px;height:100%;font-size:12px;color:#aaa}
#clock{font-size:12px;color:#ccc}
#tray-icons{display:flex;gap:8px;font-size:14px}

/* START MENU */
#start-menu{position:fixed;bottom:52px;left:8px;width:320px;background:rgba(20,20,35,0.97);backdrop-filter:blur(30px);border-radius:12px;border:1px solid rgba(255,255,255,0.08);z-index:9500;display:none;flex-direction:column;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,0.5)}
#start-menu.show{display:flex}
#start-menu .sm-header{padding:20px 20px 12px;font-size:18px;font-weight:600;border-bottom:1px solid rgba(255,255,255,0.06)}
#start-menu .sm-search{margin:12px 16px;padding:8px 12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:#fff;font-size:13px;outline:none}
#start-menu .sm-search:focus{border-color:rgba(108,99,255,0.5)}
#start-menu .sm-apps{flex:1;overflow-y:auto;padding:8px}
.sm-app-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:background 0.15s}
.sm-app-item:hover{background:rgba(255,255,255,0.06)}
.sm-app-item .sm-icon{font-size:22px;width:32px;text-align:center}
.sm-app-item .sm-name{font-size:13px}
#start-menu .sm-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,0.06);display:flex;justify-content:space-between}
.sm-footer-btn{padding:8px 16px;border-radius:6px;cursor:pointer;font-size:12px;transition:background 0.15s;display:flex;align-items:center;gap:6px}
.sm-footer-btn:hover{background:rgba(255,255,255,0.06)}
.sm-footer-btn.shutdown{color:#ff6b6b}
.sm-footer-btn.shutdown:hover{background:rgba(255,107,107,0.15)}

/* WINDOWS */
.window{position:absolute;background:rgba(22,22,38,0.97);backdrop-filter:blur(20px);border-radius:10px;border:1px solid rgba(255,255,255,0.08);box-shadow:0 8px 32px rgba(0,0,0,0.4);display:flex;flex-direction:column;overflow:hidden;min-width:300px;min-height:200px}
.window.maximized{top:0!important;left:0!important;width:100%!important;height:calc(100vh - 48px)!important;border-radius:0;border:none}
.window.minimized{display:none}
.window.focused{box-shadow:0 12px 48px rgba(0,0,0,0.6);border-color:rgba(108,99,255,0.3)}
.window-titlebar{height:32px;display:flex;align-items:center;padding:0 8px;background:rgba(0,0,0,0.2);cursor:default;flex-shrink:0}
.window-titlebar .wt-icon{font-size:14px;margin-right:8px}
.window-titlebar .wt-title{flex:1;font-size:12px;color:#ccc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.window-titlebar .wt-controls{display:flex;gap:2px}
.wt-btn{width:28px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:4px;cursor:pointer;font-size:10px;color:#888;transition:all 0.15s}
.wt-btn:hover{background:rgba(255,255,255,0.1);color:#fff}
.wt-btn.close-btn:hover{background:#e74c3c;color:#fff}
.window-body{flex:1;overflow:auto;position:relative}
.window .resize-handle{position:absolute;bottom:0;right:0;width:16px;height:16px;cursor:nwse-resize}

/* NOTEPAD */
.notepad-menubar{display:flex;background:rgba(0,0,0,0.3);border-bottom:1px solid rgba(255,255,255,0.06);padding:2px 4px}
.notepad-menu{padding:4px 10px;font-size:12px;cursor:pointer;border-radius:4px;color:#aaa}
.notepad-menu:hover{background:rgba(255,255,255,0.06);color:#fff}
.notepad-menu .dropdown{display:none;position:absolute;top:100%;left:0;background:rgba(25,25,40,0.98);border:1px solid rgba(255,255,255,0.1);border-radius:6px;min-width:160px;padding:4px;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.notepad-menu.open .dropdown{display:block}
.notepad-menu .dropdown-item{padding:6px 12px;font-size:12px;border-radius:4px;cursor:pointer;color:#ccc}
.notepad-menu .dropdown-item:hover{background:rgba(108,99,255,0.2);color:#fff}
.notepad-textarea{width:100%;height:100%;background:transparent;border:none;color:#e0e0e0;font-family:'Consolas','Courier New',monospace;font-size:14px;padding:12px;resize:none;outline:none;line-height:1.6}
.notepad-statusbar{height:22px;background:rgba(0,0,0,0.3);display:flex;align-items:center;padding:0 10px;font-size:11px;color:#666;border-top:1px solid rgba(255,255,255,0.04)}

/* CALCULATOR */
.calc-display{background:rgba(0,0,0,0.3);padding:16px 20px;text-align:right;border-bottom:1px solid rgba(255,255,255,0.06)}
.calc-expr{font-size:13px;color:#888;min-height:18px;word-break:break-all}
.calc-result{font-size:32px;font-weight:300;color:#fff;margin-top:4px;word-break:break-all}
.calc-buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;padding:8px}
.calc-btn{padding:18px;font-size:16px;border:none;border-radius:6px;cursor:pointer;transition:all 0.12s;font-family:inherit}
.calc-btn.num{background:rgba(255,255,255,0.06);color:#fff}
.calc-btn.num:hover{background:rgba(255,255,255,0.12)}
.calc-btn.op{background:rgba(108,99,255,0.15);color:#b8b0ff}
.calc-btn.op:hover{background:rgba(108,99,255,0.25)}
.calc-btn.eq{background:#6c63ff;color:#fff;font-weight:600}
.calc-btn.eq:hover{background:#5a52e0}
.calc-btn.fn{background:rgba(255,255,255,0.03);color:#aaa}
.calc-btn.fn:hover{background:rgba(255,255,255,0.08)}

/* TERMINAL */
.terminal-body{background:#0c0c1a;height:100%;display:flex;flex-direction:column;font-family:'Consolas','Courier New',monospace}
.terminal-output{flex:1;padding:12px;overflow-y:auto;font-size:13px;line-height:1.6;color:#c8c8d0;white-space:pre-wrap;word-break:break-all}
.terminal-input-line{display:flex;align-items:center;padding:8px 12px;border-top:1px solid rgba(255,255,255,0.06);background:rgba(0,0,0,0.2)}
.terminal-prompt{color:#6c63ff;font-size:13px;margin-right:8px;white-space:nowrap}
.terminal-input{flex:1;background:none;border:none;color:#e0e0e0;font-family:inherit;font-size:13px;outline:none}
.terminal-cursor{display:inline-block;width:8px;height:14px;background:#6c63ff;animation:blink 1s step-end infinite;vertical-align:text-bottom}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* BROWSER */
.browser-toolbar{display:flex;align-items:center;gap:6px;padding:6px 10px;background:rgba(0,0,0,0.3);border-bottom:1px solid rgba(255,255,255,0.06)}
.browser-nav-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;font-size:14px;color:#888;transition:background 0.15s}
.browser-nav-btn:hover{background:rgba(255,255,255,0.06)}
.browser-url{flex:1;padding:6px 12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:20px;color:#fff;font-size:12px;outline:none}
.browser-url:focus{border-color:rgba(108,99,255,0.5)}
.browser-content{flex:1;background:#1a1a2e;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.browser-content h2{color:#6c63ff;font-weight:400}
.browser-content p{color:#666;font-size:13px;text-align:center;max-width:400px;line-height:1.6}

/* SETTINGS */
.settings-body{display:flex;height:100%}
.settings-sidebar{width:180px;background:rgba(0,0,0,0.2);border-right:1px solid rgba(255,255,255,0.06);padding:8px}
.settings-sidebar-item{padding:10px 12px;border-radius:6px;cursor:pointer;font-size:13px;color:#aaa;transition:background 0.15s}
.settings-sidebar-item:hover{background:rgba(255,255,255,0.04)}
.settings-sidebar-item.active{background:rgba(108,99,255,0.15);color:#b8b0ff}
.settings-content{flex:1;padding:24px;overflow-y:auto}
.settings-content h3{font-size:18px;font-weight:500;margin-bottom:20px;color:#ddd}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.settings-row label{font-size:13px;color:#aaa}
.toggle{width:40px;height:22px;background:rgba(255,255,255,0.1);border-radius:11px;cursor:pointer;position:relative;transition:background 0.2s}
.toggle.on{background:#6c63ff}
.toggle .knob{width:18px;height:18px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:left 0.2s}
.toggle.on .knob{left:20px}

/* PICTURES */
.pictures-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;padding:12px}
.picture-item{aspect-ratio:1;border-radius:8px;overflow:hidden;cursor:pointer;transition:transform 0.15s;display:flex;align-items:center;justify-content:center;font-size:40px}
.picture-item:hover{transform:scale(1.05)}

/* CONTEXT MENU */
#context-menu{position:fixed;background:rgba(22,22,38,0.97);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);border-radius:8px;min-width:180px;padding:4px;z-index:99999;display:none;box-shadow:0 8px 32px rgba(0,0,0,0.5)}
#context-menu.show{display:block}
.ctx-item{padding:8px 14px;font-size:12px;border-radius:4px;cursor:pointer;color:#ccc;display:flex;align-items:center;gap:10px}
.ctx-item:hover{background:rgba(108,99,255,0.2);color:#fff}
.ctx-separator{height:1px;background:rgba(255,255,255,0.06);margin:4px 8px}
.ctx-header{padding:8px 14px;font-size:11px;color:#666;border-bottom:1px solid rgba(255,255,255,0.06);margin-bottom:4px}

/* MY COMPUTER */
.mycmp-sidebar{width:160px;background:rgba(0,0,0,0.2);border-right:1px solid rgba(255,255,255,0.06);padding:12px}
.mycmp-sidebar-item{padding:8px 10px;border-radius:6px;cursor:pointer;font-size:12px;color:#aaa;display:flex;align-items:center;gap:8px;transition:background 0.15s}
.mycmp-sidebar-item:hover{background:rgba(255,255,255,0.04)}
.mycmp-sidebar-item.active{background:rgba(108,99,255,0.15);color:#b8b0ff}
.mycmp-content{flex:1;padding:16px}
.mycmp-content h3{font-size:14px;color:#888;margin-bottom:16px}
.disk-item{display:flex;align-items:center;gap:12px;padding:14px;background:rgba(255,255,255,0.03);border-radius:8px;margin-bottom:8px}
.disk-icon{font-size:28px}
.disk-info{flex:1}
.disk-name{font-size:13px;color:#ddd;margin-bottom:6px}
.disk-bar{height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
.disk-fill{height:100%;border-radius:2px;transition:width 0.5s}
.disk-space{font-size:11px;color:#666;margin-top:4px}

/* RECYCLE BIN */
.recycle-body{display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:12px;color:#555}
.recycle-body .icon{font-size:64px}
.recycle-body p{font-size:13px}

/* SCROLLBAR */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.2)}

/* SHUTDOWN SCREEN */
#shutdown-screen{position:fixed;inset:0;background:#0f0f1a;z-index:99998;display:none;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.5s}
#shutdown-screen.show{display:flex}
#shutdown-screen .shutdown-text{color:#666;font-size:16px}
#shutdown-screen .shutdown-spinner{width:24px;height:24px;border:2px solid rgba(255,255,255,0.1);border-top-color:#6c63ff;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- BOOT SCREEN -->
<div id="boot-screen">
  <div class="logo">⬡ WebOS</div>
  <div class="loader"><div class="loader-bar" id="loader-bar"></div></div>
  <div class="status" id="boot-status">Initializing system...</div>
</div>

<!-- SHUTDOWN SCREEN -->
<div id="shutdown-screen">
  <div class="shutdown-spinner"></div>
  <div class="shutdown-text">Shutting down...</div>
</div>

<!-- DESKTOP -->
<div id="desktop" style="display:none">
  <div id="desktop-icons"></div>
</div>

<!-- TASKBAR -->
<div id="taskbar" style="display:none">
  <div id="start-btn" onclick="toggleStartMenu()">⬡</div>
  <div id="taskbar-apps"></div>
  <div id="system-tray">
    <div id="tray-icons">
      <span title="WiFi">📶</span>
      <span title="Volume">🔊</span>
      <span title="Battery">🔋</span>
    </div>
    <div id="clock"></div>
  </div>
</div>

<!-- START MENU -->
<div id="start-menu">
  <div class="sm-header">⬡ WebOS</div>
  <input class="sm-search" placeholder="Search apps..." readonly>
  <div class="sm-apps" id="sm-apps"></div>
  <div class="sm-footer">
    <div class="sm-footer-btn" onclick="lockScreen()">🔒 Lock</div>
    <div class="sm-footer-btn shutdown" onclick="shutdownPC()">⏻ Shut Down</div>
  </div>
</div>

<!-- CONTEXT MENU -->
<div id="context-menu">
  <div class="ctx-header">Desktop</div>
  <div class="ctx-item" onclick="ctxAction('refresh')">🔄 Refresh</div>
  <div class="ctx-item" onclick="ctxAction('newfolder')">📁 New Folder</div>
  <div class="ctx-separator"></div>
  <div class="ctx-item" onclick="ctxAction('settings')">⚙️ Display Settings</div>
  <div class="ctx-item" onclick="ctxAction('personalize')">🎨 Personalize</div>
  <div class="ctx-separator"></div>
  <div class="ctx-item" onclick="openApp('terminal')">💻 Open Terminal</div>
  <div class="ctx-item" onclick="ctxAction('about')">ℹ️ About WebOS</div>
</div>

<script>
// ===== CONFIGURATION =====
const APPS = [
  { id:'mycomputer', name:'My Computer', icon:'🖥️' },
  { id:'recyclebin', name:'Recycle Bin', icon:'🗑️' },
  { id:'notepad', name:'Notepad', icon:'📝' },
  { id:'calculator', name:'Calculator', icon:'🔢' },
  { id:'browser', name:'Browser', icon:'🌐' },
  { id:'terminal', name:'Terminal', icon:'💻' },
  { id:'settings', name:'Settings', icon:'⚙️' },
  { id:'pictures', name:'Pictures', icon:'🖼️' }
];

const PICTURES = [
  { name:'Sunset', emoji:'🌅', bg:'linear-gradient(135deg,#ff6b6b,#ffa500)' },
  { name:'Forest', emoji:'🌲', bg:'linear-gradient(135deg,#2d5016,#4a7c23)' },
  { name:'Ocean', emoji:'🌊', bg:'linear-gradient(135deg,#1a5276,#2e86c1)' },
  { name:'Mountain', emoji:'🏔️', bg:'linear-gradient(135deg,#2c3e50,#5d6d7e)' },
  { name:'Galaxy', emoji:'🌌', bg:'linear-gradient(135deg,#1a1a2e,#6c63ff)' },
  { name:'Desert', emoji:'🏜️', bg:'linear-gradient(135deg,#d4a574,#e8c39e)' },
  { name:'Aurora', emoji:'🌈', bg:'linear-gradient(135deg,#0f9b0f,#6c63ff,#e942f1)' },
  { name:'Northern Lights', emoji:'✨', bg:'linear-gradient(135deg,#0a2e0a,#1a5c1a,#6c63ff)' }
];

// ===== STATE =====
let windowId = 0;
let windows = {};
let activeWindowId = null;
let zBase = 100;
let startMenuOpen = false;
let dragState = null;
let resizeState = null;

// ===== BOOT SEQUENCE =====
(function boot() {
  const bar = document.getElementById('loader-bar');
  const status = document.getElementById('boot-status');
  const msgs = [
    'Initializing system...', 'Loading kernel modules...', 'Starting services...',
    'Mounting filesystem...', 'Loading user profile...', 'Starting desktop environment...',
    'Connecting to network...', 'Ready.'
  ];
  let i = 0;
  const interval = setInterval(() => {
    if (i < msgs.length) {
      status.textContent = msgs[i];
      bar.style.width = ((i + 1) / msgs.length * 100) + '%';
      i++;
    } else {
      clearInterval(interval);
      setTimeout(() => {
        document.getElementById('boot-screen').classList.add('fade-out');
        setTimeout(() => {
          document.getElementById('boot-screen').style.display = 'none';
          document.getElementById('desktop').style.display = 'block';
          document.getElementById('taskbar').style.display = 'flex';
          initDesktop();
        }, 800);
      }, 300);
    }
  }, 350);
})();

// ===== DESKTOP INIT =====
function initDesktop() {
  renderDesktopIcons();
  renderStartMenu();
  updateClock();
  setInterval(updateClock, 1000);
  loadNotepadState();
}

function renderDesktopIcons() {
  const container = document.getElementById('desktop-icons');
  container.innerHTML = '';
  APPS.forEach(app => {
    const el = document.createElement('div');
    el.className = 'desktop-icon';
    el.innerHTML = `<div class="icon">${app.icon}</div><div class="label">${app.name}</div>`;
    el.addEventListener('dblclick', () => openApp(app.id));
    el.addEventListener('click', (e) => {
      document.querySelectorAll('.desktop-icon').forEach(d => d.classList.remove('selected'));
      el.classList.add('selected');
      e.stopPropagation();
    });
    container.appendChild(el);
  });
}

function renderStartMenu() {
  const container = document.getElementById('sm-apps');
  container.innerHTML = '';
  APPS.forEach(app => {
    const el = document.createElement('div');
    el.className = 'sm-app-item';
    el.innerHTML = `<div class="sm-icon">${app.icon}</div><div class="sm-name">${app.name}</div>`;
    el.addEventListener('click', () => { openApp(app.id); toggleStartMenu(); });
    container.appendChild(el);
  });
}

function updateClock() {
  const now = new Date();
  const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const date = now.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
  document.getElementById('clock').innerHTML = `<div style="text-align:right"><div>${time}</div><div style="font-size:10px;color:#666">${date}</div></div>`;
}

// ===== START MENU =====
function toggleStartMenu() {
  startMenuOpen = !startMenuOpen;
  document.getElementById('start-menu').classList.toggle('show', startMenuOpen);
}

// ===== CONTEXT MENU =====
document.getElementById('desktop').addEventListener('contextmenu', (e) => {
  e.preventDefault();
  const cm = document.getElementById('context-menu');
  cm.style.left = e.clientX + 'px';
  cm.style.top = e.clientY + 'px';
  cm.classList.add('show');
});

document.addEventListener('click', (e) => {
  document.getElementById('context-menu').classList.remove('show');
  if (startMenuOpen && !e.target.closest('#start-menu') && !e.target.closest('#start-btn')) {
    toggleStartMenu();
  }

// ===== WINDOW MANAGEMENT =====
function createWindow(appId, title, icon, width, height, content) {
  const id = ++windowId;
  const desktop = document.getElementById('desktop');
  const x = 40 + (id % 8) * 30;
  const y = 20 + (id % 6) * 25;

  const win = document.createElement('div');
  win.className = 'window focused';
  win.id = 'win-' + id;
  win.style.cssText = `left:${x}px;top:${y}px;width:${width}px;height:${height}px;z-index:${++zBase}`;

  win.innerHTML = `
    <div class="window-titlebar" data-wid="${id}">
      <span class="wt-icon">${icon}</span>
      <span class="wt-title">${title}</span>
      <div class="wt-controls">
        <div class="wt-btn min-btn" onclick="minimizeWindow(${id})" title="Minimize">─</div>
        <div class="wt-btn max-btn" onclick="maximizeWindow(${id})" title="Maximize">□</div>
        <div class="wt-btn close-btn" onclick="closeWindow(${id})" title="Close">✕</div>
      </div>
    </div>
    <div class="window-body">${content}</div>
    <div class="resize-handle" data-wid="${id}"></div>
  `;

  desktop.appendChild(win);

  windows[id] = { id, appId, title, icon, element: win, minimized: false, maximized: false, prevBounds: null };
  focusWindow(id);
  updateTaskbarApps();
  setupDrag(win, id);
  setupResize(win, id);
  win.addEventListener('mousedown', () => focusWindow(id));

  return id;
}

function focusWindow(id) {
  document.querySelectorAll('.window').forEach(w => w.classList.remove('focused'));
  const win = document.getElementById('win-' + id);
  if (win) {
    win.classList.add('focused');
    win.style.zIndex = ++zBase;
  }
  activeWindowId = id;
  document.querySelectorAll('.taskbar-app').forEach(t => t.classList.remove('active'));
  const tb = document.querySelector(`.taskbar-app[data-wid="${id}"]`);
  if (tb) tb.classList.add('active');
}

function minimizeWindow(id) {
  const w = windows[id];
  if (!w) return;
  w.minimized = true;
  w.element.classList.add('minimized');
  document.querySelector(`.taskbar-app[data-wid="${id}"]`).classList.remove('active');
  if (activeWindowId === id) activeWindowId = null;
}

function maximizeWindow(id) {
  const w = windows[id];
  if (!w) return;
  if (w.maximized) {
    w.maximized = false;
    w.element.classList.remove('maximized');
    if (w.prevBounds) {
      w.element.style.left = w.prevBounds.left;
      w.element.style.top = w.prevBounds.top;
      w.element.style.width = w.prevBounds.width;
      w.element.style.height = w.prevBounds.height;
    }
  } else {
    w.prevBounds = { left: w.element.style.left, top: w.element.style.top, width: w.element.style.width, height: w.element.style.height };
    w.maximized = true;
    w.element.classList.add('maximized');
  }
  focusWindow(id);
}

function closeWindow(id) {
  const w = windows[id];
  if (!w) return;
  w.element.remove();
  delete windows[id];
  const tb = document.querySelector(`.taskbar-app[data-wid="${id}"]`);
  if (tb) tb.remove();
  if (activeWindowId === id) activeWindowId = null;
}

function setupDrag(win, id) {
  const titlebar = win.querySelector('.window-titlebar');
  let startX, startY, origX, origY;

  titlebar.addEventListener('mousedown', (e) => {
    if (e.target.closest('.wt-controls')) return;
    const w = windows[id];
    if (w.maximized) return;
    startX = e.clientX; startY = e.clientY;
    origX = win.offsetLeft; origY = win.offsetTop;
    dragState = { id };
    const onMove = (e) => {
      win.style.left = (origX + e.clientX - startX) + 'px';
      win.style.top = Math.max(0, origY + e.clientY - startY) + 'px';
    };
    const onUp = () => { dragState = null; document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

function setupResize(win, id) {
  const handle = win.querySelector('.resize-handle');
  handle.addEventListener('mousedown', (e) => {
    if (windows[id].maximized) return;
    e.stopPropagation();
    const startX = e.clientX, startY = e.clientY;
    const origW = win.offsetWidth, origH = win.offsetHeight;
    const onMove = (e) => {
      win.style.width = Math.max(300, origW + e.clientX - startX) + 'px';
      win.style.height = Math.max(200, origH + e.clientY - startY) + 'px';
    };
    const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

function updateTaskbarApps() {
  const container = document.getElementById('taskbar-apps');
  container.innerHTML = '';
  Object.values(windows).forEach(w => {
    const el = document.createElement('div');
    el.className = 'taskbar-app' + (activeWindowId === w.id && !w.minimized ? ' active' : '');
    el.dataset.wid = w.id;
    el.innerHTML = `<span class="t-icon">${w.icon}</span>${w.title}`;
    el.addEventListener('click', () => {
      if (w.minimized) {
        w.minimized = false;
        w.element.classList.remove('minimized');
        focusWindow(w.id);
      } else if (activeWindowId === w.id) {
        minimizeWindow(w.id);
      } else {
        focusWindow(w.id);
      }
    });
    container.appendChild(el);
  });
}

let calcState = { display: '0', expression: '', operator: null, prev: null, newInput: true };

function calcAction(action) {
  const resultEl = document.querySelector('.window.focused .calc-result');
  const exprEl = document.querySelector('.window.focused .calc-expr');
  if (!resultEl) return;

  if (action === 'clear') {
    calcState = { display: '0', expression: '', operator: null, prev: null, newInput: true };
  } else if (action === 'backspace') {
    if (calcState.display.length > 1) calcState.display = calcState.display.slice(0, -1);
    else calcState.display = '0';
  } else if (action === '±') {
    if (calcState.display !== '0') {
      calcState.display = calcState.display.startsWith('-') ? calcState.display.slice(1) : '-' + calcState.display;
    }
  } else if (action === '.') {
    if (!calcState.display.includes('.')) calcState.display += '.';
    calcState.newInput = false;
    resultEl.textContent = calcState.display;
    return;
  } else if (['+', '-', '*', '/', '%'].includes(action)) {
    if (calcState.prev !== null && !calcState.newInput) {
      calcState.prev = calculate(calcState.prev, calcState.display, calcState.operator);
      calcState.display = String(calcState.prev);
    } else {
      calcState.prev = parseFloat(calcState.display);
    }
    calcState.operator = action;
    calcState.expression = calcState.display + ' ' + action.replace('*', '×').replace('/', '÷');
    calcState.newInput = true;
  } else if (action === '=') {
    if (calcState.prev !== null && calcState.operator) {
      const result = calculate(calcState.prev, calcState.display, calcState.operator);
      calcState.expression = calcState.prev + ' ' + calcState.operator.replace('*', '×').replace('/', '÷') + ' ' + calcState.display + ' =';
      calcState.display = String(result);
      calcState.prev = null;
      calcState.operator = null;
      calcState.newInput = true;
    }
  } else {
    if (calcState.newInput) {
      calcState.display = action;
      calcState.newInput = false;
    } else {
      if (calcState.display === '0' && action !== '.') {
        calcState.display = action;
      } else {
        calcState.display += action;
      }
    }
  }

  resultEl.textContent = calcState.display;
  if (exprEl) exprEl.textContent = calcState.expression;
}

function calculate(a, b, op) {
  b = parseFloat(b);
  switch (op) {
    case '+': return a + b;
    case '-': return a - b;
    case '*': return a * b;
    case '/': return b !== 0 ? a / b : 'Error';
    case '%': return a % b;
    default: return b;
  }
}

const fileSystem = {
  '~': { type: 'dir', children: { Documents: { type: 'dir', children: { 'readme.txt': { type: 'file', content: 'Welcome to WebOS!' }, 'notes.txt': { type: 'file', content: 'My notes...' } } }, Downloads: { type: 'dir', children: {} }, Pictures: { type: 'dir', children: {} }, '.bashrc': { type: 'file', content: 'alias ll="ls -la"' } } },
  '~/Documents': { type: 'dir', children: { 'readme.txt': { type: 'file', content: 'Welcome to WebOS!' }, 'notes.txt': { type: 'file', content: 'My notes...' } } },
  '~/Downloads': { type: 'dir', children: {} },
  '~/Pictures': { type: 'dir', children: {} }
};

function processCommand(cmd, output) {
  const parts = cmd.split(/\s+/);
  const command = parts[0].toLowerCase();
  const args = parts.slice(1);

  switch (command) {
    case 'help':
      output.textContent += `Available commands:
  help        - Show this help message
  date        - Show current date and time
  echo [text] - Print text to output
  clear       - Clear the terminal
  ls [path]   - List directory contents
  cd [path]   - Change directory
  pwd         - Print working directory
  cat [file]  - Display file contents
  whoami      - Show current user
  uname       - Show system info
  uptime      - Show system uptime
  neofetch    - System information display
  history     - Command history
  exit        - Close terminal
`; break;
    case 'date':
      output.textContent += new Date().toString() + '\n'; break;
    case 'echo':
      output.textContent += args.join(' ') + '\n'; break;
    case 'clear':
      output.textContent = ''; break;
    case 'ls': {
      const path = args[0] ? resolvePath(args[0]) : '~';
      const dir = findDir(path);
      if (dir) {
        const entries = Object.keys(dir.children || {}).map(name => {
          const item = dir.children[name];
          return item.type === 'dir' ? name + '/' : name;
        });
        output.textContent += (entries.length ? entries.join('  ') : '(empty)') + '\n';
      } else {
        output.textContent += `ls: cannot access '${args[0] || path}': No such directory\n`;
      } break;
    }
    case 'cd': {
      if (!args[0] || args[0] === '~') {
        currentDir = '~';
      } else if (args[0] === '..') {
        currentDir = currentDir.split('/').slice(0, -1).join('/') || '~';
      } else {
        const newPath = resolvePath(args[0]);
        if (findDir(newPath)) currentDir = newPath;
        else output.textContent += `cd: ${args[0]}: No such directory\n`;
      } break;
    }
    case 'pwd':
      output.textContent += currentDir + '\n'; break;
    case 'cat': {
      if (!args[0]) { output.textContent += 'cat: missing file operand\n'; break; }
      const filePath = resolvePath(args[0]);
      const dir = findDir(filePath);
      if (dir) { output.textContent += 'Is a directory\n'; break; }
      const file = findFile(filePath);
      if (file) output.textContent += file.content + '\n';
      else output.textContent += `cat: ${args[0]}: No such file\n`; break;
    }
    case 'whoami':
      output.textContent += 'user\n'; break;
    case 'uname':
      output.textContent += 'WebOS 1.0.0 x86_64 WebBrowser/JS\n'; break;
    case 'uptime': {
      const mins = Math.floor((Date.now() - bootTime) / 60000);
      output.textContent += `up ${mins} minutes, 1 user, load average: 0.42, 0.38, 0.35\n`; break;
    }
    case 'neofetch':
      output.textContent += `
       ╭──╮        user@webos
       │  │        ─────────────
       │  │        OS: WebOS 1.0 x86_64
       │  │        Host: ${navigator.userAgent.split(' ').pop()}
       │  │        Kernel: JavaScript ES2022
       │  │        Shell: websh 1.0
       │  │        Resolution: ${window.innerWidth}x${window.innerHeight}
       │  │        Theme: Dark [GTK3]
       │  │        Memory: ${Math.round(performance.memory?.usedJSHeapSize / 1048576 || 128)}MB / 2048MB
       ╰──╯
`; break;
    case 'history':
      output.textContent += '(command history would be displayed here)\n'; break;
    case 'exit':
      const win = document.querySelector(`#win-${id} .window`);
      if (win) {
        const id2 = parseInt(win.id.replace('win-', ''));
        closeWindow(id2);
      } break;
    default:
      output.textContent += `${command}: command not found. Type 'help' for available commands.\n`;
  }
}

let currentDir = '~';
const bootTime = Date.now();

function resolvePath(p) {
  if (p.startsWith('~')) return p;
  if (p.startsWith('/')) return '~' + p;
  if (p.startsWith('./')) return currentDir + '/' + p.slice(2);
  if (p.startsWith('../')) {
    const parts = (currentDir + '/' + p).split('/');
    return parts.filter(s => s !== '' && s !== '.').join('/');
  }
  return currentDir + '/' + p;
}

function findDir(path) {
  const clean = path.replace(/\/+/g, '/').replace(/\/$/, '');
  if (fileSystem[clean]) return fileSystem[clean];
  const parts = clean.split('/');
  let current = fileSystem['~'];
  for (let i = 1; i < parts.length; i++) {
    if (current && current.children && current.children[parts[i]] && current.children[parts[i]].type === 'dir') {
      current = current.children[parts[i]];
    } else return null;
  }
  return current;
}

function findFile(path) {
  const clean = path.replace(/\/+$/, '');
  const parts = clean.split('/');
  const dirPath = parts.slice(0, -1).join('/') || '~';
  const fileName = parts[parts.length - 1];
  const dir = findDir(dirPath);
  if (dir && dir.children && dir.children[fileName] && dir.children[fileName].type === 'file') {
    return dir.children[fileName];
  }
  return null;
}

        <h3>General Settings</h3>
        <div class="settings-row"><label>Dark Mode</label><div class="toggle on" onclick="this.classList.toggle('on')"><div class="knob"></div></div></div>
        <div class="settings-row"><label>Animations</label><div class="toggle on" onclick="this.classList.toggle('on')"><div class="knob"></div></div></div>
        <div class="settings-row"><label>Notifications</label><div class="toggle on" onclick="this.classList.toggle('on')"><div class="knob"></div></div></div>
        <div class="settings-row"><label>Auto-save</label><div class="toggle on" onclick="this.classList.toggle('on')"><div class="knob"></div></div></div>
      </div>
      <div class="settings-content" id="settings-display" style="display:none">
        <h3>Display Settings</h3>
        <div class="settings-row"><label>Resolution</label><span style="color:#888;font-size:13px">${window.innerWidth} × ${window.innerHeight}</span></div>
        <div class="settings-row"><label>Scale</label><span style="color:#888;font-size:13px">100%</span></div>
        <div class="settings-row"><label>Refresh Rate</label><span style="color:#888;font-size:13px">60 Hz</span></div>
      </div>
      <div class="settings-content" id="settings-about" style="display:none">
        <h3>About WebOS</h3>
        <div class="settings-row"><label>Version</label><span style="color:#888;font-size:13px">1.0.0</span></div>
        <div class="settings-row"><label>Build</label><span style="color:#888;font-size:13px">2024.01.01</span></div>
        <div class="settings-row"><label>Engine</label><span style="color:#888;font-size:13px">HTML/CSS/JS</span></div>
        <div class="settings-row"><label>Platform</label><span style="color:#888;font-size:13px">${navigator.platform}</span></div>
        <div class="settings-row"><label>Language</label><span style="color:#888;font-size:13px">${navigator.language}</span></div>
      </div>
    </div>
  `;
  createWindow('settings', 'Settings', '⚙️', 550, 420, content);
}

function switchSettingsTab(el, tab) {
  document.querySelectorAll('.settings-sidebar-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.settings-content').forEach(c => c.style.display = 'none');
  document.getElementById('settings-' + tab).style.display = 'block';
}

// ===== RECYCLE BIN =====
function openRecycleBin() {
  const content = `<div class="recycle-body"><div class="icon">🗑️</div><p>Recycle Bin is empty</p><div style="font-size:12px;color:#444">Deleted items appear here</div></div>`;

// ===== PICTURES =====
function openPictures() {
  let grid = '<div class="pictures-grid">';
  PICTURES.forEach(p => {
    grid += `<div class="picture-item" style="background:${p.bg}" title="${p.name}">${p.emoji}</div>`;
  });
  grid += '</div>';
  createWindow('pictures', 'Pictures', '🖼️', 550, 400, grid);
}

// ===== SHUTDOWN =====
function shutdownPC() {
  if (startMenuOpen) toggleStartMenu();
  const screen = document.getElementById('shutdown-screen');
  screen.classList.add('show');
  setTimeout(() => {
    document.body.innerHTML = '<div style="position:fixed;inset:0;background:#0f0f1a;display:flex;align-items:center;justify-content:center;color:#333;font-size:14px">System halted. Refresh to restart.</div>';
  }, 2500);
}

function lockScreen() {
  if (startMenuOpen) toggleStartMenu();
  const overlay = document.createElement('div');
  overlay.id = 'lock-screen';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(15,15,26,0.95);backdrop-filter:blur(20px);z-index:99997;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:opacity 0.3s';
  overlay.innerHTML = '<div style="font-size:48px;margin-bottom:16px">🔒</div><div style="color:#666;font-size:14px">Click anywhere to unlock</div>';
  overlay.addEventListener('click', () => { overlay.style.opacity = '0'; setTimeout(() => overlay.remove(), 300); });
  document.body.appendChild(overlay);
}

// ===== KEYBOARD SHORTCUTS =====
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && startMenuOpen) toggleStartMenu();
});
</script>
