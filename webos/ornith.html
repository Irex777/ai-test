<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebOS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;overflow:hidden;height:100vh;width:100vw;background:#1a1a2e;color:#e0e0e0}

/* Boot Screen */
#boot-screen{position:fixed;inset:0;background:#0f0f23;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;transition:opacity 0.8s}
#boot-screen.hidden{opacity:0;pointer-events:none}
.boot-logo{font-size:48px;color:#64ffda;animation:pulse 1.5s ease-in-out infinite;margin-bottom:30px}
.boot-spinner{width:40px;height:40px;border:3px solid #1a1a2e;border-top:3px solid #64ffda;border-radius:50%;animation:spin 1s linear infinite}
.boot-text{margin-top:20px;color:#666;font-size:14px;letter-spacing:2px}
@keyframes pulse{0%,100%{opacity:0.5}50%{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}

/* Desktop */
#desktop{width:100%;height:calc(100vh - 48px);position:relative;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);overflow:hidden}
#desktop-icons{display:grid;grid-template-columns:repeat(auto-fill,90px);grid-auto-rows:90px;gap:10px;padding:20px;position:absolute;top:0;left:0;width:100%}
.desktop-icon{display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border-radius:8px;padding:8px 4px;transition:background 0.2s;text-align:center}
.desktop-icon:hover{background:rgba(255,255,255,0.1)}
.desktop-icon:active{background:rgba(255,255,255,0.15)}
.desktop-icon .icon{font-size:32px;margin-bottom:4px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3))}
.desktop-icon .label{font-size:11px;color:#ccc;text-shadow:0 1px 3px rgba(0,0,0,0.8);word-break:break-word;line-height:1.2}

/* Taskbar */
#taskbar{position:fixed;bottom:0;left:0;right:0;height:48px;background:rgba(15,15,35,0.95);backdrop-filter:blur(20px);display:flex;align-items:center;z-index:9990;border-top:1px solid rgba(255,255,255,0.08)}
#start-btn{width:48px;height:48px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;background:rgba(100,255,218,0.1);transition:background 0.2s;border:none;color:#64ffda}
#start-btn:hover{background:rgba(100,255,218,0.2)}
#taskbar-apps{flex:1;display:flex;align-items:center;height:100%;padding:0 4px;gap:2px;overflow-x:auto}
.taskbar-app{height:40px;min-width:44px;padding:0 12px;display:flex;align-items:center;gap:6px;cursor:pointer;border-radius:4px;font-size:12px;transition:background 0.2s;border:none;background:transparent;color:#ccc;white-space:nowrap}
.taskbar-app:hover{background:rgba(255,255,255,0.08)}
.taskbar-app.active{background:rgba(100,255,218,0.15);color:#64ffda}
.taskbar-app.minimized{opacity:0.6}
.taskbar-app .app-icon{font-size:14px}
#system-tray{display:flex;align-items:center;gap:16px;padding:0 16px;height:100%;font-size:12px;color:#aaa}
#clock{font-size:12px;color:#ccc;cursor:default}

/* Start Menu */
#start-menu{position:fixed;bottom:48px;left:0;width:320px;max-height:calc(100vh - 48px);background:rgba(15,15,35,0.97);backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,0.08);border-radius:8px 8px 0 0;z-index:9991;display:none;flex-direction:column;overflow:hidden;box-shadow:0 -8px 32px rgba(0,0,0,0.5)}
#start-menu.visible{display:flex}
#start-menu-header{padding:20px;border-bottom:1px solid rgba(255,255,255,0.06)}
#start-menu-header h2{font-size:18px;color:#64ffda;font-weight:500}
#start-menu-header p{font-size:11px;color:#666;margin-top:4px}
#start-menu-apps{flex:1;overflow-y:auto;padding:8px}
.start-menu-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:6px;cursor:pointer;transition:background 0.15s;font-size:13px;color:#ccc;border:none;background:transparent;width:100%;text-align:left}
.start-menu-item:hover{background:rgba(255,255,255,0.08)}
.start-menu-item .item-icon{font-size:18px;width:28px;text-align:center}
#start-menu-footer{padding:12px;border-top:1px solid rgba(255,255,255,0.06);display:flex;justify-content:flex-end;gap:8px}
.shutdown-btn{padding:8px 16px;background:rgba(255,80,80,0.15);color:#ff6b6b;border:1px solid rgba(255,80,80,0.2);border-radius:6px;cursor:pointer;font-size:12px;transition:all 0.2s}
.shutdown-btn:hover{background:rgba(255,80,80,0.3)}

/* Windows */
.window{position:absolute;min-width:300px;min-height:200px;background:rgba(20,20,45,0.96);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,0.4);display:flex;flex-direction:column;overflow:hidden;transition:box-shadow 0.2s}
.window.focused{box-shadow:0 12px 48px rgba(0,0,0,0.6);border-color:rgba(100,255,218,0.15)}
.window.minimized{display:none}
.window.maximized{top:0!important;left:0!important;width:100%!important;height:calc(100vh - 48px)!important;border-radius:0;border:none}
.window-header{height:36px;background:rgba(0,0,0,0.3);display:flex;align-items:center;padding:0 12px;cursor:default;flex-shrink:0}
.window-title{flex:1;font-size:12px;color:#ccc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.window-controls{display:flex;gap:8px;margin-left:8px}
.window-controls button{width:28px;height:28px;border:none;background:transparent;color:#888;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all 0.15s}
.window-controls button:hover{background:rgba(255,255,255,0.1);color:#fff}
.window-controls .close-btn:hover{background:#e53935;color:#fff}
.window-body{flex:1;overflow:auto;position:relative}
.window-resize{position:absolute;bottom:0;right:0;width:16px;height:16px;cursor:nwse-resize}
.window-resize::after{content:'';position:absolute;bottom:3px;right:3px;width:8px;height:8px;border-right:2px solid rgba(255,255,255,0.2);border-bottom:2px solid rgba(255,255,255,0.2)}

/* Notepad */
.notepad-menu{display:flex;gap:0;background:rgba(0,0,0,0.2);border-bottom:1px solid rgba(255,255,255,0.06);padding:0 8px}
.notepad-menu-item{padding:6px 12px;font-size:12px;color:#999;cursor:pointer;border-radius:4px;transition:all 0.15s}
.notepad-menu-item:hover{background:rgba(255,255,255,0.08);color:#ccc}
.notepad-textarea{width:100%;height:100%;background:transparent;border:none;color:#e0e0e0;font-family:'Consolas','Courier New',monospace;font-size:14px;padding:12px;resize:none;outline:none;user-select:text}
.notepad-dropdown{position:absolute;top:100%;left:0;background:rgba(25,25,50,0.98);border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:4px;min-width:160px;z-index:100;display:none}
.notepad-dropdown.visible{display:block}
.notepad-dropdown-item{padding:6px 12px;font-size:12px;color:#ccc;cursor:pointer;border-radius:3px;border:none;background:transparent;width:100%;text-align:left}
.notepad-dropdown-item:hover{background:rgba(100,255,218,0.15);color:#64ffda}
.notepad-status{padding:4px 12px;font-size:11px;color:#666;background:rgba(0,0,0,0.2);border-top:1px solid rgba(255,255,255,0.04)}

/* Calculator */
.calc-display{background:rgba(0,0,0,0.3);padding:16px 20px;text-align:right;border-bottom:1px solid rgba(255,255,255,0.04)}
.calc-expression{font-size:12px;color:#666;min-height:16px}
.calc-result{font-size:28px;color:#64ffda;font-weight:300;margin-top:4px}
.calc-buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;padding:8px;height:calc(100% - 80px)}
.calc-btn{border:none;border-radius:6px;font-size:16px;cursor:pointer;transition:all 0.15s;color:#e0e0e0;background:rgba(255,255,255,0.04)}
.calc-btn:hover{background:rgba(255,255,255,0.1)}
.calc-btn:active{background:rgba(255,255,255,0.15)}
.calc-btn.operator{color:#64ffda;background:rgba(100,255,218,0.08)}
.calc-btn.operator:hover{background:rgba(100,255,218,0.15)}
.calc-btn.equals{background:rgba(100,255,218,0.2);color:#64ffda;font-weight:600}
.calc-btn.equals:hover{background:rgba(100,255,218,0.35)}
.calc-btn.clear{color:#ff6b6b}

/* Terminal */
.terminal-body{background:rgba(0,0,0,0.4);height:100%;display:flex;flex-direction:column;font-family:'Consolas','Courier New',monospace}
.terminal-output{flex:1;padding:12px;overflow-y:auto;font-size:13px;line-height:1.6;color:#ccc;white-space:pre-wrap;word-break:break-all}
.terminal-input-line{display:flex;align-items:center;padding:8px 12px;border-top:1px solid rgba(255,255,255,0.04);background:rgba(0,0,0,0.2)}
.terminal-prompt{color:#64ffda;font-size:13px;margin-right:8px;white-space:nowrap}
.terminal-input{flex:1;background:transparent;border:none;color:#e0e0e0;font-family:inherit;font-size:13px;outline:none;user-select:text}

/* Browser */
.browser-toolbar{display:flex;align-items:center;gap:8px;padding:8px;background:rgba(0,0,0,0.2);border-bottom:1px solid rgba(255,255,255,0.04)}
.browser-nav-btn{width:28px;height:28px;border:none;background:rgba(255,255,255,0.06);color:#999;border-radius:4px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
.browser-nav-btn:hover{background:rgba(255,255,255,0.12);color:#ccc}
.browser-url{flex:1;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:6px 14px;color:#ccc;font-size:12px;outline:none}
.browser-url:focus{border-color:rgba(100,255,218,0.3)}
.browser-content{flex:1;background:#fff;display:flex;align-items:center;justify-content:center;color:#333;font-size:14px;padding:20px}

/* Settings */
.settings-body{padding:20px}
.settings-section{margin-bottom:24px}
.settings-section h3{font-size:14px;color:#64ffda;margin-bottom:12px;font-weight:500}
.settings-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.settings-item label{font-size:13px;color:#ccc}
.settings-toggle{width:40px;height:22px;background:rgba(255,255,255,0.1);border-radius:11px;cursor:pointer;position:relative;border:none;transition:background 0.2s}
.settings-toggle.on{background:rgba(100,255,218,0.3)}
.settings-toggle::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;background:#888;border-radius:50%;transition:all 0.2s}
.settings-toggle.on::after{left:20px;background:#64ffda}
.settings-select{background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);color:#ccc;padding:4px 8px;border-radius:4px;font-size:12px}

/* My Computer / File Explorer */
.explorer-body{display:flex;height:100%}
.explorer-sidebar{width:180px;background:rgba(0,0,0,0.2);border-right:1px solid rgba(255,255,255,0.04);padding:8px;overflow-y:auto}
.explorer-sidebar-item{padding:8px 10px;font-size:12px;color:#999;cursor:pointer;border-radius:4px;display:flex;align-items:center;gap:8px;transition:all 0.15s}
.explorer-sidebar-item:hover{background:rgba(255,255,255,0.06);color:#ccc}
.explorer-sidebar-item.active{background:rgba(100,255,218,0.1);color:#64ffda}
.explorer-main{flex:1;padding:12px;overflow-y:auto}
.explorer-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px}
.explorer-item{display:flex;flex-direction:column;align-items:center;padding:10px 4px;border-radius:6px;cursor:pointer;transition:background 0.15s;text-align:center}
.explorer-item:hover{background:rgba(255,255,255,0.06)}
.explorer-item .ei-icon{font-size:28px;margin-bottom:4px}
.explorer-item .ei-name{font-size:11px;color:#ccc;word-break:break-word}

/* Recycle Bin */
.recycle-body{display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;color:#666}
.recycle-body .rb-icon{font-size:64px;margin-bottom:16px;opacity:0.5}
.recycle-body p{font-size:14px}

/* Pictures */
.pictures-body{padding:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;overflow-y:auto}
.picture-item{aspect-ratio:1;background:rgba(0,0,0,0.3);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:36px;cursor:pointer;transition:transform 0.2s;border:2px solid transparent}
.picture-item:hover{transform:scale(1.05);border-color:rgba(100,255,218,0.2)}

/* Context Menu */
#context-menu{position:fixed;background:rgba(20,20,45,0.98);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:4px;min-width:200px;z-index:99999;display:none;box-shadow:0 8px 32px rgba(0,0,0,0.5)}
#context-menu.visible{display:block}
.ctx-item{padding:8px 14px;font-size:12px;color:#ccc;cursor:pointer;border-radius:4px;display:flex;align-items:center;gap:10px;border:none;background:transparent;width:100%;text-align:left}
.ctx-item:hover{background:rgba(100,255,218,0.12);color:#64ffda}
.ctx-separator{height:1px;background:rgba(255,255,255,0.06);margin:4px 8px}

/* Shutdown screen */
#shutdown-screen{position:fixed;inset:0;background:#0f0f23;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:99998;transition:opacity 1s}
#shutdown-screen.visible{display:flex}
.shutdown-text{font-size:24px;color:#64ffda;margin-bottom:20px}
.shutdown-spinner{width:30px;height:30px;border:2px solid #1a1a2e;border-top:2px solid #64ffda;border-radius:50%;animation:spin 1s linear infinite}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.2)}

/* Notification */
.notification{position:fixed;top:20px;right:20px;background:rgba(20,20,45,0.95);border:1px solid rgba(100,255,218,0.2);border-radius:8px;padding:12px 16px;font-size:12px;color:#ccc;z-index:99999;animation:slideIn 0.3s ease;box-shadow:0 4px 16px rgba(0,0,0,0.4)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
</style>
</head>
<body>

<!-- Boot Screen -->
<div id="boot-screen">
  <div class="boot-logo">⬡ WebOS</div>
  <div class="boot-spinner"></div>
  <div class="boot-text">INITIALIZING SYSTEM</div>
</div>

<!-- Desktop -->
<div id="desktop">
  <div id="desktop-icons"></div>
</div>

<!-- Taskbar -->
<div id="taskbar">
  <button id="start-btn" title="Start">⬡</button>
  <div id="taskbar-apps"></div>
  <div id="system-tray">
    <span id="clock"></span>
  </div>
</div>

<!-- Start Menu -->
<div id="start-menu">
  <div id="start-menu-header">
    <h2>⬡ WebOS</h2>
    <p>Welcome back, User</p>
  </div>
  <div id="start-menu-apps"></div>
  <div id="start-menu-footer">
    <button class="shutdown-btn" onclick="shutdown()">⏻ Shut Down</button>
  </div>
</div>

<!-- Context Menu -->
<div id="context-menu"></div>

<!-- Shutdown Screen -->
<div id="shutdown-screen">
  <div class="shutdown-text">Shutting down...</div>
  <div class="boot-spinner"></div>
</div>

<script>
// ===== APP DEFINITIONS =====
const apps = [
  {id:'mycomputer',name:'My Computer',icon:'💻',type:'explorer'},
  {id:'recyclebin',name:'Recycle Bin',icon:'🗑️',type:'recycle'},
  {id:'notepad',name:'Notepad',icon:'📝',type:'notepad'},
  {id:'calculator',name:'Calculator',icon:'🔢',type:'calculator'},
  {id:'browser',name:'Browser',icon:'🌐',type:'browser'},
  {id:'terminal',name:'Terminal',icon:'⬛',type:'terminal'},
  {id:'settings',name:'Settings',icon:'⚙️',type:'settings'},
  {id:'pictures',name:'Pictures',icon:'🖼️',type:'pictures'}
];

let windowZIndex = 100;
let openWindows = {};
let activeWindowId = null;
let startMenuOpen = false;

// ===== BOOT SEQUENCE =====
setTimeout(()=>{
  document.getElementById('boot-screen').classList.add('hidden');
  setTimeout(()=>document.getElementById('boot-screen').remove(),800);
},2500);

// ===== CLOCK =====
function updateClock(){
  const now=new Date();
  const time=now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const date=now.toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'});
  document.getElementById('clock').innerHTML=`<span style="display:flex;flex-direction:column;align-items:flex-end;line-height:1.4"><span>${time}</span><span style="font-size:10px;color:#666">${date}</span></span>`;
}
updateClock();setInterval(updateClock,1000);

// ===== DESKTOP ICONS =====
const desktopIcons=document.getElementById('desktop-icons');
apps.forEach(app=>{
  const el=document.createElement('div');
  el.className='desktop-icon';
  el.draggable=true;
  el.innerHTML=`<span class="icon">${app.icon}</span><span class="label">${app.name}</span>`;
  el.addEventListener('dblclick',()=>openApp(app.id));
  desktopIcons.appendChild(el);
});

// ===== START MENU =====
const startMenuApps=document.getElementById('start-menu-apps');
apps.forEach(app=>{
  const el=document.createElement('button');
  el.className='start-menu-item';
  el.innerHTML=`<span class="item-icon">${app.icon}</span><span>${app.name}</span>`;
  el.addEventListener('click',()=>{openApp(app.id);toggleStartMenu(false);});
  startMenuApps.appendChild(el);
});

// ===== START MENU TOGGLE =====
function toggleStartMenu(force){
  startMenuOpen=force!==undefined?force:!startMenuOpen;
  document.getElementById('start-menu').classList.toggle('visible',startMenuOpen);
}
document.getElementById('start-btn').addEventListener('click',e=>{e.stopPropagation();toggleStartMenu();});
document.addEventListener('click',e=>{
  if(startMenuOpen&&!e.target.closest('#start-menu')&&!e.target.closest('#start-btn'))toggleStartMenu(false);
});

// ===== CONTEXT MENU =====
const ctxMenu=document.getElementById('context-menu');
document.getElementById('desktop').addEventListener('contextmenu',e=>{
  e.preventDefault();
  if(e.target.closest('.window'))return;
  ctxMenu.innerHTML=`
    <button class="ctx-item" onclick="openApp('notepad');hideCtx();">📝 New Text File</button>
    <button class="ctx-item" onclick="openApp('terminal');hideCtx();">⬛ Open Terminal</button>
    <div class="ctx-separator"></div>
    <button class="ctx-item" onclick="location.reload();hideCtx();">🔄 Refresh Desktop</button>
    <button class="ctx-item" onclick="openApp('settings');hideCtx();">⚙️ Display Settings</button>
    <div class="ctx-separator"></div>
    <button class="ctx-item" onclick="hideCtx();">ℹ️ About WebOS v1.0</button>
  `;
  ctxMenu.style.left=e.clientX+'px';
  ctxMenu.style.top=e.clientY+'px';
  ctxMenu.classList.add('visible');
});
function hideCtx(){ctxMenu.classList.remove('visible');}
document.addEventListener('click',e=>{if(!e.target.closest('#context-menu'))hideCtx();});

// ===== WINDOW MANAGEMENT =====
function openApp(appId){
  if(openWindows[appId]&&!openWindows[appId].minimized)return;
  
  const app=apps.find(a=>a.id===appId);
  if(!app)return;
  
  const w=800,h=550;
  const x=Math.max(50,Math.random()*(window.innerWidth-w-100)+50);
  const y=Math.max(30,Math.random()*(window.innerHeight-h-150)+30);
  
  const win=document.createElement('div');
  win.className='window focused';
  win.id='win-'+appId;
  win.style.cssText=`left:${x}px;top:${y}px;width:${w}px;height:${h}px;z-index:${++windowZIndex}`;
  
  win.innerHTML=`
    <div class="window-header" data-app="${appId}">
      <span class="window-title">${app.icon} ${app.name}</span>
      <div class="window-controls">
        <button class="min-btn" title="Minimize">─</button>
        <button class="max-btn" title="Maximize">□</button>
        <button class="close-btn" title="Close">✕</button>
      </div>
    </div>
    <div class="window-body" id="body-${appId}"></div>
    <div class="window-resize"></div>
  `;
  
  document.getElementById('desktop').appendChild(win);
  
  openWindows[appId]={element:win,minimized:false,maximized:false};
  focusWindow(appId);
  updateTaskbar();
  
  // Build app content
  buildAppContent(appId,app);
  
  // Drag
  initDrag(win,appId);
  // Resize
  initResize(win);
  // Controls
  win.querySelector('.min-btn').addEventListener('click',()=>minimizeWindow(appId));
  win.querySelector('.max-btn').addEventListener('click',()=>maximizeWindow(appId));
  win.querySelector('.close-btn').addEventListener('click',()=>closeWindow(appId));
  win.addEventListener('mousedown',()=>focusWindow(appId));
}

function focusWindow(appId){
  Object.keys(openWindows).forEach(id=>{
    openWindows[id].element.classList.remove('focused');
  });
  if(openWindows[appId]){
    openWindows[appId].element.style.zIndex=++windowZIndex;
    openWindows[appId].element.classList.add('focused');
    activeWindowId=appId;
  }
  updateTaskbar();
}

function minimizeWindow(appId){
  if(!openWindows[appId])return;
  openWindows[appId].minimized=true;
  openWindows[appId].element.classList.add('minimized');
  if(activeWindowId===appId)activeWindowId=null;
  updateTaskbar();
}

function maximizeWindow(appId){
  if(!openWindows[appId])return;
  openWindows[appId].maximized=!openWindows[appId].maximized;
  openWindows[appId].element.classList.toggle('maximized',openWindows[appId].maximized);
}

function closeWindow(appId){
  if(!openWindows[appId])return;
  openWindows[appId].element.remove();
  delete openWindows[appId];
  if(activeWindowId===appId)activeWindowId=null;
  updateTaskbar();
}

// ===== TASKBAR UPDATE =====
function updateTaskbar(){
  const container=document.getElementById('taskbar-apps');
  container.innerHTML='';
  apps.forEach(app=>{
    if(!openWindows[app.id])return;
    const btn=document.createElement('button');
    btn.className='taskbar-app';
    if(app.id===activeWindowId&&!openWindows[app.id].minimized)btn.classList.add('active');
    if(openWindows[app.id].minimized)btn.classList.add('minimized');
    btn.innerHTML=`<span class="app-icon">${app.icon}</span><span>${app.name}</span>`;
    btn.addEventListener('click',()=>{
      const w=openWindows[app.id];
      if(w.minimized){w.minimized=false;w.element.classList.remove('minimized');focusWindow(app.id);}
      else if(app.id===activeWindowId){minimizeWindow(app.id);}
      else{focusWindow(app.id);}
    });
    container.appendChild(btn);
  });
}

// ===== DRAG =====
function initDrag(win,appId){
  const header=win.querySelector('.window-header');
  let dragging=false,startX,startY,origX,origY;
  
  header.addEventListener('mousedown',e=>{
    if(e.target.closest('.window-controls'))return;
    if(openWindows[appId].maximized)return;
    dragging=true;
    startX=e.clientX;startY=e.clientY;
    origX=win.offsetLeft;origY=win.offsetTop;
    e.preventDefault();
  });
  
  document.addEventListener('mousemove',e=>{
    if(!dragging)return;
    win.style.left=(origX+e.clientX-startX)+'px';
    win.style.top=Math.max(0,origY+e.clientY-startY)+'px';
  });
  
  document.addEventListener('mouseup',()=>{dragging=false;});
}

// ===== RESIZE =====
function initResize(win){
  const handle=win.querySelector('.window-resize');
  let resizing=false,startX,startY,origW,origH;
  
  handle.addEventListener('mousedown',e=>{
    if(openWindows[win.id.replace('win-','')].maximized)return;
    resizing=true;
    startX=e.clientX;startY=e.clientY;
    origW=win.offsetWidth;origH=win.offsetHeight;
    e.preventDefault();e.stopPropagation();
  });
  
  document.addEventListener('mousemove',e=>{
    if(!resizing)return;
    const nw=Math.max(300,origW+e.clientX-startX);
    const nh=Math.max(200,origH+e.clientY-startY);
    win.style.width=nw+'px';
    win.style.height=nh+'px';
  });
  
  document.addEventListener('mouseup',()=>{resizing=false;});
}

// ===== BUILD APP CONTENT =====
function buildAppContent(appId,app){
  const body=document.getElementById('body-'+appId);
  
  switch(app.type){
    case 'notepad':buildNotepad(body,appId);break;
    case 'calculator':buildCalculator(body);break;
    case 'terminal':buildTerminal(body,appId);break;
    case 'browser':buildBrowser(body);break;
    case 'settings':buildSettings(body);break;
    case 'explorer':buildExplorer(body,appId);break;
    case 'recycle':buildRecycle(body);break;
    case 'pictures':buildPictures(body);break;
  }
}

// ===== NOTEPAD =====
function buildNotepad(body,appId){
  body.innerHTML=`
    <div style="height:100%;display:flex;flex-direction:column;">
      <div class="notepad-menu" style="position:relative;">
        <div class="notepad-menu-item" data-menu="file">File</div>
        <div class="notepad-dropdown" id="notepad-dropdown-${appId}">
          <button class="notepad-dropdown-item" onclick="notepadNew('${appId}')">📄 New</button>
          <button class="notepad-dropdown-item" onclick="notepadSave('${appId}')">💾 Save</button>
          <button class="notepad-dropdown-item" onclick="notepadLoad('${appId}')">📂 Open</button>
        </div>
      </div>
      <textarea class="notepad-textarea" id="notepad-text-${appId}" placeholder="Start typing...">Welcome to WebOS Notepad!</textarea>
      <div class="notepad-status" id="notepad-status-${appId}">Line 1, Col 1 | Unsaved</div>
    </div>
  `;
  
  const textarea=document.getElementById('notepad-text-'+appId);
  const status=document.getElementById('notepad-status-'+appId);
  
  textarea.addEventListener('input',()=>{
    status.textContent='Modified | Unsaved';
  });
  textarea.addEventListener('click',()=>{
    const pos=textarea.selectionStart;
    const line=textarea.value.substring(0,pos).split('\n').length;
    const col=pos-textarea.value.lastIndexOf('\n',pos-1)+1;
    status.textContent=`Line ${line}, Col ${col} | ${textarea.value.length} chars`;
  });
  
  body.querySelector('.notepad-menu-item').addEventListener('click',e=>{
    e.stopPropagation();
    const dd=document.getElementById('notepad-dropdown-'+appId);
    dd.classList.toggle('visible');
  });
  document.addEventListener('click',()=>{
    const dd=document.getElementById('notepad-dropdown-'+appId);
    if(dd)dd.classList.remove('visible');
  });
}

function notepadNew(appId){
  const ta=document.getElementById('notepad-text-'+appId);
  ta.value='';
  ta.dispatchEvent(new Event('input'));
}

function notepadSave(appId){
  const ta=document.getElementById('notepad-text-'+appId);
  localStorage.setItem('notepad-content',ta.value);
  const status=document.getElementById('notepad-status-'+appId);
  status.textContent='Saved ✓';
  showNotification('File saved to local storage');
}

function notepadLoad(appId){
  const content=localStorage.getItem('notepad-content');
  if(content!==null){
    const ta=document.getElementById('notepad-text-'+appId);
    ta.value=content;
    ta.dispatchEvent(new Event('input'));
    showNotification('File loaded from local storage');
  }else{
    showNotification('No saved file found');
  }
}

// ===== CALCULATOR =====
function buildCalculator(body){
  let expr='',display='0',lastOp=null;
  
  function render(){
    const calcBody=body.querySelector('.calc-body');
    calcBody.innerHTML=`
      <div class="calc-display">
        <div class="calc-expression">${expr||''}</div>
        <div class="calc-result">${display}</div>
      </div>
      <div class="calc-buttons">
        <button class="calc-btn clear" data-v="C">C</button>
        <button class="calc-btn operator" data-v="±">±</button>
        <button class="calc-btn operator" data-v="%">%</button>
        <button class="calc-btn operator" data-v="÷">÷</button>
        <button class="calc-btn" data-v="7">7</button>
        <button class="calc-btn" data-v="8">8</button>
        <button class="calc-btn" data-v="9">9</button>
        <button class="calc-btn operator" data-v="×">×</button>
        <button class="calc-btn" data-v="4">4</button>
        <button class="calc-btn" data-v="5">5</button>
        <button class="calc-btn" data-v="6">6</button>
        <button class="calc-btn operator" data-v="-">−</button>
        <button class="calc-btn" data-v="1">1</button>
        <button class="calc-btn" data-v="2">2</button>
        <button class="calc-btn" data-v="3">3</button>
        <button class="calc-btn operator" data-v="+">+</button>
        <button class="calc-btn" data-v="±">±</button>
        <button class="calc-btn" data-v="0">0</button>
        <button class="calc-btn" data-v=".">.</button>
        <button class="calc-btn equals" data-v="=">=</button>
      </div>
    `;
    
    calcBody.querySelectorAll('.calc-btn').forEach(btn=>{
      btn.addEventListener('click',()=>handleCalc(btn.dataset.v));
    });
  }
  
  function handleCalc(v){
    if(v==='C'){display='0';expr='';lastOp=null;render();return;}
    if(v==='='){
      try{
        let evalExpr=expr+display;
        evalExpr=evalExpr.replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-');
        let result=Function('"use strict";return ('+evalExpr+')')();
        expr=display+' =';
        display=String(Math.round(result*1e10)/1e10);
      }catch(e){display='Error';}
      render();return;
    }
    if(['+','-','×','÷'].includes(v)){
      expr+=(display)+' '+v+' ';
      lastOp=v;
      display='0';
      render();return;
    }
    if(v==='±'){
      if(display!=='0'){
        display=display.startsWith('-')?display.slice(1):'-'+display;
      }
      render();return;
    }
    if(v==='%'){
      display=String(parseFloat(display)/100);
      render();return;
    }
    if(v==='.'){
      if(!display.includes('.'))display+='.';
      render();return;
    }
    if(display==='0'&&v!=='.'){display=v;}
    else{display+=v;}
    render();
  }
  
  body.innerHTML='<div class="calc-body" style="height:100%;display:flex;flex-direction:column;"></div>';
  render();
}

// ===== TERMINAL =====
function buildTerminal(body,appId){
  body.innerHTML=`
    <div class="terminal-body">
      <div class="terminal-output" id="term-out-${appId}">WebOS Terminal v1.0\nType 'help' for available commands.\n\n</div>
      <div class="terminal-input-line">
        <span class="terminal-prompt">user@webos:~$</span>
        <input class="terminal-input" id="term-in-${appId}" type="text" autofocus spellcheck="false">
      </div>
    </div>
  `;
  
  const output=document.getElementById('term-out-'+appId);
  const input=document.getElementById('term-in-'+appId);
  const history=[];
  let histIdx=-1;
  
  function print(text){output.textContent+=text+'\n';output.scrollTop=output.scrollHeight;}
  
  input.addEventListener('keydown',e=>{
    if(e.key==='Enter'){
      const cmd=input.value.trim();
      if(cmd){history.unshift(cmd);histIdx=-1;}
      print('user@webos:~$ '+cmd);
      processCommand(cmd,output);
      input.value='';
    }else if(e.key==='ArrowUp'){
      e.preventDefault();
      if(histIdx<history.length-1){histIdx++;input.value=history[histIdx];}
    }else if(e.key==='ArrowDown'){
      e.preventDefault();
      if(histIdx>0){histIdx--;input.value=history[histIdx];}
      else{histIdx=-1;input.value='';}
    }else if(e.key==='l'&&e.ctrlKey){
      e.preventDefault();
      output.textContent='';
    }
  });
  
  body.querySelector('.terminal-body').addEventListener('click',()=>input.focus());
  input.focus();
  
  function processCommand(cmd,output){
    const parts=cmd.split(/\s+/);
    const c=parts[0].toLowerCase();
    
    switch(c){
      case 'help':
        print('Available commands:');
        print('  help     - Show this help message');
        print('  date     - Show current date and time');
        print('  echo     - Echo text (echo <text>)');
        print('  clear    - Clear terminal');
        print('  ls       - List files');
        print('  whoami   - Display current user');
        print('  uname    - System information');
        print('  pwd      - Print working directory');
        print('  neofetch - System info with ASCII art');
        print('  calc     - Simple calculator (calc 2+2)');
        print('  color    - Change terminal color (color <hex>)');
        break;
      case 'date':
        print(new Date().toString());
        break;
      case 'echo':
        print(parts.slice(1).join(' '));
        break;
      case 'clear':
        output.textContent='';
        break;
      case 'ls':
        print('Desktop    Documents  Downloads  Pictures\nMusic      Videos     .config    .bashrc');
        break;
      case 'whoami':
        print('user');
        break;
      case 'uname':
        print('WebOS 1.0.0 WebBrowser x86_64');
        break;
      case 'pwd':
        print('/home/user');
        break;
      case 'neofetch':
        print('        ████████        user@webos');
        print('      ██        ██      ──────────');
        print('    ██    ████    ██    OS: WebOS 1.0');
        print('   ██   ██    ██   ██   Kernel: JavaScript');
        print('  ██   ██      ██   ██  Shell: WebTerminal');
        print('  ██   ██      ██   ██  Resolution: '+window.innerWidth+'x'+window.innerHeight);
        print('   ██   ██    ██   ██   Theme: Dark [GTK3]');
        print('    ██    ████    ██    Memory: ∞ MB');
        print('      ██        ██');
        print('        ████████');
        break;
      case 'calc':
        try{
          const mathExpr=parts.slice(1).join('');
          const result=Function('"use strict";return ('+mathExpr+')')();
          print('= '+result);
        }catch(e){print('Error: Invalid expression');}
        break;
      case 'color':
        const hex=parts[1];
        if(hex&&/^#[0-9a-f]{6}$/i.test(hex)){
          output.style.color=hex;
          document.querySelector('.terminal-prompt').style.color=hex;
        }else{print('Usage: color #RRGGBB');}
        break;
      default:
        print(`Command not found: ${c}. Type 'help' for available commands.`);
    }
  }
}

// ===== SHUTDOWN =====
function shutdown(){
  const screen=document.getElementById('shutdown-screen');
  screen.classList.add('visible');
  setTimeout(()=>{
    document.body.innerHTML='<div style="height:100vh;display:flex;align-items:center;justify-content:center;color:#333;font-size:14px;flex-direction:column;gap:16px;"><div style="font-size:48px;">⬡</div><div>System halted. Refresh to restart.</div></div>';
  },2500);
}

// ===== NOTIFICATIONS =====
function showNotification(text){
  const n=document.createElement('div');
  n.className='notification';
  n.textContent=text;
  document.body.appendChild(n);
  setTimeout(()=>{n.style.opacity='0';n.style.transition='opacity 0.3s';setTimeout(()=>n.remove(),300);},3000);
}

// ===== DOUBLE-CLICK TITLE BAR TO MAXIMIZE =====
document.addEventListener('dblclick',e=>{
  const header=e.target.closest('.window-header');
  if(header&&!e.target.closest('.window-controls')){
    const appId=header.dataset.app;
    if(openWindows[appId])maximizeWindow(appId);
  }
});
</script>
