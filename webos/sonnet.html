<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebOS Desktop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #1a1a1a;
            color: #ffffff;
        }

        /* Boot Screen */
        #boot-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            flex-direction: column;
        }

        .boot-loader {
            width: 200px;
            height: 4px;
            background: #333;
            border-radius: 2px;
            overflow: hidden;
        }

        .boot-progress {
            height: 100%;
            background: #0078d7;
            width: 0%;
            animation: bootProgress 2s ease-in-out forwards;
        }

        @keyframes bootProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .boot-text {
            margin-top: 20px;
            color: #888;
            font-size: 14px;
        }

        /* Desktop */
        #desktop {
            width: 100%;
            height: calc(100vh - 48px);
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            position: relative;
            display: none;
        }

        /* Desktop Icons */
        .desktop-icons {
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;
            height: 100%;
            padding: 20px;
            gap: 10px;
        }

        .desktop-icon {
            width: 80px;
            text-align: center;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }

        .desktop-icon:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .desktop-icon.selected {
            background: rgba(0, 120, 215, 0.3);
        }

        .desktop-icon img, .desktop-icon .icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 8px;
            font-size: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .desktop-icon span {
            font-size: 12px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }

        /* Windows */
        .window {
            position: absolute;
            background: #2d2d2d;
            border: 1px solid #444;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            min-width: 300px;
            min-height: 200px;
            display: none;
            overflow: hidden;
        }

        .window.active {
            z-index: 1000;
            border-color: #0078d7;
        }

        .window-header {
            background: #3a3a3a;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            border-bottom: 1px solid #444;
        }

        .window-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .window-title .icon {
            font-size: 16px;
        }

        .window-controls {
            display: flex;
            gap: 8px;
        }

        .window-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .window-btn:hover {
            opacity: 0.8;
        }

        .btn-minimize { background: #f1c40f; }
        .btn-maximize { background: #2ecc71; }
        .btn-close { background: #e74c3c; }

        .window-content {
            height: calc(100% - 40px);
            overflow: auto;
            background: #1e1e1e;
        }

        .window-resize {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 15px;
            height: 15px;
            cursor: nwse-resize;
            background: linear-gradient(135deg, transparent 50%, #555 50%);
        }

        .window.minimized {
            display: none;
        }

        .window.maximized {
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            border-radius: 0;
        }

        /* Taskbar */
        #taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 48px;
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid #444;
            display: none;
            align-items: center;
            padding: 0 10px;
            gap: 10px;
            z-index: 9999;
        }

        #start-button {
            width: 40px;
            height: 40px;
            background: #0078d7;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: background 0.2s;
        }

        #start-button:hover {
            background: #1084e8;
        }

        #taskbar-apps {
            display: flex;
            gap: 5px;
            flex: 1;
        }

        .taskbar-app {
            width: 40px;
            height: 40px;
            background: #3a3a3a;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: background 0.2s;
            position: relative;
        }

        .taskbar-app:hover {
            background: #4a4a4a;
        }

        .taskbar-app.active {
            background: #4a4a4a;
            border-bottom: 2px solid #0078d7;
        }

        #system-tray {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 0 10px;
        }

        #clock {
            font-size: 13px;
            color: #ccc;
        }

        /* Start Menu */
        #start-menu {
            position: fixed;
            bottom: 53px;
            left: 10px;
            width: 320px;
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #444;
            border-radius: 8px;
            display: none;
            z-index: 10000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        #start-menu.show {
            display: block;
        }

        .start-menu-header {
            padding: 15px;
            border-bottom: 1px solid #444;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: #0078d7;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .user-name {
            font-size: 14px;
            font-weight: 500;
        }

        .start-menu-apps {
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .start-menu-app {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
            text-align: center;
        }

        .start-menu-app:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .start-menu-app .icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .start-menu-app span {
            font-size: 11px;
            color: #ccc;
        }

        .start-menu-footer {
            padding: 10px;
            border-top: 1px solid #444;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .power-btn {
            padding: 8px 15px;
            background: #e74c3c;
            border: none;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }

        .power-btn:hover {
            background: #c0392b;
        }

        /* Context Menu */
        #context-menu {
            position: fixed;
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #444;
            border-radius: 4px;
            min-width: 200px;
            display: none;
            z-index: 10001;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        }

        #context-menu.show {
            display: block;
        }

        .context-menu-item {
            padding: 10px 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }

        .context-menu-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .context-menu-divider {
            height: 1px;
            background: #444;
            margin: 5px 0;
        }

        /* App Specific Styles */

        /* Notepad */
        .notepad-content {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .notepad-menu {
            background: #2d2d2d;
            padding: 5px 10px;
            border-bottom: 1px solid #444;
            display: flex;
            gap: 15px;
        }

        .menu-item {
            position: relative;
            cursor: pointer;
            font-size: 13px;
        }

        .menu-item:hover {
            color: #0078d7;
        }

        .menu-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            background: #2d2d2d;
            border: 1px solid #444;
            border-radius: 4px;
            min-width: 150px;
            display: none;
            z-index: 100;
        }

        .menu-item:hover .menu-dropdown {
            display: block;
        }

        .menu-dropdown-item {
            padding: 8px 15px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
        }

        .menu-dropdown-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .notepad-textarea {
            flex: 1;
            background: #1e1e1e;
            border: none;
            padding: 10px;
            color: #fff;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            resize: none;
        }

        /* Calculator */
        .calculator {
            padding: 15px;
            background: #1e1e1e;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .calc-display {
            background: #2d2d2d;
            border: 1px solid #444;
            padding: 15px;
            text-align: right;
            font-size: 24px;
            margin-bottom: 15px;
            border-radius: 4px;
            min-height: 50px;
            word-break: break-all;
        }

        .calc-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            flex: 1;
        }

        .calc-btn {
            background: #3a3a3a;
            border: 1px solid #555;
            color: #fff;
            font-size: 18px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .calc-btn:hover {
            background: #4a4a4a;
        }

        .calc-btn.operator {
            background: #0078d7;
        }

        .calc-btn.operator:hover {
            background: #1084e8;
        }

        .calc-btn.equals {
            background: #2ecc71;
        }

        .calc-btn.equals:hover {
            background: #27ae60;
        }

        /* Terminal */
        .terminal {
            padding: 15px;
            background: #0c0c0c;
            height: 100%;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            overflow-y: auto;
        }

        .terminal-output {
            color: #ccc;
            white-space: pre-wrap;
            margin-bottom: 10px;
        }

        .terminal-input-line {
            display: flex;
            align-items: center;
        }

        .terminal-prompt {
            color: #2ecc71;
            margin-right: 8px;
        }

        .terminal-input {
            background: transparent;
            border: none;
            color: #fff;
            font-family: inherit;
            font-size: inherit;
            flex: 1;
            outline: none;
        }

        /* Generic file content */
        .file-content {
            padding: 20px;
            color: #ccc;
        }

        .file-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
        }

        .file-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        .file-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .file-item .icon {
            font-size: 36px;
            margin-bottom: 8px;
        }

        .file-item span {
            font-size: 12px;
            text-align: center;
        }

        /* Browser */
        .browser {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .browser-toolbar {
            background: #2d2d2d;
            padding: 8px;
            display: flex;
            gap: 8px;
            border-bottom: 1px solid #444;
        }

        .browser-url {
            flex: 1;
            background: #1e1e1e;
            border: 1px solid #444;
            padding: 6px 12px;
            color: #fff;
            border-radius: 4px;
            font-size: 13px;
        }

        .browser-btn {
            background: #3a3a3a;
            border: 1px solid #555;
            color: #fff;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        .browser-content {
            flex: 1;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        /* Settings */
        .settings {
            padding: 20px;
            height: 100%;
            overflow-y: auto;
        }

        .settings-section {
            margin-bottom: 25px;
        }

        .settings-section h3 {
            margin-bottom: 15px;
            color: #0078d7;
            border-bottom: 1px solid #444;
            padding-bottom: 8px;
        }

        .settings-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #252525;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        .settings-item label {
            font-size: 14px;
        }

        .toggle {
            width: 50px;
            height: 24px;
            background: #555;
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            transition: background 0.2s;
        }

        .toggle.active {
            background: #0078d7;
        }

        .toggle::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: left 0.2s;
        }

        .toggle.active::after {
            left: 28px;
        }

        /* Picture viewer */
        .picture-viewer {
            padding: 20px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .picture-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .picture-item {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .picture-item:hover {
            transform: scale(1.05);
        }

        .empty-state {
            text-align: center;
            color: #888;
            padding: 40px;
        }
    </style>
</head>
<body>
    <!-- Boot Screen -->
    <div id="boot-screen">
        <div class="boot-loader">
            <div class="boot-progress"></div>
        </div>
        <div class="boot-text">Starting WebOS...</div>
    </div>

    <!-- Desktop -->
    <div id="desktop">
        <div class="desktop-icons">
            <div class="desktop-icon" data-app="computer">
                <div class="icon">💻</div>
                <span>My Computer</span>
            </div>
            <div class="desktop-icon" data-app="recycle">
                <div class="icon">🗑️</div>
                <span>Recycle Bin</span>
            </div>
            <div class="desktop-icon" data-app="notepad">
                <div class="icon">📝</div>
                <span>Notepad</span>
            </div>
            <div class="desktop-icon" data-app="calculator">
                <div class="icon">🧮</div>
                <span>Calculator</span>
            </div>
            <div class="desktop-icon" data-app="browser">
                <div class="icon">🌐</div>
                <span>Browser</span>
            </div>
            <div class="desktop-icon" data-app="terminal">
                <div class="icon">⌨️</div>
                <span>Terminal</span>
            </div>
            <div class="desktop-icon" data-app="settings">
                <div class="icon">⚙️</div>
                <span>Settings</span>
            </div>
            <div class="desktop-icon" data-app="pictures">
                <div class="icon">🖼️</div>
                <span>Pictures</span>
            </div>
        </div>
    </div>

    <!-- Taskbar -->
    <div id="taskbar">
        <button id="start-button">🪟</button>
        <div id="taskbar-apps"></div>
        <div id="system-tray">
            <span id="clock">00:00</span>
        </div>
    </div>

    <!-- Start Menu -->
    <div id="start-menu">
        <div class="start-menu-header">
            <div class="user-avatar">👤</div>
            <div class="user-name">User</div>
        </div>
        <div class="start-menu-apps">
            <div class="start-menu-app" data-app="computer">
                <div class="icon">💻</div>
                <span>Computer</span>
            </div>
            <div class="start-menu-app" data-app="notepad">
                <div class="icon">📝</div>
                <span>Notepad</span>
            </div>
            <div class="start-menu-app" data-app="calculator">
                <div class="icon">🧮</div>
                <span>Calculator</span>
            </div>
            <div class="start-menu-app" data-app="browser">
                <div class="icon">🌐</div>
                <span>Browser</span>
            </div>
            <div class="start-menu-app" data-app="terminal">
                <div class="icon">⌨️</div>
                <span>Terminal</span>
            </div>
            <div class="start-menu-app" data-app="settings">
                <div class="icon">⚙️</div>
                <span>Settings</span>
            </div>
            <div class="start-menu-app" data-app="pictures">
                <div class="icon">🖼️</div>
                <span>Pictures</span>
            </div>
        </div>
        <div class="start-menu-footer">
            <span style="color: #888; font-size: 12px;">WebOS v1.0</span>
            <button class="power-btn" onclick="shutdown()">⏻ Shutdown</button>
        </div>
    </div>

    <!-- Context Menu -->
    <div id="context-menu">
        <div class="context-menu-item" onclick="refreshDesktop()">🔄 Refresh</div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-item" onclick="changeWallpaper()">🎨 Change Wallpaper</div>
        <div class="context-menu-item" onclick="openSettings()">⚙️ Display Settings</div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-item" onclick="openTerminal()">⌨️ Open Terminal</div>
    </div>

    <script>
        // Global state
        let windows = [];
        let windowZIndex = 100;
        let activeWindow = null;
        let draggedWindow = null;
        let dragOffset = { x: 0, y: 0 };
        let resizingWindow = null;

        // App configurations
        const apps = {
            computer: {
                title: 'My Computer',
                icon: '💻',
                width: 600,
                height: 400,
                content: `
                    <div class="file-content">
                        <h2>My Computer</h2>
                        <div class="file-list" style="margin-top: 20px;">
                            <div class="file-item">
                                <div class="icon">💾</div>
                                <span>Local Disk (C:)</span>
                            </div>
                            <div class="file-item">
                                <div class="icon">💿</div>
                                <span>DVD Drive (D:)</span>
                            </div>
                            <div class="file-item">
                                <div class="icon">📁</div>
                                <span>Documents</span>
                            </div>
                            <div class="file-item">
                                <div class="icon">📁</div>
                                <span>Downloads</span>
                            </div>
                            <div class="file-item">
                                <div class="icon">🎵</div>
                                <span>Music</span>
                            </div>
                            <div class="file-item">
                                <div class="icon">🎬</div>
                                <span>Videos</span>
                            </div>
                        </div>
                    </div>
                `
            },
            recycle: {
                title: 'Recycle Bin',
                icon: '🗑️',
                width: 500,
                height: 350,
                content: `
                    <div class="file-content">
                        <h2>Recycle Bin</h2>
                        <div class="empty-state">
                            <div style="font-size: 48px;">🗑️</div>
                            <p>Recycle Bin is empty</p>
                        </div>
                    </div>
                `
            },
            notepad: {
                title: 'Notepad',
                icon: '📝',
                width: 500,
                height: 400,
                content: `
                    <div class="notepad-content">
                        <div class="notepad-menu">
                            <div class="menu-item">
                                File
                                <div class="menu-dropdown">
                                    <div class="menu-dropdown-item" onclick="notepadNew()">New</div>
                                    <div class="menu-dropdown-item" onclick="notepadOpen()">Open</div>
                                    <div class="menu-dropdown-item" onclick="notepadSave()">Save</div>
                                </div>
                            </div>
                            <div class="menu-item">Edit</div>
                            <div class="menu-item">View</div>
                        </div>
                        <textarea class="notepad-textarea" id="notepad-text" placeholder="Start typing..."></textarea>
                    </div>
                `
            },
            calculator: {
                title: 'Calculator',
                icon: '🧮',
                width: 300,
                height: 400,
                content: `
                    <div class="calculator">
                        <div class="calc-display" id="calc-display">0</div>
                        <div class="calc-buttons">
                            <button class="calc-btn" onclick="calcClear()">C</button>
                            <button class="calc-btn" onclick="calcBackspace()">⌫</button>
                            <button class="calc-btn operator" onclick="calcOperator('%')">%</button>
                            <button class="calc-btn operator" onclick="calcOperator('/')">÷</button>

                            <button class="calc-btn" onclick="calcNumber('7')">7</button>
                            <button class="calc-btn" onclick="calcNumber('8')">8</button>
                            <button class="calc-btn" onclick="calcNumber('9')">9</button>
                            <button class="calc-btn operator" onclick="calcOperator('*')">×</button>

                            <button class="calc-btn" onclick="calcNumber('4')">4</button>
                            <button class="calc-btn" onclick="calcNumber('5')">5</button>
                            <button class="calc-btn" onclick="calcNumber('6')">6</button>
                            <button class="calc-btn operator" onclick="calcOperator('-')">−</button>

                            <button class="calc-btn" onclick="calcNumber('1')">1</button>
                            <button class="calc-btn" onclick="calcNumber('2')">2</button>
                            <button class="calc-btn" onclick="calcNumber('3')">3</button>
                            <button class="calc-btn operator" onclick="calcOperator('+')">+</button>

                            <button class="calc-btn" onclick="calcNumber('0')" style="grid-column: span 2;">0</button>
                            <button class="calc-btn" onclick="calcDecimal()">.</button>
                            <button class="calc-btn equals" onclick="calcEquals()">=</button>
                        </div>
                    </div>
                `
            },
            browser: {
                title: 'Web Browser',
                icon: '🌐',
                width: 800,
                height: 500,
                content: `
                    <div class="browser">
                        <div class="browser-toolbar">
                            <button class="browser-btn">←</button>
                            <button class="browser-btn">→</button>
                            <button class="browser-btn">↻</button>
                            <input class="browser-url" type="text" placeholder="Enter URL..." value="https://www.example.com">
                            <button class="browser-btn">Go</button>
                        </div>
                        <div class="browser-content">
                            <div>
                                <h2>Welcome to the Web</h2>
                                <p>This is a simulated browser interface.</p>
                            </div>
                        </div>
                    </div>
                `
            },
            terminal: {
                title: 'Terminal',
                icon: '⌨️',
                width: 600,
                height: 400,
                content: `
                    <div class="terminal" id="terminal">
                        <div class="terminal-output">WebOS Terminal v1.0
Type 'help' for available commands.</div>
                        <div class="terminal-input-line">
                            <span class="terminal-prompt">user@webos:~$</span>
                            <input class="terminal-input" type="text" id="terminal-input" autofocus>
                        </div>
                    </div>
                `
            },
            settings: {
                title: 'Settings',
                icon: '⚙️',
                width: 500,
                height: 400,
                content: `
                    <div class="settings">
                        <h2>Settings</h2>

                        <div class="settings-section">
                            <h3>Display</h3>
                            <div class="settings-item">
                                <label>Dark Mode</label>
                                <div class="toggle active" onclick="this.classList.toggle('active')"></div>
                            </div>
                            <div class="settings-item">
                                <label>Animations</label>
                                <div class="toggle active" onclick="this.classList.toggle('active')"></div>
                            </div>
                        </div>

                        <div class="settings-section">
                            <h3>System</h3>
                            <div class="settings-item">
                                <label>Auto-updates</label>
                                <div class="toggle" onclick="this.classList.toggle('active')"></div>
                            </div>
                            <div class="settings-item">
                                <label>Notifications</label>
                                <div class="toggle active" onclick="this.classList.toggle('active')"></div>
                            </div>
                        </div>

                        <div class="settings-section">
                            <h3>Personalization</h3>
                            <div class="settings-item">
                                <label>Desktop Icons</label>
                                <div class="toggle active" onclick="this.classList.toggle('active')"></div>
                            </div>
                        </div>
                    </div>
                `
            },
            pictures: {
                title: 'Pictures',
                icon: '🖼️',
                width: 600,
                height: 450,
                content: `
                    <div class="picture-viewer">
                        <h2>Pictures</h2>
                        <div class="picture-grid" style="margin-top: 20px;">
                            <div class="picture-item" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);"></div>
                            <div class="picture-item" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);"></div>
                            <div class="picture-item" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);"></div>
                            <div class="picture-item" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);"></div>
                            <div class="picture-item" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);"></div>
                            <div class="picture-item" style="background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);"></div>
                        </div>
                    </div>
                `
            }
        };

        // Calculator state
        let calcDisplay = '0';
        let calcCurrentValue = '0';
        let calcPreviousValue = '';
        let calcOperator = '';
        let calcNewNumber = true;

        // Initialize
        function init() {
            // Boot animation
            setTimeout(() => {
                document.getElementById('boot-screen').style.display = 'none';
                document.getElementById('desktop').style.display = 'block';
                document.getElementById('taskbar').style.display = 'flex';
            }, 2500);

            // Update clock
            updateClock();
            setInterval(updateClock, 1000);

            // Setup event listeners
            setupEventListeners();
        }

        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
        }

        function setupEventListeners() {
            // Desktop icons
            document.querySelectorAll('.desktop-icon').forEach(icon => {
                icon.addEventListener('dblclick', () => {
                    const appName = icon.dataset.app;
                    openApp(appName);
                });
            });

            // Start menu apps
            document.querySelectorAll('.start-menu-app').forEach(app => {
                app.addEventListener('click', () => {
                    const appName = app.dataset.app;
                    openApp(appName);
                    hideStartMenu();
                });
            });

            // Start button
            document.getElementById('start-button').addEventListener('click', toggleStartMenu);

            // Desktop context menu
            document.getElementById('desktop').addEventListener('contextmenu', (e) => {
                e.preventDefault();
                showContextMenu(e.clientX, e.clientY);
            });

            // Click to hide context menu and start menu
            document.addEventListener('click', (e) => {
                if (!e.target.closest('#context-menu') && !e.target.closest('#desktop')) {
                    hideContextMenu();
                }
                if (!e.target.closest('#start-menu') && !e.target.closest('#start-button')) {
                    hideStartMenu();
                }
            });

            // Window drag handling
            document.addEventListener('mousemove', handleDrag);
            document.addEventListener('mouseup', endDrag);
        }

        function openApp(appName) {
            if (!apps[appName]) return;

            const app = apps[appName];
            const windowId = 'window-' + Date.now();

            const windowEl = document.createElement('div');
            windowEl.className = 'window';
            windowEl.id = windowId;
            windowEl.style.width = app.width + 'px';
            windowEl.style.height = app.height + 'px';
            windowEl.style.left = (100 + windows.length * 30) + 'px';
            windowEl.style.top = (100 + windows.length * 30) + 'px';
            windowEl.style.zIndex = ++windowZIndex;
            windowEl.style.display = 'block';

            windowEl.innerHTML = `
                <div class="window-header">
                    <div class="window-title">
                        <span class="icon">${app.icon}</span>
                        <span>${app.title}</span>
                    </div>
                    <div class="window-controls">
                        <button class="window-btn btn-minimize" onclick="minimizeWindow('${windowId}')"></button>
                        <button class="window-btn btn-maximize" onclick="maximizeWindow('${windowId}')"></button>
                        <button class="window-btn btn-close" onclick="closeWindow('${windowId}')"></button>
                    </div>
                </div>
                <div class="window-content">${app.content}</div>
                <div class="window-resize"></div>
            `;

            document.getElementById('desktop').appendChild(windowEl);

            windows.push({
                id: windowId,
                app: appName,
                title: app.title,
                icon: app.icon,
                minimized: false,
                maximized: false
            });

            // Add window event listeners
            const header = windowEl.querySelector('.window-header');
            header.addEventListener('mousedown', (e) => startDrag(e, windowEl));

            const resize = windowEl.querySelector('.window-resize');
            resize.addEventListener('mousedown', (e) => startResize(e, windowEl));

            windowEl.addEventListener('mousedown', () => focusWindow(windowId));

            // Add taskbar item
            addTaskbarApp(windowId, app);

            // Focus the new window
            focusWindow(windowId);

            // Initialize app-specific functionality
            if (appName === 'terminal') {
                initTerminal(windowEl);
            }
        }

        function addTaskbarApp(windowId, app) {
            const taskbarApps = document.getElementById('taskbar-apps');
            const taskbarApp = document.createElement('button');
            taskbarApp.className = 'taskbar-app';
            taskbarApp.id = 'taskbar-' + windowId;
            taskbarApp.innerHTML = app.icon;
            taskbarApp.addEventListener('click', () => toggleWindow(windowId));
            taskbarApps.appendChild(taskbarApp);
        }

        function removeTaskbarApp(windowId) {
            const taskbarApp = document.getElementById('taskbar-' + windowId);
            if (taskbarApp) {
                taskbarApp.remove();
            }
        }

        function focusWindow(windowId) {
            // Update window z-index
            const windowEl = document.getElementById(windowId);
            if (windowEl) {
                windowEl.style.zIndex = ++windowZIndex;
            }

            // Update active state
            document.querySelectorAll('.window').forEach(w => w.classList.remove('active'));
            if (windowEl) {
                windowEl.classList.add('active');
            }

            // Update taskbar
            document.querySelectorAll('.taskbar-app').forEach(t => t.classList.remove('active'));
            const taskbarApp = document.getElementById('taskbar-' + windowId);
            if (taskbarApp) {
                taskbarApp.classList.add('active');
            }

            activeWindow = windowId;
        }

        function minimizeWindow(windowId) {
            const windowEl = document.getElementById(windowId);
            const windowData = windows.find(w => w.id === windowId);

            if (windowEl && windowData) {
                windowEl.classList.add('minimized');
                windowData.minimized = true;
            }
        }

        function maximizeWindow(windowId) {
            const windowEl = document.getElementById(windowId);
            const windowData = windows.find(w => w.id === windowId);

            if (windowEl && windowData) {
                windowEl.classList.toggle('maximized');
                windowData.maximized = !windowData.maximized;
            }
        }

        function closeWindow(windowId) {
            const windowEl = document.getElementById(windowId);
            if (windowEl) {
                windowEl.remove();
            }

            windows = windows.filter(w => w.id !== windowId);
            removeTaskbarApp(windowId);

            if (activeWindow === windowId) {
                activeWindow = null;
            }
        }

        function toggleWindow(windowId) {
            const windowData = windows.find(w => w.id === windowId);
            if (!windowData) return;

            const windowEl = document.getElementById(windowId);
            if (windowData.minimized) {
                windowEl.classList.remove('minimized');
                windowData.minimized = false;
                focusWindow(windowId);
            } else if (activeWindow === windowId) {
                minimizeWindow(windowId);
            } else {
                focusWindow(windowId);
            }
        }

        function startDrag(e, windowEl) {
            if (e.target.classList.contains('window-btn')) return;

            draggedWindow = windowEl;
            dragOffset.x = e.clientX - windowEl.offsetLeft;
            dragOffset.y = e.clientY - windowEl.offsetTop;

            // Bring to front
            focusWindow(windowEl.id);
        }

        function startResize(e, windowEl) {
            resizingWindow = windowEl;
            dragOffset.x = e.clientX;
            dragOffset.y = e.clientY;

            // Bring to front
            focusWindow(windowEl.id);
        }

        function handleDrag(e) {
            if (draggedWindow) {
                const newX = e.clientX - dragOffset.x;
                const newY = e.clientY - dragOffset.y;

                draggedWindow.style.left = newX + 'px';
                draggedWindow.style.top = newY + 'px';
            }

            if (resizingWindow) {
                const windowData = windows.find(w => w.id === resizingWindow.id);
                if (windowData && !windowData.maximized) {
                    const deltaX = e.clientX - dragOffset.x;
                    const deltaY = e.clientY - dragOffset.y;

                    const newWidth = resizingWindow.offsetWidth + deltaX;
                    const newHeight = resizingWindow.offsetHeight + deltaY;

                    if (newWidth > 300) {
                        resizingWindow.style.width = newWidth + 'px';
                    }
                    if (newHeight > 200) {
                        resizingWindow.style.height = newHeight + 'px';
                    }

                    dragOffset.x = e.clientX;
                    dragOffset.y = e.clientY;
                }
            }
        }

        function endDrag() {
            draggedWindow = null;
            resizingWindow = null;
        }

        function toggleStartMenu() {
            document.getElementById('start-menu').classList.toggle('show');
        }

        function hideStartMenu() {
            document.getElementById('start-menu').classList.remove('show');
        }

        function showContextMenu(x, y) {
            const menu = document.getElementById('context-menu');
            menu.style.left = x + 'px';
            menu.style.top = y + 'px';
            menu.classList.add('show');
        }

        function hideContextMenu() {
            document.getElementById('context-menu').classList.remove('show');
        }

        // Context menu actions
        function refreshDesktop() {
            hideContextMenu();
            location.reload();
        }

        function changeWallpaper() {
            hideContextMenu();
            const colors = ['#1a1a1a', '#2d2d2d', '#0c3483', '#1a237e', '#00695c'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            document.getElementById('desktop').style.background = randomColor;
        }

        function openSettings() {
            hideContextMenu();
            openApp('settings');
        }

        function openTerminal() {
            hideContextMenu();
            openApp('terminal');
        }

        function shutdown() {
            document.getElementById('start-menu').classList.remove('show');
            document.getElementById('boot-screen').style.display = 'flex';
            document.querySelector('.boot-text').textContent = 'Shutting down...';
            setTimeout(() => {
                document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#000;color:#888;font-family:sans-serif;">System Halted</div>';
            }, 2000);
        }

        // Notepad functions
        function notepadNew() {
            const textarea = document.getElementById('notepad-text');
            if (textarea) {
                textarea.value = '';
            }
        }

        function notepadOpen() {
            const saved = localStorage.getItem('notepad-content');
            const textarea = document.getElementById('notepad-text');
            if (textarea && saved) {
                textarea.value = saved;
            } else {
                alert('No saved content found');
            }
        }

        function notepadSave() {
            const textarea = document.getElementById('notepad-text');
            if (textarea) {
                localStorage.setItem('notepad-content', textarea.value);
                alert('Content saved to localStorage');
            }
        }

        // Calculator functions
        function updateCalcDisplay() {
            const display = document.getElementById('calc-display');
            if (display) {
                display.textContent = calcDisplay;
            }
        }

        function calcNumber(num) {
            if (calcNewNumber) {
                calcCurrentValue = num;
                calcNewNumber = false;
            } else {
                calcCurrentValue += num;
            }
            calcDisplay = calcCurrentValue;
            updateCalcDisplay();
        }

        function calcDecimal() {
            if (calcNewNumber) {
                calcCurrentValue = '0.';
                calcNewNumber = false;
            } else if (!calcCurrentValue.includes('.')) {
                calcCurrentValue += '.';
            }
            calcDisplay = calcCurrentValue;
            updateCalcDisplay();
        }

        function calcOperator(op) {
            if (calcPreviousValue && !calcNewNumber) {
                calcEquals();
            }
            calcPreviousValue = calcCurrentValue;
            calcOperator = op;
            calcNewNumber = true;
        }

        function calcEquals() {
            if (!calcPreviousValue || !calcOperator) return;

            const prev = parseFloat(calcPreviousValue);
            const current = parseFloat(calcCurrentValue);
            let result;

            switch (calcOperator) {
                case '+': result = prev + current; break;
                case '-': result = prev - current; break;
                case '*': result = prev * current; break;
                case '/': result = current !== 0 ? prev / current : 'Error'; break;
                case '%': result = prev % current; break;
                default: result = current;
            }

            calcDisplay = String(result);
            calcCurrentValue = calcDisplay;
            calcPreviousValue = '';
            calcOperator = '';
            calcNewNumber = true;
            updateCalcDisplay();
        }

        function calcClear() {
            calcDisplay = '0';
            calcCurrentValue = '0';
            calcPreviousValue = '';
            calcOperator = '';
            calcNewNumber = true;
            updateCalcDisplay();
        }

        function calcBackspace() {
            if (calcCurrentValue.length > 1) {
                calcCurrentValue = calcCurrentValue.slice(0, -1);
            } else {
                calcCurrentValue = '0';
            }
            calcDisplay = calcCurrentValue;
            updateCalcDisplay();
        }

        // Terminal functions
        function initTerminal(windowEl) {
            const terminal = windowEl.querySelector('#terminal');
            const input = windowEl.querySelector('#terminal-input');

            if (terminal && input) {
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        const command = input.value.trim();
                        if (command) {
                            executeCommand(terminal, command);
                        }
                        input.value = '';
                    }
                });

                input.focus();
            }
        }

        function executeCommand(terminal, command) {
            const output = terminal.querySelector('.terminal-output');
            let response = '';

            const cmd = command.toLowerCase().split(' ')[0];
            const args = command.split(' ').slice(1).join(' ');

            switch (cmd) {
                case 'help':
                    response = 'Available commands:\n  help     - Show this help\n  date     - Show current date and time\n  echo     - Echo text back\n  clear    - Clear terminal\n  ls       - List files\n  whoami   - Show current user\n  pwd      - Print working directory';
                    break;
                case 'date':
                    response = new Date().toString();
                    break;
                case 'echo':
                    response = args;
                    break;
                case 'clear':
                    output.textContent = '';
                    return;
                case 'ls':
                    response = 'Documents  Downloads  Music  Pictures  Videos';
                    break;
                case 'whoami':
                    response = 'user';
                    break;
                case 'pwd':
                    response = '/home/user';
                    break;
                default:
                    response = `Command not found: ${cmd}. Type 'help' for available commands.`;
            }

            output.textContent += '\nuser@webos:~$ ' + command + '\n' + response;
        }

        // Initialize on load
        window.addEventListener('load', init);
    </script>
</body>
</html>
