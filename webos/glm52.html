<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebOS</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }

:root {
  --bg: #0a0e14;
  --bg-accent: #1a1f29;
  --window-bg: #1e2228;
  --border: #2a2f37;
  --border-light: #3a3f47;
  --text: #e6e9ed;
  --text-muted: #8b95a1;
  --accent: #0078d4;
  --accent-hover: #1a86d9;
  --danger: #e74c3c;
  --success: #4caf50;
}

html, body {
  width: 100%; height: 100%; overflow: hidden;
  font-family: "Segoe UI", -apple-system, system-ui, sans-serif;
  background: var(--bg); color: var(--text); font-size: 14px;
}

#boot {
  position: fixed; inset: 0; background: #000;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 10000; transition: opacity 0.8s ease;
}
#boot.fade { opacity: 0; pointer-events: none; }
.boot-logo { font-size: 56px; font-weight: 200; letter-spacing: 8px; color: #fff; margin-bottom: 50px; animation: pulse 2s ease infinite; }
.boot-logo span { color: var(--accent); font-weight: 600; }
@keyframes pulse { 0%,100% { opacity: 0.7; } 50% { opacity: 1; } }
.boot-spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 30px; }
@keyframes spin { to { transform: rotate(360deg); } }
.boot-progress { width: 220px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
.boot-progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s ease; border-radius: 2px; }
.boot-text { margin-top: 20px; color: #666; font-size: 12px; letter-spacing: 1px; }

#desktop {
  position: fixed; inset: 0; bottom: 48px;
  background: 
    radial-gradient(ellipse at top left, rgba(0,120,212,0.10), transparent 50%),
    radial-gradient(ellipse at bottom right, rgba(140,0,212,0.07), transparent 50%),
    linear-gradient(135deg, #0a0e14 0%, #14181f 100%);
  overflow: hidden;
}

#desktop-icons { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }

.desktop-icon {
  width: 90px; height: 90px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 8px; border-radius: 4px; cursor: pointer;
  position: absolute; transition: background 0.15s;
}
.desktop-icon:hover { background: rgba(255,255,255,0.06); }
.desktop-icon.selected { background: rgba(0,120,212,0.2); outline: 1px solid rgba(0,120,212,0.5); }
.desktop-icon .icon-img { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; font-size: 38px; margin-bottom: 6px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
.desktop-icon .icon-label { font-size: 12px; text-align: center; text-shadow: 1px 1px 2px rgba(0,0,0,0.9); line-height: 1.2; max-width: 90px; word-break: break-word; }

.window {
  position: absolute; background: var(--window-bg);
  border: 1px solid var(--border); border-radius: 6px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  display: flex; flex-direction: column;
  min-width: 280px; min-height: 180px; overflow: hidden;
  animation: winOpen 0.18s ease;
}
@keyframes winOpen { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.window.minimized { display: none; }
.window-titlebar {
  height: 36px; background: linear-gradient(180deg, #2a2f37 0%, #232830 100%);
  display: flex; align-items: center; padding: 0 6px 0 12px;
  cursor: move; border-bottom: 1px solid var(--border);
}
.window-title { flex: 1; font-size: 13px; display: flex; align-items: center; gap: 8px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.window-controls { display: flex; gap: 2px; }
.window-btn { width: 32px; height: 26px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
.window-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }
.window-btn.close:hover { background: var(--danger); color: #fff; }
.window-content { flex: 1; overflow: auto; position: relative; background: var(--window-bg); }
.resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: nwse-resize; z-index: 10; }
.resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 8px; height: 8px; border-right: 2px solid var(--border-light); border-bottom: 2px solid var(--border-light); }

#taskbar {
  position: fixed; bottom: 0; left: 0; right: 0; height: 48px;
  background: rgba(12,15,20,0.95); backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 8px; z-index: 1000; gap: 4px;
}

#start-btn { height: 40px; padding: 0 14px; background: transparent; border: none; color: var(--text); display: flex; align-items: center; gap: 10px; cursor: pointer; border-radius: 4px; font-size: 13px; transition: background 0.15s; }
#start-btn:hover { background: rgba(255,255,255,0.08); }
#start-btn.active { background: rgba(0,120,212,0.25); }
.start-logo { width: 20px; height: 20px; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 2px; transform: rotate(0deg); transition: transform 0.3s; }
#start-btn:hover .start-logo { transform: rotate(90deg); }
.start-logo div:nth-child(1) { background: #f25022; border-radius: 1px; }
.start-logo div:nth-child(2) { background: #7fba00; border-radius: 1px; }
.start-logo div:nth-child(3) { background: #00a4ef; border-radius: 1px; }
.start-logo div:nth-child(4) { background: #ffb900; border-radius: 1px; }

#taskbar-apps { flex: 1; display: flex; gap: 4px; align-items: center; padding: 0 8px; overflow: hidden; }
.taskbar-app { height: 36px; padding: 0 12px; background: rgba(255,255,255,0.04); border: none; color: var(--text); display: flex; align-items: center; gap: 8px; cursor: pointer; border-radius: 4px; font-size: 12px; border-bottom: 2px solid transparent; transition: background 0.15s; max-width: 200px; }
.taskbar-app:hover { background: rgba(255,255,255,0.10); }
.taskbar-app.active { background: rgba(0,120,212,0.20); border-bottom-color: var(--accent); }
.taskbar-app span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

#system-tray { display: flex; align-items: center; padding: 0 12px; height: 40px; gap: 12px; color: var(--text-muted); }
.tray-icon { cursor: pointer; font-size: 14px; }
.tray-icon:hover { color: var(--text); }
#clock { color: var(--text); font-size: 12px; text-align: right; line-height: 1.2; cursor: pointer; padding: 4px 10px; border-radius: 4px; }
#clock:hover { background: rgba(255,255,255,0.08); }
#clock .time { font-weight: 600; }
#clock .date { font-size: 10px; color: var(--text-muted); }

#start-menu {
  position: fixed; bottom: 56px; left: 8px;
  width: 380px; max-height: 560px;
  background: rgba(20,24,32,0.98); backdrop-filter: blur(20px);
  border: 1px solid var(--border); border-radius: 8px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  z-index: 999; display: none; flex-direction: column; overflow: hidden;
  animation: slideUp 0.2s ease;
}
@keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
#start-menu.open { display: flex; }
.start-search { padding: 16px; border-bottom: 1px solid var(--border); }
.start-search input { width: 100%; padding: 10px 14px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 13px; outline: none; }
.start-search input:focus { border-color: var(--accent); }
.start-apps { flex: 1; overflow-y: auto; padding: 8px; }
.start-section-title { padding: 8px 12px 4px; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
.start-app { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 4px; cursor: pointer; transition: background 0.15s; }
.start-app:hover { background: rgba(255,255,255,0.06); }
.start-app .icon { font-size: 24px; width: 32px; text-align: center; }
.start-app .name { font-size: 13px; }
.start-footer { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); }
.start-user { display: flex; align-items: center; gap: 10px; font-size: 13px; }
.start-user .avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #a040ff); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 13px; }
.power-btn { width: 32px; height: 32px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; border-radius: 4px; font-size: 18px; }
.power-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }

#context-menu {
  position: fixed; background: rgba(30,34,40,0.98); backdrop-filter: blur(20px);
  border: 1px solid var(--border); border-radius: 6px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  padding: 6px; min-width: 210px; z-index: 5000;
  display: none; font-size: 13px;
}
#context-menu.open { display: block; }
.ctx-item { padding: 8px 14px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 12px; }
.ctx-item:hover { background: var(--accent); color: #fff; }
.ctx-separator { height: 1px; background: var(--border); margin: 4px 8px; }
.ctx-item .ctx-icon { width: 18px; text-align: center; opacity: 0.9; }
.ctx-shortcut { margin-left: auto; font-size: 10px; color: var(--text-muted); }
.ctx-item:hover .ctx-shortcut { color: rgba(255,255,255,0.8); }

.notepad-menu { display: flex; background: #252a32; border-bottom: 1px solid var(--border); padding: 4px; gap: 2px; position: relative; z-index: 5; }
.notepad-menu-item { position: relative; }
.notepad-menu-btn { padding: 6px 14px; background: transparent; border: none; color: var(--text); cursor: pointer; border-radius: 3px; font-size: 12px; }
.notepad-menu-btn:hover, .notepad-menu-btn.active { background: rgba(255,255,255,0.1); }
.notepad-dropdown { position: absolute; top: 100%; left: 0; background: #2a2f37; border: 1px solid var(--border); border-radius: 4px; padding: 4px; min-width: 160px; display: none; z-index: 100; box-shadow: 0 6px 20px rgba(0,0,0,0.5); }
.notepad-dropdown.open { display: block; }
.notepad-dropdown-item { padding: 7px 14px; cursor: pointer; border-radius: 3px; font-size: 12px; }
.notepad-dropdown-item:hover { background: var(--accent); }
.notepad-textarea { width: 100%; height: calc(100% - 34px); background: #1a1e24; color: var(--text); border: none; outline: none; padding: 14px; font-family: "Consolas", "Monaco", monospace; font-size: 13px; resize: none; line-height: 1.6; user-select: text; }

.calc { display: flex; flex-direction: column; height: 100%; padding: 12px; gap: 8px; background: #1a1e24; }
.calc-display { background: #0a0e14; border: 1px solid var(--border); border-radius: 4px; padding: 16px; text-align: right; font-size: 32px; font-family: "Consolas", monospace; min-height: 80px; display: flex; flex-direction: column; justify-content: flex-end; word-break: break-all; }
.calc-history { font-size: 12px; color: var(--text-muted); min-height: 16px; margin-bottom: 4px; }
.calc-buttons { flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.calc-btn { background: #2a2f37; border: 1px solid var(--border); color: var(--text); font-size: 16px; cursor: pointer; border-radius: 4px; transition: all 0.1s; font-weight: 500; }
.calc-btn:hover { background: #353a44; }
.calc-btn:active { transform: scale(0.96); }
.calc-btn.op { background: var(--accent); color: #fff; }
.calc-btn.op:hover { background: var(--accent-hover); }
.calc-btn.eq { background: var(--success); color: #fff; grid-column: span 2; }
.calc-btn.eq:hover { background: #5cbf60; }
.calc-btn.clear { background: var(--danger); color: #fff; }

.terminal { background: #0a0e14; color: var(--success); font-family: "Consolas", "Monaco", monospace; font-size: 13px; padding: 12px; height: 100%; overflow-y: auto; line-height: 1.5; user-select: text; }
.terminal-input-line { display: flex; align-items: center; gap: 6px; }
.terminal-prompt { color: var(--success); white-space: nowrap; }
.terminal-input { flex: 1; background: transparent; border: none; outline: none; color: #e6e9ed; font-family: inherit; font-size: inherit; }
.terminal-output { white-space: pre-wrap; word-break: break-word; margin-bottom: 4px; }
.terminal-error { color: #ff6b6b; }

.browser-toolbar { display: flex; gap: 4px; padding: 8px; background: #252a32; border-bottom: 1px solid var(--border); align-items: center; }
.browser-btn { width: 30px; height: 30px; background: transparent; border: none; color: var(--text-muted); cursor: pointer; border-radius: 4px; font-size: 14px; }
.browser-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }
.browser-url { flex: 1; padding: 7px 14px; background: #1a1e24; border: 1px solid var(--border); border-radius: 14px; color: var(--text); font-size: 12px; outline: none; }
.browser-url:focus { border-color: var(--accent); }
.browser-content { height: calc(100% - 46px); background: #fff; color: #333; padding: 50px 40px; overflow: auto; text-align: center; user-select: text; }
.browser-content h1 { font-size: 42px; margin-bottom: 16px; }
.browser-content p { font-size: 15px; color: #666; max-width: 500px; margin: 0 auto 16px; line-height: 1.6; }
.browser-tile { background: #f5f5f7; padding: 22px; border-radius: 12px; cursor: pointer; transition: all 0.2s; }
.browser-tile:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }

.settings { padding: 22px; height: 100%; overflow-y: auto; }
.settings h2 { margin-bottom: 20px; font-size: 22px; font-weight: 300; }
.settings-section { background: #252a32; border-radius: 6px; padding: 16px; margin-bottom: 14px; }
.settings-section h3 { font-size: 13px; margin-bottom: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
.setting-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; font-size: 13px; }
.setting-row:not(:last-child) { border-bottom: 1px solid var(--border); }
.setting-row .value { color: var(--text-muted); }

.pictures { padding: 16px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; height: 100%; overflow-y: auto; }
.picture { aspect-ratio: 1; border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.2s; position: relative; }
.picture:hover { transform: scale(1.04); }
.picture-label { position: absolute; bottom: 0; left: 0; right: 0; padding: 8px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); color: #fff; font-size: 12px; font-weight: 500; }

.file-explorer { display: flex; flex-direction: column; height: 100%; }
.explorer-toolbar { padding: 10px 14px; background: #252a32; border-bottom: 1px solid var(--border); font-size: 13px; display: flex; align-items: center; gap: 8px; }
.explorer-content { flex: 1; padding: 16px; overflow-y: auto; }
.drive-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; }
.drive { display: flex; flex-direction: column; align-items: center; padding: 16px 8px; border-radius: 6px; cursor: pointer; text-align: center; transition: background 0.15s; }
.drive:hover { background: rgba(255,255,255,0.06); }
.drive .icon { font-size: 40px; margin-bottom: 8px; }
.drive .name { font-size: 12px; margin-bottom: 4px; }
.drive .size { font-size: 10px; color: var(--text-muted); }
.section-header { margin: 16px 0 10px; color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
.section-header:first-child { margin-top: 0; }

#shutdown { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10001; color: #fff; }
#shutdown.show { display: flex; }
.shutdown-spinner { width: 50px; height: 50px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 30px; }
.shutdown-text { font-size: 18px; letter-spacing: 2px; }

#notif { position: fixed; bottom: 60px; right: 20px; background: var(--success); color: #fff; padding: 10px 18px; border-radius: 6px; font-size: 13px; z-index: 9000; box-shadow: 0 6px 20px rgba(0,0,0,0.4); opacity: 0; transform: translateY(20px); transition: all 0.3s; pointer-events: none; }
#notif.show { opacity: 1; transform: translateY(0); }

::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #3a3f47; border-radius: 5px; }
::-webkit-scrollbar-thumb:hover { background: #4a4f57; }
</style>
</head>
<body>

<div id="boot">
  <div class="boot-logo">Web<span>OS</span></div>
  <div class="boot-spinner"></div>
  <div class="boot-progress"><div class="boot-progress-bar"></div></div>
  <div class="boot-text">Starting up...</div>
</div>

<div id="shutdown">
  <div class="shutdown-spinner"></div>
  <div class="shutdown-text">Shutting down...</div>
</div>

<div id="desktop">
  <div id="desktop-icons"></div>
</div>

<div id="taskbar">
  <button id="start-btn">
    <div class="start-logo"><div></div><div></div><div></div><div></div></div>
    <span>Start</span>
  </button>
  <div id="taskbar-apps"></div>
  <div id="system-tray">
    <span class="tray-icon" title="Network">📶</span>
    <span class="tray-icon" title="Volume">🔊</span>
    <span class="tray-icon" title="Battery">🔋</span>
    <div id="clock">
      <div class="time">00:00</div>
      <div class="date">1/1/2024</div>
    </div>
  </div>
</div>

<div id="start-menu">
  <div class="start-search">
    <input type="text" placeholder="Search apps..." id="start-search">
  </div>
  <div class="start-apps" id="start-apps"></div>
  <div class="start-footer">
    <div class="start-user">
      <div class="avatar">U</div>
      <span>User</span>
    </div>
    <button class="power-btn" id="power-btn" title="Shut down">⏻</button>
  </div>
</div>

<div id="context-menu"></div>
<div id="notif"></div>

<script>
const state = { windows: [], zIndex: 100, activeWindow: null, iconPositions: {} };

const apps = {
  mycomputer: { name: 'My Computer', icon: '🖥️', title: 'My Computer' },
  recycle: { name: 'Recycle Bin', icon: '🗑️', title: 'Recycle Bin' },
  notepad: { name: 'Notepad', icon: '📝', title: 'Notepad' },
  calculator: { name: 'Calculator', icon: '🔢', title: 'Calculator' },
  browser: { name: 'Browser', icon: '🌐', title: 'Browser' },
  terminal: { name: 'Terminal', icon: '⌨️', title: 'Terminal' },
  settings: { name: 'Settings', icon: '⚙️', title: 'Settings' },
  pictures: { name: 'Pictures', icon: '🖼️', title: 'Pictures' }
};

const desktopIcons = ['mycomputer', 'recycle', 'notepad', 'calculator', 'browser', 'terminal', 'settings', 'pictures'];

function showNotif(text) {
  const n = document.getElementById('notif');
  n.textContent = text;
  n.classList.add('show');
  clearTimeout(n._t);
  n._t = setTimeout(() => n.classList.remove('show'), 1800);
}

function bootSequence() {
  const bar = document.querySelector('.boot-progress-bar');
  const boot = document.getElementById('boot');
  let progress = 0;
  const interval = setInterval(() => {
    progress += Math.random() * 14 + 6;
    if (progress >= 100) {
      progress = 100;
      clearInterval(interval);
      setTimeout(() => {
        boot.classList.add('fade');
        setTimeout(() => boot.style.display = 'none', 800);
      }, 400);
    }
    bar.style.width = progress + '%';
  }, 180);
}

function renderDesktopIcons() {
  const container = document.getElementById('desktop-icons');
  container.innerHTML = '';
  desktopIcons.forEach((appId, index) => {
    const app = apps[appId];
    const icon = document.createElement('div');
    icon.className = 'desktop-icon';
    icon.dataset.app = appId;
    
    const col = Math.floor(index / 6);
    const row = index % 6;
    const defaultX = 16 + col * 100;
    const defaultY = 16 + row * 100;
    
    const savedPos = state.iconPositions[appId];
    const x = savedPos ? savedPos.x : defaultX;
    const y = savedPos ? savedPos.y : defaultY;
    
    icon.style.left = x + 'px';
    icon.style.top = y + 'px';
    
    icon.innerHTML = `<div class="icon-img">${app.icon}</div><div class="icon-label">${app.name}</div>`;
    
    icon.addEventListener('click', (e) => {
      e.stopPropagation();
      document.querySelectorAll('.desktop-icon').forEach(i => i.classList.remove('selected'));
      icon.classList.add('selected');
    });
    
    icon.addEventListener('dblclick', () => openApp(appId));
    makeIconDraggable(icon, appId);
    container.appendChild(icon);
  });
}

function makeIconDraggable(icon, appId) {
  let isDragging = false, startX, startY, origX, origY;
  
  icon.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    isDragging = false;
    startX = e.clientX;
    startY = e.clientY;
    const rect = icon.getBoundingClientRect();
    const desktop = document.getElementById('desktop').getBoundingClientRect();
    origX = rect.left - desktop.left;
    origY = rect.top - desktop.top;
    
    const onMove = (ev) => {
      if (!isDragging && (Math.abs(ev.clientX - startX) > 4 || Math.abs(ev.clientY - startY) > 4)) {
        isDragging = true;
      }
      if (isDragging) {
        let newX = origX + (ev.clientX - startX);
        let newY = origY + (ev.clientY - startY);
        newX = Math.max(0, Math.min(newX, desktop.width - icon.offsetWidth));
        newY = Math.max(0, Math.min(newY, desktop.height - icon.offsetHeight));
        icon.style.left = newX + 'px';
        icon.style.top = newY + 'px';
      }
    };
    
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      if (isDragging) {
        const rect = icon.getBoundingClientRect();
        const desktop = document.getElementById('desktop').getBoundingClientRect();
        state.iconPositions[appId] = { x: rect.left - desktop.left, y: rect.top - desktop.top };
      }
    };
    
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

document.getElementById('desktop').addEventListener('click', (e) => {
  if (e.target.id === 'desktop' || e.target.id === 'desktop-icons') {
    document.querySelectorAll('.desktop-icon').forEach(i => i.classList.remove('selected'));
  }
});

let windowIdCounter = 0;

function openApp(appId) {
  if (appId !== 'notepad') {
    const existing = state.windows.find(w => w.appId === appId);
    if (existing) {
      if (existing.minimized) {
        existing.element.classList.remove('minimized');
        existing.minimized = false;
      }
      focusWindow(existing.id);
      closeStartMenu();
      return;
    }
  }
  
  const id = 'win-' + (++windowIdCounter);
  const app = apps[appId];
  const size = getDefaultSize(appId);
  
  const win = document.createElement('div');
  win.className = 'window';
  win.id = id;
  const offset = state.windows.length * 28;
  win.style.left = (100 + offset % 200) + 'px';
  win.style.top = (40 + offset % 160) + 'px';
  win.style.width = size.w + 'px';
  win.style.height = size.h + 'px';
  win.style.zIndex = ++state.zIndex;
  
  win.innerHTML = `
    <div class="window-titlebar">
      <div class="window-title">${app.icon} ${app.title}</div>
      <div class="window-controls">
        <button class="window-btn min" title="Minimize">▁</button>
        <button class="window-btn max" title="Maximize">▢</button>
        <button class="window-btn close" title="Close">✕</button>
      </div>
    </div>
    <div class="window-content" id="${id}-content"></div>
    <div class="resize-handle"></div>
  `;
  
  document.body.appendChild(win);
  
  const winState = { id, appId, element: win, title: app.title, maximized: false, minimized: false };
  state.windows.push(winState);
  
  setupWindowControls(winState);
  makeWindowDraggable(winState);
  makeWindowResizable(winState);
  
  renderAppContent(appId, id + '-content', winState);
  
  focusWindow(id);
  renderTaskbar();
  closeStartMenu();
}

function getDefaultSize(appId) {
  const sizes = {
    calculator: { w: 320, h: 470 },
    terminal: { w: 640, h: 420 },
    notepad: { w: 520, h: 420 },
    browser: { w: 720, h: 520 },
    settings: { w: 520, h: 460 },
    pictures: { w: 620, h: 460 },
    mycomputer: { w: 620, h: 420 },
    recycle: { w: 500, h: 360 }
  };
  return sizes[appId] || { w: 500, h: 400 };
}

function setupWindowControls(winState) {
  const win = winState.element;
  win.querySelector('.min').addEventListener('click', (e) => { e.stopPropagation(); toggleMinimize(winState.id); });
  win.querySelector('.max').addEventListener('click', (e) => { e.stopPropagation(); toggleMaximize(winState); });
  win.querySelector('.close').addEventListener('click', (e) => { e.stopPropagation(); closeWindow(winState.id); });
  win.addEventListener('mousedown', () => focusWindow(winState.id));
  win.querySelector('.window-titlebar').addEventListener('dblclick', (e) => {
    if (!e.target.classList.contains('window-btn')) toggleMaximize(winState);
  });
}

function toggleMinimize(id) {
  const ws = state.windows.find(w => w.id === id);
  if (!ws) return;
  ws.element.classList.add('minimized');
  ws.minimized = true;
  state.activeWindow = null;
  renderTaskbar();
}

function toggleMaximize(ws) {
  if (ws.maximized) {
    ws.element.style.left = ws.prev.left;
    ws.element.style.top = ws.prev.top;
    ws.element.style.width = ws.prev.width;
    ws.element.style.height = ws.prev.height;
    ws.maximized = false;
  } else {
    ws.prev = { left: ws.element.style.left, top: ws.element.style.top, width: ws.element.style.width, height: ws.element.style.height };
    ws.element.style.left = '0px';
    ws.element.style.top = '0px';
    ws.element.style.width = '100%';
    ws.element.style.height = (window.innerHeight - 48) + 'px';
    ws.maximized = true;
  }
}

function closeWindow(id) {
  const idx = state.windows.findIndex(w => w.id === id);
  if (idx === -1) return;
  state.windows[idx].element.style.transition = 'opacity 0.15s, transform 0.15s';
  state.windows[idx].element.style.opacity = '0';
  state.windows[idx].element.style.transform = 'scale(0.95)';
  setTimeout(() => {
    state.windows[idx].element.remove();
    state.windows.splice(idx, 1);
    renderTaskbar();
  }, 150);
}

function focusWindow(id) {
  const ws = state.windows.find(w => w.id === id);
  if (!ws) return;
  ws.element.style.zIndex = ++state.zIndex;
  state.activeWindow = id;
  renderTaskbar();
}

function makeWindowDraggable(ws) {
  const win = ws.element;
  const titlebar = win.querySelector('.window-titlebar');
  let isDragging = false, startX, startY, origLeft, origTop;
  
  titlebar.addEventListener('mousedown', (e) => {
    if (e.target.classList.contains('window-btn')) return;
    if (ws.maximized) return;
    isDragging = true;
    startX = e.clientX;
    startY = e.clientY;
    origLeft = parseInt(win.style.left) || 0;
    origTop = parseInt(win.style.top) || 0;
    document.body.style.cursor = 'grabbing';
    e.preventDefault();
  });
  
  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    let newLeft = origLeft + (e.clientX - startX);
    let newTop = Math.max(0, origTop + (e.clientY - startY));
    newTop = Math.min(newTop, window.innerHeight - 80);
    win.style.left = newLeft + 'px';
    win.style.top = newTop + 'px';
  });
  
  document.addEventListener('mouseup', () => {
    if (isDragging) {
      isDragging = false;
      document.body.style.cursor = '';
    }
  });
}

function makeWindowResizable(ws) {
  const win = ws.element;
  const handle = win.querySelector('.resize-handle');
  let isResizing = false, startX, startY, origW, origH;
  
  handle.addEventListener('mousedown', (e) => {
    if (ws.maximized) return;
    isResizing = true;
    startX = e.clientX;
    startY = e.clientY;
    origW = win.offsetWidth;
    origH = win.offsetHeight;
    e.preventDefault();
    e.stopPropagation();
  });
  
  document.addEventListener('mousemove', (e) => {
    if (!isResizing) return;
    const newW = Math.max(280, origW + (e.clientX - startX));
    const newH = Math.max(180, origH + (e.clientY - startY));
    win.style.width = newW + 'px';
    win.style.height = newH + 'px';
  });
  
  document.addEventListener('mouseup', () => { isResizing = false; });
}

function renderTaskbar() {
  const c = document.getElementById('taskbar-apps');
  c.innerHTML = '';
  state.windows.forEach(ws => {
    const app = apps[ws.appId];
    const btn = document.createElement('button');
    btn.className = 'taskbar-app';
    if (state.activeWindow === ws.id && !ws.minimized) btn.classList.add('active');
    btn.innerHTML = `<span style="font-size:15px">${app.icon}</span><span>${ws.title}</span>`;
    btn.addEventListener('click', () => {
      if (ws.minimized) {
        ws.element.classList.remove('minimized');
        ws.minimized = false;
        focusWindow(ws.id);
      } else if (state.activeWindow === ws.id) {
        toggleMinimize(ws.id);
      } else {
        focusWindow(ws.id);
      }
    });
    c.appendChild(btn);
  });
}

function renderStartMenu() {
  const c = document.getElementById('start-apps');
  c.innerHTML = '<div class="start-section-title">All Apps</div>';
  desktopIcons.forEach(appId => {
    const app = apps[appId];
    const item = document.createElement('div');
    item.className = 'start-app';
    item.innerHTML = `<div class="icon">${app.icon}</div><div class="name">${app.name}</div>`;
    item.addEventListener('click', () => openApp(appId));

  });
  
  const search = document.getElementById('start-search');

    const q = e.target.value.toLowerCase();
    c.querySelectorAll('.start-app').forEach(item => {
      const name = item.querySelector('.name').textContent.toLowerCase();
      item.style.display = name.includes(q) ? 'flex' : 'none';
    });
  });
}

function toggleStartMenu() {
  const menu = document.getElementById('start-menu');
  const btn = document.getElementById('start-btn');
  if (menu.classList.contains('open')) closeStartMenu();
  else {
    menu.classList.add('open');
    btn.classList.add('active');
    document.getElementById('start-search').value = '';
    document.getElementById('start-search').focus();
    document.querySelectorAll('.start-app').forEach(i => i.style.display = 'flex');
  }
}

function closeStartMenu() {
  document.getElementById('start-menu').classList.remove('open');
  document.getElementById('start-btn').classList.remove('active');
}

document.getElementById('start-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  toggleStartMenu();
});

document.getElementById('power-btn').addEventListener('click', shutdown);

function shutdown() {
  const s = document.getElementById('shutdown');
  s.classList.add('show');
  closeStartMenu();
  setTimeout(() => {
    state.windows.forEach(w => w.element.remove());
    state.windows = [];
    state.activeWindow = null;
    renderTaskbar();
    s.classList.remove('show');
    const boot = document.getElementById('boot');
    boot.style.display = 'flex';
    boot.classList.remove('fade');

}

function showContextMenu(x, y) {
  const m = document.getElementById('context-menu');
  m.innerHTML = '';
  contextMenuItems.forEach(item => {
    if (item.sep) {
      const s = document.createElement('div');
      s.className = 'ctx-separator';
      m.appendChild(s);
    } else {
      const el = document.createElement('div');
      el.className = 'ctx-item';
      el.innerHTML = `<span class="ctx-icon">${item.icon}</span><span>${item.label}</span>`;
      if (item.action) {
        el.addEventListener('click', () => { item.action(); closeContextMenu(); });
      } else {
        el.addEventListener('click', closeContextMenu);
      }
      m.appendChild(el);
    }
  });
  m.classList.add('open');
  const r = m.getBoundingClientRect();
  if (x + r.width > window.innerWidth) x = window.innerWidth - r.width - 10;
  if (y + r.height > window.innerHeight - 48) y = window.innerHeight - 48 - r.height - 10;
  m.style.left = x + 'px';
  m.style.top = y + 'px';
}

function closeContextMenu() { document.getElementById('context-menu').classList.remove('open'); }

  document.querySelector('#clock .time').textContent = `${h}:${min} ${ampm}`;
  document.querySelector('#clock .date').textContent = `${now.getMonth()+1}/${now.getDate()}/${now.getFullYear()}`;
}

function renderCalculator(contentId) {
  const c = document.getElementById(contentId);
  c.innerHTML = `
    <div class="calc">
      <div class="calc-display">
        <div class="calc-history"></div>
        <div class="calc-current">0</div>
      </div>
      <div class="calc-buttons">
        <button class="calc-btn clear" data-v="C">C</button>
        <button class="calc-btn" data-v="±">±</button>
        <button class="calc-btn" data-v="%">%</button>
        <button class="calc-btn op" data-v="/">÷</button>
        <button class="calc-btn" data-v="7">7</button>
        <button class="calc-btn" data-v="8">8</button>
        <button class="calc-btn" data-v="9">9</button>
        <button class="calc-btn op" data-v="*">×</button>
        <button class="calc-btn" data-v="4">4</button>
        <button class="calc-btn" data-v="5">5</button>
        <button class="calc-btn" data-v="6">6</button>
        <button class="calc-btn op" data-v="-">−</button>
        <button class="calc-btn" data-v="1">1</button>
        <button class="calc-btn" data-v="2">2</button>
        <button class="calc-btn" data-v="3">3</button>
        <button class="calc-btn op" data-v="+">+</button>
        <button class="calc-btn" data-v="0">0</button>
        <button class="calc-btn" data-v=".">.</button>
        <button class="calc-btn eq" data-v="=">=</button>
      </div>
    </div>
  `;
  
  const cur = c.querySelector('.calc-current');
  const hist = c.querySelector('.calc-history');
  let cs = { current: '0', previous: null, op: null, reset: false };
  
  function update() {
    cur.textContent = cs.current.length > 12 ? parseFloat(cs.current).toExponential(6) : cs.current;
    hist.textContent = (cs.previous !== null && cs.op) ? `${cs.previous} ${cs.op}` : '';
  }
  
  function compute(a, b, op) {
    a = parseFloat(a); b = parseFloat(b);
    switch (op) {
      case '+': return a + b;
      case '-': return a - b;
      case '*': return a * b;
      case '/': return b === 0 ? 'Error' : a / b;
    }
  }
  
  function input(v) {
    if (v >= '0' && v <= '9') {
      if (cs.current === '0' || cs.reset) { cs.current = v; cs.reset = false; }
      else cs.current += v;
    } else if (v === '.') {
      if (cs.reset) { cs.current = '0.'; cs.reset = false; }
      else if (!cs.current.includes('.')) cs.current += '.';
    } else if (v === 'C') {
      cs = { current: '0', previous: null, op: null, reset: false };
    } else if (v === '±') {
      cs.current = String(parseFloat(cs.current) * -1);
    } else if (v === '%') {
      cs.current = String(parseFloat(cs.current) / 100);
    } else if (['+','-','*','/'].includes(v)) {
      if (cs.previous !== null && !cs.reset) cs.current = String(compute(cs.previous, cs.current, cs.op));
      cs.previous = cs.current;
      cs.op = v;
      cs.reset = true;
    } else if (v === '=') {
      if (cs.previous !== null && cs.op) {
        const r = compute(cs.previous, cs.current, cs.op);
        hist.textContent = `${cs.previous} ${cs.op} ${cs.current} =`;
        cs.current = String(r);
        cs.previous = null;
        cs.op = null;
        cs.reset = true;
      }
    }
    update();
  }
  
  c.querySelectorAll('.calc-btn').forEach(b => b.addEventListener('click', () => input(b.dataset.v)));
  update();
}

function renderTerminal(contentId) {
  const c = document.getElementById(contentId);
  c.innerHTML = `<div class="terminal"></div>`;
  const term = c.querySelector('.terminal');
  const hist = [];
  let hi = -1;
  
  function out(text, cls = '') {
    const d = document.createElement('div');
    d.className = 'terminal-output ' + cls;
    d.textContent = text;
    term.insertBefore(d, term.lastElementChild);
    term.scrollTop = term.scrollHeight;
  }
  
  function newline() {
    const line = document.createElement('div');
    line.className = 'terminal-input-line';
    line.innerHTML = `<span class="terminal-prompt">user@webos:~$</span><input type="text" class="terminal-input" autocomplete="off" autofocus>`;
    term.appendChild(line);
    const inp = line.querySelector('input');
    inp.focus();
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const cmd = inp.value;
        inp.disabled = true;
        if (cmd.trim()) { hist.push(cmd); hi = hist.length; }
        process(cmd);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (hi > 0) { hi--; inp.value = hist[hi]; }
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (hi < hist.length - 1) { hi++; inp.value = hist[hi]; }
        else { hi = hist.length; inp.value = ''; }
      }
    });
  }
  
  function process(cmd) {
    const parts = cmd.trim().split(/\s+/);
    const command = parts[0].toLowerCase();
    const args = parts.slice(1);
    
    if (command === '') {}
    else if (command === 'help') {
      out(`Available commands:
  help       Show this help message
  date       Display current date and time
  echo       Print text (usage: echo hello world)
  clear      Clear the terminal screen
  ls         List directory contents
  whoami     Print current user
  ver        Show OS version
  history    Show command history
  about      About WebOS
  exit       Close terminal`);
    } else if (command === 'date') out(new Date().toString());
    else if (command === 'echo') out(args.join(' '));
    else if (command === 'clear') term.querySelectorAll('.terminal-output').forEach(el => el.remove());
    else if (command === 'ls') out(`Desktop/
Documents/
Downloads/
Pictures/
Music/
Videos/
readme.txt
.bashrc`);
    else if (command === 'whoami') out('user');
    else if (command === 'ver') out('WebOS 1.0.0 (Build 2024.1)');
    else if (command === 'history') hist.forEach((h, i) => out(`  ${i+1}  ${h}`));
    else if (command === 'about') out(`WebOS - A web-based operating system
Built with HTML, CSS, and JavaScript.
No external dependencies. Single file application.
© 2024 WebOS Project`);
    else if (command === 'exit') { const w = c.closest('.window'); if (w) closeWindow(w.id); return; }
    else out(`'${command}' is not recognized as a command. Type 'help' for available commands.`, 'terminal-error');
    
    newline();
  }
  
  out(`WebOS Terminal [Version 1.0.0]
(c) 2024 WebOS Project. All rights reserved.
Type 'help' for available commands.\n`);
  newline();
  
  term.addEventListener('click', () => {
    const last = term.querySelector('.terminal-input-line:last-child input');
    if (last && !last.disabled) last.focus();
  });
}

        <div class="browser-tile" data-url="webos://search">🔍<br><b>Search</b></div>
        <div class="browser-tile" data-url="webos://docs">📚<br><b>Docs</b></div>
        <div class="browser-tile" data-url="webos://about">ℹ️<br><b>About</b></div>
      </div>
    </div>
  `;
  
  const url = c.querySelector('.browser-url');
  const content = c.querySelector('.browser-content');
  
  function navigate(addr) {
    url.value = addr;
    if (addr === 'webos://home') {
      content.innerHTML = `<h1>🌐 WebOS Browser</h1><p>Welcome to your simulated browser.</p>`;
    } else if (addr === 'webos://search') {
      content.innerHTML = `<h1>🔍 Search</h1><p>Search functionality is simulated.</p>`;
    } else if (addr === 'webos://docs') {
      content.innerHTML = `<h1>📚 Documentation</h1><p>WebOS documentation would appear here.</p>`;
    } else if (addr === 'webos://about') {
      content.innerHTML = `<h1>ℹ️ About</h1><p>WebOS Version 1.0.0</p>`;
    } else {
      content.innerHTML = `<h1>📄 ${addr}</h1><p>This is a simulated page for <b>${addr}</b>.</p><div style="margin-top:30px;color:#999;font-size:13px;">External content cannot be loaded in this environment.</div>`;
    }
  }
  
  url.addEventListener('keydown', (e) => { if (e.key === 'Enter') navigate(url.value); });
  c.querySelectorAll('.browser-tile').forEach(t => t.addEventListener('click', () => navigate(t.dataset.url)));
  c.querySelectorAll('.browser-btn').forEach(b => b.addEventListener('click', () => navigate('webos://home')));
}

function renderPictures(contentId) {
  const c = document.getElementById(contentId);
  const grads = [
    ['#ff6b6b', '#feca57'], ['#48dbfb', '#0abde3'], ['#a55eea', '#8854d0'],
    ['#26de81', '#20bf6b'], ['#fc5c65', '#fd9644'], ['#45aaf2', '#2d98da'],
    ['#f7b731', '#fa8231'], ['#a5b1c7', '#4b6584'], ['#fd79a8', '#e84393'],
    ['#00b894', '#00cec9'], ['#6c5ce7', '#a29bfe'], ['#dfe6e9', '#b2bec3']
  ];
  const labels = ['Sunset', 'Ocean', 'Lavender', 'Forest', 'Ember', 'Sky', 'Amber', 'Steel', 'Rose', 'Mint', 'Twilight', 'Pearl'];
  
  c.innerHTML = '<div class="pictures"></div>';
  const grid = c.querySelector('.pictures');
  
  grads.forEach((g, i) => {
    const pic = document.createElement('div');
    pic.className = 'picture';
    pic.style.background = `linear-gradient(135deg, ${g[0]}, ${g[1]})`;
    pic.innerHTML = `<div class="picture-label">${labels[i]}</div>`;
    pic.addEventListener('click', () => {
      const id = 'win-' + (++windowIdCounter);
      const win = document.createElement('div');
      win.className = 'window';
      win.id = id;
      win.style.left = '180px'; win.style.top = '90px';
      win.style.width = '520px'; win.style.height = '420px';
      win.style.zIndex = ++state.zIndex;
      win.innerHTML = `
        <div class="window-titlebar">
          <div class="window-title">🖼️ ${labels[i]}</div>
          <div class="window-controls">
            <button class="window-btn min">▁</button>
            <button class="window-btn max">▢</button>
            <button class="window-btn close">✕</button>
          </div>
        </div>
        <div class="window-content" style="background: linear-gradient(135deg, ${g[0]}, ${g[1]});"></div>
        <div class="resize-handle"></div>
      `;
      document.body.appendChild(win);
      const ws = { id, appId: 'pictures', element: win, title: labels[i], maximized: false, minimized: false };
      state.windows.push(ws);
      setupWindowControls(ws);
      makeWindowDraggable(ws);
      makeWindowResizable(ws);
      focusWindow(id);
      renderTaskbar();
    });
    grid.appendChild(pic);
  });
}

document.addEventListener('click', (e) => {
  const menu = document.getElementById('start-menu');
  const btn = document.getElementById('start-btn');
  if (!menu.contains(e.target) && !btn.contains(e.target)) closeStartMenu();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { closeStartMenu(); closeContextMenu(); }
  if (e.key === 'Meta' || (e.ctrlKey && e.key === 'Meta')) {
    e.preventDefault();
    toggleStartMenu();
  }
});

window.addEventListener('resize', () => {
  state.windows.forEach(ws => {
    if (ws.maximized) {
      ws.element.style.height = (window.innerHeight - 48) + 'px';
    }
  });
});

renderDesktopIcons();
renderStartMenu();
renderTaskbar();
bootSequence();
