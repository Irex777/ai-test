<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusOS — Web Desktop Environment</title>
<style>
:root {
  --bg-0: #050608;
  --bg-1: #0b0d12;
  --bg-2: #11141b;
  --bg-3: #161a23;
  --bg-4: #1d222d;
  --border: rgba(255, 255, 255, 0.06);
  --border-strong: rgba(255, 255, 255, 0.12);
  --text: #e8ecf1;
  --text-dim: #7a8290;
  --text-muted: #4a5260;
  --accent: #ff7849;
  --accent-2: #ffb547;
  --accent-glow: rgba(255, 120, 73, 0.35);
  --teal: #4ecdc4;
  --success: #4ade80;
  --danger: #ef4444;
  --warn: #fbbf24;
  --shadow-lg: 0 24px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.04);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  width: 100%;
  overflow: hidden;
  background: var(--bg-0);
  color: var(--text);
  font-family: 'Segoe UI', 'SF Pro Text', system-ui, -apple-system, sans-serif;
  font-size: 14px;
  user-select: none;
  -webkit-font-smoothing: antialiased;
}

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea { font-family: inherit; }

/* ================= BOOT SCREEN ================= */
#boot {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, #0a0d14 0%, #04060a 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10000;
  transition: opacity 0.6s ease;
}
#boot.done { opacity: 0; pointer-events: none; }

.boot-logo {
  width: 96px;
  height: 96px;
  position: relative;
  margin-bottom: 32px;
}
.boot-logo::before, .boot-logo::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 22px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  box-shadow: 0 0 60px var(--accent-glow);
}
.boot-logo::after {
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  animation: bootSpin 1.6s cubic-bezier(0.7, 0, 0.3, 1) infinite;
  transform-origin: center;
}
.boot-logo > span {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-size: 44px;
  color: #0a0d14;
  z-index: 2;
  letter-spacing: -2px;
}
@keyframes bootSpin {
  0% { transform: rotate(0deg); border-radius: 22px; }
  50% { transform: rotate(180deg); border-radius: 50%; }
  100% { transform: rotate(360deg); border-radius: 22px; }
}

.boot-title {
  font-size: 32px;
  font-weight: 200;
  letter-spacing: 12px;
  color: var(--text);
  margin-bottom: 6px;
  text-transform: uppercase;
}
.boot-title b { font-weight: 800; color: var(--accent); }
.boot-sub {
  font-size: 11px;
  letter-spacing: 4px;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-bottom: 56px;
}

.boot-bar {
  width: 240px;
  height: 2px;
  background: rgba(255, 255, 255, 0.08);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
}
.boot-bar::after {
  content: '';
  position: absolute;
  left: -40%;
  top: 0;
  width: 40%;
  height: 100%;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  animation: bootBarLoad 1.4s ease-in-out infinite;
}
@keyframes bootBarLoad {
  0% { left: -40%; }
  100% { left: 100%; }
}

.boot-status {
  margin-top: 20px;
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 2px;
  font-family: 'Consolas', 'Courier New', monospace;
  min-height: 14px;
}

/* ================= DESKTOP ================= */
#desktop {
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(255, 120, 73, 0.08) 0%, transparent 50%),
    radial-gradient(ellipse 70% 50% at 80% 90%, rgba(78, 205, 196, 0.06) 0%, transparent 50%),
    radial-gradient(ellipse 60% 80% at 50% 50%, rgba(20, 24, 32, 1) 0%, #06080c 100%);
  overflow: hidden;
}

#desktop::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: 
    radial-gradient(circle at 1px 1px, rgba(255, 255, 255, 0.025) 1px, transparent 0);
  background-size: 28px 28px;
  pointer-events: none;
}

#desktop::after {
  content: '';
  position: absolute;
  inset: 0;
  background: 
    linear-gradient(180deg, transparent 0%, transparent 50%, rgba(0, 0, 0, 0.3) 100%);
  pointer-events: none;
}

.desktop-glow {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.5;
  pointer-events: none;
  animation: floatGlow 20s ease-in-out infinite;
}
.desktop-glow.g1 {
  width: 400px; height: 400px;
  background: var(--accent);
  top: -100px; right: -100px;
  opacity: 0.15;
}
.desktop-glow.g2 {
  width: 500px; height: 500px;
  background: var(--teal);
  bottom: -150px; left: -150px;
  opacity: 0.1;
  animation-delay: -10s;
}
@keyframes floatGlow {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(40px, -30px); }
}

/* ================= ICONS ================= */
#icons-container {
  position: absolute;
  top: 24px;
  left: 24px;
  display: grid;
  grid-template-columns: repeat(2, 92px);
  grid-auto-rows: 92px;
  gap: 8px;
  z-index: 1;
}

.desktop-icon {
  width: 92px;
  height: 92px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px 4px;
  border-radius: 8px;
  border: 1px solid transparent;
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s;
  position: relative;
}
.desktop-icon:hover {
  background: rgba(255, 255, 255, 0.04);
  border-color: rgba(255, 255, 255, 0.08);
}
.desktop-icon.selected {
  background: rgba(255, 120, 73, 0.12);
  border-color: rgba(255, 120, 73, 0.3);
}
.desktop-icon.dragging { opacity: 0.4; }

.icon-glyph {
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.4));
}
.icon-glyph svg { width: 100%; height: 100%; }

.icon-label {
  font-size: 12px;
  color: var(--text);
  text-align: center;
  text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-weight: 500;
}

/* ================= WINDOWS ================= */
.window {
  position: absolute;
  background: var(--bg-2);
  border: 1px solid var(--border-strong);
  border-radius: 10px;
  box-shadow: var(--shadow-lg);
  display: flex;
  flex-direction: column;
  min-width: 320px;
  min-height: 200px;
  overflow: hidden;
  animation: windowOpen 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
}
@keyframes windowOpen {
  from { transform: scale(0.92); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.window.closing {
  animation: windowClose 0.18s ease-in forwards;
}
@keyframes windowClose {
  to { transform: scale(0.92); opacity: 0; }
}
.window.minimized {
  animation: windowMinimize 0.25s cubic-bezier(0.4, 0, 0.6, 1) forwards;
  pointer-events: none;
}
@keyframes windowMinimize {
  to { transform: translateY(60vh) scale(0.3); opacity: 0; }
}
.window.maximized {
  border-radius: 0 !important;
}
.window.inactive {
  box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.03);
}

.window-header {
  height: 38px;
  background: linear-gradient(180deg, var(--bg-3), var(--bg-2));
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 6px 0 14px;
  cursor: grab;
  user-select: none;
  flex-shrink: 0;
}
.window-header:active { cursor: grabbing; }
.window.inactive .window-header { opacity: 0.7; }

.window-title {
  flex: 1;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}
.window-title .wt-icon {
  width: 16px; height: 16px;
  display: flex; align-items: center; justify-content: center;
}
.window-title .wt-icon svg { width: 100%; height: 100%; }

.window-controls {
  display: flex;
  gap: 2px;
}
.wc-btn {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  transition: background 0.12s, color 0.12s;
}
.wc-btn:hover { background: rgba(255, 255, 255, 0.08); color: var(--text); }
.wc-btn.close:hover { background: rgba(239, 68, 68, 0.2); color: #fca5a5; }
.wc-btn svg { width: 12px; height: 12px; }

.window-body {
  flex: 1;
  overflow: hidden;
  position: relative;
  background: var(--bg-1);
}

.resize-handle {
  position: absolute;
  z-index: 10;
}
.rh-e { right: 0; top: 0; width: 6px; height: 100%; cursor: e-resize; }
.rh-w { left: 0; top: 0; width: 6px; height: 100%; cursor: w-resize; }
.rh-s { bottom: 0; left: 0; width: 100%; height: 6px; cursor: s-resize; }
.rh-n { top: 0; left: 0; width: 100%; height: 6px; cursor: n-resize; }
.rh-se { bottom: 0; right: 0; width: 14px; height: 14px; cursor: se-resize; z-index: 11; }
.rh-sw { bottom: 0; left: 0; width: 14px; height: 14px; cursor: sw-resize; z-index: 11; }
.rh-ne { top: 0; right: 0; width: 14px; height: 14px; cursor: ne-resize; z-index: 11; }
.rh-nw { top: 0; left: 0; width: 14px; height: 14px; cursor: nw-resize; z-index: 11; }

/* ================= TASKBAR ================= */
#taskbar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 52px;
  background: rgba(11, 13, 18, 0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border-strong);
  display: flex;
  align-items: center;
  padding: 0 8px;
  z-index: 1000;
  gap: 6px;
}

.start-btn {
  height: 40px;
  padding: 0 16px 0 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), #ff5a30);
  color: #1a0d05;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.5px;
  transition: transform 0.12s, box-shadow 0.12s;
  box-shadow: 0 4px 14px rgba(255, 120, 73, 0.3);
}
.start-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(255, 120, 73, 0.45);
}
.start-btn:active { transform: translateY(0); }
.start-btn .start-logo {
  width: 22px; height: 22px;
  background: #1a0d05;
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-size: 14px;
  color: var(--accent);
}

.taskbar-divider {
  width: 1px;
  height: 28px;
  background: var(--border-strong);
  margin: 0 4px;
}

#taskbar-apps {
  flex: 1;
  display: flex;
  gap: 4px;
  align-items: center;
  overflow-x: auto;
  scrollbar-width: none;
}
#taskbar-apps::-webkit-scrollbar { display: none; }

.taskbar-app {
  height: 40px;
  min-width: 44px;
  padding: 0 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 12px;
  font-weight: 500;
  transition: background 0.12s, color 0.12s;
  position: relative;
  max-width: 200px;
}
.taskbar-app:hover { background: rgba(255, 255, 255, 0.08); color: var(--text); }
.taskbar-app.active {
  background: rgba(255, 120, 73, 0.12);
  border-color: rgba(255, 120, 73, 0.3);
  color: var(--text);
}
.taskbar-app .ta-icon { width: 18px; height: 18px; flex-shrink: 0; }
.taskbar-app .ta-icon svg { width: 100%; height: 100%; }
.taskbar-app .ta-label {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.taskbar-app::after {
  content: '';
  position: absolute;
  bottom: -7px;
  left: 50%;
  transform: translateX(-50%);
  width: 16px;
  height: 3px;
  border-radius: 2px;
  background: var(--accent);
  opacity: 0;
  transition: opacity 0.15s;
}
.taskbar-app.has-window::after { opacity: 0.6; }
.taskbar-app.active::after { opacity: 1; width: 20px; }

#system-tray {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 0 8px 0 12px;
  height: 40px;
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid var(--border);
}
.tray-icon {
  width: 30px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  color: var(--text-dim);
  cursor: pointer;
  transition: background 0.12s, color 0.12s;
}
.tray-icon:hover { background: rgba(255, 255, 255, 0.06); color: var(--text); }
.tray-icon svg { width: 16px; height: 16px; }

.tray-clock {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  padding: 0 8px;
  cursor: pointer;
  border-radius: 6px;
  transition: background 0.12s;
}
.tray-clock:hover { background: rgba(255, 255, 255, 0.06); }
.tray-clock .tc-time {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.1;
  font-variant-numeric: tabular-nums;
}
.tray-clock .tc-date {
  font-size: 10px;
  color: var(--text-dim);
  line-height: 1.1;
}

/* ================= START MENU ================= */
#start-menu {
  position: fixed;
  bottom: 60px;
  left: 8px;
  width: 480px;
  max-height: 580px;
  background: rgba(15, 18, 25, 0.92);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  border: 1px solid var(--border-strong);
  border-radius: 14px;
  box-shadow: var(--shadow-lg);
  z-index: 999;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transform-origin: bottom left;
  animation: startMenuOpen 0.18s cubic-bezier(0.2, 0.8, 0.2, 1);
}
@keyframes startMenuOpen {
  from { transform: scale(0.92) translateY(20px); opacity: 0; }
  to { transform: scale(1) translateY(0); opacity: 1; }
}
#start-menu.closing {
  animation: startMenuClose 0.15s ease-in forwards;
}
@keyframes startMenuClose {
  to { transform: scale(0.92) translateY(20px); opacity: 0; }
}

.sm-search {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
}
.sm-search-input-wrap {
  position: relative;
}
.sm-search input {
  width: 100%;
  height: 38px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid var(--border-strong);
  border-radius: 8px;
  padding: 0 14px 0 38px;
  color: var(--text);
  font-size: 13px;
  outline: none;
  transition: border-color 0.12s;
}
.sm-search input:focus { border-color: var(--accent); }
.sm-search input::placeholder { color: var(--text-muted); }
.sm-search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  color: var(--text-dim);
}

.sm-section-title {
  padding: 14px 20px 8px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  font-weight: 600;
}

.sm-apps {
  flex: 1;
  overflow-y: auto;
  padding: 0 12px 12px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4px;
  align-content: start;
}
.sm-apps::-webkit-scrollbar { width: 6px; }
.sm-apps::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

.sm-app {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 14px 6px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.12s;
  text-align: center;
}
.sm-app:hover { background: rgba(255, 255, 255, 0.06); }
.sm-app .sm-app-icon { width: 32px; height: 32px; }
.sm-app .sm-app-icon svg { width: 100%; height: 100%; }
.sm-app .sm-app-name {
  font-size: 11px;
  color: var(--text);
  font-weight: 500;
}

.sm-footer {
  border-top: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sm-user {
  display: flex;
  align-items: center;
  gap: 10px;
}
.sm-user-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  color: #1a0d05;
  font-size: 13px;
}
.sm-user-info .sm-user-name { font-size: 13px; font-weight: 600; }
.sm-user-info .sm-user-email { font-size: 11px; color: var(--text-dim); }

.sm-power {
  display: flex;
  gap: 4px;
}
.sm-power-btn {
  width: 34px; height: 34px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  transition: background 0.12s, color 0.12s;
}
.sm-power-btn:hover { background: rgba(255, 255, 255, 0.08); color: var(--text); }
.sm-power-btn.shutdown:hover { background: rgba(239, 68, 68, 0.2); color: #fca5a5; }
.sm-power-btn svg { width: 16px; height: 16px; }

/* ================= CONTEXT MENU ================= */
.context-menu {
  position: fixed;
  background: rgba(20, 24, 32, 0.96);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border-strong);
  border-radius: 8px;
  box-shadow: var(--shadow-lg);
  padding: 6px;
  min-width: 200px;
  z-index: 5000;
  animation: ctxOpen 0.12s ease-out;
}
@keyframes ctxOpen {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}
.ctx-item {
  padding: 8px 12px;
  border-radius: 5px;
  font-size: 13px;
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: background 0.1s;
}
.ctx-item:hover { background: var(--accent); color: #1a0d05; }
.ctx-item svg { width: 14px; height: 14px; opacity: 0.8; }
.ctx-item:hover svg { opacity: 1; }
.ctx-divider {
  height: 1px;
  background: var(--border);
  margin: 4px 0;
}
.ctx-label {
  padding: 4px 12px;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
}

/* ================= APPS ================= */

/* Notepad */
.notepad-menubar {
  display: flex;
  background: var(--bg-3);
  border-bottom: 1px solid var(--border);
  padding: 0 4px;
  height: 30px;
  align-items: center;
}
.np-menu {
  padding: 5px 10px;
  font-size: 12px;
  color: var(--text);
  border-radius: 4px;
  cursor: pointer;
  position: relative;
}
.np-menu:hover { background: rgba(255, 255, 255, 0.06); }
.np-menu.open { background: rgba(255, 120, 73, 0.15); color: var(--accent); }
.np-dropdown {
  position: absolute;
  top: 100%;
  left: 0;
  margin-top: 2px;
  background: rgba(20, 24, 32, 0.98);
  border: 1px solid var(--border-strong);
  border-radius: 6px;
  box-shadow: var(--shadow-lg);
  padding: 4px;
  min-width: 160px;
  z-index: 100;
  display: none;
}
.np-menu.open .np-dropdown { display: block; }
.np-dd-item {
  padding: 6px 10px;
  font-size: 12px;
  border-radius: 4px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
}
.np-dd-item:hover { background: var(--accent); color: #1a0d05; }
.np-dd-item .shortcut { color: var(--text-muted); font-size: 11px; }
.np-dd-item:hover .shortcut { color: rgba(26, 13, 5, 0.7); }
.np-dd-divider { height: 1px; background: var(--border); margin: 3px 0; }

.notepad-editor {
  flex: 1;
  width: 100%;
  background: var(--bg-1);
  border: none;
  outline: none;
  color: var(--text);
  padding: 16px;
  font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
  font-size: 14px;
  line-height: 1.6;
  resize: none;

/* Calculator */

}
.calc-key {

.terminal-app {

  font-family: 'Consolas', 'Monaco', 'Courier New', monospace;

  padding: 12px 14px;
  overflow-y: auto;
  user-select: text;
  line-height: 1.5;
}
.terminal-app::-webkit-scrollbar { width: 8px; }

.terminal-line { white-space: pre-wrap; word-break: break-all; }
.terminal-line.input-line { display: flex; }
.terminal-prompt { color: var(--accent); margin-right: 8px; flex-shrink: 0; }

.terminal-prompt .tp-sep { color: var(--text-muted); }
.terminal-prompt .tp-path { color: var(--accent-2); }
.terminal-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: #c8d4e0;
  font-family: inherit;
  font-size: inherit;
  caret-color: var(--accent);
}
.terminal-cursor {
  display: inline-block;
  width: 8px;
  height: 14px;
  background: var(--accent);

  margin-left: 2px;
}
@keyframes termBlink { 50% { opacity: 0; } }
.terminal-error { color: #f87171; }
.terminal-success { color: var(--success); }
.terminal-info { color: #60a5fa; }
.terminal-warn { color: var(--warn); }

.browser-app {

}
.browser-toolbar {

}

}

}

.browser-search button {

  border-radius: 21px;

}
.browser-shortcuts {

}
.browser-sc {
  padding: 16px;

}

}

}

.browser-sc .bs-name { font-size: 13px; font-weight: 600; }
.browser-sc .bs-desc { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

/* Settings */
.settings-app {

  height: 100%;

}
.settings-sidebar {

}
.settings-section-title {

}
.settings-nav-item {

}
.settings-card {

}
.settings-row {

}

.settings-row-info .sr-title { font-size: 13px; font-weight: 500; }

.toggle-switch {

}
.toggle-switch::after {

  left: 3px;

}
.toggle-switch.on { background: var(--accent); }
.toggle-switch.on::after { left: 21px; background: #1a0d05; }

.about-info {

}

}
.picture-item .pi-label {

  left: 0;

  color: white;
  font-weight: 500;
}

/* My Computer */
.mc-app {
  height: 100%;
  display: flex;
  flex-direction: column;
  background: var(--bg-1);
}
.mc-toolbar {
  height: 40px;
  background: var(--bg-2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 4px;
}
.mc-toolbar-btn {
  padding: 5px 10px;
  border-radius: 5px;
  font-size: 12px;
  color: var(--text-dim);
  cursor: pointer;
}
.mc-toolbar-btn:hover { background: rgba(255, 255, 255, 0.06); color: var(--text); }
.mc-content {
  flex: 1;
  padding: 18px;
  overflow-y: auto;
}
.mc-section { margin-bottom: 24px; }
.mc-section h3 {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-bottom: 10px;
  font-weight: 600;
}

}

  gap: 12px;

  transition: all 0.12s;
}

.mc-drive-icon svg { width: 100%; height: 100%; }
.mc-drive-info .md-name { font-size: 13px; font-weight: 600; }
.mc-drive-info .md-space { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.mc-drive-bar {
  margin-top: 6px;
  height: 4px;
  background: var(--bg-4);
  border-radius: 2px;
  overflow: hidden;
}
.mc-drive-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent-2));
}

/* Recycle Bin */
.rb-app {
  height: 100%;
  display: flex;
  flex-direction: column;
  background: var(--bg-1);
}
.rb-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

.rb-empty svg { width: 64px; height: 64px; opacity: 0.4; }
.rb-empty .rb-empty-text { font-size: 13px; }

/* Toast */
#toast-container {
  position: fixed;
  bottom: 70px;
  right: 16px;
  z-index: 8000;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}
.toast {
  background: rgba(20, 24, 32, 0.96);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border-strong);
  border-left: 3px solid var(--accent);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 13px;
  color: var(--text);

  max-width: 320px;

.toast.success { border-left-color: var(--success); }
.toast.error { border-left-color: var(--danger); }
.toast.warn { border-left-color: var(--warn); }
@keyframes toastIn {
  from { transform: translateX(120%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}
.toast.closing { animation: toastOut 0.2s ease-in forwards; }
@keyframes toastOut {
  to { transform: translateX(120%); opacity: 0; }
}

/* Shutdown overlay */
#shutdown-overlay {

  inset: 0;
  background: #06080c;
  z-index: 20000;

  justify-content: center;

}

.shutdown-spinner {

// ---------- State ----------
const State = {
  windows: new Map(),
  nextZ: 100,
  activeWindowId: null,
  startMenuOpen: false,
  contextMenu: null,
  selectedIcons: new Set(),
  iconPositions: JSON.parse(localStorage.getItem('nexusos_icon_positions') || '{}'),

// ---------- DOM Refs ----------
const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);
const desktop = $('#desktop');
const iconsContainer = $('#icons-container');
const taskbarApps = $('#taskbar-apps');
const startMenu = $('#start-menu');
const startBtn = $('#start-btn');

// ---------- Boot Sequence ----------
const bootMessages = [
  'Initializing kernel...',
  'Loading device drivers...',
  'Mounting file systems...',
  'Starting system services...',
  'Loading user profile...',
  'Establishing desktop environment...',
  'Almost ready...'
];

function boot() {
  const status = $('#boot-status');
  let i = 0;
  const interval = setInterval(() => {
    if (i < bootMessages.length) {
      status.textContent = bootMessages[i];
      i++;
    } else {
      clearInterval(interval);
    }
  }, 280);
  
  setTimeout(() => {
    $('#boot').classList.add('done');
    setTimeout(() => $('#boot').remove(), 700);
    showToast('Welcome to NexusOS', 'success');
  }, 2400);
}

// ---------- Toast ----------
function showToast(message, type = 'info', duration = 3000) {
  const container = $('#toast-container');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => {
    toast.classList.add('closing');
    setTimeout(() => toast.remove(), 250);
  }, duration);
}

// ---------- Desktop Icons ----------
function renderDesktopIcons() {
  iconsContainer.innerHTML = '';
  DESKTOP_ICONS.forEach((item, idx) => {
    const icon = document.createElement('div');
    icon.className = 'desktop-icon';
    icon.dataset.appId = item.id;
    icon.style.gridRow = 'auto';
    icon.style.gridColumn = 'auto';
    
    // Restore saved position via order
    if (State.iconPositions[item.id]) {
      icon.style.order = State.iconPositions[item.id];
    } else {
      icon.style.order = idx;
    }
    
    icon.innerHTML = `
      <div class="icon-glyph">${APPS[item.id].icon}</div>
      <div class="icon-label">${item.label}</div>
    `;
    
    icon.addEventListener('click', (e) => {
      e.stopPropagation();
      selectIcon(icon);
    });
    icon.addEventListener('dblclick', () => {
      openApp(item.id);
    });
    
    iconsContainer.appendChild(icon);
  });
}

function selectIcon(iconEl) {
  $$('.desktop-icon').forEach(el => el.classList.remove('selected'));
  State.selectedIcons.clear();
  iconEl.classList.add('selected');
  State.selectedIcons.add(iconEl.dataset.appId);
}

function deselectAllIcons() {
  $$('.desktop-icon').forEach(el => el.classList.remove('selected'));
  State.selectedIcons.clear();
}

// ---------- Window Management ----------
function openApp(appId) {
  // If window for this app exists, focus it
  for (const [id, w] of State.windows) {
    if (w.appId === appId && !w.minimized) {
      focusWindow(id);
      return;
    }
  }
  
  const app = APPS[appId];
  const id = 'win-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5);
  
  const w = app.w || 560;
  const h = app.h || 420;
  const maxX = window.innerWidth - w - 20;
  const maxY = window.innerHeight - h - 60;
  const offset = (State.windows.size % 6) * 28;
  const x = Math.max(20, Math.min(maxX, 120 + offset));
  const y = Math.max(20, Math.min(maxY, 60 + offset));
  
  const win = document.createElement('div');
  win.className = 'window';
  win.id = id;
  win.style.left = x + 'px';
  win.style.top = y + 'px';
  win.style.width = w + 'px';
  win.style.height = h + 'px';
  win.style.zIndex = ++State.nextZ;
  
  win.innerHTML = `
    <div class="window-header">
      <div class="window-title">
        <span class="wt-icon">${app.icon}</span>
        <span class="wt-text">${app.title}</span>
      </div>
      <div class="window-controls">
        <button class="wc-btn min" title="Minimize">${UI_ICONS.minimize}</button>
        <button class="wc-btn max" title="Maximize">${UI_ICONS.maximize}</button>
        <button class="wc-btn close" title="Close">${UI_ICONS.close}</button>
      </div>
    </div>
    <div class="window-body"></div>
    <div class="resize-handle rh-n"></div>
    <div class="resize-handle rh-s"></div>
    <div class="resize-handle rh-e"></div>
    <div class="resize-handle rh-w"></div>
    <div class="resize-handle rh-ne"></div>
    <div class="resize-handle rh-nw"></div>
    <div class="resize-handle rh-se"></div>
    <div class="resize-handle rh-sw"></div>
  `;
  
  desktop.appendChild(win);
  
  const body = win.querySelector('.window-body');
  body.innerHTML = getAppContent(appId, id);
  
  // Init app
  initApp(appId, id, body);
  
  // Window events
  const header = win.querySelector('.window-header');
  header.addEventListener('mousedown', (e) => {
    if (e.target.closest('.wc-btn')) return;
    focusWindow(id);
    startDrag(win, e);
  });
  
  win.querySelector('.wc-btn.min').addEventListener('click', (e) => {
    e.stopPropagation();
    minimizeWindow(id);
  });
  win.querySelector('.wc-btn.max').addEventListener('click', (e) => {
    e.stopPropagation();
    toggleMaximize(id);
  });
  win.querySelector('.wc-btn.close').addEventListener('click', (e) => {
    e.stopPropagation();
    closeWindow(id);
  });
  
  win.addEventListener('mousedown', () => focusWindow(id));
  
  // Resize handles
  win.querySelectorAll('.resize-handle').forEach(handle => {
    handle.addEventListener('mousedown', (e) => {
      e.stopPropagation();
      if (win.dataset.maximized === 'true') return;
      startResize(win, handle, e);
    });
  });
  
  State.windows.set(id, {
    id, appId, element: win, minimized: false, maximized: false,
    prevRect: null
  });
  
  focusWindow(id);
  updateTaskbar();
}

function focusWindow(id) {
  const w = State.windows.get(id);
  if (!w) return;
  
  if (w.minimized) {
    w.minimized = false;
    w.element.classList.remove('minimized');
    w.element.style.display = '';
  }
  
  w.element.style.zIndex = ++State.nextZ;
  State.activeWindowId = id;
  
  $$('.window').forEach(el => el.classList.add('inactive'));
  w.element.classList.remove('inactive');
  
  updateTaskbar();
}

function closeWindow(id) {
  const w = State.windows.get(id);
  if (!w) return;
  w.element.classList.add('closing');
  setTimeout(() => {
    w.element.remove();
    State.windows.delete(id);
    updateTaskbar();
    if (typeof w.onClose === 'function') w.onClose();
  }, 180);
}

function minimizeWindow(id) {
  const w = State.windows.get(id);
  if (!w) return;
  w.minimized = true;
  w.element.classList.add('minimized');
  setTimeout(() => {
    if (w.minimized) w.element.style.display = 'none';
  }, 250);
  State.activeWindowId = null;
  updateTaskbar();
}

      w.element.style.height = w.prevRect.h + 'px';
