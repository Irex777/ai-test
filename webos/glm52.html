<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora OS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e1a;
  --bg-2:#0f1424;
  --panel:rgba(18,23,38,0.78);
  --panel-solid:#121726;
  --panel-2:rgba(28,33,52,0.9);
  --border:rgba(255,255,255,0.08);
  --border-strong:rgba(255,255,255,0.18);
  --fg:#e8ecf4;
  --muted:#8b95b3;
  --accent:#ff5e62;
  --accent-2:#ff9966;
  --accent-3:#00d9ff;
  --accent-grad:linear-gradient(135deg,#ff5e62,#ff9966);
  --success:#4ade80;
  --warning:#fbbf24;
  --danger:#ef4444;
  --radius:12px;
  --shadow:0 20px 60px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.05);
}
html,body{height:100%;overflow:hidden}
body{
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);
  color:var(--fg);
  user-select:none;
  -webkit-font-smoothing:antialiased;
  font-size:14px;
}

/* ===== Aurora Background ===== */
.aurora-bg{
  position:fixed;inset:0;z-index:0;overflow:hidden;
  background:radial-gradient(ellipse at top,#1a1530 0%,#0a0e1a 50%,#040611 100%);
  transition:background 0.6s ease;
}
.aurora-bg::before,.aurora-bg::after,.aurora-bg .blob3{
  content:'';position:absolute;border-radius:50%;filter:blur(100px);opacity:0.45;
  animation:float 22s ease-in-out infinite;
}
.aurora-bg::before{
  width:700px;height:700px;
  background:radial-gradient(circle,#ff5e62,transparent 70%);
  top:-200px;left:-150px;
}
.aurora-bg::after{
  width:600px;height:600px;
  background:radial-gradient(circle,#00d9ff,transparent 70%);
  bottom:-150px;right:-100px;
  animation-delay:-11s;
}
.aurora-bg .blob3{
  width:500px;height:500px;
  background:radial-gradient(circle,#a855f7,transparent 70%);
  top:30%;left:40%;
  animation-delay:-5s;opacity:0.3;
}
@keyframes float{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(80px,-80px) scale(1.15)}
  66%{transform:translate(-60px,60px) scale(0.9)}
}
.stars{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0.5}
.stars::before{
  content:'';position:absolute;inset:0;
  background-image:
    radial-gradient(1px 1px at 20px 30px,#fff,transparent),
    radial-gradient(1px 1px at 60px 70px,#fff,transparent),
    radial-gradient(1px 1px at 110px 40px,#fff,transparent),
    radial-gradient(1.5px 1.5px at 180px 90px,#fff,transparent),
    radial-gradient(1px 1px at 250px 20px,#fff,transparent),
    radial-gradient(1px 1px at 320px 110px,#fff,transparent),
    radial-gradient(1.5px 1.5px at 400px 60px,#fff,transparent),
    radial-gradient(1px 1px at 480px 130px,#fff,transparent);
  background-size:500px 200px;background-repeat:repeat;
  animation:twinkle 4s ease-in-out infinite alternate;
}
@keyframes twinkle{from{opacity:0.3}to{opacity:0.7}}

/* ===== Boot Screen ===== */
.boot{
  position:fixed;inset:0;z-index:9999;
  background:radial-gradient(ellipse at center,#0a0e1a,#000);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:30px;transition:opacity 0.8s ease;
}
.boot.hidden{opacity:0;pointer-events:none}
.boot-logo{
  width:100px;height:100px;position:relative;
  animation:bootPulse 2s ease-in-out infinite;
}
.boot-logo svg{width:100%;height:100%}
@keyframes bootPulse{
  0%,100%{transform:scale(1);filter:drop-shadow(0 0 20px rgba(255,94,98,0.5))}
  50%{transform:scale(1.05);filter:drop-shadow(0 0 40px rgba(255,94,98,0.8))}
}
.boot-name{
  font-size:32px;font-weight:200;letter-spacing:12px;
  background:var(--accent-grad);-webkit-background-clip:text;background-clip:text;
  color:transparent;
  animation:fadeUp 1s ease 0.3s both;
}
.boot-tagline{
  font-size:12px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;
  animation:fadeUp 1s ease 0.6s both;
}
.boot-bar{
  width:240px;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;
  overflow:hidden;margin-top:20px;
  animation:fadeUp 1s ease 0.9s both;
}
.boot-bar-fill{
  height:100%;background:var(--accent-grad);border-radius:2px;
  animation:bootProgress 3s ease forwards;
  box-shadow:0 0 12px rgba(255,94,98,0.6);
}
@keyframes bootProgress{from{width:0}to{width:100%}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.boot-status{font-size:11px;color:var(--muted);letter-spacing:2px;animation:fadeUp 1s ease 1.2s both}

/* ===== Desktop ===== */
.desktop{
  position:absolute;inset:0;bottom:56px;z-index:2;
  padding:24px;
}
.desktop-icons{
  display:grid;grid-template-columns:repeat(auto-fill,96px);
  grid-auto-rows:96px;gap:6px;align-content:start;
  max-height:100%;
}
.desktop-icon{
  width:96px;height:96px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;border-radius:10px;cursor:pointer;
  transition:background 0.15s,transform 0.15s;
  position:relative;
}
.desktop-icon:hover{background:rgba(255,255,255,0.06)}
.desktop-icon.selected{background:rgba(255,94,98,0.18);outline:1px solid rgba(255,94,98,0.4)}
.desktop-icon.dragging{opacity:0.5;z-index:10}
.icon-img{
  width:48px;height:48px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 16px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.15);
  position:relative;overflow:hidden;
}
.icon-img svg{width:26px;height:26px;color:#fff;position:relative;z-index:1}
.icon-img.computer{background:linear-gradient(135deg,#4facfe,#00f2fe)}
.icon-img.recycle{background:linear-gradient(135deg,#a8aebd,#6b7280)}
.icon-img.notepad{background:linear-gradient(135deg,#ffd86b,#fc6262)}
.icon-img.calculator{background:linear-gradient(135deg,#667eea,#764ba2)}
.icon-img.browser{background:linear-gradient(135deg,#00d9ff,#3a7bd5)}
.icon-img.terminal{background:linear-gradient(135deg,#0f2027,#2c5364)}
.icon-img.settings{background:linear-gradient(135deg,#ff9966,#ff5e62)}
.icon-img.pictures{background:linear-gradient(135deg,#ee0979,#ff6a00)}
.icon-label{
  font-size:11px;color:#fff;text-align:center;line-height:1.2;
  text-shadow:0 1px 3px rgba(0,0,0,0.8);max-width:88px;
  word-wrap:break-word;
}

/* ===== Top widget ===== */
.top-widget{
  position:absolute;top:20px;right:24px;z-index:3;
  display:flex;gap:12px;align-items:center;
}
.widget-card{
  background:var(--panel);backdrop-filter:blur(20px);
  border:1px solid var(--border);border-radius:14px;
  padding:10px 16px;display:flex;align-items:center;gap:10px;
  box-shadow:0 8px 24px rgba(0,0,0,0.2);
}
.widget-time{font-size:13px;font-weight:500}
.widget-time .big{font-size:18px;font-weight:600;background:var(--accent-grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.widget-sep{width:1px;height:24px;background:var(--border)}
.widget-stat{display:flex;flex-direction:column;font-size:10px;color:var(--muted)}
.widget-stat span{font-size:12px;color:var(--fg);font-weight:500}
.widget-bar{width:36px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden}
.widget-bar-fill{height:100%;background:var(--accent-grad);border-radius:2px}

/* ===== Taskbar ===== */
.taskbar{
  position:fixed;bottom:0;left:0;right:0;height:56px;z-index:100;
  background:rgba(10,14,26,0.75);backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  display:flex;align-items:center;padding:0 12px;gap:8px;
  box-shadow:0 -10px 30px rgba(0,0,0,0.3);
}
.start-btn{
  display:flex;align-items:center;gap:8px;
  height:42px;padding:0 16px;border:none;border-radius:10px;
  background:var(--accent-grad);color:#fff;font-size:13px;font-weight:600;
  cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;
  box-shadow:0 4px 12px rgba(255,94,98,0.3);
  font-family:inherit;
}
.start-btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(255,94,98,0.45)}
.start-btn:active{transform:translateY(0)}
.start-btn svg{width:18px;height:18px}
.taskbar-divider{width:1px;height:30px;background:var(--border);margin:0 4px}
.taskbar-apps{display:flex;gap:4px;flex:1;overflow-x:auto;scrollbar-width:none}
.taskbar-apps::-webkit-scrollbar{display:none}
.taskbar-app{
  display:flex;align-items:center;gap:8px;
  height:42px;padding:0 12px;border-radius:8px;
  background:transparent;border:1px solid transparent;
  color:var(--fg);cursor:pointer;transition:background 0.15s;
  font-family:inherit;font-size:12px;
  position:relative;min-width:42px;justify-content:center;
}
.taskbar-app:hover{background:rgba(255,255,255,0.06)}
.taskbar-app.active{background:rgba(255,255,255,0.08);border-color:var(--border)}
.taskbar-app.active::after{
  content:'';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);
  width:18px;height:2px;background:var(--accent);border-radius:2px;
  box-shadow:0 0 8px var(--accent);
}
.taskbar-app-icon{width:20px;height:20px;border-radius:6px}
.taskbar-app-name{max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.system-tray{display:flex;align-items:center;gap:4px}
.tray-icon{
  width:32px;height:42px;display:flex;align-items:center;justify-content:center;
  border-radius:8px;cursor:pointer;color:var(--fg);transition:background 0.15s;
}
.tray-icon:hover{background:rgba(255,255,255,0.06)}
.tray-icon svg{width:16px;height:16px}
.tray-clock{
  display:flex;flex-direction:column;align-items:flex-end;
  padding:0 12px;border-radius:8px;cursor:pointer;
  transition:background 0.15s;line-height:1.2;
}
.tray-clock:hover{background:rgba(255,255,255,0.06)}
.tray-clock .time{font-size:13px;font-weight:500}
.tray-clock .date{font-size:10px;color:var(--muted)}

/* ===== Start Menu ===== */
.start-menu{
  position:fixed;bottom:64px;left:12px;width:560px;max-height:560px;
  background:var(--panel);backdrop-filter:blur(28px);
  border:1px solid var(--border-strong);border-radius:16px;
  box-shadow:var(--shadow);z-index:200;
  display:flex;flex-direction:column;
  opacity:0;transform:translateY(20px) scale(0.95);pointer-events:none;
  transition:opacity 0.2s,transform 0.2s;
  overflow:hidden;
}
.start-menu.open{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
.start-search{
  padding:18px 20px 12px;border-bottom:1px solid var(--border);
}
.start-search-input{
  width:100%;height:38px;padding:0 14px 0 38px;
  background:rgba(0,0,0,0.3);border:1px solid var(--border);
  border-radius:10px;color:var(--fg);font-family:inherit;font-size:13px;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%238b95b3' stroke-width='2'><circle cx='11' cy='11' r='7'/><path d='m21 21-4.35-4.35'/></svg>");
  background-repeat:no-repeat;background-position:14px center;
  outline:none;
}
.start-search-input:focus{border-color:var(--accent)}
.start-content{padding:16px 20px;overflow-y:auto;flex:1}
.start-section-title{
  font-size:11px;color:var(--muted);text-transform:uppercase;
  letter-spacing:1.5px;margin-bottom:10px;font-weight:600;
}
.start-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:20px;
}
.start-app{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:14px 8px;border-radius:10px;cursor:pointer;
  transition:background 0.15s;
}
.start-app:hover{background:rgba(255,255,255,0.06)}
.start-app .icon-img{width:36px;height:36px;border-radius:9px}
.start-app .icon-img svg{width:20px;height:20px}
.start-app span{font-size:11px;text-align:center}

.start-footer{
  padding:12px 20px;border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.start-user{display:flex;align-items:center;gap:10px}
.start-avatar{
  width:34px;height:34px;border-radius:50%;
  background:var(--accent-grad);
  display:flex;align-items:center;justify-content:center;
  font-weight:600;font-size:14px;color:#fff;
  box-shadow:0 0 0 2px rgba(255,94,98,0.3);
}
.start-user-info{display:flex;flex-direction:column;line-height:1.3}
.start-user-info .name{font-size:13px;font-weight:500}
.start-user-info .email{font-size:10px;color:var(--muted)}
.start-power{
  display:flex;gap:4px;
}
.power-btn{
  width:34px;height:34px;border-radius:8px;
  background:transparent;border:none;color:var(--fg);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background 0.15s;
}
.power-btn:hover{background:rgba(255,255,255,0.08)}
.power-btn svg{width:16px;height:16px}

/* ===== Power menu ===== */
.power-menu{
  position:fixed;bottom:64px;left:12px;
  background:var(--panel-2);backdrop-filter:blur(28px);
  border:1px solid var(--border-strong);border-radius:12px;
  box-shadow:var(--shadow);z-index:300;padding:6px;
  opacity:0;transform:translateY(10px);pointer-events:none;
  transition:opacity 0.15s,transform 0.15s;
  width:180px;
}
.power-menu.open{opacity:1;transform:translateY(0);pointer-events:auto}
.power-menu button{
  width:100%;display:flex;align-items:center;gap:10px;
  padding:10px;border:none;background:transparent;color:var(--fg);
  cursor:pointer;border-radius:8px;font-family:inherit;font-size:12px;
  text-align:left;
}
.power-menu button:hover{background:rgba(255,255,255,0.08)}
.power-menu button svg{width:14px;height:14px}

/* ===== Window ===== */
.window{
  position:absolute;background:var(--panel-solid);
  border:1px solid var(--border-strong);border-radius:12px;
  box-shadow:var(--shadow);
  display:flex;flex-direction:column;
  min-width:300px;min-height:200px;
  overflow:hidden;
  animation:windowOpen 0.25s ease;
}
@keyframes windowOpen{
  from{opacity:0;transform:scale(0.95)}
  to{opacity:1;transform:scale(1)}
}
.window.closing{animation:windowClose 0.2s ease forwards}
@keyframes windowClose{
  to{opacity:0;transform:scale(0.95)}
}
.window.minimized{display:none}
.window.maximized{border-radius:0}
.window-titlebar{
  height:38px;display:flex;align-items:center;
  padding:0 12px;cursor:grab;
  background:rgba(0,0,0,0.25);
  border-bottom:1px solid var(--border);
  user-select:none;
  flex-shrink:0;
}
.window-titlebar:active{cursor:grabbing}
.window-title{display:flex;align-items:center;gap:8px;flex:1;font-size:12px;font-weight:500;color:var(--fg)}
.window-title .icon-img{width:20px;height:20px;border-radius:5px}
.window-title .icon-img svg{width:13px;height:13px}
.window-controls{display:flex;gap:6px}
.win-btn{
  width:30px;height:30px;border-radius:6px;border:none;
  background:transparent;color:var(--fg);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.15s;
}
.win-btn:hover{background:rgba(255,255,255,0.1)}
.win-btn.close:hover{background:var(--danger);color:#fff}
.win-btn svg{width:12px;height:12px}
.window-content{flex:1;overflow:hidden;position:relative;display:flex;flex-direction:column}
.resize-handle{position:absolute;z-index:5}
.resize-n{top:-2px;left:8px;right:8px;height:5px;cursor:n-resize}
.resize-s{bottom:-2px;left:8px;right:8px;height:5px;cursor:s-resize}
.resize-e{top:8px;bottom:8px;right:-2px;width:5px;cursor:e-resize}
.resize-w{top:8px;bottom:8px;left:-2px;width:5px;cursor:w-resize}
.resize-ne{top:-2px;right:-2px;width:10px;height:10px;cursor:ne-resize}
.resize-nw{top:-2px;left:-2px;width:10px;height:10px;cursor:nw-resize}
.resize-se{bottom:-2px;right:-2px;width:10px;height:10px;cursor:se-resize}
.resize-sw{bottom:-2px;left:-2px;width:10px;height:10px;cursor:sw-resize}

/* ===== Context Menu ===== */
.context-menu{
  position:fixed;z-index:500;
  background:var(--panel-2);backdrop-filter:blur(28px);
  border:1px solid var(--border-strong);border-radius:10px;
  box-shadow:var(--shadow);padding:6px;min-width:200px;
  opacity:0;transform:scale(0.95);pointer-events:none;
  transition:opacity 0.15s,transform 0.15s;
}
.context-menu.open{opacity:1;transform:scale(1);pointer-events:auto}
.ctx-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 12px;border-radius:6px;cursor:pointer;
  font-size:12px;color:var(--fg);transition:background 0.15s;
}
.ctx-item:hover{background:var(--accent)}
.ctx-item svg{width:14px;height:14px;color:var(--muted)}
.ctx-item:hover svg{color:#fff}
.ctx-sep{height:1px;background:var(--border);margin:4px 0}
.ctx-sub{position:relative}
.ctx-sub-arrow{margin-left:auto;color:var(--muted)}
.ctx-submenu{
  position:absolute;left:100%;top:0;min-width:160px;
  background:var(--panel-2);backdrop-filter:blur(28px);
  border:1px solid var(--border-strong);border-radius:10px;
  padding:6px;display:none;box-shadow:var(--shadow);
}
.ctx-sub:hover .ctx-submenu{display:block}

/* ===== Toast ===== */
.toast-container{
  position:fixed;bottom:72px;right:20px;z-index:1000;
  display:flex;flex-direction:column;gap:8px;pointer-events:none;
}
.toast{
  background:var(--panel-2);backdrop-filter:blur(20px);
  border:1px solid var(--border-strong);border-radius:10px;
  padding:12px 16px;display:flex;align-items:center;gap:10px;
  box-shadow:var(--shadow);min-width:240px;max-width:340px;
  font-size:12px;
  animation:toastIn 0.3s ease;
  border-left:3px solid var(--accent);
}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.toast.fade{animation:toastOut 0.3s ease forwards}
@keyframes toastOut{to{opacity:0;transform:translateX(20px)}}
.toast svg{width:16px;height:16px;color:var(--accent);flex-shrink:0}

/* ===== Shutdown ===== */
.shutdown-screen{
  position:fixed;inset:0;z-index:9998;
  background:#000;color:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:24px;opacity:0;pointer-events:none;
  transition:opacity 0.6s ease;
}
.shutdown-screen.active{opacity:1;pointer-events:auto}
.shutdown-spinner{
  width:50px;height:50px;border:3px solid rgba(255,255,255,0.1);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.shutdown-text{font-size:14px;letter-spacing:2px;color:var(--muted)}
.shutdown-message{
  font-size:24px;font-weight:200;text-align:center;letter-spacing:1px;
}
.reboot-btn{
  margin-top:20px;padding:12px 32px;
  background:var(--accent-grad);border:none;border-radius:10px;
  color:#fff;font-size:13px;cursor:pointer;font-family:inherit;
  box-shadow:0 6px 16px rgba(255,94,98,0.4);
  transition:transform 0.15s;
}
.reboot-btn:hover{transform:translateY(-2px)}

/* ===== Modal ===== */
.modal-overlay{
  position:fixed;inset:0;z-index:9000;
  background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;
  animation:fadeIn 0.2s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--panel-solid);border:1px solid var(--border-strong);
  border-radius:14px;padding:24px;width:420px;max-width:90vw;
  box-shadow:var(--shadow);animation:modalIn 0.25s ease;
}
@keyframes modalIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.modal-title{font-size:16px;font-weight:600;margin-bottom:6px}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:18px}
.modal-input{
  width:100%;padding:10px 12px;background:rgba(0,0,0,0.3);
  border:1px solid var(--border);border-radius:8px;color:var(--fg);
  font-family:inherit;font-size:13px;outline:none;margin-bottom:12px;
}
.modal-input:focus{border-color:var(--accent)}
.modal-list{
  max-height:240px;overflow-y:auto;margin-bottom:12px;
  background:rgba(0,0,0,0.2);border-radius:8px;border:1px solid var(--border);
}
.modal-list-item{
  padding:10px 12px;font-size:12px;cursor:pointer;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--border);
}
.modal-list-item:last-child{border-bottom:none}
.modal-list-item:hover{background:rgba(255,255,255,0.05)}
.modal-list-item svg{width:14px;height:14px;color:var(--accent-2)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.btn{
  padding:8px 16px;border-radius:8px;border:1px solid var(--border);
  background:transparent;color:var(--fg);font-family:inherit;font-size:12px;
  cursor:pointer;transition:background 0.15s;
}
.btn:hover{background:rgba(255,255,255,0.05)}
.btn.primary{background:var(--accent-grad);border-color:transparent;color:#fff}
.btn.primary:hover{filter:brightness(1.1)}

/* ===== App: Notepad ===== */
.notepad{display:flex;flex-direction:column;height:100%}
.notepad-menu{
  display:flex;background:rgba(0,0,0,0.2);
  border-bottom:1px solid var(--border);padding:4px;
  gap:2px;
}
.menu-item{position:relative}
.menu-trigger{
  padding:6px 12px;border-radius:6px;font-size:12px;
  cursor:pointer;color:var(--fg);
}
.menu-trigger:hover,.menu-item.open .menu-trigger{background:rgba(255,255,255,0.08)}
.menu-dropdown{
  position:absolute;top:100%;left:0;margin-top:4px;
  min-width:180px;background:var(--panel-2);
  border:1px solid var(--border-strong);border-radius:8px;
  padding:6px;box-shadow:var(--shadow);z-index:10;
  display:none;
}
.menu-item.open .menu-dropdown{display:block}
.menu-action{
  padding:7px 10px;font-size:12px;cursor:pointer;
  border-radius:5px;display:flex;justify-content:space-between;
  align-items:center;gap:12px;
}
.menu-action:hover{background:var(--accent);color:#fff}
.menu-action .shortcut{font-size:10px;color:var(--muted)}
.menu-action:hover .shortcut{color:rgba(255,255,255,0.7)}
.menu-sep{height:1px;background:var(--border);margin:4px 0}
.notepad-textarea{
  flex:1;background:transparent;border:none;outline:none;
  padding:16px;color:var(--fg);font-family:"SF Mono",Monaco,Consolas,monospace;
  font-size:13px;line-height:1.6;resize:none;
}
.notepad-status{
  display:flex;justify-content:space-between;
  padding:6px 14px;background:rgba(0,0,0,0.25);
  border-top:1px solid var(--border);font-size:11px;color:var(--muted);
}

/* ===== App: Calculator ===== */
.calculator{display:flex;flex-direction:column;height:100%;background:#0a0e1a}
.calc-display{
  padding:24px;text-align:right;
  background:linear-gradient(180deg,rgba(255,94,98,0.05),transparent);
}
.calc-prev{font-size:12px;color:var(--muted);min-height:18px}
.calc-current{font-size:38px;font-weight:300;color:#fff;min-height:50px;word-break:break-all}
.calc-keys{
  flex:1;display:grid;grid-template-columns:repeat(4,1fr);
  gap:1px;background:var(--border);
}
.calc-key{
  background:#131826;border:none;color:var(--fg);
  font-size:18px;font-family:inherit;cursor:pointer;
  transition:background 0.1s;font-weight:400;
}
.calc-key:hover{background:#1c2238}
.calc-key:active{background:#252b Forty}
.calc-key.operator{background:#1a1f30;color:var(--accent-2)}
.calc-key.operator:hover{background:#252b40}
.calc-key.equals{background:var(--accent-grad);color:#fff}
.calc-key.equals:hover{filter:brightness(1.1)}
.calc-key.fn{background:#0f1424;color:var(--accent-3)}
.calc-key.fn:hover{background:#1a2030}
.calc-key.wide{grid-column:span 2}

/* ===== App: Terminal ===== */
.terminal{
  height:100%;background:#050810;padding:14px;overflow-y:auto;
  font-family:"SF Mono",Monaco,Consolas,"Courier New",monospace;
  font-size:13px;line-height:1.55;color:#a8ffcc;
}
.terminal::-webkit-scrollbar{width:8px}
.terminal::-webkit-scrollbar-thumb{background:#1a2030;border-radius:4px}
.term-line{white-space:pre-wrap;word-wrap:break-word}
.term-line.system{color:#6b7491}
.term-line.error{color:#ff6b6b}
.term-line.success{color:#4ade80}
.term-line.info{color:#00d9ff}
.term-line.output{color:#e8ecf4}
.term-prompt{display:flex;align-items:center;gap:6px}
.term-prompt .user{color:#4ade80}
.term-prompt .at{color:#6b7491}
.term-prompt .host{color:#00d9ff}
.term-prompt .path{color:#ff9966}
.term-prompt .symbol{color:#ff5e62}
.term-input{
  background:transparent;border:none;outline:none;
  color:#e8ecf4;font-family:inherit;font-size:13px;
  flex:1;caret-color:#4ade80;
}

/* ===== App: Browser ===== */
.browser{display:flex;flex-direction:column;height:100%}
.browser-bar{
  display:flex;align-items:center;gap:6px;padding:8px;
  background:rgba(0,0,0,0.25);border-bottom:1px solid var(--border);
}
.browser-nav{
  width:30px;height:30px;border-radius:50%;border:none;
  background:transparent;color:var(--fg);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.browser-nav:hover{background:rgba(255,255,255,0.08)}
.browser-nav svg{width:14px;height:14px}
.browser-url{
  flex:1;height:32px;padding:0 12px;
  background:rgba(0,0,0,0.3);border:1px solid var(--border);
  border-radius:16px;color:var(--fg);font-size:12px;
  font-family:inherit;outline:none;
}
.browser-url:focus{border-color:var(--accent)}
.browser-content{flex:1;overflow-y:auto;background:#0f1424}
.browser-home{padding:40px;text-align:center}
.browser-logo{
  font-size:48px;font-weight:200;letter-spacing:6px;margin-bottom:32px;
  background:var(--accent-grad);-webkit-background-clip:text;background-clip:text;color:transparent;
}
.browser-search{
  max-width:500px;margin:0 auto 32px;height:44px;padding:0 18px;
  background:rgba(255,255,255,0.05);border:1px solid var(--border);
  border-radius:22px;color:var(--fg);font-size:14px;
  font-family:inherit;outline:none;
}
.browser-search:focus{border-color:var(--accent)}
.browser-tiles{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:14px;max-width:600px;margin:0 auto;
}
.browser-tile{
  padding:18px;border-radius:12px;
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  cursor:pointer;transition:all 0.15s;text-align:center;
}
.browser-tile:hover{background:rgba(255,255,255,0.08);transform:translateY(-2px)}
.browser-tile .icon-img{width:36px;height:36px;margin:0 auto 8px;border-radius:9px}
.browser-tile-name{font-size:11px;color:var(--fg)}
.browser-page{padding:32px;max-width:720px;margin:0 auto;color:var(--fg);line-height:1.7}
.browser-page h1{font-size:28px;margin-bottom:16px;font-weight:300}
.browser-page h2{font-size:18px;margin:20px 0 10px;font-weight:500}
.browser-page p{color:var(--muted);margin-bottom:12px;font-size:13px}

/* ===== App: Settings ===== */
.settings{display:flex;height:100%}
.settings-sidebar{
  width:200px;background:rgba(0,0,0,0.2);
  border-right:1px solid var(--border);padding:16px 10px;
}
.settings-section-title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin:14px 8px 6px;font-weight:600}
.settings-nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:8px;font-size:12px;
  cursor:pointer;color:var(--fg);transition:background 0.15s;
}
.settings-nav-item:hover{background:rgba(255,255,255,0.05)}
.settings-nav-item.active{background:rgba(255,94,98,0.15);color:var(--accent)}
.settings-nav-item svg{width:14px;height:14px}
.settings-main{flex:1;padding:24px;overflow-y:auto}
.settings-main h2{font-size:20px;font-weight:500;margin-bottom:4px}
.settings-main .sub{font-size:12px;color:var(--muted);margin-bottom:24px}
.settings-card{
  background:rgba(255,255,255,0.03);border:1px solid var(--border);
  border-radius:10px;padding:16px;margin-bottom:14px;
}
.settings-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0}
.settings-row + .settings-row{border-top:1px solid var(--border)}
.settings-row .label{font-size:13px}
.settings-row .desc{font-size:11px;color:var(--muted);margin-top:2px}
.wallpaper-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
.wallpaper-opt{
  aspect-ratio:16/10;border-radius:8px;cursor:pointer;
  border:2px solid transparent;transition:border 0.15s;
}
.wallpaper-opt.active{border-color:var(--accent)}
.wallpaper-opt:hover{transform:scale(1.02)}
.accent-grid{display:flex;gap:8px;margin-top:10px}
.accent-opt{
  width:36px;height:36px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:transform 0.15s;
}
.accent-opt:hover{transform:scale(1.1)}
.accent-opt.active{border-color:#fff}

/* ===== App: Pictures ===== */
.pictures{padding:16px;overflow-y:auto;height:100%}
.pictures-header{margin-bottom:16px}
.pictures-header h2{font-size:18px;font-weight:500}
.pictures-header .sub{font-size:11px;color:var(--muted);margin-top:2px}
.pictures-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.picture-item{
  aspect-ratio:1;border-radius:10px;cursor:pointer;
  overflow:hidden;position:relative;
  border:1px solid var(--border);
  transition:transform 0.15s;
}
.picture-item:hover{transform:scale(1.03)}
.picture-item .pic-art{width:100%;height:100%}

/* ===== App: My Computer ===== */

  padding:8px 14px;background:rgba(0,0,0,0.2);
  border-bottom:
