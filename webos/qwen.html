<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebOS</title>
    <style>
        :root {
            --bg-color: #121212;
            --taskbar-color: #1e1e1e;
            --window-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --accent-color: #3b82f6;
            --hover-color: #3f3f3f;
            --border-color: #444;
            --input-bg: #1a1a1a;
        }

        * { box-sizing: border-box; user-select: none; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); overflow: hidden; height: 100vh; width: 100vw; }

        /* Boot Screen */
        #boot-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: opacity 1s ease;
        }
        .loader {
            border: 4px solid #333; border-top: 4px solid var(--accent-color);
            border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Desktop */
        #desktop {
            height: calc(100vh - 40px); width: 100%; position: relative;
            background: radial-gradient(circle at center, #2a2a2a 0%, #121212 100%);
            padding: 10px; display: flex; flex-direction: column; flex-wrap: wrap;
            align-content: flex-start; gap: 10px;
        }

        .desktop-icon {
            width: 80px; height: 90px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer;
            border-radius: 5px; border: 1px solid transparent;
            transition: background 0.2s; text-align: center;
        }
        .desktop-icon:hover { background-color: rgba(255, 255, 255, 0.1); border-color: rgba(255,255,255,0.1); }
        .icon-img { font-size: 32px; margin-bottom: 5px; pointer-events: none; }
        .icon-text { font-size: 12px; pointer-events: none; text-shadow: 1px 1px 2px black; }

        /* Taskbar */
        #taskbar {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 40px;
            background-color: var(--taskbar-color); display: flex; align-items: center;
            padding: 0 10px; border-top: 1px solid var(--border-color); z-index: 9000;
        }
        #start-btn {
            font-size: 20px; padding: 5px 10px; cursor: pointer; border-radius: 4px;
        }
        #start-btn:hover { background-color: var(--hover-color); }
        #taskbar-apps { flex-grow: 1; display: flex; gap: 5px; padding-left: 10px; }
        .taskbar-item {
            padding: 5px 10px; background: var(--hover-color); border-radius: 4px;
            cursor: pointer; font-size: 12px; max-width: 150px; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis; border-bottom: 2px solid transparent;
        }
        .taskbar-item.active { border-bottom: 2px solid var(--accent-color); background: #444; }
        #system-tray { display: flex; align-items: center; gap: 15px; font-size: 12px; }

        /* Start Menu */
        #start-menu {
            position: fixed; bottom: 40px; left: 0; width: 300px;
            background-color: var(--window-bg); border: 1px solid var(--border-color);
            border-radius: 5px 5px 0 0; display: none; flex-direction: column;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5); z-index: 9500;
        }
        .start-item {
            padding: 10px 15px; cursor: pointer; display: flex; align-items: center; gap: 10px;
        }
        .start-item:hover { background-color: var(--hover-color); }
        .start-footer {
            padding: 10px 15px; border-top: 1px solid var(--border-color);
            display: flex; justify-content: flex-end;
        }

        /* Windows */
        .window {
            position: absolute; background-color: var(--window-bg);
            border: 1px solid var(--border-color); border-radius: 6px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); display: flex; flex-direction: column;
            min-width: 200px; min-height: 150px; overflow: hidden;
        }
        .title-bar {
            height: 30px; background-color: #333; display: flex; align-items: center;
            justify-content: space-between; padding: 0 10px; cursor: default;
        }
        .title-drag-area { flex-grow: 1; height: 100%; display: flex; align-items: center; }
        .window-controls { display: flex; gap: 8px; }
        .win-btn { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; }
        .close-btn { background-color: #ff5f56; }
        .min-btn { background-color: #ffbd2e; }
        .max-btn { background-color: #27c93f; }
        .window-content { flex-grow: 1; overflow: auto; position: relative; background: var(--bg-color); }
        
        /* Resize Handle */
        .resize-handle {
            position: absolute; bottom: 0; right: 0; width: 15px; height: 15px;
            cursor: se-resize;
        }

        /* Context Menu */
        #context-menu {
            position: absolute; background: var(--window-bg); border: 1px solid var(--border-color);
            display: none; flex-direction: column; z-index: 10000; box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }
        .ctx-item { padding: 8px 15px; cursor: pointer; font-size: 13px; }
        .ctx-item:hover { background-color: var(--hover-color); }

        /* App Specific Styles */
        /* Notepad */
        .notepad-container { display: flex; flex-direction: column; height: 100%; }
        .notepad-menu { padding: 5px; background: #333; }
        .notepad-menu button { background: none; border: none; color: #ccc; cursor: pointer; margin-right: 10px; }
        .notepad-menu button:hover { color: #fff; }
        textarea.notepad-area {
            flex-grow: 1; background: var(--input-bg); color: var(--text-color);
            border: none; padding: 10px; resize: none; outline: none; font-family: monospace;
        }

        /* Calculator */
        .calc-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 10px; height: 100%;
        }
        .calc-display { grid-column: span 4; background: var(--input-bg); color: var(--text-color);
            text-align: right; padding: 10px; font-size: 20px; border-radius: 4px; margin-bottom: 5px; }
        .calc-btn {
            background: #444; border: none; color: white; padding: 15px; border-radius: 4px;
            cursor: pointer; font-size: 16px;
        }
        .calc-btn:hover { background: #555; }
        .calc-btn.op { background: var(--accent-color); }

        /* Terminal */
        .terminal-container { height: 100%; padding: 10px; font-family: 'Courier New', monospace; color: #0f0; background: #000; overflow-y: auto; }
        .term-output { white-space: pre-wrap; margin-bottom: 10px; }
        .term-input-line { display: flex; }
        .term-prompt { margin-right: 5px; }
        .term-input { background: transparent; border: none; color: #0f0; outline: none; flex-grow: 1; font-family: inherit; }

        /* Browser */
        .browser-bar { display: flex; padding: 5px; background: #333; gap: 5px; }
        .browser-url { flex-grow: 1; background: #222; border: 1px solid #444; color: white; padding: 4px; border-radius: 3px; }
        .browser-frame { flex-grow: 1; background: white; border: none; width: 100%; height: 100%; }

        /* Settings */
        .settings-panel { padding: 20px; }
        .setting-row { margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }
        input[type="color"] { border: none; width: 40px; height: 40px; cursor: pointer; }

        /* Pictures */
        .gallery { display: flex; flex-wrap: wrap; gap: 10px; padding: 10px; }
        .gallery img { width: 100px; height: 100px; object-fit: cover; border-radius: 4px; cursor: pointer; }

    </style>
</head>
<body>

    <!-- Boot Animation -->
    <div id="boot-screen">
        <div class="loader"></div>
        <div style="color: #fff; font-size: 1.2rem;">Loading System...</div>
    </div>

    <!-- Context Menu -->
    <div id="context-menu">
        <div class="ctx-item" onclick="location.reload()">Refresh</div>
        <div class="ctx-item" onclick="os.openApp('settings')">Display Settings</div>
        <div class="ctx-item" onclick="os.openApp('terminal')">Open Terminal</div>
    </div>

    <!-- Desktop Icons -->
    <div id="desktop">
        <!-- Icons injected by JS -->
    </div>

    <!-- Start Menu -->
    <div id="start-menu">
        <div style="padding: 15px; font-weight: bold; border-bottom: 1px solid #444;">Applications</div>
        <div id="start-list"></div>
        <div class="start-footer">
            <div class="start-item" onclick="location.reload()">
                <span>⏻</span> <span>Shut Down</span>
            </div>
        </div>
    </div>

    <!-- Taskbar -->
    <div id="taskbar">
        <div id="start-btn">❖</div>
        <div id="taskbar-apps"></div>
        <div id="system-tray">
            <span id="clock">00:00</span>
        </div>
    </div>

    <script>
        const apps = [
            { id: 'computer', name: 'My Computer', icon: '💻', type: 'folder' },
            { id: 'recycle', name: 'Recycle Bin', icon: '🗑️', type: 'folder' },
            { id: 'notepad', name: 'Notepad', icon: '📝', type: 'app', action: 'notepad' },
            { id: 'calc', name: 'Calculator', icon: '🧮', type: 'app', action: 'calculator' },
            { id: 'browser', name: 'Browser', icon: '🌐', type: 'app', action: 'browser' },
            { id: 'terminal', name: 'Terminal', icon: '💻', type: 'app', action: 'terminal' },
            { id: 'settings', name: 'Settings', icon: '⚙️', type: 'app', action: 'settings' },
            { id: 'pictures', name: 'Pictures', icon: '🖼️', type: 'app', action: 'pictures' }
        ];

        class OperatingSystem {
            constructor() {
                this.zIndex = 100;
                this.windows = [];
                this.init();
            }

            init() {
                this.renderIcons();
                this.renderStartMenu();
                this.setupDesktopListeners();
                this.startClock();
                
                // Boot delay
                setTimeout(() => {
                    document.getElementById('boot-screen').style.opacity = '0';
                    setTimeout(() => document.getElementById('boot-screen').remove(), 1000);
                }, 1500);
            }

            renderIcons() {
                const desktop = document.getElementById('desktop');
                apps.forEach(app => {
                    const el = document.createElement('div');
                    el.className = 'desktop-icon';
                    el.innerHTML = `<div class="icon-img">${app.icon}</div><div class="icon-text">${app.name}</div>`;
                    el.ondblclick = () => this.openApp(app.action || null);
                    // Draggable icon logic (simplified)
                    let isDragging = false;
                    let startX, startY, initialLeft, initialTop;
                    
                    el.onmousedown = (e) => {
                        if(e.button !== 0) return;
                        isDragging = true;
                        startX = e.clientX;
                        startY = e.clientY;
                        el.style.position = 'absolute';
                        el.style.left = el.offsetLeft + 'px';
                        el.style.top = el.offsetTop + 'px';
                        el.style.zIndex = 10;
                    };

                    window.addEventListener('mousemove', (e) => {
                        if (!isDragging) return;
                        const dx = e.clientX - startX;
                        const dy = e.clientY - startY;
                        el.style.left = (el.offsetLeft + dx) + 'px';
                        el.style.top = (el.offsetTop + dy) + 'px';
                        startX = e.clientX;
                        startY = e.clientY;
                    });

                    window.addEventListener('mouseup', () => {
                        isDragging = false;
                        el.style.zIndex = '';
                    });

                    desktop.appendChild(el);
                });
            }

            renderStartMenu() {
                const list = document.getElementById('start-list');
                apps.forEach(app => {
                    if(app.type === 'app') {
                        const item = document.createElement('div');
                        item.className = 'start-item';
                        item.innerHTML = `<span>${app.icon}</span><span>${app.name}</span>`;
                        item.onclick = () => {
                            this.openApp(app.action);
                            this.toggleStartMenu();
                        };
                        list.appendChild(item);
                    }
                });
            }

            toggleStartMenu() {
                const menu = document.getElementById('start-menu');
                menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
            }

            setupDesktopListeners() {
                document.getElementById('start-btn').onclick = () => this.toggleStartMenu();
                
                // Close menus when clicking desktop
                document.getElementById('desktop').onclick = (e) => {
                    if (e.target.id === 'desktop') {
                        document.getElementById('start-menu').style.display = 'none';
                        document.getElementById('context-menu').style.display = 'none';
                    }
                };

                // Context Menu
                document.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    const ctx = document.getElementById('context-menu');
                    ctx.style.display = 'flex';
                    ctx.style.left = e.clientX + 'px';
                    ctx.style.top = e.clientY + 'px';
                });

                document.addEventListener('click', (e) => {
                    if (!e.target.closest('#context-menu')) {
                        document.getElementById('context-menu').style.display = 'none';
                    }
                });
            }

            startClock() {
                const update = () => {
                    const now = new Date();
                    document.getElementById('clock').innerText = 
                        now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                };
                update();
                setInterval(update, 1000);
            }

            openApp(appType) {
                if (!appType) return; // Folder logic not implemented for simplicity
                
                this.zIndex++;
                const win = document.createElement('div');
                win.className = 'window';
                win.style.zIndex = this.zIndex;
                win.style.left = (100 + (this.windows.length * 20)) + 'px';
                win.style.top = (50 + (this.windows.length * 20)) + 'px';
                win.style.width = '400px';
                win.style.height = '300px';

                // Generate Content
                let contentHtml = '';
                let title = 'Application';
                let onInit = null;

                switch(appType) {
                    case 'notepad':
                        title = 'Notepad';
                        contentHtml = `
                            <div class="notepad-container">
                                <div class="notepad-menu">
                                    <button onclick="os.appActions.notepad.new()">New</button>
                                    <button onclick="os.appActions.notepad.save()">Save</button>
                                </div>
                                <textarea class="notepad-area" id="notepad-${this.zIndex}"></textarea>
                            </div>`;
                        break;
                    case 'calculator':
                        title = 'Calculator';
                        win.style.width = '250px';
                        win.style.height = '350px';
                        contentHtml = `<div class="calc-grid" id="calc-${this.zIndex}"></div>`;
                        onInit = () => this.appActions.calculator.init(document.getElementById(`calc-${this.zIndex}`));
                        break;
                    case 'terminal':
                        title = 'Terminal';
                        contentHtml = `
                            <div class="terminal-container" id="term-${this.zIndex}" onclick="document.getElementById('input-${this.zIndex}').focus()">
                                <div class="term-output">WebOS Terminal v1.0<br>Type 'help' for commands.<br></div>
                                <div class="term-input-line">
                                    <span class="term-prompt">C:\\></span>
                                    <input type="text" class="term-input" id="input-${this.zIndex}" autocomplete="off">
                                </div>
                            </div>`;
                        onInit = () => this.appActions.terminal.init(document.getElementById(`input-${this.zIndex}`), document.querySelector(`#term-${this.zIndex} .term-output`));
                        break;
                    case 'browser':
                        title = 'Browser';
                        win.style.width = '600px';
                        win.style.height = '450px';
                        contentHtml = `
                            <div style="display:flex; flex-direction:column; height:100%;">
                                <div class="browser-bar">
                                    <input type="text" class="browser-url" value="https://www.wikipedia.org" onkeydown="if(event.key==='Enter') this.nextElementSibling.src=this.value">
                                    <button onclick="this.previousElementSibling.nextElementSibling.src=this.previousElementSibling.value">Go</button>
                                </div>
                                <iframe src="https://www.wikipedia.org" class="browser-frame" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
                            </div>`;
                        break;
                    case 'settings':
                        title = 'Settings';
                        contentHtml = `
                            <div class="settings-panel">
                                <h3>Display Settings</h3>
                                <div class="setting-row">
                                    <span>Accent Color</span>
                                    <input type="color" value="#3b82f6" onchange="document.documentElement.style.setProperty('--accent-color', this.value)">
                                </div>
                                <div class="setting-row">
                                    <span>Background Brightness</span>
                                    <input type="range" min="0" max="100" value="20" onchange="document.getElementById('desktop').style.filter = \`brightness(\${this.value/100 + 0.5})\`">
                                </div>
                            </div>`;
                        break;
                    case 'pictures':
                        title = 'Pictures';
                        contentHtml = `<div class="gallery">
                            <img src="https://picsum.photos/200/200?random=1" alt="img">
                            <img src="https://picsum.photos/200/200?random=2" alt="img">
                            <img src="https://picsum.photos/200/200?random=3" alt="img">
                            <img src="https://picsum.photos/200/200?random=4" alt="img">
                        </div>`;
                        break;
                }

                win.innerHTML = `
                    <div class="title-bar" onmousedown="os.windowManager.dragStart(event, this.parentElement)">
                        <div class="title-drag-area">${title}</div>
                        <div class="window-controls">
                            <div class="win-btn min-btn" onclick="this.closest('.window').style.display='none'"></div>
                            <div class="win-btn max-btn" onclick="os.windowManager.toggleMax(this.closest('.window'))"></div>
                            <div class="win-btn close-btn" onclick="os.windowManager.close(this.closest('.window'))"></div>
                        </div>
                    </div>
                    <div class="window-content">${contentHtml}</div>
                    <div class="resize-handle" onmousedown="os.windowManager.resizeStart(event, this.parentElement)"></div>
                `;

                win.onmousedown = () => {
                    win.style.zIndex = ++this.zIndex;
                };

                document.body.appendChild(win);
                this.windows.push(win);
                this.addTaskbarItem(title, win);

                if (onInit) onInit();
            }

            addTaskbarItem(title, winEl) {
                const bar = document.getElementById('taskbar-apps');
                const item = document.createElement('div');
                item.className = 'taskbar-item';
                item.innerText = title;
                item.onclick = () => {
                    if (winEl.style.display === 'none') {
                        winEl.style.display = 'flex';
                        winEl.style.zIndex = ++this.zIndex;
                    } else {
                        // If focused, minimize. Else focus.
                        if (parseInt(winEl.style.zIndex) === this.zIndex) {
                            winEl.style.display = 'none';
                        } else {
                            winEl.style.zIndex = ++this.zIndex;
                        }
                    }
                };
                winEl._taskbarItem = item; // Reference to remove later
                bar.appendChild(item);
            }

            // App Specific Logic
            appActions = {
                notepad: {
                    new: () => {
                        const textareas = document.querySelectorAll('textarea.notepad-area');
                        if(textareas.length > 0) textareas[textareas.length-1].value = '';
                    },
                    save: () => {
                        const textareas = document.querySelectorAll('textarea.notepad-area');
                        if(textareas.length > 0) {
                            localStorage.setItem('notepad_content', textareas[textareas.length-1].value);
                            alert('Saved to LocalStorage!');
                        }
                    }
                },
                calculator: {
                    init: (container) => {
                        const display = document.createElement('div');
                        display.className = 'calc-display';
                        display.id = 'calc-disp-' + container.id;
                        display.innerText = '0';
                        container.appendChild(display);

                        const buttons = ['C', '/', '*', '-', '7', '8', '9', '+', '4', '5', '6', '=', '1', '2', '3', '0'];
                        buttons.forEach(btn => {
                            const b = document.createElement('button');
                            b.className = 'calc-btn' + (['/', '*', '-', '+', '='].includes(btn) ? ' op' : '');
                            b.innerText = btn;
                            b.onclick = () => {
                                const d = document.getElementById(display.id);
                                if (btn === 'C') d.innerText = '0';
                                else if (btn === '=') {
                                    try { d.innerText = eval(d.innerText); } catch { d.innerText = 'Error'; }
                                } else {
                                    d.innerText = d.innerText === '0' ? btn : d.innerText + btn;
                                }
                            };
                            container.appendChild(b);
                        });
                    }
                },
                terminal: {
                    init: (input, output) => {
                        input.addEventListener('keydown', (e) => {
                            if (e.key === 'Enter') {
                                const cmd = input.value.trim().toLowerCase();
                                output.innerHTML += `<div><span class="term-prompt">C:\\></span> ${input.value}</div>`;
                                
                                let response = '';
                                if (cmd === 'help') response = 'Available commands: help, date, echo [text], clear, ls';
                                else if (cmd === 'date') response = new Date().toString();
                                else if (cmd.startsWith('echo ')) response = input.value.substring(5);
                                else if (cmd === 'ls') response = 'Desktop  Documents  Downloads  Music  Pictures';
                                else if (cmd === 'clear') output.innerHTML = '';
                                else response = `Command not found: ${cmd}`;

                                if(cmd !== 'clear') output.innerHTML += `<div>${response}</div>`;
                                input.value = '';
                                output.scrollTop = output.scrollHeight;
                            }
                        });
                    }
                }
            },

            // Window Management
            windowManager = {
                dragStart: (e, win) => {
                    if(e.target.closest('.window-controls')) return;
                    win.style.zIndex = ++os.zIndex;
                    let shiftX = e.clientX - win.getBoundingClientRect().left;
                    let shiftY = e.clientY - win.getBoundingClientRect().top;

                    const moveAt = (pageX, pageY) => {
                        win.style.left = pageX - shiftX + 'px';
                        win.style.top = pageY - shiftY + 'px';
                    };

                    const onMouseMove = (event) => moveAt(event.pageX, event.pageY);

                    document.addEventListener('mousemove', onMouseMove);

                    document.onmouseup = () => {
                        document.removeEventListener('mousemove', onMouseMove);
                        document.onmouseup = null;
                    };
                },
                resizeStart: (e, win) => {
                    e.stopPropagation();
                    document.onmousemove = (e) => {
                        win.style.width = (e.clientX - win.getBoundingClientRect().left) + 'px';
                        win.style.height = (e.clientY - win.getBoundingClientRect().top) + 'px';
                    };
                    document.onmouseup = () => {
                        document.onmousemove = null;
                        document.onmouseup = null;
                    };
                },
                toggleMax: (win) => {
                    if (win.dataset.maximized === 'true') {
                        win.style.top = win.dataset.prevTop;
                        win.style.left = win.dataset.prevLeft;
                        win.style.width = win.dataset.prevWidth;
                        win.style.height = win.dataset.prevHeight;
                        win.dataset.maximized = 'false';
                    } else {
                        win.dataset.prevTop = win.style.top;
                        win.dataset.prevLeft = win.style.left;
                        win.dataset.prevWidth = win.style.width;
                        win.dataset.prevHeight = win.style.height;
                        win.style.top = '0';
                        win.style.left = '0';
                        win.style.width = '100%';
                        win.style.height = 'calc(100vh - 40px)';
                        win.dataset.maximized = 'true';
                    }
                },
                close: (win) => {
                    win.remove();
                    if (win._taskbarItem) win._taskbarItem.remove();
                    os.windows = os.windows.filter(w => w !== win);
                }
            }
        };

        // Initialize System
        const os = new OperatingSystem();

        // Restore Notepad if exists
        setTimeout(() => {
            if(localStorage.getItem('notepad_content')) {
                // Logic handled in app open, but we can preload if we wanted
            }
        }, 2000);

    </script>
</body>
</html>
