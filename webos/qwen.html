<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebOS</title>
    <style>
        :root {
            --bg-color: #121212;
            --taskbar-color: #1e1e1e;
            --window-bg: #2b2b2b;
            --text-color: #e0e0e0;
            --accent-color: #0078d7;
            --border-color: #333;
            --hover-color: #3a3a3a;
            --selection-color: #4a4a4a;
        }

        * { box-sizing: border-box; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); }

        /* Boot Screen */
        #boot-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.5s ease;
        }
        .loader {
            width: 50px; height: 50px; border: 5px solid #333;
            border-top: 5px solid var(--accent-color); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Desktop */
        #desktop {
            position: absolute; top: 0; left: 0; width: 100%; height: calc(100% - 40px);
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
            padding: 20px; display: flex; flex-direction: column; flex-wrap: wrap; align-content: flex-start; gap: 10px;
        }

        /* Icons */
        .icon {
            width: 80px; height: 90px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; border-radius: 5px; transition: background 0.2s; color: white; text-shadow: 1px 1px 2px black;
        }
        .icon:hover { background-color: var(--hover-color); }
        .icon-img { width: 48px; height: 48px; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; font-size: 32px; }
        .icon-text { font-size: 12px; text-align: center; word-wrap: break-word; }

        /* Taskbar */
        #taskbar {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 40px;
            background: var(--taskbar-color); border-top: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between; padding: 0 10px; z-index: 9000;
        }
        #start-btn {
            background: var(--accent-color); color: white; border: none; padding: 5px 15px;
            height: 30px; cursor: pointer; font-weight: bold; border-radius: 2px; transition: opacity 0.2s;
        }
        #start-btn:hover { opacity: 0.9; }
        #taskbar-apps { flex-grow: 1; display: flex; padding-left: 10px; gap: 5px; }
        .taskbar-item {
            background: var(--window-bg); border: 1px solid var(--border-color);
            padding: 5px 10px; font-size: 12px; cursor: pointer; border-radius: 2px; max-width: 150px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
        }
        .taskbar-item.active { background: var(--hover-color); border-bottom: 2px solid var(--accent-color); }
        #tray { display: flex; align-items: center; gap: 15px; font-size: 12px; color: #ccc; }

        /* Start Menu */
        #start-menu {
            position: absolute; bottom: 40px; left: 0; width: 250px;
            background: var(--window-bg); border: 1px solid var(--border-color);
            border-top-right-radius: 5px;
            display: none; flex-direction: column; z-index: 9998; box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }
        .menu-item {
            padding: 10px 15px; cursor: pointer; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #333;
        }
        .menu-item:hover { background-color: var(--accent-color); }
        .menu-footer { padding: 10px; border-top: 1px solid var(--border-color); display: flex; justify-content: flex-end; }
        .power-btn { color: #ff5555; cursor: pointer; background: none; border: none; font-size: 16px; }

        /* Windows */
        .window {
            position: absolute; background: var(--window-bg); border: 1px solid var(--border-color);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); display: flex; flex-direction: column;
            min-width: 200px; min-height: 150px; border-radius: 4px; overflow: hidden;
        }
        .window-header {
            background: #222; height: 30px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 5px; cursor: default; border-bottom: 1px solid var(--border-color);
        }
        .window-title { font-size: 12px; font-weight: bold; pointer-events: none; }
        .window-controls { display: flex; gap: 5px; }
        .win-btn { width: 15px; height: 15px; border-radius: 50%; border: none; cursor: pointer; }
        .btn-min { background: #f1c40f; }
        .btn-max { background: #2ecc71; }
        .btn-close { background: #e74c3c; }
        .window-content { flex-grow: 1; padding: 0; overflow: auto; position: relative; background: var(--window-bg); }
        
        /* Resize Handle */
        .resize-handle {
            position: absolute; bottom: 0; right: 0; width: 15px; height: 15px; cursor: se-resize;
        }

        /* Apps Specific Styles */
        /* Notepad */
        .notepad-area { width: 100%; height: 100%; background: #1e1e1e; color: #eee; border: none; resize: none; padding: 10px; font-family: monospace; outline: none; }
        
        /* Calculator */
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); height: 100%; }
        .calc-display { grid-column: span 4; background: #111; color: white; font-size: 24px; text-align: right; padding: 15px; border: none; outline: none; }
        .calc-btn { background: #333; border: 1px solid #222; color: white; font-size: 18px; cursor: pointer; }
        .calc-btn:hover { background: #444; }
        .calc-btn.op { background: var(--accent-color); }

        /* Terminal */
        .terminal-body { background: #000; color: #0f0; font-family: monospace; padding: 10px; height: 100%; overflow-y: auto; font-size: 14px; }
        .cmd-line { display: flex; }
        .cmd-input { background: transparent; border: none; color: #0f0; outline: none; flex-grow: 1; font-family: monospace; }

        /* Browser */
        .browser-bar { padding: 5px; background: #333; display: flex; gap: 5px; }
        .browser-url { flex-grow: 1; background: #111; border: 1px solid #444; color: white; padding: 2px 5px; }
        .browser-frame { width: 100%; height: calc(100% - 35px); border: none; background: white; }

        /* Pictures */
        .gallery { display: flex; flex-wrap: wrap; padding: 10px; gap: 10px; }
        .pic-placeholder { width: 100px; height: 100px; background: #444; display: flex; align-items: center; justify-content: center; border: 2px solid #555; }

        /* Context Menu */
        #context-menu {
            position: absolute; background: var(--window-bg); border: 1px solid var(--border-color);
            display: none; flex-direction: column; z-index: 10000; width: 150px; box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }
        .ctx-item { padding: 8px 12px; cursor: pointer; font-size: 12px; }
        .ctx-item:hover { background: var(--accent-color); }
        .ctx-divider { height: 1px; background: var(--border-color); margin: 2px 0; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #222; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #777; }
    </style>
</head>
<body>

    <!-- Boot Screen -->
    <div id="boot-screen">
        <div class="loader"></div>
        <h2 style="color: white; font-weight: 300;">WebOS</h2>
    </div>

    <!-- Desktop -->
    <div id="desktop"></div>

    <!-- Context Menu -->
    <div id="context-menu">
        <div class="ctx-item" onclick="location.reload()">Refresh</div>
        <div class="ctx-divider"></div>
        <div class="ctx-item" onclick="appManager.open('settings')">Settings</div>
        <div class="ctx-item" onclick="appManager.open('terminal')">New Terminal</div>
        <div class="ctx-divider"></div>
        <div class="ctx-item">Properties</div>
    </div>

    <!-- Start Menu -->
    <div id="start-menu">
        <div style="padding: 15px; border-bottom: 1px solid #444; font-weight: bold;">WebOS User</div>
        <div id="start-apps-list"></div>
        <div class="menu-footer">
            <button class="power-btn" onclick="location.reload()">⏻</button>
        </div>
    </div>

    <!-- Taskbar -->
    <div id="taskbar">
        <button id="start-btn">Start</button>
        <div id="taskbar-apps"></div>
        <div id="tray">
            <span id="clock">00:00</span>
        </div>
    </div>

    <script>
        // System State
        const state = {
            zIndex: 100,
            windows: {},
            apps: [
                { id: 'computer', name: 'My Computer', icon: '💻', action: 'alert("System Info: WebOS v1.0\\nRAM: Infinite\\nCPU: JS Engine")' },
                { id: 'recycle', name: 'Recycle Bin', icon: '🗑️', action: 'alert("Recycle Bin is empty.")' },
                { id: 'notepad', name: 'Notepad', icon: '📝', action: 'openNotepad' },
                { id: 'calc', name: 'Calculator', icon: '🧮', action: 'openCalculator' },
                { id: 'browser', name: 'Browser', icon: '🌐', action: 'openBrowser' },
                { id: 'terminal', name: 'Terminal', icon: '⌨️', action: 'openTerminal' },
                { id: 'settings', name: 'Settings', icon: '⚙️', action: 'openSettings' },
                { id: 'pictures', name: 'Pictures', icon: '🖼️', action: 'openPictures' }
            ]
        };

        // Boot Animation
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('boot-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('boot-screen').style.display = 'none';
                }, 500);
            }, 1500);
            initDesktop();
            initClock();
        };

        // Clock
        function initClock() {
            const update = () => {
                const d = new Date();
                document.getElementById('clock').innerText = d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            };
            setInterval(update, 1000);
            update();
        }

        // Desktop Init
        function initDesktop() {
            const desktop = document.getElementById('desktop');
            const startList = document.getElementById('start-apps-list');
            
            state.apps.forEach(app => {
                // Desktop Icon
                const icon = document.createElement('div');
                icon.className = 'icon';
                icon.innerHTML = `<div class="icon-img">${app.icon}</div><div class="icon-text">${app.name}</div>`;
                icon.ondblclick = () => {
                    if (typeof app.action === 'function') app.action();
                    else if (app.action.includes('alert')) eval(app.action);
                };
                desktop.appendChild(icon);

                // Start Menu Item
                const menuItem = document.createElement('div');
                menuItem.className = 'menu-item';
                menuItem.innerHTML = `<span>${app.icon}</span> ${app.name}`;
                menuItem.onclick = () => {
                    if (typeof app.action === 'function') app.action();
                    toggleStartMenu();
                };
                startList.appendChild(menuItem);
            });

            // Context Menu
            desktop.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                const menu = document.getElementById('context-menu');
                menu.style.display = 'flex';
                menu.style.left = e.pageX + 'px';
                menu.style.top = e.pageY + 'px';
            });
            document.addEventListener('click', (e) => {
                document.getElementById('context-menu').style.display = 'none';
                if (!e.target.closest('#start-menu') && !e.target.closest('#start-btn')) {
                    document.getElementById('start-menu').style.display = 'none';
                }
            });

            document.getElementById('start-btn').onclick = toggleStartMenu;
        }

        function toggleStartMenu() {
            const menu = document.getElementById('start-menu');
            menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
        }

        // Window Manager
        class Window {
            constructor(title, contentHtml, width, height, appType) {
                this.id = 'win-' + Date.now();
                this.appType = appType;
                this.createDOM(title, contentHtml, width, height);
                state.windows[this.id] = this;
                this.addToTaskbar();
            }

            createDOM(title, content, w, h) {
                const win = document.createElement('div');
                win.className = 'window';
                win.id = this.id;
                win.style.width = w + 'px';
                win.style.height = h + 'px';
                win.style.left = (100 + Object.keys(state.windows).length * 20) + 'px';
                win.style.top = (50 + Object.keys(state.windows).length * 20) + 'px';
                win.style.zIndex = ++state.zIndex;
                
                win.innerHTML = `
                    <div class="window-header">
                        <span class="window-title">${title}</span>
                        <div class="window-controls">
                            <button class="win-btn btn-min" onclick="appManager.minimize('${this.id}')"></button>
                            <button class="win-btn btn-max" onclick="appManager.maximize('${this.id}')"></button>
                            <button class="win-btn btn-close" onclick="appManager.close('${this.id}')"></button>
                        </div>
                    </div>
                    <div class="window-content">${content}</div>
                    <div class="resize-handle"></div>
                `;

                document.body.appendChild(win);
                this.element = win;
                this.initDrag(win);
                this.initResize(win);
                win.onmousedown = () => this.focus();
            }

            initDrag(win) {
                const header = win.querySelector('.window-header');
                let isDragging = false, startX, startY, initialLeft, initialTop;

                header.onmousedown = (e) => {
                    if(e.target.tagName === 'BUTTON') return;
                    isDragging = true;
                    startX = e.clientX;
                    startY = e.clientY;
                    initialLeft = win.offsetLeft;
                    initialTop = win.offsetTop;
                    win.style.transition = 'none';
                };

                document.addEventListener('mousemove', (e) => {
                    if (!isDragging) return;
                    win.style.left = (initialLeft + e.clientX - startX) + 'px';
                    win.style.top = (initialTop + e.clientY - startY) + 'px';
                });

                document.addEventListener('mouseup', () => isDragging = false);
            }

            initResize(win) {
                const handle = win.querySelector('.resize-handle');
                let isResizing = false, startX, startY, initW, initH;

                handle.onmousedown = (e) => {
                    isResizing = true;
                    startX = e.clientX;
                    startY = e.clientY;
                    initW = parseInt(document.defaultView.getComputedStyle(win).width, 10);
                    initH = parseInt(document.defaultView.getComputedStyle(win).height, 10);
                    e.stopPropagation();
                };

                document.addEventListener('mousemove', (e) => {
                    if (!isResizing) return;
                    win.style.width = (initW + e.clientX - startX) + 'px';
                    win.style.height = (initH + e.clientY - startY) + 'px';
                });

                document.addEventListener('mouseup', () => isResizing = false);
            }

            focus() {
                this.element.style.zIndex = ++state.zIndex;
                this.restoreFromTaskbar(true);
            }

            addToTaskbar() {
                const item = document.createElement('div');
                item.className = 'taskbar-item';
                item.innerText = this.element.querySelector('.window-title').innerText;
                item.dataset.winId = this.id;
                item.onclick = () => {
                    if (this.element.style.display === 'none') this.restoreFromTaskbar();
                    else this.focus();
                };
                document.getElementById('taskbar-apps').appendChild(item);
                this.taskbarItem = item;
            }

            restoreFromTaskbar(focus = false) {
                this.element.style.display = 'flex';
                this.taskbarItem.classList.remove('active');
                if (focus) this.focus();
            }
        }

        // App Manager
        const appManager = {
            open: (type) => {
                if (type === 'notepad') new Window('Notepad', `<textarea class="notepad-area" id="notepad-content-${Date.now()}"></textarea><div style="position:absolute;top:0;left:0;background:#333;width:100%;font-size:10px;padding:2px;"><button onclick="this.parentElement.previousElementSibling.value=''">New</button> <button onclick="localStorage.setItem('note', this.parentElement.previousElementSibling.value)">Save</button></div>`, 400, 300);
                if (type === 'calc') new Window('Calculator', `<div class="calc-grid"><input class="calc-display" readonly><button class="calc-btn" onclick="calcInput('C')">C</button><button class="calc-btn" onclick="calcInput('/')">/</button><button class="calc-btn" onclick="calcInput('*')">*</button><button class="calc-btn" onclick="calcInput('-')">-</button><button class="calc-btn" onclick="calcInput('7')">7</button><button class="calc-btn" onclick="calcInput('8')">8</button><button class="calc-btn" onclick="calcInput('9')">9</button><button class="calc-btn" onclick="calcInput('+')">+</button><button class="calc-btn" onclick="calcInput('4')">4</button><button class="calc-btn" onclick="calcInput('5')">5</button><button class="calc-btn" onclick="calcInput('6')">6</button><button class="calc-btn op" style="grid-row:span 2" onclick="calcInput('=')">=</button><button class="calc-btn" onclick="calcInput('1')">1</button><button class="calc-btn" onclick="calcInput('2')">2</button><button class="calc-btn" onclick="calcInput('3')">3</button><button class="calc-btn" style="grid-column:span 2" onclick="calcInput('0')">0</button><button class="calc-btn" onclick="calcInput('.')">.</button></div>`, 250, 350);
                if (type === 'terminal') new Window('Terminal', `<div class="terminal-body" id="term-${Date.now()}"><div>Welcome to WebOS Terminal</div><div>Type 'help' for commands.</div><div class="cmd-line"><span>&gt; </span><input class="cmd-input" onkeydown="handleTerm(event, this)"></div></div>`, 500, 300);
                if (type === 'browser') new Window('Browser', `<div class="browser-bar"><input class="browser-url" placeholder="http://example.com"><button>Go</button></div><iframe class="browser-frame" src="about:blank"></iframe>`, 600, 400);
                if (type === 'settings') new Window('Settings', `<div style="padding:20px"><h3>Display</h3><label><input type="checkbox"> Night Light</label><br><h3>About</h3><p>WebOS v1.0</p></div>`, 300, 250);
                if (type === 'pictures') new Window('Pictures', `<div class="gallery"><div class="pic-placeholder">🏔️</div><div class="pic-placeholder">🌊</div><div class="pic-placeholder">🏠</div><div class="pic-placeholder">🐶</div></div>`, 400, 300);
            },
            close: (id) => {
                const win = document.getElementById(id);
                if (win) win.remove();
                const tItem = document.querySelector(`.taskbar-item[data-win-id="${id}"]`);
                if (tItem) tItem.remove();
                delete state.windows[id];
            },
            minimize: (id) => {
                document.getElementById(id).style.display = 'none';
                document.querySelector(`.taskbar-item[data-win-id="${id}"]`).classList.add('active');
            },
            maximize: (id) => {
                const win = document.getElementById(id);
                if (win.style.width === '100%') {
                    win.style.width = '400px'; win.style.height = '300px';
                    win.style.top = '50px'; win.style.left = '50px';
                } else {
                    win.style.width = '100%'; win.style.height = 'calc(100% - 40px)';
                    win.style.top = '0'; win.style.left = '0';
                }
            }
        };

        // App Logic Helpers
        window.calcInput = (val) => {
            const display = document.querySelector('.calc-display'); // Simplified selector
            if(val === 'C') display.value = '';
            else if(val === '=') { try { display.value = eval(display.value); } catch { display.value = 'Error'; } }
            else display.value += val;
        };

        window.handleTerm = (e, input) => {
            if (e.key === 'Enter') {
                const cmd = input.value.trim();
                const term = input.parentElement.parentElement;
                
                // Add old command
                const line = document.createElement('div');
                line.innerText = '> ' + cmd;
                term.insertBefore(line, input.parentElement);

                // Process
                let response = '';
                if (cmd === 'help') response = 'Available: help, date, echo [text], clear, ls';
                else if (cmd === 'date') response = new Date().toString();
                else if (cmd.startsWith('echo ')) response = cmd.substring(5);
                else if (cmd === 'ls') response = 'Documents  Downloads  Pictures  Music';
                else if (cmd === 'clear') { term.innerHTML = ''; response = null; }
                else response = `Command not found: ${cmd}`;

                if (response !== null) {
                    const resp = document.createElement('div');
                    resp.innerText = response;
                    term.insertBefore(resp, input.parentElement);
                }
                
                input.value = '';
                term.scrollTop = term.scrollHeight;
            }
        };

    </script>
</body>
</html>
