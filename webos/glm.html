<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DarkOS</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080810;--surface:#10101c;--card:#181830;--border:#252545;
  --text:#dcdcf0;--muted:#6a6a8a;--accent:#00d4a0;--accent-h:#00f0b8;
  --accent-dim:rgba(0,212,160,.12);--danger:#ff4060;--warn:#f0a020;
  --win-bg:#12122a;--win-head:#1a1a36;--taskbar:rgba(8,8,16,.94);
  --shadow:0 6px 30px rgba(0,0,0,.55);
}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--bg);color:var(--text);user-select:none;cursor:default}

/* Boot */
#boot{position:fixed;inset:0;z-index:99999;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s}
#boot.done{opacity:0;pointer-events:none}
#boot-logo{font-size:42px;font-weight:800;letter-spacing:6px;color:var(--accent);text-shadow:0 0 30px rgba(0,212,160,.4);margin-bottom:30px;animation:logoGlow 2s ease-in-out infinite alternate}
@keyframes logoGlow{0%{text-shadow:0 0 20px rgba(0,212,160,.3)}100%{text-shadow:0 0 50px rgba(0,212,160,.6)}}
#boot-log{font-family:'Courier New',monospace;font-size:13px;color:#00cc88;text-align:left;width:420px;line-height:1.7;margin-bottom:24px}
#boot-log span{opacity:0;animation:lineIn .3s forwards}
@keyframes lineIn{to{opacity:1}}
#boot-bar-wrap{width:320px;height:4px;background:#1a1a2a;border-radius:2px;overflow:hidden}
#boot-bar{height:100%;width:0;background:linear-gradient(90deg,var(--accent),#00a8ff);border-radius:2px;transition:width .4s}

/* Desktop */
#desktop{position:fixed;inset:0;bottom:44px;
  background:
    radial-gradient(ellipse at 15% 50%,rgba(0,212,160,.06) 0%,transparent 50%),
    radial-gradient(ellipse at 85% 25%,rgba(0,120,200,.05) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 90%,rgba(0,212,160,.04) 0%,transparent 40%),
    linear-gradient(170deg,#080810 0%,#0a1020 100%);
  overflow:hidden}
#desktop-icons{position:absolute;inset:12px;bottom:12px;display:flex;flex-direction:column;flex-wrap:wrap;align-content:flex-start;gap:8px}
.desk-icon{width:82px;height:86px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border-radius:8px;padding:6px 4px;cursor:pointer;transition:background .15s}
.desk-icon:hover{background:rgba(255,255,255,.06)}
.desk-icon.selected{background:var(--accent-dim);outline:1px solid rgba(0,212,160,.3)}
.desk-icon svg{width:38px;height:38px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.4))}
.desk-icon span{font-size:11px;text-align:center;line-height:1.2;color:#c0c0d8;text-shadow:0 1px 3px rgba(0,0,0,.7);max-width:78px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Taskbar */
#taskbar{position:fixed;bottom:0;left:0;right:0;height:44px;background:var(--taskbar);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;align-items:center;z-index:9000;padding:0 4px}
#start-btn{height:34px;padding:0 14px;display:flex;align-items:center;gap:7px;background:transparent;border:1px solid transparent;border-radius:6px;color:var(--text);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
#start-btn:hover{background:var(--accent-dim);border-color:rgba(0,212,160,.2)}
#start-btn.active{background:var(--accent-dim);border-color:rgba(0,212,160,.3)}
#start-btn svg{width:18px;height:18px}
#taskbar-apps{flex:1;display:flex;gap:3px;padding:0 8px;overflow-x:auto;overflow-y:hidden}
#taskbar-apps::-webkit-scrollbar{display:none}
.taskbar-app{height:34px;min-width:44px;padding:0 12px;display:flex;align-items:center;gap:6px;background:transparent;border:1px solid transparent;border-radius:6px;color:#a0a0b8;font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap}
.taskbar-app:hover{background:rgba(255,255,255,.06)}
.taskbar-app.active{background:var(--accent-dim);border-color:rgba(0,212,160,.25);color:var(--text)}
.taskbar-app svg{width:16px;height:16px;flex-shrink:0}
#sys-tray{display:flex;align-items:center;gap:12px;padding:0 12px;font-size:12px;color:var(--muted)}
#clock{font-variant-numeric:tabular-nums;font-weight:500;color:var(--text)}

/* Start Menu */
#start-menu{position:fixed;bottom:48px;left:4px;width:280px;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);z-index:9500;padding:8px;display:none;animation:menuIn .2s ease}
#start-menu.show{display:block}
@keyframes menuIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.start-search{width:100%;height:34px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:0 12px;color:var(--text);font-size:13px;outline:none;margin-bottom:8px}
.start-search:focus{border-color:rgba(0,212,160,.4)}
.start-apps{display:flex;flex-direction:column;gap:2px;max-height:320px;overflow-y:auto}
.start-apps::-webkit-scrollbar{width:4px}
.start-apps::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.start-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;cursor:pointer;transition:background .12s}
.start-item:hover{background:var(--accent-dim)}
.start-item svg{width:22px;height:22px;flex-shrink:0}
.start-item span{font-size:13px;font-weight:500}
.start-divider{height:1px;background:var(--border);margin:6px 0}
.start-footer{display:flex;align-items:center;justify-content:space-between;padding:4px 4px 0}
.start-user{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);padding:6px 8px}
.start-user-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#0088aa);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
#shutdown-btn{padding:6px 16px;background:rgba(255,64,96,.12);border:1px solid rgba(255,64,96,.2);border-radius:6px;color:var(--danger);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
#shutdown-btn:hover{background:rgba(255,64,96,.25)}

/* Context Menu */
#ctx-menu{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow);z-index:9800;padding:6px;display:none;min-width:180px;animation:menuIn .15s ease}
#ctx-menu.show{display:block}
.ctx-item{padding:7px 14px;border-radius:6px;font-size:13px;cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:8px}
.ctx-item:hover{background:var(--accent-dim)}
.ctx-sep{height:1px;background:var(--border);margin:4px 6px}

/* Windows */
.window{position:absolute;background:var(--win-bg);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow);display:flex;flex-direction:column;min-width:240px;min-height:160px;animation:winOpen .25s ease;overflow:hidden}
.window.closing{animation:winClose .2s ease forwards}
@keyframes winOpen{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes winClose{to{opacity:0;transform:scale(.92)}}
.window.minimized{display:none!important}
.window.maximized{border-radius:0!important}
.win-head{height:38px;background:var(--win-head);display:flex;align-items:center;padding:0 8px 0 12px;gap:8px;cursor:default;flex-shrink:0;border-bottom:1px solid var(--border)}
.win-icon{width:16px;height:16px;flex-shrink:0}
.win-title{flex:1;font-size:12px;font-weight:600;color:#b0b0c8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.win-ctrls{display:flex;gap:2px}
.win-btn{width:28px;height:28px;border:none;border-radius:6px;background:transparent;color:#8888a0;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.win-btn:hover{background:rgba(255,255,255,.08)}
.win-btn.close-btn:hover{background:rgba(255,64,96,.25);color:var(--danger)}
.win-body{flex:1;overflow:auto;position:relative}
.win-body::-webkit-scrollbar{width:6px}
.win-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Resize handles */
.rh{position:absolute;z-index:2}
.rh-n{top:-4px;left:10px;right:10px;height:8px;cursor:n-resize}
.rh-s{bottom:-4px;left:10px;right:10px;height:8px;cursor:s-resize}
.rh-e{right:-4px;top:10px;bottom:10px;width:8px;cursor:e-resize}
.rh-w{left:-4px;top:10px;bottom:10px;width:8px;cursor:w-resize}
.rh-ne{top:-4px;right:-4px;width:14px;height:14px;cursor:ne-resize}
.rh-nw{top:-4px;left:-4px;width:14px;height:14px;cursor:nw-resize}
.rh-se{bottom:-4px;right:-4px;width:14px;height:14px;cursor:se-resize}
.rh-sw{bottom:-4px;left:-4px;width:14px;height:14px;cursor:sw-resize}

/* Notepad */
.np-menu{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:2px 4px;gap:2px;position:relative}
.np-menu-btn{padding:4px 10px;font-size:12px;background:transparent;border:none;color:var(--muted);border-radius:4px;cursor:pointer}
.np-menu-btn:hover,.np-menu-btn.open{background:var(--accent-dim);color:var(--text)}
.np-dropdown{position:absolute;top:100%;left:4px;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow);padding:4px;z-index:10;display:none;min-width:150px}
.np-dropdown.show{display:block}
.np-dd-item{padding:6px 12px;font-size:12px;border-radius:4px;cursor:pointer;color:var(--text)}
.np-dd-item:hover{background:var(--accent-dim)}
.np-editor{width:100%;height:100%;background:transparent;border:none;color:var(--text);font-family:'Courier New',monospace;font-size:14px;padding:10px;resize:none;outline:none;line-height:1.6}
.np-status{height:22px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 10px;font-size:11px;color:var(--muted);gap:16px}
.np-dialog{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:20}
.np-dialog-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;min-width:280px;box-shadow:var(--shadow)}
.np-dialog-box h3{font-size:14px;margin-bottom:12px;font-weight:600}
.np-dialog-box input{width:100%;height:32px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:0 10px;color:var(--text);font-size:13px;outline:none;margin-bottom:12px}
.np-dialog-box input:focus{border-color:rgba(0,212,160,.4)}
.np-dialog-btns{display:flex;gap:8px;justify-content:flex-end}
.np-dialog-btns button{padding:6px 16px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text);transition:all .12s}
.np-dialog-btns button:hover{background:var(--accent-dim)}
.np-dialog-btns button.primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.np-file-list{max-height:150px;overflow-y:auto;margin-bottom:12px}
.np-file-item{padding:6px 10px;font-size:12px;border-radius:4px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.np-file-item:hover{background:var(--accent-dim)}
.np-file-del{color:var(--danger);font-size:11px;padding:2px 6px;border-radius:3px;cursor:pointer}
.np-file-del:hover{background:rgba(255,64,96,.15)}

/* Calculator */
.calc-display{background:#0a0a18;border-bottom:1px solid var(--border);padding:16px;text-align:right}
.calc-expr{font-size:13px;color:var(--muted);height:18px;overflow:hidden}
.calc-val{font-size:32px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;overflow:hidden}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;padding:4px}
.calc-key{height:48px;border:none;border-radius:6px;font-size:16px;font-weight:600;cursor:pointer;transition:all .1s;background:var(--card);color:var(--text)}
.calc-key:hover{background:#252548}
.calc-key:active{transform:scale(.96)}
.calc-key.op{background:#1a2a3a;color:var(--accent)}
.calc-key.op:hover{background:#223344}
.calc-key.eq{background:var(--accent);color:#000}
.calc-key.eq:hover{background:var(--accent-h)}
.calc-key.fn{background:var(--surface);color:var(--warn)}
.calc-key.fn:hover{background:#1e1e30}
.calc-key.zero{grid-column:span 2}

/* Terminal */
.term{background:#0a0a12;display:flex;flex-direction:column;height:100%;font-family:'Courier New',monospace}
.term-output{flex:1;overflow-y:auto;padding:10px;font-size:13px;line-height:1.6;color:#00cc88}
.term-output::-webkit-scrollbar{width:4px}
.term-output::-webkit-scrollbar-thumb{background:#1a1a30}
.term-input-row{display:flex;align-items:center;padding:4px 10px 10px;font-size:13px;color:#00cc88}
.term-prompt{color:var(--accent);font-weight:700;white-space:nowrap;margin-right:6px}
.term-input{flex:1;background:transparent;border:none;color:#00cc88;font-family:inherit;font-size:13px;outline:none;caret-color:var(--accent)}

/* Browser */
.browser-bar{display:flex;align-items:center;gap:6px;padding:6px 8px;background:var(--surface);border-bottom:1px solid var(--border)}
.browser-nav-btn{width:28px;height:28px;border:none;background:transparent;color:var(--muted);border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.browser-nav-btn:hover{background:rgba(255,255,255,.06);color:var(--text)}
.browser-url{flex:1;height:28px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:0 10px;color:var(--text);font-size:12px;outline:none}
.browser-url:focus{border-color:rgba(0,212,160,.4)}
.browser-content{flex:1;background:#0c0c18;overflow-y:auto;padding:20px;font-size:14px;line-height:1.7}
.browser-content::-webkit-scrollbar{width:6px}
.browser-content::-webkit-scrollbar-thumb{background:var(--border)}

/* Settings */
.settings-body{display:flex;height:100%}
.settings-nav{width:160px;background:var(--surface);border-right:1px solid var(--border);padding:12px 8px;flex-shrink:0}
.settings-nav-item{padding:8px 12px;border-radius:6px;font-size:12px;cursor:pointer;color:var(--muted);margin-bottom:2px;transition:all .12s}
.settings-nav-item:hover{background:var(--accent-dim);color:var(--text)}
.settings-nav-item.active{background:var(--accent-dim);color:var(--accent);font-weight:600}
.settings-panel{flex:1;padding:20px;overflow-y:auto}
.settings-panel h2{font-size:18px;font-weight:700;margin-bottom:16px}
.settings-group{margin-bottom:20px}
.settings-group label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
.settings-wallpapers{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.swatch{height:60px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:all .15s}
.swatch:hover{transform:scale(1.05)}
.swatch.active{border-color:var(--accent);box-shadow:0 0 12px rgba(0,212,160,.3)}

/* My Computer */
.explorer{display:flex;flex-direction:column;height:100%}
.explorer-toolbar{display:flex;gap:4px;padding:6px 8px;background:var(--surface);border-bottom:1px solid var(--border)}
.explorer-path{flex:1;height:28px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:0 10px;color:var(--text);font-size:12px;outline:none}
.explorer-grid{flex:1;padding:12px;display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start;overflow-y:auto}
.explorer-item{width:80px;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px;border-radius:8px;cursor:pointer;transition:background .12s}
.explorer-item:hover{background:rgba(255,255,255,.05)}
.explorer-item svg{width:32px;height:32px}
.explorer-item span{font-size:11px;text-align:center;color:var(--muted);word-break:break-all}

/* Pictures */
.pic-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px}
.pic-thumb{aspect-ratio:4/3;border-radius:8px;cursor:pointer;transition:transform .15s;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:11px;color:rgba(255,255,255,.7)}
.pic-thumb:hover{transform:scale(1.04)}
.pic-viewer{position:absolute;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:10;cursor:pointer}
.pic-viewer canvas{max-width:90%;max-height:90%;border-radius:6px;box-shadow:0 4px 24px rgba(0,0,0,.6)}

/* Recycle Bin */
.rb-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--muted)}
.rb-empty svg{width:64px;height:64px;opacity:.3}
.rb-empty p{font-size:14px}

/* Scrollbars global */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>

<!-- Boot Screen -->
<div id="boot">
  <div id="boot-logo">DarkOS</div>
  <div id="boot-log"></div>
  <div id="boot-bar-wrap"><div id="boot-bar"></div></div>
</div>

<!-- Desktop -->
<div id="desktop">
  <div id="desktop-icons"></div>
  <div id="win-container"></div>
</div>

<!-- Context Menu -->
<div id="ctx-menu"></div>

<!-- Start Menu -->
<div id="start-menu">
  <input class="start-search" type="text" placeholder="Search apps..." id="start-search">
  <div class="start-apps" id="start-apps"></div>
  <div class="start-divider"></div>
  <div class="start-footer">
    <div class="start-user"><div class="start-user-avatar">G</div><span>Guest</span></div>
    <button id="shutdown-btn">Shutdown</button>
  </div>
</div>

<!-- Taskbar -->
<div id="taskbar">
  <button id="start-btn">
    <svg viewBox="0 0 48 48" fill="none" stroke="var(--accent)" stroke-width="3"><rect x="6" y="6" width="15" height="15" rx="2"/><rect x="27" y="6" width="15" height="15" rx="2"/><rect x="6" y="27" width="15" height="15" rx="2"/><rect x="27" y="27" width="15" height="15" rx="2"/></svg>
    <span>Start</span>
  </button>
  <div id="taskbar-apps"></div>
  <div id="sys-tray"><span id="clock"></span></div>
</div>

<script>
/* ===== SVG Icons ===== */
const IC={
  computer:`<svg viewBox="0 0 48 48" fill="none" stroke="#00d4a0" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="6" width="38" height="24" rx="3"/><rect x="18" y="30" width="12" height="5"/><line x1="14" y1="35" x2="34" y2="35"/><circle cx="24" cy="18" r="5" stroke-width="1.5" opacity=".4"/></svg>`,
  recycle:`<svg viewBox="0 0 48 48" fill="none" stroke="#00d4a0" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 17h20l-2.5 21H16.5z"/><line x1="11" y1="17" x2="37" y2="17"/><path d="M19 17V13a2 2 0 012-2h6a2 2 0 012 2v4"/><line x1="21" y1="22" x2="21" y2="33"/><line x1="24" y1="22" x2="24" y2="33"/><line x1="27" y1="22" x2="27" y2="33"/></svg>`,
  notepad:`<svg viewBox="0 0 48 48" fill="none" stroke="#00d4a0" stroke-width="2.2" stroke-linecap="round"><rect x="10" y="5" width="28" height="38" rx="2"/><line x1="16" y1="15" x2="32" y2="15"/><line x1="16" y1="21" x2="32" y2="21"/><line x1="16" y1="27" x2="28" y2="27"/><line x1="16" y1="33" x2="22" y2="33"/></svg>`,

  browser:`<svg viewBox="0 0 48 48" fill="none" stroke="#00d4a0" stroke-width="2.2"><circle cx="24" cy="24" r="17"/><ellipse cx="24" cy="24" rx="8" ry="17"/><line x1="7" y1="24" x2="41" y2="24"/><line x1="24" y1="7" x2="24" y2="41"/></svg>`,

/* ===== Boot ===== */
(function boot(){
  const log=document.getElementById('boot-log');
  const bar=document.getElementById('boot-bar');
  const msgs=[
    'DarkOS v2.1 — Loading kernel...','Memory check: 16384 MB — OK',
    'Initializing filesystem... — OK','Starting network daemon... — OK',
    'Loading display server... — OK','Mounting drives... — OK',
    'Starting desktop environment... — OK','','Welcome to DarkOS.'
  ];
  let i=0;
  function next(){
    if(i>=msgs.length){
      bar.style.width='100%';
      setTimeout(()=>{document.getElementById('boot').classList.add('done');
        setTimeout(()=>document.getElementById('boot').remove(),900);
      },600);
      return;
    }
    const span=document.createElement('span');
    span.textContent=msgs[i];
    span.style.animationDelay='0s';
    log.appendChild(span);
    log.appendChild(document.createElement('br'));
    bar.style.width=((i+1)/msgs.length*100)+'%';
    i++;
    setTimeout(next,i<3?300:i<msgs.length-1?180:400);
  }
  setTimeout(next,500);
})();

  const h12=h%12||12;

  document.getElementById('clock').textContent=

}

        clickTimer=setTimeout(()=>{clickTimer=null;},300);

function showCtx(x,y,items){

/* ===== Window Manager ===== */
function createWindow(opts){
  const id=S.nextId++;
  const w=opts.w||600,h=opts.h||420;
  const maxL=window.innerWidth-w-10,maxT=window.innerHeight-h-54;
  const l=opts.x!=null?Math.min(opts.x,maxL):Math.max(10,40+Math.random()*maxL*0.6);
  const t=opts.y!=null?Math.min(opts.y,maxT):Math.max(10,30+Math.random()*maxT*0.5);

  const win=document.createElement('div');
  win.className='window';win.id='win-'+id;
  win.style.cssText=`left:${l}px;top:${t}px;width:${w}px;height:${h}px;z-index:${++S.topZ};`;

  /* Resize handles */
  ['n','s','e','w','ne','nw','se','sw'].forEach(d=>{
    const rh=document.createElement('div');
    rh.className='rh rh-'+d;
    rh.addEventListener('mousedown',e=>{e.preventDefault();e.stopPropagation();startResize(id,e,d);});
    win.appendChild(rh);
  });

  /* Header */
  const head=document.createElement('div');
  head.className='win-head';
  head.innerHTML=`<div class="win-icon">${ICONS[opts.icon||'notepad']||''}</div><div class="win-title">${opts.title||'Window'}</div>
    <div class="win-ctrls"><button class="win-btn min-btn" title="Minimize">&#x2500;</button><button class="win-btn max-btn" title="Maximize">&#x25A1;</button><button class="win-btn close-btn" title="Close">&#x2715;</button></div>`;
  head.addEventListener('mousedown',e=>{
    if(e.target.closest('.win-btn'))return;
    startDrag(id,e);
  });
  head.addEventListener('dblclick',e=>{
    if(e.target.closest('.win-btn'))return;
    toggleMax(id);
  });
  head.querySelector('.min-btn').addEventListener('click',()=>minimizeWin(id));
  head.querySelector('.max-btn').addEventListener('click',()=>toggleMax(id));
  head.querySelector('.close-btn').addEventListener('click',()=>closeWin(id));
  win.appendChild(head);

  /* Body */
  const body=document.createElement('div');
  body.className='win-body';
  if(typeof opts.content==='function'){
    const res=opts.content(id);
    if(res instanceof HTMLElement)body.appendChild(res);
    else body.innerHTML=res;
  } else body.innerHTML=opts.content||'';
  win.appendChild(body);

  win.addEventListener('mousedown',()=>focusWin(id));
  document.getElementById('win-container').appendChild(win);

  const state={id,el:win,title:opts.title,icon:opts.icon,minimized:false,maximized:false,prevRect:null};
  S.wins.set(id,state);
  focusWin(id);
  updateTaskbar();
  return id;
}

function focusWin(id){
  const ws=S.wins.get(id);if(!ws)return;
  S.activeId=id;
  ws.el.style.zIndex=++S.topZ;
  S.wins.forEach((w)=>{w.el.classList.toggle('focused',w.id===id);});
  updateTaskbar();
}

function minimizeWin(id){
  const ws=S.wins.get(id);if(!ws)return;
  ws.minimized=true;
  ws.el.classList.add('minimized');
  if(S.activeId===id){
    S.activeId=null;
    /* Focus topmost visible */
    let topW=null,topZ=0;
    S.wins.forEach(w=>{if(!w.minimized&&parseInt(w.el.style.zIndex)>topZ){topZ=parseInt(w.el.style.zIndex);topW=w.id;}});
    if(topW)focusWin(topW);
  }
  updateTaskbar();
}

function toggleMax(id){
  const ws=S.wins.get(id);if(!ws)return;
  if(ws.maximized){
    const r=ws.prevRect;
    ws.el.style.left=r.l+'px';ws.el.style.top=r.t+'px';
    ws.el.style.width=r.w+'px';ws.el.style.height=r.h+'px';
    ws.el.classList.remove('maximized');
    ws.maximized=false;
  }else{
    ws.prevRect={l:ws.el.offsetLeft,t:ws.el.offsetTop,w:ws.el.offsetWidth,h:ws.el.offsetHeight};
    ws.el.style.left='0';ws.el.style.top='0';
    ws.el.style.width='100%';ws.el.style.height=(window.innerHeight-44)+'px';
    ws.el.classList.add('maximized');
    ws.maximized=true;
  }
  focusWin(id);
}

function closeWin(id){
  const ws=S.wins.get(id);if(!ws)return;
  ws.el.classList.add('closing');
  setTimeout(()=>{ws.el.remove();S.wins.delete(id);
    if(S.activeId===id)S.activeId=null;
    updateTaskbar();
  },200);
}

function setWinTitle(id,title){
  const ws=S.wins.get(id);if(!ws)return;
  ws.el.querySelector('.win-title').textContent=title;
}

/* ===== Drag & Resize ===== */
function startDrag(id,e){
  const ws=S.wins.get(id);if(!ws||ws.maximized)return;
  const rect=ws.el.getBoundingClientRect();
  S.drag={id,ox:e.clientX-rect.left,oy:e.clientY-rect.top};
  focusWin(id);
}

function startResize(id,e,dir){
  const ws=S.wins.get(id);if(!ws||ws.maximized)return;
  S.resize={id,dir,sx:e.clientX,sy:e.clientY,sl:ws.el.offsetLeft,st:ws.el.offsetTop,sw:ws.el.offsetWidth,sh:ws.el.offsetHeight};
  focusWin(id);
}

document.addEventListener('mousemove',e=>{
  if(S.drag){
    const ws=S.wins.get(S.drag.id);if(!ws)return;
    let nx=e.clientX-S.drag.ox,ny=e.clientY-S.drag.oy;
    ny=Math.max(0,Math.min(ny,window.innerHeight-44-ws.el.offsetHeight));
    nx=Math.max(-ws.el.offsetWidth+80,nx);
    ws.el.style.left=nx+'px';ws.el.style.top=ny+'px';
  }
  if(S.resize){
    const r=S.resize;
    const ws=S.wins.get(r.id);if(!ws)return;
    const dx=e.clientX-r.sx,dy=e.clientY-r.sy;
    let nl=r.sl,nt=r.st,nw=r.sw,nh=r.sh;
    const minW=240,minH=160;
    if(r.dir.includes('e')){nw=Math.max(minW,r.sw+dx);}
    if(r.dir.includes('w')){nw=Math.max(minW,r.sw-dx);nl=r.sl+(r.sw-nw);}
    if(r.dir.includes('s')){nh=Math.max(minH,r.sh+dy);}
    if(r.dir.includes('n')){nh=Math.max(minH,r.sh-dy);nt=r.st+(r.sh-nh);}
    ws.el.style.left=nl+'px';ws.el.style.top=nt+'px';
    ws.el.style.width=nw+'px';ws.el.style.height=nh+'px';
  }
});

document.addEventListener('mouseup',()=>{S.drag=null;S.resize=null;});

/* ===== Taskbar ===== */
function updateTaskbar(){
  const container=document.getElementById('taskbar-apps');
  container.innerHTML='';
  S.wins.forEach((ws,id)=>{
    const btn=document.createElement('div');
    btn.className='taskbar-app'+(S.activeId===id&&!ws.minimized?' active':'');
    btn.innerHTML=(ICONS[ws.icon]||'')+'<span>'+ws.title+'</span>';
    btn.addEventListener('click',()=>{
      if(ws.minimized){ws.minimized=false;ws.el.classList.remove('minimized');focusWin(id);}
      else if(S.activeId===id){minimizeWin(id);}
      else{focusWin(id);}
    });
    container.appendChild(btn);
  });
}

/* ===== Global click to close menus ===== */
document.addEventListener('mousedown',e=>{
  if(S.startOpen&&!e.target.closest('#start-menu')&&!e.target.closest('#start-btn'))toggleStart(false);
  if(S.ctxOpen&&!e.target.closest('#ctx-menu'))hideCtx();
});

/* ----- Notepad ----- */
function openNotepad(fileName,fileContent){
  createWindow({title:(fileName||'Untitled')+' — Notepad',w:560,h:420,icon:'notepad',content:(wid)=>{
    const d=document.createElement('div');
    d.style.cssText='display:flex;flex-direction:column;height:100%;position:relative;';
    d.innerHTML=`
      <div class="np-menu">
        <button class="np-menu-btn" data-menu="file">File</button>
        <div class="np-dropdown" id="np-dd-${wid}">
          <div class="np-dd-item" data-act="new">New</div>
          <div class="np-dd-item" data-act="open">Open...</div>
          <div class="np-dd-item" data-act="save">Save As...</div>
        </div>
      </div>
      <textarea class="np-editor" spellcheck="false">${fileContent||''}</textarea>
      <div class="np-status"><span class="np-lines">Ln 1</span><span class="np-chars">0 chars</span></div>`;
    const btn=d.querySelector('[data-menu="file"]');
    const dd=d.querySelector('.np-dropdown');
    const editor=d.querySelector('.np-editor');
    const statusLines=d.querySelector('.np-lines');
    const statusChars=d.querySelector('.np-chars');
    let currentFile=fileName||null;

    btn.addEventListener('click',e=>{
      e.stopPropagation();
      dd.classList.toggle('show');
      btn.classList.toggle('open',dd.classList.contains('show'));
    });
    document.addEventListener('mousedown',function closer(){
      dd.classList.remove('show');btn.classList.remove('open');
    });
    dd.querySelectorAll('.np-dd-item').forEach(item=>{
      item.addEventListener('click',()=>{
        dd.classList.remove('show');btn.classList.remove('open');
        const act=item.dataset.act;
        if(act==='new'){editor.value='';currentFile=null;setWinTitle(wid,'Untitled — Notepad');}
        else if(act==='open'){showNotepadOpen(wid,d,editor);}
        else if(act==='save'){showNotepadSave(wid,d,editor);}
      });
    });

    editor.addEventListener('input',()=>{
      const lines=editor.value.split('\n');
      const pos=editor.value.substring(0,editor.selectionStart).split('\n').length;
      statusLines.textContent='Ln '+pos;
      statusChars.textContent=editor.value.length+' chars';
    });
    return d;
  }});
}

function showNotepadSave(wid,container,editor){
  let existing=container.querySelector('.np-dialog');if(existing)existing.remove();
  const overlay=document.createElement('div');
  overlay.className='np-dialog';

function showNotepadOpen(wid,container,editor){
  let existing=container.querySelector('.np-dialog');if(existing)existing.remove();

  const keys=Object.keys(files);
  const overlay=document.createElement('div');

  let listHtml=keys.length?keys.map(k=>`<div class="np-file-item" data-f="${k}"><span>${k}</span><span class="np-file-del" data-del="${k}">Delete</span></div>`).join(''):'<div style="padding:10px;font-size:12px;color:var(--muted);">No saved files found.</div>';
  overlay.innerHTML=`<div class="np-dialog-box"><h3>Open File</h3><div class="np-file-list">${listHtml}</div>
    <div class="np-dialog-btns"><button class="np-cancel">Cancel</button></div></div>`;
  container.appendChild(overlay);
  overlay.querySelectorAll('.np-file-item').forEach(it=>{
    it.addEventListener('click',e=>{
      if(e.target.classList.contains('np-file-del')){

}

function openCalculator(){
  createWindow({title:'Calculator',w:280,h:400,icon:'calculator',content:()=>{
    const d=document.createElement('div');
    d.style.cssText='display:flex;flex-direction:column;height:100%;';
    d.innerHTML=`
      <div class="calc-display"><div class="calc-expr"></div><div class="calc-val">0</div></div>
      <div class="calc-grid" style="flex:1;">
        <button class="calc-key fn" data-k="C">C</button>
        <button class="calc-key fn" data-k="pm">+/-</button>
        <button class="calc-key fn" data-k="%">%</button>
        <button class="calc-key op" data-k="/">÷</button>
        <button class="calc-key" data-k="7">7</button>
        <button class="calc-key" data-k="8">8</button>
        <button class="calc-key" data-k="9">9</button>
        <button class="calc-key op" data-k="*">×</button>
        <button class="calc-key" data-k="4">4</button>
        <button class="calc-key" data-k="5">5</button>
        <button class="calc-key" data-k="6">6</button>
        <button class="calc-key op" data-k="-">−</button>
        <button class="calc-key" data-k="1">1</button>
        <button class="calc-key" data-k="2">2</button>
        <button class="calc-key" data-k="3">3</button>
        <button class="calc-key op" data-k="+">+</button>
        <button class="calc-key zero" data-k="0">0</button>
        <button class="calc-key" data-k=".">.</button>
        <button class="calc-key eq" data-k="=">=</button>
      </div>`;
    const display=d.querySelector('.calc-val');
    const expr=d.querySelector('.calc-expr');
    let cur='0',prev='',op='',fresh=true;

    function update(){display.textContent=cur;expr.textContent=prev?(prev+' '+op):'';}

    d.querySelector('.calc-grid').addEventListener('click',e=>{
      const btn=e.target.closest('[data-k]');if(!btn)return;
      const k=btn.dataset.k;
      if(k==='C'){cur='0';prev='';op='';fresh=true;update();return;}
      if(k==='pm'){if(cur!=='0'){cur=cur.startsWith('-')?cur.slice(1):'-'+cur;}update();return;}
      if(k==='%'){cur=String(parseFloat(cur)/100);update();return;}
      if(['+','-','*','/'].includes(k)){
        if(prev&&op&&!fresh){cur=String(calc(parseFloat(prev),parseFloat(cur),op));}
        prev=cur;op=k;fresh=true;update();return;
      }
      if(k==='='){
        if(prev&&op){cur=String(calc(parseFloat(prev),parseFloat(cur),op));prev='';op='';fresh=true;}
        update();return;
      }
      /* digit or dot */
      if(fresh){cur=(k==='.'?'0.':k);fresh=false;}
      else{if(k==='.'&&cur.includes('.'))return;cur+=k;}
      update();
    });

    function calc(a,b,o){
      let r=o==='+'?a+b:o==='-'?a-b:o==='*'?a*b:o==='/'?a/b:a;
      return Math.round(r*1e10)/1e10;
    }
    return d;
  }});
}

/* ----- Terminal ----- */
function openTerminal(){
  createWindow({title:'Terminal',w:560,h:380,icon:'terminal',content:(wid)=>{
    const d=document.createElement('div');
    d.className='term';
    const output=document.createElement('div');
    output.className='term-output';
    const inputRow=document.createElement('div');
    inputRow.className='term-input-row';
    inputRow.innerHTML='<span class="term-prompt">guest@darkos:~$</span><input type="text" class="term-input" autofocus>';
    const input=inputRow.querySelector('.term-input');
    d.appendChild(output);
    d.appendChild(inputRow);

    const history=[];let histIdx=-1;
    const cwd={path:'/home/guest'};
    const fs={
      '/':['home','etc','usr','var'],
      '/home':['guest'],
      '/home/guest':['documents','downloads','.bashrc'],
      '/home/guest/documents':['readme.txt','notes.md'],
      '/home/guest/downloads':['archive.zip'],
      '/etc':['hosts','passwd','fstab'],
      '/usr':['bin','lib','share'],
      '/var':['log','tmp'],
    };

    function print(text,color){
      const line=document.createElement('div');
      line.style.color=color||'#00cc88';
      line.textContent=text;
      output.appendChild(line);
      output.scrollTop=output.scrollHeight;
    }
    function printHTML(html){
      const line=document.createElement('div');
      line.innerHTML=html;
      output.appendChild(line);
      output.scrollTop=output.scrollHeight;
    }

    print('DarkOS Terminal v2.1');
    print('Type "help" for available commands.\n');

    input.addEventListener('keydown',e=>{
      if(e.key==='Enter'){
        const cmd=input.value.trim();
        input.value='';
        print('guest@darkos:'+cwd.path+'$ '+cmd,'#00a080');
        if(cmd)history.unshift(cmd);
        histIdx=-1;
        processCmd(cmd);
      }else if(e.key==='ArrowUp'){
        e.preventDefault();
        if(histIdx<history.length-1){histIdx++;input.value=history[histIdx];}
      }else if(e.key==='ArrowDown'){
        e.preventDefault();
        if(histIdx>0){histIdx--;input.value=history[histIdx];}
        else{histIdx=-1;input.value='';}
      }
    });

    /* Focus input when clicking terminal */
    d.addEventListener('click',()=>input.focus());

    function processCmd(cmd){
      const parts=cmd.split(/\s+/);
      const c=parts[0].toLowerCase();
      const args=parts.slice(1);
      switch(c){
        case'':break;
        case'help':
          printHTML(`<span style="color:#00d4a0;font-weight:700;">Available commands:</span>\n`);
          print('  help        Show this help message');
          print('  date        Display current date and time');
          print('  echo [text] Print text to terminal');
          print('  clear       Clear terminal output');
          print('  ls          List directory contents');
          print('  pwd         Print working directory');
          print('  cd [dir]    Change directory');
          print('  cat [file]  Display file contents');
          print('  whoami      Display current user');
          print('  uname       System information');
          print('  neofetch    System summary\n');
          break;
        case'date':print(new Date().toString());break;
        case'echo':print(args.join(' '));break;
        case'clear':output.innerHTML='';break;
        case'pwd':print(cwd.path);break;
        case'whoami':print('guest');break;
        case'uname':print('DarkOS 2.1 WebKernel 6.1 x86_64');break;
        case'ls':{
          const entries=fs[cwd.path]||[];
          entries.forEach(e=>{
            const isDir=!e.includes('.');
            printHTML(`  <span style="color:${isDir?'#00d4a0':'#88aacc'}">${e}${isDir?'/':''}</span>`);
          });
          break;
        }
        case'cd':{
          if(!args[0]||args[0]==='~'){cwd.path='/home/guest';break;}
          if(args[0]==='..'){
            const p=cwd.path.split('/').filter(Boolean);
            p.pop();
            cwd.path='/'+p.join('/')||'/';
            break;
          }
          const target=cwd.path==='/'?'/'+args[0]:cwd.path+'/'+args[0];
          if(fs[target]){cwd.path=target;}
          else{print('cd: no such directory: '+args[0],'#ff4060');}
          break;
        }
        case'cat':{
          if(!args[0]){print('cat: missing file operand','#ff4060');break;}
          const fileContents={
            '.bashrc':'# DarkOS bash config\nexport PS1="guest@darkos:\\w$ "\nalias ll="ls -la"\nPATH="/usr/bin:$PATH"',
            'readme.txt':'Welcome to DarkOS!\n\nThis is a fully functional web-based desktop environment.\nFeel free to explore the file system and applications.',
            'notes.md':'# Notes\n- DarkOS supports multiple windows\n- Calculator and Notepad are fully functional\n- Terminal has a virtual file system',
            'hosts':'127.0.0.1  localhost\n::1        localhost\n127.0.1.1  darkos',
            'passwd':'root:x:0:0:root:/root:/bin/bash\nguest:x:1000:1000:Guest User:/home/guest:/bin/bash',
            'fstab':'# /etc/fstab: static file system information\n/dev/sda1  /     ext4  defaults  0 1\n/dev/sda2  /home ext4  defaults  0 2',
          };
          if(fileContents[args[0]]){print(fileContents[args[0]]);}
          else{print('cat: '+args[0]+': No such file or directory','#ff4060');}
          break;
        }
        case'neofetch':
          printHTML(`<span style="color:#00d4a0;font-weight:700;">
    ___   ____  ____</span>
<span style="color:#00d4a0;font-weight:700;">   / _ \\ / __ \\/ __/</span>     <span style="color:#00d4a0;">guest</span>@<span style="color:#00d4a0;">darkos</span>
<span style="color:#00d4a0;font-weight:700;">  / // // /_/ /\\ \\</span>     OS: DarkOS 2.1
<span style="color:#00d4a0;font-weight:700;"> /____/ \\____/___/</span>     Kernel: WebKernel 6.1
                        Shell: DarkSH 1.0
                        Resolution: ${window.innerWidth}x${window.innerHeight}
                        Terminal: DarkTerminal
                        CPU: WebCore @ 3.2GHz
                        Memory: 16384 MB\n`);
          break;
        default:print(c+': command not found. Type "help" for available commands.','#ff4060');
      }
    }

    setTimeout(()=>input.focus(),100);
    return d;
  }});
}

function showPicViewer(wid,container,palette,index){
  let existing=container.querySelector('.pic-viewer');if(existing)existing.remove();
  const viewer=document.createElement('div');
  viewer.className='pic-viewer';
  const canvas=document.createElement('canvas');
  canvas.width=480;canvas.height=360;
  const ctx=canvas.getContext('2d');

  /* Draw abstract art */
  const grd=ctx.createLinearGradient(0,0,480,360);
  grd.addColorStop(0,palette.colors[0]);
  grd.addColorStop(0.5,palette.colors[1]);
  grd.addColorStop(1,palette.colors[2]);
  ctx.fillStyle=grd;
  ctx.fillRect(0,0,480,360);

  /* Add some shapes */
  for(let i=0;i<12;i++){
    ctx.beginPath();
    const x=Math.sin(i*2.5+index)*180+240;
    const y=Math.cos(i*1.8+index)*140+180;
    const r=Math.max(10,Math.abs(Math.sin(i*3))*60+20);
    ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${0.03+Math.random()*0.06})`;
    ctx.fill();
  }

  /* Add text */
  ctx.fillStyle='rgba(255,255,255,0.8)';
  ctx.font='bold 28px sans-serif';
  ctx.textAlign='center';
  ctx.fillText(palette.name,240,190);
  ctx.font='14px sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.fillText('Generated by DarkOS Pictures',240,220);

  viewer.appendChild(canvas);
  viewer.addEventListener('click',()=>viewer.remove());
  container.appendChild(viewer);
}

/* ===== Keyboard shortcut ===== */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(S.startOpen)toggleStart(false);
    if(S.ctxOpen)hideCtx();
  }
});

/* ===== Init wallpaper from storage ===== */
(function(){
  const saved=localStorage.getItem('darkos_wallpaper');
  if(saved)document.getElementById('desktop').style.background=saved;
})();
</script>
