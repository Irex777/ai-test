<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NebulaOS — Web Desktop</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-0: #07070c;
  --bg-1: #0e0e16;
  --bg-2: #15151f;
  --bg-3: #1c1c28;
  --bg-4: #252534;
  --bg-glass: rgba(20, 20, 30, 0.65);
  --bg-glass-strong: rgba(18, 18, 28, 0.88);
  --text: #f0f0f5;
  --text-dim: #9090a0;
  --text-muted: #6a6a78;
  --accent: #ff5a36;
  --accent-2: #00d4ff;
  --accent-3: #ffd34e;
  --success: #4ade80;
  --danger: #ff4d4d;
  --border: rgba(255, 255, 255, 0.08);
  --border-bright: rgba(255, 255, 255, 0.18);
  --glow: rgba(255, 90, 54, 0.4);
}
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg-0);
  color: var(--text);
  user-select: none;
  -webkit-font-smoothing: antialiased;
}

/* === BOOT SCREEN === */
#boot {
  position: fixed; inset: 0;
  background: radial-gradient(circle at 50% 50%, #1a0a14 0%, #07070c 70%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 10000;
  transition: opacity 0.8s ease;
}
#boot.fade { opacity: 0; pointer-events: none; }
.boot-logo {
  width: 100px; height: 100px;
  position: relative;
  animation: bootspin 2.5s ease-in-out infinite;
}
.boot-logo::before, .boot-logo::after {
  content: ''; position: absolute; inset: 0;
  border-radius: 50%;
  border: 3px solid transparent;
}
.boot-logo::before {
  border-top-color: var(--accent);
  border-right-color: var(--accent);
  box-shadow: 0 0 30px var(--glow);
}
.boot-logo::after {
  border-bottom-color: var(--accent-2);
  border-left-color: var(--accent-2);
  inset: 12px;
  animation: bootspin 2.5s ease-in-out infinite reverse;
}
@keyframes bootspin { to { transform: rotate(360deg); } }
.boot-title {
  margin-top: 40px;
  font-size: 32px; font-weight: 200;
  letter-spacing: 8px;
  background: linear-gradient(90deg, var(--accent), var(--accent-3), var(--accent-2));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.boot-sub {
  margin-top: 8px;
  font-size: 10px; letter-spacing: 4px;
  color: var(--text-muted);
  text-transform: uppercase;
}
.boot-progress {
  margin-top: 50px;
  width: 220px; height: 2px;
  background: var(--bg-3);
  border-radius: 1px;
  overflow: hidden;
  position: relative;
}
.boot-progress::after {
  content: ''; position: absolute;
  left: -40%; top: 0; height: 100%; width: 40%;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  animation: bootbar 1.8s ease-in-out infinite;
}
@keyframes bootbar { to { left: 100%; } }
.boot-msg {
  margin-top: 20px;
  font-size: 11px;
  color: var(--text-dim);
  font-family: 'Courier New', monospace;
  height: 16px;
}

/* === DESKTOP === */
#desktop {
  position: fixed; inset: 0;
  background: 
    radial-gradient(ellipse at 20% 20%, rgba(255, 90, 54, 0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 70%, rgba(0, 212, 255, 0.12) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 100%, rgba(255, 211, 78, 0.08) 0%, transparent 50%),
    linear-gradient(180deg, #0a0a14 0%, #07070c 100%);
  overflow: hidden;
}
#desktop::before {
  content: ''; position: absolute; inset: 0;
  background-image: 
    radial-gradient(1px 1px at 25px 35px, rgba(255,255,255,0.4), transparent),
    radial-gradient(1px 1px at 60px 80px, rgba(255,255,255,0.3), transparent),
    radial-gradient(1px 1px at 130px 50px, rgba(255,255,255,0.35), transparent),
    radial-gradient(1px 1px at 200px 120px, rgba(255,255,255,0.25), transparent),
    radial-gradient(1px 1px at 280px 30px, rgba(255,255,255,0.4), transparent),
    radial-gradient(2px 2px at 350px 90px, rgba(0, 212, 255, 0.5), transparent),
    radial-gradient(1px 1px at 420px 150px, rgba(255,255,255,0.3), transparent),
    radial-gradient(1px 1px at 500px 60px, rgba(255, 211, 78, 0.4), transparent);
  background-size: 550px 200px;
  opacity: 0.6;
  animation: drift 120s linear infinite;
  pointer-events: none;
}
@keyframes drift {
  to { background-position: -550px 200px; }
}

#desktop-grid {
  position: absolute;
  top: 20px; left: 20px;
  display: grid;
  grid-template-columns: repeat(2, 90px);
  gap: 8px 16px;
}

.desktop-icon {
  width: 90px; height: 92px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  padding: 10px 4px 6px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
}
.desktop-icon:hover {
  background: rgba(255, 255, 255, 0.05);
}
.desktop-icon.selected {
  background: rgba(255, 90, 54, 0.18);
  outline: 1px solid rgba(255, 90, 54, 0.4);
}
.desktop-icon .icon-img {
  width: 44px; height: 44px;
  margin-bottom: 6px;
  display: flex; align-items: center; justify-content: center;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
}
.desktop-icon .icon-img svg { width: 100%; height: 100%; }
.desktop-icon .icon-label {
  font-size: 12px;
  text-align: center;
  text-shadow: 0 1px 3px rgba(0,0,0,0.9);
  line-height: 1.2;
  max-width: 100%;
  word-break: break-word;
}

/* === WINDOWS === */
.window {
  position: absolute;
  background: var(--bg-glass-strong);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border-bright);
  border-radius: 10px;
  box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,0,0,0.3);
  display: flex; flex-direction: column;
  overflow: hidden;
  min-width: 320px; min-height: 200px;
  animation: winopen 0.18s ease-out;
}
@keyframes winopen {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}
.window.closing {
  animation: winclose 0.15s ease-in forwards;
}
@keyframes winclose {
  to { opacity: 0; transform: scale(0.95); }
}
.window.minimized {
  animation: winmin 0.2s ease-in forwards;
  pointer-events: none;
}
@keyframes winmin {
  to { opacity: 0; transform: translateY(80px) scale(0.7); }
}
.window.maximized {
  border-radius: 0;
}

.title-bar {
  height: 38px;
  flex-shrink: 0;
  display: flex; align-items: center;
  padding: 0 6px 0 14px;
  background: linear-gradient(180deg, rgba(40,40,55,0.7), rgba(20,20,30,0.7));
  border-bottom: 1px solid var(--border);
  cursor: grab;
  user-select: none;
}
.title-bar:active { cursor: grabbing; }
.title-bar .title-icon {
  width: 16px; height: 16px;
  margin-right: 10px;
}
.title-bar .title-text {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  flex: 1;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}
.title-bar .window-controls {
  display: flex; gap: 2px;
}
.win-btn {
  width: 30px; height: 26px;
  border: none;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.win-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }
.win-btn.close:hover { background: var(--danger); color: white; }
.win-btn svg { width: 11px; height: 11px; }

.window-body {
  flex: 1;
  overflow: hidden;
  position: relative;
  background: var(--bg-1);
}

.resizer {
  position: absolute;
  z-index: 10;
}
.resizer-r { right: 0; top: 0; width: 6px; height: 100%; cursor: e-resize; }
.resizer-b { bottom: 0; left: 0; width: 100%; height: 6px; cursor: s-resize; }
.resizer-l { left: 0; top: 0; width: 6px; height: 100%; cursor: w-resize; }
.resizer-t { top: 0; left: 0; width: 100%; height: 6px; cursor: n-resize; }
.resizer-br { bottom: 0; right: 0; width: 12px; height: 12px; cursor: se-resize; }
.resizer-bl { bottom: 0; left: 0; width: 12px; height: 12px; cursor: sw-resize; }
.resizer-tr { top: 0; right: 0; width: 12px; height: 12px; cursor: ne-resize; }
.resizer-tl { top: 0; left: 0; width: 12px; height: 12px; cursor: nw-resize; }

/* === TASKBAR === */
#taskbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 50px;
  background: var(--bg-glass-strong);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid var(--border-bright);
  display: flex; align-items: center;
  padding: 0 8px;
  z-index: 1000;
  box-shadow: 0 -10px 30px rgba(0,0,0,0.3);
}
#start-btn {
  height: 40px;
  padding: 0 16px;
  background: linear-gradient(135deg, var(--accent) 0%, #ff7849 100%);
  border: none;
  border-radius: 8px;
  color: white;
  font-weight: 600;
  font-size: 13px;
  display: flex; align-items: center; gap: 8px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 12px rgba(255, 90, 54, 0.4);
}
#start-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 18px rgba(255, 90, 54, 0.5);
}
#start-btn.active {
  transform: translateY(0);
  background: linear-gradient(135deg, #d4471e 0%, #c46629 100%);
}
#start-btn svg { width: 18px; height: 18px; }

.taskbar-divider {
  width: 1px; height: 24px;
  background: var(--border-bright);
  margin: 0 8px;
}

#running-apps {
  display: flex; gap: 4px;
  flex: 1;
  overflow: hidden;
}
.task-item {
  height: 40px;
  min-width: 40px;
  max-width: 200px;
  padding: 0 12px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 6px;
  display: flex; align-items: center; gap: 8px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  color: var(--text-dim);
}
.task-item:hover { background: rgba(255,255,255,0.1); color: var(--text); }
.task-item.active {
  background: rgba(255, 90, 54, 0.15);
  border-color: rgba(255, 90, 54, 0.4);
  color: var(--text);
}
.task-item.active::after {
  content: ''; position: absolute;
  bottom: -1px; left: 20%; right: 20%;
  height: 2px;
  background: var(--accent);
  border-radius: 1px;
  box-shadow: 0 0 8px var(--accent);
}
.task-item .task-icon { width: 18px; height: 18px; flex-shrink: 0; }
.task-item .task-label {
  font-size: 12px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

#system-tray {
  display: flex; align-items: center;
  gap: 4px;
  padding: 0 8px 0 12px;
}
.tray-icon {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-dim);
  cursor: pointer;
  border-radius: 6px;
  transition: all 0.15s;
}
.tray-icon:hover { background: rgba(255,255,255,0.08); color: var(--text); }
.tray-icon svg { width: 16px; height: 16px; }
#clock {
  padding: 0 10px;
  font-size: 12px;
  color: var(--text);
  text-align: right;
  line-height: 1.3;
  font-variant-numeric: tabular-nums;
  cursor: pointer;
  border-radius: 6px;
  height: 36px;
  display: flex; flex-direction: column;
  justify-content: center;
}
#clock:hover { background: rgba(255,255,255,0.08); }
#clock .time { font-weight: 600; }
#clock .date { font-size: 10px; color: var(--text-dim); }

/* === START MENU === */
#start-menu {
  position: fixed;
  bottom: 58px; left: 8px;
  width: 420px;
  max-height: 560px;
  background: var(--bg-glass-strong);
  backdrop-filter: blur(28px);
  -webkit-backdrop-filter: blur(28px);
  border: 1px solid var(--border-bright);
  border-radius: 12px;
  box-shadow: 0 30px 70px rgba(0,0,0,0.6);
  z-index: 999;
  display: none;
  flex-direction: column;
  overflow: hidden;
  transform-origin: bottom left;
  animation: menuopen 0.18s ease-out;
}
#start-menu.open { display: flex; }
@keyframes menuopen {
  from { opacity: 0; transform: scale(0.92) translateY(20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.start-header {
  padding: 20px 22px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 14px;
}
.start-avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent-3));
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: white;
  box-shadow: 0 4px 14px rgba(255,90,54,0.4);
}
.start-user-info .name { font-size: 14px; font-weight: 600; }
.start-user-info .email { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

.start-search {
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
}
.start-search input {
  width: 100%;
  padding: 8px 14px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
}
.start-search input:focus { border-color: var(--accent); }
.start-search input::placeholder { color: var(--text-muted); }

.start-apps {
  padding: 10px 12px;
  overflow-y: auto;
  flex: 1;
}
.start-apps::-webkit-scrollbar { width: 6px; }
.start-apps::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }
.start-section-title {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 8px 10px 6px;
}
.start-app {
  display: flex; align-items: center; gap: 14px;
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.12s;
}
.start-app:hover { background: rgba(255,255,255,0.07); }
.start-app .app-icon {
  width: 28px; height: 28px;
  flex-shrink: 0;
}
.start-app .app-name { font-size: 13px; font-weight: 500; }
.start-app .app-desc { font-size: 11px; color: var(--text-dim); margin-top: 1px; }

.start-footer {
  padding: 10px 14px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.power-btn {
  width: 36px; height: 36px;
  border-radius: 8px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  color: var(--text-dim);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.power-btn:hover { background: var(--danger); color: white; border-color: var(--danger); }
.power-btn svg { width: 16px; height: 16px; }

/* === CONTEXT MENU === */
#context-menu {
  position: fixed;
  background: var(--bg-glass-strong);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--border-bright);
  border-radius: 8px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  padding: 6px;
  min-width: 200px;
  z-index: 5000;
  display: none;
  animation: menuopen 0.12s ease-out;
}
#context-menu.open { display: block; }
.ctx-item {
  padding: 8px 14px;
  font-size: 13px;
  border-radius: 5px;
  cursor: pointer;
  display: flex; align-items: center; gap: 10px;
  color: var(--text);
  transition: background 0.1s;
}
.ctx-item:hover { background: var(--accent); color: white; }
.ctx-item svg { width: 14px; height: 14px; opacity: 0.8; }
.ctx-divider {
  height: 1px;
  background: var(--border);
  margin: 4px 8px;
}

/* === APP-SPECIFIC STYLES === */
/* Notepad */
.notepad-menubar {
  display: flex;
  background: var(--bg-2);
  border-bottom: 1px solid var(--border);
  padding: 4px 6px;
  gap: 2px;
  position: relative;
}
.menu-item {
  padding: 5px 12px;
  font-size: 12px;
  border-radius: 4px;
  cursor: pointer;
  color: var(--text);
}
.menu-item:hover, .menu-item.open { background: rgba(255,255,255,0.1); }
.menu-dropdown {
  position: absolute;
  top: 100%; left: 0;
  background: var(--bg-glass-strong);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border-bright);
  border-radius: 6px;
  padding: 4px;
  min-width: 180px;
  box-shadow: 0 14px 30px rgba(0,0,0,0.4);
  z-index: 100;
  display: none;
}
.menu-dropdown.open { display: block; }
.menu-option {
  padding: 7px 12px;
  font-size: 12px;
  border-radius: 4px;
  cursor: pointer;
  display: flex; align-items: center; gap: 10px;
}
.menu-option:hover { background: var(--accent); color: white; }
.menu-option .shortcut { margin-left: auto; font-size: 10px; color: var(--text-muted); }
.menu-option:hover .shortcut { color: rgba(255,255,255,0.7); }

.notepad textarea {
  width: 100%; height: 100%;
  background: var(--bg-1);
  color: var(--text);
  border: none;
  outline: none;
  padding: 14px 18px;
  font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
  font-size: 13px;
  line-height: 1.6;
  resize: none;
  user-select: text;
}
.notepad-statusbar {
  height: 22px;
  background: var(--bg-2);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 12px;
  font-size: 10px;
  color: var(--text-dim);
}

/* Calculator */
.calc {
  display: flex; flex-direction: column;
  height: 100%;
  background: var(--bg-1);
}
.calc-display {
  padding: 24px 20px 16px;
  text-align: right;
  background: var(--bg-2);
  border-bottom: 1px solid var(--border);
}
.calc-expr {
  font-size: 12px;
  color: var(--text-dim);
  min-height: 16px;
  font-family: 'Consolas', monospace;
  margin-bottom: 4px;
}
.calc-current {
  font-size: 36px;
  font-weight: 300;
  color: var(--text);
  font-family: 'Consolas', monospace;
  word-break: break-all;
}
.calc-grid {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--border);
  padding: 1px;
}
.calc-btn {
  background: var(--bg-2);
  border: none;
  color: var(--text);
  font-size: 18px;
  cursor: pointer;
  transition: all 0.1s;
  font-family: inherit;
  display: flex; align-items: center; justify-content: center;
}
.calc-btn:hover { background: var(--bg-4); }
.calc-btn:active { transform: scale(0.96); }
.calc-btn.op { color: var(--accent); }
.calc-btn.eq { background: var(--accent); color: white; }
.calc-btn.eq:hover { background: #ff7849; }
.calc-btn.fn { color: var(--accent-2); font-size: 14px; }

/* Terminal */
.terminal {
  height: 100%;
  background: #060609;
  color: #c8c8d0;
  font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
  font-size: 13px;
  padding: 12px 14px;
  overflow-y: auto;
  user-select: text;
  line-height: 1.5;
}
.terminal::-webkit-scrollbar { width: 8px; }
.terminal::-webkit-scrollbar-thumb { background: var(--bg-4); border-radius: 4px; }
.term-line { white-space: pre-wrap; word-break: break-all; }
.term-line.cmd { color: var(--accent-3); }
.term-line.err { color: var(--danger); }
.term-line.ok { color: var(--success); }
.term-line.dim { color: var(--text-muted); }
.term-line.accent { color: var(--accent-2); }
.term-input-line {
  display: flex; align-items: baseline;
  margin-top: 2px;
}
.term-prompt {
  color: var(--accent);
  margin-right: 8px;
  white-space: nowrap;
}
.term-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: inherit;
  font-size: inherit;
  user-select: text;
  caret-color: var(--accent);
}

/* Browser */
.browser {
  height: 100%;
  display: flex; flex-direction: column;
  background: var(--bg-1);
}
.browser-bar {
  padding: 8px 10px;
  background: var(--bg-2);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.browser-nav-btn {
  width: 28px; height: 28px;
  background: transparent;
  border: none;
  color: var(--text-dim);
  border-radius: 5px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.browser-nav-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
.browser-url {
  flex: 1;
  padding: 6px 12px;
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: 14px;
  color: var(--text);
  font-size: 12px;
  outline: none;
}
.browser-url:focus { border-color: var(--accent); }
.browser-content {
  flex: 1;
  overflow-y: auto;
  padding: 0;
  background: white;
  color: #222;
  user-select: text;
}
.browser-start {
  padding: 40px 30px;
  background: linear-gradient(180deg, #1a1a26 0%, #0e0e16 100%);
  color: var(--text);
  min-height: 100%;
  text-align: center;
}
.browser-start h2 {
  font-size: 28px;
  font-weight: 200;
  letter-spacing: 4px;
  background: linear-gradient(90deg, var(--accent), var(--accent-2));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin-bottom: 30px;
}
.browser-bookmarks {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  max-width: 460px;
  margin: 0 auto;
}
.bookmark {
  padding: 16px 8px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.15s;
}
.bookmark:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
.bookmark .bm-icon {
  width: 36px; height: 36px;
  margin: 0 auto 8px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: white;
}
.bookmark .bm-name { font-size: 11px; color: var(--text-dim); }

/* Settings */
.settings {
  height: 100%;
  display: flex;
  background: var(--bg-1);
}
.settings-sidebar {
  width: 180px;
  background: var(--bg-2);
  border-right: 1px solid var(--border);
  padding: 14px 8px;
}
.settings-nav-item {
  padding: 9px 12px;
  font-size: 13px;
  border-radius: 6px;
  cursor: pointer;
  color: var(--text-dim);
  margin-bottom: 2px;
  display: flex; align-items: center; gap: 10px;
}
.settings-nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
.settings-nav-item.active { background: rgba(255, 90, 54, 0.15); color: var(--accent); }
.settings-nav-item svg { width: 14px; height: 14px; }
.settings-content {
  flex: 1;
  padding: 24px 28px;
  overflow-y: auto;
}
.settings-content h3 {
  font-size: 18px;
  margin-bottom: 4px;
}
.settings-content .sub {
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 22px;
}
.setting-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.setting-row .info .title { font-size: 13px; }
.setting-row .info .desc { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.toggle {
  width: 38px; height: 22px;
  background: var(--bg-4);
  border-radius: 11px;
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
}
.toggle::after {
  content: '';
  position: absolute;
  left: 2px; top: 2px;
  width: 18px; height: 18px;
  background: white;
  border-radius: 50%;
  transition: left 0.2s;
}
.toggle.on { background: var(--accent); }
.toggle.on::after { left: 18px; }
.about-info {
  font-size: 12px;
  line-height: 1.8;
  color: var(--text-dim);
}
.about-info strong { color: var(--text); }

/* Pictures */
.pictures {
  height: 100%;
  overflow-y: auto;
  padding: 20px;
  background: var(--bg-1);
}
.pictures h3 { font-size: 15px; margin-bottom: 14px; }
.pic-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
}
.pic-thumb {
  aspect-ratio: 1;
  border-radius: 8px;
  cursor: pointer;
  overflow: hidden;
  position: relative;
  transition: transform 0.15s;
  border: 1px solid var(--border);
}
.pic-thumb:hover { transform: translateY(-2px); border-color: var(--accent); }
.pic-thumb svg { width: 100%; height: 100%; display: block; }
.pic-overlay {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 6px 8px;
  background: linear-gradient(transparent, rgba(0,0,0,0.85));
  font-size: 10px;
  color: white;
}

/* My Computer */
.filemgr {
  height: 100%;
  background: var(--bg-1);
  display: flex; flex-direction: column;
}
.filemgr-toolbar {
  padding: 8px 14px;
  background: var(--bg-2);
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  display: flex; align-items: center; gap: 6px;
}
.crumb { color: var(--text-dim); }
.crumb.active { color: var(--text); font-weight: 500; }
.filemgr-list {
  flex: 1;
  padding: 16px;
  overflow-y: auto;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 8px;
  align-content: start;
}
.file-item {
  padding: 12px 6px;
  text-align: center;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.12s;
}
.file-item:hover { background: rgba(255,255,255,0.06); }
.file-item svg { width: 38px; height: 38px; margin-bottom: 6px; }
.file-item .fname { font-size: 11px; color: var(--text-dim); word-break: break-word; }
.filemgr-statusbar {
  padding: 6px 14px;
  background: var(--bg-2);
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-dim);
  display: flex; justify-content: space-between;
}

/* Recycle Bin */
.recycle {
  height: 100%;
  background: var(--bg-1);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--text-dim);
  padding: 30px;
  text-align: center;
}
.recycle svg { width: 80px; height: 80px; margin-bottom: 20px; opacity: 0.4; }
.recycle h3 { font-size: 16px; color: var(--text); margin-bottom: 8px; font-weight: 500; }
.recycle p { font-size: 12px; line-height: 1.6; max-width: 280px; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  z-index: 8000;
  display: none;
  align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; animation: fadein 0.15s; }
@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--bg-glass-strong);
  backdrop-filter: blur(28px);
  border: 1px solid var(--border-bright);
  border-radius: 12px;
  padding: 26px;
  width: 360px;
  box-shadow: 0 30px 70px rgba(0,0,0,0.6);
  animation: menuopen 0.2s;
}
.modal h3 { font-size: 16px; margin-bottom: 8px; }
.modal p { font-size: 12px; color: var(--text-dim); margin-bottom: 20px; line-height: 1.6; }
.modal-actions {
  display: flex; gap: 8px; justify-content: flex-end;
}
.btn {
  padding: 8px 16px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg-3);
  color: var(--text);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.btn:hover { background: var(--bg-4); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
.btn.primary:hover { background: #ff7849; }
.btn.danger { background: var(--danger); border-color: var(--danger); color: white; }

#toast-container {
  position: fixed;
  bottom: 70px; right: 16px;
  z-index: 7000;
  display: flex; flex-direction: column;
  gap: 8px;
  pointer-events: none;
}
.toast {
  background: var(--bg-glass-strong);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border-bright);
  border-left: 3px solid var(--accent);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 12px;
  color: var(--text);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  animation: toastin 0.25s ease-out;
  max-width: 280px;
}
@keyframes toastin {
  from { opacity: 0; transform: translateX(40px); }
  to { opacity: 1; transform: translateX(0); }
}
.toast.fade { animation: toastout 0.25s ease-in forwards; }
@keyframes toastout {
  to { opacity: 0; transform: translateX(40px); }
}

const DESKTOP_ICONS = ['computer', 'recycle', 'notepad', 'calculator', 'browser', 'terminal', 'settings', 'pictures'];

// =============== UTILITIES ===============
function $(sel) { return document.querySelector(sel); }
function el(tag, props = {}, children = []) {
  const e = document.createElement(tag);
  Object.assign(e, props);
  if (props.className) { e.className = props.className; delete e.className; }
  if (props.html) { e.innerHTML = props.html; }
  for (const [k, v] of Object.entries(props)) {
    if (k === 'html' || k === 'className') continue;
    if (k.startsWith('on') && typeof v === 'function') {
      e.addEventListener(k.slice(2).toLowerCase(), v);
    } else if (k !== 'tag') {
      e.setAttribute(k, v);
    }
  }
  children.forEach(c => e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c));
  return e;
}

function showToast(msg, duration = 2400) {
  const t = el('div', { className: 'toast', html: msg });
  $('#toast-container').appendChild(t);
  setTimeout(() => {
    t.classList.add('fade');
    setTimeout(() => t.remove(), 300);
  }, duration);
}

// =============== DESKTOP ICONS ===============
function buildDesktopIcons() {
  const grid = $('#desktop-grid');
  grid.innerHTML = '';
  DESKTOP_ICONS.forEach((appId, idx) => {
    const app = APPS[appId];
    const icon = el('div', { className: 'desktop-icon', 'data-app': appId });
    icon.innerHTML = `<div class="icon-img">${app.icon}</div><div class="icon-label">${app.name}</div>`;
    
    // Position from saved state or default grid
    const saved = state.iconPositions[appId];
    if (saved) {
      icon.style.position = 'absolute';
      icon.style.left = saved.x + 'px';
      icon.style.top = saved.y + 'px';
      icon.style.gridArea = 'auto';
    }
    
    icon.addEventListener('click', e => {
      e.stopPropagation();
      document.querySelectorAll('.desktop-icon').forEach(i => i.classList.remove('selected'));
      icon.classList.add('selected');
    });
    icon.addEventListener('dblclick', () => openApp(appId));
    
    // Drag functionality
    makeIconDraggable(icon, appId);
    
    grid.appendChild(icon);
  });
}

function makeIconDraggable(icon, appId) {
  let dragStart = null, iconStart = null, hasMoved = false;
  
  icon.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    e.stopPropagation();
    hasMoved = false;
    const rect = icon.getBoundingClientRect();
    iconStart = { x: rect.left, y: rect.top };
    dragStart = { x: e.clientX, y: e.clientY };
    
    // Switch to absolute positioning
    icon.style.position = 'absolute';
    icon.style.left = rect.left + 'px';
    icon.style.top = rect.top + 'px';
    icon.style.gridArea = 'auto';
    icon.style.zIndex = 50;
    
    const onMove = ev => {
      const dx = ev.clientX - dragStart.x;
      const dy = ev.clientY - dragStart.y;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) hasMoved = true;
      icon.style.left = (iconStart.x + dx) + 'px';
      icon.style.top = (iconStart.y + dy) + 'px';
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      icon.style.zIndex = '';
      if (hasMoved) {
        state.iconPositions[appId] = {
          x: parseInt(icon.style.left),
          y: parseInt(icon.style.top)
        };
        localStorage.setItem('nebula-icon-positions', JSON.stringify(state.iconPositions));
      }
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

// =============== WINDOW MANAGEMENT ===============
let winIdCounter = 1;

function openApp(appId) {
  // For singletons (most apps), focus existing
  for (const [id, w] of state.windows) {
    if (w.app === appId) {
      if (w.minimized) toggleMinimize(id);
      focusWindow(id);
      return;
    }
  }
  const app = APPS[appId];
  const id = 'win-' + winIdCounter++;
  const w = app.w || 480;
  const h = app.h || 360;
  const x = Math.max(20, 80 + (state.windows.size * 28) % 200);
  const y = Math.max(20, 50 + (state.windows.size * 28) % 150);
  
  const win = el('div', { className: 'window', 'data-id': id });
  win.style.width = w + 'px';
  win.style.height = h + 'px';
  win.style.left = x + 'px';
  win.style.top = y + 'px';
  win.style.zIndex = ++state.nextZ;
  
  win.innerHTML = `
    <div class="title-bar">
      <div class="title-icon">${app.icon}</div>
      <div class="title-text">${app.name}</div>
      <div class="window-controls">
        <button class="win-btn minimize" title="Minimize"><svg viewBox="0 0 10 10"><line x1="2" y1="5" x2="8" y2="5" stroke="currentColor" stroke-width="1.5"/></svg></button>
        <button class="win-btn maximize" title="Maximize"><svg viewBox="0 0 10 10"><rect x="2" y="2" width="6" height="6" fill="none" stroke="currentColor" stroke-width="1.2"/></svg></button>
        <button class="win-btn close" title="Close"><svg viewBox="0 0 10 10"><line x1="2" y1="2" x2="8" y2="8" stroke="currentColor" stroke-width="1.5"/><line x1="8" y1="2" x2="2" y2="8" stroke="currentColor" stroke-width="1.5"/></svg></button>
      </div>
    </div>
    <div class="window-body"></div>
    <div class="resizer resizer-r"></div>
    <div class="resizer resizer-b"></div>
    <div class="resizer resizer-l"></div>
    <div class="resizer resizer-t"></div>
    <div class="resizer resizer-br"></div>
    <div class="resizer resizer-bl"></div>
    <div class="resizer resizer-tr"></div>
    <div class="resizer resizer-tl"></div>
  `;
  
  document.body.appendChild(win);
  
  const winState = {
    id, app: appId, title: app.name, element: win,
    minimized: false, maximized: false,
    prevRect: null
  };
  state.windows.set(id, winState);
  
  // Populate body
  const body = win.querySelector('.window-body');
  body.appendChild(buildAppContent(appId, id));
  
  // Wire buttons
  win.querySelector('.close').addEventListener('click', e => { e.stopPropagation(); closeWindow(id); });
  win.querySelector('.minimize').addEventListener('click', e => { e.stopPropagation(); toggleMinimize(id); });
  win.querySelector('.maximize').addEventListener('click', e => { e.stopPropagation(); toggleMaximize(id); });
  
  // Double-click title to maximize
  win.querySelector('.title-bar').addEventListener('dblclick', e => {
    if (e.target.closest('.window-controls')) return;
    toggleMaximize(id);
  });
  
  // Title bar drag
  makeWindowDraggable(win, id);
  // Resizers
  makeWindowResizable(win, id);
  // Focus on click
  win.addEventListener('mousedown', () => focusWindow(id));
  
  focusWindow(id);
  updateTaskbar();
  
  // Initialize app
  if (APP_INIT[appId]) APP_INIT[appId](id, win);
}

function closeWindow(id) {
  const w = state.windows.get(id);
  if (!w) return;
  w.element.classList.add('closing');
  setTimeout(() => {
    w.element.remove();
    state.windows.delete(id);
    updateTaskbar();
  }, 150);
}

function focusWindow(id) {
  const w = state.windows.get(id);
  if (!w) return;
  w.element.style.zIndex = ++state.nextZ;
  state.activeWindowId = id;
  document.querySelectorAll('.task-item').forEach(t => t.classList.remove('active'));
  document.querySelector(`.task-item[data-id="${id}"]`)?.classList.add('active');
}

function toggleMinimize(id) {
  const w = state.windows.get(id);
  if (!w) return;
  w.minimized = !w.minimized;
  if (w.minimized) {
    w.element.classList.add('minimized');
    state.activeWindowId = null;
    document.querySelectorAll('.task-item').forEach(t => t.classList.remove('active'));
  } else {
    w.element.classList.remove('minimized');
    focusWindow(id);
  }
}

function toggleMaximize(id) {
  const w = state.windows.get(id);
  if (!w) return;
  w.maximized = !w.maximized;
  if (w.maximized) {
    w.prevRect = {
      left: w.element.style.left,
      top: w.element.style.top,
      width: w.element.style.width,
      height: w.element.style.height
    };
    w.element.style.left = '0px';
    w.element.style.top = '0px';
    w.element.style.width = '100%';
    w.element.style.height = (window.innerHeight - 50) + 'px';
    w.element.classList.add('maximized');
  } else {
    Object.assign(w.element.style, w.prevRect);
    w.element.classList.remove('maximized');
  }
}

function makeWindowDraggable(win, id) {
  const titleBar = win.querySelector('.title-bar');
  let dragStart = null, winStart = null;
  
  titleBar.addEventListener('mousedown', e => {
    if (e.target.closest('.window-controls')) return;
    if (e.button !== 0) return;
    const w = state.windows.get(id);
    if (w.maximized) return;
    
    dragStart = { x: e.clientX, y: e.clientY };
    winStart = {
      left: parseInt(win.style.left),
      top: parseInt(win.style.top)
    };
    
    const onMove = ev => {
      const dx = ev.clientX - dragStart.x;
      const dy = ev.clientY - dragStart.y;
      let nx = winStart.left + dx;
      let ny = winStart.top + dy;
      nx = Math.max(-win.offsetWidth + 100, Math.min(window.innerWidth - 100, nx));
      ny = Math.max(0, Math.min(window.innerHeight - 90, ny));
      win.style.left = nx + 'px';
      win.style.top = ny + 'px';
    };
    const onUp = () => {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

function makeWindowResizable(win, id) {
  const w = state.windows.get(id);
  win.querySelectorAll('.resizer').forEach(handle => {
    handle.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      e.stopPropagation();
      if (w.maximized) return;
      
      const dirs = handle.className.replace('resizer ', '');
      const startX = e.clientX, startY = e.clientY;
      const startRect = {
        left: parseInt(win.style.left),
        top: parseInt(win.style.top),
        width: parseInt(win.style.width),
        height: parseInt(win.style.height)
      };
      
      const onMove = ev => {
        const dx = ev.clientX - startX;
        const dy = ev.clientY - startY;
        let { left, top, width, height } = startRect;
        
        if (dirs.includes('r')) width = Math.max(320, startRect.width + dx);
        if (dirs.includes('b')) height = Math.max(200, startRect.height + dy);
        if (dirs.includes('l')) {
          width = Math.max(320, startRect.width - dx);
          left = startRect.left + (startRect.width - width);
        }
        if (dirs.includes('t')) {
          height = Math.max(200, startRect.height - dy);
          top = startRect.top + (startRect.height - height);
        }
        
        win.style.left = left + 'px';
        win.style.top = top + 'px';
        win.style.width = width + 'px';
        win.style.height = height + 'px';
      };
      const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
}

// =============== TASKBAR ===============
function updateTaskbar() {
  const container = $('#running-apps');
  container.innerHTML = '';
  state.windows.forEach((w, id) => {
    const app = APPS[w.app];
    const item = el('div', { className: 'task-item' + (state.activeWindowId === id ? ' active' : ''), 'data-id': id });
    item.innerHTML = `<div class="task-icon">${app.icon}</div><div class="task-label">${w.title}</div>`;
    item.addEventListener('click', () => {
      if (w.minimized) {
        toggleMinimize(id);
      } else if (state.activeWindowId === id) {
        toggleMinimize(id);
      } else {
        focusWindow(id);
      }
    });
    container.appendChild(item);
  });
}

// =============== START MENU ===============
function buildStartMenu() {
  const list = $('#start-apps-list');
  list.innerHTML = '';
  list.innerHTML = '<div class="start-section-title">Applications</div>';
  Object.entries(APPS).forEach(([appId, app]) => {
    const item = el('div', { className: 'start-app' });
    item.innerHTML = `<div class="app-icon">${app.icon}</div><div><div class="app-name">${app.name}</div><div class="app-desc">System application</div></div>`;
    item.addEventListener('click', () => {
      openApp(appId);
      toggleStartMenu(false);
    });
    list.appendChild(item);
  });
}

function toggleStartMenu(force) {
  const menu = $('#start-menu');
  const btn = $('#start-btn');
  const open = force !== undefined ? force : !menu.classList.contains('open');
  menu.classList.toggle('open', open);
  btn.classList.toggle('active', open);
