<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon City - Top Down GTA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0a0a0f; 
            overflow: hidden; 
            font-family: 'Courier New', monospace;
        }
        #gameCanvas { 
            display: block; 
            margin: 0 auto;
        }
        #hud {
            position: fixed;
            top: 10px;
            left: 10px;
            color: #0ff;
            font-size: 14px;
            text-shadow: 0 0 10px #0ff;
            z-index: 100;
        }
        #healthBar {
            width: 200px;
            height: 20px;
            background: #333;
            border: 2px solid #0ff;
            margin-bottom: 5px;
        }
        #healthFill {
            height: 100%;
            background: linear-gradient(90deg, #f00, #ff0);
            transition: width 0.3s;
        }
        #wantedStars {
            font-size: 24px;
            color: #ff0;
            text-shadow: 0 0 10px #ff0;
            margin: 5px 0;
        }
        #money {
            color: #0f0;
            font-size: 18px;
            text-shadow: 0 0 10px #0f0;
        }
        #score {
            color: #f0f;
            font-size: 16px;
        }
        #minimap {
            position: fixed;
            bottom: 10px;
            right: 10px;
            width: 150px;
            height: 150px;
            border: 2px solid #0ff;
            background: #111;
            box-shadow: 0 0 20px #0ff;
        }
        #controls {
            position: fixed;
            bottom: 10px;
            left: 10px;
            color: #888;
            font-size: 12px;
        }
        #gameOver {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 200;
        }
        #gameOver h1 {
            color: #f00;
            font-size: 48px;
            text-shadow: 0 0 30px #f00;
            margin-bottom: 20px;
        }
        #gameOver p {
            color: #0ff;
            font-size: 24px;
            margin-bottom: 30px;
        }
        #restartBtn {
            padding: 15px 40px;
            font-size: 20px;
            background: transparent;
            border: 2px solid #0ff;
            color: #0ff;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px #0ff;
            box-shadow: 0 0 20px #0ff;
            transition: all 0.3s;
        }
        #restartBtn:hover {
            background: #0ff;
            color: #000;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="hud">
        <div id="healthBar"><div id="healthFill"></div></div>
        <div id="wantedStars">☆☆☆☆☆</div>
        <div id="money">$0</div>
        <div id="score">Score: 0</div>
    </div>
    <canvas id="minimap"></canvas>
    <div id="controls">
        WASD: Walk | Arrows: Drive | E: Enter/Exit Car | Space: Brake
    </div>
    <div id="gameOver">
        <h1>WASTED</h1>
        <p>Final Score: <span id="finalScore">0</span></p>
        <button id="restartBtn">RESTART</button>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const minimapCanvas = document.getElementById('minimap');
        const minimapCtx = minimapCanvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        minimapCanvas.width = 150;
        minimapCanvas.height = 150;

        const TILE_SIZE = 64;
        const MAP_WIDTH = 50;
        const MAP_HEIGHT = 50;
        const ROAD_WIDTH = 2;

        let keys = {};
        let gameRunning = true;
        let score = 0;
        let money = 0;
        let wantedLevel = 0;
        let wantedTimer = 0;

        const map = [];
        const buildings = [];
        const roads = [];
        const cars = [];
        const npcs = [];
        const policeCars = [];
        const moneyDrops = [];
        const particles = [];

        for (let y = 0; y < MAP_HEIGHT; y++) {
            map[y] = [];
            for (let x = 0; x < MAP_WIDTH; x++) {
                const isRoad = x % 6 < ROAD_WIDTH || y % 6 < ROAD_WIDTH;
                map[y][x] = isRoad ? 1 : 0;
                if (isRoad) roads.push({ x, y });
                else buildings.push({ 
                    x: x * TILE_SIZE, 
                    y: y * TILE_SIZE,
                    width: TILE_SIZE,
                    height: TILE_SIZE,
                    color: `hsl(${280 + Math.random() * 40}, 70%, ${15 + Math.random() * 10}%)`
                });
            }
        }

        const player = {
            x: MAP_WIDTH * TILE_SIZE / 2,
            y: MAP_HEIGHT * TILE_SIZE / 2,
            width: 20,
            height: 20,
            speed: 3,
            angle: 0,
            health: 100,
            maxHealth: 100,
            inCar: null
        };

        function spawnCar(x, y, isPolice = false) {
            const colors = ['#f00', '#0ff', '#ff0', '#f0f', '#0f0', '#fff'];
            return {
                x: x,
                y: y,
                width: 40,
                height: 24,
                angle: Math.random() * Math.PI * 2,
                speed: 0,
                maxSpeed: isPolice ? 8 : 6,
                acceleration: isPolice ? 0.15 : 0.1,
                friction: 0.98,
                turnSpeed: 0.05,
                color: isPolice ? '#0088ff' : colors[Math.floor(Math.random() * colors.length)],
                isPolice,
                health: 50
            };
        }

        function spawnNPC() {
            const road = roads[Math.floor(Math.random() * roads.length)];
            return {
                x: road.x * TILE_SIZE + TILE_SIZE / 2,
                y: road.y * TILE_SIZE + TILE_SIZE / 2,
                width: 16,
                height: 16,
                speed: 0.5 + Math.random() * 0.5,
                angle: Math.random() * Math.PI * 2,
                color: `hsl(${Math.random() * 360}, 60%, 50%)`,
            };
        }

        for (let i = 0; i < 30; i++) {
            const road = roads[Math.floor(Math.random() * roads.length)];
            cars.push(spawnCar(road.x * TILE_SIZE + TILE_SIZE / 2, road.y * TILE_SIZE + TILE_SIZE / 2));
        }

        for (let i = 0; i < 40; i++) {
            npcs.push(spawnNPC());
        }

        function addParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 30,
                    color,
                    size: 2 + Math.random() * 3
                });
            }
        }

        function isColliding(a, b) {
            return a.x < b.x + b.width &&
                   a.x + a.width > b.x &&
                   a.y < b.y + b.height &&
                   a.y + a.height > b.y;
        }

        function distance(a, b) {
            return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
        }

        function checkBuildingCollision(x, y, width, height) {
            for (const b of buildings) {
                if (x < b.x + b.width && x + width > b.x &&
                    y < b.y + b.height && y + height > b.y) {
                    return true;
                }
            }
            return x < 0 || x + width > MAP_WIDTH * TILE_SIZE ||
                   y < 0 || y + height > MAP_HEIGHT * TILE_SIZE;
        }

        function increaseWantedLevel() {
            if (wantedLevel < 5) {
                wantedLevel++;
                updateHUD();
                if (wantedLevel === 1) {
                    spawnPolice();
                }
            }
        }

        function decreaseWantedLevel() {
            if (wantedLevel > 0) {
                wantedTimer--;
                if (wantedTimer <= 0) {
                    wantedLevel--;
                    wantedTimer = 600;
                    if (wantedLevel === 0) {
                        policeCars.length = 0;
                    }
                }
            }
        }

        function spawnPolice() {
            const angle = Math.random() * Math.PI * 2;
            const dist = 400;
            policeCars.push(spawnCar(
                player.x + Math.cos(angle) * dist,
                player.y + Math.sin(angle) * dist,
                true
            ));
        }

        function updateHUD() {
            document.getElementById('healthFill').style.width = 
                (player.health / player.maxHealth * 100) + '%';
            document.getElementById('wantedStars').textContent = 
                '★'.repeat(wantedLevel) + '☆'.repeat(5 - wantedLevel);
            document.getElementById('money').textContent = '$' + money;
            document.getElementById('score').textContent = 'Score: ' + score;
        }

        function update() {
            if (!gameRunning) return;

            const p = player.inCar || player;

            if (player.inCar) {
                // Car controls
                if (keys['ArrowUp']) player.inCar.speed = Math.min(player.inCar.speed + player.inCar.acceleration, player.inCar.maxSpeed);
                if (keys['ArrowDown']) player.inCar.speed = Math.max(player.inCar.speed - player.inCar.acceleration, -player.inCar.maxSpeed / 2);
                if (keys[' ']) player.inCar.speed *= 0.95;
                if (keys['ArrowLeft']) player.inCar.angle -= player.inCar.turnSpeed * (player.inCar.speed > 0.5 ? 1 : player.inCar.speed < -0.5 ? -1 : 0);
                if (keys['ArrowRight']) player.inCar.angle += player.inCar.turnSpeed * (player.inCar.speed > 0.5 ? 1 : player.inCar.speed < -0.5 ? -1 : 0);

                player.inCar.speed *= player.inCar.friction;
                const newX = player.inCar.x + Math.cos(player.inCar.angle) * player.inCar.speed;
                const newY = player.inCar.y + Math.sin(player.inCar.angle) * player.inCar.speed;

                if (!checkBuildingCollision(newX - player.inCar.width/2, newY - player.inCar.height/2, player.inCar.width, player.inCar.height)) {
                    player.inCar.x = newX;
                    player.inCar.y = newY;
                } else {
                    player.inCar.speed *= -0.5;
                    player.inCar.health -= Math.abs(player.inCar.speed) * 2;
                    addParticles(player.inCar.x, player.inCar.y, '#ff8800', 10);
                }

                player.x = player.inCar.x;
                player.y = player.inCar.y;
            } else {
                // Walking controls
                let dx = 0, dy = 0;
                if (keys['w'] || keys['W']) dy = -player.speed;
                if (keys['s'] || keys['S']) dy = player.speed;
                if (keys['a'] || keys['A']) dx = -player.speed;
                if (keys['d'] || keys['D']) dx = player.speed;

                if (dx !== 0 || dy !== 0) {
                    player.angle = Math.atan2(dy, dx);
                }

                const newX = player.x + dx;
                const newY = player.y + dy;

                if (!checkBuildingCollision(newX - player.width/2, newY - player.height/2, player.width, player.height)) {
                    player.x = newX;
                    player.y = newY;
                }
            }

            // NPC update
            for (const npc of npcs) {
                const newX = npc.x + Math.cos(npc.angle) * npc.speed;
                const newY = npc.y + Math.sin(npc.angle) * npc.speed;
                
                if (!checkBuildingCollision(newX - npc.width/2, newY - npc.height/2, npc.width, npc.height)) {
                    npc.x = newX;
                    npc.y = newY;
                } else {
                    npc.angle += Math.PI / 2;
                }

                if (Math.random() < 0.01) npc.angle += (Math.random() - 0.5) * Math.PI / 2;
            }

            // Police update
            for (const police of policeCars) {
                const dx = player.x - police.x;
                const dy = player.y - police.y;
                const targetAngle = Math.atan2(dy, dx);
                let angleDiff = targetAngle - police.angle;
                while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

                police.angle += Math.sign(angleDiff) * Math.min(Math.abs(angleDiff), police.turnSpeed);
                police.speed = Math.min(police.speed + police.acceleration, police.maxSpeed);

                const newX = police.x + Math.cos(police.angle) * police.speed;
                const newY = police.y + Math.sin(police.angle) * police.speed;

                if (!checkBuildingCollision(newX - police.width/2, newY - police.height/2, police.width, police.height)) {
                    police.x = newX;
                    police.y = newY;
                } else {
                    police.angle += Math.PI / 2;
                }

                // Police collision with player
                if (distance(police, player) < 30) {
                    if (player.inCar) {
                        player.inCar.health -= 1;
                    } else {
                        player.health -= 0.5;
                    }
                    addParticles(player.x, player.y, '#f00', 2);
                }
            }

            // Spawn more police based on wanted level
            if (wantedLevel > 0 && policeCars.length < wantedLevel * 2 && Math.random() < 0.01) {
                spawnPolice();
            }

            // Wanted timer
            if (wantedLevel > 0) {
                decreaseWantedLevel();
            }

            // Collision with NPCs
            if (player.inCar && Math.abs(player.inCar.speed) > 2) {
                for (let i = npcs.length - 1; i >= 0; i--) {
                    if (distance(player.inCar, npcs[i]) < 25) {
                        addParticles(npcs[i].x, npcs[i].y, '#f00', 20);
                        npcs.splice(i, 1);
                        increaseWantedLevel();
                        score += 50;
                        moneyDrops.push({ x: npcs[i]?.x || player.x, y: npcs[i]?.y || player.y, value: 20 });
                    }
                }
            }

            // Collision with cars
            if (player.inCar && Math.abs(player.inCar.speed) > 3) {
                for (const car of cars) {
                    if (car === player.inCar) continue;
                    if (distance(player.inCar, car) < 35) {
                        car.health -= 20;
                        player.inCar.health -= 10;
                        addParticles(car.x, car.y, '#ff8800', 15);
                        increaseWantedLevel();
                        
                        if (car.health <= 0) {
                            addParticles(car.x, car.y, '#ff8800', 50);
                            moneyDrops.push({ x: car.x, y: car.y, value: 50 });
                            score += 100;
                        }
                    }
                }
            }

            // Money pickup
            for (let i = moneyDrops.length - 1; i >= 0; i--) {
                if (distance(player, moneyDrops[i]) < 30) {
                    money += moneyDrops[i].value;
                    score += moneyDrops[i].value;
                    moneyDrops.splice(i, 1);
                }
            }

            // Particles update
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                p.vx *= 0.95;
                p.vy *= 0.95;
                if (p.life <= 0) particles.splice(i, 1);
            }

            // Check death
            if (player.health <= 0) {
                gameRunning = false;
                document.getElementById('finalScore').textContent = score;
                document.getElementById('gameOver').style.display = 'flex';
            }

            updateHUD();
        }

        function draw() {
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const camX = player.x - canvas.width / 2;
            const camY = player.y - canvas.height / 2;

            ctx.save();
            ctx.translate(-camX, -camY);

            // Draw roads
            ctx.fillStyle = '#1a1a2e';
            for (const road of roads) {
                ctx.fillRect(road.x * TILE_SIZE, road.y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
            }

            // Road markings
            ctx.strokeStyle = '#ff00ff';
            ctx.lineWidth = 1;
            ctx.setLineDash([10, 10]);
            for (let road of roads) {
                if (road.x % 6 < ROAD_WIDTH) {
                    ctx.beginPath();
                    ctx.moveTo(road.x * TILE_SIZE + TILE_SIZE / 2, road.y * TILE_SIZE);
                    ctx.lineTo(road.x * TILE_SIZE + TILE_SIZE / 2, road.y * TILE_SIZE + TILE_SIZE);
                    ctx.stroke();
                }
                if (road.y % 6 < ROAD_WIDTH) {
                    ctx.beginPath();
                    ctx.moveTo(road.x * TILE_SIZE, road.y * TILE_SIZE + TILE_SIZE / 2);
                    ctx.lineTo(road.x * TILE_SIZE + TILE_SIZE, road.y * TILE_SIZE + TILE_SIZE / 2);
                    ctx.stroke();
                }
            }
            ctx.setLineDash([]);

            // Draw buildings
            for (const b of buildings) {
                ctx.fillStyle = b.color;
                ctx.fillRect(b.x + 2, b.y + 2, b.width - 4, b.height - 4);
                
                // Neon edges
                ctx.strokeStyle = `hsl(${280 + Math.random() * 40}, 100%, 50%)`;
                ctx.lineWidth = 1;
                ctx.strokeRect(b.x + 2, b.y + 2, b.width - 4, b.height - 4);

                // Windows
                ctx.fillStyle = Math.random() > 0.7 ? '#ffff00' : '#333';
                for (let wx = b.x + 10; wx < b.x + b.width - 10; wx += 12) {
                    for (let wy = b.y + 10; wy < b.y + b.height - 10; wy += 12) {
                        if (Math.random() > 0.3) {
                            ctx.fillStyle = `hsl(${30 + Math.random() * 30}, 100%, ${50 + Math.random() * 30}%)`;
                            ctx.fillRect(wx, wy, 6, 6);
                        }
                    }
                }
            }

            // Draw money drops
            for (const m of moneyDrops) {
                ctx.fillStyle = '#0f0';
                ctx.shadowColor = '#0f0';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(m.x, m.y, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#050';
                ctx.font = '10px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('$', m.x, m.y + 3);
                ctx.shadowBlur = 0;
            }

            // Draw NPCs
            for (const npc of npcs) {
                ctx.save();
                ctx.translate(npc.x, npc.y);
                ctx.rotate(npc.angle);
                ctx.fillStyle = npc.color;
                ctx.shadowColor = npc.color;
                ctx.shadowBlur = 5;
                ctx.fillRect(-npc.width/2, -npc.height/2, npc.width, npc.height);
                ctx.shadowBlur = 0;
                ctx.restore();
            }

            // Draw cars
            for (const car of cars) {
                if (car.health <= 0) continue;
                ctx.save();
                ctx.translate(car.x, car.y);
                ctx.rotate(car.angle);
                
                // Car body
                ctx.fillStyle = car.color;
                ctx.shadowColor = car.color;
                ctx.shadowBlur = car === player.inCar ? 20 : 10;
                ctx.fillRect(-car.width/2, -car.height/2, car.width, car.height);
                
                // Windshield
                ctx.fillStyle = '#444';
                ctx.fillRect(car.width/4, -car.height/3, car.width/5, car.height/1.5);
                
                // Headlights
                ctx.fillStyle = '#ffff00';
                ctx.shadowColor = '#ffff00';
                ctx.shadowBlur = 10;
                ctx.fillRect(car.width/2 - 3, -car.height/2 + 2, 4, 5);
                ctx.fillRect(car.width/2 - 3, car.height/2 - 7, 4, 5);
                
                ctx.shadowBlur = 0;
                ctx.restore();
            }

            // Draw police
            for (const police of policeCars) {
                ctx.save();
                ctx.translate(police.x, police.y);
                ctx.rotate(police.angle);
                
                ctx.fillStyle = '#0066cc';
                ctx.fillRect(-police.width/2, -police.height/2, police.width, police.height);
                
                // Lights
                const flash = Math.sin(Date.now() / 100) > 0;
                ctx.fillStyle = flash ? '#f00' : '#00f';
                ctx.shadowColor = ctx.fillStyle;
                ctx.shadowBlur = 15;
                ctx.fillRect(-5, -police.height/2 - 2, 10, 4);
                
                ctx.shadowBlur = 0;
                ctx.restore();
            }

            // Draw player
            if (!player.inCar) {
                ctx.save();
                ctx.translate(player.x, player.y);
                ctx.rotate(player.angle);
                
                // Body
                ctx.fillStyle = '#0ff';
                ctx.shadowColor = '#0ff';
                ctx.shadowBlur = 15;
                ctx.fillRect(-player.width/2, -player.height/2, player.width, player.height);
                
                // Direction indicator
                ctx.fillStyle = '#fff';
                ctx.fillRect(player.width/2 - 5, -2, 5, 4);
                
                ctx.shadowBlur = 0;
                ctx.restore();
            }

            // Draw particles
            for (const p of particles) {
                ctx.globalAlpha = p.life / 30;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
            }
            ctx.globalAlpha = 1;

            ctx.restore();

            // Draw minimap
            drawMinimap();
        }

        function drawMinimap() {
            minimapCtx.fillStyle = '#111';
            minimapCtx.fillRect(0, 0, 150, 150);

            const scale = 150 / (MAP_WIDTH * TILE_SIZE);

            minimapCtx.fillStyle = '#222';
            for (const road of roads) {
                minimapCtx.fillRect(road.x * TILE_SIZE * scale, road.y * TILE_SIZE * scale, TILE_SIZE * scale, TILE_SIZE * scale);
            }

            // Police dots
            minimapCtx.fillStyle = '#00f';
            for (const police of policeCars) {
                minimapCtx.fillRect(police.x * scale - 2, police.y * scale - 2, 4, 4);
            }

            // Player arrow
            minimapCtx.fillStyle = '#0ff';
            minimapCtx.save();
            minimapCtx.translate(player.x * scale, player.y * scale);
            minimapCtx.rotate(player.angle);
            minimapCtx.beginPath();
            minimapCtx.moveTo(5, 0);
            minimapCtx.lineTo(-3, -3);
            minimapCtx.lineTo(-3, 3);
            minimapCtx.closePath();
            minimapCtx.fill();
            minimapCtx.restore();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            
            if (e.key === 'e' || e.key === 'E') {
                if (player.inCar) {
                    // Exit car
                    player.x = player.inCar.x + 30;
                    player.y = player.inCar.y;
                    player.inCar.speed = 0;
                    player.inCar = null;
                } else {
                    // Try to enter car
                    for (const car of cars) {
                        if (distance(player, car) < 40 && car.health > 0) {
                            player.inCar = car;
                            player.inCar.angle = player.angle;
                            break;
                        }
                    }
                }
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        document.getElementById('restartBtn').addEventListener('click', () => {
            player.x = MAP_WIDTH * TILE_SIZE / 2;
            player.y = MAP_HEIGHT * TILE_SIZE / 2;
            player.health = player.maxHealth;
            player.inCar = null;
            score = 0;
            money = 0;
            wantedLevel = 0;
            policeCars.length = 0;
            moneyDrops.length = 0;
            particles.length = 0;
            
            // Reset cars
            cars.length = 0;
            for (let i = 0; i < 30; i++) {
                const road = roads[Math.floor(Math.random() * roads.length)];
                cars.push(spawnCar(road.x * TILE_SIZE + TILE_SIZE / 2, road.y * TILE_SIZE + TILE_SIZE / 2));
            }
            
            // Reset NPCs
            npcs.length = 0;
            for (let i = 0; i < 40; i++) {
                npcs.push(spawnNPC());
            }
            
            gameRunning = true;
            document.getElementById('gameOver').style.display = 'none';
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        gameLoop();
    </script>
</body>
</html>
