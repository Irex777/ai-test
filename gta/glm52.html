<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON CITY: DRIVE OR DIE</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#06030d;
    font-family:'Courier New',monospace;
    color:#fff;
    overflow:hidden;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    user-select:none;
  }
  #game{
    display:block;
    background:#06030d;
    box-shadow:0 0 80px rgba(255,0,150,.25), inset 0 0 0 1px rgba(0,255,200,.2);
  }
  #ui{
    position:absolute;
    pointer-events:none;
    font-family:'Courier New',monospace;
  }
</style>
</head>
<body>
<canvas id="game" width="1280" height="720"></canvas>
<script>
const C = document.getElementById('game');
const ctx = C.getContext('2d');
const W = C.width, H = C.height;

const WORLD_W = 3200, WORLD_H = 2400;
const BLK = 200;

// Map grid: 0 = sidewalk/building area, 1 = road
const COLS = Math.floor(WORLD_W / BLK);
const ROWS = Math.floor(WORLD_H / BLK);
const map = [];
for(let r=0;r<ROWS;r++){
  map[r] = [];
  for(let c=0;c<COLS;c++){
    // Roads form a grid every 3 cells
    map[r][c] = (r%3===1 || c%3===1) ? 1 : 0;
  }
}

// Buildings (fill non-road cells)
const buildings = [];
const palette = ['#1a0a2e','#0f1f3a','#2a0a3a','#0a2a3a','#3a0a1a','#0a2a1a','#1f0a3a','#3a1a0a','#0a1a2a','#2a1a3a'];
for(let r=0;r<ROWS;r++){
  for(let c=0;c<COLS;c++){
    if(map[r][c]===0){
      buildings.push({
        x: c*BLK + 24,
        y: r*BLK + 24,
        w: BLK - 48,
        h: BLK - 48,
        color: palette[(r*7+c*3)%palette.length],
        accent: palette[(r*5+c*11+3)%palette.length],
        seed: (r*13+c*17)%100
      });
    }
  }
}

// Get road centerlines
function isRoad(wx, wy){
  const c = Math.floor(wx/BLK), r = Math.floor(wy/BLK);
  if(r<0||c<0||r>=ROWS||c>=COLS) return false;
  return map[r][c]===1;
}

// Camera
let cam = {x:0, y:0};

// Player
const player = {
  x: 600, y: 250,
  angle: 0,
  speed: 0,
  walkSpeed: 2.6,
  hp: 100, maxHp: 100,
  money: 0,
  inCar: null,
  shootCd: 0
};

// Entities
const cars = [];
const parkedCars = [];
const npcs = [];
const bullets = [];
const particles = [];
const pickups = [];
const popups = [];

function rand(a,b){return a + Math.random()*(b-a);}

function spawnParkedCars(){
  parkedCars.length = 0;
  // Place cars along roads
  for(let i=0;i<60;i++){
    let placed = false, tries = 0;
    while(!placed && tries < 30){
      tries++;
      const onHRoad = Math.random() < 0.5;
      let x, y, angle;
      if(onHRoad){
        // Horizontal road: row % 3 == 1
        const r = (Math.floor(rand(0,ROWS/3))*3 + 1);
        const c = Math.floor(rand(0,COLS));
        y = r*BLK + BLK/2 + (Math.random()<.5 ? -22 : 22);
        x = c*BLK + rand(20, BLK-20);
        angle = (Math.random()<.5 ? 0 : Math.PI);
      } else {
        const c = (Math.floor(rand(0,COLS/3))*3 + 1);
        const r = Math.floor(rand(0,ROWS));
        x = c*BLK + BLK/2 + (Math.random()<.5 ? -22 : 22);
        y = r*BLK + rand(20, BLK-20);
        angle = (Math.random()<.5 ? Math.PI/2 : -Math.PI/2);
      }
      let ok = true;
      for(const pc of parkedCars){
        if(Math.hypot(pc.x-x, pc.y-y) < 60){ ok=false; break; }
      }
      if(ok){
        const colors = ['#ff2b6e','#1eeaea','#ffd83b','#9b3eff','#ff7a1e','#3eff8b','#ff3b3b','#ffffff'];
        parkedCars.push({
          x, y, angle,
          color: colors[Math.floor(Math.random()*colors.length)],
          w: 34, h: 60,
          hp: 60,
          vx: 0, vy: 0,
          parked: true
        });
        placed = true;
      }
    }
  }
}

function spawnNPCs(){
  npcs.length = 0;
  for(let i=0;i<55;i++) spawnOneNPC();
}

function spawnOneNPC(){
  const colors = ['#ff6ec7','#62fff5','#fff06e','#a06eff','#ff8e6e','#6effa0','#ff6e6e','#c7c7ff'];
  let placed = false, tries = 0;
  while(!placed && tries < 40){
    tries++;
    const x = rand(50, WORLD_W-50);
    const y = rand(50, WORLD_H-50);
    if(isSidewalk(x,y)){
      npcs.push({
        x, y,
        angle: rand(0, Math.PI*2),
        speed: rand(0.4, 1.2),
        color: colors[Math.floor(Math.random()*colors.length)],
        w: 12, h: 12,
        hp: 30,
        bob: rand(0, Math.PI*2),
        changeT: rand(60, 240)
      });
      placed = true;
    }
  }
}

function isSidewalk(wx, wy){
  // Sidewalk = on road cell but near edge, OR adjacent to road cell
  const cx = Math.floor(wx/BLK), cy = Math.floor(wy/BLK);
  if(cx<0||cy<0||cx>=COLS||cy>=ROWS) return false;
  if(map[cy][cx]===1){
    // On a road cell - check we are near edge (sidewalk strip)
    const lx = wx - cx*BLK, ly = wy - cy*BLK;
    if(lx < 16 || lx > BLK-16 || ly < 16 || ly > BLK-16) return true;
    return false;
  }
  return false;
}

function isBuilding(wx, wy){
  for(const b of buildings){
    if(wx>=b.x && wx<=b.x+b.w && wy>=b.y && wy<=b.y+b.h) return b;
  }
  return null;
}

function isBlocked(wx, wy){
  return isBuilding(wx, wy) !== null;
}

// Input
const keys = {};
window.addEventListener('keydown', e=>{
  const k = e.key.toLowerCase();
  keys[k] = true;
  if(k === 'e') tryEnterExitCar();
  if(k === 'r' && gameOver) restartGame();
  if((k==='arrowup'||k==='arrowdown'||k==='arrowleft'||k==='arrowright'||k===' ')) e.preventDefault();
  if(k === ' ') shoot();
});
window.addEventListener('keyup', e=>{
  keys[e.key.toLowerCase()] = false;
});

let gameOver = false;

function tryEnterExitCar(){
  if(gameOver) return;
  if(player.inCar){
    // Exit
    const car = player.inCar;
    // Place player beside car
    const offX = Math.cos(car.angle + Math.PI/2) * 28;
    const offY = Math.sin(car.angle + Math.PI/2) * 28;
    const px = car.x + offX, py = car.y + offY;
    if(!isBlocked(px, py)){
      player.x = px; player.y = py;
      player.angle = car.angle;
      player.inCar = null;
      car.parked = false; // can be re-driven, but no longer "active vehicle"
    }
  } else {
    // Try to find a car near player
    let best = null, bestD = 60*60;
    for(const car of parkedCars){
      const d = (car.x-player.x)**2 + (car.y-player.y)**2;
      if(d < bestD){ bestD = d; best = car; }
    }
    if(best){
      player.inCar = best;
      best.parked = false;
    }
  }
}

function shoot(){
  if(gameOver) return;
  if(player.shootCd > 0) return;
  if(!player.inCar){
    player.shootCd = 14;
    const ang = player.angle;
    bullets.push({
      x: player.x + Math.cos(ang)*12,
      y: player.y + Math.sin(ang)*12,
      vx: Math.cos(ang)*12,
      vy: Math.sin(ang)*12,
      life: 50,
      from: 'player'
    });
    // Shooting raises wanted
    addWanted(0.15);
    muzzleFlash(player.x + Math.cos(ang)*14, player.y + Math.sin(ang)*14);
  }
}

function muzzleFlash(x, y){
  for(let i=0;i<5;i++){
    particles.push({
      x, y,
      vx: rand(-2,2), vy: rand(-2,2),
      life: 8, max: 8,
      color: '#fff7c4', size: rand(2,4)
    });
  }
}

// Wanted system
let wanted = 0; // 0 - 5
let wantedDisplay = 0;
let lastCrimeTime = 0;
let policeSpawnTimer = 0;

function addWanted(amt){
  wanted = Math.min(5, wanted + amt);
  lastCrimeTime = Date.now();
}

function getStars(){
  return Math.floor(wanted);
}

// Police cars
function spawnPolice(){
  // Spawn off-screen near a road
  for(let tries=0; tries<20; tries++){
    const angle = rand(0, Math.PI*2);
    const dist = 700;
    const sx = player.x + Math.cos(angle)*dist;
    const sy = player.y + Math.sin(angle)*dist;
    if(sx<0||sy<0||sx>WORLD_W||sy>WORLD_H) continue;
    if(isRoad(sx, sy)){
      cars.push({
        x: sx, y: sy,
        angle: 0, speed: 0,
        w: 34, h: 60,
        color: '#2222aa',
        accent: '#ffffff',
        isPolice: true,
        hp: 120,
        targetX: sx, targetY: sy,
        shootCd: 60
      });
      return;
    }
  }
}

// Initialize
spawnParkedCars();
spawnNPCs();

let score = 0;
let gameTime = 0;

function emitDebris(x, y, color, count=10, spread=4){
  for(let i=0;i<count;i++){
    particles.push({
      x, y,
      vx: rand(-spread, spread),
      vy: rand(-spread, spread),
      life: rand(20,40), max: 40,
      color, size: rand(1.5, 3.5)
    });
  }
}

function dropMoney(x, y, amt){
  pickups.push({x, y, amt, bob: 0, vx: rand(-1,1), vy: rand(-1,1), life: 600});
}

function popupText(x, y, text, color){
  popups.push({x, y, text, color, life: 50, vy: -1});
}

// Update functions
function updatePlayer(){
  if(player.shootCd > 0) player.shootCd--;
  
  if(player.inCar){
    const car = player.inCar;
    const accel = 0.22;
    const maxSpeed = 7;
    const maxReverse = -2.5;
    const turnRate = 0.045;
    
    let throttle = 0;
    if(keys['arrowup']) throttle = 1;
    else if(keys['arrowdown']) throttle = -1;
    
    let turn = 0;
    if(keys['arrowleft']) turn = -1;
    else if(keys['arrowright']) turn = 1;
    
    if(throttle > 0){
      car.speed += accel;
      if(car.speed > maxSpeed) car.speed = maxSpeed;
    } else if(throttle < 0){
      car.speed -= accel*0.7;
      if(car.speed < maxReverse) car.speed = maxReverse;
    } else {
      // Friction
      car.speed *= 0.96;
      if(Math.abs(car.speed) < 0.05) car.speed = 0;
    }
    
    // Turn (only when moving)
    if(Math.abs(car.speed) > 0.2){
      car.angle += turn * turnRate * (car.speed / maxSpeed) * 1.2;
    }
    
    // Move with collision
    const nx = car.x + Math.cos(car.angle) * car.speed;
    const ny = car.y + Math.sin(car.angle) * car.speed;
    
    // Check building collision
    const corners = [
      [nx - car.w/2, ny - car.h/2],
      [nx + car.w/2, ny - car.h/2],
      [nx - car.w/2, ny + car.h/2],
      [nx + car.w/2, ny + car.h/2],
    ];
    let blocked = false;
    for(const [cx,cy] of corners){
      if(isBlocked(cx, cy)) { blocked = true; break; }
    }
    
    if(blocked){
      // Crash damage
      if(Math.abs(car.speed) > 2){
        const dmg = Math.abs(car.speed) * 2;
        player.hp -= dmg * 0.5;
        car.hp -= dmg;
        emitDebris(nx, ny, '#ffaa00', 12, 5);
        if(car.hp <= 0){
          explodeCar(car);
          player.inCar = null;
          // Push player out
          player.x = car.x + 30;
          player.y = car.y;
          player.hp -= 30;
        }
        car.speed *= -0.3;
      } else {
        car.speed = 0;
      }
    } else {
      car.x = nx;
      car.y = ny;
    }
    
    // World bounds
    car.x = Math.max(20, Math.min(WORLD_W-20, car.x));
    car.y = Math.max(20, Math.min(WORLD_H-20, car.y));
    
    // Player rides along
    player.x = car.x;
    player.y = car.y;
    player.angle = car.angle;
    
    // Check run over NPCs
    for(let i=npcs.length-1; i>=0; i--){
      const n = npcs[i];
      const d = Math.hypot(n.x-car.x, n.y-car.y);
      if(d < 25){
        if(Math.abs(car.speed) > 1){
          // Squash
          emitDebris(n.x, n.y, n.color, 14, 5);
          emitDebris(n.x, n.y, '#ff3366', 8, 4);
          dropMoney(n.x, n.y, Math.floor(rand(3, 12)));
          addWanted(0.8);
          score += 15;
          popupText(n.x, n.y-15, 'SPLAT!', '#ff3366');
          npcs.splice(i, 1);
          // Respawn
          setTimeout(spawnOneNPC, 3000);
        }
      }
    }
    
    // Check collide with other cars
    for(const pc of parkedCars){
      if(pc === car) continue;
      const d = Math.hypot(pc.x-car.x, pc.y-car.y);
      if(d < 45){
        if(Math.abs(car.speed) > 2){
          pc.hp -= Math.abs(car.speed) * 5;
          emitDebris(pc.x, pc.y, pc.color, 10, 4);
          if(pc.hp <= 0){
            explodeCar(pc);
            // Remove from parkedCars
            const idx = parkedCars.indexOf(pc);
            if(idx>=0) parkedCars.splice(idx,1);
            score += 30;
            dropMoney(pc.x, pc.y, Math.floor(rand(10, 30)));
            addWanted(0.5);
            popupText(pc.x, pc.y-15, 'BOOM!', '#ffaa00');
          }
          car.speed *= 0.4;
        } else {
          car.speed = 0;
        }
      }
    }
    
    // Collide with police cars
    for(let i=cars.length-1; i>=0; i--){
      const pc = cars[i];
      const d = Math.hypot(pc.x-car.x, pc.y-car.y);
      if(d < 45 && Math.abs(car.speed) > 1.5){
        pc.hp -= Math.abs(car.speed) * 8;
        emitDebris(pc.x, pc.y, '#ffaa00', 12, 4);
        if(pc.hp <= 0){
          explodeCar(pc);
          cars.splice(i,1);
          score += 100;
          dropMoney(pc.x, pc.y, Math.floor(rand(20, 50)));
          popupText(pc.x, pc.y-15, '+100', '#00ff88');
        }
        car.speed *= 0.3;
      }
    }
    
  } else {
    // Walking
    let vx = 0, vy = 0;
    if(keys['w']) vy -= 1;
    if(keys['s']) vy += 1;
    if(keys['a']) vx -= 1;
    if(keys['d']) vx += 1;
    
    if(vx || vy){
      const m = Math.hypot(vx, vy);
      vx = vx/m * player.walkSpeed;
      vy = vy/m * player.walkSpeed;
      
      // Face direction
      const targetAngle = Math.atan2(vy, vx);
      let diff = targetAngle - player.angle;
      while(diff > Math.PI) diff -= Math.PI*2;
      while(diff < -Math.PI) diff += Math.PI*2;
      player.angle += diff * 0.3;
      
      // Collision X
      if(!isBlocked(player.x + vx, player.y)) player.x += vx;
      if(!isBlocked(player.x, player.y + vy)) player.y += vy;
      
      // Keep in world
      player.x = Math.max(10, Math.min(WORLD_W-10, player.x));
      player.y = Math.max(10, Math.min(WORLD_H-10, player.y));
    }
  }
}

function explodeCar(car){
  // Big explosion
  for(let i=0;i<40;i++){
    particles.push({
      x: car.x + rand(-15,15),
      y: car.y + rand(-15,15),
      vx: rand(-6,6), vy: rand(-6,6),
      life: rand(30,60), max:60,
      color: ['#ff6e00','#ffd83b','#ff3b00','#fff06e'][Math.floor(Math.random()*4)],
      size: rand(2,6)
    });
  }
  // Damage nearby
  for(const n of npcs.slice()){
    if(Math.hypot(n.x-car.x, n.y-car.y) < 70){
      emitDebris(n.x, n.y, n.color, 8, 3);
      const idx = npcs.indexOf(n);
      if(idx>=0){
        npcs.splice(idx,1);
        setTimeout(spawnOneNPC, 3000);
      }
    }
  }
  // Damage player if on foot nearby
  if(!player.inCar){
    const d = Math.hypot(player.x-car.x, player.y-car.y);
    if(d < 80){
      player.hp -= (80-d) * 0.5;
    }
  }
}

function updateNPCs(){
  for(const n of npcs){
    n.changeT--;
    if(n.changeT <= 0){
      n.angle += rand(-1, 1);
      n.changeT = rand(60, 240);
    }
    
    const nx = n.x + Math.cos(n.angle) * n.speed;
    const ny = n.y + Math.sin(n.angle) * n.speed;
    
    // Stay on sidewalk
    if(isSidewalk(nx, ny) && !isBlocked(nx, ny)){
      n.x = nx;
      n.y = ny;
    } else {
      n.angle += Math.PI + rand(-0.5, 0.5);
    }
    
    n.x = Math.max(10, Math.min(WORLD_W-10, n.x));
    n.y = Math.max(10, Math.min(WORLD_H-10, n.y));
    n.bob += 0.2;
  }
}

function updatePolice(){
  if(getStars() === 0){
    // No active police needed, but keep existing ones for a bit
    return;
  }
  
  // Spawn police
  policeSpawnTimer--;
  if(policeSpawnTimer <= 0){
    const stars = getStars();
    const maxCars = Math.min(stars * 2, 8);
    if(cars.length < maxCars){
      spawnPolice();
    }
    policeSpawnTimer = Math.max(60, 240 - stars * 30);
  }
  
  // Update each police car
  for(let i=cars.length-1; i>=0; i--){
    const p = cars[i];
    
    // AI: chase player
    const targetX = player.inCar ? player.inCar.x : player.x;
    const targetY = player.inCar ? player.inCar.y : player.y;
    
    const dx = targetX - p.x;
    const dy = targetY - p.y;
    const dist = Math.hypot(dx, dy);
    const targetAngle = Math.atan2(dy, dx);
    
    // Steer toward target
    let angDiff = targetAngle - p.angle;
    while(angDiff > Math.PI) angDiff -= Math.PI*2;
    while(angDiff < -Math.PI) angDiff += Math.PI*2;
    
    p.angle += Math.sign(angDiff) * Math.min(Math.abs(angDiff), 0.05);
    
    // Throttle
    if(dist > 80){
      p.speed += 0.18;
      if(p.speed > 5) p.speed = 5;
    } else {
      p.speed *= 0.9;
    }
    
    // Move
    const nx = p.x + Math.cos(p.angle) * p.speed;
    const ny = p.y + Math.sin(p.angle) * p.speed;
    
    if(!isBlocked(nx, ny)){
      p.x = nx;
      p.y = ny;
    } else {
      p.angle += 0.2; // turn away
      p.speed *= 0.5;
    }
    
    p.x = Math.max(20, Math.min(WORLD_W-20, p.x));
    p.y = Math.max(20, Math.min(WORLD_H-20, p.y));
    
    // Shoot at player
    p.shootCd--;
    if(p.shootCd <= 0 && dist < 280){
      p.shootCd = 90 - getStars() * 8;
      const ba = targetAngle + rand(-0.1, 0.1);
      bullets.push({
        x: p.x + Math.cos(ba)*20,
        y: p.y + Math.sin(ba)*20,
        vx: Math.cos(ba)*9,
        vy: Math.sin(ba)*9,
        life: 50,
        from: 'police'
      });
    }
    
    // Despawn if far and wanted is low
    if(dist > 1200){
      cars.splice(i, 1);
    }
  }
}

function updateBullets(){
  for(let i=bullets.length-1; i>=0; i--){
    const b = bullets[i];
    b.x += b.vx;
    b.y += b.vy;
    b.life--;
    
    if(b.life <= 0 || b.x<0 || b.y<0 || b.x>WORLD_W || b.y>WORLD_H){
      bullets.splice(i,1);
      continue;
    }
    
    if(isBlocked(b.x, b.y)){
      emitDebris(b.x, b.y, '#ffffff', 4, 2);
      bullets.splice(i,1);
      continue;
    }
    
    // Hit detection
    if(b.from === 'police'){
      const target = player.inCar ? player.inCar : player;
      if(Math.hypot(b.x-target.x, b.y-target.y) < (player.inCar ? 25 : 12)){
        if(player.inCar){
          player.inCar.hp -= 8;
          if(player.inCar.hp <= 0){
            explodeCar(player.inCar);
            player.inCar = null;
            player.hp -= 30;
          }
        } else {
          player.hp -= 6;
        }
        emitDebris(b.x, b.y, '#ff3366', 6, 3);
        bullets.splice(i,1);
        continue;
      }
    } else if(b.from === 'player'){
      // Hit NPC
      for(let j=npcs.length-1; j>=0; j--){
        const n = npcs[j];
        if(Math.hypot(b.x-n.x, b.y-n.y) < 14){
          emitDebris(n.x, n.y, n.color, 10, 3);
          emitDebris(n.x, n.y, '#ff3366', 6, 3);
          npcs.splice(j,1);
          score += 25;
          dropMoney(n.x, n.y, Math.floor(rand(5, 20)));
          popupText(n.x, n.y-15, '+25', '#00ff88');
          addWanted(1.0);
          setTimeout(spawnOneNPC, 3000);
          bullets.splice(i,1);
          break;
        }
      }
      // Hit police car
      for(let j=cars.length-1; j>=0; j--){
        const pc = cars[j];
        if(Math.hypot(b.x-pc.x, b.y-pc.y) < 28){
          pc.hp -= 15;
          emitDebris(b.x, b.y, '#ffaa00', 6, 3);
          if(pc.hp <= 0){
            explodeCar(pc);
            cars.splice(j,1);
            score += 100;
            dropMoney(pc.x, pc.y, Math.floor(rand(20, 50)));
            popupText(pc.x, pc.y-15, '+100', '#00ff88');
          }
          bullets.splice(i,1);
          break;
        }
      }
    }
  }
}

function updateParticles(){
  for(let i=particles.length-1; i>=0; i--){
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.95;
    p.vy *= 0.95;
    p.life--;
    if(p.life <= 0) particles.splice(i,1);
  }
}

function updatePickups(){
  for(let i=pickups.length-1; i>=0; i--){
    const p = pickups[i];
    p.bob += 0.15;
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.9;
    p.vy *= 0.9;
    p.life--;
    
    const target = player.inCar ? player.inCar : player;
    if(Math.hypot(p.x-target.x, p.y-target.y) < 30){
      player.money += p.amt;
      score += p.amt;
      popupText(p.x, p.y-10, '$'+p.amt, '#00ff88');
      pickups.splice(i,1);
      continue;
    }
    
    if(p.life <= 0) pickups.splice(i,1);
  }
}

function updatePopups(){
  for(let i=popups.length-1; i>=0; i--){
    const p = popups[i];
    p.y += p.vy;
    p.life--;
    if(p.life <= 0) popups.splice(i,1);
  }
}

function updateWanted(){
  // Decay over time if no crimes
  if(Date.now() - lastCrimeTime > 8000){
    wanted = Math.max(0, wanted - 0.005);
  }
  // Smooth display
  wantedDisplay += (wanted - wantedDisplay) * 0.1;
}

// Drawing
function drawWorld(){
  // Visible bounds
  const vx0 = cam.x - 50, vy0 = cam.y - 50;
  const vx1 = cam.x + W + 50, vy1 = cam.y + H + 50;
  
  // Ground base
  ctx.fillStyle = '#08050f';
  ctx.fillRect(0, 0, W, H);
  
  // Draw ground tiles
  const c0 = Math.max(0, Math.floor(vx0/BLK));
  const r0 = Math.max(0, Math.floor(vy0/BLK));
  const c1 = Math.min(COLS-1, Math.floor(vx1/BLK));
  const r1 = Math.min(ROWS-1, Math.floor(vy1/BLK));
  
  for(let r=r0;r<=r1;r++){
    for(let c=c0;c<=c1;c++){
      const x = c*BLK - cam.x, y = r*BLK - cam.y;
      if(map[r][c] === 1){
        // Road
        ctx.fillStyle = '#15151f';
        ctx.fillRect(x, y, BLK, BLK);
      } else {
        // Sidewalk border
        ctx.fillStyle = '#252535';
        ctx.fillRect(x, y, BLK, BLK);
      }
    }
  }
  
  // Draw road markings (lane lines)
  ctx.strokeStyle = 'rgba(255, 200, 50, 0.4)';
  ctx.lineWidth = 2;
  ctx.setLineDash([14, 14]);
  for(let r=r0;r<=r1;r++){
    for(let c=c0;c<=c1;c++){
      if(map[r][c] === 1){
        const x = c*BLK - cam.x, y = r*BLK - cam.y;
        // If part of horizontal road (row % 3 == 1)
        if(r%3 === 1){
          ctx.beginPath();
          ctx.moveTo(x, y + BLK/2);
          ctx.lineTo(x + BLK, y + BLK/2);
          ctx.stroke();
        }
        if(c%3 === 1){
          ctx.beginPath();
          ctx.moveTo(x + BLK/2, y);
          ctx.lineTo(x + BLK/2, y + BLK);
          ctx.stroke();
        }
      }
    }
  }
  ctx.setLineDash([]);
  
  // Draw buildings with neon glow
  for(const b of buildings){
    const x = b.x - cam.x, y = b.y - cam.y;
    if(x + b.w < -20 || x > W+20 || y + b.h < -20 || y > H+20) continue;
    
    // Building base
    ctx.fillStyle = b.color;
    ctx.fillRect(x, y, b.w, b.h);
    
    // Top edge highlight (faux 3D)
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(x+3, y+3, b.w-6, b.h-6);
    ctx.fillStyle = b.color;
    ctx.fillRect(x+6, y+6, b.w-12, b.h-12);
    
    // Neon outline
    ctx.strokeStyle = b.accent;
    ctx.lineWidth = 1.5;
    ctx.shadowColor = b.accent;
    ctx.shadowBlur = 8;
    ctx.strokeRect(x+0.5, y+0.5, b.w-1, b.h-1);
    ctx.shadowBlur = 0;
    
    // Neon windows pattern based on seed
    ctx.fillStyle = b.accent;
    ctx.globalAlpha = 0.8;
    const cols = Math.floor(b.w / 30);
    const rows = Math.floor(b.h / 30);
    for(let i=0;i<cols;i++){
      for(let j=0;j<rows;j++){
        const lit = ((b.seed + i*7 + j*13) % 5) < 3;
        if(lit){
          ctx.shadowColor = b.accent;
          ctx.shadowBlur = 4;
          ctx.fillRect(x + 12 + i*30, y + 12 + j*30, 12, 12);
        }
      }
    }
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    
    // Roof access / detail
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(x + b.w/2 - 8, y + b.h/2 - 8, 16, 16);
  }
  
  // Draw road lane lights at intersections
  for(let r=r0;r<=r1;r++){
    for(let c=c0;c<=c1;c++){
      if(map[r][c] === 1){
        // Street light at corners
        const x = c*BLK - cam.x, y = r*BLK - cam.y;
        if((b_seed(r,c)) % 2 === 0){
          ctx.fillStyle = 'rgba(255, 220, 100, 0.15)';
          ctx.beginPath();
          ctx.arc(x + 16, y + 16, 30, 0, Math.PI*2);
          ctx.fill();
        }
      }
    }
  }
}

function b_seed(r,c){return (r*31 + c*17) % 100;}

function drawCar(car, isPlayerCar){
  const x = car.x - cam.x, y = car.y - cam.y;
  if(x < -50 || x > W+50 || y < -50 || y > H+50) return;
  
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(car.angle);
  
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(-car.w/2 + 3, -car.h/2 + 3, car.w, car.h);
  
  // Body
  ctx.fillStyle = car.color;
  ctx.fillRect(-car.w/2, -car.h/2, car.w, car.h);
  
  // Top stripe / detail
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(-car.w/2 + 2, -car.h/2 + 12, car.w - 4, car.h - 24);
  
  // Windshield
  ctx.fillStyle = 'rgba(100, 220, 255, 0.6)';
  ctx.fillRect(-car.w/2 + 4, -car.h/2 + 6, car.w - 8, 8);
  ctx.fillRect(-car.w/2 + 4, car.h/2 - 14, car.w - 8, 8);
  
  if(car.isPolice){
    // Police lights
    const flash = Math.floor(gameTime/6) % 2 === 0;
    ctx.fillStyle = flash ? '#ff2222' : '#2222ff';
    ctx.shadowColor = ctx.fillStyle;
    ctx.shadowBlur = 10;
    ctx.fillRect(-6, -2, 5, 4);
    ctx.fillStyle = flash ? '#2222ff' : '#ff2222';
    ctx.shadowColor = ctx.fillStyle;
    ctx.fillRect(1, -2, 5, 4);
    ctx.shadowBlur = 0;
    
    // White stripe
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(-car.w/2, -2, car.w, 4);
  }
  
  // Headlights
  ctx.fillStyle = '#ffffaa';
  ctx.shadowColor = '#ffffaa';
  ctx.shadowBlur = 6;
  ctx.fillRect(-car.w/2 + 3, car.h/2 - 3, 4, 3);
  ctx.fillRect(car.w/2 - 7, car.h/2 - 3, 4, 3);
  ctx.shadowBlur = 0;
  
  ctx.restore();
  
  // Headlight cones
  if(car === player.inCar || car.isPolice){
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(car.angle);
    const grad = ctx.createRadialGradient(0, car.h/2, 5, 0, car.h/2 + 60, 60);
    grad.addColorStop(0, 'rgba(255, 240, 150, 0.35)');
    grad.addColorStop(1, 'rgba(255, 240, 150, 0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(-car.w/2 + 5, car.h/2);
    ctx.lineTo(-40, car.h/2 + 80);
    ctx.lineTo(40, car.h/2 + 80);
    ctx.lineTo(car.w/2 - 5, car.h/2);
    ctx.fill();
    ctx.restore();
  }
}

function drawNPC(n){
  const x = n.x - cam.x, y = n.y - cam.y;
  if(x < -30 || x > W+30 || y < -30 || y > H+30) return;
  
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath();
  ctx.ellipse(x+2, y+2, 7, 5, 0, 0, Math.PI*2);
  ctx.fill();
  
  // Body
  ctx.fillStyle = n.color;
  ctx.beginPath();
  ctx.arc(x, y + Math.sin(n.bob)*0.5, 6, 0, Math.PI*2);
  ctx.fill();
  
  // Outline
  ctx.strokeStyle = 'rgba(0,0,0,0.6)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  
  // Head dot
  ctx.fillStyle = '#ffd6a0';
  ctx.beginPath();
  ctx.arc(x, y - 4, 3, 0, Math.PI*2);
  ctx.fill();
}

function drawPlayer(){
  const x = player.x - cam.x, y = player.y - cam.y;
  
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath();
  ctx.ellipse(x+2, y+2, 8, 6, 0, 0, Math.PI*2);
  ctx.fill();
  
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(player.angle);
  
  // Body
  ctx.fillStyle = '#00ffaa';
  ctx.shadowColor = '#00ffaa';
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.arc(0, 0, 7, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;
  
  // Direction indicator
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(3, -2, 6, 4);
  
  // Outline
  ctx.strokeStyle = '#003322';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(0, 0, 7, 0, Math.PI*2);
  ctx.stroke();
  
  ctx.restore();
}

function drawBullets(){
  for(const b of bullets){
    const x = b.x - cam.x, y = b.y - cam.y;
    ctx.fillStyle = b.from === 'player' ? '#ffff66' : '#ff6688';
    ctx.shadowColor = ctx.fillStyle;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(x, y, 3, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function drawParticles(){
  for(const p of particles){
    const x = p.x - cam.x, y = p.y - cam.y;
    ctx.globalAlpha = p.life / p.max;
    ctx.fillStyle = p.color;
    ctx.fillRect(x - p.size/2, y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

function drawPickups(){
  for(const p of pickups){
    const x = p.x - cam.x, y = p.y - cam.y;
    const yo = Math.sin(p.bob) * 3;
    ctx.fillStyle = '#00ff88';
    ctx.shadowColor = '#00ff88';
    ctx.shadowBlur = 10;
    ctx.font = 'bold 14px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('$', x, y + yo + 4);
    ctx.shadowBlur = 0;
  }
}

function drawPopups(){
  for(const p of popups){
    const x = p.x - cam.x, y = p.y - cam.y;
    ctx.globalAlpha = p.life / 50;
    ctx.fillStyle = p.color;
    ctx.font = 'bold 14px Courier New';
    ctx.textAlign = 'center';
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.fillText(p.text, x, y);
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;
}

function drawHealthBar(){
  // Bottom center health
  const bw = 280, bh = 16;
  const bx = (W - bw)/2, by = H - 38;
  
  // BG
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(bx-3, by-3, bw+6, bh+6);
  ctx.strokeStyle = 'rgba(0,255,170,0.4)';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx-3, by-3, bw+6, bh+6);
  
  // Fill
  const pct = Math.max(0, player.hp / player.maxHp);
  const grad = ctx.createLinearGradient(bx, 0, bx+bw, 0);
  grad.addColorStop(0, '#ff0055');
  grad.addColorStop(0.5, '#ffaa00');
  grad.addColorStop(1, '#00ff88');
  ctx.fillStyle = grad;
  ctx.fillRect(bx, by, bw * pct, bh);
  
  // Text
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText('HEALTH', bx, by - 6);
  ctx.textAlign = 'right';
  ctx.fillText(Math.floor(player.hp) + '/' + player.maxHp, bx + bw, by - 6);
}

function drawMoney(){
  // Top right
  ctx.textAlign = 'right';
  ctx.fillStyle = '#00ff88';
  ctx.shadowColor = '#00ff88';
  ctx.shadowBlur = 8;
  ctx.font = 'bold 22px Courier New';
  ctx.fillText('$' + player.money, W - 20, 36);
  ctx.shadowBlur = 0;
  
  ctx.fillStyle = '#aaa';
  ctx.font = 'bold 10px Courier New';
  ctx.fillText('CASH', W - 20, 50);
}

function drawScore(){
  // Top left
  ctx.textAlign = 'left';
  ctx.fillStyle = '#ffea3b';
  ctx.shadowColor = '#ffea3b';
  ctx.shadowBlur = 8;
  ctx.font = 'bold 22px Courier New';
  ctx.fillText(score.toString().padStart(6,'0'), 20, 36);
  ctx.shadowBlur = 0;
  
  ctx.fillStyle = '#aaa';
  ctx.font = 'bold 10px Courier New';
  ctx.fillText('SCORE', 20, 50);
}

function drawWanted(){
  // Top center
  const stars = 5;
  const filled = getStars();
  const total = wantedDisplay;
  const sw = 24;
  const totalW = stars * sw;
  const sx = (W - totalW)/2;
  const sy = 22;
  
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 10px Courier New';
  ctx.fillText('WANTED', W/2, 12);
  
  for(let i=0;i<stars;i++){
    const starVal = total - i;
    const filled = starVal >= 1;
    const partial = Math.max(0, Math.min(1, starVal));
    
    const cx = sx + i*sw + sw/2;
    const cy = sy + 10;
    const r = 8;
    
    // Star
    ctx.save();
    ctx.translate(cx, cy);
    
    if(filled || partial > 0){
      ctx.shadowColor = '#ff2255';
      ctx.shadowBlur = 10;
      ctx.fillStyle = `rgba(255, 60, 100, ${0.3 + partial*0.7})`;
      drawStar(0, 0, r);
      ctx.fill();
      ctx.shadowBlur = 0;
      
      ctx.strokeStyle = '#ff6688';
      ctx.lineWidth = 1.5;
      drawStar(0, 0, r);
      ctx.stroke();
    } else {
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 1.5;
      drawStar(0, 0, r);
      ctx.stroke();
    }
    
    ctx.restore();
  }
}

function drawStar(cx, cy, r){
  ctx.beginPath();
  for(let i=0;i<10;i++){
    const ang = -Math.PI/2 + i * Math.PI/5;
    const rad = i%2===0 ? r : r*0.45;
    const x = cx + Math.cos(ang)*rad;
    const y = cy + Math.sin(ang)*rad;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.closePath();
}

function drawMinimap(){
  const mw = 180, mh = 140;
  const mx = W - mw - 20, my = H - mh - 20;
  const scale = mw / (WORLD_W);
  const scaleH = mh / (WORLD_H);
  const sc = Math.min(scale, scaleH);
  
  // Background
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(mx-3, my-3, mw+6, mh+6);
  ctx.strokeStyle = '#00ffe1';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(mx-3, my-3, mw+6, mh+6);
  
  // Roads
  ctx.fillStyle = '#1a1a2a';
  ctx.fillRect(mx, my, mw, mh);
  
  // Draw road grid
  ctx.fillStyle = '#2a2a3a';
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(map[r][c]===1){
        ctx.fillRect(mx + c*BLK*sc, my + r*BLK*sc, BLK*sc+1, BLK*sc+1);
      }
    }
  }
  
  // Cars (parked) - small dots
  for(const pc of parkedCars){
    if(pc === player.inCar) continue;
    ctx.fillStyle = pc.color;
    ctx.fillRect(mx + pc.x*sc - 1, my + pc.y*sc - 1, 2, 2);
  }
  
  // NPCs
  ctx.fillStyle = '#888';
  for(const n of npcs){
    ctx.fillRect(mx + n.x*sc, my + n.y*sc, 1, 1);
  }
  
  // Police (red, larger)
  for(const p of cars){
    ctx.fillStyle = '#ff2244';
    ctx.shadowColor = '#ff2244';
    ctx.shadowBlur = 4;
    ctx.fillRect(mx + p.x*sc - 2, my + p.y*sc - 2, 4, 4);
    ctx.shadowBlur = 0;
  }
  
  // Player (cyan)
  ctx.fillStyle = '#00ffaa';
  ctx.shadowColor = '#00ffaa';
  ctx.shadowBlur = 6;
  ctx.fillRect(mx + player.x*sc - 2, my + player.y*sc - 2, 4, 4);
  ctx.shadowBlur = 0;
  
  // View frustum
  ctx.strokeStyle = 'rgba(0,255,170,0.4)';
  ctx.lineWidth = 1;
  ctx.strokeRect(mx + cam.x*sc, my + cam.y*sc, W*sc, H*sc);
}

function drawControls(){
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '10px Courier New';
  ctx.textAlign = 'left';
  
  if(player.inCar){
    ctx.fillText('[ARROWS] DRIVE   [E] EXIT CAR', 20, H - 12);
  } else {
    ctx.fillText('[WASD] WALK   [E] ENTER CAR   [SPACE] SHOOT', 20, H - 12);
  }
}

function drawVignette(){
  const grad = ctx.createRadialGradient(W/2, H/2, W/3, W/2, H/2, W/1.2);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(0,0,0,0.6)');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);
}

function drawGameOver(){
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0,0,W,H);
  
  ctx.textAlign = 'center';
  
  ctx.fillStyle = '#ff0055';
  ctx.shadowColor = '#ff0055';
  ctx.shadowBlur = 20;
  ctx.font = 'bold 72px Courier New';
  ctx.fillText('GAME OVER', W/2, H/2 - 30);
  ctx.shadowBlur = 0;
  
  ctx.fillStyle = '#ffea3b';
  ctx.font = 'bold 28px Courier New';
  ctx.fillText('FINAL SCORE: ' + score, W/2, H/2 + 20);
  
  ctx.fillStyle = '#00ff88';
  ctx.font = 'bold 20px Courier New';
  ctx.fillText('CASH COLLECTED: $' + player.money, W/2, H/2 + 55);
  
  ctx.fillStyle = '#fff';
  ctx.font = '16px Courier New';
  ctx.fillText('Press [R] to restart', W/2, H/2 + 100);
  
  // Blink
  if(Math.floor(gameTime/30) % 2 === 0){
    ctx.fillStyle = '#00ffe1';
    ctx.font = 'bold 14px Courier New';
    ctx.fillText('> PRESS R <', W/2, H/2 + 125);
  }
}

function restartGame(){
  player.x = 600; player.y = 250;
  player.hp = 100;
  player.money = 0;
  player.inCar = null;
  player.angle = 0;
  score = 0;
  wanted = 0;
  wantedDisplay = 0;
  cars.length = 0;
  bullets.length = 0;
  particles.length = 0;
  pickups.length = 0;
  popups.length = 0;
  spawnParkedCars();
  spawnNPCs();
  gameOver = false;
}

// Game loop
function loop(){
  gameTime++;
  
  if(!gameOver){
    updatePlayer();
    updateNPCs();
    updatePolice();
    updateBullets();
    updateParticles();
    updatePickups();
    updatePopups();
    updateWanted();
    
    if(player.hp <= 0){
      gameOver = true;
      if(player.inCar){
        explodeCar(player.inCar);
        player.inCar = null;
      }
    }
  }
  
  // Camera follow
  const focusX = player.x;
  const focusY = player.y;
  cam.x += ((focusX - W/2) - cam.x) * 0.12;
  cam.y += ((focusY - H/2) - cam.y) * 0.12;
  cam.x = Math.max(0, Math.min(WORLD_W - W, cam.x));
  cam.y = Math.max(0, Math.min(WORLD_H - H, cam.y));
  
  // Render
  drawWorld();
  
  // Draw pickups underneath
  drawPickups();
  
  // Draw NPCs
  for(const n of npcs) drawNPC(n);
  
  // Draw parked cars
  for(const pc of parkedCars){
    if(pc !== player.inCar) drawCar(pc, false);
  }
  
  // Draw police cars
  for(const p of cars) drawCar(p, false);
  
  // Draw player's car (on top)
  if(player.inCar) drawCar(player.inCar, true);
  
  // Draw player (if on foot)
  if(!player.inCar) drawPlayer();
  
  // Bullets
  drawBullets();
  
  // Particles
  drawParticles();
  
  // Popups
  drawPopups();
  
  // Vignette
  drawVignette();
  
  // HUD
  drawHealthBar();
  drawMoney();
  drawScore();
  drawWanted();
  drawMinimap();
  drawControls();
  
  if(gameOver) drawGameOver();
  
  requestAnimationFrame(loop);
}

loop();
</script>
