<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon City - GTA Style Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
background: #0a0a0f;
overflow: hidden;
font-family: 'Courier New', monospace;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
}
canvas {
display: block;
image-rendering: pixelated;
}
#gameOver {
display: none;
position: fixed;
top: 0; left: 0;
width: 100%; height: 100%;
background: rgba(0,0,0,0.85);
z-index: 100;
flex-direction: column;
justify-content: center;
align-items: center;
}
#gameOver h1 {
color: #ff0040;
font-size: 72px;
text-shadow: 0 0 20px #ff0040, 0 0 40px #ff0040;
margin-bottom: 20px;
}
#gameOver p {
color: #00ffff;
font-size: 24px;
text-shadow: 0 0 10px #00ffff;
margin: 5px;
}
#gameOver button {
margin-top: 30px;
padding: 15px 40px;
font-size: 24px;
background: transparent;
color: #00ff88;
border: 2px solid #00ff88;
cursor: pointer;
font-family: 'Courier New', monospace;
text-transform: uppercase;
transition: all 0.3s;
}
#gameOver button:hover {
background: #00ff88;
color: #0a0a0f;
box-shadow: 0 0 30px #00ff88;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="gameOver">
<h1>WASTED</h1>
<p id="finalScore"></p>
<p id="finalMoney"></p>
<p id="finalWanted"></p>
<button onclick="restartGame()">RESTART</button>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const gameOverDiv = document.getElementById('gameOver');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

// Game constants
const TILE = 40;
const MAP_W = 80;
const MAP_H = 80;
const ROAD_WIDTH = 3; // tiles

// Map types: 0=sidewalk, 1=road, 2=building, 3=grass
let map = [];

// Generate city grid
function generateMap() {
    map = [];
    for (let y = 0; y < MAP_H; y++) {
        map[y] = [];
        for (let x = 0; x < MAP_W; x++) {
            map[y][x] = 0;
        }
    }

    // Create road grid
    for (let y = 0; y < MAP_H; y++) {
        for (let x = 0; x < MAP_W; x++) {
            if (x % 10 < ROAD_WIDTH || y % 10 < ROAD_WIDTH) {
                map[y][x] = 1;
            }
        }
    }

    // Create buildings in blocks
    for (let by = 0; by < MAP_H; by += 10) {
        for (let bx = 0; bx < MAP_W; bx += 10) {
            let blockW = 10 - ROAD_WIDTH * 2;
            let blockH = 10 - ROAD_WIDTH * 2;
            if (blockW <= 0 || blockH <= 0) continue;

            let numBuildings = 1 + Math.floor(Math.random() * 3);
            for (let b = 0; b < numBuildings; b++) {
                let bw = 2 + Math.floor(Math.random() * Math.min(4, blockW));
                let bh = 2 + Math.floor(Math.random() * Math.min(4, blockH));
                let bx2 = bx + ROAD_WIDTH + Math.floor(Math.random() * Math.max(1, blockW - bw));
                let by2 = by + ROAD_WIDTH + Math.floor(Math.random() * Math.max(1, blockH - bh));

                for (let yy = by2; yy < Math.min(by2 + bh, MAP_H); yy++) {
                    for (let xx = bx2; xx < Math.min(bx2 + bw, MAP_W); xx++) {
                        map[yy][xx] = 2;
                    }
                }
            }
        }
    }
}

// Colors for buildings
const buildingColors = [
    '#1a1a2e', '#16213e', '#0f3460', '#1a1a3e',
    '#2a1a3e', '#1a2a3e', '#0a1a2e', '#2e1a1a'
];
const buildingNeon = [
    '#ff006680', '#00ff8880', '#0088ff80', '#ff00ff80',
    '#ffff0080', '#00ffff80', '#ff660080', '#6600ff80'
];

// Game state
let player = {};
let cars = [];
let npcs = [];
let police = [];
let bullets = [];
let moneyDrops = [];
let particles = [];
let camera = { x: 0, y: 0 };
let keys = {};
let score = 0;
let money = 0;
let wantedLevel = 0;
let wantedTimer = 0;
let policeSpawnTimer = 0;
let gameRunning = true;
let screenShake = 0;
let notifications = [];

function initPlayer() {
    player = {
        x: 5 * TILE,
        y: 5 * TILE,
        w: 14,
        h: 14,
        speed: 3,
        angle: 0,
        health: 100,
        maxHealth: 100,
        inCar: null,
        invincible: 0,
        color: '#00ff88',
        animFrame: 0,
        animTimer: 0
    };
}

function isRoad(x, y) {
    let tx = Math.floor(x / TILE);
    let ty = Math.floor(y / TILE);
    if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) return false;
    return map[ty][tx] === 1;
}

function isSidewalk(x, y) {
    let tx = Math.floor(x / TILE);
    let ty = Math.floor(y / TILE);
    if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) return false;
    return map[ty][tx] === 0;
}

function isBuilding(x, y) {
    let tx = Math.floor(x / TILE);
    let ty = Math.floor(y / TILE);
    if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) return true;
    return map[ty][tx] === 2;
}

function canMove(x, y, w, h) {
    return !isBuilding(x - w/2, y - h/2) &&
           !isBuilding(x + w/2, y - h/2) &&
           !isBuilding(x - w/2, y + h/2) &&
           !isBuilding(x + w/2, y + h/2);
}

function spawnCars() {
    cars = [];
    for (let i = 0; i < 30; i++) {
        let cx, cy, dir;
        do {
            cx = Math.random() * MAP_W * TILE;
            cy = Math.random() * MAP_H * TILE;
        } while (!isRoad(cx, cy));

        dir = (Math.random() < 0.5) ? 0 : Math.PI / 2;
        if (Math.random() < 0.5) dir += Math.PI;

        let colors = ['#ff0044', '#0044ff', '#ffaa00', '#00ff88', '#ff00ff', '#ffffff', '#888888', '#ff6600'];
        cars.push({
            x: cx, y: cy,
            w: 28, h: 16,
            angle: dir,
            speed: 0,
            maxSpeed: 5 + Math.random() * 3,
            color: colors[Math.floor(Math.random() * colors.length)],
            health: 100,
            isPolice: false,
            driver: null,
            occupied: false,
            animTimer: Math.random() * 100
        });
    }
}

function spawnNPCs() {
    npcs = [];
    for (let i = 0; i < 40; i++) {
        let nx, ny;
        do {
            nx = Math.random() * MAP_W * TILE;
            ny = Math.random() * MAP_H * TILE;
        } while (!isSidewalk(nx, ny));

        let colors = ['#ff4444', '#44ff44', '#4444ff', '#ffff44', '#ff44ff', '#44ffff', '#ff8844', '#8844ff'];
        npcs.push({
            x: nx, y: ny,
            w: 10, h: 10,
            speed: 0.5 + Math.random() * 1.5,
            angle: Math.random() * Math.PI * 2,
            color: colors[Math.floor(Math.random() * colors.length)],
            health: 50,
            alive: true,
            moveTimer: Math.random() * 100,
            targetX: nx,
            targetY: ny,
            flashColor: null,
            flashTimer: 0
        });
    }
}

function spawnPoliceCar() {
    let angle = Math.random() * Math.PI * 2;
    let dist = 400 + Math.random() * 200;
    let px = player.x + Math.cos(angle) * dist;
    let py = player.y + Math.sin(angle) * dist;

    if (isBuilding(px, py)) {
        px = player.x + 500;
        py = player.y + 500;
    }

    let colors = ['#ffffff', '#cccccc'];
    police.push({
        x: px, y: py,
        w: 28, h: 16,
        angle: 0,
        speed: 0,
        maxSpeed: 6 + wantedLevel * 0.5,
        color: '#ffffff',
        health: 150,
        isPolice: true,
        driver: 'police',
        occupied: true,
        animTimer: 0,
        targetX: player.x,
        targetY: player.y,
        shootTimer: 0
    });
}

function addNotification(text, color) {
    notifications.push({ text, color, timer: 120, y: 0 });
}

function addParticles(x, y, color, count, speed) {
    for (let i = 0; i < count; i++) {
        let angle = Math.random() * Math.PI * 2;
        let spd = speed * (0.5 + Math.random());
        particles.push({
            x, y,
            vx: Math.cos(angle) * spd,
            vy: Math.sin(angle) * spd,
            life: 30 + Math.random() * 30,
            color,
            size: 2 + Math.random() * 4
        });
    }
}

function addMoneyDrop(x, y, amount) {
    moneyDrops.push({
        x: x + (Math.random() - 0.5) * 20,
        y: y + (Math.random() - 0.5) * 20,
        amount: amount,
        life: 600,
        bobTimer: Math.random() * Math.PI * 2
    });
}

function damagePlayer(dmg) {
    if (player.invincible > 0) return;
    player.health -= dmg;
    player.invincible = 30;
    screenShake = 10;
    addParticles(player.x, player.y, '#ff0000', 10, 3);
    if (player.health <= 0) {
        gameRunning = false;
        showGameOver();
    }
}

function showGameOver() {
    gameOverDiv.style.display = 'flex';
    document.getElementById('finalScore').textContent = 'SCORE: ' + score;
    document.getElementById('finalMoney').textContent = 'MONEY: $' + money;
    document.getElementById('finalWanted').textContent = 'WANTED LEVEL: ' + wantedLevel + ' STARS';
}

function restartGame() {
    gameOverDiv.style.display = 'none';
    gameRunning = true;
    score = 0;
    money = 0;
    wantedLevel = 0;
    wantedTimer = 0;
    policeSpawnTimer = 0;
    police = [];
    bullets = [];
    particles = [];
    moneyDrops = [];
    notifications = [];
    generateMap();
    initPlayer();
    spawnCars();
    spawnNPCs();
}

// Input
document.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;

    if (e.key.toLowerCase() === 'e' && gameRunning) {
        if (player.inCar) {
            // Exit car
            let car = player.inCar;
            player.x = car.x + Math.cos(car.angle + Math.PI / 2) * 20;
            player.y = car.y + Math.sin(car.angle + Math.PI / 2) * 20;
            player.inCar = null;
            car.occupied = false;
            car.driver = null;
        } else {
            // Try to enter nearest car
            let nearest = null;
            let nearDist = 50;
            for (let car of cars) {
                let d = Math.hypot(car.x - player.x, car.y - player.y);
                if (d < nearDist) {
                    nearest = car;
                    nearDist = d;
                }
            }
            if (nearest) {
                player.inCar = nearest;
                nearest.occupied = true;
                nearest.driver = 'player';
            }
        }
    }
});

document.addEventListener('keyup', e => {
    keys[e.key.toLowerCase()] = false;
});

// Update
function update() {
    if (!gameRunning) return;

    // Player movement
    if (player.inCar) {
        let car = player.inCar;
        car.animTimer++;

        if (keys['arrowup'] || keys['w']) {
            car.speed = Math.min(car.speed + 0.15, car.maxSpeed);
        } else if (keys['arrowdown'] || keys['s']) {
            car.speed = Math.max(car.speed - 0.15, -car.maxSpeed / 2);
        } else {
            car.speed *= 0.98;
            if (Math.abs(car.speed) < 0.05) car.speed = 0;
        }

        if (keys['arrowleft'] || keys['a']) {
            car.angle -= 0.04 * (car.speed / car.maxSpeed + 0.2);
        }
        if (keys['arrowright'] || keys['d']) {
            car.angle += 0.04 * (car.speed / car.maxSpeed + 0.2);
        }

        let nx = car.x + Math.cos(car.angle) * car.speed;
        let ny = car.y + Math.sin(car.angle) * car.speed;

        if (!isBuilding(nx, ny) && !isBuilding(nx + car.w/2, ny + car.h/2) &&
            !isBuilding(nx - car.w/2, ny - car.h/2) && !isBuilding(nx + car.w/2, ny - car.h/2)) {
            car.x = nx;
            car.y = ny;
        } else {
            car.speed = -car.speed * 0.5;
            addParticles(car.x, car.y, '#ffaa00', 5, 2);
        }

        // Car hits NPC
        for (let npc of npcs) {
            if (!npc.alive) continue;
            if (Math.hypot(npc.x - car.x, npc.y - car.y) < 20 && Math.abs(car.speed) > 2) {
                npc.alive = false;
                npc.health = 0;
                wantedLevel = Math.min(5, wantedLevel + 1);
                wantedTimer = 600;
                score += 50;
                addMoneyDrop(npc.x, npc.y, 10 + Math.floor(Math.random() * 40));
                addParticles(npc.x, npc.y, '#ff0000', 15, 4);
                screenShake = 8;
                addNotification('+1 STAR', '#ff0000');
            }
        }

        // Car hits police
        for (let p of police) {
            if (Math.hypot(p.x - car.x, p.y - car.y) < 25 && Math.abs(car.speed) > 2) {
                p.health -= 30;
                car.speed *= 0.3;
                addParticles((p.x + car.x) / 2, (p.y + car.y) / 2, '#ffaa00', 10, 3);
                screenShake = 12;
                wantedLevel = Math.min(5, wantedLevel + 1);
                wantedTimer = 600;
                addNotification('+1 STAR', '#ff0000');
            }
        }

        player.x = car.x;
        player.y = car.y;
    } else {
        // On foot
        let dx = 0, dy = 0;
        if (keys['w']) dy = -1;
        if (keys['s']) dy = 1;
        if (keys['a']) dx = -1;
        if (keys['d']) dx = 1;

        if (dx !== 0 || dy !== 0) {
            let len = Math.sqrt(dx * dx + dy * dy);
            dx /= len;
            dy /= len;
            let nx = player.x + dx * player.speed;
            let ny = player.y + dy * player.speed;
            if (canMove(nx, ny, player.w, player.h)) {
                player.x = nx;
                player.y = ny;
            }
            player.angle = Math.atan2(dy, dx);
            player.animTimer++;
            if (player.animTimer % 8 === 0) player.animFrame = (player.animFrame + 1) % 4;
        }

        // Player hits NPC
        for (let npc of npcs) {
            if (!npc.alive) continue;
            if (Math.hypot(npc.x - player.x, npc.y - player.y) < 15) {
                npc.alive = false;
                npc.health = 0;
                wantedLevel = Math.min(5, wantedLevel + 1);
                wantedTimer = 600;
                score += 100;
                addMoneyDrop(npc.x, npc.y, 20 + Math.floor(Math.random() * 50));
                addParticles(npc.x, npc.y, '#ff0000', 10, 3);
                screenShake = 5;
                addNotification('+1 STAR', '#ff0000');
            }
        }
    }

    // Invincibility
    if (player.invincible > 0) player.invincible--;

    // Wanted level timer
    if (wantedTimer > 0) {
        wantedTimer--;
    } else if (wantedLevel > 0) {
        wantedLevel = Math.max(0, wantedLevel - 0.001);
    }

    // Spawn police
    if (wantedLevel >= 1) {
        policeSpawnTimer++;
        let spawnRate = Math.max(60, 300 - wantedLevel * 50);
        if (policeSpawnTimer >= spawnRate && police.length < wantedLevel * 3 + 2) {
            spawnPoliceCar();
            policeSpawnTimer = 0;
            addNotification('POLICE EN ROUTE', '#4488ff');
        }
    }

    // Update police AI
    for (let i = police.length - 1; i >= 0; i--) {
        let p = police[i];
        p.animTimer++;

        // Chase player
        let dx = player.x - p.x;
        let dy = player.y - p.y;
        let dist = Math.hypot(dx, dy);
        let targetAngle = Math.atan2(dy, dx);

        // Smooth angle turning
        let angleDiff = targetAngle - p.angle;
        while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
        while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
        p.angle += angleDiff * 0.05;

        let desiredSpeed = p.maxSpeed * (dist > 100 ? 1 : 0.6);
        p.speed += (desiredSpeed - p.speed) * 0.03;

        let nx = p.x + Math.cos(p.angle) * p.speed;
        let ny = p.y + Math.sin(p.angle) * p.speed;

        if (!isBuilding(nx, ny)) {
            p.x = nx;
            p.y = ny;
        }

        // Police shoot at player
        p.shootTimer--;
        if (dist < 300 && p.shootTimer <= 0) {
            let shootAngle = Math.atan2(player.y - p.y, player.x - p.x);
            bullets.push({
                x: p.x + Math.cos(p.angle) * 15,
                y: p.y + Math.sin(p.angle) * 15,
                vx: Math.cos(shootAngle) * 8,
                vy: Math.sin(shootAngle) * 8,
                life: 60,
                isEnemy: true,
                color: '#ff4444'
            });
            p.shootTimer = Math.max(15, 40 - wantedLevel * 5);
        }

        // Police car hits player
        if (!player.inCar && Math.hypot(p.x - player.x, p.y - player.y) < 22) {
            damagePlayer(15);
            p.speed *= 0.3;
        }

        // Remove destroyed police cars
        if (p.health <= 0) {
            score += 200;
            addMoneyDrop(p.x, p.y, 50 + Math.floor(Math.random() * 100));
            addParticles(p.x, p.y, '#ff6600', 20, 5);
            addParticles(p.x, p.y, '#ffff00', 10, 3);
            police.splice(i, 1);
        }
    }

    // Update bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.x += b.vx;
        b.y += b.vy;
        b.life--;

        if (b.life <= 0 || isBuilding(b.x, b.y)) {
            addParticles(b.x, b.y, b.color, 3, 2);
            bullets.splice(i, 1);
            continue;
        }

        if (b.isEnemy && !player.inCar) {
            if (Math.hypot(b.x - player.x, b.y - player.y) < 10) {
                damagePlayer(10);
                bullets.splice(i, 1);
                continue;
            }
        }

        if (b.isEnemy && player.inCar && player.inCar === b.targetCar) {
            player.inCar.health -= 10;
            addParticles(b.x, b.y, '#ffaa00', 5, 2);
            bullets.splice(i, 1);
            continue;
        }
    }

    // Update NPC AI
    for (let npc of npcs) {
        if (!npc.alive) continue;

        npc.moveTimer--;
        if (npc.moveTimer <= 0) {
            npc.targetX = npc.x + (Math.random() - 0.5) * 200;
            npc.targetY = npc.y + (Math.random() - 0.5) * 200;
            npc.moveTimer = 60 + Math.random() * 120;
        }

        // Flee from nearby police
        let fleeFromPolice = false;
        for (let p of police) {
            let d = Math.hypot(p.x - npc.x, p.y - npc.y);
            if (d < 150) {
                let fleeAngle = Math.atan2(npc.y - p.y, npc.x - p.x);
                npc.x += Math.cos(fleeAngle) * npc.speed * 2;
                npc.y += Math.sin(fleeAngle) * npc.speed * 2;
                fleeFromPolice = true;
                break;
            }
        }

        if (!fleeFromPolice) {
            let dx = npc.targetX - npc.x;
            let dy = npc.targetY - npc.y;
            let dist = Math.hypot(dx, dy);
            if (dist > 5) {
                let nx = npc.x + (dx / dist) * npc.speed;
                let ny = npc.y + (dy / dist) * npc.speed;
                if (isSidewalk(nx, ny) || isRoad(nx, ny)) {
                    npc.x = nx;
                    npc.y = ny;
                } else {
                    npc.targetX = npc.x + (Math.random() - 0.5) * 200;
                    npc.targetY = npc.y + (Math.random() - 0.5) * 200;
                }
                npc.angle = Math.atan2(dy, dx);
            }
        }

        // Keep in bounds
        npc.x = Math.max(10, Math.min(MAP_W * TILE - 10, npc.x));
        npc.y = Math.max(10, Math.min(MAP_H * TILE - 10, npc.y));

        if (npc.flashTimer > 0) npc.flashTimer--;
    }

    // Update money drops
    for (let i = moneyDrops.length - 1; i >= 0; i--) {
        let m = moneyDrops[i];
        m.life--;
        m.bobTimer += 0.05;

        let d = Math.hypot(m.x - player.x, m.y - player.y);
        if (d < 30) {
            money += m.amount;
            score += m.amount;
            addParticles(m.x, m.y, '#00ff00', 5, 2);
            moneyDrops.splice(i, 1);
            continue;
        }

        if (m.life <= 0) {
            moneyDrops.splice(i, 1);
        }
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.95;
        p.vy *= 0.95;
        p.life--;
        p.size *= 0.97;
        if (p.life <= 0) particles.splice(i, 1);
    }

    // Update notifications
    for (let i = notifications.length - 1; i >= 0; i--) {
        notifications[i].timer--;
        notifications[i].y -= 0.5;
        if (notifications[i].timer <= 0) notifications.splice(i, 1);
    }

    // Screen shake
    if (screenShake > 0) screenShake--;

    // Camera
    let targetCamX = player.x - canvas.width / 2;
    let targetCamY = player.y - canvas.height / 2;
    camera.x += (targetCamX - camera.x) * 0.1;
    camera.y += (targetCamY - camera.y) * 0.1;

    if (screenShake > 0) {
        camera.x += (Math.random() - 0.5) * screenShake * 2;
        camera.y += (Math.random() - 0.5) * screenShake * 2;
    }
}

// Render
function render() {
    ctx.fillStyle = '#0a0a0f';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    // Visible map range
    let startTX = Math.max(0, Math.floor(camera.x / TILE));
    let startTY = Math.max(0, Math.floor(camera.y / TILE));
    let endTX = Math.min(MAP_W, startTX + Math.ceil(canvas.width / TILE) + 2);
    let endTY = Math.min(MAP_H, startTY + Math.ceil(canvas.height / TILE) + 2);

    // Draw tiles
    for (let y = startTY; y < endTY; y++) {
        for (let x = startTX; x < endTX; x++) {
            let px = x * TILE;
            let py = y * TILE;
            let tile = map[y][x];

            if (tile === 0) {
                ctx.fillStyle = '#1a1a24';
                ctx.fillRect(px, py, TILE, TILE);
                ctx.strokeStyle = '#222233';
                ctx.lineWidth = 0.5;
                ctx.strokeRect(px, py, TILE, TILE);
            } else if (tile === 1) {
                ctx.fillStyle = '#2a2a35';
                ctx.fillRect(px, py, TILE, TILE);
                // Road markings
                ctx.strokeStyle = '#444455';
                ctx.lineWidth = 1;
                ctx.setLineDash([8, 8]);
                if (x % 10 === ROAD_WIDTH - 1) {
                    ctx.beginPath();
                    ctx.moveTo(px, py);
                    ctx.lineTo(px, py + TILE);
                    ctx.stroke();
                }
                if (y % 10 === ROAD_WIDTH - 1) {
                    ctx.beginPath();
                    ctx.moveTo(px, py);
                    ctx.lineTo(px + TILE, py);
                    ctx.stroke();
                }
                ctx.setLineDash([]);
            } else if (tile === 2) {
                let idx = (x + y * 7) % buildingColors.length;
                ctx.fillStyle = buildingColors[idx];
                ctx.fillRect(px, py, TILE, TILE);

                // Neon edge glow
                let neonIdx = (x * 3 + y * 7) % buildingNeon.length;
                ctx.strokeStyle = buildingNeon[neonIdx];
                ctx.lineWidth = 1;
                ctx.strokeRect(px + 0.5, py + 0.5, TILE - 1, TILE - 1);

                // Windows
                if ((x + y) % 3 === 0) {
                    ctx.fillStyle = Math.random() > 0.3 ? '#ffdd4430' : '#4488ff20';
                    ctx.fillRect(px + 8, py + 8, 6, 6);
                }
            }
        }
    }

    // Draw money drops
    for (let m of moneyDrops) {
        let bob = Math.sin(m.bobTimer) * 3;
        ctx.save();
        ctx.translate(m.x, m.y + bob);

        // Glow
        let gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, 15);
        gradient.addColorStop(0, '#00ff0040');
        gradient.addColorStop(1, 'transparent');
        ctx.fillStyle = gradient;
        ctx.fillRect(-15, -15, 30, 30);

        // Dollar sign
        ctx.fillStyle = '#00ff00';
        ctx.font = 'bold 14px Courier New';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('$', 0, 0);

        ctx.restore();
    }

    // Draw NPCs
    for (let npc of npcs) {
        if (!npc.alive) continue;

        ctx.save();
        ctx.translate(npc.x, npc.y);

        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.ellipse(2, 2, 6, 4, 0, 0, Math.PI * 2);
        ctx.fill();

        // Body
        ctx.fillStyle = npc.color;
        ctx.beginPath();
        ctx.arc(0, 0, 5, 0, Math.PI * 2);
        ctx.fill();

        // Direction indicator
        ctx.fillStyle = '#ffffff40';
        ctx.beginPath();
        ctx.arc(Math.cos(npc.angle) * 2, Math.sin(npc.angle) * 2, 2, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
    }

    // Draw parked cars
    for (let car of cars) {
        if (car === player.inCar) continue;
        drawCar(car);
    }

    // Draw police cars
    for (let p of police) {
        drawCar(p);

        // Police lights
        let lightPhase = Math.sin(p.animTimer * 0.2) * 0.5 + 0.5;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.fillStyle = lightPhase > 0.5 ? '#ff000080' : '#0000ff80';
        ctx.beginPath();
        ctx.arc(0, -5, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = lightPhase > 0.5 ? '#0000ff80' : '#ff000080';
        ctx.beginPath();
        ctx.arc(0, 5, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }

    // Draw player
    if (!player.inCar) {
        ctx.save();
        ctx.translate(player.x, player.y);
        ctx.rotate(player.angle);

        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.ellipse(2, 2, 8, 5, 0, 0, Math.PI * 2);
        ctx.fill();

        // Body
        ctx.fillStyle = player.color;
        ctx.beginPath();
        ctx.arc(0, 0, 7, 0, Math.PI * 2);
        ctx.fill();

        // Direction
        ctx.fillStyle = '#ffffff60';
        ctx.fillRect(3, -2, 6, 4);

        // Neon outline
        ctx.strokeStyle = '#00ff8840';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, 9, 0, Math.PI * 2);
        ctx.stroke();

        ctx.restore();
    }

    // Draw bullets
    for (let b of bullets) {
        ctx.fillStyle = b.color;
        ctx.shadowColor = b.color;
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }

    // Draw particles
    for (let p of particles) {
        ctx.globalAlpha = p.life / 60;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;

    ctx.restore();

    // HUD
    drawHUD();

    // Minimap
    drawMinimap();

    // Notifications
    drawNotifications();
}

function drawCar(car) {
    ctx.save();
    ctx.translate(car.x, car.y);
    ctx.rotate(car.angle);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.ellipse(2, 2, car.w / 2 + 1, car.h / 2 + 1, 0, 0, Math.PI * 2);
    ctx.fill();

    // Body
    ctx.fillStyle = car.color;
    ctx.fillRect(-car.w / 2, -car.h / 2, car.w, car.h);

    // Roof
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(-car.w / 4, -car.h / 3, car.w / 2, car.h * 0.66);

    // Windshield
    ctx.fillStyle = '#88aaff40';
    ctx.fillRect(car.w / 4, -car.h / 3, 4, car.h * 0.66);

    // Headlights
    ctx.fillStyle = '#ffff8860';
    ctx.fillRect(car.w / 2 - 2, -car.h / 2 + 1, 3, 4);
    ctx.fillRect(car.w / 2 - 2, car.h / 2 - 5, 3, 4);

    // Taillights
    ctx.fillStyle = '#ff000060';
    ctx.fillRect(-car.w / 2 - 1, -car.h / 2 + 1, 3, 4);
    ctx.fillRect(-car.w / 2 - 1, car.h / 2 - 5, 3, 4);

    // Neon underglow
    if (car.isPolice) {
        let phase = Math.sin(car.animTimer * 0.15);
        ctx.strokeStyle = phase > 0 ? '#ff000040' : '#0000ff40';
    } else {
        ctx.strokeStyle = car.color + '30';
    }
    ctx.lineWidth = 2;
    ctx.strokeRect(-car.w / 2 - 1, -car.h / 2 - 1, car.w + 2, car.h + 2);

    ctx.restore();
}

function drawHUD() {
    let hudY = 20;
    let hudX = 20;

    // Health bar
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(hudX, hudY, 200, 25);
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    ctx.strokeRect(hudX, hudY, 200, 25);

    let healthPct = player.health / player.maxHealth;
    let healthColor = healthPct > 0.5 ? '#00ff88' : healthPct > 0.25 ? '#ffaa00' : '#ff0044';
    ctx.fillStyle = healthColor;
    ctx.fillRect(hudX + 2, hudY + 2, 196 * healthPct, 21);

    ctx.fillStyle = '#ffffff';
    ctx.font = '12px Courier New';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText('HP: ' + Math.ceil(player.health), hudX + 5, hudY + 6);

    // Score
    ctx.fillStyle = '#00ffff';
    ctx.font = 'bold 20px Courier New';
    ctx.textAlign = 'right';
    ctx.fillText('SCORE: ' + score, canvas.width - 20, 20);

    // Money
    ctx.fillStyle = '#00ff00';
    ctx.font = 'bold 18px Courier New';
    ctx.fillText('$' + money, canvas.width - 20, 45);

    // Wanted level
    if (wantedLevel > 0) {
        let starX = canvas.width / 2;
        let starY = 20;
        for (let i = 0; i < 5; i++) {
            ctx.fillStyle = i < Math.ceil(wantedLevel) ? '#ffff00' : '#333333';
            ctx.font = '24px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText('★', starX - 48 + i * 24, starY);
        }
    }

    // In car indicator
    if (player.inCar) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(canvas.width / 2 - 80, canvas.height - 50, 160, 30);
        ctx.fillStyle = '#ffaa00';
        ctx.font = '14px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('DRIVING [E to exit]', canvas.width / 2, canvas.height - 30);

        // Speed indicator
        let speed = Math.abs(player.inCar.speed);
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(canvas.width / 2 - 60, canvas.height - 80, 120, 15);
        ctx.fillStyle = speed > 4 ? '#ff0044' : speed > 2 ? '#ffaa00' : '#00ff88';
        ctx.fillRect(canvas.width / 2 - 60, canvas.height - 80, 120 * (speed / 8), 15);
        ctx.fillStyle = '#fff';
        ctx.font = '10px Courier New';
        ctx.fillText('SPEED: ' + Math.floor(speed * 20) + ' km/h', canvas.width / 2, canvas.height - 78);
    } else {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(canvas.width / 2 - 70, canvas.height - 40, 140, 25);
        ctx.fillStyle = '#88aaff';
        ctx.font = '12px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('[E] enter car nearby', canvas.width / 2, canvas.height - 22);
    }

    // Controls hint
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '10px Courier New';
    ctx.textAlign = 'left';
    ctx.fillText('WASD: Move | Arrow Keys: Drive | E: Enter/Exit Car', 20, canvas.height - 15);
}

function drawMinimap() {
    let mmSize = 150;
    let mmX = canvas.width - mmSize - 15;
    let mmY = canvas.height - mmSize - 15;
    let scale = mmSize / (MAP_W * TILE);

    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.fillRect(mmX - 2, mmY - 2, mmSize + 4, mmSize + 4);
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    ctx.strokeRect(mmX - 2, mmY - 2, mmSize + 4, mmSize + 4);

    // Draw roads
    for (let y = 0; y < MAP_H; y += 2) {
        for (let x = 0; x < MAP_W; x += 2) {
            if (map[y][x] === 1) {
                ctx.fillStyle = '#333344';
                ctx.fillRect(mmX + x * TILE * scale, mmY + y * TILE * scale,
                    Math.max(1, TILE * 2 * scale), Math.max(1, TILE * 2 * scale));
            }
        }
    }

    // Draw buildings
    for (let y = 0; y < MAP_H; y += 2) {
        for (let x = 0; x < MAP_W; x += 2) {
            if (map[y][x] === 2) {
                ctx.fillStyle = '#554466';
                ctx.fillRect(mmX + x * TILE * scale, mmY + y * TILE * scale,
                    Math.max(1, TILE * 2 * scale), Math.max(1, TILE * 2 * scale));
            }
        }
    }

    // Draw NPCs
    ctx.fillStyle = '#44ff4480';
    for (let npc of npcs) {
        if (!npc.alive) continue;
        ctx.fillRect(mmX + npc.x * scale - 1, mmY + npc.y * scale - 1, 2, 2);
    }

    // Draw police cars
    ctx.fillStyle = '#ff0000';
    for (let p of police) {
        ctx.fillRect(mmX + p.x * scale - 2, mmY + p.y * scale - 2, 4, 4);
    }

    // Draw player
    ctx.fillStyle = '#00ff88';
    ctx.fillRect(mmX + player.x * scale - 2, mmY + player.y * scale - 2, 5, 5);

    // Player direction
    ctx.strokeStyle = '#00ff8880';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(mmX + player.x * scale, mmY + player.y * scale);
    ctx.lineTo(
        mmX + (player.x + Math.cos(player.angle) * 50) * scale,
        mmY + (player.y + Math.sin(player.angle) * 50) * scale
    );
    ctx.stroke();

    // Wanted level on minimap
    if (wantedLevel > 0) {
        ctx.fillStyle = '#ffff0080';
        ctx.font = '10px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('WANTED', mmX + mmSize / 2, mmY - 5);
    }
}

function drawNotifications() {
    let nY = canvas.height / 2 - 80;
    for (let i = notifications.length - 1; i >= 0; i--) {
        let n = notifications[i];
        ctx.globalAlpha = Math.min(1, n.timer / 30);
        ctx.fillStyle = n.color;
        ctx.font = 'bold 18px Courier New';
        ctx.textAlign = 'center';
        ctx.shadowColor = n.color;
        ctx.shadowBlur = 10;
        ctx.fillText(n.text, canvas.width / 2, nY + n.y);
        ctx.shadowBlur = 0;
    }
    ctx.globalAlpha = 1;
}

// Game loop
function gameLoop() {
    update();
    render();
    requestAnimationFrame(gameLoop);
}

// Init
generateMap();
initPlayer();
spawnCars();
spawnNPCs();
gameLoop();
</script>
