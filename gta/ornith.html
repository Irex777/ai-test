<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon City - GTA Style</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
background: #0a0a0f;
overflow: hidden;
font-family: 'Courier New', monospace;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
}
canvas {
display: block;
image-rendering: pixelated;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
});

// Game State
const STATE = { MENU: 0, PLAYING: 1, GAMEOVER: 2 };
let gameState = STATE.PLAYING;
let score = 0;
let money = 0;
let wantedLevel = 0;
let wantedTimer = 0;
let screenShake = 0;
let notification = { text: '', timer: 0 };
let time = 0;

// Input
const keys = {};
window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; e.preventDefault(); });

// Map tiles
const TILE = 40;
const MAP_W = 80;
const MAP_H = 80;
const map = [];
const buildings = [];
const roads = [];
const parkedCars = [];
const npcs = [];
let playerCar = null;
let player = { x: 200, y: 200, angle: 0, speed: 0, health: 100, maxHealth: 100, inCar: false, currentCar: null, dx: 0, dy: 0 };

// Colors
const NEON = {
cyan: '#00f5ff', magenta: '#ff00ff', yellow: '#ffff00',
green: '#00ff41', red: '#ff0044', orange: '#ff8800',
blue: '#4488ff', pink: '#ff69b4', white: '#ffffff'
};

function generateMap() {
for (let y = 0; y < MAP_H; y++) {
map[y] = [];
for (let x = 0; x < MAP_W; x++) {
map[y][x] = 0; // grass
}
}

// Road grid
const roadWidth = 3;
for (let i = 0; i < MAP_W; i++) {
for (let w = 0; w < roadWidth; w++) {
if (i + w < MAP_W) map[Math.floor(MAP_H / 2)][i + w] = 1;
}
}
for (let i = 0; i < MAP_H; i++) {
for (let w = 0; w < roadWidth; w++) {
if (i + w < MAP_H) map[i + w][Math.floor(MAP_W / 2)] = 1;
}
}

// Main roads
const roadY = [10, 25, 40, 55, 70];
const roadX = [10, 25, 40, 55, 70];
roadY.forEach((ry, idx) => {
for (let w = 0; w < roadWidth; w++) {
for (let x = 0; x < MAP_W; x++) {
if (ry + w < MAP_H) map[ry + w][x] = 1;
}
}
});
roadX.forEach((rx, idx) => {
for (let w = 0; w < roadWidth; w++) {
for (let y = 0; y < MAP_H; y++) {
if (rx + w < MAP_W) map[y][rx + w] = 4; // crosswalk hint
}
}
});

// Sidewalks (adjacent to roads)
for (let y = 0; y < MAP_H; y++) {
for (let x = 0; x < MAP_W; x++) {
if (map[y][x] === 0) {
let adjRoad = false;
for (let dy = -1; dy <= 1 && !adjRoad; dy++) {
for (let dx = -1; dx <= 1 && !adjRoad; dx++) {
const ny = y + dy, nx = x + dx;
if (ny >= 0 && ny < MAP_H && nx >= 0 && nx < MAP_W) {
if (map[ny][nx] === 1 || map[ny][nx] === 4) adjRoad = true;
}
}
}
if (adjRoad) map[y][x] = 2; // sidewalk
}
}
}

// Buildings
const buildingColors = ['#1a1a2e', '#16213e', '#0f3460', '#1a1a3e', '#2a1a3e'];
const buildingNeon = [NEON.cyan, NEON.magenta, NEON.green, NEON.blue, NEON.pink];
let bIdx = 0;
for (let by = 2; by < MAP_H - 2; by += roadWidth + 12) {
for (let bx = 2; bx < MAP_W - 2; bx += roadWidth + 12) {
if (map[by] && map[by][bx] !== 0 && map[by][bx] !== 1) continue;
// Check if area is clear of roads
let areaClear = true;
for (let dy = 0; dy < 8 && areaClear; dy++) {
for (let dx = 0; dx < 8 && areaClear; dx++) {
const ny = by + dy, nx = bx + dx;
if (ny >= MAP_H || nx >= MAP_W) { areaClear = false; break; }
if (map[ny][nx] === 1 || map[ny][nx] === 4) areaClear = false;
}
}
if (areaClear && Math.random() < 0.7) {
const w = 4 + Math.floor(Math.random() * 5);
const h = 4 + Math.floor(Math.random() * 5);
const colorIdx = Math.floor(Math.random() * buildingColors.length);
const b = {
x: bx * TILE, y: by * TILE, w: w * TILE, h: h * TILE,
color: buildingColors[colorIdx],
neon: buildingNeon[colorIdx],
neonSide: Math.floor(Math.random() * 4),
height: 1 + Math.floor(Math.random() * 3),
idx: bIdx++
};
buildings.push(b);
for (let dy = 0; dy < h; dy++) {
for (let dx = 0; dx < w; dx++) {
const ny = by + dy, nx = bx + dx;
if (ny < MAP_H && nx < MAP_W) map[ny][nx] = 3; // building
}
}
}
}
}

// Parked cars
const carColors = [NEON.cyan, NEON.magenta, NEON.yellow, NEON.green, NEON.orange, NEON.blue];
for (let i = 0; i < 60; i++) {
const px = Math.floor(Math.random() * MAP_W);
const py = Math.floor(Math.random() * MAP_H);
if (map[py] && map[py][px] === 1) {
const angle = Math.random() < 0.5 ? 0 : Math.PI / 2;
parkedCars.push({
x: px * TILE + TILE / 2, y: py * TILE + TILE / 2,
angle: angle, speed: 0, color: carColors[Math.floor(Math.random() * carColors.length)],
vx: 0, vy: 0, health: 100, isPolice: false, driver: null,
w: 30, h: 55, type: 'npc'
});
}
}
}

function spawnNPCs() {
for (let i = 0; i < 40; i++) {
let x, y;
do {
x = Math.random() * MAP_W * TILE;
y = Math.random() * MAP_H * TILE;
} while (map[Math.floor(y / TILE)] && map[Math.floor(y / TILE)][Math.floor(x / TILE)] !== 2);
npcs.push({
x, y, angle: Math.random() * Math.PI * 2,
speed: 0.5 + Math.random() * 1.5,
health: 30, maxHealth: 30,
vx: 0, vy: 0,
color: [NEON.cyan, NEON.magenta, NEON.yellow, NEON.green, NEON.pink][Math.floor(Math.random() * 5)],
type: 'ped',
wanderTimer: Math.random() * 200,
alive: true
});
}
}

function startGame() {
score = 0; money = 0; wantedLevel = 0; wantedTimer = 0;
player.x = 40 * TILE; player.y = 40 * TILE;
player.angle = 0; player.speed = 0;
player.health = 100; player.maxHealth = 100;
player.inCar = false; player.currentCar = null;
buildings.length = 0; parkedCars.length = 0; npcs.length = 0;
generateMap();
spawnNPCs();
}

// Car physics
function updateCar(car, dt) {
const accel = car.isPolice ? 0.15 : 0.12;
const maxSpeed = car.isPolice ? 8 : 6;
const friction = 0.96;
const turnSpeed = 0.04;

if (car.driver === 'player') {
if (keys['arrowup']) car.speed = Math.min(car.speed + accel, maxSpeed);
if (keys['arrowdown']) car.speed = Math.max(car.speed - accel * 0.7, -maxSpeed * 0.4);
if (keys['arrowleft']) car.angle -= turnSpeed * (1 + Math.abs(car.speed) * 0.1);
if (keys['arrowright']) car.angle += turnSpeed * (1 + Math.abs(car.speed) * 0.1);
} else if (car.driver === 'police' && wantedLevel > 0) {
// Police AI
const dx = player.x - car.x;
const dy = player.y - car.y;
const targetAngle = Math.atan2(dy, dx);
let angleDiff = targetAngle - car.angle;
while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
car.angle += Math.max(-turnSpeed * 1.5, Math.min(turnSpeed * 1.5, angleDiff));
car.speed = Math.min(car.speed + accel * 0.8, maxSpeed * 1.2);
} else {
// NPC driving
car.speed *= 0.98;
}

car.speed *= friction;
car.x += Math.sin(car.angle) * car.speed;
car.y -= Math.cos(car.angle) * car.speed;

// Building collision
for (const b of buildings) {
if (rectCircle(b.x, b.y, b.w, b.h, car.x, car.y, 20)) {
car.speed *= -0.5;
const cx = Math.max(b.x, Math.min(car.x, b.x + b.w));
const cy = Math.max(b.y, Math.min(car.y, b.y + b.h));
car.x += (car.x - cx) * 0.1;
car.y += (car.y - cy) * 0.1;
}
}

// Map bounds
car.x = Math.max(0, Math.min(MAP_W * TILE, car.x));
car.y = Math.max(0, Math.min(MAP_H * TILE, car.y));

// Hit NPCs
if (Math.abs(car.speed) > 2) {
for (const npc of npcs) {
if (!npc.alive) continue;
const dist = Math.hypot(npc.x - car.x, npc.y - car.y);
if (dist < 25) {
npc.health -= 50;
if (npc.health <= 0) {
npc.alive = false;
score += 50;
money += 10 + Math.floor(Math.random() * 20);
spawnMoneyDrop(npc.x, npc.y);
if (wantedLevel < 5) wantedLevel++;
wantedTimer = 600;
screenShake = 10;
}
}
}
}

// Hit other cars
for (const other of parkedCars) {
if (other === car) continue;
const dist = Math.hypot(other.x - car.x, other.y - car.y);
if (dist < 35) {
car.speed *= -0.3;
other.speed += car.speed * 0.3;
other.health -= 20;
screenShake = 5;
if (other.health <= 0 && !other.isPolice) {
score += 100;
money += 30 + Math.floor(Math.random() * 50);
spawnMoneyDrop(other.x, other.y);
}
}
}
}

function rectCircle(rx, ry, rw, rh, cx, cy, cr) {
const distX = Math.abs(cx - Math.max(rx, Math.min(cx, rx + rw)));
const distY = Math.abs(cy - Math.max(ry, Math.min(cy, ry + rh)));
return distX <= cr && distY <= cr;
}

// Money pickups
const moneyDrops = [];
function spawnMoneyDrop(x, y) {
for (let i = 0; i < 3; i++) {
moneyDrops.push({
x: x + (Math.random() - 0.5) * 30,
y: y + (Math.random() - 0.5) * 30,
amount: 5 + Math.floor(Math.random() * 15),
timer: 600,
vy: -2 - Math.random() * 3
});
}
}

// Police system
const policeCars = [];
function spawnPolice() {
const angle = Math.random() * Math.PI * 2;
const dist = 400 + Math.random() * 200;
const pc = {
x: player.x + Math.cos(angle) * dist,
y: player.y + Math.sin(angle) * dist,
angle: 0, speed: 0, color: '#ffffff',
vx: 0, vy: 0, health: 200, isPolice: true,
driver: 'police', w: 30, h: 55, type: 'police'
};
parkedCars.push(pc);
policeCars.push(pc);
}

function updatePolice(dt) {
if (wantedLevel <= 0) return;
const maxPolice = wantedLevel * 2;
while (policeCars.length < maxPolice) spawnPolice();

for (let i = policeCars.length - 1; i >= 0; i--) {
const pc = policeCars[i];
updateCar(pc, dt);

// Check if destroyed
if (pc.health <= 0) {
score += 200;
money += 50;
spawnMoneyDrop(pc.x, pc.y);
const idx = policeCars.indexOf(pc);
if (idx > -1) policeCars.splice(idx, 1);
const pidx = parkedCars.indexOf(pc);
if (pidx > -1) parkedCars.splice(pidx, 1);
}

// Damage player if hitting them
if (!player.inCar) {
const dist = Math.hypot(player.x - pc.x, player.y - pc.y);
if (dist < 30) {
player.health -= 1;
screenShake = 3;
}
}
}
}

// NPC update
function updateNPCs(dt) {
for (const npc of npcs) {
if (!npc.alive) continue;

npc.wanderTimer--;
if (npc.wanderTimer <= 0) {
npc.angle += (Math.random() - 0.5) * 1.5;
npc.wanderTimer = 60 + Math.random() * 120;
}

const nx = npc.x + Math.sin(npc.angle) * npc.speed;
const ny = npc.y - Math.cos(npc.angle) * npc.speed;

// Check tile collision
const tileX = Math.floor(nx / TILE);
const tileY = Math.floor(ny / TILE);
if (tileX >= 0 && tileX < MAP_W && tileY >= 0 && tileY < MAP_H) {
const tile = map[tileY][tileX];
if (tile === 1 || tile === 4) {
npc.angle += Math.PI;
} else if (tile === 3) {
npc.angle += (Math.random() - 0.5) * 0.5;
} else {
npc.x = nx;
npc.y = ny;
}
} else {
npc.angle += Math.PI;
}

// Run from police
for (const pc of policeCars) {
const dist = Math.hypot(npc.x - pc.x, npc.y - pc.y);
if (dist < 150) {
npc.angle = Math.atan2(npc.y - pc.y, npc.x - pc.x);
npc.speed = 3;
} else {
npc.speed = Math.min(npc.speed + 0.01, 1.5);
}
}
}
}

// Player update
function updatePlayer(dt) {
if (player.inCar && player.currentCar) {
const car = player.currentCar;
car.driver = 'player';
if (keys['e'] && !keys['e_prev']) {
player.inCar = false;
player.x = car.x + 20;
player.y = car.y;
car.driver = null;
player.currentCar = null;
notification.text = 'Exited vehicle';
notification.timer = 60;
}
} else {
// On foot movement
if (keys['w']) {
player.x += Math.sin(player.angle) * 3;
player.y -= Math.cos(player.angle) * 3;
}
if (keys['s']) {
player.x -= Math.sin(player.angle) * 2;
player.y += Math.cos(player.angle) * 2;
}
if (keys['a']) player.angle -= 0.06;
if (keys['d']) player.angle += 0.06;

// Building collision
for (const b of buildings) {
if (rectCircle(b.x, b.y, b.w, b.h, player.x, player.y, 10)) {
const cx = Math.max(b.x, Math.min(player.x, b.x + b.w));
const cy = Math.max(b.y, Math.min(player.y, b.y + b.h));
player.x += (player.x - cx) * 0.15;
player.y += (player.y - cy) * 0.15;
}
}

// Hit NPCs with car or fists
if (keys['f'] || keys[' ']) {
for (const npc of npcs) {
if (!npc.alive) continue;
const dist = Math.hypot(npc.x - player.x, npc.y - player.y);
if (dist < 25) {
npc.health -= 15;
if (npc.health <= 0) {
npc.alive = false;
score += 50;
money += 10 + Math.floor(Math.random() * 20);
spawnMoneyDrop(npc.x, npc.y);
if (wantedLevel < 5) wantedLevel++;
wantedTimer = 600;
screenShake = 8;
}
screenShake = 4;
}
}
}

// Enter car
if (keys['e'] && !keys['e_prev']) {
let closest = null, closestDist = 60;
for (const car of parkedCars) {
const dist = Math.hypot(car.x - player.x, car.y - player.y);
if (dist < closestDist) {
closest = car;
closestDist = dist;
}
}
if (closest) {
player.inCar = true;
player.currentCar = closest;
car.driver = 'player';
player.x = car.x;
player.y = car.y;
notification.text = 'Entered vehicle';
notification.timer = 60;
}
}

// Map bounds
player.x = Math.max(0, Math.min(MAP_W * TILE, player.x));
player.y = Math.max(0, Math.min(MAP_H * TILE, player.y));
}

keys['e_prev'] = keys['e'];

// Wanted level decay
if (wantedTimer > 0) {
wantedTimer--;
} else if (wantedLevel > 0) {
wantedLevel = Math.max(0, wantedLevel - 0.001);
}

// Money pickup
for (let i = moneyDrops.length - 1; i >= 0; i--) {
const m = moneyDrops[i];
m.vy += 0.3;
m.y += m.vy;
m.timer--;
const dist = Math.hypot(m.x - player.x, m.y - player.y);
if (dist < 30) {
money += m.amount;
score += m.amount;
moneyDrops.splice(i, 1);
continue;
}
if (m.timer <= 0) moneyDrops.splice(i, 1);
}

// Health regen (slow)
if (player.health < player.maxHealth && player.health > 0) {
player.health = Math.min(player.maxHealth, player.health + 0.01);
}

// Game over
if (player.health <= 0 && gameState === STATE.PLAYING) {
gameState = STATE.GAMEOVER;
}
}

// Camera
let camera = { x: 0, y: 0 };
function updateCamera() {
const targetX = player.inCar && player.currentCar ? player.currentCar.x : player.x;
const targetY = player.inCar && player.currentCar ? player.currentCar.y : player.y;
camera.x += (targetX - camera.x) * 0.1;
camera.y += (targetY - camera.y) * 0.1;
}

// Rendering
function drawMap() {
const startX = Math.max(0, Math.floor(camera.x / TILE) - 1);
const startY = Math.max(0, Math.floor(camera.y / TILE) - 1);
const endX = Math.min(MAP_W, startX + Math.ceil(canvas.width / TILE) + 3);
const endY = Math.min(MAP_H, startY + Math.ceil(canvas.height / TILE) + 3);

for (let y = startY; y < endY; y++) {
for (let x = startX; x < endX; x++) {
const tile = map[y][x];
const sx = x * TILE - camera.x;
const sy = y * TILE - camera.y;
if (tile === 0) {
ctx.fillStyle = '#0a0a12';
ctx.fillRect(sx, sy, TILE, TILE);
} else if (tile === 1) {
ctx.fillStyle = '#1a1a24';
ctx.fillRect(sx, sy, TILE, TILE);
// Road markings
if (y % 4 === 0) {
ctx.fillStyle = '#333344';
ctx.fillRect(sx, sy + TILE / 2 - 1, TILE, 2);
}
if (x % 4 === 0) {
ctx.fillStyle = '#333344';
ctx.fillRect(sx + TILE / 2 - 1, sy, 2, TILE);
}
} else if (tile === 2) {
ctx.fillStyle = '#151520';
ctx.fillRect(sx, sy, TILE, TILE);
ctx.strokeStyle = '#1f1f30';
ctx.strokeRect(sx, sy, TILE, TILE);
} else if (tile === 3) {
// Don't draw - buildings cover it
} else if (tile === 4) {
ctx.fillStyle = '#1a1a24';
ctx.fillRect(sx, sy, TILE, TILE);
ctx.fillStyle = '#2a2a34';
ctx.fillRect(sx, sy, TILE, TILE);
}
}
}
}

function drawBuildings() {
for (const b of buildings) {
const sx = b.x - camera.x;
const sy = b.y - camera.y;
if (sx + b.w < -50 || sx > canvas.width + 50 || sy + b.h < -50 || sy > canvas.height + 50) continue;

// Shadow
ctx.fillStyle = 'rgba(0,0,0,0.5)';
ctx.fillRect(sx + 5 * b.height, sy + 5 * b.height, b.w, b.h);

// Building body
ctx.fillStyle = b.color;
ctx.fillRect(sx, sy, b.w, b.h);

// Neon outline
ctx.strokeStyle = b.neon;
ctx.lineWidth = 1.5;
ctx.shadowColor = b.neon;
ctx.shadowBlur = 8 + Math.sin(time * 0.05 + b.idx) * 4;
ctx.strokeRect(sx, sy, b.w, b.h);
ctx.shadowBlur = 0;

// Windows
const windowSize = 6;
const windowGap = 12;
for (let wy = 8; wy < b.h - 8; wy += windowGap) {
for (let wx = 8; wx < b.w - 8; wx += windowGap) {
if (Math.random() < 0.3) continue;
const brightness = 0.1 + Math.random() * 0.15;
ctx.fillStyle = `rgba(${100 + Math.random() * 50}, ${100 + Math.random() * 50}, ${150 + Math.random() * 50}, ${brightness})`;
ctx.fillRect(sx + wx, sy + wy, windowSize, windowSize);
}
}

// Neon signs on some buildings
if (b.neonSide === 0 || b.neonSide === 2) {
ctx.fillStyle = b.neon;
ctx.globalAlpha = 0.3 + Math.sin(time * 0.03 + b.idx) * 0.2;
ctx.fillRect(sx, sy + b.h / 2 - 3, b.w, 6);
ctx.globalAlpha = 1;
}
}
}

function drawCar(car) {
const sx = car.x - camera.x;
const sy = car.y - camera.y;
if (sx < -100 || sx > canvas.width + 100 || sy < -100 || sy > canvas.height + 100) return;

ctx.save();
ctx.translate(sx, sy);
ctx.rotate(car.angle);

// Car body
ctx.fillStyle = car.isPolice ? '#111111' : car.color;
ctx.shadowColor = car.isPolice ? NEON.blue : car.color;
ctx.shadowBlur = 10;
ctx.fillRect(-car.w / 2, -car.h / 2, car.w, car.h);
ctx.shadowBlur = 0;

// Windshield
ctx.fillStyle = 'rgba(100, 150, 200, 0.4)';
ctx.fillRect(-car.w / 2 + 3, -car.h / 2 + 5, car.w - 6, 12);

// Rear
ctx.fillStyle = 'rgba(200, 0, 0, 0.6)';
ctx.fillRect(-car.w / 2 + 2, car.h / 2 - 8, 6, 5);
ctx.fillRect(car.w / 2 - 8, car.h / 2 - 8, 6, 5);

// Headlights
ctx.fillStyle = 'rgba(255, 255, 150, 0.7)';
ctx.fillRect(-car.w / 2 + 2, -car.h / 2, 6, 4);
ctx.fillRect(car.w / 2 - 8, -car.h / 2, 6, 4);

// Police lights
if (car.isPolice) {
const flash = Math.sin(time * 0.3) > 0;
ctx.fillStyle = flash ? NEON.red : NEON.blue;
ctx.shadowColor = flash ? NEON.red : NEON.blue;
ctx.shadowBlur = 15;
ctx.fillRect(-car.w / 2, -5, car.w / 2, 6);
ctx.fillStyle = flash ? NEON.blue : NEON.red;
ctx.fillRect(0, -5, car.w / 2, 6);
ctx.shadowBlur = 0;
}

// Damage
if (car.health < 100) {
ctx.fillStyle = 'rgba(50, 20, 0, 0.5)';
ctx.fillRect(-car.w / 2 + 5, car.h / 2 - 15, 8, 10);
}

ctx.restore();

// Speed lines when moving fast
if (Math.abs(car.speed) > 3) {
ctx.strokeStyle = 'rgba(255,255,255,0.2)';
ctx.lineWidth = 1;
for (let i = 0; i < 3; i++) {
const lx = sx + (Math.random() - 0.5) * 20;
const ly = sy + car.h / 2 + Math.random() * 20;
ctx.beginPath();
ctx.moveTo(lx, ly);
ctx.lineTo(lx + (Math.random() - 0.5) * 5, ly + 10 + Math.random() * 10);
ctx.stroke();
}
}
}

function drawPlayer() {
if (player.inCar) return;
const sx = player.x - camera.x;
const sy = player.y - camera.y;

ctx.save();
ctx.translate(sx, sy);
ctx.rotate(player.angle);

// Body
ctx.fillStyle = NEON.cyan;
ctx.shadowColor = NEON.cyan;
ctx.shadowBlur = 12;
ctx.beginPath();
ctx.arc(0, 0, 10, 0, Math.PI * 2);
ctx.fill();
ctx.shadowBlur = 0;

// Direction indicator
ctx.fillStyle = 'rgba(0, 245, 255, 0.6)';
ctx.beginPath();
ctx.moveTo(0, -14);
ctx.lineTo(-5, -6);
ctx.lineTo(5, -6);
ctx.fill();

// Shoulders
ctx.fillStyle = '#003344';
ctx.fillRect(-8, -4, 6, 8);
ctx.fillRect(2, -4, 6, 8);

ctx.restore();
}

function drawNPCs() {
for (const npc of npcs) {
if (!npc.alive) continue;
const sx = npc.x - camera.x;
const sy = npc.y - camera.y;
if (sx < -50 || sx > canvas.width + 50 || sy < -50 || sy > canvas.height + 50) continue;

ctx.save();
ctx.translate(sx, sy);
ctx.rotate(npc.angle);

ctx.fillStyle = npc.color;
ctx.shadowColor = npc.color;
ctx.shadowBlur = 6;
ctx.beginPath();
ctx.arc(0, 0, 7, 0, Math.PI * 2);
ctx.fill();
ctx.shadowBlur = 0;

ctx.fillStyle = 'rgba(0,0,0,0.3)';
ctx.fillRect(-5, -3, 4, 6);
ctx.fillRect(1, -3, 4, 6);

ctx.restore();
}
}

function drawMoneyDrops() {
for (const m of moneyDrops) {
const sx = m.x - camera.x;
const sy = m.y - camera.y;
const pulse = 0.8 + Math.sin(time * 0.1) * 0.2;

ctx.fillStyle = NEON.green;
ctx.shadowColor = NEON.green;
ctx.shadowBlur = 10 * pulse;
ctx.font = '12px Courier New';
ctx.fillText('$', sx - 4, sy + 4);
ctx.shadowBlur = 0;
}
}

function drawMinimap() {
const mmSize = 160;
const mmX = canvas.width - mmSize - 15;
const mmY = 15;
const scale = mmSize / (MAP_W * TILE);

ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
ctx.strokeStyle = NEON.cyan;
ctx.lineWidth = 2;
ctx.fillRect(mmX, mmY, mmSize, mmSize);
ctx.strokeRect(mmX, mmY, mmSize, mmSize);

// Roads
ctx.fillStyle = '#2a2a3a';
for (let y = 0; y < MAP_H; y += 2) {
for (let x = 0; x < MAP_W; x += 2) {
if (map[y] && map[y][x] === 1) {
ctx.fillRect(mmX + x * TILE * scale, mmY + y * TILE * scale,
Math.max(2, TILE * scale * 2), Math.max(2, TILE * scale * 2));
}
}
}

// Buildings
ctx.fillStyle = '#444466';
for (const b of buildings) {
ctx.fillRect(mmX + b.x * scale, mmY + b.y * scale,
Math.max(1, b.w * scale), Math.max(1, b.h * scale));
}

// Player
const px = mmX + player.x * scale;
const py = mmY + player.y * scale;
ctx.fillStyle = NEON.cyan;
ctx.shadowColor = NEON.cyan;
ctx.shadowBlur = 5;
ctx.beginPath();
ctx.arc(px, py, 3, 0, Math.PI * 2);
ctx.fill();
ctx.shadowBlur = 0;

// Police
ctx.fillStyle = NEON.red;
for (const pc of policeCars) {
ctx.fillRect(mmX + pc.x * scale - 2, mmY + pc.y * scale - 2, 4, 4);
}

// Wanted stars on minimap
if (wantedLevel > 0) {
ctx.fillStyle = NEON.yellow;
ctx.font = '10px Courier New';
ctx.fillText('★'.repeat(Math.min(5, wantedLevel)), mmX + 5, mmY - 3);
}
}

function drawHUD() {
// Health bar
const hbX = 15, hbY = canvas.height - 60;
ctx.fillStyle = 'rgba(0,0,0,0.7)';
ctx.fillRect(hbX - 2, hbY - 2, 204, 24);
ctx.strokeStyle = NEON.cyan;
ctx.lineWidth = 1;
ctx.strokeRect(hbX - 2, hbY - 2, 204, 24);

const healthPct = player.health / player.maxHealth;
const healthColor = healthPct > 0.5 ? NEON.green : healthPct > 0.25 ? NEON.orange : NEON.red;
ctx.fillStyle = healthColor;
ctx.shadowColor = healthColor;
ctx.shadowBlur = 8;
ctx.fillRect(hbX, hbY, 200 * healthPct, 20);
ctx.shadowBlur = 0;

ctx.fillStyle = NEON.white;
ctx.font = '12px Courier New';
ctx.fillText('HP', hbX + 5, hbY + 14);
ctx.fillText(Math.ceil(player.health), hbX + 160, hbY + 14);

// Wanted level stars
if (wantedLevel > 0) {
const starX = canvas.width / 2 - 50;
const starY = 15;
ctx.fillStyle = 'rgba(0,0,0,0.7)';
ctx.fillRect(starX - 10, starY - 5, 120, 30);
ctx.strokeStyle = NEON.yellow;
ctx.strokeRect(starX - 10, starY - 5, 120, 30);

for (let i = 0; i < 5; i++) {
ctx.fillStyle = i < Math.ceil(wantedLevel) ? NEON.yellow : '#333';
ctx.shadowColor = i < Math.ceil(wantedLevel) ? NEON.yellow : 'transparent';
ctx.shadowBlur = i < Math.ceil(wantedLevel) ? 10 : 0;
ctx.font = '20px serif';
ctx.fillText('★', starX + i * 22, starY + 18);
}
ctx.shadowBlur = 0;
}

// Score
ctx.fillStyle = 'rgba(0,0,0,0.7)';
ctx.fillRect(canvas.width / 2 - 100, 50, 200, 30);
ctx.fillStyle = NEON.yellow;
ctx.shadowColor = NEON.yellow;
ctx.shadowBlur = 8;
ctx.font = 'bold 18px Courier New';
ctx.textAlign = 'center';
ctx.fillText(`SCORE: ${score}`, canvas.width / 2, 72);
ctx.shadowBlur = 0;
ctx.textAlign = 'left';

// Money
ctx.fillStyle = NEON.green;
ctx.shadowColor = NEON.green;
ctx.shadowBlur = 8;
ctx.font = 'bold 16px Courier New';
ctx.fillText(`$${money}`, 15, 25);
ctx.shadowBlur = 0;

// Notification
if (notification.timer > 0) {
notification.timer--;
ctx.fillStyle = 'rgba(0,0,0,0.8)';
ctx.fillRect(canvas.width / 2 - 100, canvas.height / 2 - 80, 200, 30);
ctx.fillStyle = NEON.cyan;
ctx.font = '14px Courier New';
ctx.textAlign = 'center';
ctx.fillText(notification.text, canvas.width / 2, canvas.height / 2 - 60);
ctx.textAlign = 'left';
}

// Controls hint
ctx.fillStyle = 'rgba(255,255,255,0.3)';
ctx.font = '11px Courier New';
if (player.inCar) {
ctx.fillText('↑↓←→ Drive | E Exit', 15, canvas.height - 15);
} else {
ctx.fillText('WASD Move | E Enter Car | F Attack', 15, canvas.height - 15);
}

// Police count
if (policeCars.length > 0) {
ctx.fillStyle = NEON.red;
ctx.font = '12px Courier New';
ctx.fillText(`POLICE: ${policeCars.length}`, canvas.width - 100, canvas.height - 15);
}
}

function drawScreenShake() {
if (screenShake > 0) {
ctx.translate(
(Math.random() - 0.5) * screenShake * 2,
(Math.random() - 0.5) * screenShake * 2
);
screenShake *= 0.85;
if (screenShake < 0.5) screenShake = 0;
}
}

function drawGameOver() {
ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
ctx.fillRect(0, 0, canvas.width, canvas.height);

ctx.textAlign = 'center';

ctx.fillStyle = NEON.red;
ctx.shadowColor = NEON.red;
ctx.shadowBlur = 20;
ctx.font = 'bold 60px Courier New';
ctx.fillText('WASTED', canvas.width / 2, canvas.height / 2 - 60);
ctx.shadowBlur = 0;

ctx.fillStyle = NEON.yellow;
ctx.font = '24px Courier New';
ctx.fillText(`Score: ${score}`, canvas.width / 2, canvas.height / 2);
ctx.fillStyle = NEON.green;
ctx.fillText(`Money: $${money}`, canvas.width / 2, canvas.height / 2 + 35);

ctx.fillStyle = NEON.cyan;
ctx.font = '18px Courier New';
ctx.fillText('Press R to Restart', canvas.width / 2, canvas.height / 2 + 90);
ctx.textAlign = 'left';
}

function drawNeonEffects() {
// Ambient neon glow on road edges
const camX = camera.x;
const camY = camera.y;
for (const b of buildings) {
if (b.neonSide === 1 || b.neonSide === 3) {
const sx = b.x - camX;
const sy = b.y - camY;
if (sx + b.w < -50 || sx > canvas.width + 50) continue;
ctx.fillStyle = b.neon;
ctx.globalAlpha = 0.15 + Math.sin(time * 0.02 + b.idx) * 0.1;
if (b.neonSide === 1) {
ctx.fillRect(sx + b.w, sy - 2, 4, b.h);
} else {
ctx.fillRect(sx - 4, sy - 2, 4, b.h);
}
ctx.globalAlpha = 1;
}
}
}

// Main game loop
let lastTime = 0;
function gameLoop(timestamp) {
const dt = (timestamp - lastTime) / 16.67;
lastTime = timestamp;
time++;

if (keys['r'] && gameState === STATE.GAMEOVER) {
startGame();
gameState = STATE.PLAYING;
}

ctx.clearRect(0, 0, canvas.width, canvas.height);

if (gameState === STATE.PLAYING) {
updatePlayer(dt);
if (player.inCar && player.currentCar) {
updateCar(player.currentCar, dt);
}
updatePolice(dt);
updateNPCs(dt);
updateCamera();

drawScreenShake();
drawMap();
drawNeonEffects();
drawBuildings();
drawMoneyDrops();
for (const car of parkedCars) drawCar(car);
drawNPCs();
drawPlayer();
drawMinimap();
drawHUD();
} else if (gameState === STATE.GAMEOVER) {
drawScreenShake();
drawMap();
drawBuildings();
drawGameOver();
}

requestAnimationFrame(gameLoop);
}

startGame();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
