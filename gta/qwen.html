<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon City Drifter</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .hud-element {
            position: absolute;
            color: #fff;
            text-shadow: 0 0 5px #00ffcc;
        }
        #health-bar-container {
            top: 20px;
            left: 20px;
            width: 200px;
            height: 20px;
            background: #333;
            border: 2px solid #555;
        }
        #health-fill {
            width: 100%;
            height: 100%;
            background: #ff0055;
            box-shadow: 0 0 10px #ff0055;
            transition: width 0.2s;
        }
        #money-display {
            top: 50px;
            left: 20px;
            font-size: 24px;
            color: #00ff00;
            text-shadow: 0 0 5px #00ff00;
        }
        #wanted-display {
            top: 20px;
            right: 20px;
            font-size: 30px;
            color: #333; /* Dark when empty */
            letter-spacing: 5px;
        }
        .star-active {
            color: #ffcc00;
            text-shadow: 0 0 10px #ffcc00;
        }
        #score-display {
            top: 50px;
            right: 20px;
            font-size: 24px;
            color: #fff;
            text-align: right;
        }
        #minimap-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 150px;
            height: 150px;
            border: 2px solid #00ffcc;
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 10px #00ffcc;
        }
        #game-over {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            z-index: 100;
        }
        #game-over h1 {
            font-size: 60px;
            color: #ff0055;
            text-shadow: 0 0 20px #ff0055;
            margin-bottom: 20px;
        }
        #restart-btn {
            padding: 15px 30px;
            font-size: 24px;
            background: transparent;
            color: #00ffcc;
            border: 2px solid #00ffcc;
            cursor: pointer;
            font-family: inherit;
            text-transform: uppercase;
            box-shadow: 0 0 10px #00ffcc;
        }
        #restart-btn:hover {
            background: #00ffcc;
            color: #000;
        }
        #controls-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div id="health-bar-container"><div id="health-fill"></div></div>
        <div id="money-display">$0</div>
        <div id="wanted-display">
            <span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span><span class="star">★</span>
        </div>
        <div id="score-display">SCORE: <span id="score-val">0</span></div>
        <div id="minimap-container">
            <canvas id="minimapCanvas"></canvas>
        </div>
        <div id="controls-hint">
            WASD: Move | E: Enter/Exit Car | ARROWS: Drive Car
        </div>
    </div>

    <div id="game-over">
        <h1>BUSTED / WASTED</h1>
        <p style="color:white; margin-bottom: 30px;">Final Score: <span id="final-score">0</span></p>
        <button id="restart-btn">Try Again</button>
    </div>

<script>
/**
 * NEON CITY DRIFTER
 * A single-file GTA-style prototype.
 */

// --- Configuration ---
const TILE_SIZE = 40;
const MAP_WIDTH = 60;
const MAP_HEIGHT = 60;
const VIEWPORT_WIDTH = window.innerWidth;
const VIEWPORT_HEIGHT = window.innerHeight;

// Colors
const C_BG = '#0a0a12';
const C_ROAD = '#1a1a24';
const C_SIDEBUILDING = '#252535';
const C_BUILDING_TOP = '#3a3a50';
const C_SIDWALK = '#333';
const C_PLAYER = '#00ffcc';
const C_PLAYER_VEHICLE = '#00ffcc';
const C_ENEMY_VEHICLE = '#ff0055';

// --- Game State ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const miniCanvas = document.getElementById('minimapCanvas');
const miniCtx = miniCanvas.getContext('2d');

canvas.width = VIEWPORT_WIDTH;
canvas.height = VIEWPORT_HEIGHT;
miniCanvas.width = 150;
miniCanvas.height = 150;

let gameState = 'PLAYING'; // PLAYING, GAMEOVER
let lastTime = 0;
let money = 0;
let score = 0;

// Input
const keys = {
    w: false, a: false, s: false, d: false,
    ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false,
    e: false
};

window.addEventListener('keydown', e => {
    if(keys.hasOwnProperty(e.key) || keys.hasOwnProperty(e.code)) keys[e.key] = true;
    if(e.key.toLowerCase() === 'e') keys.e = true;
});
window.addEventListener('keyup', e => {
    if(keys.hasOwnProperty(e.key) || keys.hasOwnProperty(e.code)) keys[e.key] = false;
    if(e.key.toLowerCase() === 'e') keys.e = false;
});

// --- Map Generation ---
// 0: Road, 1: Building, 2: Sidewalk
const map = [];
for (let y = 0; y < MAP_HEIGHT; y++) {
    const row = [];
    for (let x = 0; x < MAP_WIDTH; x++) {
        // Simple grid city generation
        if (x === 0 || x === MAP_WIDTH - 1 || y === 0 || y === MAP_HEIGHT - 1) {
            row.push(1); // Border walls
        } else if (x % 6 === 0 || y % 6 === 0) {
            row.push(0); // Roads
        } else if (x % 6 === 1 || x % 6 === 5 || y % 6 === 1 || y % 6 === 5) {
            row.push(2); // Sidewalks
        } else {
            row.push(1); // Buildings
        }
    }
    map.push(row);
}

// --- Classes ---

class Entity {
    constructor(x, y, size) {
        this.x = x;
        this.y = y;
        this.size = size;
        this.angle = 0;
        this.speed = 0;
        this.color = '#fff';
        this.dead = false;
    }
    
    getTileX() { return Math.floor(this.x / TILE_SIZE); }
    getTileY() { return Math.floor(this.y / TILE_SIZE); }

    checkCollision(newX, newY) {
        // Check 4 corners
        const corners = [
            {x: newX - this.size/2 + 2, y: newY - this.size/2 + 2},
            {x: newX + this.size/2 - 2, y: newY - this.size/2 + 2},
            {x: newX - this.size/2 + 2, y: newY + this.size/2 - 2},
            {x: newX + this.size/2 - 2, y: newY + this.size/2 - 2}
        ];

        for (let p of corners) {
            let tx = Math.floor(p.x / TILE_SIZE);
            let ty = Math.floor(p.y / TILE_SIZE);
            if (tx < 0 || tx >= MAP_WIDTH || ty < 0 || ty >= MAP_HEIGHT) return true; // Out of bounds
            if (map[ty][tx] === 1) return true; // Building
        }
        return false;
    }
}

class Player extends Entity {
    constructor() {
        super(TILE_SIZE * 10, TILE_SIZE * 10, 12);
        this.health = 100;
        this.inVehicle = false;
        this.currentVehicle = null;
        this.wantedLevel = 0;
        this.wantedTimer = 0;
    }

    update(dt) {
        if (this.inVehicle) {
            this.currentVehicle.update(dt, true);
            this.x = this.currentVehicle.x;
            this.y = this.currentVehicle.y;
            this.angle = this.currentVehicle.angle;
        } else {
            // On foot movement
            let dx = 0;
            let dy = 0;
            const speed = 120 * dt;

            if (keys.w) dy -= speed;
            if (keys.s) dy += speed;
            if (keys.a) dx -= speed;
            if (keys.d) dx += speed;

            if (dx !== 0 || dy !== 0) {
                if (!this.checkCollision(this.x + dx, this.y)) this.x += dx;
                if (!this.checkCollision(this.x, this.y + dy)) this.y += dy;
                
                // Simple facing direction
                this.angle = Math.atan2(dy, dx);
            }

            // Enter Vehicle Logic
            if (keys.e) {
                keys.e = false; // Debounce
                let closest = null;
                let minDist = 40;

                cars.forEach(car => {
                    const dist = Math.hypot(car.x - this.x, car.y - this.y);
                    if (dist < minDist && !car.dead) {
                        closest = car;
                    }
                });

                if (closest) {
                    this.inVehicle = true;
                    this.currentVehicle = closest;
                    closest.occupied = true;
                    // Hide player
                    this.dead = true; 
                }
            }
        }

        // Wanted System Logic
        if (this.wantedLevel > 0) {
            this.wantedTimer -= dt;
            if (this.wantedTimer <= 0) {
                this.wantedLevel = Math.max(0, this.wantedLevel - 0.05); // Decay
                this.wantedTimer = 2;
            }
        }
        
        // Cap wanted level
        this.wantedLevel = Math.min(5, Math.floor(this.wantedLevel));

        if (this.health <= 0) {
            endGame();
        }
    }

    takeDamage(amount) {
        this.health -= amount;
        updateUI();
    }
}

class Vehicle extends Entity {
    constructor(x, y, type) {
        super(x, y, type === 'police' ? 20 : 18);
        this.type = type; // 'civilian', 'police'
        this.maxSpeed = type === 'police' ? 280 : 220;
        this.accel = type === 'police' ? 150 : 100;
        this.turnSpeed = 2.5;
        this.occupied = false;
        this.health = 100;
        this.color = type === 'police' ? '#333' : `hsl(${Math.random()*360}, 70%, 50%)`;
    }

    update(dt, isPlayer) {
        // Input handling
        if (isPlayer) {
            if (keys.ArrowUp) this.speed += this.accel * dt;
            if (keys.ArrowDown) this.speed -= this.accel * dt;
            
            if (Math.abs(this.speed) > 10) {
                if (keys.ArrowLeft) this.angle -= this.turnSpeed * dt * (this.speed > 0 ? 1 : -1);
                if (keys.ArrowRight) this.angle += this.turnSpeed * dt * (this.speed > 0 ? 1 : -1);
            }

            // Exit car
            if (keys.e) {
                keys.e = false;
                this.occupied = false;
                player.inVehicle = false;
                player.currentVehicle = null;
                player.dead = false;
                player.x = this.x + 25; // Step out
                player.y = this.y;
            }
        } else {
            // AI Logic
            if (this.type === 'police' && player.wantedLevel > 0) {
                // Chase player
                let target = player.inVehicle ? player.currentVehicle : player;
                let dx = target.x - this.x;
                let dy = target.y - this.y;
                let targetAngle = Math.atan2(dy, dx);
                
                // Smooth turning
                let diff = targetAngle - this.angle;
                while (diff < -Math.PI) diff += Math.PI * 2;
                while (diff > Math.PI) diff -= Math.PI * 2;
                
                this.angle += Math.sign(diff) * Math.min(Math.abs(diff), this.turnSpeed * dt);
                this.speed += this.accel * dt;
            } else {
                // Idle / Random wander
                this.speed *= 0.95; // Friction
                if (Math.random() < 0.02) this.speed += (Math.random() - 0.5) * 20;
                if (Math.random() < 0.01) this.angle += (Math.random() - 0.5);
            }
        }

        // Physics
        this.speed = Math.max(-this.maxSpeed/2, Math.min(this.maxSpeed, this.speed));
        this.speed *= 0.98; // Friction

        const vx = Math.cos(this.angle) * this.speed * dt;
        const vy = Math.sin(this.angle) * this.speed * dt;

        // Collision with world
        if (!this.checkCollision(this.x + vx, this.y)) this.x += vx;
        else this.speed *= -0.5; // Bounce
        if (!this.checkCollision(this.x, this.y + vy)) this.y += vy;
        else this.speed *= -0.5;

        // Collision with objects
        // 1. Cars vs Cars / Buildings
        if (Math.abs(this.speed) > 50 && (Math.random() < 0.1)) {
            // Check simple overlap with buildings for destruction (visual only usually, but here damage)
            let tx = Math.floor(this.x/TILE_SIZE);
            let ty = Math.floor(this.y/TILE_SIZE);
            if(map[ty][tx] === 1) {
                this.health -= 2;
                this.speed *= 0.8;
            }
        }

        // 2. Cars vs Pedestrians
        if (Math.abs(this.speed) > 20) {
            npcs.forEach(npc => {
                if (npc.dead) return;
                const d = Math.hypot(npc.x - this.x, npc.y - this.y);
                if (d < this.size) {
                    npc.health = 0;
                    npc.dead = true;
                    createMoney(npc.x, npc.y);
                    createParticles(npc.x, npc.y, '#f00');
                    if (isPlayer) {
                        player.wantedLevel += 1;
                        score += 50;
                    }
                }
            });
        }

        // 3. Cars vs Player (if player on foot)
        if (!player.inVehicle && !player.dead) {
            const d = Math.hypot(player.x - this.x, player.y - this.y);
            if (d < this.size) {
                if (this.type === 'police') {
                    player.takeDamage(1);
                } else if (isPlayer) {
                    // Player hit car
                    this.health -= 10;
                    this.speed *= 0.5;
                    player.takeDamage(10);
                    createParticles(this.x, this.y, '#555');
                }
            }
        }

        if (this.health <= 0 && !this.dead) {
            this.dead = true;
            createMoney(this.x, this.y);
            createParticles(this.x, this.y, this.color);
            if (isPlayer) {
                // If player car destroyed, eject player
                player.inVehicle = false;
                player.currentVehicle = null;
                player.dead = false;
                player.takeDamage(20);
            }
        }
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        
        // Body
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.color;
        ctx.fillRect(-this.size/2, -this.size/4, this.size, this.size/2);
        
        // Windshield
        ctx.fillStyle = '#111';
        ctx.shadowBlur = 0;
        ctx.fillRect(0, -this.size/4 + 2, this.size/3, this.size/2 - 4);

        // Headlights
        ctx.fillStyle = '#fff';
        ctx.fillRect(this.size/2 - 2, -this.size/4, 2, 4);
        ctx.fillRect(this.size/2 - 2, this.size/4 - 6, 2, 4);

        // Police lights
        if (this.type === 'police') {
            if (Math.floor(Date.now() / 200) % 2 === 0) {
                ctx.fillStyle = '#f00';
                ctx.shadowColor = '#f00';
                ctx.shadowBlur = 15;
            } else {
                ctx.fillStyle = '#00f';
                ctx.shadowColor = '#00f';
                ctx.shadowBlur = 15;
            }
            ctx.fillRect(-5, -5, 10, 10);
        }

        ctx.restore();
    }
}

class NPC extends Entity {
    constructor(x, y) {
        super(x, y, 8);
        this.speed = 30;
        this.color = '#fff';
        this.changeDirTimer = 0;
        this.targetAngle = 0;
    }

    update(dt) {
        // Random walk
        this.changeDirTimer -= dt;
        if (this.changeDirTimer <= 0) {
            this.targetAngle = Math.random() * Math.PI * 2;
            this.changeDirTimer = 1 + Math.random() * 2;
        }

        // Move towards angle
        const vx = Math.cos(this.targetAngle) * this.speed * dt;
        const vy = Math.sin(this.targetAngle) * this.speed * dt;

        if (!this.checkCollision(this.x + vx, this.y + vy)) {
            this.x += vx;
            this.y += vy;
        } else {
            this.targetAngle += Math.PI; // Turn around
        }
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(0, 0, this.size/2, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
    }
}

class Money {
    constructor(x, y, value) {
        this.x = x;
        this.y = y;
        this.value = value;
        this.life = 10; // seconds
    }
    update(dt) {
        this.life -= dt;
        if (player.x - this.x < 15 && player.x - this.x > -15 &&
            player.y - this.y < 15 && player.y - this.y > -15) {
            money += this.value;
            updateUI();
            this.life = 0; // collected
        }
    }
    draw(ctx) {
        ctx.fillStyle = '#0f0';
        ctx.font = '10px Arial';
        ctx.fillText(`$${this.value}`, this.x, this.y);
    }
}

class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.vx = (Math.random() - 0.5) * 100;
        this.vy = (Math.random() - 0.5) * 100;
        this.life = 0.5;
    }
    update(dt) {
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.life -= dt;
    }
    draw(ctx) {
        ctx.globalAlpha = this.life * 2;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, 3, 3);
        ctx.globalAlpha = 1;
    }
}

// --- Globals ---
let player;
let cars = [];
let npcs = [];
let moneyItems = [];
let particles = [];

// --- Initialization ---
function init() {
    player = new Player();
    cars = [];
    npcs = [];
    moneyItems = [];
    particles = [];
    money = 0;
    score = 0;
    gameState = 'PLAYING';
    
    // Spawn Cars
    for (let i = 0; i < 20; i++) {
        spawnCar('civilian');
    }
    
    // Spawn Police
    for (let i = 0; i < 5; i++) {
        spawnCar('police');
    }

    // Spawn NPCs
    for (let i = 0; i < 30; i++) {
        spawnNPC();
    }

    document.getElementById('game-over').style.display = 'none';
    updateUI();
}

function spawnCar(type) {
    let valid = false;
    let x, y;
    while (!valid) {
        x = Math.floor(Math.random() * MAP_WIDTH) * TILE_SIZE + TILE_SIZE/2;
        y = Math.floor(Math.random() * MAP_HEIGHT) * TILE_SIZE + TILE_SIZE/2;
        let tx = Math.floor(x/TILE_SIZE);
        let ty = Math.floor(y/TILE_SIZE);
        if (map[ty][tx] === 0) valid = true; // Spawn on road
    }
    cars.push(new Vehicle(x, y, type));
}

function spawnNPC() {
    let valid = false;
    let x, y;
    while (!valid) {
        x = Math.floor(Math.random() * MAP_WIDTH) * TILE_SIZE + TILE_SIZE/2;
        y = Math.floor(Math.random() * MAP_HEIGHT) * TILE_SIZE + TILE_SIZE/2;
        let tx = Math.floor(x/TILE_SIZE);
        let ty = Math.floor(y/TILE_SIZE);
        if (map[ty][tx] === 2) valid = true; // Spawn on sidewalk
    }
    npcs.push(new NPC(x, y));
}

function createMoney(x, y) {
    const val = Math.floor(Math.random() * 50) + 10;
    moneyItems.push(new Money(x, y, val));
}

function createParticles(x, y, color) {
    for(let i=0; i<10; i++) {
        particles.push(new Particle(x, y, color));
    }
}

function endGame() {
    gameState = 'GAMEOVER';
    document.getElementById('final-score').innerText = score;
    document.getElementById('game-over').style.display = 'flex';
}

document.getElementById('restart-btn').addEventListener('click', init);

// --- Main Loop ---

function update(dt) {
    if (gameState !== 'PLAYING') return;

    player.update(dt);

    // Update Cars
    cars.forEach((car, index) => {
        if (!car.dead) {
            car.update(dt, false); // AI update
            // Collision between cars
            cars.forEach(other => {
                if (car !== other && !other.dead) {
                    const d = Math.hypot(car.x - other.x, car.y - other.y);
                    if (d < car.size) {
                        // Simple bounce
                        car.speed *= -0.5;
                        other.speed *= -0.5;
                        car.health -= 5;
                        other.health -= 5;
                        score += 10;
                        // Push apart
                        const angle = Math.atan2(car.y - other.y, car.x - other.x);
                        car.x += Math.cos(angle) * 2;
                        car.y += Math.sin(angle) * 2;
                    }
                }
            });
        }
    });

    // Update NPCs
    npcs.forEach((npc, index) => {
        if (!npc.dead) npc.update(dt);
    });

    // Update Money
    moneyItems.forEach(m => m.update(dt));
    moneyItems = moneyItems.filter(m => m.life > 0);

    // Update Particles
    particles.forEach(p => p.update(dt));
    particles = particles.filter(p => p.life > 0);

    // Cleanup dead entities
    cars = cars.filter(c => !c.dead);
    npcs = npcs.filter(n => !n.dead);

    // Respawn logic to keep city alive
    if (cars.length < 15) spawnCar(Math.random() > 0.8 ? 'police' : 'civilian');
    if (npcs.length < 20) spawnNPC();

    updateUI();
}

function draw() {
    // Clear background
    ctx.fillStyle = C_BG;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    
    // Camera follow
    let camX = player.x - canvas.width / 2;
    let camY = player.y - canvas.height / 2;
    
    // Clamp camera to map bounds
    camX = Math.max(0, Math.min(camX, MAP_WIDTH * TILE_SIZE - canvas.width));
    camY = Math.max(0, Math.min(camY, MAP_HEIGHT * TILE_SIZE - canvas.height));
    
    ctx.translate(-camX, -camY);

    // Draw Map (Optimization: Only draw visible tiles)
    const startCol = Math.floor(camX / TILE_SIZE);
    const endCol = startCol + (canvas.width / TILE_SIZE) + 1;
    const startRow = Math.floor(camY / TILE_SIZE);
    const endRow = startRow + (canvas.height / TILE_SIZE) + 1;

    for (let y = startRow; y <= endRow; y++) {
        for (let x = startCol; x <= endCol; x++) {
            if (y >= 0 && y < MAP_HEIGHT && x >= 0 && x < MAP_WIDTH) {
                const tile = map[y][x];
                const px = x * TILE_SIZE;
                const py = y * TILE_SIZE;

                if (tile === 1) { // Building
                    ctx.fillStyle = C_SIDEBUILDING;
                    ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                    ctx.fillStyle = C_BUILDING_TOP;
                    ctx.fillRect(px + 2, py + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                } else if (tile === 2) { // Sidewalk
                    ctx.fillStyle = C_SIDWALK;
                    ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                } else { // Road
                    ctx.fillStyle = C_ROAD;
                    ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                    // Road markings
                    ctx.fillStyle = '#333';
                    if (x % 6 === 0) ctx.fillRect(px + TILE_SIZE/2 - 1, py, 2, TILE_SIZE);
                    if (y % 6 === 0) ctx.fillRect(px, py + TILE_SIZE/2 - 1, TILE_SIZE, 2);
                }
            }
        }
    }

    // Draw Money
    moneyItems.forEach(m => m.draw(ctx));

    // Draw NPCs
    npcs.forEach(n => n.draw(ctx));

    // Draw Cars
    cars.forEach(c => c.draw(ctx));

    // Draw Player (if not in car)
    if (!player.inVehicle) {
        ctx.save();
        ctx.translate(player.x, player.y);
        ctx.rotate(player.angle);
        ctx.fillStyle = C_PLAYER;
        ctx.shadowColor = C_PLAYER;
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(0, 0, player.size/2, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
    }

    // Draw Particles
    particles.forEach(p => p.draw(ctx));

    ctx.restore();

    // Draw Minimap
    drawMinimap();
}

function drawMinimap() {
    miniCtx.fillStyle = '#000';
    miniCtx.fillRect(0, 0, 150, 150);
    
    const scaleX = 150 / (MAP_WIDTH * TILE_SIZE);
    const scaleY = 150 / (MAP_HEIGHT * TILE_SIZE);

    // Draw Roads
    miniCtx.fillStyle = '#333';
    for (let y = 0; y < MAP_HEIGHT; y++) {
        for (let x = 0; x < MAP_WIDTH; x++) {
            if (map[y][x] === 0) {
                miniCtx.fillRect(x * TILE_SIZE * scaleX, y * TILE_SIZE * scaleY, TILE_SIZE * scaleX, TILE_SIZE * scaleY);
            }
        }
    }

    // Draw Player
    miniCtx.fillStyle = '#0f0';
    miniCtx.fillRect(player.x * scaleX - 2, player.y * scaleY - 2, 4, 4);

    // Draw Police
    miniCtx.fillStyle = '#f00';
    cars.forEach(c => {
        if (c.type === 'police') {
            miniCtx.fillRect(c.x * scaleX - 1, c.y * scaleY - 1, 2, 2);
        }
    });
}

function updateUI() {
    // Health
    const hp = Math.max(0, Math.floor(player.health));
    document.getElementById('health-fill').style.width = hp + '%';
    
    // Money
    document.getElementById('money-display').innerText = '$' + money;
    
    // Score
    document.getElementById('score-val').innerText = score;

    // Stars
    const stars = document.querySelectorAll('.star');
    const level = Math.min(5, Math.floor(player.wantedLevel));
    stars.forEach((s, i) => {
        if (i < level) s.classList.add('star-active');
        else s.classList.remove('star-active');
    });
}

function loop(timestamp) {
    const dt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;

    if (dt < 0.1) { // prevent huge jumps
        update(dt);
        draw();
    }
    
    requestAnimationFrame(loop);
}

// Start
init();
requestAnimationFrame(loop);

</script>
</body>
</html>
