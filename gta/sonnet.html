<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon City Crime</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; color: #0ff; font-size: 14px; text-shadow: 0 0 10px #0ff; }
        #minimap { position: absolute; bottom: 10px; right: 10px; border: 2px solid #0ff; box-shadow: 0 0 10px #0ff; }
        #health-bar { position: absolute; top: 10px; right: 10px; width: 200px; height: 20px; background: #1a1a1a; border: 2px solid #f00; }
        #health { height: 100%; background: linear-gradient(90deg, #f00, #ff0); transition: width 0.3s; }
        #wanted-stars { position: absolute; top: 40px; right: 10px; color: #ff0; font-size: 24px; text-shadow: 0 0 10px #ff0; }
        #score-display { position: absolute; top: 70px; right: 10px; color: #0f0; font-size: 18px; text-shadow: 0 0 10px #0f0; }
        #game-over { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.9); padding: 40px; border: 3px solid #f00; text-align: center; z-index: 100; }
        #game-over h1 { color: #f00; font-size: 48px; margin-bottom: 20px; text-shadow: 0 0 20px #f00; }
        #game-over p { color: #fff; margin: 10px 0; }
        #restart-btn { margin-top: 20px; padding: 15px 30px; font-size: 18px; background: #f00; color: #fff; border: none; cursor: pointer; font-family: 'Courier New', monospace; }
        #restart-btn:hover { background: #ff0; color: #000; }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <div id="ui">
        <div>WASD - Walk | Arrow Keys - Drive | E - Enter/Exit Vehicle</div>
        <div id="controls-display"></div>
    </div>
    <div id="minimap">
        <canvas id="minimap-canvas" width="150" height="150"></canvas>
    </div>
    <div id="health-bar">
        <div id="health"></div>
    </div>
    <div id="wanted-stars">★☆☆☆☆</div>
    <div id="score-display">$0</div>
    <div id="game-over">
        <h1>WASTED</h1>
        <p>Final Score: $<span id="final-score">0</span></p>
        <button id="restart-btn" onclick="location.reload()">RESTART</button>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const minimapCanvas = document.getElementById('minimap-canvas');
        const minimapCtx = minimapCanvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const game = { camera: { x: 0, y: 0 }, score: 0, wantedLevel: 0, wantedTimer: 0, gameOver: false };

        const player = { x: 400, y: 300, width: 20, height: 20, speed: 3, health: 100, maxHealth: 100, angle: 0, inVehicle: false, currentVehicle: null };

        const TILE_SIZE = 100;
        const WORLD_WIDTH = 2000;
        const WORLD_HEIGHT = 2000;

        const world = { buildings: [], roads: [], sidewalks: [], cars: [], npcs: [], money: [] };

        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if (e.key === 'e' || e.key === 'E') toggleVehicle();
        });
        document.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

        function generateCity() {
            const blockSize = 300;
            const roadWidth = 80;
            
            for (let x = 0; x < WORLD_WIDTH; x += blockSize) {
                world.roads.push({ x: x, y: 0, width: roadWidth, height: WORLD_HEIGHT, type: 'vertical' });
            }
            
            for (let y = 0; y < WORLD_HEIGHT; y += blockSize) {
                world.roads.push({ x: 0, y: y, width: WORLD_WIDTH, height: roadWidth, type: 'horizontal' });
            }

            for (let bx = roadWidth; bx < WORLD_WIDTH - blockSize; bx += blockSize) {
                for (let by = roadWidth; by < WORLD_HEIGHT - blockSize; by += blockSize) {
                    const blockWidth = blockSize - roadWidth * 2;
                    const blockHeight = blockSize - roadWidth * 2;
                    
                    const numBuildings = 2 + Math.floor(Math.random() * 3);
                    for (let i = 0; i < numBuildings; i++) {
                        const bWidth = 40 + Math.random() * 60;
                        const bHeight = 40 + Math.random() * 60;
                        const bX = bx + Math.random() * (blockWidth - bWidth);
                        const bY = by + Math.random() * (blockHeight - bHeight);
                        
                        world.buildings.push({
                            x: bX, y: bY, width: bWidth, height: bHeight,
                            color: `hsl(${Math.random() * 60 + 180}, 70%, 20%)`,
                            neonColor: `hsl(${Math.random() * 360}, 100%, 50%)`,
                            health: 100, destroyed: false
                        });
                    }
                }
            }

            world.roads.forEach(road => {
                const numCars = 3 + Math.floor(Math.random() * 5);
                for (let i = 0; i < numCars; i++) {
                    let carX, carY;
                    if (road.type === 'vertical') {
                        carX = road.x + road.width / 2;
                        carY = Math.random() * WORLD_HEIGHT;
                    } else {
                        carX = Math.random() * WORLD_WIDTH;
                        carY = road.y + road.height / 2;
                    }
                    world.cars.push(createCar(carX, carY));
                }
            });

            for (let i = 0; i < 50; i++) {
                world.npcs.push({
                    x: Math.random() * WORLD_WIDTH, y: Math.random() * WORLD_HEIGHT,
                    width: 15, height: 15, speed: 1 + Math.random(),
                    angle: Math.random() * Math.PI * 2,
                    color: `hsl(${Math.random() * 360}, 70%, 50%)`,
                    walkTimer: 0, walkDuration: 100 + Math.random() * 200,
                    health: 100
                });
            }

            for (let i = 0; i < 20; i++) {
                world.money.push({
                    x: Math.random() * WORLD_WIDTH, y: Math.random() * WORLD_HEIGHT,
                    amount: 10 + Math.floor(Math.random() * 90), collected: false
                });
            }
        }

        function createCar(x, y) {
            const carTypes = [
                { color: '#f00', name: 'sports', speed: 8, width: 40, height: 20 },
                { color: '#00f', name: 'sedan', speed: 6, width: 45, height: 22 },
                { color: '#ff0', name: 'taxi', speed: 5, width: 45, height: 22 },
                { color: '#0f0', name: 'compact', speed: 7, width: 35, height: 18 }
            ];
            
            const type = carTypes[Math.floor(Math.random() * carTypes.length)];
            
            return {
                x: x, y: y, width: type.width, height: type.height,
                speed: type.speed, maxSpeed: type.speed,
                angle: Math.random() * Math.PI * 2,
                color: type.color, velocity: 0, occupied: false,
                health: 100, police: false
            };
        }

        function createPoliceCar() {
            const car = createCar(player.x, player.y);
            car.color = '#00f';
            car.police = true;
            car.speed = 9;
            car.maxSpeed = 9;
            return car;
        }

        function toggleVehicle() {
            if (player.inVehicle) exitVehicle();
            else enterVehicle();
        }

        function enterVehicle() {
            for (let car of world.cars) {
                if (!car.occupied && getDistance(player, car) < 50) {
                    player.inVehicle = true;
                    player.currentVehicle = car;
                    car.occupied = true;
                    return;
                }
            }
        }

        function exitVehicle() {
            if (player.currentVehicle) {
                player.currentVehicle.occupied = false;
                player.x = player.currentVehicle.x + 30;
                player.y = player.currentVehicle.y;
                player.inVehicle = false;
                player.currentVehicle = null;
            }
        }

        function getDistance(obj1, obj2) {
            return Math.sqrt(Math.pow(obj1.x - obj2.x, 2) + Math.pow(obj1.y - obj2.y, 2));
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function increaseWantedLevel() {
            if (game.wantedLevel < 5) {
                game.wantedLevel++;
                game.wantedTimer = 600;
                updateWantedDisplay();
                
                const policeCar = createPoliceCar();
                policeCar.x = player.x + 300;
                policeCar.y = player.y;
                world.cars.push(policeCar);
            }
        }

        function updateWantedDisplay() {
            const stars = '★'.repeat(game.wantedLevel) + '☆'.repeat(5 - game.wantedLevel);
            document.getElementById('wanted-stars').textContent = stars;
        }

        function updateScoreDisplay() {
            document.getElementById('score-display').textContent = '$' + game.score;
        }

        function updateHealthBar() {
            const healthPercent = (player.health / player.maxHealth) * 100;
            document.getElementById('health').style.width = healthPercent + '%';
        }

        function updatePlayer() {
            if (game.gameOver) return;

            if (player.inVehicle && player.currentVehicle) {
                updateVehicleControls();
            } else {
                updatePlayerControls();
            }

            world.npcs.forEach(npc => {
                if (checkCollision(player, npc)) {
                    if (player.inVehicle) {
                        npc.health = 0;
                        increaseWantedLevel();
                        game.score += 50;
                        updateScoreDisplay();
                    }
                }
            });

            world.money.forEach(money => {
                if (!money.collected && getDistance(player, money) < 30) {
                    money.collected = true;
                    game.score += money.amount;
                    updateScoreDisplay();
                }
            });

            if (game.wantedLevel > 0) {
                game.wantedTimer--;
                if (game.wantedTimer <= 0) {
                    game.wantedLevel = Math.max(0, game.wantedLevel - 1);
                    game.wantedTimer = 600;
                    updateWantedDisplay();
                }
            }

            world.cars.forEach(car => {
                if (car.police && checkCollision(player, car) && player.inVehicle) {
                    player.health -= 0.5;
                    updateHealthBar();
                    if (player.health <= 0) gameOver();
                }
            });

            player.x = Math.max(0, Math.min(WORLD_WIDTH, player.x));
            player.y = Math.max(0, Math.min(WORLD_HEIGHT, player.y));

            game.camera.x = player.x - canvas.width / 2;
            game.camera.y = player.y - canvas.height / 2;
        }

        function updatePlayerControls() {
            let dx = 0, dy = 0;
            
            if (keys['w']) dy -= 1;
            if (keys['s']) dy += 1;
            if (keys['a']) dx -= 1;
            if (keys['d']) dx += 1;

            if (dx !== 0 || dy !== 0) {
                const magnitude = Math.sqrt(dx * dx + dy * dy);
                dx /= magnitude;
                dy /= magnitude;
                
                const newX = player.x + dx * player.speed;
                const newY = player.y + dy * player.speed;

                let canMove = true;
                for (let building of world.buildings) {
                    if (checkCollision({ x: newX, y: newY, width: player.width, height: player.height }, building)) {
                        canMove = false;
                        break;
                    }
                }

                if (canMove) {
                    player.x = newX;
                    player.y = newY;
                }
                
                if (dx > 0) player.angle = 0;
                else if (dx < 0) player.angle = Math.PI;
                else if (dy > 0) player.angle = Math.PI / 2;
                else if (dy < 0) player.angle = -Math.PI / 2;
            }
        }

        function updateVehicleControls() {
            const car = player.currentVehicle;
            if (!car) return;

            if (keys['arrowup']) {
                car.velocity = Math.min(car.velocity + 0.2, car.maxSpeed);
            } else if (keys['arrowdown']) {
                car.velocity = Math.max(car.velocity - 0.3, -car.maxSpeed / 2);
            } else {
                car.velocity *= 0.98;
            }

            if (Math.abs(car.velocity) > 0.1) {
                if (keys['arrowleft']) car.angle -= 0.05;
                if (keys['arrowright']) car.angle += 0.05;
            }

            const newX = car.x + Math.cos(car.angle) * car.velocity;
            const newY = car.y + Math.sin(car.angle) * car.velocity;

            let canMove = true;
            for (let building of world.buildings) {
                if (checkCollision({ x: newX, y: newY, width: car.width, height: car.height }, building)) {
                    canMove = false;
                    car.velocity *= -0.5;
                    building.health -= 10;
                    car.health -= 5;
                    
                    if (building.health <= 0 && !building.destroyed) {
                        building.destroyed = true;
                        game.score += 100;
                        updateScoreDisplay();
                        
                        world.money.push({
                            x: building.x + building.width / 2,
                            y: building.y + building.height / 2,
                            amount: 50, collected: false
                        });
                    }
                    break;
                }
            }

            if (canMove) {
                car.x = newX;
                car.y = newY;
            }

            world.cars.forEach(otherCar => {
                if (otherCar !== car && checkCollision(car, otherCar)) {
                    car.velocity *= -0.3;
                    otherCar.health -= 20;
                    car.health -= 10;
                    
                    if (otherCar.health <= 0 && !otherCar.police) {
                        const index = world.cars.indexOf(otherCar);
                        world.cars.splice(index, 1);
                        game.score += 200;
                        updateScoreDisplay();
                        
                        world.money.push({
                            x: otherCar.x, y: otherCar.y,
                            amount: 100, collected: false
                        });
                    }
                }
            });

            player.x = car.x;
            player.y = car.y;

            if (car.health <= 0) {
                exitVehicle();
                player.health -= 20;
                updateHealthBar();
                if (player.health <= 0) gameOver();
            }
        }

        function updateNPCs() {
            world.npcs = world.npcs.filter(npc => npc.health > 0);
            
            world.npcs.forEach(npc => {
                npc.walkTimer++;
                
                if (npc.walkTimer > npc.walkDuration) {
                    npc.walkTimer = 0;
                    npc.walkDuration = 100 + Math.random() * 200;
                    npc.angle = Math.random() * Math.PI * 2;
                }

                const newX = npc.x + Math.cos(npc.angle) * npc.speed;
                const newY = npc.y + Math.sin(npc.angle) * npc.speed;

                let canMove = true;
                for (let building of world.buildings) {
                    if (checkCollision({ x: newX, y: newY, width: npc.width, height: npc.height }, building)) {
                        canMove = false;
                        npc.angle += Math.PI;
                        break;
                    }
                }

                if (canMove) {
                    npc.x = newX;
                    npc.y = newY;
                }

                if (npc.x < 0 || npc.x > WORLD_WIDTH || npc.y < 0 || npc.y > WORLD_HEIGHT) {
                    npc.angle += Math.PI;
                }
            });
        }

        function updatePolice() {
            world.cars.forEach(car => {
                if (car.police && car.health > 0) {
                    const dx = player.x - car.x;
                    const dy = player.y - car.y;
                    const targetAngle = Math.atan2(dy, dx);
                    
                    let angleDiff = targetAngle - car.angle;
                    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                    
                    car.angle += angleDiff * 0.05;
                    
                    const dist = getDistance(car, player);
                    if (dist > 100) {
                        car.velocity = Math.min(car.velocity + 0.1, car.maxSpeed);
                    } else {
                        car.velocity *= 0.95;
                    }
                    
                    car.x += Math.cos(car.angle) * car.velocity;
                    car.y += Math.sin(car.angle) * car.velocity;
                }
            });
        }

        function render() {
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-game.camera.x, -game.camera.y);

            world.roads.forEach(road => {
                ctx.fillStyle = '#222';
                ctx.fillRect(road.x, road.y, road.width, road.height);
                
                ctx.strokeStyle = '#ff0';
                ctx.lineWidth = 2;
                ctx.setLineDash([20, 20]);
                
                if (road.type === 'vertical') {
                    ctx.beginPath();
                    ctx.moveTo(road.x + road.width / 2, road.y);
                    ctx.lineTo(road.x + road.width / 2, road.y + road.height);
                    ctx.stroke();
                } else {
                    ctx.beginPath();
                    ctx.moveTo(road.x, road.y + road.height / 2);
                    ctx.lineTo(road.x + road.width, road.y + road.height / 2);
                    ctx.stroke();
                }
                ctx.setLineDash([]);
            });

            world.buildings.forEach(building => {
                if (building.destroyed) {
                    ctx.fillStyle = '#333';
                    ctx.fillRect(building.x, building.y, building.width, building.height);
                } else {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    ctx.fillRect(building.x + 5, building.y + 5, building.width, building.height);
                    
                    ctx.fillStyle = building.color;
                    ctx.fillRect(building.x, building.y, building.width, building.height);
                    
                    ctx.strokeStyle = building.neonColor;
                    ctx.lineWidth = 3;
                    ctx.strokeRect(building.x, building.y, building.width, building.height);
                    
                    ctx.fillStyle = 'rgba(255, 255, 200, 0.3)';
                    const windowSize = 8;
                    const windowGap = 15;
                    for (let wx = building.x + 10; wx < building.x + building.width - 10; wx += windowGap) {
                        for (let wy = building.y + 10; wy < building.y + building.height - 10; wy += windowGap) {
                            if (Math.random() > 0.3) {
                                ctx.fillRect(wx, wy, windowSize, windowSize);
                            }
                        }
                    }
                }
            });

            world.money.forEach(money => {
                if (!money.collected) {
                    ctx.fillStyle = '#0f0';
                    ctx.beginPath();
                    ctx.arc(money.x, money.y, 8, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#ff0';
                    ctx.font = '10px Arial';
                    ctx.fillText('$', money.x - 3, money.y + 3);
                }
            });

            world.npcs.forEach(npc => {
                ctx.fillStyle = npc.color;
                ctx.beginPath();
                ctx.arc(npc.x, npc.y, npc.width / 2, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(npc.x, npc.y);
                ctx.lineTo(npc.x + Math.cos(npc.angle) * 10, npc.y + Math.sin(npc.angle) * 10);
                ctx.stroke();
            });

            world.cars.forEach(car => {
                ctx.save();
                ctx.translate(car.x, car.y);
                ctx.rotate(car.angle);
                
                ctx.fillStyle = car.color;
                ctx.fillRect(-car.width / 2, -car.height / 2, car.width, car.height);
                
                ctx.strokeStyle = car.police ? '#00f' : '#fff';
                ctx.lineWidth = 2;
                ctx.strokeRect(-car.width / 2, -car.height / 2, car.width, car.height);
                
                ctx.fillStyle = 'rgba(100, 200, 255, 0.5)';
                ctx.fillRect(-car.width / 4, -car.height / 2, car.width / 2, car.height / 3);
                
                if (car.police) {
                    ctx.fillStyle = Date.now() % 500 < 250 ? '#f00' : '#00f';
                    ctx.fillRect(-5, -car.height / 2 - 3, 10, 3);
                }
                
                ctx.restore();
                
                if (car.health < 100) {
                    ctx.fillStyle = '#333';
                    ctx.fillRect(car.x - 20, car.y - 30, 40, 5);
                    ctx.fillStyle = '#f00';
                    ctx.fillRect(car.x - 20, car.y - 30, 40 * (car.health / 100), 5);
                }
            });

            if (!player.inVehicle) {
                ctx.save();
                ctx.translate(player.x, player.y);
                ctx.rotate(player.angle);
                
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(0, 0, player.width / 2, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.strokeStyle = '#0ff';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(12, 0);
                ctx.stroke();
                
                ctx.restore();
            }

            ctx.restore();

            drawMinimap();
        }

        function drawMinimap() {
            const scale = 0.1;
            const mapX = player.x * scale - minimapCanvas.width / 2;
            const mapY = player.y * scale - minimapCanvas.height / 2;

            minimapCtx.fillStyle = '#111';
            minimapCtx.fillRect(0, 0, minimapCanvas.width, minimapCanvas.height);

            minimapCtx.fillStyle = '#333';
            world.roads.forEach(road => {
                const rx = road.x * scale - mapX;
                const ry = road.y * scale - mapY;
                minimapCtx.fillRect(rx, ry, road.width * scale, road.height * scale);
            });

            minimapCtx.fillStyle = '#555';
            world.buildings.forEach(building => {
                if (!building.destroyed) {
                    const bx = building.x * scale - mapX;
                    const by = building.y * scale - mapY;
                    minimapCtx.fillRect(bx, by, building.width * scale, building.height * scale);
                }
            });

            world.cars.forEach(car => {
                const cx = car.x * scale - mapX;
                const cy = car.y * scale - mapY;
                minimapCtx.fillStyle = car.police ? '#00f' : '#ff0';
                minimapCtx.fillRect(cx - 2, cy - 2, 4, 4);
            });

            const px = minimapCanvas.width / 2;
            const py = minimapCanvas.height / 2;
            minimapCtx.fillStyle = '#0ff';
            minimapCtx.beginPath();
            minimapCtx.arc(px, py, 4, 0, Math.PI * 2);
            minimapCtx.fill();
        }

        function gameOver() {
            game.gameOver = true;
            document.getElementById('final-score').textContent = game.score;
            document.getElementById('game-over').style.display = 'block';
        }

        function gameLoop() {
            if (!game.gameOver) {
                updatePlayer();
                updateNPCs();
                updatePolice();
            }
            render();
            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        generateCity();
        updateScoreDisplay();
        updateHealthBar();
        updateWantedDisplay();
        gameLoop();
    </script>
</body>
</html>
